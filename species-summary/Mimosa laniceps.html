:root{

.controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.controls select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:"DM Mono",monospace;font-size:10px;padding:5px 8px;border-radius:5px}
svg text{font-family:"DM Mono",monospace;fill:var(--muted)}
.tooltip{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:11px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .12s;z-index:9999;white-space:nowrap;line-height:1.5}
.section{margin-bottom:24px}
.section-title{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#trend-aoo,#trend-eoo,#pie-aoo,#pie-eoo{overflow-x:auto}
#trend-aoo::-webkit-scrollbar,#trend-eoo::-webkit-scrollbar,
#pie-aoo::-webkit-scrollbar,#pie-eoo::-webkit-scrollbar{height:3px}
#trend-aoo::-webkit-scrollbar-track,#trend-eoo::-webkit-scrollbar-track,

</style>

const YEARS = [1985,1986,1987,1988,1989,1990,1991,1992,1993,1994,1995,1996,1997,1998,1999,2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022];
const ANTHROPIC_FIELDS = ["Anthropic","Forest plantation","Pasture","Agriculture","Temporary crop","Sugar cane","Mosaic of uses","Urban area","Mining","Aquaculture","Oil palm","Perennial crop","Soybean","Rice","Other temporary crops","Coffee","Citrus","Other perennial crops","Simple crop","Cotton"];
const ANTHROPIC_SET = new Set(ANTHROPIC_FIELDS);

const tip = document.getElementById('tip');
function showTip(e, html) { tip.innerHTML = html; tip.style.opacity = 1; }
document.addEventListener('mousemove', e => {
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
});
function hideTip() { tip.style.opacity = 0; }

function fmtRate(v) { return (v >= 0 ? '+' : '') + v.toFixed(3); }

function drawTrendBars(selector, data, mode) {
  const root = d3.select(selector);
  root.selectAll('*').remove();

  if (!data.length) {
    root.append('p').style('color','#7d8590').style('font-size','11px').style('padding','8px').text('No data');
    return;
  }

  const LABEL_W = 130;
  const BAR_MAX = 110;
  const VAL_W   = 46;
  const W       = LABEL_W + BAR_MAX*2 + VAL_W;
  const barH    = 15;
  const gap     = 3;
  const H       = data.length*(barH+gap) + 10;

  const absMax  = d3.max(data, d => Math.abs(d.annualRate)) || 1;
  const xSc     = d3.scaleLinear().domain([-absMax, absMax]).range([0, BAR_MAX*2]);
  const zero    = xSc(0);

  const svg = root.append('svg').attr('width',W).attr('height',H);

  svg.append('line')
    .attr('x1', LABEL_W + zero).attr('x2', LABEL_W + zero)
    .attr('y1', 0).attr('y2', H)
    .attr('stroke','#21262d').attr('stroke-width',1);

  data.forEach((d,i) => {
    const y   = i*(barH+gap);
    const g   = svg.append('g').attr('transform','translate(0,'+y+')');
    const bw  = Math.max(1, Math.abs(xSc(d.annualRate)-zero));
    const bx  = d.annualRate < 0 ? LABEL_W + xSc(d.annualRate) : LABEL_W + zero;

    let col;
    if (mode === 'landUse') {
      col = d.annualRate >= 0 ? '#cd3232' : '#3fb950';
    } else {
      col = d.annualRate >= 0 ? '#3fb950' : '#cd3232';
    }

    const lbl = d.class.length > 20 ? d.class.slice(0,19)+'…' : d.class;

    g.append('text')
      .attr('x', LABEL_W-6).attr('y', barH-3)
      .attr('text-anchor','end')
      .style('font-size','9px')
      .style('fill','#7d8590')
      .text(lbl);

    g.append('rect')
      .attr('x', bx).attr('y', 1)
      .attr('width', bw).attr('height', barH-2)
      .attr('rx', 2)
      .attr('fill', col)
      .attr('opacity', 0.82)
      .style('cursor','pointer')
      .on('mousemove', e => showTip(
        e,
        '<b>'+d.class+'</b><br>annual rate: '+fmtRate(d.annualRate)+' km² yr⁻¹'
      ))
      .on('mouseleave', hideTip);

    g.append('text')
      .attr('x', LABEL_W + BAR_MAX*2 + 4).attr('y', barH-3)
      .style('font-size','9px')
      .style('fill', col)
      .text(fmtRate(d.annualRate));
  });
}

function filterSpeciesTrendData(data, mode) {
  const out = (data || []).filter(d => {
    const isLandUse = ANTHROPIC_SET.has(d.class);
    return mode === 'landUse' ? isLandUse : !isLandUse;
  });

  if (mode === 'landUse') {
    out.sort((a,b) => b.annualRate - a.annualRate); // positivos em cima
  } else {
    out.sort((a,b) => a.annualRate - b.annualRate); // negativos em cima
  }

  return out;
}

function pieDataForYear(series, year) {
  const idx = year - 1985;
  if (!series || !series.length || idx < 0) return [];
  return series
    .map(s => ({
      name: s.name,
      value: Number(s.data[idx] ?? 0),
      color: s.color || '#999999'
    }))
    .filter(d => isFinite(d.value) && d.value > 0);
}

function drawPie(selector, data, title) {
  const root = d3.select(selector);
  root.selectAll('*').remove();

  if (!data.length) {
    root.append('p').style('color','#7d8590').style('font-size','11px').style('padding','8px').text('No data');
    return;
  }

  const W = 420, H = 320, R = 105, r = 0;
  const svg = root.append('svg').attr('width', W).attr('height', H);
  const g = svg.append('g').attr('transform', 'translate(130,160)');

  const pie = d3.pie().value(d => d.value).sort(null);
  const arc = d3.arc().innerRadius(r).outerRadius(R);

  g.selectAll('path').data(pie(data)).join('path')
    .attr('d', arc)
    .attr('fill', d => d.data.color)
    .attr('stroke', '#0d1117')
    .attr('stroke-width', 1.2)
    .style('cursor','pointer')
    .on('mousemove', (e,d) => showTip(
      e,
      '<b>'+d.data.name+'</b><br>'+d.data.value.toFixed(2)+'%'
    ))
    .on('mouseleave', hideTip);

  const lg = svg.append('g').attr('transform','translate(255,24)');
  data.slice(0, 12).forEach((d,i) => {
    const row = lg.append('g').attr('transform','translate(0,'+(i*20)+')');
    row.append('rect').attr('width',10).attr('height',10).attr('rx',2).attr('fill',d.color);
    row.append('text').attr('x',15).attr('y',9).style('font-size','9px').style('fill','#7d8590')
      .text((d.name.length > 24 ? d.name.slice(0,23)+'…' : d.name) + ' ' + d.value.toFixed(1) + '%');
  });
}

function populateYears(selectId) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = '';
  YEARS.forEach(y => {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    sel.appendChild(opt);
  });
  sel.value = YEARS[YEARS.length - 1];
}

function redrawPies() {
  const yearAoo = Number(document.getElementById('year-aoo').value);
  const yearEoo = Number(document.getElementById('year-eoo').value);

  drawPie('#pie-aoo', pieDataForYear(STACKED_AOO, yearAoo), 'AOO');
  drawPie('#pie-eoo', pieDataForYear(STACKED_EOO, yearEoo), 'EOO');
}

let speciesTrendMode = 'landCover';

function redrawSpeciesClassCharts() {
  const aooData = filterSpeciesTrendData(TREND_AOO, speciesTrendMode);
  const eooData = filterSpeciesTrendData(TREND_EOO, speciesTrendMode);

  drawTrendBars('#trend-aoo', aooData, speciesTrendMode);
  drawTrendBars('#trend-eoo', eooData, speciesTrendMode);
}

  speciesTrendMode = 'landCover';
