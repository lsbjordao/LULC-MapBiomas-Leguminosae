            position: absolute; z-index: 1000; display: none; pointer-events: none;
            background: rgba(255,255,255,0.96); border: 1px solid #bbb; border-radius: 6px;
            padding: 8px 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); font-size: 14px; line-height: 1.3;
        }
        .legend-box {
            display: inline-block; width: 12px; height: 12px; margin-right: 6px;
            vertical-align: middle; border: 1px solid rgba(0,0,0,0.2);
        }

<body>
    <div id="map"></div>
    <div id="hover-info" class="hover-info"></div>

    <script>
        const species = "Calliandra imbricata";
        const speciesData = [{"type":"Feature","geometry":{"type":"Point","coordinates":[-41.916667,-13.066667]},"properties":{}}];
        const AOOgeometry = {"type":"FeatureCollection","features":[{"type":"Feature","properties":{"Cell width":"2 Km","Cell area":"4 Km2"},"geometry":{"type":"Polygon","coordinates":[[[-41.92589992129951,-13.075660203637247],[-41.92589992129951,-13.057673796362756],[-41.907434078700476,-13.057673796362756],[-41.907434078700476,-13.075660203637247],[-41.92589992129951,-13.075660203637247]]]}}]};

        const AOO_BUNDLE = {"xmin":-41.9258116,"ymin":-13.0756078,"xmax":-41.907486,"ymax":-13.0578211,"width":68,"height":66,"noDataValue":0,"tifBase64":"SUkqAAgAAAATAAABAwABAAAARAAAAAEBAwABAAAAQgAAAAIBAwABAAAACAAAAAMBAwABAAAABQAAAAYBAwABAAAAAQAAABUBAwABAAAAAQAAABwBAwABAAAAAQAAAD0BAwABAAAAAQAAAEIBAwABAAAAAAEAAEMBAwABAAAAAAEAAEQBBAABAAAAkgEAAEUBBAABAAAA1gQAAFMBAwABAAAAAQAAAA6DDAADAAAA8gAAAIKEDAAGAAAACgEAAK+HAwAgAAAAOgEAALCHDAACAAAAegEAALGHAgAIAAAAigEAAIGkAgACAAAAMAAAAAAAAABp6RZuXqkxP7roFm5eqTE/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABt3bb+gPZEwIwsdbuaHSrAAAAAAAAAAAABAAEAAAAHAAAEAAABAAIAAQQAAAEAAQAACAAAAQDmEAEIsYcHAAAABggAAAEAjiMJCLCHAQABAAsIsIcBAAAAiG10lh2kckAAAABAplRYQVdHUyA4NHwAgAMBgVCsCggVDMJhQZgUCAkPh8ChUNikNiAEEMZjUbjMVjwMAEhkUjkklk0nlEplUrlktl0vmExmEDg80hELicOi8ShMfn0agUcjs+gUyo1HpFJpVLpkng8Eg03nAEnUQikMokfoYMoVZkFNsFhsVjskpAlQp8Jp86BkRj1Yr0Vrddollu13vF5llug9qmtsqlxwVcEMUjlZvWJxWLsWBgkLp8FttUt2Dr2FhuHuuMzmdz0stNqDORyWUwOWrOYoMbxGf12vz+k2QVi9W1GpuWsn2w3m9vQPB9Ph/C2u228/j26j++5nNsPA4PBi+04vG4+C5Ue53b7lG6HQ6nVnfXy3Zivd9HplUH8Hi8fkwfminq+n1kPf4G0gnu+HlzTzvtALuvw4b9vE/r4qA3cBQY5qCOC8L3MrBDUvkosGww3kCwk2sKLioDVQBDMRs9Djiw9BMQxFEkWMVE0Tos08UMMrkFxbG68xfDrqxmy0cR+u8DReyceR6uMgSQschR1HbrSM7Ukyipklv4iidw7J7lylLakQjA64vfLL5y5MiYojKrBTDMSvzLNq9xjGDByczMezdOyVStK0JzBObCRnO9AJMok1K9QkaxRQNEpFGU4TitiPTmrcEUVRSfRPRkiI/SNEUpQKKsDR1PsrUdMUg69O09PM9LbOVSULUqvVRQFWIdWlVzTV1IUNWNZTtCc9tu8a3T3PteV7NtiWBNMiNM0zJ0e29jzdZVYVxYdSVBU9pTLatq1fK9QWKwdt25bzySaqtlXHckuWpM7ryLZitMFdl2rPXVxUHA98xVLV6yiiDJT1dSszRTTM37Fd/yA6dNYJh2DVE1eEobheAYDJ1d4HDl9MJSWFYtG7avDRtW45SzAuy0+QyQ4rqVva2T4djytrdlmGZdg+Y5lgeJqHm2bxw6uBIqqFB2Znk4aPC+gxboeiKjqFP6RNFGXjkGmwxLyz6kyNRXDE1VXTLEx6zEmt3vorSVvHSLVtL+sbNAUqa5omjIatczyGquNz7uWz6fu81V/vd913v8RoPYb9ppIthWa/l0aRG3EQZIVGyZMPM3TZ9/crueX7HzPHapGHJbjz709D0XR7JzGyY1NnUvsq1r9bg2T9j2e5yx2+kyr3XdvtKnWd9WG98p4XVcd0fi4Lx9veU+vI+b4tgcU098+k+kJdL7u+0ItcYtb7b0bD8/nriv9bc98rt8LiNLMG4Xyfd9+ONLq8Z/F9v7OYycmrkGHoIf4xV/z90eERfE7E+DLn1uygPBGCUE4KQVgtBeDEGYNQbg5B2D0H4QQhhFCOEkJYTQnhRCmFUK4WQthdC+GEMYZQzhpDWG0N4cQ5h1DuHkPYfQ/iBEGIUQ4iRFiNEeJESYlRLiZE2J0T4oRRilFOKkVYrRXixFmLUW4uRdi9F+MEYYxRjjJGWM0Z40RpjVGuNkbY3RvjhHGOUc46R1jtHePEeY9R7j5H2P0f5ASBkFIOQkhZDSHkRImRUi5GSNkdI+SEkZJSTkpJWS0l5MSZk1JuTknZPSflBKGUUo5SSllNKeVEqZVSrlZK2V0r5YSxllLOWktZbS3lxLmXUu5eS9l9L+YEwZhTDmJMWY0x5kTJmVMuZkzZnTPmhNGaU05qTVmtNebE2ZtTbm5N2b0PyAg="};
        const EOO_BUNDLE = null;

        const rasterLabels = {
            "1": "Forest", "2": "Leñosas cerradas", "3": "Forest formation",
            "4": "Savanna formation", "5": "Mangrove", "6": "Flooded forest",
            "9": "Forest plantation", "10": "Natural non forest formation",
            "11": "Wetland", "12": "Grassland", "13": "Other non forest formations",
            "14": "Farming", "15": "Pasture", "18": "Agriculture",
            "19": "Temporary crop", "20": "Sugar cane", "21": "Mosaic of uses",
            "22": "Non vegetated area", "23": "Beach, dune and sand spot",
            "24": "Urban area", "25": "Other non vegetated areas", "26": "Water body",
            "27": "Non observed", "29": "Rocky outcrop", "30": "Mining",
            "31": "Aquaculture", "32": "Salt flat", "33": "River, lake and ocean",
            "35": "Oil palm", "36": "Perennial crop", "37": "Artificial water body",
            "39": "Soybean", "40": "Rice", "41": "Other temporary crops",
            "42": "Open grassland", "43": "Closed grassland", "44": "Sparse grassland",
            "45": "Sparse natural woodlands", "46": "Coffee", "47": "Citrus",
            "48": "Other perennial crops", "49": "Wooded sandbank vegetation",
            "50": "Herbaceous sandbank vegetation", "51": "Urban area",
            "52": "Infrastructure", "53": "Other urbanized areas",
            "54": "Reservoirs (hydroelectric and water supply)",
            "55": "Artificial lakes and ponds", "56": "Other artificial water bodies",
            "57": "Simple crop", "58": "Multiple crops", "62": "Cotton"
        };

        const colorMap = {
            1:"#129912", 2:"#006400", 3:"#006400", 4:"#00ff00", 5:"#687537",
            6:"#76a5af", 7:"#29eee4", 8:"#77a605", 9:"#ad4413", 10:"#bbfcac",
            11:"#45C2A5", 12:"#B8AF4F", 13:"#f1c232", 14:"#ffffb2", 15:"#FFD966",
            16:"#f6b26b", 17:"#f99f40", 18:"#e974ed", 19:"#D5A6BD", 20:"#C27BA0",
            21:"#fff3bf", 22:"#EA9999", 23:"#dd7e6b", 24:"#aa0000", 25:"#ff3d3d",
            26:"#0000ff", 27:"#D5D5E5", 28:"#dd497f", 29:"#665a3a", 30:"#af2a2a",
            31:"#02106f", 32:"#968c46", 33:"#0000ff", 34:"#4FD3FF", 35:"#BA6A27",
            36:"#f3b4f1", 37:"#02106f", 38:"#02106f", 39:"#e075ad", 40:"#982c9e",
            41:"#e787f8", 42:"#EBEBE0", 43:"#C2C2A3", 44:"#6B6B47", 45:"#D0FFD0",
            46:"#cca0d4", 47:"#d082de", 48:"#cd49e4", 49:"#6b9932", 50:"#66ffcc",
            51:"#aa0000", 52:"#aa0000", 53:"#aa0000", 54:"#02106f", 55:"#02106f",
            56:"#02106f", 57:"#CC66FF", 58:"#FF6666", 59:"#006400", 60:"#8d9e8b",
            61:"#84ff75", 62:"#ff69b4"
        };

        function hexToRgb(hex) {
            if (!hex) return null;
            const clean = hex.replace("#", "");
            const bigint = parseInt(clean, 16);
            return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
        }

        function base64ToArrayBuffer(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        }

        async function buildGeoRasterLayer(bundle, layerName, noDataValue) {
            if (!bundle || !bundle.tifBase64) return null;

            const arrayBuffer = base64ToArrayBuffer(bundle.tifBase64);
            const georaster = await parseGeoraster(arrayBuffer);

            const layer = new GeoRasterLayer({
                georaster,
                opacity: 1,
                pixelValuesToColorFn: values => {
                    const v = values[0];
                    if (v == null || v === 0 || v === noDataValue || isNaN(v)) return null;
                    const hex = colorMap[v];
                    if (!hex) return null;
                    const [r, g, b] = hexToRgb(hex);
                    return `rgba(${r},${g},${b},1)`;
                },
                resolution: 256
            });

            // Guarda georaster para o hover
            layer._georaster = georaster;
            layer._layerName = layerName;

            return layer;
        }

        function getValueAtLatLng(georaster, latlng) {
            const { lat, lng } = latlng;
            const { xmin, xmax, ymin, ymax, width, height, values } = georaster;

            if (lng < xmin || lng > xmax || lat < ymin || lat > ymax) return null;

            const col = Math.floor((lng - xmin) / (xmax - xmin) * width);
            const row = Math.floor((ymax - lat) / (ymax - ymin) * height);

            if (col < 0 || col >= width || row < 0 || row >= height) return null;

            const value = georaster.values[0][row][col];
            if (value == null || value === 0 || isNaN(value)) return null;

            return value;
        }

        async function initializeMap() {
            const worldImagery = L.tileLayer(
                'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                { maxZoom: 19, attribution: '&copy; World Imagery' }
            );

            const map = L.map('map', { layers: [worldImagery] });
            const hoverInfo = document.getElementById("hover-info");

            const records = L.geoJson(speciesData, {
                onEachFeature: function (feature, layer) {
                    const popupContent = [];
                    for (const key in feature.properties) {
                        popupContent.push(`${key}: ${feature.properties[key]}`);
                    }
                    layer.bindPopup(popupContent.join("<br>"));
                }
            }).addTo(map);

            const layerAoo = L.geoJson(AOOgeometry, {
                style: { fillOpacity: 0, color: 'black' }
            }).addTo(map);

            let layerEoo = null;
            const hasEoo = !!(
                EOOgeometry && EOOgeometry.features &&
                EOOgeometry.features.length > 0 && EOOgeometry.features[0] !== null
            );

            if (hasEoo) {
                layerEoo = L.geoJson(EOOgeometry, {
                    style: { fillOpacity: 0, color: 'black' }
                }).addTo(map);
            }

            const noDataValue = AOO_BUNDLE?.noDataValue ?? 0;

            const aooRasterLayer = await buildGeoRasterLayer(AOO_BUNDLE, "AOO MapBiomas", noDataValue);
            const eooRasterLayer = hasEoo
                ? await buildGeoRasterLayer(EOO_BUNDLE, "EOO MapBiomas", EOO_BUNDLE?.noDataValue ?? 0)
                : null;

            if (aooRasterLayer) {
                aooRasterLayer.addTo(map);
                map.fitBounds(aooRasterLayer.getBounds());
            }

            if (eooRasterLayer) {
                eooRasterLayer.addTo(map);
            }

            // Hover
            const rasterLayers = [eooRasterLayer, aooRasterLayer].filter(Boolean);

            map.on("mousemove", function (event) {
                hoverInfo.style.display = "none";

                for (const layer of rasterLayers) {
                    if (!map.hasLayer(layer)) continue;

                    const value = getValueAtLatLng(layer._georaster, event.latlng);
                    if (value == null) continue;

                    const label = rasterLabels[String(value)] || String(value);
                    const color = colorMap[value] || "transparent";

                    hoverInfo.innerHTML = `
                        <div><strong>${layer._layerName}</strong></div>
                        <div><span class="legend-box" style="background:${color}"></span>${label}</div>
                        <div>Classe: ${value}</div>
                    `;
                    hoverInfo.style.left = `${event.originalEvent.clientX + 12}px`;
                    hoverInfo.style.top = `${event.originalEvent.clientY + 12}px`;
                    hoverInfo.style.display = "block";
                    break;
                }
            });

            map.on("mouseout", () => { hoverInfo.style.display = "none"; });

            const baseMaps = { "World Imagery": worldImagery };
            const overlayMaps = { "Coletas": records, "AOO": layerAoo };

            if (aooRasterLayer) overlayMaps["AOO MapBiomas"] = aooRasterLayer;
            if (hasEoo && layerEoo) overlayMaps["EOO"] = layerEoo;
            if (hasEoo && eooRasterLayer) overlayMaps["EOO MapBiomas"] = eooRasterLayer;

            L.control.layers(baseMaps, overlayMaps).addTo(map);

            const allLayers = [records, layerAoo];
            if (layerEoo) allLayers.push(layerEoo);
            const allPoints = allLayers.reduce((acc, l) => acc.concat(l.getLayers()), []);

            if (allPoints.length > 0) {
                map.fitBounds(new L.featureGroup(allPoints).getBounds());
            } else if (aooRasterLayer) {
                map.fitBounds(aooRasterLayer.getBounds());
            }

            new L.Control.MiniMap(
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 })
            ).addTo(map);

            setTimeout(() => map.invalidateSize(), 200);
        }

        initializeMap();
    </script>
