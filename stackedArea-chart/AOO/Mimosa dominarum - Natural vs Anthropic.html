<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.21,91.2,91.74,91.93999999999998,91.94000000000001,92.03999999999999,91.92,91.83999999999999,91.69000000000001,91.44,91.43,91.57,91.67,91.64,91.72,91.77,91.89,91.99999999999999,92.09,91.86999999999999,91.88,91.78,91.63000000000001,91.41000000000001,91.59,91.52,91.38999999999999,91.28999999999999,91.32000000000001,91.16,91.08000000000001,91.05,90.97,91.03,91.07000000000001,90.95,90.74,90.58999999999999],"color":"green"},{"name":"anthropic","data":[8.45,8.45,7.93,7.71,7.73,7.619999999999999,7.74,7.82,7.97,8.219999999999999,8.23,8.09,8.01,8.040000000000001,7.9399999999999995,7.890000000000001,7.779999999999999,7.66,7.58,7.79,7.779999999999999,7.890000000000001,8.04,8.25,8.07,8.129999999999999,8.280000000000001,8.370000000000001,8.35,8.489999999999998,8.59,8.61,8.69,8.64,8.6,8.7,8.92,9.08],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
