<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.72,79.21999999999998,78.90000000000002,79.05999999999999,79.17999999999999,79.48,79.71000000000002,79.80000000000003,80.21000000000001,80.84000000000002,81.15000000000002,81.59000000000002,81.89,82.25,82.46000000000002,82.56,82.58999999999999,82.69999999999997,82.86,82.87,83.00000000000001,83.32000000000001,83.38,83.40999999999998,83.53,83.60999999999999,83.82000000000002,83.87,84,84.14999999999999,84.28,84.31,84.37,84.36999999999999,84.40999999999998,84.38999999999999,84.52999999999999,84.45999999999998],"color":"green"},{"name":"anthropic","data":[19.92,19.44,19.760000000000005,19.580000000000002,19.46,19.169999999999998,18.93,18.84,18.43,17.79,17.5,17.06,16.75,16.390000000000004,16.180000000000003,16.080000000000002,16.060000000000002,15.929999999999998,15.77,15.780000000000001,15.629999999999999,15.329999999999998,15.259999999999998,15.23,15.11,15.01,14.82,14.76,14.66,14.47,14.34,14.34,14.27,14.25,14.24,14.26,14.11,14.179999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
