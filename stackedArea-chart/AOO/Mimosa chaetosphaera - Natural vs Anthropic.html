<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.45,64.96,62.24,61.67,61.760000000000005,59.53,60.95000000000001,59.21000000000001,60.499999999999986,61.48,62.19,60.230000000000004,61.17999999999999,60.59,61.78,63.92,66.66,65.59,67.41000000000001,63.449999999999996,63.83,65.41999999999999,67.79,69.33,66.64999999999999,65.38,67.15,64.11999999999999,66.42,68.79,66.08,66.82000000000001,69.43,68.14999999999999,65.74,65.95,66.53,68.56],"color":"green"},{"name":"anthropic","data":[34.31,35.82000000000001,38.470000000000006,39.06,38.89,41.150000000000006,39.690000000000005,41.54,40.27,39.28,38.53,40.480000000000004,39.6,40.24,39.02,36.99,34.28,35.36,33.51,37.44,37.129999999999995,35.53,33,31.5,34.33,35.67,33.89,36.92,34.620000000000005,32.18000000000001,34.8,34.050000000000004,31.44,32.71,35.11,35.059999999999995,34.53,32.480000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
