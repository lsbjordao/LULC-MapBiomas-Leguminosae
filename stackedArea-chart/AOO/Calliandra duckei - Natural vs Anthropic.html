<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.129999999999995,37.35,37.86,34.809999999999995,34.48,33.910000000000004,34.129999999999995,31.449999999999996,28.220000000000002,25.73,24.28,24.13,26.63,26.54,24.649999999999995,23.779999999999998,17.99,17.490000000000002,17.93,18.51,27.68,31.229999999999997,31.240000000000002,31.6,33.019999999999996,33.15,33.129999999999995,34.709999999999994,35.06,33.98,32.55,30.29,28.349999999999998,12.88,10.090000000000002,10.15,10.4,18.27],"color":"green"},{"name":"anthropic","data":[61.55,62.33,61.82000000000001,64.89,65.2,65.77,65.56,68.23,71.46,73.96,75.4,75.56,73.05,73.14,75.03999999999999,75.91,81.69,82.19,81.74000000000001,81.17,71.99000000000001,68.44,68.44,68.08,66.66,66.52,66.54,64.95,64.61,65.69999999999999,67.13,69.39000000000001,71.33000000000001,86.8,89.6,89.53,89.28,81.41999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
