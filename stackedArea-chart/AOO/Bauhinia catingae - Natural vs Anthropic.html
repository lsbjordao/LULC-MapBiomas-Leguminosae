<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.690000000000005,50.79,50.19,49.580000000000005,48.82999999999999,48.339999999999996,48.16,47.77,47.47,47.57,47.63999999999999,48.02,48.69,48.46,48.78,49.07,48.88999999999999,49.20000000000001,49.04,48.92,48.89,48.68000000000001,48.440000000000005,48.209999999999994,47.84,47.63000000000001,47.34,47,46.86,46.7,47.07,47.29999999999999,47.26,47.589999999999996,47.599999999999994,47.66,47.74,47.92],"color":"green"},{"name":"anthropic","data":[54.980000000000004,54.879999999999995,55.47,56.1,56.84,57.339999999999996,57.519999999999996,57.91,58.230000000000004,58.120000000000005,58.05,57.67,56.98,57.199999999999996,56.89000000000001,56.61,56.80000000000001,56.48000000000002,56.63,56.760000000000005,56.78000000000001,56.97,57.24,57.470000000000006,57.809999999999995,58.03,58.35,58.67,58.790000000000006,58.96,58.6,58.37,58.41000000000001,58.08000000000001,58.06,58.01,57.94,57.760000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
