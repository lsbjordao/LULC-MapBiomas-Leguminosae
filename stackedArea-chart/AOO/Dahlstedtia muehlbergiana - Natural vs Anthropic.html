<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[23.989999999999995,23.419999999999998,23.229999999999993,22.799999999999994,22.490000000000002,22.460000000000004,22.2,21.99,21.87,21.309999999999995,21.33,21.300000000000004,21.219999999999995,21.090000000000003,21.110000000000003,20.940000000000005,20.849999999999998,20.869999999999997,20.89,21.069999999999997,21.099999999999998,21.209999999999997,21.21999999999999,21.179999999999996,21.31,21.370000000000005,21.57,21.720000000000002,21.89,22.08,22.43,22.71,22.84,22.960000000000004,23.030000000000005,22.94,23.09,23.029999999999998],"color":"green"},{"name":"anthropic","data":[81.25000000000001,81.8,81.99000000000001,82.44,82.71,82.75,83.02000000000001,83.21,83.36000000000001,83.91000000000001,83.91000000000001,83.93,84.01000000000002,84.14000000000003,84.12,84.27999999999999,84.36999999999999,84.35000000000001,84.30999999999999,84.14,84.16000000000001,84.03000000000002,84.02,84.03,83.94,83.84000000000002,83.64,83.5,83.33000000000001,83.17,82.79999999999998,82.53,82.39000000000001,82.28000000000002,82.17999999999999,82.26999999999998,82.13000000000001,82.20000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
