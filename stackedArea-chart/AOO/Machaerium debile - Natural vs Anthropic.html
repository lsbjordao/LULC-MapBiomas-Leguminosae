<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.77999999999999,61.2,61.13000000000001,61.16,61.129999999999995,61.4,61.34,61.47,61.92000000000001,62.55,62.73,63.080000000000005,63.73,64.14999999999999,64.38999999999999,64.36,64.32,64.43999999999998,64.83,65.1,65.72999999999999,66.08999999999999,66.32,66.39,66.49,66.78,66.94,67.05,67.05,67.1,67.24999999999999,67.33999999999999,67.57,67.52,67.64,67.66999999999999,67.89999999999999,67.93999999999998],"color":"green"},{"name":"anthropic","data":[40.019999999999996,39.63999999999999,39.77,39.75,39.83,39.650000000000006,39.760000000000005,39.67999999999999,39.239999999999995,38.65,38.46,38.11000000000001,37.49,37.19,36.98,37.050000000000004,37.14999999999999,37.03,36.69,36.40999999999999,35.88999999999999,35.559999999999995,35.35,35.26999999999999,35.17999999999999,34.88999999999999,34.719999999999985,34.629999999999995,34.629999999999995,34.589999999999996,34.44,34.35,34.129999999999995,34.17,34.050000000000004,34.03000000000001,33.79,33.78],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
