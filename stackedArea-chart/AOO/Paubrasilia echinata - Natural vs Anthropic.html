<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.07999999999999,50.01999999999998,49.25999999999999,48.769999999999996,48.58,48.40999999999999,48.279999999999994,47.93999999999999,48.07000000000001,48.43,48.319999999999986,48.39999999999999,48.35999999999999,48.19,48.37,48.470000000000006,48.71,48.959999999999994,49.21,49.5,49.82,50.16,50.279999999999994,50.239999999999995,50.129999999999995,50.1,49.97,50.13999999999999,49.98000000000001,50.14,50.26,50.49999999999999,50.60999999999999,51.25000000000001,51.25,51.37,51.379999999999995,51.73000000000001],"color":"green"},{"name":"anthropic","data":[48.04,48.16,48.949999999999996,49.45,49.64,49.83,49.949999999999996,50.27,50.15,49.79,49.91,49.839999999999996,49.86,50.04,49.86,49.769999999999996,49.54,49.279999999999994,49.03999999999999,48.75,48.45,48.11,47.970000000000006,48.010000000000005,48.120000000000005,48.18,48.32,48.15999999999999,48.31,48.17,48.050000000000004,47.82,47.68,47.06999999999999,47.13999999999999,47.05,47.03999999999999,46.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
