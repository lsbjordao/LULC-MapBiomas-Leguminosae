<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.150000000000006,57.580000000000005,57.699999999999996,57.449999999999996,57.38,56.93000000000001,57.04999999999999,57.099999999999994,57.71,58.49,58.8,59.519999999999996,60.28000000000001,60.64,61.33,61.74999999999999,62.00000000000001,62.410000000000004,62.65,62.82999999999999,63.150000000000006,63.57,63.68,63.91,64.03,64.37,64.67,65.09,65.28,65.47,65.81,66.00000000000001,66.23,66.27000000000001,66.22,66.27000000000001,66.28999999999999,66.60000000000001],"color":"green"},{"name":"anthropic","data":[45.79,45.32,45.23,45.47,45.55,46,45.87,45.83,45.22,44.44,44.129999999999995,43.41,42.65,42.29,41.599999999999994,41.19,40.940000000000005,40.52,40.27,40.11,39.77,39.36999999999999,39.260000000000005,39.04,38.89,38.56,38.27,37.83,37.63,37.46,37.129999999999995,36.92999999999999,36.69,36.660000000000004,36.71,36.67,36.63,36.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
