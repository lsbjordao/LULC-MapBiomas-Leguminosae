<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[22.020000000000003,21.850000000000005,18.180000000000003,18.179999999999996,18.779999999999998,18.740000000000002,21.02,20.79,20.560000000000002,19.580000000000002,18.909999999999997,18.720000000000002,18.83,18.72,19.64,18.96,18.88,19.359999999999996,21,21.16,21.37,22.7,23.46,24.46,24.400000000000002,23.75,22.74,22.03,20.880000000000003,20.490000000000002,20.44,20.970000000000002,22.43,23.44,23.759999999999998,23.73,23.400000000000002,23.15],"color":"green"},{"name":"anthropic","data":[77.81,77.98000000000002,81.64000000000001,81.65,81.05000000000001,81.09,78.80999999999999,79.03,79.26,80.26,80.93,81.1,80.99000000000001,81.11,80.19,80.87999999999998,80.96,80.46000000000001,78.84,78.66,78.46000000000001,77.14000000000001,76.37,75.38000000000001,75.43,76.07000000000001,77.08999999999997,77.81,78.94000000000001,79.34,79.39,78.85000000000001,77.41000000000001,76.4,76.07,76.08999999999999,76.42999999999999,76.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
