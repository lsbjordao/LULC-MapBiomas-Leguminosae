<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.97,68.51,68.75000000000001,68.46,67.25999999999999,67.05,65.8,65.21000000000001,65.08,63.47000000000001,62.650000000000006,62.47,61.88,62.00999999999999,61.57000000000001,61.410000000000004,61.3,60.760000000000005,60.13000000000001,59.48,58.82999999999999,58.49,58.199999999999996,57.81000000000001,57.67,57.51,57.00000000000001,56.550000000000004,56.42000000000001,56.32000000000001,56.3,56.059999999999995,55.71,55.61,55.480000000000004,55.19,54.85,55.10000000000001],"color":"green"},{"name":"anthropic","data":[32.12,32.58,32.36,32.629999999999995,33.84,34.04,35.290000000000006,35.870000000000005,36.01,37.620000000000005,38.42999999999999,38.62,39.21999999999999,39.08,39.519999999999996,39.69,39.78,40.32,40.949999999999996,41.620000000000005,42.269999999999996,42.6,42.870000000000005,43.28,43.43000000000001,43.57,44.09,44.540000000000006,44.68,44.77,44.800000000000004,45.04,45.37,45.48,45.6,45.91,46.24,45.989999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
