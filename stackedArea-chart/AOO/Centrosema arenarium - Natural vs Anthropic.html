<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.12,64.16000000000001,63.940000000000005,63.459999999999994,62.830000000000005,62.599999999999994,62.7,62.430000000000014,62.33000000000001,62.53000000000001,62.710000000000015,63,63.35,63.63000000000001,64.16,64.42,64.54,64.48,64.75999999999999,64.63,64.89999999999999,65.29999999999998,65.46999999999998,65.43999999999998,65.51,65.62999999999998,65.54,65.87,66.2,66.27,66.66000000000001,66.88999999999999,67.05,67.26,67.27999999999999,67.38999999999999,67.42999999999998,67.59999999999998],"color":"green"},{"name":"anthropic","data":[40.9,40.86,41.11000000000001,41.61000000000001,42.24,42.459999999999994,42.33,42.629999999999995,42.73,42.58999999999999,42.44,42.1,41.709999999999994,41.43,40.89,40.660000000000004,40.53,40.59,40.29999999999999,40.35000000000001,40.03000000000001,39.65,39.46,39.48,39.43,39.390000000000015,39.51,39.160000000000004,38.81,38.75,38.42000000000001,38.2,38.05,37.800000000000004,37.66,37.56,37.52,37.339999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
