<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.67,52.339999999999996,52.49,52.89999999999999,53.46,54.09,54.46,55.470000000000006,55.669999999999995,56.37999999999999,57.92,59.010000000000005,59.17,60.82,61.26,61.99,62.23,62.18,61.85,61.599999999999994,61.099999999999994,61.150000000000006,61.09000000000001,61.440000000000005,62.199999999999996,62.83,62.91,62.43000000000001,61.37,60.75000000000001,60.62,60.290000000000006,60.07000000000001,61.290000000000006,61.78,62.25000000000001,62.10999999999999,62.550000000000004],"color":"green"},{"name":"anthropic","data":[37.21,37.620000000000005,37.47,37.08,36.51,35.870000000000005,35.52,34.529999999999994,34.330000000000005,33.61,32.05,30.99,30.8,29.15,28.67,27.96,27.72,27.75,28.09,28.339999999999996,28.849999999999998,28.810000000000002,28.85,28.509999999999998,27.75,27.11,27.02,27.510000000000005,28.57,29.18,29.32,29.67,29.889999999999997,28.669999999999998,28.159999999999997,27.7,27.840000000000003,27.389999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
