<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.26,89.66000000000001,89.85000000000001,89.81,89.48,89.63,89.80999999999999,89.77000000000001,89.75,89.92999999999999,89.59,89.85,89.72000000000001,89.52,89.85,89.85,89.58999999999999,89.64,89.61,89.94,90.33,90.5,90.78999999999999,90.67,90.37000000000002,90.43,90.45000000000002,90.44000000000001,90.63,91.14000000000001,91.67,91.75,91.92000000000002,91.99,91.68,91.86,91.88,91.95],"color":"green"},{"name":"anthropic","data":[10.93,10.510000000000002,10.33,10.36,10.690000000000001,10.55,10.36,10.399999999999999,10.42,10.26,10.600000000000001,10.32,10.469999999999999,10.67,10.33,10.33,10.59,10.540000000000001,10.57,10.239999999999998,9.84,9.68,9.399999999999999,9.510000000000002,9.82,9.75,9.739999999999998,9.75,9.56,9.04,8.509999999999998,8.42,8.26,8.18,8.49,8.31,8.29,8.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
