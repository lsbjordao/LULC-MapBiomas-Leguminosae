<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.07,70.56999999999998,69.5,67.74,67.88999999999999,68.53,69.97,70.38000000000001,72.19999999999999,73.91,73.8,74.12,74.91999999999999,75.68,76.39000000000001,76.11,75.60000000000001,74.43,74.17999999999999,73.39,71.49000000000001,71.49,71.03999999999999,71.33000000000001,73.77,75.83,76.92999999999998,78.18,78.59999999999998,78.72,78.61,78.3,79.22,79.97000000000001,80.17000000000002,80.23,80.25,80.17],"color":"green"},{"name":"anthropic","data":[28.730000000000004,29.22,30.280000000000005,32.059999999999995,31.900000000000002,31.26,29.820000000000004,29.4,27.58,25.86,25.970000000000002,25.67,24.860000000000003,24.11,23.41,23.689999999999998,24.18,25.369999999999997,25.6,26.39,28.3,28.31,28.75,28.45,26.02,23.95,22.86,21.6,21.2,21.07,21.189999999999998,21.49,20.56,19.819999999999997,19.62,19.56,19.54,19.619999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
