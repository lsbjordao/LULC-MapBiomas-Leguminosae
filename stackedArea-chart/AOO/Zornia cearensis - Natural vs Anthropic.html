<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.22999999999999,43.58,42.31,41.37,40.4,39.45,39.03,38.77,38.54,38.35,37.93,37.79,37.26,36.88999999999999,35.980000000000004,35.45,35.230000000000004,35.050000000000004,35.010000000000005,34.36,34.01,34.53000000000001,34.60000000000001,34.940000000000005,35.010000000000005,35.260000000000005,35.42,35.349999999999994,35.33,34.95,34.50000000000001,34.36000000000001,33.849999999999994,33.64,33.629999999999995,33.370000000000005,33.57,33.92],"color":"green"},{"name":"anthropic","data":[58.599999999999994,60.25000000000001,61.51,62.449999999999996,63.45,64.36999999999999,64.8,65.05,65.27,65.45,65.89,66.03,66.57000000000001,66.93999999999998,67.84,68.36000000000001,68.61000000000001,68.77000000000001,68.82,69.47000000000001,69.81,69.28999999999999,69.24000000000001,68.86999999999999,68.83,68.55000000000001,68.42,68.45,68.5,68.89,69.33,69.48000000000002,69.98,70.21,70.21,70.44999999999999,70.24,69.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
