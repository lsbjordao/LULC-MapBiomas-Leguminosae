<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>

    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Savanna formation","data":[11.43,11.45,23.41,27.17,29.3,28.56,28.17,27.68,29.55,29.12,29.22,29.74,24.05,22.07,22.08,18.6,17.13,16.2,14.82,14.3,16.74,17.51,19.2,25.36,24.26,24.12,26.77,28.19,30.82,35.23,35.51,36.72,30.99,31.2,31.4,31.36,31.36,31.36],"color":"#00ff00"},{"name":"Grassland","data":[39.43,37.97,39.68,36.69,35.98,34.77,33.36,32.52,34,40.49,42.42,43.99,54.53,60.03,63.32,65.77,67.71,66.05,78.4,80.36,78.14,76.98,74.82,69.17,70.35,70.47,67.39,66.64,62.98,59.64,59.1,57.87,63.46,62.04,58.88,58.88,58.86,58.86],"color":"#B8AF4F"},{"name":"Pasture","data":[1.25,0.95,0.73,0.51,0.83,1.67,1.92,1.44,1.9,1.86,1.26,1.33,1.08,0.37,0.26,0.46,0.54,0.92,1.15,1.07,0.74,0.6,0.6,0.75,1.09,1.45,1.62,1.52,1.48,1.31,1.12,1.13,1.17,1.19,0.92,0.72,0.68,0.62],"color":"#FFD966"},{"name":"Mosaic of uses","data":[43.86,46.61,33.52,33.15,31.14,31.24,31.71,32.37,28.88,25.69,24.87,22.92,18.44,15.9,11.43,11.86,11.45,14.08,3.74,3.36,3.25,3.71,4.18,3.67,3.25,2.94,3.25,3.07,4.07,2.79,3.22,3.29,3.41,4.2,4.49,4.52,4.61,4.67],"color":"#fff3bf"},{"name":"Other non vegetated areas","data":[3.02,2.02,1.61,1.32,1.51,2.51,3.52,4.74,4.48,1.7,1.09,0.92,0.82,0.62,1.89,2.3,2.54,2.13,1.29,0.32,0.31,0.38,0.33,0.15,0.15,0.15,0.11,0,0.29,0.67,0.7,0.62,0.62,0.81,0.86,1.07,1.04,1.04],"color":"#ff3d3d"},{"name":"River, lake and ocean","data":[0.65,0.65,0.7,0.78,0.89,0.89,0.96,0.89,0.83,0.78,0.78,0.74,0.72,0.65,0.65,0.65,0.26,0.26,0.24,0.24,0.46,0.46,0.5,0.54,0.54,0.5,0.5,0.22,0,0,0,0,0,0.2,3.08,3.08,3.08,3.08],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
