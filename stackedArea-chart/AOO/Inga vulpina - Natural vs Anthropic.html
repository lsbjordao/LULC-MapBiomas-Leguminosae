<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.97,55.440000000000005,54.89,54.61000000000001,54.220000000000006,53.92999999999999,53.65,53.57,53.63999999999999,53.43000000000001,53.31999999999999,53.4,53.580000000000005,53.68,53.52,53.269999999999996,52.92999999999999,52.589999999999996,52.52,52.31000000000001,52.330000000000005,52.39000000000001,52.21,52.339999999999996,52.39,52.43000000000001,52.37,52.57,52.53,52.45,52.580000000000005,52.33,52.260000000000005,52.24,52.080000000000005,51.97999999999999,51.919999999999995,51.58],"color":"green"},{"name":"anthropic","data":[49.1,49.63999999999999,50.2,50.489999999999995,50.870000000000005,51.16,51.43999999999999,51.53,51.46,51.66999999999999,51.739999999999995,51.679999999999986,51.51,51.400000000000006,51.57000000000001,51.81,52.16,52.5,52.569999999999986,52.779999999999994,52.769999999999996,52.69,52.870000000000005,52.74,52.699999999999996,52.64999999999999,52.73,52.53,52.559999999999995,52.65,52.52,52.73,52.83,52.83,52.99,53.09000000000001,53.17,53.50000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
