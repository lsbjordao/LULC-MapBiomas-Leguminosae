<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.94000000000001,70.97999999999999,70.63000000000001,70.60000000000001,70.47999999999999,70.30000000000001,70.37,70.22999999999999,70.47000000000001,70.81000000000002,70.91000000000001,71.27999999999999,71.36,72.29,72.42999999999998,72.63,72.75,73.08,73.91,74.03999999999999,74.15999999999998,74.31,74.38,74.41000000000001,74.58,74.81,75.00999999999999,75.05000000000001,74.98,74.87,75.08999999999999,75.25,75.35000000000002,75.41000000000001,75.79000000000002,75.82000000000001,75.93000000000002,75.84],"color":"green"},{"name":"anthropic","data":[29.14,29.09,29.45,29.47,29.59,29.759999999999998,29.689999999999998,29.84,29.6,29.25,29.14,28.79,28.71,27.770000000000003,27.63,27.44,27.32,26.98,26.16,26.03,25.910000000000004,25.759999999999998,25.68,25.660000000000004,25.48,25.259999999999998,25.06,25.01,25.080000000000002,25.18,24.96,24.82,24.71,24.65,24.29,24.23,24.14,24.240000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
