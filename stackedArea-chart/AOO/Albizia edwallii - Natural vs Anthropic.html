<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.47,48.89,48.76,48.309999999999995,48.06,47.83,47.540000000000006,47.42,47.3,47.03,46.97,46.78999999999999,46.690000000000005,46.71,46.550000000000004,46.33,46.300000000000004,46.18999999999999,46.129999999999995,46.209999999999994,46.199999999999996,46.269999999999996,46.3,46.38,46.39,46.38,46.620000000000005,46.69,46.84000000000001,46.839999999999996,46.94999999999999,47.04,46.809999999999995,46.73,46.61,46.5,46.300000000000004,46.11],"color":"green"},{"name":"anthropic","data":[54.699999999999996,54.300000000000004,54.42,54.86000000000001,55.11000000000001,55.32,55.63999999999999,55.760000000000005,55.879999999999995,56.17,56.190000000000005,56.36,56.46,56.46,56.60000000000001,56.839999999999996,56.86999999999999,56.940000000000005,57.040000000000006,56.94999999999999,56.97,56.84,56.86,56.800000000000004,56.790000000000006,56.77,56.559999999999995,56.459999999999994,56.32,56.3,56.209999999999994,56.11000000000001,56.35000000000001,56.419999999999995,56.559999999999995,56.650000000000006,56.85999999999999,57.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
