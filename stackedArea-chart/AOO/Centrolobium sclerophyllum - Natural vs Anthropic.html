<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.18,50.72,50.18,49.160000000000004,48.43000000000001,48.190000000000005,48.150000000000006,48.28,48.18000000000001,48.21999999999999,47.970000000000006,47.94,48.19,48.25999999999999,48.53000000000001,48.99000000000001,49.120000000000005,49.36,49.699999999999996,49.470000000000006,49.06999999999999,49.04999999999999,48.27999999999999,48.27999999999999,48.36000000000001,47.78,47.57999999999999,46.78,46.07999999999999,45.699999999999996,45.58,45.58999999999999,45.49999999999999,45.860000000000014,45.67,45.99,46.050000000000004,46.09],"color":"green"},{"name":"anthropic","data":[52.190000000000005,52.669999999999995,53.22,54.22999999999999,54.94,55.17,55.23,55.10000000000001,55.190000000000005,55.18000000000001,55.4,55.41999999999999,55.18999999999999,55.1,54.85,54.39,54.25,54,53.67000000000001,53.88,54.31999999999999,54.31999999999999,55.099999999999994,55.120000000000005,55.019999999999996,55.59,55.8,56.589999999999996,57.31,57.66,57.800000000000004,57.75,57.85,57.49999999999999,57.709999999999994,57.379999999999995,57.309999999999995,57.279999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
