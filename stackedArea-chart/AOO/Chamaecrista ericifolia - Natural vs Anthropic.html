<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[8.629999999999999,6.180000000000001,6.0200000000000005,6.370000000000001,6.84,7.55,10.56,11.120000000000001,12.340000000000002,13.14,14.41,15.27,15.35,15.049999999999999,15.370000000000001,15.17,12.27,9.709999999999999,10.5,11.44,10.809999999999999,10.56,10.68,10.529999999999998,10.219999999999999,9.95,9.94,9.49,9.44,9.82,10.030000000000001,10.239999999999998,9.57,9.34,9.31,8.86,8.590000000000002,8.98],"color":"green"},{"name":"anthropic","data":[91.21000000000001,93.66000000000001,93.80999999999999,93.46000000000001,92.99000000000001,92.29,89.29,88.71000000000001,87.5,86.69,85.43,84.56,84.49,84.79,84.46000000000001,84.66,87.57000000000002,90.11999999999999,89.33999999999999,88.39999999999999,89.01999999999998,89.25999999999999,89.14999999999999,89.31,89.62,89.87999999999998,89.88999999999999,90.33,90.39,90,89.78,89.59,90.26,90.5,90.52999999999999,90.97999999999999,91.25999999999999,90.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
