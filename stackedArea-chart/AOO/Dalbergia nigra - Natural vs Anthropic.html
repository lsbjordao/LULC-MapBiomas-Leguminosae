<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.38000000000001,50.25000000000001,49.68,49.260000000000005,48.82,48.61,48.61000000000001,48.59,48.61,48.739999999999995,48.76000000000001,48.90000000000001,49.100000000000016,49.16000000000001,49.37000000000001,49.36000000000001,49.449999999999996,49.419999999999995,49.41,49.459999999999994,49.53999999999999,49.55999999999999,49.6,49.85,50.05,50.230000000000004,50.42,50.6,50.56,50.77,51.04,51.120000000000005,51.22999999999999,51.33,51.43999999999999,51.5,51.8,51.84],"color":"green"},{"name":"anthropic","data":[52.00000000000001,52.14,52.73,53.14,53.559999999999995,53.769999999999996,53.8,53.83,53.769999999999996,53.66,53.62,53.48,53.29,53.239999999999995,53.01,53.029999999999994,52.929999999999986,52.98,52.989999999999995,52.92,52.84,52.82999999999999,52.8,52.53999999999999,52.339999999999996,52.18,51.959999999999994,51.8,51.81,51.63999999999999,51.35,51.25999999999999,51.16,51.06,50.93999999999999,50.9,50.589999999999996,50.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
