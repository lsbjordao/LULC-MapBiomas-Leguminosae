<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.84,93.05999999999999,92.07999999999998,89.55999999999999,88.43,87.78,87.54000000000002,88.33000000000001,88.19999999999999,88.45,88.68000000000002,89.10000000000001,89.49000000000002,89.55000000000001,89.21000000000001,88.57000000000001,88.75,88.08999999999999,88.29000000000003,88.14000000000001,87.46999999999998,87.23999999999998,87.26,87.53,87.96000000000001,87.97,88.21,88.20000000000002,87.61999999999999,86.95000000000002,87.04,86.75999999999999,86.51000000000002,87.30000000000001,87.34,87.59000000000002,88.35000000000001,89.11999999999999],"color":"green"},{"name":"anthropic","data":[13.629999999999999,13.42,14.42,16.94,18.080000000000002,18.730000000000004,18.970000000000002,18.17,18.32,18.070000000000004,17.860000000000003,17.460000000000004,17.070000000000004,17.030000000000005,17.340000000000003,17.98,17.800000000000004,18.490000000000006,18.270000000000003,18.400000000000002,19.1,19.330000000000002,19.310000000000002,19.030000000000005,18.580000000000002,18.560000000000002,18.340000000000003,18.35,18.94,19.62,19.53,19.82,20.02,19.240000000000002,19.21,18.970000000000002,18.22,17.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
