<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.099999999999994,56.69,55.849999999999994,55.559999999999995,55.10999999999999,54.83999999999999,54.519999999999996,53.97,53.23000000000001,53.14,53.42999999999999,53.82999999999999,54.86,55.24999999999999,55.08999999999999,54.559999999999995,54.22,53.35999999999999,52.53999999999999,52.28999999999999,52.459999999999994,52.22999999999999,51.85,51.97,52.29,52.5,52.49,52.699999999999996,53.05,53.529999999999994,54.529999999999994,54.53999999999999,55.07999999999999,55.11,54.97,54.66,54.49999999999999,53.589999999999996],"color":"green"},{"name":"anthropic","data":[39.97,43.36000000000001,44.24,44.519999999999996,44.959999999999994,45.23,45.559999999999995,46.120000000000005,46.85,46.95,46.67,46.23,45.220000000000006,44.81,44.98,45.52,45.86,46.71,47.53,47.79,47.61,47.85999999999999,48.22,48.1,47.769999999999996,47.57,47.589999999999996,47.39,47.03,46.56,45.55,45.54,44.989999999999995,44.980000000000004,45.09,45.4,45.59,46.480000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
