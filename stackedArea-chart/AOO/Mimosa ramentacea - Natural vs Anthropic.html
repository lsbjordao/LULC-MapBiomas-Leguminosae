<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.61000000000001,70.46000000000001,70.34,70.52,70.52,70.16,70.95,71.13,71.97999999999999,72.59999999999998,72.69000000000001,73.27,74.10999999999999,74.33999999999999,74.81,74.7,74.53000000000002,74.63,74.56,74.43,73.98,74.16,73.57000000000001,73.60000000000001,73.6,73.33,73.56000000000002,74.14999999999999,74.58,74.90000000000002,75.64999999999999,75.97,76.08,76.14,76.48,76.33,76.72,76.72000000000001],"color":"green"},{"name":"anthropic","data":[30.849999999999998,30.990000000000002,31.119999999999997,30.93,30.92,31.29,30.490000000000002,30.299999999999997,29.46,28.84,28.759999999999998,28.18,27.34,27.14,26.63,26.769999999999996,26.93,26.810000000000002,26.89,27.04,27.48,27.3,27.89,27.85,27.86,28.12,27.9,27.3,26.88,26.54,25.79,25.479999999999997,25.38,25.31,24.97,25.12,24.73,24.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
