<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.119999999999997,30.639999999999997,31.819999999999997,31.529999999999998,31.78,31.68,31.500000000000004,31.619999999999997,31.24,31.139999999999997,31.669999999999998,32.64000000000001,31.65,31.389999999999997,31.12,31.91,32.6,32.9,33.57000000000001,33.59,33.61,33.79,33.72,34.25,35.03,35.64,35.85999999999999,35.41,34.839999999999996,34.540000000000006,34.68,34.379999999999995,34.15,34.52,35.10999999999999,34.84,36.03000000000001,37.54],"color":"green"},{"name":"anthropic","data":[46.82,46.400000000000006,45.24,45.529999999999994,45.24,45.370000000000005,45.57,45.44,45.84,45.94,45.410000000000004,44.44,45.410000000000004,45.59,45.839999999999996,45.03,44.37,44.03,43.370000000000005,43.370000000000005,43.34,43.2,43.309999999999995,42.74,41.95,41.33,41.13,41.589999999999996,42.199999999999996,42.51,42.38,42.65,42.91,42.519999999999996,41.919999999999995,42.19,40.98,39.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
