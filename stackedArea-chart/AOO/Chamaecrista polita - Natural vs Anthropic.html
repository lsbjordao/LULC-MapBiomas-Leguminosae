<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.870000000000005,50.120000000000005,49.95,49.56,48.7,48.400000000000006,47.940000000000005,46.29,45.43,44.28,43.86000000000001,43.46,43.10000000000001,42.940000000000005,42.49999999999999,41.92000000000001,41.52000000000001,41.21,41.00000000000001,41.00000000000001,41.019999999999996,41.040000000000006,41.089999999999996,41.089999999999996,41.07000000000001,40.92000000000001,40.75000000000001,40.51,40.120000000000005,39.730000000000004,39.330000000000005,39.07000000000001,39.07000000000001,38.94,38.9,38.82,38.84,39.28000000000001],"color":"green"},{"name":"anthropic","data":[49.37,51.129999999999995,51.279999999999994,51.68,52.54,52.839999999999996,53.28999999999999,54.92999999999999,55.81,56.970000000000006,57.38999999999999,57.8,58.16,58.3,58.73,59.32,59.74,60.02000000000001,60.25,60.269999999999996,60.24,60.2,60.14999999999999,60.14,60.18,60.34,60.49,60.73,61.13,61.510000000000005,61.92,62.17000000000001,62.190000000000005,62.31000000000001,62.35000000000001,62.45,62.42,61.970000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
