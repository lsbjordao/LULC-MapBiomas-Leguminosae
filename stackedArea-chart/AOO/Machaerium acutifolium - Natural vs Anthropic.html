<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.91999999999999,66.89,66.88999999999999,66.6,66.45,66.47,66.01,65.61,65.41,64.72,64.19,63.830000000000005,63.3,63.11,62.98999999999999,62.300000000000004,62.67,62.57999999999999,62.21,61.57,60.91,60.41,60.38999999999999,60.68999999999999,60.82,60.84,60.76,60.44,59.96,59.919999999999995,59.91999999999999,59.77999999999999,59.71999999999999,59.81,59.85000000000001,59.87,59.99999999999999,60.00999999999999],"color":"green"},{"name":"anthropic","data":[37.89,37.949999999999996,37.94,38.20999999999999,38.39,38.34,38.78,39.21999999999999,39.39,40.12,40.629999999999995,40.99,41.54,41.739999999999995,41.83,42.519999999999996,42.139999999999986,42.23,42.60000000000001,43.24000000000001,43.91000000000001,44.42000000000001,44.43,44.12,44.00000000000001,43.99,44.04000000000002,44.41,44.86,44.910000000000004,44.910000000000004,45.05,45.1,45.00999999999999,44.959999999999994,44.95,44.82,44.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
