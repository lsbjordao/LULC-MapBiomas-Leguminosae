<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[69.63,65.55,63.04,58.85,57.55,59.81,59.9,56.01,56.99,64.14,64.25,61.72,61.72,65.26,64.98,65.08,64.86,65.61,63.69,63.42,63.89,62.79,62.69,64.09,63.51,64.65,65.29,65.83,67.39,67.73,67.97,68.4,69.16,70.97,72.08,71.88,71.8,71.65],"color":"#006400"},{"name":"Flooded forest","data":[4.15,3.73,3.73,3.62,3.59,3.46,3.69,3.27,3.24,3.62,3.84,3.84,3.85,3.93,3.78,3.92,3.99,4.29,4.3,4.32,4.29,4.22,4.3,4.34,4.25,4.37,4.34,4.34,4.35,4.33,4.37,4.37,4.41,4.37,4.37,4.33,4.29,4.37],"color":"#76A5AF"},{"name":"Wetland","data":[1.62,0.97,1.75,1.98,1.35,1.42,1.22,2.34,1.46,1.35,2.28,2.01,2.7,2.75,1.51,2.09,2.86,2.55,2.72,2.5,2.81,2.75,2.65,2.85,3.13,2.77,2.79,2.82,2.92,3.06,3.11,3.09,2.82,3.03,3.19,3.35,3.21,2.65],"color":"#45C2A5"},{"name":"Grassland","data":[1.04,1,1.13,1.2,1.18,0.94,0.94,0.96,0.93,0.89,0.88,0.82,0.73,0.59,0.63,0.66,0.71,0.73,0.61,0.61,0.59,0.6,0.61,0.59,0.64,0.62,0.62,0.7,0.7,0.81,0.68,0.7,0.77,0.84,0.72,0.69,0.72,0.81],"color":"#B8AF4F"},{"name":"Pasture","data":[6.82,11.12,13.58,17.62,18.8,16.36,16.29,20.81,19.91,12.4,12.46,15.17,15.47,12.13,12.09,11.97,12.14,11.14,13.34,13.67,13.11,14.18,14.22,12.85,13.47,12.41,11.83,11.23,9.68,9.32,9.06,8.66,7.98,6.04,5.01,5.13,5.01,5.12],"color":"#FFD966"},{"name":"River, lake and ocean","data":[16.32,17.21,16.35,16.3,17.09,17.56,17.53,16.19,17.05,17.17,15.86,16.02,15.09,14.91,16.58,15.83,15.01,15.26,14.93,15.05,14.89,15.04,15.09,14.86,14.57,14.74,14.71,14.64,14.53,14.33,14.37,14.34,14.43,14.32,14.21,14.21,14.54,14.96],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
