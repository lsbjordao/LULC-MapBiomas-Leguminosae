<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.27,59.440000000000005,60.38,59.93,58.86999999999999,55.379999999999995,55.10999999999999,54.38999999999999,54.800000000000004,55.620000000000005,55.45,55.230000000000004,54.239999999999995,54.17,53.64,53.019999999999996,53.10999999999999,53.330000000000005,53.25000000000001,52.96,51.75000000000001,51,50.78000000000001,50.78000000000001,51.07000000000001,51.309999999999995,51.62,51.78999999999999,51.5,49.21,47.85,47.75,47.769999999999996,46.99,46.550000000000004,45.31,44.559999999999995,43.82000000000001],"color":"green"},{"name":"anthropic","data":[40.14000000000001,40.980000000000004,40.03,40.47,41.55,45.019999999999996,45.300000000000004,46.010000000000005,45.6,44.78,44.95,45.17,46.15,46.22999999999999,46.75,47.37,47.31,47.07000000000001,47.14,47.42,48.65,49.39,49.61,49.620000000000005,49.32,49.07000000000001,48.78999999999999,48.61,48.89,51.19,52.550000000000004,52.650000000000006,52.629999999999995,53.4,53.839999999999996,55.099999999999994,55.82,56.56999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
