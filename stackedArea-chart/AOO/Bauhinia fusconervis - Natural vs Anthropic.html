<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.519999999999996,44.46,44.11999999999999,44.06999999999999,44.43999999999999,44.53,44.989999999999995,44.9,45.32,45.93,45.99,46.949999999999996,47.25,47.40999999999999,47.99,48.03999999999999,48.12,48.269999999999996,48.17,48.099999999999994,47.52000000000001,47.32,47.42,47.52,47.73,47.97,48.21,48.5,48.550000000000004,48.56,48.98,49.050000000000004,49.199999999999996,49.480000000000004,49.33,49.309999999999995,49.629999999999995,49.79],"color":"green"},{"name":"anthropic","data":[55.349999999999994,55.410000000000004,55.74999999999999,55.79,55.42,55.330000000000005,54.87,54.93,54.53,53.92000000000001,53.85000000000001,52.91,52.61,52.47,51.86,51.83,51.739999999999995,51.56999999999999,51.67,51.75,52.349999999999994,52.55,52.43999999999999,52.32,52.13999999999999,51.9,51.66,51.36000000000001,51.309999999999995,51.3,50.88,50.79,50.66,50.36,50.529999999999994,50.519999999999996,50.23000000000001,50.07],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
