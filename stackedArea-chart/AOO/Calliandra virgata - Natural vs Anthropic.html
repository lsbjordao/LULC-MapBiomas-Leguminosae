<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.95,54.34000000000001,52.93000000000001,51.92,50.24,49.930000000000014,48.930000000000014,47.720000000000006,47.49,46.67,45.88,45.830000000000005,45.06999999999999,44.790000000000006,44.78999999999999,44.00000000000001,43.690000000000005,43.46,42.92999999999999,42.1,41.53,41.25,41.11000000000001,40.8,40.68999999999999,40.419999999999995,40.029999999999994,39.92999999999999,39.96999999999999,39.75,39.74,39.620000000000005,39.57,39.45,39.349999999999994,39.23,39.21999999999999,39.28999999999999],"color":"green"},{"name":"anthropic","data":[45.15999999999999,46.79,48.199999999999996,49.199999999999996,50.89,51.2,52.230000000000004,53.38999999999999,53.63999999999999,54.449999999999996,55.26,55.300000000000004,56.06,56.35,56.330000000000005,57.11000000000001,57.46,57.669999999999995,58.190000000000005,59.02000000000001,59.59,59.89,60.02,60.330000000000005,60.419999999999995,60.709999999999994,61.11,61.199999999999996,61.15,61.37,61.4,61.5,61.550000000000004,61.67,61.78,61.900000000000006,61.900000000000006,61.84000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
