<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[199.36,197.19,193.89,191.11,189.54999999999998,187.82999999999996,186.64000000000001,184.81,183.49,181.93,181.27,180.92000000000002,180.06,179.13000000000002,178.35000000000002,177,176.27,175.52,174.29,173.26000000000002,172.71,172.37999999999997,172.56999999999996,172.36999999999998,171.97999999999996,171.23999999999998,170.99000000000004,170.35000000000005,169.39,169.15999999999997,169.01,168.81,168.29,168.43999999999997,168.41,168.39000000000001,168.42000000000002,168.15999999999994],"color":"green"},{"name":"anthropic","data":[159.36,161.56,164.87999999999997,167.66999999999996,169.22,170.96,172.16000000000003,173.98999999999992,175.34,176.85000000000002,177.53,177.85000000000002,178.73,179.64999999999998,180.45000000000005,181.78,182.52,183.27,184.49,185.51999999999998,186.05999999999997,186.39999999999998,186.23999999999998,186.42999999999998,186.81,187.56,187.78,188.45000000000002,189.42,189.64000000000001,189.79999999999998,189.98999999999998,190.50999999999996,190.35999999999999,190.39,190.42999999999998,190.4,190.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
