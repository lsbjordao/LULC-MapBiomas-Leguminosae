<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.10999999999999,77.23999999999998,75.53999999999999,72.78999999999999,70.29999999999998,68.94999999999999,68.18,68.16,68.21000000000001,67.74,68.84,69.34,69.89999999999999,70.63000000000001,69.89999999999999,69.36,69.63,69.22,69.80999999999999,69.89,69.35,69.19999999999999,69.78999999999998,69.74999999999999,70.50999999999998,71.61999999999999,71.82000000000001,71.98,72.22,71.97,71.76,71.68,71.41000000000001,71.44000000000001,71.42,71.66000000000001,72.65,73.23],"color":"green"},{"name":"anthropic","data":[15.12,18.080000000000002,19.8,22.57,25.04,26.37,27.1,27.11,27.09,27.56,26.490000000000002,26.009999999999998,25.41,24.729999999999997,25.45,26.009999999999998,25.78,26.23,25.619999999999997,25.5,26.08,26.23,25.64,25.700000000000003,24.919999999999998,23.8,23.6,23.45,23.189999999999998,23.400000000000002,23.61,23.69,23.93,23.9,24.03,23.779999999999998,22.740000000000002,22.119999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
