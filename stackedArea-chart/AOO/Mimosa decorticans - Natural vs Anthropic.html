<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.18,70.28999999999999,69.30000000000001,66.61,63.38,63.18,62.459999999999994,61.76,59.26,58.17999999999999,57.97,57.64,57.18,56.040000000000006,55.470000000000006,55.14,54.510000000000005,53.879999999999995,52.940000000000005,52.870000000000005,52.85,52.86,52.800000000000004,52.489999999999995,52.18,51.83,51.69,51.76,51.39,51.650000000000006,50.879999999999995,50.84,50.690000000000005,50.94,51.050000000000004,50.699999999999996,50.36,50.08],"color":"green"},{"name":"anthropic","data":[30.67,30.529999999999998,31.53,34.239999999999995,37.46,37.65,38.38,39.07000000000001,41.58,42.63999999999999,42.86,43.2,43.64,44.79,45.370000000000005,45.709999999999994,46.33,46.96,47.89,47.96,47.980000000000004,47.970000000000006,48.02,48.34,48.650000000000006,48.989999999999995,49.150000000000006,49.07000000000001,49.45,49.190000000000005,49.93000000000001,49.980000000000004,50.150000000000006,49.900000000000006,49.77,50.11000000000001,50.46,50.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
