<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.03999999999999,95.12999999999998,95.12999999999998,95.12999999999998,91.51999999999998,91.53999999999999,91.52999999999999,95.45,95.42999999999999,95.42999999999999,95.42999999999999,95.42999999999999,95.42999999999999,95.39999999999999,95.40999999999998,95.56,96.11,96.28999999999998,96.69999999999999,96.73,96.3,95.72999999999999,95.50999999999999,95.15,94.97000000000001,95.16,95.46000000000001,95.04999999999998,94.94,94.81,94.85000000000001,94.91999999999999,94.71,94.72999999999999,94.52999999999999,94.41,94.32000000000001,94.05],"color":"green"},{"name":"anthropic","data":[7.48,4.38,4.38,4.38,7.98,7.98,7.98,4.08,4.08,4.08,4.08,4.08,4.08,4.1,4.1,3.96,3.41,3.23,2.81,2.79,3.22,3.79,4,4.37,4.55,4.36,4.05,4.47,4.57,4.72,4.66,4.6,4.8,4.79,4.99,5.109999999999999,5.1899999999999995,5.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
