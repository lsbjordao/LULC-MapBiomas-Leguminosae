<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.709999999999994,53.769999999999996,53.529999999999994,53.71,53.82999999999999,53.76,54.01999999999999,53.99,54.459999999999994,55.24999999999999,55.85999999999999,56.28999999999999,56.86,57.370000000000005,57.51,57.580000000000005,57.58,57.65,57.830000000000005,58.09000000000001,58.41,58.73,58.97999999999999,59.29999999999999,59.75,59.92,60.18,60.34,60.529999999999994,61.03,61.300000000000004,61.45,61.71,62.11999999999999,62.18999999999999,62.02,62.07000000000001,62.040000000000006],"color":"green"},{"name":"anthropic","data":[45.9,45.87,46.13999999999999,45.96999999999999,45.86999999999999,45.96999999999999,45.72,45.739999999999995,45.269999999999996,44.48,43.88,43.46,42.85,42.379999999999995,42.269999999999996,42.190000000000005,42.19,42.12,41.949999999999996,41.69,41.38,41.040000000000006,40.79,40.470000000000006,40.019999999999996,39.85999999999999,39.599999999999994,39.42,39.25,38.73,38.470000000000006,38.32000000000001,38.06,37.65,37.58,37.75,37.709999999999994,37.74999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
