<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.27,82.59,83.92,82.82999999999998,82.99,82.11999999999999,83.52000000000001,83.60000000000001,84.51999999999998,84.88999999999999,85.1,85.74,85.82000000000001,85.97999999999999,86.23999999999998,87.08999999999999,87.4,87.39999999999999,87.55,87.73,87.92999999999999,88.36000000000001,88.26,88.28999999999998,88.47000000000001,87.98,87.68,87.72,87.44999999999999,86.86999999999998,87.21000000000001,86.96,87.10000000000001,86.85000000000001,86.89,86.87999999999998,86.84,86.9],"color":"green"},{"name":"anthropic","data":[21.090000000000003,20.8,19.45,20.540000000000003,20.39,21.25,19.860000000000003,19.77,18.850000000000005,18.46,18.28,17.63,17.54,17.38,17.13,16.290000000000003,15.98,15.970000000000002,15.83,15.65,15.45,15.010000000000002,15.120000000000001,15.07,14.91,15.389999999999999,15.690000000000001,15.66,15.94,16.509999999999998,16.16,16.429999999999996,16.29,16.54,16.49,16.49,16.52,16.48],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
