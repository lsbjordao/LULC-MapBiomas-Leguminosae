<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.78,50.11,47.77,46.029999999999994,45.57,45.10000000000001,45.720000000000006,45.089999999999996,44.57,43.59000000000001,43.38000000000001,43.52,43.74,44.28,45.06,44.73,44.02,43.88,42.73000000000001,43.050000000000004,44.73000000000002,45.88000000000002,45.980000000000004,47.35000000000001,46.40000000000001,46.16,45.9,45.31,45.24,45.22,44.87,44.96000000000001,45.169999999999995,44.620000000000005,44.89,45.06,44.88999999999999,45.22999999999999],"color":"green"},{"name":"anthropic","data":[53.209999999999994,53.88,56.21,57.92999999999999,58.41,58.88,58.25,58.879999999999995,59.410000000000004,60.38,60.59,60.449999999999996,60.22,59.69,58.92,59.25,59.97,60.089999999999996,61.24,60.93000000000001,59.24,58.10000000000001,57.99999999999999,56.620000000000005,57.58,57.83,58.07,58.67,58.74,58.76,59.11,59.010000000000005,58.79,59.36,59.08,58.919999999999995,59.089999999999996,58.74000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
