<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.99,64.52,63.61,63.68,63.39,63.410000000000004,63.53,63.720000000000006,64.47,64.96,65.44999999999999,65.29,65.65,65.79,65.53999999999999,65.3,65.11999999999999,65.05999999999999,65.28,65.62,65.41999999999999,65.17999999999999,65.36999999999999,65.15,65.14999999999999,65.22999999999999,65.31,65.25,65.3,65.35,65.58,65.67,65.85,65.9,65.78,65.72000000000001,65.10000000000001,65.3],"color":"green"},{"name":"anthropic","data":[35.93,35.41,36.29,36.22,36.519999999999996,36.5,36.39,36.18,35.43,34.949999999999996,34.45,34.62,34.25,34.13,34.37,34.6,34.78,34.85,34.61999999999999,34.290000000000006,34.5,34.72999999999999,34.55,34.76,34.77,34.660000000000004,34.58,34.669999999999995,34.6,34.55999999999999,34.339999999999996,34.24,34.06,34.010000000000005,34.14,34.21,34.809999999999995,34.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
