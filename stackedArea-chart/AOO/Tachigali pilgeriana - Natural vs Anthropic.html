<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.42000000000002,77.35000000000002,76.94000000000003,76.73,76.61,76.63000000000001,76.58999999999999,76.77,77.04,77.36000000000001,77.66000000000003,77.94000000000001,78.05999999999999,77.96,78.05000000000003,77.93000000000002,77.93000000000002,78.11000000000001,78.36000000000001,78.36,78.71,79,79.28999999999999,79.34,79.49000000000001,79.66000000000001,79.74,79.89000000000001,80.08000000000003,80.18000000000002,80.16999999999999,80.15,80.28999999999999,80.35999999999999,80.40000000000002,80.47,80.66,80.85],"color":"green"},{"name":"anthropic","data":[23.060000000000002,23.130000000000003,23.53,23.750000000000004,23.860000000000003,23.850000000000005,23.880000000000003,23.71,23.450000000000003,23.130000000000003,22.82,22.520000000000003,22.430000000000003,22.51,22.440000000000005,22.560000000000002,22.56,22.360000000000003,22.110000000000003,22.11,21.78,21.490000000000002,21.19,21.13,20.990000000000002,20.82,20.740000000000002,20.580000000000002,20.43,20.3,20.300000000000004,20.32,20.180000000000003,20.12,20.07,20.01,19.81,19.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
