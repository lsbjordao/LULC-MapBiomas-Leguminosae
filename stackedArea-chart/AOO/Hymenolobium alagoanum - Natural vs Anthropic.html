<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.44999999999999,62.20000000000001,62.07,61.370000000000005,61.1,60.91,60.99000000000001,61.199999999999996,61.480000000000004,61.83999999999999,61.78,61.940000000000005,62.06,62.01,61.95,61.78,61.75000000000001,61.64999999999999,61.79,61.68,61.419999999999995,61.44,61.519999999999996,61.78,61.98999999999999,62.48,62.46000000000001,62.46,62,61.99,61.919999999999995,61.790000000000006,61.44,61.419999999999995,61.6,61.59,61.71999999999999,61.57999999999999],"color":"green"},{"name":"anthropic","data":[36,36.27,36.42,37.129999999999995,37.41,37.57,37.53,37.300000000000004,37.05,36.71,36.730000000000004,36.550000000000004,36.44,36.5,36.54,36.76,36.769999999999996,36.910000000000004,36.75000000000001,36.86,37.12,37.08,36.989999999999995,36.760000000000005,36.510000000000005,36.059999999999995,36.08,36.059999999999995,36.529999999999994,36.540000000000006,36.64,36.75999999999999,37.09,37.10999999999999,36.96,36.98,36.84,36.99],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
