<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.86,50.089999999999996,50.24,50.68000000000001,51.26,51.6,52.00000000000001,51.69,51.599999999999994,51.02,50.339999999999996,49.980000000000004,49.41,49.25,48.989999999999995,48.79,49.21,49.300000000000004,49.730000000000004,49.89,50.07,50.220000000000006,49.92,49.75000000000001,49.88,50.07999999999999,49.95,49.330000000000005,48.81,48.05,47.93000000000001,48.050000000000004,48.31,48.32000000000001,48.19,48.50000000000001,48.54000000000001,48.81],"color":"green"},{"name":"anthropic","data":[50.599999999999994,51.379999999999995,51.260000000000005,50.790000000000006,50.21000000000001,49.87,49.48,49.79,49.86,50.45,51.14,51.50000000000001,52.06,52.22,52.480000000000004,52.68,52.28,52.18,51.76,51.60000000000001,51.400000000000006,51.25000000000001,51.550000000000004,51.74,51.6,51.41,51.53,52.160000000000004,52.660000000000004,53.42,53.53,53.43,53.17999999999999,53.16,53.28,52.97,52.949999999999996,52.660000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
