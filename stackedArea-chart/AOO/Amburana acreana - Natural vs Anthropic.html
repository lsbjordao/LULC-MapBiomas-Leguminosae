<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.26,83.07,81.61,79.67,78.11,77.8,76.81999999999998,76.3,75.08000000000001,74.16999999999999,73.02999999999999,71.08,70.19,68.91,67.26,66.44999999999997,66.1,65.07,64.50000000000001,62.330000000000005,60.980000000000004,60.550000000000004,60.09,59.949999999999996,59.91,59.88,59.92,60.05,60.48,60.72,60.809999999999995,60.989999999999995,60.780000000000015,60.690000000000005,60.28999999999999,59.900000000000006,59.74,58.92],"color":"green"},{"name":"anthropic","data":[17.099999999999998,17.27,18.740000000000002,20.68,22.220000000000002,22.55,23.509999999999998,24.05,25.27,26.18,27.32,29.29,30.16,31.439999999999998,33.1,33.9,34.25,35.29,35.85,38.02,39.37,39.8,40.269999999999996,40.410000000000004,40.45,40.49,40.43,40.3,39.87,39.64,39.54,39.36,39.580000000000005,39.67,40.06,40.45,40.61,41.44],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
