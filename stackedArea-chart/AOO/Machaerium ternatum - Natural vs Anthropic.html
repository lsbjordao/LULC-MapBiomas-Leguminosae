<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.11000000000001,46.09,45.43999999999999,44.830000000000005,44.48000000000001,44.660000000000004,44.21000000000001,44.86000000000001,45.83,46.76,47.980000000000004,48.720000000000006,49.23,49.13,49.07,49.27,50.510000000000005,51.24,51.63,51.95,52.169999999999995,52.489999999999995,52.91,53.09,53.269999999999996,53.480000000000004,53.85,54.21,54.370000000000005,54.75000000000001,54.699999999999996,54.77,55.01,55.64,55.78,56.09,56.16,56.4],"color":"green"},{"name":"anthropic","data":[52.050000000000004,53.06,53.730000000000004,54.34000000000001,54.67999999999999,54.52000000000001,54.959999999999994,54.33,53.34,52.370000000000005,51.17,50.45,49.92,50.019999999999996,50.1,49.900000000000006,48.65,47.93,47.519999999999996,47.23,47.00000000000001,46.67000000000001,46.24999999999999,46.1,45.9,45.67999999999999,45.31,44.95,44.8,44.42,44.46,44.4,44.150000000000006,43.519999999999996,43.37,43.06999999999999,43.01,42.76],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
