<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.290000000000006,61.43000000000001,61.36,61.1,59.98,59.800000000000004,60.37,60.36,60.23,60.04,59.89,60.03999999999999,61.33999999999999,60.93,60.43999999999999,61.78,61.949999999999996,61.919999999999995,61.89,62.53,62.48,62.53999999999999,62.13999999999999,62.38,61.42,60.91,60.64,60.370000000000005,60.73,60.09,60.38000000000001,60.08,59.99999999999999,60.699999999999996,60.9,60.879999999999995,61.209999999999994,61.67000000000001],"color":"green"},{"name":"anthropic","data":[41.809999999999995,41.66,41.720000000000006,42,43.099999999999994,43.290000000000006,42.73,42.71,42.85,43.050000000000004,43.199999999999996,43.03,41.75,42.18000000000001,42.64,41.29,41.14,41.16,41.21,40.56000000000001,40.620000000000005,40.55,40.93,40.699999999999996,41.660000000000004,42.17999999999999,42.43999999999999,42.72,42.35,42.989999999999995,42.71,43.010000000000005,43.080000000000005,42.400000000000006,42.19,42.199999999999996,41.87,41.42],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
