<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.69,76.36999999999999,75.66,74.68,74.38999999999999,73.28000000000002,72.76000000000002,72.6,72.37,72.23,73.19,72.61,72.72,72.68,72.23000000000002,71.55999999999999,71.14000000000001,70.63999999999999,70.15,69.84,70.23,70.25999999999999,70.17999999999999,70.22,70.07999999999998,70.02,69.32,69.38999999999999,68.9,68.95000000000002,69.24000000000001,69.27000000000001,68.16000000000001,68,67.58,67.57,66.87,67.67000000000002],"color":"green"},{"name":"anthropic","data":[28.76,29.08,29.819999999999997,30.770000000000007,31.060000000000006,32.17,32.699999999999996,32.849999999999994,33.09,33.220000000000006,32.26,32.849999999999994,32.72,32.78,33.24000000000001,33.92000000000001,34.34,34.82000000000001,35.3,35.6,35.21,35.190000000000005,35.28,35.25,35.36,35.449999999999996,36.13000000000001,36.06,36.56,36.489999999999995,36.230000000000004,36.2,37.300000000000004,37.45,37.88000000000001,37.88,38.6,37.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
