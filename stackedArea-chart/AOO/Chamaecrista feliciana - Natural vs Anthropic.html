<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.19,78.3,78.57000000000001,79.11000000000001,79.33999999999999,79.56,79.4,79.22999999999999,79.05,78.86,78.68000000000002,78.62,78.55,78.68000000000002,78.91,79.03,79.24,79.24,79.03999999999999,79.14,79.08,79.17,79.34,79.50000000000001,79.75,79.85,79.94999999999999,79.75999999999999,78.44999999999999,78.22,78.26,78.33999999999999,78.42,78.29000000000002,78.26,78.06,78.08,77.86000000000001],"color":"green"},{"name":"anthropic","data":[22.560000000000002,22.43,22.179999999999996,21.63,21.400000000000002,21.19,21.349999999999998,21.52,21.7,21.9,22.08,22.14,22.2,22.08,21.839999999999996,21.72,21.49,21.53,21.71,21.619999999999997,21.68,21.590000000000003,21.410000000000004,21.24,21.01,20.900000000000002,20.790000000000003,20.990000000000002,22.3,22.52,22.490000000000002,22.41,22.320000000000004,22.46,22.49,22.67,22.67,22.9],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
