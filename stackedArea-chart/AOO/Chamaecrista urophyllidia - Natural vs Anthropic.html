<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.05,69.89999999999999,69.22,68.72000000000001,68.21,68.36,69.41000000000001,68.73,70.03999999999999,70.5,71.05,71.78,74.32,75.4,77.41999999999999,78.88000000000001,78.83,78.52,79.08000000000001,79.16,79.95,80.74999999999999,80.61000000000001,80.58,80.04,79.55,78.47,77.78999999999999,77.5,76.27,75.85,75.33999999999999,75.54999999999998,76.01,76.39,76.58000000000001,76.94,77.32],"color":"green"},{"name":"anthropic","data":[31.400000000000002,31.560000000000002,32.23,32.71,33.239999999999995,33.08,32.029999999999994,32.71000000000001,31.419999999999998,30.93,30.400000000000002,29.660000000000004,27.11,26.04,24.03,22.560000000000002,22.61,22.92,22.349999999999998,22.27,21.509999999999998,20.689999999999994,20.83,20.869999999999997,21.4,21.89,22.95,23.650000000000002,23.939999999999998,25.189999999999998,25.6,26.11,25.91,25.449999999999996,25.05,24.85,24.49,24.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
