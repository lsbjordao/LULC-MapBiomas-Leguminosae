<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.49,93.61,93.43,93.85,93.17999999999999,93.41000000000001,93.97,93.35,93.10000000000001,93.67000000000002,93.99000000000001,93.57,92.91000000000003,92.48,92.26,92.10000000000001,91.78,91.60000000000001,91.36,90.91,90.77000000000001,90.91999999999999,91.08,91.21000000000001,91.16000000000001,91.1,91.21,91.35,91.47000000000001,91.49,91.01000000000002,90.97,90.96000000000001,91.08,91.17999999999999,90.92999999999999,90.86999999999999,89.69999999999999],"color":"green"},{"name":"anthropic","data":[6.2,7.07,7.25,6.82,7.49,7.27,6.7,7.32,7.5600000000000005,6.99,6.68,7.12,7.76,8.18,8.41,8.59,8.9,9.07,9.32,9.78,9.9,9.74,9.59,9.47,9.51,9.57,9.46,9.33,9.21,9.18,9.66,9.72,9.709999999999999,9.59,9.49,9.73,9.809999999999999,10.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
