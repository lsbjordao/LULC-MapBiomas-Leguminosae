<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.26999999999998,67.99,66.61,65.71,64.64000000000001,63.8,64.03,63.97999999999999,64.22999999999999,64.65,67.03999999999999,66.58999999999999,66.17999999999999,64.85000000000001,61.669999999999995,59.71000000000001,58.92,58.52,58.20000000000001,59.28000000000001,59.88,60.5,60.78,61.01,61.42,61.79,61.37,60.98000000000002,60.31000000000001,59.34,59.19,59.699999999999996,59.990000000000016,60.88,61.07000000000001,61.26,61.34000000000001,61.18000000000001],"color":"green"},{"name":"anthropic","data":[27.160000000000004,27.510000000000005,29,29.919999999999998,31.010000000000005,31.840000000000003,31.63,31.740000000000002,31.41,30.879999999999995,28.54,28.819999999999997,29.279999999999998,30.57,33.81,35.769999999999996,36.519999999999996,36.919999999999995,37.25999999999999,36.13,35.480000000000004,34.83,34.519999999999996,34.309999999999995,33.940000000000005,33.64,34.11,34.62,35.440000000000005,36.410000000000004,36.519999999999996,35.97,35.56999999999999,34.67999999999999,34.830000000000005,34.67,34.519999999999996,34.64000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
