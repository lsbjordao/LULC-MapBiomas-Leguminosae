<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.25999999999999,98.25,98.25,98.28,98.29,98.41,98.47999999999999,98.47999999999999,98.54,98.55000000000001,98.47,98.41000000000001,98.37,98.4,98.44,98.39,98.38,98.44,98.43,98.5,98.49000000000001,98.52,98.52,98.53,98.5,98.52,98.57000000000001,98.57000000000001,98.54,98.52000000000001,98.53999999999999,98.53,98.47999999999999,98.43,98.44,98.42,98.41,98.42000000000002],"color":"green"},{"name":"anthropic","data":[1.6400000000000001,1.65,1.6700000000000002,1.6300000000000001,1.6300000000000001,1.49,1.4100000000000001,1.4200000000000002,1.37,1.36,1.4500000000000002,1.49,1.52,1.51,1.45,1.5,1.5,1.4700000000000002,1.48,1.4,1.41,1.3699999999999999,1.3699999999999999,1.3699999999999999,1.38,1.3699999999999999,1.3199999999999998,1.3299999999999998,1.3599999999999999,1.3699999999999999,1.3599999999999999,1.3699999999999999,1.42,1.46,1.47,1.48,1.49,1.48],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
