<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.290000000000006,59.32,60.15,61.019999999999996,60.86,60.63999999999999,60.91,61.11,61.11,61.06999999999999,60.92,62.08,63.04,63.480000000000004,64.07000000000001,64.53,64.6,64.53,64.22999999999999,64.88999999999999,64.81,65.25,65.17999999999999,65.38999999999999,65.46,65.66999999999999,65.92,65.9,66.74,67.48,67.95,68.27,68.5,69.62,69.57000000000002,69.82000000000001,69.90000000000002,70.13999999999999],"color":"green"},{"name":"anthropic","data":[42.690000000000005,41.690000000000005,40.86,40,40.14000000000001,40.37,40.08,39.900000000000006,39.879999999999995,39.940000000000005,40.09,38.919999999999995,37.97,37.540000000000006,36.95,36.47,36.39,36.46,36.76,36.11,36.199999999999996,35.75,35.82,35.61,35.54,35.349999999999994,35.08,35.1,34.27,33.519999999999996,33.03999999999999,32.74,32.550000000000004,31.41,31.44,31.19,31.12,30.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
