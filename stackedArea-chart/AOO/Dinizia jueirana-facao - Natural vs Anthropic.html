<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.35000000000001,52.59,47.779999999999994,45.9,45.43,46.23,46.92,46.92,48.18,48.78,49.16,48.64,48.24,47.800000000000004,48.980000000000004,48.32,48.3,48.050000000000004,47.58,46.72,46.65,46.61999999999999,46.69,46.339999999999996,46.78,46.94,47.68,47.75,47.42,47.3,46.809999999999995,46.849999999999994,47.16,47.58,48.3,48.82,49.29,49.120000000000005],"color":"green"},{"name":"anthropic","data":[44.33,47.1,51.9,53.78,54.239999999999995,53.44,52.74999999999999,52.76,51.50000000000001,50.89,50.52,51.03000000000001,51.43000000000001,51.88000000000001,50.71,51.37,51.38,51.63,52.1,52.95,53.02,53.06999999999999,53.00000000000001,53.349999999999994,52.89999999999999,52.739999999999995,52,51.93,52.24,52.38,52.870000000000005,52.839999999999996,52.53000000000001,52.099999999999994,51.35999999999999,50.85,50.379999999999995,50.56999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
