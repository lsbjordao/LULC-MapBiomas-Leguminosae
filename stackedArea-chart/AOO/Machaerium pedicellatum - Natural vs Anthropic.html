<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.199999999999996,47.01,46.580000000000005,46.59,46.61000000000001,46.459999999999994,46.51000000000001,46.57,46.68,47.26,47.410000000000004,47.779999999999994,47.98,48.53999999999999,49.12,49.290000000000006,49.13000000000001,49.08000000000001,49.27,49.550000000000004,49.8,50.169999999999995,50.529999999999994,50.73,50.929999999999986,51.01,51,51.14,51.00999999999999,51.21000000000001,51.129999999999995,50.949999999999996,51.11000000000001,51.180000000000014,51.34,51.470000000000006,51.339999999999996,51.48],"color":"green"},{"name":"anthropic","data":[47.43000000000001,47.61000000000001,48.050000000000004,48.06000000000001,48.04,48.19,48.14,48.06,47.949999999999996,47.4,47.22,46.849999999999994,46.660000000000004,46.09,45.529999999999994,45.339999999999996,45.5,45.559999999999995,45.37,45.08,44.83,44.459999999999994,44.129999999999995,43.89999999999999,43.699999999999996,43.60999999999999,43.62999999999999,43.52,43.629999999999995,43.43999999999999,43.51999999999999,43.69,43.54999999999999,43.47999999999999,43.309999999999995,43.18000000000001,43.3,43.16],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
