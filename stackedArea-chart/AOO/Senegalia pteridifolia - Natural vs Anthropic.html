<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.57999999999999,56.48,56.260000000000005,56.08,56.63000000000001,56.86,57.16,57.48,57.940000000000005,58.15,58.06,58.1,57.81,57.96,57.97,57.910000000000004,58.07,58.599999999999994,58.93000000000001,59,59.43,59.71,60,60.120000000000005,60.25,60.38,60.24999999999999,60.4,60.31,60.24999999999999,59.94,59.91,59.870000000000005,59.980000000000004,60.26000000000001,60.410000000000004,60.4,61.31],"color":"green"},{"name":"anthropic","data":[39.56,39.64,39.87,40.06,39.489999999999995,39.279999999999994,38.95,38.65,38.19,37.97,38.06,38.010000000000005,38.33,38.16,38.15,38.22,38.059999999999995,37.529999999999994,37.199999999999996,37.10999999999999,36.71,36.410000000000004,36.120000000000005,36,35.870000000000005,35.739999999999995,35.87,35.76,35.83,35.88999999999999,36.17999999999999,36.23,36.269999999999996,36.16,35.87,35.72999999999999,35.74,34.82],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
