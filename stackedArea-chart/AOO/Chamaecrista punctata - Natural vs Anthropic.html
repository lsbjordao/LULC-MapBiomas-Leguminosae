<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.970000000000006,32.96,32.73,32.56,32.14,32.39,32.51,32.93,33.52,34.03999999999999,34.21,34.379999999999995,34.339999999999996,34.56,35.32,36.39,37.019999999999996,37.83,38.91,39.25000000000001,39.65,40.04,40.52,40.91,41.309999999999995,41.800000000000004,42.02,42.120000000000005,42.55,43.02,43.28,43.57000000000001,43.71,43.82,44.050000000000004,44.43000000000001,44.60000000000001,45.26000000000001],"color":"green"},{"name":"anthropic","data":[67.88999999999999,67.92000000000002,68.13999999999999,68.32000000000002,68.74000000000001,68.50999999999999,68.35,67.97000000000001,67.36,66.83,66.69000000000001,66.52,66.53,66.33,65.54999999999998,64.47999999999999,63.89,63.059999999999995,62.01,61.64,61.239999999999995,60.83000000000001,60.36999999999999,59.97,59.57,59.07999999999999,58.87,58.76,58.32,57.870000000000005,57.61000000000001,57.29,57.160000000000004,57.059999999999995,56.82,56.45000000000001,56.290000000000006,55.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
