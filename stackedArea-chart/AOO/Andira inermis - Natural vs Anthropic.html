<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.36999999999999,76.22,75.25999999999998,74.57,74.19,74.17999999999999,73.86,72.88,72.38,71.99000000000001,71.45,71.02,70.68,70.38,69.95,69.79,69.38,69.09,68.68,68.44,68.41,68.31,68.26,68.1,67.92,67.86000000000001,67.65,67.46,67.37,67.19,67.09999999999998,67.05,66.97999999999999,67.08,66.98,66.72999999999999,66.50000000000001,65.71000000000001],"color":"green"},{"name":"anthropic","data":[35.4,36.55000000000001,37.53,38.199999999999996,38.589999999999996,38.58999999999999,38.92000000000001,39.89,40.39999999999999,40.8,41.33,41.75,42.089999999999996,42.39999999999999,42.85,42.980000000000004,43.41,43.71,44.11999999999999,44.330000000000005,44.36,44.470000000000006,44.52,44.7,44.870000000000005,44.94,45.129999999999995,45.35000000000001,45.43000000000001,45.589999999999996,45.709999999999994,45.74,45.81,45.70000000000001,45.82000000000001,46.04,46.25999999999999,47.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
