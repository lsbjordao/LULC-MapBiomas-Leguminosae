<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.43,52.22,50.71,49.970000000000006,50.16,49.66,49.449999999999996,49.550000000000004,49.22,49.35999999999999,48.14,47.6,49.62,49.830000000000005,50.440000000000005,52.21999999999999,52.65,52.660000000000004,52.59,52.11,51.44,51.120000000000005,51.16,51.73,51.43999999999999,51.190000000000005,50.540000000000006,48.230000000000004,46.84000000000001,45.68999999999999,45.26,45.980000000000004,46.37,47.32,47.11,47.120000000000005,47.21,47.49],"color":"green"},{"name":"anthropic","data":[47.57,47.78,49.29,50.03,49.84,50.31999999999999,50.559999999999995,50.45999999999999,50.769999999999996,50.64,51.870000000000005,52.400000000000006,50.370000000000005,50.17,49.55,47.78,47.34,47.33,47.38999999999999,47.89,48.55,48.88,48.830000000000005,48.269999999999996,48.559999999999995,48.800000000000004,49.449999999999996,51.77,53.16000000000001,54.31000000000001,54.75000000000001,54.02,53.620000000000005,52.67,52.879999999999995,52.87,52.8,52.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
