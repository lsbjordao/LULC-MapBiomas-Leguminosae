<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.25,74.05999999999999,74.11999999999999,73.68,74.05999999999999,73.96,74.24,74.23,74.52,74.72999999999999,74.92,75.13,75.42999999999999,75.71,76.32,76.64999999999999,76.58,76.31999999999998,76.27999999999999,76.14999999999999,75.97000000000001,76.14999999999999,76.02000000000001,76.2,76.00999999999999,76.10999999999999,76.18999999999998,76.24,76.33999999999999,76.15999999999998,76.02000000000001,75.86,76.07000000000001,76.44000000000001,76.44,76.33,76.38,76.43999999999998],"color":"green"},{"name":"anthropic","data":[28.13,28.32,28.26,28.69,28.330000000000002,28.410000000000004,28.14,28.14,27.88,27.67,27.460000000000004,27.25,26.940000000000005,26.650000000000006,26.07,25.729999999999997,25.82,26.05,26.1,26.240000000000002,26.400000000000006,26.220000000000002,26.349999999999994,26.18,26.36,26.290000000000003,26.189999999999998,26.14,26.040000000000003,26.21,26.349999999999998,26.509999999999998,26.3,25.950000000000003,25.96,26.049999999999997,25.989999999999995,25.939999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
