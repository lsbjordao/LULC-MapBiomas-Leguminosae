<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.02999999999999,72.41,71.53,70.9,70.27999999999999,69.80000000000003,69.02000000000001,69.01,69.15,69.20000000000002,69.45,69.71,70.14,69.78000000000002,69.09000000000002,68.51,68.42,67.95999999999998,68.08999999999999,67.64999999999999,67.24000000000001,67.66,67.5,67.67,68.05000000000003,68.3,68.44000000000001,68.68,68.64000000000001,68.63000000000002,68.79000000000002,68.69999999999999,68.86,69.20000000000002,69.19,69.28000000000002,70.13000000000001,69.94000000000001],"color":"green"},{"name":"anthropic","data":[29.139999999999997,28.8,29.75,30.37,31.06,31.550000000000004,32.339999999999996,32.33,32.199999999999996,32.129999999999995,31.87,31.62,31.16,31.530000000000005,32.25,32.81,32.93,33.39,33.27,33.73,34.13000000000001,33.74000000000001,33.93,33.74,33.39000000000001,33.1,32.980000000000004,32.72,32.76,32.81999999999999,32.71,32.83,32.690000000000005,32.36000000000001,32.410000000000004,32.34,31.470000000000002,31.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
