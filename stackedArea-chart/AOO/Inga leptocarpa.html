<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[94.15,94.2,94.17,93.85,93.55,93.35,93.33,93.26,93.09,92.72,91.93,91.38,91.04,90.82,90.2,90.08,89.82,89.48,89.1,88.48,86.68,85.04,84.15,83.39,82.84,82.35,81.86,80.94,79.36,78.07,77.04,75.63,74.54,73.16,70.23,67.76,64.6,62.32],"color":"#006400"},{"name":"Flooded forest","data":[2.79,2.85,2.82,2.5,2.48,2.19,2.08,1.92,1.98,2.08,1.98,1.98,1.8,1.68,1.65,1.78,2.24,2.24,2.39,2.4,2.3,1.53,1.49,1.29,1.37,1.29,1.29,1.28,1.27,1.29,1.39,1.58,1.7,1.33,1.24,0.95,0.82,1.02],"color":"#76A5AF"},{"name":"Wetland","data":[0.13,0.12,0.14,0.47,0.49,0.78,0.88,1.04,0.98,0.88,0.97,0.9,1.1,1.19,1.24,1.08,0.69,0.69,0.58,0.57,0.65,1.34,1.34,1.5,1.36,1.45,1.55,1.51,1.39,1.4,1.43,1.28,1.21,1.52,1.38,1.51,1.6,1.47],"color":"#45C2A5"},{"name":"Pasture","data":[3.09,3,3.02,3.34,3.64,3.84,3.87,3.93,4.11,4.48,5.28,5.9,6.22,6.47,7.08,7.23,7.4,7.75,8.09,8.72,10.53,12.25,13.19,13.99,14.59,15.08,15.46,16.44,18.14,19.4,20.3,21.66,22.71,24.15,27.31,29.94,33.15,35.35],"color":"#FFD966"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
