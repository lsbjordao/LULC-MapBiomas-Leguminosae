<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.96,61.36,59.83,58.97,58.31999999999999,57.75,57.25000000000001,58.2,57.86000000000001,57.42999999999999,57.58,57.57,58.13000000000001,58.53,58.220000000000006,58.24,58.34,57.08,56.94,54.92999999999999,53.9,52.59,51.760000000000005,51.78,52.669999999999995,53.08,53.8,53.82,54.18,54.36,54.59,54.169999999999995,54.05,53.75,53.01,53.06,53.68000000000001,54.47],"color":"green"},{"name":"anthropic","data":[37.13,39.74,41.26,42.12,42.79,43.34,43.84,42.879999999999995,43.22,43.65,43.519999999999996,43.53,42.96,42.550000000000004,42.86,42.849999999999994,42.76,44,44.150000000000006,46.160000000000004,47.19,48.510000000000005,49.330000000000005,49.31,48.42,48.01,47.29,47.28,46.919999999999995,46.73,46.52,46.919999999999995,47.04,47.33,48.089999999999996,48.029999999999994,47.4,46.629999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
