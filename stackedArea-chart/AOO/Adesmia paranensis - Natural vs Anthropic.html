<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.10999999999999,40.199999999999996,39.980000000000004,39.68000000000001,39.74,39.919999999999995,40.22999999999999,40.01,40.1,40.25,39.419999999999995,38.87,38.67,39.24,38.980000000000004,39.95,40.9,41.53000000000001,41.86,42.190000000000005,42.6,42.91,43.190000000000005,43.18000000000001,43.71000000000001,44.129999999999995,44.29,44.23,44.449999999999996,44.900000000000006,45.209999999999994,45.28,45.38999999999999,45.50000000000001,45.55,45.760000000000005,45.8,46.54],"color":"green"},{"name":"anthropic","data":[60.64,60.54,60.769999999999996,61.06999999999999,60.99999999999999,60.82,60.51,60.739999999999995,60.65,60.489999999999995,61.32000000000001,61.870000000000005,62.059999999999995,61.50999999999999,61.760000000000005,60.78999999999999,59.83,59.22,58.88999999999999,58.550000000000004,58.150000000000006,57.84,57.540000000000006,57.550000000000004,57.029999999999994,56.62,56.46,56.51,56.31,55.84,55.529999999999994,55.46,55.34,55.24,55.2,54.980000000000004,54.95,54.190000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
