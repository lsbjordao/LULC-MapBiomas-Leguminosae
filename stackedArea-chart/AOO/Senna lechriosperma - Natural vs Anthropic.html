<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.849999999999994,49.62999999999999,48.910000000000004,48.650000000000006,48.22,48.43000000000001,48.25,48.18999999999998,48.18,48.18,48.14,48.15,48.690000000000005,48.580000000000005,48.400000000000006,48.50000000000001,49.010000000000005,49.010000000000005,49.07000000000001,49.980000000000004,49.69,49.55999999999999,49.61,50.19,50.43,50.879999999999995,51.84999999999999,51.52999999999999,50.21000000000001,49.24,48.69000000000001,48.42,48.54999999999999,48.47,49.54,50.690000000000005,50.690000000000005,51.010000000000005],"color":"green"},{"name":"anthropic","data":[55.63,55.86,56.61,56.84,57.26,57.04,57.23,57.290000000000006,57.309999999999995,57.300000000000004,57.35000000000001,57.349999999999994,56.81999999999999,56.92999999999999,57.1,56.96999999999999,56.489999999999995,56.48,56.44,55.50000000000001,55.79,55.940000000000005,55.88,55.309999999999995,55.05999999999999,54.629999999999995,53.650000000000006,53.970000000000006,55.28999999999999,56.24999999999999,56.81,57.080000000000005,56.93,57.029999999999994,55.95000000000001,54.800000000000004,54.8,54.49000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
