<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.22,82.57,82.58,82.33000000000001,83.48,87.10000000000001,87.89,87.61999999999999,87.35,85.83000000000001,85.08999999999999,85.87,85.54999999999998,85.53,85.34999999999998,85.14,84.86000000000001,84.65,84.99,85.26,84.96,85.1,85.13999999999999,85.29,85.41,85.82,86.41,87.38000000000002,87.03999999999999,86.52000000000001,85.52,84.8,84.75,85.29,85.22999999999999,84.5,84.47000000000001,83.33],"color":"green"},{"name":"anthropic","data":[14.39,17.03,17.03,17.27,16.13,12.51,11.7,11.969999999999999,12.25,13.77,14.509999999999998,13.74,14.06,14.08,14.24,14.469999999999999,14.740000000000002,14.95,14.600000000000001,14.34,14.649999999999999,14.49,14.450000000000001,14.31,14.19,13.77,13.19,12.219999999999999,12.55,13.09,14.06,14.8,14.86,14.32,14.370000000000001,15.09,15.120000000000001,16.27],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
