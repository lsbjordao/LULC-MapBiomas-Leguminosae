<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.460000000000015,60.63,60.4,60.13,59.64000000000001,59.35,58.89,58.23000000000002,57.72,56.92,56.550000000000004,56.62000000000001,56.46,56.6,56.31999999999999,56.17000000000001,56.11000000000001,55.92999999999999,55.75,55.64999999999999,55.51999999999999,55.44,55.14000000000001,54.760000000000005,54.75,54.790000000000006,54.7,54.62,54.53000000000001,53.970000000000006,53.720000000000006,53.45,53.36,53.13,52.98,52.78,52.86,53.239999999999995],"color":"green"},{"name":"anthropic","data":[40.440000000000005,41.269999999999996,41.5,41.760000000000005,42.25,42.55,43.02,43.68,44.160000000000004,44.97,45.35,45.290000000000006,45.440000000000005,45.290000000000006,45.589999999999996,45.73,45.79,45.95,46.12,46.25,46.36999999999999,46.459999999999994,46.76,47.12,47.150000000000006,47.09,47.21,47.28,47.37,47.949999999999996,48.20000000000001,48.440000000000005,48.56,48.769999999999996,48.92,49.12,49.029999999999994,48.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
