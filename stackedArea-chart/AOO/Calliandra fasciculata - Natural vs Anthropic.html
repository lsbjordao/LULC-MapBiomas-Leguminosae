<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.74,67.80000000000001,67.58,67.58,67.13000000000001,67.22999999999999,67.17,67.05999999999999,66.95,66.94,67.06999999999998,67.06,67.44999999999999,67.8,67.64999999999999,67.41999999999999,67.18,66.6,66.32,66.16000000000001,66.44999999999999,66.46000000000001,66.5,66.78999999999999,66.91,66.96,66.82000000000001,66.93,67.06,67.14,67.49,67.56,67.71,67.81,67.96,67.90999999999998,67.88,67.7],"color":"green"},{"name":"anthropic","data":[32.35,33.28,33.50000000000001,33.49999999999999,33.95,33.82,33.92,34.00000000000001,34.120000000000005,34.120000000000005,33.99,34.010000000000005,33.620000000000005,33.28,33.42,33.63,33.89,34.48,34.75000000000001,34.9,34.61,34.61,34.57,34.26,34.129999999999995,34.1,34.25,34.13999999999999,34.01,33.91,33.580000000000005,33.510000000000005,33.379999999999995,33.269999999999996,33.14,33.169999999999995,33.19,33.379999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
