<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.970000000000006,55.86000000000001,55.30000000000001,54.49000000000001,54.03,53.739999999999995,53.48,53.45000000000001,53.59,53.96000000000001,54.00000000000001,54.169999999999995,54.239999999999995,54.39,54.5,54.64999999999999,54.63999999999999,54.550000000000004,54.67,54.72,54.68,55.129999999999995,55.699999999999996,55.730000000000004,55.730000000000004,55.77,55.59,55.43,55.36000000000001,55.300000000000004,55.31,55.260000000000005,55.27999999999999,55.22,55.230000000000004,55.35,55.46999999999999,55.72999999999998],"color":"green"},{"name":"anthropic","data":[45.09,45.209999999999994,45.77,46.57,47.03,47.330000000000005,47.57,47.64,47.459999999999994,47.11000000000001,47.07,46.91,46.839999999999996,46.67999999999999,46.55,46.419999999999995,46.440000000000005,46.51,46.37,46.36,46.400000000000006,45.94,45.37,45.35,45.31,45.279999999999994,45.49,45.629999999999995,45.71,45.75,45.760000000000005,45.82000000000001,45.79,45.86000000000001,45.830000000000005,45.72,45.61,45.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
