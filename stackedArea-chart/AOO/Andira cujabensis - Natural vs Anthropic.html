<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.14,69.49999999999999,68.88999999999999,68.33,67.85999999999999,67.19999999999997,66.86,66.27,66.06,65.24,64.02999999999999,63.26999999999999,62.84999999999999,62.17999999999999,61.65,61.57,61.419999999999995,60.819999999999986,60.34000000000001,59.19999999999999,58.989999999999995,58.81999999999999,59.25999999999999,59.27,58.94,58.53000000000001,58.55,58.040000000000006,57.580000000000005,57.29,56.85,56.37,56.19,55.86999999999999,55.54,55.35000000000001,54.53,54.13],"color":"green"},{"name":"anthropic","data":[34.1,34.74,35.349999999999994,35.919999999999995,36.38,37.03000000000001,37.379999999999995,37.989999999999995,38.199999999999996,39.019999999999996,40.230000000000004,41.010000000000005,41.43,42.099999999999994,42.62,42.69,42.87,43.44,43.919999999999995,45.08,45.27,45.449999999999996,45.01,45.00000000000001,45.34,45.74999999999999,45.73,46.25,46.68999999999999,47.00999999999999,47.43,47.91,48.1,48.4,48.74,48.910000000000004,49.75,50.129999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
