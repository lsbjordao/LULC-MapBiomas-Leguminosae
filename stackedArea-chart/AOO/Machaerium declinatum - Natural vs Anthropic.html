<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.3,53.15999999999999,52.65999999999999,52.67,52.99000000000001,53.19,53.25,53.35999999999999,53.739999999999995,54.85999999999999,55.300000000000004,56.21,56.49000000000001,56.93,57.43,57.650000000000006,57.79000000000001,57.989999999999995,58.13,58.19,58.48,59.019999999999996,59.37000000000001,59.75,60.06,60.559999999999995,61.14,61.41,61.69,61.760000000000005,61.900000000000006,61.89,62.17,62.32,62.35000000000001,62.459999999999994,62.61,62.589999999999996],"color":"green"},{"name":"anthropic","data":[45.239999999999995,45.39999999999999,45.88999999999999,45.85,45.54,45.349999999999994,45.29,45.19,44.81,43.69,43.24,42.339999999999996,42.05,41.6,41.1,40.900000000000006,40.74000000000001,40.550000000000004,40.4,40.31999999999999,40.050000000000004,39.510000000000005,39.160000000000004,38.790000000000006,38.48,37.980000000000004,37.42,37.120000000000005,36.83,36.77,36.64,36.650000000000006,36.4,36.22,36.21,36.08,35.94,35.949999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
