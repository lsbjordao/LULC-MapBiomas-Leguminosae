<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.63999999999999,60.93,59.96,59.260000000000005,57.93999999999999,57.14999999999999,56.44,56.010000000000005,55.56999999999999,55.08,54.239999999999995,53.83,53.419999999999995,52.73,52.25,51.32999999999999,50.66,50.24,50.07,49.8,49.599999999999994,49.49,49.5,49.22,49.15,48.98,48.68000000000001,48.54999999999999,48.07999999999999,47.519999999999996,47.35999999999999,46.97999999999999,46.829999999999984,46.8,46.809999999999995,46.779999999999994,46.73,47.54],"color":"green"},{"name":"anthropic","data":[42.81999999999999,43.529999999999994,44.49999999999999,45.21,46.540000000000006,47.33,48.01,48.459999999999994,48.9,49.37999999999999,50.21999999999999,50.64000000000001,51.050000000000004,51.72,52.23,53.13000000000001,53.79,54.230000000000004,54.42,54.669999999999995,54.86000000000001,55.010000000000005,54.959999999999994,55.22999999999998,55.309999999999995,55.519999999999996,55.79,55.919999999999995,56.400000000000006,56.94,57.109999999999985,57.48,57.620000000000005,57.660000000000004,57.65000000000001,57.68,57.730000000000004,56.92000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
