<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.55,93.53999999999999,93.61,93.11999999999999,92.86999999999999,92.50000000000001,92.00999999999999,92.66,92.65,92.69,92.08999999999999,92.63000000000001,92.58,93.66,94.93,95.52999999999999,95.76,95.75,95.87,96.13,95.65,95.3,95.42,95.3,95,94.85,94.92,94.70000000000002,94.59,94.86,94.82000000000001,94.79,95.11,95.14999999999999,94.88000000000001,94.75999999999999,94.69999999999999,94.78],"color":"green"},{"name":"anthropic","data":[7.4799999999999995,7.5,7.41,7.9,8.17,8.52,9.01,8.38,8.379999999999999,8.35,8.93,8.39,8.440000000000001,7.369999999999999,6.1,5.5,5.29,5.3,5.1499999999999995,4.91,5.38,5.73,5.62,5.739999999999999,6.03,6.17,6.12,6.34,6.43,6.18,6.199999999999999,6.25,5.92,5.890000000000001,6.15,6.27,6.34,6.25],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
