<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.86,84.1,84.44999999999999,84.46000000000001,84.41000000000001,84.8,84.56,84.32,83.86999999999999,83.69000000000001,83.96,84.24,84.41,84.45,84.30000000000001,84.06,84.07,84.19,84.19999999999999,84.28,84.28,83.72000000000001,83.45,82.98,82.85,82.48000000000002,82.36,82.39,82.77000000000001,83.01,83.38,83.52,83.46000000000001,83.47999999999999,83.52,83.75999999999999,84.11999999999999,84.35000000000001],"color":"green"},{"name":"anthropic","data":[15.81,15.56,15.2,15.2,15.24,14.85,15.1,15.34,15.78,15.95,15.69,15.41,15.23,15.2,15.349999999999998,15.579999999999998,15.58,15.47,15.459999999999999,15.370000000000001,15.370000000000001,15.93,16.2,16.66,16.799999999999997,17.159999999999997,17.29,17.26,16.89,16.64,16.27,16.130000000000003,16.18,16.17,16.14,15.89,15.54,15.309999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
