<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.61,76.19000000000001,76.25000000000001,76.31,76.20000000000002,76.14,76.06,76.03,75.78,75.55,75.42,75.28,75.30000000000001,75.61,75.68,75.89,75.91,75.82000000000001,75.79,75.86000000000001,76.03,76.3,76.33,77.00999999999999,77.53,77.74000000000001,77.85000000000001,78.05000000000001,77.89,78.02000000000001,77.89,77.46000000000001,77.50999999999999,77.37,77.49,77.32000000000001,76.87,76.64999999999999],"color":"green"},{"name":"anthropic","data":[23.05,23.46,23.400000000000002,23.35,23.45,23.52,23.59,23.63,23.88,24.1,24.23,24.360000000000003,24.36,24.040000000000003,23.98,23.75,23.75,23.82,23.87,23.790000000000003,23.62,23.35,23.32,22.64,22.12,21.909999999999997,21.8,21.61,21.75,21.63,21.759999999999998,22.189999999999998,22.13,22.279999999999998,22.150000000000002,22.32,22.770000000000003,23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
