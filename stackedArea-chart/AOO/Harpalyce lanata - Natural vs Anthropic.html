<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.23,72.77,72.25000000000001,70.17,69.19999999999999,70.03,71.22000000000001,72.02,75.01,77.65999999999998,78.21999999999998,81.91000000000001,84.42999999999999,84.86000000000001,86.38,86.75000000000001,86.82000000000001,87.13000000000001,87.3,87.41000000000001,85.96000000000001,85.74,85.41000000000001,85.7,85.50999999999999,85.78999999999999,84.52,84.17999999999999,84.63000000000001,84.66,85.23,86.52,86.94999999999999,87.81,87.74,87.75,87.75999999999999,87.77],"color":"green"},{"name":"anthropic","data":[26.46,26.910000000000004,27.430000000000003,29.5,30.48,29.64,28.45,27.67,24.65,22,21.43,17.77,15.229999999999999,14.799999999999999,13.29,12.9,12.85,12.55,12.36,12.260000000000002,13.709999999999999,13.95,14.26,13.969999999999999,14.16,13.879999999999999,15.15,15.5,15.040000000000001,15.010000000000002,14.44,13.15,12.72,11.84,11.93,11.92,11.9,11.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
