<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.34,54.709999999999994,54.82,54.559999999999995,53.919999999999995,53.059999999999995,53.16,52.839999999999996,52.72999999999999,52.609999999999985,52.84,52.86000000000001,53.08,53.220000000000006,53.470000000000006,53.47,53.57,53.339999999999996,53.15999999999999,52.900000000000006,52.58,52.33999999999999,52.41999999999999,52.18000000000001,52.06999999999999,51.97,51.65,51.64,51.66999999999999,51.55999999999999,51.60999999999999,51.87999999999999,51.929999999999986,52.25999999999999,52.15,52.05,51.379999999999995,51.46999999999999],"color":"green"},{"name":"anthropic","data":[46.43,47.14,47.07,47.34,47.99,48.830000000000005,48.72,49.06000000000001,49.16000000000001,49.29,49.059999999999995,49.04,48.83999999999999,48.68,48.44,48.42,48.32000000000001,48.56999999999999,48.75,49.010000000000005,49.3,49.59999999999999,49.489999999999995,49.72000000000001,49.85000000000001,49.95000000000002,50.26000000000001,50.25999999999999,50.26,50.35,50.32,50.04999999999999,49.99000000000001,49.67000000000001,49.760000000000005,49.85,50.53000000000001,50.48],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
