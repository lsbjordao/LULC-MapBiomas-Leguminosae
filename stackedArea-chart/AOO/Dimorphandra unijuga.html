<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>

    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[72.87,72.89,72.83,72.83,72.82,72.83,72.74,72.72,72.71,72.73,72.73,72.71,72.74,72.72,72.71,72.84,72.85,72.84,72.87,72.85,72.83,72.83,72.83,72.84,72.84,72.84,72.86,72.87,72.91,72.91,72.9,72.9,72.9,72.89,72.91,72.92,72.88,72.8],"color":"#006400"},{"name":"Flooded forest","data":[14.39,14.34,14.03,14.24,14.3,14.3,14.18,14.22,14.22,14.23,14.25,14.31,14.31,14.18,14.14,14.38,14.52,14.52,14.51,14.47,14.46,14.46,14.44,14.48,14.49,14.48,14.49,14.46,14.46,14.44,14.42,14.37,14.35,14.34,14.34,14.36,14.36,14.16],"color":"#76A5AF"},{"name":"Wetland","data":[6.13,6.67,6.7,6.32,6.37,6.48,6.44,6.43,6.35,6.28,5.76,4.63,5.49,5.34,4.13,6.55,6.57,6.57,6.58,6.49,6.52,6.65,6.71,6.56,6.68,6.67,6.75,6.65,6.71,6.4,6.22,6.83,4.01,5.57,5.86,6.46,3.51,4.59],"color":"#45C2A5"},{"name":"Grassland","data":[3.88,3.29,3.38,3.63,3.62,3.53,3.52,3.54,3.49,3.56,3.31,3.2,3.49,3.48,3.24,3.39,3.51,3.37,3.49,3.46,3.52,3.27,3.3,3.4,3.39,3.37,3.29,3.37,3.33,3.69,3.9,3.31,3.22,3.11,2.86,3.5,2.59,3.37],"color":"#B8AF4F"},{"name":"Pasture","data":[0,0,0,0,0,0,0.06,0.09,0.09,0.06,0.06,0.07,0.09,0.2,0.21,0.15,0.09,0.08,0.08,0.08,0.08,0.08,0.08,0.07,0.06,0.07,0.07,0.06,0.04,0.04,0.04,0.03,0.03,0.03,0.03,0.04,0.06,0.18],"color":"#FFD966"},{"name":"River, lake and ocean","data":[2.28,2.37,2.62,2.55,2.45,2.43,2.63,2.57,2.71,2.7,3.45,4.63,3.45,3.64,5.13,2.26,2.02,2.18,2.04,2.2,2.16,2.28,2.21,2.21,2.1,2.13,2.11,2.15,2.11,2.08,2.07,2.12,5.05,3.62,3.56,2.29,6.16,4.47],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
