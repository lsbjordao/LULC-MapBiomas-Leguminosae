<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.44,54.58999999999999,53.400000000000006,52.35000000000001,51.15,50.73,50.71,50.4,50.10999999999999,50.199999999999996,50.78999999999999,50.98999999999999,51.239999999999995,50.52,49.43000000000001,48.410000000000004,47.8,47.50999999999999,47.25,47.39,47.54,47.919999999999995,48.07,48.17,48.24000000000001,48.339999999999996,48.419999999999995,48.48999999999999,48.370000000000005,48.15,48.33,49,48.82999999999999,49.14000000000001,49.19,49.239999999999995,49.23,49.27000000000001],"color":"green"},{"name":"anthropic","data":[45.86,46.73,47.970000000000006,49.03000000000001,50.23000000000001,50.64000000000001,50.65,50.96000000000001,51.260000000000005,51.160000000000004,50.53,50.330000000000005,50.09,50.800000000000004,51.900000000000006,52.94000000000001,53.55000000000002,53.84000000000001,54.08,53.940000000000005,53.80000000000002,53.400000000000006,53.25,53.160000000000004,53.07,53.00000000000001,52.94,52.89000000000001,53.01,53.22,53.03,52.379999999999995,52.53,52.21,52.23,52.2,52.21,52.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
