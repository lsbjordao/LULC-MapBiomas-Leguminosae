<!DOCTYPE html>
<html lang="en">

<head>

<body>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[67.18,65.68,64.4,63.16,63.08,64.73,64.97,63.83,63.88,65.45,65.62,65.05,64.93,66.09,65.96,66.37,66.42,66.71,66.28,66.28,66.34,66.01,66.25,66.73,66.58,66.92,67.08,67.44,68,67.96,68,68.04,68.36,69.37,69.65,69.61,69.5,69.66],"color":"#006400"},{"name":"Flooded forest","data":[3.51,3.13,3,2.89,2.91,3.19,3.26,2.83,2.78,2.9,2.99,2.84,2.95,3.01,2.77,2.75,2.71,3.03,3.3,3.44,3.5,3.41,3.45,3.47,3.48,3.53,3.54,3.62,3.64,3.7,3.72,3.72,3.75,3.81,3.79,3.75,3.74,3.89],"color":"#76A5AF"},{"name":"Wetland","data":[1.25,1.1,1.71,1.47,1.34,1.38,1.54,2.52,1.74,1.8,1.87,1.55,1.79,1.5,1.51,1.81,2.11,1.99,1.83,1.92,1.68,1.63,1.61,1.54,1.94,1.7,1.58,1.74,1.69,1.63,1.87,1.51,1.51,1.6,1.63,1.71,1.68,1.12],"color":"#45C2A5"},{"name":"Grassland","data":[0.65,0.66,0.75,0.73,0.42,0.34,0.35,0.56,0.38,0.39,0.39,0.37,0.49,0.39,0.28,0.37,0.44,0.37,0.32,0.29,0.29,0.29,0.25,0.25,0.29,0.27,0.26,0.34,0.33,0.36,0.4,0.55,0.51,0.41,0.38,0.42,0.38,0.4],"color":"#B8AF4F"},{"name":"Pasture","data":[5.29,7.03,8.4,9.63,9.42,7.6,7.38,8.65,8.52,6.93,6.84,7.61,7.98,6.8,6.84,6.9,7,6.5,6.78,6.8,6.62,6.99,6.66,6.19,6.38,5.94,5.81,5.48,4.92,4.91,4.87,4.84,4.52,3.51,3.17,3.18,3.13,3.25],"color":"#FFD966"},{"name":"Urban area","data":[4.15,4.22,4.22,4.25,4.56,4.75,4.76,4.75,4.76,4.76,4.74,4.74,4.74,4.74,4.75,4.76,4.78,4.77,4.77,4.78,4.77,4.77,4.77,4.77,4.77,4.78,4.77,4.77,4.76,4.77,4.78,4.76,4.76,4.76,4.76,4.76,4.77,4.78],"color":"#aa0000"},{"name":"Mining","data":[4.08,4.16,4.18,4.29,4.2,4.21,4.29,4.3,4.28,4.37,4.33,4.31,4.39,4.32,4.32,4.39,4.38,4.45,4.38,4.39,4.38,4.36,4.32,4.29,4.3,4.3,4.32,4.32,4.32,4.34,4.34,4.33,4.33,4.34,4.34,4.34,4.34,4.33],"color":"#af2a2a"},{"name":"River, lake and ocean","data":[13.98,14.12,13.44,13.69,14.16,13.9,13.56,12.65,13.75,13.48,13.32,13.63,12.84,13.26,13.68,12.76,12.25,12.28,12.43,12.2,12.5,12.64,12.79,12.86,12.35,12.64,12.74,12.39,12.43,12.43,12.12,12.34,12.35,12.29,12.39,12.34,12.56,12.66],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
