<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[4.2,3.96,3.96,3.96,3.98,4.05,4.07,4.09,4.14,4.09,4.11,4.31,4.41,4.43,4.42,4.4,4.33,4.3,4.32,4.24,4.21,4.03,4.01,3.9,3.9,3.99,4.01,4,3.94,3.98,4.09,4.13,4.2,4.23,4.24,4.25,4.25,4.26],"color":"#006400"},{"name":"Savanna formation","data":[23.2,23.32,23.21,23.19,23.14,23,22.93,23,22.92,23.01,23.28,23.12,23.08,23.05,23.17,23.23,23,22.98,22.92,22.11,22.1,22.04,22.06,22.06,22.04,22.1,21.93,21.91,21.87,21.84,21.72,21.66,21.58,21.57,21.6,21.52,21.45,21.66],"color":"#00ff00"},{"name":"Wetland","data":[2.21,2.21,2.24,2.24,2.23,2.22,2.17,2.13,2.13,2.07,2.13,2.11,2.13,2.1,2,2.01,1.97,1.99,2.02,1.99,1.99,2.14,2.13,2.15,2.2,2.03,2.1,2.18,2.23,2.18,2.21,2.22,2.22,2.26,2.28,2.3,2.37,2.4],"color":"#45C2A5"},{"name":"Grassland","data":[19.32,19.5,19.57,19.52,19.47,19.54,19.64,19.59,19.46,19.46,19.12,19.11,19.03,19.06,19.24,19.35,19.68,19.72,19.74,20.66,20.72,20.8,20.81,20.89,20.87,20.88,20.97,20.92,20.98,21.02,20.99,20.99,21.01,20.95,20.88,20.92,20.92,20.67],"color":"#B8AF4F"},{"name":"Mosaic of uses","data":[0.94,0.89,0.89,0.96,1.05,1.06,1.06,1.06,1.22,1.23,1.23,1.23,1.23,1.23,1.05,0.89,0.89,0.89,0.88,0.88,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.88,0.88,0.88,0.88],"color":"#fff3bf"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
