<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.160000000000004,49.129999999999995,48.790000000000006,48.39,48.300000000000004,48.41000000000001,48.38,48.410000000000004,49.059999999999995,49.870000000000005,50.120000000000005,50.370000000000005,50.42000000000001,50.53999999999999,50.72,50.669999999999995,50.72,50.77,51.03000000000001,51.2,51.300000000000004,51.51,51.72,51.75000000000001,51.949999999999996,52.269999999999996,52.379999999999995,52.44,52.43000000000001,52.60000000000001,52.86,52.93000000000001,53.11000000000001,53.330000000000005,53.510000000000005,53.699999999999996,53.81,53.959999999999994],"color":"green"},{"name":"anthropic","data":[44.5,44.67999999999999,45.099999999999994,45.529999999999994,45.60999999999999,45.480000000000004,45.43,45.39000000000001,44.790000000000006,44.160000000000004,43.96000000000001,43.690000000000005,43.54,43.4,43.129999999999995,43.120000000000005,43.07,43.02,42.730000000000004,42.46999999999999,42.3,42.06,41.8,41.690000000000005,41.56,41.44,41.37,41.239999999999995,41.230000000000004,41.16,40.94,40.89,40.71,40.459999999999994,40.03000000000001,39.790000000000006,39.660000000000004,39.540000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
