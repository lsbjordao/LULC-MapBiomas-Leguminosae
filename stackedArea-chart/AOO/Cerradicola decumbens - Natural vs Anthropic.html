<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.9,34.769999999999996,34.47,34.17,33.38,32.879999999999995,31.97,31.29,30.710000000000004,30.089999999999996,29.529999999999998,29.349999999999998,29.139999999999997,29,28.79,28.599999999999998,28.529999999999998,28.38,28.299999999999997,28.479999999999997,28.64,28.779999999999998,28.85,28.84,28.83,29.06,28.950000000000003,28.87,28.84,28.889999999999997,28.980000000000004,28.970000000000002,28.95,29.060000000000002,29.11,29.129999999999995,29.25,29.589999999999996],"color":"green"},{"name":"anthropic","data":[67.49000000000001,68.62,68.9,69.22,70.01,70.53,71.41,72.1,72.68,73.29,73.83999999999999,74.06,74.25999999999998,74.38999999999999,74.58999999999997,74.77999999999999,74.85999999999999,75.01,75.08,74.91000000000001,74.73,74.60000000000001,74.55,74.55000000000003,74.56000000000003,74.32000000000001,74.45,74.53000000000002,74.55000000000001,74.47999999999999,74.41,74.41999999999999,74.41000000000001,74.33,74.28000000000002,74.28,74.17000000000002,73.80000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
