<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.41,66.13000000000001,65.89,65.97,67.2,67.53,67.26999999999998,68.07,68.50999999999999,68.74000000000001,68.88000000000001,69.80000000000001,70.17,70.39000000000001,70.30999999999999,70.48999999999998,70.54,70.62,70.84000000000002,70.81,70.97,70.52999999999999,70.4,70.36999999999999,70.38999999999999,70.5,70.53,70.87,71.2,71.53999999999999,71.58999999999999,71.64999999999999,71.92999999999999,72.03,71.96,71.94000000000001,72.88999999999999,72.82],"color":"green"},{"name":"anthropic","data":[33.42,33.7,33.94,33.849999999999994,32.63,32.3,32.54,31.77,31.310000000000002,31.09,30.95,30.009999999999998,29.67,29.45,29.509999999999998,29.33,29.29,29.200000000000003,28.990000000000002,29.009999999999998,28.86,29.3,29.43,29.439999999999998,29.43,29.310000000000002,29.3,28.94,28.63,28.27,28.240000000000002,28.17,27.89,27.79,27.87,27.87,26.939999999999998,27.009999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
