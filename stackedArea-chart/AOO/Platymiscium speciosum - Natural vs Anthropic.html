<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.39999999999999,75.52000000000001,75.18999999999998,74.75999999999996,73.94,73.39999999999999,72.59,72.55,73.32,74.46000000000002,74.87,74.88,73.98,73.86,74.08,73.78999999999999,74.05,74.48000000000002,74.79,74.67,74.86,75.03999999999998,75.96000000000002,76.53,76.88999999999999,77.06000000000003,77.03,76.88000000000002,76.79,76.69999999999999,76.69000000000001,76.49999999999999,76.21,76.24,76.25999999999999,76.54999999999998,77.00999999999998,77.37],"color":"green"},{"name":"anthropic","data":[19.94,20.94,21.37,21.720000000000002,22.41,22.88,23.7,23.740000000000002,22.99,22.380000000000003,22.2,22.150000000000002,22.44,22.500000000000004,22.280000000000005,22.55,22.3,21.91,21.73,21.860000000000003,21.720000000000002,21.540000000000003,20.790000000000003,20.53,20.240000000000002,20.080000000000002,20.1,20.2,20.31,20.43,20.509999999999998,20.73,20.9,20.88,20.909999999999997,20.62,20.17,19.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
