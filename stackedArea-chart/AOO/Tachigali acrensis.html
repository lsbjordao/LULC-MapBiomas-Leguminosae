<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[98.64,98.61,98.58,98.31,98.33,98.51,98.66,98.43,98.12,98.05,97.81,97.05,96.81,97.02,96.51,96.49,96.64,96.58,96.74,96.8,96.6,96.35,96.35,96.32,96.14,95.82,95.56,95.32,95.39,95.67,95.82,95.5,95.47,95.44,95.16,94.89,94.72,94.22],"color":"#006400"},{"name":"Wetland","data":[0,0,0.01,0.01,0.01,0,0,0.04,0,0,0,0.01,0.01,0,0,0,0,0.01,0.01,0,0,0,0,0,0,0,0,0.01,0,0,0.04,0.02,0.01,0,0,0.01,0,0],"color":"#45C2A5"},{"name":"Grassland","data":[0.11,0.19,0.13,0.06,0.06,0.23,0.2,0.01,0.06,0.04,0.09,0.29,0.35,0.08,0,0,0.03,0.04,0.01,0,0.07,0.14,0.12,0,0.01,0,0.01,0.01,0.04,0.03,0,0.07,0.04,0.03,0.04,0.02,0.07,0.02],"color":"#B8AF4F"},{"name":"Pasture","data":[0.67,0.54,0.58,0.94,0.93,0.54,0.42,0.73,1.18,1.26,1.45,2.01,2.14,2.28,2.86,2.88,2.74,2.78,2.59,2.55,2.74,2.95,2.99,3.06,3.23,3.55,3.85,4.09,3.97,3.71,3.5,3.79,3.86,3.93,4.22,4.42,4.7,5.13],"color":"#FFD966"},{"name":"River, lake and ocean","data":[0.18,0.24,0.3,0.28,0.27,0.31,0.31,0.38,0.23,0.24,0.24,0.24,0.29,0.22,0.23,0.23,0.18,0.18,0.26,0.24,0.18,0.15,0.14,0.21,0.2,0.23,0.17,0.16,0.19,0.19,0.24,0.22,0.21,0.19,0.17,0.25,0.11,0.22],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
