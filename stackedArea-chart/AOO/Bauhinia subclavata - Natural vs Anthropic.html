<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.18999999999999,51.33,50.699999999999996,50.24,49.87,49.8,48.839999999999996,48.690000000000005,48.43999999999999,49.21000000000001,49.29,49.57,50.18,49.88,49.49,48.86,48.49,48.18,47.919999999999995,48.019999999999996,47.82,47.89,47.800000000000004,48.199999999999996,47.81,46.84,46.48,45.17999999999999,44.78,44.44,44.360000000000014,44.81,44.599999999999994,45.209999999999994,44.989999999999995,44.589999999999996,44.43,44.470000000000006],"color":"green"},{"name":"anthropic","data":[48.879999999999995,49.73,50.34,50.8,51.169999999999995,51.26,52.24,52.36,52.620000000000005,51.87,51.77,51.49,50.87,51.19,51.56999999999999,52.17999999999999,52.57,52.87,53.14000000000001,53.02,53.23,53.16,53.26,52.85,53.23,54.21,54.56,55.879999999999995,56.26,56.61000000000001,56.68,56.25999999999999,56.46,55.85,56.050000000000004,56.46000000000001,56.620000000000005,56.58999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
