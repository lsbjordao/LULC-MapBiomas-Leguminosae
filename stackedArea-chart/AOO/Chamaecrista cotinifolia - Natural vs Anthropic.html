<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.589999999999996,54.52,54.540000000000006,53.99,53.53,53.24999999999999,52.68,52.14,51.62,50.82,50.349999999999994,50.190000000000005,50.11000000000001,50.089999999999996,49.900000000000006,49.43000000000001,49.49999999999999,49.14,48.98,49.03999999999999,49.06999999999999,49.06,49.19,49.440000000000005,49.67,49.44,49.379999999999995,49.21999999999999,49.02,49.01,48.92,48.81000000000001,48.85000000000001,48.78,48.629999999999995,48.31,48.23,48.089999999999996],"color":"green"},{"name":"anthropic","data":[45.86000000000001,46.91,46.9,47.449999999999996,47.910000000000004,48.199999999999996,48.76,49.309999999999995,49.82,50.62,51.11,51.26,51.330000000000005,51.36,51.559999999999995,52,51.970000000000006,52.300000000000004,52.46999999999999,52.400000000000006,52.37,52.38,52.27,52.02,51.78,52.010000000000005,52.05,52.22999999999999,52.419999999999995,52.44,52.53,52.629999999999995,52.580000000000005,52.67,52.81,53.12,53.209999999999994,53.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
