<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.11999999999998,88.40000000000003,88.64,89.9,89.16999999999999,89.9,90.4,90.43,90.72,91.39999999999999,91.50999999999999,90.73999999999998,90.2,90.18,90.13,89.52,88.97999999999998,88.36000000000001,88.17999999999999,87.58999999999999,86.66999999999999,86.34000000000002,86.29,86.4,86.35999999999999,86.52999999999999,86.33,86.14999999999999,86.25999999999999,86.27000000000001,85.85000000000001,85.88000000000001,86.03000000000002,86.15,85.97,85.57000000000001,85.34000000000002,84.9],"color":"green"},{"name":"anthropic","data":[15.19,14.919999999999998,14.67,13.4,14.15,13.42,12.910000000000002,12.88,12.6,11.91,11.790000000000001,12.57,13.13,13.15,13.19,13.790000000000001,14.360000000000001,14.959999999999999,15.139999999999999,15.72,16.63,16.97,17.04,16.92,16.94,16.779999999999998,16.979999999999997,17.16,17.05,17.04,17.47,17.43,17.29,17.15,17.330000000000002,17.74,17.97,18.41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
