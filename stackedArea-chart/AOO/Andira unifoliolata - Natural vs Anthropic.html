<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.98000000000002,85.61,84.94,85.32000000000001,84.85999999999999,85.21,85.66,85.48,85.38,85.35999999999999,85.62,85.23,85.2,85.48,85.28,86.18,86.46000000000001,86.41000000000001,87.2,87.91,88.33000000000001,88.15,88.46,88.78,88.83,89.06,89.27,89.50000000000001,89.34,89.6,89.70000000000002,89.82000000000001,89.95000000000002,90.13000000000001,90.52000000000001,90.61,91.04000000000002,90.10000000000001],"color":"green"},{"name":"anthropic","data":[14.56,14.95,15.620000000000001,15.239999999999998,15.700000000000001,15.34,14.889999999999999,15.07,15.169999999999998,15.190000000000001,14.920000000000002,15.32,15.37,15.07,15.27,14.38,14.09,14.149999999999999,13.35,12.65,12.22,12.39,12.090000000000002,11.759999999999998,11.73,11.489999999999998,11.290000000000001,11.05,11.22,10.950000000000001,10.860000000000001,10.73,10.6,10.430000000000001,10.01,9.930000000000001,9.510000000000002,10.450000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
