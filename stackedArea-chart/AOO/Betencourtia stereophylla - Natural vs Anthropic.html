<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.92999999999999,70.30999999999999,70.11,69.41,67.97999999999999,67.53,67.03999999999999,66.33,66.03000000000002,65.54,65.5,65.77,65.47,65.2,64.81,63.86,63.04,62.32,61.370000000000005,60.730000000000004,60.47,60.36000000000001,60.24,59.940000000000005,59.96000000000001,59.989999999999995,59.88,59.28999999999999,59.32,58.88,58.599999999999994,58.510000000000005,58.39,58.17,57.980000000000004,57.78,57.66,58.010000000000005],"color":"green"},{"name":"anthropic","data":[29.310000000000006,29.9,30.12,30.81,32.239999999999995,32.699999999999996,33.190000000000005,33.91,34.209999999999994,34.67999999999999,34.739999999999995,34.480000000000004,34.76,35.03999999999999,35.42,36.38,37.199999999999996,37.910000000000004,38.870000000000005,39.49,39.760000000000005,39.89,39.980000000000004,40.290000000000006,40.28,40.23,40.34000000000001,40.93,40.91,41.339999999999996,41.63,41.72,41.85999999999999,42.07,42.269999999999996,42.45,42.580000000000005,42.260000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
