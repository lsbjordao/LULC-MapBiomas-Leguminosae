<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.51,98.24,97.92999999999999,97.83,97.89,98.16000000000001,97.78,97.48,97.15,96.63,96.22999999999999,95.94,95.52000000000001,95.19999999999999,95.03,95.25,95.43,95.39,95.24,95,94.67,94.51,94.51,94.58000000000001,94.51,94.60000000000001,94.62,94.69000000000001,94.71,94.57000000000001,94.55000000000001,94.46,94.5,94.82999999999998,94.85999999999999,94.72,93.19999999999999,92.91999999999999],"color":"green"},{"name":"anthropic","data":[1.46,1.73,2.04,2.16,2.09,1.82,2.19,2.5,2.83,3.35,3.75,4.0600000000000005,4.46,4.77,4.94,4.71,4.56,4.6,4.73,4.97,5.3100000000000005,5.46,5.470000000000001,5.390000000000001,5.46,5.390000000000001,5.36,5.28,5.2700000000000005,5.41,5.42,5.52,5.470000000000001,5.13,5.12,5.26,6.760000000000001,7.0600000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
