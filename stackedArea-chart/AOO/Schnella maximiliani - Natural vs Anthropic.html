<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.11999999999999,76.52000000000001,75.75000000000001,73.73000000000002,72.08,71.22999999999999,71.33000000000001,72.10000000000001,72.82,73.3,73.11999999999999,73.89999999999999,73.6,73.07,72.61,72.41000000000001,73.21,73.21,74.16000000000001,74.6,73.94000000000001,73.58000000000001,73.13000000000001,72.49000000000001,72.05000000000001,71.85,71.6,71.51,71.13000000000001,70.83,71.04999999999998,71.08,70.97999999999999,71.66999999999999,72.1,71.98,72.8,72.84],"color":"green"},{"name":"anthropic","data":[28.490000000000002,29.11,29.869999999999997,31.88,33.53,34.37,34.3,33.51,32.81,32.33,32.5,31.7,32.01,32.54,33.01,33.199999999999996,32.4,32.410000000000004,31.45,31.02,31.669999999999995,32.03,32.48,33.12,33.580000000000005,33.76,34.02,34.10000000000001,34.480000000000004,34.790000000000006,34.57,34.53,34.620000000000005,33.949999999999996,33.53,33.61,32.81999999999999,32.779999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
