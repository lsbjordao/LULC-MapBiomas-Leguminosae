<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.47,55.94,55.74,55.33,54.709999999999994,54.31999999999999,53.69,53.13999999999999,52.86000000000001,51.90999999999999,50.940000000000005,49.74,48.93000000000001,48.34,47.900000000000006,47.480000000000004,47.22,46.93,46.339999999999996,46.15999999999999,45.96000000000001,45.77,45.48,45.32,45.35000000000001,44.800000000000004,44.63,44.09,43.099999999999994,42.660000000000004,42.519999999999996,42.67,42.879999999999995,42.61,42.2,41.78,41.25,41.46],"color":"green"},{"name":"anthropic","data":[43.4,44.94,45.12,45.53000000000001,46.15,46.550000000000004,47.190000000000005,47.75,48.02000000000001,48.97,49.92,51.129999999999995,51.92,52.540000000000006,52.970000000000006,53.39000000000001,53.660000000000004,53.93000000000001,54.54,54.71,54.9,55.11,55.39,55.55,55.519999999999996,56.07,56.23,56.78,57.779999999999994,58.2,58.339999999999996,58.19,57.989999999999995,58.27,58.669999999999995,59.080000000000005,59.629999999999995,59.42],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
