<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.61999999999999,73.51000000000002,73.3,72.71000000000001,72.28000000000002,72.08,72.13000000000001,72.05000000000001,72.50000000000001,73.05,72.79,73.31,73.67999999999998,74.22999999999999,74.57,74.85,74.84,74.76,74.34000000000002,74.22,74.11,74.13,74.15999999999998,74.41999999999999,74.53,74.78,74.58,74.13,73.77999999999999,73.63,73.79,73.51999999999998,73.5,73.53,73.55999999999999,73.53,73.49000000000002,73.68999999999998],"color":"green"},{"name":"anthropic","data":[29.400000000000002,29.519999999999996,29.73,30.320000000000004,30.74000000000001,30.94,30.890000000000004,30.99,30.550000000000004,29.970000000000006,30.22,29.740000000000002,29.349999999999998,28.8,28.470000000000002,28.200000000000003,28.2,28.28,28.680000000000003,28.819999999999997,28.93,28.889999999999997,28.869999999999997,28.619999999999997,28.509999999999998,28.26,28.439999999999994,28.929999999999996,29.25,29.43,29.26,29.529999999999994,29.54,29.5,29.46,29.49,29.53,29.330000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
