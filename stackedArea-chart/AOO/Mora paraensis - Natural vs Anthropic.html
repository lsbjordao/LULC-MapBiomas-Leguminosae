<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.72,94.05999999999999,93.39999999999999,93.44999999999999,93.34,93.53,93.83,93.08,92.81,93.38,93.66000000000001,93.44,93.28,93.13,92.95,92.89999999999999,93.52999999999999,93.52000000000001,93.61,92.92999999999999,92.92000000000002,92.69,92.52,92.31,92.07000000000001,92.17999999999999,92.14000000000001,91.97,91.16,90.88,90.33,87.88000000000001,87.13,87.49,88.13000000000001,88.04,87.86999999999999,87.76],"color":"green"},{"name":"anthropic","data":[6.0200000000000005,5.6899999999999995,6.34,6.3100000000000005,6.4,6.220000000000001,5.91,6.65,6.9399999999999995,6.36,6.07,6.3100000000000005,6.46,6.609999999999999,6.800000000000001,6.84,6.21,6.21,6.15,6.8100000000000005,6.83,7.06,7.2299999999999995,7.42,7.69,7.57,7.609999999999999,7.78,8.58,8.870000000000001,9.42,11.87,12.6,12.25,11.600000000000001,11.7,11.879999999999999,11.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
