<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.06,85.06,85.58999999999999,86.2,86.15,86.48,86.75,86.22000000000001,86.21000000000001,87.14,87.63999999999999,86.44,85.97,85.82,85.71000000000001,87.11999999999999,86.95,86.88,86.76,86.88,87.05,87.06,87.35999999999999,87.84,87.60999999999999,87.63,87.66,88.15,88.35000000000001,88.57999999999998,88.49000000000001,88.44,88.63,88.62,88.76,88.7,89.3,88.75999999999999],"color":"green"},{"name":"anthropic","data":[14.540000000000001,14.549999999999999,14.01,13.4,13.440000000000001,13.13,12.84,13.39,13.379999999999999,12.459999999999999,11.95,13.16,13.64,13.780000000000001,13.89,12.48,12.66,12.71,12.84,12.71,12.55,12.530000000000001,12.239999999999998,11.76,11.99,11.969999999999999,11.940000000000001,11.45,11.23,11.02,11.11,11.16,10.969999999999999,10.98,10.83,10.89,10.29,10.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
