<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.75,87.19999999999999,86.33,86.10000000000001,85.80000000000001,86.54,86.9,86.11,86.12,86.83999999999999,86.97000000000001,86.29,85.65000000000002,85.53,85.22999999999999,85.65,86.00999999999999,86.47999999999999,86.4,86.73999999999998,87.19,87.02,87.05000000000001,87.21,87.06,87.32000000000001,87.69,87.97999999999999,88.44,88.49000000000001,88.79,90.32000000000001,90.64999999999999,91.12000000000002,91.55,91.51,92.38,89.69],"color":"green"},{"name":"anthropic","data":[12.74,13.3,14.170000000000002,14.39,14.7,13.959999999999999,13.59,14.379999999999999,14.379999999999999,13.66,13.51,14.21,14.85,14.969999999999999,15.27,14.84,14.479999999999999,14.01,14.100000000000001,13.75,13.31,13.48,13.450000000000001,13.290000000000001,13.440000000000001,13.180000000000001,12.81,12.51,12.07,12.010000000000002,11.71,10.190000000000001,9.850000000000001,9.38,8.940000000000001,9,8.12,10.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
