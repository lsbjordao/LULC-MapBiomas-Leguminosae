<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.41000000000001,93.89,93.87,92.48,89.64000000000001,89.36,89.56,90.07000000000001,90.37,90.94999999999999,90.97000000000001,90.24000000000001,90.88000000000001,90.67,90.82,91.7,91.53000000000002,91.46000000000001,92.39,92.56,92.67000000000002,92.50000000000001,92.79,93.22999999999999,93.2,93.67,94.22,94.85000000000001,95.33,95.34,95.15,94.90000000000002,94.52000000000001,94.32000000000001,94.19,93.85000000000001,93.72999999999999,92.73],"color":"green"},{"name":"anthropic","data":[6.17,5.6899999999999995,5.71,7.1000000000000005,9.93,10.209999999999999,10.02,9.51,9.209999999999999,8.629999999999999,8.6,9.33,8.69,8.899999999999999,8.76,7.88,8.04,8.1,7.180000000000001,7.010000000000001,6.9,7.08,6.79,6.3500000000000005,6.39,5.909999999999999,5.359999999999999,4.7299999999999995,4.26,4.24,4.4399999999999995,4.6899999999999995,5.05,5.25,5.38,5.7299999999999995,5.85,6.86],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
