<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.43,52.44,52.04,51.51000000000001,51.46000000000001,51.43000000000001,51.650000000000006,51.650000000000006,52.370000000000005,52.84000000000001,53.28,53.93000000000001,54.44,54.72000000000001,54.86000000000001,54.84000000000001,54.99,55.2,55.71000000000001,55.89,56.05000000000001,56.25000000000001,56.470000000000006,56.949999999999996,57.160000000000004,57.400000000000006,57.61,57.870000000000005,57.97,58.21,58.419999999999995,58.58,58.73,59.150000000000006,59.62999999999999,59.89,59.9,60.099999999999994],"color":"green"},{"name":"anthropic","data":[47.14999999999999,47.19,47.660000000000004,48.2,48.290000000000006,48.31,48.08,48.06,47.35,46.870000000000005,46.42,45.8,45.25999999999999,44.99999999999999,44.84,44.89000000000001,44.730000000000004,44.529999999999994,44.019999999999996,43.879999999999995,43.69000000000001,43.49,43.28,42.8,42.58000000000001,42.35,42.120000000000005,41.89000000000001,41.790000000000006,41.56,41.37,41.21999999999999,41.099999999999994,40.69000000000001,40.17,40,39.95,39.720000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
