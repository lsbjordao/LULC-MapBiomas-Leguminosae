<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.05,97.12,97.02000000000001,97.05,97.01000000000002,96.95,96.88,96.89,96.71,96.59,96.37,96.42,96.49,96.48,96.43,96.48,96.41000000000001,96.36000000000001,96.25,96.23,95.96000000000001,95.69,95.47999999999999,95.27000000000001,95.04,94.88000000000001,94.82,94.76,94.68,94.64000000000001,94.67,94.67,94.72000000000001,94.73,94.72999999999999,94.86000000000001,94.94,95],"color":"green"},{"name":"anthropic","data":[2.6,2.55,2.64,2.62,2.64,2.71,2.78,2.78,2.96,3.0799999999999996,3.28,3.2399999999999998,3.16,3.1799999999999993,3.2199999999999998,3.18,3.2599999999999993,3.2899999999999996,3.3999999999999995,3.4400000000000004,3.6900000000000004,3.9799999999999995,4.18,4.390000000000001,4.62,4.7700000000000005,4.8500000000000005,4.9,4.97,5.01,4.99,4.98,4.95,4.94,4.930000000000001,4.800000000000002,4.700000000000001,4.660000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
