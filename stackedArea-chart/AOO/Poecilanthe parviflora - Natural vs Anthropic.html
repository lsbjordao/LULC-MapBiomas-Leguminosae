<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.34,52.32,52.27,51.830000000000005,51.940000000000005,52.08000000000001,52.22,52.39,52.2,52.91,52.95000000000001,53.32,53.41000000000001,54.3,54.730000000000004,54.559999999999995,54.55,54.010000000000005,54.11,54.63,54.59,54.970000000000006,55.68,55.900000000000006,55.84000000000001,56.760000000000005,56.830000000000005,57.300000000000004,57.75000000000001,58.12000000000001,58.70000000000001,59.260000000000005,59.400000000000006,59.45,59.199999999999996,59.13000000000001,59.53,59.75],"color":"green"},{"name":"anthropic","data":[58.629999999999995,58.67,58.72999999999999,59.15,59.06,58.91,58.75000000000001,58.59,58.7,58.029999999999994,58.02999999999999,57.66,57.57,56.68999999999999,56.24,56.42999999999999,56.419999999999995,56.660000000000004,56.86000000000001,56.31,56.37,55.989999999999995,55.32999999999999,55.07,55.160000000000004,54.28,54.17,53.74,53.28999999999999,52.94,52.31999999999999,51.76,51.60999999999999,51.54,51.81,51.849999999999994,51.46,51.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
