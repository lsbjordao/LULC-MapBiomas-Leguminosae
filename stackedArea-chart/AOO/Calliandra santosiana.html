<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>

        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[18.6,18.06,17.86,16.6,16.67,16.43,16.37,16.34,16.37,17.15,17.58,17.39,17.42,18.02,17.55,17.57,17.31,16.89,16.97,16.39,16.97,16.87,16.94,19.3,19.15,19.48,19.46,19.42,19.33,19.38,19.41,19.32,19.53,19.51,19.5,19.37,19.29,18.44],"color":"#006400"},{"name":"Savanna formation","data":[43.96,44.49,44.74,46,45.89,46.06,45.86,45.68,45.7,44.99,44.7,45,45,44.31,44.78,44.77,45.1,45.46,45.39,46.02,45.43,45.44,45.37,43.09,43.24,42.94,42.96,42.97,43.06,43.11,43.06,43.08,42.85,42.88,42.88,43.01,43.11,43.85],"color":"#00ff00"},{"name":"Grassland","data":[0.26,0.27,0.27,0.27,0.27,0.24,0.24,0.24,0.24,0.24,0.24,0.24,0.24,0.26,0.26,0.26,0.26,0.27,0.27,0.27,0.27,0.26,0.26,0.26,0.26,0.26,0.24,0.24,0.24,0.24,0.26,0.26,0.26,0.26,0.26,0.26,0.26,0.26],"color":"#B8AF4F"},{"name":"Pasture","data":[0.86,0.87,0.87,0.87,0.91,0.91,0.9,0.9,0.86,0.84,0.84,0.84,0.84,0.86,0.86,0.86,0.86,0.89,0.89,0.86,0.86,0.86,0.86,0.86,0.86,0.87,0.87,0.87,0.87,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.86,0.91],"color":"#FFD966"},{"name":"Mosaic of uses","data":[1.15,1.15,1.11,1.11,1.11,1.2,1.49,1.68,1.68,1.61,1.47,1.36,1.31,1.38,1.38,1.38,1.31,1.33,1.31,1.29,1.3,1.41,1.41,1.34,1.34,1.31,1.32,1.32,1.32,1.24,1.24,1.31,1.33,1.32,1.33,1.33,1.33,1.4],"color":"#fff3bf"},{"name":"Rocky outcrop","data":[34.87,34.87,34.85,34.85,34.85,34.85,34.84,34.85,34.85,34.87,34.87,34.86,34.88,34.88,34.87,34.86,34.86,34.86,34.87,34.87,34.87,34.87,34.86,34.85,34.85,34.85,34.84,34.87,34.87,34.87,34.87,34.87,34.87,34.87,34.87,34.87,34.85,34.84],"color":"#665a3a"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
