<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.98,81.77,80.29,79.89000000000001,79.53000000000002,78.74,77.91000000000001,77.51,77.08,76.84,76.46000000000002,76.36,76.31,75.85,75.65999999999998,75.17999999999999,74.49,74.2,74.03999999999999,74.02,74.08,73.99000000000001,73.39000000000001,73.36,73.99,74.05,74.03,73.97000000000001,73.71000000000001,73.23,72.96000000000001,72.96,72.89999999999999,72.66,72.34999999999998,72.17999999999999,72.03,72.79999999999998],"color":"green"},{"name":"anthropic","data":[18.21,19.450000000000006,20.909999999999997,21.32,21.709999999999997,22.48,23.299999999999994,23.689999999999998,24.150000000000002,24.37,24.77,24.86,24.91,25.349999999999998,25.56,26.03,26.72,27,27.169999999999998,27.19,27.15,27.22,27.830000000000002,27.83,27.23,27.189999999999998,27.189999999999998,27.25,27.51,27.990000000000002,28.27,28.26,28.310000000000002,28.54,28.85,29.05,29.18,28.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
