<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.25999999999999,94.05000000000001,93.02000000000001,92.44,92.18,92.88000000000001,92.97000000000001,92.94,92.9,92.50000000000001,92.62,92.64999999999999,91.65999999999998,91.39000000000001,90.72000000000001,91.37,91.64,92.35,93.04,93.39000000000001,92.96,92.41999999999999,92.37,92.83,93.01000000000002,92.83,93.09,93.67,93.99999999999999,93.89999999999999,93.74000000000002,93.55999999999999,93.33,93.33000000000001,93.21000000000001,92.57000000000001,91.22000000000001,89.52000000000001],"color":"green"},{"name":"anthropic","data":[4.92,6.14,7.18,7.74,8,7.3100000000000005,7.220000000000001,7.26,7.3,7.6899999999999995,7.57,7.529999999999999,8.53,8.79,9.469999999999999,8.809999999999999,8.55,7.84,7.15,6.8,7.23,7.77,7.82,7.36,7.17,7.35,7.109999999999999,6.52,6.19,6.3,6.4399999999999995,6.619999999999999,6.85,6.859999999999999,6.970000000000001,7.619999999999999,8.97,10.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
