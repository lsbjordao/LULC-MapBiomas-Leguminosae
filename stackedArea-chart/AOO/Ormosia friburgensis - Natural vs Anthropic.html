<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.25000000000001,65.65,65.80000000000001,65.78000000000002,66.05000000000001,66.49000000000001,66.60000000000001,66.76,67.03,66.99999999999999,66.92,66.86,66.85999999999999,67.1,67.39,67.49000000000001,68.00999999999999,68.17999999999998,68.43,68.42,68.44999999999999,68.77000000000001,68.80000000000001,68.89999999999999,69.02,69.22,69.33,69.4,69.6,69.67999999999999,69.84999999999998,69.83000000000001,69.86999999999999,69.94,69.84,69.98000000000002,70.37000000000002,70.28999999999999],"color":"green"},{"name":"anthropic","data":[35.63999999999999,35.25,35.07,35.11,34.839999999999996,34.4,34.290000000000006,34.12,33.870000000000005,33.900000000000006,33.97,34.03,34.04,33.779999999999994,33.49,33.400000000000006,32.89999999999999,32.71,32.45,32.45,32.44,32.12,32.08,31.990000000000002,31.860000000000003,31.66,31.549999999999997,31.480000000000008,31.310000000000002,31.210000000000004,31.05,31.060000000000002,31.000000000000004,30.940000000000005,31.050000000000004,30.900000000000002,30.51,30.599999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
