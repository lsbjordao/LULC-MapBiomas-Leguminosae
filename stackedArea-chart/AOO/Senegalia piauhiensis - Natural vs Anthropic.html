<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.58999999999999,64.44999999999999,63.750000000000014,62.77000000000001,62.510000000000005,62.379999999999995,62.49999999999999,62.19,61.86000000000001,61.51,60.949999999999996,60.6,61.07000000000001,60.98,61.39,61.82999999999999,61.82000000000001,62.02,61.83,61.81,61.11000000000001,61.18,60.940000000000005,60.81999999999999,60.76,60.839999999999996,60.8,60.39000000000001,60.25,59.89,59.82,59.74999999999999,59.620000000000005,59.38000000000001,59.18000000000001,59.4,59.38,59.449999999999996],"color":"green"},{"name":"anthropic","data":[37.459999999999994,37.61,38.300000000000004,39.28,39.54,39.660000000000004,39.55,39.849999999999994,40.18,40.56,41.11,41.459999999999994,40.96999999999999,41.07,40.64,40.220000000000006,40.22,40.04,40.22000000000001,40.24,40.92000000000001,40.88,41.1,41.23,41.28,41.21,41.24,41.65,41.800000000000004,42.18,42.24999999999999,42.269999999999996,42.42,42.67,42.87,42.669999999999995,42.67999999999999,42.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
