<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.86999999999999,92.74000000000001,90.05000000000001,89.22000000000001,88.13,88.24000000000001,86.07,86.94000000000001,86.88,86.97,86.44000000000001,86.74000000000001,88.05000000000003,88.25999999999999,89.71000000000001,88.58999999999999,88.78,88.40000000000003,88.18000000000002,88.40000000000002,87.94,88.13000000000001,88.6,89.56000000000002,89.85,90.59000000000002,89.82000000000002,89.39999999999999,88.87000000000002,88.69000000000001,88.16000000000001,88.68,88.67000000000003,89.13,88.70000000000002,88.68,88.30000000000001,88.26000000000002],"color":"green"},{"name":"anthropic","data":[12.99,13.120000000000001,15.82,16.62,17.72,17.62,19.77,18.92,18.990000000000002,18.89,19.41,19.130000000000003,17.83,17.61,16.14,17.26,17.080000000000002,17.459999999999997,17.69,17.45,17.92,17.74,17.27,16.28,16.01,15.27,16.05,16.470000000000002,16.999999999999996,17.18,17.7,17.18,17.19,16.730000000000004,17.15,17.19,17.55,17.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
