<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.09,47.39000000000001,47.059999999999995,46.410000000000004,45.93,45.55,43.6,43.59,44.93,45.21,45.65,45.78,45.59,45.11,44.85999999999999,44.97,45.05,45.28,45.099999999999994,45.22,44.79,44.64,44.580000000000005,44.47,44.620000000000005,44.61,44.6,44.699999999999996,44.8,44.78,45.06999999999999,45.13999999999999,45.06000000000001,44.97,44.830000000000005,44.79,44.800000000000004,44.660000000000004],"color":"green"},{"name":"anthropic","data":[49.62,49.34,49.67,50.29,50.79,51.16,53.11,53.12,51.779999999999994,51.51,51.1,50.93999999999999,51.14,51.59000000000001,51.84,51.74,51.67999999999999,51.42999999999999,51.61,51.5,51.94,52.08,52.13999999999999,52.25,52.09,52.11,52.11999999999999,52.02,51.910000000000004,51.92,51.66,51.58999999999999,51.660000000000004,51.75,51.87,51.92999999999999,51.91,52.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
