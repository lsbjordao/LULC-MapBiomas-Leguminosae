<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }

</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest plantation","data":[0,0,0,0.87,0.98,1,1.01,0.84,0.72,0.59,0.58,0.65,0.71,0.72,0.74,0.92,0.86,0.86,0.83,0.79,0.84,0.47,0.36,0.34,0.19,0.18,0.18,0.37,0.37,0.37,0.41,0.42,0.47,0.46,0.54,0.7,0.89,0.88],"color":"#ad4413"},{"name":"Wetland","data":[3.26,3.28,3.54,4.08,3.97,3.76,2.95,2.44,2.42,2.94,2.94,2.1,1.76,2.17,2.7,2.82,3.25,2.74,2.33,2.42,2.98,3.56,4.79,4.66,4.35,4.28,5.06,4.75,4.27,4.05,3.36,3.31,2.78,2.19,1.88,2.91,3.31,4.35],"color":"#45C2A5"},{"name":"Grassland","data":[37.27,37.24,32.73,33.1,32.44,32.79,36.68,38.27,38.09,36.57,35.73,35.58,27.19,24.91,32.46,36.17,37.33,37.13,37.54,36.39,34.26,34.07,32.82,33.32,34.89,34.75,33.8,31.41,31.57,32.22,31.32,28.89,28.79,29.64,30.11,27.95,27.63,26.1],"color":"#B8AF4F"},{"name":"Temporary crop","data":[4.68,4.68,4.61,2.84,3.87,3.8,1.86,1.22,0.89,0.65,0.66,1.85,1.7,1.56,1.52,0.39,0.22,0.18,0.16,0.16,0.15,0.15,0.15,0.15,0.16,0.18,0.17,0.52,0.99,0.99,0.95,0.82,1.21,4.16,4.36,4.2,3.56,3.56],"color":"#D5A6BD"},{"name":"Mosaic of uses","data":[4.32,4.33,14.99,15.84,14.09,13.54,8.97,7.28,7.34,7.66,9.72,10.34,22.13,23.56,10.15,5.32,2.19,1.29,1.54,1.23,1.47,1.42,1.45,1.36,0.99,1.88,1.83,1.46,0.75,0.97,1.57,7.21,6.78,2.97,2.13,2.51,1.67,0.36],"color":"#fff3bf"},{"name":"Non vegetated area","data":[35.33,35.31,27.65,27.11,28.34,30.55,33.05,33.63,34.07,36.79,35.88,35.81,36.47,38.72,40.42,41.09,41.15,41.05,40.85,42.01,43.18,43.31,43.44,43,42.73,40.67,40.06,42.86,43.74,43.88,44.2,44.86,45.4,45.17,45.08,45.85,45.9,46.93],"color":"#EA9999"},{"name":"River, lake and ocean","data":[0.03,0.03,0.05,0.01,0.03,0.14,0.07,0.11,0.13,0.17,0.29,0.49,0.41,0.5,0.35,0.29,0.54,0.57,0.84,1.01,1.17,1.4,1.4,1.46,1.51,1.64,1.53,1.6,1.66,1.69,1.7,1.89,2.18,2.22,2.3,2.33,2.44,3.06],"color":"#0000FF"},{"name":"Wooded sandbank vegetation","data":[2.74,2.76,3.15,2.38,2.73,2.93,3.05,3.15,3.01,2.11,2.08,2.02,1.72,2.07,2.43,2.93,3.88,4.78,4.89,5.24,5.92,5.62,5.94,5.83,5.04,4.76,5.05,5.88,6.25,6.15,7.01,6.1,5.96,6.51,6.28,5.95,6.04,6.49],"color":"#6b9932"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
