<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.71000000000001,65.13000000000001,65.14999999999999,65.68999999999998,66.06,66.37,66.64,66.92,67.2,67.49,67.65,67.71000000000001,68.06,68.42999999999999,68.67999999999999,68.86,68.7,68.69999999999999,68.67,68.5,68.42,68.46000000000001,68.33999999999999,68.75,68.89999999999999,69.01,69.16,69.33999999999999,69.44,69.88,70.05000000000001,69.8,69.77,69.65,69.7,69.63,69.66000000000001,70.17999999999999],"color":"green"},{"name":"anthropic","data":[34.95,35.52,35.5,34.97,34.6,34.28,34.01,33.730000000000004,33.45,33.16,32.99999999999999,32.949999999999996,32.599999999999994,32.23,31.99,31.790000000000003,31.970000000000002,31.959999999999997,31.98,32.17,32.24,32.2,32.32,31.91,31.77,31.65,31.51,31.32,31.24,30.78,30.63,30.86,30.889999999999997,31.02,30.96,31.03,30.98,30.5],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
