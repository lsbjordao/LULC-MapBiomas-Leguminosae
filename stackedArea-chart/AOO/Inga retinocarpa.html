<!DOCTYPE html>
<html lang="en">

<head>

        #stackedArea { width: 100%; height: 100vh; }

</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[59.12,58.9,58.57,58.54,58.6,58.92,59.17,59.13,58.7,58.63,58.7,58.81,59.01,58.89,58.8,59.75,60.05,60.27,60.34,59.84,60.13,60.14,60.28,60.29,60.43,59.83,60.51,60.55,60.66,60.48,60.51,60.62,60.65,60.72,60.71,60.69,60.64,60.37],"color":"#006400"},{"name":"Flooded forest","data":[2.7,2.51,2.74,3.09,2.98,3.46,4.57,4.62,3.61,3.75,4.01,4.03,4.65,4.65,4.17,5.13,5.22,5.39,5.35,5.45,5.34,5.36,5.41,5.37,5.44,5.46,5.38,5.3,5.48,5.45,5.37,5.37,5.48,5.56,5.52,5.58,5.6,5.64],"color":"#76A5AF"},{"name":"Wetland","data":[0.79,0.93,0.97,1.29,0.64,0.48,1.68,1.72,0.5,0.53,1.35,0.54,1.34,0.91,0.55,1.09,1.98,1.69,1.39,2.01,2.02,1.71,1.54,1.37,1.62,2.53,1.54,1.99,1.59,1.56,2.13,1.98,1.72,1.63,1.61,1.55,1.62,0.88],"color":"#45C2A5"},{"name":"Grassland","data":[0.17,0.15,0.15,0.15,0.05,0,0,0.04,0,0,0.01,0,0.01,0,0,0.06,0.03,0.06,0.06,0.06,0.04,0.08,0.07,0.06,0.06,0.03,0.06,0.14,0.1,0.11,0.07,0.26,0.23,0.2,0.15,0.16,0.07,0.06],"color":"#B8AF4F"},{"name":"Pasture","data":[1.26,1.14,1.39,1.5,1.36,0.85,0.75,0.75,0.99,1.1,1.02,0.94,0.96,1.04,0.93,0.64,0.47,0.26,0.18,0.22,0.42,0.42,0.18,0.16,0.1,0,0.01,0.03,0.08,0.14,0.14,0.04,0.04,0.04,0.04,0.04,0.04,0.04],"color":"#FFD966"},{"name":"Urban area","data":[2.63,2.74,2.74,2.73,2.87,3.22,3.22,3.22,3.23,3.23,3.22,3.22,3.21,3.21,3.23,3.23,3.25,3.23,3.23,3.24,3.24,3.24,3.24,3.23,3.23,3.26,3.24,3.24,3.21,3.24,3.24,3.22,3.22,3.22,3.22,3.22,3.23,3.23],"color":"#aa0000"},{"name":"Mining","data":[6.13,6.25,6.32,6.57,6.29,6.34,6.55,6.57,6.46,6.77,6.7,6.59,6.85,6.62,6.65,6.78,6.78,6.75,6.71,6.83,6.79,6.79,6.8,6.75,6.8,6.81,6.78,6.78,6.86,6.88,6.86,6.9,6.87,6.85,6.86,6.91,6.92,6.9],"color":"#af2a2a"},{"name":"River, lake and ocean","data":[26.73,26.9,26.65,25.65,26.74,26.25,23.58,23.48,26.04,25.53,24.53,25.4,23.5,24.2,25.2,22.85,21.74,21.87,22.27,21.89,21.55,21.8,22.01,22.29,21.85,21.6,22.02,21.5,21.54,21.67,21.2,21.14,21.32,21.31,21.4,21.38,21.41,22.42],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
