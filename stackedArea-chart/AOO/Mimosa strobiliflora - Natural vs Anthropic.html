<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.68,32.25,33.3,33.63,33.96,34.300000000000004,34.690000000000005,34.89,35.97,37.94,37.84,38.06,38.440000000000005,38.19,40.39,41.97,42.190000000000005,42.080000000000005,41.7,42.48,42.760000000000005,44.38,45.22,45.55,47.599999999999994,48.85,49.370000000000005,49.129999999999995,48.480000000000004,48.940000000000005,48.85,47.790000000000006,48.18,48.269999999999996,48.2,48.769999999999996,48.89,49.489999999999995],"color":"green"},{"name":"anthropic","data":[69.15,67.57,66.51,66.17999999999999,65.86,65.52000000000001,65.13,64.92999999999999,63.85,61.89,61.99,61.75999999999999,61.400000000000006,61.64,59.42,57.84,57.64,57.75,58.129999999999995,57.349999999999994,57.05,55.45,54.599999999999994,54.28,52.22,50.97,50.44,50.68,51.330000000000005,50.87,50.98,52.03,51.629999999999995,51.55,51.61,51.06,50.94,50.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
