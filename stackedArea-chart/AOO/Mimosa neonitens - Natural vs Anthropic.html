<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.42,37.779999999999994,36.120000000000005,35.85,34.94,34.65,34.43,34.28999999999999,34.28,33.669999999999995,33.529999999999994,33.669999999999995,34.03,34.09,34.35,34.03,34.15,34.230000000000004,34.22,34.14,34.67,34.9,34.9,35.2,35.6,35.53,36.07,36.74999999999999,36.96000000000001,37.25,37.53,37.74,37.53,37.69,38.12,37.64,37.45,37.370000000000005],"color":"green"},{"name":"anthropic","data":[62.26,62.900000000000006,64.57,64.83,65.74,66.03999999999999,66.25999999999999,66.39,66.42,67.02000000000001,67.16000000000001,67.02,66.64,66.60000000000001,66.35000000000001,66.66999999999999,66.55,66.45,66.49000000000001,66.54,66.03,65.78,65.77999999999999,65.48,65.10999999999999,65.16,64.61,63.940000000000005,63.72999999999999,63.43000000000001,63.15,62.959999999999994,63.15,62.99999999999999,62.56000000000001,63.05,63.260000000000005,63.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
