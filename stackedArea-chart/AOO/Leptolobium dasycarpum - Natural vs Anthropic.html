<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.57,57.459999999999994,57.03999999999999,56.62,55.98,55.56,55.29,54.849999999999994,54.68,54.41000000000001,54.32999999999999,54.1,53.89999999999999,53.68999999999998,53.460000000000015,53.25000000000001,53.099999999999994,52.82,52.68,52.43,52.42,52.43,52.39999999999999,52.36000000000001,52.269999999999996,52.3,52.089999999999996,51.870000000000005,51.63999999999999,51.390000000000015,51.230000000000004,51.04,50.7,50.55,50.46999999999999,50.38000000000001,50.050000000000004,49.92999999999999],"color":"green"},{"name":"anthropic","data":[46.33,47.440000000000005,47.85,48.28,48.91,49.339999999999996,49.61000000000001,50.08,50.21000000000001,50.48,50.57,50.769999999999996,51,51.2,51.45000000000001,51.64000000000001,51.79,52.08,52.21000000000001,52.470000000000006,52.480000000000004,52.46999999999999,52.489999999999995,52.529999999999994,52.62999999999999,52.58999999999999,52.79999999999999,53.019999999999996,53.24999999999999,53.51,53.63999999999999,53.85000000000001,54.209999999999994,54.35,54.42999999999999,54.50000000000001,54.839999999999996,54.98999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
