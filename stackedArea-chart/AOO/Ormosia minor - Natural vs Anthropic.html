<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.52,71.46,71.06,70.51,70.04,69.64999999999999,70.01,70.5,71.11,72.1,72.58999999999999,72.78,73.19000000000001,73.41,73.68999999999998,73.45,73.52,73.69,73.96,74,74.22,74.41,74.75,75,75.17,75.55,75.57000000000001,75.54,75.76,75.83000000000001,76.17999999999999,76.57,76.74,76.63000000000001,76.66,76.52,76.75999999999999,76.74],"color":"green"},{"name":"anthropic","data":[28.959999999999997,29.009999999999998,29.400000000000002,29.950000000000003,30.430000000000003,30.820000000000004,30.470000000000002,29.97,29.37,28.380000000000003,27.870000000000005,27.68,27.28,27.07,26.78,27.029999999999998,26.960000000000004,26.77,26.49,26.47,26.23,26.06,25.710000000000004,25.470000000000002,25.29,24.919999999999998,24.89,24.919999999999998,24.7,24.63,24.29,23.91,23.72,23.839999999999996,23.82,23.949999999999996,23.709999999999997,23.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
