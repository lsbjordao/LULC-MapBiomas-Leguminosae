<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.71000000000001,97.96,94.52000000000001,91.46999999999998,90.53999999999999,90.16999999999999,90.22000000000001,90.45,90.36999999999999,89.77,88.58000000000001,88.19000000000001,87.84000000000002,88,87.47999999999999,87.12,86.50000000000001,86.06000000000002,85.99000000000001,85.88999999999999,85.23000000000002,84.93999999999998,84.94,84.96999999999997,84.57000000000001,84.37,84.11999999999998,83.45,82.77,84.66000000000001,84.19,83.47000000000001,83.76,84.29000000000002,85.03999999999999,84.53,84.58,82.72999999999999],"color":"green"},{"name":"anthropic","data":[3.6799999999999993,3.4299999999999993,6.88,9.93,10.86,11.219999999999999,11.18,10.940000000000001,11.02,11.61,12.799999999999999,13.19,13.559999999999999,13.39,13.899999999999999,14.28,14.899999999999999,15.33,15.399999999999999,15.49,16.169999999999998,16.439999999999998,16.45,16.4,16.83,17.040000000000003,17.27,17.94,18.62,16.720000000000002,17.18,17.91,17.61,17.1,16.35,16.87,16.810000000000002,18.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
