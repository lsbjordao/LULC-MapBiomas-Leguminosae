<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.81,27.960000000000004,27.39,27.33,27.349999999999998,28.080000000000002,27.77,27.7,28.169999999999998,29.04,30.52,30.83,31.91,32.37,33.709999999999994,35.080000000000005,35.660000000000004,35.22,36.31,36.4,36.150000000000006,37.18,37.099999999999994,37.28,37.769999999999996,38.349999999999994,38.309999999999995,38.97,39.339999999999996,39.82,40.129999999999995,39.92,39.949999999999996,39.989999999999995,40.13,40.13,40.21,40.440000000000005],"color":"green"},{"name":"anthropic","data":[70.08,71.93,72.49,72.56,72.53,71.8,72.11,72.17,71.71,70.85,69.38,69.05000000000001,67.98,67.50999999999999,66.17,64.81,64.23,64.67,63.57,63.48,63.74,62.71,62.8,62.62,62.12,61.540000000000006,61.58,60.910000000000004,60.550000000000004,60.06,59.75,59.96000000000001,59.93,59.89,59.74,59.739999999999995,59.68000000000001,59.45],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
