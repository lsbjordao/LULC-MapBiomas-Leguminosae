<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.56,86.9,87.02,86.96000000000001,87.08,87.07,86.93,87.00999999999999,87.03,86.91,86.78999999999999,86.66,86.42999999999999,86.19,86.07999999999998,85.79,85.74,85.42000000000002,84.46,83.97,83.62,83.39999999999999,83.24999999999999,82.93999999999998,82.99,83.00999999999999,83.14999999999999,83.13,83.17,82.77,82.46,82.33000000000001,82.32999999999998,82.2,82.29,81.71,81.50999999999999,81.36],"color":"green"},{"name":"anthropic","data":[13.690000000000001,13.350000000000001,13.219999999999999,13.270000000000001,13.17,13.169999999999998,13.31,13.239999999999998,13.23,13.32,13.44,13.600000000000001,13.820000000000002,14.040000000000001,14.16,14.45,14.509999999999998,14.83,15.79,16.28,16.63,16.830000000000002,17.01,17.290000000000003,17.259999999999998,17.22,17.1,17.12,17.09,17.49,17.79,17.92,17.91,18.05,17.97,18.54,18.75,18.9],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
