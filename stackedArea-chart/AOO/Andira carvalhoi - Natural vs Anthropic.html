<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.89000000000001,67.35,66.69,66.03,64.33,62.93000000000001,62.50999999999999,62.32999999999999,61.94000000000001,61.690000000000005,61.69,61.290000000000006,60.97000000000001,60.86,60.93,60.829999999999984,61.19,61,61.15,60.72999999999999,60.10000000000001,60.18,60.029999999999994,60.309999999999995,60.510000000000005,60.82,60.75000000000001,60.790000000000006,60.55,60.6,60.73999999999999,60.370000000000005,59.960000000000015,60.67,60.80000000000001,61.24000000000001,61.86999999999999,62.34999999999999],"color":"green"},{"name":"anthropic","data":[19.96,20.509999999999998,21.25,21.990000000000002,23.7,25.13,25.55,25.729999999999997,26.119999999999997,26.369999999999997,26.39,26.76,27.06,27.189999999999998,27.08,27.200000000000003,26.849999999999998,27.049999999999997,26.92,27.33,27.96,27.889999999999997,28.05,27.76,27.52,27.229999999999997,27.32,27.279999999999998,27.519999999999996,27.470000000000002,27.34,27.759999999999994,28.110000000000003,27.360000000000003,27.299999999999997,26.88,26.279999999999998,25.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
