<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.98,51.52000000000001,50.43000000000001,49.62,48.86,48.43,48.22999999999999,48.46,48.74999999999999,48.980000000000004,49.02,49.45,49.54,49.44000000000001,49.51000000000001,49.73000000000001,49.99,50.19000000000001,50.61000000000001,51.010000000000005,51.21999999999999,51.440000000000005,51.86,51.7,51.919999999999995,52.010000000000005,52.14,52.12,51.98999999999999,51.92999999999999,51.94,51.88000000000001,51.910000000000004,52.36,52.690000000000005,53.17000000000001,53.430000000000014,53.680000000000014],"color":"green"},{"name":"anthropic","data":[48.08,48.47999999999999,49.629999999999995,50.50999999999999,51.23,51.6,51.809999999999995,51.620000000000005,51.349999999999994,51.17999999999999,51.18999999999999,50.8,50.66,50.69,50.53,50.309999999999995,50.03999999999999,49.81,49.43,49.1,48.89999999999999,48.699999999999996,48.3,48.47,48.28999999999999,48.209999999999994,48.07,48.07000000000001,48.230000000000004,48.25,48.27,48.3,48.21999999999999,47.77000000000001,47.39999999999999,46.85,46.599999999999994,46.29],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
