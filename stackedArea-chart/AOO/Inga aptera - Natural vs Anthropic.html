<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.13,79.14000000000001,78.37000000000002,77.49,75.81,74.83999999999997,74.05999999999997,73.8,73.39000000000001,72.86,72.40000000000002,71.72000000000001,71.45,71.43,71.25999999999999,71.03,70.4,69.88000000000001,70.31999999999998,70.11,70.19000000000001,70.24,70.19000000000001,69.79,69.76,69.61000000000001,69.25000000000001,69.31,69.11,69.05,69.10000000000001,69.1,68.88,69.17,69.24,69.10000000000001,69.11,69.48],"color":"green"},{"name":"anthropic","data":[21.01,21.01,21.790000000000003,22.66,24.34,25.31,26.08,26.36,26.79,27.32,27.790000000000003,28.46,28.73,28.73,28.880000000000003,29.1,29.729999999999997,30.25,29.810000000000002,30.029999999999998,29.970000000000002,29.910000000000004,29.979999999999997,30.38,30.41,30.560000000000002,30.91,30.849999999999998,31.049999999999997,31.119999999999997,31.08,31.07,31.29,30.979999999999997,30.920000000000005,31.05,31.039999999999996,30.679999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
