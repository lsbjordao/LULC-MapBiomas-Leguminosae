<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.599999999999994,47.09999999999999,45.269999999999996,44.53999999999999,43.78999999999999,43.19,42.75000000000001,42.260000000000005,41.71000000000001,41.21,40.77,40.230000000000004,39.769999999999996,39.29,38.970000000000006,38.79999999999999,38.61000000000001,38.339999999999996,38.24000000000001,37.7,37.370000000000005,37.15,37.040000000000006,36.79,36.58,36.379999999999995,36.089999999999996,35.870000000000005,35.68,35.32000000000001,34.980000000000004,34.73,34.629999999999995,34.78999999999999,34.92,35.17000000000001,34.47,35.13],"color":"green"},{"name":"anthropic","data":[54.779999999999994,56.290000000000006,58.109999999999985,58.86,59.60999999999999,60.18,60.629999999999995,61.12,61.699999999999996,62.169999999999995,62.61,63.18,63.62,64.1,64.41,64.59000000000002,64.76,65.03999999999999,65.14,65.69,66.02000000000001,66.25000000000001,66.36000000000001,66.61000000000001,66.8,67,67.30000000000001,67.52000000000001,67.70000000000002,68.05999999999999,68.39999999999998,68.64999999999999,68.71999999999998,68.60000000000001,68.47,68.25000000000001,68.95,68.27000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
