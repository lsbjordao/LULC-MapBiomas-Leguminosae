<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.82,69.70000000000002,68.97,67.86000000000001,66.96000000000001,66.19,65.87,66.02000000000001,66.64,66.72,66.41,66.21,66.06,65.43,64.69999999999999,64.14,63.629999999999995,63.14,62.57000000000001,62.489999999999995,62.43000000000001,62.53,62.629999999999995,63.1,63.44,63.56,63.94,64,63.69999999999999,63.82,64.18,64.35999999999999,64.61999999999999,65.09,65.52,65.57,65.82,65.75999999999999],"color":"green"},{"name":"anthropic","data":[32.88999999999999,33.05,33.779999999999994,34.879999999999995,35.79,36.55,36.86,36.699999999999996,36.089999999999996,36.019999999999996,36.32,36.51,36.69,37.3,38.029999999999994,38.589999999999996,39.099999999999994,39.57,40.169999999999995,40.25,40.309999999999995,40.19,40.1,39.64,39.3,39.18,38.779999999999994,38.730000000000004,39.02,38.91,38.559999999999995,38.370000000000005,38.129999999999995,37.66,37.25,37.19,36.95,37.02],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
