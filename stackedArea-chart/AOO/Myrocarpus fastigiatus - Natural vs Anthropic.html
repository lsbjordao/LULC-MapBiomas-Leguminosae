<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.28999999999999,44.52,44.78000000000001,44.29,43.45,42.940000000000005,42.720000000000006,42.32,42.360000000000014,42.120000000000005,41.96000000000001,42.20000000000001,42.440000000000005,42.43000000000001,42.75000000000001,42.74999999999999,42.93,43.040000000000006,43.20000000000001,42.98000000000001,42.540000000000006,42.18,42.209999999999994,42.77,42.95,43.33,43.59,43.49,43.349999999999994,43.2,43.160000000000004,43.26,43.309999999999995,43.5,43.440000000000005,43.46000000000001,43.510000000000005,43.52999999999999],"color":"green"},{"name":"anthropic","data":[61.67999999999999,61.45,61.18,61.709999999999994,62.54,63.030000000000015,63.24,63.66000000000001,63.61,63.86,64.02,63.779999999999994,63.510000000000005,63.55,63.25000000000001,63.21000000000001,63.050000000000004,62.94,62.79,63.01,63.43,63.81000000000001,63.760000000000005,63.18,63.02,62.65,62.38,62.47,62.61,62.78999999999999,62.84,62.699999999999996,62.660000000000004,62.480000000000004,62.52,62.5,62.480000000000004,62.43000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
