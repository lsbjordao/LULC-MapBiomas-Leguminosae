<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.01,69.80000000000001,69.95,70.03999999999999,69.95,70.01,70.04,69.59,69.12,68.53999999999999,68.14,68.25999999999999,68.29999999999998,68.88000000000001,69.67000000000002,70.11,70.17,69.91000000000001,69.97,70.23,70.60000000000001,71.01,71.36,71.8,71.88000000000001,71.89,71.72,71.48,71.39,71.75999999999999,71.71000000000001,71.69000000000001,71.87,71.78,71.85000000000001,72.07000000000002,72.29,72.92999999999999],"color":"green"},{"name":"anthropic","data":[30.049999999999997,30.26,30.13,30.02,30.08,30.049999999999997,29.999999999999996,30.449999999999996,30.919999999999995,31.519999999999996,31.93,31.779999999999998,31.739999999999995,31.149999999999995,30.359999999999992,29.939999999999998,29.889999999999997,30.129999999999995,30.08,29.819999999999997,29.459999999999997,29.03,28.68,28.259999999999998,28.18,28.159999999999997,28.339999999999996,28.56,28.669999999999998,28.31,28.339999999999996,28.38,28.2,28.279999999999998,28.21,27.99,27.76,27.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
