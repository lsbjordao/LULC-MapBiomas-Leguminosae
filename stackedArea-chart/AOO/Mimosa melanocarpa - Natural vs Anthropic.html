<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.529999999999994,53.35999999999999,52.75,52.73999999999999,52.239999999999995,52.07999999999999,51.78,51.26999999999999,50.79,50.099999999999994,49.65,49.059999999999995,48.79000000000001,48.23,47.81,47.44,46.96,47,47.08,46.980000000000004,47.06999999999999,46.84,46.64,46.51,46.44,46.400000000000006,46.31,46.050000000000004,45.90999999999999,45.779999999999994,45.83,45.79999999999999,45.68,45.71,45.809999999999995,46.36,46.49999999999999,46.52],"color":"green"},{"name":"anthropic","data":[47.93,50.12,50.72,50.71,51.239999999999995,51.41,51.690000000000005,52.21,52.68999999999999,53.37,53.83999999999999,54.410000000000004,54.67999999999999,55.24,55.660000000000004,56.02,56.5,56.49000000000001,56.379999999999995,56.46,56.39999999999999,56.64000000000001,56.82000000000001,56.96000000000001,57.019999999999996,57.06,57.14999999999999,57.41999999999999,57.550000000000004,57.67000000000001,57.64999999999999,57.68,57.809999999999995,57.769999999999996,57.66,57.14,56.98,56.959999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
