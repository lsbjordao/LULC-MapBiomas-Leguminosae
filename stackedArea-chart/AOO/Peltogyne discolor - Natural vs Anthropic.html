<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.85000000000001,51.27,50.599999999999994,50.57,50.64000000000001,50.82,51.28,51.26999999999999,50.81999999999999,50.29,50.4,50.55999999999999,50.67,50.96,51.6,51.92000000000001,52.13000000000001,52.62,53.400000000000006,53.65,54.370000000000005,54.69,55.2,55.42,55.24999999999999,55.27,54.83,55.089999999999996,55.019999999999996,55.22000000000001,55.00000000000001,55,55.099999999999994,55.199999999999996,55.449999999999996,55.62,54.95,55.10000000000001],"color":"green"},{"name":"anthropic","data":[44.96,45.54,46.190000000000005,46.24,46.15,45.98,45.51,45.519999999999996,45.970000000000006,46.510000000000005,46.39,46.230000000000004,46.120000000000005,45.82,45.21,44.88,44.67,44.17,43.400000000000006,43.15,42.419999999999995,42.1,41.58,41.37,41.54,41.54,41.949999999999996,41.699999999999996,41.79,41.58,41.779999999999994,41.8,41.699999999999996,41.6,41.36,41.18,41.88,41.699999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
