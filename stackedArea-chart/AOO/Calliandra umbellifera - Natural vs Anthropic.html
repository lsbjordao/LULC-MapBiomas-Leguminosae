<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.61999999999999,64.19999999999999,60.919999999999995,59.839999999999996,58.589999999999996,56.919999999999995,55.96000000000001,55.730000000000004,55.5,55.550000000000004,56.36000000000001,57.11,57.41000000000001,56.59,55.93,54.52,53.709999999999994,52.98,52.13,51.3,51.22,50.629999999999995,50.64,50.449999999999996,50.82,51.7,52.129999999999995,52.57,52.21,52.13,51.690000000000005,51.32999999999999,50.830000000000005,50.71999999999999,50.78,50.300000000000004,50.24999999999999,50.23],"color":"green"},{"name":"anthropic","data":[35.75,36.18,39.47,40.53,41.790000000000006,43.45,44.43000000000001,44.64,44.870000000000005,44.839999999999996,44.03,43.28,42.98,43.81,44.46,45.87,46.67,47.400000000000006,48.24,49.1,49.15,49.77,49.74,49.94,49.58,48.69,48.260000000000005,47.82,48.18,48.24,48.68999999999999,49.03999999999999,49.52,49.68,49.6,50.08,50.16,50.15],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
