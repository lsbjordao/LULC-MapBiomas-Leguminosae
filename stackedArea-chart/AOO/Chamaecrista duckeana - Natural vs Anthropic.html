<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.69,70.27000000000002,68.22000000000001,66.82000000000001,65.86,65.61000000000001,65.24000000000001,65.12,65.02000000000001,64.48,64.74000000000001,65.37,66.02,65.88,64.85999999999999,64.33999999999999,63.59,63.36999999999999,63.83,63.870000000000005,64.03,64.25,63.779999999999994,63.78000000000001,63.57000000000001,63.76,63.79,63.20000000000001,63.38000000000001,63.589999999999996,63.339999999999996,63.059999999999995,63.03,62.65,62.629999999999995,62.72,62.730000000000004,62.99999999999999],"color":"green"},{"name":"anthropic","data":[32.06,32.52,34.58,35.97,36.93,37.18,37.56999999999999,37.67999999999999,37.75,38.32000000000001,38.05,37.43000000000001,36.760000000000005,36.92,37.93000000000001,38.46000000000001,39.2,39.42,38.97,38.959999999999994,38.77,38.57,39.010000000000005,39.03,39.24999999999999,39.050000000000004,39.01,39.62,39.43,39.22,39.46,39.75999999999999,39.760000000000005,40.14,40.17000000000001,40.1,40.089999999999996,39.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
