<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.97999999999999,68.89999999999999,68.68,68.7,68.47999999999999,68.36999999999999,68.44,68.41,68.85,69.02000000000001,68.82000000000001,69.01,69.05,69.39,69.9,70.25999999999999,70.59,70.66,71.01,71.31,71.39000000000001,71.46000000000001,71.61999999999999,71.67,71.71999999999998,72.07000000000001,72.42999999999999,72.36,72.48999999999998,72.54,72.71,72.89,72.86999999999999,73.1,72.85000000000001,73.04,73.14,73.52000000000001],"color":"green"},{"name":"anthropic","data":[30.119999999999994,31.169999999999995,31.390000000000004,31.370000000000005,31.599999999999998,31.7,31.64,31.67,31.23,31.05,31.25,31.08,31.02,30.669999999999998,30.189999999999998,29.82,29.489999999999995,29.42,29.08,28.769999999999996,28.68,28.62,28.469999999999995,28.41,28.37,28.02,27.650000000000006,27.730000000000004,27.59,27.56,27.37,27.200000000000003,27.2,27,27.23,27.050000000000004,26.950000000000003,26.570000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
