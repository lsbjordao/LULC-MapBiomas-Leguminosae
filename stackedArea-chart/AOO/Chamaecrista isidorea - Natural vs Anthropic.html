<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.15999999999999,49.660000000000004,48.79999999999999,48.21,47.12,46.53,46.03,45.44,45.05,44.099999999999994,43.26,42.71,42.769999999999996,42.50999999999999,42.51,42.480000000000004,42.52,42.34,42.16,41.88,41.78,41.63999999999999,41.56999999999999,41.75,41.959999999999994,41.98,41.669999999999995,41.5,41.099999999999994,40.839999999999996,40.64,40.43,40.209999999999994,39.91,39.769999999999996,39.94,39.849999999999994,40.57000000000001],"color":"green"},{"name":"anthropic","data":[49.21999999999999,51.72,52.56999999999999,53.14999999999999,54.239999999999995,54.849999999999994,55.339999999999996,55.92,56.31,57.269999999999996,58.11000000000001,58.65000000000001,58.61000000000001,58.85,58.88000000000001,58.87,58.88000000000001,59.02,59.209999999999994,59.489999999999995,59.59999999999999,59.71999999999999,59.800000000000004,59.620000000000005,59.400000000000006,59.38,59.690000000000005,59.870000000000005,60.28,60.52,60.730000000000004,60.93,61.16,61.47,61.61000000000001,61.43,61.52,60.80999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
