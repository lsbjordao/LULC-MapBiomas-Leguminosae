<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.26,88.8,89.10000000000001,89.22000000000001,89.13,89.09,89.08,89.2,89.25,89.18,88.98,89.28999999999999,89.28999999999999,89.02,89.13,88.69,88.65,88.62,88.61,89.08000000000001,89.27,89.16,89.50999999999999,89.56,89.67999999999999,89.64,90.33,90.46000000000001,90.47999999999999,90.41,90.25,90.29,90.28,90.30000000000001,90.02999999999999,90.13999999999999,89.89,89.99],"color":"green"},{"name":"anthropic","data":[13.08,12.530000000000001,12.219999999999999,12.089999999999998,12.18,12.219999999999999,12.23,12.1,12.059999999999999,12.129999999999999,12.33,12.02,12.040000000000001,12.3,12.2,12.62,12.65,12.69,12.709999999999999,12.229999999999999,12.06,12.16,11.799999999999999,11.74,11.63,11.66,10.98,10.86,10.85,10.899999999999999,11.059999999999999,11.02,11.04,11.009999999999998,11.28,11.189999999999998,11.43,11.329999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
