<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[51.6,51.87,51.48,50.87,49.64,50,48.54,48.64,48.8,49.3,49.31,49.28,49.2,48.83,47.32,42.96,38.73,35.07,33.32,33.8,34.6,33.13,29.26,26.13,24.64,24,24.28,24.46,25.2,24.47,24.36,25.23,26.04,26.52,26.31,26.41,25.59,20.69],"color":"#006400"},{"name":"Flooded forest","data":[23.48,23.48,23.5,23.48,21.96,22.52,23.14,23.14,23.11,23.11,23.11,23.11,23.13,23.11,23.06,20.61,19.69,19.28,17.62,18.14,20.86,20.65,17.38,16.34,14.75,15.24,14.99,15,13.9,13.14,12.88,13.81,13.87,14.56,15.07,14.95,14.27,9.64],"color":"#76A5AF"},{"name":"Wetland","data":[8.87,8.09,8.08,9.34,10.48,9.96,9.62,8.94,6.25,5.74,5.74,5.74,7.44,7.44,8.77,8.77,8.55,8,7.13,8.48,9.67,9.54,9.74,9.1,9.63,10.18,10.2,7.44,5.55,3.36,3.12,3.15,2.38,2.86,5.95,6.75,5.39,3.84],"color":"#45C2A5"},{"name":"Grassland","data":[12.5,13.3,13.32,12.11,12.22,12.14,12.43,13.05,15.8,16.27,16.27,16.3,14.56,14.56,13.36,13.77,13.86,14.45,15.27,14.15,12.71,12.73,12.95,13.75,13.7,12.74,13.07,15.81,17.91,19.85,20.01,20.07,20.9,20.16,17.21,16.45,17.84,0],"color":"#B8AF4F"},{"name":"Pasture","data":[3.09,2.79,3.15,3.74,5.24,4.93,5.81,5.77,5.58,5.12,5.11,5.11,5.2,5.6,7.02,13.42,18.71,22.74,26.19,24.96,21.71,23.49,30.21,34.22,36.82,37.38,37,36.83,36.98,38.72,39.17,37.28,36.35,35.43,34.99,34.99,36.46,65.37],"color":"#FFD966"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
