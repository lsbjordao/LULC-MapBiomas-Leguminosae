<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.4,70.63000000000001,70.84000000000002,70.45,70.25,70.22,69.99000000000001,69.86,69.87,69.8,69.46,69.14,68.96,68.82,68.59,67.94,67.72,67.93,67.68,67.45,66.85000000000001,66.42,66.39,66.31,66.35000000000001,66.19000000000001,65.32000000000001,64.94999999999999,64.62,64.04,63.68,63.419999999999995,63.32000000000001,63.300000000000004,63.32000000000001,63.339999999999996,63.4,63.31],"color":"green"},{"name":"anthropic","data":[32.26,32.04,31.830000000000002,32.199999999999996,32.41,32.44,32.68,32.79,32.779999999999994,32.87,33.19,33.53,33.69,33.85999999999999,34.07,34.73,34.94,34.720000000000006,34.98,35.209999999999994,35.800000000000004,36.220000000000006,36.260000000000005,36.330000000000005,36.31,36.49,37.32000000000001,37.71,38.04,38.62,38.970000000000006,39.27000000000001,39.330000000000005,39.330000000000005,39.330000000000005,39.330000000000005,39.26,39.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
