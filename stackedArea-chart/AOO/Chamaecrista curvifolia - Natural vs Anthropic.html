<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.66,81.21000000000001,81.60000000000001,81.26,81.24,81.16,81.16999999999999,81.2,80.63999999999997,80.30999999999999,80.20999999999998,80.19,80.13,80.12,80.19000000000001,79.94,79.60999999999997,79.53999999999999,79.38,79.02999999999999,78.70999999999998,78.45,78.49000000000001,78.59,78.14999999999999,78.39999999999999,78.19,77.88999999999999,77.38999999999999,77.29,77.21,77.10000000000001,76.98,77.01,76.72999999999998,76.49999999999999,76.67,76.10000000000001],"color":"green"},{"name":"anthropic","data":[24.96,25.43,25.040000000000003,25.37,25.380000000000003,25.459999999999997,25.470000000000002,25.43,25.990000000000002,26.31,26.42,26.44,26.49,26.53,26.45,26.700000000000003,27.03,27.08,27.270000000000003,27.6,27.919999999999998,28.19,28.12,28.020000000000003,28.460000000000004,28.220000000000002,28.44,28.720000000000002,29.23,29.349999999999998,29.430000000000003,29.540000000000003,29.659999999999997,29.63,29.900000000000002,30.13,29.96,30.52],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
