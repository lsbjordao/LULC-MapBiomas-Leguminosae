<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.14,74.92,75.01999999999998,76.14,76.22999999999999,76.2,76.22000000000001,75.32000000000002,74.89,74.57000000000001,74.28999999999999,74.11,74.16,74.27000000000001,74.09,74.24000000000001,74.39,74.48000000000002,74.56000000000002,74.04,73.89999999999999,73.86000000000001,73.74,73.66999999999999,73.61,73.62,73.72,73.67999999999999,73.59,73.58,73.64,73.48000000000002,73.30999999999999,73.52000000000001,73.21000000000001,72.98,72.44,71.52000000000001],"color":"green"},{"name":"anthropic","data":[27.330000000000002,27.549999999999997,27.460000000000004,26.330000000000002,26.229999999999997,26.270000000000003,26.23,27.140000000000004,27.569999999999997,27.89,28.169999999999998,28.36,28.299999999999997,28.189999999999998,28.359999999999996,28.219999999999995,28.089999999999996,27.99,27.9,28.420000000000005,28.58,28.599999999999998,28.709999999999997,28.78,28.860000000000003,28.85,28.750000000000004,28.78,28.900000000000002,28.870000000000005,28.830000000000002,28.970000000000002,29.150000000000006,28.960000000000004,29.26,29.480000000000004,30.030000000000005,30.950000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
