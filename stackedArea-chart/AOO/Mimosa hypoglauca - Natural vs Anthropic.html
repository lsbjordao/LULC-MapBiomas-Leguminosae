<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.78,79.36999999999999,78.92,78.51,78.28999999999999,78.33999999999999,78.57000000000001,78.51,78.98999999999998,79.54,79.73,80.3,80.80999999999999,81.53999999999999,82.44999999999999,83.05,83.05,82.8,82.59,82.32000000000001,81.87000000000002,81.67999999999999,81.54,81.76999999999998,81.88,81.43000000000002,80.97000000000001,80.77,80.68,80.32,79.84,79.59,79.51,79.72999999999999,79.7,79.77000000000001,79.82,79.87],"color":"green"},{"name":"anthropic","data":[30.810000000000002,31.22,31.66,32.06,32.28,32.239999999999995,32.010000000000005,32.04,31.569999999999997,31.009999999999998,30.830000000000005,30.28,29.760000000000005,29.010000000000005,28.110000000000007,27.520000000000003,27.54,27.77,27.979999999999993,28.26,28.69,28.89,29.02,28.8,28.679999999999996,29.14,29.609999999999996,29.790000000000003,29.85,30.229999999999997,30.73,31.000000000000004,31.09,30.859999999999996,30.86,30.82,30.76,30.689999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
