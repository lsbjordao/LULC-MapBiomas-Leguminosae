<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.16999999999999,86.51000000000002,85.17999999999999,84.02000000000001,83.58,83.67999999999999,83.32000000000002,82.16000000000001,81.28,81,80.24000000000001,79.55000000000001,78.89999999999999,78.54,77.70000000000002,76.56000000000002,75.74000000000001,75.24000000000002,74.61000000000001,74.05,73.89,73.75000000000001,73.76,73.56,73.41000000000001,73.42,73.42,73.49000000000001,73.34000000000002,73.24000000000002,73.25000000000001,73.59000000000002,73.79000000000002,73.79,73.82,73.75,73.58000000000001,72.46000000000001],"color":"green"},{"name":"anthropic","data":[14.739999999999998,15.399999999999997,16.729999999999997,17.869999999999997,18.32,18.23,18.600000000000005,19.740000000000006,20.619999999999997,20.92,21.64,22.359999999999996,23.009999999999998,23.359999999999996,24.2,25.34,26.160000000000004,26.66,27.3,27.859999999999996,28.02,28.150000000000002,28.150000000000002,28.329999999999995,28.49,28.47,28.479999999999997,28.419999999999998,28.579999999999995,28.659999999999997,28.65,28.31,28.09,28.129999999999995,28.08,28.139999999999997,28.310000000000002,29.440000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
