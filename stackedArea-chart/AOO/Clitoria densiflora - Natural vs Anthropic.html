<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.57,36.15999999999999,35.87,35.7,35.13,34.67,33.88000000000001,33.7,33.980000000000004,34.49000000000001,34.05,34.76,34.720000000000006,35.510000000000005,36.379999999999995,36.510000000000005,36.010000000000005,35.78,35.78000000000001,35.88,35.830000000000005,36.07,36.01,36.18,36.05,36.15999999999999,36.510000000000005,36.85,37.150000000000006,37.199999999999996,37.5,37.25,37.400000000000006,37.46,37.8,37.75,38.040000000000006,38.199999999999996],"color":"green"},{"name":"anthropic","data":[62.68,63.09000000000001,63.37000000000001,63.55,64.1,64.58,65.37,65.54,65.25999999999999,64.75,65.2,64.49000000000002,64.55,63.72,62.900000000000006,62.75,63.25000000000001,63.459999999999994,63.48000000000001,63.38,63.42000000000001,63.19,63.23000000000001,63.09,63.20000000000001,63.09,62.74,62.39,62.099999999999994,62.03000000000001,61.74,61.91999999999999,61.839999999999996,61.769999999999996,61.43,61.5,61.21,61.059999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
