<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.300000000000004,45.68999999999999,46.929999999999986,46.75999999999999,46.66,47.67,48.300000000000004,48.75000000000001,50.269999999999996,51.36999999999999,51.71,52.099999999999994,52.06,53.13000000000001,53.46000000000001,53.809999999999995,54.03000000000001,54.14000000000001,54.88000000000001,55.18,53.75,53.89,54.39,54.34,55.650000000000006,56.300000000000004,55.96999999999999,55.940000000000005,56.78,57.059999999999995,57.93,57.91,58.7,58.839999999999996,59.33,59.37,59.61,59.63],"color":"green"},{"name":"anthropic","data":[39.88,39.480000000000004,38.25,38.42,38.53,37.53,36.9,36.44,34.93,33.83,33.49,33.099999999999994,33.11,32.03000000000001,31.720000000000002,31.36,31.13,31.03,30.28,30,31.42,31.28,30.79,30.84,29.509999999999998,28.86,29.200000000000003,29.25,28.4,28.14,27.25,27.259999999999998,26.47,26.35,25.82,25.79,25.53,25.509999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
