<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.55,51.16,51.04,51.1,50.96,50.809999999999995,50.77,50.44,50.39000000000001,50.28,50.12,50.24,50.15,49.77,49.35000000000001,48.57,48.400000000000006,48.39,48.42000000000001,48.42,48.39,47.83,47.23,47.019999999999996,47.449999999999996,47.529999999999994,47.56,47.71000000000001,47.699999999999996,48.17999999999999,48.96000000000001,49.28,49.75,50.199999999999996,50.1,49.7,49.540000000000006,48.980000000000004],"color":"green"},{"name":"anthropic","data":[46.41,48.8,48.93000000000001,48.86,49.010000000000005,49.17,49.2,49.510000000000005,49.559999999999995,49.69,49.830000000000005,49.730000000000004,49.83,50.22,50.61999999999999,51.38999999999999,51.58,51.58,51.55,51.54,51.57,52.13,52.73,52.95,52.51,52.43000000000001,52.400000000000006,52.25,52.27,51.78999999999999,50.989999999999995,50.68,50.209999999999994,49.77,49.87,50.27,50.42999999999999,50.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
