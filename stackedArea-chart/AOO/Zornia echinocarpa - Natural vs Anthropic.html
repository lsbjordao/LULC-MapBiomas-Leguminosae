<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.83,34.14,33.1,32.830000000000005,32.69,32.89,32.85,32.7,32.38,32.24,32.16,31.470000000000006,31.500000000000007,31.060000000000006,30.64,29.759999999999998,29.79,30.05,29.92,29.890000000000008,29.990000000000002,30.360000000000007,30.18,29.96,29.979999999999997,30.17,30.650000000000002,30.530000000000005,30.290000000000006,30.300000000000004,30.03,29.699999999999996,29.64,29.11,29.330000000000005,29.41,29.540000000000003,30.06],"color":"green"},{"name":"anthropic","data":[65.3,65.99999999999999,67.03999999999999,67.30000000000001,67.45,67.24,67.28,67.43,67.74,67.90999999999998,67.99,68.67,68.63000000000001,69.08000000000001,69.48,70.37,70.35000000000001,70.07000000000001,70.21000000000001,70.24000000000001,70.16000000000001,69.77000000000001,69.94000000000001,70.16,70.14000000000001,69.95,69.5,69.61,69.83999999999999,69.83,70.1,70.42999999999999,70.49,71.02,70.80000000000001,70.72,70.60000000000001,70.08000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
