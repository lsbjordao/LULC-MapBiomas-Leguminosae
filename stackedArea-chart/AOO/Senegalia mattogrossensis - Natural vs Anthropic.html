<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.60000000000001,67.58,67.75999999999999,66.71000000000001,65.88000000000001,64.66,63.870000000000005,62.53000000000001,61.559999999999995,58.00000000000001,55.459999999999994,53.35,53.19999999999999,52.89000000000001,52.51,51.98,52,50.660000000000004,50.38999999999999,50.07000000000001,50.13999999999999,50.53000000000001,50.44,50.21,49.08,48.76,48.63000000000001,48.69,49.08,48.85,48.33999999999999,48.34999999999999,48.669999999999995,48.93999999999999,49.11999999999999,48.94,48.30999999999999,48.38999999999999],"color":"green"},{"name":"anthropic","data":[35.74,35.76,35.56999999999999,36.629999999999995,37.46,38.67,39.459999999999994,40.82,41.77,45.32000000000001,47.88000000000001,50.00000000000001,50.120000000000005,50.449999999999996,50.82999999999999,51.36,51.35,52.67000000000001,52.940000000000005,53.269999999999996,53.2,52.809999999999995,52.9,53.13,54.26,54.58,54.71,54.66,54.25,54.49000000000001,54.99,54.989999999999995,54.67,54.42000000000001,54.22,54.39,55.05,54.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
