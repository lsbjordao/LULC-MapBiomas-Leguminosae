<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.42,93.45,93.35,93.38,93.38,93.44,93.38,93.51,93.37,93.34,92.81,92.92,93.28999999999999,93.58,93.62,93.53999999999999,93.38,93.21000000000001,93.21,92.99,93.13,93.13999999999999,93.10999999999999,93.27,93.30000000000001,93.18,93.22999999999999,93.28999999999999,93.35,93.47999999999999,93.47999999999999,93.41,93.33000000000001,93.24000000000001,93.22999999999999,93.22,93.19000000000001,93.29999999999998],"color":"green"},{"name":"anthropic","data":[5.32,6.29,6.379999999999999,6.380000000000001,6.38,6.300000000000001,6.37,6.23,6.37,6.4,6.9399999999999995,6.83,6.46,6.15,6.109999999999999,6.2,6.369999999999999,6.52,6.529999999999999,6.75,6.609999999999999,6.6,6.62,6.46,6.4399999999999995,6.5600000000000005,6.51,6.45,6.39,6.25,6.25,6.32,6.4,6.5,6.52,6.52,6.529999999999999,6.4399999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
