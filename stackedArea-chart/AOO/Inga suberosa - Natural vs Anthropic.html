<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.72,85.47000000000001,85.89999999999999,86.52,86.49,87.13,87.67999999999999,87.53999999999999,87.41999999999999,88.81,91.24,91.56,90.53,90.59000000000002,90.73,91.44,91.99,92.34,91.61,91.39,91.44000000000001,91.47999999999999,91.69000000000001,92.39,92.2,92.44,92.33999999999999,92.25999999999999,91.64000000000001,90.81,90.31,90.41,90.66,90.72,90.89000000000001,90.94,90.83999999999999,90.03999999999999],"color":"green"},{"name":"anthropic","data":[14.76,15.009999999999998,14.57,13.969999999999999,13.989999999999998,13.36,12.799999999999999,12.94,13.049999999999999,11.68,9.239999999999998,8.93,9.959999999999999,9.889999999999999,9.759999999999998,9.049999999999999,8.489999999999998,8.149999999999999,8.87,9.089999999999998,9.049999999999999,8.999999999999998,8.799999999999999,8.09,8.29,8.049999999999999,8.129999999999999,8.229999999999999,8.849999999999998,9.679999999999998,10.179999999999998,10.069999999999999,9.829999999999998,9.78,9.599999999999998,9.559999999999999,9.659999999999998,10.45],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
