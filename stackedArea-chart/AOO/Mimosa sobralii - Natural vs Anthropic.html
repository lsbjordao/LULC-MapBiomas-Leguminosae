<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.89,71.75,71.17,70.97000000000001,70.99000000000001,71.05000000000001,70.53,70.46000000000001,70.55,70.69,71.23,70.46000000000001,70.86,70.63,70.35000000000001,69.94999999999999,69.86,69.67,69.44,70.17999999999999,70.66,70.48,70.32999999999998,70.27,70.14,70.07,70.77,70.77999999999999,70.85,71.02,71.08,71.32,71.47,71.65,71.56,71.83,71.78,72.01],"color":"green"},{"name":"anthropic","data":[27.21,28.31,28.919999999999998,29.08,29.08,29.009999999999998,29.53,29.599999999999998,29.509999999999998,29.340000000000003,28.82,29.62,29.21,29.459999999999997,29.73,30.11,30.21,30.39,30.63,29.85,29.419999999999998,29.58,29.72,29.77,29.830000000000002,29.99,29.290000000000003,29.259999999999998,29.17,28.95,28.939999999999998,28.730000000000004,28.49,28.419999999999998,28.5,28.25,28.259999999999998,28.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
