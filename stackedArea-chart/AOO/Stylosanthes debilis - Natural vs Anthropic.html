<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.75,65.21999999999998,66.49999999999999,66.19,67.2,66.36,67.57,67.86999999999999,67.73000000000002,68.67,68.97,68.87999999999998,69.6,70.19,70.47999999999999,71.18999999999998,71.19000000000001,71.29999999999998,71.5,71.74999999999997,71.69999999999999,71.39999999999999,71.42,71.76,71.69999999999999,71.12,70.17,70.32999999999998,70.06,69.49000000000001,70.42999999999999,70.19000000000001,70.26,70.70000000000002,70.92,70.97999999999999,70.99000000000001,70.95],"color":"green"},{"name":"anthropic","data":[36.9,35.419999999999995,34.129999999999995,34.47,33.449999999999996,34.29,33.089999999999996,32.75,32.910000000000004,31.97,31.68,31.750000000000004,31.05,30.45,30.169999999999998,29.470000000000002,29.46,29.36,29.160000000000004,28.89,28.939999999999998,29.23,29.21,28.86,28.93,29.53,30.450000000000003,30.3,30.569999999999997,31.14,30.240000000000002,30.46,30.39,29.939999999999998,29.73,29.680000000000003,29.63,29.7],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
