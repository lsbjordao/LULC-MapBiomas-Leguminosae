<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.89,57.67000000000001,56.84,56.190000000000005,55.71,55,54.63,54.63,54.64000000000001,55.2,55.44,55.230000000000004,55.22,55.010000000000005,55.11,54.04999999999999,53.88999999999999,53.89999999999999,53.73,53.300000000000004,53.18000000000001,53.11,53.17999999999999,53.27000000000001,53.47,53.66999999999999,53.68,53.8,54.019999999999996,53.81,53.61,53.23,52.949999999999996,52.86999999999999,52.89999999999999,52.9,52.91,52.61999999999999],"color":"green"},{"name":"anthropic","data":[35.07,36.29,37.09,37.75,38.26,38.93,39.3,39.309999999999995,39.309999999999995,38.76,38.54,38.76,38.8,39,38.87,39.94,40.13,40.1,40.29,40.71000000000001,40.84,40.92,40.82999999999999,40.75,40.55,40.35,40.35,40.19,39.989999999999995,40.19,40.4,40.78,41.05,41.16,41.11,41.13,41.089999999999996,41.379999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
