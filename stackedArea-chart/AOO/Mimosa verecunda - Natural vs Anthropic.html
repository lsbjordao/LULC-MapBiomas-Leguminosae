<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.5,51.05,51.26000000000001,51.37,51.319999999999986,51.84000000000001,52.220000000000006,51.72,51.419999999999995,52.22,51.74999999999999,51.58,51.63999999999999,51.91,51.39,51.18,51.220000000000006,50.81999999999999,50.6,50.11999999999999,49.96,50.05,50.26,50.120000000000005,50.239999999999995,52.65999999999999,53.34,53.230000000000004,52.410000000000004,52.04,51.78999999999999,51.3,50.86,50.75000000000001,50.74999999999999,50.71,50.61,51.21],"color":"green"},{"name":"anthropic","data":[48.650000000000006,50.07,49.88,49.760000000000005,49.800000000000004,49.290000000000006,48.89999999999999,49.41,49.71,48.91,49.37,49.519999999999996,49.48,49.22,49.709999999999994,49.92,49.89,50.31,50.519999999999996,51.02,51.16,51.06,50.86000000000001,50.99999999999999,50.88999999999999,48.46,47.79,47.89,48.71,49.080000000000005,49.33,49.83,50.260000000000005,50.36,50.36,50.4,50.519999999999996,49.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
