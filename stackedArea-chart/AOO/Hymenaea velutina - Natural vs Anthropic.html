<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.32999999999998,79.88000000000001,78.97000000000001,78,77.10000000000002,76.89,76.51,77.25,77.18999999999998,77.38000000000001,77.61000000000001,77.33,78.26,78,77.69999999999999,77.18,77.21000000000002,77.07000000000001,77.22,76.93,76.23000000000002,75.63,75.19,75.10000000000002,74.71000000000001,74.81,74.58,73.94,72.97000000000001,72.29,72.10000000000002,72.34,72.29,72.06,71.58000000000003,71.48000000000002,71.28999999999999,71.42000000000002],"color":"green"},{"name":"anthropic","data":[24.080000000000002,24.55,25.470000000000002,26.43,27.33,27.53,27.91,27.18,27.240000000000002,27.06,26.85,27.11,26.15,26.43,26.740000000000002,27.240000000000002,27.22,27.37,27.220000000000002,27.52,28.220000000000006,28.8,29.259999999999998,29.330000000000005,29.730000000000004,29.619999999999997,29.85,30.490000000000002,31.46,32.14000000000001,32.33,32.11000000000001,32.14,32.370000000000005,32.86,32.95,33.14,33.01000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
