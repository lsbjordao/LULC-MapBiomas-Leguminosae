<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.029999999999994,61.68,61.160000000000004,61.169999999999995,61.11,60.99999999999999,60.980000000000004,61.150000000000006,61.35,61.68,61.89,62.169999999999995,62.53,63,63.42,63.779999999999994,63.87,64.26,64.61999999999999,64.83,65.24,65.54,65.64,65.67,65.8,65.82,66.00999999999999,66.07,66.22,66.52,66.74,66.87,67.2,67.36,67.53999999999999,67.56,67.83,67.82],"color":"green"},{"name":"anthropic","data":[37.980000000000004,38.34,38.85,38.86,38.910000000000004,39.019999999999996,39.05,38.870000000000005,38.68,38.35,38.129999999999995,37.85,37.480000000000004,37.019999999999996,36.6,36.24,36.16,35.769999999999996,35.39,35.19,34.78,34.48,34.370000000000005,34.35,34.22,34.2,34.019999999999996,33.96,33.8,33.510000000000005,33.290000000000006,33.16,32.83,32.67,32.49,32.47,32.19,32.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
