<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[90.77,91.32,90.93,90.7,90.7,91.14,91.17,91,90.86,91.1,91.11,90.99,90.78,90.64,90.58,90.92,90.24,89.57,88.67,87.75,86.94,86.04,85.51,84.9,84.43,84.05,83.56,82.97,82.51,82.45,82.04,82,82.33,82.47,82.19,81.74,80.54,79.69],"color":"#006400"},{"name":"Flooded forest","data":[1.26,1.27,1.06,1.1,1.07,1.05,1.2,1.17,1.15,1.24,1.32,1.32,1.31,1.32,1.37,1.37,1.51,1.58,1.54,1.52,1.3,1.01,1,0.96,0.99,1.02,1.05,1,1.04,1.07,1.31,1.4,1.47,1.54,1.57,1.62,1.69,1.71],"color":"#76A5AF"},{"name":"Wetland","data":[1.84,1.23,0.98,0.98,0.99,0.99,0.99,1.35,1.5,1.35,1.02,0.7,0.81,0.75,0.58,0.56,0.62,0.63,0.8,0.83,1.05,1.19,1.33,1.07,0.99,1.11,0.86,0.85,1.05,0.83,0.8,0.84,1.02,0.98,0.86,0.57,0.55,0.17],"color":"#45C2A5"},{"name":"Grassland","data":[0.53,0.52,0.42,0.4,0.35,0.38,0.39,0.43,0.4,0.39,0.44,0.43,0.42,0.42,0.46,0.49,0.47,0.54,0.44,0.47,0.54,0.51,0.48,0.53,0.55,0.59,0.6,0.49,0.48,0.54,0.66,0.77,0.64,0.7,0.7,0.88,0.92,0.92],"color":"#B8AF4F"},{"name":"Pasture","data":[1.08,0.98,1.57,1.82,1.43,1.18,1.07,1.14,1.35,1.44,1.4,1.68,1.85,2.02,2.19,2.05,2.55,3.16,4.22,5.28,6.35,7.52,8.23,8.95,9.47,9.86,10.21,10.86,11.13,11.36,11.38,11.28,10.84,10.75,11.03,11.54,12.77,14.04],"color":"#FFD966"},{"name":"River, lake and ocean","data":[4.25,4.39,4.75,4.73,5.18,4.97,4.91,4.63,4.47,4.2,4.43,4.6,4.56,4.57,4.54,4.33,4.34,4.25,4.06,3.87,3.53,3.44,3.18,3.31,3.29,3.11,3.44,3.55,3.51,3.48,3.54,3.43,3.42,3.28,3.37,3.37,3.25,3.19],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
