<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.400000000000006,58.339999999999996,58.160000000000004,57.60999999999999,57.22,57.15,57.120000000000005,57.13,57.550000000000004,57.580000000000005,57.790000000000006,58.3,58.550000000000004,58.600000000000016,58.78,58.62000000000001,58.75000000000001,58.87000000000001,59.06000000000001,59.100000000000016,59.27000000000001,59.379999999999995,59.51000000000001,59.61000000000001,59.81000000000001,59.96,60.080000000000005,60.13,60.23,60.22999999999999,60.39999999999999,60.169999999999995,60.339999999999996,60.529999999999994,60.79999999999999,61.11,61.489999999999995,61.839999999999996],"color":"green"},{"name":"anthropic","data":[41.5,41.57000000000001,41.76,42.27,42.69,42.76,42.78000000000001,42.79,42.36,42.33,42.120000000000005,41.61,41.35,41.269999999999996,41.09,41.26,41.150000000000006,41.07,40.86,40.81,40.61,40.5,40.36000000000001,40.269999999999996,40.09,39.96,39.82,39.769999999999996,39.660000000000004,39.65,39.48,39.7,39.519999999999996,39.33,39.07999999999999,38.790000000000006,38.43000000000001,38.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
