<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.62,67.06,66.91,66.86,66.64,66.84000000000002,66.83,66.95,66.83,66.99,67,67.18,67.42999999999999,67.79999999999998,68.12,68.14,68.27,68.2,68.04,68.1,68.41999999999999,68.42,68.42999999999999,68.69999999999999,68.83,69.08,69.08,69.31,69.45,69.66,70.06,70.18,70.25,70.22000000000001,70.24000000000001,70.22,70.27000000000001,70.42999999999999],"color":"green"},{"name":"anthropic","data":[35.61,36.160000000000004,36.31,36.36,36.59,36.38,36.39,36.28,36.410000000000004,36.260000000000005,36.25,36.04,35.82,35.42000000000001,35.13,35.09,34.96,35.03,35.18,35.12,34.809999999999995,34.80000000000001,34.790000000000006,34.550000000000004,34.400000000000006,34.129999999999995,34.13999999999999,33.92,33.76,33.58000000000001,33.160000000000004,33.089999999999996,33,33.01,33,32.98,32.97,32.81999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
