<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.35,62.46,62.230000000000004,62.04,61.78,61.6,61.43000000000001,61.40000000000001,61.53,61.77999999999999,61.83,62.05,62.12,62.260000000000005,62.60000000000001,62.650000000000006,62.870000000000005,63.040000000000006,63.169999999999995,63.24,63.42999999999999,63.6,63.72999999999998,63.849999999999994,63.919999999999995,64.03,64.08999999999999,64.25000000000001,64.42000000000002,64.56000000000002,64.73,64.81,64.90000000000002,64.94,64.83,64.65,64.80999999999999,64.72000000000001],"color":"green"},{"name":"anthropic","data":[42.69999999999999,42.61,42.85,43.019999999999996,43.279999999999994,43.47999999999999,43.65,43.67,43.529999999999994,43.279999999999994,43.24999999999999,43.029999999999994,42.93999999999999,42.79,42.449999999999996,42.370000000000005,42.18,42.04,41.89,41.800000000000004,41.629999999999995,41.449999999999996,41.31999999999999,41.19,41.13000000000001,41.019999999999996,40.97,40.809999999999995,40.63999999999999,40.5,40.33,40.260000000000005,40.15,40.14000000000001,40.220000000000006,40.39000000000001,40.25,40.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
