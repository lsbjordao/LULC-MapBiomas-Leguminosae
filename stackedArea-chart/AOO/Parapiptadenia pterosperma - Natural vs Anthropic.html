<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.28999999999999,44.10000000000001,43.720000000000006,43.16,42.4,42.059999999999995,42.079999999999984,41.99,42.21,42.760000000000005,43.03,43.35,43.550000000000004,43.550000000000004,43.56,43.33,43.27,43.31000000000001,43.330000000000005,43.59,43.870000000000005,44.07000000000001,44.410000000000004,44.49999999999999,44.66,44.919999999999995,44.76,44.71000000000001,44.4,44.39,44.44999999999999,44.44,44.529999999999994,44.919999999999995,45.05,45.43999999999999,45.40999999999999,45.53],"color":"green"},{"name":"anthropic","data":[58.190000000000005,59.37999999999999,59.78,60.32,61.07,61.410000000000004,61.4,61.49999999999999,61.269999999999996,60.75000000000001,60.47,60.120000000000005,59.87,59.88,59.88999999999999,60.11,60.2,60.14,60.12,59.849999999999994,59.580000000000005,59.39000000000001,59.099999999999994,59.02,58.83,58.6,58.739999999999995,58.77,59.050000000000004,59.03,58.970000000000006,58.95,58.89000000000001,58.489999999999995,58.37,57.98,58.00999999999999,57.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
