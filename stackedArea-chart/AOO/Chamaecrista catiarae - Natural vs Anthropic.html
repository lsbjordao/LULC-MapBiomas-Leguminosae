<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[16.789999999999996,13.73,13.319999999999999,13.620000000000001,13.66,13.57,14.51,13.74,13.350000000000001,13.78,14.149999999999999,13.59,14.01,13.86,14.46,14.75,15.149999999999999,15.599999999999998,16.5,17.09,16.85,17.02,17.14,17.080000000000002,17.099999999999998,17.900000000000002,18.58,18.51,18.950000000000003,18.959999999999997,18.73,18.709999999999997,18.709999999999997,19.44,19.52,19.53,18.459999999999997,17.869999999999997],"color":"green"},{"name":"anthropic","data":[82.95,86.02999999999999,86.43,86.11,86.08,86.17999999999999,85.24,86.01000000000002,86.4,85.98,85.59,86.16,85.74,85.89,85.28999999999999,84.99999999999999,84.58999999999999,84.13,83.22999999999999,82.65000000000002,82.88,82.71999999999998,82.58999999999999,82.64999999999999,82.63000000000001,81.83,81.16,81.19999999999999,80.76999999999998,80.79,80.99000000000001,81.00999999999999,81.03999999999999,80.28,80.22,80.22,81.29,81.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
