<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.249999999999986,35.120000000000005,34.769999999999996,34.7,34.1,33.629999999999995,33.64999999999999,33.48,33.68999999999999,33.82,33.87,34.11999999999999,34.05,34.14,34.18999999999999,34.15,34.04,34.04999999999999,33.83,33.83,34.03,34.04,33.92,33.88,34.09,34.099999999999994,34.07,34.029999999999994,33.849999999999994,33.76999999999999,34.13999999999999,34.16,34.32,34.49,34.6,34.480000000000004,34.669999999999995,34.74],"color":"green"},{"name":"anthropic","data":[65.08000000000003,66.2,66.58,66.65,67.25000000000001,67.71000000000001,67.69000000000001,67.86,67.64,67.53,67.45000000000002,67.23,67.28,67.19000000000001,67.14999999999999,67.17999999999999,67.30000000000001,67.29,67.49000000000001,67.50000000000001,67.32000000000002,67.32000000000001,67.42999999999999,67.44,67.23,67.25,67.25,67.31,67.49,67.57000000000001,67.22000000000001,67.16,67.00999999999999,66.85000000000001,66.72,66.85999999999999,66.65999999999998,66.58],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
