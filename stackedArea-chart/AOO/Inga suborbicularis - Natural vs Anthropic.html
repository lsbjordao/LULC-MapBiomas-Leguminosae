<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.43,55.91,54.74999999999999,53.88,53.5,53.879999999999995,53.93,53.42,52.87000000000001,52.69999999999999,52.10999999999999,51.300000000000004,50.74000000000001,50.73,50.720000000000006,50.18,50.04,49.93,49.24999999999999,48.53999999999999,47.37,46.959999999999994,47.120000000000005,47.21,47.05,46.63999999999999,46.36000000000001,46.45,46.60999999999999,47.14,47.61,47.87000000000001,48.25,48.120000000000005,48.080000000000005,48.09,48.510000000000005,49.730000000000004],"color":"green"},{"name":"anthropic","data":[45.69,45.2,46.400000000000006,47.23,47.629999999999995,47.22,47.18000000000001,47.67,48.24000000000001,48.42000000000001,49.07,49.87,50.4,50.4,50.39,50.949999999999996,51.1,51.21,51.919999999999995,52.62,53.78999999999999,54.18,53.989999999999995,53.91,54.08,54.44,54.64999999999999,54.55,54.35,53.8,53.34,53.09,52.730000000000004,52.870000000000005,53.02,53.21000000000001,52.790000000000006,51.57000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
