<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.20000000000001,57.88000000000001,57.849999999999994,59.45,59.03000000000001,59.06000000000001,59.11000000000001,58.18,57.44000000000001,57.160000000000004,56.410000000000004,55.69000000000001,55.41,55.690000000000005,54.67,53.830000000000005,53.5,53.46999999999999,53.47,53.129999999999995,52.709999999999994,52.44,52.39999999999999,52.51,52.6,52.76,52.779999999999994,52.410000000000004,52.2,52.300000000000004,52.4,52.59,52.58,52.690000000000005,52.87,52.86,52.85000000000001,52.92999999999999],"color":"green"},{"name":"anthropic","data":[44.82999999999999,46.129999999999995,46.16,44.54,44.98,44.940000000000005,44.9,45.839999999999996,46.56999999999999,46.86,47.580000000000005,48.31,48.6,48.32000000000001,49.32,50.19,50.5,50.519999999999996,50.55,50.87,51.300000000000004,51.60000000000001,51.61,51.49999999999999,51.43,51.239999999999995,51.21,51.599999999999994,51.809999999999995,51.69999999999999,51.6,51.42000000000001,51.42,51.32000000000001,51.13,51.13000000000001,51.17,51.080000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
