<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[51.86,51.5,51.49,51.62,51.79,51.89,51.48,51.82,53.55,53.78,53.8,54.02,54.79,54.61,54.2,55,55.19,55.64,55.62,55.41,55.42,55.52,55.37,55.39,55.45,55.86,54.34,55.93,57.05,57.55,57.57,57.8,58.77,58.72,59.31,59.49,60.33,60.45],"color":"#006400"},{"name":"Pasture","data":[13.8,14.71,15.56,16.28,16.96,16.58,16.06,15.24,14.7,14.01,13.55,13.49,13.23,12.47,11.8,11.28,11.29,11.72,12.45,12.4,12.46,12.31,11.76,11.94,12.41,12.49,12.27,11.39,10.26,10.24,9.63,8.94,9.02,8.63,8.16,7.87,7.75,7.09],"color":"#FFD966"},{"name":"Mosaic of uses","data":[32.42,31.35,30.66,29.9,29.23,29.51,30.15,30.83,29.8,30.3,30.63,30.35,29.88,30.81,31.6,31.46,31.15,30.14,29.18,29.51,29.44,29.52,30.25,30.01,29.47,29.11,30.73,29.98,29.88,29.2,29.79,30.01,28.87,29.36,29.26,29.37,28.47,28.99],"color":"#fff3bf"},{"name":"Non vegetated area","data":[0.35,0.38,0.25,0.26,0.25,0.25,0.3,0.3,0.29,0.29,0.36,0.46,0.46,0.54,0.83,0.86,1,1.09,1.25,1.22,1.33,1.34,1.36,1.42,1.42,1.33,1.41,1.43,1.46,1.59,1.63,1.8,1.85,1.86,1.83,1.84,1.84,1.92],"color":"#EA9999"},{"name":"Rocky outcrop","data":[1.27,1.15,1.11,1.1,1.24,1.22,1.24,1.22,1.2,1.21,1.22,1.23,1.23,1.2,1.19,1.2,1.2,1.28,1.26,1.31,1.31,1.28,1.21,1.21,1.22,1.21,1.21,1.2,1.2,1.1,1.14,1.17,1.36,1.36,1.35,1.37,1.35,1.45],"color":"#665a3a"},{"name":"River, lake and ocean","data":[0.45,1.07,1.07,0.99,0.68,0.7,0.92,0.73,0.61,0.55,0.59,0.59,0.57,0.51,0.53,0.34,0.31,0.27,0.39,0.29,0.18,0.17,0.18,0.18,0.18,0.15,0.18,0.22,0.29,0.46,0.38,0.43,0.28,0.23,0.25,0.23,0.41,0.25],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
