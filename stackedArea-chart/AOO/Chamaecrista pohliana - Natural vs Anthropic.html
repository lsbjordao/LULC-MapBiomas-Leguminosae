<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.14999999999999,58.41,57.81999999999999,56.78000000000001,55.57999999999999,54.849999999999994,54.040000000000006,52.86000000000001,51.87999999999999,50.73,50.24999999999999,50.06,49.79,49.63999999999999,49.21999999999999,48.28,48.17,47.900000000000006,47.279999999999994,47.07999999999999,47.3,47.24,47.32,47.080000000000005,46.91999999999999,46.92,46.589999999999996,46.529999999999994,46.519999999999996,46.239999999999995,46.04999999999999,45.910000000000004,45.92,45.83,45.78,45.790000000000006,45.72,46.1],"color":"green"},{"name":"anthropic","data":[42.82000000000001,44.55000000000001,45.13,46.169999999999995,47.36,48.1,48.92000000000001,50.09,51.07999999999999,52.209999999999994,52.69,52.900000000000006,53.160000000000004,53.330000000000005,53.709999999999994,54.669999999999995,54.79,55.059999999999995,55.68,55.88999999999999,55.64,55.720000000000006,55.63999999999999,55.87,56.04,56.029999999999994,56.37,56.43,56.45,56.73,56.9,57.06,57.04999999999999,57.12,57.17999999999999,57.169999999999995,57.24,56.86999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
