<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.96,50,49.75000000000001,49.45,49.26999999999999,49.21000000000001,49.5,49.26,49.58999999999999,50.31,50.57999999999999,51.01,51.65,51.82,52.33999999999999,52.50999999999999,52.47999999999999,52.55,52.839999999999996,52.970000000000006,53.21,53.68000000000001,53.95999999999999,54.02,54.139999999999986,54.129999999999995,54.099999999999994,53.83,53.98,54.12,54.25999999999999,54.68999999999999,54.84,55.13,55.39,55.5,55.63999999999999,55.940000000000005],"color":"green"},{"name":"anthropic","data":[56.41,56.39,56.660000000000004,56.96,57.160000000000004,57.22000000000001,56.910000000000004,57.17,56.84,56.13,55.86000000000001,55.43,54.790000000000006,54.64999999999999,54.12000000000001,53.95,53.95,53.89000000000001,53.63,53.49,53.26,52.83,52.51,52.47,52.33,52.349999999999994,52.39000000000001,52.68,52.52,52.36000000000001,52.23000000000001,51.800000000000004,51.63,51.370000000000005,51.12,51,50.85,50.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
