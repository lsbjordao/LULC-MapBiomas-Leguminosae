<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[65.92,66.51,66.67,66.89,67.01,67.2,67.15,67.06,66.91,66.78,66.78,66.62,67.13,66.91,66.78,66.62,66.48,66.5,66.52,66.4,66.48,66.69,66.69,66.58,66.65,66.46,66.5,66.48,67.1,67.45,67.48,67.28,67,66.99,66.96,67.4,67.67,67.67],"color":"#006400"},{"name":"Pasture","data":[1.16,1.31,1.65,1.55,1.21,0.92,0.66,0.64,0.48,0.38,0.21,0.24,0.2,0.16,0.1,0.06,0.06,0.06,0.09,0.09,0.1,0.18,0.12,0.2,0.23,0.17,0.06,0.06,0.12,0.07,0.09,0.08,0.1,0.09,0.34,0.3,0.41,0.59],"color":"#FFD966"},{"name":"Mosaic of uses","data":[15,14.36,13.96,13.95,14.21,14.41,14.76,14.86,15.12,15.34,15.5,15.59,15.07,15.29,15.5,15.73,15.81,15.82,15.76,15.86,15.73,15.44,15.51,15.56,15.42,15.73,15.81,15.77,15.14,14.85,14.66,14.9,14.97,14.88,14.61,13.74,13.03,12.82],"color":"#fff3bf"},{"name":"Rocky outcrop","data":[17.69,17.59,17.5,17.39,17.34,17.25,17.2,17.21,17.28,17.27,17.29,17.33,17.38,17.42,17.39,17.36,17.42,17.39,17.4,17.42,17.47,17.47,17.45,17.43,17.48,17.42,17.4,17.46,17.42,17.42,17.55,17.51,17.7,17.81,17.87,18.33,18.66,18.7],"color":"#665a3a"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
