<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.62,71.84,71.57000000000001,71.41999999999999,71.10000000000001,70.87,70.56000000000002,70.52999999999999,69.99,69.7,69.58999999999999,70.14,70.60000000000001,70.8,70.42999999999999,69.84,69.20000000000002,67.40000000000002,67.12,66.82000000000001,67.33,67.41,67.19,67.62,68.16000000000001,68.34,68.36999999999999,68.59999999999998,68.83000000000001,69.28,69.72,69.53,69.62,69.7,69.63,69.21000000000001,69.14000000000001,68.65],"color":"green"},{"name":"anthropic","data":[25.51,28.3,28.569999999999997,28.72,29.039999999999996,29.28,29.57,29.610000000000003,30.15,30.44,30.54,30,29.54,29.330000000000002,29.71,30.29,30.95,32.730000000000004,33.03,33.339999999999996,32.83,32.73,32.94,32.51,31.97,31.8,31.769999999999996,31.54,31.3,30.85,30.400000000000002,30.610000000000003,30.54,30.459999999999997,30.500000000000004,30.93,31.009999999999998,31.5],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
