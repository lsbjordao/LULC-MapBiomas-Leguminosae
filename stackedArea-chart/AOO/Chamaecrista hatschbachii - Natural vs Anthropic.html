<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.91,77.74999999999999,77.69,77.55000000000001,77.48999999999998,77.43,77.37,77.21000000000001,77.03,76.97,76.93,77,77.17999999999999,77.09999999999998,76.86999999999999,76.67,76.51,76.39,75.89,75.48,75.11999999999999,75.08999999999999,75.05,75.13,73.48,72.36,69.85000000000001,69.72000000000001,69.64,69.46,69.36999999999999,69.47,69.69,69.9,70.13000000000001,70.49999999999999,70.5,70.31],"color":"green"},{"name":"anthropic","data":[22.429999999999996,23.560000000000002,23.63,23.779999999999998,23.819999999999997,23.89,23.939999999999998,24.12,24.290000000000003,24.33,24.389999999999997,24.31,24.13,24.209999999999997,24.45,24.66,24.799999999999997,24.939999999999994,25.419999999999998,25.839999999999996,26.199999999999996,26.23,26.26,26.2,27.86,28.960000000000004,31.49,31.599999999999998,31.68,31.86,31.94,31.85,31.63,31.419999999999998,31.189999999999998,30.82,30.82,31.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
