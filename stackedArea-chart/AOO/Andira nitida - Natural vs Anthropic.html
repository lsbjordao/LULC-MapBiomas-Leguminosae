<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50,50.120000000000005,49.400000000000006,48.85,48.629999999999995,48.26999999999999,48.22,48.31999999999999,48.85999999999999,49.71,49.94999999999999,50.469999999999985,50.63,50.53,50.46,50.28,50.4,50.6,51.21,51.51999999999999,51.59,52,52.20000000000001,52.37999999999999,52.529999999999994,52.22,52.08,52.22,52.22,52.26,52.44999999999999,52.37999999999999,52.44,53.099999999999994,53.44,53.829999999999984,54.17999999999999,54.75999999999999],"color":"green"},{"name":"anthropic","data":[43.010000000000005,43.05,43.95000000000001,44.64,44.98000000000001,45.41,45.57000000000001,45.5,44.96,44.239999999999995,44.06,43.470000000000006,43.19,43.27,43.290000000000006,43.46,43.279999999999994,43.06,42.419999999999995,42.07,42,41.67,41.46,41.269999999999996,41.129999999999995,41.550000000000004,41.690000000000005,41.55,41.61000000000001,41.56000000000001,41.39,41.449999999999996,41.410000000000004,40.720000000000006,40.530000000000015,40.28,39.989999999999995,39.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
