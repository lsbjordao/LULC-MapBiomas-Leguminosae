<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.44,75.17999999999999,74.61,74.07,74.19,74.02,72.89,73.10000000000001,73.65,73.52,73.53,74.05,74.05000000000001,74.03,73.63999999999999,73.2,72.86,72.51,72.3,71.96999999999998,72.14,72.07000000000001,71.63,71.07000000000001,70.97999999999999,70.08999999999999,69.68,69.61999999999999,69.15,68.97999999999999,68.49000000000001,68.39999999999999,67.85,67.60000000000001,67.22,66.5,65.43999999999998,65.37],"color":"green"},{"name":"anthropic","data":[23.759999999999998,24.009999999999998,24.59,25.14,25.01,25.17,26.32,26.1,25.54,25.680000000000003,25.66,25.150000000000002,25.140000000000004,25.169999999999998,25.56,26,26.33,26.689999999999998,26.900000000000002,27.22,27.06,27.13,27.559999999999995,28.119999999999994,28.200000000000003,29.110000000000003,29.52,29.580000000000002,30.029999999999998,30.22,30.72,30.8,31.349999999999998,31.6,31.98,32.690000000000005,33.77,33.830000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
