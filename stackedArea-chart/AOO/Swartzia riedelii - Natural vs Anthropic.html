<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.31999999999998,73.54,72.79000000000002,71.91,70.82000000000001,70.2,69.96000000000001,69.92000000000002,69.20999999999998,69.00000000000001,68.97999999999999,68.17,67.21999999999998,67.08,67.31,66.93,67.58,67.28,67.11999999999999,66.75,66.33999999999999,66.52999999999999,66.98,67.44,67.88000000000001,67.96000000000001,68.09999999999998,68.13999999999999,67.52000000000001,67.09999999999998,66.83,66.69000000000001,66.29,66.85,66.77999999999999,66.89999999999999,67.71000000000001,68.45999999999998],"color":"green"},{"name":"anthropic","data":[19.139999999999997,20.04,20.84,21.700000000000003,22.82,23.47,23.709999999999997,23.75,24.42,24.62,24.66,25.46,26.4,26.48,26.21,26.590000000000003,25.9,26.220000000000002,26.37,26.76,27.18,26.990000000000002,26.529999999999998,26.07,25.630000000000003,25.53,25.380000000000003,25.370000000000005,26.07,26.49,26.76,26.910000000000004,27.170000000000005,26.610000000000003,26.68,26.570000000000004,25.71,24.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
