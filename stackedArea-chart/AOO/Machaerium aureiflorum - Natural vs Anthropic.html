<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.64999999999999,75.67999999999999,75.61,75.65,75.14999999999999,75.13000000000001,74.72,74.49,74.46000000000001,75.03000000000002,74.92000000000002,74.16,73.08,71.8,71.55,71.21999999999998,71.29,70.76,69.96000000000001,69.7,69.16,68.48,67.86,68.14999999999999,68.03999999999999,67.98,67.59,67.48,66.79,66.53000000000002,66.02,65.8,65.42999999999999,65.36,65.4,65.28,65.3,63.980000000000004],"color":"green"},{"name":"anthropic","data":[24.9,24.869999999999997,24.93,24.900000000000002,25.389999999999997,25.419999999999998,25.82,26.040000000000003,26.070000000000004,25.5,25.63,26.37,27.47,28.74,29,29.330000000000002,29.240000000000002,29.790000000000003,30.580000000000002,30.85,31.380000000000003,32.05,32.67,32.39,32.5,32.59,32.96,33.06,33.760000000000005,34.02,34.52,34.76,35.120000000000005,35.2,35.160000000000004,35.25,35.26,36.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
