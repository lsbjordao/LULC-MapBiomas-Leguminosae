<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.93000000000002,82.26,80.86999999999998,81.25000000000001,81.32,81.41000000000001,80.63,78.67000000000002,79.1,79.87,80.54,81.50000000000001,81.79999999999998,82.07000000000001,82.44,82.28,81.77000000000002,82,83.00000000000001,83.53,85.48000000000002,88,88.08,88.11999999999999,85.52000000000001,84.85000000000001,85.06,84.79,85.13000000000001,85.82000000000002,86.26,86.35000000000001,87.08,86.97,87.24999999999999,87.14999999999999,87.34,87.60999999999999],"color":"green"},{"name":"anthropic","data":[18.03,17.72,19.11,18.720000000000002,18.650000000000002,18.560000000000002,19.35,21.310000000000002,20.87,20.11,19.450000000000003,18.48,18.17,17.91,17.53,17.69,18.220000000000002,17.990000000000002,16.96,16.45,14.5,11.979999999999999,11.9,11.84,14.44,15.139999999999999,14.92,15.190000000000001,14.84,14.14,13.7,13.629999999999999,12.910000000000002,13.03,12.740000000000002,12.83,12.63,12.360000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
