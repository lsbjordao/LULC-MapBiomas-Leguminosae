<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.28,60.96999999999999,60.11999999999999,59.400000000000006,58.7,58.160000000000004,57.43,56.8,56.339999999999996,55.87,55.129999999999995,54.66999999999999,54.25999999999999,53.84999999999999,53.48,53.080000000000005,52.859999999999985,52.61,52.099999999999994,51.81999999999999,51.629999999999995,51.449999999999996,51.359999999999985,51.219999999999985,51.160000000000004,50.99,50.8,50.53999999999999,50.07000000000001,49.78999999999999,49.55,49.370000000000005,49.300000000000004,49.2,49.11,49.14,48.88999999999999,48.73],"color":"green"},{"name":"anthropic","data":[42.03,43.330000000000005,44.14,44.88,45.6,46.14999999999999,46.84999999999999,47.480000000000004,47.94999999999999,48.440000000000005,49.169999999999995,49.62,50.04000000000001,50.45,50.809999999999995,51.23,51.419999999999995,51.67,52.239999999999995,52.46999999999999,52.68000000000001,52.88,52.919999999999995,53.07,53.13,53.31,53.51000000000001,53.769999999999996,54.21000000000001,54.53,54.739999999999995,54.919999999999995,54.99999999999999,55.080000000000005,55.209999999999994,55.15,55.41999999999999,55.58],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
