<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.48,47.410000000000004,47.38000000000001,47.41,47.18000000000001,47.13,47.050000000000004,46.74,46.809999999999995,47.160000000000004,47.160000000000004,47.39,47.54,47.82,48.23,48.63999999999999,48.85999999999999,49.13,49.66,49.71999999999999,50.14999999999999,50.56,50.78,50.69,50.74,51.21999999999999,51.089999999999996,51.06999999999999,50.94,51.18,51.519999999999996,51.79,51.91999999999999,52.32999999999999,52.35,52.64,52.4,52.56999999999999],"color":"green"},{"name":"anthropic","data":[30.560000000000006,30.720000000000002,30.780000000000005,30.78,31.09,31.1,31.070000000000004,31.33,31.34,31.1,31.110000000000003,30.840000000000003,30.539999999999996,30.240000000000002,29.809999999999995,29.45,29.26,28.93,28.310000000000002,27.990000000000002,27.380000000000003,26.89,26.619999999999997,26.57,26.53,26.330000000000002,26.51,26.380000000000003,26.460000000000004,26.31,26.1,25.91,25.819999999999997,25.39,25.05,24.84,25.11,24.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
