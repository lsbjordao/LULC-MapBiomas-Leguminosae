<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.26,67.26,66.96,66.18,65.85000000000001,65.65,65.39999999999999,65.02,64.7,64.00000000000001,63.38,63.010000000000005,63.06999999999999,62.72,62.31999999999999,61.81,61.46,61.14,61.07999999999999,60.43000000000001,60.00999999999999,59.61,59.32,59.25999999999999,58.96,58.919999999999995,58.629999999999995,58.03,57.56,57.22,56.96,56.92999999999999,56.790000000000006,56.66,56.44,56.169999999999995,55.93999999999999,55.75000000000001],"color":"green"},{"name":"anthropic","data":[37.56999999999999,37.580000000000005,37.90000000000001,38.660000000000004,39,39.18,39.44999999999999,39.84000000000001,40.120000000000005,40.83999999999999,41.470000000000006,41.81999999999999,41.77,42.12,42.50999999999999,43.04,43.38999999999999,43.7,43.77000000000001,44.4,44.82,45.22999999999999,45.49,45.57999999999999,45.87,45.91,46.2,46.79999999999999,47.29,47.629999999999995,47.870000000000005,47.910000000000004,48.050000000000004,48.17,48.41,48.67999999999999,48.9,49.089999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
