<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.92000000000001,54.46,54.010000000000005,53.089999999999996,52.120000000000005,51.25,49.92,48.31000000000001,47.14000000000001,46.18,45.65,45.04,44.06,43.81,43.39000000000001,43.05000000000001,42.34000000000001,42.03,41.63,41.32000000000001,41.19,41.120000000000005,40.96,41.04,41.43,41.550000000000004,41.720000000000006,41.74000000000001,41.72,41.64,41.61000000000001,41.510000000000005,41.24000000000001,41.08,41.07,41.19000000000001,41.370000000000005,43.720000000000006],"color":"green"},{"name":"anthropic","data":[43.86,45.31,45.769999999999996,46.68999999999999,47.65,48.51,49.85,51.46999999999999,52.62,53.580000000000005,54.120000000000005,54.73,55.709999999999994,55.98,56.379999999999995,56.72,57.419999999999995,57.73,58.15,58.44999999999999,58.589999999999996,58.65,58.82999999999999,58.73,58.32,58.23,58.05,58.03,58.04999999999999,58.13999999999999,58.15,58.269999999999996,58.529999999999994,58.709999999999994,58.69999999999999,58.59,58.4,56.06],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
