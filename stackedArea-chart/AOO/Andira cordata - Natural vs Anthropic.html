<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.72,84.54000000000002,84.23000000000002,84,83.64,83.32000000000002,83.02000000000001,82.75,82.44999999999999,82.24000000000001,81.95,81.74000000000001,81.29,80.88000000000001,80.12,79.63,79.37,79.19000000000001,78.83000000000001,78.58000000000001,78.06,77.74000000000002,77.3,77.10000000000001,76.75,76.09000000000002,75.43,75.21000000000001,74.63000000000001,74.29,74.1,73.87,72.73,72.87,72.64000000000001,72.3,72.35,71.31],"color":"green"},{"name":"anthropic","data":[18.04,18.22,18.52,18.76,19.120000000000005,19.439999999999998,19.740000000000002,20.009999999999998,20.3,20.52,20.810000000000002,21,21.45,21.87,22.650000000000002,23.12,23.38,23.580000000000002,23.93,24.179999999999996,24.679999999999996,25.019999999999996,25.459999999999997,25.64,26.010000000000005,26.679999999999996,27.32,27.54,28.13,28.47,28.65,28.91,30.050000000000004,29.869999999999997,30.1,30.459999999999997,30.419999999999998,31.470000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
