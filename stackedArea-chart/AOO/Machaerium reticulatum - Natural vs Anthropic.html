<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.449999999999996,56.34000000000001,56.1,55.99000000000001,55.89,55.959999999999994,56.21,56.14000000000001,56.379999999999995,56.779999999999994,56.99,57.28,58.38,58.71000000000001,59.33,59.88,60.1,60.170000000000016,60.08999999999999,60.11,60.43000000000001,60.71,60.78000000000001,60.58,60.59,61.150000000000006,61.49000000000001,61.489999999999995,61.71,61.980000000000004,62.04,62.13,62.29999999999999,62.53,62.580000000000005,62.800000000000004,63.059999999999995,63.19],"color":"green"},{"name":"anthropic","data":[44.35999999999999,44.47999999999999,44.74,44.830000000000005,44.91,44.85999999999999,44.62,44.67999999999999,44.43999999999999,44.04,43.839999999999996,43.55,42.44999999999999,42.10999999999999,41.48,40.95,40.739999999999995,40.64999999999999,40.73,40.69,40.39,40.12,40.04,40.24,40.220000000000006,39.68,39.35,39.32,39.11999999999999,38.83,38.779999999999994,38.699999999999996,38.529999999999994,38.309999999999995,38.25,38.029999999999994,37.74999999999999,37.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
