<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.47999999999999,89.64,89.90999999999998,89.95,90.05,90.14999999999999,90.11,90.08,90.02,89.79,89.49000000000001,89.51,89.41000000000001,89.32,89.39000000000001,89.47,89.51999999999998,89.4,89.26,89.15,89.00000000000001,88.87,88.68999999999998,88.53999999999999,88.48999999999998,88.53,88.52999999999999,88.47,88.15999999999998,87.75,87.46,87.38,87.32,87.33,87.33,87.4,87.38999999999999,87.11999999999999],"color":"green"},{"name":"anthropic","data":[12.42,12.250000000000002,11.980000000000002,11.96,11.810000000000002,11.75,11.79,11.819999999999999,11.850000000000001,12.12,12.39,12.4,12.49,12.58,12.500000000000002,12.430000000000001,12.350000000000001,12.51,12.639999999999999,12.73,12.889999999999999,13.030000000000001,13.2,13.349999999999998,13.41,13.360000000000001,13.38,13.429999999999998,13.730000000000002,14.139999999999999,14.420000000000002,14.52,14.58,14.55,14.559999999999999,14.5,14.51,14.769999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
