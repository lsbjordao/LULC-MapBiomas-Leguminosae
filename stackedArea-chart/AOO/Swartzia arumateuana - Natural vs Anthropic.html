<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.63000000000001,88.12000000000002,86.61,83.75,82.29,81.43,80.47999999999999,77.79,75.03,71.49000000000001,68.56,67.67,67.07000000000001,66.09,65.53,65.06,64.64,64.48,63.660000000000004,62.3,61.44999999999999,60.84,60.86,61.06999999999999,61.410000000000004,61.49,61.78000000000001,62.55,63.27000000000001,63.57,64.89999999999999,67.46,67.00999999999999,65.47,65.53,64.44,64.84,62.440000000000005],"color":"green"},{"name":"anthropic","data":[12.629999999999999,12.149999999999999,13.66,16.5,17.96,18.82,19.759999999999998,22.459999999999997,25.23,28.76,31.7,32.58,33.190000000000005,34.16,34.730000000000004,35.19,35.620000000000005,35.77,36.59,37.96999999999999,38.81,39.42,39.39,39.18,38.86,38.76000000000001,38.49999999999999,37.7,36.99999999999999,36.7,35.35,32.800000000000004,33.260000000000005,34.760000000000005,34.72,35.81,35.41,37.82],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
