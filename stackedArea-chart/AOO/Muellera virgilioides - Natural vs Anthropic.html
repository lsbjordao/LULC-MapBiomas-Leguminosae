<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.04,40.76,40.49,40.809999999999995,40.769999999999996,40.81999999999999,41.1,41.06,40.9,40.839999999999996,41.00999999999999,41.589999999999996,41.84,42.32,42.91999999999999,43.05,43.290000000000006,43.94999999999999,44.45,44.65,45.470000000000006,45.92000000000001,46.21999999999999,46.41999999999999,46.41,46.49,46.21999999999999,46.5,46.28999999999999,46.48,46.41999999999999,46.64999999999999,46.78999999999999,47.10999999999999,47.38999999999999,47.449999999999996,46.71999999999999,46.83],"color":"green"},{"name":"anthropic","data":[32.45,32.730000000000004,33.00000000000001,32.68,32.74,32.68000000000001,32.4,32.42,32.6,32.65,32.49,31.889999999999997,31.649999999999995,31.169999999999998,30.580000000000002,30.460000000000004,30.21,29.56,29.05,28.859999999999996,28.02,27.57,27.270000000000003,27.06,27.080000000000002,27.009999999999998,27.279999999999998,26.98,27.209999999999997,27.01,27.1,26.830000000000002,26.700000000000003,26.4,26.11,26.049999999999997,26.770000000000003,26.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
