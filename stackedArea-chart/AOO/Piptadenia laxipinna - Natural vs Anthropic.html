<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.25999999999999,63.74999999999999,62.06,62.85999999999999,63.089999999999996,62.949999999999996,63.5,63.06,63.370000000000005,65.61999999999999,65.82,69.33000000000001,69.91,70.97,72.5,73.3,73.49999999999999,74.17999999999999,74.75,74.80999999999999,75.74999999999999,76.53999999999999,77.05999999999999,77.00999999999999,77.49,78,78.30999999999999,79.07999999999998,78.92999999999998,79.46999999999998,79.43999999999998,79.47999999999999,79.73999999999998,79.66999999999999,79.71999999999998,80.23999999999998,80.63,80.88],"color":"green"},{"name":"anthropic","data":[36.5,36,37.69,36.89,36.66,36.81,36.25,36.69,36.37,34.12,33.94,30.41,29.82,28.77,27.23,26.43,26.24,25.560000000000002,25,24.93,24,23.189999999999998,22.68,22.72,22.240000000000002,21.740000000000002,21.439999999999998,20.66,20.81,20.26,20.3,20.27,20.009999999999998,20.060000000000002,20.02,19.509999999999998,19.11,18.86],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
