<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.449999999999996,58.08,57.309999999999995,56.23999999999999,55.559999999999995,55.519999999999996,55.510000000000005,55.55,55.55999999999999,56.15,56.699999999999996,57.24,57.69,57.32,56.94999999999999,56.81,56.5,56.43999999999999,56.18,55.9,55.87,56.19,56.55,57.01,57.12,57.06,57.11,56.58999999999998,56.23,55.94,56.109999999999985,56.099999999999994,55.829999999999984,56.25,56.05999999999999,56.099999999999994,56.12,56.339999999999996],"color":"green"},{"name":"anthropic","data":[40.49,40.85999999999999,41.73,42.839999999999996,43.52,43.56999999999999,43.58999999999999,43.559999999999995,43.54999999999999,42.94,42.400000000000006,41.779999999999994,41.32,41.660000000000004,42,42.15,42.42000000000001,42.49,42.75,42.99,43.04,42.709999999999994,42.370000000000005,41.95,41.85,41.910000000000004,41.809999999999995,42.37,42.71,43.019999999999996,42.85,42.84,43.12,42.68000000000001,42.849999999999994,42.81000000000001,42.79,42.57],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
