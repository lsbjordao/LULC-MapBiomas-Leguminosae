<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.59999999999999,60.96999999999999,60.48,60.27,59.73,59.359999999999985,59.080000000000005,58.39,57.589999999999996,57.18,57.26,57.49999999999999,57.82,57.71,57.77999999999999,57.779999999999994,57.35999999999999,57.26,56.879999999999995,56.64,56.3,56.59999999999999,56.669999999999995,56.669999999999995,56.519999999999996,56.50999999999999,56.21999999999999,55.699999999999996,55.31999999999999,54.769999999999996,54.559999999999995,54.41,54.449999999999996,54.599999999999994,54.38999999999999,54.42999999999999,54.22,54.330000000000005],"color":"green"},{"name":"anthropic","data":[44.96,45.64,46.14,46.31999999999999,46.879999999999995,47.24999999999999,47.529999999999994,48.230000000000004,49.00999999999999,49.41,49.349999999999994,49.099999999999994,48.779999999999994,48.89,48.81,48.83,49.239999999999995,49.33,49.73,49.92999999999999,50.28999999999999,50.01,49.92,49.93,50.08,50.08,50.36999999999999,50.890000000000015,51.28,51.830000000000005,52.05,52.199999999999996,52.15,51.98000000000001,52.199999999999996,52.14000000000001,52.37,52.24999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
