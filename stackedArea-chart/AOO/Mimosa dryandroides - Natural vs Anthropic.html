<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.84,50.36,50.35,50.58,50.449999999999996,50.92,51.06,51.309999999999995,52.050000000000004,52.690000000000005,52.52,52.54999999999999,52.72,52.88,53.78,54.29,54.989999999999995,55.739999999999995,56.28,56.51,56.72,57.01,57.14,57.28000000000001,57.62999999999999,58.01,58.06,58.26,58.510000000000005,59,59.45,59.629999999999995,59.81,59.91,59.92000000000001,60.11999999999998,60.589999999999996,61.18],"color":"green"},{"name":"anthropic","data":[51.09,50.54,50.57,50.33,50.45,49.99,49.849999999999994,49.59,48.86,48.23,48.400000000000006,48.36,48.18,48.029999999999994,47.13,46.620000000000005,45.94999999999999,45.169999999999995,44.65,44.41,44.199999999999996,43.910000000000004,43.78,43.63,43.29,42.9,42.83,42.65,42.39,41.919999999999995,41.459999999999994,41.28,41.11,41.01,40.98,40.79,40.339999999999996,39.739999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
