<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.51,94.22,93.77999999999999,93.85000000000001,93.55,94,95.29,95.31,95.40999999999998,96.57,97.54,97.60000000000001,97.66999999999999,97.80999999999999,97.67999999999999,97.99000000000001,98.05,98.06000000000002,98.08,98.09,98.13000000000001,98.07000000000001,98.23,98.39999999999999,98.36999999999999,98.33000000000001,98.35000000000001,98.43,98.48,98.25999999999999,97.91,97.95,98.25999999999999,98.28999999999999,98.43,98.32000000000001,98.19999999999999,98.02],"color":"green"},{"name":"anthropic","data":[5.1,5.41,5.84,5.78,6.07,5.62,4.34,4.32,4.21,3.05,2.09,2.03,1.96,1.81,1.95,1.6300000000000001,1.58,1.57,1.55,1.53,1.49,1.56,1.4000000000000001,1.22,1.25,1.28,1.28,1.19,1.1500000000000001,1.3800000000000001,1.72,1.68,1.36,1.33,1.21,1.31,1.4300000000000002,1.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
