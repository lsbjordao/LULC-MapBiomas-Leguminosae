<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.19999999999999,67.41999999999999,67.45,67.45,67.54,67.63,67.91,67.85000000000001,67.73,67.67,67.67999999999999,67.49000000000001,67.39,67.56,67.89999999999999,67.59,67.55,67.65,67.60000000000001,67.47,67.49000000000001,67.45,67.52000000000001,67.46000000000001,67.77000000000001,67.83999999999999,67.80000000000001,67.76,67.73,67.71000000000001,67.83,67.88,68.07,68.08,67.94000000000001,67.76,67.44000000000001,66.84],"color":"green"},{"name":"anthropic","data":[19.77,20.560000000000002,20.509999999999998,20.52,20.44,20.34,20.07,20.12,20.25,20.29,20.29,20.490000000000002,20.58,20.41,20.09,20.39,20.43,20.33,20.39,20.509999999999998,20.490000000000002,20.520000000000003,20.46,20.52,20.21,20.14,20.17,20.21,20.240000000000002,20.26,20.14,20.09,19.89,19.89,20.04,20.21,20.520000000000003,21.130000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
