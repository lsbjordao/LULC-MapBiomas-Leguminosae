<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.54,76.2,76.23,76.46000000000001,76.5,76.58,76.68,76.66000000000001,76.34000000000002,76.19000000000003,75.83000000000001,74.69000000000001,74.69000000000001,74.62,74.97000000000001,74.72999999999999,74.36999999999999,74.4,74.24000000000001,73.83000000000001,73.2,72.27,71.74000000000001,71.10000000000001,71.27000000000002,71.18,70.98000000000002,70.92000000000002,70.85000000000001,70.66000000000001,70.92999999999999,71.07000000000001,71.52,71.49,71.22,71.04,70.77,71.62],"color":"green"},{"name":"anthropic","data":[23.700000000000003,24.03,24,23.78,23.740000000000002,23.65,23.560000000000002,23.58,23.91,24.049999999999997,24.4,25.549999999999997,25.54,25.61,25.259999999999998,25.5,25.86,25.84,25.98,26.4,27.03,27.96,28.5,29.140000000000004,28.96,29.06,29.24,29.3,29.380000000000003,29.570000000000004,29.279999999999998,29.15,28.72,28.74,29.009999999999998,29.19,29.470000000000002,28.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
