<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.81,56.36000000000001,56.25000000000001,56.330000000000005,56.650000000000006,56.4,56.76,56.839999999999996,57.029999999999994,57.550000000000004,57.64000000000001,57.6,57.650000000000006,57.96,58.6,58.81,59.39000000000001,59.71,59.660000000000004,60.04,60.2,60.24,60.33,60.56999999999999,60.77,60.86,61.15,61.34,61.74999999999999,61.98,62.28,62.160000000000004,62.51,62.690000000000005,62.96,63,63.190000000000005,63.29],"color":"green"},{"name":"anthropic","data":[46.39,45.83,45.92999999999999,45.879999999999995,45.55,45.8,45.43999999999999,45.36,45.17999999999999,44.64,44.57,44.62,44.540000000000006,44.25,43.61,43.4,42.81,42.49,42.550000000000004,42.150000000000006,42,41.96000000000001,41.870000000000005,41.620000000000005,41.440000000000005,41.330000000000005,41.050000000000004,40.88000000000001,40.45,40.230000000000004,39.93,40.040000000000006,39.69,39.5,39.25,39.199999999999996,39.00000000000001,38.9],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
