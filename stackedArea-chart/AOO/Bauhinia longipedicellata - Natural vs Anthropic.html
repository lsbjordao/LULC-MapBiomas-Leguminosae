<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[210.01999999999995,208.57999999999996,207.17000000000002,205.67,204.86,204.65,203.6,200.77999999999997,198.48,196.78999999999996,195,193.92999999999998,193.25999999999996,192.30999999999997,191.77999999999997,191.19999999999996,191.15000000000003,190.1,186.6,185.47,183.89000000000001,179.82999999999998,176.11,173.67,173.01,172.59,172.03000000000003,171.42,171.95,172.42000000000002,173.06,171.80000000000004,171.14,170.65,170.09,169.37,165.61,157.92000000000002],"color":"green"},{"name":"anthropic","data":[23.73,25.17,26.590000000000003,28.1,28.889999999999997,29.099999999999998,30.169999999999998,32.99,35.28,36.96,38.75,39.83,40.510000000000005,41.45,41.980000000000004,42.559999999999995,42.620000000000005,43.66,47.160000000000004,48.28999999999999,49.86999999999999,53.940000000000005,57.67,60.08,60.76,61.2,61.74,62.34,61.78999999999999,61.34,60.69,61.949999999999996,62.620000000000005,63.13,63.690000000000005,64.4,68.15,75.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
