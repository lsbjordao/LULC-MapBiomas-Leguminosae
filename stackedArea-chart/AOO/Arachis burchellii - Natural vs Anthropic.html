<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.06999999999999,56.39,56.03,55.699999999999996,54.989999999999995,54.230000000000004,53.01,51.83,50.96999999999999,49.919999999999995,49.34999999999999,48.92999999999999,48.65,48.13999999999999,47.029999999999994,45.9,45.02,44.209999999999994,43.769999999999996,43.42,42.84,42.29,42.099999999999994,42.17999999999999,42.309999999999995,42.18,42.120000000000005,42.50000000000001,42.3,41.9,41.559999999999995,41.449999999999996,41.449999999999996,41.480000000000004,41.47,41.49,41.199999999999996,40.12],"color":"green"},{"name":"anthropic","data":[45.27,44.94,45.31,45.65,46.35999999999999,47.13,48.33,49.510000000000005,50.370000000000005,51.43,52,52.42000000000001,52.68000000000001,53.20000000000001,54.32,55.449999999999996,56.31999999999999,57.13,57.57,57.91,58.50999999999999,59.05,59.24,59.16,59.050000000000004,59.150000000000006,59.22,58.84,59.07,59.42,59.790000000000006,59.9,59.9,59.87000000000001,59.88,59.86,60.14,61.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
