<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.739999999999995,59.260000000000005,59.14999999999999,59.32,59.249999999999986,59.36,59.65,59.02,58.81000000000001,58.93000000000001,58.63999999999999,58.699999999999996,59.21000000000001,59.120000000000005,59.46,59.379999999999995,59.21000000000001,59.31000000000001,59.85000000000001,60.099999999999994,60.58,60.69999999999999,60.87,60.93,60.900000000000006,60.849999999999994,60.379999999999995,59.93,59.79,59.32,59.31,59.24,59.39,59.48,59.239999999999995,59.39999999999999,59.259999999999984,59.72],"color":"green"},{"name":"anthropic","data":[45.540000000000006,45.02,45.13000000000001,44.95,45.03000000000001,44.93000000000001,44.62,45.25,45.470000000000006,45.33,45.62999999999999,45.56,45.050000000000004,45.15999999999999,44.81,44.879999999999995,45.03999999999999,44.97,44.440000000000005,44.169999999999995,43.7,43.58,43.41000000000001,43.36,43.39,43.419999999999995,43.89999999999999,44.36,44.49,44.95,44.970000000000006,45.010000000000005,44.9,44.8,45.02,44.88000000000001,45.03,44.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
