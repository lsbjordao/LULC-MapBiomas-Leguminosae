<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.60000000000001,73.85000000000001,73.53,73.47,73.43,73.39,73.44000000000001,73.51000000000002,73.75,73.86000000000003,73.81000000000002,74.05999999999999,74.17999999999999,74.24,74.36000000000001,74.32000000000001,74.45,74.54,74.68,74.87,75.03,75.19,75.31,75.49,75.72999999999998,75.95,76.05999999999999,76.13999999999999,76.10999999999997,76.04,76.15999999999998,76.21000000000001,76.27,76.39,76.39000000000001,76.47000000000001,76.67,76.74],"color":"green"},{"name":"anthropic","data":[29.480000000000004,29.259999999999998,29.6,29.63,29.68,29.71,29.660000000000004,29.59,29.360000000000003,29.24,29.29,29.029999999999998,28.92,28.859999999999996,28.759999999999998,28.79,28.660000000000004,28.580000000000002,28.41,28.24,28.080000000000002,27.919999999999995,27.799999999999997,27.62,27.37,27.17,27.03,26.96,27.020000000000003,27.07,26.96,26.9,26.85,26.729999999999997,26.700000000000006,26.62,26.45,26.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
