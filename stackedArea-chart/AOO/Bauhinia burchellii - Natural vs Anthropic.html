<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.29999999999999,59.42,59.620000000000005,59.92,59.62,59.419999999999995,59.49,58.290000000000006,55.940000000000005,54.19,53.07,52.46,52.43999999999999,51.46000000000001,50.51,49.269999999999996,48.08,46.709999999999994,46.2,46.370000000000005,46.199999999999996,45.93000000000001,45.28,45.43,45.76,45.68,45.74,45.57999999999999,45.849999999999994,45.870000000000005,46.18000000000001,46.080000000000005,45.830000000000005,45.910000000000004,46.12,46.040000000000006,46.13,42.53],"color":"green"},{"name":"anthropic","data":[42.89,43.78,43.58,43.290000000000006,43.580000000000005,43.78,43.69,44.93,47.27,49.00000000000001,50.13,50.75,50.760000000000005,51.74,52.68,53.940000000000005,55.13999999999999,56.47999999999999,56.99,56.82999999999999,56.99999999999999,57.27,57.910000000000004,57.76,57.43999999999999,57.53,57.459999999999994,57.62,57.35,57.339999999999996,57.03,57.11000000000001,57.39,57.31,57.089999999999996,57.160000000000004,57.06999999999999,60.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
