<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.02999999999999,71.96,71.78,71.44000000000001,71.14,70.97,70.86,70.94000000000001,70.99,71.09,71.16,71.36,71.58,71.67999999999999,71.7,71.5,71.38,71.13,71.03999999999999,70.86000000000001,70.95,70.82000000000001,70.62,70.58,70.64999999999999,70.68,70.48999999999998,70.52,70.37,70.39,70.53999999999999,70.44,70.5,70.47,70.48,70.4,70.36,70.4],"color":"green"},{"name":"anthropic","data":[30.5,30.580000000000002,30.76,31.099999999999998,31.410000000000004,31.59,31.69,31.630000000000003,31.56,31.44,31.39,31.19,30.979999999999997,30.860000000000003,30.840000000000003,31.040000000000003,31.140000000000008,31.400000000000002,31.500000000000004,31.690000000000005,31.59,31.73,31.919999999999995,31.969999999999995,31.900000000000002,31.85,32.06,32.040000000000006,32.19,32.14,32.01,32.1,32.02,32.08,32.04,32.15,32.16,32.15],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
