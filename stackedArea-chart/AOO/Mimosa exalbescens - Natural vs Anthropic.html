<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.77000000000001,57.410000000000004,56.690000000000005,56.97999999999999,56.540000000000006,56.71,55.58,54.06,52.160000000000004,51.41,50.26,49.13,48.760000000000005,48.52,49.019999999999996,49.19,48.45,47.58,46.9,46.74,46.269999999999996,46.870000000000005,47.629999999999995,47.709999999999994,48.05000000000001,48.18000000000001,48.38,47.89,46.790000000000006,45.76,45.440000000000005,44.290000000000006,43.5,43.68,42.37,41.33,41.03,40.550000000000004],"color":"green"},{"name":"anthropic","data":[43.900000000000006,44.25000000000001,44.97,44.650000000000006,45.120000000000005,44.94,46.07000000000001,47.59000000000001,49.500000000000014,50.230000000000004,51.379999999999995,52.510000000000005,52.9,53.15,52.63,52.47999999999999,53.21,54.07,54.74999999999999,54.91,55.379999999999995,54.78999999999999,54.02,53.949999999999996,53.59,53.48000000000001,53.27,53.79,54.85999999999999,55.91,56.209999999999994,57.370000000000005,58.16,57.98,59.29,60.33,60.65,61.1],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
