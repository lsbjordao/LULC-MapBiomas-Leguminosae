<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.36,72.77,72.46,72.39,72.05,71.96,71.59,71.53,72.22,72.41,72.74000000000001,73.05,73.16999999999999,73.16,73.28999999999999,73.54999999999998,73.7,73.97,74.10000000000001,73.98,74.15000000000002,74.33000000000001,74.37,74.37,74.49000000000001,74.8,75.08999999999999,75.25,75.32000000000001,75.58999999999999,75.86999999999999,75.99999999999999,76.09,76.14,76.16999999999999,76.21,76.80000000000001,76.75999999999998],"color":"green"},{"name":"anthropic","data":[28.18,27.780000000000005,28.09,28.18,28.52,28.61,28.97,29.040000000000003,28.340000000000003,28.150000000000002,27.830000000000002,27.52,27.390000000000004,27.400000000000002,27.27,27.009999999999998,26.869999999999997,26.59,26.47,26.58,26.430000000000003,26.240000000000002,26.209999999999997,26.19,26.07,25.759999999999998,25.49,25.310000000000002,25.24,24.979999999999997,24.68,24.569999999999997,24.490000000000002,24.439999999999998,24.390000000000004,24.34,23.74,23.810000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
