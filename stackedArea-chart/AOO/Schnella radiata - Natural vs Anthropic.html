<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.089999999999996,34.379999999999995,33.900000000000006,33.919999999999995,33.6,33.67,33.78,33.9,34.199999999999996,35.3,35.62,36.28,36.370000000000005,36.649999999999984,36.88999999999999,37.2,37.26,37.1,37.30999999999999,37.69,37.89999999999999,38.129999999999995,38.37,37.97999999999999,37.95,38.32,38.38999999999999,38.75999999999999,39.08,39.4,39.550000000000004,39.76,39.92,40.08,40.32,40.29,40.21,40.23],"color":"green"},{"name":"anthropic","data":[65.97999999999998,66.66,67.13999999999999,67.13999999999999,67.45,67.39,67.30999999999999,67.20999999999998,66.88999999999997,65.76999999999998,65.48,64.82000000000001,64.72000000000001,64.42000000000002,64.18,63.88,63.820000000000014,63.95,63.75,63.39,63.17000000000001,62.959999999999994,62.720000000000006,63.110000000000014,63.15,62.769999999999996,62.7,62.339999999999996,62.02000000000001,61.7,61.57000000000001,61.370000000000005,61.18000000000001,61.010000000000005,60.82,60.839999999999996,60.929999999999986,60.89999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
