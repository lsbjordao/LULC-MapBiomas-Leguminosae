<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.86,92.56000000000002,92.92,95.14999999999999,95.14000000000001,94.22,94.7,90.56000000000002,90.91000000000001,92.89,91.57000000000001,90.61999999999999,90.5,90.08,90.16999999999999,90.06,87.83999999999999,87.29,88.71,86.97999999999999,87.43,87.44999999999999,87.03,87.76,87.53,87.25,87.58,88.53,89.07000000000001,88.52,87.20999999999998,86.45,85.54999999999998,85.48,86.02999999999999,86.08999999999999,86.07,84.99000000000001],"color":"green"},{"name":"anthropic","data":[3.71,7.02,6.67,4.42,4.44,5.37,4.89,9.02,8.66,6.68,8.01,8.96,9.08,9.5,9.4,9.52,11.75,12.299999999999999,10.86,12.6,12.139999999999999,12.12,12.549999999999999,11.809999999999999,12.05,12.33,12,11.06,10.51,11.07,12.38,13.120000000000001,14.02,14.100000000000001,13.55,13.48,13.510000000000002,14.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
