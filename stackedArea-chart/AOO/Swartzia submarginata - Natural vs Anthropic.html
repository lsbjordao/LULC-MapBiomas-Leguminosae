<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.93,60.31,60.16,59.71999999999999,59.58,59.410000000000004,59.559999999999995,59.95,60.56,61.55,61.81,62,62.09,62.08,62.39,62.16,62.17999999999999,62.08999999999999,62.03999999999999,62.10999999999999,62.559999999999995,62.85999999999999,63.169999999999995,63.35,63.58,63.830000000000005,64.04,64.08999999999999,64.11,64.15,64.07000000000001,63.96000000000001,64.06,64.05,64.07,64.17999999999999,64.3,64.39],"color":"green"},{"name":"anthropic","data":[41.589999999999996,41.230000000000004,41.38999999999999,41.830000000000005,41.96,42.13,41.96,41.589999999999996,40.96999999999999,39.98,39.739999999999995,39.54,39.45,39.47,39.17,39.370000000000005,39.36,39.45,39.5,39.440000000000005,38.99,38.67,38.38,38.2,37.96000000000001,37.720000000000006,37.510000000000005,37.470000000000006,37.42,37.39000000000001,37.480000000000004,37.59000000000001,37.480000000000004,37.510000000000005,37.46,37.35,37.22999999999999,37.13999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
