<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.550000000000004,32.42,32.089999999999996,31.220000000000002,30.46,30.13,29.59,29.53,29.5,29.330000000000002,29.45,29.430000000000003,29.35,28.61,27.5,26.82,26.379999999999995,25.8,25.640000000000004,25.48,25.32,25.04,24.89,24.58,24.87,24.990000000000002,25.57,25.84,26.160000000000004,25.859999999999996,25.53,25.22,24.88,24.38,24.369999999999997,24.41,24.700000000000003,24.909999999999997],"color":"green"},{"name":"anthropic","data":[67.37000000000002,68.5,68.83,69.72,70.47,70.8,71.34,71.39999999999999,71.42,71.58999999999999,71.48,71.50000000000001,71.58,72.32000000000001,73.43,74.11,74.55,75.13,75.28999999999999,75.46,75.60000000000001,75.9,76.02000000000001,76.37,76.06,75.94,75.38000000000001,75.08,74.78,75.06,75.4,75.71000000000001,76.05,76.53999999999999,76.57,76.52,76.23,76.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
