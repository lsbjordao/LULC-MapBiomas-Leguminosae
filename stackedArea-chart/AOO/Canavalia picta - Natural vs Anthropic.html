<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.09,49.03999999999999,49.09,48.87,48.88,48.92999999999999,48.980000000000004,49.150000000000006,49.48,50.35,50.55,50.99000000000001,51.260000000000005,51.48,51.730000000000004,51.86,51.93,52.07,52.23,52.43,52.63,52.8,52.970000000000006,53.160000000000004,53.35,53.74000000000001,54.00000000000001,54.20000000000001,54.59,54.78,55.07,55.32000000000001,55.59,55.760000000000005,55.79999999999999,55.830000000000005,55.85,55.86000000000001],"color":"green"},{"name":"anthropic","data":[53.30999999999999,53.339999999999996,53.32000000000001,53.5,53.519999999999996,53.46999999999999,53.43,53.25,52.93999999999999,52.07,51.86,51.43,51.13999999999999,50.910000000000004,50.66,50.55999999999999,50.47,50.330000000000005,50.18,49.98,49.8,49.599999999999994,49.42,49.239999999999995,49.050000000000004,48.65,48.41,48.190000000000005,47.809999999999995,47.60999999999999,47.349999999999994,47.08,46.81,46.67,46.62,46.56,46.540000000000006,46.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
