<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.13,59.62,59.2,58.900000000000006,58.75,58.72,58.76,58.92999999999999,59.22999999999999,59.85999999999999,60.17000000000001,60.35999999999999,60.59,60.71,61.029999999999994,61.08,61.300000000000004,61.36,61.4,61.510000000000005,61.75,62.06,62.11000000000001,62.10000000000001,62.36,62.669999999999995,62.709999999999994,62.629999999999995,62.56999999999998,62.72999999999999,63.029999999999994,63.16999999999998,63.34999999999998,63.56,63.620000000000005,63.649999999999984,63.8,63.940000000000005],"color":"green"},{"name":"anthropic","data":[40.040000000000006,39.589999999999996,40.050000000000004,40.36,40.49999999999999,40.5,40.42,40.25,39.970000000000006,39.44000000000001,39.160000000000004,38.959999999999994,38.64999999999999,38.53999999999999,38.209999999999994,38.14,37.98,37.88,37.81000000000001,37.620000000000005,37.370000000000005,37.06,36.959999999999994,36.89,36.66,36.489999999999995,36.48,36.51,36.54,36.379999999999995,36.14000000000001,36.050000000000004,35.86000000000001,35.63000000000002,35.31,35.24000000000001,35.080000000000005,34.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
