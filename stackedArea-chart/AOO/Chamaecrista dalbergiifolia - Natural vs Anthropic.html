<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.65,56.50000000000001,56.23,55.8,54.82999999999999,54.47999999999999,53.839999999999996,53.42999999999999,53.02,52.089999999999996,51.61000000000001,51.29,50.449999999999996,49.85,49.38,49.05,48.99,48.8,48.629999999999995,48.22999999999999,47.93,47.58,47.330000000000005,47.14000000000001,47.24999999999999,47.379999999999995,47.339999999999996,47.3,47.25,47.010000000000005,46.74999999999999,46.28999999999999,46.01999999999999,45.650000000000006,45.32999999999999,45.190000000000005,45.2,46.09],"color":"green"},{"name":"anthropic","data":[44.8,45.96000000000001,46.25,46.660000000000004,47.63999999999999,48.01,48.65,49.04999999999999,49.43000000000001,50.370000000000005,50.870000000000005,51.18000000000001,52.03,52.620000000000005,53.09,53.419999999999995,53.480000000000004,53.69,53.86,54.25,54.540000000000006,54.900000000000006,55.13,55.33,55.230000000000004,55.1,55.12,55.17,55.23,55.47,55.72999999999999,56.18,56.45,56.83,57.13,57.28,57.29,56.39],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
