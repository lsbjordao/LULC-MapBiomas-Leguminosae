<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.13999999999999,57.5,57.25999999999999,56.88,55.93000000000001,55.81,55.69,55.9,56.60000000000001,57.489999999999995,57.709999999999994,57.82,58.02,58.09,58.470000000000006,58.43,59.27000000000001,59.61,59.61999999999999,59.59000000000001,59.59999999999999,59.8,59.84999999999999,60.13999999999999,60.16,60.54,61.13999999999999,61.41,61.78,61.669999999999995,61.779999999999994,61.93,62.080000000000005,62.220000000000006,62.220000000000006,61.730000000000004,61.81,62.12000000000001],"color":"green"},{"name":"anthropic","data":[36.64,38.269999999999996,38.5,38.89,39.839999999999996,39.959999999999994,40.08,39.88,39.18,38.27,38.04,37.96000000000001,37.75,37.68,37.31,37.35,36.51,36.15,36.169999999999995,36.17999999999999,36.18,35.97,35.92,35.63,35.62,35.24,34.64,34.35,33.980000000000004,34.08,33.98,33.84,33.71,33.550000000000004,33.550000000000004,34.03,33.97,33.669999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
