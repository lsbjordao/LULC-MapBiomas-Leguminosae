<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.48,85.42000000000002,85.16000000000001,84.46,84.5,84.47,84.32000000000001,84.33,84.32000000000001,84.23,84.30000000000001,84.26999999999998,84.22,84.23000000000002,84.25000000000001,84.21000000000001,84.23,84.24,84.33,84.37,84.47,84.52,84.53,84.46000000000001,84.09,83.45,82.98000000000002,82.93,82.68,82.62,82.54999999999998,82.57,82.63,82.74,82.72999999999999,82.66999999999999,82.58,82.44000000000001],"color":"green"},{"name":"anthropic","data":[15.209999999999999,15.27,15.529999999999998,16.23,16.2,16.220000000000002,16.360000000000003,16.36,16.36,16.45,16.38,16.41,16.459999999999997,16.47,16.439999999999998,16.470000000000002,16.45,16.439999999999998,16.35,16.34,16.2,16.150000000000002,16.15,16.240000000000002,16.58,17.240000000000002,17.7,17.74,17.98,18.07,18.14,18.12,18.03,17.94,17.95,18.03,18.110000000000003,18.240000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
