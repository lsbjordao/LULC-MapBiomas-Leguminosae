<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[76.82,75.37,73.49,71.49,71.86,73.03,72.97,71.79,72.59,75.11,75.14,74.65,74.42,75.76,75.22,75.35,75.36,75.65,75.18,75.14,75.51,75.24,75.17,75.69,75.56,75.96,76.28,76.62,77.32,77.49,77.62,77.78,78.32,79.1,79.36,79.37,79.23,79.43],"color":"#006400"},{"name":"Flooded forest","data":[1.82,1.65,1.58,1.44,1.33,1.55,1.55,1.42,1.43,1.55,1.65,1.61,1.64,1.62,1.32,1.23,1.28,1.4,1.59,1.56,1.52,1.49,1.54,1.56,1.59,1.59,1.6,1.64,1.75,1.78,1.78,1.83,1.85,1.95,2,1.96,1.95,1.91],"color":"#76A5AF"},{"name":"Wetland","data":[1.85,0.96,0.93,0.8,1.05,0.89,0.95,1.38,1.11,1.17,0.79,0.76,0.73,0.67,0.56,0.71,0.87,0.7,0.76,0.86,0.77,0.68,0.71,0.69,1.18,0.78,0.62,0.78,0.72,0.79,0.96,0.83,0.78,0.83,0.72,0.79,0.76,0.41],"color":"#45C2A5"},{"name":"Grassland","data":[0.37,0.36,0.59,0.39,0.13,0.18,0.25,0.51,0.28,0.09,0.19,0.19,0.49,0.34,0.04,0.03,0.17,0.08,0.15,0.12,0.02,0,0,0,0.06,0,0,0.05,0.06,0.07,0.05,0.08,0.04,0.04,0.05,0.05,0.04,0],"color":"#B8AF4F"},{"name":"Pasture","data":[3.9,6.18,8.14,10.32,9.87,8.58,8.53,9.74,8.97,6.39,6.41,7.11,7.59,6.36,6.83,7.15,7.23,6.77,7.36,7.51,7.11,7.31,7.2,6.71,6.97,6.53,6.24,5.98,5.23,5.03,4.94,4.76,4.24,3.35,3.05,3.09,3,3.05],"color":"#FFD966"},{"name":"River, lake and ocean","data":[14.78,15.02,14.81,15.1,15.3,15.3,15.28,14.7,15.15,15.22,15.36,15.21,14.68,14.79,15.56,15.08,14.63,14.94,14.5,14.34,14.6,14.82,14.92,14.89,14.19,14.68,14.81,14.47,14.46,14.39,14.19,14.26,14.3,14.26,14.37,14.28,14.56,14.73],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
