<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.10999999999999,61.93,61.95000000000001,62.010000000000005,61.69,61.550000000000004,61.36,61.33999999999999,61.059999999999995,61.3,61.370000000000005,61.43,61.57000000000001,61.730000000000004,61.839999999999996,61.64,61.57000000000001,61.550000000000004,61.440000000000005,61.47,61.480000000000004,61.029999999999994,61.04,61.29,61.56,61.760000000000005,61.8,61.870000000000005,61.86,61.89000000000001,61.910000000000004,61.89,61.95,61.98,62.07,62.059999999999995,62.019999999999996,62.17000000000001],"color":"green"},{"name":"anthropic","data":[39.16000000000001,39.32,39.32,39.25000000000001,39.56000000000001,39.7,39.9,39.92,40.19,39.96,39.910000000000004,39.84,39.68,39.54,39.42,39.629999999999995,39.7,39.730000000000004,39.81000000000001,39.79,39.79,40.23,40.230000000000004,39.96,39.71,39.50000000000001,39.45,39.38,39.41,39.370000000000005,39.36,39.38,39.3,39.300000000000004,39.2,39.19,39.25,39.07],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
