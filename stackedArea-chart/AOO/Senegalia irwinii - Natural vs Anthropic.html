<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.04999999999998,70.06,69.36999999999999,68.28999999999998,67.69,67.17,67.1,67.14999999999999,67.07000000000001,67.05999999999999,66.51,66.60000000000001,66.67999999999999,66.82,67.42999999999998,67.78000000000002,67.88000000000001,67.94,68.25000000000001,68.62,68.13,68.38000000000001,68.48,68.52000000000001,68.61,68.71,68.91000000000003,69.01,68.92999999999999,68.88000000000001,68.89,68.82999999999998,68.88999999999999,69.11,69.02,69.27000000000001,69.49000000000001,69.76000000000002],"color":"green"},{"name":"anthropic","data":[30,31.01,31.68,32.75,33.379999999999995,33.88999999999999,33.949999999999996,33.92,33.98,34.03,34.559999999999995,34.47,34.4,34.21,33.59,33.25,33.18,33.099999999999994,32.79,32.419999999999995,32.89999999999999,32.64999999999999,32.55,32.510000000000005,32.44,32.349999999999994,32.14,32.07,32.13,32.18,32.160000000000004,32.22,32.17,31.93,32.040000000000006,31.799999999999997,31.57,31.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
