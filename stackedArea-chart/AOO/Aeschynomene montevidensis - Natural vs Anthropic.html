<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.36,58.83,58.89,58.04,57.620000000000005,57.94,57.68,57.55000000000001,58.209999999999994,57.64,59.04000000000001,59.59,58.83,58.15,58.480000000000004,58.599999999999994,57.76000000000001,57.38,57.93,58.32000000000001,57.74,57.47,57.44,56.97,57.709999999999994,57.43999999999999,57.82,58.57,58.24,58.42000000000001,59,59.190000000000005,57.830000000000005,57.99000000000001,57.77,57.54,57.36,55.78000000000001],"color":"green"},{"name":"anthropic","data":[42.74,44.300000000000004,44.21,45.080000000000005,45.480000000000004,45.17,45.42,45.53999999999999,44.88,45.43000000000001,44.08,43.529999999999994,44.26,44.81,44.49000000000001,44.36,45.21,45.62,45.08,44.709999999999994,45.269999999999996,45.589999999999996,45.62,46.07,45.36,45.620000000000005,45.26,44.51,44.75000000000001,44.6,44.04,43.82999999999999,45.209999999999994,45.039999999999985,45.21999999999999,45.51,45.63,47.220000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
