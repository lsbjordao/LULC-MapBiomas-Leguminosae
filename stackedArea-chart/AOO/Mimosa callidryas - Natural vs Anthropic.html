<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.2,61.730000000000004,60.669999999999995,60.41,59.58,58.95,58.730000000000004,58.559999999999995,58.65,58.5,57.870000000000005,57.78000000000001,58.03999999999999,57.97,58.55,59.120000000000005,59.199999999999996,59.589999999999996,59.720000000000006,60.089999999999996,60.32,61.120000000000005,61.160000000000004,61.25,60.97,60.790000000000006,61.03,60.9,60.79,60.74,60.99999999999999,60.9,60.75999999999999,60.559999999999995,59.36,59.16,59.029999999999994,58.9],"color":"green"},{"name":"anthropic","data":[39.2,38.66,39.739999999999995,39.980000000000004,40.81,41.43000000000001,41.65,41.84,41.74,41.900000000000006,42.53,42.61,42.36000000000001,42.44,41.83,41.28,41.19,40.8,40.68,40.32,40.06999999999999,39.269999999999996,39.22,39.14,39.42999999999999,39.599999999999994,39.36,39.5,39.61,39.67,39.39,39.5,39.629999999999995,39.85,41.01,41.220000000000006,41.370000000000005,41.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
