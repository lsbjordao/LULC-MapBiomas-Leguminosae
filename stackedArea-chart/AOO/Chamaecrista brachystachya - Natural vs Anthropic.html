<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.42,73.3,72.83,71.58,71.27999999999999,71.3,71.89999999999999,71.74,71.86999999999999,72.03,72.17,72.55,73.00000000000001,73.73000000000002,74.60000000000002,75.35000000000001,75.71000000000002,75.50000000000001,75.84,75.74000000000001,75.39000000000001,75.26,75.07000000000001,74.99000000000001,74.97,74.83,74.76,74.78,74.89,74.89,74.95999999999998,74.86,74.91999999999997,75.13,75.15999999999998,75.2,75.38999999999999,75.59],"color":"green"},{"name":"anthropic","data":[30.150000000000006,30.320000000000004,30.790000000000003,32.04,32.36,32.36,31.750000000000004,31.919999999999998,31.779999999999998,31.62,31.47,31.110000000000003,30.62,29.919999999999998,29.060000000000006,28.31,27.96,28.15,27.810000000000002,27.9,28.270000000000003,28.430000000000003,28.600000000000005,28.690000000000005,28.720000000000006,28.85,28.93,28.91,28.790000000000003,28.830000000000002,28.740000000000006,28.84,28.78,28.569999999999997,28.550000000000004,28.53,28.34,28.159999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
