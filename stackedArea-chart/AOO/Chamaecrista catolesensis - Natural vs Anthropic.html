<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.32,71.08,70.06,68.1,67.8,69.16000000000001,72.58,72.72,74.6,75.28,75.27,75.53000000000002,76.96,77.89,79.19000000000001,79.41,79.36,78.05,77.96000000000001,76.50999999999999,73.69,74.03999999999999,73.78,74.73,77.41,79.89,81.12,81.69000000000001,81.97,81.74,81.60000000000001,81.34,82.22,83.39000000000001,83.52,83.61999999999999,83.6,83.63999999999999],"color":"green"},{"name":"anthropic","data":[28.310000000000002,28.55,29.560000000000002,31.53,31.82,30.470000000000002,27.04,26.91,25.04,24.330000000000002,24.360000000000003,24.1,22.650000000000002,21.740000000000002,20.43,20.21,20.259999999999998,21.58,21.67,23.12,25.93,25.590000000000003,25.85,24.9,22.22,19.73,18.51,17.950000000000003,17.66,17.889999999999997,18.029999999999998,18.279999999999998,17.39,16.25,16.1,16,16.009999999999998,15.989999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
