<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.02000000000001,74.16000000000001,73.60000000000001,72.97999999999999,72.21000000000001,71.74,71.65,71.91000000000001,72.75,72.37000000000002,72.34,71.6,70.24000000000001,69.57999999999998,67.96999999999998,67.45999999999998,67.04999999999998,66.75999999999999,65.95999999999998,65.30999999999997,64.57999999999998,64.55,64.6,64.77,64.97,64.75999999999999,64.83,64.71000000000001,64.47,64.52000000000002,64.80000000000001,64.98,64.80000000000001,64.48,64.23,63.32999999999999,63.68,63.050000000000004],"color":"green"},{"name":"anthropic","data":[28.770000000000003,26.63,27.22,27.83,28.619999999999997,29.07,29.18,28.900000000000002,28.08,28.45,28.48,29.21,30.560000000000002,31.24,32.849999999999994,33.34,33.75,34.05,34.86,35.489999999999995,36.24,36.269999999999996,36.22,36.04,35.86,36.06,35.99,36.120000000000005,36.35,36.29,36.01,35.84,36.02,36.33,36.6,37.47,37.120000000000005,37.74],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
