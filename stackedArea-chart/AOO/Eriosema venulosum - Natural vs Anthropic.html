<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.86999999999999,80.52,80.32000000000001,80.81,80.54,80.52,80.26,79.72999999999999,79.07000000000001,78.17999999999999,77.66,77.30999999999999,77.18000000000002,77.02000000000001,76.68,76.86999999999999,76.93999999999998,76.19999999999999,76.08999999999997,75.68999999999998,74.70000000000002,74.64,74.61,73.94000000000001,73.01999999999998,71.92999999999999,72.8,72.57999999999998,72.88999999999999,72.65999999999998,72.32,72.39,72.74,72.89999999999998,72.91,69.97999999999999,69.88999999999999,69.94],"color":"green"},{"name":"anthropic","data":[20.71,21.05,21.270000000000003,20.770000000000003,21.040000000000003,21.06,21.32,21.86,22.500000000000004,23.4,23.909999999999997,24.250000000000004,24.4,24.580000000000002,24.939999999999998,24.71,24.65,25.359999999999996,25.48,25.900000000000002,26.88,26.939999999999998,26.96,27.660000000000004,28.56,29.67,28.79,29,28.690000000000005,28.919999999999998,29.27,29.189999999999998,28.85,28.68,28.669999999999998,31.610000000000003,31.680000000000003,31.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
