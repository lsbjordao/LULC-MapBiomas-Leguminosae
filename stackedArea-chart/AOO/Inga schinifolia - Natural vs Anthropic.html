<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.85999999999999,70.83999999999999,70.53999999999999,70.49999999999999,70.56,70.52,70.33999999999997,70.52,70.72,70.6,69.97,69.78999999999999,69.83,70.10999999999999,70.28999999999999,70.33,70.52,70.71000000000001,70.9,70.91999999999999,71.02,71.03,70.96,70.96,71.05999999999999,71.30000000000001,71.45,71.46,71.83999999999999,72.03,72.06,72.14999999999999,72.25000000000001,72.33,72.17,72.11,72.38,72.72999999999999],"color":"green"},{"name":"anthropic","data":[30.320000000000004,30.32,30.61,30.680000000000003,30.59,30.640000000000004,30.82,30.65,30.430000000000003,30.55,31.19,31.37,31.320000000000004,31.060000000000006,30.88,30.83,30.630000000000003,30.430000000000003,30.26,30.24,30.150000000000002,30.130000000000006,30.19,30.2,30.080000000000002,29.85,29.720000000000002,29.700000000000006,29.32,29.13,29.119999999999997,29.009999999999998,28.91,28.849999999999998,29.01,29.060000000000002,28.77,28.439999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
