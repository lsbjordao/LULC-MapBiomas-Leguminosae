<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.86,71.68999999999998,71.46000000000001,71.41,71.25999999999999,71.22,71.28999999999999,71.38999999999999,71.57,71.86,71.9,72.06,72.35000000000001,72.65,72.94,73,72.90999999999998,72.78999999999999,72.66,72.71,72.81,72.85,72.86999999999999,72.99,72.99999999999999,73.13000000000001,72.86,72.98000000000002,73.08,73.19,73.42,73.46,73.57,73.66000000000001,73.71,73.66999999999999,73.86,73.94],"color":"green"},{"name":"anthropic","data":[30.400000000000002,30.589999999999996,30.800000000000004,30.88,31.03,31.069999999999997,31,30.9,30.71,30.43,30.359999999999996,30.209999999999997,29.93,29.630000000000003,29.340000000000003,29.280000000000005,29.370000000000005,29.480000000000004,29.6,29.560000000000006,29.470000000000002,29.43,29.400000000000002,29.290000000000003,29.27,29.150000000000002,29.410000000000004,29.3,29.200000000000003,29.080000000000002,28.869999999999997,28.810000000000002,28.7,28.600000000000005,28.580000000000002,28.62,28.430000000000007,28.340000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
