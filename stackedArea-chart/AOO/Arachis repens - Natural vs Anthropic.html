<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.53000000000001,58.419999999999995,58.260000000000005,58.300000000000004,58.400000000000006,58.690000000000005,58.279999999999994,58.589999999999996,58.75,59.15,59.13999999999999,59.440000000000005,59.61999999999999,59.71,59.89000000000001,59.699999999999996,59.8,59.75000000000001,59.989999999999995,60.27000000000001,60.339999999999996,60.49,60.5,60.339999999999996,60.48,60.78000000000001,60.9,60.980000000000004,61.059999999999995,61.14000000000001,61.23000000000001,61.29,61.43000000000001,61.400000000000006,61.720000000000006,61.59,61.71,61.77],"color":"green"},{"name":"anthropic","data":[46.26,46.35,46.53,46.50000000000001,46.38,46.099999999999994,46.5,46.190000000000005,46.040000000000006,45.63,45.65,45.349999999999994,45.15,45.07,44.9,45.08,44.99000000000001,45.03000000000001,44.81,44.53000000000001,44.43,44.3,44.269999999999996,44.44,44.29,43.99000000000001,43.89,43.79,43.72,43.62,43.56999999999999,43.470000000000006,43.37,43.37,43.09,43.17999999999999,43.06999999999999,42.99999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
