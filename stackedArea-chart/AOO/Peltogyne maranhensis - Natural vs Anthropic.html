<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.09,86.5,85.84,85.99000000000001,85.81999999999998,85.58,85.78,86.59999999999998,85.69,84.86000000000001,84.61000000000001,84.74,84.54000000000002,83.45,83.09,82.91000000000001,82.63,82.71000000000001,83.1,82.81,82.65999999999998,82.62,82.36,82.00999999999999,81.87,82.28000000000002,82.10000000000001,81.57,79.77,79.50999999999999,80.35000000000001,79.92,79.83999999999999,79.86999999999999,79.73,77.44000000000001,75.35,74.65],"color":"green"},{"name":"anthropic","data":[13.05,14.66,15.34,15.18,15.319999999999999,15.58,15.370000000000001,14.56,15.459999999999999,16.29,16.54,16.42,16.62,17.71,18.06,18.25,18.53,18.45,18.07,18.34,18.5,18.54,18.78,19.14,19.310000000000002,18.880000000000003,19.05,19.59,21.38,21.65,20.810000000000002,21.24,21.33,21.279999999999998,21.429999999999996,23.72,25.81,26.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
