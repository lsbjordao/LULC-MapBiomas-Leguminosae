<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.72,46.23,46.370000000000005,46.44,46.78999999999999,46.92,46.55,46.31,46.330000000000005,46.46000000000001,47.17000000000001,47.5,48.47,49.29000000000001,50.400000000000006,50.470000000000006,50.400000000000006,50.49,50.959999999999994,51.1,51.36,52.12000000000001,52.180000000000014,51.92000000000001,52.09999999999999,52.12,52.099999999999994,52.4,52.69999999999999,52.52999999999999,52.45,51.59,51.53,52.03,52.23000000000001,52.32,52.41,52.589999999999996],"color":"green"},{"name":"anthropic","data":[56.089999999999996,56.56,56.42,56.35,56.010000000000005,55.870000000000005,56.23,56.48,56.459999999999994,56.35,55.629999999999995,55.31,54.32000000000001,53.53,52.42,52.34,52.39000000000001,52.309999999999995,51.82,51.7,51.42999999999999,50.69,50.63,50.88,50.7,50.7,50.690000000000005,50.379999999999995,50.099999999999994,50.26999999999999,50.35999999999999,51.209999999999994,51.27999999999999,50.76999999999999,50.580000000000005,50.489999999999995,50.410000000000004,50.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
