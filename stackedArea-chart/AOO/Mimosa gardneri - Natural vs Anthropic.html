<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.18,71.05000000000001,70.87,70.48,69.31000000000002,69.13000000000002,68.83000000000001,68.38000000000001,67.38000000000002,66.45,66.05000000000001,65.77000000000001,65.50000000000001,65.28999999999999,65.12,64.87,64.87,64.71000000000001,64.27000000000001,63.76,63.36000000000001,62.88999999999999,62.56999999999999,61.970000000000006,61.83999999999999,61.73,61.44,61.3,61.18999999999999,61.02,61.01,60.96000000000001,60.95000000000001,60.84,60.73,60.46,60.370000000000005,60.8],"color":"green"},{"name":"anthropic","data":[31.619999999999997,31.740000000000002,31.949999999999996,32.339999999999996,33.489999999999995,33.68,33.98000000000001,34.43,35.47,36.36,36.76999999999999,37.059999999999995,37.33,37.51,37.67999999999999,37.940000000000005,37.95,38.1,38.56,39.05,39.470000000000006,39.94,40.24,40.849999999999994,40.97,41.08,41.38,41.540000000000006,41.61,41.800000000000004,41.82,41.849999999999994,41.88999999999999,41.97,42.089999999999996,42.349999999999994,42.410000000000004,42.00999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
