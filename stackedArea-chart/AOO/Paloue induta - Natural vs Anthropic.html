<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.99999999999999,94.28,94.99,96.47,96.18,96.27000000000001,96.16,95.89,95.87999999999998,95.71000000000001,95.74,95.8,96.04,95.92,95.55000000000001,95.66,95.71000000000002,96.2,96.87,96.99,97.13,97.09,97.05999999999999,97.02,96.77,96.77,97.13,97.57,98,98.03,97.97,98.09,98,97.91000000000001,97.84,97.70000000000002,97.5,96.82000000000001],"color":"green"},{"name":"anthropic","data":[7.55,5.28,4.57,3.09,3.38,3.29,3.3899999999999997,3.6799999999999997,3.68,3.8499999999999996,3.83,3.7700000000000005,3.5200000000000005,3.6500000000000004,4.01,3.91,3.8499999999999996,3.3600000000000003,2.6900000000000004,2.5700000000000003,2.43,2.4699999999999998,2.49,2.55,2.8,2.7800000000000002,2.43,1.9900000000000002,1.55,1.54,1.59,1.48,1.56,1.65,1.73,1.86,2.06,2.74],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
