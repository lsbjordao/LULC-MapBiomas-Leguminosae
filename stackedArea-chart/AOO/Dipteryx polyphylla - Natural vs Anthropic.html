<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.30000000000001,93.16999999999999,93.52,93.68999999999998,93.52,93.57,93.98000000000002,93.61,93.69,94.72999999999999,95.16999999999999,95.16999999999999,94.91,94.55000000000001,94.31,94.5,94.37,94.31000000000002,94.18,94.07000000000001,94.10000000000001,93.79,93.74000000000002,93.68,93.67,93.74,93.85,94.10999999999999,94.26,94.31999999999998,94.10999999999999,94.1,93.87,94.02,94.14,94.03,94.05000000000001,93.58],"color":"green"},{"name":"anthropic","data":[8.4,7.529999999999999,7.1899999999999995,7.010000000000001,7.1899999999999995,7.140000000000001,6.75,7.09,7.01,5.98,5.529999999999999,5.539999999999999,5.800000000000001,6.16,6.390000000000001,6.22,6.35,6.409999999999999,6.529999999999999,6.640000000000001,6.6000000000000005,6.920000000000001,6.9799999999999995,7.049999999999999,7.04,6.96,6.87,6.59,6.459999999999999,6.390000000000001,6.58,6.609999999999999,6.83,6.709999999999999,6.579999999999999,6.6899999999999995,6.659999999999999,7.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
