<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.32,35.07,34.720000000000006,34.14000000000001,33.120000000000005,31.890000000000004,30.550000000000004,29.67,29.38,29.34,29.200000000000003,28.72,28.330000000000005,28.230000000000004,28.1,27.99,27.700000000000003,27.009999999999998,26.759999999999998,25.9,24.810000000000002,24.43,24.550000000000004,24.450000000000003,23.82,22.97,22.990000000000002,22.5,22.080000000000002,22.119999999999997,21.57,20.92,20.61,20.839999999999996,20.980000000000004,21.269999999999996,21.34,21.619999999999997],"color":"green"},{"name":"anthropic","data":[63.6,67.85,68.20999999999998,68.8,69.81,71.02,72.39,73.25,73.54000000000002,73.59,73.74000000000001,74.21,74.61,74.67999999999999,74.84,74.94,75.22,75.91000000000001,76.16000000000001,77.02,78.12,78.49999999999999,78.35999999999999,78.48,79.1,79.94999999999999,79.93999999999998,80.42999999999999,80.83999999999999,80.79,81.37000000000002,82.01,82.32000000000001,82.07000000000001,81.94999999999999,81.68,81.6,81.29],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
