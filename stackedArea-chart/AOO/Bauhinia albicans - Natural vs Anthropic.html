<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.97,36.790000000000006,36.3,36.529999999999994,35.59,34.959999999999994,34.16,33.79,33.87,35.019999999999996,35.25,36.29,38.64,39.49999999999999,40.38999999999999,41.349999999999994,41.64,42.2,43.06,43.74999999999999,44.269999999999996,44.72,44.89000000000001,44.9,45.400000000000006,46.18,46.52,47.3,47.379999999999995,48.440000000000005,49.00000000000001,49.519999999999996,49.92,50.61,50.83,50.849999999999994,49.13000000000001,48.72],"color":"green"},{"name":"anthropic","data":[46.51,46.66,47.18,46.95,47.870000000000005,48.49,49.3,49.68000000000001,49.589999999999996,48.419999999999995,48.190000000000005,47.17,44.84,43.97,43.059999999999995,42.129999999999995,41.83,41.28,40.42,39.739999999999995,39.22,38.760000000000005,38.59,38.550000000000004,38.08,37.31,36.96,36.21,36.099999999999994,35.019999999999996,34.449999999999996,33.96000000000001,33.56999999999999,32.86,32.650000000000006,32.62,34.35,34.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
