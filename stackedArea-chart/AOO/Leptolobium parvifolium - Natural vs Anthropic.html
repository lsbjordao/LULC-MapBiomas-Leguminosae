<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.67999999999999,84.57,83.66999999999999,82.64999999999999,81.97,81.26000000000002,80.89999999999999,80.66000000000001,79.75999999999999,78.93000000000002,79.13,79.44999999999999,78.64999999999998,78.46999999999998,78.16000000000001,78.03,77.35,77.47999999999999,77.46,76.91000000000001,76.42000000000002,76.99000000000001,76.66,76.51999999999998,77.00000000000001,77.03000000000002,76.33,76.10000000000002,74.83,74.07,73.4,73.39,73.66000000000001,73.92999999999999,73.98,74.07000000000001,74.3,74.05000000000001],"color":"green"},{"name":"anthropic","data":[7.9799999999999995,8.09,8.999999999999998,9.99,10.7,11.41,11.770000000000001,12,12.91,13.72,13.52,13.200000000000001,14.01,14.19,14.5,14.639999999999999,15.309999999999999,15.2,15.21,15.760000000000002,16.23,15.68,16.009999999999998,16.14,15.66,15.629999999999999,16.34,16.580000000000002,17.84,18.609999999999996,19.28,19.279999999999998,19.009999999999994,18.74,18.669999999999998,18.580000000000002,18.37,18.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
