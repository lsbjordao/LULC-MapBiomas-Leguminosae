<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.68,80.18,77.61,74.16999999999999,73.78999999999999,74.49000000000001,73.56,72.92999999999999,71.14,66.72,64.86999999999999,60.489999999999995,55.85,51.59,49.540000000000006,47.79,46.95,45.879999999999995,45.13,43.349999999999994,41.099999999999994,40.51,40.449999999999996,39.34,39.06999999999999,38.849999999999994,39.81,40.08,40.56999999999999,40.17,39.68,38.43,37.68,36.78,35.04,35.31,34.5,33.760000000000005],"color":"green"},{"name":"anthropic","data":[18.58,20.07,22.64,26.07,26.479999999999997,25.77,26.699999999999996,27.33,29.11,33.540000000000006,35.400000000000006,39.760000000000005,44.410000000000004,48.650000000000006,50.730000000000004,52.46000000000001,53.3,54.37,55.11,56.89,59.150000000000006,59.730000000000004,59.800000000000004,60.910000000000004,61.2,61.39,60.440000000000005,60.19,59.68000000000001,60.07,60.58,61.82,62.58,63.48,65.21000000000001,64.94,65.74000000000001,66.5],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
