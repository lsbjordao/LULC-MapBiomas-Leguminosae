<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.14,82.36999999999999,82.16000000000001,82.09999999999998,81.67999999999999,81.63,81.41,81.33,81,80.7,80.28999999999999,79.55999999999997,78.72000000000001,78.88999999999999,78.95999999999998,79.18999999999998,79.45,78.8,76.49,76.53,76.1,76.01,76.24,76.19999999999999,76.45,76.47,76.42,76.32000000000001,76.28,76.24,76.11999999999999,75.91,75.82,75.23,74.06,73.15000000000002,73.16,73.21000000000001],"color":"green"},{"name":"anthropic","data":[20.08,20.86,21.06,21.16,21.55,21.61,21.85,21.900000000000002,22.24,22.54,22.96,23.700000000000003,24.509999999999998,24.35,24.29,24.06,23.79,24.439999999999998,26.74,26.71,27.139999999999997,27.229999999999997,27.009999999999998,27.040000000000006,26.8,26.770000000000003,26.819999999999997,26.919999999999998,26.97,26.990000000000006,27.14,27.330000000000002,27.420000000000005,28.020000000000003,29.180000000000003,30.090000000000003,30.07,30.040000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
