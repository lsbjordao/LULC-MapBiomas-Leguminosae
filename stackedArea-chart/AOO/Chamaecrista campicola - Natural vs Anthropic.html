<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.470000000000006,58.92000000000001,60.2,58.16,57.67,57.599999999999994,56.35,55.580000000000005,54.910000000000004,53.71,53.099999999999994,52.900000000000006,51.72,51.300000000000004,51.85,51.769999999999996,51.56999999999999,51.28,51.18,51.03,49.339999999999996,49.28,48.21999999999999,47.239999999999995,46.37,46.24999999999999,45.34,44.42,42.34000000000001,41.75,41.41,40.88,40.559999999999995,40.25,39.580000000000005,39.260000000000005,39.23000000000001,39.44],"color":"green"},{"name":"anthropic","data":[40.72,41.24999999999999,39.99,42.019999999999996,42.49999999999999,42.59,43.830000000000005,44.6,45.28,46.46,47.08,47.3,48.470000000000006,48.89,48.34,48.41,48.64,48.9,48.97999999999999,49.16000000000001,50.82999999999999,50.900000000000006,51.98,52.95000000000001,53.81,53.93,54.83,55.75,57.84,58.44,58.77,59.309999999999995,59.63,59.92000000000001,60.589999999999996,60.91,60.949999999999996,60.75000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
