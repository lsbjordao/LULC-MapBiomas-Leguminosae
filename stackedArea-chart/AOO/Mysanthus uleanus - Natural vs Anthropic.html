<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.47000000000001,80.19,79.80000000000001,79.07000000000001,78.66000000000001,78.22,78.56000000000002,78.42,78.56,79.17999999999999,79.02999999999999,78.56,79.46,79.78999999999999,80.36000000000001,80.57000000000001,80.39999999999999,80.32,79.77000000000001,79.28999999999999,78.44999999999997,77.68,77.44000000000001,77.55,77.65999999999998,77.14999999999999,76.69,76.80999999999999,76.32,75.23999999999998,74.41,74.5,74.16999999999999,74.72,74.64,74.39999999999999,74.42,74.35000000000002],"color":"green"},{"name":"anthropic","data":[23.560000000000002,23.830000000000002,24.240000000000002,24.95,25.36,25.79,25.46,25.61,25.46,24.87,25,25.46,24.56,24.220000000000002,23.669999999999998,23.449999999999996,23.62,23.700000000000003,24.27,24.73,25.57,26.359999999999996,26.59,26.48,26.36,26.89,27.329999999999995,27.209999999999997,27.700000000000003,28.8,29.63,29.53,29.85,29.3,29.389999999999997,29.62,29.61,29.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
