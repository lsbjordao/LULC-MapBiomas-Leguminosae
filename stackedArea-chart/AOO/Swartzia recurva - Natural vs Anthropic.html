<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.69000000000003,91.36999999999999,91.1,90.91000000000001,90.60000000000001,90.82999999999998,90.68,90.47000000000001,90.08,90.07000000000001,90.03999999999999,89.87,89.42,88.93,88.6,87.87,87.05000000000001,86.72,86.25999999999999,85.95000000000002,85.52,85.31,85.12,85.1,85.03,85.2,85.23000000000002,85.28,85.26,85.23,85.02000000000001,84.77000000000001,84.58,84.60000000000001,84.66000000000001,84.47000000000001,84.17000000000002,82.91000000000001],"color":"green"},{"name":"anthropic","data":[9.65,9.969999999999999,10.24,10.44,10.729999999999999,10.509999999999998,10.66,10.870000000000001,11.270000000000001,11.270000000000001,11.3,11.47,11.92,12.399999999999999,12.74,13.459999999999999,14.299999999999999,14.62,15.089999999999998,15.389999999999997,15.809999999999999,16.029999999999998,16.22,16.250000000000004,16.3,16.14,16.119999999999997,16.07,16.08,16.119999999999997,16.31,16.560000000000002,16.74,16.74,16.69,16.870000000000005,17.150000000000002,18.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
