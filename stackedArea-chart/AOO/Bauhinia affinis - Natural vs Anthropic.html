<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.04,49.92999999999999,49.730000000000004,49.58000000000001,49.620000000000005,49.660000000000004,49.54,49.580000000000005,50.04000000000001,50.309999999999995,50.660000000000004,50.969999999999985,51.419999999999995,51.75999999999999,52.2,52.129999999999995,52.28999999999999,52.6,52.51,52.769999999999996,53.1,53.34,53.40999999999999,53.43999999999998,53.48999999999999,53.389999999999986,53.499999999999986,53.78999999999999,54.01000000000001,54.18,54.27,54.510000000000005,54.63,54.699999999999996,54.67,54.76000000000001,55,55.2],"color":"green"},{"name":"anthropic","data":[40.07,40.21,40.41,40.56999999999999,40.53,40.49,40.580000000000005,40.57,40.099999999999994,39.830000000000005,39.49,39.17,38.730000000000004,38.370000000000005,37.949999999999996,38.01,37.83999999999999,37.540000000000006,37.65,37.370000000000005,37.050000000000004,36.81,36.75,36.71,36.65,36.74,36.64,36.34,36.11000000000001,35.98,35.85999999999999,35.64,35.519999999999996,35.440000000000005,35.48,35.370000000000005,35.14000000000001,34.940000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
