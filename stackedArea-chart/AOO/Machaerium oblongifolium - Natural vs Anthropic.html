<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.57000000000001,51.649999999999984,50.99,50.779999999999994,50.589999999999996,50.709999999999994,50.88,50.779999999999994,51.21,51.94,52.07,52.330000000000005,52.6,52.85,53.220000000000006,53.43000000000001,53.589999999999996,53.76999999999999,54.059999999999995,54.039999999999985,54.31,54.60999999999999,54.89000000000001,55.11,55.36000000000001,55.58,55.78,55.96999999999999,56.18999999999999,56.36999999999999,56.50000000000001,56.61999999999999,56.74,57.00000000000001,57.059999999999995,57.11,57.220000000000006,57.390000000000015],"color":"green"},{"name":"anthropic","data":[53.63,53.57,54.23,54.419999999999995,54.620000000000005,54.51000000000001,54.35,54.42999999999999,54,53.30000000000001,53.14000000000001,52.88999999999999,52.61,52.37,51.97,51.760000000000005,51.62,51.43000000000001,51.16,51.17999999999999,50.910000000000004,50.63,50.349999999999994,50.11,49.879999999999995,49.64000000000001,49.459999999999994,49.260000000000005,49.05000000000001,48.870000000000005,48.739999999999995,48.63,48.49,48.21,48.190000000000005,48.14,48.019999999999996,47.86999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
