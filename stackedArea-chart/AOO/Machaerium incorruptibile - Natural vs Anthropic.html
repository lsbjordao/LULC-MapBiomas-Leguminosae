<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.03,43.66,43.11,42.7,42.290000000000006,42.22,42.23,42.2,42.48,43.06,43.00000000000001,43.33,43.129999999999995,43.370000000000005,43.63,43.75,43.74,43.690000000000005,43.660000000000004,43.52000000000001,43.870000000000005,43.98,44.19,44.46,44.75000000000001,44.92,44.82,44.92,44.89,45.03,45.17999999999999,45.309999999999995,45.37,45.5,45.370000000000005,45.56,45.53,45.730000000000004],"color":"green"},{"name":"anthropic","data":[54.120000000000005,54.55,55.120000000000005,55.56999999999999,56.019999999999996,56.07999999999999,55.82,55.78,55.55,55.16,55.29,54.89,54.97000000000001,54.72000000000001,54.49,54.42,54.53,54.59000000000001,54.580000000000005,54.540000000000006,54.00000000000001,53.85,53.620000000000005,53.32,53.02,53.01,53.160000000000004,53.06,53.09,53.02000000000001,53.02,52.989999999999995,52.92000000000001,52.760000000000005,52.57,52.35000000000001,52.37,52.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
