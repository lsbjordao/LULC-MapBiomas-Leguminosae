<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.67999999999999,60.6,60.40000000000001,59.790000000000006,59.120000000000005,58.54,57.94,57.54,57,56.26,55.86,55.9,55.59,55.34000000000001,54.870000000000005,54.49999999999999,54.480000000000004,54.34,54.13,54.06000000000001,53.86,53.830000000000005,53.76,53.62000000000001,53.66999999999999,53.63,53.48,53.42,53.379999999999995,53.13999999999999,53.059999999999995,52.96,52.97,52.830000000000005,52.69,52.54,52.47999999999999,52.65],"color":"green"},{"name":"anthropic","data":[48.50000000000001,49.569999999999986,49.78,50.40999999999998,51.07,51.62,52.21999999999999,52.63,53.14,53.92,54.309999999999995,54.26999999999998,54.56,54.82,55.32000000000001,55.65999999999999,55.68000000000001,55.82000000000001,56.03,56.13,56.3,56.339999999999996,56.410000000000004,56.55,56.50999999999999,56.519999999999996,56.660000000000004,56.76000000000001,56.79,57.03000000000001,57.09000000000001,57.21000000000001,57.19,57.34000000000002,57.46000000000001,57.63000000000001,57.67,57.51],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
