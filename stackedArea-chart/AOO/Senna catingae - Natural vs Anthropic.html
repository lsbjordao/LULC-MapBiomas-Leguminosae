<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.290000000000006,54.18,54.2,53.6,53.03000000000001,52.269999999999996,52.38,52.580000000000005,52.14999999999999,52.17,52.529999999999994,53.68,54.29999999999999,54.989999999999995,55.79999999999999,56.349999999999994,56.08,56.220000000000006,56.27,55.95999999999999,56.279999999999994,56.690000000000005,56.61,56.38999999999999,55.14,54.680000000000014,54.089999999999996,53.53,53.63,53.26000000000001,53.53,53.54,52.99999999999999,52.879999999999995,52.629999999999995,52.61000000000001,52.53,52.56],"color":"green"},{"name":"anthropic","data":[46.16,46.239999999999995,46.24,46.85,47.400000000000006,48.160000000000004,48.06,47.85,48.29,48.28,47.91,46.74,46.13,45.440000000000005,44.64999999999999,44.07999999999999,44.35,44.209999999999994,44.17,44.46999999999999,44.14,43.73,43.82,44.04,45.29999999999999,45.74999999999999,46.32999999999999,46.91999999999999,46.79999999999999,47.19,46.89,46.90000000000001,47.42000000000001,47.550000000000004,47.790000000000006,47.82,47.90999999999999,47.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
