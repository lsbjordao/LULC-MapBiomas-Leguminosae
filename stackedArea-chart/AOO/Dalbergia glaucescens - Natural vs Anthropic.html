<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.34,73.33,72.53,72.07,70.77999999999999,70.35,70.03,69.17000000000002,67.64999999999999,67.11,66.67999999999999,66.74000000000001,67.49,67.49000000000001,67.57000000000001,67.32000000000001,66.80000000000001,66.5,66.25,66.17999999999999,65.6,65.98,66.03,66.75,67.39,68.46999999999998,69.57,69.83000000000001,69.95,69.94999999999999,69.92999999999999,69.91,70.3,70.42999999999999,70.80000000000001,70.88999999999999,70.97999999999999,71.28],"color":"green"},{"name":"anthropic","data":[33.88,33.9,34.69,35.169999999999995,36.45,36.86999999999999,37.22,38.08,39.58,40.14,40.55,40.50999999999999,39.749999999999986,39.73999999999999,39.669999999999995,39.94,40.43,40.74,40.98999999999999,41.059999999999995,41.669999999999995,41.28,41.230000000000004,40.5,39.839999999999996,38.739999999999995,37.69,37.38000000000001,37.28000000000001,37.290000000000006,37.33,37.330000000000005,36.96,36.83000000000001,36.42,36.36,36.26,35.970000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
