<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.77999999999999,82.71,78.61,76.55,76.57999999999998,77.92,79.69,80.64999999999999,81.50000000000001,81.2,82.14,82.71000000000001,83.13999999999999,83.19,82.55999999999999,78.73,79.91000000000001,79.49000000000001,79.61999999999999,80.95000000000002,80.69,79.50000000000001,78.64000000000001,78.14000000000001,77.76000000000002,79.42000000000002,80.3,80.74999999999999,80.84,81.39,81.35,80.89,81.84,77.51,77.41999999999999,77.09,77.35,77.41],"color":"green"},{"name":"anthropic","data":[17.05,17.13,21.24,23.279999999999998,23.26,21.92,20.15,19.200000000000003,18.35,18.65,17.71,17.130000000000003,16.72,16.65,17.299999999999997,21.110000000000003,19.94,20.37,20.22,18.89,19.15,20.35,21.22,21.71,22.08,20.42,19.55,19.09,19.01,18.46,18.509999999999998,18.95,18.02,22.33,22.42,22.75,22.48,22.439999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
