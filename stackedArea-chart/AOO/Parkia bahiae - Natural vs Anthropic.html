<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.32,77.42999999999999,76.17000000000002,75.31,74.27000000000001,74.00999999999999,74.28,74.44,74.42,73.95,73.91000000000001,74.04,74.15,74.38000000000001,74.1,73.88000000000002,73.79,73.49000000000001,73.66999999999999,73.58,73.45,73.36,73.61,74.01,74.60999999999999,75.02000000000001,75.59,75.50999999999999,75.64,75.22,75.14,75.15,74.91000000000001,75.02,75.18,75.63,76.29,74.62],"color":"green"},{"name":"anthropic","data":[11.959999999999999,12.850000000000001,14.05,14.950000000000001,15.99,16.24,15.92,15.690000000000001,15.72,16.15,16.229999999999997,16.15,16.029999999999998,15.8,15.98,16.099999999999998,16.23,16.59,16.41,16.52,16.679999999999996,16.759999999999998,16.47,16.02,15.43,15,14.49,14.660000000000002,14.59,14.99,15.14,15.16,15.41,15.24,15.17,14.74,14.15,15.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
