<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[88.27,88.41,88.3,88.17,86.69,88.18,88.23,88.03,87.91,87.9,88,87.95,87.85,87.73,87.69,86.78,86.61,86.48,86.35,86.29,86.26,86.3,86.41,86.57,86.68,86.73,86.77,86.78,86.76,85.16,84.9,84.14,83.98,83.73,84.13,83.54,82.77,82.52],"color":"#006400"},{"name":"Flooded forest","data":[6.62,6.78,6.7,6.69,6.66,6.75,6.71,6.58,6.66,6.65,6.73,6.73,6.73,6.72,6.71,6.78,6.8,6.81,6.79,6.82,6.8,6.83,6.82,6.86,6.86,6.87,6.46,6.52,6.65,6.84,6.78,6.8,6.83,6.86,6.9,6.91,6.94,6.91],"color":"#76A5AF"},{"name":"Wetland","data":[0.14,0.01,0.06,0.08,1.6,0,0,0.08,0.01,0.02,0,0.02,0,0,0,0,0,0,0.02,0,0,0,0,0,0,0,0.41,0.38,0.25,0.06,0.11,0.08,0.06,0.24,0.14,0.14,0.32,0.05],"color":"#45C2A5"},{"name":"Grassland","data":[0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0.01,0,0.01,0.01,0,0.01],"color":"#B8AF4F"},{"name":"Pasture","data":[0.44,0.2,0.21,0.25,0.23,0.22,0.17,0.31,0.4,0.41,0.34,0.39,0.46,0.54,0.59,1.53,1.7,1.81,1.92,1.97,2.01,1.96,1.83,1.66,1.52,1.43,1.43,1.4,1.39,2.93,3.14,3.97,4.14,4.28,3.89,4.51,5.13,5.65],"color":"#FFD966"},{"name":"River, lake and ocean","data":[5.04,5.1,5.22,5.31,5.31,5.35,5.39,5.49,5.51,5.53,5.43,5.41,5.45,5.5,5.51,5.41,5.38,5.39,5.42,5.41,5.42,5.4,5.44,5.4,5.43,5.46,5.43,5.43,5.46,5.51,5.57,5.51,5.49,5.39,5.44,5.4,5.35,5.36],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
