<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.25,74.61000000000001,72.96999999999998,72.22000000000001,71.61999999999999,71.17,70.94000000000001,70.36,69.78999999999999,68.99,68.27,67.59999999999998,67.21,66.58999999999999,66.22999999999999,65.76999999999998,65.25999999999999,64.19,63.03,62.21,61.68,61.17,60.86,60.35,59.98,59.57,59.01,58.56,57.95,57.669999999999995,57.82000000000001,57.73000000000001,57.2,57.13,56.85999999999999,56.49999999999999,56.349999999999994,56.08],"color":"green"},{"name":"anthropic","data":[37.07000000000001,37.7,39.349999999999994,40.09999999999999,40.69,41.16,41.39,41.95,42.51999999999999,43.31999999999999,44.05000000000001,44.72,45.11,45.71,46.08000000000001,46.54,47.06999999999999,48.12,49.279999999999994,50.10999999999999,50.629999999999995,51.14,51.47,51.970000000000006,52.309999999999995,52.74000000000001,53.279999999999994,53.73,54.35,54.620000000000005,54.50999999999999,54.599999999999994,55.099999999999994,55.16999999999999,55.449999999999996,55.81,55.970000000000006,56.23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
