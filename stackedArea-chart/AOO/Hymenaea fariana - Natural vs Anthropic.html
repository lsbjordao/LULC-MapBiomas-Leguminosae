<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.1,54.739999999999995,53.080000000000005,52.629999999999995,52.15,52.17,52.14000000000001,52.550000000000004,53.519999999999996,54.48000000000001,55.30000000000001,55.980000000000004,54.89000000000001,54.239999999999995,54.13000000000002,53.790000000000006,53.650000000000006,53.75,54.88000000000002,55.080000000000005,55.260000000000005,55.16,55.63000000000002,55.75000000000001,55.6,55.610000000000014,55.39,55.07,54.33000000000001,54.27000000000001,54.22,54.07000000000001,53.93000000000001,55.01,55.25000000000001,55.88,55.940000000000005,56.43000000000001],"color":"green"},{"name":"anthropic","data":[34.31,34.980000000000004,36.779999999999994,37.39999999999999,37.919999999999995,37.9,37.879999999999995,37.50000000000001,36.43,35.519999999999996,34.88,34.21,34.67,35.120000000000005,35.230000000000004,35.67,35.919999999999995,35.82999999999999,34.78,34.48,34.19,34.32999999999999,34.05,33.94,34.06999999999999,34.089999999999996,34.3,34.6,35.400000000000006,35.60000000000001,35.70000000000001,35.790000000000006,35.86000000000001,34.75,34.57,34.23,34.23,34.19],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
