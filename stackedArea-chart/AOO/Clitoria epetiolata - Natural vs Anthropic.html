<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.660000000000004,31.92,31.87,31.02,30.91,30.830000000000002,30.920000000000005,31.21,32.21,32.370000000000005,32.230000000000004,31.21,30.69,31.980000000000008,31.38,32.65,33.4,34.31,33.88999999999999,33.85,34.28,34.56999999999999,35.43,36.42,36.72,36.89000000000001,37.42,38.36,39.440000000000005,40.040000000000006,40.339999999999996,40.769999999999996,41.06,41.88999999999999,42.09999999999999,42.13,42.45,42.42999999999999],"color":"green"},{"name":"anthropic","data":[69.34,70.09,70.15000000000002,71,71.12,71.19999999999999,71.09999999999998,70.80999999999999,69.81,69.67000000000002,69.79000000000002,70.83,71.33000000000001,70.04,70.63000000000002,69.38000000000001,68.62,67.72999999999999,68.14,68.18,67.75999999999999,67.45,66.56000000000002,65.6,65.31000000000002,65.14,64.6,63.66,62.58000000000001,61.98,61.68,61.26,60.96,60.11999999999999,59.89999999999999,59.87,59.559999999999995,59.599999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
