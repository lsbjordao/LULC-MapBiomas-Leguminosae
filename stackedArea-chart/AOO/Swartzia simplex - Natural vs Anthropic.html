<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.71,66.64000000000001,65.96000000000001,65.58,65.21999999999998,65.02,64.92,64.98,65.13000000000001,65.36,65.36,65.40000000000002,65.52000000000001,65.50000000000001,65.49000000000001,65.23,65.19999999999999,65.22,65.34,65.13000000000001,64.93,65.14999999999999,65.27000000000001,65.26999999999998,65.47999999999999,65.5,65.61,65.69,65.61,65.59999999999998,65.65,65.61999999999999,65.50999999999999,65.89999999999999,65.85,65.83,65.93999999999998,66.17],"color":"green"},{"name":"anthropic","data":[32.76,32.85,33.53,33.93000000000001,34.279999999999994,34.49,34.599999999999994,34.52,34.39,34.16999999999999,34.15,34.120000000000005,34,34.04,34.040000000000006,34.279999999999994,34.339999999999996,34.31,34.209999999999994,34.39,34.580000000000005,34.379999999999995,34.26,34.24999999999999,34.06999999999999,34.04,33.910000000000004,33.849999999999994,33.93,33.93999999999999,33.89,33.940000000000005,34.03000000000001,33.63,33.71,33.730000000000004,33.59,33.370000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
