<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.46000000000001,48.41,47.66000000000001,48.18,48.239999999999995,48.790000000000006,49.489999999999995,49.91,50.4,51.56000000000001,51.68,52.54,52.309999999999995,52.41,53.7,53.85000000000001,54.21999999999999,54.00999999999999,54.47,54.56999999999999,54.99,55.31000000000001,55.75000000000001,56.05,56.21000000000001,56.190000000000005,56.38,56.309999999999995,57.17,57.27,57.77,57.79,58.03999999999999,58.03999999999999,58.150000000000006,58.38999999999999,58.64,59.19],"color":"green"},{"name":"anthropic","data":[53.51,53.56,54.33,53.79,53.74,53.19,52.47,52.06999999999999,51.56999999999999,50.41,50.29,49.42,49.660000000000004,49.57,48.279999999999994,48.14999999999999,47.76,47.97,47.51,47.43,46.980000000000004,46.67,46.23,45.93,45.75999999999999,45.779999999999994,45.6,45.660000000000004,44.82,44.690000000000005,44.220000000000006,44.18000000000001,43.940000000000005,43.92,43.83,43.57000000000001,43.34,42.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
