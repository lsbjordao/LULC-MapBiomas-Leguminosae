<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.67999999999999,56.92000000000001,56.01000000000001,55.29,54.870000000000005,54.75,54.51,54.38,54.33,54.29999999999999,54.46999999999999,54.94,54.989999999999995,54.83,54.5,53.99,53.56999999999999,53.11999999999999,52.96999999999999,53.02999999999999,53.06,53.059999999999995,53.25,53.039999999999985,53.15,53.38,53.49000000000001,53.18000000000001,52.879999999999995,52.79,52.63,52.53999999999999,52.11999999999999,51.89999999999999,51.82,51.56999999999999,51.62999999999999,51.99999999999999],"color":"green"},{"name":"anthropic","data":[44.95000000000001,45.72999999999999,46.61999999999999,47.34,47.74000000000001,47.88000000000001,48.11000000000001,48.230000000000004,48.28000000000001,48.33,48.13,47.68000000000001,47.65,47.79,48.11999999999998,48.650000000000006,49.06999999999999,49.510000000000005,49.64,49.589999999999996,49.56,49.57000000000001,49.36,49.589999999999996,49.50999999999999,49.27,49.13999999999999,49.44,49.76,49.85,50,50.11,50.519999999999996,50.739999999999995,50.81,51.05,50.989999999999995,50.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
