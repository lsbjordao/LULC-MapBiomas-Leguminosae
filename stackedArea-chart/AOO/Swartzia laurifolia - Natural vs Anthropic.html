<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.53000000000002,90.37,89.39,88.67000000000002,88.29999999999998,88.59,88.27000000000001,86.18,84.52000000000001,83.31,81.56,80.66,80.36,79.96000000000001,78.95999999999998,77.72999999999999,77.15,76.71,75.57,75.05,74.33000000000001,74.24,74.18,73.86999999999999,73.46000000000001,73.31,73.28999999999999,73.23,72.96000000000001,72.57000000000001,72.19999999999999,71.19000000000001,70.69,70.49,70.45,70.74000000000001,70.42999999999999,68.84],"color":"green"},{"name":"anthropic","data":[10.340000000000002,10.510000000000002,11.49,12.190000000000001,12.57,12.29,12.61,14.699999999999998,16.35,17.560000000000002,19.330000000000002,20.210000000000004,20.520000000000003,20.92,21.929999999999996,23.150000000000002,23.720000000000002,24.180000000000003,25.3,25.820000000000004,26.540000000000003,26.640000000000004,26.7,27.01,27.409999999999997,27.56,27.58,27.630000000000003,27.9,28.330000000000005,28.68,29.67,30.18,30.38,30.43,30.119999999999994,30.449999999999996,32.02],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
