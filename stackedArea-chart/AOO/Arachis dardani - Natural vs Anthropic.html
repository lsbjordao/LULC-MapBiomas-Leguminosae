<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.06,63.61,61.56,60.60999999999999,58.94,57.669999999999995,57.16,56.72,56.38999999999999,56.269999999999996,56.99,57.44,58.57,58.38999999999999,58.519999999999996,58.78999999999999,58.099999999999994,57.96,57.61000000000001,57.059999999999995,56.92999999999999,56.90999999999999,56.699999999999996,57.22,57.25,57.339999999999996,57.699999999999996,57.24,56.96999999999999,56.85999999999999,57.04,57.67,58.209999999999994,58.559999999999995,58.76,58.84999999999999,58.82,58.95],"color":"green"},{"name":"anthropic","data":[36.97,37.43,39.48,40.44,42.10999999999999,43.370000000000005,43.88,44.3,44.65,44.78000000000001,44.04,43.6,42.470000000000006,42.64,42.53000000000001,42.260000000000005,42.940000000000005,43.080000000000005,43.41,43.970000000000006,44.099999999999994,44.150000000000006,44.330000000000005,43.83,43.79,43.7,43.36000000000001,43.8,44.05,44.19,43.99,43.36,42.830000000000005,42.47,42.279999999999994,42.18,42.21,42.08],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
