            let chart = null;

            function drawChart() {

                    return;
                }

                chart = Highcharts.chart('stackedArea', {

                        type: 'area',
                        width: w,
                        height: h,
                        animation: false

                    title: { text: '' },
                    xAxis: {

                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },

                });

            drawChart();

            // Redesenha imediatamente a cada frame de resize

        });
