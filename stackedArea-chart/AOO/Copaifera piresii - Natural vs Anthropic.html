<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.45000000000003,88.76,88.22,86.48000000000002,85.92000000000002,84.67000000000002,84.10000000000001,83.6,83.07000000000001,82.60000000000002,82.59,82.03,81.56000000000002,81.36000000000001,80.89999999999999,80.41,79.61,78.07000000000002,77.65,76.87,76.34,75.79,75.07,75.03000000000002,75.26,75.36999999999999,75.27,75.28999999999999,75.33,75.16,75.33999999999999,75.11999999999999,74.76,74.61,74.61,74.44999999999999,74.09,73.19000000000001],"color":"green"},{"name":"anthropic","data":[11.98,12.670000000000002,13.209999999999999,14.95,15.52,16.75,17.32,17.83,18.349999999999998,18.840000000000003,18.830000000000005,19.380000000000003,19.879999999999995,20.07,20.55,21.020000000000003,21.830000000000002,23.369999999999997,23.77,24.55,25.08,25.639999999999997,26.37,26.409999999999997,26.17,26.05,26.139999999999997,26.14,26.09,26.25,26.099999999999994,26.330000000000002,26.69,26.819999999999997,26.830000000000002,26.990000000000002,27.360000000000003,28.250000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
