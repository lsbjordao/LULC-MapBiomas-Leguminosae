<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[89.55,89.18,89.3,89.18,89.13,89.31,89.22,88.64,88.68,87.97,87.75,87.96,87.65,87.62,87.4,87.38,86.95,87.07,86.91,86.32,86.06,86.42,86.29,86.76,87.1,87.28,86.86,86.64,85.83,85.71,85.26,82.93,82.11,81.56,81.02,78.72,78.03,76.07],"color":"#006400"},{"name":"Flooded forest","data":[6.52,6.43,6.42,6.48,6.5,6.52,6.52,6.25,6.46,6.47,6.38,6.3,6.37,6.33,6.25,6.37,6.33,6.41,6.47,6.43,6.42,6.45,6.42,6.56,6.61,6.63,6.67,6.65,6.54,6.61,6.59,6.54,6.42,6.51,6.38,6.64,6.66,6.37],"color":"#76A5AF"},{"name":"Wetland","data":[0.08,0.87,0.19,0.07,0.06,0.07,0.04,0.29,0.07,1.14,0.1,0.01,0,0.08,0.01,0.05,0.16,0.09,0.12,0.19,0.23,0.1,0.09,0.05,0.05,0.02,0.04,0.03,0.01,3.35,0.13,0.22,2.44,0.19,0.51,0.18,0.21,0],"color":"#45C2A5"},{"name":"Grassland","data":[0,0,0,0.01,0,0.12,0.08,0,0,0.03,0,0.01,0,0,0.01,0.02,0,0,0.01,0.01,0.01,0,0,0,0.01,0,0.01,0,0,0,0,0.02,0,0,0,0,0.18,0],"color":"#B8AF4F"},{"name":"Pasture","data":[0.35,0.48,0.47,0.49,0.48,0.25,0.28,0.36,0.52,1.11,1.18,0.86,1.1,0.93,1.03,1.06,0.88,0.92,1.1,1.61,1.84,1.41,1.31,1.28,1.41,1.31,1.69,1.69,1.94,2.05,2.43,4.73,5.75,6.66,7.23,9.79,10.36,11.57],"color":"#FFD966"},{"name":"River, lake and ocean","data":[3.14,2.68,3.26,3.41,3.48,3.37,3.49,4.1,3.91,2.91,4.21,4.5,4.52,4.68,4.94,4.75,5.32,5.16,5.01,5.07,5.07,5.25,5.52,4.99,4.46,4.39,4.36,4.62,5.31,1.92,5.24,5.19,2.92,4.72,4.49,4.31,4.19,5.63],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
