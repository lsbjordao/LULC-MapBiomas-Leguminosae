<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.16,95.82000000000001,95.91000000000001,95.86000000000001,96.08,94.71000000000001,90.26,85.98,80.53999999999999,77.03,74.24999999999999,73.94,73.53,72.62,72.31000000000002,70.39999999999999,69.51,68.97999999999999,69,69.13,71.05999999999999,71.01,70.91,70.66999999999999,70.54,70.29,70.16000000000001,69.87,69.67,69.77000000000001,70.24,70.45,70.42,70.39,70.28999999999999,70.16000000000001,70.15,69.96000000000001],"color":"green"},{"name":"anthropic","data":[4.74,4.08,3.9899999999999998,4.03,3.81,5.18,9.63,13.94,19.36,22.889999999999997,25.650000000000002,25.980000000000004,26.369999999999997,27.290000000000003,27.58,29.499999999999996,30.39,30.92,30.910000000000004,30.77,28.85,28.9,29,29.23,29.35,29.61,29.729999999999997,30.040000000000003,30.240000000000002,30.13,29.66,29.43,29.47,29.509999999999998,29.599999999999998,29.73,29.75,29.939999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
