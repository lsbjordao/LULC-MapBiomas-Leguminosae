<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.07000000000001,54.699999999999996,53.279999999999994,52.26,51.559999999999995,51.050000000000004,51.16,50.89,50.870000000000005,50.43,50.24000000000001,50.56999999999999,51.339999999999996,51.849999999999994,52.74999999999999,53.25,53.199999999999996,53.4,53.43000000000001,52.809999999999995,52.63,53.5,53.45,53.58,53.419999999999995,53.51,52.82999999999999,51.13,49.91,49.27,48.75,49.209999999999994,49.44999999999999,49.370000000000005,49.31,49.300000000000004,49.199999999999996,49.29],"color":"green"},{"name":"anthropic","data":[45.62,45.96,47.379999999999995,48.39999999999999,49.129999999999995,49.63,49.529999999999994,49.78999999999999,49.81,50.24,50.42,50.10999999999999,49.33,48.84,47.92000000000001,47.43000000000001,47.480000000000004,47.24999999999999,47.260000000000005,47.86,48.05,47.160000000000004,47.23,47.089999999999996,47.26000000000001,47.169999999999995,47.84,49.53,50.77000000000001,51.410000000000004,51.93,51.45,51.21000000000001,51.29,51.379999999999995,51.37,51.48,51.38],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
