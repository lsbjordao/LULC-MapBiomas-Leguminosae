<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.03000000000002,75.42000000000002,75.79,75.14000000000001,74.83,74.00000000000001,74.75999999999999,74.67,74.95,75.68,75.82,76.51000000000002,77.39999999999999,77.71999999999998,78.85000000000001,80.15,80.58000000000001,80.80000000000001,80.80000000000003,80.88000000000001,80.88000000000001,80.86000000000003,80.66,80.22,80.13000000000002,79.59000000000002,79.2,79.68,79.60000000000001,79.20000000000002,79.32000000000002,78.99,78.98,79.08999999999999,79.3,79.42,79.34000000000002,79.21999999999998],"color":"green"},{"name":"anthropic","data":[28.67,28.290000000000003,27.900000000000002,28.580000000000002,28.87,29.729999999999997,28.939999999999998,29.029999999999998,28.769999999999996,28.01,27.87,27.18,26.29,25.970000000000002,24.84,23.55,23.119999999999997,22.919999999999998,22.899999999999995,22.82,22.83,22.84,23.04,23.470000000000002,23.560000000000002,24.110000000000003,24.49,24.02,24.110000000000003,24.499999999999996,24.38,24.689999999999998,24.709999999999997,24.619999999999994,24.38,24.29,24.37,24.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
