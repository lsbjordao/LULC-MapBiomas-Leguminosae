<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.48,46.33,45.7,45.61999999999999,45.459999999999994,44.81,44.769999999999996,44.64,44.97000000000001,45.92000000000001,46.64,47.190000000000005,48.059999999999995,48.339999999999996,48.52,48.53000000000001,48.23,48.220000000000006,47.8,47.68,47.31,47.17999999999999,47.04,46.989999999999995,46.9,47.050000000000004,47.21999999999999,47.4,47.67000000000001,48.099999999999994,48.46999999999999,48.5,48.38000000000001,48.56,48.4,48.489999999999995,48.84,49.129999999999995],"color":"green"},{"name":"anthropic","data":[54.86,56.01,56.65,56.709999999999994,56.88,57.53,57.57,57.699999999999996,57.35000000000001,56.410000000000004,55.69000000000001,55.16,54.27,53.989999999999995,53.809999999999995,53.809999999999995,54.1,54.13999999999999,54.54999999999999,54.650000000000006,55.010000000000005,55.16,55.29,55.34,55.43000000000001,55.279999999999994,55.11000000000001,54.93,54.65,54.24999999999999,53.87000000000002,53.83,53.96,53.8,53.910000000000004,53.87,53.49999999999999,53.20999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
