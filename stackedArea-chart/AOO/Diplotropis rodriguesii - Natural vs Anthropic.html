<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.91999999999999,66.76999999999998,66.47,66.65,67.24999999999999,67.16999999999999,66.97,66.96999999999998,67.09,68.38,68.74000000000001,68.25,67.62,66.50999999999999,64.45,64.07000000000001,64.13,64.07000000000001,63.440000000000005,62.959999999999994,62.81999999999999,62.72,62.81,62.690000000000005,62.57,62.63,62.65,62.96,63.22,63.580000000000005,63.4,62.94,63.00999999999999,62.989999999999995,63.550000000000004,63.62,63.83,63.36],"color":"green"},{"name":"anthropic","data":[32.980000000000004,33.129999999999995,33.42,33.239999999999995,32.64,32.730000000000004,32.93,32.93,32.8,31.53,31.15,31.64,32.29,33.39,35.44,35.81,35.78,35.83,36.45,36.94,37.08,37.18,37.089999999999996,37.2,37.339999999999996,37.26,37.24,36.94,36.68,36.32,36.5,36.96,36.88,36.9,36.35,36.269999999999996,36.07,36.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
