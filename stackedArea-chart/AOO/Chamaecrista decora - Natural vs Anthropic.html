<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.35,89.22999999999999,89.14999999999998,89.1,89.05,89.08000000000001,88.98,88.91,88.91,88.71000000000001,88.63,88.28,88.26,88.23,88.22,88.1,88.16000000000001,88.07,88.07,88.05,88.04,88.21000000000001,88.53,88.35000000000001,87.89,87.49000000000002,86.97999999999999,86.81,86.64,86.60000000000001,86.55000000000001,86.52,86.56,86.65,86.69,86.66,86.64999999999999,86.39999999999999],"color":"green"},{"name":"anthropic","data":[11.219999999999999,11.370000000000001,11.44,11.51,11.55,11.509999999999998,11.610000000000001,11.67,11.69,11.879999999999999,11.95,12.299999999999999,12.33,12.37,12.370000000000001,12.479999999999999,12.44,12.510000000000002,12.52,12.55,12.55,12.39,12.059999999999999,12.22,12.69,13.1,13.6,13.79,13.95,14,14.029999999999998,14.06,14.03,13.93,13.91,13.93,13.95,14.190000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
