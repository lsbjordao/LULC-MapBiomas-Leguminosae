<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.93,70.6,69.98,69.80000000000001,69.74,69.63000000000001,69.5,69.49,69.53,68.93,68.94,69.32,69.20000000000002,69.24000000000001,69.86999999999999,69.4,69.27999999999999,69.25999999999999,69.08,69.21,69.34,69.34,69.22,69.33,69.42,69.56,69.53999999999999,69.50999999999999,69.77000000000001,69.68,69.99,70.08,70.01,70.07,69.86,69.82000000000001,70.08,70.04999999999998],"color":"green"},{"name":"anthropic","data":[29.16,30.460000000000004,31.080000000000005,31.290000000000003,31.340000000000003,31.430000000000007,31.570000000000004,31.590000000000003,31.550000000000004,32.12,32.129999999999995,31.750000000000004,31.87,31.820000000000004,31.19,31.66,31.77,31.820000000000004,31.99,31.860000000000003,31.71,31.73,31.86,31.740000000000002,31.630000000000003,31.500000000000007,31.52,31.569999999999997,31.309999999999995,31.380000000000006,31.09,31.000000000000004,31.07,30.999999999999996,31.2,31.26,30.999999999999996,31.019999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
