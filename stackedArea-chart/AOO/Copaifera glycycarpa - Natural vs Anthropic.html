<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.43999999999998,82.94,82.11999999999999,82.13,82.16,82.57000000000001,83.66,83.59,83.20999999999998,83.75999999999999,84.25999999999999,83.89999999999999,83.14999999999999,83.35999999999999,83.76999999999998,84.57000000000001,83.99999999999999,83.43000000000002,82.88,82.74,81.77,81.72000000000001,81.38999999999999,81.28,81.25999999999998,81.17,81.18,80.95,81.06,81.20999999999998,81.53999999999999,81.69,81.16000000000001,80.92,80.24,80.21999999999998,79.22,78.21000000000001],"color":"green"},{"name":"anthropic","data":[17.41,17.930000000000003,18.750000000000004,18.73,18.710000000000004,18.290000000000003,17.200000000000003,17.270000000000003,17.640000000000004,17.110000000000003,16.6,16.950000000000003,17.71,17.51,17.11,16.290000000000003,16.86,17.43,17.97,18.119999999999997,19.09,19.159999999999997,19.479999999999997,19.589999999999996,19.61,19.689999999999998,19.660000000000004,19.910000000000004,19.8,19.650000000000002,19.31,19.169999999999998,19.71,19.939999999999998,20.6,20.640000000000004,21.650000000000002,22.65],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
