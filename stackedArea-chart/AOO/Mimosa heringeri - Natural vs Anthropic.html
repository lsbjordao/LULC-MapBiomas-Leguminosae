<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.6,67.75,67.19000000000001,66.42999999999999,65.41000000000001,60.8,59.24000000000001,56.83,55.459999999999994,52.71,51.11,50.60999999999999,49.6,48.71,47.589999999999996,46.69,46.279999999999994,45.62,45.29,45.28999999999999,44.86,44.57,44.49,44.23,44.36,44.410000000000004,44.37,44.56000000000001,44.81999999999999,44.65,44.55,44.37,44.07,43.8,43.6,43.01,42.97999999999999,43.09],"color":"green"},{"name":"anthropic","data":[29.23,32.11,32.660000000000004,33.42,34.43,39.04,40.589999999999996,43.03,44.38,47.120000000000005,48.74,49.24,50.239999999999995,51.13999999999999,52.25,53.13999999999999,53.55,54.230000000000004,54.55,54.540000000000006,54.99,55.28,55.339999999999996,55.61,55.48,55.43,55.47,55.29,55.019999999999996,55.199999999999996,55.290000000000006,55.45,55.77000000000001,56.06,56.220000000000006,56.830000000000005,56.870000000000005,56.76],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
