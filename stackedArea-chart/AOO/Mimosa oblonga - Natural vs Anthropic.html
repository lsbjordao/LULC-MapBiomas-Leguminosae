<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.18000000000001,63.46,63.330000000000005,63.26999999999999,63.18999999999998,63.029999999999994,62.98,62.970000000000006,63.830000000000005,64.79,65.11999999999999,65.99,66.57,66.95,67.61000000000001,67.68,67.71,68.56,68.69,68.91,69.2,69.51,69.63000000000001,69.59,69.75999999999999,69.96000000000001,70.11,70.41000000000001,70.55,70.75,70.97000000000003,71.11,71.41000000000001,71.53,71.72,71.71,72.06,72.13000000000001],"color":"green"},{"name":"anthropic","data":[39.75,39.480000000000004,39.620000000000005,39.68,39.73,39.910000000000004,39.95,39.989999999999995,39.11,38.15,37.81,36.98,36.38,35.99,35.31,35.260000000000005,35.22,34.370000000000005,34.25,34.02,33.73,33.42,33.31,33.33,33.19,32.98,32.82,32.52,32.39000000000001,32.190000000000005,31.960000000000004,31.830000000000002,31.520000000000003,31.400000000000002,31.21,31.220000000000002,30.88,30.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
