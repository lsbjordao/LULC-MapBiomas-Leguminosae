<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.78,66.98,66.61999999999999,65.96000000000001,63.96999999999999,63.4,62.900000000000006,62.41,61.88,60.83999999999999,60.5,60.46999999999999,59.93,59.769999999999996,59.5,58.99,58.459999999999994,58.05,57.349999999999994,56.879999999999995,56.78999999999999,56.77000000000001,56.85000000000001,56.9,57.019999999999996,56.97,56.879999999999995,56.8,56.589999999999996,56.31000000000001,55.88000000000001,55.75,55.690000000000005,55.56,55.41,55.41,55.5,56.089999999999996],"color":"green"},{"name":"anthropic","data":[33.15,33.96,34.309999999999995,34.970000000000006,36.95,37.52000000000001,38.03000000000001,38.510000000000005,39.04999999999999,40.09,40.44,40.47,41,41.150000000000006,41.42000000000001,41.95,42.470000000000006,42.879999999999995,43.56999999999999,44.04,44.13999999999999,44.160000000000004,44.089999999999996,44.02,43.92,43.93999999999998,44.059999999999995,44.129999999999995,44.339999999999996,44.620000000000005,45.03000000000001,45.17,45.24000000000001,45.38000000000002,45.50000000000001,45.52,45.440000000000005,44.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
