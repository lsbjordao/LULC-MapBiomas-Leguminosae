<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.339999999999996,54.39999999999999,53.589999999999996,52.46000000000001,51.87,51.43999999999999,51.49999999999999,50.93999999999999,49.809999999999995,49.080000000000005,48.65,48.620000000000005,48.92000000000001,49.379999999999995,49.11999999999999,49.21,48.85,47.86,47.03,46.05,45.19,44.22,44.010000000000005,43.78,43.050000000000004,42.86,42.190000000000005,41.61,41.86,41.760000000000005,41.43,41.199999999999996,41.230000000000004,40.99,40.96,41.39,41.53,42.52],"color":"green"},{"name":"anthropic","data":[46.36,46.3,47.12,48.24,48.84,49.28,49.2,49.769999999999996,50.89,51.62,52.04,52.09,51.77,51.31,51.58,51.5,51.86,52.84,53.67999999999999,54.64,55.5,56.47,56.69,56.92,57.629999999999995,57.839999999999996,58.49999999999999,59.09,58.83,58.93,59.27,59.489999999999995,59.47,59.709999999999994,59.73,59.31,59.17999999999999,58.169999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
