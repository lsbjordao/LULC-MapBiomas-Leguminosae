<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.15,71.87,71.86000000000001,71.97999999999999,72,72.3,72.44999999999999,72.42,72.31,71.89999999999999,71.71999999999997,71.63999999999999,71.55,71.47,71.19,70.68999999999998,70.29999999999998,69.78000000000002,69.73,69.84999999999998,69.85,69.78999999999999,69.74,69.81000000000002,69.92,69.95,69.94999999999999,69.9,69.98,69.91000000000001,69.92999999999999,69.78,69.71999999999998,69.65,69.53,69.36,69.18,69.07000000000001],"color":"green"},{"name":"anthropic","data":[28.71,29,28.98,28.849999999999998,28.849999999999998,28.529999999999994,28.39,28.419999999999998,28.53,28.93,29.13,29.22,29.29,29.38,29.659999999999997,30.15,30.55,31.07,31.12,31.019999999999996,30.99,31.050000000000004,31.1,31.020000000000003,30.92,30.91,30.92,30.950000000000003,30.860000000000003,30.91,30.919999999999998,31.060000000000006,31.130000000000003,31.200000000000003,31.3,31.490000000000006,31.66,31.750000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
