<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.94000000000001,89.87,89.86,89.76,90.04,90.93,91.63,91.47,91.38999999999999,91.61,91.86,91.72999999999999,91.4,91.19999999999999,91.08,91.35000000000001,90.91000000000001,90.59,90.10000000000001,89.84,89.43999999999998,89.05999999999997,88.63,88.36,88.10000000000002,87.94000000000003,88.04,88.11,88.10000000000001,87.94000000000001,87.77000000000001,87.78,87.74000000000001,87.7,88.06,87.94000000000001,87.94,87.57000000000001],"color":"green"},{"name":"anthropic","data":[10.75,10.82,10.84,10.94,10.649999999999999,9.76,9.06,9.219999999999999,9.299999999999999,9.09,8.84,8.97,9.3,9.5,9.600000000000001,9.360000000000001,9.8,10.09,10.600000000000001,10.84,11.260000000000002,11.65,12.06,12.33,12.6,12.74,12.65,12.59,12.600000000000001,12.760000000000002,12.94,12.91,12.95,13,12.65,12.75,12.75,13.139999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
