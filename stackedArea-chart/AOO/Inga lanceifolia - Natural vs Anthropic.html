<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.2,78.19000000000003,77.74000000000001,77.42000000000002,77.21000000000001,77.04999999999998,77.21999999999998,77.48,77.87999999999998,78.15,78.17999999999999,78.28,78.44000000000001,78.43,78.46999999999998,78.36,78.51,78.62,78.88,78.95999999999998,79.02999999999999,79.28999999999999,79.30000000000001,79.34,79.47000000000001,79.48,79.36,79.28,79.41000000000001,79.54,79.71999999999998,79.66000000000001,79.76,79.92999999999999,80.16,80.30999999999999,80.53,80.58],"color":"green"},{"name":"anthropic","data":[23.8,23.860000000000003,24.330000000000002,24.66,24.86,25.02,24.819999999999997,24.59,24.150000000000002,23.89,23.860000000000003,23.72,23.58,23.6,23.57,23.689999999999998,23.54,23.43,23.189999999999998,23.09,23.02,22.76,22.73,22.699999999999996,22.58,22.540000000000003,22.67,22.73,22.630000000000003,22.5,22.32,22.38,22.269999999999996,22.089999999999996,21.82,21.689999999999998,21.46,21.25],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
