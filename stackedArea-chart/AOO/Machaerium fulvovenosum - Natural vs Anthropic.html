<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.68,53.459999999999994,53.629999999999995,54.31,54.59,54.76000000000001,54.97,54.65,54.49,54.31,54.09,54.15,54.080000000000005,53.95000000000001,53.91000000000001,54.04,53.779999999999994,54.27,54.55,55.06,55.26,55.400000000000006,55.5,55.599999999999994,55.82000000000001,55.93000000000001,55.94,56.07,56.1,56.27,56.22,56.01,56.05,56.02,56.30000000000001,56.470000000000006,53.85,53.91000000000001],"color":"green"},{"name":"anthropic","data":[47.71,47.93,47.8,47.10999999999999,46.81999999999999,46.64000000000001,46.410000000000004,46.769999999999996,46.919999999999995,47.11,47.32,47.25,47.34,47.46999999999999,47.49999999999999,47.39000000000001,47.63999999999999,47.15999999999999,46.85,46.36,46.169999999999995,46.03,45.92,45.81,45.61,45.49,45.49,45.35,45.32,45.15,45.17,45.42,45.36,45.39,45.13,44.949999999999996,47.57,47.49999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
