<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.12,71.09000000000002,70.88000000000001,70.62,70.75000000000003,70.69,70.27,69.27000000000001,68.43,68.33000000000001,68.38,67.99,67.47000000000001,66.96000000000001,66.67999999999999,66.64,66.52,66.08,65.78,65.41,64.78,64.07,63.78,63.17999999999999,62.17,61.27999999999999,60.32,59.209999999999994,58.739999999999995,58.290000000000006,57.5,57.05,56.800000000000004,56.71,56.309999999999995,56.11,55.7,55.86],"color":"green"},{"name":"anthropic","data":[29.76,29.780000000000005,29.99,30.250000000000004,30.12,30.18,30.610000000000003,31.590000000000003,32.44,32.55,32.48,32.86,33.39,33.910000000000004,34.19,34.22,34.34,34.769999999999996,35.1,35.46,36.09000000000001,36.800000000000004,37.080000000000005,37.68000000000001,38.690000000000005,39.61000000000001,40.57000000000001,41.67000000000001,42.13,42.57,43.35000000000001,43.82,44.06,44.18,44.57,44.75000000000001,45.18000000000001,45],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
