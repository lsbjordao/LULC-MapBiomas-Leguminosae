<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.8,51.6,50.97,50.5,50.38,50.61,50.21000000000001,50.63999999999999,50.79,51,51.150000000000006,51.470000000000006,50.79,51.04,51.96000000000001,52.89,53.089999999999996,53.54,53.85000000000001,54.23,54.480000000000004,54.75000000000001,54.870000000000005,55.160000000000004,56.01,56.85999999999999,57.15,57.46,57.92,58.25,58.870000000000005,59.35000000000001,59.75,60.28,59.940000000000005,59.93,59.92999999999999,60.129999999999995],"color":"green"},{"name":"anthropic","data":[48.96999999999999,49.15,49.79,50.26,50.37,50.169999999999995,50.57,50.14,49.970000000000006,49.76,49.6,49.309999999999995,49.94999999999999,49.73,48.809999999999995,47.859999999999985,47.67000000000001,47.23,46.910000000000004,46.54,46.3,46,45.879999999999995,45.6,44.75000000000001,43.92,43.61,43.279999999999994,42.86000000000001,42.519999999999996,41.910000000000004,41.41,41.00999999999999,40.47,40.83,40.839999999999996,40.83,40.63999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
