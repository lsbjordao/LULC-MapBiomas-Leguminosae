<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.57,50.47,49.39,49.22,48.94999999999999,48.55,48.410000000000004,48.040000000000006,47.63,47.709999999999994,47.179999999999986,47.08999999999999,46.79999999999999,46.61000000000001,46.12,45.75000000000001,45.57,45.59000000000001,45.56,45.52,45.72000000000001,45.78,45.93999999999999,45.93,46.07,46.22,46.28,46.34,46.209999999999994,46.12,46.21,46.16,46.27000000000001,46.46,46.40999999999999,46.56,46.599999999999994,46.67],"color":"green"},{"name":"anthropic","data":[50.239999999999995,51.34999999999999,52.40999999999999,52.61000000000001,52.88,53.28999999999999,53.43,53.8,54.21,54.12000000000001,54.66,54.74,55.03999999999999,55.21999999999999,55.7,56.070000000000014,56.260000000000005,56.25000000000001,56.28,56.31,56.099999999999994,56.06999999999999,55.900000000000006,55.93000000000001,55.769999999999996,55.61000000000001,55.559999999999995,55.49,55.62000000000001,55.71,55.639999999999986,55.69,55.57,55.4,55.45,55.28,55.250000000000014,55.18000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
