<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.64,80.76999999999998,79.89999999999999,80.65,79.99000000000001,79.7,79.27000000000001,78.72,76.95,72.66,72.18999999999998,71.45,71.21000000000001,71.32,71.60000000000001,71.67999999999999,71.64,71.45,70.27,69.97999999999999,70.21,70.50999999999999,70.76,70.93,71.1,71.37,71.47,71.45,71.37,71.42,71.35000000000001,71.36999999999999,71.49,71.52,71.53,71.52,71.21000000000001,71.15],"color":"green"},{"name":"anthropic","data":[20.05,19.93,20.81,20.06,20.709999999999997,20.99,21.430000000000003,21.980000000000004,23.76,28.05,28.5,29.25,29.500000000000004,29.360000000000003,29.1,29.009999999999998,29.049999999999997,29.24,30.45,30.71,30.5,30.2,29.939999999999998,29.79,29.59,29.34,29.230000000000004,29.26,29.329999999999995,29.270000000000003,29.349999999999998,29.330000000000005,29.199999999999996,29.18,29.18,29.17,29.5,29.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
