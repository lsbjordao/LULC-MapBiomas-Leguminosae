<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.09,70.10999999999997,69.25999999999998,68.28000000000002,68.17,68.44,68.36999999999999,68.99999999999999,69.12999999999998,69.09999999999998,68.85,68.96,68.43,68.08000000000001,66.38,65.63999999999999,64.55,64.46,64.4,63.92,63.080000000000005,63.11000000000001,63.41000000000001,63.660000000000004,63.92999999999999,64.12,63.940000000000005,64.08,63.559999999999995,63.45,63.34,63.18,62.76,62.97,63.02,62.300000000000004,62.800000000000004,63.06],"color":"green"},{"name":"anthropic","data":[26.9,27.009999999999998,27.86,28.830000000000002,28.939999999999998,28.68,28.75,28.119999999999997,27.979999999999997,28.02,28.25,28.15,28.68,29.009999999999998,30.72,31.47,32.55,32.64,32.71,33.21,34.05,34,33.7,33.44,33.17,33,33.169999999999995,33.029999999999994,33.55,33.63,33.75000000000001,33.919999999999995,34.33,34.14,34.13,34.85,34.339999999999996,34.07],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
