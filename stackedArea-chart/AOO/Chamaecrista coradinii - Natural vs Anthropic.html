<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.78999999999999,75.43,74.47000000000001,73.54000000000002,73.45,73.11000000000001,71.81,70.68,70.62,68.84,66.11000000000001,64.42,61.57999999999999,63.81,62.8,61.96,62.230000000000004,62.24,62.56000000000001,63.01,60.46,60.019999999999996,59.51000000000001,59.260000000000005,59.70000000000001,60.53000000000001,61.03000000000001,61.6,62.22,62.85,62.99,62.19,62.18000000000001,61.53999999999999,61.13,60.9,60.85000000000001,56.56999999999999],"color":"green"},{"name":"anthropic","data":[24.020000000000003,24.390000000000004,25.36,26.279999999999998,26.38,26.709999999999997,28.02,29.150000000000002,29.21,30.99,33.7,35.400000000000006,38.25,36,37.01,37.85999999999999,37.599999999999994,37.589999999999996,37.260000000000005,36.82,39.35,39.8,40.31999999999999,40.559999999999995,40.129999999999995,39.3,38.79,38.230000000000004,37.60000000000001,36.96,36.84,37.63,37.650000000000006,38.29,38.699999999999996,38.919999999999995,38.97,43.24],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
