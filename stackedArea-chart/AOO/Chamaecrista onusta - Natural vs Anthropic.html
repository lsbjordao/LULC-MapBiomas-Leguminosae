<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.49000000000001,65.64,64.23999999999998,62.23000000000001,61.39000000000001,60.18000000000001,60.629999999999995,60.69,61.17000000000001,61.69,61.87,62.25000000000001,62.699999999999996,63.73,63.93000000000001,63.98,64.03,63.88,64.36999999999999,64.04,63.68,64.18,63.99,64.49,64.88,64.84,64.46,64.85,64.83999999999999,64.6,64.91000000000001,64.96,65.17,65.46000000000001,66,66.62,67.15,67.96000000000001],"color":"green"},{"name":"anthropic","data":[24.19,26.19,27.74,29.970000000000002,30.990000000000002,32.24999999999999,31.830000000000002,31.78,31.290000000000003,30.78,30.57,30.25,29.67,28.53,28.18,27.980000000000004,27.95,28.22,27.720000000000002,28.11,28.580000000000002,28.2,28.35,27.830000000000002,27.44,27.39,27.799999999999997,27.5,27.509999999999998,27.869999999999997,27.779999999999998,27.97,27.86,27.540000000000003,27.27,26.779999999999998,26.2,25.16],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
