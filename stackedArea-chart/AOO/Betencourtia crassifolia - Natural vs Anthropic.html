<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.17,71.66000000000001,71.44,71.12999999999998,70.53000000000002,70.36999999999999,70.08,69.57,68.93,67.71000000000001,67.21,67.36000000000001,67.29,67.03,66.61,66,65.72999999999999,65.34,64.69,64.43,64.48,64.41,64.44,64.14999999999999,64.19,64.23,64.11,64.08,63.97999999999999,63.81999999999999,63.75000000000001,63.75000000000001,63.349999999999994,63.260000000000005,63.11,63.019999999999996,62.93,63.160000000000004],"color":"green"},{"name":"anthropic","data":[29.82,30.340000000000003,30.56,30.86,31.460000000000004,31.610000000000003,31.909999999999997,32.44,33.06,34.27,34.8,34.63,34.73,34.97,35.37,35.989999999999995,36.26,36.68,37.32,37.56,37.51,37.61000000000001,37.580000000000005,37.85,37.81,37.77,37.9,37.910000000000004,38.03000000000001,38.19,38.260000000000005,38.25,38.66,38.760000000000005,38.88999999999999,38.970000000000006,39.07999999999999,38.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
