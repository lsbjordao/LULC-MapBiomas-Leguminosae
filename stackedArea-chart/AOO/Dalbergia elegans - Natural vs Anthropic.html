<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.190000000000005,55.50000000000001,55.559999999999995,55.050000000000004,54.50000000000001,54.64999999999999,54.150000000000006,53.86999999999999,53.96,54,53.57,53.739999999999995,53.92,53.96,54.35,54.910000000000004,55.220000000000006,55.42,55.620000000000005,55.779999999999994,55.5,55.34,55.31999999999999,55.169999999999995,55.17,55.269999999999996,54.76,53.92999999999999,53.36,53.23,53.38,53.25999999999999,53.26999999999999,53.050000000000004,53.28000000000001,53.51,53.56999999999999,54.16000000000001],"color":"green"},{"name":"anthropic","data":[44.98,45.68,45.629999999999995,46.11999999999999,46.66,46.52,47.02,47.309999999999995,47.199999999999996,47.17,47.599999999999994,47.44,47.24,47.21,46.81,46.260000000000005,45.96,45.76,45.54,45.40999999999999,45.669999999999995,45.84,45.839999999999996,45.99000000000001,45.99,45.88000000000001,46.410000000000004,47.23,47.81,47.910000000000004,47.800000000000004,47.88999999999999,47.89,48.11,47.86,47.650000000000006,47.559999999999995,47.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
