<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.38000000000001,80.30999999999999,79.52999999999999,79.28999999999999,78.76,78.41,78.31,77.50999999999999,76.91999999999999,76.75999999999998,76.51000000000002,76.5,76.62,76.70000000000002,76.79,76.98999999999998,76.88000000000001,76.36999999999998,76.03999999999999,75.81,75.01999999999998,75.05,74.92999999999999,75.07,75.27,75.06,74.80999999999999,74.46,74.53,74.39999999999998,74.16,74.17000000000002,73.91,73.88,73.52999999999999,73.03999999999999,70.23999999999998,70.22],"color":"green"},{"name":"anthropic","data":[23.77,23.840000000000003,24.620000000000005,24.87,25.400000000000002,25.76,25.84,26.650000000000002,27.25,27.4,27.659999999999997,27.68,27.530000000000005,27.470000000000002,27.389999999999997,27.189999999999998,27.290000000000003,27.8,28.119999999999997,28.349999999999994,29.139999999999997,29.119999999999997,29.23,29.08,28.9,29.099999999999998,29.350000000000005,29.720000000000006,29.66,29.760000000000005,29.999999999999996,29.99,30.250000000000004,30.270000000000007,30.64,31.120000000000005,33.91,33.949999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
