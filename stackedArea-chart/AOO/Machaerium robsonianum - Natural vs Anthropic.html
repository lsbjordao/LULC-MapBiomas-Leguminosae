<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.42,28.96999999999999,28.510000000000005,28.32,28.14,28.049999999999997,28.160000000000007,27.93,27.61,27.4,27.4,27.46,27.53,27.639999999999997,27.830000000000002,27.83,27.759999999999998,27.87,28.18,28.51,28.720000000000006,28.759999999999998,28.97,29.080000000000002,29.150000000000002,29.110000000000003,28.93,29.069999999999997,29.040000000000006,28.939999999999998,29.03,29.23,29.41,29.700000000000006,29.98,30.189999999999998,30.15,30.220000000000002],"color":"green"},{"name":"anthropic","data":[57.83,58.26,58.73,58.93,59.08999999999999,59.19,59.099999999999994,59.32,59.63000000000001,59.839999999999996,59.85,59.809999999999995,59.73,59.61,59.42999999999999,59.42999999999999,59.50000000000001,59.370000000000005,59.07,58.74999999999999,58.54999999999999,58.5,58.279999999999994,58.169999999999995,58.099999999999994,58.14,58.31,58.17999999999999,58.18999999999999,58.279999999999994,58.23,58.019999999999996,57.82000000000001,57.51999999999999,57.25,57.06,57.08000000000001,57.010000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
