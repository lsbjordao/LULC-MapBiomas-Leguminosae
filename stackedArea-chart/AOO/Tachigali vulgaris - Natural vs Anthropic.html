<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.92000000000002,78.42,77.83,77.27,76.45000000000002,76.18000000000002,76.01000000000002,75.58000000000001,75.14,74.89,74.44999999999999,73.93,73.44000000000001,72.77000000000001,72.27,71.50999999999999,70.99999999999999,70.36999999999999,69.82,69.26,68.86999999999999,68.62,68.16,67.86,67.59,67.3,67.17,66.95,66.56999999999998,66.14999999999999,65.87999999999998,65.64999999999999,65.32999999999998,65.19,65.11,64.97,64.38,63.44],"color":"green"},{"name":"anthropic","data":[27.040000000000003,27.54,28.140000000000004,28.710000000000004,29.520000000000003,29.780000000000005,29.970000000000002,30.400000000000002,30.81,31.1,31.52,32.029999999999994,32.540000000000006,33.21000000000001,33.7,34.449999999999996,34.959999999999994,35.58999999999999,36.16,36.71000000000001,37.110000000000014,37.36000000000001,37.81,38.09000000000001,38.37,38.64999999999999,38.81999999999999,39,39.39,39.83,40.07999999999999,40.32000000000001,40.620000000000005,40.77,40.849999999999994,40.959999999999994,41.55999999999999,42.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
