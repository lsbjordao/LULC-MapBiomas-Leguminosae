<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.59,98.04,97.88,97.59999999999998,97.78,98.16000000000001,98.2,98.07999999999998,97.52,97.28999999999999,97.4,97.41999999999999,97.28,96.99,96.89999999999999,96.78,96.88000000000002,97.04999999999998,97.01999999999998,96.71000000000001,96.65,96.71000000000001,96.89,97.02000000000001,97.01,96.93,96.88,96.94,96.9,96.84000000000002,96.75,96.62,96.60000000000001,96.59,96.47999999999999,96.39,96.13999999999999,95.72000000000001],"color":"green"},{"name":"anthropic","data":[2.62,2.1799999999999997,2.32,2.61,2.42,2.05,2,2.12,2.6799999999999997,2.92,2.79,2.7800000000000002,2.9299999999999997,3.21,3.3,3.41,3.33,3.1500000000000004,3.19,3.4899999999999998,3.55,3.48,3.3200000000000003,3.18,3.2,3.27,3.32,3.2600000000000002,3.3,3.35,3.45,3.58,3.61,3.6100000000000003,3.7199999999999998,3.82,4.07,4.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
