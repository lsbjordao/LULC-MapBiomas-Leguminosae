<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.82,93.81,93.35,92.03,91.71000000000001,91.66,91.58000000000001,91.56,91.63,91.9,91.87,91.83000000000001,92.02000000000001,92.3,92.44,92.53,92.62,92.6,92.61,92.66,92.89,92.99000000000001,93.04,93.09,93.03999999999999,92.99000000000001,92.96000000000001,92.99000000000001,93.14,93.56,93.61,93.13,93.14,93.08000000000001,92.83,92.46000000000001,91.85,91.49000000000001],"color":"green"},{"name":"anthropic","data":[5.970000000000001,5.97,6.43,7.76,8.07,8.11,8.2,8.219999999999999,8.15,7.880000000000001,7.909999999999999,7.96,7.76,7.4799999999999995,7.340000000000001,7.25,7.16,7.180000000000001,7.170000000000001,7.11,6.890000000000001,6.800000000000001,6.74,6.6899999999999995,6.74,6.79,6.82,6.79,6.64,6.220000000000001,6.16,6.659999999999999,6.64,6.7,6.96,7.32,7.9399999999999995,8.290000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
