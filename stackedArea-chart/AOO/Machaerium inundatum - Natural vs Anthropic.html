<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.44,71.78999999999999,70.81,70.03,69.12,68.83999999999999,68.61999999999999,67.81,67.37,67.34,66.86000000000001,66.27000000000001,65.58999999999999,64.92,64.16,63.769999999999996,63.51999999999999,63.42999999999999,63.29,63.21999999999999,62.749999999999986,62.28,61.99,61.84,61.64000000000001,61.56,61.43,61.14,61.08,60.989999999999995,60.41,60.35999999999999,60.339999999999996,60.379999999999995,60.25999999999999,60.06999999999999,60.019999999999996,58.980000000000004],"color":"green"},{"name":"anthropic","data":[29.150000000000002,30.810000000000002,31.790000000000003,32.56,33.480000000000004,33.760000000000005,33.989999999999995,34.8,35.239999999999995,35.25,35.739999999999995,36.33,37.02,37.69,38.44,38.82,39.08,39.18,39.309999999999995,39.39,39.83,40.3,40.61,40.76,40.94,41.02,41.17,41.46,41.519999999999996,41.599999999999994,42.18,42.230000000000004,42.24,42.2,42.339999999999996,42.529999999999994,42.58,43.629999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
