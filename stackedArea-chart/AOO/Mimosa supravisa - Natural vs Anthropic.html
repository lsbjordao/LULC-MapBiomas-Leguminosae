<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.61,51.99,50.01,48.08,46.739999999999995,46.26000000000001,46.03,44.75000000000001,44.06,43.54,43.67,43.15,42.88000000000001,42.699999999999996,42.620000000000005,42.72,42.53,42.260000000000005,42.44,42.379999999999995,42.7,42.4,42.790000000000006,43.18,43.650000000000006,43.660000000000004,43.58,43.949999999999996,43.51,43.13999999999999,42.66,42.28,42.120000000000005,41.760000000000005,41.49000000000001,41.88000000000001,41.85,42.38],"color":"green"},{"name":"anthropic","data":[52.66,52.27,54.23999999999999,56.19,57.53,58.010000000000005,58.22999999999999,59.53,60.199999999999996,60.72999999999999,60.61000000000001,61.09,61.38,61.550000000000004,61.64,61.550000000000004,61.74,62.00000000000001,61.83,61.910000000000004,61.559999999999995,61.85000000000001,61.49000000000001,61.08,60.61000000000001,60.610000000000014,60.69,60.33,60.760000000000005,61.12,61.61000000000001,61.980000000000004,62.150000000000006,62.510000000000005,62.78,62.400000000000006,62.42000000000001,61.900000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
