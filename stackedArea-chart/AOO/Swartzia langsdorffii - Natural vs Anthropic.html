<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.82,65.92999999999999,65.44,65.41999999999999,65.41,65.27999999999999,65.23999999999998,65.49,65.69999999999999,65.85,65.95,66.27000000000001,66.49000000000001,66.75000000000001,66.87,66.82000000000001,66.92999999999999,66.91,67.16,67.15,67.25,67.43,67.47999999999999,67.58999999999999,67.58,67.72,67.70000000000002,67.83000000000001,67.83000000000001,67.86,68.1,68.17,68.37000000000002,68.39000000000001,68.51,68.60000000000001,68.84000000000002,68.98],"color":"green"},{"name":"anthropic","data":[32.96,32.84,33.32,33.36,33.349999999999994,33.470000000000006,33.55,33.279999999999994,33.09,32.94,32.800000000000004,32.519999999999996,32.29,32.04,31.91,31.95,31.849999999999998,31.86,31.62,31.620000000000005,31.53000000000001,31.340000000000007,31.28,31.19,31.210000000000004,31.070000000000004,31.060000000000002,30.99,30.95,30.94,30.710000000000004,30.6,30.419999999999998,30.39,30.270000000000003,30.19,29.970000000000002,29.819999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
