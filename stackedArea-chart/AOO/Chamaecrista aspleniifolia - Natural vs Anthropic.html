<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.55,54.589999999999996,53.209999999999994,52.66,52.290000000000006,52.51,52.3,52.38,53.129999999999995,53.559999999999995,53.68,53.720000000000006,53.53,53.10000000000001,53.25,53.11000000000001,53.45,53.92,54.6,54.78000000000001,54.9,55.13999999999999,55.18,55.129999999999995,55.099999999999994,55.209999999999994,55.30999999999999,54.949999999999996,54.83,54.73000000000001,54.710000000000015,54.720000000000006,54.940000000000005,55.17000000000001,55.71,55.84,55.91,55.59],"color":"green"},{"name":"anthropic","data":[45.22,46.169999999999995,47.57,48.12,48.489999999999995,48.260000000000005,48.48,48.41,47.64,47.22,47.099999999999994,47.07,47.26,47.69,47.54,47.669999999999995,47.33,46.85999999999999,46.18,45.980000000000004,45.86,45.63,45.59000000000001,45.66,45.67,45.559999999999995,45.49000000000001,45.839999999999996,45.96,46.050000000000004,46.080000000000005,46.05,45.839999999999996,45.62,45.08,44.94,44.870000000000005,45.19],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
