<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.03,70.08,69.83,69.05000000000001,67.64,66.88,66.22000000000001,65.55,64.77,63.64,63.13999999999999,62.81999999999999,62.53,62.2,61.9,61.53999999999999,61.33,61.029999999999994,60.72,60.45,60.26,60.05,59.88,59.63000000000001,59.559999999999995,59.410000000000004,59.29,59.05,58.68999999999999,58.51,58.379999999999995,58.260000000000005,58.219999999999985,58.07,57.919999999999995,57.77,57.7,58.09],"color":"green"},{"name":"anthropic","data":[31.169999999999998,32.13,32.4,33.129999999999995,34.56,35.330000000000005,36,36.65,37.44,38.56,39.07,39.35000000000001,39.68,40,40.3,40.67,40.86,41.160000000000004,41.470000000000006,41.76,41.94,42.160000000000004,42.34000000000001,42.56000000000001,42.66000000000001,42.78,42.92,43.150000000000006,43.51,43.690000000000005,43.82,43.92999999999999,43.98,44.11000000000001,44.28000000000001,44.44,44.50000000000001,44.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
