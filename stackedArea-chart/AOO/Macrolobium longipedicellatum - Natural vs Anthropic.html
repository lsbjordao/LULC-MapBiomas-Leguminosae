<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.85,95.89999999999999,95.67000000000002,95.75,95.72,95.38000000000001,95.65,95.60999999999999,95.04,94.78000000000002,94.67999999999999,94.36000000000001,93.71000000000001,92.81999999999998,92.1,91.53,91.75,91.83000000000001,91.51999999999998,91.62,92.12,92.32,92.80000000000001,93.48,93.82,93.93,93.49,93,93.28,93.4,93.49,93.74000000000001,93.88,93.94,94.25,94.02,94.16,92.68],"color":"green"},{"name":"anthropic","data":[4.6499999999999995,4.6,4.83,4.75,4.78,5.12,4.859999999999999,4.8999999999999995,5.46,5.72,5.82,6.14,6.8,7.6899999999999995,8.4,8.98,8.760000000000002,8.67,8.99,8.88,8.39,8.2,7.720000000000001,7.03,6.6899999999999995,6.57,7.01,7.5,7.23,7.11,7.010000000000001,6.760000000000001,6.630000000000001,6.58,6.25,6.48,6.35,7.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
