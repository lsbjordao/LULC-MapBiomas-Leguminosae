<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.26,80.77999999999999,80.66999999999999,80.44000000000001,80.1,80.13000000000001,80.3,80.24,80.53,80.72000000000001,80.77,81.1,81.16999999999999,81.22000000000001,81.20000000000002,81.08,80.92000000000002,80.92999999999999,80.96000000000001,81.11000000000001,81.27,80.98,81,81.03999999999999,81.02,80.97000000000001,80.9,80.9,81.05000000000001,81.12,80.96000000000001,80.88,80.92,80.99,81.15999999999998,81.09999999999998,81.15,81.79],"color":"green"},{"name":"anthropic","data":[21.249999999999996,21.71,21.830000000000002,22.06,22.39,22.380000000000003,22.209999999999997,22.270000000000003,21.95,21.79,21.72,21.4,21.34,21.270000000000003,21.290000000000003,21.43,21.56,21.57,21.509999999999998,21.380000000000003,21.24,21.51,21.490000000000002,21.47,21.470000000000002,21.520000000000003,21.6,21.6,21.45,21.38,21.55,21.609999999999996,21.599999999999998,21.5,21.34,21.4,21.369999999999997,20.72],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
