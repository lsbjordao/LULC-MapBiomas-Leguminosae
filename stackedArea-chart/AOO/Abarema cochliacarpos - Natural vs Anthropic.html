<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.489999999999995,50.65,50.24000000000001,49.31,48.730000000000004,48.45,48.580000000000005,48.46999999999999,48.57999999999999,48.51,48.25,48.28,48.27999999999999,48.38999999999999,48.5,48.71000000000001,48.760000000000005,48.64,48.67,48.60000000000001,48.57000000000002,48.89000000000001,48.86000000000001,48.83000000000001,48.83000000000001,48.769999999999996,48.82,49.080000000000005,48.98,49.04000000000001,49.31000000000001,49.250000000000014,49.510000000000005,49.57,49.54,49.53999999999999,49.57999999999999,49.79999999999999],"color":"green"},{"name":"anthropic","data":[50.3,51.14,51.57,52.5,53.08,53.35,53.23,53.32,53.21,53.300000000000004,53.58,53.53000000000001,53.510000000000005,53.4,53.29999999999999,53.08,53.03,53.160000000000004,53.12,53.2,53.230000000000004,52.94,52.94,52.980000000000004,52.989999999999995,53.01999999999999,52.99000000000001,52.71999999999999,52.839999999999996,52.78,52.47,52.53999999999999,52.26,52.2,52.27,52.24999999999999,52.22,51.99],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
