<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.81999999999999,38.449999999999996,38.52000000000001,38.230000000000004,37.73,39.10999999999999,38.93,39.11,41.73,41.900000000000006,42.050000000000004,41.95,41.42999999999999,41.21,41.14,38.26,38.019999999999996,37.43,37.370000000000005,37.25,37.019999999999996,37.18000000000001,37.31,37.23,37.24,37.18,37.14000000000001,37.38,37.35,36.9,36.79,37.010000000000005,37.14000000000001,36.85999999999999,36.940000000000005,36.92999999999999,37.080000000000005,37.040000000000006],"color":"green"},{"name":"anthropic","data":[63.33000000000001,63.67999999999999,63.63999999999999,63.92,64.42000000000002,63.05,63.22999999999999,63.040000000000006,60.43,60.24,60.11,60.21,60.73,60.94000000000001,61.03,63.900000000000006,64.13999999999999,64.71,64.77999999999999,64.89999999999999,65.14000000000001,64.97000000000001,64.83,64.92,64.91,64.95,65.01,64.75999999999999,64.80999999999999,65.22000000000001,65.37,65.14999999999999,65.03,65.30000000000001,65.21000000000001,65.20000000000002,65.07000000000001,65.11000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
