<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.96000000000002,77.69,77.64999999999999,76.80000000000001,77.76,78.31,79.03999999999999,78.66,79.24999999999999,79.84,80.15,80.54,81.11999999999999,82.54,83.89999999999999,84.32,84.04,83.43,83.27999999999999,82.92000000000002,82.41000000000001,82.3,82.32999999999998,82.39000000000001,83.47,84.49,85.24000000000001,85.54,86.09,86.58999999999999,86.85999999999999,86.65,87.27,88.70000000000002,88.83000000000001,88.78999999999999,88.80000000000001,88.82999999999998],"color":"green"},{"name":"anthropic","data":[21.790000000000003,22.060000000000002,22.11,22.95,21.990000000000002,21.44,20.71,21.1,20.500000000000004,19.92,19.61,19.23,18.62,17.23,15.86,15.42,15.7,16.320000000000004,16.47,16.84,17.340000000000003,17.460000000000004,17.44,17.369999999999997,16.28,15.25,14.52,14.21,13.659999999999998,13.18,12.89,13.110000000000001,12.469999999999999,11.049999999999999,10.94,10.969999999999997,10.959999999999999,10.909999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
