<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.63999999999999,84.32999999999998,83.96999999999998,83.42,82.69,82.18999999999998,81.85999999999999,81.43,81.14,80.92,80.75,80.49,80.3,80.03,79.81999999999996,79.49999999999997,79.28,79.32000000000001,79.23,78.89000000000001,78.54,78.51999999999998,78.17999999999999,77.82,78.00999999999999,77.67,77.59999999999998,76.92,76.17999999999998,75.58999999999999,75.21,74.98,74.8,74.71,74.78999999999998,74.39999999999999,74.05000000000001,73.57],"color":"green"},{"name":"anthropic","data":[22.47,22.799999999999997,23.14,23.680000000000003,24.410000000000004,24.919999999999998,25.229999999999997,25.66,25.970000000000002,26.21,26.349999999999998,26.6,26.82,27.080000000000002,27.279999999999998,27.61,27.84,27.790000000000003,27.91,28.23,28.57,28.599999999999998,28.94,29.27,29.1,29.41,29.520000000000003,30.200000000000003,30.919999999999998,31.530000000000005,31.940000000000005,32.150000000000006,32.31,32.42000000000001,32.32000000000001,32.699999999999996,33.08,33.55],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
