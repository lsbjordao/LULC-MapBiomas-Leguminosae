<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.46000000000002,89.44999999999999,89.26,89.3,89.43,89.48999999999998,89.98000000000002,90.50999999999999,90.91999999999999,90.83000000000001,90.34,87.7,91.38,90.76,87.95,86.07,85.03,85.56,85.45000000000002,90.31,89.92,87.2,86.64999999999999,87,87.05000000000001,88.47,88.82,89.07000000000001,83.31,77.29,73.71,73.41000000000001,73,71.74000000000001,76.49,78.82000000000001,82.35,82.49],"color":"green"},{"name":"anthropic","data":[10.34,10.35,10.53,10.48,10.36,10.29,9.8,9.27,8.870000000000001,8.96,9.43,12.09,8.43,9.030000000000001,11.850000000000001,13.71,14.76,14.23,14.350000000000001,9.479999999999999,9.86,12.59,13.129999999999999,12.79,12.739999999999998,11.32,10.979999999999999,10.73,16.48,22.5,26.08,26.38,26.79,28.060000000000002,23.310000000000002,20.97,17.43,17.3],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
