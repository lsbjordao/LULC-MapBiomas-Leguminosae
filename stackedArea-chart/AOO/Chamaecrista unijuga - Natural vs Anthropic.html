<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.139999999999993,31.349999999999998,31.130000000000003,30.980000000000004,31.83,31.759999999999998,31.51,31.000000000000004,30.070000000000004,29.94,28.96,28.980000000000004,27.94,28.130000000000006,27.96,27.450000000000003,27.769999999999992,27.779999999999998,28.009999999999998,28.130000000000003,28.250000000000004,28.4,28.870000000000005,28.620000000000005,28.710000000000004,28.59,28.730000000000004,28.300000000000004,28.410000000000004,28.65,28.93,29.87,30.119999999999997,30,30.87,31.159999999999997,31.01,31.18],"color":"green"},{"name":"anthropic","data":[66.72,64.52,64.82000000000001,64.97999999999999,64.18,64.25,64.53,65.06,65.97,66.16,67.16,67.11,68.1,67.91,68.05000000000001,68.53,68.25,68.24,68.03,67.92,67.77,67.63,67.16999999999999,67.38,67.30000000000001,67.43,67.29,67.72999999999999,67.59,67.39,67.11,66.13999999999999,65.88,65.97999999999999,65.2,64.93,65.07000000000001,64.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
