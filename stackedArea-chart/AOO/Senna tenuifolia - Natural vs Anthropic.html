<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.88,55.790000000000006,55.82,56.010000000000005,56.13999999999999,56.230000000000004,56.24000000000001,56.42,56.620000000000005,56.959999999999994,57.07,57.63,58.2,58.54,59.2,59.339999999999996,59.56999999999999,59.709999999999994,59.72999999999999,59.76,59.949999999999996,60.13,60.23,60.11999999999999,60.35000000000001,60.53,60.959999999999994,61.14,61.379999999999995,61.589999999999996,61.84,62.13,62.459999999999994,62.620000000000005,62.71,62.639999999999986,62.79,62.86],"color":"green"},{"name":"anthropic","data":[44.92,45.019999999999996,44.980000000000004,44.78,44.67,44.57000000000001,44.550000000000004,44.38,44.18000000000001,43.84,43.72,43.160000000000004,42.6,42.27,41.61,41.459999999999994,41.22,41.1,41.08,41.04,40.84000000000001,40.66,40.55,40.67,40.440000000000005,40.28,39.830000000000005,39.66,39.4,39.21,38.96,38.66,38.339999999999996,38.17,38.089999999999996,38.17000000000001,38,37.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
