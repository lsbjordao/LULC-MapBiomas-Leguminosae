<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.99,55.95999999999999,55.09,54.11,53.389999999999986,53.01,52.769999999999996,51.63,51.38,51.220000000000006,50.480000000000004,49.73,50.449999999999996,50.35000000000001,50.21000000000001,50.27,50.15,49.94,50.2,49.61,49.3,49.290000000000006,49.34,49.190000000000005,49.12,48.78000000000001,48.95,48.79,48.470000000000006,48.120000000000005,47.96000000000001,47.800000000000004,47.809999999999995,47.78,47.67000000000001,47.96000000000001,47.89000000000001,48.57000000000001],"color":"green"},{"name":"anthropic","data":[49.38,50.400000000000006,51.290000000000006,52.26,53,53.35999999999999,53.589999999999996,54.75,54.99000000000001,55.160000000000004,55.900000000000006,56.63,55.93,56.010000000000005,56.14,56.11,56.220000000000006,56.43000000000001,56.17,56.76,57.06,57.089999999999996,57.04,57.18,57.27,57.589999999999996,57.41,57.58,57.900000000000006,58.24999999999999,58.45,58.580000000000005,58.53,58.580000000000005,58.69,58.4,58.47999999999999,57.81999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
