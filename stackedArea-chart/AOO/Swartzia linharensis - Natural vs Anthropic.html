<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.11999999999999,48.45999999999999,47.73,47.25,46.48999999999999,45.65999999999999,45.160000000000004,45.9,46.01,46.11000000000001,45.870000000000005,45.88,46.02,45.58,45.699999999999996,45.870000000000005,46.14,46.53000000000001,46.709999999999994,47.19,47.169999999999995,47.290000000000006,47.480000000000004,47.38,47.660000000000004,46.92000000000001,46.629999999999995,46.65,46.66,46.54,46.449999999999996,46.22,46.32,48.519999999999996,47.94999999999999,47.96999999999999,47.789999999999985,47.839999999999996],"color":"green"},{"name":"anthropic","data":[51.059999999999995,51.76,52.46999999999999,52.96,53.720000000000006,54.55999999999999,55.08,54.339999999999996,54.23999999999999,54.160000000000004,54.43,54.42,54.28000000000001,54.72,54.63,54.44,54.160000000000004,53.8,53.63999999999999,53.15,53.18,53.07,52.85,52.959999999999994,52.66,53.38999999999999,53.69,53.65,53.62,53.74999999999999,53.85,54.07000000000001,53.96,51.75999999999999,52.35,52.32999999999999,52.51,52.46999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
