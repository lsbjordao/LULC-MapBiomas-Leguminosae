<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[60.91,60.54,60.24,60.12,60.23,60.73,60.78,60.65,60.44,60.26,60.29,60.23,60.19,60.11,60,60.12,60.16,60.11,60.12,60.08,59.77,59.78,59.93,59.88,59.88,60.01,60.11,60.1,60.14,59.88,59.66,59.73,59.75,59.91,60.18,59.96,59.85,59.75],"color":"#006400"},{"name":"Flooded forest","data":[8.83,8.12,7.75,8.2,7.9,8.29,7.85,7.39,6.89,6.05,6.65,6.96,7.14,6.97,7.05,7.03,7.06,7.24,7.16,7.05,7.78,7.81,7.7,7.75,7.76,8,7.99,8,8.06,7.96,8.09,8.37,8.54,8.73,8.8,8.81,8.96,9.19],"color":"#76A5AF"},{"name":"Wetland","data":[6.55,6.62,8.84,8.26,6.37,6.54,7.67,9.49,7.37,7.88,10.5,5.77,7.84,7.1,8.37,8.19,10.32,11.28,8.81,9.33,10.32,9.99,9.18,8.45,8.45,11.82,10.11,13.35,9.72,9.2,11.58,12.09,11.13,10.64,10.07,11.44,10.86,8.2],"color":"#45C2A5"},{"name":"Grassland","data":[0.28,0.06,0.02,0.01,0,0,0.05,0.19,0.02,0.07,0.23,0.12,0.07,0.06,0,0.04,0.09,0.14,0.21,0.19,0.06,0.06,0,0.01,0.04,0.17,0.06,0.12,0.16,0.05,0.22,0.73,0.74,0.59,0.3,0.38,0.26,0.6],"color":"#B8AF4F"},{"name":"Pasture","data":[0.72,1.39,2.05,2.09,1.91,1.19,1.3,1.55,1.99,3.36,3.45,3.52,3.56,3.44,3.59,3.45,3.66,3.79,3.41,3.13,3.55,3.67,3.66,3.75,3.86,3.55,3.53,3.51,3.3,3.53,3.81,3.46,3.35,3,2.56,2.7,2.77,2.8],"color":"#FFD966"},{"name":"River, lake and ocean","data":[22.29,22.85,20.68,20.91,23.18,22.83,21.94,20.32,22.89,21.97,18.46,22.98,20.78,21.91,20.57,20.75,18.3,17.03,19.87,19.81,18.1,18.27,19.11,19.75,19.6,16.02,17.79,14.5,18.21,18.97,16.22,15.21,16.08,16.71,17.68,16.29,16.88,19.04],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
