<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.800000000000004,44.050000000000004,43.17000000000001,42.620000000000005,42.09,41.71,41.38999999999999,40.88999999999999,40.510000000000005,40.269999999999996,40.15999999999999,40.14,40.07000000000001,39.87,39.84,39.71000000000001,39.699999999999996,39.550000000000004,39.41,39.18,39.12,39.00000000000001,39.080000000000005,39.13999999999999,39.22,39.34,39.47,39.57,39.63,39.68,39.93,40.09,40.28000000000001,40.38,40.37,40.32,40.38,40.56],"color":"green"},{"name":"anthropic","data":[58.68000000000001,59.440000000000005,60.33,60.88999999999999,61.4,61.75999999999999,62.099999999999994,62.58,62.99,63.199999999999996,63.31999999999999,63.330000000000005,63.41000000000002,63.599999999999994,63.660000000000004,63.800000000000004,63.83,63.949999999999996,64.06,64.3,64.38,64.49000000000001,64.45,64.35,64.25999999999999,64.13000000000001,64.02,63.91,63.85,63.80000000000001,63.559999999999995,63.410000000000004,63.199999999999996,63.10000000000001,63.14,63.17,63.11999999999999,62.940000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
