<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.77000000000001,73.19000000000001,73.04999999999998,72.91,72.28,71.83000000000001,71.79,71.94,72.35999999999999,72.58999999999999,72.74000000000001,73.17999999999999,73.39,73.60999999999999,74.00999999999999,73.97999999999999,73.86999999999999,74.05999999999999,73.95,73.83999999999999,74.11,74.29,74.21,74.24,74.42000000000002,74.61,74.98,75.16,75.46,75.51,75.84,75.92999999999999,75.92,75.74,75.56,74.94,75.08,74.83],"color":"green"},{"name":"anthropic","data":[27.650000000000002,27.22,27.359999999999996,27.51,28.139999999999997,28.58,28.62,28.48,28.059999999999995,27.83,27.69,27.23,27.03,26.8,26.42,26.45,26.56,26.38,26.470000000000002,26.58,26.309999999999995,26.12,26.21,26.17,26.009999999999998,25.820000000000004,25.43,25.260000000000005,24.95,24.929999999999996,24.589999999999996,24.5,24.490000000000006,24.68,24.87,25.48,25.349999999999998,25.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
