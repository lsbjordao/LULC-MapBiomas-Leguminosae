<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.25,66.06000000000002,65.25,64.81,64.56,64.48,64.56,64.47,64.03000000000002,64.12,63.89,64.25,65.21000000000001,65.36,65.88000000000001,65.77,65.77,65.65,65.06,64.84,64.41,64.23,63.85000000000001,63.42000000000001,63.010000000000005,63.220000000000006,63.32,62.67,61.760000000000005,61.430000000000014,61.400000000000006,61.300000000000004,61.120000000000005,61.210000000000015,61.28000000000001,61.35000000000001,61.35,61.410000000000004],"color":"green"},{"name":"anthropic","data":[36.18,37.370000000000005,38.17,38.60999999999999,38.86,38.949999999999996,38.87,38.95,39.39999999999999,39.3,39.550000000000004,39.18,38.21000000000001,38.06999999999999,37.54,37.66,37.67,37.78,38.349999999999994,38.589999999999996,39.01,39.190000000000005,39.56999999999999,40,40.41,40.199999999999996,40.1,40.75,41.669999999999995,41.98,42.01,42.14,42.279999999999994,42.199999999999996,42.13999999999999,42.05999999999999,42.099999999999994,42.01999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
