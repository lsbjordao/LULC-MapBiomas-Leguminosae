<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.84000000000002,75.67,74.5,73.25000000000001,72.03000000000002,71.12000000000002,71.2,71.02000000000001,70.55,70.05000000000001,70.05,69.97999999999999,70.46000000000001,70.89000000000001,71.01000000000002,70.94,70.63,70.35,69.96,69.02999999999999,67.57,67.14,66.38,66.17999999999999,66.25999999999999,65.98,66.21000000000001,65.75999999999998,65.64999999999999,65.11999999999999,65.20999999999998,65.38999999999999,65,65.07999999999998,64.87999999999998,64.64,64.66,64.69999999999999],"color":"green"},{"name":"anthropic","data":[25.69,25.85,27.01,28.290000000000003,29.49,30.4,30.32,30.5,30.98,31.48,31.49,31.54,31.080000000000002,30.630000000000003,30.51,30.590000000000003,30.900000000000002,31.16,31.55,32.50000000000001,33.94,34.379999999999995,35.17,35.35000000000001,35.24,35.54,35.309999999999995,35.75999999999999,35.87,36.39999999999999,36.31,36.14,36.510000000000005,36.45000000000001,36.64999999999999,36.879999999999995,36.879999999999995,36.82],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
