<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.81,48.43,48.089999999999996,47.55,46.96,46.519999999999996,46.48,46.44,46.38,46.28000000000001,46.239999999999995,46.43000000000001,46.56,46.72,46.93,46.71,46.62,46.49999999999999,46.50999999999999,46.43,46.50999999999999,46.74999999999999,46.72,46.81999999999999,46.779999999999994,46.839999999999996,46.93,46.940000000000005,46.62,46.379999999999995,46.28999999999999,46.309999999999995,46.32,46.32999999999999,46.269999999999996,46.169999999999995,46.17,46.32],"color":"green"},{"name":"anthropic","data":[55.14,55.539999999999985,55.870000000000005,56.40999999999999,57,57.44,57.46999999999999,57.529999999999994,57.589999999999996,57.68000000000001,57.7,57.55,57.4,57.25,57.03000000000001,57.260000000000005,57.37,57.480000000000004,57.46999999999999,57.540000000000006,57.46,57.230000000000004,57.24999999999999,57.14999999999999,57.18000000000001,57.120000000000005,57.03999999999999,57.019999999999996,57.330000000000005,57.589999999999996,57.67,57.660000000000004,57.660000000000004,57.650000000000006,57.7,57.81000000000001,57.809999999999995,57.660000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
