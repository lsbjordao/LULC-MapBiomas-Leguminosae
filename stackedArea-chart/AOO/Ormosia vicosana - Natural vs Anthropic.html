<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.410000000000004,42.68,42.34,41.82,41.879999999999995,42.21,42.1,42.36,43.08,43.42,43.3,43.5,43.99000000000001,43.71,43.64,43.92,43.89,43.98,44.08,44.29,44.64000000000001,45.00999999999999,45.32999999999999,45.89999999999999,46.02,46.14,46.260000000000005,46.39,46.56,46.86,46.839999999999996,46.96,47.15,47.18,47.06,46.980000000000004,47.23000000000001,47.410000000000004],"color":"green"},{"name":"anthropic","data":[58.05,57.77,58.1,58.620000000000005,58.56,58.25,58.35,58.09,57.370000000000005,57.03,57.15,56.95,56.46000000000001,56.739999999999995,56.8,56.519999999999996,56.54,56.47,56.370000000000005,56.150000000000006,55.81,55.44,55.120000000000005,54.54,54.42,54.31,54.19,54.06,53.879999999999995,53.56999999999999,53.61,53.49,53.300000000000004,53.279999999999994,53.400000000000006,53.48000000000001,53.22,53.040000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
