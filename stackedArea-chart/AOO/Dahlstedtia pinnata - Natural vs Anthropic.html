<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.92,57.660000000000004,57.440000000000005,57.38,57.47,57.61999999999999,57.86,58.09,58.37,59.19,59.60000000000001,59.95000000000002,60.44,60.709999999999994,61.160000000000004,61.46999999999999,61.66,61.779999999999994,61.989999999999995,62.239999999999995,62.480000000000004,62.72,62.94,63.1,63.29,63.54,63.779999999999994,64,64.21999999999998,64.47999999999999,64.69999999999999,64.88999999999999,65.05999999999999,65.19,65.41,65.52,65.71,65.75000000000001],"color":"green"},{"name":"anthropic","data":[41.25,41.54,41.73,41.79,41.699999999999996,41.559999999999995,41.349999999999994,41.099999999999994,40.79999999999999,39.980000000000004,39.59,39.23,38.74999999999999,38.489999999999995,38.029999999999994,37.72,37.53,37.39,37.220000000000006,36.92,36.7,36.45,36.25,36.08,35.89,35.650000000000006,35.39,35.18,34.970000000000006,34.69,34.48,34.29,34.13,34,33.78,33.65,33.48,33.410000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
