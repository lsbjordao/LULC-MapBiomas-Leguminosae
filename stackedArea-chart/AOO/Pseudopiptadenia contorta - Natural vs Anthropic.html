<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.87,48.88,48.54,48.28999999999999,48.139999999999986,48.06999999999999,48.26999999999999,48.339999999999996,48.699999999999996,49.19,49.47000000000001,50.040000000000006,50.46000000000001,50.74999999999999,51.28,51.53999999999999,51.730000000000004,51.720000000000006,52.019999999999996,52.11000000000001,52.46999999999999,52.879999999999995,53.06999999999999,53.220000000000006,53.410000000000004,53.61999999999999,53.73000000000001,53.800000000000004,53.82,53.879999999999995,54.02000000000001,54.120000000000005,54.26,54.57,54.8,55.029999999999994,55.22999999999999,55.490000000000016],"color":"green"},{"name":"anthropic","data":[52.49999999999999,52.53000000000001,52.88,53.160000000000004,53.25,53.339999999999996,53.15999999999999,53.1,52.73,52.239999999999995,51.97,51.37999999999999,50.97,50.68999999999999,50.16,49.88000000000001,49.69,49.7,49.4,49.31999999999999,48.97999999999999,48.559999999999995,48.37999999999999,48.23,48.02,47.81000000000001,47.71,47.63,47.62,47.58,47.42,47.32000000000001,47.160000000000004,46.86999999999999,46.63999999999999,46.4,46.22,45.94],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
