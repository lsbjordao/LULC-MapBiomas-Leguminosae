<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.64,71.62,70.52,69.86,69.47,69.29,68.95,67.39999999999999,67.1,65.8,64.83,64.14999999999999,63.57,63.15,62.25000000000001,61.059999999999995,60.60000000000001,58.019999999999996,56.41,56.08999999999999,55.089999999999996,54.230000000000004,53.33,52.5,51.79,51.51,51.18999999999999,50.92999999999999,50.910000000000004,50.56999999999999,50,49.559999999999995,49.56,49.13,48.4,48.43,48.07000000000001,46.05],"color":"green"},{"name":"anthropic","data":[29.35,29.37,30.470000000000002,31.139999999999997,31.52,31.709999999999997,32.04,33.59,33.919999999999995,35.2,36.16,36.870000000000005,37.44,37.87,38.76,39.94,40.41,42.99,44.61,44.91,45.92,46.78,47.67,48.489999999999995,49.209999999999994,49.5,49.82,50.05,50.09,50.42,50.989999999999995,51.44,51.44,51.85,52.599999999999994,52.57,52.900000000000006,54.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
