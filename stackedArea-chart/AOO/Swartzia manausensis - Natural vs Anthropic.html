<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.56999999999998,88.21,88.78999999999999,89.58,89.46,90.13999999999999,90.57000000000001,90.18999999999998,90.72999999999999,91.99000000000001,92.42999999999998,91.61999999999999,91.22999999999999,91.14000000000001,90.85,91.25,90.89000000000001,91,91.00000000000001,91.07000000000001,90.98,90.97999999999999,91.17000000000002,91.49999999999999,91.41,91.7,91.96000000000001,92.27,92.72,92.91999999999999,92.95,93.06000000000002,93.07000000000001,93.16,93.39999999999999,93.32000000000001,93.59,93.19000000000001],"color":"green"},{"name":"anthropic","data":[11.22,11.57,11.01,10.209999999999999,10.32,9.63,9.23,9.6,9.06,7.8,7.3500000000000005,8.17,8.56,8.64,8.940000000000001,8.52,8.91,8.79,8.79,8.72,8.79,8.809999999999999,8.62,8.29,8.39,8.1,7.84,7.51,7.0600000000000005,6.86,6.84,6.73,6.71,6.63,6.380000000000001,6.47,6.19,6.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
