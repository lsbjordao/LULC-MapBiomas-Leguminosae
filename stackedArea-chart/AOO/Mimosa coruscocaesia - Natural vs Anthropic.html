<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.88999999999999,69.13000000000001,69.16999999999999,69.17,68.58999999999999,68.7,68.74,69.67000000000002,69.85,70.13,69.88000000000001,69.72999999999999,70.02,70.00999999999999,70.1,70.27,69.95999999999998,70.18999999999998,71.21,71.63,71.52,71.25,70.72999999999999,70.27000000000001,69.92,69.47999999999999,69.16,68.07,67.03999999999999,65.66999999999999,65.4,65.32000000000001,65.32999999999998,65.93,65.91,63.71,63.559999999999995,63.65],"color":"green"},{"name":"anthropic","data":[31.240000000000002,30.990000000000002,30.979999999999997,30.990000000000002,31.549999999999997,31.430000000000003,31.4,30.479999999999993,30.269999999999996,30.009999999999998,30.279999999999998,30.41,30.13,30.14,30.05,29.89,30.2,29.95,28.93,28.49,28.630000000000003,28.890000000000004,29.43,29.880000000000003,30.23,30.68,30.979999999999997,32.08,33.09,34.48000000000001,34.76,34.81,34.81999999999999,34.23,34.239999999999995,36.440000000000005,36.6,36.49000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
