<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.27000000000001,85.08,84.22,83.57000000000001,83.19000000000001,83.21000000000001,83.46,83.12,82.54000000000002,81.91000000000001,81.61000000000001,81.28999999999999,80.86,80.26000000000002,80.33000000000001,80.83,80.89000000000001,81,81.43999999999997,80.99999999999999,80.79,80.71999999999998,80.80999999999999,81.38000000000001,81.28,81.44,81.55,81.52999999999999,81.55000000000001,81.50000000000001,81.37,81.43999999999998,81.46000000000001,81.64,81.74000000000001,81.61999999999999,81.56000000000002,80.77],"color":"green"},{"name":"anthropic","data":[15.46,16.64,17.5,18.15,18.55,18.509999999999998,18.28,18.619999999999997,19.21,19.83,20.11,20.43,20.849999999999998,21.47,21.39,20.9,20.84,20.72,20.29,20.73,20.95,20.990000000000002,20.93,20.34,20.439999999999998,20.28,20.189999999999998,20.19,20.17,20.240000000000002,20.35,20.27,20.27,20.09,19.979999999999997,20.11,20.17,20.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
