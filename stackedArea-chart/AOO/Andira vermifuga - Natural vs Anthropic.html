<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.26,65.2,64.58,63.93,63.089999999999996,62.56,62.23,61.779999999999994,61.190000000000005,60.84,60.589999999999996,60.25,60.29,60.13,59.82,59.5,59.35999999999999,59.160000000000004,59.010000000000005,58.800000000000004,58.42,58.24,58.13000000000001,58.080000000000005,58.06000000000001,58.13999999999999,57.980000000000004,57.99000000000001,57.900000000000006,57.530000000000015,57.32000000000001,57.22000000000001,57.02,56.84,56.63,56.530000000000015,56.41000000000001,56.47],"color":"green"},{"name":"anthropic","data":[38.65,39.71000000000001,40.33000000000001,40.97,41.81999999999999,42.339999999999996,42.68999999999999,43.12,43.7,44.07000000000001,44.339999999999996,44.64999999999999,44.61,44.78,45.07,45.43000000000001,45.55,45.74,45.88000000000002,46.1,46.50000000000001,46.68000000000001,46.78,46.839999999999996,46.839999999999996,46.760000000000005,46.92000000000001,46.92,47,47.36000000000001,47.57,47.67,47.86999999999999,48.06,48.27000000000001,48.38,48.480000000000004,48.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
