<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.02,93.11999999999999,91.15,90.72999999999999,90.81000000000002,90.67999999999998,90.35,89.78000000000002,89.42,88.72,87.71,87.34,87.11,87.04,86.68,85.56000000000002,84.87,84.79,84.6,84.26999999999998,84.21000000000001,84,83.94000000000001,83.65,83.65,84.08000000000001,84.51,84.48,83.90999999999998,83.42,83.22999999999999,83.28999999999999,82.9,82.91,83.19999999999997,82.81,81.09,79.75000000000001],"color":"green"},{"name":"anthropic","data":[8.620000000000001,8.49,10.45,10.879999999999999,10.799999999999999,10.929999999999998,11.259999999999998,11.85,12.18,12.899999999999999,13.93,14.269999999999998,14.500000000000002,14.58,14.940000000000001,16.060000000000002,16.75,16.82,17.029999999999998,17.35,17.42,17.61,17.68,17.96,17.98,17.55,17.099999999999998,17.15,17.7,18.21,18.41,18.33,18.72,18.71,18.43,18.81,20.539999999999996,21.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
