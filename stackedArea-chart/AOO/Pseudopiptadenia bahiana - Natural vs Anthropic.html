<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.12,54.48,52.879999999999995,52.349999999999994,50.589999999999996,50.19,50.35999999999999,50.14,50.25000000000001,50.31999999999999,50.580000000000005,51.54,51.579999999999984,51.64,52.199999999999996,51.269999999999996,51.099999999999994,51.3,51.39999999999999,51.75999999999999,51.61999999999999,51.5,51.28,51.33,51.88,51.53999999999999,51.839999999999996,52.61,53.10999999999999,53.4,53.61000000000001,54.42999999999999,54.47,54.49000000000001,54.37,54.12,54.160000000000004,54.72],"color":"green"},{"name":"anthropic","data":[47.4,47.05,48.64,49.169999999999995,50.93,51.33,51.16,51.37,51.25999999999999,51.209999999999994,50.949999999999996,49.989999999999995,49.96,49.88999999999999,49.33,50.26,50.41,50.22,50.14,49.74999999999999,49.9,50.01,50.22999999999999,50.209999999999994,49.63999999999999,50,49.68,48.9,48.43,48.11000000000001,47.910000000000004,47.08,47.04,47.019999999999996,47.14,47.4,47.36000000000001,46.80000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
