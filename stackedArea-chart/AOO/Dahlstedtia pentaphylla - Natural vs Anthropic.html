<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.22,68.52,68.23999999999998,68.00999999999999,67.89999999999999,67.72999999999999,67.65999999999998,67.74999999999999,67.91999999999999,67.84,67.82,67.91999999999999,68.27000000000001,68.11,68.49,68.47,68.52999999999999,68.57999999999998,68.65999999999998,68.74,68.89999999999999,69.13,69.27,69.38999999999999,69.50999999999999,69.60999999999999,69.82999999999998,69.75,69.99,69.96,70.05999999999999,70.3,70.42,70.44,70.53999999999999,70.42999999999999,70.63,70.61000000000001],"color":"green"},{"name":"anthropic","data":[32.39,32.1,32.36,32.620000000000005,32.730000000000004,32.85,32.93,32.86,32.68999999999999,32.76,32.78000000000001,32.67,32.33,32.52,32.13000000000001,32.14,32.080000000000005,32.040000000000006,31.94,31.850000000000005,31.700000000000003,31.480000000000004,31.34,31.210000000000004,31.09,31,30.790000000000003,30.860000000000003,30.61,30.620000000000005,30.530000000000005,30.300000000000004,30.210000000000008,30.200000000000003,30.080000000000002,30.170000000000005,30.000000000000004,30.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
