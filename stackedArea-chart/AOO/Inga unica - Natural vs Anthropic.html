<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.540000000000006,59.440000000000005,58.98,56.95,56.65000000000001,56.68,56.53000000000001,56.830000000000005,58.029999999999994,58.160000000000004,58.25000000000001,58.47,58.32000000000001,58.16,58.03000000000001,57.919999999999995,58.300000000000004,58.410000000000004,58.720000000000006,58.97999999999999,59.10000000000001,59.379999999999995,59.52,59.43,59.80000000000001,59.790000000000006,59.68,59.42,59.199999999999996,59.07000000000001,59.09,58.97,59.099999999999994,59.25,59.36999999999999,59.28999999999999,59.480000000000004,59.699999999999996],"color":"green"},{"name":"anthropic","data":[33.11000000000001,33.300000000000004,33.75,35.809999999999995,36.1,36.08,36.21,35.91,34.73,34.620000000000005,34.55,34.339999999999996,34.48,34.589999999999996,34.699999999999996,34.79,34.41,34.300000000000004,34,33.73,33.6,33.31,33.18,33.260000000000005,32.93,32.96,33.06999999999999,33.29,33.4,33.51,33.489999999999995,33.61999999999999,33.5,33.36,33.27,33.34,33.16,33.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
