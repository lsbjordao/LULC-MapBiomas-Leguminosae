<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.55,46.440000000000005,45.94,46.06000000000001,45.280000000000015,45.050000000000004,44.63,44.089999999999996,43.78999999999999,43.8,43.63000000000001,43.85000000000001,44.250000000000014,44.56,45.06,45.36000000000001,45.45000000000001,45.480000000000004,45.25000000000001,45.209999999999994,44.78,44.45,44.419999999999995,44.38,44.13,44.11,43.95,43.66,43.540000000000006,43.4,43.43000000000001,43.53000000000001,43.53,43.66,43.38,43.300000000000004,43.28,43.71999999999999],"color":"green"},{"name":"anthropic","data":[56.900000000000006,57.010000000000005,57.51000000000001,57.37,58.18,58.400000000000006,58.84,59.36000000000001,59.669999999999995,59.67,59.84,59.620000000000005,59.199999999999996,58.910000000000004,58.410000000000004,58.07000000000001,58.02,57.999999999999986,58.20000000000001,58.24,58.68,59,59.03000000000001,59.080000000000005,59.330000000000005,59.330000000000005,59.480000000000004,59.820000000000014,59.93000000000001,60.07,60.04,59.92000000000001,59.93999999999999,59.809999999999995,60.05999999999999,60.16999999999999,60.17999999999999,59.72999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
