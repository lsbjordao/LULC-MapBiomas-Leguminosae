<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.42,69.91,72.32,72.58,72.83999999999999,70.86,71.57999999999998,71.44,70.47,70.85,70.80999999999999,70.03,71.01,70.11,69.87,71.07,71.26,71.39,70.81,71.92,71.39999999999999,71.24,71.61000000000001,71.65,71.33,70.04,69.4,69.44,68.11000000000001,66.63000000000001,67.87,68.06,68.2,67.86,68.63,70.45,70.12,70.21],"color":"green"},{"name":"anthropic","data":[32.37,30.87,28.470000000000002,28.220000000000002,27.950000000000003,29.930000000000007,29.200000000000003,29.349999999999998,30.310000000000002,29.939999999999998,29.96,30.76,29.78,30.67,30.92,29.72,29.529999999999998,29.390000000000004,29.950000000000003,28.85,29.37,29.54,29.18,29.14,29.46,30.75,31.389999999999997,31.349999999999998,32.67999999999999,34.160000000000004,32.910000000000004,32.75000000000001,32.580000000000005,32.92,32.160000000000004,30.33,30.650000000000002,30.580000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
