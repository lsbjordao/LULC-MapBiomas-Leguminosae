<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.120000000000005,61.65,61.63,61.599999999999994,61.44,61.52,61.54,61.71999999999999,62.309999999999995,63.26,63.65999999999999,64.22999999999999,64.65,65.02,65.56,65.87,66.13,66.47000000000001,66.71,66.91999999999999,67.19999999999999,67.52999999999999,67.61999999999998,67.83,67.97,68.35,68.52999999999999,68.64999999999999,68.87999999999998,69.09,69.37000000000002,69.57000000000001,69.72,69.83999999999999,69.92999999999999,70.02000000000001,70.28999999999999,70.45],"color":"green"},{"name":"anthropic","data":[43.18,42.68,42.669999999999995,42.730000000000004,42.91,42.78999999999999,42.760000000000005,42.59,41.98,41.03999999999999,40.669999999999995,40.080000000000005,39.66,39.29,38.74999999999999,38.45,38.18,37.849999999999994,37.60999999999999,37.38999999999999,37.11,36.78,36.690000000000005,36.48,36.33,35.93,35.81,35.669999999999995,35.440000000000005,35.21000000000001,34.940000000000005,34.74,34.61,34.47,34.39,34.3,34.010000000000005,33.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
