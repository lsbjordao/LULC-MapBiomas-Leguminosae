<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.07,91.75,91.55000000000001,91.31,91.24,91.26000000000002,91.02,90.56,89.69999999999999,89.60000000000001,89.08000000000003,88.83000000000003,88.21000000000001,87.52,87.01,86.77000000000001,86.55000000000003,86.55000000000001,86.46000000000002,86.37,86.23,85.99000000000001,86.07000000000001,86.04,85.86999999999999,85.59,85.71,85.82000000000001,85.75,85.60000000000002,84.76000000000002,84.77000000000001,84.9,85.12,85.3,85.30000000000001,85.33000000000001,84.52],"color":"green"},{"name":"anthropic","data":[16.95,18.26,18.49,18.72,18.78,18.78,19.01,19.479999999999997,20.32,20.45,20.98,21.199999999999996,21.84,22.5,23.020000000000003,23.27,23.49,23.500000000000004,23.59,23.669999999999998,23.82,24.05,23.959999999999997,23.99,24.149999999999995,24.42,24.31,24.22,24.29,24.43,25.289999999999996,25.259999999999998,25.12,24.91,24.74,24.720000000000002,24.72,25.52],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
