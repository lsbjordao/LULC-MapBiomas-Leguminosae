<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.81,92.7,92.5,92.75999999999999,92.55000000000001,92.49000000000002,92.36000000000001,92.11999999999999,91.60000000000001,91.38999999999999,91.08000000000001,90.58999999999999,89.43,89.21000000000001,88.49000000000001,88.60000000000001,88.47000000000001,87.36000000000001,87.04,86.24,85.13000000000001,84.52000000000001,84.74000000000002,84.17000000000003,84.25000000000003,84.24000000000001,83.93000000000002,83.82000000000001,83.95,83.77000000000001,83.40000000000002,82.96000000000001,82.56,82.42000000000003,82.45,82.41000000000001,82.31000000000002,80.11999999999999],"color":"green"},{"name":"anthropic","data":[13.760000000000002,13.86,14.05,13.790000000000001,14.009999999999998,14.07,14.200000000000001,14.440000000000001,14.96,15.16,15.49,15.959999999999999,17.11,17.36,18.060000000000002,17.959999999999997,18.11,19.22,19.54,20.319999999999997,21.430000000000007,22.040000000000003,21.82,22.39,22.31,22.340000000000003,22.630000000000003,22.73,22.600000000000005,22.810000000000002,23.160000000000004,23.600000000000005,23.990000000000002,24.16,24.140000000000004,24.16,24.25,26.410000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
