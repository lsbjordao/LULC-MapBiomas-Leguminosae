<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[83.66,84.64,84.31,84.55,84.64,84.29,83.42,82.94,82.54,82.38,82.9,82.47,81.66,80.49,80.17,79.94,80.18,79.61,78.7,78,75.87,74.27,73.17,71.45,70.44,69.4,69.04,68.98,68,66.8,65.3,63.58,63.01,62.92,60.33,60.22,58.39,59.41],"color":"#006400"},{"name":"Flooded forest","data":[1.13,1.26,1.29,1.38,1.44,1.6,1.64,1.6,1.55,1.49,1.64,1.75,1.77,1.75,2.15,2.28,2.68,2.77,2.53,2.4,2.22,2.57,2.64,2.93,2.93,2.82,2.77,2.94,2.96,2.88,2.83,2.81,2.79,2.43,2.3,2.21,2.17,2.45],"color":"#76A5AF"},{"name":"Wetland","data":[1.93,1.93,1.79,1.93,1.62,1.46,1.24,1.68,1.77,1.38,0.89,1.13,2.46,1.16,1.07,0.78,0.84,0.8,0.57,1.79,2.35,2.43,2.91,1.74,1.39,2.88,2.21,2.8,1.74,1.7,2.82,4.96,3.71,5.36,6.67,6.04,6.64,1.68],"color":"#45C2A5"},{"name":"Grassland","data":[0.15,0.22,0.18,0.07,0,0.04,0,0.02,0,0,0,0,0,0,0.09,0,0,0,0,0.02,0,0.07,0,0,0.02,0.02,0,0.04,0.19,0.51,0.5,0.44,0.37,0.28,0.07,0.38,0.42,0.88],"color":"#B8AF4F"},{"name":"Pasture","data":[4,2.48,2.52,1.85,1.46,2.18,2.73,3.01,3.1,2.93,2.8,3.11,3.39,3.9,4.16,4.19,4.22,4.85,5.24,5.72,7.79,9.17,9.74,11.59,12.5,13.12,12.92,12.69,13.26,14.11,14.91,16.65,17.14,17.19,19.32,18.73,19.06,20.65],"color":"#FFD966"},{"name":"River, lake and ocean","data":[8.65,9,9.46,9.76,10.38,9.96,10.51,10.28,10.57,11.36,11.3,11.06,10.25,12.24,11.9,12.34,11.61,11.5,12.49,11.6,11.31,11.02,11.07,11.82,12.26,11.3,12.6,12.08,13.38,13.55,13.18,11.1,12.53,11.35,10.85,11.96,12.86,14.45],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
