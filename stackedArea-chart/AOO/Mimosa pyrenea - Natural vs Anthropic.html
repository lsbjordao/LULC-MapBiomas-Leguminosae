<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.72,53.7,53.32,52.230000000000004,51.4,51.04,50.34,49.650000000000006,48.9,48.290000000000006,47.63000000000001,47.07,46.75,46.63,46.510000000000005,46.720000000000006,46.83000000000001,46.59,46.160000000000004,45.830000000000005,45.69,45.839999999999996,45.89000000000001,46.61000000000001,47.480000000000004,47.629999999999995,47.63000000000001,47.77000000000001,47.43,47.31,47.4,47.46000000000001,47.29,46.94,46.82,46.92,47.370000000000005,47.88000000000001],"color":"green"},{"name":"anthropic","data":[40.980000000000004,42.01,42.38999999999999,43.47,44.3,44.67,45.37,46.029999999999994,46.79,47.410000000000004,48.07,48.63999999999999,48.95,49.08,49.18999999999998,48.98,48.870000000000005,49.11,49.529999999999994,49.89,50.03,49.85,49.830000000000005,49.07999999999999,48.23,48.07000000000001,48.07000000000001,47.92,48.279999999999994,48.39,48.29,48.25,48.419999999999995,48.75999999999999,48.900000000000006,48.78,48.330000000000005,47.830000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
