<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.83,48.669999999999995,48.68999999999999,48.76,48.76,48.629999999999995,48.46999999999999,48.43000000000001,48.3,48.4,48.470000000000006,48.55,48.599999999999994,48.82,48.92,48.970000000000006,49.12,49.120000000000005,49.15000000000001,49.13,49.41000000000001,49.5,49.38000000000001,49.51,49.51000000000001,49.550000000000004,49.6,49.57,49.72,49.84,50.019999999999996,50.05,50.13999999999999,50.25999999999999,50.16,50.099999999999994,50.04,49.59],"color":"green"},{"name":"anthropic","data":[52.28,52.43,52.41,52.349999999999994,52.38999999999999,52.53,52.709999999999994,52.74,52.88,52.77000000000001,52.71,52.65,52.61,52.37,52.279999999999994,52.230000000000004,52.08999999999999,52.13,52.120000000000005,52.13000000000001,51.86000000000001,51.800000000000004,51.92000000000001,51.81000000000001,51.800000000000004,51.78,51.71,51.72,51.6,51.49,51.28999999999999,51.24,51.14,51.05,51.19,51.269999999999996,51.33,51.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
