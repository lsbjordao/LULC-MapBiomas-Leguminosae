<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.16000000000001,83.30999999999999,83.74000000000001,83.67999999999999,83.43,83.55,83.22999999999999,82.74000000000001,82.97999999999999,82.52,82.13,81.99999999999999,82.08999999999999,82.28,83.05,83.33,83.15999999999998,82.92999999999999,82.94,82.7,82.7,82.72,82.60000000000001,82.66,82.68,82.64999999999999,82.6,82.63,82.89,82.9,82.98,83.06,83,82.81,82.69000000000001,82.69000000000001,82.71000000000001,82.13],"color":"green"},{"name":"anthropic","data":[16.51,16.36,15.93,15.99,16.21,16.11,16.419999999999998,16.92,16.689999999999998,17.130000000000003,17.53,17.66,17.57,17.38,16.6,16.330000000000002,16.51,16.74,16.73,16.96,16.970000000000002,16.95,17.07,16.990000000000002,16.98,17.01,17.060000000000002,17.05,16.76,16.76,16.67,16.6,16.66,16.85,16.98,16.990000000000002,16.97,17.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
