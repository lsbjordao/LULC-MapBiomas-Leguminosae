<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.90000000000002,70.27000000000001,69.59000000000002,69.11000000000003,68.57,68.40000000000002,68.11000000000001,67.66,67.62,67.25000000000001,67.07000000000002,67.05000000000001,66.95000000000002,67.00000000000001,67.25,67.31000000000002,67.63000000000001,67.48000000000002,67.52000000000001,67.45000000000003,67.27000000000001,67.09,67.38999999999999,69.04,69.36999999999999,69.83999999999999,69.9,69.97000000000001,70.04,70.11,70.09,70.10000000000001,69.89999999999999,69.93,69.67999999999999,69.66999999999999,69.97,70.27],"color":"green"},{"name":"anthropic","data":[32.010000000000005,31.619999999999997,32.309999999999995,32.79,33.33,33.489999999999995,33.78,34.23,34.279999999999994,34.65,34.81,34.85,34.95,34.88,34.63,34.58,34.26,34.419999999999995,34.37,34.43,34.62,34.79,34.51,32.839999999999996,32.519999999999996,32.05,31.990000000000002,31.910000000000004,31.85,31.780000000000005,31.79,31.780000000000005,31.98,31.950000000000006,32.21,32.22,31.910000000000004,31.630000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
