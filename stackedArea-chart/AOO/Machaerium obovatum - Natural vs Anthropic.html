<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[24.53,24.57,24.67,24.97,24.68,24.84,25.31,25.280000000000005,24.88,26.47,27.15,27.27,28.13,28.76,29.41,29.630000000000006,29.910000000000004,30.740000000000002,31.159999999999997,31.570000000000004,32.589999999999996,32.849999999999994,33.06,33.22,32.970000000000006,32.97,32.13,32.550000000000004,32.58,33.01,32.910000000000004,33.54,33.52,34.05,34.66,34.77,33.5,33.91],"color":"green"},{"name":"anthropic","data":[50.279999999999994,50.230000000000004,50.13,49.85,50.14000000000001,49.98,49.50000000000001,49.53,49.95,48.339999999999996,47.64,47.519999999999996,46.69,46.040000000000006,45.4,45.17000000000001,44.92000000000001,44.07000000000001,43.660000000000004,43.24000000000001,42.21,41.96,41.76,41.6,41.83,41.830000000000005,42.67,42.26,42.22,41.79,41.88,41.28,41.28,40.75,40.160000000000004,40.03,41.31,40.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
