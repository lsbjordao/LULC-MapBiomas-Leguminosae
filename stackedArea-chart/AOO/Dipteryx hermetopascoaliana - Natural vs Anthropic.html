<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.84,56.98,57.55,56.24,56.339999999999996,55.82,55.82000000000001,56.260000000000005,56.769999999999996,57.03,56.330000000000005,55.839999999999996,55.31,54.529999999999994,55.22999999999999,55.029999999999994,55.76,55.49999999999999,55.54,55.790000000000006,56.510000000000005,56.739999999999995,56.86,56.89999999999999,56.92,57.2,57.04,57.22000000000001,57.06,57.099999999999994,57.16,57.18000000000001,57.309999999999995,57.42,57.510000000000005,57.64,57.529999999999994,57.78],"color":"green"},{"name":"anthropic","data":[47.25,47.09,46.53,47.85,47.739999999999995,48.260000000000005,48.260000000000005,47.82,47.32,47.05,47.76,48.230000000000004,48.769999999999996,49.55,48.85,49.05,48.32,48.580000000000005,48.550000000000004,48.3,47.6,47.33,47.22,47.21,47.17,46.879999999999995,47.04,46.86,47.019999999999996,46.980000000000004,46.919999999999995,46.91,46.78,46.68,46.58,46.449999999999996,46.55,46.3],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
