<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.67,66.01,66.01000000000002,65.91,66.05999999999999,66.30000000000001,66.49,66.34,66.74000000000001,67.17000000000002,67.56,67.87,68.29,68.38999999999999,68.44,68.50000000000001,68.68,68.91000000000001,69.05,69.00000000000001,68.99000000000001,69.36000000000001,69.34000000000002,69.43,69.49000000000001,69.49000000000001,69.64000000000001,69.68,70.01,70.28,70.61,70.7,70.76,70.78999999999999,70.77,70.81,71.02,70.88],"color":"green"},{"name":"anthropic","data":[34.14,33.81,33.8,33.900000000000006,33.760000000000005,33.519999999999996,33.31,33.47,33.07,32.63,32.26,31.950000000000003,31.53,31.42,31.38,31.31,31.13,30.89,30.769999999999996,30.8,30.82,30.46,30.48,30.38,30.330000000000002,30.310000000000002,30.16,30.119999999999997,29.79,29.54,29.189999999999998,29.1,29.05,29.02,29.03,29.01,28.78,28.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
