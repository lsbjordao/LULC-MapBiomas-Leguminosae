<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }

</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Wetland","data":[4.7,4.7,4.62,4.23,4.36,4.66,5.39,5.69,4.94,4.86,4.99,4.88,4.94,5.51,5.59,5.68,5.45,5.48,5.61,5.95,5.62,5.47,5.17,5.22,5.01,4.9,4.85,5.16,5.5,5.67,5.57,5.05,4.64,4.64,4.65,4.99,5.01,5.65],"color":"#45C2A5"},{"name":"Grassland","data":[56.2,56.17,71.06,73,73.97,71.98,67.15,67.53,61.73,59.34,59.7,66.64,67.22,62.13,62.26,68.11,68.6,67.97,60.73,59.49,58.79,62.15,68.02,68.65,69.04,69.18,66.12,64.04,55.03,51.9,52.74,54.94,48.32,30.65,20.57,18.89,17.57,16.94],"color":"#B8AF4F"},{"name":"Temporary crop","data":[26.75,26.77,15.19,15.72,15.54,16.39,18.52,18.01,24.58,28.35,30.06,23.87,23.3,28.45,28.13,22.01,21.44,21.21,25.81,26.29,26.87,26.37,21.5,20.57,20.12,18.8,20.93,21.82,28.78,33.4,34.6,33.06,33.48,48.45,53.31,54.82,55,51.94],"color":"#D5A6BD"},{"name":"Mosaic of uses","data":[8.15,8.07,4.85,3.85,3.89,4.55,6.56,6.53,5.58,3.87,1.82,1.82,1.73,0.97,1.06,1.43,1.69,2.3,5.15,5.72,5.96,3.22,2.55,2.58,2.91,3.39,4.02,5.81,7.53,6.16,4.29,4.45,11.2,13.82,19.03,18.28,19.41,22.58],"color":"#fff3bf"},{"name":"Non vegetated area","data":[0.34,0.34,0.34,0.57,0.23,0.05,0,0,0.09,0.09,0,0,0,0.1,0.1,0.11,0.26,0.26,0.2,0.12,0,0,0,0,0,0,0.21,0.21,0.11,0,0,0,0,0.07,0.07,0.1,0.1,0.1],"color":"#EA9999"},{"name":"River, lake and ocean","data":[3.13,3.21,3.13,1.78,1.26,1.67,1.62,1.48,2.11,2.48,2.45,1.58,1.57,1.7,1.73,1.61,1.68,1.86,1.8,1.72,1.54,1.57,1.47,1.74,1.84,2.72,2.65,1.62,1.64,1.39,1.27,1.13,1,1.03,1.07,1.51,1.47,1.46],"color":"#0000FF"},{"name":"Wooded sandbank vegetation","data":[0.64,0.64,0.71,0.76,0.66,0.62,0.66,0.67,0.88,0.92,0.89,1.12,1.15,1.04,1.04,0.96,0.8,0.83,0.61,0.61,1.13,1.11,1.2,1.15,0.98,0.92,1.13,1.25,1.31,1.4,1.43,1.28,1.26,1.25,1.22,1.32,1.33,1.22],"color":"#6b9932"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
