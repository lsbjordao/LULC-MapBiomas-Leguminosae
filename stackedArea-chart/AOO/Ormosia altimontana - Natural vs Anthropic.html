<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.21000000000001,81.08,81.36999999999999,82.08999999999999,82.50999999999999,83.06,83.32,83.48,83.5,83.74000000000001,83.69,83.77,83.72,84.07000000000001,84.70000000000002,84.82000000000001,85.17000000000002,85.31000000000002,85.44000000000001,85.17000000000002,85.35,85.91000000000001,86.03,86.02999999999999,86.21,86.14999999999999,85.98,86.15,86.21000000000001,86.42,86.47,86.39999999999999,86.32000000000001,86.38,86.34,86.21000000000001,86.5,86.5],"color":"green"},{"name":"anthropic","data":[19.560000000000002,18.680000000000003,18.400000000000002,17.68,17.270000000000003,16.71,16.45,16.290000000000003,16.26,16.03,16.080000000000002,16.01,16.05,15.699999999999998,15.08,14.95,14.600000000000001,14.440000000000001,14.329999999999998,14.599999999999998,14.42,13.860000000000001,13.74,13.739999999999998,13.569999999999999,13.62,13.79,13.629999999999999,13.569999999999999,13.359999999999998,13.3,13.38,13.45,13.399999999999999,13.43,13.549999999999999,13.260000000000002,13.27],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
