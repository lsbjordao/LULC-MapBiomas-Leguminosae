<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.77,59.17999999999999,59.080000000000005,58.92,58.870000000000005,58.900000000000006,59.279999999999994,59.459999999999994,60.12,61.06,61.47999999999999,61.919999999999995,62.18,62.57,63.239999999999995,63.4,63.49000000000001,63.79,64.02,64.25,64.44,64.68,64.99999999999999,65.26,65.47999999999999,65.94999999999999,66.17,66.57999999999998,67.12,67.30000000000001,67.53000000000002,67.66000000000001,67.71000000000001,67.94000000000003,67.98000000000002,68.06,68.14,68.38000000000001],"color":"green"},{"name":"anthropic","data":[46.15999999999999,45.75,45.86,45.99,46.07,46.040000000000006,45.68000000000001,45.459999999999994,44.809999999999995,43.89999999999999,43.489999999999995,43.080000000000005,42.81999999999999,42.36,41.67999999999999,41.5,41.4,41.1,40.89,40.65,40.46,40.199999999999996,39.86,39.56999999999999,39.36,38.870000000000005,38.71999999999999,38.279999999999994,37.739999999999995,37.540000000000006,37.32,37.199999999999996,37.15,36.92,36.98,36.919999999999995,36.86,36.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
