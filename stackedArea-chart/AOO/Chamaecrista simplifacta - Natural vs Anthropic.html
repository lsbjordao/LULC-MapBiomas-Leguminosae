<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.08,70.75,70.83000000000001,70.69999999999999,70.52,70.47,70.33,70.38,70.45,70.59,70.63,70.52000000000001,70.7,70.89,71.00999999999999,70.89,70.89,70.87,70.85000000000001,70.75,70.84,70.97,70.89,70.97,71.28,71.52,71.65,71.94999999999999,72.17999999999999,73.6,74.09,74.24000000000001,74.53,74.27000000000001,73.89,73.06,72.79,72.24000000000001],"color":"green"},{"name":"anthropic","data":[28.66,28.98,28.91,29.04,29.220000000000002,29.279999999999998,29.41,29.36,29.3,29.15,29.11,29.22,29.04,28.849999999999998,28.729999999999997,28.84,28.86,28.869999999999997,28.909999999999997,28.99,28.909999999999997,28.769999999999996,28.849999999999994,28.779999999999998,28.45,28.21,28.09,27.79,27.56,26.139999999999997,25.650000000000006,25.509999999999998,25.23,25.48,25.85,26.67,26.960000000000004,27.489999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
