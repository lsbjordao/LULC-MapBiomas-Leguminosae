<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.72,61.059999999999995,61.06000000000001,60.790000000000006,60.31000000000001,59.81,59.89,60.07,60.11000000000001,59.919999999999995,59.68000000000001,59.45,58.870000000000005,58.900000000000006,58.68,58.89000000000001,58.88,59.07,59.10000000000001,59.099999999999994,59.61000000000001,59.76,59.88000000000001,59.82,59.89999999999999,58.85,58.31,58.34,58.379999999999995,58.43,58.440000000000005,58.39,58.339999999999996,58.03000000000001,57.959999999999994,57.89,58.13,58.099999999999994],"color":"green"},{"name":"anthropic","data":[46.699999999999996,47.36,47.35,47.599999999999994,48.10999999999999,48.61,48.50999999999999,48.33,48.31000000000001,48.52,48.73,48.959999999999994,49.559999999999995,49.53,49.730000000000004,49.550000000000004,49.56,49.35999999999999,49.35,49.31,48.83,48.66,48.58,48.62,48.51,49.57,50.11,50.09,50.050000000000004,50,49.97000000000001,50.03999999999999,50.09,50.41,50.48000000000001,50.55000000000001,50.32000000000001,50.330000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
