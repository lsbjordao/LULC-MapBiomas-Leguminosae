<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.19,96.16000000000001,95.08000000000001,94.84,94.41999999999999,94.35000000000002,94.33000000000001,93.39,92.64,92.88,92.29,91.32000000000001,89.83000000000001,88.56,87.38999999999999,86.9,86.15,84.71,83.74,82.94,82.21000000000001,81.5,81.08,80.62000000000002,80.33000000000001,80.19,79.75999999999999,79.72999999999999,79.72000000000001,79.50000000000001,79.11000000000001,78.63000000000001,78.48,78.24,76.51,76.09,75.61,74.05],"color":"green"},{"name":"anthropic","data":[8.57,9.62,10.71,10.930000000000001,11.35,11.42,11.450000000000001,12.37,13.13,12.89,13.48,14.439999999999998,15.94,17.22,18.38,18.86,19.63,21.06,22.02,22.83,23.549999999999997,24.290000000000003,24.689999999999998,25.14,25.429999999999996,25.57,26.009999999999994,26.040000000000003,26.050000000000004,26.27,26.659999999999997,27.13,27.280000000000005,27.509999999999998,29.249999999999996,29.67,30.149999999999995,31.71],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
