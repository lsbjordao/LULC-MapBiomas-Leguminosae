<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.27999999999999,73.78,74.11,73.5,73.22999999999999,72.39,72.03000000000002,71.64999999999999,73.15000000000002,74.24,76.02999999999999,77.52000000000001,78.34,79.14,79.89,81.33000000000001,81.5,81.8,82.13,81.77,81.64999999999999,81.92999999999999,81.73,82.20999999999998,82.42,82,81.79,81.77000000000001,81.36000000000001,80.75,80.91,80.78999999999999,80.46000000000001,80.13000000000001,80.01,80.11,80.2,80.43000000000002],"color":"green"},{"name":"anthropic","data":[25.75,26.249999999999996,25.939999999999998,26.53,26.8,27.63,27.99,28.37,26.88,25.779999999999998,23.99,22.509999999999998,21.69,20.900000000000002,20.15,18.700000000000003,18.530000000000005,18.24,17.909999999999997,18.26,18.4,18.090000000000003,18.29,17.82,17.599999999999998,18.03,18.25,18.27,18.670000000000005,19.290000000000003,19.13,19.240000000000006,19.57,19.909999999999997,20.03,19.93,19.82,19.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
