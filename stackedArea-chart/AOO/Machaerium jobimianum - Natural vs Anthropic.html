<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.19,46.52,45.81,45.57000000000001,45.199999999999996,45.249999999999986,45.07,45.24,45.47999999999999,45.60999999999999,45.66999999999999,45.29999999999999,45.06999999999999,44.56,44.45,44.18000000000001,44.58,44.68000000000001,45.160000000000004,45.56,45.95,46.13000000000001,46.36,46.099999999999994,46.46000000000001,46.489999999999995,46.32,46.06999999999999,45.980000000000004,46,45.35,45.25,45.24,45.09,45.54999999999999,45.63999999999999,45.480000000000004,45.72],"color":"green"},{"name":"anthropic","data":[50.36000000000001,51.03,51.739999999999995,51.99,52.349999999999994,52.31999999999999,52.49,52.33,52.13,52.029999999999994,51.98,52.37,52.589999999999996,53.07000000000001,53.18000000000001,53.43,53.02,52.870000000000005,52.38,51.98,51.64,51.52,51.33,51.61,51.24,51.2,51.290000000000006,51.510000000000005,51.580000000000005,51.550000000000004,52.18000000000001,52.290000000000006,52.29,52.47,52,51.94,52.080000000000005,51.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
