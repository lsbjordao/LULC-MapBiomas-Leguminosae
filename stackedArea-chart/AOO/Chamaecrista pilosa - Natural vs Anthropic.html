<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.9,66.23,65.57000000000001,64.74000000000001,64.95,65.58,65.92999999999999,65.82,65.55,65.60999999999999,65.64999999999999,66.18,66.74000000000001,67.02,67.68,67.99,68.21,68.25999999999999,68.15000000000002,67.61,67.62,67.79,67.98000000000002,68.15,68.25,68.24,67.93,67.44000000000001,67.24,66.66,66.74,66.88,66.84,66.79,66.74,66.80000000000001,66.85,67.08],"color":"green"},{"name":"anthropic","data":[45.480000000000004,45.2,45.85,46.690000000000005,46.5,45.870000000000005,45.489999999999995,45.61,45.87,45.839999999999996,45.79,45.25999999999999,44.669999999999995,44.41000000000001,43.75999999999999,43.46,43.21000000000001,43.17000000000001,43.269999999999996,43.82,43.809999999999995,43.64,43.44,43.27,43.16,43.19,43.49999999999999,43.99,44.18999999999999,44.74999999999999,44.69,44.58000000000001,44.6,44.63,44.680000000000014,44.63,44.58,44.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
