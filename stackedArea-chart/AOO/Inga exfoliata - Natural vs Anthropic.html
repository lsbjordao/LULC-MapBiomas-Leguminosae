<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.66,65.4,65.08999999999999,63.94000000000001,63.52,63.75000000000001,63.410000000000004,64.03,64.78,64.68,64.55,64.53,64.93,64.66,64.59,64.55000000000001,64.71999999999998,65.25,65.17,65.21000000000001,65.14,65.41000000000001,65.74000000000001,66.01,66.52000000000001,66.7,66.85000000000001,67.06,67.04000000000002,66.82000000000002,66.80000000000001,66.39,66.36999999999999,66.44,66.77,66.96999999999998,67.15999999999997,67.07999999999998],"color":"green"},{"name":"anthropic","data":[33.65,33.95,34.260000000000005,35.4,35.86,35.61,35.93,35.33,34.580000000000005,34.69,34.82,34.84,34.46,34.739999999999995,34.839999999999996,34.88,34.71,34.160000000000004,34.269999999999996,34.22,34.28,34.010000000000005,33.7,33.42,32.93,32.74,32.59,32.39,32.41,32.61000000000001,32.620000000000005,33.06,33.080000000000005,33.00000000000001,32.67,32.449999999999996,32.269999999999996,32.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
