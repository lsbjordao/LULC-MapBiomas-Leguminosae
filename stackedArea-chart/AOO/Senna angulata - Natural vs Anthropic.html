<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.54999999999999,51.18,50.12,49.50000000000001,49.06000000000001,48.9,48.64,48.39,48.45,49.010000000000005,48.9,49.10999999999999,49.18,49.470000000000006,49.919999999999995,49.78999999999999,49.779999999999994,49.88,49.93,49.99,49.96,50.330000000000005,50.8,50.919999999999995,51.350000000000016,51.68,52.04,52.36,52.379999999999995,52.539999999999985,52.62999999999999,52.76999999999999,53.08,53.45999999999999,53.73,53.87,53.96000000000001,54.29999999999999],"color":"green"},{"name":"anthropic","data":[53.989999999999995,53.38000000000001,54.440000000000005,55.09,55.53999999999999,55.72,55.95,56.230000000000004,56.190000000000005,55.62000000000001,55.74,55.55,55.38,55.019999999999996,54.6,54.779999999999994,54.76999999999999,54.69,54.66999999999999,54.57,54.599999999999994,54.23,53.760000000000005,53.66999999999999,53.25999999999999,52.919999999999995,52.540000000000006,52.23,52.18999999999999,52.03,51.98000000000001,51.85,51.52000000000001,51.16000000000002,50.87000000000001,50.77000000000001,50.660000000000004,50.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
