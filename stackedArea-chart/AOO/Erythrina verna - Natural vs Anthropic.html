<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.48,39.489999999999995,39.14,39.17000000000001,39.089999999999996,39.14999999999999,39.019999999999996,39.28,39.51,40.05,40.410000000000004,40.86,41.21,41.31,41.44,41.47,41.550000000000004,41.63,41.75,41.88,42.12999999999999,42.28999999999999,42.49999999999999,42.47,42.599999999999994,42.85000000000001,43.129999999999995,43.33,43.480000000000004,43.74999999999999,44.01,44.089999999999996,44.29000000000001,44.48000000000001,44.650000000000006,44.690000000000005,44.92,44.9],"color":"green"},{"name":"anthropic","data":[63.440000000000005,63.440000000000005,63.78999999999999,63.790000000000006,63.85000000000001,63.81000000000001,63.879999999999995,63.63,63.41000000000001,62.88000000000001,62.53,62.08,61.720000000000006,61.64,61.480000000000004,61.47,61.38999999999999,61.29,61.169999999999995,61.04,60.81,60.65,60.46,60.47,60.370000000000005,60.099999999999994,59.82,59.61999999999999,59.46000000000001,59.19,58.89999999999999,58.85999999999999,58.62,58.44999999999999,58.27,58.21000000000001,58.02000000000001,58.02999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
