<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.84,80.27999999999999,82.82000000000001,83.69000000000001,84.05,84.03,84.45,84.08,81.93,80.69999999999999,79.25,77.76,79.72,82.37000000000002,81.28000000000002,79.63,78.2,76.77000000000001,74.82000000000001,73.46999999999998,69.45,68.66,67.66,67.92999999999999,69.19999999999999,70.35,73.67,75.44999999999999,76.61,76.19,76.03999999999999,74.72999999999999,74.59,76.08000000000001,75.88,75.87,75.64999999999999,75.64],"color":"green"},{"name":"anthropic","data":[19.32,19.89,17.35,16.49,16.12,16.130000000000003,15.719999999999999,16.09,18.240000000000002,19.47,20.94,22.419999999999998,20.43,17.81,18.9,20.54,21.98,23.4,25.35,26.689999999999998,30.73,31.5,32.51,32.24,30.96,29.810000000000002,26.49,24.71,23.54,23.97,24.13,25.45,25.58,24.08,24.29,24.299999999999997,24.52,24.53],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
