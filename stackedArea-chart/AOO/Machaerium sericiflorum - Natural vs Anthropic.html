<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.13000000000001,59.88,59.109999999999985,58.77,58.040000000000006,57.470000000000006,56.70999999999999,56.330000000000005,55.930000000000014,55.330000000000005,55.65,55.650000000000006,56.190000000000005,56.709999999999994,57.58,57.89,57.92999999999999,57.970000000000006,57.79,57.84,57.69,57.660000000000004,57.06999999999999,57.24999999999999,57.03999999999999,57.38999999999999,57.690000000000005,57.59,57.77000000000001,57.98,57.38,57.019999999999996,56.42000000000001,56.71,56.63,56.86,56.669999999999995,56.54999999999999],"color":"green"},{"name":"anthropic","data":[41.08,41.32999999999999,42.099999999999994,42.46,43.18,43.75,44.50999999999999,44.879999999999995,45.27,45.9,45.57,45.550000000000004,45.04,44.51999999999999,43.63,43.330000000000005,43.290000000000006,43.25,43.44,43.37,43.529999999999994,43.55,44.14,43.97,44.17,43.830000000000005,43.53,43.62,43.46,43.24,43.84,44.17999999999999,44.78,44.5,44.580000000000005,44.37,44.55,44.67999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
