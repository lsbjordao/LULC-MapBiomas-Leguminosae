<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.22,17.96,13.37,12.14,9.56,8.18,8.39,8.08,8.370000000000001,8.16,8.100000000000001,8.06,6.98,6.920000000000001,7.110000000000001,6.78,6.540000000000001,6.430000000000001,8.420000000000002,8.46,8.41,8.39,8.17,8.27,8.87,8.8,8.77,8.66,8.82,8.82,8.87,8.61,8.5,8.72,8.95,9.44,9.530000000000001,9.790000000000001],"color":"green"},{"name":"anthropic","data":[71.47,81.73,86.32,87.55,90.14000000000001,91.50999999999999,91.3,91.61000000000001,91.32000000000001,91.52,91.6,91.63,92.69999999999999,92.77000000000001,92.58000000000001,92.91,93.14999999999999,93.25,91.27,91.23,91.27000000000001,91.30000000000001,91.53,91.42,90.82000000000001,90.91,90.93,91.03999999999999,90.88,90.88000000000001,90.83,91.09,91.2,90.97,90.74000000000001,90.24000000000001,90.17,89.88],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
