<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.9,94.41000000000001,94.33,94.9,94.71,95,95.28,95.41,95.33,95.46,95.95,96.06000000000002,95.29,94.84,94.80999999999999,94.91999999999999,94.96000000000001,94.78,94.19,93.64,93.22000000000001,93.14,93.25000000000001,93.28,93.21000000000001,93.09000000000002,92.98000000000002,93.26,93.31,93.47,93.22999999999999,93.05,93.09,92.87,92.51,92.32000000000001,92.21,91.7],"color":"green"},{"name":"anthropic","data":[4.71,5.18,5.2700000000000005,4.69,4.89,4.6,4.31,4.1899999999999995,4.27,4.13,3.66,3.54,4.29,4.76,4.779999999999999,4.68,4.64,4.82,5.4,5.960000000000001,6.369999999999999,6.46,6.34,6.3100000000000005,6.390000000000001,6.51,6.62,6.35,6.279999999999999,6.13,6.359999999999999,6.550000000000001,6.5,6.720000000000001,7.08,7.26,7.390000000000001,7.9],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
