<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.60000000000001,78.35000000000001,78.16,78.03,77.83000000000001,78.08000000000001,78.17000000000002,78.45,78.65999999999998,79.04999999999998,79.40000000000002,79.69000000000001,79.95,80.1,80.36,80.28999999999999,80.39,80.44000000000001,80.63,80.61,80.67,80.75,80.88,81.08,81.14000000000001,81.32000000000001,81.41,81.41999999999999,81.53,81.62,81.74000000000001,81.91000000000001,82.01000000000002,82.03,82.12000000000002,82.17000000000002,82.21000000000001,82.04],"color":"green"},{"name":"anthropic","data":[22.29,21.55,21.73,21.85,22.05,21.82,21.729999999999997,21.450000000000003,21.25,20.810000000000002,20.490000000000002,20.2,19.94,19.79,19.55,19.57,19.5,19.460000000000004,19.249999999999996,19.29,19.24,19.139999999999997,19.020000000000003,18.810000000000002,18.76,18.57,18.47,18.46,18.35,18.28,18.149999999999995,17.959999999999997,17.869999999999994,17.849999999999998,17.769999999999996,17.720000000000002,17.66,17.860000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
