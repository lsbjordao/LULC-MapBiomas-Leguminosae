<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.34,82.68,82.16,81.76,81.87,83.97,84.41,84.80000000000001,84.72,84.93,84.98,85.17999999999999,86.17,86.35000000000001,86.65,86.57000000000001,86.43,86.42999999999999,86.37,87.19,87.44,87.35,87.42999999999999,87.42,86.99,86.58000000000001,86.31,86.41,86.16999999999999,85.64999999999999,86.16,86.50999999999999,86.39,86.74000000000001,87.05000000000001,87.00999999999999,86.96000000000001,86.85],"color":"green"},{"name":"anthropic","data":[15.770000000000001,17.47,17.970000000000002,18.36,18.28,16.189999999999998,15.73,15.34,15.43,15.219999999999999,15.21,15.02,14.01,13.850000000000001,13.580000000000002,13.66,13.8,13.79,13.86,13.059999999999999,12.79,12.879999999999999,12.79,12.809999999999999,13.25,13.65,13.920000000000002,13.82,14.06,14.57,14.07,13.719999999999999,13.84,13.5,13.18,13.21,13.27,13.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
