<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.93999999999998,45.519999999999996,45.16,44.68,44.4,44.46999999999999,44.62,44.58999999999999,44.839999999999996,45.32999999999999,45.68,45.8,45.9,45.98999999999999,46.01,45.65,45.55999999999999,45.489999999999995,45.58,45.76999999999999,45.85999999999999,45.92,46.14,46.31,46.47,46.56,46.64000000000001,46.55,46.68000000000001,46.88,47.129999999999995,47.559999999999995,47.63,47.70000000000001,47.77,47.839999999999996,47.91,48.11],"color":"green"},{"name":"anthropic","data":[57.420000000000016,57.86,58.23,58.69000000000001,58.980000000000004,58.870000000000005,58.75000000000001,58.790000000000006,58.529999999999994,58.04,57.720000000000006,57.61000000000001,57.470000000000006,57.40000000000001,57.36,57.69,57.78000000000001,57.85999999999999,57.77,57.58,57.489999999999995,57.420000000000016,57.190000000000005,57.010000000000005,56.89,56.79999999999999,56.68,56.77999999999999,56.629999999999995,56.44000000000001,56.16000000000001,55.739999999999995,55.67999999999999,55.59,55.52,55.41000000000001,55.35000000000001,55.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
