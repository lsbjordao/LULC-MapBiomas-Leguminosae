<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.24,54.32,54.91,54.919999999999995,55.349999999999994,55.419999999999995,55.279999999999994,54.74,54.09,53.29,53.08,52.88999999999999,52.95,53.00999999999999,52.92999999999999,52.93,53.21,53.510000000000005,53.21,52.74999999999999,53.17999999999999,53.059999999999995,53.449999999999996,53.08,52.47999999999999,52.11999999999999,51.47,51.620000000000005,51.86,52.06,53.099999999999994,53.24000000000001,53.629999999999995,53.74999999999999,53.62,53.419999999999995,53.52,52.92],"color":"green"},{"name":"anthropic","data":[46.72,45.64,45.05,45.04,44.61,44.54,44.69,45.2,45.870000000000005,46.69,46.879999999999995,47.07,47.019999999999996,46.94,47.05,47.040000000000006,46.74,46.459999999999994,46.760000000000005,47.209999999999994,46.78,46.9,46.51,46.89,47.489999999999995,47.849999999999994,48.49,48.349999999999994,48.1,47.900000000000006,46.87,46.7,46.33,46.22,46.339999999999996,46.55,46.46,47.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
