<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.129999999999995,57.47,54.899999999999984,51.949999999999996,49.92999999999999,48.75999999999999,48.18999999999999,48.32,48.58,50.059999999999995,50.7,50.75,50.339999999999996,49.219999999999985,47.809999999999995,46.27,45.3,45.77,45.470000000000006,45.23,45.12999999999999,45.87,45.20999999999999,46.39,46.68,46.839999999999996,46.809999999999995,46.89,45.080000000000005,44.72,44.8,45.25,45.31000000000001,47.16000000000001,47.24000000000001,47.14,47.209999999999994,47.27000000000001],"color":"green"},{"name":"anthropic","data":[43.62,44.27000000000001,46.870000000000005,49.809999999999995,51.83,53.019999999999996,53.57000000000001,53.44,53.19000000000001,51.699999999999996,51.08,50.99,51.41,52.54,53.96,55.489999999999995,56.45,55.97,56.279999999999994,56.53,56.62999999999999,55.91,56.58,55.37000000000001,55.07000000000001,54.94,54.96,54.870000000000005,56.69,57.040000000000006,56.96,56.51,56.440000000000005,54.58,54.519999999999996,54.64,54.55,54.480000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
