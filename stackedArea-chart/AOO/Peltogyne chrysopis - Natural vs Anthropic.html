<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.41999999999999,86.79,86.95000000000002,86.42000000000002,86.70000000000002,86.70000000000002,86.58,86.45,86.05,86.12,86.2,86.46000000000001,86.32999999999998,86.02,86.11,85.2,84.98,84.76,84.75,84.16999999999999,83.50999999999999,82.99,83.17,83.09,83.48,84.06,84.06000000000002,84.07000000000002,83.67,83.52000000000001,83.69,83.31999999999998,82.97000000000001,83.28,83.59000000000002,83.74,84.07000000000001,81.33],"color":"green"},{"name":"anthropic","data":[13.77,13.41,13.25,13.780000000000001,13.51,13.49,13.62,13.76,14.139999999999999,14.08,14.01,13.74,13.87,14.2,14.1,15,15.22,15.44,15.45,16.03,16.69,17.209999999999997,17.040000000000003,17.110000000000003,16.720000000000002,16.16,16.139999999999997,16.13,16.540000000000003,16.68,16.51,16.88,17.229999999999997,16.93,16.62,16.470000000000002,16.13,18.880000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
