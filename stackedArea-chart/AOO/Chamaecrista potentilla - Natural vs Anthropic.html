<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.47999999999999,64.85,64.65,64.56,64.46000000000001,64.05999999999999,64.00999999999999,63.92,63.67,63.31,63.22,63.23,63.35000000000001,63.400000000000006,63.32,63.1,62.660000000000004,62.39000000000001,62.27,62.150000000000006,62.27,62.39000000000001,62.419999999999995,62.54999999999999,62.769999999999996,62.8,62.86999999999999,63.16,63.249999999999986,63.46,63.5,63.53999999999999,63.639999999999986,63.68,63.760000000000005,63.69000000000001,63.64,63.58000000000001],"color":"green"},{"name":"anthropic","data":[35.86,36.5,36.71000000000001,36.78,36.870000000000005,37.300000000000004,37.33,37.43000000000001,37.65,38.03,38.13,38.10000000000001,38.00000000000001,37.95,38.02,38.24,38.65,38.949999999999996,39.059999999999995,39.190000000000005,39.07000000000001,38.949999999999996,38.93,38.78000000000001,38.58,38.54,38.47,38.169999999999995,38.08,37.88,37.86,37.800000000000004,37.68000000000001,37.67,37.589999999999996,37.65,37.73000000000001,37.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
