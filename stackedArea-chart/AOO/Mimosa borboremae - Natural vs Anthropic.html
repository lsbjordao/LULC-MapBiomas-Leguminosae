<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.46,43.370000000000005,41.25,41,40.71000000000001,41.150000000000006,42.21000000000001,41.2,40.99999999999999,41.77,42.470000000000006,43.040000000000006,42.760000000000005,42.74,42.230000000000004,41.260000000000005,41.13999999999999,40.99999999999999,40.36999999999999,41.56,42.47,43.17,43.54,43.589999999999996,44,44.34,44.63,43.410000000000004,42.33,41.92,41.879999999999995,42.25999999999999,42.089999999999996,42.35999999999999,41.89999999999999,42.05,41.85999999999999,41.96999999999999],"color":"green"},{"name":"anthropic","data":[53.050000000000004,55.38,57.58,57.879999999999995,58.21,57.739999999999995,56.7,57.72,57.91,57.150000000000006,56.42999999999999,55.86,56.21,56.22,56.75,57.71000000000001,57.83,57.98,58.65,57.449999999999996,56.53,55.83,55.43000000000001,55.38,54.949999999999996,54.71,54.440000000000005,55.66,56.730000000000004,57.15,57.2,56.809999999999995,56.95,56.69,57.190000000000005,57.050000000000004,57.21,57.080000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
