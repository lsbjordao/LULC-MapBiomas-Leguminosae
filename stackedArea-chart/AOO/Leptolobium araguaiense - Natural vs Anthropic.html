<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.46,90.69,90.54,90.08999999999999,89.41,87.64999999999999,86.21,83.96999999999998,83.07,82.15,81.05999999999999,79.21999999999998,75.91999999999999,73.86,74.83000000000001,74,74.11999999999999,73.11999999999999,72.38,71.13,70.1,68.63,66.75999999999999,66.74000000000001,69.5,70,70.13,70.42999999999999,72.68000000000002,71.71000000000001,71.04,71.59,71.42999999999999,71.27,70.38000000000001,70.80999999999999,71.45,71.58999999999999],"color":"green"},{"name":"anthropic","data":[9.719999999999999,9.489999999999998,9.649999999999999,10.08,10.77,12.52,13.969999999999999,16.21,17.11,18.02,19.13,20.950000000000003,24.26,26.32,25.35,26.16,26.060000000000002,27.05,27.8,29.05,30.080000000000002,31.54,33.42,33.44,30.67,30.169999999999998,30.04,29.740000000000002,27.500000000000004,28.47,29.150000000000002,28.580000000000002,28.73,28.900000000000002,29.790000000000003,29.37,28.730000000000004,28.580000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
