<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.51,49.53,49.43000000000001,49.64,49.230000000000004,49.07999999999999,49.31,49.09,48.74,48.63,48.410000000000004,48.26,47.96,47.44,46.879999999999995,46.75999999999999,47.21,47.32000000000001,47.800000000000004,48.07,48.330000000000005,48.650000000000006,48.88,48.959999999999994,49.17,49.320000000000014,49.78,50.13,50.4,50.42,50.45000000000001,50.39000000000001,50.51000000000001,50.61000000000001,51.13000000000001,51.370000000000005,51.540000000000006,51.94],"color":"green"},{"name":"anthropic","data":[51.410000000000004,51.45000000000001,51.589999999999996,51.43,51.91,52.07000000000001,51.820000000000014,52.02,52.37999999999999,52.46999999999999,52.65,52.81,53.09,53.58,54.18000000000001,54.28999999999999,53.88,53.80999999999999,53.33,53.11,52.839999999999996,52.56999999999999,52.31999999999999,52.24,52.03,51.85000000000001,51.38999999999999,51.02999999999999,50.769999999999996,50.82,50.85999999999999,50.970000000000006,50.96,50.870000000000005,50.43,50.31,50.14,49.74999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
