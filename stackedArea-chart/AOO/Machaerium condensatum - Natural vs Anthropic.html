<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.6,46.35,45.53000000000001,45.110000000000014,44.849999999999994,44.720000000000006,44.57,44.720000000000006,44.89,44.79,44.720000000000006,44.51000000000001,44.36,44.449999999999996,44.00999999999999,43.87,43.79,43.77,43.87,43.86,43.739999999999995,43.86000000000001,44.67,44.88,45.08,45.2,45.31999999999999,45.56,45.730000000000004,45.94999999999999,46.17999999999999,46.41999999999999,46.529999999999994,46.97,47.169999999999995,47.489999999999995,47.88999999999999,47.89000000000001],"color":"green"},{"name":"anthropic","data":[56.78,56.080000000000005,56.92,57.370000000000005,57.63999999999999,57.78,57.93,57.80000000000001,57.650000000000006,57.739999999999995,57.8,58.019999999999996,58.169999999999995,58.099999999999994,58.510000000000005,58.66000000000001,58.75,58.76,58.65999999999999,58.64,58.800000000000004,58.67,57.88999999999999,57.690000000000005,57.510000000000005,57.39000000000001,57.269999999999996,57.019999999999996,56.85999999999999,56.65,56.41000000000001,56.17,56.059999999999995,55.61,55.41,55.089999999999996,54.71,54.71],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
