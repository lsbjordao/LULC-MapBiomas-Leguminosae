<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.53999999999999,68.58,67.42999999999999,66.91999999999999,66.38,65.63,65.74000000000001,65.85000000000001,64.67,64.47,64.4,64.33,65.72000000000001,65.84,66.08000000000001,66.88,66.55,66.44999999999999,66.52999999999999,66.64999999999999,66.82,67.25999999999999,67.27999999999999,67.67,67.65,67.2,66.92999999999999,66.18,65.46,64.6,64.47999999999999,64.71000000000001,64.95,65.24000000000001,64.83,65.03,65.11999999999999,65.41000000000001],"color":"green"},{"name":"anthropic","data":[34.46,34.39,35.55,36.06,36.589999999999996,37.339999999999996,37.25,37.12,38.31,38.51,38.56,38.64,37.27,37.13,36.90000000000001,36.09000000000001,36.43,36.519999999999996,36.440000000000005,36.32,36.150000000000006,35.71000000000001,35.70000000000001,35.31,35.32,35.78,36.029999999999994,36.78000000000001,37.510000000000005,38.400000000000006,38.510000000000005,38.28000000000001,38.010000000000005,37.74,38.14,37.93999999999999,37.86,37.559999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
