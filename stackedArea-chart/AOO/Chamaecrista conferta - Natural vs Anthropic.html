<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.85,70.30999999999999,70.07000000000001,69.77,69.26,69.03999999999999,68.64999999999999,68.13,67.6,66.82000000000001,66.48,66.33,66.09,65.9,65.71,65.39,65.16,64.82,64.47999999999999,64.19999999999999,63.98,63.750000000000014,63.56,63.38999999999999,63.440000000000005,63.370000000000005,63.269999999999996,63.120000000000005,62.99,62.809999999999995,62.7,62.57999999999999,62.55,62.43,62.36,62.26999999999999,62.13999999999999,62.19],"color":"green"},{"name":"anthropic","data":[30.56,31.1,31.310000000000002,31.61,32.120000000000005,32.33,32.75000000000001,33.27,33.779999999999994,34.580000000000005,34.900000000000006,35.06,35.31000000000001,35.49,35.690000000000005,35.99999999999999,36.230000000000004,36.559999999999995,36.910000000000004,37.18000000000001,37.400000000000006,37.65,37.82999999999999,38.01,37.96,38.04,38.11,38.28,38.410000000000004,38.59,38.67999999999999,38.83,38.85000000000001,38.940000000000005,39.06,39.120000000000005,39.25000000000001,39.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
