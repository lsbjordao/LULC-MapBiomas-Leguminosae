<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.12,86.43,87.22999999999999,88.21,87.86,87.93,87.83000000000001,86.21000000000001,85.13000000000001,85.64,85.31999999999998,83.95,83.6,83.83000000000001,84.05000000000001,83.87,82.77,82.58000000000001,82.44,82.21,82.08999999999999,82.19,81.64000000000001,81.69000000000001,81.67999999999999,81.67,81.55000000000001,81.84,81.45,81.53999999999999,81.45999999999998,81.10000000000002,80.96999999999998,80.91,80.5,80.46000000000001,80.16,79.54999999999998],"color":"green"},{"name":"anthropic","data":[14.55,14.25,13.430000000000001,12.469999999999999,12.83,12.75,12.84,14.450000000000001,15.54,15.02,15.350000000000001,16.72,17.069999999999997,16.84,16.61,16.8,17.909999999999997,18.09,18.229999999999997,18.45,18.58,18.49,19.029999999999998,18.98,18.98,19.019999999999996,19.13,18.82,19.230000000000004,19.129999999999995,19.209999999999997,19.580000000000002,19.709999999999997,19.77,20.169999999999998,20.22,20.509999999999998,21.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
