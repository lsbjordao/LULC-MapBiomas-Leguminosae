<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.39,88.89000000000003,88.71000000000002,88.19000000000001,87.60000000000001,87.13000000000002,86.71,86.5,86.53,86.38000000000001,87.06000000000002,87.55999999999999,87.52,87.45999999999998,86.87000000000002,85.96,85.44999999999999,84.84,84.48,84.09999999999998,83.95000000000002,83.73,83.47,83.15,83.10999999999997,83.14,83.11000000000001,82.80000000000001,82.65,82.75,82.72,82.52,82.36999999999999,82.11999999999999,81.85000000000002,81.55999999999999,81.44000000000001,80.7],"color":"green"},{"name":"anthropic","data":[16.400000000000002,15.93,16.1,16.610000000000003,17.200000000000003,17.67,18.100000000000005,18.31,18.29,18.410000000000004,17.75,17.23,17.270000000000003,17.34,17.92,18.84,19.35,19.97,20.34,20.68,20.87,21.080000000000002,21.330000000000002,21.67,21.689999999999998,21.66,21.710000000000004,21.999999999999996,22.160000000000004,22.060000000000002,22.08,22.279999999999998,22.43,22.689999999999998,22.959999999999997,23.24,23.359999999999996,24.089999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
