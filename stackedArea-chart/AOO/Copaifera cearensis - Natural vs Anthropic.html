<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.49,55.47,55.39,55.699999999999996,55.78999999999999,55.59,55.43,55.519999999999996,55.84,55.470000000000006,55.68000000000001,55.690000000000005,55.760000000000005,55.86,54.239999999999995,53.27,53.49999999999999,53.87,54.190000000000005,54.35999999999999,54.1,55.179999999999986,55.24,54.77,54.55,53.83000000000001,52.96,52.58,52.050000000000004,52.160000000000004,51.64,51.68,52.18,52.63000000000001,53.650000000000006,53.59,53.74999999999999,51.15],"color":"green"},{"name":"anthropic","data":[26.750000000000004,26.770000000000003,26.85,26.540000000000003,26.45,26.65,26.81,26.73,26.4,26.78,26.57,26.540000000000003,26.500000000000004,26.36,27.990000000000002,28.95,28.73,28.34,28.02,27.85,28.14,27.07,26.999999999999996,27.49,27.700000000000003,28.43,29.29,29.669999999999998,30.179999999999996,30.08,30.58,30.580000000000002,30.080000000000002,29.610000000000003,28.57,28.63,28.490000000000002,31.060000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
