<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.78,62.33,61.839999999999996,61.27,60.94,60.830000000000005,60.63,60.58999999999999,60.509999999999984,60.55,60.29,60.18,60.35,60.43000000000001,60.68999999999999,60.970000000000006,61.17,61.32999999999999,61.41,61.589999999999996,61.739999999999995,61.96999999999999,62.06999999999999,61.919999999999995,61.82,61.949999999999996,61.980000000000004,62.01,62.25999999999999,62.39000000000001,62.58,62.69999999999999,62.78,62.76,62.970000000000006,63.06000000000001,63.230000000000004,63.73000000000001],"color":"green"},{"name":"anthropic","data":[40.27,40.71000000000001,41.18,41.760000000000005,42.089999999999996,42.209999999999994,42.41,42.46,42.53000000000001,42.49,42.760000000000005,42.85,42.69,42.599999999999994,42.35000000000001,42.080000000000005,41.870000000000005,41.7,41.62,41.47,41.31000000000001,41.080000000000005,40.98000000000001,41.11000000000001,41.20000000000001,41.09,41.06,41.03,40.760000000000005,40.64,40.449999999999996,40.36,40.25,40.28000000000001,40.03999999999999,39.97999999999999,39.8,39.3],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
