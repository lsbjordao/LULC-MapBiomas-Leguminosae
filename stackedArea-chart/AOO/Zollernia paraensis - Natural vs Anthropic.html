<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.04000000000002,76.3,75.36,74.37000000000002,74.28,74.08000000000001,73.76000000000002,72.82000000000001,71.97,71.80000000000001,71.39,70.74000000000001,69.92000000000002,69.13999999999999,67.74,66.32,64.95,64.21000000000001,63.43,62.59,62.24,61.86,61.71999999999999,61.38000000000001,60.510000000000005,60.47,60.31,59.93999999999999,59.519999999999996,59.239999999999995,59.1,58.379999999999995,57.93,57.97,57.63999999999999,57.739999999999995,56.92,55.819999999999986],"color":"green"},{"name":"anthropic","data":[27.35,27.109999999999996,28.05,29.04,29.110000000000003,29.34,29.650000000000002,30.589999999999996,31.439999999999998,31.6,32.01,32.66,33.49,34.26,35.67,37.11,38.45,39.18,39.96,40.83,41.169999999999995,41.54,41.67,42.03,42.86,42.93,43.11000000000001,43.49,43.900000000000006,44.15,44.31,45.019999999999996,45.47,45.440000000000005,45.75,45.660000000000004,46.49,47.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
