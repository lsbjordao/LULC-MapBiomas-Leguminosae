<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.66999999999999,73.63999999999999,73.94,73.9,74.11,73.35999999999999,73.47999999999999,72.95,72.94,72.97999999999999,73.22000000000001,73.50999999999999,73.92999999999999,74.19999999999999,74.52,75.35999999999999,75.38,75.38,74.36999999999999,74.32000000000002,74.43,74.65999999999998,74.25000000000001,74.10000000000001,73.63,73.30999999999999,71.68,71.47,70.86999999999999,70.03999999999999,69.73,69.33000000000001,69.06,68.3,67.78999999999999,67.24,67.36,67.70000000000002],"color":"green"},{"name":"anthropic","data":[33.63,32.690000000000005,32.39,32.42,32.21,32.949999999999996,32.83,33.37,33.370000000000005,33.339999999999996,33.09,32.8,32.400000000000006,32.13,31.790000000000003,30.96,30.949999999999996,30.91,31.95,31.979999999999997,31.89,31.650000000000002,32.05,32.239999999999995,32.690000000000005,32.98,34.65,34.839999999999996,35.440000000000005,36.25,36.57,36.99,37.239999999999995,37.99000000000001,38.53,39.07,38.949999999999996,38.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
