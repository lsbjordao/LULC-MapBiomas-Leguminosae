<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.51,89.38999999999999,89.08,88.72,89.00999999999999,89.11,89,88.99000000000001,88.85,88.44,88.60000000000001,88.78,88.51,88.65,88.72,88.88,89.02,89.28,89.41,89.25000000000001,89.08,89.08999999999999,89.31,89.38,89.4,89.44999999999999,89.51,89.47999999999999,89.37,89.27,89.27999999999999,89.37,89.4,89.42,89.39000000000001,89.35999999999999,89.33999999999999,89.36999999999999],"color":"green"},{"name":"anthropic","data":[10.02,10.129999999999999,10.45,10.8,10.52,10.41,10.52,10.540000000000001,10.68,11.1,10.940000000000001,10.75,11.02,10.870000000000001,10.81,10.65,10.5,10.24,10.120000000000001,10.290000000000001,10.45,10.45,10.22,10.14,10.129999999999999,10.07,10.030000000000001,10.05,10.15,10.26,10.24,10.16,10.13,10.11,10.120000000000001,10.17,10.19,10.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
