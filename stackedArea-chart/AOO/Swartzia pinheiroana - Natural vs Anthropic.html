<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.37,69.45,66.55,64.92999999999999,64.60000000000001,64.45,65.07000000000002,65.92,66.14999999999999,66.27999999999999,66.46000000000001,66.03,66.14999999999999,66.16000000000001,65.54,64.71000000000001,64.72,64.31,64.63000000000001,64.39,63.42000000000001,63.72,63.980000000000004,63.800000000000004,64.47,64.65,64.38000000000001,63.97,64.44,64.71,65.03000000000002,64.73,64.57000000000001,64.44,64.58,65.19,65.14000000000001,65.50999999999999],"color":"green"},{"name":"anthropic","data":[15.6,15.540000000000001,18.650000000000002,20.52,20.959999999999997,21.150000000000002,20.540000000000003,19.71,19.470000000000002,19.37,19.2,19.57,19.3,19.15,19.709999999999997,20.48,20.42,20.88,20.54,20.84,21.98,21.669999999999998,21.36,21.53,20.85,20.58,21,21.54,20.990000000000002,20.720000000000002,20.44,20.86,20.88,20.87,20.88,20.43,20.71,19.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
