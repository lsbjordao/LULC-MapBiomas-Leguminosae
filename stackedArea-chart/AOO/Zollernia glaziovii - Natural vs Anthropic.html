<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.64,84,83.38,83.35999999999999,83.63000000000001,83.86,84.02000000000001,84.09,84.5,84.80999999999999,84.87,85.88999999999999,86.10999999999999,86.38,86.62,86.75,86.65999999999998,86.69000000000001,87.09000000000002,87.07,87.21,87.44,87.44,87.54000000000002,87.65000000000002,87.64000000000001,87.69,87.55,87.16999999999999,86.92999999999999,86.87,86.89,86.83,86.74000000000001,86.77,86.75999999999999,86.83000000000001,86.77999999999999],"color":"green"},{"name":"anthropic","data":[12.21,11.86,12.48,12.49,12.24,11.99,11.83,11.76,11.34,11.03,10.969999999999999,9.959999999999999,9.76,9.489999999999998,9.239999999999998,9.12,9.219999999999999,9.19,8.77,8.78,8.649999999999999,8.399999999999999,8.399999999999999,8.33,8.219999999999999,8.219999999999999,8.159999999999998,8.309999999999999,8.69,8.92,8.969999999999999,8.959999999999999,9.04,9.12,9.09,9.11,9.03,9.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
