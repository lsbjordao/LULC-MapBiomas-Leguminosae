<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.129999999999995,53.65,53.169999999999995,52.3,52.379999999999995,52.75999999999999,52.41,52.65,54.07,54.57,54.81,55.110000000000014,54.9,54.690000000000005,54.81999999999999,54.81,54.89999999999999,54.989999999999995,56.29,56.76,56.93999999999999,57.10999999999999,57.05999999999998,57.069999999999986,57.53999999999999,57.47999999999999,57.36,57.06,56.980000000000004,56.489999999999995,56.18,56.02999999999999,56.19,56.339999999999996,56.370000000000005,56.8,57.19,56.940000000000005],"color":"green"},{"name":"anthropic","data":[41.449999999999996,43.17999999999999,43.67,44.559999999999995,44.489999999999995,44.089999999999996,44.44,44.19,42.800000000000004,42.26999999999999,42.040000000000006,41.75,41.94,42.15,42.03999999999999,42.01,41.93,41.849999999999994,40.559999999999995,40.089999999999996,39.9,39.730000000000004,39.76,39.75,39.29,39.349999999999994,39.48,39.78,39.86000000000001,40.34,40.66,40.81,40.63999999999999,40.5,40.480000000000004,40.04,39.64,39.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
