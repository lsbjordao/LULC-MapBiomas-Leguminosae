<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.199999999999996,47.1,46.19,45.160000000000004,44.29,43.66,42.800000000000004,42.68,42.76,43.01999999999999,43.35999999999999,43.63999999999999,43.580000000000005,43.63,43.62,43.23,43.08999999999999,43.00999999999999,43.33,43.32999999999999,43.26999999999999,43.429999999999986,43.61999999999998,43.60999999999999,43.91,44.07,43.96,44.08,43.96,44.059999999999995,44.2,44.099999999999994,44.029999999999994,44.40999999999998,44.70999999999999,45.07999999999998,45.38999999999999,45.77999999999999],"color":"green"},{"name":"anthropic","data":[50.9,51.05,52.12,53.28,54.199999999999996,54.839999999999996,55.72,55.87,55.82000000000001,55.59,55.3,55.02,55.040000000000006,54.97,54.93,55.339999999999996,55.52,55.62000000000001,55.34,55.38,55.45,55.349999999999994,55.14,55.18,54.87,54.730000000000004,54.809999999999995,54.73,54.85999999999999,54.81,54.660000000000004,54.85000000000001,54.9,54.5,54.440000000000005,54.290000000000006,54.019999999999996,53.730000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
