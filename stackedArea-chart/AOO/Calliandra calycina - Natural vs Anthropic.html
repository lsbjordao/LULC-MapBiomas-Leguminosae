<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.71999999999998,84.88,85.20999999999998,83.94,83.48,83.44,83.98999999999998,84.04,84.5,84.72000000000001,84.67999999999999,85.36999999999999,85.76999999999998,85.91000000000001,86.78,87.52,88.01,87.94000000000001,88.29,88.59999999999998,88.59,88.34999999999998,88.03999999999999,88.16,88.64999999999998,88.11,88.24999999999999,88.45,88.59000000000003,88.49000000000001,89.08000000000001,89.55,89.81,89.89000000000001,89.89999999999998,89.89999999999998,90.05999999999999,90],"color":"green"},{"name":"anthropic","data":[18.89,17.73,17.419999999999998,18.71,19.149999999999995,19.190000000000005,18.619999999999997,18.599999999999998,18.130000000000003,17.91,17.95,17.27,16.880000000000003,16.730000000000004,15.87,15.129999999999999,14.629999999999999,14.719999999999997,14.33,14.04,14.049999999999999,14.29,14.599999999999998,14.459999999999997,13.969999999999997,14.54,14.389999999999999,14.17,14.040000000000001,14.15,13.56,13.13,12.840000000000002,12.75,12.729999999999999,12.78,12.610000000000001,12.710000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
