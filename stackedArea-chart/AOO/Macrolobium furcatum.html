<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[6.84,7.45,7.45,7.4,7.45,7.51,7.47,7.47,7.54,7.6,7.65,7.65,7.65,7.67,7.69,7.71,7.76,7.78,7.8,7.8,7.8,7.8,7.8,7.8,7.8,7.8,7.85,7.85,7.85,7.85,7.85,7.85,7.86,7.86,7.92,8.02,8.02,7.81],"color":"#006400"},{"name":"Flooded forest","data":[2.16,2.86,3.08,3.1,3.14,3.09,2.96,3.18,3.19,3.57,3.58,3.44,3.65,3.74,3.76,4.15,4.19,4.07,4.08,4.13,4.13,4.05,4.04,4.04,4.15,4.15,4.13,4.1,4.06,4.06,4.06,4.1,4.15,4.17,4.1,4.19,4.16,4.59],"color":"#76A5AF"},{"name":"Wetland","data":[0.63,0,0,0.45,0.02,0,0,0,0,0.13,0.28,0.2,0.47,0.48,0.38,0.13,0.12,0.32,0.4,0.34,0.34,0.42,0.39,0.39,0.34,0.37,0.35,0.37,0.48,0.46,0.48,0.45,0.37,0.4,0.42,0.28,0.24,0.04],"color":"#45C2A5"},{"name":"River, lake and ocean","data":[89.95,89.26,89.04,88.61,88.96,88.96,89.14,88.92,88.84,88.26,88.07,88.28,87.8,87.68,87.73,87.57,87.5,87.39,87.29,87.29,87.29,87.29,87.34,87.34,87.27,87.25,87.24,87.24,87.18,87.2,87.18,87.17,87.2,87.15,87.13,87.08,87.15,87.12],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
