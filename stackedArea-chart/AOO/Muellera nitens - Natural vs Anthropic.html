<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.410000000000004,46.14000000000001,46.29999999999999,41.87,39.32,36.8,36.199999999999996,34.519999999999996,33.73,33.71,33.88,35.24999999999999,36.720000000000006,36.81,36.699999999999996,35.9,34.720000000000006,33.519999999999996,33.519999999999996,34.14,39.339999999999996,40.52,41.82000000000001,42.58,42.400000000000006,41.5,39.589999999999996,39.57,40.28,39.50000000000001,39.89,41.510000000000005,44.120000000000005,39.95,37.43000000000001,37.49,37.5,37.699999999999996],"color":"green"},{"name":"anthropic","data":[53.86,54.14,53.980000000000004,58.42,60.97,63.47,64.08,65.75,66.53999999999999,66.58,66.4,65.02,63.57,63.480000000000004,63.59,64.38,65.58,66.77000000000001,66.77,66.14,60.94,59.769999999999996,58.459999999999994,57.72,57.879999999999995,58.79,60.7,60.72,60,60.79,60.39,58.77,56.160000000000004,60.32,62.86,62.79,62.800000000000004,62.589999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
