<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.38,79.69999999999999,81.34000000000002,80.86,79.86999999999999,78.33999999999999,78.32000000000002,78.36,78.38999999999999,78.11,75.93999999999998,74.85000000000001,74.78,73.99000000000001,73.55999999999999,72.99999999999999,71.95,71.58,70.59,73.11999999999999,73.84000000000002,75.30000000000001,75.15000000000002,75.56,75.42000000000002,75.36999999999999,75.54000000000002,76.39,76.10000000000001,75.6,75.93,75.29,74.79,73.91000000000001,73.35,73.38999999999999,73.31,73.33],"color":"green"},{"name":"anthropic","data":[20.27,19.96,18.310000000000002,18.79,19.77,21.310000000000002,21.33,21.270000000000003,21.25,21.55,23.71,24.810000000000002,24.88,25.66,26.080000000000002,26.639999999999997,27.700000000000003,28.06,29.05,26.530000000000005,25.8,24.35,24.5,24.09,24.240000000000002,24.290000000000003,24.099999999999998,23.26,23.54,24.05,23.709999999999997,24.37,24.849999999999998,25.75,26.29,26.249999999999996,26.33,26.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
