<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.83999999999999,59.26,59.55000000000001,59.32000000000001,59.39,59.11000000000001,59.81999999999999,59.940000000000005,60.4,60.86,60.99,61.32,61.629999999999995,61.820000000000014,62.43000000000001,63.06,63.190000000000005,63.25999999999999,63.570000000000014,63.56000000000001,63.640000000000015,63.6,63.64,63.779999999999994,63.809999999999995,63.599999999999994,63.249999999999986,63.52,63.63,63.469999999999985,63.87999999999999,63.82999999999999,63.919999999999995,64.43999999999998,64.55999999999999,64.58999999999999,64.65999999999998,64.66],"color":"green"},{"name":"anthropic","data":[44.34000000000001,43.96,43.72,43.93,43.900000000000006,44.160000000000004,43.459999999999994,43.35,42.89,42.44,42.32,41.96,41.64,41.45,40.83,40.19,40.05,40.01,39.72,39.71,39.63000000000001,39.669999999999995,39.620000000000005,39.489999999999995,39.46,39.69,40.01999999999999,39.76,39.660000000000004,39.81,39.41,39.49,39.38999999999999,38.900000000000006,38.8,38.76,38.68999999999999,38.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
