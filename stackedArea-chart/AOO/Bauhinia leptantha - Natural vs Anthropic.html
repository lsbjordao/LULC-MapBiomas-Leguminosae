<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.94,96.83,95.51,93.85,92.88000000000001,93.50000000000001,93.93,93.7,97.21000000000001,97.66000000000001,95.38000000000001,96.21999999999998,95.94,92.35,95.23999999999998,95.07000000000001,96.06000000000002,95.49,98.84000000000002,94.81,94.30000000000001,94.36000000000003,95.62,94.82000000000001,94.92999999999999,93.24,91.64,92.00999999999999,94.11,93.49,93.85000000000002,94.6,94.86000000000001,92.25000000000001,93.77999999999999,94.59,95.14999999999998,96.67000000000002],"color":"green"},{"name":"anthropic","data":[2.65,3.78,5.13,6.8,7.6499999999999995,7,6.58,6.890000000000001,3.3799999999999994,2.9899999999999998,5.3100000000000005,4.42,4.760000000000001,8.31,5.39,5.6,4.6899999999999995,5.29,1.99,6.02,6.51,6.46,5.1899999999999995,5.91,5.839999999999999,7.61,9.190000000000001,8.88,6.819999999999999,7.45,7.050000000000001,6.3100000000000005,6.06,8.649999999999999,7.12,6.319999999999999,5.77,4.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
