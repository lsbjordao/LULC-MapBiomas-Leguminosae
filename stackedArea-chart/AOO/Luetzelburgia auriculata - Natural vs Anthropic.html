<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.33000000000001,76.07,74.80999999999999,73.94,73.34,72.69,72.05000000000001,71.77000000000001,71.22,71.3,71.65,71.93000000000002,72.24000000000002,71.92,71.55000000000001,71.44,70.91000000000001,70.41,69.98000000000002,69.34999999999998,68.88,69.07000000000001,68.90999999999998,69.21000000000001,69.24,69.31,69.00999999999999,68.69,68.2,67.92000000000002,66.92999999999999,67.09,67.49000000000001,67.67,67.6,67.72999999999999,67.49,67.50999999999999],"color":"green"},{"name":"anthropic","data":[34.660000000000004,34.92,36.2,37.07,37.66,38.32,38.93,39.23000000000001,39.79,39.72,39.35,39.07,38.74,39.09,39.449999999999996,39.58000000000001,40.09,40.60000000000001,41.03,41.650000000000006,42.14999999999999,41.96000000000001,42.10000000000001,41.81,41.779999999999994,41.71000000000001,42.019999999999996,42.339999999999996,42.81,43.10000000000001,44.08,43.929999999999986,43.510000000000005,43.32,43.39,43.27,43.5,43.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
