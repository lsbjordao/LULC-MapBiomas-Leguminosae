<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.39999999999999,44.47999999999999,44.06,44.03,44.11,44.06,44.01999999999999,44.160000000000004,44.78000000000001,45.64999999999999,46.37,46.68,46.87,46.90999999999999,47.23,47.36000000000001,47.61,48.100000000000016,48.6,48.870000000000005,48.940000000000005,49.18000000000001,49.39,49.540000000000006,49.739999999999995,49.94999999999999,49.81999999999999,49.78999999999999,49.959999999999994,50.19,50.31,50.33,50.57,50.93999999999999,51.33,51.58999999999999,51.57999999999999,51.72],"color":"green"},{"name":"anthropic","data":[49.11000000000001,49.14999999999999,49.63000000000001,49.8,49.76,49.83,49.86,49.75000000000001,49.11000000000001,48.31999999999999,47.66,47.300000000000004,46.95,46.86000000000001,46.50000000000001,46.38000000000001,46.17,45.709999999999994,45.190000000000005,44.93,44.849999999999994,44.589999999999996,44.410000000000004,44.269999999999996,44.050000000000004,43.879999999999995,43.96,44,43.870000000000005,43.66,43.620000000000005,43.61,43.36000000000001,43.010000000000005,42.65000000000001,42.42,42.43,42.379999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
