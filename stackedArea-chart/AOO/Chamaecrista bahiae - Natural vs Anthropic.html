<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.03,66.04000000000002,65.22,64.02,63.37999999999999,63.13,62.69999999999999,62.09,61.70000000000001,61.399999999999984,60.93,60.629999999999995,60.60000000000001,60.31000000000001,60.11000000000001,59.85000000000001,59.660000000000004,59.690000000000005,59.73,59.03,58.89,59.33,59.43,59.25,59.13,58.92999999999999,59.08999999999999,59.480000000000004,59.58,59.529999999999994,59.669999999999995,59.57999999999999,59.39,59.42999999999998,59.29999999999999,59.22,59.01,58.60999999999999],"color":"green"},{"name":"anthropic","data":[34.129999999999995,34.2,35.07,36.26,36.9,37.16,37.64,38.260000000000005,38.65,38.940000000000005,39.400000000000006,39.7,39.69999999999999,39.98,40.19999999999999,40.459999999999994,40.67000000000001,40.64,40.6,41.3,41.45,41.01,40.93999999999999,41.099999999999994,41.230000000000004,41.42,41.26,40.879999999999995,40.779999999999994,40.839999999999996,40.72,40.83,41.03,41.010000000000005,41.150000000000006,41.26,41.48,41.86],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
