<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.10999999999999,69.87,68.66000000000001,68.10000000000001,66.99999999999999,66.17999999999999,66.19999999999999,65.92,65.53,65.44,65.22,65.22,65.16,65.22,64.65,64.53999999999999,64.58,64.45,64.83999999999999,64.58,64.27000000000001,64.39000000000001,64.61,64.85,65.39,65.58,65.45999999999998,65.35,65.07,64.9,65.1,64.8,64.44,64.69999999999999,64.87999999999998,65.28,65.61999999999999,66.4],"color":"green"},{"name":"anthropic","data":[26.649999999999995,26.019999999999996,27.34,28.02,29.099999999999994,29.91,29.829999999999995,30.119999999999997,30.509999999999994,30.669999999999998,30.929999999999996,30.889999999999997,30.809999999999995,30.679999999999996,31.169999999999998,31.229999999999993,31.249999999999996,31.43,31.069999999999997,31.33,31.69,31.580000000000002,31.34,31.089999999999996,30.599999999999994,30.449999999999996,30.580000000000002,30.72,30.95,31.119999999999997,31.03,31.43,31.74,31.41,31.17,30.78,30.419999999999995,29.499999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
