<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.9,78.42999999999999,78.10999999999999,77.86999999999999,77.92999999999998,78.01999999999998,78.12,78.42999999999999,78.97,79.58999999999999,79.78,79.95999999999998,80.10000000000001,80.37,80.25,80.4,80.51000000000002,80.73,80.71000000000001,80.89,80.96,81.04,81.30000000000003,81.37000000000002,81.23,81.55,81.94999999999999,82.11,82.16999999999999,82.36,82.44,82.50999999999999,82.56,82.58,82.77000000000001,82.86999999999999,82.85000000000001,82.96],"color":"green"},{"name":"anthropic","data":[21.339999999999996,20.83,21.16,21.39,21.33,21.23,21.139999999999997,20.83,20.299999999999997,19.68,19.49,19.29,19.14,18.89,18.99,18.869999999999997,18.75,18.55,18.54,18.39,18.29,18.189999999999998,17.95,17.879999999999995,18.04,17.689999999999998,17.29,17.139999999999997,17.049999999999997,16.869999999999997,16.819999999999997,16.739999999999995,16.689999999999998,16.68,16.46,16.369999999999997,16.4,16.29],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
