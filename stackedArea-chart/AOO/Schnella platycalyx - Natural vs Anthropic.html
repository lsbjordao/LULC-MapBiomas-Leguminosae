<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.60999999999999,85.18999999999998,83.46999999999998,82.3,81.67000000000002,80.99000000000001,80.87,79.56,78.53,78.05,77.73,77.85,77.25999999999999,76.55000000000001,76.1,75.60000000000001,75.10000000000001,74.71000000000001,74.23,74.1,73.98,74.27000000000001,74.36,74.26000000000002,73.85000000000001,73.89,73.89999999999999,73.57,73.13999999999999,72.71000000000001,72.58,72.35,72.13999999999999,72.03999999999999,71.98,71.97999999999999,71.54,71.16],"color":"green"},{"name":"anthropic","data":[13.709999999999999,15.14,16.869999999999997,18.04,18.66,19.35,19.47,20.77,21.78,22.29,22.580000000000002,22.479999999999997,23.07,23.78,24.23,24.72,25.22,25.63,26.1,26.240000000000002,26.35,26.06,25.959999999999997,26.060000000000002,26.49,26.43,26.44,26.76,27.2,27.620000000000005,27.73,27.980000000000004,28.2,28.29,28.35,28.37,28.779999999999998,29.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
