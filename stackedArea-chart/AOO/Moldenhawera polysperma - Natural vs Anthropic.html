<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.66000000000001,75.89999999999999,75.29999999999998,75.36999999999999,75.46000000000001,75.32,75.4,75.4,75.39999999999999,75.49,75.61999999999999,75.67999999999999,76.1,76.35,76.74999999999999,76.88000000000001,76.97999999999999,77.1,77.36999999999999,77.44,77.61999999999999,77.91999999999999,77.94999999999997,77.94,77.94,78.03999999999999,78.03,78.08,78.08000000000001,78.07,78.25,78.24,78.28,78.28000000000002,78.41000000000001,78.32000000000001,78.49,78.43],"color":"green"},{"name":"anthropic","data":[23.4,24.17,24.76,24.689999999999998,24.6,24.740000000000002,24.66,24.64,24.65,24.560000000000002,24.43,24.37,23.95,23.71,23.3,23.18,23.060000000000002,22.97,22.689999999999998,22.61,22.45,22.15,22.12,22.119999999999997,22.11,22.020000000000003,22.01,21.97,21.98,21.990000000000002,21.81,21.840000000000003,21.79,21.78,21.65,21.740000000000002,21.57,21.619999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
