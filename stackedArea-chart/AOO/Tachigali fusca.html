<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[93.97,94.26,94.22,94.2,94.46,94.44,94.18,94.21,94.12,94.11,93.73,93.53,93.6,93.43,93.28,93.37,93.7,93.68,93.75,93.83,93.86,93.57,93.63,93.57,93.44,93.51,93.35,93.29,93.14,93.15,92.78,92.87,92.82,92.49,92.28,92.24,92.47,92.52],"color":"#006400"},{"name":"Flooded forest","data":[0.3,0.29,0.29,0.35,0.34,0.35,0.35,0.32,0.31,0.32,0.31,0.24,0.2,0.19,0.21,0.23,0.27,0.27,0.21,0.25,0.23,0.19,0.23,0.27,0.22,0.27,0.27,0.29,0.29,0.32,0.34,0.32,0.32,0.34,0.32,0.32,0.33,0.31],"color":"#76A5AF"},{"name":"Wetland","data":[1.08,0.42,0.32,0.23,0.02,0.07,0.13,0.22,0.3,0.2,0.28,0.34,0.22,0.25,0.4,0.2,0.2,0.23,0.28,0.2,0.24,0.15,0.57,0.14,0.1,0.09,0.2,0.15,0.35,0.3,0.52,0.24,0.2,0.86,0.45,0.67,0.81,0.25],"color":"#45C2A5"},{"name":"Grassland","data":[0,0,0.01,0,0.01,0,0.01,0.01,0,0.08,0,0.03,0.01,0,0.03,0,0,0,0,0,0,0,0.04,0,0.01,0,0,0.01,0,0,0,0.01,0,0.02,0,0,0.06,0],"color":"#B8AF4F"},{"name":"Pasture","data":[0.4,0.38,0.39,0.4,0.27,0.19,0.23,0.28,0.3,0.56,0.64,0.89,0.9,1.07,1.17,1.19,0.9,0.86,0.78,0.74,0.82,1.07,1.1,1,1.04,0.97,0.99,0.93,0.93,0.77,0.99,1.01,0.88,1.16,1.44,1.28,1.25,1.27],"color":"#FFD966"},{"name":"River, lake and ocean","data":[3.97,4.37,4.5,4.53,4.62,4.67,4.81,4.68,4.69,4.45,4.76,4.68,4.78,4.77,4.63,4.73,4.65,4.68,4.7,4.7,4.57,4.74,4.14,4.74,4.91,4.88,4.91,5.04,5.01,5.18,5.08,5.27,5.49,4.84,5.23,5.21,4.81,5.37],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
