<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.82000000000001,64.96000000000001,63.63999999999999,62.06000000000001,60.68,59.84000000000001,59.5,59.11,59.15,59.05,58.870000000000005,58.849999999999994,57.95,57.29,56.190000000000005,54.98,54.45,53.48,52.699999999999996,51.879999999999995,51.1,51.35999999999999,51.75000000000001,51.99,52.349999999999994,52.5,52.779999999999994,53.55,53.44,52.81999999999999,52.46,51.99999999999999,51.24,50.74,50.42999999999999,49.55,49.27,49.19999999999999],"color":"green"},{"name":"anthropic","data":[33.58,35.44,36.769999999999996,38.349999999999994,39.730000000000004,40.59,40.92,41.3,41.260000000000005,41.349999999999994,41.54,41.55,42.46,43.099999999999994,44.230000000000004,45.44,45.96,46.94,47.71,48.550000000000004,49.309999999999995,49.06,48.68,48.44,48.080000000000005,47.919999999999995,47.63999999999999,46.87,46.97,47.6,47.949999999999996,48.410000000000004,49.150000000000006,49.66,49.980000000000004,50.87,51.14999999999999,51.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
