<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.69,90.39,89.62,89.01,88.71999999999997,88.76999999999998,88.90999999999998,88.64,88.15,87.75,87.09,86.22000000000001,85.43,84.81,84.56000000000003,84.19999999999999,83.25000000000001,82.87,82.98000000000002,82.7,82.21000000000001,81.96000000000001,81.64000000000003,81.57000000000001,81.24000000000001,80.87999999999998,80.72,80.7,80.38999999999999,79.96000000000001,79.52,79.27,79.01,78.98000000000002,78.62,78.53,77.80000000000001,77.31999999999998],"color":"green"},{"name":"anthropic","data":[12.61,12.91,13.7,14.309999999999999,14.579999999999998,14.54,14.4,14.669999999999998,15.16,15.58,16.23,17.13,17.92,18.53,18.78,19.16,20.119999999999997,20.5,20.41,20.66,21.18,21.41,21.729999999999997,21.8,22.150000000000002,22.49,22.659999999999997,22.669999999999998,22.98,23.45,23.869999999999997,24.15,24.38,24.41,24.78,24.889999999999997,25.61,26.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
