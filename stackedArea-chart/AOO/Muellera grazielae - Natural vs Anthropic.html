<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.47,50.54,50.669999999999995,50.690000000000005,50.39000000000001,50.37000000000001,50.580000000000005,51.019999999999996,51.51,51.44,51.13,51.05,51.12000000000001,51.35000000000001,51.720000000000006,52.33,52.55,52.60000000000001,52.7,52.86000000000001,52.879999999999995,53.230000000000004,53.230000000000004,53.11,53.33,53.04,52.46000000000001,52.300000000000004,52.7,52.79,53.11,53.25,53.470000000000006,53.510000000000005,53.5,53.949999999999996,54.18000000000001,54.58],"color":"green"},{"name":"anthropic","data":[24.889999999999997,24.82,24.700000000000003,24.689999999999998,24.98,25,24.759999999999998,24.33,23.86,23.93,24.23,24.31,24.25,24.009999999999998,23.660000000000004,23.05,22.82,22.78,22.650000000000002,22.52,22.5,22.15,22.12,22.28,22.04,22.33,22.92,23.07,22.650000000000002,22.57,22.26,22.12,21.900000000000002,21.87,21.869999999999997,21.43,21.17,20.78],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
