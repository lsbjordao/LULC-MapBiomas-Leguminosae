<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.29999999999999,46.97,46.59000000000001,46.27000000000001,46.449999999999996,46.39000000000001,46.67000000000001,46.48000000000001,46.760000000000005,46.85000000000001,46.85,46.79,47.05999999999999,47.27999999999999,47.99000000000001,48.49,48.86,48.699999999999996,48.28,48.21,48.39999999999999,48.74999999999999,49.35,49.510000000000005,49.59,49.739999999999995,49.89,50.49000000000001,51,51.4,51.919999999999995,52.389999999999986,52.620000000000005,52.75999999999999,53.179999999999986,53.269999999999996,53.209999999999994,53.53999999999999],"color":"green"},{"name":"anthropic","data":[54.94,55.28,55.67,55.96999999999999,55.78,55.85,55.58,55.75000000000001,55.47,55.400000000000006,55.41000000000001,55.45,55.18,54.96,54.25000000000001,53.75000000000001,53.39000000000001,53.540000000000006,53.96,54.010000000000005,53.85,53.50000000000001,52.870000000000005,52.72,52.66,52.489999999999995,52.35,51.739999999999995,51.24999999999999,50.81999999999999,50.33,49.85,49.61000000000001,49.49,49.029999999999994,48.98,49.04,48.699999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
