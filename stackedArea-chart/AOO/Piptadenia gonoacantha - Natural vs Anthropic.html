<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.14999999999999,47,46.860000000000014,46.42000000000001,46.06,45.83000000000001,45.66000000000001,45.55000000000001,45.49,45.42,45.39,45.43000000000001,45.34,45.34000000000001,45.36000000000001,45.15000000000001,45.14,44.97,44.98,45.07,45.13,45.16000000000001,45.24000000000001,45.290000000000006,45.39,45.43,45.43999999999998,45.4,45.37999999999999,45.39,45.529999999999994,45.69999999999999,45.80999999999999,45.89999999999999,45.94999999999999,45.93999999999999,46,45.99999999999999],"color":"green"},{"name":"anthropic","data":[58.690000000000005,58.86,59.02000000000001,59.440000000000005,59.820000000000014,60.040000000000006,60.180000000000014,60.300000000000004,60.36000000000001,60.410000000000004,60.480000000000004,60.429999999999986,60.52,60.53000000000001,60.49,60.74000000000001,60.739999999999995,60.9,60.88,60.8,60.730000000000004,60.699999999999996,60.63,60.57,60.480000000000004,60.43000000000001,60.410000000000004,60.46,60.489999999999995,60.480000000000004,60.339999999999996,60.13999999999999,60.04,59.969999999999985,59.93000000000001,59.93,59.86,59.870000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
