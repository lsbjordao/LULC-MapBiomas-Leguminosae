<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.21999999999998,74.41999999999999,73.99,74.13000000000001,73.94000000000001,73.99000000000001,73.80000000000001,73.74,73.65,73.92999999999999,73.96000000000002,74.4,74.58000000000001,74.84,75.09000000000002,75.13000000000001,75.02,75.15,75.21000000000001,75.28999999999999,75.16000000000001,75.35000000000002,75.17999999999999,75.13000000000001,75.26,75.44,75.48,75.62000000000002,75.84,76.04,76.08000000000001,76.04,76.07000000000001,76.04,76.27,76.09999999999998,76.41,76.41999999999999],"color":"green"},{"name":"anthropic","data":[25.68,25.490000000000002,25.92,25.78,25.96,25.91,26.11,26.17,26.25,25.97,25.94,25.509999999999998,25.33,25.07,24.82,24.78,24.88,24.759999999999998,24.7,24.619999999999997,24.75,24.56,24.73,24.77,24.65,24.46,24.43,24.29,24.060000000000002,23.87,23.83,23.86,23.83,23.86,23.64,23.8,23.5,23.5],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
