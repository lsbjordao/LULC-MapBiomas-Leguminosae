<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.73,72.54999999999998,71.92,71.33,70.73,70.57000000000001,70.47999999999999,70.47999999999998,70.38,69.87,69.76999999999998,69.63,69.57,69.08,68.86,68.54,68.5,68.00000000000001,67.69000000000001,66.72,65.92,65.51,65.41,65.42000000000002,64.63,64.69,64.5,64.26000000000002,64.23,64.24000000000001,64.33,64.26,62.569999999999986,62.470000000000006,62.37,62.30000000000002,62.339999999999996,61.279999999999994],"color":"green"},{"name":"anthropic","data":[29.05,30.22,30.849999999999998,31.42,32.03,32.220000000000006,32.28,32.29,32.39,32.89000000000001,33,33.14,33.21,33.67,33.91,34.22,34.26999999999999,34.78,35.080000000000005,36.06,36.830000000000005,37.28,37.35,37.34,38.129999999999995,38.09,38.25000000000001,38.510000000000005,38.540000000000006,38.53000000000001,38.43,38.510000000000005,40.21,40.32,40.4,40.45999999999999,40.44,41.51],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
