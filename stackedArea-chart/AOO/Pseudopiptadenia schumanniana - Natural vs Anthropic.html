<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.27000000000001,65.05999999999999,64.58,64.65,64.4,64.25,64.31,64.25,64.43,64.57,64.77000000000001,65.01,65.33000000000001,65.58,65.82,65.83,65.93,65.95000000000002,66.12,66.15,66.41,66.67000000000002,66.83000000000001,67.08999999999999,67.24000000000001,67.37000000000002,67.46,67.58999999999999,67.63,67.75,67.80000000000001,67.9,68.06,67.93000000000002,67.93000000000002,68.00000000000001,67.99000000000001,67.88],"color":"green"},{"name":"anthropic","data":[35.61000000000001,35.85000000000001,36.31000000000001,36.260000000000005,36.52,36.67000000000001,36.61000000000001,36.660000000000004,36.46,36.35000000000001,36.150000000000006,35.9,35.589999999999996,35.35,35.08,35.07000000000001,34.99000000000001,34.980000000000004,34.800000000000004,34.760000000000005,34.52,34.25,34.11,33.81,33.67,33.540000000000006,33.440000000000005,33.32000000000001,33.3,33.16,33.120000000000005,33.019999999999996,32.85,32.980000000000004,32.989999999999995,32.92,32.94,33.019999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
