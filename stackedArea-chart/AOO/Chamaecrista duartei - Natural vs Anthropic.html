<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.88000000000001,75.89999999999999,75.17999999999999,74.30999999999997,73.23999999999998,72.91999999999999,72.9,73.14,72.77,72.79999999999998,72.66000000000001,72.66,72.63000000000001,72.42999999999999,72.21,71.84999999999998,71.78999999999999,71.58999999999999,71.52999999999999,71.28999999999999,71.25,71.13,71.16000000000001,71.41999999999999,72.03999999999998,72.17,72.31999999999998,72.4,71.98,71.53,71.53000000000002,71.57,71.45000000000003,71.79000000000002,71.89000000000001,71.98,72.41,72.77000000000001],"color":"green"},{"name":"anthropic","data":[24.42,23.43,24.139999999999997,25.01,26.07,26.4,26.42,26.16,26.54,26.49,26.63,26.65,26.7,26.89,27.110000000000003,27.470000000000002,27.52,27.720000000000002,27.77,28.000000000000004,28.040000000000003,28.169999999999998,28.140000000000004,27.880000000000003,27.28,27.150000000000002,26.98,26.919999999999998,27.330000000000002,27.779999999999998,27.77,27.74,27.859999999999996,27.499999999999996,27.399999999999995,27.33,26.909999999999997,26.599999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
