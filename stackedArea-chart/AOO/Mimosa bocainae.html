<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[89.63,89.82,89.49,89.14,88.6,87.59,87.51,87.39,87.3,87.5,87.48,87.45,87.59,88.57,88.94,89.24,89.32,89.43,89.41,89.22,89.06,89.68,89.65,89.54,89.51,89.52,89.43,89.2,89.33,89.12,89.17,89.01,89,88.97,89.02,89.26,89.26,89.24],"color":"#006400"},{"name":"Pasture","data":[5.77,5.35,5.01,5.05,5.31,5.89,6.6,6.74,6.13,5.74,5.02,4.28,4.07,4.05,4.02,3.16,2.64,2.7,2.56,2.28,2.25,2.38,2.57,2.46,2.42,2.44,2.5,2.43,2.16,2.23,2.79,2.54,2.46,2.5,2.45,2.18,2.1,2.18],"color":"#FFD966"},{"name":"Mosaic of uses","data":[4.4,4.63,5.29,5.61,5.88,6.31,5.68,5.66,6.36,6.55,7.29,8.07,8.13,7.17,6.83,7.39,7.83,7.67,7.83,8.29,8.49,7.73,7.57,7.8,7.86,7.83,7.86,8.16,8.3,8.44,7.83,8.25,8.33,8.33,8.32,8.34,8.43,8.37],"color":"#fff3bf"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
