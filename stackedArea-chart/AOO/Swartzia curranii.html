<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[91.83,94.07,94.07,94.43,94.73,94.73,94.99,94.99,94.99,94.9,94.44,93.95,94.32,95.08,95.14,95.03,93.68,93.85,93.81,88.86,86.19,84.31,81.71,77.74,77.74,77.7,77.74,77.56,77.83,77.93,77.52,77.06,76.73,76.12,76.19,76.75,77.79,80.46],"color":"#006400"},{"name":"Pasture","data":[2.89,2.42,2.4,2.13,2.03,1.75,1.6,1.38,1.42,1.58,2.31,2.66,2.85,2.75,2.55,2.3,2.71,2.67,3.06,3.79,5.71,8.2,10.03,12,12.52,12.58,12.76,13.91,14.89,16.1,16.49,16.49,15.76,13.06,10.39,9.13,8.33,6.7],"color":"#FFD966"},{"name":"Mosaic of uses","data":[4.93,3.16,3.18,3.09,2.89,3.17,3.07,3.28,3.24,3.17,2.9,3.04,2.48,1.82,1.96,2.32,3.26,3.13,2.78,7,7.76,7.14,7.91,9.91,9.39,9.38,9.15,8.18,6.93,5.63,5.65,6.11,7.16,10.47,13.08,13.77,13.53,12.49],"color":"#fff3bf"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
