<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.13,86.97,87.72,87.03,86.32999999999998,85.07,84.78,84.19,83.39,83.22,82.46,82.42999999999999,82.36999999999999,82.16,81.38999999999999,80.77000000000001,80.46000000000001,80.10000000000001,80.64,79.87,79.36000000000001,79.19000000000001,78.95,78.75,78.59,78.17999999999999,77.75,77.80000000000001,77.46,77.71,78.09,77.65,77.96000000000001,78.40999999999998,78.43,78.99,79.66,79.49],"color":"green"},{"name":"anthropic","data":[14.02,13.17,12.43,13.13,13.82,15.09,15.379999999999999,15.969999999999999,16.759999999999998,16.93,17.689999999999998,17.73,17.78,17.990000000000002,18.75,19.37,19.68,20.05,19.5,20.27,20.78,20.96,21.21,21.41,21.55,21.96,22.39,22.35,22.689999999999998,22.439999999999998,22.049999999999997,22.5,22.189999999999998,21.74,21.730000000000004,21.15,20.48,20.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
