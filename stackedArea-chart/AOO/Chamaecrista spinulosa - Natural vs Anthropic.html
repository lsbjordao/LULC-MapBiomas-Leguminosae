<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.33,97.35,97.42,97.47999999999999,97.60000000000001,97.75,97.79,97.77000000000001,97.75000000000001,97.72000000000001,97.72,97.75999999999999,97.78999999999999,97.79000000000002,97.78999999999999,97.8,97.78999999999999,97.78999999999999,97.8,97.77000000000001,97.77,97.71,97.55,97.52,97.52,97.6,97.6,97.58,97.59,97.61,97.69000000000001,97.68999999999998,97.72,97.75999999999999,97.77,97.76,97.75999999999999,97.75],"color":"green"},{"name":"anthropic","data":[2.36,2.33,2.25,2.2,2.0799999999999996,1.9100000000000001,1.8900000000000001,1.9100000000000001,1.9300000000000002,1.95,1.96,1.9200000000000002,1.8900000000000001,1.9000000000000001,1.87,1.8900000000000001,1.8900000000000001,1.8900000000000001,1.8900000000000001,1.9000000000000001,1.9100000000000001,1.94,2.1199999999999997,2.1599999999999997,2.1499999999999995,2.09,2.0799999999999996,2.09,2.0799999999999996,2.07,1.99,1.98,1.95,1.9200000000000002,1.9100000000000001,1.9100000000000001,1.9100000000000001,1.94],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
