<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.09,67.21000000000001,66.61000000000001,65.92,65.36,65.09,64.91,64.95999999999998,64.74000000000001,64.92999999999999,64.74,64.46999999999998,64.35,63.87,63.419999999999995,63.1,62.92999999999999,62.709999999999994,62.730000000000004,62.589999999999996,62.37,61.85,61.33,61.07,61.120000000000005,60.97999999999999,60.97999999999999,61.029999999999994,60.76,60.50999999999999,60.599999999999994,60.47999999999999,60.429999999999986,61.19,61.11999999999999,60.949999999999996,61.37,62.080000000000005],"color":"green"},{"name":"anthropic","data":[36.910000000000004,36.800000000000004,37.38,38.09,38.65,38.919999999999995,39.10999999999999,39.07,39.25999999999999,39.07999999999999,39.27000000000001,39.56,39.65,40.160000000000004,40.580000000000005,40.92,41.089999999999996,41.3,41.29,41.42,41.61000000000001,42.18,42.69000000000001,42.940000000000005,42.900000000000006,43.04000000000001,43.040000000000006,42.98,43.26,43.49999999999999,43.38999999999999,43.52,43.589999999999996,42.839999999999996,42.89000000000001,43.05,42.63999999999999,41.919999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
