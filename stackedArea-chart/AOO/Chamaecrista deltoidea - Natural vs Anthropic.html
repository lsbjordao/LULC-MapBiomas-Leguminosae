<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.14,62.019999999999996,62.01,61.56999999999999,61.44,62.14,61.73,61.879999999999995,61.32000000000001,61.480000000000004,61.809999999999995,61.96,62.32000000000001,62.58,62.540000000000006,62.58,63.309999999999995,63.81,64.46,65.32,67.24,67.9,68.88000000000001,69.11,69.3,69.67999999999999,69.88,71.08,71.45,72.49000000000001,72.52,72.37,73.05,73.26,72.91999999999999,73.25999999999999,72.92999999999999,72.67],"color":"green"},{"name":"anthropic","data":[33.61,37.739999999999995,37.75,38.19,38.32,37.61,38.03,37.89,38.44,38.269999999999996,37.95,37.81,37.44,37.17,37.230000000000004,37.19,36.44,35.95,35.3,34.44,32.52,31.869999999999997,30.880000000000003,30.64,30.47,30.07,29.89,28.68,28.299999999999997,27.28,27.240000000000002,27.39,26.7,26.5,26.840000000000003,26.509999999999998,26.840000000000003,27.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
