<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.239999999999995,33.23,32.400000000000006,31.970000000000002,31.73,31.35,31.279999999999998,31.14,31.499999999999996,31.9,31.770000000000003,31.59,31.77,31.749999999999996,31.93,32.120000000000005,32.25000000000001,32.36,32.48,32.47,32.720000000000006,32.989999999999995,33.48,33.6,33.51,33.709999999999994,33.92,33.830000000000005,34.300000000000004,34.44,34.59,34.980000000000004,35.35,35.260000000000005,35.190000000000005,35.379999999999995,35.39000000000001,35.59000000000001],"color":"green"},{"name":"anthropic","data":[68.09000000000002,69.09999999999998,69.93999999999998,70.36,70.60999999999999,71.01,71.08,71.22000000000001,70.89,70.49000000000001,70.63000000000001,70.78999999999999,70.63,70.62999999999998,70.45,70.27,70.15,70.01000000000002,69.9,69.91000000000001,69.66000000000001,69.4,68.89000000000001,68.79,68.87000000000002,68.67999999999999,68.47,68.55999999999999,68.07000000000001,67.95000000000002,67.78000000000002,67.39,67,67.13,67.19,66.97999999999999,67.00000000000001,66.79],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
