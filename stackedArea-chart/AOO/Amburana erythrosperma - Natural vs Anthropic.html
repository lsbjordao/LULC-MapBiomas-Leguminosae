<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[27.14,26.93,25.49,25.269999999999996,24.78,24.77,25.16,24.87,24.729999999999997,24.97,25.12,25.380000000000003,25.54,25.4,26.240000000000002,26.200000000000003,25.18,25.95,26.5,26.469999999999995,26.560000000000002,28.459999999999997,28.709999999999997,29.2,29.07,28.76,28.29,28,27.58,27.659999999999997,28.03,28.18,28.630000000000003,29.480000000000004,29.77,29.48,29.16,29.360000000000003],"color":"green"},{"name":"anthropic","data":[72.84,73.05,74.5,74.72999999999999,75.21,75.22,74.83000000000001,75.11999999999999,75.26,75.01999999999998,74.87,74.61,74.44999999999999,74.57000000000001,73.75999999999999,73.79,74.80000000000001,74.05,73.49000000000001,73.52999999999999,73.44999999999999,71.52,71.3,70.8,70.91000000000001,71.22,71.69999999999999,71.99,72.41000000000001,72.33000000000001,71.98,71.82000000000001,71.38,70.52,70.22999999999999,70.51999999999998,70.83999999999999,70.64999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
