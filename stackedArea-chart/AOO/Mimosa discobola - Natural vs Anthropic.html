<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.96,60.230000000000004,59.99,59.99,59.64,59.63,59.67999999999999,59.73,59.620000000000005,59.300000000000004,59.099999999999994,59.03999999999999,60.099999999999994,60.17,60.33,59.620000000000005,59.36000000000001,59.12000000000001,59.17,58.55,58.57000000000001,58.5,58.779999999999994,58.88,58.93000000000001,58.87,58.71,58.56999999999999,58.38,58.24999999999999,58.230000000000004,58.209999999999994,58.17000000000001,57.99,57.75000000000001,57.64,57.5,57.23],"color":"green"},{"name":"anthropic","data":[40.68000000000001,40.41,40.65,40.64,41.010000000000005,41,40.97,40.91,41.019999999999996,41.34,41.56,41.6,40.54,40.46,40.33,41.03,41.28,41.51,41.48,42.080000000000005,42.07000000000001,42.13,41.870000000000005,41.77,41.720000000000006,41.76,41.92,42.07,42.26,42.39,42.42,42.419999999999995,42.470000000000006,42.67,42.9,43,43.12,43.4],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
