<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.13,54.93000000000001,55.050000000000004,54.69,54.07,53.910000000000004,53.49,53.330000000000005,53.45,53.52,53.34,53.38,53.63,54.07,54.03,53.830000000000005,53.839999999999996,53.66,54.18999999999999,54.26,54.31999999999999,54.64,54.57,54.440000000000005,55.06,55.05,54.98,55.019999999999996,54.94,55.38,55.4,55.230000000000004,55.31,54.980000000000004,54.63,54.879999999999995,55.370000000000005,55.510000000000005],"color":"green"},{"name":"anthropic","data":[45.089999999999996,45.29,45.169999999999995,45.519999999999996,46.15,46.31999999999999,46.74,46.879999999999995,46.77999999999999,46.71,46.88000000000001,46.839999999999996,46.59,46.160000000000004,46.190000000000005,46.38999999999999,46.38,46.56,46.05,45.96,45.9,45.59,45.669999999999995,45.79,45.16,45.190000000000005,45.239999999999995,45.2,45.279999999999994,44.830000000000005,44.800000000000004,44.980000000000004,44.92,45.24000000000001,45.57999999999999,45.36000000000001,44.86,44.7],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
