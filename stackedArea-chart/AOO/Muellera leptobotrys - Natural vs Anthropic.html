<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.21,56.379999999999995,58.04,56.72999999999999,56.120000000000005,57.1,57.05,58.84,60.449999999999996,62.91,64.21,65,66.08000000000001,65.42000000000002,66.41000000000001,66.75000000000001,66.41000000000001,66.00999999999999,65.78,65.43,63.44,62.54,62.41,62.120000000000005,61.83,62.03,61.89,62.489999999999995,63.080000000000005,63.300000000000004,63.709999999999994,63.95,64.24,64.17999999999999,64.41,64.44999999999999,64.19000000000001,64.28],"color":"green"},{"name":"anthropic","data":[47.34,47.18,45.52,46.830000000000005,47.42,46.45,46.5,44.72,43.12,40.660000000000004,39.339999999999996,38.55,37.47,38.11,37.13999999999999,36.79,37.15,37.53,37.76,38.11,40.11,41.01,41.14,41.44,41.72,41.52,41.65,41.07000000000001,40.480000000000004,40.25000000000001,39.83,39.599999999999994,39.31,39.379999999999995,39.14,39.1,39.36,39.269999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
