<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.97999999999999,71.41999999999999,70.52000000000001,69.77,68.05,67.39,66.77000000000001,66.25,65.74000000000001,64.91,64.54,64.08,64.05000000000001,63.79,63.17,62.46000000000001,62.120000000000005,61.809999999999995,61.33,61.67,61.510000000000005,61.55000000000001,61.5,61.26,61.31000000000001,61.18,60.790000000000006,60.550000000000004,59.84,59.18000000000001,58.86,58.809999999999995,58.75000000000001,58.690000000000005,58.91,59.2,59.010000000000005,59.28],"color":"green"},{"name":"anthropic","data":[28.91,29.459999999999997,30.370000000000005,31.150000000000002,32.870000000000005,33.510000000000005,34.12,34.62,35.15999999999999,35.98,36.36,36.81999999999999,36.85,37.12,37.71,38.43,38.79,39.10000000000001,39.550000000000004,39.220000000000006,39.38,39.33,39.4,39.64,39.59,39.72,40.11,40.34,41.04999999999999,41.709999999999994,42.04999999999999,42.059999999999995,42.16,42.2,41.989999999999995,41.68,41.88,41.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
