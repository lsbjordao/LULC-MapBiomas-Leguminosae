<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.06000000000002,75.06000000000002,75.32000000000002,74.82000000000001,74.89,74.36,74.45,74.32000000000001,74.46,74.61999999999999,74.78000000000002,74.92999999999998,75.25999999999999,75.71000000000002,76.4,76.92,76.98,77.03,77.02000000000001,77.07000000000002,77.09,77.05999999999999,76.85999999999999,76.62999999999998,76.72,76.72999999999998,76.42999999999998,76.26,76.08999999999999,75.74,75.42999999999998,75.41999999999999,75.54999999999998,75.69999999999999,75.62,75.75,75.64,75.84999999999998],"color":"green"},{"name":"anthropic","data":[25.94,25.95,25.680000000000003,26.190000000000005,26.140000000000004,26.66,26.550000000000004,26.669999999999998,26.54,26.379999999999995,26.21,26.070000000000004,25.71,25.28,24.599999999999998,24.09,24.029999999999998,23.95,23.980000000000004,23.900000000000002,23.900000000000002,23.949999999999996,24.139999999999997,24.380000000000003,24.299999999999997,24.269999999999996,24.56,24.720000000000002,24.92,25.249999999999996,25.58,25.57,25.45,25.299999999999997,25.349999999999998,25.230000000000004,25.35,25.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
