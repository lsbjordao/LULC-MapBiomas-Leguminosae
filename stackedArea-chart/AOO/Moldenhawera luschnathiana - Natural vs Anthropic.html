<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.36000000000001,69.97000000000001,71.36,70.52000000000001,69.83,68.78999999999999,68.75,68.48,67.54,66.99999999999999,66.84,66.7,65.63000000000001,65.52000000000001,64.86,63.75000000000001,63.470000000000006,63.07,62.589999999999996,61.60000000000001,60.199999999999996,60.06,60.86,61.68999999999998,62.139999999999986,62.269999999999996,62.1,62.31,62.17999999999999,62.529999999999994,62.65,62.53,61.900000000000006,62.59,62.41,62.07,61.440000000000005,62.059999999999995],"color":"green"},{"name":"anthropic","data":[23.08,23.720000000000002,22.34,23.209999999999997,23.980000000000004,25.069999999999997,25.090000000000003,25.340000000000003,26.28,26.84,26.999999999999996,27.14,28.22,28.28,28.9,30.040000000000003,30.310000000000002,30.709999999999997,31.2,32.230000000000004,33.660000000000004,33.82,33.03,32.160000000000004,31.72,31.560000000000002,31.76,31.57,31.75,31.39,31.32,31.46,31.89,31.21,31.37,31.71,32.26,31.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
