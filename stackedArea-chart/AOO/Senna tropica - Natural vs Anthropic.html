<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.20999999999999,58.550000000000004,58.29,58.18000000000001,58.199999999999996,58.21999999999999,58.3,58.559999999999995,59.11,59.60999999999999,59.72,60.120000000000005,60.349999999999994,60.55,60.74000000000001,60.839999999999996,60.88,61.1,61.220000000000006,61.330000000000005,61.3,61.550000000000004,61.540000000000006,61.62,61.62,61.510000000000005,61.470000000000006,61.52,61.669999999999995,61.9,62.18000000000001,62.34000000000001,62.550000000000004,62.61000000000001,62.79000000000001,62.910000000000004,63.150000000000006,63.27000000000002],"color":"green"},{"name":"anthropic","data":[44.779999999999994,44.43000000000001,44.67,44.8,44.79,44.75,44.669999999999995,44.43,43.85000000000001,43.37,43.24,42.86,42.66,42.43,42.26,42.129999999999995,42.1,41.88999999999999,41.76,41.66,41.68,41.419999999999995,41.459999999999994,41.39,41.36000000000001,41.489999999999995,41.50000000000001,41.46,41.309999999999995,41.08,40.8,40.66,40.44,40.37,40.19,40.07,39.84,39.709999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
