<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.11999999999998,59.37,59.48,59.48,59.46999999999999,59.33999999999998,59.38999999999999,59.42999999999999,59.61,59.95,59.88999999999999,60.00000000000001,59.99,60.080000000000005,59.93,60.190000000000005,60.330000000000005,60.26,59.989999999999995,59.88999999999999,59.72,59.86000000000001,59.82,59.75000000000001,59.74000000000001,59.82,59.99000000000001,60.150000000000006,60.190000000000005,60.150000000000006,60.31000000000002,60.35000000000001,60.46,60.58999999999999,60.45,60.52,60.56,60.56000000000001],"color":"green"},{"name":"anthropic","data":[45.54,45.29,45.17999999999999,45.19,45.22,45.34,45.27,45.22999999999999,45.04999999999999,44.7,44.77,44.669999999999995,44.7,44.59,44.74,44.480000000000004,44.32,44.45999999999999,44.68,44.769999999999996,44.94,44.81,44.839999999999996,44.92,44.92,44.83,44.69,44.529999999999994,44.48,44.529999999999994,44.36999999999999,44.32000000000001,44.18000000000001,44.06,44.20000000000002,44.17000000000001,44.13,44.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
