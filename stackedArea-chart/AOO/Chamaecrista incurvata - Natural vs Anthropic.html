<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.06,40.59,40.81,41.010000000000005,40.96,41.03,40.94,40.88,41.29,41.3,41.400000000000006,41.35000000000001,41.640000000000015,41.73,41.910000000000004,41.910000000000004,41.800000000000004,41.85,41.82000000000001,42.150000000000006,42.190000000000005,42.4,42.480000000000004,42.59,42.59,42.82,42.96,43.230000000000004,43.46,43.59,43.71,43.9,43.89000000000001,44.1,44.16,44.300000000000004,44.5,44.760000000000005],"color":"green"},{"name":"anthropic","data":[60.01,60.48000000000001,60.29,60.05,60.11000000000001,60.03,60.11000000000001,60.20000000000001,59.78,59.76000000000001,59.650000000000006,59.72,59.42,59.330000000000005,59.14000000000001,59.160000000000004,59.27000000000001,59.22,59.240000000000016,58.89000000000001,58.88000000000001,58.650000000000006,58.589999999999996,58.49,58.480000000000004,58.25,58.099999999999994,57.830000000000005,57.60999999999999,57.5,57.35,57.17000000000001,57.20000000000001,56.97,56.89,56.760000000000005,56.559999999999995,56.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
