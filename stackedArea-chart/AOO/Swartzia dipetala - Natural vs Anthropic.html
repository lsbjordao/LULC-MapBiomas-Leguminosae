<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.57,66.78999999999999,65.52999999999999,64.59,64,63.98,64.16,64.22,64.25,63.830000000000005,63.9,63.719999999999985,63.57000000000001,63.20000000000001,62.92000000000001,62.54,62.57,62.40000000000001,62.800000000000004,63.010000000000005,62.6,62.779999999999994,62.959999999999994,62.93000000000001,63.49999999999999,63.60000000000001,63.69,63.65,62.86,62.36,62.36,62.040000000000006,61.53000000000001,61.75000000000001,62.050000000000004,62.4,60.47999999999999,61.66],"color":"green"},{"name":"anthropic","data":[18.25,19.36,20.67,21.62,22.32,22.42,22.22,22.15,22.130000000000003,22.5,22.41,22.6,22.71,23.020000000000003,23.240000000000002,23.560000000000002,23.5,23.75,23.35,23.13,23.56,23.460000000000004,23.210000000000004,23.27,22.709999999999997,22.55,22.44,22.5,23.319999999999997,23.900000000000002,24.03,24.5,25.12,24.900000000000002,24.75,24.5,26.430000000000003,25],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
