<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.769999999999996,36.43,36.27,35.79,35.86,35.82,35.57,35.68000000000001,36.339999999999996,36.65,37.16,37.95,38.01,38.65,39.43999999999999,39.99,40.57,41.14,41.379999999999995,41.38999999999999,41.84,42.19,42.45,42.8,42.82999999999999,43.15,43.28999999999999,43.519999999999996,43.76,44.03999999999999,44.31999999999999,44.64000000000001,44.96,45.11,45.62,45.61,45.62,45.98000000000001],"color":"green"},{"name":"anthropic","data":[63.92,64.28,64.45,64.9,64.83,64.9,65.12,65.04,64.36,64.07000000000001,63.54,62.76,62.68999999999999,62.059999999999995,61.279999999999994,60.709999999999994,60.11999999999999,59.56,59.34,59.300000000000004,58.85,58.509999999999984,58.25999999999999,57.910000000000004,57.85,57.550000000000004,57.410000000000004,57.18,56.94000000000001,56.67,56.36000000000001,56.06,55.739999999999995,55.580000000000005,55.089999999999996,55.07,55.08,54.739999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
