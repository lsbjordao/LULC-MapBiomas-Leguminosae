<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.26,43.620000000000005,43.2,43.08,42.86,42.91,42.64,42.74,42.72,43.21,43.03,42.879999999999995,42.82,43.019999999999996,43.650000000000006,43.96,44.02,43.800000000000004,44.22,44.42,44.69,44.97,45.16,45.30000000000001,45.46,45.620000000000005,45.77,45.92,46.160000000000004,46.31,46.480000000000004,46.55,46.519999999999996,46.41,46.36000000000001,46.49,46.440000000000005,46.46],"color":"green"},{"name":"anthropic","data":[57.589999999999996,57.24,57.650000000000006,57.77,57.98,57.920000000000016,58.210000000000015,58.120000000000005,58.14000000000001,57.64,57.85,57.96,58.01999999999999,57.84,57.21999999999999,56.89,56.82,57.03999999999999,56.65,56.449999999999996,56.160000000000004,55.900000000000006,55.71000000000001,55.56000000000001,55.42,55.24,55.08,54.93000000000001,54.69,54.540000000000006,54.38,54.300000000000004,54.33,54.44,54.5,54.379999999999995,54.42,54.38999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
