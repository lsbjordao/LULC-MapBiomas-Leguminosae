<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.58000000000001,66.17,65.42,64.88,64.22,63.89,63.63999999999999,63.33,63.15,63.10000000000001,62.96000000000001,62.59000000000001,62.379999999999995,61.99,61.489999999999995,60.91999999999999,60.57,60.26,59.89,59.82,59.690000000000005,59.65,59.57,59.59,59.589999999999996,59.56999999999999,59.49999999999999,59.38,59.11,58.95,58.86000000000001,58.81,58.75,58.77,58.71999999999999,58.71999999999999,58.669999999999995,58.56999999999999],"color":"green"},{"name":"anthropic","data":[40.32,40.72,41.46,41.98,42.68000000000001,43.01,43.230000000000004,43.54,43.739999999999995,43.78999999999999,43.91,44.29,44.52,44.89,45.36,45.99,46.32,46.60999999999999,46.97,47.06000000000001,47.190000000000005,47.22,47.33,47.300000000000004,47.28999999999999,47.330000000000005,47.39999999999999,47.50000000000001,47.78999999999999,47.92,48.00000000000001,48.06000000000001,48.12000000000001,48.09,48.169999999999995,48.150000000000006,48.23,48.309999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
