<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.84,81.11999999999999,81.38,80.53000000000002,80.58,78.69,78.68,78.61999999999999,78.89999999999999,78.38999999999999,77.61999999999999,76.97999999999999,76.01,75.21,74.52,73.80000000000001,73.91000000000001,73.25000000000001,73.69000000000001,73.97000000000003,73.87000000000003,73.72000000000001,73.55000000000001,73.52000000000001,73.58,73.62,73.62,73.38000000000001,73.58000000000001,73.69000000000001,73.80000000000001,74.16000000000001,74.14000000000001,74.32000000000001,74.56000000000002,74.72000000000001,74.75999999999999,74.58000000000001],"color":"green"},{"name":"anthropic","data":[18.84,18.56,18.3,19.15,19.1,20.98,20.990000000000002,21.05,20.78,21.299999999999997,22.07,22.699999999999996,23.67,24.47,25.160000000000004,25.880000000000003,25.78,26.42,25.99,25.71,25.800000000000004,25.96,26.13,26.15,26.11,26.08,26.05,26.3,26.1,25.99,25.88,25.53,25.53,25.35,25.119999999999997,24.95,24.93,25.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
