<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.71,60.470000000000006,57.14000000000001,53.79,51.99,50.56,48.67999999999999,46.49,43.78000000000001,43.470000000000006,43.839999999999996,45.13,51.51,54.699999999999996,58.190000000000005,59.540000000000006,60.61,61.06,61.07,62.35,63.71,64.31,63.31000000000001,63.45000000000001,64.63999999999999,67.69999999999999,68.71,69.75000000000001,70.21999999999998,70.04999999999998,70.38000000000001,69.65,69.61999999999999,67.23,67.85000000000001,67.86,67.77,67.48],"color":"green"},{"name":"anthropic","data":[38.89,39.120000000000005,42.46,45.81,47.61,49.050000000000004,50.94,53.120000000000005,55.83,56.13000000000001,55.76,54.47,48.09,44.89,41.41,40.07000000000001,38.99,38.55,38.53,37.25,35.900000000000006,35.279999999999994,36.29,36.15,34.96,31.889999999999997,30.88,29.85,29.389999999999997,29.550000000000004,29.23,29.939999999999998,29.989999999999995,32.379999999999995,31.75,31.73,31.830000000000002,32.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
