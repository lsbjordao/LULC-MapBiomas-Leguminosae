<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.88,62.95000000000001,62.5,61.34,60.35,59.449999999999996,59.16,58.27,57.88000000000001,57.78000000000001,58.389999999999986,59.290000000000006,60,60.63999999999999,61.39999999999999,62.50999999999999,62.230000000000004,62.260000000000005,62.38,62.26,62.41,62.160000000000004,61.67,61.33,60.35000000000001,59.730000000000004,59.88999999999999,59.75000000000001,59.96000000000001,60.5,61.35999999999999,61.519999999999996,61.46000000000001,61.02,61.06,61.07,61.15,61.419999999999995],"color":"green"},{"name":"anthropic","data":[38.76,38.71000000000001,39.160000000000004,40.300000000000004,41.28999999999999,42.18,42.47,43.370000000000005,43.78,43.87,43.26,42.36,41.65,41.01,40.239999999999995,39.12,39.42,39.379999999999995,39.26,39.400000000000006,39.25,39.49,39.970000000000006,40.31,41.300000000000004,41.910000000000004,41.76000000000001,41.89,41.690000000000005,41.13999999999999,40.3,40.13999999999999,40.209999999999994,40.629999999999995,40.57999999999999,40.58,40.49999999999999,40.22999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
