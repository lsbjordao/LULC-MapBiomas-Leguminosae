<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.42,64.23,63.510000000000005,63.35,63.13,62.650000000000006,62.62,62.54999999999999,62.47,62.88999999999999,63.000000000000014,63.480000000000004,63.89,63.93000000000001,63.96,64.22000000000001,64.27,64.3,64.22000000000001,63.720000000000006,63.35999999999999,63.15,62.71999999999999,62.61000000000001,62.169999999999995,62.029999999999994,62.42999999999999,62.19999999999999,61.99000000000001,62.12,62.03,62.15,62.28000000000001,62.34,62.25,62.220000000000006,62,61.67],"color":"green"},{"name":"anthropic","data":[34.720000000000006,34.9,35.620000000000005,35.76,36.01,36.489999999999995,36.52,36.58,36.68000000000001,36.23,36.14,35.660000000000004,35.239999999999995,35.199999999999996,35.17999999999999,34.93,34.870000000000005,34.84,34.93,35.43,35.78,35.980000000000004,36.42000000000001,36.52,36.97000000000001,37.11000000000001,36.71,36.96,37.16,37.01,37.11,36.98,36.86000000000001,36.79999999999999,36.870000000000005,36.910000000000004,37.13,37.45],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
