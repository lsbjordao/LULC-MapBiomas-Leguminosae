<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.74999999999999,47.15999999999999,46.959999999999994,46.58,45.88,45.449999999999996,44.8,43.70000000000001,42.990000000000016,43.40000000000001,42.25,43.470000000000006,43.47,43.16000000000001,43.019999999999996,42.78,42.58,42.51,42.54,42.519999999999996,42.629999999999995,42.559999999999995,42.27,44.1,44.96999999999999,44.980000000000004,45,44.870000000000005,44.4,43.540000000000006,42.910000000000004,42.650000000000006,43.03,42.839999999999996,42.87999999999999,42.690000000000005,42.800000000000004,42.940000000000005],"color":"green"},{"name":"anthropic","data":[47.33,47.89,48.099999999999994,48.47,49.20000000000001,49.599999999999994,50.24,51.39,52.089999999999996,51.67,52.83,51.589999999999996,51.580000000000005,51.910000000000004,52.04999999999999,52.279999999999994,52.47,52.58,52.519999999999996,52.53,52.42999999999999,52.510000000000005,52.79,50.970000000000006,50.09,50.07000000000001,50.059999999999995,50.199999999999996,50.65,51.53,52.15,52.25,52.029999999999994,52.16,52.19,52.37,52.26000000000001,52.120000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
