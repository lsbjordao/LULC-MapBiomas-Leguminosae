<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.29,50.24,50.27,50.26,50.13,50.150000000000006,49.98,50.18000000000001,50.790000000000006,51.46000000000001,51.980000000000004,52.35,52.67,52.91,53.67,54.260000000000005,54.56,55.010000000000005,55.3,55.53,55.879999999999995,56.39,56.78,57.13,57.61,58.18000000000001,58.64000000000001,59.010000000000005,59.65,60.190000000000005,60.85,61.31000000000001,61.63,61.86,61.89999999999999,61.99,62.13999999999999,62.480000000000004],"color":"green"},{"name":"anthropic","data":[54.55,54.59000000000001,54.550000000000004,54.59,54.730000000000004,54.75,54.9,54.710000000000015,54.089999999999996,53.41000000000001,52.91,52.53000000000001,52.2,51.98,51.220000000000006,50.629999999999995,50.300000000000004,49.86999999999999,49.559999999999995,49.35999999999999,49.01,48.52,48.120000000000005,47.769999999999996,47.31,46.739999999999995,46.28000000000001,45.89,45.25,44.730000000000004,44.089999999999996,43.629999999999995,43.29,43.06999999999999,43.04,42.94,42.79,42.45000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
