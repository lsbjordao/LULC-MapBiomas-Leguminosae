<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.599999999999994,39.13,42.07,41.41,44.44,44.60999999999999,44.86,45.13,45.63,45.98,45.339999999999996,45.489999999999995,45.51,46.52,47.52,47.949999999999996,49.019999999999996,48.89,49.59,50.169999999999995,50.449999999999996,51.22,51.879999999999995,51.88999999999999,51.92,52.7,52.11,52.61,52.82999999999999,52.74,52.9,52.90999999999999,53.3,53.519999999999996,53.81999999999999,53.9,53.97,54.39],"color":"green"},{"name":"anthropic","data":[63.2,62.660000000000004,59.72,60.379999999999995,57.339999999999996,57.17,56.93,56.65,56.16,55.800000000000004,56.45,56.3,56.28,55.260000000000005,54.27,53.84,52.769999999999996,52.89,52.2,51.62,51.34,50.56,49.91,49.91,49.87,49.089999999999996,49.67,49.18000000000001,48.96,49.05,48.900000000000006,48.870000000000005,48.48,48.269999999999996,47.97,47.89,47.81,47.4],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
