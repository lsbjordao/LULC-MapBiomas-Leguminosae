<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.56999999999999,36.68,36.099999999999994,35.37,34.96,34.769999999999996,34.61,34.42,34.28,34.190000000000005,34.11000000000001,34.14,33.96,33.78,33.52,33.209999999999994,32.85,32.64,32.5,32.58,32.60000000000001,32.650000000000006,32.7,32.76,32.85,32.910000000000004,32.81,32.59,32.45000000000001,32.39,32.440000000000005,32.68,32.730000000000004,32.870000000000005,32.940000000000005,32.900000000000006,33.02,33.28999999999999],"color":"green"},{"name":"anthropic","data":[70.19,71.11999999999999,71.68,72.41,72.83999999999999,73.02999999999997,73.18,73.37000000000002,73.51000000000002,73.59000000000002,73.69000000000003,73.65000000000002,73.85000000000001,74.03000000000002,74.26,74.57,74.92000000000003,75.15000000000002,75.25000000000001,75.20000000000003,75.2,75.13999999999999,75.10000000000002,75.06,74.95,74.89999999999999,75.01,75.19,75.33,75.40000000000002,75.32,75.12,75.08000000000001,74.93,74.86999999999999,74.9,74.80000000000001,74.52000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
