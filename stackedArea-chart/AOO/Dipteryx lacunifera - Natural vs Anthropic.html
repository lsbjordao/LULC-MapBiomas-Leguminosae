<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.1,88.98,88.56,88.43,88.27000000000002,88.03,87.78999999999999,87.52,87.36999999999999,87.09000000000002,86.95,86.80000000000001,86.9,86.77999999999999,86.53,86.45000000000002,86.18999999999998,86.11999999999999,86.09,86.08,85.87,85.68,85.39,84.93,84.97999999999999,85.2,85.16,84.91999999999997,84.18999999999998,84.04,83.74000000000001,83.75999999999999,83.44,82.96999999999998,82.41999999999999,81.81000000000002,81.12999999999998,80.84],"color":"green"},{"name":"anthropic","data":[19.78,19.94,20.34,20.48,20.64,20.88,21.109999999999996,21.419999999999998,21.570000000000004,21.849999999999998,21.980000000000004,22.12,22.02,22.16,22.37,22.460000000000004,22.72,22.790000000000003,22.810000000000002,22.849999999999998,23.050000000000004,23.23,23.52,24.000000000000004,23.93,23.7,23.749999999999996,23.98,24.720000000000002,24.88,25.179999999999996,25.14,25.430000000000007,25.92,26.46,27.07,27.740000000000002,28.040000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
