<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.58000000000001,51.90000000000001,52.55999999999999,52.160000000000004,52.36,52.43,52.64,52.699999999999996,52.260000000000005,51.92999999999999,51.68,51.239999999999995,51.8,51.73,52.24999999999999,52.220000000000006,52.17,52.59,52.760000000000005,53,52.839999999999996,52.849999999999994,52.989999999999995,53.14000000000001,53.49999999999999,53.419999999999995,53.54,53.78,53.64999999999999,53.11000000000002,53.629999999999995,53.709999999999994,53.629999999999995,53.99999999999999,54.120000000000005,54.3,54.300000000000004,54.29999999999999],"color":"green"},{"name":"anthropic","data":[49.980000000000004,49.67999999999999,49.02,49.42,49.220000000000006,49.18,48.949999999999996,48.9,49.33,49.68,49.91,50.38000000000001,49.79,49.85999999999999,49.36,49.379999999999995,49.43,49.02,48.84,48.61000000000001,48.74,48.74,48.580000000000005,48.440000000000005,48.089999999999996,48.15,48.07000000000001,47.81000000000001,47.919999999999995,48.48,47.96,47.89,47.980000000000004,47.58999999999999,47.46000000000001,47.3,47.29,47.290000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
