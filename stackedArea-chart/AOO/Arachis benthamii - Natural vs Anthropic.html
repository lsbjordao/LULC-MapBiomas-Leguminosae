<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.050000000000004,27.57,26.29,26.01,25.400000000000002,24.83,24.179999999999996,24.359999999999996,24.709999999999997,23.48,22.450000000000003,22.560000000000002,22.509999999999998,21.939999999999998,21.67,21.490000000000002,21.29,21.240000000000002,20.61,20.099999999999998,19.959999999999997,19.3,19.009999999999998,19.060000000000002,19.080000000000002,19.14,19.28,19.48,19.35,19.309999999999995,19.29,19.29,19.24,19.15,19.12,19.04,18.979999999999997,19.4],"color":"green"},{"name":"anthropic","data":[72.88000000000001,74.36,75.67000000000002,75.92999999999999,76.51,77.09999999999998,77.75,77.57000000000001,77.24000000000001,78.46,79.49,79.36,79.41000000000001,80,80.27000000000001,80.43,80.64,80.69,81.33999999999999,81.82,81.94999999999999,82.64999999999999,82.92999999999999,82.86,82.84,82.78,82.65,82.47999999999999,82.57,82.61,82.64,82.64,82.69999999999999,82.75999999999999,82.82,82.9,82.94000000000001,82.52999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
