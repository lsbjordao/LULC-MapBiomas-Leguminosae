<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.73,94.3,94.38,91.64,89.98,88.18,86.99,86.49,85.7,86.69,86.83999999999999,87.26,86.84,86.63,86.8,80.66,76.32000000000001,75.05,73.41,72.91,72.89000000000001,71.86999999999999,71.72999999999999,71.8,71.93,71.69,71.55,71.55000000000001,71.47,71.57,71.68,71.71000000000001,71.89999999999999,71.91,71.95,71.99999999999999,71.99,71.8],"color":"green"},{"name":"anthropic","data":[4.98,5.430000000000001,5.35,8.08,9.75,11.56,12.739999999999998,13.23,14.030000000000001,13.03,12.879999999999999,12.46,12.89,13.09,12.93,19.07,23.41,24.68,26.32,26.810000000000002,26.840000000000003,27.849999999999998,27.990000000000002,27.93,27.78,28.03,28.169999999999998,28.17,28.259999999999998,28.159999999999997,28.050000000000004,28.02,27.82,27.83,27.78,27.72,27.740000000000002,27.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
