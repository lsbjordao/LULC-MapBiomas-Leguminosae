<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.90999999999998,87.77,87.88,88.27,88.06,89.11000000000001,89.71,88.97999999999998,88.97,91.55999999999999,93.76,93.81999999999998,93.36999999999998,93.42999999999999,93.73,94.28999999999999,94.86,94.9,93.53,92.47,92.30999999999999,92.04,91.81,91.65,91.36999999999999,91.6,91.83,92.06,92.33,92.39,92.14999999999999,92.25,92.33,92.44000000000001,92.55,92.57,93.17999999999999,92.75000000000001],"color":"green"},{"name":"anthropic","data":[19.759999999999998,19.870000000000005,19.779999999999998,19.38,19.580000000000002,18.56,17.95,18.67,18.69,16.09,13.899999999999999,13.83,14.290000000000001,14.220000000000002,13.93,13.38,12.79,12.750000000000002,14.14,15.18,15.350000000000001,15.629999999999999,15.84,16.02,16.28,16.07,15.829999999999998,15.580000000000002,15.32,15.25,15.5,15.399999999999999,15.34,15.21,15.100000000000001,15.09,14.469999999999999,14.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
