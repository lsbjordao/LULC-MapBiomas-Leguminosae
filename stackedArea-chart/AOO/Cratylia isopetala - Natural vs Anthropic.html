<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.080000000000005,48.24,48.150000000000006,48.040000000000006,47.93,47.269999999999996,47.410000000000004,47.49,47.57000000000001,47.769999999999996,47.779999999999994,47.900000000000006,47.61,47.529999999999994,47.46999999999999,47.23,47.120000000000005,47.010000000000005,47.17999999999999,47.08,46.96,46.96,47.06000000000001,47.21,47.14,47.25,47.28,47.32,47.279999999999994,46.87999999999999,46.5,46.53000000000001,46.539999999999985,46.6,46.52999999999999,46.339999999999996,46.37,46.11000000000001],"color":"green"},{"name":"anthropic","data":[54.67999999999999,54.50000000000001,54.6,54.72,54.82,55.470000000000006,55.32,55.260000000000005,55.150000000000006,54.96,54.98,54.83000000000001,55.14,55.220000000000006,55.29000000000001,55.51,55.599999999999994,55.71999999999999,55.58,55.669999999999995,55.779999999999994,55.8,55.69,55.54,55.6,55.489999999999995,55.45,55.419999999999995,55.459999999999994,55.88,56.22999999999999,56.19999999999999,56.2,56.14,56.22,56.400000000000006,56.38,56.63000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
