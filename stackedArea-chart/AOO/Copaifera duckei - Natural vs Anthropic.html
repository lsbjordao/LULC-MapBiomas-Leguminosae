<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.39,71.84,71.08000000000001,70.55,70.01,70.05,70.55,69.85999999999999,68.81,68.26000000000002,68.89999999999999,68.96,68.59999999999998,66.89,66.24,65.4,64.67,63.76,62.01,60.910000000000004,60.470000000000006,60.42,60.22000000000001,59.96,59.47,59.13999999999999,58.88,58.79999999999999,58.72,58.89999999999999,58.489999999999995,57.81,57.279999999999994,56.910000000000004,57.01,56.83,56.42,55.449999999999996],"color":"green"},{"name":"anthropic","data":[29.349999999999998,29.91,30.68,31.220000000000002,31.740000000000002,31.7,31.21,31.88,32.96,33.48,32.85,32.79,33.160000000000004,34.88,35.510000000000005,36.35000000000001,37.080000000000005,37.99000000000001,39.74000000000001,40.84000000000001,41.28,41.35,41.540000000000006,41.79,42.290000000000006,42.61,42.87000000000001,42.94000000000001,43.01,42.84000000000001,43.26000000000001,43.95000000000001,44.47,44.839999999999996,44.75000000000001,44.910000000000004,45.34000000000001,46.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
