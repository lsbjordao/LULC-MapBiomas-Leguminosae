<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.25000000000001,70.87000000000002,70.89000000000001,70.83,70.95,70.87,70.93,71.18,71.12,71.05,71.27,71.67999999999999,71.86,71.66,71.44,70.89,70.69999999999999,70.13,69.31,68.96000000000001,69.16000000000001,68.76,68.52,68.76,68.71,68.57,68.25999999999999,68.16,67.84000000000002,67.81,67.67,67.39,67.11000000000001,66.94000000000001,66.61,66.33,66.07,65.8],"color":"green"},{"name":"anthropic","data":[28.990000000000002,29.34,29.330000000000002,29.409999999999997,29.279999999999998,29.36,29.299999999999997,29.060000000000002,29.12,29.18,28.98,28.54,28.380000000000003,28.57,28.79,29.35,29.54,30.08,30.91,31.26,31.08,31.48,31.700000000000003,31.450000000000003,31.53,31.669999999999998,31.95,32.06,32.4,32.43000000000001,32.58,32.85,33.129999999999995,33.3,33.62,33.900000000000006,34.17000000000001,34.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
