<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.23999999999998,96.94999999999997,98.39999999999999,98.47999999999999,98.84,98.98,98.82,98.22999999999998,98.31,96.82,96.49999999999999,95.70999999999998,96.82,95.77,94.75999999999999,95.07999999999998,95.19999999999999,95.02999999999999,95.14999999999999,94.56999999999998,94.27,93.74,93.62,92.88,92.94999999999999,93.25999999999998,92.79999999999997,92.4,92.53999999999999,93.69999999999999,93.37,93.21,93.63,93.89999999999998,93.75999999999999,93.86999999999999,94.22999999999999,83.71999999999998],"color":"green"},{"name":"anthropic","data":[5.77,3.06,1.6300000000000001,1.53,1.1800000000000002,1.04,1.19,1.78,1.71,3.1999999999999997,3.51,4.31,3.19,4.24,5.25,4.94,4.83,4.989999999999999,4.869999999999999,5.4399999999999995,5.75,6.2700000000000005,6.3999999999999995,7.14,7.0600000000000005,6.76,7.21,7.609999999999999,7.47,6.3100000000000005,6.63,6.800000000000001,6.380000000000001,6.11,6.26,6.140000000000001,5.78,16.310000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
