<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.67,83.27999999999999,82.42,81.66,80.7,81.43999999999998,81.60000000000001,81.62,81.71000000000001,81.74,81.97999999999999,82.1,81.61,81.85000000000001,81.71,81.43,80.97999999999999,80.50999999999999,80.43999999999998,80.24,80.12,80.39999999999999,80.86,81.48,81.63,82.09999999999998,81.77,82.27000000000001,82.53999999999999,82.57,82.63,82.64999999999999,82.58,82.89000000000001,82.82999999999998,82.57000000000001,82.86,82.80999999999999],"color":"green"},{"name":"anthropic","data":[17.1,18.490000000000002,19.36,20.1,21.069999999999997,20.33,20.189999999999998,20.15,20.06,20.029999999999998,19.789999999999996,19.669999999999998,20.150000000000002,19.919999999999998,20.05,20.330000000000002,20.79,21.279999999999998,21.330000000000002,21.54,21.64,21.36,20.929999999999996,20.289999999999996,20.15,19.669999999999998,20.009999999999998,19.51,19.220000000000002,19.2,19.14,19.119999999999997,19.2,18.88,18.939999999999998,19.189999999999998,18.919999999999998,18.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
