<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.849999999999994,59.42,60.35999999999999,60.35,59.510000000000005,58.73,58.71000000000001,58.51,58.57,59.57,59.760000000000005,59.93000000000001,60.97,60.78000000000001,60.52,60.24000000000001,59.45,58.84,57.99,57.75000000000001,57.41000000000001,56.85,57.43000000000001,57.569999999999986,57.35000000000001,57.66,57.65,57.18,57.13,56.43000000000001,56.190000000000005,56.37,56.33,56.31000000000001,56.309999999999995,56.190000000000005,56.32,56.44],"color":"green"},{"name":"anthropic","data":[39.69,40.12,39.169999999999995,39.199999999999996,40.029999999999994,40.83,40.83,41.03,40.94,39.96,39.77,39.599999999999994,38.56999999999999,38.77,39.04,39.29,40.089999999999996,40.7,41.55,41.790000000000006,42.15,42.690000000000005,42.12,41.97,42.2,41.879999999999995,41.88,42.37,42.43,43.11,43.35000000000001,43.169999999999995,43.230000000000004,43.230000000000004,43.23,43.35999999999999,43.199999999999996,43.089999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
