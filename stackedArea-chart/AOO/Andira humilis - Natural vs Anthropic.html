<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.32,53.06,52.75999999999999,52.18,51.98000000000001,51.71000000000001,51.699999999999996,51.59000000000001,51.5,51.52,51.400000000000006,51.379999999999995,51.61000000000001,51.21,51.06000000000001,50.88,51.110000000000014,51.050000000000004,51.06000000000001,50.96999999999999,51.05,51.04,50.88,50.81000000000001,50.74,50.379999999999995,50.13,49.9,49.5,48.949999999999996,48.89000000000001,48.92,48.86,49.470000000000006,49.449999999999996,49.309999999999995,49.15,49.309999999999995],"color":"green"},{"name":"anthropic","data":[49.87,50.17,50.49,51.100000000000016,51.32,51.58,51.59,51.690000000000005,51.81000000000001,51.80000000000001,51.92000000000001,51.91000000000002,51.72,52.06000000000001,52.199999999999996,52.37999999999999,52.12999999999999,52.19,52.199999999999996,52.300000000000004,52.17,52.21000000000001,52.35000000000001,52.440000000000005,52.52000000000001,52.93,53.18000000000001,53.42,53.85000000000001,54.39999999999999,54.46,54.41,54.459999999999994,53.86,53.91,54.05,54.21999999999999,54.04999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
