<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.62000000000002,87.46000000000001,87.22,86.44999999999999,85.80999999999999,84.88,84.58999999999999,84.57000000000001,84.12999999999998,83.55999999999999,83.64,83.53000000000002,84.55000000000001,84.91999999999999,86.15999999999998,86.57999999999998,86.15999999999998,85.36999999999999,84.69,84.09,83.82,83.29,83.41,84.47999999999999,84.38000000000001,84.97000000000001,85.57,83.31,82.97,82.09,81.44,83.32000000000001,83.48,83.30000000000001,82.16000000000001,81.80000000000001,81.99,81.82],"color":"green"},{"name":"anthropic","data":[12.83,12.98,13.21,13.98,14.629999999999999,15.569999999999999,15.84,15.870000000000001,16.31,16.88,16.79,16.91,15.9,15.53,14.269999999999998,13.85,14.28,15.06,15.75,16.34,16.62,17.16,17.04,15.95,16.07,15.47,14.870000000000001,17.13,17.48,18.349999999999998,18.99,17.14,16.979999999999997,17.15,18.27,18.64,18.45,18.619999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
