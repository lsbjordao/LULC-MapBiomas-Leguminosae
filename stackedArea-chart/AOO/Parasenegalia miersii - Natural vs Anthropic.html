<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.76,69.83999999999999,69.06000000000002,68.8,68.55000000000001,68.30999999999999,68.12,67.95000000000002,68.03000000000002,68.02000000000001,68.14,68.26000000000002,68.63,68.94,69.10000000000001,69.35,69.39000000000001,69.59,70.31,70.50000000000001,70.88000000000001,71.33,71.31,71.43,71.46,71.33000000000003,71.24000000000001,71.24,71.10000000000001,71.08,71.09,71.28,71.34,71.43,71.80000000000001,71.84000000000002,71.92000000000002,71.87],"color":"green"},{"name":"anthropic","data":[30.12,30.060000000000002,30.86,31.09,31.35,31.590000000000003,31.78,31.94,31.86,31.869999999999997,31.75,31.630000000000003,31.259999999999998,30.96,30.810000000000002,30.54,30.5,30.310000000000002,29.58,29.41,29.03,28.57,28.58,28.47,28.450000000000003,28.56,28.66,28.66,28.79,28.8,28.8,28.62,28.55,28.47,28.09,28.060000000000002,27.97,28.009999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
