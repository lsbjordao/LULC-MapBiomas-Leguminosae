<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.97,40.92999999999999,40.82,40.69,40.58,40.9,41.17,41.49999999999999,42,42.760000000000005,43.18,43.769999999999996,44.160000000000004,44.61,44.98,45.19000000000001,45.46,45.56,45.75000000000001,45.92999999999999,46.07,46.34,46.57,46.77000000000001,47.06,47.330000000000005,47.61,47.83999999999999,48.18,48.349999999999994,48.6,48.86000000000001,49.11000000000001,49.419999999999995,49.61999999999999,49.78999999999999,49.870000000000005,50.019999999999996],"color":"green"},{"name":"anthropic","data":[65.41000000000001,65.44000000000001,65.53999999999999,65.69000000000001,65.81000000000002,65.47000000000001,65.22,64.88,64.36999999999999,63.61999999999999,63.19999999999999,62.63,62.220000000000006,61.78000000000001,61.419999999999995,61.199999999999996,60.92999999999999,60.8,60.62,60.45000000000002,60.32999999999999,60.03,59.84,59.63000000000001,59.35000000000001,59.050000000000004,58.77000000000001,58.519999999999996,58.2,58.03000000000001,57.78,57.52000000000001,57.25000000000001,56.96,56.76,56.629999999999995,56.519999999999996,56.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
