<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.88999999999999,60.66000000000001,58.330000000000005,58.98,58.43,59.949999999999996,58.61,57.78,57.78999999999999,58.87,57.34,57.31999999999999,57.650000000000006,58.419999999999995,60.05,58.49,58.59000000000001,57.36,56.86000000000001,56.58,56.51,56.290000000000006,56.769999999999996,57.11,57.46999999999999,58.08,57.23,57.160000000000004,56.959999999999994,55.25,54.08,54.940000000000005,54.510000000000005,54.76,54.51,54.16,53.17,53.120000000000005],"color":"green"},{"name":"anthropic","data":[38.05,39.3,41.63999999999999,40.98,41.53000000000001,40.019999999999996,41.349999999999994,42.18,42.17999999999999,41.089999999999996,42.620000000000005,42.63,42.32,41.56,39.919999999999995,41.47,41.36,42.61999999999999,43.11999999999999,43.379999999999995,43.47,43.66,43.19,42.85,42.48,41.88,42.72999999999999,42.8,43.02,44.73,45.910000000000004,45.02,45.46999999999999,45.199999999999996,45.449999999999996,45.800000000000004,46.8,46.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
