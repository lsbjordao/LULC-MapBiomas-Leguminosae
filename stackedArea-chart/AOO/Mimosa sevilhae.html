                        width: w,
                        height: h,
                        animation: false

                    title: { text: '' },
                    xAxis: {

                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {

                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }

            drawChart();

        });
