<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.900000000000006,62.14,62.199999999999996,62.169999999999995,61.76000000000001,61.81,61.81999999999999,61.83,62.190000000000005,62.28999999999999,62.309999999999995,62.49999999999999,62.58999999999998,62.529999999999994,62.71999999999999,62.53000000000001,62.41,62.45,62.529999999999994,62.21,61.65,61.7,61.56999999999999,61.64,61.510000000000005,61.46,61.42,61.080000000000005,61.059999999999995,61.019999999999996,61.190000000000005,61.26,61.32,61.29,61.470000000000006,61.589999999999996,61.690000000000005,61.68],"color":"green"},{"name":"anthropic","data":[41.73,41.51,41.5,41.519999999999996,41.92,41.849999999999994,41.839999999999996,41.83000000000001,41.470000000000006,41.400000000000006,41.36000000000001,41.18,41.06,41.12,40.92,41.11,41.230000000000004,41.18,41.17000000000001,41.470000000000006,42.00999999999999,41.959999999999994,42.099999999999994,42.029999999999994,42.16,42.19,42.239999999999995,42.55,42.58,42.599999999999994,42.47,42.37999999999999,42.31,42.32,42.13999999999999,42.029999999999994,41.91999999999999,41.94],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
