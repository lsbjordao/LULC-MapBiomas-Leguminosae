<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.8,73.97,77.13,77.72000000000001,78.21999999999998,76.08000000000001,77.25999999999999,77.51,76.51,77.54,77.4,77.27999999999999,78.3,77.17,77.95999999999998,79.26999999999998,79.6,80.05,79.67,80.04,80.03999999999999,79.35000000000001,79.78000000000002,79.84,79.7,78.31,77.14999999999998,78.03999999999999,77.81999999999998,76.00999999999999,77.79,77.03999999999999,77.28000000000002,76.58,76.98,76.97,76.6,76.32000000000001],"color":"green"},{"name":"anthropic","data":[28.540000000000003,26.37,23.240000000000002,22.64,22.14,24.250000000000004,23.090000000000003,22.849999999999998,23.849999999999998,22.819999999999997,22.96,23.09,22.05,23.169999999999998,22.4,21.08,20.77,20.310000000000002,20.68,20.320000000000004,20.3,21,20.580000000000002,20.509999999999998,20.639999999999997,22.029999999999994,23.209999999999997,22.310000000000002,22.52,24.330000000000002,22.56,23.310000000000002,23.070000000000004,23.77,23.39,23.380000000000003,23.76,24.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
