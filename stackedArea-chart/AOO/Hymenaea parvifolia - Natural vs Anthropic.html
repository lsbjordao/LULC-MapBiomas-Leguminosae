<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.17999999999998,91.96000000000001,91.57000000000001,90.63000000000001,90.30999999999999,90.28,89.73,89.19,88.53,88.08,87.17,86.65000000000002,85.91000000000001,85.46,85.53,85.17,84.13,82.92000000000002,82.4,82.03,81.63,81.33000000000001,81.01,81.01000000000002,80.92,81.14999999999999,81.18999999999998,81.03,80.89999999999999,80.63000000000001,80.31,80.04000000000002,79.60999999999999,79.33999999999999,79.20999999999998,79.02,78.72999999999999,77.48000000000002],"color":"green"},{"name":"anthropic","data":[9.809999999999999,10.04,10.41,11.37,11.68,11.700000000000001,12.250000000000002,12.81,13.47,13.899999999999999,14.84,15.34,16.080000000000002,16.549999999999997,16.470000000000002,16.81,17.87,19.09,19.580000000000002,19.97,20.35,20.679999999999996,20.979999999999997,20.99,21.05,20.849999999999998,20.78,20.96,21.099999999999998,21.37,21.699999999999996,21.97,22.38,22.66,22.810000000000002,22.96,23.279999999999998,24.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
