<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.12,72.50999999999999,72.49000000000001,72.12,71.25,70.57999999999998,69.93000000000002,69.30000000000003,68.94,69.11,69.34,69.82000000000001,70.38,70.51999999999998,70.29,69.77,69.71000000000001,69.3,68.97,68.82999999999998,68.22999999999999,67.69999999999999,67.44000000000001,67.69,67.94,67.56,67.52999999999999,67.17,66.2,65.85000000000001,65.65,65.5,65.15,64.94999999999999,65.01,65.17,65.11,64.72000000000001],"color":"green"},{"name":"anthropic","data":[32.43,32.040000000000006,32.04,32.42000000000001,33.27,33.959999999999994,34.599999999999994,35.21,35.6,35.42999999999999,35.19,34.71,34.15,34.03000000000001,34.239999999999995,34.76,34.82999999999999,35.230000000000004,35.57000000000001,35.71,36.28999999999999,36.830000000000005,37.1,36.83,36.589999999999996,36.96000000000001,37.010000000000005,37.35,38.34,38.68,38.879999999999995,39.03999999999999,39.37,39.580000000000005,39.510000000000005,39.379999999999995,39.42999999999999,39.81999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
