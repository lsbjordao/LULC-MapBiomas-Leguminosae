<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.38,48.76,49.43,49.17000000000001,48.36,47.88999999999999,47.529999999999994,47.279999999999994,46.97999999999999,47.21999999999999,47.36999999999999,48.23,48.589999999999996,48.81999999999999,49.31,49.41,49.32,49.55,50.07999999999999,50.12,50.63,50.88,51.03,51.17000000000001,50.96999999999999,50.92999999999999,50.67999999999999,50.49,49.93999999999998,49.81,49.88,49.99999999999999,49.96,49.84,49.730000000000004,49.60999999999999,49.22,49.39999999999999],"color":"green"},{"name":"anthropic","data":[50.599999999999994,50.230000000000004,49.55,49.82,50.63,51.11,51.449999999999996,51.7,52.019999999999996,51.76,51.589999999999996,50.74,50.39,50.18,49.67999999999999,49.57,49.690000000000005,49.44,48.89,48.88,48.37,48.10999999999999,47.940000000000005,47.80000000000001,48.029999999999994,48.059999999999995,48.32,48.5,49.050000000000004,49.18,49.089999999999996,49,49.05,49.15,49.26,49.39,49.760000000000005,49.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
