<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.16,95.13999999999999,95.22,94.99999999999999,94.67999999999999,94.24,94.14999999999999,93.86,93.67,93.77,93.73,94.07000000000001,94.46000000000001,94.62,95.35000000000001,93.58,93.66000000000001,95.75,95.77000000000001,95.96,95.98,95.73,95.39,95.22,95.07000000000001,94.57,88.85000000000001,88.00000000000001,87.89999999999999,87.52999999999999,87.05,87.05000000000001,86.91000000000001,86.94999999999999,86.89999999999999,86.73,86.52,86.34],"color":"green"},{"name":"anthropic","data":[4.609999999999999,4.640000000000001,4.55,4.77,5.09,5.51,5.61,5.91,6.09,6.01,6.03,5.71,5.3100000000000005,5.16,4.41,6.199999999999999,6.109999999999999,4.0200000000000005,3.9800000000000004,3.8,3.78,4.04,4.390000000000001,4.55,4.6899999999999995,5.2,10.93,11.780000000000001,11.86,12.25,12.719999999999999,12.729999999999999,12.88,12.820000000000002,12.87,13.03,13.24,13.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
