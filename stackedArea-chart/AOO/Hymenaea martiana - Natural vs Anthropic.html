<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.96,61.36,60.42,59.77000000000001,59.489999999999995,59.32999999999999,59.510000000000005,59.510000000000005,59.36,59.66,59.39000000000001,59.24999999999999,59.28000000000001,58.959999999999994,58.720000000000006,58.419999999999995,58.2,58.25999999999999,58.30999999999999,58.180000000000014,58.15,57.92999999999999,57.690000000000005,57.82000000000001,57.81000000000001,57.87999999999999,57.76999999999999,57.620000000000005,57.279999999999994,56.790000000000006,56.42000000000001,56.420000000000016,56.290000000000006,56.44,56.21,56.06000000000001,56.050000000000004,56.34000000000001],"color":"green"},{"name":"anthropic","data":[45.269999999999996,45.870000000000005,46.800000000000004,47.46000000000001,47.74,47.89000000000001,47.720000000000006,47.750000000000014,47.89000000000001,47.59,47.830000000000005,47.980000000000004,47.94,48.26,48.52000000000001,48.81000000000001,49.05000000000001,48.96000000000001,48.9,49.040000000000006,49.07,49.3,49.52,49.39999999999999,49.43,49.36000000000001,49.45,49.63,49.93000000000001,50.44000000000001,50.800000000000004,50.830000000000005,50.96,50.79,51.02,51.190000000000005,51.169999999999995,50.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
