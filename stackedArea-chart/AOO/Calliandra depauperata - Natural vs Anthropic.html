<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.519999999999996,63.099999999999994,62.62999999999999,61.45,60.53999999999999,59.790000000000006,59.46000000000001,59.080000000000005,58.36999999999999,58.46000000000001,58.199999999999996,58.519999999999996,58.87999999999999,59.17,59.41,59.440000000000005,58.75,58.38999999999999,58.400000000000006,58.04,57.57,57.25,56.92,56.800000000000004,56.61,56.75,56.47,55.959999999999994,55.71000000000001,55.03999999999999,54.92,54.76,54.72000000000001,54.919999999999995,54.800000000000004,54.730000000000004,54.5,54.42],"color":"green"},{"name":"anthropic","data":[37.75,38.18,38.65,39.839999999999996,40.730000000000004,41.489999999999995,41.8,42.18,42.91,42.81,43.07000000000001,42.739999999999995,42.38,42.120000000000005,41.87,41.830000000000005,42.50000000000001,42.88,42.87,43.230000000000004,43.7,44.02,44.37,44.47,44.66,44.49999999999999,44.81000000000001,45.31000000000001,45.56,46.230000000000004,46.339999999999996,46.52,46.54,46.35,46.48,46.52000000000001,46.760000000000005,46.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
