<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.71000000000001,64.22999999999999,61.75,61.07000000000001,60.75,60.629999999999995,60.010000000000005,58.92,58.25,57.720000000000006,57.44,56.999999999999986,56.5,56.22,55.730000000000004,55.62,55.34,55.59,55.32,54.81,53.949999999999996,53.61999999999999,53.970000000000006,53.67,53.79,53.56,53.56,53.550000000000004,53.589999999999996,53.64,53.57999999999999,53.41,53.39000000000001,52.739999999999995,52.489999999999995,52.15,51.459999999999994,51.25],"color":"green"},{"name":"anthropic","data":[37.629999999999995,38.11,40.59,41.28,41.589999999999996,41.71,42.31999999999999,43.42000000000001,44.089999999999996,44.62,44.89,45.31999999999999,45.83,46.11,46.62,46.73,47.01,46.73,47.02,47.529999999999994,48.38999999999999,48.739999999999995,48.35999999999999,48.68,48.55,48.760000000000005,48.76999999999999,48.779999999999994,48.75,48.720000000000006,48.76,48.93,48.96,49.61,49.85,50.18,50.88999999999999,51.099999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
