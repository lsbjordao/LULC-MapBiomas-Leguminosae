<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.97,38.16000000000001,37.870000000000005,37.71,37.65999999999999,38.01,37.800000000000004,37.71000000000001,37.81000000000001,37.94,37.86999999999999,37.830000000000005,37.63,37.7,37.51,36.660000000000004,36.46,36.050000000000004,36.00000000000001,35.89000000000001,34.89,35.22,35.410000000000004,35.709999999999994,35.92,35.94,36.019999999999996,36.309999999999995,36.22999999999999,36.62,36.760000000000005,37.019999999999996,37.11999999999999,37.620000000000005,37.709999999999994,38.029999999999994,37.699999999999996,38.059999999999995],"color":"green"},{"name":"anthropic","data":[62.03999999999999,61.830000000000005,62.129999999999995,62.269999999999996,62.31999999999999,61.980000000000004,62.190000000000005,62.27,62.18,62.059999999999995,62.13,62.160000000000004,62.370000000000005,62.3,62.49,63.31,63.54,63.93,63.99,64.08000000000001,65.12,64.79,64.58,64.27,64.06,64.07,63.959999999999994,63.68,63.77,63.37,63.24000000000001,62.980000000000004,62.86,62.39,62.279999999999994,61.95000000000001,62.29,61.92000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
