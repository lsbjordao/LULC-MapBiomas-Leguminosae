<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.179999999999986,62.699999999999996,62.25,61.949999999999996,61.75000000000001,61.28,61.129999999999995,60.63,61,61.169999999999995,61.31999999999999,61.379999999999995,61.10999999999999,60.980000000000004,61.129999999999995,61.10999999999999,60.83,60.78999999999999,60.75000000000001,60.059999999999995,60.099999999999994,60.32,60.74,60.66,60.499999999999986,60.269999999999996,60.69,60.24999999999999,60.68999999999999,60.55,60.02000000000001,60.11000000000001,60.45,60.35,60.010000000000005,60.05000000000002,59.84,60.01],"color":"green"},{"name":"anthropic","data":[45.00999999999999,45.449999999999996,45.94,46.19,46.4,46.89000000000001,47.029999999999994,47.56,47.18,47.040000000000006,46.88,46.809999999999995,47.07,47.169999999999995,47.04999999999999,47.05000000000001,47.340000000000025,47.40000000000001,47.440000000000005,48.13000000000001,48.089999999999996,47.879999999999995,47.47,47.53999999999999,47.699999999999996,47.91000000000001,47.51,47.93,47.51,47.660000000000004,48.17000000000001,48.089999999999996,47.73999999999999,47.870000000000005,48.18000000000001,48.129999999999995,48.35000000000001,48.17000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
