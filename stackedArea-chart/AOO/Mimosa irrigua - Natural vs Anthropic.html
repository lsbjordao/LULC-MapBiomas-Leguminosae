<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.44000000000001,75.63000000000001,75.45,74.39999999999999,74.23,74.11999999999999,74.44,74,73.86000000000001,73.90999999999998,73.66,72.74999999999999,73.83,74.02,74.26,74.61999999999999,74.75999999999999,74.80000000000001,74.93,75.84,75.22000000000001,74.91999999999999,74.75999999999999,74.47,75,75.06,75.25000000000001,74.83,73.93,73.3,73.32000000000001,74.13,74.42999999999999,74.67,75.40000000000002,76.24,76.13,76.14999999999999],"color":"green"},{"name":"anthropic","data":[25.32,25.130000000000003,25.329999999999995,26.37,26.54,26.67,26.319999999999997,26.759999999999998,26.9,26.860000000000003,27.090000000000003,28.020000000000003,26.93,26.759999999999998,26.49,26.14,26.000000000000004,25.97,25.840000000000003,24.919999999999998,25.550000000000004,25.85,26.009999999999998,26.289999999999996,25.78,25.71,25.509999999999998,25.950000000000003,26.83,27.469999999999995,27.449999999999996,26.640000000000004,26.350000000000005,26.1,25.380000000000003,24.53,24.62,24.630000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
