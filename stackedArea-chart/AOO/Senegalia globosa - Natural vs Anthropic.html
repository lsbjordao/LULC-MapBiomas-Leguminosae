<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.12999999999998,74.06999999999998,73.97,72.96,72.48,71.58,71.1,70.61,70.32000000000001,70.15,70.49000000000001,70.41,72.13999999999999,72.42999999999999,72.89999999999999,73.3,73.05999999999999,72.65,72.55999999999999,72.75,72.14999999999999,72.11999999999999,72.12,72.22999999999999,72.63000000000001,73.11,72.89,72.83,72.15999999999998,71.42999999999999,70.97999999999999,71.00999999999999,70.94999999999997,70.92999999999999,70.86,71.23,70.83999999999999,71.14999999999999],"color":"green"},{"name":"anthropic","data":[37.51,37.57,37.67,38.669999999999995,39.169999999999995,40.05,40.55,41.029999999999994,41.309999999999995,41.48,41.13,41.21,39.5,39.190000000000005,38.739999999999995,38.33,38.57000000000001,38.989999999999995,39.08,38.879999999999995,39.5,39.510000000000005,39.51,39.400000000000006,38.99,38.519999999999996,38.75999999999999,38.8,39.47,40.209999999999994,40.660000000000004,40.62,40.69,40.68,40.8,40.400000000000006,40.769999999999996,40.47],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
