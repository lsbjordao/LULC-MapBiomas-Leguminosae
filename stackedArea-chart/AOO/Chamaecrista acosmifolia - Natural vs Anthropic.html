<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.57,65.25,66.77,66.63000000000001,66.39,65.79,65.64999999999999,65.25,64.88000000000001,63.71,63.29,63.01999999999999,63.209999999999994,63.239999999999995,63.309999999999995,63.080000000000005,63.39,63.370000000000005,63.39,63.449999999999996,63.64,63.790000000000006,63.85000000000001,63.50000000000001,63.31,63.099999999999994,62.23,61.480000000000004,60.720000000000006,60.32,60.3,60.039999999999985,59.97,60.46,60.3,60.16,60.06999999999999,60.050000000000004],"color":"green"},{"name":"anthropic","data":[37.97999999999999,37.33,35.81,35.94,36.17,36.78,36.93,37.330000000000005,37.68000000000001,38.86,39.269999999999996,39.54,39.36,39.330000000000005,39.27000000000001,39.480000000000004,39.18000000000001,39.20000000000001,39.19,39.12,38.93,38.760000000000005,38.709999999999994,39.07000000000001,39.28000000000001,39.48,40.339999999999996,41.1,41.86,42.25,42.29,42.519999999999996,42.61,42.11,42.290000000000006,42.41,42.5,42.53999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
