<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.489999999999995,39.730000000000004,39.74,40.22,40.64,40.81,41.07000000000001,41.300000000000004,41.95,43.12,43.45,44.17,44.540000000000006,45.02000000000001,45.07,44.98,45.47,45.5,45.660000000000004,46.120000000000005,46.43,46.78,47.12,47.39,47.69,48.15,48.58,48.88999999999999,49.35,49.64,49.66,49.75999999999999,50.08,50.38999999999999,50.660000000000004,50.660000000000004,50.75,50.71],"color":"green"},{"name":"anthropic","data":[61.33,61.089999999999996,61.06999999999999,60.60999999999999,60.18999999999999,60.01,59.739999999999995,59.510000000000005,58.87,57.699999999999996,57.35999999999999,56.629999999999995,56.269999999999996,55.79,55.74,55.830000000000005,55.35,55.31,55.15,54.69,54.39,54.019999999999996,53.669999999999995,53.42,53.12,52.66,52.22999999999999,51.92999999999999,51.470000000000006,51.169999999999995,51.15,51.05,50.73,50.42,50.15999999999999,50.16,50.050000000000004,50.1],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
