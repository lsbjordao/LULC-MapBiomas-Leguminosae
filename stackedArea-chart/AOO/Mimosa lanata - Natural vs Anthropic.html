<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.019999999999996,57.96000000000001,57.37,57.06,57,57.120000000000005,57.06,57.23,57.16,57.61,57.67,57.67,57.629999999999995,57.75,58.1,58.82,59.1,59.730000000000004,60.05,60.11,60.190000000000005,60.23000000000002,60.02000000000001,59.690000000000005,59.449999999999996,59.37000000000001,59.730000000000004,60.019999999999996,60.300000000000004,60.690000000000005,61.11,61.3,61.41,61.459999999999994,61.58,61.52,61.629999999999995,61.78999999999999],"color":"green"},{"name":"anthropic","data":[45.18000000000001,45.25,45.82,46.14000000000001,46.220000000000006,46.09,46.13999999999999,45.96,46.04,45.59,45.52,45.550000000000004,45.580000000000005,45.45,45.09,44.38,44.089999999999996,43.47,43.14,43.09,43,42.96,43.17,43.51,43.75,43.83,43.48,43.17,42.89,42.510000000000005,42.06,41.89,41.77,41.739999999999995,41.62,41.669999999999995,41.56,41.39999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
