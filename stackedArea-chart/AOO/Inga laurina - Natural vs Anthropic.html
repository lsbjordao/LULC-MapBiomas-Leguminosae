<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.65,56.96,56.330000000000005,55.71999999999999,55.18999999999999,54.91999999999998,54.83,54.540000000000006,54.43,54.4,54.33,54.209999999999994,53.989999999999995,53.81,53.64000000000001,53.28,53.21,53.06999999999999,52.989999999999995,52.800000000000004,52.730000000000004,52.78000000000001,52.690000000000005,52.709999999999994,52.72,52.690000000000005,52.56,52.39000000000001,52.10000000000001,51.94,51.98,52.120000000000005,52.09,52.23,52.17,52.15,52.019999999999996,52.08],"color":"green"},{"name":"anthropic","data":[46.309999999999995,47.03,47.68,48.339999999999996,48.849999999999994,49.12999999999999,49.20000000000001,49.53000000000001,49.620000000000005,49.690000000000005,49.8,49.92,50.059999999999995,50.25999999999999,50.4,50.790000000000006,50.86,51.01,51.08999999999999,51.21000000000001,51.26,51.24,51.330000000000005,51.29,51.31,51.36,51.50000000000001,51.64999999999999,51.970000000000006,52.120000000000005,52.09000000000001,51.959999999999994,51.989999999999995,51.86,51.89,51.9,52.05,51.98999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
