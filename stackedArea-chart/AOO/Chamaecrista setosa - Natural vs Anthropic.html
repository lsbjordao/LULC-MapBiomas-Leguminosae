<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.64999999999999,61.709999999999994,61.36,60.559999999999995,59.61,59.56999999999999,59.32,59.25999999999999,59.28,59.31999999999999,59.14,58.96,58.65,58.41,58.230000000000004,57.99,57.96,57.650000000000006,57.48,57.339999999999996,57.29999999999999,57.199999999999996,57.18000000000001,57.180000000000014,57.29,57.28,57.32,57.400000000000006,57.480000000000004,57.45,57.349999999999994,57.13,56.85,56.56999999999999,56.48,56.24,55.99,56.17],"color":"green"},{"name":"anthropic","data":[41.46,42.39000000000001,42.730000000000004,43.540000000000006,44.47000000000001,44.550000000000004,44.800000000000004,44.83,44.84,44.81,44.98000000000001,45.13000000000001,45.45,45.69,45.88000000000001,46.1,46.160000000000004,46.47,46.64000000000001,46.80000000000001,46.82,46.91,46.95,46.92999999999999,46.82,46.82,46.8,46.71,46.63999999999999,46.65,46.760000000000005,47.00999999999999,47.26,47.55,47.63999999999999,47.89,48.13,47.959999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
