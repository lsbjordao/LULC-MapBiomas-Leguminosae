<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.72,59.77,59.37,56.89,57.88,59.14,57.71000000000001,57.24,59.95,59.389999999999986,58.290000000000006,59.440000000000005,59.77,59.43,60.029999999999994,59.230000000000004,59.72,59.3,60.01999999999999,59.18,59.14999999999999,59.40999999999999,59.88000000000001,59.42,60.349999999999994,59.42000000000001,59.269999999999996,59.330000000000005,59.88999999999999,60.269999999999996,59.940000000000005,60.349999999999994,59.730000000000004,58.860000000000014,59.07000000000001,59.459999999999994,59.730000000000004,60.550000000000004],"color":"green"},{"name":"anthropic","data":[32.47,33.46,33.86000000000001,36.14999999999999,35.2,33.989999999999995,35.32,35.94,33.31,33.839999999999996,34.86000000000001,33.74,33.519999999999996,33.88999999999999,33.25,34.07,33.68,34.09,33.39,34.17,34.11,33.82,33.38,33.9,32.989999999999995,33.970000000000006,34.19,34.199999999999996,33.669999999999995,33.300000000000004,33.61000000000001,33.24,33.89,34.69,34.4,34,33.81,32.92],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
