<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.71999999999998,69.40999999999998,69.27,69.53,69.61999999999999,69.83999999999999,70.11,70.43999999999998,70.99,71.96,72.36,72.8,73.12,73.17,73.45,73.41000000000001,73.44000000000001,73.42000000000002,73.71000000000002,73.91000000000001,74.09000000000002,74.33000000000001,74.36000000000003,74.33000000000003,74.48,74.33,74.26000000000002,74.33000000000001,74.38000000000002,74.43000000000002,74.46000000000001,74.48,74.58000000000003,74.71,74.73,74.77000000000001,74.93,74.60000000000002],"color":"green"},{"name":"anthropic","data":[29.069999999999997,29.45,29.610000000000003,29.340000000000003,29.27,29.040000000000003,28.780000000000005,28.45,27.900000000000002,26.95,26.51,26.06,25.76,25.69,25.4,25.45,25.419999999999998,25.45,25.17,24.95,24.779999999999998,24.549999999999997,24.509999999999998,24.54,24.389999999999997,24.55,24.6,24.54,24.48,24.430000000000003,24.4,24.38,24.29,24.15,24.14,24.1,23.95,24.279999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
