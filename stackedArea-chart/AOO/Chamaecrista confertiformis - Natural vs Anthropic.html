<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.85999999999999,88.99000000000001,89.17999999999999,88.17,88.08000000000001,87.9,88.03,88.01999999999998,88.85,89.65,90.70000000000002,91.09000000000002,91.39999999999999,91.63000000000001,92.21000000000001,93.1,93.39,93.52,93.95,93.73999999999998,93.45,93.47,93.39999999999999,93.61000000000001,93.99000000000001,94.2,94.32000000000001,94.03999999999999,93.49,93.27,93.41,93.37999999999998,93.54,93.8,93.67,93.61999999999999,93.60000000000001,93.65],"color":"green"},{"name":"anthropic","data":[11.049999999999999,10.920000000000002,10.73,11.75,11.82,12.02,11.879999999999999,11.869999999999996,11.049999999999997,10.249999999999996,9.209999999999997,8.82,8.519999999999998,8.27,7.68,6.81,6.5,6.39,5.969999999999999,6.169999999999999,6.460000000000001,6.44,6.5200000000000005,6.29,5.94,5.71,5.590000000000001,5.86,6.42,6.64,6.49,6.51,6.37,6.109999999999999,6.239999999999999,6.3,6.319999999999999,6.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
