<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.39000000000001,70.55999999999999,69.57000000000001,68.51,67.59,67.28,66.99,67.08000000000001,67.32000000000001,67.24000000000001,67.16000000000001,67.04,66.96,66.73,66.34,66.14999999999999,66.33,66.19999999999999,66.3,66.14,65.83999999999999,65.68,65.58999999999999,65.76999999999998,66.12,66.16,66.04,65.99,65.86,65.88999999999999,66.15,65.99,65.94,66.12,66.27,66.3,66.6,66.68],"color":"green"},{"name":"anthropic","data":[28.85,28.770000000000007,29.780000000000005,30.87,31.81,32.15,32.42999999999999,32.339999999999996,32.089999999999996,32.18,32.239999999999995,32.339999999999996,32.419999999999995,32.669999999999995,33.01999999999999,33.22,33.05,33.18,33.099999999999994,33.29,33.61,33.76,33.86,33.669999999999995,33.3,33.26,33.39,33.43,33.59,33.55,33.32,33.49,33.5,33.34,33.19,33.17,32.870000000000005,32.790000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
