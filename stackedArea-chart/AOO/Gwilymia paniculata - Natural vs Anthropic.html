<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.32000000000001,82.61,81.27,84.03,84.34,85.08999999999999,85.82,85.97,85.82000000000001,86.11000000000001,86.80999999999999,85.81,85.78,84.92,84.63000000000001,84.64,84.64,84.31000000000002,83.84000000000002,83.13000000000001,83.09,83.86,84.07000000000001,84.02999999999999,83.93,84.61,84.89999999999999,85.07000000000001,85.3,85.56,85.52,85.47999999999999,86.11999999999999,85.82,85.13,84.81,84.30999999999999,82.90000000000002],"color":"green"},{"name":"anthropic","data":[15.910000000000002,17.61,18.959999999999997,16.200000000000003,15.89,15.13,14.410000000000002,14.260000000000002,14.410000000000002,14.120000000000001,13.400000000000002,14.420000000000002,14.440000000000001,15.3,15.59,15.61,15.58,15.91,16.37,17.1,17.15,16.369999999999997,16.15,16.189999999999998,16.28,15.610000000000003,15.319999999999999,15.16,14.93,14.660000000000002,14.72,14.740000000000002,14.1,14.420000000000002,15.090000000000002,15.400000000000002,15.9,17.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
