<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.180000000000014,56.69,56.39,55.82000000000001,55.88,55.65,55.66,55.55,55.82,55.99999999999999,55.94,56.209999999999994,56.19999999999999,56.39,56.38,56.400000000000006,56.470000000000006,56.35000000000001,56.379999999999995,56.29,56.14,56.14,55.84,55.59,55.36000000000001,55.13999999999999,54.99,54.85999999999999,54.699999999999996,54.4,54.52000000000001,54.58,54.730000000000004,54.92,54.85,54.91,54.99999999999999,55.330000000000005],"color":"green"},{"name":"anthropic","data":[47.190000000000005,47.68000000000001,47.97,48.55000000000001,48.50000000000001,48.720000000000006,48.71,48.8,48.56,48.370000000000005,48.42000000000001,48.15,48.15,47.970000000000006,48,47.95,47.88999999999999,48.010000000000005,48,48.07,48.2,48.17,48.519999999999996,48.77,49.00000000000001,49.209999999999994,49.400000000000006,49.510000000000005,49.66,49.97,49.85,49.769999999999996,49.64,49.45000000000001,49.480000000000004,49.440000000000005,49.339999999999996,49.029999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
