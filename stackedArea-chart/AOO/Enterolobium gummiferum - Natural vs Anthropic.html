<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.019999999999996,56.88,56.36,55.76,55.349999999999994,55.17000000000001,55.19999999999999,54.86999999999999,54.75,54.62000000000001,54.65,54.63000000000001,54.650000000000006,54.61,54.67,54.339999999999996,54.40999999999999,54.349999999999994,54.099999999999994,53.94,53.63999999999999,53.52,53.31999999999999,53.1,53.07999999999999,53.07000000000001,52.67,52.62,52.44999999999999,52.26,52.26,52.19,52.21999999999999,52.21,52.230000000000004,52.089999999999996,51.730000000000004,52.08],"color":"green"},{"name":"anthropic","data":[46.24,47.37000000000001,47.9,48.51,48.92,49.09000000000001,49.06999999999999,49.36,49.5,49.63000000000001,49.62,49.63,49.60999999999999,49.649999999999984,49.61,49.89000000000001,49.849999999999994,49.90999999999999,50.15,50.32,50.620000000000005,50.74,50.959999999999994,51.15,51.15,51.18,51.57000000000001,51.65,51.79000000000001,52.01,52.000000000000014,52.07999999999999,52.04,52.06,52.05,52.160000000000004,52.49,52.169999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
