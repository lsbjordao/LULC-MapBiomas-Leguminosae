<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.87999999999999,62.32,62.08999999999999,61.78,61.57999999999999,61.3,61.39999999999999,60.76,60.300000000000004,60.00999999999999,59.91,60.180000000000014,60.50000000000001,60.47000000000001,60.44,60.59,60.70000000000001,60.58,60.559999999999995,60.36,60.08,60.01000000000001,60.07,59.87,59.64,59.34000000000001,58.97000000000001,58.85000000000001,59.06000000000002,58.81000000000001,59.050000000000004,59.31000000000001,59.47,60.06000000000001,60.08,60.07999999999999,58.92,59.040000000000006],"color":"green"},{"name":"anthropic","data":[40.95,41.52,41.730000000000004,42.05000000000001,42.230000000000004,42.540000000000006,42.410000000000004,43.06,43.52,43.839999999999996,43.91,43.65,43.34,43.36000000000001,43.39,43.25,43.11999999999999,43.230000000000004,43.26,43.440000000000005,43.74999999999999,43.8,43.760000000000005,43.95,44.190000000000005,44.480000000000004,44.85000000000001,44.96,44.769999999999996,45,44.76,44.50000000000001,44.34,43.76,43.72,43.760000000000005,44.91,44.76],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
