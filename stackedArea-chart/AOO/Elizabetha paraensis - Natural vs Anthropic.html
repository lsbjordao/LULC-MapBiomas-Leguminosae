<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.44000000000001,70.77,70.84,70.49000000000001,70.11,69.69,69.38999999999999,69.16,68.48,67.71,65.49,62.07999999999999,59.8,58.77,58.14000000000001,57.970000000000006,57.88,58.120000000000005,57.300000000000004,53.89000000000001,54.14,53.519999999999996,52.900000000000006,52.76,52.53,52.37,53.51,54.84,54.660000000000004,54.19,54.04,53.24,54.51,56.14,56.830000000000005,56.5,55.089999999999996,54.24999999999999],"color":"green"},{"name":"anthropic","data":[28.29,28.97,28.9,29.25,29.63,30.060000000000002,30.36,30.580000000000002,31.270000000000003,32.04,34.24,37.64,39.94,40.980000000000004,41.59,41.77,41.85,41.61,42.45,45.84,45.61,46.22,46.84,46.980000000000004,47.21,47.379999999999995,46.230000000000004,44.900000000000006,45.07,45.55,45.69,46.489999999999995,45.22,43.61,42.92,43.230000000000004,44.64,45.5],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
