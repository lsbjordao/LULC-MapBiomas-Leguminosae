<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.58,56.17,55.599999999999994,55.349999999999994,54.41,53.6,52.92999999999999,51.89999999999999,50.83,49.57,48.379999999999995,48.30999999999999,47.97999999999999,48.04999999999999,47.6,47.459999999999994,47.27,47.16999999999999,46.33,45.26,45.32999999999999,45.27,45.31,45.300000000000004,45.36999999999999,45.69,46.11,46.17999999999999,45.67,45.65,45.65,45.62,45.62999999999999,45.42999999999999,45.28999999999999,44.74999999999999,44.71000000000001,44.65],"color":"green"},{"name":"anthropic","data":[42.9,44.33,44.89,45.14,46.07,46.879999999999995,47.55000000000001,48.57000000000001,49.660000000000004,50.900000000000006,52.080000000000005,52.18,52.5,52.410000000000004,52.88,53.04,53.21,53.309999999999995,54.15,55.239999999999995,55.14999999999999,55.22,55.169999999999995,55.19,55.11,54.79,54.36999999999999,54.3,54.82,54.83,54.82,54.86000000000001,54.86000000000001,55.05,55.190000000000005,55.709999999999994,55.76,55.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
