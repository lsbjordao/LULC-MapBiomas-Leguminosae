<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.23,89.82,88.45000000000002,87.77999999999999,87,87.08000000000001,86.81,86.08,85.89,85.31000000000002,84.95,84.53,83.96000000000001,83.39,82.93,82.53999999999999,82.39,82.03,81.65,81.19,80.41,80.06000000000002,79.95,79.82,79.69000000000001,79.55999999999999,79.74000000000001,80.13,80.17999999999999,80.16,79.78999999999999,79.39999999999999,79.23,79.21000000000001,79.35000000000001,79.19999999999999,77.85999999999999,76.88],"color":"green"},{"name":"anthropic","data":[9.42,10.83,12.2,12.879999999999999,13.649999999999999,13.58,13.86,14.56,14.77,15.360000000000001,15.69,16.12,16.69,17.259999999999998,17.73,18.12,18.27,18.63,19.009999999999998,19.46,20.23,20.58,20.689999999999998,20.810000000000002,20.939999999999998,21.09,20.93,20.52,20.48,20.490000000000002,20.85,21.24,21.42,21.44,21.310000000000002,21.45,22.79,23.78],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
