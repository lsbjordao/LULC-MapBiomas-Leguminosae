<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.49,54.120000000000005,52.15,50.50999999999999,49.150000000000006,47.9,46.88,46.27,44.89,43.53000000000001,43.05,43.02000000000001,42.86,42.36,41.64000000000001,40.900000000000006,40.050000000000004,38.91,38.690000000000005,38.510000000000005,38.22,37.89000000000001,37.199999999999996,36.559999999999995,36.71000000000001,36.65000000000001,36.62,36.28,35.71,34.66,34.57,34.349999999999994,33.53,33.38,33.53999999999999,32.72,32.339999999999996,33.03000000000001],"color":"green"},{"name":"anthropic","data":[44.1,46.459999999999994,48.44,50.09,51.43,52.67999999999999,53.699999999999996,54.31999999999999,55.7,57.06000000000001,57.53000000000001,57.58,57.74,58.230000000000004,58.95,59.69,60.519999999999996,61.68,61.91,62.059999999999995,62.39000000000001,62.7,63.39,64.02,63.870000000000005,63.949999999999996,63.97,64.28999999999999,64.88,65.93,66.02,66.25000000000001,67.05999999999999,67.2,67.04,67.86,68.24,67.57],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
