<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.419999999999995,61.690000000000005,63.14,62.16,62.17,62.28,61.790000000000006,61.01,59.82,59.6,59.49,59.34,59.81999999999999,60.31999999999999,60.690000000000005,60.959999999999994,61.239999999999995,61.239999999999995,61.2,61.459999999999994,61.02999999999999,61.03999999999999,60.959999999999994,61.42,61.59,61.36000000000001,61.800000000000004,61.68,61.71,62.64,62.739999999999995,62.5,62.7,62.06999999999999,61.75000000000001,61.690000000000005,60.68,61.25999999999999],"color":"green"},{"name":"anthropic","data":[40.300000000000004,38.03,36.57,37.56,37.55,37.44,37.94,38.730000000000004,39.9,40.120000000000005,40.239999999999995,40.379999999999995,39.89,39.410000000000004,39.04,38.760000000000005,38.489999999999995,38.5,38.519999999999996,38.269999999999996,38.7,38.69,38.76,38.29,38.13999999999999,38.36,37.92,38.03,38,37.089999999999996,37,37.22,37.02,37.660000000000004,37.980000000000004,38.04,39.06000000000001,38.46000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
