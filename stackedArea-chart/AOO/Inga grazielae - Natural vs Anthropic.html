<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.45000000000003,76.65,75.69000000000001,74.25000000000003,73.28000000000002,72.84,72.83999999999999,73.31999999999998,73.34999999999998,73.04,72.86999999999999,73.29999999999998,73.46999999999998,73.57,73.58000000000001,73.55999999999999,74.22,73.96000000000002,74.36000000000001,74.37,74.33000000000001,74.13,74.17999999999999,74.61,75.3,75.47,75.62,75.83999999999999,75.38999999999999,74.87,74.90999999999998,74.72,74.49,74.91,74.98999999999998,75.19999999999997,75.86,76.19],"color":"green"},{"name":"anthropic","data":[24.529999999999998,24.32,25.279999999999998,26.73,27.71,28.150000000000006,28.150000000000006,27.660000000000004,27.620000000000005,27.940000000000005,28.1,27.68,27.500000000000004,27.39,27.400000000000002,27.410000000000004,26.740000000000002,27.020000000000003,26.63,26.62,26.65,26.84,26.8,26.380000000000003,25.67,25.509999999999998,25.340000000000003,25.11,25.59,26.11,26.060000000000002,26.240000000000002,26.48,26.07,25.979999999999997,25.78,25.109999999999996,24.789999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
