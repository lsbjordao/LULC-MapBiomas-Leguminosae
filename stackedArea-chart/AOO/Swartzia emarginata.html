<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>

        #stackedArea { width: 100%; height: 100vh; }

</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[56.49,56.61,56.35,56.27,56.41,56.56,56.59,56.5,56.27,55.91,55.61,55.59,55.43,55.15,54.56,54.55,54.8,54.34,54.01,53.9,53.87,54.17,55.36,56.25,56.49,56.44,55.99,55.89,55.85,55.71,55.58,55.44,55.31,55.36,55.86,56.27,56.51,55.78],"color":"#006400"},{"name":"Flooded forest","data":[22.29,22.06,22.43,22.34,22.38,22.37,22.25,22.33,22.23,22,22.22,22.24,22.09,21.85,21.74,22.78,22.88,22.95,22.79,22.89,22.96,22.98,22.87,22.93,23.03,23.13,23.32,23.39,23.47,23.39,23.44,23.39,23.44,23.5,23.23,23.38,23.33,23.12],"color":"#76A5AF"},{"name":"Wetland","data":[1.17,1.06,0.57,0.66,0.73,0.48,0.54,0.69,0.64,0.66,0.71,0.68,0.58,0.71,0.72,0.8,0.84,0.84,1.01,0.9,0.82,1.04,0.96,1.04,1.06,0.99,1.24,1.09,1.21,1.12,1.03,1.15,1.08,1.17,1.24,1.21,0.91,0.45],"color":"#45C2A5"},{"name":"Grassland","data":[0.3,0.22,0.31,0.29,0.25,0.26,0.3,0.28,0.22,0.25,0.26,0.23,0.24,0.21,0.14,0.2,0.21,0.2,0.26,0.21,0.24,0.28,0.24,0.25,0.23,0.24,0.23,0.23,0.23,0.24,0.3,0.25,0.26,0.33,0.23,0.3,0.25,0.21],"color":"#B8AF4F"},{"name":"Pasture","data":[1.42,1.01,1.2,1.2,1.05,0.91,0.81,0.81,1.11,1.47,1.65,1.78,2,2.34,3.09,3.64,3.4,3.76,4.06,4.06,4.12,3.83,2.64,1.77,1.55,1.56,2.13,2.27,2.37,2.52,2.64,2.68,2.83,2.77,2.21,1.8,1.66,2.35],"color":"#FFD966"},{"name":"River, lake and ocean","data":[18.01,18.71,18.82,18.93,18.87,19.1,19.2,19.07,19.21,19.4,19.23,19.16,19.34,19.41,19.42,17.71,17.54,17.59,17.56,17.72,17.66,17.38,17.6,17.43,17.33,17.31,16.77,16.81,16.55,16.69,16.69,16.77,16.75,16.55,16.91,16.72,17.03,17.77],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
