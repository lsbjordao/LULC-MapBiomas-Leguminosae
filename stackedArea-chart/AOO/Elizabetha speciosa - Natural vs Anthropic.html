<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.07999999999997,90.30999999999999,89.51999999999998,89.12,87.21000000000001,86.25000000000001,86.81,86.64,87.10000000000001,88.09,88.43,88.16000000000001,86.83999999999999,86.41,85.97000000000001,85.74000000000001,85.77,85.53999999999999,85.61,85.21000000000001,84.75,84.51000000000002,85.06000000000002,85.14,85.15000000000002,85.05,85.06,85.43,85.74,86,85.89,85.97,85.61999999999999,85.10000000000001,84.8,84.36999999999999,84.60000000000001,83.78000000000002],"color":"green"},{"name":"anthropic","data":[8.82,9.59,10.38,10.79,12.700000000000001,13.66,13.08,13.27,12.799999999999999,11.82,11.47,11.73,13.07,13.5,13.93,14.18,14.14,14.370000000000001,14.3,14.69,15.150000000000002,15.39,14.85,14.75,14.76,14.85,14.83,14.45,14.159999999999998,13.9,14.019999999999998,13.94,14.28,14.809999999999999,15.110000000000001,15.55,15.299999999999999,16.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
