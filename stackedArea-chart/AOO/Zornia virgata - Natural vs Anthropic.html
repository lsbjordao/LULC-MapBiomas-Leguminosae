<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.21000000000001,59.23000000000001,59.04,58.57,57.46,56.75,56.39000000000001,55.77,55.080000000000005,54.260000000000005,54.14,54.36,54.06,53.849999999999994,53.38,52.99,52.91000000000001,52.46999999999999,52,51.910000000000004,52.02000000000001,51.890000000000015,51.6,51.39000000000001,51.45000000000001,51.37,51.38000000000001,51.43000000000001,51.589999999999996,51.50999999999999,51.449999999999996,51.23,50.97,50.779999999999994,50.82,50.589999999999996,50.489999999999995,50.419999999999995],"color":"green"},{"name":"anthropic","data":[42.52,43.49,43.69000000000001,44.13999999999999,45.269999999999996,45.96,46.31,46.95,47.63,48.440000000000005,48.57,48.349999999999994,48.64000000000001,48.87,49.349999999999994,49.74,49.83,50.24,50.709999999999994,50.80000000000001,50.71000000000001,50.82999999999999,51.11,51.32,51.290000000000006,51.36,51.35,51.300000000000004,51.160000000000004,51.21000000000001,51.28999999999999,51.510000000000005,51.760000000000005,51.96000000000001,51.92,52.15,52.230000000000004,52.290000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
