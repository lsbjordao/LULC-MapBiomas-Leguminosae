<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        #stackedArea { width: 100%; height: 100vh; }

</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[65.11,64.84,64.64,64.73,65.95,66.33,66.07,66.85,67.3,67.52,67.61,68.41,68.72,68.95,68.83,68.99,69.04,69.09,69.29,69.23,69.37,68.92,68.79,68.7,68.69,68.79,68.66,68.98,69.27,69.57,69.54,69.57,69.82,69.86,69.74,69.67,70.55,70.46],"color":"#006400"},{"name":"Pasture","data":[15.53,16.11,16.75,17.4,17.19,16.11,15.19,14.64,14.56,14.43,14.57,14.82,14.91,14.79,14.78,14.72,14.61,14.63,14.58,14.08,13.74,13.8,13.73,13.58,13.55,13.81,13.91,13.71,13.59,13.7,13.28,12.97,13.03,12.86,12.57,12.4,12.28,11.89],"color":"#FFD966"},{"name":"Mosaic of uses","data":[17.89,17.59,17.19,16.45,15.44,16.19,17.35,17.13,16.75,16.66,16.38,15.19,14.76,14.66,14.73,14.61,14.68,14.57,14.41,14.93,15.12,15.5,15.7,15.86,15.88,15.5,15.39,15.23,15.04,14.57,14.96,15.2,14.86,14.93,15.3,15.47,14.66,15.12],"color":"#fff3bf"},{"name":"Non vegetated area","data":[0.05,0.03,0.03,0.03,0.03,0.05,0.07,0.05,0.06,0.12,0.14,0.23,0.31,0.31,0.38,0.46,0.47,0.49,0.53,0.53,0.53,0.57,0.58,0.64,0.67,0.71,0.87,0.89,0.95,1.01,1.07,1.09,1.11,1.16,1.23,1.26,1.27,1.29],"color":"#EA9999"},{"name":"Rocky outcrop","data":[0.79,0.79,0.75,0.74,0.75,0.75,0.75,0.75,0.74,0.73,0.76,0.76,0.77,0.76,0.75,0.74,0.75,0.75,0.73,0.74,0.74,0.71,0.72,0.71,0.71,0.69,0.7,0.7,0.7,0.71,0.71,0.71,0.71,0.72,0.72,0.73,0.77,0.77],"color":"#665a3a"},{"name":"River, lake and ocean","data":[0.46,0.47,0.47,0.47,0.47,0.4,0.38,0.42,0.41,0.37,0.37,0.4,0.37,0.37,0.35,0.3,0.28,0.29,0.29,0.31,0.33,0.33,0.31,0.32,0.32,0.31,0.3,0.3,0.28,0.25,0.27,0.28,0.29,0.29,0.27,0.28,0.3,0.3],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
