<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.47000000000001,68.79,67.25,66.24000000000001,65.50999999999999,64.82,64.72999999999999,63.720000000000006,63.440000000000005,63.56,63.71,64.25999999999999,64.93,64.86,64.83,64.58999999999999,64.07000000000001,64.00999999999999,64.16,63.709999999999994,63.64,63.78,63.769999999999996,63.58,63.28,63.08,62.809999999999995,62.099999999999994,62.309999999999995,62.039999999999985,62.03999999999999,62.120000000000005,62.27,62.239999999999995,62.169999999999995,62.39999999999999,62.37,62.43000000000001],"color":"green"},{"name":"anthropic","data":[35.76,36.43,37.98,39,39.709999999999994,40.4,40.50000000000001,41.519999999999996,41.8,41.68000000000001,41.510000000000005,40.970000000000006,40.290000000000006,40.36,40.410000000000004,40.64,41.18000000000001,41.22,41.050000000000004,41.5,41.62,41.43000000000001,41.47,41.660000000000004,41.93999999999999,42.15,42.459999999999994,43.13,42.929999999999986,43.18999999999999,43.190000000000005,43.120000000000005,42.97,42.97,43.050000000000004,42.84,42.85,42.769999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
