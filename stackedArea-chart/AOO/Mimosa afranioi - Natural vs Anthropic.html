<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.37,81.27,81.55999999999999,81.39,80.92999999999999,80.99,80.86999999999999,80.84,80.59999999999998,79.78,79.25999999999999,78.45999999999998,78.28,77.68999999999998,78.13,79.11,78.56,78.88,79.35999999999999,79.67999999999999,79.5,79.36999999999999,78.05,75.95999999999998,74.24,73.01000000000002,72.47,72.15,72.82,73.05999999999999,71.52,72.55000000000001,72.56,72.42999999999999,72.58999999999999,72.59,72.39999999999999,72.07],"color":"green"},{"name":"anthropic","data":[19.51,19.61,19.330000000000002,19.490000000000002,19.95,19.89,20,20.03,20.27,21.09,21.61,22.410000000000004,22.590000000000003,23.18,22.73,21.759999999999998,22.31,21.990000000000002,21.520000000000003,21.18,21.36,21.5,22.83,24.919999999999998,26.64,27.860000000000003,28.4,28.729999999999997,28.060000000000002,27.810000000000002,29.37,28.320000000000004,28.31,28.44,28.279999999999998,28.29,28.48,28.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
