<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.31,60.87,59.38,57.849999999999994,55.99,54.62,52.42,51.00000000000001,50.95,50.120000000000005,50.160000000000004,49.739999999999995,50.23,49.95,49.56999999999999,47.86,47.13,46.66000000000001,45.99,46.39,46.489999999999995,47.11,46.959999999999994,44.47999999999999,44.35,42.720000000000006,42.28,42.15,42.08,41.86000000000001,41.419999999999995,41.12,41.02,39.96,39.54,38.81999999999999,38.83,38.78000000000001],"color":"green"},{"name":"anthropic","data":[34.370000000000005,38.83,40.3,41.84,43.70000000000001,45.08,47.26,48.69,48.739999999999995,49.57000000000001,49.540000000000006,49.97,49.46,49.75,50.12,51.83,52.56,53.03000000000001,53.71,53.3,53.19,52.58,52.709999999999994,55.22,55.35,56.96,57.42,57.53,57.62,57.830000000000005,58.27,58.57,58.66,59.7,60.150000000000006,60.870000000000005,60.849999999999994,60.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
