<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.65,81.73,81.37,81.23,81.35000000000001,81.33,81.47000000000003,81.47999999999999,81.37000000000002,81.04000000000002,81.25,81.67,81.58000000000001,81.90999999999998,81.18999999999998,80.76,80.53,80.46,80.58000000000001,80.51,80.58000000000001,80.49,80.57000000000001,80.96999999999998,81.04,81.26,81.49000000000001,81.72999999999999,81.65999999999998,81.38000000000001,81.25999999999999,81.08,81.16000000000001,80.99,81.11000000000001,81.2,81.03999999999999,81.36000000000001],"color":"green"},{"name":"anthropic","data":[19.45,20.380000000000003,20.78,20.97,20.86,20.91,20.810000000000002,20.790000000000003,20.85,21.18,20.96,20.47,20.500000000000004,20.14,20.85,21.310000000000002,21.48,21.57,21.48,21.55,21.509999999999998,21.599999999999998,21.5,21.15,21.060000000000002,20.73,20.47,20.25,20.319999999999997,20.58,20.74,20.889999999999997,20.840000000000003,21,21.06,21.34,21.5,21.21],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
