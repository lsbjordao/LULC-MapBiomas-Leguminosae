<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.35999999999999,87.45000000000002,85.33000000000001,86.2,84.35,82.96999999999998,80.80000000000001,78.32,77.39,75.85000000000001,73.03,70.45,67.96,68,66.11,59.99,59.46,58.88,58.959999999999994,59.769999999999996,59.599999999999994,62.230000000000004,62.37,62.93,62.61,62.13,62.690000000000005,62.79,62.57,62.519999999999996,62.49,62.58,62.5,62.43,63.86,66.44,68.45,69.07],"color":"green"},{"name":"anthropic","data":[18.45,18.37,20.480000000000004,19.61,21.45,22.850000000000005,25.000000000000007,27.49,28.41,29.95,32.78,35.35,37.849999999999994,37.84,39.68,45.81999999999999,46.37,46.94,46.85,46.04,46.21999999999999,43.59,43.44,42.88,43.19,43.690000000000005,43.12,43.040000000000006,43.24,43.27000000000001,43.330000000000005,43.23,43.349999999999994,43.370000000000005,41.95,39.38,37.379999999999995,36.74],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
