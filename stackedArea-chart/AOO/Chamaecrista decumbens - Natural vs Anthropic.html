<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.19,61.85,61.45,60.44,59.24,58.779999999999994,58.14,57.400000000000006,56.160000000000004,54.97,53.61,53.230000000000004,51.92999999999999,50.79,49.31,48.56999999999999,48.089999999999996,47.78,47.07000000000001,46.34,46.239999999999995,45.9,45.92,45.279999999999994,45.15,44.85,43.879999999999995,43.73,43.74,43.400000000000006,43.34,43.19,43.26,43.1,43,42.77,42.54,42.8],"color":"green"},{"name":"anthropic","data":[37.32999999999999,38.67,39.07,40.08999999999999,41.28999999999999,41.74999999999999,42.379999999999995,43.14000000000001,44.36999999999999,45.559999999999995,46.92,47.300000000000004,48.61,49.739999999999995,51.209999999999994,51.95000000000001,52.44,52.760000000000005,53.440000000000005,54.2,54.29,54.62,54.61,55.260000000000005,55.370000000000005,55.66,56.660000000000004,56.78000000000001,56.79,57.10999999999999,57.199999999999996,57.33,57.28,57.44,57.50999999999999,57.74999999999999,57.99,57.720000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
