<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.17,79.88000000000001,80.18,80.48,80.88000000000002,80.53,80.07000000000001,79.31000000000002,78.90000000000002,78.73,79,78.80000000000003,78.88000000000001,78.51000000000002,78.05000000000001,77.69000000000003,77.51,77.27000000000001,77.42,77.2,76.4,76.19999999999999,75.67999999999998,75,74.33,74.28,74.2,74.32,73.81000000000002,72.47999999999999,71.75,70.94000000000001,69.62,68.84,68.46000000000001,68.32000000000002,68.63000000000002,69.39],"color":"green"},{"name":"anthropic","data":[19.61,19.87,19.58,19.28,18.89,19.229999999999997,19.700000000000003,20.46,20.87,21.04,20.76,20.97,20.900000000000002,21.25,21.7,22.07,22.25,22.48,22.339999999999996,22.55,23.35,23.56,24.080000000000002,24.77,25.42,25.48,25.580000000000002,25.44,25.959999999999997,27.289999999999996,28.029999999999998,28.83,30.160000000000004,30.919999999999998,31.29,31.43,31.129999999999995,30.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
