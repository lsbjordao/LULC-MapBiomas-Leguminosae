<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.440000000000005,63.82999999999999,64.55,63.73999999999999,63.809999999999995,62.47,63.19999999999999,62.96,62.54,62.66,62.89,62.86000000000001,63.12999999999999,63.43999999999999,63.48,64.16,64.58,64.52,64.64999999999999,64.42999999999999,64.08,63.970000000000006,64.36999999999999,64.74,65.23,65.15,65.01,64.78000000000002,64.71999999999998,64.08,64.59,64.58999999999999,65.03,65.57000000000001,65.62999999999998,65.76,65.77000000000001,65.82000000000001],"color":"green"},{"name":"anthropic","data":[36.99999999999999,36.629999999999995,35.89,36.720000000000006,36.650000000000006,37.99,37.28,37.529999999999994,37.94,37.8,37.59,37.599999999999994,37.33,37.029999999999994,36.97,36.27,35.88,35.910000000000004,35.8,36.01,36.36,36.48,36.089999999999996,35.699999999999996,35.230000000000004,35.31000000000001,35.44,35.660000000000004,35.74,36.36,35.87,35.86,35.449999999999996,34.89,34.809999999999995,34.71,34.690000000000005,34.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
