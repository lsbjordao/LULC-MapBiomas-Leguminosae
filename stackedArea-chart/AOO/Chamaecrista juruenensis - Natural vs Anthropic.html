<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.39000000000001,81.25,80.98,80.73,80.24,80.24,79.91000000000001,79.69000000000001,79.29,79.09,78.6,77.81,77.60000000000001,76.8,76.31000000000002,75.49000000000001,75.20000000000002,74.34000000000002,73.50000000000003,73.52000000000001,73.43000000000002,73.48000000000002,73.50000000000001,73.28000000000002,73.13000000000001,72.84000000000002,72.67000000000002,72.39,72.36,72.32000000000001,72.28000000000002,72.19000000000001,72.05,71.68,68.81000000000002,67.98,67.15,66.14],"color":"green"},{"name":"anthropic","data":[20.419999999999998,20.540000000000003,20.82,21.060000000000002,21.56,21.56,21.88,22.1,22.5,22.720000000000002,23.209999999999997,24,24.189999999999998,25.009999999999998,25.51,26.32,26.6,27.460000000000004,28.31,28.290000000000003,28.37,28.309999999999995,28.29,28.520000000000003,28.679999999999996,28.939999999999998,29.12,29.439999999999998,29.44,29.499999999999996,29.519999999999996,29.6,29.75,30.13,33.010000000000005,33.830000000000005,34.65,35.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
