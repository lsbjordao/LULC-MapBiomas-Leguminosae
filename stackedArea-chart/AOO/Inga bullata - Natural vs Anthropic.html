<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.42000000000002,82.23,82.13,82.05000000000001,82.15,82.03000000000002,82.13000000000002,81.95,82.01000000000002,82.27000000000001,82.34000000000002,82.54000000000002,83.12,83.33,83.55000000000003,83.81,83.99,84.16999999999999,84.33000000000003,84.46000000000004,84.64000000000001,84.82000000000001,84.89,85.01,85.05000000000003,85.04,85.1,85.17,85.36,85.48000000000002,85.58000000000001,85.52000000000002,85.53,85.61999999999998,85.78999999999999,85.74000000000001,85.89999999999999,86.02000000000002],"color":"green"},{"name":"anthropic","data":[18.27,18.46,18.56,18.65,18.55,18.64,18.54,18.73,18.69,18.41,18.35,18.15,17.59,17.34,17.14,16.87,16.720000000000002,16.52,16.35,16.22,16.040000000000003,15.88,15.809999999999999,15.669999999999998,15.639999999999999,15.64,15.58,15.520000000000001,15.309999999999999,15.2,15.1,15.16,15.15,15.060000000000002,14.92,14.97,14.8,14.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
