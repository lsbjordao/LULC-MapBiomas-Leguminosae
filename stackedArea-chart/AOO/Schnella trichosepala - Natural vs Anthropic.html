<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.260000000000005,60.42999999999999,61.290000000000006,61.18000000000001,61.019999999999996,60.96000000000001,61.61000000000001,61.43000000000001,61.4,61.46,61.20000000000001,61.580000000000005,62.10000000000001,62.1,62.63,63.03,62.91,62.6,62.989999999999995,62.71,62.53,62.35,61.69000000000001,61.58,61.35999999999999,60.6,60.16,60.08,59.660000000000004,59.720000000000006,60.31000000000001,60.42,60.52,60.14,59.949999999999996,59.86,59.83,59.67000000000001],"color":"green"},{"name":"anthropic","data":[42.61,42.43,41.559999999999995,41.68999999999999,41.839999999999996,41.91,41.24,41.44,41.45,41.410000000000004,41.65,41.269999999999996,40.74000000000001,40.779999999999994,40.230000000000004,39.82,39.95000000000001,40.260000000000005,39.870000000000005,40.169999999999995,40.31000000000001,40.5,41.18000000000001,41.269999999999996,41.49999999999999,42.25000000000001,42.7,42.78999999999999,43.199999999999996,43.13999999999999,42.56999999999999,42.43,42.35,42.720000000000006,42.92,42.989999999999995,43.029999999999994,43.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
