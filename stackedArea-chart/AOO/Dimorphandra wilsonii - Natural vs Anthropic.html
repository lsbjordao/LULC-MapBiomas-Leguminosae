<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.2,26.910000000000004,26.439999999999998,26.68,25.86,25.31,24.979999999999997,24.189999999999994,23.7,23.519999999999996,23.560000000000002,23.37,22.639999999999997,22.2,21.429999999999996,20.64,20.62,20.769999999999996,20.560000000000002,20.31,20.610000000000003,20.14,19.990000000000006,20.159999999999997,20.38,20.669999999999998,20.619999999999997,20.630000000000003,20.490000000000002,20.62,21.28,21.32,21.680000000000007,21.830000000000005,21.880000000000003,21.549999999999997,21.610000000000003,21.69],"color":"green"},{"name":"anthropic","data":[71.77,73.08999999999999,73.52000000000001,73.28000000000002,74.11000000000001,74.64999999999999,75,75.77000000000001,76.28,76.44,76.42,76.63000000000001,77.34,77.78,78.54,79.33,79.36,79.21000000000001,79.42,79.65,79.36999999999999,79.82000000000001,79.96,79.82000000000001,79.57000000000001,79.31,79.33999999999999,79.34,79.48,79.35999999999999,78.7,78.64,78.29000000000002,78.16000000000001,78.08999999999999,78.42999999999999,78.35000000000001,78.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
