<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.69000000000001,81.28999999999999,81.32000000000001,81.51,81.45,81.23000000000002,80.57000000000001,79.98,79.57000000000001,79.26,78.8,78.86,78.95,78.85,78.46000000000002,78.10000000000001,77.89000000000001,77.72,77.49000000000001,77.37,77.17,77.01,77.11000000000001,76.06000000000002,76.38000000000001,76.32000000000001,76.53,76.08000000000001,75.63,75.14000000000001,75.05999999999999,75.3,75.36000000000001,75.42,75.28999999999999,75.02,74.23,73.99999999999999],"color":"green"},{"name":"anthropic","data":[18.560000000000002,18.94,18.92,18.73,18.790000000000003,19,19.66,20.25,20.67,20.999999999999996,21.45,21.38,21.29,21.369999999999997,21.790000000000003,22.150000000000002,22.34,22.52,22.75,22.88,23.06,23.219999999999995,23.11,24.189999999999998,23.869999999999997,23.91,23.700000000000003,24.18,24.62,25.11,25.19,24.96,24.880000000000003,24.830000000000002,24.97,25.220000000000002,26.01,26.250000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
