<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.93,69.89,69.55,68.91000000000001,68.28,67.66999999999999,67.32000000000001,66.58999999999999,66.03000000000002,65.79,65.80000000000001,65.9,66.42,66.47999999999999,66.82000000000001,66.83000000000001,66.72,66.46000000000001,66.32000000000001,66.02,65.62,65.65000000000002,65.5,65.52000000000001,65.69000000000001,65.77,65.64999999999999,65.53999999999999,65.16999999999999,64.83000000000001,64.91000000000001,64.99,65.2,65.62,65.56000000000002,65.66999999999999,65.59,65.66000000000001],"color":"green"},{"name":"anthropic","data":[35.50999999999999,35.559999999999995,35.910000000000004,36.56,37.19,37.78,38.13,38.809999999999995,39.4,39.67,39.68,39.57,39.029999999999994,38.97,38.629999999999995,38.6,38.73,38.99999999999999,39.129999999999995,39.379999999999995,39.760000000000005,39.72,39.879999999999995,39.81,39.660000000000004,39.61000000000001,39.74,39.849999999999994,40.21999999999999,40.58,40.49999999999999,40.449999999999996,40.23,39.81,39.779999999999994,39.66000000000001,39.760000000000005,39.69000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
