<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.07,55.529999999999994,55.650000000000006,55.260000000000005,54.83,54.53,54.050000000000004,53.85,53.650000000000006,53.43,53.21,53.12,53.04,53.15,53.11,53.11,53.129999999999995,53.220000000000006,53.21000000000001,53.169999999999995,53.080000000000005,52.87,52.74,52.56,52.53,52.160000000000004,51.870000000000005,51.459999999999994,51.28999999999999,51.019999999999996,51.00999999999999,51.120000000000005,51.09,50.84,50.839999999999996,50.83,50.86,51.10000000000001],"color":"green"},{"name":"anthropic","data":[46.2,46.72,46.61000000000001,47.019999999999996,47.43,47.71000000000001,48.19,48.39000000000001,48.61000000000001,48.85000000000001,49.07000000000001,49.16000000000001,49.24000000000001,49.1,49.150000000000006,49.16,49.14000000000001,49.05,49.059999999999995,49.1,49.17000000000001,49.39,49.540000000000006,49.71,49.739999999999995,50.08,50.38,50.81,50.99,51.230000000000004,51.269999999999996,51.14999999999999,51.17999999999999,51.44000000000001,51.400000000000006,51.44,51.400000000000006,51.150000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
