<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.21,97.2,94.46000000000002,93.81,93.52,94.12,95.45999999999998,95.69,95.89,97.32000000000001,98.89,98.91000000000001,98.50999999999999,96.53999999999999,91.19,89.77000000000001,89.9,89.22999999999999,89.08,89.43000000000002,89.42,89.06,88.7,88.47999999999999,88.39999999999999,89.03999999999998,89.94,89.72999999999999,89.49000000000001,89.46000000000001,89.75,90.35,89.81000000000002,88.35,88.22,88.2,88.25000000000001,88.25000000000001],"color":"green"},{"name":"anthropic","data":[2.69,2.71,5.46,6.1,6.39,5.79,4.44,4.21,4.0200000000000005,2.5700000000000003,1.02,1,1.4,3.3499999999999996,8.71,10.12,10,10.68,10.83,10.48,10.49,10.850000000000001,11.19,11.420000000000002,11.5,10.870000000000001,9.97,10.18,10.41,10.45,10.16,9.540000000000001,10.079999999999998,11.55,11.7,11.719999999999999,11.65,11.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
