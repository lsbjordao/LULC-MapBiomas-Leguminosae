<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.88000000000001,98.9,99.00999999999999,98.96000000000001,98.94,98.96,99.06,99.14999999999999,99.09,99.10999999999999,98.93999999999998,98.94999999999999,98.96000000000001,98.97,99.03000000000002,98.99,98.99000000000001,99.03,98.94,98.91,98.94000000000001,98.99000000000001,98.99,99.02000000000001,98.99,99.06,99.06999999999998,99.08000000000001,99.07,99.03,98.95,98.92,98.88,98.75999999999999,98.77,98.85000000000001,98.85,97.28999999999999],"color":"green"},{"name":"anthropic","data":[0.76,0.72,0.61,0.6699999999999999,0.69,0.6599999999999999,0.5800000000000001,0.49,0.53,0.52,0.6799999999999999,0.6799999999999999,0.6799999999999999,0.66,0.6000000000000001,0.63,0.64,0.5900000000000001,0.69,0.72,0.7,0.64,0.65,0.6100000000000001,0.63,0.5800000000000001,0.5700000000000001,0.56,0.56,0.6100000000000001,0.67,0.72,0.74,0.8800000000000001,0.8700000000000001,0.77,0.78,2.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
