<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.64,84.52999999999999,83.86999999999999,82.08999999999999,81.14999999999999,80.79,80.72999999999999,82.1,82,82,81.99,82.26,82.88000000000001,82.68,82.78999999999999,82.7,82.92999999999999,82.62,82.62999999999998,82.74,82.32000000000001,82.2,82.37000000000002,82.39,83.21000000000001,83.57000000000001,83.57,83.63,82.96000000000001,82.36000000000001,82.43,82.33,82.08000000000001,83.14,83.39000000000001,83.76,84.48,85.56],"color":"green"},{"name":"anthropic","data":[14.120000000000001,15.23,15.89,17.66,18.62,18.990000000000002,19.049999999999997,17.669999999999998,17.77,17.77,17.78,17.52,16.89,17.1,16.98,17.07,16.84,17.15,17.150000000000002,17.040000000000003,17.450000000000003,17.57,17.400000000000002,17.380000000000003,16.560000000000002,16.18,16.19,16.14,16.8,17.4,17.32,17.43,17.68,16.630000000000003,16.37,16,15.29,14.209999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
