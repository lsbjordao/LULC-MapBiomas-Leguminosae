<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.699999999999996,63.390000000000015,62.800000000000004,61.95,61.32,60.44000000000001,60.040000000000006,59.27,58.52,58.15000000000001,57.910000000000004,58.03000000000001,58.13000000000001,58.06000000000001,58.14,58.089999999999996,57.50999999999999,57.35,56.800000000000004,56.629999999999995,56.46,56.370000000000005,56.45,56.42,56.24,56.160000000000004,56.02,55.84,55.74000000000001,55.24,54.98,54.61999999999999,54.53,54.49000000000001,54.349999999999994,54.68999999999999,54.529999999999994,54.58999999999999],"color":"green"},{"name":"anthropic","data":[38.31999999999999,38.64999999999999,39.24999999999999,40.07,40.7,41.599999999999994,41.989999999999995,42.769999999999996,43.49999999999999,43.87,44.12,44,43.910000000000004,43.97,43.900000000000006,43.95,44.529999999999994,44.68,45.239999999999995,45.4,45.59,45.660000000000004,45.60999999999999,45.60999999999999,45.78,45.879999999999995,46.019999999999996,46.190000000000005,46.3,46.82000000000001,47.06000000000001,47.42,47.510000000000005,47.55000000000001,47.68,47.33,47.489999999999995,47.440000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
