<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.81,87.65,87.78999999999999,87.57,87.57999999999998,87.61000000000001,87.52,87.72,87.72,87.54,87.59,87.94000000000001,87.55999999999999,87.57000000000002,87.89,87.66,87.60999999999999,87.74000000000001,87.62,87.53999999999999,87.28,87.24000000000001,87.16000000000001,87.1,87.08,87.14,87.13000000000001,87.16,87.21000000000001,87.23,87.17999999999998,87.15,87.17,87.15,87.20000000000002,87.13000000000001,87.13,84.59],"color":"green"},{"name":"anthropic","data":[11.860000000000001,12.030000000000001,11.87,12.1,12.09,12.049999999999999,12.14,11.959999999999999,11.959999999999999,12.12,12.08,11.74,12.120000000000001,12.110000000000001,11.780000000000001,12,12.06,11.94,12.05,12.129999999999999,12.38,12.44,12.51,12.58,12.58,12.55,12.540000000000001,12.51,12.45,12.44,12.49,12.53,12.5,12.52,12.469999999999999,12.540000000000001,12.530000000000001,15.08],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
