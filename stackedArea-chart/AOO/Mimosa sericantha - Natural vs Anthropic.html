<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.07,87.44,87.64999999999999,87.36999999999999,87.21000000000001,87.09,86.91999999999999,86.66,86.69,86.19000000000003,86.18,85.80000000000001,84.8,84.48,83.84,83.84,83.69,82.93,82.84,81.71000000000001,81.13000000000001,80.87,80.55,79.53000000000002,78.7,77.8,76.63,75.93999999999998,75.25000000000001,75.38000000000001,75.17999999999999,75.03,75.08,74.88000000000001,74.62000000000002,74.58000000000001,72.92000000000002,72.4],"color":"green"},{"name":"anthropic","data":[14.439999999999998,14.07,13.860000000000001,14.15,14.31,14.43,14.61,14.86,14.82,15.319999999999999,15.33,15.700000000000003,16.73,17.060000000000002,17.679999999999996,17.69,17.83,18.569999999999997,18.68,19.81,20.399999999999995,20.65,20.97,22.02,22.82,23.72,24.87,25.56,26.28,26.16,26.32,26.49,26.440000000000005,26.649999999999995,26.900000000000002,26.939999999999998,28.580000000000002,29.12],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
