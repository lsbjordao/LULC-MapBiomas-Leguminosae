<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.900000000000006,34.89000000000001,34.160000000000004,34.010000000000005,33.19000000000001,33.33,33.300000000000004,33.66,33.68,34.76,35.25999999999999,36.17999999999999,36.46999999999999,36.63999999999999,36.52999999999999,36.43,36.32,36.14,36.19,35.76,35.260000000000005,35.09,35.230000000000004,35.35,35.550000000000004,35.81,36.14,36.31,36.96,37.160000000000004,37.54,37.87000000000001,37.93,37.949999999999996,38.07,38.23,38.57,38.669999999999995],"color":"green"},{"name":"anthropic","data":[65.82,65.83999999999999,66.55,66.72,67.52999999999997,67.37999999999998,67.41,67.03999999999999,67.03999999999999,65.95999999999998,65.44999999999999,64.55,64.26,64.07000000000001,64.18,64.3,64.38,64.59,64.55,64.95,65.43999999999998,65.60999999999999,65.5,65.35999999999999,65.16,64.91000000000001,64.59000000000002,64.41999999999999,63.76,63.55,63.160000000000004,62.85000000000001,62.79,62.77,62.650000000000006,62.50000000000001,62.15,62.05000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
