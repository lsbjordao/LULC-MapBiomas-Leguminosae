<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.25,63.06,62.169999999999995,61.38999999999999,59.95,59.74,59.25999999999999,58.779999999999994,58.309999999999995,57.78000000000001,57.239999999999995,56.379999999999995,55.03,54.03,53.6,53.24,52.809999999999995,52.53,51.55000000000001,49.81999999999999,49.089999999999996,48.72,48.54,48.22,47.620000000000005,47.07,47.04,46.900000000000006,46.68,46.59,46.3,46.26,46.27,46.39,46.24,46.02,45.33,45.6],"color":"green"},{"name":"anthropic","data":[37.3,38.480000000000004,39.37,40.13999999999999,41.60000000000001,41.800000000000004,42.25999999999999,42.75,43.25,43.769999999999996,44.33,45.18,46.51,47.519999999999996,47.92,48.29,48.72,49.010000000000005,50,51.709999999999994,52.46,52.81999999999999,53.01,53.330000000000005,53.92000000000001,54.43999999999999,54.51,54.620000000000005,54.84000000000002,54.93,55.21,55.26999999999999,55.27,55.13999999999999,55.29,55.52,56.209999999999994,55.92],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
