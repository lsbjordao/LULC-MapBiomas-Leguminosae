<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.89999999999999,44.220000000000006,43.510000000000005,42.849999999999994,42.28999999999999,41.88999999999999,41.64,41.46,41.40999999999999,41.31999999999999,41.230000000000004,41.129999999999995,40.89,40.75000000000001,40.67,40.47,40.36999999999999,40.359999999999985,40.36999999999999,40.339999999999996,40.3,40.36,40.46999999999999,40.48999999999999,40.57999999999999,40.559999999999995,40.489999999999995,40.51,40.42999999999999,40.41999999999999,40.58,40.550000000000004,40.510000000000005,40.66,40.80000000000001,40.93999999999999,41.1,41.43999999999999],"color":"green"},{"name":"anthropic","data":[55.79,56.57000000000001,57.29,57.97,58.589999999999996,58.99999999999999,59.279999999999994,59.47,59.5,59.62,59.76999999999999,59.82999999999999,60.029999999999994,60.21,60.279999999999994,60.49999999999999,60.58,60.599999999999994,60.6,60.64,60.690000000000005,60.67,60.57,60.54,60.470000000000006,60.50000000000001,60.580000000000005,60.52,60.62,60.629999999999995,60.49,60.49,60.519999999999996,60.349999999999994,60.23000000000001,60.11,59.959999999999994,59.57999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
