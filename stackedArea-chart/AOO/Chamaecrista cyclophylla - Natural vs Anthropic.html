<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.63,64.91000000000001,64.03999999999999,62.74,60.62,59.37,58.65,57.769999999999996,57.06,55.53,54.629999999999995,54.69,54.21,53.92999999999999,53.559999999999995,52.49,51.65,51.06999999999999,50.18000000000001,49.81,50.1,50.03,49.93,49.44,49.48,49.26,48.769999999999996,48.62,48.58,48.17999999999999,47.91,47.449999999999996,47.17999999999999,46.800000000000004,46.49,45.9,45.629999999999995,46.17],"color":"green"},{"name":"anthropic","data":[35.41,36.129999999999995,37.019999999999996,38.33,40.44,41.68000000000001,42.379999999999995,43.269999999999996,43.980000000000004,45.54,46.44,46.36,46.85,47.12,47.489999999999995,48.57,49.419999999999995,49.98,50.86,51.25,50.96,51.03,51.14,51.6,51.580000000000005,51.790000000000006,52.25999999999999,52.440000000000005,52.47,52.88,53.15,53.62,53.89000000000001,54.26,54.57,55.16,55.43,54.85999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
