<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.849999999999994,61.27,61.07999999999999,61.309999999999995,60.95,60.580000000000005,60.52,60.7,60.64000000000001,60.580000000000005,60.4,60.07,59.4,58.97,58.11,57.36,56.86000000000001,56.67000000000001,56.41,56.379999999999995,56.07,55.92,55.85000000000001,55.61,55.63,55.62,55.56,55.53999999999999,55.510000000000005,55.53,55.309999999999995,55.209999999999994,55.18,55.21999999999999,55.31,55.51999999999999,55.52000000000001,55.57999999999999],"color":"green"},{"name":"anthropic","data":[38.57,41.160000000000004,41.34,41.120000000000005,41.47,41.83,41.879999999999995,41.72,41.769999999999996,41.84,42.010000000000005,42.34,43.02,43.449999999999996,44.28,45.05,45.56,45.739999999999995,46,46.04,46.35,46.510000000000005,46.57,46.81,46.79999999999999,46.79,46.85,46.89000000000001,46.89,46.9,47.1,47.21,47.26,47.19,47.08,46.9,46.9,46.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
