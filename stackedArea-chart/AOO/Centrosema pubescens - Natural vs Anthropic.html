<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.11,64.30000000000001,63.82,62.81999999999999,62.00000000000002,61.780000000000015,61.68000000000001,61.410000000000004,60.86,60.40000000000001,59.92000000000001,59.769999999999996,59.410000000000004,58.85,58.510000000000005,58.25000000000001,57.970000000000006,57.56,57.12,57.08999999999999,57.11999999999998,57.29,57.35999999999999,57.32999999999999,56.98,56.809999999999995,56.42,56.080000000000005,55.85999999999999,55.77,55.580000000000005,55.580000000000005,55.519999999999996,55.480000000000004,55.32999999999999,55.279999999999994,55.39,54.919999999999995],"color":"green"},{"name":"anthropic","data":[44.68000000000001,45.51,45.970000000000006,46.970000000000006,47.81000000000001,48.02,48.13000000000001,48.400000000000006,48.949999999999996,49.400000000000006,49.88000000000001,50.040000000000006,50.39000000000001,50.959999999999994,51.28,51.56,51.83,52.23000000000001,52.68000000000001,52.72,52.669999999999995,52.5,52.41,52.45,52.82000000000001,52.970000000000006,53.38,53.71,53.92000000000001,54.04,54.23,54.21999999999999,54.269999999999996,54.32,54.46999999999999,54.52,54.410000000000004,54.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
