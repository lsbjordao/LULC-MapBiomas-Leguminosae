<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.52,95.55,95.25999999999999,94.81,95.16,95.99,96.08,95.96,95.44999999999999,95.42999999999999,95.41999999999999,96.38999999999999,96.41,96.65,96.83,97.03,96.70000000000002,96.73,96.96000000000001,97.06,97.22999999999999,97.31,95.96000000000001,95.69,95.61,94.93000000000002,94.83000000000001,93.7,92.50999999999999,91.77,91.37,90.84,90.81,90.74,90.96000000000001,91.14,91.30000000000001,91.36000000000001],"color":"green"},{"name":"anthropic","data":[5.1,4.069999999999999,4.359999999999999,4.8,4.45,3.63,3.52,3.6399999999999997,4.16,4.18,4.18,3.2199999999999998,3.19,2.9600000000000004,2.7800000000000002,2.57,2.92,2.88,2.64,2.54,2.38,2.29,3.6399999999999997,3.9099999999999993,3.99,4.67,4.7700000000000005,5.91,7.11,7.840000000000001,8.22,8.76,8.81,8.870000000000001,8.66,8.469999999999999,8.3,8.24],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
