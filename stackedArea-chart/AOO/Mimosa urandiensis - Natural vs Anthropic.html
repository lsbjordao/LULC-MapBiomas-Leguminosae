<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[17.8,16.3,12.140000000000002,12.6,12.510000000000002,14.49,16.46,19.2,20.729999999999997,22.319999999999997,21.22,18.72,18.299999999999997,18.999999999999996,19.630000000000003,19.74,20.64,18.509999999999998,17.769999999999996,17.77,17.75,18.499999999999996,19.840000000000003,17.970000000000002,18.12,17.569999999999997,17.75,16.080000000000002,16.959999999999997,16.03,15.239999999999998,15.01,15.28,17.98,18.009999999999998,16.77,16.64,17.310000000000002],"color":"green"},{"name":"anthropic","data":[81.86,83.37,87.51,87.07,87.15,85.17,83.2,80.44999999999999,78.93,77.34,78.44,80.94,81.36,80.66,80.04,79.91999999999999,79.00999999999999,81.16,81.9,81.88,81.9,81.17,79.81,81.68,81.53,82.1,81.92,83.57,82.7,83.63,84.42,84.66,84.38,81.68,81.64,82.88999999999999,83.02,82.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
