<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.01,41.900000000000006,41.410000000000004,40.71,40.379999999999995,40.730000000000004,40.839999999999996,41.11,42.760000000000005,43.28999999999999,43.49,43.019999999999996,41.900000000000006,41,40.699999999999996,38.59,38.459999999999994,38.49,40.370000000000005,40.78,40.86,40.94,40.68,40.95,41.61,41.89,41.28,40.38,39.730000000000004,39.120000000000005,39.089999999999996,39.06,39.56999999999999,39.650000000000006,40.290000000000006,40.46,40.81,40.379999999999995],"color":"green"},{"name":"anthropic","data":[30.84,31.34,31.86,32.510000000000005,32.86,32.42,32.32,32.13,30.78,30.38,30.209999999999997,30.61,31.459999999999997,31.99,31.98,32.88,32.84,32.620000000000005,30.98,30.91,31.040000000000003,30.92,31.06,31.07,30.71,30.279999999999998,30.27,30.59,30.830000000000002,31.369999999999997,31.49,31.65,31.299999999999997,31.270000000000003,30.72,30.560000000000002,30.3,31.250000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
