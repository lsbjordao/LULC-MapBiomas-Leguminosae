<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.84,87.20000000000002,87.12,87.14,86.37,86.64,88.51000000000002,88.47,88.46999999999998,89.77,90.55000000000001,90.23,89.74,89.58,89.53,89.69000000000001,89.78,89.76999999999998,89.89,89.85000000000001,89.83000000000001,89.91,90.08,90.14999999999999,90.04,89.74999999999999,89.64999999999999,89.86,89.77000000000001,89.88,89.8,89.83000000000001,89.87,89.82,90.00999999999999,89.83999999999999,89.9,89.52000000000001],"color":"green"},{"name":"anthropic","data":[12.959999999999999,12.61,12.669999999999998,12.670000000000002,13.43,13.17,11.3,11.34,11.33,10.030000000000001,9.26,9.559999999999999,10.059999999999999,10.23,10.280000000000001,10.120000000000001,10.03,10.02,9.91,9.95,9.969999999999999,9.89,9.719999999999999,9.66,9.76,10.059999999999999,10.14,9.95,10.049999999999999,9.93,10,9.969999999999999,9.93,9.99,9.79,9.96,9.9,10.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
