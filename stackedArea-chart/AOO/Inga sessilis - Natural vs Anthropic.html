<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.22999999999999,61.37,61.169999999999995,61.04,60.80000000000001,60.809999999999995,61.04,61.07,61.09999999999999,61.3,61.339999999999996,61.389999999999986,61.46999999999999,61.599999999999994,61.78999999999999,61.72,61.81000000000001,61.88999999999999,61.940000000000005,61.97,62.07,62.220000000000006,62.300000000000004,62.41000000000001,62.48999999999999,62.81,62.91,63.12,63.39000000000001,63.53,63.73,63.89,64.03,64.11000000000001,64.07,64.00999999999999,64.18,64.2],"color":"green"},{"name":"anthropic","data":[43.5,43.32999999999999,43.55,43.63999999999999,43.91,43.9,43.67000000000001,43.63,43.599999999999994,43.41,43.37,43.31000000000001,43.239999999999995,43.10999999999999,42.91999999999999,42.970000000000006,42.92,42.830000000000005,42.74999999999999,42.75000000000001,42.63000000000001,42.46999999999999,42.410000000000004,42.330000000000005,42.23000000000001,41.92,41.81000000000001,41.58000000000001,41.279999999999994,41.16000000000001,40.94,40.81,40.64999999999999,40.569999999999986,40.64000000000001,40.69000000000001,40.540000000000006,40.50000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
