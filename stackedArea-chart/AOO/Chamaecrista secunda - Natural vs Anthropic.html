<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.57,74.87,74.86999999999999,75.27,75.17999999999998,74.25,74.28,74.70000000000002,75.09000000000002,75.60000000000001,76.07,76.57000000000001,77.26,77.83,78.47,78.61000000000001,79.27000000000001,79.26,79.16,79.31,79.65,79.64000000000001,79.61,79.90000000000002,79.99000000000001,80.04,80.17999999999999,80.2,80.24999999999999,80.35000000000001,80.5,80.56,80.65,80.75000000000001,80.96000000000001,80.94999999999999,80.99000000000001,81.03999999999999],"color":"green"},{"name":"anthropic","data":[26.29,25.98,26.02,25.6,25.689999999999998,26.62,26.59,26.169999999999998,25.770000000000003,25.27,24.800000000000004,24.3,23.619999999999997,23.060000000000002,22.41,22.259999999999998,21.61,21.59,21.72,21.560000000000002,21.2,21.240000000000002,21.24,20.97,20.89,20.84,20.68,20.68,20.61,20.509999999999998,20.38,20.31,20.220000000000002,20.11,19.93,19.92,19.880000000000003,19.840000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
