<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.56,64.6,64.22,64.05999999999999,63.96999999999999,64,64,64.02999999999999,64.48,64.78,64.80999999999999,65.53999999999999,65.86999999999999,66.21999999999998,66.67,66.65,66.64,66.54,66.54,66.49000000000001,66.47000000000001,66.53,66.60000000000001,66.66000000000001,66.73,66.83000000000001,66.96000000000001,67.09,67.11,67.16,67.41,67.26,67.29,67.47999999999999,67.55,67.5,67.58999999999999,67.61],"color":"green"},{"name":"anthropic","data":[37.48,37.47,37.839999999999996,38.01,38.11,38.07,38.07,38.04,37.60000000000001,37.31,37.28,36.55,36.2,35.86999999999999,35.43,35.43000000000001,35.47,35.53999999999999,35.529999999999994,35.61999999999999,35.62999999999999,35.569999999999986,35.51,35.45,35.379999999999995,35.269999999999996,35.14,35.01,34.96999999999999,34.94,34.68,34.839999999999996,34.79,34.61,34.54,34.56999999999999,34.51,34.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
