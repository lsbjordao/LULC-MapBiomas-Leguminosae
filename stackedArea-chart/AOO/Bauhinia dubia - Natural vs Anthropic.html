<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.11999999999996,81.79999999999998,81.03,80.45999999999998,80.06999999999998,79.66999999999999,79.24999999999999,78.78999999999999,78.14999999999999,77.68,77.71,77.46999999999998,77.03000000000002,75.96,74.93999999999998,73.82000000000001,73.29999999999998,73.01,72.29999999999998,71.50999999999999,70.58999999999999,70.16,69.74,69.74,69.58999999999997,69.30999999999999,69.23999999999998,68.86,67.92999999999999,67.13,66.52999999999999,65.85000000000001,65.34,65.11,64.90000000000002,64.76000000000002,64.46000000000001,63.83],"color":"green"},{"name":"anthropic","data":[21.84,22.19,22.930000000000003,23.51,23.910000000000004,24.3,24.73,25.199999999999996,25.82,26.27,26.240000000000002,26.490000000000002,26.94,28.01,29.02,30.14,30.659999999999997,30.960000000000004,31.650000000000002,32.45,33.37,33.8,34.209999999999994,34.249999999999986,34.37999999999999,34.68,34.709999999999994,35.1,36.06,36.830000000000005,37.46,38.13,38.63,38.86,39.059999999999995,39.2,39.5,40.13999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
