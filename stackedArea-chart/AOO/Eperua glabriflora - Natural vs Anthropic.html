<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.93,89.72,89.89000000000001,91.45,91.56,92.38000000000001,94.10000000000001,93.77,93.91000000000001,96.01,97.29999999999998,97.35,97.21000000000001,97.17999999999999,97.13999999999999,97.09,97.17,97.29,97.25,97.24,97.22000000000001,97.20999999999998,97.22999999999999,97.02000000000001,96.84,96.87999999999998,96.92,97.00999999999999,96.96000000000001,96.93,96.73,96.65999999999998,96.64000000000001,96.65,96.77,96.78,96.80000000000001,96.53],"color":"green"},{"name":"anthropic","data":[9.72,9.93,9.77,8.22,8.09,7.28,5.56,5.88,5.75,3.6599999999999997,2.37,2.31,2.46,2.47,2.52,2.5700000000000003,2.4899999999999998,2.37,2.42,2.41,2.43,2.44,2.42,2.63,2.83,2.7800000000000002,2.75,2.65,2.69,2.72,2.93,3.01,3.01,3.01,2.8899999999999997,2.8899999999999997,2.85,3.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
