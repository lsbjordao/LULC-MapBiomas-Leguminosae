<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.41,86.65999999999998,85.99000000000001,85.36999999999999,84.59,84.41,83.97000000000003,83.92000000000002,83.38000000000001,83.05,82.38,81.60999999999999,80.96000000000001,80.61000000000001,80,79.53,79.01000000000002,78.49,77.54,76.85999999999999,76.1,75.33000000000001,74.93,74.4,73.99000000000001,73.88000000000001,73.68,73.79,73.54,73.28999999999999,73.02,72.72000000000001,72.67000000000002,72.57000000000001,72.47,72.50000000000001,72.17999999999999,71.27000000000001],"color":"green"},{"name":"anthropic","data":[19.33,20.07,20.759999999999998,21.34,22.14,22.299999999999997,22.78,22.819999999999997,23.36,23.68,24.349999999999998,25.130000000000003,25.78,26.11,26.74,27.200000000000003,27.729999999999997,28.269999999999996,29.189999999999998,29.880000000000003,30.64,31.42,31.810000000000002,32.33,32.72,32.86,33.050000000000004,32.940000000000005,33.2,33.44,33.709999999999994,34,34.07,34.17,34.27,34.25,34.57,35.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
