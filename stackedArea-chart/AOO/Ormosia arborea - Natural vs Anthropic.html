<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.699999999999996,60.57999999999999,60.26,59.459999999999994,59.05000000000001,58.940000000000005,58.77999999999999,58.65,58.73999999999999,58.910000000000004,58.78000000000001,58.89000000000001,59.019999999999996,58.82,59.03000000000001,58.95,59.04,59.19000000000001,59.290000000000006,59.28,59.78,59.949999999999996,60.040000000000006,60.169999999999995,60.15999999999999,60.33,60.34,60.519999999999996,60.529999999999994,60.53000000000001,60.720000000000006,60.730000000000004,60.81999999999999,60.90999999999998,60.970000000000006,61.05,60.769999999999996,60.84000000000001],"color":"green"},{"name":"anthropic","data":[45.94000000000001,46.1,46.419999999999995,47.21000000000001,47.64,47.760000000000005,47.92,48.03,47.94,47.81,47.94,47.800000000000004,47.64999999999999,47.88,47.650000000000006,47.720000000000006,47.63,47.52,47.37000000000001,47.339999999999996,46.86,46.66000000000001,46.59,46.45,46.46,46.29,46.27,46.07,46.069999999999986,46.04,45.879999999999995,45.870000000000005,45.79,45.690000000000005,45.620000000000005,45.53999999999999,45.839999999999996,45.75999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
