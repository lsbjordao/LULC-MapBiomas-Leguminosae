<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.64,70.55000000000001,67.54,65.19,65.19999999999999,65.75999999999999,65.88,65.02000000000001,63.459999999999994,61.94,58.9,56.96,55.36,54.589999999999996,47.78000000000001,46.56,45.5,45.419999999999995,45.46,47.510000000000005,46.989999999999995,45.13,42.309999999999995,41.64000000000001,41.379999999999995,41.36,39.550000000000004,37.99999999999999,36.56999999999999,37.06,37.87,38.22,38.62,38.97,39.25,39.57,41.1,40.20000000000001],"color":"green"},{"name":"anthropic","data":[25.36,29.45,32.46,34.81,34.800000000000004,34.24,34.129999999999995,34.98,36.54,38.05,41.1,43.03,44.62,45.419999999999995,52.23,53.45,54.49,54.57,54.53,52.49,52.99999999999999,54.86,57.68,58.339999999999996,58.62,58.64,60.44,61.980000000000004,63.42,62.940000000000005,62.13,61.79,61.38,61.03,60.75,60.43,58.900000000000006,59.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
