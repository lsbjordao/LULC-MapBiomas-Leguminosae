<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.279999999999994,56.709999999999994,55.6,54.64000000000001,54.32999999999999,54.34000000000001,54.239999999999995,53.71000000000001,53.05,52.930000000000014,52.010000000000005,51.94,52.48999999999998,52.589999999999996,52.87,53.07,52.629999999999995,52.410000000000004,52.10000000000001,51.8,51.51,51.28000000000001,50.989999999999995,51.18999999999999,50.99,51.57999999999999,51.54999999999999,51.379999999999995,51.279999999999994,51.11999999999999,51.1,51.51,51.79,52.37999999999999,52.239999999999995,52.29999999999999,52.26999999999998,52.32999999999999],"color":"green"},{"name":"anthropic","data":[44.440000000000005,45.06,46.160000000000004,47.11000000000001,47.46,47.42000000000001,47.56,48.08,48.739999999999995,48.86,49.76,49.86,49.28,49.199999999999996,48.92,48.74,49.14999999999999,49.35,49.67,49.96999999999999,50.269999999999996,50.510000000000005,50.82,50.57999999999999,50.79999999999999,50.21999999999999,50.239999999999995,50.41,50.51,50.660000000000004,50.68000000000001,50.300000000000004,50,49.419999999999995,49.550000000000004,49.51,49.489999999999995,49.44],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
