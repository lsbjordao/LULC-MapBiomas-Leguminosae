<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.90999999999999,61.15,60.99000000000001,60.530000000000015,60.31000000000001,60.36,60.33000000000001,60.670000000000016,60.94000000000001,61.25000000000001,61.34000000000001,61.660000000000004,61.320000000000014,61.490000000000016,61.61000000000001,61.4,61.48,61.36000000000001,61.510000000000005,61.77000000000001,61.91,62.08999999999999,62.23999999999999,62.57,62.849999999999994,62.94,63.169999999999995,63.21000000000001,63.21999999999999,63.15,63.269999999999996,63.35999999999999,63.45000000000001,63.66,63.830000000000005,63.81,64.11000000000001,64.14999999999999],"color":"green"},{"name":"anthropic","data":[43.690000000000005,43.480000000000004,43.660000000000004,44.080000000000005,44.309999999999995,44.27000000000001,44.30000000000001,43.97,43.69,43.36,43.3,42.97,43.32,43.150000000000006,43.029999999999994,43.23,43.14000000000001,43.26,43.13,42.88,42.71999999999999,42.54,42.36,42.05,41.77,41.68,41.47,41.41,41.39999999999999,41.47,41.32999999999999,41.28,41.169999999999995,40.970000000000006,40.800000000000004,40.790000000000006,40.52,40.49000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
