<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.489999999999995,47.28,45.63000000000001,44.55,42.85999999999999,42.26,41.73,40.7,40.35,39.85,39.19,37.529999999999994,37.519999999999996,37.379999999999995,37.49,37.65,37.7,36.93,36.28,36.26,36.410000000000004,36.449999999999996,36.61,36.68,36.61999999999999,36.75,36.9,36.599999999999994,36.690000000000005,36.71,36.580000000000005,36.58,36.87,37.25,36.5,36.51,35.67,35.57],"color":"green"},{"name":"anthropic","data":[52.68000000000001,53.88,55.550000000000004,56.63000000000001,58.34,58.93000000000001,59.46,60.480000000000004,60.84000000000001,61.34000000000001,61.99,63.63999999999999,63.66,63.80000000000001,63.690000000000005,63.56999999999999,63.510000000000005,64.29,64.95,64.97000000000001,64.83,64.79,64.63,64.59,64.63,64.48,64.35000000000001,64.63,64.56,64.53999999999999,64.63000000000001,64.65,64.35,63.98,64.7,64.72,65.56,65.66999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
