<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.15,50.08,50.709999999999994,50.989999999999995,50.97,51.31999999999999,51.169999999999995,50.589999999999996,50.220000000000006,49.29,47.9,46.61,46.79,46.42,45.48000000000001,44.93,44.540000000000006,44.36000000000001,43.88,43.24,42.85000000000001,42.62,42.77,43.230000000000004,43.459999999999994,43.18,43.34,43.29,42.91999999999999,42.59,42.60999999999999,42.5,42.76,43.81,44.550000000000004,45.11,45.78,45.690000000000005],"color":"green"},{"name":"anthropic","data":[50.67000000000001,50.730000000000004,50.120000000000005,49.81,49.85000000000001,49.48,49.64,50.220000000000006,50.60000000000001,51.52,52.910000000000004,54.190000000000005,54.00000000000001,54.39000000000001,55.330000000000005,55.9,56.25999999999999,56.46000000000001,56.93,57.580000000000005,57.97,58.18999999999999,58.050000000000004,57.59,57.349999999999994,57.629999999999995,57.47,57.529999999999994,57.879999999999995,58.230000000000004,58.19,58.29,58.06,57.01,56.27,55.709999999999994,55.05,55.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
