<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.9,65.46000000000001,65.16,64.48,64.11,63.79,63.6,63.21000000000001,62.66,62.669999999999995,62.67,62.42,62.97,62.81999999999999,62.269999999999996,61.719999999999985,61.379999999999995,61.150000000000006,61.230000000000004,61.32,61.07999999999999,60.94,61.16999999999999,61.269999999999996,61.46000000000001,61.67,61.370000000000005,60.730000000000004,59.470000000000006,58.71,58.410000000000004,58.769999999999996,58.660000000000004,58.9,58.910000000000004,58.89,58.989999999999995,59.04],"color":"green"},{"name":"anthropic","data":[37.34,37.78000000000001,38.08,38.760000000000005,39.150000000000006,39.44,39.63999999999999,40.029999999999994,40.58,40.550000000000004,40.55,40.81,40.260000000000005,40.4,40.949999999999996,41.510000000000005,41.849999999999994,42.059999999999995,41.99,41.9,42.15,42.31,42.06999999999999,41.949999999999996,41.75,41.54999999999999,41.86,42.489999999999995,43.76,44.529999999999994,44.84,44.459999999999994,44.58,44.339999999999996,44.33,44.32,44.23,44.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
