<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.36,78.3,78.42,78.28999999999998,78,77.62,77.5,76.99000000000002,76.61000000000001,76.30000000000001,75.99,75.77000000000002,75.92999999999999,75.94999999999999,76.04,76.22,76.04,75.85,75.59,74.96000000000001,74.42999999999998,74.22999999999998,74.21,74.27999999999999,74.25999999999999,74.13000000000001,73.88,73.59,73.30000000000001,72.89,72.82000000000002,72.72,72.61,72.64999999999999,72.58000000000001,72.31,72.17999999999999,72.01],"color":"green"},{"name":"anthropic","data":[28.17,28.219999999999995,28.130000000000003,28.22,28.54,28.929999999999996,29.01,29.52,29.92,30.22,30.540000000000006,30.759999999999998,30.589999999999996,30.58,30.49,30.300000000000004,30.480000000000004,30.679999999999996,30.929999999999996,31.560000000000002,32.059999999999995,32.28999999999999,32.309999999999995,32.24,32.24999999999999,32.379999999999995,32.63999999999999,32.94,33.230000000000004,33.65,33.71,33.81,33.91,33.88999999999999,33.959999999999994,34.21,34.35,34.49999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
