<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.23,75.00999999999999,74.55000000000001,74.39000000000001,73.99,73.96000000000002,73.88,73.83000000000001,73.98,74.39999999999999,74.62,74.9,74.87999999999998,74.96000000000001,75.19,74.97999999999999,74.69999999999999,74.8,74.94999999999999,75.1,75.38,75.6,75.57,75.73999999999998,75.63999999999999,75.89,76.08,76.11999999999999,76.3,76.29,76.39,76.43999999999998,76.55,76.58,76.56999999999998,76.47999999999999,76.67,76.43],"color":"green"},{"name":"anthropic","data":[31.2,31.43,31.87,32.05,32.440000000000005,32.48,32.54,32.60000000000001,32.459999999999994,32.040000000000006,31.839999999999996,31.55,31.56,31.48,31.25,31.480000000000004,31.75,31.63,31.499999999999996,31.360000000000003,31.080000000000002,30.86,30.880000000000003,30.700000000000006,30.810000000000002,30.560000000000006,30.34,30.33,30.160000000000004,30.150000000000002,30.05,30.020000000000003,29.91,29.870000000000005,29.900000000000002,29.980000000000004,29.77,30.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
