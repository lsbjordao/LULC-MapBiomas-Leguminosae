<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.1,65.02000000000001,64.88000000000001,64.76,63.67,63.17000000000001,62.65,62.03999999999999,61.48,60.839999999999996,60.33,60.31999999999999,59.41000000000001,59.04,58.39,57.440000000000005,56.85000000000001,56.5,55.650000000000006,54.88999999999999,55.199999999999996,55,54.989999999999995,54.61,54.64,54.620000000000005,54.49,54.57,54.440000000000005,54.24000000000001,54.03000000000001,53.95000000000001,54.03,53.90000000000001,53.82,53.71000000000001,53.54,53.61999999999999],"color":"green"},{"name":"anthropic","data":[34.78000000000001,35.84,35.98,36.1,37.209999999999994,37.7,38.230000000000004,38.84,39.400000000000006,40.029999999999994,40.55,40.559999999999995,41.470000000000006,41.849999999999994,42.47,43.44,44.03,44.370000000000005,45.22,45.98,45.660000000000004,45.87,45.89,46.25000000000001,46.22,46.25,46.379999999999995,46.31,46.449999999999996,46.63999999999999,46.830000000000005,46.92,46.839999999999996,46.97,47.06,47.17,47.34,47.25],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
