<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.47999999999999,98.24,98.24,95.37,89.88000000000001,88.88999999999999,89.00999999999999,89.07000000000001,89.30000000000001,89.23,89.21000000000001,88.90000000000002,87.08000000000001,86.63,86.46,86.12,86.02000000000001,85.81000000000002,85.60000000000001,84.76999999999998,84.57000000000001,84.08,82.77000000000001,82.29,82.21000000000001,82.00000000000001,81.75000000000001,81.66,81.33,80.9,80.98,80.81,80.54,80.44000000000001,79.66999999999999,79.65,79.53,74.7],"color":"green"},{"name":"anthropic","data":[4.21,4.44,4.46,7.33,12.82,13.81,13.679999999999998,13.62,13.409999999999998,13.469999999999999,13.49,13.799999999999999,15.639999999999999,16.05,16.25,16.57,16.69,16.89,17.1,17.930000000000003,18.12,18.610000000000003,19.939999999999998,20.419999999999998,20.519999999999996,20.720000000000002,20.96,21.05,21.38,21.79,21.72,21.880000000000003,22.16,22.250000000000004,23.040000000000003,23.049999999999997,23.169999999999998,27.999999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
