<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.29,51.660000000000004,50.99,50.24,49.50000000000001,49.21,49.160000000000004,49.03,49.08,48.959999999999994,48.66,48.669999999999995,48.53,48.21,48.139999999999986,47.82999999999999,47.940000000000005,48,48.31,48.519999999999996,48.51,48.559999999999995,48.56999999999999,48.39999999999999,48.449999999999996,48.59,48.39000000000001,48.41,48.29,48.1,48.07999999999999,47.89,47.970000000000006,48.040000000000006,48.139999999999986,48.24,48.27000000000001,48.55000000000001],"color":"green"},{"name":"anthropic","data":[44.98,45.63999999999999,46.339999999999996,47.12,47.87999999999999,48.19999999999999,48.239999999999995,48.36999999999999,48.36,48.489999999999995,48.779999999999994,48.79,48.88,49.160000000000004,49.24,49.53000000000001,49.45000000000001,49.36000000000001,49.05,48.87,48.849999999999994,48.809999999999995,48.78,48.94,48.88000000000001,48.76,48.970000000000006,48.970000000000006,49.050000000000004,49.239999999999995,49.28999999999999,49.5,49.4,49.32,49.28,49.269999999999996,49.260000000000005,49.00000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
