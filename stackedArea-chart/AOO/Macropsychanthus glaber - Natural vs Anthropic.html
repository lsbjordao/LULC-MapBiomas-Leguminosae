<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.9,65.00000000000001,64.46000000000001,63.81,63.27000000000001,63.440000000000005,63.09,62.4,61.86000000000001,61.19000000000001,60.489999999999995,60.180000000000014,59.93,59.78,59.370000000000005,59.07,58.85,58.43999999999999,57.94000000000001,57.73000000000001,57.59,57.190000000000005,56.96,57.06,57.120000000000005,57.120000000000005,56.92,56.71000000000001,56.19,55.89000000000001,55.78,55.74,55.72,55.769999999999996,55.800000000000004,55.53,55.53000000000001,55.199999999999996],"color":"green"},{"name":"anthropic","data":[39.78,40.68,41.230000000000004,41.87999999999999,42.419999999999995,42.24000000000001,42.60000000000001,43.28,43.83,44.50999999999999,45.199999999999996,45.5,45.75,45.910000000000004,46.31000000000002,46.629999999999995,46.839999999999996,47.25,47.730000000000004,47.959999999999994,48.080000000000005,48.489999999999995,48.71,48.620000000000005,48.56,48.57000000000001,48.790000000000006,48.97,49.49000000000001,49.8,49.88999999999999,49.93000000000001,49.97,49.9,49.90000000000001,50.160000000000004,50.16,50.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
