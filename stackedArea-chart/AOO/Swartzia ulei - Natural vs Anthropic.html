<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.08000000000001,88.82000000000001,88.74000000000001,88.89000000000001,88.54,89.12,90.16000000000001,89.25,88.72999999999999,89.61999999999999,90.61,90.51,90.61999999999998,90.23000000000002,89.89,90,89.9,90.11,90.44999999999999,90.52,90.57,90.57,90.7,90.89999999999999,90.89,90.87,90.81,91.11999999999999,91.24,91.36999999999999,91.42,91.57000000000002,91.63000000000001,91.8,92.08000000000001,92.00000000000001,92.10999999999999,91.67],"color":"green"},{"name":"anthropic","data":[11.78,12.05,12.12,11.98,12.340000000000002,11.75,10.700000000000001,11.620000000000001,12.15,11.25,10.250000000000002,10.360000000000001,10.24,10.65,10.98,10.88,10.99,10.77,10.42,10.34,10.3,10.29,10.19,9.96,9.98,10.01,10.06,9.739999999999998,9.63,9.51,9.459999999999999,9.290000000000001,9.25,9.08,8.790000000000001,8.87,8.76,9.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
