<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.900000000000006,60.16,59.910000000000004,59.56,58.96999999999999,58.86,58.88999999999999,58.96,59,58.669999999999995,58.510000000000005,58.62,58.900000000000006,58.2,58.16,58.209999999999994,58.1,57.73,58.04,58.31999999999999,58.260000000000005,58.34,58.160000000000004,58.03,58.31000000000001,58.39999999999999,58.42,58.339999999999996,58.38999999999999,58.93,59.68,59.730000000000004,59.629999999999995,59.47999999999999,59.45,59.49000000000001,59.68,59.60999999999999],"color":"green"},{"name":"anthropic","data":[38.88999999999999,39.63999999999999,39.88,40.24,40.84,40.94,40.910000000000004,40.83,40.78,41.120000000000005,41.28,41.18,40.9,41.59,41.63999999999999,41.59,41.71000000000001,42.07,41.77,41.49000000000001,41.55,41.45,41.63000000000001,41.78,41.50000000000001,41.39,41.379999999999995,41.46,41.41,40.879999999999995,40.11,40.07000000000001,40.18000000000001,40.33,40.37,40.300000000000004,40.14,40.199999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
