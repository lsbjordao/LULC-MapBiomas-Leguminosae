<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.49000000000001,63.230000000000004,62.47,61.89,61.379999999999995,61.12,60.99999999999999,60.800000000000004,60.59000000000001,60.379999999999995,60.29999999999999,60.18,60.169999999999995,60.029999999999994,59.72,59.449999999999996,59.19,58.86000000000001,58.51,58.17999999999999,57.78,57.68000000000001,57.56,57.48,57.42,57.36999999999999,57.10999999999999,56.79,56.52,56.220000000000006,56.13,56.07,55.71000000000001,55.91000000000001,55.68,55.53,55.05,54.44],"color":"green"},{"name":"anthropic","data":[37.64000000000001,38.9,39.670000000000016,40.250000000000014,40.739999999999995,41.01000000000001,41.13,41.32000000000001,41.540000000000006,41.75,41.81,41.95000000000001,41.96,42.089999999999996,42.41,42.68000000000001,42.92,43.27,43.61000000000001,43.95000000000001,44.33,44.440000000000005,44.540000000000006,44.629999999999995,44.71,44.77,45.03,45.34000000000001,45.61,45.910000000000004,46.00999999999999,46.050000000000004,46.400000000000006,46.22999999999999,46.45,46.58999999999999,47.09,47.71000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
