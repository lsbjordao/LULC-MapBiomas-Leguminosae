<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.35,78.57000000000001,77.59000000000003,76.9,76.42000000000002,76.18000000000002,75.75000000000001,75.9,76.02000000000002,76.25000000000001,76.99000000000001,77.58000000000001,77.80000000000001,76.91,76.14,75.18000000000002,74.46000000000001,74.04,73.54000000000002,73.16,73.16000000000001,73.14,72.75000000000001,72.97,72.74000000000001,73.24999999999999,73.28,73.38000000000001,72.83999999999999,72.50999999999999,72.05000000000001,71.83000000000001,71.53000000000002,71.73000000000003,71.54,71.33000000000001,71.31,71.2],"color":"green"},{"name":"anthropic","data":[34.629999999999995,35.37999999999999,36.35999999999999,37.07,37.519999999999996,37.779999999999994,38.220000000000006,38.06,37.93,37.69,36.970000000000006,36.370000000000005,36.160000000000004,37.040000000000006,37.81,38.78,39.50000000000001,39.910000000000004,40.43,40.79,40.790000000000006,40.81999999999999,41.21000000000001,41,41.22,40.73,40.67999999999999,40.57,41.12,41.44,41.910000000000004,42.15,42.45000000000001,42.24,42.43000000000001,42.63000000000001,42.64000000000001,42.74],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
