<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.760000000000005,59.71,59.510000000000005,59.349999999999994,58.97,58.480000000000004,57.86,57.03,56.669999999999995,55.99,55.11000000000001,54.41000000000001,53.980000000000004,53.050000000000004,52.63,52.41000000000001,52.24,51.39000000000001,50.99000000000001,50.7,50.760000000000005,50.88,50.96,51.010000000000005,50.86000000000001,50.849999999999994,51.449999999999996,50.83,50.32000000000001,49.86,49.75,49.66,49.55,49.54,49.7,49.66,49.75000000000001,50.510000000000005],"color":"green"},{"name":"anthropic","data":[40.379999999999995,41.43,41.629999999999995,41.79,42.17,42.65,43.28,44.1,44.489999999999995,45.14,46.01,46.720000000000006,47.17000000000001,48.09,48.529999999999994,48.72,48.9,49.74,50.14999999999999,50.44,50.390000000000015,50.28000000000001,50.190000000000005,50.129999999999995,50.300000000000004,50.28000000000001,49.69,50.309999999999995,50.81,51.269999999999996,51.38,51.480000000000004,51.59,51.61,51.43,51.459999999999994,51.39,50.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
