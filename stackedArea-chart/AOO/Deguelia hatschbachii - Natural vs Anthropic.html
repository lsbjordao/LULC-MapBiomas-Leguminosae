<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.56,49.43,48.26,47.99000000000001,47.94000000000002,47.830000000000005,47.94,47.98000000000001,48.03,48.010000000000005,47.879999999999995,47.78000000000001,47.68,47.8,48.2,47.769999999999996,47.61000000000001,47.41,47.599999999999994,47.53999999999999,47.77000000000001,47.949999999999996,48.36,48.83999999999999,49.24999999999999,50.09,50.400000000000006,50.660000000000004,50.870000000000005,51.219999999999985,51.59,51.65,52.16,52.31999999999999,52.38999999999999,52.72,53.129999999999995,53.370000000000005],"color":"green"},{"name":"anthropic","data":[50.56,51.69,52.86999999999999,53.129999999999995,53.17999999999999,53.28000000000001,53.19,53.150000000000006,53.11,53.12,53.260000000000005,53.36,53.44,53.34,52.93,53.349999999999994,53.519999999999996,53.699999999999996,53.54,53.589999999999996,53.36,53.19,52.76,52.29,51.870000000000005,51.03,50.720000000000006,50.49,50.269999999999996,49.9,49.550000000000004,49.480000000000004,48.96,48.81,48.75,48.41,47.980000000000004,47.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
