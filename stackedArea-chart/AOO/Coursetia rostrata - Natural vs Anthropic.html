<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.86,56.61,55.57,55,54.129999999999995,54.14000000000001,53.85,52.82,52.17999999999999,51.89,51.78,52.06,52.690000000000005,52.63,52.75,52.940000000000005,52.470000000000006,52.550000000000004,53.03,52.970000000000006,53.19000000000001,53.74,53.76999999999999,53.68,53.34,53.550000000000004,53.480000000000004,53,53.050000000000004,52.72,52.55,52.59,52.59,52.81999999999999,52.879999999999995,52.9,52.79,52.72999999999999],"color":"green"},{"name":"anthropic","data":[44.28,44.53000000000001,45.56999999999999,46.120000000000005,47.02,46.99,47.29,48.31,48.96999999999999,49.239999999999995,49.35000000000001,49.09,48.440000000000005,48.50999999999999,48.410000000000004,48.190000000000005,48.660000000000004,48.57,48.11,48.18,47.95,47.39999999999999,47.37,47.45000000000001,47.8,47.59,47.66999999999999,48.13,48.1,48.42000000000001,48.580000000000005,48.540000000000006,48.55,48.33,48.26000000000001,48.230000000000004,48.37,48.42999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
