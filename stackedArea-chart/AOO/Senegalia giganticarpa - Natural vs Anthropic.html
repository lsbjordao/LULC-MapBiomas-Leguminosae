<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.79,58.540000000000006,58.419999999999995,58.58,58.190000000000005,57.800000000000004,57.53000000000001,57.480000000000004,57.45000000000001,57.46000000000001,55.150000000000006,55.03999999999999,54.95,54.970000000000006,54.81,55.30000000000001,55.33000000000001,55.800000000000004,56.01,56.00000000000001,55.850000000000016,55.71000000000001,55.37000000000001,55.14000000000001,55.36,55.45000000000001,55.55000000000001,55.54999999999999,55.62,55.67,55.67,55.739999999999995,55.699999999999996,55.73,55.749999999999986,55.61999999999999,55.669999999999995,55.97],"color":"green"},{"name":"anthropic","data":[44.82000000000001,44.080000000000005,44.18,44.03999999999999,44.419999999999995,44.83,45.09,45.14000000000001,45.169999999999995,45.17,47.480000000000004,47.59,47.66999999999999,47.650000000000006,47.800000000000004,47.31999999999999,47.279999999999994,46.81999999999999,46.60000000000001,46.61,46.74999999999999,46.92,47.25000000000001,47.470000000000006,47.27000000000001,47.169999999999995,47.06,47.059999999999995,46.97999999999999,46.94,46.92,46.87000000000001,46.93000000000002,46.88,46.87,47,46.93999999999999,46.65],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
