<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.28000000000001,35.03000000000001,34.83,33.48000000000001,32.010000000000005,32.260000000000005,32.41,32.14,31.949999999999996,32.14,31.869999999999997,32.81,33.96,33.809999999999995,34.279999999999994,34.52,34.62,34.309999999999995,33.79,33.76999999999999,33.96,34.61,34.58,35.04,35.56,35.279999999999994,35.220000000000006,34.870000000000005,34.74,34.77000000000001,34.98,35.580000000000005,35.5,35.88,36.14,36.169999999999995,36.379999999999995,37.46],"color":"green"},{"name":"anthropic","data":[66.4,65.66,65.86999999999999,67.21000000000001,68.67,68.42999999999999,68.28999999999999,68.55,68.73,68.55,68.82,67.88000000000001,66.73,66.87,66.4,66.17,66.08,66.38000000000001,66.89999999999999,66.92,66.74000000000001,66.07999999999998,66.1,65.63,65.13000000000001,65.41,65.46999999999998,65.82,65.95,65.92,65.7,65.09,65.19,64.8,64.55,64.50999999999999,64.3,63.21],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
