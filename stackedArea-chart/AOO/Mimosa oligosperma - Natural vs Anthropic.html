<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.65,94.07000000000001,94.26,94.22,94.21000000000001,94.38000000000001,94.34,94.33,94.25,94.19,93.73000000000002,93.60000000000001,93.16000000000001,92.97999999999999,92.77,92.73,92.67,92.53,92.41,92.5,92.65000000000002,92.61000000000001,92.65,92.71000000000001,92.67,92.08,91.71,91.02,90.66000000000001,90.78999999999999,91.03000000000002,91.55,92.10999999999999,92.29,92.51,92.50999999999999,92.48,92.46],"color":"green"},{"name":"anthropic","data":[6.04,5.6,5.42,5.47,5.47,5.3100000000000005,5.34,5.359999999999999,5.44,5.49,5.96,6.07,6.52,6.7,6.909999999999999,6.95,7.02,7.16,7.27,7.17,7.04,7.06,7.0200000000000005,6.97,7.0200000000000005,7.6,7.97,8.65,9.02,8.9,8.649999999999999,8.129999999999999,7.57,7.390000000000001,7.180000000000001,7.16,7.19,7.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
