<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.69,49.309999999999995,48.71999999999999,48.35999999999999,47.980000000000004,47.83,47.530000000000015,47.64000000000001,47.720000000000006,47.769999999999996,47.82,47.84999999999999,47.69,47.53,47.36,47.21,47.260000000000005,47.259999999999984,47.41,47.4,47.350000000000016,47.43000000000001,47.45,47.41000000000001,47.510000000000005,47.419999999999995,47.379999999999995,47.470000000000006,47.410000000000004,47.50000000000001,47.6,47.56,47.56,47.730000000000004,47.699999999999996,47.73999999999999,47.919999999999995,47.940000000000005],"color":"green"},{"name":"anthropic","data":[47.89,48.349999999999994,49.00000000000001,49.38,49.75,49.91,50.220000000000006,50.129999999999995,50.05,50.01,49.96,49.949999999999996,50.1,50.23999999999999,50.38,50.54999999999999,50.49,50.54,50.37,50.38,50.419999999999995,50.339999999999996,50.29999999999999,50.34,50.25,50.35,50.4,50.330000000000005,50.38,50.309999999999995,50.23,50.28,50.29,50.08,50.13,50.09,49.91,49.809999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
