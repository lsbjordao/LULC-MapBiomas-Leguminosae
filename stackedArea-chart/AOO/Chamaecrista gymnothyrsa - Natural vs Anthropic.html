<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.58,97.58999999999999,97.60999999999999,97.63000000000001,97.61999999999999,97.57000000000001,97.49,97.47999999999999,97.44999999999999,97.46,97.55000000000001,97.60000000000001,97.55999999999999,97.57000000000001,97.64,97.49999999999999,97.36999999999999,97.30000000000001,97.28,97.34999999999998,97.38000000000001,97.41,97.44999999999999,97.48000000000002,97.54,97.63,97.66,97.77,97.75999999999999,97.65,97.66,97.69,97.66,97.67,97.67,97.68,97.64999999999999,97.67999999999999],"color":"green"},{"name":"anthropic","data":[2.16,2.16,2.13,2.1,2.1,2.17,2.25,2.26,2.29,2.29,2.19,2.14,2.18,2.1799999999999997,2.1,2.2399999999999998,2.37,2.4299999999999997,2.46,2.38,2.35,2.3200000000000003,2.29,2.27,2.19,2.11,2.06,1.96,1.97,2.08,2.07,2.04,2.07,2.08,2.07,2.06,2.08,2.07],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
