<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.65,87.43999999999998,86.88,90.41,89.64,91.25,91.19,90,90.16000000000001,89.91000000000001,89.9,86.03999999999999,85.57,85.36000000000001,85.50999999999998,85.62,85.24000000000001,84.16000000000001,81.95,81.25999999999998,81.17999999999999,81.26000000000002,81.03,81.18000000000002,81.32000000000002,81.30000000000001,81.21999999999998,80.85000000000001,80.98,81.03,80.38999999999999,79.82000000000001,78.96000000000001,78.14,78.52,78.39999999999999,77.70000000000002,75.91],"color":"green"},{"name":"anthropic","data":[13.96,13.17,13.75,10.209999999999999,10.969999999999999,9.379999999999999,9.43,10.62,10.48,10.71,10.73,14.579999999999998,15.049999999999999,15.260000000000002,15.11,14.990000000000002,15.379999999999999,16.46,18.67,19.37,19.439999999999998,19.36,19.58,19.439999999999998,19.310000000000002,19.32,19.4,19.770000000000003,19.650000000000002,19.57,20.229999999999997,20.810000000000002,21.66,22.48,22.110000000000003,22.230000000000004,22.939999999999998,24.689999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
