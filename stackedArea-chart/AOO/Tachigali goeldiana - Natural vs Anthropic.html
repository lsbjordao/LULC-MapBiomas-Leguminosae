<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.75,99.86000000000001,99.60000000000002,99.33000000000001,99.44999999999999,99.49,99.29999999999998,99.18,98.85,98.53,98.24000000000001,97.87,97.78000000000002,97.75,97.37,97.36999999999999,97.78,97.3,96.78,96.02,96.30999999999999,96.22999999999999,96.08000000000001,95.91,95.8,96.11,96.46000000000001,96.65,96.60000000000001,96.53999999999999,96.23,95.77,95.80000000000001,95.56,95.41,94.92,94.73,94.64999999999999],"color":"green"},{"name":"anthropic","data":[3.5800000000000005,3.46,3.74,4.02,3.8800000000000003,3.84,4.029999999999999,4.15,4.4799999999999995,4.79,5.08,5.46,5.55,5.59,5.95,5.949999999999999,5.5600000000000005,6.04,6.550000000000001,7.3100000000000005,7.029999999999999,7.1,7.250000000000001,7.4,7.53,7.21,6.89,6.67,6.720000000000001,6.8,7.1,7.56,7.539999999999999,7.78,7.919999999999999,8.42,8.6,8.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
