<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.849999999999994,47.129999999999995,47.06000000000001,46.629999999999995,46.790000000000006,46.73,46.65,46.8,46.949999999999996,47.11000000000001,47.11,47.3,47.59,47.96000000000001,48.2,48.019999999999996,48.21,48.239999999999995,48.86,49.06,48.94999999999999,48.89,49.05000000000001,49.050000000000004,48.87,48.99,49.01,49.00999999999999,49.06999999999999,48.879999999999995,48.980000000000004,48.99000000000001,48.91,48.93,49.1,49.3,49.29999999999999,49.92999999999999],"color":"green"},{"name":"anthropic","data":[52.84,53.55,53.62,54.05,53.89999999999999,53.94,54.019999999999996,53.88,53.73,53.57,53.559999999999995,53.39,53.09,52.72,52.489999999999995,52.66,52.47999999999999,52.42999999999999,51.82,51.62,51.73,51.78,51.62,51.61,51.8,51.69,51.66,51.660000000000004,51.60000000000001,51.800000000000004,51.699999999999996,51.69,51.760000000000005,51.74999999999999,51.57,51.38,51.38,50.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
