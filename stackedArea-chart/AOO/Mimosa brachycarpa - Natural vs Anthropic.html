<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.839999999999996,58.42,57.6,57.08,56.26000000000001,56.02,55.52000000000001,55.55000000000001,54.6,53.54,52.68,51.35,50.440000000000005,48.339999999999996,47.410000000000004,47.25,46.82,46.129999999999995,44.57,42.91000000000001,41.64,41.57,41.660000000000004,41.75,41.76,41.92000000000001,41.62,41.440000000000005,41.220000000000006,41.26,40.99,40.99,41.06,41.300000000000004,41.510000000000005,41.55,41.66999999999999,42.07],"color":"green"},{"name":"anthropic","data":[39.949999999999996,42.39,43.19,43.730000000000004,44.540000000000006,44.769999999999996,45.26,45.25,46.21,47.27,48.129999999999995,49.45,50.37,52.47,53.400000000000006,53.550000000000004,53.99,54.67999999999999,56.22,57.90999999999999,59.18,59.24,59.14,59.05,59.05,58.879999999999995,59.2,59.37,59.58,59.54,59.82,59.81999999999999,59.74999999999999,59.52,59.300000000000004,59.25,59.14,58.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
