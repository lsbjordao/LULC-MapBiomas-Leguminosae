<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.25,87.07000000000002,86.72000000000001,87.09,88.08,89.33999999999999,89.47000000000001,89.41999999999999,89.21000000000001,89.16000000000001,89.93,90.00999999999999,89.68,90.02,90.08999999999999,89.51,89.35,89.83000000000001,89.02000000000001,88.9,88.92999999999998,88.46,88.72,88.82,89.00999999999999,89.39,89.55,89.73,89.53999999999999,89.11999999999999,89.14,89.54,89.55,89.58,89.69,89.79,87.09,87.04],"color":"green"},{"name":"anthropic","data":[15.08,14.26,14.62,14.240000000000002,13.250000000000002,11.98,11.86,11.92,12.14,12.17,11.39,11.33,11.649999999999999,11.3,11.239999999999998,11.83,11.98,11.5,12.309999999999999,12.43,12.4,12.860000000000001,12.610000000000001,12.509999999999998,12.32,11.940000000000001,11.78,11.6,11.8,12.21,12.19,11.78,11.78,11.75,11.64,11.54,14.25,14.3],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
