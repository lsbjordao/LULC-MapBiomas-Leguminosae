<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.15,50.160000000000004,49.75000000000001,49.18000000000001,48.6,48.370000000000005,48.010000000000005,47.73,47.650000000000006,47.66,47.580000000000005,47.49,47.43000000000001,47.58,47.71999999999999,47.74000000000001,47.760000000000005,47.70000000000001,47.559999999999995,47.35,47.519999999999996,47.60999999999999,47.65,47.74,47.85999999999999,47.94,47.96999999999999,47.919999999999995,47.919999999999995,47.92,48.089999999999996,48.129999999999995,48.24999999999999,48.339999999999996,48.279999999999994,48.199999999999996,48.23,48.629999999999995],"color":"green"},{"name":"anthropic","data":[53.06000000000002,54.040000000000006,54.45,55.01000000000001,55.589999999999996,55.8,56.20999999999999,56.47,56.55000000000001,56.56999999999999,56.620000000000005,56.71,56.78,56.61000000000001,56.489999999999995,56.48,56.459999999999994,56.47999999999999,56.64,56.84,56.7,56.599999999999994,56.54999999999999,56.47,56.339999999999996,56.269999999999996,56.24,56.290000000000006,56.27,56.29,56.129999999999995,56.080000000000005,55.949999999999996,55.87,55.92000000000001,56.00000000000001,56.00000000000001,55.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
