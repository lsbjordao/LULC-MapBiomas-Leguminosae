<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.62,57.76000000000001,56.769999999999996,55.48000000000001,55.03000000000001,54.81000000000001,54.05000000000001,53.93,53.68000000000001,53.63,53.77,54.09,53.7,53.31,53.2,53.13000000000001,53.12000000000001,53.02000000000001,53.019999999999996,53.14,53.28,53.33,53.209999999999994,53.25999999999999,53.459999999999994,53.39,53.52999999999999,53.71999999999999,53.690000000000005,53.79999999999999,53.96,53.839999999999996,53.89,54.029999999999994,54.15,54.30000000000001,54.59,55.02000000000001],"color":"green"},{"name":"anthropic","data":[46.32,46.16,47.16,48.46,48.89000000000001,49.12,49.85999999999999,49.98,50.21,50.3,50.150000000000006,49.839999999999996,50.21,50.58999999999999,50.71000000000001,50.78,50.81,50.9,50.89000000000001,50.78,50.65000000000001,50.580000000000005,50.73,50.67,50.47,50.519999999999996,50.39,50.18000000000001,50.21000000000001,50.120000000000005,49.959999999999994,50.089999999999996,50.03000000000001,49.870000000000005,49.769999999999996,49.62000000000001,49.34,48.900000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
