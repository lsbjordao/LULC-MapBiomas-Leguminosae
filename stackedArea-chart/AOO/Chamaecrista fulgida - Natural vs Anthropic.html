<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.26,92.14999999999999,92.7,92.64999999999999,92.73999999999998,92.59,92.58,92,91.84000000000003,91.72,91.92999999999999,92.84000000000002,93,93.31,93.48,93.54,92.67999999999999,92.76,93.10000000000001,93.54000000000002,93.73,93.75,93.90000000000002,93.96,93.94,93.95,93.98999999999998,94.05000000000003,94.19999999999999,94.37,94.35999999999999,94.36999999999999,94.35,94.19000000000001,94.03000000000002,93.89000000000001,93.55,93.26],"color":"green"},{"name":"anthropic","data":[8.43,7.54,6.98,7.03,6.94,7.09,7.1,7.68,7.83,7.9799999999999995,7.76,6.840000000000001,6.69,6.37,6.1899999999999995,6.159999999999999,7.01,6.92,6.58,6.14,5.96,5.92,5.77,5.72,5.74,5.7299999999999995,5.71,5.63,5.47,5.31,5.32,5.31,5.33,5.49,5.66,5.79,6.13,6.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
