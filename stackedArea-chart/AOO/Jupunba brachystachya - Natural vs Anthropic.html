<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.06,70.69,70.53,70.58999999999999,70.80000000000001,70.93,70.97,71.14,71.37,72.00999999999999,72.21999999999998,72.44999999999999,72.73000000000002,73.00000000000001,73.22,73.26,73.43,73.63000000000001,73.88999999999999,74.10999999999999,74.17999999999999,74.34999999999998,74.52000000000001,74.76,74.96000000000001,75.21,75.39,75.52999999999999,75.57,75.61,75.78999999999999,75.86,75.97,76.13000000000001,76.24000000000001,76.27000000000001,76.28,76.37],"color":"green"},{"name":"anthropic","data":[27.42,26.880000000000003,27.089999999999996,27.069999999999997,26.9,26.77,26.76,26.62,26.4,25.770000000000003,25.520000000000003,25.31,25.01,24.75,24.51,24.460000000000004,24.3,24.12,23.9,23.7,23.640000000000004,23.55,23.37,23.130000000000003,22.94,22.689999999999998,22.419999999999998,22.310000000000002,22.279999999999998,22.26,22.07,22.05,21.95,21.740000000000002,21.580000000000005,21.55,21.55,21.450000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
