<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.239999999999995,62.68000000000001,62.620000000000005,62.58,62.58,62.349999999999994,62.39000000000001,62.41,62.63999999999999,62.66,62.91,63.1,63.15,63.33000000000001,63.3,63.34,63.62,63.599999999999994,64.01,64.08999999999999,64.22,64.32,64.39999999999999,64.49,64.59,64.53999999999999,64.62,64.62,64.57000000000001,64.46000000000001,64.41999999999999,64.35000000000001,64.45,64.50000000000001,64.66,64.69000000000001,64.66,64.64999999999999],"color":"green"},{"name":"anthropic","data":[9.62,9.2,9.259999999999998,9.28,9.28,9.499999999999998,9.469999999999999,9.43,9.209999999999999,9.19,8.94,8.719999999999999,8.68,8.509999999999998,8.53,8.519999999999998,8.239999999999998,8.239999999999998,7.840000000000001,7.760000000000001,7.63,7.53,7.470000000000001,7.370000000000001,7.27,7.300000000000001,7.25,7.22,7.29,7.39,7.45,7.5,7.4,7.37,7.180000000000001,7.14,7.2,7.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
