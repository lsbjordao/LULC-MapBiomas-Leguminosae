<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.060000000000002,31.37,31.34,31.07,30.259999999999998,29.259999999999998,28.779999999999998,28.69,28.950000000000003,29.490000000000002,29.560000000000002,29.81,30.029999999999998,29.97,29.69,29.409999999999997,29.62,29.960000000000004,30.14,30.099999999999998,30.019999999999996,30.239999999999995,31.18,31.52,31.8,32.269999999999996,32.75,32.71,32.86,33.06,33.59,33.58,34.06,34.08,33.78,33.7,33.33,33.45],"color":"green"},{"name":"anthropic","data":[69.3,69,69.02000000000001,69.28999999999999,70.1,71.1,71.59,71.67999999999999,71.4,70.87,70.8,70.56,70.33,70.39,70.67,70.94999999999999,70.75,70.41,70.23,70.28,70.35000000000001,70.12,69.18,68.84,68.56,68.1,67.61,67.64999999999999,67.50999999999999,67.3,66.78999999999999,66.78999999999999,66.32000000000001,66.3,66.58999999999999,66.66,67.03,66.9],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
