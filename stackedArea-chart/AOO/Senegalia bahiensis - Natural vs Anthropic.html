<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.74,49.18999999999999,48.47,48.05,47.38,47.010000000000005,46.959999999999994,46.43,45.91000000000001,46.03999999999999,46.27,47.160000000000004,48.18,48.360000000000014,48.44,48.46000000000001,48.190000000000005,48.1,47.680000000000014,47.300000000000004,46.94000000000001,46.90000000000001,46.96000000000001,46.97999999999999,47.13,47.249999999999986,47.410000000000004,47.34,47.550000000000004,47.46,47.45,47.17000000000001,47.00000000000001,47.21000000000001,47.069999999999986,47.08,47.05000000000001,47.29000000000001],"color":"green"},{"name":"anthropic","data":[58.319999999999986,58.87,59.58,60.019999999999996,60.66999999999999,61.059999999999995,61.09,61.61,62.129999999999995,62.02,61.79999999999999,60.9,59.88999999999999,59.72,59.63999999999999,59.61,59.879999999999995,59.98999999999999,60.37999999999999,60.75999999999999,61.10999999999999,61.16,61.11,61.1,60.94,60.82,60.669999999999995,60.72,60.52,60.61,60.620000000000005,60.900000000000006,61.07,60.84,60.97,60.980000000000004,61,60.760000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
