<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.11000000000001,59.650000000000006,59.330000000000005,58.959999999999994,58.64999999999999,58.480000000000004,58.34999999999999,58.010000000000005,57.9,57.9,57.96,58.13999999999999,58.48000000000001,58.73,59.04,59.480000000000004,59.74999999999999,59.769999999999996,59.690000000000005,59.78000000000001,59.74000000000001,59.540000000000006,59.41000000000001,59.26,59.27999999999999,59.38000000000001,59.21,59.230000000000004,59.019999999999996,58.71999999999999,58.57,58.45,58.37,58.36,58.38,58.47,58.4,58.73999999999999],"color":"green"},{"name":"anthropic","data":[45.24999999999999,45.730000000000004,46.059999999999995,46.39999999999999,46.709999999999994,46.88999999999999,47.03,47.37,47.48,47.489999999999995,47.43000000000001,47.24000000000001,46.9,46.64000000000001,46.33,45.900000000000006,45.61,45.599999999999994,45.71,45.589999999999996,45.64,45.809999999999995,45.96,46.12,46.07999999999999,46.00999999999999,46.17,46.14,46.36999999999999,46.63999999999999,46.81,46.93000000000001,46.989999999999995,47.019999999999996,46.97,46.89,46.98,46.63999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
