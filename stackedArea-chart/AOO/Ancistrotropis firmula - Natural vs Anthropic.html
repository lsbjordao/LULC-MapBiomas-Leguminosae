<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.12,79.43,79.06,78.49,78.39999999999998,78.13000000000001,77.82,77.39,77.00999999999999,75.9,74.54,74.32,73.97,73.77,73.77999999999999,73.63,73.09000000000002,72.36000000000001,71.5,70.98,70.47,70.19999999999999,69.86,69.53,69.46,68.98,68.67,68.72999999999999,68.85,68.46,68.06,68.05000000000001,68.15,68.07,67.83000000000001,66.56,66.25999999999999,65.36],"color":"green"},{"name":"anthropic","data":[24.090000000000007,23.780000000000005,24.169999999999998,24.729999999999997,24.82,25.1,25.389999999999997,25.84,26.230000000000004,27.349999999999998,28.700000000000006,28.900000000000006,29.27,29.45,29.47,29.609999999999996,30.14,30.869999999999997,31.74,32.25,32.760000000000005,33.019999999999996,33.37,33.71,33.790000000000006,34.25000000000001,34.550000000000004,34.50000000000001,34.39000000000001,34.79,35.17,35.17,35.08,35.160000000000004,35.41,36.660000000000004,36.980000000000004,37.88000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
