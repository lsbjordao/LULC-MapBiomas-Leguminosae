<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.77,64.61,64.25,64.2,64.08,64.49,64.52,65.03000000000002,65.63,66.41000000000001,66.61,67.25,67.45,67.67000000000002,67.85,67.98000000000002,68.09,68.21,68.32,68.44000000000001,68.62,68.97000000000001,69.21,69.4,69.55000000000001,69.68,70.14,70.41,70.92999999999999,71.28999999999999,71.66,71.72999999999999,71.91000000000001,72.03999999999999,72.11,72.25999999999999,72.46,72.47],"color":"green"},{"name":"anthropic","data":[34.480000000000004,33.620000000000005,34.00000000000001,34.02,34.169999999999995,33.74999999999999,33.72,33.22,32.62,31.840000000000003,31.630000000000003,30.99,30.790000000000003,30.57,30.400000000000002,30.26,30.16,30.05,29.940000000000005,29.810000000000002,29.63,29.259999999999998,29.020000000000003,28.85,28.69,28.560000000000002,28.1,27.840000000000003,27.31,26.95,26.580000000000002,26.509999999999998,26.340000000000003,26.209999999999997,26.12,25.97,25.770000000000003,25.780000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
