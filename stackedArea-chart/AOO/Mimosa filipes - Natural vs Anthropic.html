<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.07,69.73000000000002,68.71000000000001,67.88,67.41,67.06,66.77000000000001,66.46,66.41,66.21,66.63000000000001,66.92,67.47,67.30000000000001,67.64,66.99,66.85,66.73,66.46,66.66999999999999,66.55,66.63999999999999,66.67999999999999,67.01,66.71000000000001,66.94999999999999,66.18,65.74000000000001,65.16,64.49000000000001,64.18,64.21,64.17,64.6,64.69,64.91,64.84,64.97999999999999],"color":"green"},{"name":"anthropic","data":[32.79,33.13999999999999,34.17,34.99,35.47,35.82,36.099999999999994,36.41,36.459999999999994,36.64,36.25,35.949999999999996,35.42,35.56999999999999,35.23,35.89,36.04,36.150000000000006,36.42999999999999,36.2,36.32,36.220000000000006,36.2,35.87,36.169999999999995,35.93,36.71,37.14,37.699999999999996,38.379999999999995,38.68,38.68000000000001,38.709999999999994,38.29,38.18000000000001,37.97999999999999,38.029999999999994,37.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
