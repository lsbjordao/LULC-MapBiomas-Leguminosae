<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.42,68.45,68.55999999999999,68.52999999999999,68.27,68.30999999999999,68.34,68.42,68.84,69.25,70.38,71.29,71.62000000000002,71.57,71.36,71,70.64,70.42999999999999,70.65,69.96000000000002,70.24000000000002,70.50000000000001,70.86999999999999,71.72,72.28,72.41000000000001,72.51,72.89,73.02,72.94,73.38000000000001,73.31,73.26,73.41,73.17999999999999,72.82000000000001,72.78999999999999,71.84],"color":"green"},{"name":"anthropic","data":[31.42,31.4,31.279999999999998,31.32,31.58,31.550000000000004,31.509999999999998,31.430000000000003,31.02,30.589999999999996,29.47,28.55,28.209999999999997,28.28,28.49,28.85,29.22,29.41,29.220000000000002,29.900000000000002,29.61,29.35,28.98,28.13,27.58,27.44,27.339999999999996,26.970000000000002,26.82,26.919999999999998,26.46,26.53,26.58,26.439999999999998,26.66,27.02,27.060000000000006,28.020000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
