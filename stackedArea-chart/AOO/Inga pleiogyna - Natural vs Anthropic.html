<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.54999999999998,75.98,75.54,74.69999999999999,74.24,74.25,74.21999999999998,74.57,74.59,74.72999999999999,75.07000000000001,75.23999999999998,75.52999999999997,75.46999999999998,75.12999999999998,74.36999999999999,74.17999999999999,73.69999999999999,73.85,73.90999999999998,73.70999999999998,73.83999999999999,73.79999999999998,74.50999999999999,75.09,75.39,75.53000000000002,75.69,75.24,74.91,74.95999999999998,74.89999999999998,74.64,74.86999999999998,74.67,74.51999999999998,74.77,75.35000000000002],"color":"green"},{"name":"anthropic","data":[22.819999999999997,22.48,22.959999999999997,23.790000000000003,24.28,24.259999999999998,24.29,23.91,23.869999999999997,23.75,23.41,23.229999999999997,22.93,22.999999999999996,23.349999999999998,24.080000000000002,24.290000000000003,24.770000000000003,24.619999999999997,24.55,24.74,24.63,24.68,23.99,23.4,23.11,22.96,22.82,23.26,23.590000000000003,23.55,23.610000000000003,23.83,23.579999999999995,23.86,24.020000000000003,23.810000000000002,23.200000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
