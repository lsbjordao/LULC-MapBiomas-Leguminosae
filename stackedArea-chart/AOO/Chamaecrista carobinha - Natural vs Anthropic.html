<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.14,64.03,63.6,63.150000000000006,62.739999999999995,62.339999999999996,63.07,62.63999999999999,61.86,61.41,60.31,58.67,59.379999999999995,59,59.449999999999996,60.36,60.64000000000001,60.70000000000001,60.2,58.43000000000001,58.07000000000001,57.580000000000005,57.25,57.06,56.77,56.21000000000001,55.05999999999999,54.98,54.09,53.49,53.67999999999999,53.61,53.53999999999999,53.849999999999994,53.84,54.80000000000001,53.91,54.850000000000016],"color":"green"},{"name":"anthropic","data":[36.58,36.7,37.14,37.57,37.99,38.39,37.650000000000006,38.1,38.88,39.309999999999995,40.42000000000001,42.059999999999995,41.35,41.72,41.269999999999996,40.37,40.08,40.02,40.529999999999994,42.29,42.66,43.14,43.5,43.66,43.94,44.51999999999999,45.669999999999995,45.75,46.63999999999999,47.25,47.05,47.11,47.169999999999995,46.89,46.89,45.94,46.81000000000001,45.879999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
