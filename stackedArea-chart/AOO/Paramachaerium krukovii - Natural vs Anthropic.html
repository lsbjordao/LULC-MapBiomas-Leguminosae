<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.33000000000001,75.24000000000001,75.37,75.9,76.84,79.05000000000001,80.68999999999998,80.08999999999999,78.78999999999999,79.41,82.94000000000001,83.1,83.73,83.96,83.78,86.99000000000001,86.92999999999999,87.04999999999998,86.67000000000002,85.4,79.34,79.27999999999999,80.67,80.87,78.6,76.82000000000001,76.55000000000001,76.39,76.2,75.95,75.37,74.38000000000001,72.39,69.82000000000001,69.22,69.83,68.15,67.91],"color":"green"},{"name":"anthropic","data":[24.3,24.39,24.259999999999998,23.740000000000002,22.79,20.580000000000002,18.95,19.54,20.830000000000002,20.220000000000002,16.7,16.53,15.899999999999999,15.690000000000001,15.850000000000001,12.64,12.700000000000001,12.58,12.97,14.23,20.29,20.349999999999998,18.97,18.77,21.04,22.81,23.09,23.25,23.430000000000003,23.680000000000003,24.26,25.240000000000002,27.23,29.81,30.41,29.8,31.49,31.72],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
