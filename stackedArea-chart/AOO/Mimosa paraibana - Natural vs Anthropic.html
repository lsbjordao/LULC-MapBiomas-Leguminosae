<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.99,59.209999999999994,56.67,55.499999999999986,54.19000000000001,53.48000000000001,53.47,53.709999999999994,53.68000000000001,53.58,54.01,54.76,54.53999999999999,54.32999999999999,52.779999999999994,52.01,52.03999999999999,52.21999999999999,52.480000000000004,52.75999999999999,53.34999999999998,54.36999999999999,54.49000000000001,55,55.23,55.120000000000005,55.22,54.21,53.7,53.06,52.45,52.53999999999999,52.29999999999999,52.14999999999999,52.25,52.31999999999999,52.199999999999996,52.209999999999994],"color":"green"},{"name":"anthropic","data":[39.32999999999999,41.12,43.66,44.82,46.11999999999999,46.839999999999996,46.84000000000001,46.61000000000001,46.66,46.760000000000005,46.3,45.53000000000001,45.77,45.99,47.53000000000001,48.32000000000001,48.26,48.080000000000005,47.80999999999999,47.550000000000004,46.95,45.93000000000001,45.81,45.32,45.089999999999996,45.18,45.08,46.129999999999995,46.61000000000001,47.28,47.87,47.78,48.040000000000006,48.150000000000006,48.09,48.02000000000002,48.14000000000001,48.120000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
