<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.54999999999999,54.71,54.36999999999999,53.8,52.95,52.76,52.37,52.010000000000005,51.81999999999999,51.58,51.34000000000001,51.31000000000001,51.11000000000001,51.06,50.8,50.56,50.559999999999995,50.48000000000001,50.379999999999995,50.410000000000004,50.63000000000001,50.78000000000001,50.71,50.4,50.25,50.080000000000005,50.02,49.97,50.019999999999996,50.07,50.099999999999994,50.2,50.129999999999995,50.07000000000001,50.029999999999994,49.92,49.85,49.9],"color":"green"},{"name":"anthropic","data":[48.00000000000001,48.86999999999999,49.190000000000005,49.74999999999999,50.629999999999995,50.80999999999999,51.2,51.559999999999995,51.75,51.980000000000004,52.209999999999994,52.260000000000005,52.46000000000001,52.519999999999996,52.76,53.01,53.019999999999996,53.09,53.21000000000001,53.120000000000005,52.92,52.78999999999999,52.86,53.17,53.339999999999996,53.519999999999996,53.529999999999994,53.589999999999996,53.51999999999999,53.51,53.46000000000001,53.370000000000005,53.41999999999999,53.5,53.529999999999994,53.649999999999984,53.71999999999999,53.66999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
