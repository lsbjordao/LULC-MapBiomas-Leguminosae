<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.45,54.54,53.42,51.68,50.99999999999999,50.47,49.76000000000001,49.940000000000005,49.77000000000002,49.65999999999999,49.74,50.02,50.54,50.230000000000004,50.33,50.059999999999995,49.96,49.489999999999995,49.56000000000001,49.46,49.22,49.67,49.99999999999999,50.07000000000001,50.63999999999999,50.81000000000001,51.02,51.45,51.69,51.82000000000001,51.980000000000004,52.05000000000002,52.39000000000001,53.09,53.330000000000005,53.56000000000001,53.790000000000006,54.06],"color":"green"},{"name":"anthropic","data":[48.24,49.12,50.25,51.96,52.67999999999999,53.2,53.91,53.72999999999999,53.88,54.010000000000005,53.94,53.650000000000006,53.120000000000005,53.45,53.33,53.6,53.699999999999996,54.18,54.10999999999999,54.19,54.459999999999994,53.989999999999995,53.67,53.60000000000001,53.02,52.86,52.66000000000001,52.21000000000001,51.96000000000001,51.849999999999994,51.690000000000005,51.6,51.28000000000001,50.57,50.35,50.11,49.87,49.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
