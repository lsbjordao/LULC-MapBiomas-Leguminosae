<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.800000000000004,59.83,59.269999999999996,58.51999999999999,57.14999999999999,56.57999999999999,55.93999999999999,55.290000000000006,54.74,53.709999999999994,53.17,53.1,52.540000000000006,52.27,52.04,51.59,51.680000000000014,51.31,50.69,50.269999999999996,50.71,50.720000000000006,50.650000000000006,50.57,50.690000000000005,50.790000000000006,50.69000000000001,50.57,50.58000000000001,50.45000000000001,50.28,50.21000000000001,50.19000000000001,50.10999999999999,50.06,49.94,49.870000000000005,50.06999999999999],"color":"green"},{"name":"anthropic","data":[46.86,48.86,49.44,50.190000000000005,51.529999999999994,52.08999999999999,52.75,53.38999999999999,53.93,54.989999999999995,55.51,55.58,56.17,56.400000000000006,56.63,57.11,56.999999999999986,57.35999999999999,58.00999999999999,58.410000000000004,57.98000000000001,57.95,58.02000000000001,58.099999999999994,57.98,57.89,58.00000000000001,58.10000000000001,58.10000000000001,58.230000000000004,58.419999999999995,58.48000000000001,58.5,58.56999999999999,58.61000000000001,58.74,58.809999999999995,58.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
