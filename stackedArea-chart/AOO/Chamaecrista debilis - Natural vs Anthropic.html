<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.32,68.28999999999999,67.91000000000001,67.58000000000001,67.28999999999999,67.41000000000003,67.51,67.40999999999998,67.29,67.07,66.69,66.69000000000001,66.7,66.96000000000001,67.12,66.95,66.9,66.60000000000001,66.41000000000001,66.33000000000001,66.33000000000003,66.35000000000001,66.19,65.97,66.00999999999999,65.78,65.48,65.44,65.27,65.19000000000001,64.92999999999999,64.83,64.86999999999999,64.88999999999999,65.01,64.82,64.81,64.97],"color":"green"},{"name":"anthropic","data":[33.54999999999999,34.62,34.989999999999995,35.37,35.63,35.53,35.43,35.52,35.65,35.870000000000005,36.24000000000001,36.27,36.25,35.99,35.83,35.98,36.03999999999999,36.36,36.51999999999999,36.63,36.61,36.60999999999999,36.769999999999996,36.96999999999999,36.94999999999999,37.15999999999999,37.46,37.529999999999994,37.66,37.78,38,38.120000000000005,38.099999999999994,38.059999999999995,37.94,38.14999999999999,38.13999999999999,37.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
