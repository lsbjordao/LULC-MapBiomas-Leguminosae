<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.08999999999999,67.35,67.55,67.21000000000001,66.6,66.24999999999999,65.46999999999998,64.94999999999999,64.49,64.22999999999999,64.02,64.22,64.35999999999999,64.02,64.03,63.870000000000005,63.489999999999995,63.28,62.68,62.42999999999999,61.86,61.75000000000001,61.31,61.02,60.97,60.699999999999996,60.57000000000001,60.65,60.54,60.31,60.26,60.220000000000006,60.16,59.97999999999999,59.879999999999995,59.75000000000001,58.839999999999996,57.2],"color":"green"},{"name":"anthropic","data":[32.290000000000006,33.019999999999996,32.81,33.17,33.769999999999996,34.12,34.9,35.410000000000004,35.88,36.13999999999999,36.36,36.15,36.010000000000005,36.339999999999996,36.34,36.49,36.88,37.09,37.699999999999996,37.949999999999996,38.510000000000005,38.63000000000001,39.050000000000004,39.36,39.42000000000001,39.67,39.790000000000006,39.699999999999996,39.83,40.04,40.11,40.14,40.21,40.37,40.47,40.61,41.53,43.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
