<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.35000000000001,96.02,96.02000000000001,96.36000000000001,96.72,96.87000000000002,97.00999999999999,97.07000000000001,97.03,96.32999999999998,96.35000000000001,96.82000000000001,96.88999999999999,96.95,97.02,97.05999999999999,96.79,96.66000000000001,96.47999999999999,96.22999999999999,96.27,96.28,96.47,96.53000000000002,96.58999999999999,96.50999999999999,96.42,96.64,96.48999999999998,96.47999999999999,96.52000000000001,96.55000000000001,96.36000000000001,95.72999999999999,94.63999999999999,94.55,95.39999999999999,94.78],"color":"green"},{"name":"anthropic","data":[8.52,7.84,7.84,7.51,7.140000000000001,6.99,6.84,6.79,6.84,7.550000000000001,7.52,7.029999999999999,6.98,6.93,6.83,6.800000000000001,7.0600000000000005,7.2,7.37,7.63,7.6,7.59,7.4,7.34,7.28,7.36,7.43,7.219999999999999,7.38,7.39,7.35,7.300000000000001,7.489999999999999,8.120000000000001,9.22,9.309999999999999,8.45,9.08],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
