<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[16.459999999999997,13.5,13.600000000000001,12.729999999999999,12.55,12.19,11.819999999999999,11.519999999999996,10.540000000000001,9.639999999999999,9.770000000000001,9.720000000000002,9.93,9.879999999999999,9.789999999999997,9.47,9.23,9.21,9.41,9.450000000000001,9.769999999999998,9.700000000000001,9.67,10.31,10.619999999999997,10.779999999999998,11.299999999999999,11.4,11.4,11.47,11.709999999999999,11.590000000000002,11.89,11.919999999999998,11.84,11.900000000000002,11.720000000000002,11.590000000000002],"color":"green"},{"name":"anthropic","data":[83.41,86.36,86.26,87.11,87.31000000000002,87.66,88.04,88.35000000000001,89.31,90.22,90.09000000000002,90.14000000000001,89.94,89.99000000000001,90.08,90.38000000000001,90.63999999999999,90.64,90.44,90.41000000000001,90.08,90.16999999999999,90.17000000000002,89.54999999999998,89.24000000000001,89.08,88.56,88.47,88.45,88.39999999999998,88.16,88.27,87.97000000000001,87.94,88.02,87.94999999999999,88.11999999999999,88.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
