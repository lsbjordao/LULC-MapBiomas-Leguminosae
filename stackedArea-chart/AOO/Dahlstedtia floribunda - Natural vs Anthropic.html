<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.199999999999996,43.29,43.22,43.300000000000004,43.080000000000005,43.190000000000005,43.14000000000001,43.00000000000001,43.37,44.29000000000001,44.580000000000005,45.36000000000001,45.74,45.99,46.580000000000005,46.58000000000001,46.82,47.24000000000001,47.61000000000001,47.88,48.08000000000001,48.46,48.86,49.010000000000005,49.220000000000006,49.59,49.94000000000001,50.08,50.22,50.35000000000001,50.48000000000001,50.77000000000001,51.13000000000001,51.32,51.3,51.41000000000001,51.52,51.57],"color":"green"},{"name":"anthropic","data":[58.790000000000006,58.69,58.75,58.68,58.910000000000004,58.800000000000004,58.839999999999996,58.970000000000006,58.6,57.69,57.4,56.63,56.23,56.00000000000001,55.39,55.41,55.160000000000004,54.74,54.37,54.11,53.9,53.51,53.129999999999995,52.980000000000004,52.77,52.400000000000006,52.04,51.90999999999999,51.78,51.64,51.5,51.199999999999996,50.83999999999999,50.669999999999995,50.699999999999996,50.57000000000001,50.46,50.410000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
