<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.54,55.440000000000005,55.039999999999985,54.58,53.68999999999998,53.33,53.12,52.74,52.93000000000001,52.010000000000005,50.68,50.199999999999996,49.690000000000005,49.03,48.69,48.43,48.26,47.88,47.359999999999985,46.959999999999994,46.559999999999995,45.95999999999999,45.800000000000004,45.22,44.87,45.07000000000001,44.72,44.290000000000006,43.87,43.62,43.41,43.050000000000004,42.910000000000004,42.76,42.50999999999999,42.27,42.06,42.209999999999994],"color":"green"},{"name":"anthropic","data":[45.73,47.81,48.22,48.68000000000001,49.57000000000001,49.92,50.15,50.510000000000005,50.309999999999995,51.24000000000001,52.58,53.07,53.56,54.21,54.56999999999999,54.83,55.00999999999999,55.38,55.92,56.31,56.7,57.309999999999995,57.46,58.02,58.41,58.17,58.54,58.96,59.38000000000001,59.629999999999995,59.849999999999994,60.21999999999999,60.329999999999984,60.50999999999999,60.74,60.98,61.18,61.03999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
