<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.709999999999994,62.89999999999999,63.160000000000004,61,60.11,58.190000000000005,57.349999999999994,57.53,56.54,55.660000000000004,56.959999999999994,57.53000000000001,59.029999999999994,58.91,58.39,59.34000000000001,59.73,60.21,59.849999999999994,60.39,61.300000000000004,61.54,61.78,62.18,62.29,62.75,62.72999999999999,62.64,61.59,61.81999999999999,62.21,62.209999999999994,62.98,63.089999999999996,62.599999999999994,61.95,61.83,61.81999999999999],"color":"green"},{"name":"anthropic","data":[38.959999999999994,38.77,38.51,40.67,41.55,43.49000000000001,44.31,44.14,45.120000000000005,46.01,44.71000000000001,44.14,42.629999999999995,42.760000000000005,43.279999999999994,42.330000000000005,41.94,41.46,41.8,41.28,40.35,40.12,39.88,39.489999999999995,39.38,38.9,38.93,39.019999999999996,40.06,39.84,39.45,39.44,38.66,38.57,39.07000000000001,39.709999999999994,39.83,39.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
