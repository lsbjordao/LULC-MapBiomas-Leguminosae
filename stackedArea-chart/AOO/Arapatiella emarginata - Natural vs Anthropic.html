<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.90999999999998,77.05000000000001,76.07000000000001,73.31,71.72000000000003,69.86999999999999,68.92000000000003,70.35000000000001,69.6,69.53,69.9,70.57000000000002,70.5,69.49000000000001,69.7,69.22999999999999,69.63,69.49,69.87999999999998,69.86,69.38000000000001,69.44999999999999,69.57000000000001,69.83,70.89999999999999,71.14,70.76999999999998,70.30999999999999,69.57000000000002,68.31000000000002,68.28999999999999,67.86999999999999,67.47,68.55,68.61999999999999,68.56,69.66,71.00999999999999],"color":"green"},{"name":"anthropic","data":[12.760000000000002,13.9,14.9,17.72,19.310000000000002,21.16,22.12,20.62,21.360000000000003,21.419999999999998,21.05,20.389999999999997,20.439999999999998,21.38,21.15,21.59,21.189999999999998,21.37,20.990000000000002,21.000000000000004,21.52,21.47,21.33,21.04,19.95,19.68,20.04,20.49,21.279999999999998,22.509999999999998,22.580000000000002,23.02,23.119999999999997,22.03,21.959999999999997,22.03,20.79,19.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
