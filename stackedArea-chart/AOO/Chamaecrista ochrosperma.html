                    yAxis: {

                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {

                            lineColor: '#666666',

                            marker: { enabled: false }
