<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.49999999999999,61.890000000000015,61.559999999999995,61.71,60.96999999999999,60.88,60.529999999999994,60.170000000000016,60.660000000000004,60.61000000000001,60.28,60.41000000000001,60.92,61.029999999999994,60.870000000000005,61.08,61.05000000000001,60.95,61.35,61.81000000000001,63.19,64.03,64.11000000000001,64.22000000000001,64.46000000000001,64.53999999999999,64.43,63.85000000000001,63.42000000000001,63.02,63.12000000000001,62.989999999999995,63.34,64.06,64.51,65.59,65.89000000000001,66.68],"color":"green"},{"name":"anthropic","data":[36.88,37.59,37.910000000000004,37.790000000000006,38.53,38.62,38.97,39.41000000000001,38.980000000000004,39.01000000000001,39.35,39.18000000000001,38.5,38.300000000000004,38.39000000000001,38.10000000000001,38.13,38.21000000000001,37.830000000000005,37.31000000000001,35.92000000000001,35.14,35.050000000000004,34.95,34.699999999999996,34.660000000000004,34.709999999999994,35.24,35.67,36.099999999999994,36.089999999999996,36.23,35.81999999999999,35.06999999999999,34.84000000000001,33.790000000000006,33.480000000000004,32.580000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
