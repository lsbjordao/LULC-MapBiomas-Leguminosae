<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.84,69.42000000000002,69.27,69.03,68.77,68.80000000000001,68.66999999999999,68.47999999999998,67.69,67.36,67.29,67.17999999999999,67.24,67.27000000000001,67.02,66.65,66.42,66.17,65.87,65.69,65.75,65.62,65.4,65.47000000000001,65.49000000000001,65.31,65.11000000000001,65.1,65.13,65.25,65.4,65.41999999999999,65.56,65.52,65.47,65.42,65.37,65.28],"color":"green"},{"name":"anthropic","data":[30.95,31.37,31.51,31.759999999999994,32.03,32.01,32.15,32.31,33.11000000000001,33.42,33.5,33.62,33.550000000000004,33.510000000000005,33.760000000000005,34.15,34.37,34.64000000000001,34.92,35.08,35.04,35.18,35.39,35.339999999999996,35.31,35.480000000000004,35.67,35.690000000000005,35.67000000000001,35.529999999999994,35.37,35.38,35.230000000000004,35.269999999999996,35.309999999999995,35.36,35.419999999999995,35.49999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
