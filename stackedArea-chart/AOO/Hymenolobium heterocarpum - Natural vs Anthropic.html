<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.4,88.63,88.63,88.29,87.6,87.33,87.22999999999999,87.56,87.72,87.6,87.75,87.57000000000001,86.84,86.48000000000002,86.31,86.29000000000002,86.36,86.39,86.30999999999999,86.34,86.48999999999998,86.38,86.44000000000001,86.43000000000002,86.31000000000002,86.31,86.23,86.27000000000001,85.57999999999998,85.42,84.38000000000001,84.29,84.25,84.14999999999999,84.25999999999999,83.88000000000001,83.87000000000002,82.64000000000001],"color":"green"},{"name":"anthropic","data":[11.190000000000001,10.96,10.96,11.280000000000001,11.99,12.26,12.34,12.030000000000001,11.86,11.98,11.84,12.020000000000001,12.75,13.1,13.27,13.290000000000001,13.219999999999999,13.2,13.27,13.24,13.1,13.200000000000001,13.14,13.16,13.27,13.26,13.35,13.31,13.989999999999998,14.169999999999998,15.19,15.299999999999999,15.329999999999998,15.43,15.33,15.7,15.719999999999999,16.950000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
