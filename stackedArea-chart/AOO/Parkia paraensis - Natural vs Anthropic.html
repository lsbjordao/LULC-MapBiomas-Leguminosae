<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.16,71.49000000000001,71.09,70.93,70.47999999999999,71.36000000000001,71.82999999999998,70.75999999999999,70.11999999999999,70.24000000000001,70.31,70.12,69.80000000000001,68.39,67.94,67.37,68.21,68.55,69.55,69.56,69.72,69.91,69.94,68.67,68.07000000000001,66.17999999999999,66.17,66.58999999999999,67.10000000000001,66.38,65.85,62.39,61.89,62.19,62.24,63.470000000000006,62.84,61.86],"color":"green"},{"name":"anthropic","data":[25.4,28.06,28.46,28.63,29.07,28.200000000000003,27.720000000000002,28.82,29.43,29.31,29.249999999999996,29.45,29.749999999999996,31.169999999999998,31.62,32.18000000000001,31.349999999999998,31.01,30.009999999999998,30,29.85,29.630000000000003,29.61,30.9,31.49,33.38,33.38,32.97,32.45,33.18,33.71,37.160000000000004,37.68,37.37,37.32,36.089999999999996,36.73,37.69],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
