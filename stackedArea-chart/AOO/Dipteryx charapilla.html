<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[70.49,69.96,71.13,71.87,72.2,73.52,75.32,75.78,76.28,77.69,78.47,77.91,76.52,76.29,76.12,76.89,77.11,76.94,77.03,77.08,77.04,77.12,76.64,76.21,75.97,75.38,74.56,74.49,75.11,75.09,75.71,75.56,74.31,73.32,72.68,72.7,72.84,73.95],"color":"#006400"},{"name":"Flooded forest","data":[4.62,4.75,4.75,4.68,4.75,4.81,5.21,5.29,5.39,5.63,5.65,5.63,5.29,5.74,5.78,6.04,6.16,6.08,6.1,5.88,5.86,6.21,6.23,5.97,5.95,5.99,6.01,6.21,6.19,6.17,6.22,6.22,6.07,6,6.08,6.06,6.08,6.14],"color":"#76A5AF"},{"name":"Wetland","data":[2.11,1.59,1.99,1.73,2.16,2.53,1.09,1.13,2.12,1.17,1.96,2.09,4,1.96,1.72,1.5,1.86,1.08,1.34,1.93,1.67,0.71,0.93,0.75,0.88,0.82,0.87,1.1,0.74,0.51,0.39,0.69,0.77,0.65,0.63,0.72,0.92,0.3],"color":"#45C2A5"},{"name":"Grassland","data":[4.29,3.25,3.17,2.95,3.1,2.55,2.31,1.87,1.8,2.23,0.99,1.06,1.7,2.58,3.33,3.45,4.17,4.44,4.73,4.28,3.84,6.02,5.72,5.27,4.85,5.63,5.34,5.97,5.38,5.84,5.77,5.33,5.2,6.1,5.13,5.37,5.4,5.07],"color":"#B8AF4F"},{"name":"Pasture","data":[10.1,10.23,9.56,9.28,8.59,6.97,6.24,5.96,5.12,4.47,3.73,2.87,3,4.47,4.36,3.62,3.37,3.41,3.32,3.31,3.2,2.94,3.29,3.92,4.27,4.97,5.55,5.31,4.8,4.89,4.24,4.45,5.55,6.47,7.31,7.42,6.89,6.13],"color":"#FFD966"},{"name":"River, lake and ocean","data":[7.93,9.76,8.94,9.03,8.73,9.16,9.37,9.5,8.83,8.35,8.74,9.98,9.01,8.51,8.23,8.04,6.87,7.59,7.02,7.05,7.92,6.54,6.73,7.42,7.62,6.76,7.22,6.45,7.31,7.05,7.2,7.29,7.64,6.99,7.71,7.27,7.42,7.94],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
