<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.67,74.58000000000001,74.04000000000002,73.9,74.19000000000001,74.43,74.41,74.04,74.17,74.35,74.17000000000002,74.21000000000001,74.43,74.62000000000002,74.50000000000001,74.49000000000001,74.46999999999998,74.38,74.28000000000002,74.33,74.49000000000001,74.66,74.76999999999998,74.78,74.77,74.9,75.08,75.25999999999999,75.29999999999998,75.46,75.7,75.76,75.84,75.85000000000002,75.85000000000001,75.86999999999999,75.88000000000001,75.83000000000001],"color":"green"},{"name":"anthropic","data":[27.879999999999995,27.990000000000002,28.51,28.650000000000002,28.36,28.13,28.15,28.509999999999998,28.39,28.2,28.389999999999997,28.34,28.15,27.95,28.069999999999997,28.11,28.11,28.19,28.290000000000003,28.240000000000002,28.089999999999996,27.93,27.799999999999997,27.810000000000002,27.820000000000004,27.69,27.5,27.32,27.270000000000003,27.07,26.86,26.82,26.73,26.72,26.73,26.73,26.709999999999997,26.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
