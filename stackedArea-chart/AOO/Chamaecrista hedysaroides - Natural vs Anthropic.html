<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.78,77.55,77.19000000000001,76.86,76.8,77.08,77.1,77.19,77.19,77.1,76.82000000000001,76.43,76.21,76.28999999999999,76.37,76.4,76.27,75.5,75.04,75.01,74.87000000000002,74.71,74.68,74.49999999999999,74.52,74.75000000000001,74.78999999999999,74.78000000000002,74.95000000000002,75.31,75.36,75.50999999999999,75.59,75.71,75.61999999999999,75.53,75.52,75.6],"color":"green"},{"name":"anthropic","data":[23.8,24.02,24.4,24.720000000000002,24.780000000000005,24.49,24.470000000000002,24.39,24.390000000000004,24.46,24.750000000000004,25.14,25.38,25.28,25.2,25.16,25.31,26.08,26.53,26.569999999999993,26.689999999999998,26.86,26.880000000000003,27.060000000000002,27.060000000000002,26.819999999999997,26.79,26.789999999999996,26.58,26.24,26.2,26.060000000000002,25.980000000000004,25.84,25.96,26.040000000000003,26.050000000000004,25.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
