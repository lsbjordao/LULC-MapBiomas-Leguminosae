<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.85,66.85,66.78999999999999,67.06000000000002,67.13,67.17999999999999,67.38,67.43,67.94999999999999,69.05000000000001,69.50999999999999,70.33999999999999,71.13999999999999,71.34,72.2,72.42999999999999,72.66,72.86,73,73.06,73.19,73.41999999999999,73.32999999999998,73.42,73.52,73.71,73.97,74.16000000000001,74.48999999999998,74.71999999999998,75.02,75.08,75.25000000000001,75.19,75.25000000000001,75.26,75.66000000000001,75.80000000000001],"color":"green"},{"name":"anthropic","data":[35.49,35.49,35.529999999999994,35.3,35.22,35.17,34.949999999999996,34.919999999999995,34.4,33.29,32.839999999999996,32,31.21,31.000000000000004,30.16,29.93,29.69,29.47,29.35,29.270000000000003,29.160000000000004,28.94,29.029999999999998,28.919999999999998,28.830000000000002,28.64,28.380000000000003,28.19,27.83,27.62,27.3,27.280000000000005,27.110000000000003,27.160000000000007,27.100000000000005,27.09,26.700000000000003,26.53],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
