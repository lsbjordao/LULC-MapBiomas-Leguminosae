<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.790000000000006,46.23000000000001,46,45.78999999999999,45.5,45.61,45.540000000000006,45.59,45.95,46.77,47.14000000000001,47.49,47.60999999999999,47.66,48.25000000000001,48.519999999999996,48.790000000000006,49.13,49.46,49.48,49.74,49.92,50.1,50.32,50.41000000000001,50.60000000000001,50.71999999999999,50.850000000000016,51.02,51.18,51.45,51.67,51.88,51.99,52.150000000000006,52.35,52.62,53.010000000000005],"color":"green"},{"name":"anthropic","data":[60.51,61.09000000000002,61.300000000000004,61.51000000000001,61.8,61.67999999999999,61.75,61.71999999999999,61.34999999999999,60.559999999999995,60.230000000000004,59.870000000000005,59.68,59.650000000000006,59.07999999999999,58.75999999999999,58.550000000000004,58.23999999999999,57.95999999999998,57.959999999999994,57.68,57.51,57.330000000000005,57.11,57.019999999999996,56.82,56.74,56.61000000000001,56.42,56.25999999999999,55.98,55.74,55.56999999999999,55.449999999999996,55.28999999999999,55.07999999999999,54.790000000000006,54.410000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
