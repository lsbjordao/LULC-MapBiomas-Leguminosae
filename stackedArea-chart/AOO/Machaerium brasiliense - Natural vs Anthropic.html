<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.31,64.57,64.16,63.49999999999999,62.72999999999999,62.99999999999999,62.519999999999996,61.89,61.69999999999999,61.61999999999999,61.669999999999995,61.77999999999999,61.68999999999999,61.449999999999996,60.91,60.32,60.31,60.349999999999994,60.48,60.57,60.86,61.03999999999998,61.099999999999994,61.259999999999984,61.33,61.330000000000005,61.510000000000005,61.790000000000006,61.480000000000004,61.56,61.74,61.93,61.980000000000004,61.89000000000001,61.92000000000001,62.040000000000006,62.099999999999994,61.94],"color":"green"},{"name":"anthropic","data":[38.32,38.06999999999999,38.47,39.12,39.910000000000004,39.63,40.10999999999999,40.75,40.949999999999996,41,40.97,40.86,40.95,41.18000000000001,41.739999999999995,42.32000000000001,42.33,42.29,42.14,42.040000000000006,41.77,41.6,41.52,41.370000000000005,41.3,41.28,41.120000000000005,40.85000000000001,41.150000000000006,41.06,40.900000000000006,40.7,40.64000000000001,40.75000000000001,40.7,40.589999999999996,40.550000000000004,40.67000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
