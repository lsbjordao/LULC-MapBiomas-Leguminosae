<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.16000000000001,83.39,82.75999999999999,82.45999999999998,81.78999999999999,82.11,82.69000000000001,82.38,81.01,80.23000000000002,77.3,74.34,72.71,71.38000000000001,70.22999999999999,69.67,69.13000000000001,68.61,67.42,66.53999999999999,65.76,65.28999999999999,64.95,65.26,65.53,64.92,63.87,63.5,62.77,63.17999999999999,62.38,61.67,61.68,60.87,60.23,59.92,59.040000000000006,57.67],"color":"green"},{"name":"anthropic","data":[16,16.76,17.38,17.69,18.36,18.04,17.46,17.76,19.14,19.93,22.84,25.79,27.44,28.759999999999998,29.91,30.48,31.019999999999996,31.549999999999997,32.73,33.62,34.38,34.870000000000005,35.21,34.89,34.62,35.209999999999994,36.26999999999999,36.650000000000006,37.37,36.97,37.78,38.489999999999995,38.46,39.28,39.91,40.230000000000004,41.120000000000005,42.480000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
