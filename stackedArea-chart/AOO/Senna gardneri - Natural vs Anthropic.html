<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.10000000000001,67.62,66.29,64.72000000000001,63.440000000000005,63.27,63.08,63.580000000000005,63.44000000000001,63.69,64.00000000000001,63.59,64.86,64.7,64.13,63.48000000000001,63.180000000000014,62.79,62.96,62.87,62.11,61.690000000000005,61.70000000000001,61.63000000000001,61.49,62.15,62.32000000000001,61.62,61.11000000000001,60.34,59.88999999999999,59.95000000000001,59.88000000000001,59.660000000000004,59.39,59.43000000000001,59.510000000000005,59.49],"color":"green"},{"name":"anthropic","data":[33.150000000000006,33.61,34.96,36.54,37.800000000000004,37.980000000000004,38.17,37.690000000000005,37.809999999999995,37.559999999999995,37.26,37.660000000000004,36.379999999999995,36.54,37.120000000000005,37.77,38.06,38.45,38.28,38.39999999999999,39.15,39.550000000000004,39.57,39.61,39.74,39.10999999999999,38.910000000000004,39.64,40.15,40.89,41.35999999999999,41.28,41.35999999999999,41.599999999999994,41.86,41.839999999999996,41.71,41.760000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
