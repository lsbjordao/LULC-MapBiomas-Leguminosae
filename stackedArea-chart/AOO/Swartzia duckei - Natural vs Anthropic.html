<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.03,93.95,93.21000000000001,92.3,92.03999999999999,92.66999999999999,92.73,91.83999999999999,91.69999999999999,92.86,92.94999999999999,92.6,92.25,92.81000000000002,93,93.37,93.41000000000001,93.76,93.24,93.15,93.13999999999999,93.02,93.02000000000001,93.17,92.85000000000001,92.93,93.02,93.11999999999998,93.11000000000001,93.05000000000001,93.06,93.25999999999999,93.51,93.94999999999999,94.08999999999999,94.04999999999998,94.01,93.97],"color":"green"},{"name":"anthropic","data":[5.29,6.38,7.109999999999999,8.030000000000001,8.29,7.65,7.6,8.47,8.62,7.47,7.38,7.73,8.09,7.52,7.3100000000000005,6.960000000000001,6.92,6.57,7.08,7.19,7.18,7.3100000000000005,7.300000000000001,7.16,7.459999999999999,7.4,7.3,7.210000000000001,7.210000000000001,7.2700000000000005,7.27,7.0600000000000005,6.82,6.380000000000001,6.23,6.28,6.3100000000000005,6.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
