<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.099999999999994,56.02,55.75000000000001,55.31999999999999,55.089999999999996,55.03999999999999,54.77999999999999,54.839999999999996,54.699999999999996,54.54999999999999,54.63,54.64000000000001,54.85,54.87,54.919999999999995,54.96,55.129999999999995,55.48,55.650000000000006,55.94999999999999,56.22,56.480000000000004,56.66,56.82,56.85,56.919999999999995,57.05999999999999,57.16999999999999,57.099999999999994,57.21,57.42,57.5,57.669999999999995,57.730000000000004,57.71000000000001,57.71,57.68000000000001,57.730000000000004],"color":"green"},{"name":"anthropic","data":[49.080000000000005,49.16,49.44,49.86000000000001,50.099999999999994,50.15,50.39999999999999,50.35,50.47999999999999,50.65,50.580000000000005,50.57,50.36,50.34,50.28,50.25,50.1,49.73,49.56,49.269999999999996,48.989999999999995,48.709999999999994,48.529999999999994,48.35999999999999,48.309999999999995,48.260000000000005,48.13,48,48.06000000000001,47.95,47.75,47.660000000000004,47.489999999999995,47.440000000000005,47.480000000000004,47.489999999999995,47.480000000000004,47.449999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
