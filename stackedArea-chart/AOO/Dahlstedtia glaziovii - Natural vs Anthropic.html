<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.43,52.59,52.07,52.46000000000001,52.93,54.03,54.309999999999995,54.74,55.32000000000001,55.74999999999999,55.78,56.11000000000001,56.71,56.870000000000005,56.910000000000004,57.35000000000001,57.09999999999999,57.53,58.08999999999999,58.33,58.96000000000001,59.61999999999999,60.059999999999995,60.349999999999994,60.279999999999994,60.36000000000001,61.199999999999996,61.910000000000004,62.32,62.46000000000001,62.49,62.86,63.42,63.8,64.02,64.75,65.10000000000001,64.63000000000001],"color":"green"},{"name":"anthropic","data":[49.239999999999995,49.080000000000005,49.59,49.19,48.73,47.629999999999995,47.35,46.919999999999995,46.33,45.91,45.89,45.550000000000004,44.940000000000005,44.78,44.739999999999995,44.3,44.56,44.13,43.550000000000004,43.309999999999995,42.69,42.03,41.6,41.3,41.35999999999999,41.31,40.43999999999999,39.74,39.339999999999996,39.199999999999996,39.199999999999996,38.81,38.23,37.87,37.65,36.92,36.56,37.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
