<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.05,49.730000000000004,49.259999999999984,49.24999999999999,49.10999999999999,49.260000000000005,49.400000000000006,49.50999999999999,49.17999999999999,49.24,49.15,49.91,50.040000000000006,50.8,51.44999999999999,51.47,51.39,51.9,52.42999999999999,52.95,53.230000000000004,53.45,53.59,53.69,53.62,53.720000000000006,53.63999999999999,53.87,53.900000000000006,54.14,54.23,54.34,54.440000000000005,54.519999999999996,54.65,54.66,53.61,53.660000000000004],"color":"green"},{"name":"anthropic","data":[16.87,17.189999999999998,17.68,17.68,17.81,17.65,17.500000000000004,17.41,17.740000000000002,17.69,17.75,17.01,16.88,16.12,15.459999999999999,15.48,15.55,15.01,14.5,14.01,13.709999999999999,13.51,13.35,13.239999999999998,13.31,13.24,13.31,13.06,13.03,12.780000000000001,12.7,12.59,12.51,12.44,12.309999999999999,12.27,13.319999999999999,13.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
