<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.49000000000001,97.87999999999998,98.54,98.17,98.12,98.25999999999999,98.11,98.33,98.6,98.66,98.68,98.53999999999999,98.49000000000001,98.45,98.42999999999999,98.44,98.51,98.6,98.59,98.44,98.38999999999999,98.4,98.39999999999999,98.49999999999999,98.50000000000001,98.57000000000001,98.57000000000001,98.59,98.60000000000001,98.64,98.66,98.64999999999999,98.66,98.62,98.6,97.91000000000001,97.57000000000001,95.22000000000001],"color":"green"},{"name":"anthropic","data":[2.12,1.72,1.07,1.43,1.49,1.3399999999999999,1.5,1.27,1.02,0.9299999999999999,0.9299999999999999,1.07,1.12,1.15,1.17,1.15,1.08,1,1.02,1.1600000000000001,1.21,1.19,1.19,1.1099999999999999,1.1,1.03,1.03,1.02,0.99,0.96,0.96,0.95,0.95,0.98,1.01,1.69,2.03,4.39],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
