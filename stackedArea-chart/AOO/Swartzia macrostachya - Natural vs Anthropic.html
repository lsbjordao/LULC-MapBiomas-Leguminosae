<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.70999999999998,64.85,64.95,64.98,64.85,64.84,64.67,64.3,64.25,64.17,63.94,63.739999999999995,63.49,63.220000000000006,62.96,62.65,62.62,62.51,62.46,62.46,62.269999999999996,62.269999999999996,62.35999999999999,62.31,62.24,62.26,62,61.93000000000001,61.389999999999986,61.11,61.220000000000006,61.129999999999995,61.120000000000005,61.169999999999995,61.13999999999999,60.960000000000015,60.71000000000001,60.54],"color":"green"},{"name":"anthropic","data":[40.940000000000005,40.800000000000004,40.71999999999999,40.72,40.849999999999994,40.87,41.029999999999994,41.41,41.459999999999994,41.53999999999999,41.75999999999999,41.96000000000001,42.199999999999996,42.46,42.73999999999999,43.029999999999994,43.07,43.19000000000001,43.26999999999999,43.23999999999999,43.43,43.44,43.349999999999994,43.430000000000014,43.480000000000004,43.440000000000005,43.720000000000006,43.81999999999999,44.32,44.61999999999999,44.51000000000001,44.60999999999999,44.65,44.62,44.66000000000001,44.83999999999999,45.089999999999996,45.239999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
