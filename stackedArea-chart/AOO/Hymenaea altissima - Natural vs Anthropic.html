<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.32000000000001,61.269999999999996,60.660000000000004,60.36999999999999,59.949999999999996,59.81999999999999,59.74,59.75999999999999,59.65,59.099999999999994,58.29999999999999,57.74999999999999,57.40999999999999,56.81999999999999,56.73999999999999,56.74999999999999,56.78,56.93,56.989999999999995,57.19,57.069999999999986,57.1,57.12,57.03999999999999,56.97,57,57.169999999999995,56.85,56.78999999999999,56.79,56.66999999999999,56.50999999999999,56.519999999999996,56.62,56.74,57.42,57.57999999999999,58.160000000000004],"color":"green"},{"name":"anthropic","data":[38.57,39.73,40.39999999999999,40.89999999999999,41.349999999999994,41.5,41.559999999999995,41.6,41.68999999999999,42.269999999999996,43.080000000000005,43.61000000000001,43.910000000000004,44.46000000000001,44.489999999999995,44.43,44.38999999999999,44.24,44.19999999999999,43.96999999999999,44.06999999999999,44.04,44.019999999999996,44.099999999999994,44.17,44.18,44.05,44.349999999999994,44.49,44.519999999999996,44.64000000000001,44.75,44.7,44.58,44.45000000000001,43.730000000000004,43.56000000000002,42.92000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
