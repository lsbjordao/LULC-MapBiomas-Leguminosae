<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.86,57.68,57.39999999999999,57.25000000000001,57.14,57.209999999999994,57.449999999999996,57.550000000000004,57.92000000000001,58.43,58.68,59.089999999999996,59.489999999999995,59.81,59.88,60.03,60.28,60.400000000000006,60.67,60.839999999999996,60.92,61.43,61.6,61.839999999999996,62.02,62.08000000000001,62.370000000000005,62.45000000000001,62.69,62.86,63.09,63.26,63.39,63.670000000000016,63.87,63.86000000000001,63.970000000000006,63.98],"color":"green"},{"name":"anthropic","data":[43.13,43.309999999999995,43.61,43.760000000000005,43.85000000000001,43.78000000000001,43.53999999999999,43.47,43.10000000000001,42.56999999999999,42.300000000000004,41.89,41.510000000000005,41.19,41.12,40.980000000000004,40.73000000000001,40.620000000000005,40.339999999999996,40.18,40.089999999999996,39.56,39.4,39.17,38.99,38.93,38.64,38.56,38.32,38.14,37.93,37.75,37.61,37.34,37.13999999999999,37.13999999999999,37.04,37.03999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
