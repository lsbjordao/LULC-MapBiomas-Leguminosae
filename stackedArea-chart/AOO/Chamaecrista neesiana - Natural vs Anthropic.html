<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.87000000000001,54.96,54.6,54.370000000000005,54.00999999999999,53.800000000000004,53.54999999999999,53.160000000000004,52.81999999999999,52.56000000000001,52.36,52.28999999999999,52.16,52.01,52.01,51.78000000000001,51.69,51.52,51.38,51.25000000000001,51.019999999999996,50.94,50.91,50.940000000000005,50.970000000000006,50.99,50.97,51.01,51.11000000000001,51.129999999999995,51.01,51.06,51.11,51.160000000000004,51.260000000000005,51.220000000000006,51.21000000000001,51.169999999999995],"color":"green"},{"name":"anthropic","data":[48.019999999999996,48.93,49.32000000000001,49.53000000000001,49.87,50.11,50.339999999999996,50.74,51.06,51.35999999999999,51.519999999999996,51.61,51.720000000000006,51.910000000000004,51.91,52.13999999999999,52.21000000000001,52.39,52.53,52.660000000000004,52.87,52.959999999999994,53.019999999999996,52.989999999999995,52.92,52.910000000000004,52.93999999999999,52.91,52.79,52.800000000000004,52.9,52.84,52.809999999999995,52.75000000000001,52.66,52.68999999999999,52.71999999999999,52.739999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
