<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.81,43.35,45.71,46.040000000000006,47.37,47.21,47.71000000000001,47.519999999999996,47.879999999999995,48.47,47.58,47.85999999999999,48.24,49.2,51.16,52.32,54.18999999999999,54.77000000000001,55.40000000000001,55.82000000000001,55.93000000000001,55.8,56.160000000000004,56.08,55.66000000000001,56.85,57.04,57.73,58.21000000000001,58.12,58.11000000000001,58.37,58.6,58.800000000000004,59.440000000000005,59.839999999999996,59.65,59.699999999999996],"color":"green"},{"name":"anthropic","data":[59.53,57.989999999999995,55.64,55.300000000000004,53.98,54.15,53.64,53.830000000000005,53.47,52.879999999999995,53.769999999999996,53.5,53.1,52.129999999999995,50.17,49.03,47.14,46.58,45.96,45.53,45.42,45.56,45.19,45.269999999999996,45.69,44.5,44.31,43.620000000000005,43.14,43.239999999999995,43.230000000000004,43,42.760000000000005,42.54,41.9,41.489999999999995,41.69,41.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
