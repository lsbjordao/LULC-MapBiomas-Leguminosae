<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.120000000000005,62.06,61.970000000000006,61.79,61.72,61.940000000000005,62.03,62.33000000000001,62.47,63.249999999999986,63.330000000000005,63.650000000000006,63.890000000000015,64.14000000000001,64.46000000000001,64.49000000000001,64.47,64.52000000000001,64.62,64.81,64.98,65.21000000000001,65.37,65.46,65.53000000000002,65.74,65.9,65.9,66.13000000000001,66.25,66.48,66.91000000000001,66.99,67.03,67.29000000000002,67.4,67.47999999999999,67.62],"color":"green"},{"name":"anthropic","data":[42.78,42.830000000000005,42.93,43.1,43.190000000000005,42.959999999999994,42.88999999999999,42.55,42.42,41.62,41.56999999999999,41.239999999999995,40.98999999999999,40.74,40.429999999999986,40.39999999999999,40.42,40.35,40.29,40.1,39.93,39.690000000000005,39.499999999999986,39.419999999999995,39.34,39.13,38.970000000000006,38.970000000000006,38.730000000000004,38.61,38.39,38,37.89999999999999,37.849999999999994,37.60999999999999,37.489999999999995,37.4,37.24],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
