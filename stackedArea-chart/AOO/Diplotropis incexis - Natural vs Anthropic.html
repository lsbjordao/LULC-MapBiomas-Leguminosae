<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.04,59.51,58.839999999999996,58.05,57.13000000000002,56.76,56.51,56.56,56.370000000000005,56.300000000000004,55.83000000000001,55.83000000000001,55.84000000000002,55.720000000000006,55.85000000000001,56.050000000000004,56.080000000000005,55.99999999999999,56.06,56.18,55.94,56.1,56.33000000000001,56.56999999999999,56.93999999999999,57.39999999999999,57.54,57.540000000000006,57.39,57.400000000000006,57.71999999999999,58.169999999999995,58.43000000000001,58.93000000000001,59.2,59.519999999999996,59.9,59.97999999999999],"color":"green"},{"name":"anthropic","data":[44.15,44.65,45.349999999999994,46.14,47.080000000000005,47.46,47.73,47.67,47.85,47.93,48.42,48.39,48.39,48.51,48.400000000000006,48.17,48.15,48.22999999999999,48.16,48.06,48.279999999999994,48.13,47.900000000000006,47.650000000000006,47.309999999999995,46.839999999999996,46.70000000000001,46.71,46.83,46.839999999999996,46.51,46.080000000000005,45.82,45.3,45.03999999999999,44.71,44.32,44.239999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
