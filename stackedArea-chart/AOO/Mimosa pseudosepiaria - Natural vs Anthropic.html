<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.50000000000001,55.10999999999999,51.17,49.52,49.38999999999999,49.349999999999994,49.89,49.95,48.97,47.9,45.120000000000005,43.07,42.88,41.44,41.410000000000004,39.84,38.87,38.57000000000001,38.59,39.129999999999995,39.04,39.06,39.580000000000005,39.8,40,40.03,38.959999999999994,37.989999999999995,36.43000000000001,35.28,33.97,33.43,33.02,32.86,31.77,31.189999999999998,31.35,31.93],"color":"green"},{"name":"anthropic","data":[45.21,45.6,49.55,51.2,51.339999999999996,51.370000000000005,50.83,50.779999999999994,51.760000000000005,52.83,55.6,57.65,57.85000000000001,59.28,59.3,60.89,61.85,62.14999999999999,62.14999999999999,61.599999999999994,61.68000000000001,61.66000000000001,61.14,60.92,60.739999999999995,60.7,61.769999999999996,62.730000000000004,64.29,65.44,66.76,67.31,67.69,67.88,68.95,69.52,69.37,68.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
