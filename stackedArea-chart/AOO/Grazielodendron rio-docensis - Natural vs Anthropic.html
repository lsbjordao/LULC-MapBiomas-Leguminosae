<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.699999999999996,53.61,54.11,54.34,54.33,54.19,53.72,53.76,54.65,55.12,55.04,54.9,55.059999999999995,54.92,54.63,54.42000000000001,54.41000000000001,55.050000000000004,55.64,55.78000000000001,56.13,56.36,56.22,56.17999999999999,56.06,56.09,56.01,55.92,55.87,55.9,55.800000000000004,55.63,55.699999999999996,56.03,56.32,56.650000000000006,56.34,56.47],"color":"green"},{"name":"anthropic","data":[46.78,47.87,47.379999999999995,47.15,47.14,47.3,47.769999999999996,47.71,46.839999999999996,46.35999999999999,46.449999999999996,46.589999999999996,46.419999999999995,46.57,46.86,47.06,47.08,46.440000000000005,45.85,45.7,45.370000000000005,45.14000000000001,45.25,45.29,45.42,45.41,45.470000000000006,45.559999999999995,45.61,45.57,45.67,45.86,45.78,45.46,45.160000000000004,44.830000000000005,45.120000000000005,45.02],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
