<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.47,61.75000000000001,61.31999999999999,60.7,59.97,59.349999999999994,59.04999999999999,58.58,58.169999999999995,58.08999999999999,57.940000000000005,57.67,58.059999999999995,58.00000000000001,57.97,57.89,57.60999999999999,57.589999999999996,57.650000000000006,57.66,57.58000000000001,57.87,57.98,57.96999999999999,57.89999999999999,57.67,57.61,57.28999999999999,57.10999999999999,56.699999999999996,56.39,56.260000000000005,56.31000000000001,56.400000000000006,56.17999999999999,56.16,56.07,56.19],"color":"green"},{"name":"anthropic","data":[44.010000000000005,44.7,45.150000000000006,45.78,46.519999999999996,47.13,47.42000000000001,47.9,48.29000000000001,48.39000000000001,48.52000000000001,48.81,48.42,48.46,48.49,48.59,48.87000000000001,48.879999999999995,48.83,48.81999999999999,48.9,48.59000000000001,48.480000000000004,48.53,48.57000000000001,48.790000000000006,48.86,49.2,49.37,49.79,50.08,50.209999999999994,50.16,50.07,50.279999999999994,50.300000000000004,50.4,50.260000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
