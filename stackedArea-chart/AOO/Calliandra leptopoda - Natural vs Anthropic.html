<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.53,59.260000000000005,57.019999999999996,55.64,54.91,54.330000000000005,54.03,53.24,52.80999999999999,52.589999999999996,52.66,52.419999999999995,52.69,52.849999999999994,53.39,54.01,53.89999999999999,53.769999999999996,53.839999999999996,54.03999999999999,53.620000000000005,53.81999999999999,53.97,53.93,53.599999999999994,53.32999999999999,52.53,51.19,50.050000000000004,49.22,49.089999999999996,49.49999999999999,49.97999999999999,51.129999999999995,50.93000000000001,50.93,50.809999999999995,51.04999999999999],"color":"green"},{"name":"anthropic","data":[42.45,42.720000000000006,44.97,46.339999999999996,47.09,47.66,47.949999999999996,48.74,49.160000000000004,49.39000000000001,49.33,49.58,49.300000000000004,49.14,48.60000000000001,47.98,48.08,48.23,48.17,47.949999999999996,48.379999999999995,48.17,48.019999999999996,48.06,48.38,48.660000000000004,49.45,50.8,51.93000000000001,52.75999999999999,52.91,52.47,52.010000000000005,50.86,51.06,51.05,51.18,50.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
