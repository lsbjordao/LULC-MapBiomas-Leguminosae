<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.79,81.72,81.88,82.03,81.22000000000001,80.64,81.25,81.39999999999999,82.91,82.32,82.67999999999999,82.72999999999999,84.38000000000001,84.28,84.23,84.77000000000001,84.99000000000001,84.61,84.22,83.64,83.74000000000001,83.89,84.3,85.83,86.33999999999999,86.50999999999999,87.38000000000001,87.69,87.81,88.03,88.16999999999999,88.47,88.62,88.27,88.13,88.08,88.14,85.57000000000001],"color":"green"},{"name":"anthropic","data":[18.07,18.14,18,17.84,18.65,19.240000000000002,18.619999999999997,18.47,16.96,17.55,17.19,17.14,15.5,15.59,15.64,15.11,14.879999999999999,15.26,15.649999999999999,16.23,16.130000000000003,15.989999999999998,15.569999999999999,14.04,13.530000000000001,13.35,12.49,12.18,12.059999999999999,11.84,11.709999999999999,11.4,11.26,11.61,11.739999999999998,11.790000000000001,11.72,14.29],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
