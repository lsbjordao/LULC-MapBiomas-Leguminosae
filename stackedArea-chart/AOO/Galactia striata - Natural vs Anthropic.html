<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.7,66.95,65.91,64.97999999999999,64.22,63.93000000000001,64.32000000000001,64.11000000000001,64.42,64.64999999999999,64.96,65.07000000000001,65.29,65.28,64.54,63.870000000000005,63.56000000000002,63.36000000000002,63.230000000000004,63.21,63.24000000000001,63.96,64.36,64.49,64.77000000000001,64.89000000000001,64.7,64.34,64.15,63.65000000000002,63.52000000000001,63.49,63.11000000000002,62.45000000000001,62.26,62.339999999999996,62.56,62.14000000000001],"color":"green"},{"name":"anthropic","data":[42.38000000000001,43.14,44.18,45.14,45.92,46.18,45.82,46.010000000000005,45.720000000000006,45.48000000000001,45.18,45.08,44.870000000000005,44.85,45.58000000000001,46.28,46.620000000000005,46.78000000000001,46.91000000000001,46.93000000000001,46.919999999999995,46.199999999999996,45.769999999999996,45.64999999999999,45.370000000000005,45.27,45.440000000000005,45.830000000000005,45.99999999999999,46.50999999999999,46.63,46.64999999999999,47.05,47.67999999999999,47.919999999999995,47.83,47.6,48.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
