<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.06,38.82,38.489999999999995,37.92,37.64999999999999,37.6,37.529999999999994,37.27999999999999,37.379999999999995,37.300000000000004,37.11,37.160000000000004,37.49,37.77,38.14000000000001,38.42999999999999,38.39,38.64999999999999,39.04999999999999,39.239999999999995,39.39,39.65,39.65,39.92000000000001,40.12,40.260000000000005,40.51,40.74999999999999,40.77,40.75999999999999,40.86,40.78,40.94,41.209999999999994,41.52,41.899999999999984,42.05999999999999,42.19],"color":"green"},{"name":"anthropic","data":[60.99,61.23000000000001,61.56000000000001,62.11,62.41,62.449999999999996,62.529999999999994,62.769999999999996,62.68000000000001,62.73,62.95,62.879999999999995,62.56000000000001,62.3,61.940000000000005,61.64000000000001,61.669999999999995,61.42999999999999,61.00999999999999,60.81,60.669999999999995,60.39000000000001,60.4,60.129999999999995,59.93000000000001,59.78999999999999,59.55999999999999,59.32,59.290000000000006,59.3,59.220000000000006,59.26,59.09,58.849999999999994,58.56,58.17,58.02,57.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
