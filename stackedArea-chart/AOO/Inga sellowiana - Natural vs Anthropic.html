<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.31,72.34,72.17999999999999,72.10000000000001,71.73,71.69,71.75,71.81000000000002,71.95,72.26,72.33000000000001,72.49000000000001,72.69,72.77,72.94,72.75,72.82000000000001,72.98,72.92000000000002,72.96000000000002,73.26,73.48,73.42,73.51999999999998,73.5,73.69,73.74,73.77,73.88,73.91,74.12,74.28,74.28,74.23000000000002,74.2,74.15,74.19,74.20000000000002],"color":"green"},{"name":"anthropic","data":[29.109999999999996,29.06,29.22,29.32,29.669999999999998,29.750000000000004,29.65,29.609999999999996,29.46,29.159999999999997,29.089999999999996,28.959999999999997,28.75,28.650000000000006,28.500000000000004,28.67,28.610000000000003,28.45,28.5,28.470000000000002,28.16,27.939999999999998,28.000000000000004,27.93,27.930000000000003,27.73,27.680000000000003,27.669999999999995,27.549999999999997,27.509999999999998,27.299999999999994,27.139999999999997,27.159999999999997,27.169999999999995,27.209999999999997,27.269999999999996,27.21,27.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
