<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.249999999999996,30.240000000000006,30.16,30.090000000000003,29.830000000000005,29.970000000000006,29.700000000000003,29.700000000000003,28.71,28.540000000000003,28.53,28.57,28.82,29.279999999999998,29.99,30.139999999999997,30,30.490000000000002,30.98,31.410000000000004,32.28,32.65,33.169999999999995,33.42999999999999,33.290000000000006,33.43,32.730000000000004,33.03,33.019999999999996,33.470000000000006,33.480000000000004,33.75,33.53,33.620000000000005,33.7,33.690000000000005,32.5,32.43],"color":"green"},{"name":"anthropic","data":[35.699999999999996,35.73,35.81,35.87,36.13,35.99999999999999,36.25000000000001,36.26,37.27,37.43,37.44,37.410000000000004,37.16,36.690000000000005,35.97,35.81999999999999,35.949999999999996,35.47,34.98,34.559999999999995,33.68,33.31,32.8,32.54,32.650000000000006,32.550000000000004,33.25,32.940000000000005,32.96,32.5,32.470000000000006,32.2,32.42,32.34,32.28,32.269999999999996,33.449999999999996,33.53],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
