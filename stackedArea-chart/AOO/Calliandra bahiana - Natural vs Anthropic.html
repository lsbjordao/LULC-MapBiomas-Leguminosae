<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.39000000000001,66.38,66.26,65.85,66.11,66.26,67.35000000000001,67.49,68.02,68.72,68.94000000000001,69.38,70.33000000000001,71.35999999999999,72.85999999999999,73.83,74.30000000000001,74.37,74.10000000000001,74.17999999999999,74.19000000000001,74.47,74.59,74.86999999999999,74.94000000000001,74.57,74.38999999999999,74.19,74.10000000000001,73.16,73.07000000000001,72.75,72.83999999999999,72.92,72.97999999999999,72.87,72.86000000000001,72.94999999999999],"color":"green"},{"name":"anthropic","data":[35.14,35.16,35.290000000000006,35.690000000000005,35.440000000000005,35.279999999999994,34.2,34.07,33.53,32.83,32.620000000000005,32.2,31.22,30.18,28.709999999999997,27.749999999999996,27.25,27.209999999999997,27.45,27.410000000000004,27.4,27.090000000000003,26.99,26.69,26.63,26.990000000000006,27.180000000000003,27.370000000000008,27.470000000000002,28.4,28.509999999999998,28.82,28.719999999999995,28.639999999999997,28.589999999999996,28.72,28.7,28.609999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
