<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.57000000000001,64.02999999999999,63.129999999999995,62.25,61.11,60.23,59.88,59.56999999999999,59.379999999999995,58.93999999999999,58.22,57.38,57.95,57.36,57.29,57.239999999999995,56.93999999999999,56.89,57.2,57.52,57.260000000000005,57.57,57.71,57.54,57.67999999999999,57.62,57.25,55.85999999999999,54.730000000000004,53.55,53.26,53.54,53.93,54.38,54.36,54.599999999999994,53.959999999999994,54.239999999999995],"color":"green"},{"name":"anthropic","data":[37.39999999999999,37.93,38.86000000000001,39.75000000000001,40.88,41.77,42.10000000000001,42.42000000000001,42.59,43.050000000000004,43.77000000000001,44.6,44.02,44.63,44.68,44.73,45.03000000000001,45.10000000000001,44.78,44.46,44.71999999999999,44.4,44.27,44.43000000000001,44.31,44.34,44.73,46.11000000000001,47.24,48.449999999999996,48.73000000000001,48.45,48.040000000000006,47.58,47.620000000000005,47.39000000000001,47.99,47.72],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
