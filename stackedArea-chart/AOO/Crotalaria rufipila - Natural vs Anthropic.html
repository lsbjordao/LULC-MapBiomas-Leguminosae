<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.78999999999999,74.93,75.03,75.21000000000001,75.03,75.06000000000002,74.92999999999999,74.67,74.42,74.11,73.88,74.11999999999999,74.3,74.52999999999999,74.61,74.57,74.47999999999999,74.13999999999999,73.96,73.85,74.28999999999999,74.41,74.39,74.45,74.68000000000002,74.93,74.96000000000001,75.16999999999999,75.47,75.52,76.02000000000001,76.03,76.13,76.17999999999999,75.91,75.83,75.65,75.5],"color":"green"},{"name":"anthropic","data":[20.740000000000002,21.59,21.49,21.319999999999997,21.5,21.470000000000002,21.599999999999998,21.869999999999997,22.09,22.419999999999998,22.650000000000002,22.419999999999998,22.23,21.990000000000002,21.91,21.959999999999997,22.060000000000002,22.39,22.569999999999997,22.679999999999996,22.25,22.119999999999997,22.14,22.080000000000002,21.849999999999998,21.59,21.56,21.36,21.049999999999997,20.990000000000002,20.49,20.49,20.409999999999997,20.37,20.630000000000003,20.700000000000003,20.87,21.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
