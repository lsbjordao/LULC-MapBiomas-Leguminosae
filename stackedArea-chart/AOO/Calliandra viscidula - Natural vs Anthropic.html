<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.49000000000001,86.59000000000002,87.3,85.70999999999998,85.32999999999998,85.15,85.7,85.62,86.61999999999999,87.04,87.33,88.03,88.30999999999999,88.32999999999998,88.93000000000002,90.04,91.28,91.37,91.33999999999997,91.58999999999999,91.66,91.61000000000003,91.42,91.28999999999999,91.31,90.89000000000001,90.85000000000001,90.64,90.41,90.19,90.47,90.35,90.38999999999999,90.47999999999999,90.42,90.44999999999999,90.46999999999998,90.58000000000001],"color":"green"},{"name":"anthropic","data":[13.430000000000001,13.33,12.63,14.22,14.58,14.78,14.249999999999998,14.299999999999999,13.29,12.86,12.579999999999998,11.879999999999999,11.61,11.59,11.010000000000002,9.889999999999999,8.66,8.549999999999999,8.569999999999999,8.33,8.25,8.309999999999999,8.499999999999998,8.65,8.640000000000002,9.01,9.08,9.28,9.520000000000001,9.729999999999999,9.44,9.57,9.54,9.439999999999998,9.5,9.47,9.440000000000001,9.360000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
