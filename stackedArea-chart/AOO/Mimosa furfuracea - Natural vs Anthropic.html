<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.86,50.300000000000004,50.34,50.38,50.27,50.19,50.25,50.33,50.940000000000005,51.93,52.24,52.739999999999995,53.04,53.29,53.66,53.92999999999999,54.33,54.800000000000004,54.900000000000006,55.089999999999996,55.28,55.38,55.58999999999999,55.74999999999999,56.019999999999996,56.3,56.48999999999999,56.599999999999994,56.730000000000004,57.08,57.44,57.660000000000004,57.940000000000005,58.13,58.21,58.17999999999999,58.48,58.82],"color":"green"},{"name":"anthropic","data":[54.79,54.35,54.32,54.29999999999999,54.38999999999999,54.470000000000006,54.4,54.34,53.709999999999994,52.75000000000001,52.419999999999995,51.92000000000001,51.62999999999999,51.38,51.00999999999999,50.75,50.330000000000005,49.88,49.77,49.589999999999996,49.39000000000001,49.260000000000005,49.08,48.910000000000004,48.64999999999999,48.379999999999995,48.17,48.080000000000005,47.92999999999999,47.61,47.23,47.010000000000005,46.730000000000004,46.54,46.47,46.49999999999999,46.17999999999999,45.839999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
