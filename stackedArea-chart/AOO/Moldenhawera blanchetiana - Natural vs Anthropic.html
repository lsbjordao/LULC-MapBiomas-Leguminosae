<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.63000000000002,79.77,78.53000000000002,77.14000000000001,76.17999999999999,75.96000000000001,75.53000000000002,76.22000000000001,76.21000000000002,75.99000000000001,75.86000000000003,75.64,75.40000000000002,75.27,75.22999999999999,74.43,74.32000000000001,73.96000000000001,74.06000000000002,74.11,73.61,73.35000000000002,73.52000000000001,73.65000000000002,74.33000000000001,74.21000000000001,74.2,73.98000000000002,73.62,73.25,73.38,73.2,72.75000000000001,73.13000000000001,73.08,72.80000000000001,73.27,73.23000000000002],"color":"green"},{"name":"anthropic","data":[18.66,18.59,19.81,21.2,22.14,22.349999999999998,22.77,22.09,22.12,22.349999999999998,22.5,22.75,22.970000000000002,23.09,23.1,23.86,23.95,24.3,24.23,24.19,24.72,24.98,24.830000000000002,24.69,24.02,24.13,24.12,24.360000000000003,24.74,25.080000000000002,24.959999999999997,25.150000000000002,25.599999999999998,25.209999999999997,25.26,25.54,25.080000000000002,25.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
