<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.65000000000002,94.28999999999999,93.94999999999999,93.75,93.58999999999999,93.83000000000001,93.95000000000002,93.60000000000001,93.41,93.30000000000001,93.19,92.75,92.13000000000002,91.85000000000001,91.75,91.55000000000001,91.27000000000001,91.01,90.6,90.43,90.50999999999999,89.86,90.01,89.58000000000001,89.34000000000002,89.21000000000001,89.10000000000002,89.10999999999999,89.03,88.71,88.06,87.51999999999998,87.24,87.21000000000001,87.46,87.33,86.95,85.88],"color":"green"},{"name":"anthropic","data":[8.200000000000001,8.559999999999999,8.9,9.09,9.25,9.040000000000001,8.89,9.24,9.44,9.530000000000001,9.67,10.1,10.71,11.010000000000002,11.100000000000001,11.3,11.58,11.85,12.25,12.42,12.349999999999998,12.989999999999998,12.84,13.260000000000002,13.51,13.64,13.76,13.75,13.830000000000002,14.14,14.8,15.33,15.6,15.619999999999997,15.369999999999997,15.52,15.89,16.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
