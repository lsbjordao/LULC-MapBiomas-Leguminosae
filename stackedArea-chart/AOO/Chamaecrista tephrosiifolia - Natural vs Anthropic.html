<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.88999999999999,90.76,90.76,90.65,90.37,89.87,88.74999999999999,88.26,87.97000000000001,87.26,86.57000000000001,86.02,85.39999999999999,85.45,85.77000000000002,85.45,85.38000000000001,84.78,84.19000000000001,83.83,83.68,83.88999999999999,84.16000000000001,84.18,84.3,84.43999999999998,84.5,84.48,83.42000000000002,82.74000000000001,82.18,81.66999999999999,81.74999999999999,81.48999999999998,81.30999999999999,81.28,81.23999999999998,81.01],"color":"green"},{"name":"anthropic","data":[8.9,9.030000000000001,9.04,9.15,9.43,9.93,11.049999999999999,11.55,11.83,12.549999999999999,13.23,13.79,14.4,14.33,14.03,14.350000000000001,14.41,15.02,15.62,15.96,16.11,15.920000000000002,15.639999999999999,15.629999999999999,15.510000000000002,15.36,15.29,15.309999999999999,16.380000000000003,17.049999999999997,17.619999999999997,18.120000000000005,18.03,18.32,18.490000000000002,18.52,18.56,18.79],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
