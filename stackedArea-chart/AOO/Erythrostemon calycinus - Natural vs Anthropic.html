<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.4,59.089999999999996,58.05,57.54,56.48000000000001,55.230000000000004,55.9,55.169999999999995,54.78,54.230000000000004,53.74000000000001,53.709999999999994,53.38,53.02,53.410000000000004,53.739999999999995,53.53000000000001,53.800000000000004,53.74,53.49000000000001,53.099999999999994,53.67,54.02,54.830000000000005,54.519999999999996,54.290000000000006,53.86000000000001,53.64000000000001,53.78000000000001,53.519999999999996,53.67000000000001,54.00000000000001,54.25000000000001,55.010000000000005,54.849999999999994,54.779999999999994,54.66000000000001,54.67000000000001],"color":"green"},{"name":"anthropic","data":[41.31000000000001,41.64,42.67000000000001,43.2,44.25,45.50000000000001,44.82999999999999,45.54999999999999,45.93000000000001,46.489999999999995,47,47.02,47.339999999999996,47.71,47.32,46.98,47.199999999999996,46.919999999999995,46.99999999999999,47.24999999999999,47.65,47.06,46.71,45.9,46.21,46.449999999999996,46.88,47.09,46.94999999999999,47.21,47.06999999999999,46.73,46.5,45.730000000000004,45.879999999999995,45.940000000000005,46.07,46.07000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
