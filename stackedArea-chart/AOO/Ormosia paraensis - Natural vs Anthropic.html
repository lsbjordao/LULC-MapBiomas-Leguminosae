<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.79,87.05,86.03999999999999,85.48,85.3,85.38,84.80000000000001,84.05999999999999,83.36,82.78999999999999,81.82000000000001,80.64,79.93,79.69999999999997,79.17,77.46,75.61000000000001,74.69,73.58999999999999,72.76999999999998,72.58,72.32,72.35999999999999,72.35000000000001,72.1,72.13,72.03000000000002,71.77000000000001,71.23,70.77,70.36000000000001,69.86000000000001,69.51,69.58,69.86000000000001,69.92,69.5,68.09],"color":"green"},{"name":"anthropic","data":[19.75,20.510000000000005,21.52,22.05,22.250000000000004,22.169999999999998,22.74,23.500000000000004,24.19,24.76,25.74,26.92,27.610000000000003,27.860000000000003,28.400000000000002,30.09,31.95,32.870000000000005,33.970000000000006,34.78,34.970000000000006,35.22,35.23,35.21000000000001,35.44,35.43000000000001,35.52,35.81,36.31999999999999,36.77,37.18,37.67,38.04,37.959999999999994,37.68999999999999,37.64,38.059999999999995,39.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
