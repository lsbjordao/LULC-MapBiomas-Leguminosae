<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.47,57.730000000000004,57.31,56.900000000000006,56.75000000000001,57.27,57.36000000000001,57.68000000000001,57.96000000000001,58.01,57.92,57.949999999999996,58.21,58.2,58.24999999999999,57.98,58.05,58.25,58.410000000000004,58.50000000000001,58.82,58.96,59.12,59.059999999999995,59.14,59.24,59.66,59.900000000000006,60.809999999999995,61.029999999999994,61.269999999999996,61.03,61.42,61.83,61.940000000000005,62.080000000000005,62.85,62.830000000000005],"color":"green"},{"name":"anthropic","data":[41.8,42.54,42.96,43.370000000000005,43.519999999999996,42.99999999999999,42.9,42.58,42.309999999999995,42.26,42.339999999999996,42.309999999999995,42.03999999999999,42.059999999999995,41.99999999999999,42.290000000000006,42.21999999999999,42.01,41.86,41.760000000000005,41.449999999999996,41.3,41.15,41.199999999999996,41.12,41.029999999999994,40.59,40.379999999999995,39.46,39.24,38.989999999999995,39.239999999999995,38.85,38.42999999999999,38.33,38.18,37.419999999999995,37.44],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
