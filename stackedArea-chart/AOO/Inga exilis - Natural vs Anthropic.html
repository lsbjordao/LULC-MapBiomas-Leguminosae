<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.88000000000001,94.33000000000003,91.57000000000002,91.14000000000001,92.71000000000001,92.05000000000001,91.4,89.85000000000001,88.35000000000002,86.91000000000001,83.97000000000001,80.92000000000002,79.72000000000001,79.13000000000001,78.90000000000002,79.07000000000001,78.97000000000001,78.84000000000002,78.80000000000001,78.52000000000001,78.34,75.54,75.33000000000001,75.63000000000001,74.71000000000002,73.99000000000002,71.46,69.75000000000001,68.57000000000002,68.19000000000001,68.06,67.92999999999999,65.12,61.25,59.15,58.6,57.39,56.17],"color":"green"},{"name":"anthropic","data":[2.84,5.41,8.16,8.6,7.03,7.68,8.34,9.89,11.39,12.83,15.77,18.82,20.02,20.6,20.83,20.66,20.77,20.91,20.94,21.22,21.39,24.2,24.4,24.1,25.02,25.75,28.28,29.98,31.18,31.54,31.68,31.79,34.62,38.48,40.57,41.13,42.339999999999996,43.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
