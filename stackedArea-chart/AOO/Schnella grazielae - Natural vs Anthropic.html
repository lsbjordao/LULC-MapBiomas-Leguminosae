<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.790000000000006,54.63,53.970000000000006,53.32000000000001,53.32000000000001,53.529999999999994,53.949999999999996,53.91,56.9,57.37,58.75,59.41,59.42999999999999,59.019999999999996,59.480000000000004,58.739999999999995,58.95,59.1,58.93,59.14000000000001,59.36,59.690000000000005,59.760000000000005,59.83,60.13,60.2,60.4,60.44,60.15,60.23,60.58,60.239999999999995,60.18,60.28,60.53,60.43000000000001,60.42000000000001,59.33],"color":"green"},{"name":"anthropic","data":[45.399999999999984,45.58,46.22999999999999,46.88999999999999,46.870000000000005,46.660000000000004,46.25000000000001,46.290000000000006,43.29,42.83,41.44,40.78,40.760000000000005,41.18000000000001,40.7,41.45,41.24,41.099999999999994,41.260000000000005,41.050000000000004,40.85000000000001,40.5,40.42,40.34,40.06000000000001,40,39.79,39.76,40.03,39.959999999999994,39.620000000000005,39.96,40,39.92,39.650000000000006,39.76,39.77,40.86],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
