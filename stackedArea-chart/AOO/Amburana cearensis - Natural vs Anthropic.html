<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.85,66.62,65.03,64.28999999999999,63.25,62.489999999999995,61.84,61.190000000000005,61.06999999999999,61.07,60.94,60.82,61.60999999999999,61.190000000000005,61.51,61.34,60.89000000000001,60.55,60.28,60.01999999999999,59.879999999999995,60.169999999999995,60.22,60.41000000000001,60.48000000000001,60.58999999999999,60.24,59.919999999999995,59.27000000000001,58.870000000000005,58.51,58.59,58.51,58.62,58.760000000000005,58.99000000000001,58.760000000000005,59.31999999999999],"color":"green"},{"name":"anthropic","data":[38.79999999999999,38.989999999999995,40.59,41.35000000000001,42.36,43.13999999999999,43.769999999999996,44.45,44.589999999999996,44.629999999999995,44.74999999999999,44.89000000000001,44.089999999999996,44.47,44.160000000000004,44.31,44.78999999999999,45.13,45.4,45.640000000000015,45.77,45.47,45.44,45.21,45.11,44.98999999999999,45.370000000000005,45.67,46.26,46.69,47.04999999999999,46.96999999999999,47.040000000000006,46.940000000000005,46.79,46.58,46.809999999999995,46.239999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
