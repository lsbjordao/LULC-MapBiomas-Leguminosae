<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.25000000000001,56.48,55.95,55.50000000000001,55.46999999999999,55.36999999999999,55.480000000000004,55.339999999999996,55.38999999999999,55.17999999999999,55.089999999999996,55.709999999999994,55.65,55.710000000000015,55.870000000000005,55.970000000000006,56.14,56.36000000000001,56.36999999999999,56.419999999999995,56.49,56.42,56.6,56.43000000000001,56.709999999999994,56.93000000000001,57.290000000000006,57.63,58.12,58.31999999999999,58.55,58.29,58.07999999999999,57.98,57.940000000000005,58.489999999999995,58.999999999999986,59.39],"color":"green"},{"name":"anthropic","data":[44.75,43.61,44.21,44.75000000000001,44.85,44.95,44.870000000000005,45.019999999999996,44.96000000000001,45.13,45.17,44.589999999999996,44.64000000000001,44.56,44.4,44.32000000000001,44.2,44.00000000000001,44.02,44.00000000000001,43.96,44.06,43.89,44.050000000000004,43.81,43.56,43.2,42.85999999999999,42.38,42.27,42.11,42.45,42.71,42.8,42.99,42.5,41.99,41.620000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
