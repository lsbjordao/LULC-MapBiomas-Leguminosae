<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.91999999999999,85.24000000000001,76.63000000000001,70.44,68.49000000000001,75.61999999999999,72.05,71.26,73.97,73.55,72.67999999999999,71.41,68.74000000000001,69.41,73.45,68.56,68.91,69.89,70.44999999999999,70.58,72.74000000000001,74.73,75.46000000000001,76.05000000000001,75.52,76.52000000000001,75.72,75.28999999999999,76,75.82,76.47,76.07,75.19,73.3,73.53,74.00000000000001,73.54,73.38999999999999],"color":"green"},{"name":"anthropic","data":[12.629999999999999,14.32,22.92,29.119999999999997,31.07,23.93,27.5,28.310000000000002,25.589999999999996,26,26.880000000000003,28.15,30.82,30.15,26.1,30.99,30.64,29.669999999999998,29.1,28.98,26.81,24.82,24.080000000000002,23.5,24.04,23.03,23.85,24.27,23.55,23.740000000000002,23.09,23.49,24.36,26.25,26.02,25.560000000000002,26.01,26.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
