<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.11000000000001,81.79000000000002,77.70000000000002,75.81,75.28,74.37,72.54,72.42,71.46000000000001,69.70000000000002,66.74,66.77999999999999,67.07000000000001,69.04000000000002,71.69000000000001,70.91,67.26,66.68,64.89,64.39999999999999,64.25999999999999,61.44,60.38999999999999,60.209999999999994,59.97,59.77,59.519999999999996,59.68,59.290000000000006,58.72,57.910000000000004,56.03,55.760000000000005,57.17999999999999,57.06,55.730000000000004,52.94,49.86],"color":"green"},{"name":"anthropic","data":[17.02,18.330000000000002,22.42,24.3,24.849999999999998,25.759999999999998,27.59,27.7,28.66,30.41,33.39,33.36,33.05,31.080000000000002,28.419999999999998,29.22,32.87,33.459999999999994,35.239999999999995,35.73,35.87,38.69,39.739999999999995,39.910000000000004,40.14,40.36,40.620000000000005,40.45,40.81999999999999,41.41,42.23,44.089999999999996,44.35999999999999,42.949999999999996,43.06,44.39,47.2,50.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
