<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.25000000000001,74.92000000000002,72.23000000000002,70.46000000000001,69.48000000000002,70.07,70.25000000000001,69.42,66.09,64.85,64.28,63.99,61.84,60.32999999999999,59.46,59.24,58.870000000000005,58.800000000000004,57.080000000000005,55.00999999999999,54.28,53.99000000000001,53.769999999999996,53.17999999999999,51.96,51.57000000000001,51.32999999999999,51.73999999999999,51.72,51.65999999999999,52.76999999999999,63.760000000000005,63.61999999999999,63.93000000000001,63.99,63.7,63.87,63.18999999999999],"color":"green"},{"name":"anthropic","data":[30.980000000000004,32.31,34.99,36.760000000000005,37.73,37.15,36.97,37.8,41.120000000000005,42.37,42.940000000000005,43.24,45.37,46.910000000000004,47.75,47.99,48.36,48.42999999999999,50.15999999999999,52.21,52.96,53.23,53.440000000000005,54.06999999999999,55.28,55.660000000000004,55.910000000000004,55.48,55.49,55.59,54.470000000000006,43.46999999999999,43.61,43.28999999999999,43.24999999999999,43.51,43.34,44.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
