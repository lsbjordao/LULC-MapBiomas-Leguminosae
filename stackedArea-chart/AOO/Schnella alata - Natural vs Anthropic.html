<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.68,93.66,91.95,90.58,90.73000000000002,90.83,90.84999999999998,90.3,89.36,88.50000000000001,86.19999999999999,84.19000000000001,82.63,81.94000000000001,82.96,82.48,81.21000000000001,79.92000000000002,78.84,78.24,77.89,77.86999999999999,77.85000000000001,77.84,77.69999999999999,77.68,77.76,78.31,78.20000000000002,77.23,76.47,76.21,76.02000000000001,75.99000000000001,75.56,74.85000000000001,74.46000000000001,74.22000000000001],"color":"green"},{"name":"anthropic","data":[6.99,7.01,8.709999999999999,10.07,9.940000000000001,9.83,9.82,10.36,11.299999999999999,12.16,14.46,16.48,18.03,18.72,17.7,18.2,19.46,20.740000000000002,21.830000000000002,22.430000000000003,22.770000000000003,22.800000000000004,22.81,22.810000000000002,22.96,22.980000000000004,22.9,22.35,22.47,23.439999999999998,24.21,24.449999999999996,24.64,24.67,25.11,25.82,26.21,26.440000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
