<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.63,76.83,77.33,79.78000000000002,80.08,80.00999999999999,79.97999999999999,78.18,77.50000000000001,75.74999999999999,74.74999999999999,74.09,74.05,74.3,74.07999999999998,74.21,74.50999999999999,74.65,74.61,74.63,74.56,74.37,74.32,74.45,74.67999999999999,74.42999999999999,74.41,74.53999999999999,74.32000000000001,74.34,74.71,74.71999999999998,74.91999999999999,75.28999999999999,75.43,75.19999999999999,75.05000000000001,74.47],"color":"green"},{"name":"anthropic","data":[30.11,29.92,29.41,26.96,26.650000000000002,26.729999999999997,26.76,28.559999999999995,29.229999999999997,31.009999999999998,31.970000000000002,32.660000000000004,32.7,32.45,32.67,32.52,32.220000000000006,32.080000000000005,32.14,32.10999999999999,32.17,32.36000000000001,32.43000000000001,32.290000000000006,32.07,32.31,32.34,32.19,32.42,32.39,32.03,32.01,31.810000000000002,31.45,31.31,31.54,31.679999999999996,32.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
