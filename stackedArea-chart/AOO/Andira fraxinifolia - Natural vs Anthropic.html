<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.36999999999999,56.52999999999999,56.239999999999995,55.739999999999995,55.46,55.29999999999999,55.37999999999999,55.42,55.65999999999999,56.3,56.54999999999999,56.94,57.11000000000001,57.29,57.49999999999999,57.53,57.6,57.71,58.06000000000001,58.2,58.40000000000001,58.600000000000016,58.72000000000001,58.88000000000002,59.1,59.44999999999998,59.67999999999999,59.86000000000001,59.879999999999995,60.019999999999996,60.330000000000005,60.500000000000014,60.67999999999999,60.96000000000001,61.110000000000014,61.19000000000001,61.360000000000014,61.51],"color":"green"},{"name":"anthropic","data":[46.10000000000001,46.03,46.38,46.919999999999995,47.21,47.339999999999996,47.3,47.26000000000001,47.04999999999999,46.46999999999999,46.279999999999994,45.86,45.599999999999994,45.38999999999999,45.15999999999999,45.14999999999999,45.06,44.92,44.59,44.4,44.24000000000001,44.02,43.91000000000001,43.760000000000005,43.529999999999994,43.24999999999999,43.05,42.8,42.77,42.650000000000006,42.300000000000004,42.169999999999995,41.98000000000001,41.680000000000014,41.56,41.5,41.370000000000005,41.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
