<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.78999999999999,59.27,57.550000000000004,58.1,57.550000000000004,57.800000000000004,59.830000000000005,59.540000000000006,59.71000000000001,59.25000000000001,58.8,59.45,59.780000000000015,59.81999999999999,61.120000000000005,61.20000000000001,60.63000000000001,60.78,61.12,60.89000000000001,62.410000000000004,63.019999999999996,63.18999999999998,63.8,63.14,63.03999999999999,62.199999999999996,61.699999999999996,61.24,60.269999999999996,59.870000000000005,59.980000000000004,60.32,60.50000000000001,60.5,60.599999999999994,60.59,60.650000000000006],"color":"green"},{"name":"anthropic","data":[41.35,40.87,42.589999999999996,42.059999999999995,42.6,42.36,40.31999999999999,40.589999999999996,40.42999999999999,40.89,41.339999999999996,40.69,40.36,40.31,39.019999999999996,38.94,39.53,39.36,39.02,39.269999999999996,37.74,37.129999999999995,36.949999999999996,36.36000000000001,37.010000000000005,37.11,37.94,38.449999999999996,38.900000000000006,39.89000000000001,40.27,40.17000000000001,39.82000000000001,39.64,39.63999999999999,39.55,39.559999999999995,39.5],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
