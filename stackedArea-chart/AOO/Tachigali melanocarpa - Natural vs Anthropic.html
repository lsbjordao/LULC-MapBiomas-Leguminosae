<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.53999999999999,84.32,83.50999999999999,84.48000000000002,84.53999999999999,85.19,84.81,83.82,82.9,83.64,84.42,84.34,83.31,82.79,82.52,81.53999999999999,81.57,81.62,81.35,81.22000000000001,81.21,81.16,81.19999999999999,81.8,81.7,81.68,81.7,82.25,82.82000000000001,83.13,83.18,83.27000000000001,82.87000000000002,82.78000000000002,83.13999999999999,83.14,83.23,83.21999999999998],"color":"green"},{"name":"anthropic","data":[14.72,15.940000000000001,16.759999999999998,15.79,15.719999999999999,15.07,15.46,16.450000000000003,17.37,16.630000000000003,15.86,15.92,16.96,17.48,17.730000000000004,18.74,18.69,18.64,18.91,19.05,19.05,19.110000000000003,19.060000000000002,18.450000000000003,18.560000000000002,18.580000000000002,18.57,18.02,17.44,17.14,17.090000000000003,17.000000000000004,17.390000000000004,17.500000000000004,17.14,17.12,17.03,17.06],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
