<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.40999999999998,87.13999999999999,85.22,82.02,79.46000000000001,77.45999999999998,74.79,73.36,72.50999999999998,71.07999999999998,69.65,66.85999999999999,65.85,63.49000000000001,61.410000000000004,57.60000000000001,46.68,39.64000000000001,36.730000000000004,34.410000000000004,30.230000000000004,29.44,28.860000000000003,27.890000000000004,27.43,27.11,24.960000000000004,25.1,24.230000000000004,24.530000000000005,24.44,24.319999999999997,23.939999999999998,23.65,23.750000000000004,23.460000000000004,21.85,19.52],"color":"green"},{"name":"anthropic","data":[14.43,12.7,14.62,17.82,20.39,22.38,25.07,26.490000000000002,27.33,28.770000000000003,30.189999999999998,33,34,36.370000000000005,38.44,42.25,53.169999999999995,60.199999999999996,63.12,65.44,69.61,70.41,70.99000000000001,71.97,72.42,72.72999999999999,74.88,74.74,75.60000000000001,75.32,75.39999999999999,75.52,75.9,76.2,76.08999999999999,76.37,77.97999999999999,80.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
