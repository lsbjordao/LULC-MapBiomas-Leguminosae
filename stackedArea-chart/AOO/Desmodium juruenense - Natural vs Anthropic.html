<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.98,77.63999999999999,76.85,76.72,76.78999999999999,76.39999999999999,76.13,75.73,75.25,74.8,74.27999999999999,73.86,73.66000000000001,72.67000000000002,71.81,70.87,70.35000000000001,68.78999999999999,68.2,68.4,68.48,67.67,68.25999999999999,68.88000000000001,68.75,68.69,68.77,68.75999999999999,68.75,68.97000000000001,68.91,68.97999999999999,69.03,69.02,68.13,67.8,67.69,66.75],"color":"green"},{"name":"anthropic","data":[9.73,10.07,10.85,10.98,10.91,11.3,11.57,11.99,12.45,12.900000000000002,13.41,13.840000000000002,14.040000000000001,15.030000000000001,15.889999999999999,16.84,17.360000000000003,18.91,19.51,19.29,19.24,20.03,19.44,18.830000000000002,18.95,19.009999999999998,18.93,18.94,18.96,18.73,18.800000000000004,18.720000000000002,18.669999999999998,18.68,19.57,19.91,20.01,20.950000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
