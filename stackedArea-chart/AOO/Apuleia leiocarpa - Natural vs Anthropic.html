<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.339999999999996,59.399999999999984,58.48,57.90999999999999,57.11999999999999,56.800000000000004,56.73000000000002,56.26,55.940000000000005,55.56,55.230000000000004,55.03000000000001,54.699999999999996,54.52,54.29,53.95,53.60000000000001,53.32000000000002,53.080000000000005,53.01000000000001,52.85,52.970000000000006,52.900000000000006,52.8,52.66,52.47,52.279999999999994,52.230000000000004,52.120000000000005,51.919999999999995,51.88000000000001,51.949999999999996,51.919999999999995,52.160000000000004,52.16,52.21,52.13,51.839999999999996],"color":"green"},{"name":"anthropic","data":[48.839999999999996,49.78999999999999,50.739999999999995,51.279999999999994,52.06999999999999,52.41,52.480000000000004,52.93999999999999,53.26,53.64,53.97,54.15999999999999,54.480000000000004,54.66,54.910000000000004,55.239999999999995,55.57,55.88,56.11000000000001,56.19000000000001,56.330000000000005,56.24000000000001,56.27000000000001,56.370000000000005,56.52,56.730000000000004,56.92000000000001,56.98,57.06,57.269999999999996,57.32000000000001,57.24,57.27,57.019999999999996,57.029999999999994,56.989999999999995,57.089999999999996,57.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
