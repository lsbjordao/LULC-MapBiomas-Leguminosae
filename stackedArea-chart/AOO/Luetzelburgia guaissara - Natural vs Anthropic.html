<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.49000000000001,45.09,45.040000000000006,44.56000000000001,44.419999999999995,44.75,44.71,45.07,45.96999999999999,46.529999999999994,46.84,47.1,47.529999999999994,47.77,48.099999999999994,47.95,47.94,48.15,48.47,48.58,48.690000000000005,48.96,49.11000000000001,49.230000000000004,49.28000000000001,49.410000000000004,49.63000000000001,49.900000000000006,50.230000000000004,50.32,50.58,50.91,50.86,51.010000000000005,51,51.03,50.91,51.04],"color":"green"},{"name":"anthropic","data":[58.27000000000001,57.66,57.71,58.18000000000001,58.3,57.980000000000004,58.03000000000001,57.67000000000001,56.78000000000001,56.21,55.90999999999999,55.65,55.19,54.96000000000001,54.61000000000001,54.809999999999995,54.8,54.589999999999996,54.269999999999996,54.15,54.06000000000001,53.78,53.64000000000001,53.5,53.44,53.32,53.099999999999994,52.830000000000005,52.510000000000005,52.42,52.160000000000004,51.849999999999994,51.879999999999995,51.74,51.750000000000014,51.71000000000001,51.82,51.720000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
