<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.739999999999995,55.959999999999994,54.449999999999996,53.370000000000005,52.33999999999999,51.59,50.93000000000001,50.720000000000006,50.34,50.480000000000004,50.35,50.330000000000005,50.85000000000001,50.699999999999996,50.57,50.58000000000001,50.35000000000001,50.17,50.14,50.430000000000014,50.52,50.94000000000001,51.24,51.489999999999995,51.5,50.85,50.32000000000001,48.980000000000004,48.269999999999996,47.64,47.32000000000001,47.75,47.88,48.419999999999995,47.97999999999999,47.96,47.88,48.00999999999999],"color":"green"},{"name":"anthropic","data":[50.07,50.84,52.34,53.440000000000005,54.48000000000001,55.24000000000001,55.87,56.10000000000001,56.44,56.33000000000001,56.45000000000001,56.46000000000001,55.97,56.1,56.25000000000001,56.22,56.46,56.64,56.67,56.38,56.290000000000006,55.86,55.54,55.3,55.300000000000004,55.95,56.47,57.82,58.53,59.17,59.46000000000001,59.04,58.92000000000001,58.38,58.81999999999999,58.82,58.91,58.78],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
