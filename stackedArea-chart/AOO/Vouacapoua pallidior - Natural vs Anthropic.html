<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.44000000000001,80.21999999999998,80.07000000000001,80.33999999999999,80.17,81.17999999999999,82.74999999999999,82.61,82.06,83.92,85.04999999999998,84.21999999999998,83.44,83.18,83.09000000000003,83.22,83.3,83.32,83.14,82.78,82.31000000000002,82.07999999999998,82.05,82.16999999999999,81.82000000000002,81.77000000000001,81.61,81.69999999999999,81.65,81.57999999999998,81.22999999999999,81.07999999999998,81.07,81.15999999999998,81.36,81.11000000000001,81.66000000000001,80.84],"color":"green"},{"name":"anthropic","data":[18.15,19.36,19.52,19.27,19.41,18.41,16.85,16.990000000000002,17.54,15.670000000000002,14.53,15.39,16.169999999999998,16.41,16.5,16.380000000000003,16.29,16.27,16.450000000000003,16.82,17.28,17.509999999999998,17.54,17.43,17.76,17.82,18,17.89,17.95,18.02,18.36,18.52,18.52,18.419999999999998,18.240000000000002,18.48,17.94,18.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
