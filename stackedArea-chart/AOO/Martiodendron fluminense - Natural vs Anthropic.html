<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.519999999999996,60.36,59.14,58.77,58.58,58.63999999999999,58.800000000000004,58.79,58.91,59.27,59.28,59.699999999999996,60.43,60.64,60.989999999999995,61.02000000000001,60.940000000000005,60.870000000000005,60.8,60.970000000000006,61.47,61.73,61.77,62.14,62.459999999999994,62.71,62.720000000000006,63.13000000000001,63.300000000000004,63.989999999999995,64.49000000000001,64.36999999999999,64.41,64.78999999999999,65.41000000000001,65.58,65.53,66.17999999999999],"color":"green"},{"name":"anthropic","data":[38.59,39.849999999999994,41.08,41.44,41.629999999999995,41.59,41.42,41.44,41.32,40.95,40.94,40.53,39.79,39.58,39.25,39.22,39.28,39.36,39.43,39.260000000000005,38.75,38.49,38.46,38.07,37.77,37.519999999999996,37.49,37.09,36.92,36.239999999999995,35.730000000000004,35.85,35.81999999999999,35.43,34.82,34.66,34.69,34.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
