<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.7,40.379999999999995,40.29,40.379999999999995,40.26999999999999,39.99999999999999,39.73999999999999,38.739999999999995,38.38,37.92,37.03,37.05,36.85,36.91,36.75,36.489999999999995,36.47,36.35,35.85999999999999,35.67,35.650000000000006,35.73,35.830000000000005,35.69,35.82,35.800000000000004,35.78000000000001,35.76,35.56,35.260000000000005,35.09,35.21,35.339999999999996,35.31,35.35,35.31,35.43,35.660000000000004],"color":"green"},{"name":"anthropic","data":[62.519999999999996,62.830000000000005,62.91,62.84,62.96,63.239999999999995,63.47,64.46,64.84,65.32,66.17999999999999,66.17,66.39000000000001,66.31,66.48,66.72,66.75,66.88,67.34,67.55,67.57,67.48,67.39,67.55,67.39,67.42,67.44000000000001,67.45000000000002,67.64,67.96000000000001,68.11,68.01000000000002,67.88000000000001,67.90000000000002,67.88000000000002,67.91000000000001,67.81,67.57000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
