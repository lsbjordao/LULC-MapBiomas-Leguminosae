<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.71000000000001,66.02000000000001,65.69999999999999,65.57999999999998,65.43,65.21,65.14999999999999,65.28999999999999,65.50999999999999,65.77,65.82,65.82,65.66,65.82,65.89,65.64,65.67000000000002,65.49,65.08,64.82000000000001,64.19999999999999,64.08999999999999,64.06,63.760000000000005,63.5,63.27,63.1,63.050000000000004,63,62.910000000000004,63.059999999999995,62.74,62.6,62.449999999999996,61.970000000000006,61.72,61.970000000000006,61.51],"color":"green"},{"name":"anthropic","data":[36.78,36.47,36.79,36.92,37.07,37.29,37.349999999999994,37.23,36.99,36.74,36.69,36.68,36.84,36.690000000000005,36.62,36.870000000000005,36.83,37.03,37.44,37.69,38.300000000000004,38.41,38.45,38.75,39.01,39.24,39.4,39.45,39.5,39.59,39.44,39.75,39.910000000000004,40.06,40.53,40.78,40.540000000000006,41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
