<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.75,73.22000000000001,72.09000000000002,71.07000000000001,70.12000000000002,69.72000000000001,69.53000000000002,69.93,70.04000000000002,70.39,70.72,70.39000000000003,72.10000000000004,71.86000000000001,71.32000000000002,70.92000000000002,70.29,69.94000000000001,70.07000000000001,70.21000000000001,69.69000000000001,69.35000000000002,69.17,69.24000000000001,69.25000000000001,69.51,69.37000000000002,68.52,67.30999999999999,66.16,65.58,65.64999999999999,65.44,65.77999999999999,65.58,66.14999999999999,65.98,65.99],"color":"green"},{"name":"anthropic","data":[33.01,33.55,34.69,35.71,36.620000000000005,37.04,37.23,36.82000000000001,36.709999999999994,36.36,36.04,36.370000000000005,34.660000000000004,34.910000000000004,35.440000000000005,35.84,36.470000000000006,36.809999999999995,36.68,36.53999999999999,37.06999999999999,37.4,37.6,37.51,37.480000000000004,37.25000000000001,37.40999999999999,38.24,39.45,40.599999999999994,41.160000000000004,41.10000000000001,41.330000000000005,40.980000000000004,41.18,40.6,40.790000000000006,40.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
