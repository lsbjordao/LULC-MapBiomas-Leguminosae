<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.92999999999999,68.78,68.26,67.38,65.23,64.61,64.1,63.43,63.10999999999999,62.22,61.69,61.61999999999999,61.07000000000001,60.79,60.32,59.4,58.900000000000006,58.11000000000001,57.57999999999999,57.55,57.78,57.77,57.77,57.50999999999999,57.59,57.51,57.44999999999999,57.39,57.31,57.1,56.96,56.87999999999999,56.800000000000004,56.599999999999994,56.49,56.269999999999996,56.260000000000005,56.7],"color":"green"},{"name":"anthropic","data":[30.580000000000002,32.74999999999999,33.25999999999999,34.14,36.29,36.9,37.43000000000001,38.08999999999999,38.410000000000004,39.32,39.83999999999999,39.910000000000004,40.46,40.74,41.21,42.14,42.62,43.42,43.95,43.980000000000004,43.739999999999995,43.760000000000005,43.74000000000001,44,43.94,44.01999999999999,44.07999999999999,44.12,44.21,44.410000000000004,44.550000000000004,44.64,44.730000000000004,44.93000000000001,45.040000000000006,45.24,45.24000000000001,44.82000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
