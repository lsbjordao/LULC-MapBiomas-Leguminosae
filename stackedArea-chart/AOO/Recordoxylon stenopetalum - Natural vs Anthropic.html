<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.91,86.02000000000001,85.03,86.14,85.99,87.16,88.66999999999999,86.88,87.35,87.39999999999999,87.49000000000001,87.10000000000002,85.8,85.6,85.49000000000001,85.66999999999999,84.04000000000002,83.07000000000001,83.54,82.73,83.53,85.31,85.6,86.10999999999999,85.88,85.58,85.69999999999999,86.24000000000001,86.36,86.13000000000001,85.49000000000001,85.88000000000001,86.35999999999999,86.56,86.53,86.32000000000001,86.41,85.76999999999998],"color":"green"},{"name":"anthropic","data":[11.76,13.65,14.62,13.52,13.68,12.49,10.989999999999998,12.79,12.309999999999999,12.259999999999998,12.16,12.57,13.86,14.06,14.16,13.989999999999998,15.63,16.58,16.11,16.93,16.13,14.34,14.06,13.54,13.78,14.07,13.950000000000001,13.43,13.29,13.530000000000001,14.170000000000002,13.78,13.309999999999999,13.100000000000001,13.120000000000001,13.34,13.27,13.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
