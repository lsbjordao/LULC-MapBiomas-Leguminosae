<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.17000000000002,70.28,69.99999999999999,69.78,69.63,69.46000000000001,69.36,69.56,69.42,69.1,68.7,68.52,68.64,68.61999999999999,68.94999999999999,68.7,68.57,68.28999999999999,68.01,67.72,67.53999999999999,67.51999999999998,67.71000000000001,67.93,67.96000000000001,68.00000000000001,68.05000000000001,67.84,67.68,67.83,67.95,68.09,68.34,68.32000000000001,68.19000000000001,67.97,67.63,67.42],"color":"green"},{"name":"anthropic","data":[33.42000000000001,34.31,34.57999999999999,34.81,34.96000000000001,35.14,35.209999999999994,35.02,35.160000000000004,35.489999999999995,35.89,36.08,35.96000000000001,35.96000000000001,35.66,35.900000000000006,36.03,36.300000000000004,36.58,36.87,37.03999999999999,37.050000000000004,36.88,36.650000000000006,36.63,36.59000000000001,36.53,36.74,36.910000000000004,36.74,36.61,36.480000000000004,36.24999999999999,36.25999999999999,36.39999999999999,36.60999999999999,36.97,37.15999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
