<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.13,97.01,97.15000000000002,97.01,96.83000000000001,97.15,96.75,96.64999999999998,96.69,96.55,96.5,96.33999999999999,96.09,95.59000000000002,94.3,94.47000000000001,94.72,94.67,94.34,94.11999999999999,93.78999999999999,93.13000000000001,92.97000000000001,93.27000000000001,93.14000000000001,93.02000000000001,93.06,93.34000000000002,93.66000000000003,93.69000000000001,93.60999999999999,93.53,93.38,93.47,93.82000000000001,93.91999999999999,93.85000000000001,92.71000000000001],"color":"green"},{"name":"anthropic","data":[3.55,3.65,3.5300000000000002,3.68,3.8499999999999996,3.54,3.94,4.0200000000000005,4,4.12,4.17,4.34,4.58,5.08,6.369999999999999,6.22,5.96,6.02,6.34,6.5600000000000005,6.89,7.5600000000000005,7.71,7.4,7.54,7.67,7.63,7.35,7.02,6.9799999999999995,7.07,7.17,7.300000000000001,7.2,6.87,6.7700000000000005,6.83,7.96],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
