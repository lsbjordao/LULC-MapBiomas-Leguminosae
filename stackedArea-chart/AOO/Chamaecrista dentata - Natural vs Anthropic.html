<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.34,70.18,69.91999999999999,69.86,69.67,69.36,69.23,69.26,69.31000000000002,69.44999999999999,69.39,69.59,69.52,69.6,69.52000000000001,69.21000000000001,69.3,69.26,69.2,69.46,69.87,69.77000000000001,69.84,69.66999999999999,69.68,69.88,69.88,69.86,69.81,69.99000000000001,70.34,70.44,70.71000000000001,70.65,70.46000000000001,70.33,70.01,69.57000000000001],"color":"green"},{"name":"anthropic","data":[29.830000000000005,31.010000000000005,31.28,31.330000000000002,31.540000000000006,31.84,31.96,31.92,31.88,31.73,31.799999999999997,31.61,31.68,31.61,31.68,31.97,31.88,31.930000000000003,32.00000000000001,31.740000000000002,31.34,31.46,31.35,31.520000000000003,31.51,31.32,31.320000000000004,31.310000000000002,31.400000000000002,31.200000000000003,30.880000000000003,30.74,30.49,30.529999999999998,30.729999999999997,30.86,31.169999999999998,31.630000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
