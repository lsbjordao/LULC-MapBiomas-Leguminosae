<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.06,57.36,57.01,56.849999999999994,56.51999999999999,56.31,56.30999999999999,56.39,56.39999999999999,56.449999999999996,56.589999999999996,56.62,56.88,57.86,58.40999999999999,58.71,59.25000000000001,59.72,60.23,60.589999999999996,61.34999999999999,61.68,61.879999999999995,62.199999999999996,62.410000000000004,62.82999999999999,63.05,63.78,64.36999999999999,64.88000000000001,65.27,65.25,65.57000000000001,64.53,64.47,64.31000000000002,63.44,63.080000000000005],"color":"green"},{"name":"anthropic","data":[44.290000000000006,44.98,45.339999999999996,45.480000000000004,45.84,46.02,46.03,45.959999999999994,45.97,45.89,45.76,45.72,45.470000000000006,44.50000000000001,43.94,43.63,43.09,42.63,42.1,41.76,41.00999999999999,40.67,40.480000000000004,40.13,39.940000000000005,39.510000000000005,39.32,38.58,37.98,37.48,37.08,37.07,36.779999999999994,37.809999999999995,37.87,38.04,38.93,39.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
