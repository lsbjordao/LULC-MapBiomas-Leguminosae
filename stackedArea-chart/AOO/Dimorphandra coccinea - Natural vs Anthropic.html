<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.08000000000001,96.60000000000001,96.48000000000002,96.17000000000002,95.31,95.13000000000001,95.28000000000002,95.10000000000001,94.87000000000002,95.23,95.58,95.56,95.18,94.64000000000001,94.71000000000002,94.71000000000001,94.56000000000002,94.53,94.17,94.14,94.01,93.99000000000001,94.03999999999999,94.23,94.03,94.00000000000003,93.95000000000002,93.99000000000002,94.07000000000001,94.01,93.90000000000002,93.67999999999999,93.64000000000001,93.51000000000002,93.55,93.23000000000002,92.91000000000001,92.51],"color":"green"},{"name":"anthropic","data":[3.92,4.41,4.5200000000000005,4.82,5.71,5.869999999999999,5.72,5.9,6.129999999999999,5.760000000000001,5.41,5.430000000000001,5.82,6.37,6.290000000000001,6.28,6.44,6.49,6.829999999999999,6.869999999999999,6.989999999999999,6.99,6.96,6.77,6.96,6.990000000000001,7.050000000000001,7,6.929999999999999,6.98,7.1,7.32,7.359999999999999,7.500000000000001,7.44,7.77,8.09,8.5],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
