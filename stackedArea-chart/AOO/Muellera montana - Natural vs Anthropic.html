<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.410000000000004,61.690000000000005,60.370000000000005,60.14,59.669999999999995,60.160000000000004,61.09,61.02,60.61000000000001,60.85000000000001,60.17,59.77,59.4,59.15,58.63999999999999,58.62,58.39,57.71,57.470000000000006,56.96000000000001,56.750000000000014,56.25000000000001,56.2,56.209999999999994,56.26000000000001,56.38,56.63000000000001,56.62000000000001,56.61000000000001,55.91000000000001,55.52000000000001,55.120000000000005,54.620000000000005,54.57000000000001,54.16000000000001,54.02,51.52000000000001,52.02],"color":"green"},{"name":"anthropic","data":[37.22,38.940000000000005,40.260000000000005,40.50000000000001,40.949999999999996,40.49,39.550000000000004,39.620000000000005,40.010000000000005,39.769999999999996,40.440000000000005,40.84,41.220000000000006,41.470000000000006,41.980000000000004,42.01,42.239999999999995,42.91,43.15,43.68,43.9,44.38,44.42,44.42,44.370000000000005,44.25000000000001,44,44,44.02,44.709999999999994,45.10000000000001,45.52,45.99999999999999,46.07,46.470000000000006,46.60000000000001,49.10000000000001,48.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
