<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.5,92.86,92.61,92.73,92.55000000000001,92.67999999999999,92.55,92.25000000000001,92.17999999999999,92.18,92.25999999999998,91.81,91.16,90.71000000000001,90.63999999999999,91.03999999999999,91.1,91.08,90.95,90.77,90.77,90.56,90.66,90.67999999999999,90.61999999999998,90.38,90.10000000000001,89.95,89.57999999999998,89.51,89.25999999999998,88.75000000000001,88.64999999999998,88.41000000000001,88.39,88.33,88.97999999999999,88.01999999999998],"color":"green"},{"name":"anthropic","data":[6.779999999999999,7.41,7.67,7.55,7.73,7.6,7.7299999999999995,8.03,8.1,8.1,8.02,8.46,9.11,9.57,9.649999999999999,9.25,9.18,9.200000000000001,9.35,9.510000000000002,9.52,9.719999999999999,9.620000000000001,9.61,9.66,9.91,10.17,10.33,10.69,10.76,11.030000000000001,11.530000000000001,11.65,11.89,11.91,11.96,11.3,12.27],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
