<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.239999999999995,52.870000000000005,52.58,52.23,52.010000000000005,51.889999999999986,51.639999999999986,51.39999999999999,51.510000000000005,51.760000000000005,51.699999999999996,51.68999999999998,51.61999999999998,51.48,51.019999999999996,50.769999999999996,50.76999999999999,50.71,50.809999999999995,50.779999999999994,50.77999999999999,50.88999999999999,50.92999999999999,50.959999999999994,50.929999999999986,51.169999999999995,51.31999999999999,51.51,51.67999999999999,51.54999999999999,51.54999999999998,51.51,51.48999999999999,51.54999999999998,51.429999999999986,51.43999999999999,51.41,51.569999999999986],"color":"green"},{"name":"anthropic","data":[50.87000000000001,51.24,51.54999999999999,51.870000000000005,52.07,52.18999999999999,52.48,52.70000000000001,52.58,52.33999999999999,52.42999999999999,52.44,52.46999999999999,52.61,53.080000000000005,53.31999999999999,53.35,53.4,53.269999999999996,53.31999999999999,53.319999999999986,53.230000000000004,53.17999999999999,53.129999999999995,53.169999999999995,52.91,52.77999999999999,52.559999999999995,52.419999999999995,52.55000000000001,52.54,52.58,52.629999999999995,52.54,52.669999999999995,52.67999999999999,52.77,52.53000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
