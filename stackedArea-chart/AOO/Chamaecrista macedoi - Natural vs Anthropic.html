<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.94,87.49999999999999,87.59999999999998,87.50999999999999,87.42,87.53999999999999,87.41999999999999,86.89,86.86,85.87,85.6,85.28,85.05000000000001,84.67,84.6,84.32,83.95,83.82,83.64999999999999,83.93000000000002,83.92,84.14,84.29,84.39,84.38,84.25999999999999,84.11999999999999,83.72999999999999,80.13000000000001,76.45,72.93,72.45,72.18,71.74000000000001,71.19,69.47,69.11,69.01],"color":"green"},{"name":"anthropic","data":[12.78,12.23,12.129999999999999,12.209999999999999,12.3,12.190000000000001,12.32,12.830000000000002,12.89,13.869999999999997,14.13,14.47,14.69,15.07,15.129999999999999,15.420000000000002,15.78,15.910000000000002,16.09,15.81,15.809999999999999,15.6,15.45,15.35,15.35,15.47,15.61,16.009999999999998,19.610000000000003,23.290000000000003,26.79,27.279999999999998,27.549999999999997,27.99,28.55,30.25,30.62,30.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
