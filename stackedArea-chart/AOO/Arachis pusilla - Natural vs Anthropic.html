<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.29,63.09,62.06,61.33,60.25999999999999,60.38,60.92,60.96999999999999,60.849999999999994,60.760000000000005,60.84000000000001,60.529999999999994,60.480000000000004,60.01,59.18,58.19,57.660000000000004,57.459999999999994,57.410000000000004,57.16,56.67,56.71,56.82,56.69999999999999,55.82,55.18,54.43,54.13999999999999,53.91,53.370000000000005,53.01000000000001,52.690000000000005,52.419999999999995,52.53,52.2,52.21,52.27,52.33],"color":"green"},{"name":"anthropic","data":[43.31,43.52000000000001,44.550000000000004,45.28,46.35,46.230000000000004,45.7,45.64,45.75,45.82000000000001,45.77,46.080000000000005,46.13000000000001,46.58,47.44000000000001,48.410000000000004,48.930000000000014,49.14000000000001,49.18,49.440000000000005,49.949999999999996,49.88,49.790000000000006,49.91,50.81,51.43,52.18000000000001,52.45,52.68999999999999,53.230000000000004,53.589999999999996,53.91,54.19,54.08999999999999,54.419999999999995,54.39999999999999,54.33,54.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
