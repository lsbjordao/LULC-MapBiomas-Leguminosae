<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.41000000000001,84.91999999999997,84.64999999999998,84.23,83.61000000000001,83.01000000000002,82.81,82.24999999999999,81.76000000000002,81.19999999999999,80.44,80.34,80.31,79.89999999999999,79.72,79.46000000000001,78.97000000000001,78.44000000000001,78.08000000000001,77.47,77.08,76.79999999999998,76.66999999999999,76.57,76.51,76.29999999999998,76.2,76.08999999999995,75.77999999999999,75.41999999999996,75.05999999999997,74.99999999999997,74.88999999999999,74.66999999999999,74.36,74.43999999999998,74.14999999999999,73.77999999999999],"color":"green"},{"name":"anthropic","data":[25.099999999999998,25.6,25.880000000000003,26.3,26.9,27.499999999999996,27.720000000000002,28.27,28.75,29.329999999999995,30.080000000000002,30.179999999999996,30.200000000000006,30.610000000000003,30.77,31.049999999999997,31.57,32.07,32.42,33.050000000000004,33.43,33.72,33.86,33.94,33.99,34.209999999999994,34.31,34.41,34.73,35.1,35.45000000000001,35.510000000000005,35.64,35.85,36.160000000000004,36.08,36.36,36.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
