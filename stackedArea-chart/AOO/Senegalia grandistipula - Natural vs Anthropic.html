<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.53,69.59,69.31000000000002,69.23,69.06,69.04000000000002,68.98,69.06000000000002,69.06,69.39,68.99000000000001,68.73,68.72000000000001,68.83000000000001,69.04,69.09,69.2,69.28000000000002,69.38000000000001,69.47,69.60000000000001,69.75,69.89999999999999,70.03,70.21,70.39,70.62,70.72999999999999,70.98,71.09,71.30000000000001,71.39,71.52000000000001,71.53999999999999,71.71000000000001,71.77000000000001,71.99000000000001,71.95],"color":"green"},{"name":"anthropic","data":[30.970000000000006,30.95,31.200000000000003,31.32,31.48,31.5,31.580000000000002,31.490000000000002,31.5,31.15,31.560000000000006,31.820000000000004,31.830000000000005,31.730000000000004,31.540000000000003,31.460000000000004,31.369999999999997,31.300000000000004,31.190000000000005,31.070000000000004,30.970000000000006,30.840000000000003,30.669999999999998,30.550000000000004,30.370000000000005,30.150000000000002,29.910000000000004,29.819999999999997,29.580000000000002,29.49,29.27,29.19,29.05,29.029999999999998,28.85,28.810000000000002,28.6,28.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
