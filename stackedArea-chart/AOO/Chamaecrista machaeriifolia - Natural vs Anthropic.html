<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.02000000000001,71.44000000000001,70.94,70.13000000000001,68.49,66.95,66.14,65.19,63.00999999999999,61.49,60.620000000000005,60.47,59.89000000000001,59.57,58.650000000000006,57.57,57.08,56.59,56.17,55.970000000000006,55.86,55.760000000000005,55.78999999999999,55.78,55.92000000000001,56.010000000000005,55.809999999999995,55.72,55.49999999999999,55.230000000000004,55.03,54.940000000000005,55.05000000000001,54.96000000000001,54.86000000000001,54.88000000000001,54.82,55.31],"color":"green"},{"name":"anthropic","data":[30.229999999999997,30.84,31.32,32.14,33.769999999999996,35.3,36.13999999999999,37.08,39.24999999999999,40.78,41.629999999999995,41.800000000000004,42.38,42.7,43.61000000000001,44.69,45.2,45.660000000000004,46.11000000000001,46.3,46.43,46.51,46.49,46.5,46.36,46.28,46.459999999999994,46.550000000000004,46.76,47.05,47.25,47.35999999999999,47.230000000000004,47.31,47.39,47.39000000000001,47.45,46.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
