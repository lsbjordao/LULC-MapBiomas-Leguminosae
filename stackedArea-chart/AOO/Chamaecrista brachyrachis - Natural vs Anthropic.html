<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.74,74.14,73.77,72.97,71.89999999999999,71.29,70.7,69.72,69.07,68.5,68.07,68.16000000000001,67.78999999999999,67.53,67.21,66.74,66.37,66.17,65.81,65.61,65.58,65.41999999999999,65.29,64.69,64.57000000000001,64.22,63.63,63.029999999999994,62.80000000000001,62.49000000000001,62.349999999999994,62.21,62.269999999999996,62.14,62.06999999999999,62.03999999999999,62.31999999999999,62.83999999999999],"color":"green"},{"name":"anthropic","data":[28.270000000000003,28.85,29.23,30.009999999999998,31.069999999999997,31.69,32.279999999999994,33.28,33.919999999999995,34.480000000000004,34.910000000000004,34.830000000000005,35.22,35.46,35.79,36.27,36.63,36.82,37.19,37.39999999999999,37.41,37.559999999999995,37.72,38.3,38.42,38.77,39.36,39.940000000000005,40.17999999999999,40.52,40.629999999999995,40.77,40.73,40.86,40.92,40.959999999999994,40.64,40.15],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
