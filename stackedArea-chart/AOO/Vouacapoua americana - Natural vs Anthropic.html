<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.89,90.36000000000001,87.87000000000002,86.73000000000002,86.99000000000002,87.69999999999999,88.10000000000002,87.96000000000001,86.55999999999999,85.14,84.57000000000001,84.48,84.14000000000003,83.68,83.47000000000001,82.56,81.36,81.15,80.65,80.00000000000001,79.31000000000002,78.77000000000002,78.55,77.81000000000002,76.96000000000001,76.48000000000002,76.24000000000001,76.48000000000002,76.92,77.14999999999999,77.29000000000003,78.95,78.97000000000001,79.11,79.04000000000002,78.71000000000001,78.20000000000002,77.67999999999999],"color":"green"},{"name":"anthropic","data":[10.360000000000001,10.87,13.389999999999999,14.519999999999998,14.259999999999998,13.56,13.16,13.29,14.69,16.110000000000003,16.680000000000003,16.78,17.1,17.560000000000002,17.78,18.710000000000004,19.91,20.110000000000003,20.62,21.240000000000002,21.950000000000003,22.48,22.710000000000004,23.430000000000003,24.290000000000003,24.770000000000003,25.010000000000005,24.780000000000005,24.340000000000003,24.1,23.960000000000004,22.299999999999997,22.28,22.150000000000002,22.210000000000004,22.540000000000006,23.03,23.560000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
