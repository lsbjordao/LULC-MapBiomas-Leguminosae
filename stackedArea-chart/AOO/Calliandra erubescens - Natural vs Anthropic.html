<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.01,68.57000000000001,70.49,70.34,70.86999999999999,69.87,71.5,71.51000000000002,72.02,72.95,72.68,72.55000000000001,73.63,74.10000000000001,75.53999999999999,76.41,76.79999999999998,76.71,76.57999999999998,76.99000000000001,77.44,77.38999999999999,77.61999999999999,77.9,78.14999999999999,77.48,77.50000000000001,78.1,77.99,77.31000000000002,77.58000000000001,76.97999999999999,77.26,76.82,77.09,77.00000000000001,77.06,76.78999999999999],"color":"green"},{"name":"anthropic","data":[32.19,31.619999999999997,29.700000000000003,29.849999999999998,29.330000000000002,30.33,28.690000000000005,28.680000000000003,28.169999999999998,27.24,27.51,27.630000000000003,26.560000000000002,26.1,24.63,23.770000000000003,23.39,23.490000000000002,23.610000000000007,23.2,22.750000000000004,22.779999999999998,22.580000000000002,22.27,22.030000000000005,22.710000000000004,22.67,22.07,22.19,22.880000000000003,22.619999999999997,23.19,22.94,23.360000000000003,23.1,23.19,23.12,23.380000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
