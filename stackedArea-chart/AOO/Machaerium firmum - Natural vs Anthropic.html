<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.39000000000001,61.230000000000004,60.470000000000006,60.45000000000001,60.36000000000001,60.26,60.76000000000001,60.85000000000001,61.04,61.150000000000006,61.50000000000001,62.300000000000004,62.91000000000001,63.64000000000001,64.11,64.21000000000001,64.58,65.08,66.04,66.27000000000001,66.75,67.31,67.58,67.82,68.02,68.18000000000002,68.08000000000001,68.08,68.02000000000001,67.93,67.74,67.84,68.00000000000001,68.14,68.47,68.53,68.38000000000001,68.41],"color":"green"},{"name":"anthropic","data":[28.15,28.299999999999997,29.07,29.1,29.18,29.28,28.75,28.67,28.479999999999997,28.380000000000003,28.01,27.220000000000002,26.610000000000003,25.89,25.42,25.34,24.94,24.45,23.500000000000004,23.26,22.790000000000003,22.220000000000002,21.95,21.720000000000002,21.51,21.35,21.460000000000004,21.45,21.5,21.6,21.77,21.69,21.540000000000003,21.39,21.05,20.970000000000002,21.140000000000004,21.12],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
