<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.72000000000001,84.85000000000001,84.49000000000001,84.04,83.51,83.25999999999999,82.88999999999999,81.91,82.08000000000001,82.38999999999999,82.29999999999998,81.91,82.10000000000001,81.89999999999999,81.77999999999999,81.82000000000001,81.94999999999999,81.52999999999997,80.53,79.72,79.14999999999999,77.82999999999998,76.39999999999998,75.9,75.77000000000001,75.74,75.77,75.19000000000003,74.84,74.42,73.51999999999998,73.17,73.16000000000001,72.81,72.22,71.94,71.69000000000001,70.75999999999999],"color":"green"},{"name":"anthropic","data":[6.779999999999999,7.6499999999999995,7.989999999999999,8.44,8.98,9.24,9.59,10.56,10.399999999999999,10.1,10.190000000000001,10.6,10.39,10.6,10.7,10.669999999999998,10.540000000000001,10.959999999999999,11.979999999999999,12.77,13.34,14.649999999999999,16.1,16.57,16.709999999999997,16.75,16.72,17.310000000000002,17.65,18.08,18.97,19.340000000000003,19.34,19.700000000000003,20.27,20.569999999999997,20.83,21.740000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
