<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.74999999999999,37.45,37.14000000000001,36.940000000000005,36.93,36.85,36.92,37.03,37.28,37.65,37.809999999999995,37.93999999999999,37.92,38.1,38.3,38.370000000000005,38.35999999999999,38.459999999999994,38.45,38.62999999999999,38.870000000000005,38.94999999999999,39.11,39.26,39.32000000000001,39.48,39.699999999999996,39.94,40.17999999999999,40.41,40.58,40.720000000000006,40.87,40.980000000000004,41.03,41.059999999999995,41.31,41.599999999999994],"color":"green"},{"name":"anthropic","data":[64.08,64.38,64.69999999999999,64.91,64.93,65.00000000000001,64.92999999999999,64.81,64.57000000000001,64.21000000000002,64.03,63.9,63.930000000000014,63.74,63.55000000000001,63.480000000000004,63.480000000000004,63.400000000000006,63.39000000000001,63.22000000000002,63.01,62.910000000000004,62.76,62.62,62.53000000000001,62.38999999999999,62.160000000000004,61.890000000000015,61.67,61.44,61.28,61.14,60.970000000000006,60.900000000000006,60.830000000000005,60.79,60.53,60.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
