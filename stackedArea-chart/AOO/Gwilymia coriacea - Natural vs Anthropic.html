<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.97999999999999,88.83000000000001,88.73,87.85000000000001,86.32,85.33,84.93,84.60999999999999,84.73999999999997,85,86.11000000000001,86.26,85.89,85.16999999999999,83.04,81.24000000000001,80.74,80.11,79.84,79.49,79.34,79.06000000000002,78.86,78.25,77.47,77.1,76.25999999999999,75.41,74.17,73.89999999999999,74.08,74.07000000000002,73.98000000000002,73.94,73.66,72.65999999999998,72.23,71.97],"color":"green"},{"name":"anthropic","data":[15.98,16.110000000000003,16.22,17.089999999999996,18.61,19.590000000000003,19.98,20.31,20.18,19.910000000000004,18.810000000000002,18.67,19.020000000000003,19.740000000000006,21.869999999999997,23.68,24.17,24.8,25.060000000000002,25.410000000000004,25.569999999999997,25.859999999999996,26.05,26.66,27.450000000000006,27.81,28.650000000000002,29.499999999999996,30.759999999999998,31.020000000000003,30.85,30.849999999999998,30.96,30.990000000000006,31.249999999999996,32.24,32.68,32.949999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
