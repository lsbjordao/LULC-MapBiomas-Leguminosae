<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.21000000000001,37.41,36.93000000000001,36.42999999999999,36.019999999999996,35.849999999999994,35.82999999999999,35.709999999999994,35.7,35.510000000000005,35.27,35.13,34.97,34.86,34.68,34.29,34.22,34.11999999999999,34.21,34.3,34.35,34.370000000000005,34.47,34.53999999999999,34.57000000000001,34.57000000000001,34.64000000000001,34.71000000000001,34.760000000000005,34.69,34.830000000000005,34.83,34.84,34.96,35.06,35.120000000000005,35.209999999999994,35.38],"color":"green"},{"name":"anthropic","data":[65.99000000000001,66.81,67.32,67.85,68.22,68.41000000000001,68.44000000000001,68.53,68.58,68.74999999999999,68.99000000000001,69.13,69.27000000000001,69.4,69.59,69.95000000000003,70.01000000000002,70.11000000000001,70.05,69.95000000000002,69.91000000000001,69.87000000000002,69.78000000000002,69.7,69.69000000000001,69.67000000000002,69.60000000000001,69.55,69.5,69.55,69.42000000000002,69.42,69.42000000000002,69.29,69.2,69.16000000000001,69.04,68.88000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
