<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.77,34.870000000000005,34.38,33.739999999999995,33.93999999999999,34.16,34.05,33.82,33.550000000000004,33.660000000000004,33.72,33.980000000000004,33.940000000000005,34.52,34.36,34.43,34.87,34.88999999999999,35.529999999999994,35.849999999999994,36.01,36.41,36.72,37.27,37.42000000000001,37.650000000000006,38.00000000000001,38.34000000000001,38.39,38.51,38.739999999999995,38.91,39.190000000000005,39.54000000000001,39.67000000000001,40.03000000000001,40.21,41.10999999999999],"color":"green"},{"name":"anthropic","data":[64.5,63.43999999999999,63.92000000000001,64.59,64.38000000000001,64.17999999999999,64.28999999999999,64.5,64.78,64.66,64.6,64.33999999999999,64.36,63.790000000000006,63.94,63.9,63.43,63.42999999999999,62.78,62.459999999999994,62.3,61.91,61.6,61.05,60.87,60.669999999999995,60.33,59.980000000000004,59.919999999999995,59.81,59.57,59.39,59.11,58.779999999999994,58.63999999999999,58.269999999999996,58.099999999999994,57.18999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
