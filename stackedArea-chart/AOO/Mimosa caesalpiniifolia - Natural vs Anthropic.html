<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.52999999999999,65.81,64.67999999999998,63.85999999999999,63.13999999999999,62.669999999999995,62.54999999999999,62.569999999999986,62.43999999999998,62.829999999999984,63.09999999999999,63.43999999999998,63.4,63.059999999999995,62.76999999999998,62.40999999999999,62.110000000000014,61.89,61.989999999999995,61.779999999999994,61.70999999999999,61.709999999999994,61.43000000000001,61.31,61.219999999999985,61.339999999999996,61.30999999999998,61.03999999999998,60.93999999999999,60.90999999999998,60.739999999999995,60.93000000000001,60.83,60.809999999999995,60.87,60.819999999999986,60.79999999999998,60.75],"color":"green"},{"name":"anthropic","data":[44.94,45.709999999999994,46.82,47.650000000000006,48.379999999999995,48.89000000000001,48.949999999999996,48.98,49.07,48.730000000000004,48.43000000000001,48.080000000000005,48.09000000000001,48.46000000000001,48.74,49.09000000000001,49.42000000000001,49.620000000000005,49.54,49.73,49.830000000000005,49.81000000000001,50.120000000000005,50.22,50.309999999999995,50.18,50.2,50.5,50.6,50.62,50.79,50.60000000000001,50.690000000000005,50.720000000000006,50.64000000000001,50.72,50.730000000000004,50.82000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
