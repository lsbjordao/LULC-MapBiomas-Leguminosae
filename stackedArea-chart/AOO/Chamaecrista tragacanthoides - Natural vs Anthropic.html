<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.62,71.43,71.11000000000001,71.15,71.28999999999999,71.63000000000001,71.74000000000001,71.88,71.78,71.67,71.58,71.59,71.6,71.65999999999998,71.75000000000001,71.55,71.41000000000001,71.33,71.17,71.14,71.18,71.02,71.08,71.02,71.02,71.11999999999999,71.13000000000001,71.15,71.15,71.19,71.14999999999999,71.13000000000001,71.27999999999999,71.43,71.45,71.50000000000001,71.36,71.21],"color":"green"},{"name":"anthropic","data":[29.210000000000004,29.39,29.71,29.66,29.55,29.200000000000003,29.090000000000003,28.95,29.05,29.18,29.24,29.230000000000004,29.22,29.160000000000004,29.09,29.28,29.42,29.5,29.66,29.69,29.659999999999997,29.8,29.750000000000004,29.799999999999997,29.8,29.71,29.7,29.66,29.69,29.64,29.669999999999998,29.7,29.54,29.380000000000003,29.37,29.330000000000002,29.459999999999997,29.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
