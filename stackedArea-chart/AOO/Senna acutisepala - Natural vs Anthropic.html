<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.39,54.459999999999994,53.29,52.489999999999995,52.86000000000001,52.86000000000001,53.720000000000006,54.730000000000004,55.67999999999999,55.95,55.779999999999994,55.73,56.18000000000001,56.42999999999999,56.88,56.67,55.730000000000004,55.300000000000004,54.82000000000001,54.71,55.050000000000004,54.25000000000001,53.900000000000006,54.11999999999999,54.669999999999995,54.67,55.03,56.21000000000001,56.29000000000001,56.38000000000001,56.28,56.33000000000001,56.050000000000004,55.589999999999996,55.38999999999999,54.92,55.29,55.49],"color":"green"},{"name":"anthropic","data":[47.199999999999996,46.11,47.28,48.1,47.730000000000004,47.72,46.849999999999994,45.839999999999996,44.91,44.629999999999995,44.8,44.86,44.4,44.15,43.7,43.910000000000004,44.849999999999994,45.28999999999999,45.75,45.88,45.55,46.34,46.68,46.459999999999994,45.940000000000005,45.900000000000006,45.550000000000004,44.36,44.300000000000004,44.2,44.300000000000004,44.26,44.54,45.010000000000005,45.2,45.67,45.3,45.1],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
