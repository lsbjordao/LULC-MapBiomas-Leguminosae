<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.00000000000001,68.63000000000001,67.35,66.24,65.41,65.15,65.12,65.1,65.03999999999999,64.99,64.78999999999999,64.71000000000001,64.39999999999999,64.5,63.34000000000001,62.92,62.76,62.42,62.29,62.19000000000001,61.760000000000005,61.81000000000001,61.730000000000004,62.07,62.49999999999999,62.43,62.47999999999999,62.56,62.290000000000006,62.13999999999999,62.349999999999994,62.580000000000005,62.690000000000005,62.78,62.650000000000006,62.75,62.54,62.44],"color":"green"},{"name":"anthropic","data":[31.049999999999997,31.45,32.779999999999994,33.92,34.75,35.010000000000005,35.02,35.06,35.12,35.17,35.370000000000005,35.47,35.77,35.63,36.78,37.18,37.37,37.71,37.85,37.95,38.39,38.370000000000005,38.43,38.08,37.660000000000004,37.74,37.68000000000001,37.64,37.879999999999995,38.06,37.88000000000001,37.62,37.51,37.42,37.56000000000001,37.440000000000005,37.690000000000005,37.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
