<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.13,60.919999999999995,59.589999999999996,58.82,58.3,57.81000000000001,57.169999999999995,57.199999999999996,57.50000000000001,57.91,57.75000000000001,57.76,57.9,57.66,57.339999999999996,57.37000000000001,57.45000000000001,57.440000000000005,58.120000000000005,58.410000000000004,58.38999999999999,58.919999999999995,58.989999999999995,58.870000000000005,59.00999999999999,58.92000000000001,58.64,58.160000000000004,57.800000000000004,57.620000000000005,57.30000000000001,57.400000000000006,57.17,57.46000000000001,57.92,58.410000000000004,58.46,58.570000000000014],"color":"green"},{"name":"anthropic","data":[33.67000000000001,34.910000000000004,36.26,37.03,37.559999999999995,38.05,38.66,38.67999999999999,38.339999999999996,37.97,38.15,38.150000000000006,38.03,38.24,38.56,38.53,38.44,38.44,37.779999999999994,37.45,37.5,37,36.92,37.019999999999996,36.92999999999999,37.019999999999996,37.29,37.769999999999996,38.11,38.309999999999995,38.62,38.56,38.769999999999996,38.449999999999996,37.99999999999999,37.53,37.51,37.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
