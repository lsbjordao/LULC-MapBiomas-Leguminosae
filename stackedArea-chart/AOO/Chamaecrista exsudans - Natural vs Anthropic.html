<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.42,65.08,65.13000000000001,65.13,65.02000000000001,65.28000000000002,65.33,65.27,64.94,64.69,64.22999999999999,64.25,64.31,64.33,64.36999999999999,64.09,63.91,63.239999999999995,62.32,61.980000000000004,61.5,61.5,61.38,61.269999999999996,60.90999999999999,60.28000000000001,59.49,59.31,59.309999999999995,59.21999999999999,59.21999999999999,59.3,59.449999999999996,59.690000000000005,60.01,60.15,60.22,60.349999999999994],"color":"green"},{"name":"anthropic","data":[36.62,35.95,35.910000000000004,35.89,36.01,35.74999999999999,35.699999999999996,35.769999999999996,36.08,36.35,36.79,36.779999999999994,36.71,36.7,36.66,36.94,37.13,37.769999999999996,38.699999999999996,39.05,39.51,39.53,39.65,39.78,40.129999999999995,40.75,41.51,41.72,41.72,41.81,41.82,41.730000000000004,41.599999999999994,41.35,41.03,40.879999999999995,40.81,40.7],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
