<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.54,55.370000000000005,55.21000000000001,54.76,53.72,51.36,50.2,48.78000000000001,47.96,47.17,46.46,46.019999999999996,45.559999999999995,44.730000000000004,44.06,43.81,43.529999999999994,43.27,43.099999999999994,42.82999999999999,42.61,42.11,41.69,41.24999999999999,41.59,41.720000000000006,41.67999999999999,41.7,40.93,40.47,40.05,39.88,39.559999999999995,39.040000000000006,38.72,38.510000000000005,38.480000000000004,38.65],"color":"green"},{"name":"anthropic","data":[45,46.16,46.309999999999995,46.760000000000005,47.80000000000001,50.169999999999995,51.31,52.739999999999995,53.550000000000004,54.370000000000005,55.07000000000001,55.51,55.959999999999994,56.78,57.47,57.730000000000004,57.99,58.28,58.440000000000005,58.690000000000005,58.919999999999995,59.42,59.830000000000005,60.27,59.94,59.81999999999999,59.85000000000001,59.84,60.589999999999996,61.050000000000004,61.47,61.66,61.95,62.480000000000004,62.81999999999999,63.01,63.040000000000006,62.89000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
