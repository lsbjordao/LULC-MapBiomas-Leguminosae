<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.11,94.25999999999999,94.47999999999999,94.54,94.53999999999999,94.46000000000001,94.36,94.2,94.13000000000001,93.1,92.53999999999999,92.45,92.42999999999999,92.35000000000001,92.28000000000002,92.22999999999999,92.13,91.87,91.62,91.43,91.28,91.27999999999999,91.22999999999999,91.14999999999999,91.13,91.03,90.91,90.85000000000001,90.6,90.48,90.34,90.4,90.44,90.44,90.36,90.3,89.44,87.67999999999999],"color":"green"},{"name":"anthropic","data":[5.81,5.6499999999999995,5.42,5.359999999999999,5.369999999999999,5.45,5.540000000000001,5.710000000000001,5.78,6.8100000000000005,7.37,7.46,7.49,7.550000000000001,7.63,7.68,7.800000000000001,8.03,8.29,8.469999999999999,8.620000000000001,8.63,8.66,8.76,8.77,8.89,9,9.05,9.309999999999999,9.43,9.559999999999999,9.5,9.459999999999999,9.47,9.54,9.61,10.48,12.23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
