<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.63999999999999,54.010000000000005,52.94,52.34,51.91,51.98,52.209999999999994,52.410000000000004,52.51,52.43,52.599999999999994,52.39,51.839999999999996,51.71,51.45,51.16000000000001,50.9,50.85,50.96,51.12,51.01,50.91,51.16000000000001,51.19999999999999,51.14999999999999,51.23999999999999,51.22999999999999,50.97,50.64,50.69999999999999,50.970000000000006,51.14,51.22,51.290000000000006,51.43000000000001,51.57999999999999,51.660000000000004,51.88],"color":"green"},{"name":"anthropic","data":[39.660000000000004,40.31999999999999,41.46000000000001,42.040000000000006,42.480000000000004,42.42,42.19,41.989999999999995,41.81999999999999,41.919999999999995,41.74,41.92,42.36,42.440000000000005,42.7,43.03,43.29,43.330000000000005,43.25000000000001,43.06000000000001,43.19,43.3,43.1,43.07,43.13999999999999,43.05,43.06,43.29,43.58,43.51,43.230000000000004,43.12,43.029999999999994,42.940000000000005,43.029999999999994,42.99,42.74,42.379999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
