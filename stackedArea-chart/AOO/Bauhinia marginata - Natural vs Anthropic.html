<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[26.08,22.06,20.49,19.479999999999997,20.369999999999997,20.05,19.189999999999998,18.659999999999997,17.14,15.57,15.489999999999998,14.649999999999999,14.810000000000002,14.98,15.08,15.02,14.78,14.870000000000001,15.649999999999999,15.67,15.41,15.83,15.56,15.9,16.25,16.28,16.26,15.91,15.08,15.32,16.18,16.25,16.03,16.07,15.63,14.969999999999999,14.86,15.52],"color":"green"},{"name":"anthropic","data":[73.85,77.88,79.44,80.44000000000001,79.55,79.89999999999999,80.75,81.28,82.8,84.37,84.42999999999999,85.29,85.11,84.94,84.85999999999999,84.90999999999998,85.13999999999999,85.07,84.27,84.25,84.52000000000001,84.11,84.36999999999999,84.02,83.67999999999999,83.64999999999999,83.67999999999999,84.02000000000001,84.85999999999999,84.61,83.75,83.68999999999998,83.89,83.85,84.29,84.94999999999999,85.07,84.41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
