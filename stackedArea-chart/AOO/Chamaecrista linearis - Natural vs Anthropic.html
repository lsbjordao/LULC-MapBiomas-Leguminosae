<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.64999999999999,82.21000000000001,82.27000000000001,81.51,81.08,80.92,80.85999999999999,80.07000000000001,79.57000000000001,79.40999999999998,79.36,79.25,79.13000000000001,78.61000000000001,78.6,78.6,78.21,77.98,78.39,78.21,78.10999999999999,78.05999999999999,78.19,78.05,78,77.90000000000002,77.99999999999999,78.11999999999999,78.08999999999999,77.73,78.08999999999999,78.08000000000001,78.15,78.33000000000001,77.97999999999998,77.58,76.85000000000001,76.73],"color":"green"},{"name":"anthropic","data":[23.52,22.990000000000002,22.940000000000005,23.640000000000004,24.090000000000003,24.260000000000005,24.320000000000004,25.1,25.610000000000003,25.75,25.81,25.919999999999998,26.030000000000005,26.55,26.569999999999997,26.58,26.96,27.17,26.759999999999998,26.959999999999994,27.07,27.120000000000005,26.970000000000002,27.12,27.17,27.290000000000006,27.180000000000003,27.040000000000003,27.069999999999997,27.429999999999996,27.069999999999997,27.09,27.02,26.84,27.18,27.599999999999998,28.32,28.430000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
