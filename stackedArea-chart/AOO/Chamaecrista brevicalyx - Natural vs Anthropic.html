<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.76,65.82,65.05,63.57000000000001,62.81,62.28,61.88999999999999,61.81000000000001,61.18,60.59,60.36000000000001,59.99000000000001,60.84000000000001,61.05000000000001,61.85000000000001,62.33,62.39,62.36,62,61.88999999999999,61.04,60.84,60.69999999999999,60.930000000000014,61.13,61.09,60.99000000000001,60.46,60.13999999999999,59.82999999999999,59.58000000000001,59.65,59.56999999999999,59.599999999999994,59.739999999999995,59.76,59.73999999999999,59.370000000000005],"color":"green"},{"name":"anthropic","data":[37.97,37.93,38.69,40.16,40.93000000000001,41.470000000000006,41.86,41.93000000000001,42.55999999999999,43.16,43.38,43.74,42.88,42.7,41.910000000000004,41.42,41.38,41.4,41.73,41.839999999999996,42.68,42.88,43.04,42.79,42.6,42.66,42.76,43.309999999999995,43.589999999999996,43.89999999999999,44.160000000000004,44.1,44.17000000000001,44.14000000000001,44.010000000000005,43.97,43.99,44.36000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
