<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.35,54.01,53.63,53.60000000000001,53.120000000000005,52.910000000000004,53.050000000000004,52.9,53.22,53.62,54.14000000000001,54.63,54.559999999999995,54.82,54.949999999999996,55.099999999999994,55.16999999999999,55.47999999999999,56.01999999999998,56.15999999999999,56.59,56.97,57.32999999999999,57.47,57.540000000000006,57.65000000000001,57.59,57.73,57.75999999999999,57.86000000000001,57.9,57.84,57.81,58.019999999999996,58.33,58.63,58.46000000000001,58.68000000000001],"color":"green"},{"name":"anthropic","data":[36.45,36.910000000000004,37.39,37.47,37.959999999999994,38.06,37.88,38.03,37.74999999999999,37.43999999999999,37.05,36.54,36.419999999999995,36.08,35.919999999999995,35.65999999999999,35.58,35.27,34.790000000000006,34.61000000000001,34.160000000000004,33.800000000000004,33.47,33.36,33.309999999999995,33.269999999999996,33.37,33.18,33.11000000000001,33.01,32.97,33.03,33.06,32.84,32.489999999999995,32.18,32.370000000000005,32.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
