<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.12,63.59000000000001,63.41,63.34,63.25999999999999,63.16,63.379999999999995,63.209999999999994,63.19,63.38000000000001,63.379999999999995,63.56,63.68,63.5,63.48000000000001,63.58,63.67000000000001,63.53,63.440000000000005,63.410000000000004,63.48,63.169999999999995,63.160000000000004,63.10999999999999,63.139999999999986,63.15999999999999,62.87,62.83,62.68000000000001,62.45,62.49,62.459999999999994,62.63000000000001,62.779999999999994,62.53,62.42999999999999,62.17,62.12000000000001],"color":"green"},{"name":"anthropic","data":[37.42,37.94,38.13,38.18,38.28,38.37,38.15,38.33,38.349999999999994,38.16,38.13999999999999,37.98,37.86,38.029999999999994,38.05,37.96,37.870000000000005,38.019999999999996,38.089999999999996,38.13,38.040000000000006,38.36000000000001,38.37,38.43000000000001,38.370000000000005,38.37,38.660000000000004,38.69,38.839999999999996,39.07000000000001,39.059999999999995,39.06999999999999,38.91,38.75,39.01000000000001,39.11,39.39000000000001,39.410000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
