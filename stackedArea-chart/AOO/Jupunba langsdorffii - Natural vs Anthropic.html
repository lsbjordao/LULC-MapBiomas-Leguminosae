<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.47,63.58000000000001,63.300000000000004,63.110000000000014,62.94000000000001,62.90000000000001,62.71,62.7,62.71000000000001,62.5,62.410000000000004,62.29000000000001,62.28,62.27000000000001,62.32000000000001,62.25,62.2,62.230000000000004,62.209999999999994,62.18,62.28,62.36,62.45,62.370000000000005,62.29000000000001,62.28,62.23,62.28999999999999,62.42999999999999,62.37,62.519999999999996,62.519999999999996,62.49999999999999,62.410000000000004,62.28,62.150000000000006,62.25999999999999,62.04],"color":"green"},{"name":"anthropic","data":[38.26000000000001,38.190000000000005,38.470000000000006,38.660000000000004,38.82999999999999,38.89,39.05,39.06,39.05,39.260000000000005,39.36,39.49,39.49,39.480000000000004,39.45000000000001,39.49999999999999,39.58,39.54,39.55999999999999,39.58999999999999,39.489999999999995,39.39,39.32,39.379999999999995,39.49000000000001,39.470000000000006,39.52,39.49,39.31999999999999,39.379999999999995,39.23000000000001,39.239999999999995,39.26,39.330000000000005,39.46,39.59,39.48000000000001,39.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
