<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.82999999999998,73.92000000000002,74.28000000000002,73.49,73.46,73.27000000000001,73.64999999999999,73.53,73.80999999999999,74.11999999999999,74.22000000000001,74.35,74.69,74.96000000000002,75.66,76.41000000000001,76.67,76.67,76.75999999999999,76.69999999999999,76.56,76.32,76.03999999999999,75.92,75.62000000000002,74.97000000000001,74.62999999999998,74.64999999999999,74.46,73.91000000000001,74.05,74.03999999999999,74.12,74.24000000000001,74.23000000000002,74.18000000000002,74.17,74.13],"color":"green"},{"name":"anthropic","data":[29.32,29.26,28.870000000000005,29.670000000000005,29.71,29.880000000000006,29.540000000000006,29.660000000000004,29.350000000000005,29.050000000000004,28.96,28.800000000000004,28.480000000000008,28.210000000000008,27.520000000000003,26.770000000000007,26.500000000000004,26.490000000000006,26.410000000000004,26.480000000000004,26.620000000000005,26.839999999999996,27.1,27.260000000000005,27.550000000000008,28.210000000000004,28.519999999999996,28.509999999999998,28.69,29.250000000000004,29.12,29.150000000000002,29.040000000000003,28.91,28.91,28.99,28.990000000000002,29.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
