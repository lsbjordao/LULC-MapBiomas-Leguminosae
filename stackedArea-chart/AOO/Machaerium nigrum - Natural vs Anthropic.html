<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.22999999999999,39.8,39.2,39.37,39.290000000000006,39.03000000000001,39.330000000000005,39.14,39.50000000000001,39.59,39.8,40.12,40.55999999999999,41.23,41.71,42.11,42.35000000000001,42.580000000000005,43.06,43.400000000000006,43.769999999999996,43.97000000000001,44.07000000000001,44.220000000000006,44.26000000000001,44.61000000000001,44.56000000000001,44.93000000000001,45.17000000000001,45.33000000000002,45.8,46.25,46.74000000000001,47.01,47.38,47.65,47.830000000000005,47.96999999999999],"color":"green"},{"name":"anthropic","data":[59.209999999999994,59.63,60.21,60.059999999999995,60.14,60.41,60.099999999999994,60.28999999999999,59.910000000000004,59.839999999999996,59.629999999999995,59.3,58.85,58.17999999999999,57.68,57.29,57.059999999999995,56.83,56.35999999999999,56,55.63999999999999,55.43,55.36,55.19,55.160000000000004,54.800000000000004,54.86,54.48,54.24,54.07999999999999,53.63,53.17,52.69,52.4,52.04,51.78000000000001,51.600000000000016,51.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
