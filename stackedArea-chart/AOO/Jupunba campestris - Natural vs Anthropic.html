<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.44000000000001,86.94000000000001,85.78,83.58,83.3,84.07,85.03999999999999,84.56,83.21000000000001,82.53999999999999,81.58,81.51,81.28,81.11000000000001,81.27000000000001,80.09,79.02,79.03,79.26,79.16999999999999,79.68000000000002,79.75000000000001,79.63000000000001,79.69,79.53999999999999,80.21000000000001,80.65,80.80000000000001,80.39000000000001,80.33,80.80000000000001,80.75,80.62,79.65,79.67,80.38000000000001,80.47,79.49000000000001],"color":"green"},{"name":"anthropic","data":[12.3,13.8,14.97,17.16,17.45,16.67,15.700000000000001,16.169999999999998,17.54,18.2,19.16,19.23,19.47,19.61,19.47,20.650000000000002,21.720000000000002,21.69,21.5,21.56,21.07,21,21.11,21.04,21.2,20.51,20.09,19.930000000000003,20.34,20.430000000000003,19.939999999999998,19.98,20.1,21.099999999999998,21.08,20.37,20.270000000000003,21.259999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
