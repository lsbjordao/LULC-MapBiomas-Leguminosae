<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.46,86.64999999999999,86.18,85.96,85.64,85.38000000000001,84.99999999999999,84.71000000000001,84.43,84.14,84.2,83.38999999999999,82.94999999999999,82.77000000000001,82.17,81.38,81.01,80.63,80.11,79.34000000000002,79.16000000000003,78.57,78,77.77,77.42,77.41999999999999,77.14,76.87,75.93999999999998,75.48000000000002,75.24000000000001,74.92999999999999,74.34,73.87,73.56,72.97,72.50999999999999,70.63000000000001],"color":"green"},{"name":"anthropic","data":[14.99,15.8,16.279999999999998,16.499999999999996,16.81,17.07,17.46,17.76,18.02,18.310000000000002,18.27,19.07,19.490000000000006,19.659999999999997,20.290000000000006,21.080000000000002,21.450000000000003,21.840000000000003,22.360000000000003,23.1,23.32,23.890000000000004,24.48,24.680000000000003,25.030000000000005,25.030000000000005,25.310000000000002,25.610000000000003,26.520000000000003,26.98,27.209999999999997,27.529999999999998,28.129999999999995,28.590000000000003,28.91,29.480000000000004,29.959999999999997,31.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
