<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.31999999999999,61.97999999999999,62.39999999999999,62.669999999999995,63.15,62.949999999999996,62.63,62.25,61.95,62.13,61.51,61.300000000000004,61.269999999999996,61.09,60.95,60.66,59.96,59.6,59.370000000000005,59.13,58.94,59.209999999999994,59.28,59.14,59.04,59.059999999999995,59.35,59.05000000000001,58.06,57.10999999999999,55.96,55.48,55.17999999999999,55.129999999999995,54.71,54.370000000000005,54.230000000000004,53.87999999999999],"color":"green"},{"name":"anthropic","data":[42.44,42.77,42.36,42.07999999999999,41.61,41.790000000000006,42.13,42.5,42.79999999999999,42.61,43.239999999999995,43.480000000000004,43.48,43.67,43.83,44.11,44.78999999999999,45.169999999999995,45.38,45.64,45.809999999999995,45.53,45.48000000000001,45.62,45.72,45.68,45.38999999999999,45.7,46.7,47.64,48.8,49.28,49.57,49.63,50.04000000000001,50.36,50.519999999999996,50.86],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
