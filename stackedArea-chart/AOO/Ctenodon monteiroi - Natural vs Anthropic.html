<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.95,64.87,61.75,60.06,58.7,58.06,57.230000000000004,56.82000000000001,56.279999999999994,56.18000000000001,56.510000000000005,57.400000000000006,58.77,59.39,59.94,60.870000000000005,61.13999999999999,61.470000000000006,61.42,60.489999999999995,60.34,60.92999999999999,61.17999999999999,62.12,62.309999999999995,62.239999999999995,61.57,61.1,61.18999999999999,60.85,60.58,60.699999999999996,60.89000000000001,61.51,61.779999999999994,62.26,62.11999999999999,62.160000000000004],"color":"green"},{"name":"anthropic","data":[35.559999999999995,35.64,38.75,40.440000000000005,41.79,42.42,43.26,43.67,44.21999999999999,44.330000000000005,44,43.1,41.74,41.11000000000001,40.589999999999996,39.61999999999999,39.349999999999994,39.04,39.07,40.019999999999996,40.18,39.580000000000005,39.33,38.38999999999999,38.209999999999994,38.28,38.93999999999999,39.4,39.339999999999996,39.67000000000001,39.940000000000005,39.79,39.60999999999999,38.989999999999995,38.72,38.26,38.39,38.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
