<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60,59.300000000000004,60.22000000000001,59.29000000000001,58.69,57.81000000000001,58.26999999999999,58.25999999999999,57.95,57.739999999999995,57.75000000000001,58.15000000000001,58.63000000000001,58.77,59.42,59.550000000000004,59.320000000000014,59.03,58.82000000000001,58.1,57.660000000000004,57.75000000000001,57.46000000000001,57.74000000000001,57.620000000000005,57.580000000000005,57.650000000000006,57.59,57.320000000000014,57.699999999999996,57.870000000000005,58.06999999999999,58.029999999999994,58.05,58.03,58.03,58.080000000000005,58.120000000000005],"color":"green"},{"name":"anthropic","data":[44.56,45.23,44.330000000000005,45.24,45.85,46.73,46.27,46.28999999999999,46.6,46.82,46.81999999999999,46.4,45.94,45.8,45.13999999999999,45.00000000000001,45.25,45.51,45.730000000000004,46.46,46.9,46.78,47.07,46.809999999999995,46.940000000000005,46.960000000000015,46.89000000000001,46.97,47.230000000000004,46.84,46.65,46.46999999999999,46.51,46.49,46.510000000000005,46.53,46.489999999999995,46.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
