<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.02,65.36,64.79999999999998,64.31000000000002,63.480000000000004,63.19999999999999,62.91999999999999,62.629999999999995,62.41999999999999,61.98,61.730000000000004,61.660000000000004,61.47999999999999,61.49,61.44,61.24999999999999,61.15,61.03,60.86,60.77,60.80000000000001,60.73,60.63000000000001,60.48000000000001,60.49000000000001,60.48,60.339999999999996,60.27,60.040000000000006,59.839999999999996,59.559999999999995,59.410000000000004,59.45,59.41000000000001,59.160000000000004,59.09,59.05,59.34],"color":"green"},{"name":"anthropic","data":[39.489999999999995,40.16,40.73,41.24000000000001,42.040000000000006,42.31999999999999,42.62,42.89,43.12999999999999,43.55999999999999,43.800000000000004,43.85999999999999,44.08,44.05,44.1,44.28,44.35999999999999,44.510000000000005,44.690000000000005,44.76,44.71,44.81999999999999,44.900000000000006,45.05000000000001,45.050000000000004,45.050000000000004,45.19,45.300000000000004,45.50000000000001,45.690000000000005,45.970000000000006,46.15,46.08,46.12,46.35,46.43,46.46999999999999,46.18999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
