<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.519999999999996,57.190000000000005,56.04999999999998,55.91,55.51999999999999,54.97999999999998,54.760000000000005,55.27,55.30000000000001,55.48,55.69,56.16,56.59999999999999,56.709999999999994,57.29,57.300000000000004,57.07999999999999,57.09,57.34,57.62,57.690000000000005,57.14999999999999,56.52,56.4,56,55.629999999999995,55.48999999999999,55.59,55.760000000000005,55.65,55.98,56.19999999999999,56.18999999999999,56.349999999999994,56.51000000000001,56.67,56.91,57.17999999999999],"color":"green"},{"name":"anthropic","data":[46.019999999999996,46.35999999999999,47.48,47.620000000000005,48.019999999999996,48.55,48.75,48.25999999999999,48.23,48.04999999999999,47.849999999999994,47.370000000000005,46.93,46.84,46.25000000000001,46.24,46.46,46.44,46.199999999999996,45.91,45.83,46.379999999999995,47.01,47.13,47.54,47.9,48.03999999999999,47.92,47.77000000000001,47.879999999999995,47.550000000000004,47.33,47.330000000000005,47.17,47.029999999999994,46.870000000000005,46.61,46.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
