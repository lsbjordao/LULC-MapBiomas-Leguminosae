<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.94,86.36000000000001,85.79,85.36,84.39999999999999,83.79999999999998,83.47999999999999,83.24999999999999,82.93,83.42000000000002,83.44,83.24000000000002,83.61,84.15000000000002,84.31,84.85000000000001,85.73,85.45000000000002,85.44000000000001,85.35,84.95000000000002,84.77,85.30000000000001,85.66000000000001,85.32000000000001,85.38000000000001,85.53999999999999,85.35000000000001,85.37,84.89999999999999,84.55,84.39999999999999,84.03,82.91,82.3,81.61000000000001,80.24999999999999,79.42000000000002],"color":"green"},{"name":"anthropic","data":[19.229999999999997,19.819999999999997,20.400000000000002,20.81,21.78,22.360000000000003,22.690000000000005,22.910000000000004,23.23,22.759999999999998,22.73,22.92,22.550000000000004,22.03,21.86,21.31,20.450000000000003,20.720000000000002,20.740000000000002,20.82,21.21,21.38,20.88,20.5,20.849999999999998,20.77,20.62,20.81,20.8,21.26,21.64,21.77,22.14,23.26,23.880000000000003,24.570000000000004,25.930000000000003,26.76],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
