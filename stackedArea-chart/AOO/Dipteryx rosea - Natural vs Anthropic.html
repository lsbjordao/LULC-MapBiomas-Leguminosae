<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.87,86.87000000000002,86.57000000000001,86.16,85.74000000000002,85.66,85.45999999999998,85.31,85.23000000000002,85.08000000000003,85.02000000000001,84.96999999999998,84.82000000000001,84.52,83.96,83.88000000000001,83.81,83.72,83.69,83.66,83.64999999999999,83.6,83.57999999999998,83.55000000000001,83.5,83.49,83.47,83.43,83.41000000000001,83.37,83.34,83.35000000000001,83.36000000000001,83.35000000000002,83.22,82.62000000000002,82.38000000000001,80.61000000000001],"color":"green"},{"name":"anthropic","data":[3.32,3.33,3.6100000000000003,4.039999999999999,4.449999999999999,4.55,4.74,4.9,4.98,5.119999999999999,5.18,5.23,5.39,5.6899999999999995,6.26,6.33,6.4,6.49,6.5200000000000005,6.54,6.550000000000001,6.6,6.630000000000001,6.66,6.710000000000001,6.720000000000001,6.74,6.789999999999999,6.789999999999999,6.82,6.859999999999999,6.86,6.85,6.87,6.99,7.59,7.83,9.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
