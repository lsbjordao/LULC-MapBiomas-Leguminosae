<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.550000000000004,48.36,47.37,47.93,48.21,48.16,48.900000000000006,49.459999999999994,49.949999999999996,50.089999999999996,50.36000000000001,51.03,51.5,52.00000000000001,52.23,52.35000000000001,52.57,52.87999999999999,53.599999999999994,53.89,54.080000000000005,54.42999999999999,54.61,54.63,54.959999999999994,55.06000000000001,55.48,55.57,55.7,55.9,55.92,56.10000000000001,56.460000000000015,56.55000000000001,56.96,56.94999999999999,57.269999999999996,57.46],"color":"green"},{"name":"anthropic","data":[47.07,47.28,48.260000000000005,47.720000000000006,47.440000000000005,47.52,46.72,46.160000000000004,45.7,45.550000000000004,45.27,44.58,44.14,43.64,43.39,43.28,43.04,42.75,42.050000000000004,41.76,41.55,41.21,41.04,41.02,40.69,40.589999999999996,40.18,40.089999999999996,39.96,39.769999999999996,39.739999999999995,39.54,39.18,39.11,38.699999999999996,38.699999999999996,38.379999999999995,38.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
