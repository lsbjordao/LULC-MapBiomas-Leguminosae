<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.72999999999999,64.61999999999999,63.3,62.24,61.63,61.36000000000001,61.12999999999999,61.059999999999995,61.139999999999986,61.35,61.17,61.27,61.489999999999995,61.550000000000004,61.540000000000006,61.440000000000005,61.36,61.3,61.53,61.53000000000001,61.519999999999996,61.52,61.70000000000001,61.599999999999994,61.910000000000004,62.35,62.45999999999999,62.599999999999994,62.51999999999998,62.54,62.43999999999999,62.25,62.36,62.52,62.690000000000005,62.79,63.06999999999998,63.25000000000001],"color":"green"},{"name":"anthropic","data":[38.14,38.26,39.620000000000005,40.650000000000006,41.260000000000005,41.54,41.78,41.83,41.76,41.54,41.75,41.65,41.44,41.39,41.38,41.5,41.6,41.64,41.410000000000004,41.41,41.43,41.43,41.24,41.33,41.019999999999996,40.58,40.47,40.309999999999995,40.43000000000001,40.4,40.489999999999995,40.68000000000001,40.56999999999999,40.4,40.3,40.230000000000004,40,39.79],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
