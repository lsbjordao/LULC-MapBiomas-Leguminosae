<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.67999999999999,47.1,46.78,46.440000000000005,46.15000000000001,46.29,46.260000000000005,46.12,46.53,47.2,47.06,47.19000000000001,47.43000000000001,47.330000000000005,47.760000000000005,47.8,48.26,48.309999999999995,48.85,48.480000000000004,48.63,48.79000000000001,49.15000000000001,49.1,49.18000000000001,49.33,49.379999999999995,49.66,49.95,49.96,50.160000000000004,50.27,50.400000000000006,50.269999999999996,50.39000000000001,50.49,50.550000000000004,50.669999999999995],"color":"green"},{"name":"anthropic","data":[55.730000000000004,56.309999999999995,56.64999999999999,56.970000000000006,57.25000000000001,57.07999999999999,57.17,57.28,56.88000000000001,56.16,56.260000000000005,56.17,55.92,56.07999999999999,55.650000000000006,55.60999999999999,55.18000000000001,55.11000000000001,54.57,54.970000000000006,54.79,54.64000000000001,54.27,54.349999999999994,54.23000000000001,54.05999999999999,54.04,53.78,53.470000000000006,53.4,53.190000000000005,53.11000000000001,53.03,53.15,53.019999999999996,52.889999999999986,52.879999999999995,52.760000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
