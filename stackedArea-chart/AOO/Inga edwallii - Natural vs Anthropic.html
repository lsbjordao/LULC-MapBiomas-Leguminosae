<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.92,71.22000000000001,70.56,70.21000000000001,70.11,70.03,69.97,70.17,70.58999999999999,71.26000000000002,71.49000000000001,71.77,72.06,72.23,72.53,72.44,72.35,72.59,72.31,72.39,73.00000000000001,73.1,73.09,73.46000000000001,73.53,73.89,74.11,74.28,74.52000000000001,74.61,74.78999999999999,74.86,74.86,74.78999999999999,74.87,74.67,74.69000000000001,73.97],"color":"green"},{"name":"anthropic","data":[28.61,29.32,29.990000000000002,30.330000000000002,30.44,30.55,30.59,30.380000000000003,29.95,29.32,29.1,28.800000000000004,28.530000000000005,28.360000000000003,28.060000000000002,28.180000000000003,28.24,28.03,28.27,28.22,27.590000000000003,27.5,27.51,27.150000000000002,27.080000000000002,26.73,26.500000000000004,26.330000000000002,26.09,25.980000000000004,25.830000000000002,25.740000000000002,25.76,25.810000000000002,25.740000000000002,25.930000000000003,25.910000000000004,26.620000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
