<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.11999999999999,93.58,92.94000000000001,92.35000000000001,92.56000000000002,92.47999999999999,92.34000000000002,91.86999999999999,91.36000000000001,90.93000000000002,89.89,89.38000000000002,87.86,87.42000000000002,87.17000000000002,86.87,86.24000000000001,84.80000000000003,83.48000000000002,83.09,81.89,80.92000000000002,80.55000000000001,80.22000000000001,80.08000000000001,80.06000000000002,79.52000000000001,78.98,78.25,77.65,77.05,75.99000000000001,75.39000000000001,75.18,74.65,74.5,74.23000000000002,73.76],"color":"green"},{"name":"anthropic","data":[7.66,8.200000000000001,8.84,9.420000000000002,9.219999999999999,9.28,9.42,9.899999999999999,10.399999999999999,10.86,11.89,12.39,13.91,14.35,14.600000000000001,14.91,15.54,16.98,18.3,18.670000000000005,19.89,20.860000000000003,21.23,21.55,21.689999999999998,21.709999999999997,22.25,22.799999999999997,23.530000000000005,24.12,24.720000000000002,25.77,26.369999999999997,26.610000000000007,27.14,27.27,27.540000000000003,28.02],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
