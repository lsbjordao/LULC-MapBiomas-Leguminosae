<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.54,58.580000000000005,57.959999999999994,57.72,57.330000000000005,57.309999999999995,56.97,56.800000000000004,56.940000000000005,57.00000000000001,57.040000000000006,57.210000000000015,57.449999999999996,57.34,57.27,56.81,56.72,56.47999999999999,56.64999999999999,56.739999999999995,57.019999999999996,57.49,57.78,58.07,58.35,58.629999999999995,58.790000000000006,58.81,58.99,59.16,59.26000000000001,59.24,59.34000000000001,59.43000000000001,59.55,59.52000000000001,59.50000000000001,59.38],"color":"green"},{"name":"anthropic","data":[44.330000000000005,44.32,44.9,45.17,45.580000000000005,45.580000000000005,45.89,46.08,45.940000000000005,45.88999999999999,45.82,45.67,45.43,45.57,45.620000000000005,46.08,46.17,46.41,46.26,46.14000000000001,45.870000000000005,45.39,45.11999999999999,44.82,44.54,44.24,44.07000000000001,44.08,43.910000000000004,43.739999999999995,43.63,43.64,43.53,43.46000000000001,43.33,43.35000000000001,43.379999999999995,43.489999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
