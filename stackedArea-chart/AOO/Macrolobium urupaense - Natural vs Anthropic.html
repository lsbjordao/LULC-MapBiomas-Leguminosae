<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.62000000000002,73.74999999999999,73.9,74.00000000000001,73.94000000000001,74.43,74.41,74.24000000000001,74.08000000000001,73.63999999999999,73.50000000000001,72.59,72.62999999999998,72.95000000000002,72.87,73.00999999999999,73.59000000000002,73.79,74.03,74.39,75.08999999999999,74.78999999999998,74.49,74.49,74.24999999999999,74.18,74.16999999999999,73.52,71.75999999999999,70.57,70.54000000000002,70.82,70.83000000000001,71.00000000000001,71.53000000000002,72.82,72.69999999999999,71.97],"color":"green"},{"name":"anthropic","data":[27.14,27.01,26.860000000000003,26.76,26.82,26.330000000000002,26.349999999999998,26.52,26.68,27.119999999999997,27.28,28.18,28.13,27.82,27.900000000000002,27.740000000000002,27.17,26.970000000000002,26.740000000000002,26.36,25.67,25.97,26.29,26.27,26.51,26.57,26.6,27.25,29,30.2,30.220000000000002,29.939999999999998,29.93,29.759999999999998,29.24,27.93,28.060000000000002,28.779999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
