<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[93,93.39,92.92,91.6,90.7,90.62,90.33,90.03,89.45,88.26,87.37,86.13,84.83,83.64,82.93,82.27,82.09,81.45,80.8,80.53,80.36,79.88,79.45,79,78.12,77.47,77.04,77.16,77.17,76.75,76.55,76.88,76.93,77.32,77.11,76.62,75.99,74.71],"color":"#006400"},{"name":"Flooded forest","data":[1.01,0.94,0.92,0.86,0.89,0.94,1.03,1.03,1.02,1.02,1.04,1.02,1.05,1.05,1.04,1.08,1.08,1.1,1.1,1.1,1.11,1.15,1.15,1.16,1.12,1.14,1.04,0.97,0.98,1.12,1.11,1.1,1.09,1.04,1.02,0.97,0.86,0.95],"color":"#76A5AF"},{"name":"Wetland","data":[0.48,0.4,0.78,0.67,0.66,0.43,0.49,0.57,0.37,0.38,0.41,0.42,0.33,0.29,0.44,0.52,0.34,0.49,0.33,0.4,0.41,0.59,0.33,0.48,0.37,0.36,0.31,0.33,0.32,0.25,0.14,0.19,0.12,0.18,0.21,0.23,0.31,0.07],"color":"#45C2A5"},{"name":"Grassland","data":[0.03,0.08,0.08,0.01,0,0.03,0.03,0.01,0,0.03,0.06,0.09,0.04,0.12,0.02,0.18,0.34,0.18,0.19,0.15,0.34,0.19,0.36,0.29,0.31,0.33,0.42,0.44,0.41,0.41,0.44,0.47,0.46,0.47,0.4,0.42,0.53,0.73],"color":"#B8AF4F"},{"name":"Pasture","data":[3.32,2.92,3.33,4.44,5.46,5.65,5.89,6.28,6.81,8.02,8.83,10.19,11.27,12.41,13.03,13.89,14.21,14.83,15.64,15.89,15.87,16.24,16.76,17.25,18.24,18.9,19.36,19.23,19.25,19.55,19.62,19.27,19.22,18.87,19.11,19.6,20.21,21.65],"color":"#FFD966"},{"name":"River, lake and ocean","data":[1.84,1.96,1.67,2.12,1.99,2.01,1.94,1.78,2.04,1.99,1.99,1.83,2.17,2.19,2.23,1.75,1.64,1.65,1.63,1.62,1.6,1.64,1.64,1.51,1.53,1.48,1.52,1.55,1.55,1.6,1.83,1.78,1.87,1.81,1.84,1.85,1.79,1.59],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
