<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.33999999999998,62.149999999999984,61.48999999999999,60.86,60.56000000000001,60.550000000000004,60.860000000000014,60.67000000000001,60.51,60.45,60.48,60.78000000000001,61.030000000000015,60.93000000000001,61.12999999999999,61.02000000000001,60.99,60.73,60.67,60.720000000000006,60.86,61.02000000000001,61.01,61.120000000000005,61.12,61.21000000000001,61.050000000000004,60.76,60.45,59.959999999999994,59.69000000000001,59.63999999999999,59.699999999999996,60.01000000000001,60.129999999999995,60.24,60.12,60.28999999999999],"color":"green"},{"name":"anthropic","data":[47.4,47.580000000000005,48.230000000000004,48.890000000000015,49.24,49.2,48.93000000000001,49.12,49.29,49.35,49.290000000000006,48.99,48.75,48.879999999999995,48.7,48.77,48.830000000000005,49.09000000000001,49.17,49.100000000000016,48.94000000000001,48.82,48.81999999999999,48.709999999999994,48.690000000000005,48.620000000000005,48.78,49.04,49.370000000000005,49.85,50.18000000000001,50.19999999999999,50.13999999999999,49.800000000000004,49.709999999999994,49.599999999999994,49.71,49.529999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
