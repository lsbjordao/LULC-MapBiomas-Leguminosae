<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.7,71.85,71.91000000000001,71.86000000000001,71.72,71.73,71.83,71.64,71.33999999999999,71.06,70.99999999999999,71.02999999999999,70.97,71.21000000000001,71.28,71.17999999999999,71.22,71.04,70.8,70.72,70.87,70.80999999999999,70.71999999999998,70.79,71.00999999999999,71.12,71.05,71.26,71.37,71.60000000000001,72.04000000000002,72.1,72.39999999999999,72.64,72.7,72.68,72.61999999999999,72.60000000000001],"color":"green"},{"name":"anthropic","data":[28.38,29.22,29.18,29.2,29.35,29.33,29.23,29.419999999999998,29.72,29.990000000000002,30.07,30.02,30.08,29.84,29.759999999999998,29.9,29.86,30.029999999999998,30.259999999999998,30.349999999999998,30.200000000000003,30.27,30.34,30.28,30.07,29.96,30.020000000000003,29.78,29.68,29.47,29.01,28.96,28.670000000000005,28.42,28.37,28.39,28.46,28.459999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
