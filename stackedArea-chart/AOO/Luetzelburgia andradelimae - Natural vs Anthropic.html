<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.72000000000001,63.22,62.94,61.449999999999996,59.92,60.620000000000005,60.15999999999999,58.169999999999995,57.489999999999995,57.919999999999995,57.94,57.830000000000005,58.36,58.69,58.75,59.25,58.54,58.24,58.019999999999996,57.64,57.17,57.54,57.25000000000001,57.080000000000005,56.89999999999999,57.46000000000001,57.35000000000001,57.059999999999995,56.69,56.349999999999994,55.94000000000001,54.75,53.160000000000004,52.64,52.64000000000001,52.580000000000005,52.529999999999994,52.53],"color":"green"},{"name":"anthropic","data":[36.85,37.35,37.62,39.11,40.64,39.94,40.4,42.4,43.07,42.629999999999995,42.629999999999995,42.739999999999995,42.209999999999994,41.86999999999999,41.81,41.31,42.02,42.32,42.55,42.92000000000001,43.38000000000001,43.019999999999996,43.32,43.480000000000004,43.66,43.09,43.2,43.510000000000005,43.870000000000005,44.230000000000004,44.63,45.81,47.410000000000004,47.93,47.92,48.00000000000001,48.03000000000001,48.050000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
