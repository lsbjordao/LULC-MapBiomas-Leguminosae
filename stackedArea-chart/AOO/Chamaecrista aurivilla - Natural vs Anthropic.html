<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.65,78.18999999999998,77.91,77.42,77.37,77.47,77.68,77.61,77.86,78.06999999999998,78.14999999999999,78.49,78.64000000000001,78.63,78.89,78.91000000000001,78.91,78.86999999999999,78.58,78.47,78.24999999999999,77.64,75.9,75.86999999999999,75.55,75.37,75.56,75.8,75.72,75.38,74.91000000000001,74.73,74.68,75.02,75.17999999999999,75.38,75.52,75.7],"color":"green"},{"name":"anthropic","data":[21.45,21.91,22.18,22.67,22.71,22.619999999999997,22.419999999999998,22.48,22.23,22.02,21.939999999999998,21.610000000000003,21.45,21.450000000000003,21.22,21.18,21.200000000000003,21.210000000000004,21.51,21.62,21.83,22.46,24.2,24.22,24.55,24.72,24.530000000000005,24.28,24.37,24.71,25.180000000000003,25.360000000000003,25.41,25.08,24.910000000000004,24.71,24.560000000000002,24.39],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
