<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.989999999999995,56.93000000000001,54.29,51.41,50.97,52.32,52.290000000000006,53.13,53.010000000000005,52.63000000000001,52.23,51.00000000000001,55.239999999999995,56.14000000000001,56.86000000000001,57.53,57.19,55.92,55.71000000000001,58.040000000000006,57.72000000000001,57.870000000000005,58.050000000000004,58.05,57.860000000000014,57.74,55.82,52.290000000000006,49.24,48.86000000000001,47.6,48.71,51.57,53.01000000000001,53.3,54.45,53.38000000000001,54.93],"color":"green"},{"name":"anthropic","data":[43.73,43.78,46.44,49.3,49.769999999999996,48.419999999999995,48.44,47.58,47.7,48.09,48.480000000000004,49.73,45.48,44.6,43.870000000000005,43.19000000000001,43.53,44.8,45,42.67000000000001,42.98000000000001,42.84,42.68000000000001,42.67,42.86,42.98999999999999,44.9,48.42,51.48,51.86,53.14000000000001,52.01,49.15999999999999,47.71,47.43,46.260000000000005,47.32999999999999,45.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
