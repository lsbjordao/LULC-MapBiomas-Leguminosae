<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.84,66.96,66.85,66.7,66.18,66.21,65.94999999999999,65.58,65.16,64.74,64.46000000000001,64.58,64.77000000000001,65.18,65.13,64.94000000000001,64.74000000000001,64.23,63.839999999999996,63.620000000000005,64.46000000000001,64.34,64.33,64.71000000000001,65.24000000000001,65.75,66.16,66.42,67.03,67.41000000000001,68.19,68.81,69.19,69.12,68.73,68.37,67.66,67.72],"color":"green"},{"name":"anthropic","data":[32.17,33.05,33.17,33.31,33.81,33.79999999999999,34.05,34.440000000000005,34.86,35.26,35.56,35.43000000000001,35.24,34.82,34.88,35.06999999999999,35.28,35.779999999999994,36.169999999999995,36.4,35.55,35.68,35.67,35.3,34.769999999999996,34.260000000000005,33.85,33.589999999999996,32.980000000000004,32.61,31.82,31.199999999999996,30.82,30.89,31.27,31.619999999999997,32.370000000000005,32.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
