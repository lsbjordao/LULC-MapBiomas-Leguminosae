<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.3,49.760000000000005,49.51,48.910000000000004,48.12999999999999,47.63999999999999,47.12,46.46,45.92000000000001,45.25999999999999,43.559999999999995,42.400000000000006,41.19,40.65999999999999,40.800000000000004,40.849999999999994,40.92,41.099999999999994,40.79,40.53,40.120000000000005,39.28,38.74,38.62,38.49999999999999,38.620000000000005,38.54,38.23,37.8,37.790000000000006,37.720000000000006,37.61,37.809999999999995,37.940000000000005,37.900000000000006,37.74,37.28,37.24],"color":"green"},{"name":"anthropic","data":[42.470000000000006,45.01,45.269999999999996,45.85000000000001,46.64,47.129999999999995,47.65,48.33,48.86,49.51,51.21000000000001,52.36,53.57,54.1,53.97,53.92,53.85000000000001,53.67000000000001,53.98,54.24,54.64,55.48,56.029999999999994,56.14000000000001,56.27000000000001,56.14,56.24000000000001,56.52,56.97,56.980000000000004,57.059999999999995,57.15,56.95,56.839999999999996,56.870000000000005,57.02999999999999,57.47999999999999,57.52],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
