<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.54,62.13999999999999,61.91,61.300000000000004,61.15,61.19,60.839999999999996,60.86000000000001,61.73,61.96,62.28,62.42,62.52,62.17,61.830000000000005,61.650000000000006,61.76,62.21,62.559999999999995,62.73,62.98,63.379999999999995,64.07000000000001,64.06,64.2,64.28999999999999,64.43,64.12,63.82000000000001,63.68000000000001,63.38,63.11999999999999,63.309999999999995,63.39,63.49,63.64000000000001,63.85,63.95],"color":"green"},{"name":"anthropic","data":[37.19,38.6,38.85,39.440000000000005,39.59,39.55,39.900000000000006,39.88,39.010000000000005,38.78,38.47,38.32000000000001,38.22,38.580000000000005,38.92,39.099999999999994,38.989999999999995,38.53,38.169999999999995,38.010000000000005,37.76,37.379999999999995,36.669999999999995,36.69,36.54,36.449999999999996,36.3,36.62,36.92000000000001,37.059999999999995,37.38,37.620000000000005,37.440000000000005,37.34,37.25,37.09,36.89,36.800000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
