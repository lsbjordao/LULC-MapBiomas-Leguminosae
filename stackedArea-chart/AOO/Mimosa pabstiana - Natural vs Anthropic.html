<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.91,60.80000000000001,59.040000000000006,58.96000000000001,58.89,58.77,58.58,57.790000000000006,57.27,56.38000000000001,55.760000000000005,55.4,55.59000000000001,55.65,55.550000000000004,55.68999999999999,55.209999999999994,55.199999999999996,54.94,54.74,54.79,54.72,54.54,54.769999999999996,53.86000000000001,53.56000000000001,53.800000000000004,52.70000000000001,52.21000000000001,51.99000000000001,51.6,51.440000000000005,51.54,51.91,51.790000000000006,52.03,51.9,52.81],"color":"green"},{"name":"anthropic","data":[41.06999999999999,41.169999999999995,42.93,43.019999999999996,43.089999999999996,43.209999999999994,43.4,44.19,44.709999999999994,45.599999999999994,46.209999999999994,46.57999999999999,46.39999999999999,46.32999999999999,46.44,46.300000000000004,46.75999999999999,46.779999999999994,47.03999999999999,47.24999999999999,47.18000000000001,47.27,47.42,47.220000000000006,48.099999999999994,48.40999999999999,48.169999999999995,49.269999999999996,49.77,49.99,50.370000000000005,50.54,50.44999999999999,50.05999999999999,50.18,49.95,50.080000000000005,49.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
