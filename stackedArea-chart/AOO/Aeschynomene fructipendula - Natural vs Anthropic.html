<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.63,78.62000000000002,67.11999999999999,66.67999999999999,67.51,70.17,75.8,77.60000000000001,77.72000000000001,78.58,76.92,76,67.55,68.36999999999999,78.36000000000001,83.30000000000003,86.14999999999999,86.27,86.45,87.07,87.50999999999999,87.96000000000001,88.39,88.27,88.52000000000001,86.10000000000001,85.5,86.49999999999999,87.49000000000001,87.99000000000001,87.59,85.05,85.11,85.73,85.64999999999999,84.99000000000001,85.32000000000001,86.92999999999999],"color":"green"},{"name":"anthropic","data":[9,9.01,19.6,19.55,18.939999999999998,18.34,11.84,9.34,8.95,8.9,10.96,12.84,24.54,25.84,12.41,6.630000000000001,3.27,2.33,2.5300000000000002,2.18,2.46,2.04,1.96,1.85,1.3399999999999999,2.2399999999999998,2.18,2.35,2.11,2.33,2.9299999999999997,8.45,8.46,7.59,7.03,7.41,6.12,4.800000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
