<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.72,34.96,35.15,35.39000000000001,36.419999999999995,36.72,37.72,38.03999999999999,38.559999999999995,39.42999999999999,39.67,40.6,41.04,41.129999999999995,42.239999999999995,42.83,43.38999999999999,44.07,44.36,44.89,45.4,45.74999999999999,46.279999999999994,46.580000000000005,46.84,47.39000000000001,47.269999999999996,47.43,47.54,47.59,47.699999999999996,48.12999999999999,48.51,49.15,49.42999999999999,49.690000000000005,49.88,50.42],"color":"green"},{"name":"anthropic","data":[62.629999999999995,63.42,63.24,63.01,62,61.67,60.68,60.37,59.85,58.96,58.73,57.79,57.370000000000005,57.27,56.16,55.57000000000001,55.02,54.339999999999996,54.05,53.53999999999999,53.01,52.67,52.13999999999999,51.839999999999996,51.57999999999999,51.02,51.17000000000001,50.99999999999999,50.88999999999999,50.839999999999996,50.74000000000001,50.3,49.93000000000001,49.300000000000004,49.019999999999996,48.779999999999994,48.58,48.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
