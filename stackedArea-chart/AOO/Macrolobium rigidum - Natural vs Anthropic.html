<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.98,62.71999999999999,62.050000000000004,60.64,59.98,59.82000000000001,59.56,59.900000000000006,59.739999999999995,59.71,60.07000000000001,60.330000000000005,60.17,60.43,60.709999999999994,60.38,60.41,60.17,60.03000000000001,59.71000000000001,59.79,59.77000000000001,59.959999999999994,60.260000000000005,60.54999999999998,60.53999999999999,60.529999999999994,60.39000000000001,60.36000000000001,60.22,60.39999999999999,60.27,60.21999999999999,60.56999999999999,60.640000000000015,60.83,60.88999999999999,61.540000000000006],"color":"green"},{"name":"anthropic","data":[32.31,31.620000000000005,32.29,33.74,34.400000000000006,34.59,34.83,34.46,34.6,34.61,34.29,34.01,34.14,33.86,33.57000000000001,33.879999999999995,33.87,34.15,34.309999999999995,34.64,34.57,34.6,34.38999999999999,34.089999999999996,33.79,33.8,33.8,33.959999999999994,34.01,34.160000000000004,33.980000000000004,34.10999999999999,34.13999999999999,33.75,33.73,33.52,33.449999999999996,32.7],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
