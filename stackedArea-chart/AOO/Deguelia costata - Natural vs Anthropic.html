<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.51000000000001,33.480000000000004,32.14,31.590000000000003,31.390000000000004,31.16,31.279999999999994,31.06,30.860000000000007,30.77,31.09,31.26,31.430000000000003,31.240000000000006,30.940000000000005,30.630000000000003,30.619999999999997,30.64,30.82,31.08,31.21,31.160000000000004,31.37,31.430000000000003,31.480000000000008,31.46,31.64,31.600000000000005,31.560000000000002,31.720000000000002,31.79,31.96,32.08,32.17000000000001,32.419999999999995,32.910000000000004,32.92,33.6],"color":"green"},{"name":"anthropic","data":[65.39,67.47,68.84,69.42,69.62000000000002,69.83000000000003,69.72,69.94000000000001,70.15,70.22,69.93,69.72000000000001,69.56000000000002,69.76,70.05000000000001,70.37,70.35,70.36000000000001,70.16,69.92,69.8,69.84,69.6,69.56000000000002,69.5,69.53000000000002,69.33,69.39,69.41000000000003,69.30000000000001,69.2,69.04,68.92999999999999,68.79999999999998,68.57000000000001,68.07,68.06,67.36999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
