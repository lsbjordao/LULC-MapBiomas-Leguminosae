<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.09999999999999,50.83999999999999,50.42999999999999,49.88999999999999,49.379999999999995,49.16,48.89,48.68,48.78999999999999,48.81,48.9,49,49.07000000000001,49.25,49.47,49.42999999999999,49.55,49.589999999999996,49.56,49.53,49.370000000000005,49.43000000000001,49.559999999999995,49.63,49.77,49.809999999999995,50.059999999999995,50.14,50.41,50.55999999999999,50.67999999999999,50.879999999999995,50.98,51.059999999999995,51.1,51.07,51.080000000000005,51.18],"color":"green"},{"name":"anthropic","data":[53.410000000000004,53.67,54.06999999999999,54.59,55.10999999999999,55.34,55.61,55.84,55.71,55.690000000000005,55.6,55.5,55.44000000000001,55.25000000000001,55.04,55.08,54.92999999999999,54.84,54.93,54.92999999999999,55.12999999999999,55.019999999999996,54.92000000000001,54.85,54.68999999999999,54.68999999999999,54.410000000000004,54.33,54.06999999999999,53.91999999999999,53.809999999999995,53.61000000000001,53.519999999999996,53.42,53.370000000000005,53.410000000000004,53.42,53.309999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
