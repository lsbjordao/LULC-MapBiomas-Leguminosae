<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.339999999999996,59.47,58.31,57.45,56.830000000000005,56.27000000000002,56.510000000000005,56.42999999999999,56.669999999999995,57.220000000000006,58.06,58.16,59.30000000000001,59.260000000000005,58.40999999999999,57.94,57.81000000000001,57.779999999999994,57.84,58.19,58.24,57.86000000000001,57.73000000000001,57.67,57.63000000000001,57.690000000000005,57.46000000000001,56.83,56.13000000000001,55.21,54.82,54.92999999999999,54.8,55.36,55.30999999999999,55.220000000000006,55.15999999999999,55.38999999999999],"color":"green"},{"name":"anthropic","data":[39.440000000000005,39.440000000000005,40.7,41.6,42.25000000000001,42.800000000000004,42.6,42.67000000000001,42.44,41.83,40.96,40.86,39.77,39.84,40.7,41.17999999999999,41.330000000000005,41.35,41.269999999999996,40.9,40.839999999999996,41.27000000000001,41.440000000000005,41.49,41.54,41.53,41.779999999999994,42.42000000000001,43.160000000000004,44.080000000000005,44.45,44.35000000000001,44.44,43.83,43.919999999999995,44.04,44.02,43.76],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
