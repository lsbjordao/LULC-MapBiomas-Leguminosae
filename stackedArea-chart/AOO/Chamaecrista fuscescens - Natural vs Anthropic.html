<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.08999999999999,78.37,78.44,78.36999999999999,78.50999999999999,79.17,78.88,78.77,78.66999999999999,78.33,78,78.27,78.39999999999999,78.55999999999999,78.55,78.52000000000001,79.72,79.43,78.84,76.86,76.42999999999999,76.15,76.35,76.80000000000001,76.92,77.03000000000002,76.36000000000001,75.75000000000001,76.19,76.27,76.24,76.23000000000002,76.61,76.55999999999999,76.05,74.8,74.38,73.63999999999999],"color":"green"},{"name":"anthropic","data":[21.63,21.35,21.29,21.36,21.22,20.55,20.84,20.950000000000003,21.04,21.39,21.72,21.45,21.33,21.15,21.16,21.2,20.009999999999998,20.29,20.89,22.86,23.29,23.57,23.38,22.93,22.810000000000002,22.700000000000003,23.37,23.98,23.520000000000003,23.450000000000003,23.48,23.490000000000002,23.119999999999997,23.17,23.669999999999998,24.92,25.36,26.090000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
