<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.6,88.52000000000001,88.24000000000001,88.50000000000001,88.36000000000001,88.87999999999998,89.2,89.3,89.55,90.45,90.30000000000001,90.63,91.03,91,91.09,90.33999999999999,90.02,87.95,89.16999999999999,88.91000000000001,89.46000000000001,89.16,87.58999999999999,90.74,91.04999999999998,91.84,92.18999999999998,91.89,91.60000000000001,90.85000000000001,90.07,90.65,91.44999999999999,91.58,91.71999999999998,91.66,91.57999999999998,91.5],"color":"green"},{"name":"anthropic","data":[11.17,11.24,11.52,11.25,11.41,10.879999999999999,10.559999999999999,10.45,10.21,9.3,9.469999999999999,9.129999999999999,8.72,8.75,8.68,9.42,9.75,11.8,10.58,10.85,10.3,10.600000000000001,12.17,9.030000000000001,8.72,7.92,7.57,7.87,8.15,8.91,9.68,9.1,8.32,8.17,8.040000000000001,8.09,8.18,8.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
