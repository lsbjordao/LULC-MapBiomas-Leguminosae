<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.77000000000001,87.89,87.11999999999999,86.79,86.13,85.81,85.47,84.96000000000001,84.72999999999999,84.03,84.56,84.79,84.66,85.13000000000001,85.33999999999999,85.60999999999999,85.57,85.32000000000001,85.57999999999998,85.03,84.75000000000001,84.95,85.41000000000001,85.33000000000001,85.27999999999997,85.03999999999999,84.92000000000002,84.63999999999999,84.34,83.4,83.76,83.34,83.23,84.44999999999999,83.46,83.82,83.67999999999998,83.53999999999999],"color":"green"},{"name":"anthropic","data":[19.58,19.479999999999997,20.24,20.56,21.22,21.53,21.86,22.380000000000003,22.62,23.330000000000002,22.79,22.529999999999998,22.7,22.219999999999995,22,21.73,21.78,22.020000000000003,21.77,22.32,22.580000000000002,22.4,21.94,22.01,22.049999999999997,22.299999999999997,22.430000000000003,22.7,23.01,23.94,23.59,23.989999999999995,24.11,22.91,23.89,23.520000000000003,23.67,23.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
