<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.96000000000001,85.03000000000002,85.21,85.13999999999999,85.21999999999998,85.47,85.07999999999998,85,84.67999999999998,84.32000000000002,83.89,83.48,83.03999999999998,82.88000000000001,83.07,82.99,82.82,82.42,82.07000000000001,81.75,80.72,79.96000000000001,79.41,79.03,78.94999999999999,78.89999999999999,78.41,77.95,77.52000000000001,78.04,78.22,78.81000000000002,79.65,79.9,79.66000000000001,79.15,76.49,72.52],"color":"green"},{"name":"anthropic","data":[14.74,14.66,14.49,14.55,14.469999999999999,14.23,14.61,14.709999999999999,15.03,15.37,15.809999999999999,16.22,16.65,16.82,16.619999999999997,16.69,16.87,17.28,17.64,17.950000000000003,18.97,19.73,20.29,20.67,20.75,20.810000000000002,21.28,21.74,22.169999999999998,21.66,21.48,20.89,20.05,19.79,20.04,20.55,23.21,27.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
