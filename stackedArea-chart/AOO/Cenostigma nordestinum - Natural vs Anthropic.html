<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.13,68.56000000000002,67.79,66.98,66.02,65.27,64.72999999999999,64.14,63.709999999999994,63.769999999999996,64.16,64.67,65.21,65.24,65.18,65.44,65.11,64.73,64.5,64.02,63.6,63.56,63.28999999999999,63.31000000000001,63.329999999999984,63.309999999999995,63.11000000000001,62.699999999999996,62.4,61.98,61.08,61.18999999999999,60.98,61.29999999999999,61.21,61.17,61.03999999999999,61.13],"color":"green"},{"name":"anthropic","data":[38.629999999999995,39.17999999999999,39.95,40.760000000000005,41.699999999999996,42.440000000000005,43,43.589999999999996,44.00999999999999,43.97,43.57,43.050000000000004,42.52,42.49,42.54,42.29,42.62,43,43.22,43.72,44.10999999999999,44.19,44.46,44.419999999999995,44.419999999999995,44.42999999999999,44.64,45.02,45.320000000000014,45.73,46.64000000000001,46.55,46.739999999999995,46.42000000000001,46.52,46.559999999999995,46.67999999999999,46.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
