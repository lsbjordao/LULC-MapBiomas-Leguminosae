<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.53000000000001,50.81000000000001,50.02000000000001,49.03000000000001,48.71,48.34,48.07999999999999,48.17,48.17,48.339999999999996,48.23,48.199999999999996,48.190000000000005,47.96,47.91,47.61999999999999,47.73,47.739999999999995,47.82,48,47.98,48.160000000000004,48.39,48.4,48.809999999999995,48.87,48.93999999999999,48.85999999999999,48.559999999999995,48.54,48.54,48.559999999999995,48.64999999999999,48.96,49.10000000000001,49.32,49.550000000000004,49.809999999999995],"color":"green"},{"name":"anthropic","data":[51.040000000000006,51.82,52.62,53.61,53.94,54.32,54.57,54.46999999999999,54.489999999999995,54.330000000000005,54.43000000000001,54.45000000000001,54.46,54.69,54.75,55.01,54.900000000000006,54.93000000000001,54.81,54.64000000000001,54.669999999999995,54.49000000000001,54.269999999999996,54.239999999999995,53.84,53.790000000000006,53.71,53.790000000000006,54.09,54.09,54.11,54.1,53.970000000000006,53.690000000000005,53.550000000000004,53.330000000000005,53.089999999999996,52.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
