<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.72999999999999,73.51,72.19999999999999,71.02000000000001,70.17999999999999,69.25999999999998,68.83,68.44000000000001,67.99,67.67,67.58,67.66000000000001,68.07999999999998,67.82000000000002,67.70000000000002,67.83000000000001,67.47,67.15,66.50000000000001,65.78000000000002,65.60000000000001,65.74999999999999,65.22,65.64000000000001,65.78,66.05999999999999,66.05,65.83000000000001,65.61999999999999,65.36999999999999,65.2,65.09,64.85000000000001,64.95000000000002,64.84,64.89999999999999,64.76,64.82000000000001],"color":"green"},{"name":"anthropic","data":[28.020000000000003,28.240000000000006,29.540000000000003,30.740000000000002,31.57,32.480000000000004,32.93,33.31,33.77,34.089999999999996,34.19,34.11,33.66,33.940000000000005,34.050000000000004,33.919999999999995,34.27,34.61000000000001,35.24999999999999,35.959999999999994,36.16,35.989999999999995,36.519999999999996,36.10999999999999,35.96999999999999,35.69,35.7,35.919999999999995,36.129999999999995,36.379999999999995,36.559999999999995,36.67,36.92000000000001,36.8,36.9,36.849999999999994,36.98,36.919999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
