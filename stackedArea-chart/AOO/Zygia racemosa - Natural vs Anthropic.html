<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.30999999999999,87.72,86.91999999999999,86.89,86.75999999999999,87.84,88.2,87.71,87.07,88.05999999999999,88.26,87.74999999999999,87.12999999999998,86.53999999999999,86.21,85.78999999999998,85.22999999999999,84.75999999999999,84.32,84.37,84.19,84.05000000000001,83.68,83.59,82.9,82.83,82.95000000000002,83.26,83.33000000000001,83.28,83.18,83.36999999999999,83.62,83.81000000000002,83.67999999999999,83.3,82.75999999999999,82.13],"color":"green"},{"name":"anthropic","data":[12.749999999999998,13.339999999999998,14.12,14.15,14.299999999999997,13.229999999999999,12.85,13.33,13.98,12.989999999999998,12.799999999999999,13.3,13.92,14.510000000000002,14.84,15.270000000000001,15.830000000000002,16.29,16.74,16.72,16.880000000000003,17.029999999999998,17.4,17.48,18.18,18.220000000000002,18.12,17.800000000000004,17.75,17.79,17.86,17.69,17.44,17.26,17.400000000000002,17.770000000000003,18.31,18.94],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
