<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.06,74.65,74.51000000000002,74.31,73.85000000000001,73.12,72.72,72.55,72.04,71.67,71.61,71.72,72.35000000000001,72.75000000000001,72.64,72.42999999999999,72.08999999999999,71.58,71.47000000000001,71.16000000000001,71.22999999999999,70.99,70.81,71.02000000000001,70.71,70.33,68.89999999999999,68.89,68.54,68.43,68.5,68.31,68.22,68.14999999999999,67.95999999999998,67.27,67.33999999999999,67.39999999999998],"color":"green"},{"name":"anthropic","data":[25.689999999999998,26.119999999999994,26.269999999999996,26.439999999999998,26.92,27.639999999999997,28.04,28.229999999999997,28.72,29.099999999999994,29.15,29.039999999999996,28.41,27.980000000000004,28.1,28.32,28.659999999999997,29.179999999999996,29.319999999999997,29.599999999999998,29.529999999999998,29.749999999999996,29.95,29.739999999999995,30.050000000000004,30.42,31.840000000000003,31.849999999999998,32.230000000000004,32.33,32.27,32.46,32.50999999999999,32.60999999999999,32.79999999999999,33.49999999999999,33.419999999999995,33.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
