<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.88,57.459999999999994,56.68000000000001,55.84,54.94,54.400000000000006,54.43999999999999,54.52,54.64999999999999,54.75,54.940000000000005,55.11999999999999,55.56,55.57000000000001,56,55.959999999999994,55.87999999999999,55.81999999999999,55.85000000000001,55.8,55.629999999999995,55.97,55.99,56.18999999999999,56.05,55.96,55.900000000000006,55.33,55.17000000000001,54.57,54.629999999999995,55.11000000000001,55.129999999999995,55.419999999999995,55.5,55.559999999999995,55.65,55.73],"color":"green"},{"name":"anthropic","data":[49.89999999999999,50.31999999999999,51.10999999999999,51.94,52.84,53.38,53.34,53.25,53.15,53.050000000000004,52.839999999999996,52.650000000000006,52.209999999999994,52.219999999999985,51.78,51.83999999999999,51.9,51.94,51.949999999999996,51.98,52.17000000000001,51.849999999999994,51.79,51.60999999999999,51.739999999999995,51.84000000000001,51.89999999999999,52.440000000000005,52.62,53.20000000000001,53.169999999999995,52.65999999999999,52.63999999999999,52.379999999999995,52.300000000000004,52.199999999999996,52.14,52.040000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
