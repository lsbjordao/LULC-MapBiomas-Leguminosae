<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.27000000000001,90.55000000000001,90.89,90.75000000000001,90.17,89.91000000000001,89.82,89.74,89.61000000000001,89.67999999999998,90.12,90.48,90.41000000000001,90.38000000000001,90.52,90.58000000000001,90.24000000000001,90.05,90.05000000000001,89.89000000000001,89.44,89.06999999999998,88.91,88.57,88.51,88.39,88.47000000000001,88.44999999999999,88.50000000000001,88.52,88.66999999999999,88.74,88.72,88.62,88.46999999999998,88.35,88.33,88.15000000000002],"color":"green"},{"name":"anthropic","data":[8.530000000000001,9.23,8.89,9.04,9.61,9.87,9.969999999999999,10.04,10.19,10.1,9.66,9.299999999999999,9.37,9.389999999999999,9.270000000000001,9.21,9.53,9.74,9.709999999999999,9.9,10.360000000000001,10.72,10.88,11.22,11.28,11.4,11.319999999999999,11.33,11.28,11.26,11.1,11.05,11.08,11.15,11.309999999999999,11.44,11.459999999999999,11.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
