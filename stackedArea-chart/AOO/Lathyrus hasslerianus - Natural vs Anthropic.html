<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.940000000000005,55.07,54.480000000000004,54.22,53.87,53.87000000000001,53.49999999999999,53.54,54.29,54.760000000000005,55.41,55.709999999999994,55.6,55.6,56.08,56.13999999999999,56.10000000000001,56.31999999999999,56.45,56.38,56.15999999999999,56.06,55.81000000000001,55.64,55.61999999999999,55.760000000000005,55.77000000000001,55.940000000000005,56.150000000000006,56.150000000000006,56.410000000000004,56.669999999999995,57.05,57.04,57.05,56.879999999999995,56.769999999999996,56.07000000000001],"color":"green"},{"name":"anthropic","data":[43.32,43.18,43.76,44.03,44.36,44.38999999999999,44.760000000000005,44.699999999999996,43.96,43.47,42.83,42.550000000000004,42.660000000000004,42.660000000000004,42.15,42.089999999999996,42.15,41.940000000000005,41.81,41.870000000000005,42.08,42.19,42.44,42.61,42.650000000000006,42.489999999999995,42.47,42.32,42.099999999999994,42.1,41.82,41.58,41.2,41.2,41.19,41.37,41.49,42.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
