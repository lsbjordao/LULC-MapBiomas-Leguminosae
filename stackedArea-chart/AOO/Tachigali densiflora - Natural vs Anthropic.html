<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.06999999999999,61.039999999999985,60.419999999999995,59.70999999999999,59.300000000000004,59.36,59.21,59.34000000000001,59.300000000000004,59.37000000000001,59.24000000000001,59.2,59.230000000000004,59.34000000000001,59.10000000000001,58.75999999999999,58.5,58.169999999999995,58.120000000000005,57.95,57.660000000000004,57.699999999999996,57.95,58.309999999999995,58.42999999999999,58.47,58.580000000000005,58.690000000000005,58.65,58.85000000000001,59.13000000000001,59.330000000000005,59.47,59.750000000000014,59.84,59.94,60.12,60.56],"color":"green"},{"name":"anthropic","data":[45.080000000000005,45.15,45.74,46.48,46.87,46.83,46.959999999999994,46.85,46.900000000000006,46.83,46.970000000000006,47.01,46.96999999999999,46.87,47.08,47.44,47.699999999999996,48.01,48.089999999999996,48.23,48.529999999999994,48.51999999999999,48.24,47.879999999999995,47.76,47.73,47.63,47.51,47.56,47.370000000000005,47.09000000000001,46.89000000000001,46.74000000000001,46.45000000000001,46.38000000000001,46.260000000000005,46.09,45.660000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
