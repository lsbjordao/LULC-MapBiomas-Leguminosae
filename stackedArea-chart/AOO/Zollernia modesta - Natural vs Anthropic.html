<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.8,79.70000000000002,79.58,78.94,78.5,78.78,77.21000000000001,77.04,77.7,77.83000000000001,77.83000000000001,77.31,77.15999999999998,76.57,76.24,75.17999999999999,75.32,75.49,76.08,75.87,76.19999999999999,77.00000000000001,77.13000000000002,77.02,77.57000000000001,77.92999999999999,78.14999999999999,78.39999999999999,78.22000000000001,78.24000000000001,78.30000000000001,78.2,78.26,78.34,78.46999999999998,78.71,79.03,78.89999999999999],"color":"green"},{"name":"anthropic","data":[17.880000000000003,18.12,18.31,18.99,19.44,19.139999999999997,20.74,20.9,20.24,20.13,20.169999999999998,20.67,20.79,21.38,21.73,22.8,22.71,22.560000000000002,21.96,22.19,21.840000000000003,21.08,20.950000000000003,21.060000000000002,20.53,20.150000000000002,19.96,19.71,19.880000000000003,19.86,19.79,19.92,19.830000000000002,19.740000000000002,19.6,19.36,19,19.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
