<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.18,55.289999999999985,54.29999999999999,53.36,52.86000000000001,52.74,53.42999999999999,53.75,54.589999999999996,53.940000000000005,54.9,54.22000000000001,54.19,53.84,51.85,51.12,50.11999999999999,49.599999999999994,50.019999999999996,49.660000000000004,49.41,49.28999999999999,49.050000000000004,49.04,48.599999999999994,48.519999999999996,48.76,49.37000000000001,49.699999999999996,49.32999999999999,48.82,48.52,48.679999999999986,48.62,48.339999999999996,48.29,48.27000000000001,48.53],"color":"green"},{"name":"anthropic","data":[21.07,21.08,22.51,23.610000000000003,24.18,24.28,23.58,23.4,22.54,22.89,22.080000000000002,22.259999999999998,22.3,22.58,24.470000000000006,24.94,25.64,26.13,25.669999999999998,26.02,26.31,26.63,27.169999999999998,27.220000000000002,27.619999999999997,27.679999999999996,27.5,27.110000000000003,27.029999999999998,27.35,27.68,27.949999999999996,28,28.09,28.560000000000002,28.58,28.54,28.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
