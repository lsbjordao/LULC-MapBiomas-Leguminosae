<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.25,45.05,45.129999999999995,44.62,45.629999999999995,45.77,46.23,46.279999999999994,46.809999999999995,46.76999999999999,45.879999999999995,46.66,46.04,45.980000000000004,46.40999999999999,47.330000000000005,48.910000000000004,49.03,48.800000000000004,49.660000000000004,49.8,50.85,51.379999999999995,50.71,51.269999999999996,51.82,52.1,51.81,52.14000000000001,52.019999999999996,52.14999999999999,53,53.34,53.370000000000005,52.459999999999994,52.53,52.81999999999999,52.54],"color":"green"},{"name":"anthropic","data":[56.16,56.370000000000005,56.28,56.8,55.779999999999994,55.63,55.2,55.14000000000001,54.58999999999999,54.650000000000006,55.53000000000001,54.75,55.39,55.419999999999995,55.01000000000001,54.10999999999999,52.489999999999995,52.379999999999995,52.6,51.75,51.60999999999999,50.56,50.03,50.71,50.14,49.60000000000001,49.31000000000001,49.61000000000001,49.279999999999994,49.40999999999999,49.27,48.41,48.06,48.06,48.970000000000006,48.88999999999999,48.589999999999996,48.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
