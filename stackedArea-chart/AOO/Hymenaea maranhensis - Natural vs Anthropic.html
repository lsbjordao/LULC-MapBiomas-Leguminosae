<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.37,89.36,89.52000000000001,89.54,89.7,89.82000000000002,89.75,89.62,89.60999999999999,89.59999999999998,89.60000000000001,89.60000000000001,89.41,89.3,89.17,89.13000000000001,89.12999999999998,89.24000000000001,89.22000000000001,88.83,88.41000000000001,88.08,87.65,87.36,87.25,87.39,87.55999999999999,87.35999999999999,86.71000000000001,86.08,85.63999999999999,85.38,85,84.92000000000002,84.57,84.17,78.31999999999998,77.62],"color":"green"},{"name":"anthropic","data":[11.469999999999999,11.469999999999999,11.32,11.280000000000001,11.13,11.010000000000002,11.08,11.21,11.209999999999999,11.23,11.24,11.229999999999999,11.43,11.519999999999998,11.65,11.690000000000001,11.7,11.59,11.620000000000001,12,12.440000000000001,12.750000000000002,13.18,13.469999999999999,13.56,13.44,13.27,13.45,14.120000000000001,14.749999999999998,15.18,15.46,15.83,15.93,16.26,16.669999999999998,22.499999999999996,23.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
