<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.97999999999999,86.75999999999999,84.91999999999999,84.77,85.12,86.07000000000001,85.66000000000001,84.42,84.02000000000001,80.52999999999999,79.14999999999999,79.35,80.36,79.65000000000002,78.62,78.15,78.20999999999998,77.95999999999998,78.4,78.84,79.54,80.2,80.47,79.58999999999999,78.84,79.46,79.94999999999999,80.13000000000001,80.15,79.99,79.86,80.09,80.03999999999999,80.14,80.18,79.91,80.14999999999999,80.56],"color":"green"},{"name":"anthropic","data":[12.620000000000001,12.84,14.690000000000001,14.830000000000002,14.49,13.55,13.94,15.2,15.59,19.090000000000003,20.46,20.259999999999998,19.25,19.97,20.97,21.46,21.41,21.65,21.2,20.779999999999998,20.069999999999997,19.4,19.139999999999997,20.02,20.78,20.139999999999997,19.66,19.46,19.439999999999998,19.620000000000005,19.75,19.52,19.560000000000002,19.48,19.419999999999998,19.69,19.45,19.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
