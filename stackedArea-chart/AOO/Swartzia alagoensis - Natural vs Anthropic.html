<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.01,28.740000000000002,28.55,27.91,27.31,26.77,25.18,24.21,23.79,23.569999999999997,23.66,23.960000000000004,23.970000000000002,24.84,25.26,25.240000000000002,25.980000000000004,26.03,25.930000000000003,26.199999999999996,26.43,27.950000000000003,28.590000000000003,28.67,28.8,28.83,28.35,28.580000000000005,28.840000000000003,28.900000000000006,29.009999999999998,29.15,28.93,28.820000000000004,28.84,28.710000000000004,28.360000000000003,28.26],"color":"green"},{"name":"anthropic","data":[68.91000000000001,68.21000000000001,68.64000000000001,69.44000000000001,70.21000000000001,70.82000000000001,72.51,73.53,73.98,74.33000000000001,74.23000000000002,73.92000000000002,73.95000000000002,73.11000000000001,72.64000000000001,72.71000000000001,71.98,71.92,72.03,71.73,71.5,69.93000000000002,69.2,69.11000000000001,69.01,69.02,69.64,69.4,69.15,69.07,68.96000000000001,68.84000000000002,69.06000000000002,69.14000000000001,69.49000000000001,69.74000000000001,70.12,70.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
