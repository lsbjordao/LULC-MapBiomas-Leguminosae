<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.71,73.87999999999998,75.48999999999998,75.55000000000001,75.14000000000001,73.89,76.01,75.92,75.60000000000001,76.48000000000002,75.27,75.73,76.01000000000002,75.12999999999998,76.15,77.19999999999999,77.63,78.14999999999998,78.64999999999999,79.22999999999999,79.64999999999999,79.41999999999999,79.42999999999998,79.43,80.11999999999999,78.92999999999999,78.89000000000001,79.81000000000002,79.66,79.03000000000002,80.27999999999999,80.07000000000001,80.63,80.62,80.94,80.77,80.57,80.24],"color":"green"},{"name":"anthropic","data":[27.5,26.330000000000002,24.72,24.65,25.08,26.33,24.2,24.3,24.6,23.73,24.92,24.470000000000002,24.17,25.08,24.04,23.02,22.56,22.060000000000002,21.56,20.98,20.56,20.800000000000004,20.779999999999998,20.76,20.080000000000002,21.28,21.32,20.39,20.530000000000005,21.180000000000003,19.92,20.14,19.580000000000002,19.59,19.28,19.43,19.630000000000003,19.96],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
