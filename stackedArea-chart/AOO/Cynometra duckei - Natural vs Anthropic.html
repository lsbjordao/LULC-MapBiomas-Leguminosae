<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.16,90.75,88.94,88.04,87.85,89.11000000000001,89.17,88.44999999999999,88.80000000000001,89.85999999999999,89.9,89.44,89.12,90.06,90.08,90.27000000000001,90.25,90.47999999999999,90.64999999999999,91.13,91.66,91.49999999999999,91.68,91.97999999999999,91.77,92.10999999999999,92.28,92.4,92.78999999999999,92.87,92.94,93.05,93.28,93.77,93.97999999999999,94.00999999999999,94.08,94.03],"color":"green"},{"name":"anthropic","data":[7.379999999999999,8.78,10.59,11.5,11.690000000000001,10.44,10.360000000000001,11.1,10.74,9.7,9.64,10.1,10.41,9.49,9.46,9.25,9.29,9.059999999999999,8.899999999999999,8.41,7.8999999999999995,8.049999999999999,7.87,7.550000000000001,7.77,7.43,7.26,7.130000000000001,6.75,6.67,6.609999999999999,6.48,6.26,5.77,5.57,5.53,5.460000000000001,5.52],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
