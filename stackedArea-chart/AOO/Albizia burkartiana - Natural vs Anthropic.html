<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.69,61.879999999999995,62.309999999999995,61.76,61.66,60.35,60,58.93,58.36,55.980000000000004,55.77,55.559999999999995,55.339999999999996,54.07999999999999,53.989999999999995,53.629999999999995,53.01,52.32,51.94,51.410000000000004,51.14,51.25,51.14,51.120000000000005,50.940000000000005,50.900000000000006,50.800000000000004,50.82,51.08,51.25,52,52.31,52.629999999999995,52.64,52.88,52.72,52.919999999999995,52.919999999999995],"color":"green"},{"name":"anthropic","data":[38.79,38.58,38.16,38.71,38.8,40.12,40.47,41.550000000000004,42.1,44.5,44.71,44.92,45.14,46.400000000000006,46.48,46.839999999999996,47.46,48.160000000000004,48.53,49.07,49.33,49.230000000000004,49.33,49.35,49.540000000000006,49.56999999999999,49.67,49.66,49.379999999999995,49.22,48.47,48.16,47.85,47.830000000000005,47.589999999999996,47.760000000000005,47.550000000000004,47.540000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
