<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.629999999999995,59.9,59.24,58.60000000000001,57.919999999999995,56.88999999999999,55.82,55.13,53.910000000000004,52.85,52.06,51.31999999999999,50.93999999999999,51.03,51.18,51.489999999999995,51.63,51.46000000000001,51.18,51.209999999999994,51.220000000000006,51.60999999999999,51.91,52.11,52.44,52.620000000000005,52.65,52.58,52.51999999999999,52.49000000000001,52.42999999999999,52.13,51.910000000000004,51.79,51.769999999999996,51.67999999999999,51.62999999999999,52.1],"color":"green"},{"name":"anthropic","data":[35.84,37.55,38.23,38.86,39.529999999999994,40.559999999999995,41.64000000000001,42.32,43.56,44.62,45.39000000000001,46.15000000000001,46.51,46.43,46.29,45.97,45.82,46.010000000000005,46.28,46.26,46.239999999999995,45.85,45.550000000000004,45.35,45.03,44.85,44.81,44.87000000000001,44.94,44.95000000000001,45.029999999999994,45.33,45.540000000000006,45.68,45.7,45.78000000000001,45.830000000000005,45.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
