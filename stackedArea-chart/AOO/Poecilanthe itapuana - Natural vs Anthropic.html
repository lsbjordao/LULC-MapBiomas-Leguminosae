<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.87,46.40999999999999,45.77,44.870000000000005,44.6,44.26,43.71000000000001,43.17,42.68,42.78,43.22,43.42,43.06,43.019999999999996,42.21,41.98,42.1,42.019999999999996,42.17000000000001,42.01000000000001,41.9,41.51,41.39999999999999,41.54,41.68000000000001,41.5,41.35999999999999,40.72,39.64,39.26,39.18000000000001,39.089999999999996,39.16000000000001,39.4,40.220000000000006,40.89,41.01,41.99],"color":"green"},{"name":"anthropic","data":[39.81,40.28,40.93,41.830000000000005,42.07,42.43,42.980000000000004,43.53,44.01,43.91,43.480000000000004,43.28,43.64,43.67,44.46,44.7,44.57000000000001,44.65,44.50999999999999,44.669999999999995,44.760000000000005,45.169999999999995,45.279999999999994,45.15,45.01,45.19,45.36000000000001,45.98,47.080000000000005,47.43,47.53,47.61,47.550000000000004,47.28,46.46,45.8,45.68,44.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
