<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.96999999999999,61.93000000000001,61.89000000000001,61.879999999999995,61.75000000000001,61.38,61.239999999999995,60.04,60.36,61.02,61.38999999999999,62.22,63.12,63.49999999999999,64.05,64.3,64.29,64.5,64.39000000000001,64.36,64.36,64.17999999999999,64.19,64.24,64.46,64.68,64.74000000000001,64.91999999999999,64.91,64.77,64.61,64.71,64.9,64.92999999999999,64.88999999999999,65.03,65.23,65.47000000000001],"color":"green"},{"name":"anthropic","data":[42.379999999999995,42.419999999999995,42.43,42.46,42.599999999999994,42.959999999999994,43.089999999999996,44.31,43.99,43.33,42.95,42.11,41.21,40.839999999999996,40.300000000000004,40.03,40.050000000000004,39.85,39.940000000000005,39.99,39.99,40.160000000000004,40.14,40.11,39.88999999999999,39.68,39.61,39.43,39.42,39.58,39.75,39.63,39.45,39.4,39.45,39.3,39.12,38.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
