<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.330000000000005,59.72,59.540000000000006,58.57,57.68,56.970000000000006,56.800000000000004,56.24999999999999,55.440000000000005,54.71000000000001,54.4,54.019999999999996,53.49,52.53,52.330000000000005,52.08,52.080000000000005,52.03999999999999,51.82,51.5,51.260000000000005,51.4,51.519999999999996,51.61,52.39,52.66,52.92,53.199999999999996,53.24999999999999,53.150000000000006,53.089999999999996,52.809999999999995,52.75,52.510000000000005,52.33,51.81999999999999,51.540000000000006,51.74999999999999],"color":"green"},{"name":"anthropic","data":[40.850000000000016,40.449999999999996,40.650000000000006,41.60999999999999,42.489999999999995,43.21,43.36,43.93000000000001,44.730000000000004,45.459999999999994,45.76,46.150000000000006,46.69,47.65,47.84,48.089999999999996,48.09999999999999,48.14,48.36000000000001,48.67999999999999,48.910000000000004,48.769999999999996,48.64,48.56999999999999,47.779999999999994,47.52,47.26,46.99000000000001,46.93,47.03,47.080000000000005,47.370000000000005,47.42,47.69,47.839999999999996,48.36,48.63000000000001,48.419999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
