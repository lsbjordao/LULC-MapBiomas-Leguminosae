<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.87,98.85,98.11999999999999,97.55,96.71,96.38,93.14,93.89000000000001,96.08,96.7,96.98000000000002,97.21,96.75,96.66,96.47000000000001,96.3,96.34,96.02,95.77000000000001,95.07999999999998,94.35000000000001,93.69,92.99,90.12,88.05999999999999,87.27000000000001,87.03000000000002,86.91999999999999,86.45,86.31,86.6,87,86.78999999999999,86.07000000000001,86.35,86.84,86.94,87.01],"color":"green"},{"name":"anthropic","data":[1.4,1.4100000000000001,2.13,2.71,3.54,3.87,7.11,6.37,4.17,3.54,3.26,3.0300000000000002,3.49,3.6000000000000005,3.79,3.94,3.91,4.22,4.49,5.17,5.91,6.5600000000000005,7.270000000000001,10.120000000000001,12.2,12.97,13.209999999999999,13.33,13.8,13.940000000000001,13.649999999999999,13.25,13.47,14.190000000000001,13.9,13.42,13.309999999999999,13.24],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
