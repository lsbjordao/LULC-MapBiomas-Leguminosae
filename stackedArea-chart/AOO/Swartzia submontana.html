<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[78.68,78.7,78.7,78.58,78.52,78.11,78.02,77.92,77.81,77.92,77.91,77.9,78.3,78.31,78.31,78.35,78.26,78.19,78.18,78.14,78.2,78.23,78.21,78.2,78.18,78.18,78.2,78.27,78.27,78.32,78.32,78.34,78.36,78.38,78.32,78.23,78.17,78.23],"color":"#006400"},{"name":"Pasture","data":[3.08,3.07,3.06,3.13,3.1,3.06,3.16,3.24,3.06,3.09,2.87,2.69,2.25,1.77,1.29,0.9,0.9,1.18,1.79,1.96,2.1,1.9,1.68,1.53,1.47,1.5,1.62,1.62,1.59,1.63,1.8,1.98,2.09,2.27,2.24,1.91,1.78,1.75],"color":"#FFD966"},{"name":"Mosaic of uses","data":[1.36,1.36,1.55,1.71,1.82,2.4,2.43,2.46,2.78,2.67,2.89,3.02,2.84,3.21,3.55,3.88,4,3.77,3.2,3.02,2.85,3.02,3.37,3.49,3.58,3.59,3.45,3.31,3.2,3.02,2.76,2.5,2.37,2.2,2.36,2.77,3.06,3.27],"color":"#fff3bf"},{"name":"Rocky outcrop","data":[16.59,16.58,16.41,16.3,16.28,16.15,16.11,16.09,16.06,16.04,16.04,16.11,16.32,16.42,16.57,16.59,16.56,16.58,16.56,16.6,16.58,16.58,16.47,16.49,16.49,16.44,16.45,16.51,16.65,16.75,16.84,16.9,16.9,16.87,16.79,16.8,16.7,16.47],"color":"#665a3a"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
