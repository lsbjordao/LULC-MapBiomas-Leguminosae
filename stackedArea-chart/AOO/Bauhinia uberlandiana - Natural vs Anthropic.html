<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.74,36.02,36.24000000000001,36.13000000000001,33.72,32.81,32.410000000000004,32.27,31.63,30.879999999999995,31.129999999999995,30.15,29.520000000000003,29.58,28.319999999999997,27.779999999999998,27.87,27.57,27.99,28.23,28.169999999999998,28.55,28.43,28.479999999999997,28.32,28.360000000000003,28.36,28.189999999999998,27.79,28.12,27.8,28.249999999999996,28.200000000000003,28.69,28.450000000000003,28.49,28.81,28.59],"color":"green"},{"name":"anthropic","data":[63.97,63.68000000000001,63.47,63.59,65.99000000000001,66.9,67.3,67.45,68.08,68.83,68.58,69.56,70.19999999999999,70.16,71.39999999999999,71.95,71.84,72.14999999999999,71.75,71.47999999999999,71.56,71.17,71.28,71.24000000000001,71.39999999999999,71.35,71.36,71.53999999999999,71.93,71.61,71.92,71.46,71.52000000000001,71.03,71.28,71.22,70.91,71.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
