<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.94000000000004,92.05000000000001,91.08999999999999,90.95,91.26000000000002,91.4,90.85000000000002,90.94000000000001,90.99000000000001,90.32,88.98,88.61000000000001,88.17000000000002,88.3,88.57,88.07,86.64999999999999,86.17000000000002,85.54,84.96000000000001,84.58000000000001,84.47,84.29000000000002,84.31,84.29,84.24000000000001,84.44000000000001,84.67,84.6,84.51000000000002,83.69,83.52000000000002,83.45000000000002,83.20000000000002,83.00000000000001,83.13000000000001,82.75000000000001,82.42000000000002],"color":"green"},{"name":"anthropic","data":[11.299999999999999,11.170000000000002,12.15,12.299999999999999,11.97,11.830000000000002,12.399999999999999,12.309999999999999,12.259999999999998,12.909999999999998,14.26,14.63,15.079999999999998,14.940000000000001,14.66,15.149999999999999,16.6,17.1,17.7,18.28,18.650000000000002,18.78,18.939999999999998,18.950000000000003,18.95,18.989999999999995,18.8,18.57,18.64,18.740000000000002,19.55,19.709999999999997,19.79,20.05,20.240000000000002,20.130000000000003,20.479999999999997,20.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
