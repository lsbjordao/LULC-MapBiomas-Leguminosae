<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.51,83.61,86.03999999999999,84.47,84.84,84.59000000000002,83.94000000000001,83.17999999999999,81.60000000000001,80.24,76.65000000000002,75.05000000000001,75.52,77.19,80.49000000000001,79.81999999999998,75.74,73.55000000000001,71.71999999999998,71.38000000000001,71.45,71.9,72.12,72.32000000000001,72.49,73.10000000000001,73.20000000000002,73,72.49000000000001,71.86,71.16000000000001,70.14,69.76,69.4,69.7,69.25999999999999,68.80000000000001,68.3],"color":"green"},{"name":"anthropic","data":[15.23,16.11,13.68,15.25,14.89,15.129999999999999,15.780000000000001,16.55,18.13,19.49,23.08,24.66,24.2,22.52,19.24,19.91,23.98,26.18,28.009999999999998,28.34,28.27,27.82,27.599999999999998,27.39,27.230000000000004,26.619999999999997,26.529999999999998,26.71,27.23,27.869999999999997,28.560000000000002,29.580000000000002,29.96,30.32,30.03,30.47,30.93,31.42],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
