<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.4,92.60000000000001,91.88000000000001,90.82,90.97999999999999,91.37,90.92,89.74,89.44,89.99,90.01,89.95,89.63999999999999,91.46000000000002,91.67999999999999,92.28999999999999,92.51000000000002,92.58,92.18,91.96000000000001,91.97,91.93,91.89,91.99000000000001,91.7,91.77,91.98,92.30000000000001,92.46999999999998,92.28999999999999,92.22999999999999,92.12,91.60999999999999,91.38,91.46999999999998,91.47999999999999,91.35000000000001,90.34],"color":"green"},{"name":"anthropic","data":[6.220000000000001,7.029999999999999,7.77,8.809999999999999,8.65,8.27,8.72,9.899999999999999,10.19,9.64,9.620000000000001,9.68,9.990000000000002,8.16,7.95,7.33,7.109999999999999,7.05,7.45,7.67,7.659999999999999,7.71,7.75,7.6499999999999995,7.93,7.869999999999999,7.64,7.34,7.15,7.33,7.41,7.5,8.02,8.25,8.17,8.129999999999999,8.280000000000001,9.27],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
