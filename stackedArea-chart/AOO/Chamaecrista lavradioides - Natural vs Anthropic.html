<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.64,83.96000000000001,86.33999999999999,85.97,85.90000000000002,86.09,86.35,86.53,86.65,86.45,86.49000000000001,86.52,85.05000000000001,80.15,78.87,75.55999999999999,74.07,72.07000000000001,71.87,70.47,70.42,70.27,70.69,69.33,69.11,68.92999999999999,68.89,68.58,68.35000000000001,68.73,68.65,68.59,68.88000000000001,69.32000000000001,69.29,69.22,68.95,68.89999999999999],"color":"green"},{"name":"anthropic","data":[17.48,16.150000000000002,13.78,14.16,14.22,14.029999999999998,13.77,13.580000000000002,13.48,13.669999999999998,13.620000000000001,13.609999999999998,15.07,19.97,21.25,24.569999999999997,26.07,28.060000000000002,28.249999999999996,29.65,29.680000000000003,29.85,29.43,30.8,31.009999999999998,31.189999999999998,31.23,31.54,31.78,31.38,31.48,31.52,31.23,30.8,30.84,30.919999999999998,31.19,31.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
