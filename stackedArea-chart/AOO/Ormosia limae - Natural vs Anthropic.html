<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[3.0800000000000005,3.09,2.38,1.3099999999999998,1.21,1.26,1.3,1.33,1.2200000000000002,1.1400000000000001,1.1800000000000002,1.1400000000000001,1.1400000000000001,1.12,1.2300000000000002,1.31,1.4000000000000001,1.57,1.6700000000000002,1.7300000000000002,1.7200000000000002,1.8700000000000003,2,2,2.2199999999999998,2.55,2.38,1.81,1.86,1.87,1.79,1.84,2.0999999999999996,2.04,2.329999999999999,2.4899999999999998,2.54,2.5999999999999996],"color":"green"},{"name":"anthropic","data":[96.59,96.57000000000001,97.28999999999999,98.35000000000001,98.44,98.38999999999999,98.35000000000001,98.31,98.42999999999999,98.51,98.47,98.51,98.50999999999999,98.53,98.41,98.34000000000002,98.25,98.09,97.97999999999999,97.93,97.93,97.77999999999999,97.66,97.66000000000001,97.41999999999999,97.1,97.27,97.83,97.80999999999999,97.79,97.86,97.81,97.55,97.61,97.33,97.17,97.11999999999999,97.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
