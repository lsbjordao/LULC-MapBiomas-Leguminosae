<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.99,88.61,88.61,88.17999999999999,87.64999999999999,86.99,84.17,82.33,81.34,80.27000000000001,79.57,79.2,78.34999999999998,77.42,76.78999999999999,75.74000000000001,75.27000000000001,74.92,74.69000000000001,74.64999999999999,74.58999999999999,74.45,74.27000000000001,74.1,73.53,73.27,73.14,73.01,72.73,72.67000000000002,72.5,72.42,72.24999999999999,71.94999999999999,71.57,71.19999999999999,70.19,69.39],"color":"green"},{"name":"anthropic","data":[11.83,11.21,11.21,11.64,12.16,12.83,15.64,17.47,18.47,19.529999999999998,20.24,20.61,21.48,22.4,23.029999999999998,24.080000000000002,24.54,24.89,25.119999999999997,25.17,25.23,25.36,25.54,25.709999999999997,26.27,26.549999999999997,26.68,26.79,27.080000000000002,27.13,27.31,27.389999999999997,27.569999999999997,27.87,28.240000000000002,28.61,29.62,30.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
