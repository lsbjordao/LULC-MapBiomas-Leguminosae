<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.52999999999999,78.7,78.79,79.17000000000002,78.39000000000001,76.74,76.49,76.25999999999999,76.01999999999998,75.92,75.81999999999998,75.76,75.79999999999998,76.12,76.14999999999999,76.15,76.19000000000001,76.10000000000001,75.94,71.96,71.11999999999999,70.86,70.42999999999998,70.28999999999999,70.03999999999999,70.07000000000001,69.67999999999999,68.45,66.94,66.84,66.60000000000001,66.58,66.5,66.61999999999999,66.58,66.56,66.59,64.93],"color":"green"},{"name":"anthropic","data":[22.009999999999998,21.860000000000003,21.759999999999998,21.37,22.169999999999998,23.81,24.050000000000004,24.280000000000005,24.539999999999996,24.64,24.72,24.79,24.749999999999996,24.419999999999995,24.389999999999997,24.38,24.36,24.45,24.599999999999998,28.59,29.44,29.7,30.12,30.26,30.52,30.490000000000002,30.86,32.1,33.6,33.71,33.95,33.98,34.02,33.94,33.98,33.99,33.96000000000001,35.629999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
