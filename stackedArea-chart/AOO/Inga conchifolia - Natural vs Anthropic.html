<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.14,87.31,87.97999999999999,87.78999999999999,87.66000000000001,87.5,87.97000000000001,87.92000000000002,88.33,88.66,88.43,88.19999999999999,88.18,87.89999999999999,87.59,87.57000000000001,87.47000000000001,87.92999999999999,87.82,87.89999999999998,87.85999999999999,87.74000000000001,87.83000000000001,88.26,88.41000000000001,88.46000000000001,89.07999999999998,89.07,89.01999999999998,89.07000000000001,89.26,89.14000000000001,89.01999999999998,88.97,89.16000000000001,89.08,89.07,88.46],"color":"green"},{"name":"anthropic","data":[12.94,12.759999999999998,12.1,12.29,12.41,12.58,12.100000000000001,12.16,11.75,11.41,11.66,11.879999999999999,11.9,12.17,12.47,12.52,12.600000000000001,12.149999999999999,12.27,12.18,12.21,12.34,12.25,11.82,11.670000000000002,11.629999999999999,10.989999999999998,11,11.069999999999999,10.99,10.81,10.92,11.06,11.100000000000001,10.94,11.01,11.020000000000001,11.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
