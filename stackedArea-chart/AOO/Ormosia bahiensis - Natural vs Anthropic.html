<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.66,51.720000000000006,51.31,50.459999999999994,50.7,50.33,50.92,51.05,51.68,52.19,52.46000000000001,52.84,53.250000000000014,53.440000000000005,53.690000000000005,54.63999999999999,55.3,55.120000000000005,55.14,55.709999999999994,55.790000000000006,55.980000000000004,56.620000000000005,56.52000000000001,56.48,56.31999999999999,55.25,54.07000000000001,53.190000000000005,52.86999999999999,53,53.48,53.65,53.8,54.06000000000001,54.269999999999996,54.51,55.239999999999995],"color":"green"},{"name":"anthropic","data":[51.3,51.25000000000001,51.650000000000006,52.50000000000001,52.25,52.64000000000001,52.06000000000001,51.910000000000004,51.28,50.78,50.52,50.13,49.74,49.52,49.28,48.32000000000001,47.68000000000001,47.849999999999994,47.830000000000005,47.25,47.18,46.99,46.35,46.440000000000005,46.480000000000004,46.660000000000004,47.71000000000001,48.910000000000004,49.78,50.1,49.97,49.489999999999995,49.32000000000001,49.169999999999995,48.900000000000006,48.68999999999999,48.459999999999994,47.709999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
