<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.96,66.22,65.91,64.88,62.35000000000001,61.68000000000001,61.379999999999995,60.63999999999999,59.79,58.92,58.48,58.30999999999999,57.90000000000001,57.65,57.400000000000006,56.589999999999996,56.339999999999996,55.96,55.53,55.33,55.77,55.76,55.599999999999994,55.21,55.18,54.78999999999999,54.63,54.269999999999996,54.04,53.49,53.12,53.05,53.04999999999999,52.92,52.83,52.64999999999999,52.50999999999999,52.66999999999999],"color":"green"},{"name":"anthropic","data":[35.15,35.879999999999995,36.18,37.239999999999995,39.739999999999995,40.41,40.73,41.48000000000001,42.31000000000001,43.17000000000001,43.63,43.790000000000006,44.2,44.440000000000005,44.7,45.52,45.760000000000005,46.13,46.57000000000001,46.76,46.330000000000005,46.34,46.49,46.910000000000004,46.940000000000005,47.32000000000001,47.480000000000004,47.81,48.04,48.589999999999996,48.97999999999999,49.050000000000004,49.07,49.190000000000005,49.28,49.45000000000001,49.57,49.42],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
