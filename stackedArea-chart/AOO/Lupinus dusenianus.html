<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[50.84,50.83,50.83,50.77,50.32,50.33,50.17,50.17,50.06,50.06,50.06,50.03,50.02,50.09,50.25,50.32,50.32,50.32,50.32,50.32,50.32,50.37,50.37,50.37,50.45,50.53,50.54,50.54,50.53,50.53,50.53,50.53,50.53,50.53,50.52,50.5,50.03,50.03],"color":"#006400"},{"name":"Pasture","data":[0.95,0.87,0.75,0.79,0.79,0.84,1.02,1.1,1.02,0.96,0.62,0.48,0.31,0.21,0.13,0.07,0.07,0.06,0.06,0.06,0.08,0.07,0.07,0.07,0.07,0,0,0,0,0,0.04,0.07,0.18,0.22,0.29,0.29,0.3,0.32],"color":"#FFD966"},{"name":"Mosaic of uses","data":[0.58,0.66,0.78,0.81,1.26,1.21,1.2,1.12,1.3,1.34,1.68,1.86,2.03,2.08,1.98,1.97,1.97,1.98,1.98,1.97,1.95,1.92,1.92,1.92,1.83,1.82,1.82,1.82,1.83,1.83,1.79,1.75,1.6,1.55,1.48,1.49,1.96,1.94],"color":"#fff3bf"},{"name":"Rocky outcrop","data":[47.41,47.42,47.42,47.41,47.41,47.41,47.4,47.39,47.4,47.42,47.42,47.42,47.42,47.41,47.42,47.42,47.42,47.42,47.42,47.43,47.43,47.43,47.43,47.43,47.43,47.43,47.42,47.42,47.42,47.42,47.42,47.43,47.47,47.48,47.49,47.5,47.49,47.49],"color":"#665a3a"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
