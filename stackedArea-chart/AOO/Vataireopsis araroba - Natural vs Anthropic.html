<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.910000000000004,56.300000000000004,55.22999999999999,54.029999999999994,53.93999999999999,53.9,54.04,54.720000000000006,54.70000000000001,54.879999999999995,54.39999999999999,54.65,54.669999999999995,54.44,54.290000000000006,53.910000000000004,54.1,53.88999999999999,54.23,54.28,54.35999999999999,54.49999999999999,54.51,54.59999999999999,55.040000000000006,55.38999999999999,55.59,55.47,55.32,55,54.97,54.949999999999996,54.95,55.18,55.13,55.260000000000005,55.98000000000001,56.41],"color":"green"},{"name":"anthropic","data":[45.83,46.44000000000001,47.51,48.71999999999999,48.779999999999994,48.84,48.7,48.040000000000006,48.04,47.85,48.34,48.080000000000005,48.07,48.3,48.47,48.83,48.65,48.839999999999996,48.5,48.45,48.37,48.24,48.21999999999999,48.13,47.68,47.35,47.150000000000006,47.27,47.42999999999999,47.74999999999999,47.78,47.8,47.779999999999994,47.56,47.61,47.470000000000006,46.769999999999996,46.31999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
