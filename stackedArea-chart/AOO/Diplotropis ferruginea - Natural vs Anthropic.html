<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.92,56.75000000000001,55.96999999999999,55.429999999999986,55.4,55.24,54.69,54.3,54.13000000000001,54.16,54.290000000000006,54.48,54.67,54.94,54.999999999999986,55.269999999999996,55.51,55.38999999999999,56.14000000000001,56.35000000000001,57.03999999999999,57.289999999999985,58.059999999999995,58.10000000000001,58.290000000000006,58.50000000000001,58.27,57.99,57.809999999999995,57.6,57.54,57.08,56.89,56.16,55.72,55.57,55.39,55.650000000000006],"color":"green"},{"name":"anthropic","data":[44.99,45.18,45.97,46.5,46.52,46.68,47.24,47.620000000000005,47.80000000000001,47.75,47.650000000000006,47.44,47.24,47.00000000000001,46.919999999999995,46.650000000000006,46.42,46.55,45.79,45.57,44.9,44.64,43.870000000000005,43.82,43.64,43.41,43.64000000000001,43.94,44.13,44.32,44.39,44.849999999999994,45.04,45.769999999999996,46.2,46.339999999999996,46.519999999999996,46.24999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
