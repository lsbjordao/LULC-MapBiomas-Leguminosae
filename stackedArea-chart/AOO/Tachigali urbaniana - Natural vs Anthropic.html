<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.66,73.43000000000002,73.22000000000001,73.68000000000002,73.67,73.60000000000001,73.43000000000002,73.63000000000001,73.97,74.16000000000001,74.29,74.59,75.10000000000001,75.7,75.94,76.12,76.36000000000003,76.79000000000002,77.11000000000001,77.21000000000002,77.12,77.32000000000001,77.28000000000003,77.13000000000001,76.91000000000003,77.14999999999999,77.38000000000001,77.39000000000001,77.58000000000001,77.77000000000001,77.88000000000001,78.11000000000001,78.26,78.25999999999999,78.44000000000001,78.57000000000001,78.88999999999999,78.80999999999999],"color":"green"},{"name":"anthropic","data":[26.14,25.56,25.880000000000003,25.440000000000005,25.459999999999997,25.610000000000003,25.799999999999997,25.65,25.3,25.11,25.009999999999998,24.71,24.200000000000003,23.67,23.439999999999998,23.29,23.07,22.63,22.31,22.21,22.3,22.1,22.110000000000003,22.28,22.49,22.259999999999998,22.06,21.99,21.8,21.57,21.479999999999997,21.24,21.11,21.11,20.919999999999998,20.81,20.49,20.53],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
