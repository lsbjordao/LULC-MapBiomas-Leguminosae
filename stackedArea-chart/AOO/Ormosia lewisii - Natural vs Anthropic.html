<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.36000000000001,67.30999999999999,65.8,64.86000000000001,63.190000000000005,62.18000000000001,62.43000000000001,61.970000000000006,60.67999999999999,59.36,58.75999999999999,57.86,57.510000000000005,57.239999999999995,57.06000000000001,56.37000000000001,56.76,56.580000000000005,57.16000000000001,57.38,56.61000000000001,57.190000000000005,57.08,56.80000000000001,59.029999999999994,59.79,59.65,59.92000000000001,58.400000000000006,56.88,56.85000000000001,56.37000000000002,56.11000000000001,56.480000000000004,56.49999999999999,56.75000000000001,56.650000000000006,58.74],"color":"green"},{"name":"anthropic","data":[16.38,19.43,20.97,22,23.689999999999998,24.689999999999998,24.450000000000003,24.9,26.16,27.44,28,28.840000000000003,29.05,29.2,29.380000000000003,30.1,29.8,30.03,29.46,29.259999999999998,30.009999999999998,29.39,29.479999999999997,29.78,27.54,26.759999999999998,26.9,26.59,28.08,29.59,29.64,30.12,30.400000000000002,30.159999999999997,30.23,30.28,30.4,29],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
