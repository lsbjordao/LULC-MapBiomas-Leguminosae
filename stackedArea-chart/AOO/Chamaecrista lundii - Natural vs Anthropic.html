<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.57000000000001,66.72,65.9,64.5,61.59,59.529999999999994,58.61999999999999,57.209999999999994,55.910000000000004,53.5,52.349999999999994,51.94,50.779999999999994,50.24,49.42999999999999,48.529999999999994,47.92999999999999,47.03,46.57999999999999,46.58,46.3,46.04,46,45.53,45.72,45.52,44.57,44.499999999999986,44.5,44.47,44.46000000000001,44.43999999999999,44.51,44.43,44.21,44.010000000000005,43.95,44.37],"color":"green"},{"name":"anthropic","data":[32.46,34.339999999999996,35.12,36.540000000000006,39.449999999999996,41.48,42.4,43.82,45.11000000000001,47.52,48.68,49.09,50.279999999999994,50.81,51.61000000000001,52.52,53.12,53.99,54.449999999999996,54.449999999999996,54.74,55,55.03,55.50999999999999,55.309999999999995,55.50999999999999,56.46,56.52,56.52,56.550000000000004,56.58,56.57999999999999,56.529999999999994,56.61,56.83,57.01999999999999,57.09,56.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
