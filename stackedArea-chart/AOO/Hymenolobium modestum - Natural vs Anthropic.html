<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.90999999999998,97.31,95.82999999999998,95.4,95.9,95.58999999999997,94.33,94.03999999999999,94.13,94.12999999999998,92.89000000000001,92.69000000000001,92.28,94.2,95.28,94.8,92.69999999999999,91.75000000000001,91.92,92.01,91.67,91.57,91.5,91.47,91.44000000000001,91.46000000000001,91.47000000000001,91.11,90.96,90.89,90.69,90.30000000000001,89.94,89.73,89.70999999999998,89.44999999999999,89.31,88.37999999999997],"color":"green"},{"name":"anthropic","data":[2.69,3.27,4.76,5.1899999999999995,4.6899999999999995,5,6.28,6.550000000000001,6.470000000000001,6.470000000000001,7.71,7.9,8.33,6.39,5.32,5.800000000000001,7.9,8.860000000000001,8.68,8.59,8.92,9.02,9.110000000000001,9.12,9.15,9.14,9.120000000000001,9.49,9.64,9.709999999999999,9.91,10.3,10.65,10.87,10.879999999999999,11.139999999999999,11.28,12.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
