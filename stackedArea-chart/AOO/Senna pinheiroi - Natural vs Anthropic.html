<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.440000000000005,35.67999999999999,34.13,33.88,34.230000000000004,34.56,35.32,35.67,36.459999999999994,36.91,37.15,37.339999999999996,37.690000000000005,37.96000000000001,38.42,38.690000000000005,38.78000000000001,38.93000000000001,39.480000000000004,39.93000000000001,40.269999999999996,40.989999999999995,41.28,41.440000000000005,41.69,42.12,42.800000000000004,43.5,43.93,44.44,44.769999999999996,44.989999999999995,45.330000000000005,45.86,46.00999999999999,46.059999999999995,45.989999999999995,46.42999999999999],"color":"green"},{"name":"anthropic","data":[65.77000000000001,64.54,66.08,66.33,65.97,65.64999999999999,64.88,64.53,63.75000000000001,63.290000000000006,63.06,62.85000000000001,62.519999999999996,62.24,61.77,61.5,61.42,61.269999999999996,60.73,60.28,59.94,59.21999999999999,58.9,58.769999999999996,58.49999999999999,58.089999999999996,57.41,56.71,56.279999999999994,55.72999999999999,55.440000000000005,55.209999999999994,54.86,54.33999999999999,54.18,54.12,54.209999999999994,53.74000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
