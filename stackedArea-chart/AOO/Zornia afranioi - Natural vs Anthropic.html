<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.97999999999999,39.61000000000001,37.989999999999995,36.449999999999996,36.28999999999999,36.059999999999995,35.62,35.58999999999999,36.08,36.68,37.02,37.019999999999996,37.18,36.03,35.03000000000001,33.73,33.21,32.2,31.51,30.570000000000007,29.32,28.659999999999997,28.14,27.630000000000006,27.510000000000005,27.790000000000003,27.43,27.08,26.85,27.320000000000004,26.98,27.540000000000006,28.24,29.490000000000002,29.930000000000003,30.25,29.930000000000003,30.37],"color":"green"},{"name":"anthropic","data":[61.519999999999996,61.900000000000006,63.52,65.06,65.22,65.44,65.9,65.89999999999999,65.43,64.84,64.49000000000001,64.49,64.32,65.47,66.46999999999998,67.78000000000002,68.31000000000002,69.32,70.02000000000001,70.95,72.17999999999999,72.84,73.36,73.86999999999999,74.00999999999999,73.72,74.06,74.4,74.64000000000001,74.18,74.51,73.97,73.26,71.99,71.56,71.26000000000002,71.58000000000001,71.15],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
