<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.84,57.54999999999999,57.49999999999999,57.599999999999994,57.669999999999995,57.66,56.75,55.55,51.419999999999995,50.00000000000001,48.80000000000001,47.63999999999999,47.09999999999999,46.510000000000005,46.38000000000001,46.29,45.839999999999996,45.56,45.05,45.01,45.349999999999994,45.96,46.440000000000005,46.44,46.38,46.089999999999996,45.68999999999998,45.64,45.629999999999995,45.38,45.31,45.279999999999994,45.87,46.43,46.779999999999994,47.14999999999999,46.970000000000006,48.15],"color":"green"},{"name":"anthropic","data":[47.080000000000005,46.37000000000001,46.41,46.3,46.25,46.24,47.18,48.370000000000005,52.51,53.92000000000001,55.11,56.28000000000001,56.809999999999995,57.41,57.56000000000001,57.64000000000001,58.080000000000005,58.36000000000001,58.88,58.91,58.58,57.970000000000006,57.46,57.480000000000004,57.57000000000001,57.83,58.230000000000004,58.29999999999999,58.29,58.54,58.61,58.63999999999999,58.05,57.49,57.14,56.77,56.95,55.78],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
