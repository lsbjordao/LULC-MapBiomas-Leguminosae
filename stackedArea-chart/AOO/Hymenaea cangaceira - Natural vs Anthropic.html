<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.330000000000005,61.120000000000005,60.13000000000001,59.75999999999999,59.56,58.91,58.37,58.40999999999999,57.84,57.89,58.010000000000005,58.18000000000001,58.25000000000001,57.89000000000001,57.71000000000001,56.76000000000001,55.900000000000006,55.550000000000004,55.63,55.99,57.019999999999996,58.190000000000005,58.89,59.660000000000004,60.10000000000001,59.69000000000001,59.59000000000001,59.31,59.370000000000005,59.040000000000006,59.24000000000001,59.42000000000001,59.52,60.31,60.28999999999999,60.489999999999995,60.44,60.78],"color":"green"},{"name":"anthropic","data":[39.440000000000005,39.64999999999999,40.63999999999999,41.01,41.21000000000001,41.86,42.410000000000004,42.36,42.94000000000001,42.90000000000001,42.760000000000005,42.59,42.52,42.89,43.07,43.99,44.870000000000005,45.21,45.14,44.769999999999996,43.75,42.57,41.88000000000001,41.13,40.68,41.09000000000001,41.18,41.470000000000006,41.400000000000006,41.74000000000001,41.55,41.35000000000001,41.260000000000005,40.480000000000004,40.50000000000001,40.31,40.34,40],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
