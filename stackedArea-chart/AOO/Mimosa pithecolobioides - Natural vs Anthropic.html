<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.30999999999999,69.31,68.83999999999999,68.13,67.55,67.59,67.66,67.55,67.46000000000001,67.42,67.44999999999999,67.41999999999999,67.66,67.42,67.71,67.55,67.28,67.03,66.96000000000001,66.97999999999999,66.93,66.96,67.03,66.94000000000001,66.78999999999999,66.73,66.41000000000001,66.27,66.18,66.13999999999999,66.1,66.04,66.27,66.49999999999999,66.47999999999999,66.47,65.86999999999999,65.85],"color":"green"},{"name":"anthropic","data":[33.419999999999995,33.4,33.93,34.63,35.22,35.160000000000004,35.09,35.18,35.26999999999999,35.309999999999995,35.3,35.33,35.080000000000005,35.32000000000001,35.040000000000006,35.2,35.47,35.7,35.800000000000004,35.77000000000001,35.82000000000001,35.77,35.69,35.790000000000006,35.940000000000005,36.02,36.34,36.47,36.559999999999995,36.62,36.65,36.709999999999994,36.46999999999999,36.25,36.269999999999996,36.27,36.870000000000005,36.92],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
