<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.53,92.85,90.91999999999999,87.05,86.82,88.85,88.75999999999999,88.61999999999999,88.41000000000001,88.19,87.81,87.84,87.38999999999999,87.44999999999999,88.02,87.80000000000001,87.63000000000001,87.36,87.7,87.49,87.49,87.34,87.10999999999999,86.83,86.81,86.50000000000001,86.59,86.36999999999999,85.77000000000001,85.77999999999999,85.85,85.85,85.61,85.78,85.3,84.7,84.58,85.28999999999999],"color":"green"},{"name":"anthropic","data":[3.86,7.56,9.479999999999999,13.34,13.57,11.530000000000001,11.629999999999999,11.780000000000001,11.95,12.190000000000001,12.58,12.55,13.010000000000002,12.920000000000002,12.370000000000001,12.59,12.76,13.05,12.689999999999998,12.89,12.889999999999999,13.04,13.280000000000001,13.57,13.57,13.89,13.79,14.009999999999998,14.620000000000001,14.61,14.540000000000001,14.540000000000001,14.780000000000001,14.610000000000001,15.090000000000002,15.68,15.81,15.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
