<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.73,67.92000000000002,68.49,67.59999999999998,67.13,66.38,66.53999999999999,66.7,66.92,67.42999999999999,67.48,67.91,68.24999999999999,68.36000000000001,68.51,68.83000000000001,68.74000000000001,68.69000000000001,68.69000000000001,68.76000000000002,68.9,68.95,69.06,69.22,69.42,69.15,68.8,69.07000000000001,68.84,68.73999999999998,69.16999999999999,69.05999999999999,69.19999999999999,69.31,69.42,69.52,69.76,70.10000000000001],"color":"green"},{"name":"anthropic","data":[33.71,33.57,33.04,33.94,34.41,35.15999999999999,35,34.89999999999999,34.669999999999995,34.2,34.14,33.74999999999999,33.37,33.25,33.07999999999999,32.77,32.82999999999999,32.94,32.9,32.839999999999996,32.73,32.63999999999999,32.54,32.400000000000006,32.25,32.519999999999996,32.92,32.650000000000006,32.86,32.96000000000001,32.540000000000006,32.660000000000004,32.53000000000001,32.410000000000004,32.36,32.28,32.08,31.729999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
