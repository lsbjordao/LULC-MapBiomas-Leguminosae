<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.85000000000001,66.13,67.26,67.60000000000001,68.64000000000001,72,72.43,73.28,73.73,73.34,73.64999999999999,73.66999999999999,74.36999999999999,75.84,76.22,76.51,77.7,78.03,78.14999999999999,79.56,79.42999999999999,79.78,80.1,80.17999999999999,80.2,80.99,81.77,81.55,82.05,83.05999999999999,82.64000000000001,82.91,83.03,83.46000000000001,84.19,84.38999999999999,84.99000000000001,85.16],"color":"green"},{"name":"anthropic","data":[32.83,33.559999999999995,32.43,32.09,31.049999999999997,27.68,27.259999999999998,26.410000000000004,25.970000000000002,26.35,26.05,26.029999999999998,25.31,23.86,23.46,23.18,21.98,21.67,21.55,20.13,20.26,19.9,19.580000000000002,19.5,19.479999999999997,18.700000000000003,17.93,18.150000000000002,17.66,16.63,17.05,16.79,16.65,16.220000000000002,15.5,15.290000000000001,14.69,14.540000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
