<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.49,43.3,43.029999999999994,42.54,42.43,42.32,42.32,42.37,42.74,43.160000000000004,43.42,43.63,43.760000000000005,44.24,44.93,45.120000000000005,45.309999999999995,45.68,46.02,46.42999999999999,46.72,46.870000000000005,47.120000000000005,47.46,47.79,48.09,48.440000000000005,48.839999999999996,49.24000000000001,49.37,49.61,49.900000000000006,50.08,50.220000000000006,50.38000000000001,50.56,50.71999999999999,51.05],"color":"green"},{"name":"anthropic","data":[60.46000000000001,60.629999999999995,60.93,61.42,61.52,61.61,61.62,61.57000000000001,61.220000000000006,60.77000000000001,60.53000000000001,60.3,60.18000000000001,59.690000000000005,59.02,58.82999999999999,58.610000000000014,58.26000000000001,57.91999999999999,57.51,57.21000000000001,57.05,56.81999999999999,56.48,56.16,55.84,55.50000000000001,55.089999999999996,54.71000000000001,54.56,54.31999999999999,54.04,53.86,53.699999999999996,53.54999999999999,53.38,53.21,52.889999999999986],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
