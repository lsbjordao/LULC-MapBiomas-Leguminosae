<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.26,96.31,95.95,95.77999999999997,95.47999999999999,95.50999999999998,95.30999999999997,94.91,94.55999999999997,94.59999999999997,94.21,93.88999999999997,93.56999999999998,93.35999999999999,92.21999999999998,91.91999999999999,91.54999999999997,91.06999999999996,90.19,89.71999999999998,89.46,89.17,89.33,89.22,89.42999999999999,89.09,88.63,88.21000000000001,87.69000000000001,87.58,87.44,87.36,87.34999999999998,87.22999999999999,87.07,86.95,86.66,85.59999999999998],"color":"green"},{"name":"anthropic","data":[9.52,10.479999999999999,10.84,11.03,11.31,11.290000000000001,11.5,11.850000000000001,12.219999999999999,12.18,12.590000000000002,12.91,13.219999999999999,13.44,14.559999999999999,14.870000000000001,15.240000000000002,15.71,16.59,17.070000000000004,17.33,17.610000000000003,17.45,17.570000000000004,17.37,17.7,18.15,18.59,19.099999999999998,19.21,19.34,19.439999999999998,19.45,19.58,19.720000000000002,19.86,20.12,21.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
