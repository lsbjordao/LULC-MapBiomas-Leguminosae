<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.31,36.480000000000004,36.690000000000005,37.08,37.4,37.97,38.160000000000004,38.49,39.35,40.86000000000001,41.46,42.62,42.98,43.67999999999999,44.1,44.129999999999995,44.44,44.77,45.36,45.62999999999999,45.85,46.28,46.72,47.209999999999994,47.599999999999994,47.94,48.75,48.90999999999999,49.15,49.47,49.620000000000005,49.82,50.06,50.559999999999995,50.78,51.080000000000005,51.29,51.370000000000005],"color":"green"},{"name":"anthropic","data":[63.970000000000006,63.800000000000004,63.589999999999996,63.209999999999994,62.88,62.290000000000006,62.120000000000005,61.79,60.93,59.410000000000004,58.83000000000001,57.640000000000015,57.300000000000004,56.6,56.17,56.15,55.86000000000001,55.510000000000005,54.910000000000004,54.650000000000006,54.440000000000005,54.00000000000001,53.56,53.080000000000005,52.67,52.33,51.53,51.38,51.12,50.8,50.660000000000004,50.45,50.199999999999996,49.71000000000001,49.5,49.20000000000001,48.97,48.910000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
