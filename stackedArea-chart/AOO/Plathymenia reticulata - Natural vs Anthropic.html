<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.23,67.68,67.22000000000001,66.47000000000001,65.85000000000001,65.59,65.31,64.91,64.71000000000001,64.44000000000001,64.21000000000001,64.07000000000001,63.9,63.71000000000001,63.49,62.94,62.74000000000001,62.52,62.32000000000001,62.16000000000001,61.970000000000006,61.79999999999999,61.69,61.54,61.410000000000004,61.43,61.370000000000005,61.38,61.11000000000001,60.980000000000004,60.85,60.81,60.86,60.81,60.650000000000006,60.46,60.29,60.06000000000001],"color":"green"},{"name":"anthropic","data":[42.720000000000006,43.279999999999994,43.75,44.470000000000006,45.059999999999995,45.35,45.63,46.04,46.220000000000006,46.52,46.74,46.88,47.06000000000001,47.24,47.5,48,48.199999999999996,48.41999999999999,48.629999999999995,48.75000000000001,48.98,49.17,49.26999999999999,49.42,49.540000000000006,49.50999999999999,49.53999999999999,49.56,49.81999999999999,49.940000000000005,50.059999999999995,50.11000000000001,50.070000000000014,50.12000000000001,50.32000000000001,50.459999999999994,50.63999999999999,50.879999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
