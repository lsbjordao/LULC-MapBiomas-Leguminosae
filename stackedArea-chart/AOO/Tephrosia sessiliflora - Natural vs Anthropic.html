<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.51,56,54.79,54.32,54.010000000000005,53.65,52.52000000000001,52.07000000000001,51.66,51.230000000000004,50.65,50.14,49.620000000000005,49.03,48.519999999999996,47.74,47.54,47.120000000000005,46.720000000000006,46.62,46.56,46.41,46.209999999999994,46.31000000000001,46.32,46.43,46.57000000000001,46.53999999999999,46.440000000000005,46.24999999999999,46.029999999999994,46.03,45.89,45.779999999999994,45.75000000000001,45.53000000000001,45.480000000000004,45.82000000000001],"color":"green"},{"name":"anthropic","data":[46.02,47.52,48.72999999999999,49.18,49.51999999999999,49.88,51.010000000000005,51.47,51.85,52.28,52.87000000000001,53.390000000000015,53.910000000000004,54.49999999999999,55.010000000000005,55.800000000000004,56.00999999999999,56.400000000000006,56.81000000000001,56.91,56.97,57.110000000000014,57.330000000000005,57.19999999999999,57.230000000000004,57.09,56.97,56.99000000000001,57.09,57.269999999999996,57.480000000000004,57.49,57.64,57.74999999999999,57.78999999999999,58.010000000000005,58.05,57.70000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
