<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.46,93.26,93.19999999999999,93.35,93.03,92.71000000000001,92.78999999999999,92.68,92.61000000000001,92.58000000000001,92.60000000000001,92.60000000000001,92.31,92.14,92.07000000000001,92.03999999999999,92.32000000000002,92.38,92.26,92.29,92.19,92.11999999999999,92.3,92.53,92.49,92.20000000000002,92.14999999999998,92.38,92.49000000000001,92.47999999999999,92.43999999999998,92.21000000000001,92.27000000000001,92.27,92.36000000000001,92.27000000000001,92.34,92.11999999999998],"color":"green"},{"name":"anthropic","data":[7.210000000000001,7.39,7.46,7.34,7.640000000000001,7.94,7.88,7.98,8.06,8.08,8.059999999999999,8.06,8.36,8.52,8.600000000000001,8.620000000000001,8.33,8.3,8.39,8.379999999999999,8.469999999999999,8.55,8.35,8.14,8.18,8.48,8.530000000000001,8.29,8.16,8.18,8.24,8.44,8.39,8.39,8.3,8.38,8.31,8.55],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
