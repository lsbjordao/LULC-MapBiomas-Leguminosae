<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.93,40.74999999999999,40.71,41.11000000000001,41.06,41.44,41.72999999999999,41.72,42.199999999999996,42.7,43.15,43.260000000000005,43.5,44.09,44.56,44.949999999999996,45.27,45.669999999999995,45.81,45.87,46.44,46.910000000000004,47.47999999999999,47.64,47.68,47.730000000000004,47.339999999999996,47.48,47.28999999999999,47.7,48.13,48.52,48.690000000000005,49.01,49.010000000000005,49.27,49.02,49.49999999999999],"color":"green"},{"name":"anthropic","data":[37.48,37.74,37.86,37.49,37.589999999999996,37.18000000000001,36.79,36.78,36.35,35.99,35.58,35.419999999999995,35.019999999999996,34.42000000000001,33.92,33.55,33.3,32.9,32.7,32.449999999999996,31.72,31.169999999999998,30.559999999999995,30.35,30.34,30.41,30.900000000000002,30.759999999999998,31,30.72,30.470000000000002,30.13,29.930000000000003,29.57,29.15,28.82,29.05,28.479999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
