<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.980000000000004,53.20999999999998,52.180000000000014,51.309999999999995,50.779999999999994,50.35,50.760000000000005,50.56,50.760000000000005,51.480000000000004,51.95999999999998,52.15999999999999,53.29999999999999,53.29,53.85,53.7,53.55,53.599999999999994,53.339999999999996,53.15,52.800000000000004,52.04,52.24,52.42999999999999,52.36,52.78,52.68000000000001,52.05999999999999,51.7,51.129999999999995,50.92999999999999,51.02000000000001,51.17,51.63999999999999,51.489999999999995,51.44,51.389999999999986,51.68],"color":"green"},{"name":"anthropic","data":[51.68,52.43,53.47,54.32999999999999,54.879999999999995,55.31,54.88,55.08,54.87,54.160000000000004,53.68,53.47,52.34000000000001,52.35,51.78000000000001,51.94,52.10999999999999,52.050000000000004,52.31,52.489999999999995,52.870000000000005,53.63,53.42,53.23,53.290000000000006,52.84000000000001,52.98000000000001,53.59,53.970000000000006,54.52,54.72,54.63,54.47,54.019999999999996,54.15,54.19,54.26,53.96],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
