<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.03,70.24,70.73000000000002,70.49000000000001,70.30000000000001,69.96,69.55,69.35,69.38999999999999,69.39,69.39999999999999,69.74000000000001,69.89,70.1,70.55000000000001,70.74,70.91,71.03,71.16000000000001,71.3,71.54000000000002,71.77000000000001,71.92,72.14000000000001,72.39,72.77000000000001,72.99999999999999,73.12999999999998,73.42000000000002,73.33000000000001,73.68,73.53000000000002,73.54,73.36000000000001,73.35000000000001,73.47,73.63000000000002,73.93000000000002],"color":"green"},{"name":"anthropic","data":[32.98,32.769999999999996,32.28,32.54,32.73,33.05,33.47,33.669999999999995,33.63,33.65,33.60000000000001,33.290000000000006,33.14000000000001,32.92,32.48,32.31,32.11,32.02,31.889999999999997,31.750000000000004,31.49,31.269999999999996,31.130000000000003,30.9,30.650000000000002,30.290000000000003,30.04,29.919999999999998,29.67,29.73,29.39,29.6,29.580000000000002,29.759999999999998,29.780000000000005,29.66,29.53,29.240000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
