<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[64.29,64.72,64.63,63.96,63.61,63.56,64.09,64.12,64.08,64.28,64.87,65.06,65,65.11,65.08,65.22,65.38,65.71,66.06,66.12,66.02,65.97,66.06,66.05,66.11,65.74,65.83,65.82,66.08,66.18,66.05,65.96,66.17,66.23,66.25,66.33,66.36,65.91],"color":"#006400"},{"name":"Flooded forest","data":[8.15,7.02,7.86,7.91,7.91,7.42,7.36,7.77,7.76,8.53,9.1,9.06,9.33,9.62,9.35,10.33,10.42,10.12,10.92,11.14,11.34,11.28,11.32,11.34,11.5,11.51,11.5,11.42,11.32,11.27,11.22,11.43,11.52,11.61,11.65,11.72,11.73,11.8],"color":"#76A5AF"},{"name":"Wetland","data":[1.52,1.83,1.26,3.47,1.31,1.51,1.39,3.18,1.7,2.21,2.53,2.28,3.31,4.35,2.94,2.55,3.31,3.05,3.07,2.22,2.41,2.63,1.65,1.64,1.53,2.75,2.24,1.82,2.16,2.34,2.54,2.22,1.93,1.91,1.46,2.15,1.53,0.17],"color":"#45C2A5"},{"name":"Grassland","data":[0.06,0,0,0,0,0,0,0.06,0,0,0.08,0.02,0.01,0,0,0.01,0.06,0.01,0,0,0,0,0.12,0.1,0.12,0.02,0.02,0.07,0.07,0.07,0.07,0.07,0.17,0.16,0.16,0.16,0.17,0.25],"color":"#B8AF4F"},{"name":"Pasture","data":[2.04,1.54,1.64,2.4,2.88,2.88,2.14,2.09,1.99,1.76,1.38,1.29,1.12,1.38,1.52,1.47,1.24,0.99,0.9,0.84,1.16,1.15,0.7,0.69,0.75,1.26,1.25,1.17,0.95,0.8,0.83,0.81,0.61,0.65,0.54,0.51,0.48,0.44],"color":"#FFD966"},{"name":"River, lake and ocean","data":[23.59,24.52,24.24,21.89,23.92,24.26,24.64,22.41,24.1,22.85,21.66,21.92,20.85,19.17,20.74,20.05,19.23,19.74,18.68,19.3,18.69,18.61,19.77,19.8,19.62,18.34,18.79,19.33,19.06,18.98,18.94,19.13,19.22,19.07,19.58,18.75,19.36,21.07],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
