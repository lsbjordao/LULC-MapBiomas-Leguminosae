<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.38,67.97999999999999,67.67,66.75,65.75999999999999,65.4,64.74000000000001,64.01,63.040000000000006,61.81,61.330000000000005,61.110000000000014,60.480000000000004,60.09000000000001,59.71,59.1,58.84,58.56,58.26000000000001,57.82000000000001,57.49,57.46000000000001,57.39000000000001,57.23,57.190000000000005,58.42,58.2,58.04,57.7,57.2,56.78,56.28,55.999999999999986,55.86,55.70000000000001,55.45000000000001,55.489999999999995,55.67000000000001],"color":"green"},{"name":"anthropic","data":[36.13,37.52,37.830000000000005,38.74999999999999,39.739999999999995,40.11,40.779999999999994,41.5,42.449999999999996,43.720000000000006,44.18,44.41,45.06,45.419999999999995,45.790000000000006,46.43000000000001,46.68000000000001,46.97,47.25999999999999,47.71000000000001,48.019999999999996,48.06,48.11,48.3,48.32,47.080000000000005,47.3,47.49000000000001,47.839999999999996,48.32,48.74000000000001,49.230000000000004,49.529999999999994,49.65,49.830000000000005,50.080000000000005,50.03000000000001,49.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
