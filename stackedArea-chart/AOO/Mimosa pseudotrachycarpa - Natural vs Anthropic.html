<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.18,47.21,46.64,46.309999999999995,46.370000000000005,46.33999999999999,46.37,46.63000000000001,46.83,47.160000000000004,47.010000000000005,46.66,46.64,47.68000000000001,47.46999999999999,47.690000000000005,48.1,48.059999999999995,48.26,48.08,48.10999999999999,47.66,47.779999999999994,48.11,48.519999999999996,48.92,48.76999999999999,48.760000000000005,49.28,49.44,49.71,49.99999999999999,49.86,49.87,50.01,50.07,50.14999999999999,50.56999999999999],"color":"green"},{"name":"anthropic","data":[50.25,50.21,50.79,51.099999999999994,51.059999999999995,51.080000000000005,51.06,50.79,50.61,50.27000000000001,50.42,50.77000000000001,50.790000000000006,49.75000000000001,49.96000000000001,49.74,49.32000000000001,49.370000000000005,49.150000000000006,49.36,49.330000000000005,49.76,49.629999999999995,49.32000000000001,48.91000000000001,48.49,48.64,48.65,48.14,47.970000000000006,47.72,47.440000000000005,47.57,47.54,47.42,47.349999999999994,47.27,46.86],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
