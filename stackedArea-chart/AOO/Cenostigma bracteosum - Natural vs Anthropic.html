<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.24999999999999,73.76999999999998,72.28999999999999,71.42999999999999,70.42999999999998,69.61999999999998,68.89999999999998,68.59,68.48,68.41000000000001,68.88999999999997,69.2,69.44000000000001,69.16,68.45,67.87,67.25999999999999,66.67,66.18,65.75,65.43,65.16000000000001,64.70000000000002,64.65,64.34,64.47000000000001,64.31,64.17999999999999,63.830000000000005,63.38,62.64000000000001,62.23,61.730000000000004,61.46000000000001,61.24,61.05,60.84999999999999,60.589999999999996],"color":"green"},{"name":"anthropic","data":[32.65,33.129999999999995,34.62,35.480000000000004,36.47000000000001,37.30999999999999,38.01,38.32,38.43,38.50999999999999,38.050000000000004,37.7,37.48,37.76,38.46999999999999,39.04999999999999,39.669999999999995,40.24,40.720000000000006,41.18,41.480000000000004,41.75,42.21999999999999,42.279999999999994,42.599999999999994,42.45,42.60999999999999,42.739999999999995,43.08999999999999,43.53999999999999,44.269999999999996,44.669999999999995,45.19,45.46999999999999,45.67999999999999,45.87999999999999,46.07,46.31000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
