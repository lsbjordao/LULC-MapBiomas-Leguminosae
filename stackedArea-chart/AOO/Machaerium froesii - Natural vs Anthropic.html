<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.19,72.95,71.48,70.37,70.41,70.05999999999999,68.69,68.01,67.56,66.7,65.24,63.93000000000001,62.74,62.379999999999995,62.61,61.36,60.529999999999994,60.230000000000004,59.91999999999999,59.900000000000006,60.29,60.3,59.99,59.8,59.53999999999999,59.44,59.489999999999995,59.46,59.06,58.63,58.519999999999996,58.370000000000005,58.13000000000001,58.290000000000006,58.150000000000006,58.040000000000006,57.88999999999999,57.26],"color":"green"},{"name":"anthropic","data":[25.609999999999996,27.84,29.32,30.409999999999997,30.39,30.720000000000002,32.089999999999996,32.8,33.22,34.09,35.55,36.85,38.04,38.419999999999995,38.190000000000005,39.42,40.25,40.56,40.88,40.89000000000001,40.510000000000005,40.489999999999995,40.83,41,41.27,41.36,41.300000000000004,41.34,41.75,42.16,42.26,42.41,42.67,42.51,42.650000000000006,42.760000000000005,42.92,43.540000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
