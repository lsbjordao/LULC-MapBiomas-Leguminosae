<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.92000000000002,66.03000000000002,65.74000000000001,65.72000000000001,65.35000000000001,65.38,65.46,65.64999999999999,65.78,65.99000000000001,65.89999999999999,65.95,66.12,66.2,66.47999999999999,66.58,66.74,66.81000000000002,67.08000000000001,67.28,67.36999999999999,67.63,67.94999999999999,68.00999999999999,68.14999999999999,68.15,68.21999999999998,68.16000000000001,68.2,68.3,68.39,68.41000000000001,68.48,68.70000000000002,68.91000000000001,69.07000000000001,69.34,69.18],"color":"green"},{"name":"anthropic","data":[37.06,36.93,37.21,37.26,37.61,37.580000000000005,37.510000000000005,37.32000000000001,37.19,37.00000000000001,37.06000000000001,37.03,36.86,36.779999999999994,36.5,36.379999999999995,36.239999999999995,36.129999999999995,35.88,35.699999999999996,35.589999999999996,35.31,35.019999999999996,34.959999999999994,34.83,34.79,34.75,34.79,34.75,34.69,34.56,34.559999999999995,34.47,34.27,34.050000000000004,33.89,33.669999999999995,33.78999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
