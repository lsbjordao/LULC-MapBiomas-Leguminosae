<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.18,92.35999999999999,92.63,91.96000000000001,92.10000000000001,92.03,91.84,91.91999999999999,92.24,92.26,92.02,91.79,91.51000000000002,91.48,91.66,91.39000000000001,91.31,91.20000000000002,91.21000000000001,91.50999999999999,91.30999999999999,91.22,91.03999999999999,90.91,90.78999999999999,90.74,90.79,90.75,90.71999999999998,90.08999999999999,89.80999999999999,89.55999999999999,89.48,89.41000000000001,89.23,89.21000000000001,89.11,88.86],"color":"green"},{"name":"anthropic","data":[8.19,8.020000000000001,7.760000000000001,8.41,8.290000000000001,8.350000000000001,8.549999999999999,8.469999999999999,8.129999999999999,8.13,8.37,8.58,8.87,8.92,8.74,9.010000000000002,9.07,9.17,9.18,8.86,9.08,9.160000000000002,9.360000000000001,9.47,9.589999999999998,9.64,9.589999999999998,9.629999999999999,9.649999999999999,10.28,10.57,10.83,10.889999999999999,10.98,11.13,11.18,11.290000000000001,11.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
