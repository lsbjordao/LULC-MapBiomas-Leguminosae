<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.49000000000001,91.2,88.41000000000001,87.87,88.37,87.92,87.33,86.42,85.67999999999999,84.50999999999998,84.21,81.78999999999999,80.48,82.50999999999999,82,82.42,83.00000000000001,83,82.76,83.57000000000001,83.09,82.61999999999999,81.74,81.96999999999998,81.69999999999999,81.77,81.69999999999999,81.33999999999999,81.59,82.01,82.53999999999999,82.43,82.55,82.58,82.46000000000001,82.51,82.76,82.42],"color":"green"},{"name":"anthropic","data":[7.390000000000001,9.669999999999998,12.47,13.010000000000002,12.5,12.950000000000001,13.540000000000001,14.47,15.2,16.36,16.66,19.1,20.4,18.36,18.88,18.47,17.88,17.869999999999997,18.12,17.299999999999997,17.79,18.26,19.13,18.9,19.17,19.12,19.19,19.54,19.29,18.86,18.33,18.44,18.330000000000002,18.3,18.419999999999998,18.36,18.12,18.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
