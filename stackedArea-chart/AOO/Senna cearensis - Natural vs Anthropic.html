<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.16,74.98,73.46,72.40999999999998,71.88,71.41999999999999,71.07000000000001,71.19,70.82999999999998,70.36,70.86999999999999,71.37,71.67000000000002,71.15,70.79,70.42999999999999,70.12,69.75999999999999,69.26000000000002,68.75,68.29,67.91,67.4,67.72000000000001,67.5,68.05000000000001,69.03,68.59,68.04999999999998,68.03999999999999,67.64999999999999,67.47000000000001,67.44,67.72000000000001,67.96,67.83,67.79999999999998,67.73999999999998],"color":"green"},{"name":"anthropic","data":[25.860000000000003,26.040000000000003,27.580000000000005,28.62,29.16,29.6,29.94,29.83,30.2,30.650000000000002,30.180000000000003,29.650000000000002,29.37,29.880000000000003,30.240000000000002,30.599999999999998,30.91,31.26,31.770000000000003,32.28,32.730000000000004,33.11,33.629999999999995,33.31,33.52,32.97,32,32.449999999999996,32.98,32.99,33.37,33.56,33.58,33.300000000000004,33.06000000000001,33.19,33.23,33.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
