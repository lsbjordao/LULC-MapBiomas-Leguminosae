<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.39999999999999,98.41,98.36,98.31,98.41,98.41,98.35000000000001,98.27,98.28999999999999,98.46999999999998,98.25999999999999,98.10000000000001,97.98,97.75,97.9,97.84,97.82000000000001,97.77,97.81,97.99,98.1,98.13999999999999,98.02000000000001,97.95,97.61,97.44,97.35,97.5,97.74,97.72,97.65,97.66,97.44,97.63,97.72999999999999,97.89000000000001,97.94,97.86],"color":"green"},{"name":"anthropic","data":[1.59,1.58,1.6300000000000001,1.6700000000000002,1.57,1.57,1.6300000000000001,1.71,1.69,1.52,1.72,1.88,2.0100000000000002,2.23,2.08,2.14,2.16,2.21,2.17,1.99,1.88,1.85,1.9700000000000002,2.02,2.37,2.54,2.63,2.48,2.2399999999999998,2.27,2.3200000000000003,2.3200000000000003,2.54,2.3499999999999996,2.25,2.09,2.04,2.12],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
