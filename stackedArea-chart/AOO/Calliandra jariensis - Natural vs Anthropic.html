<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.72,63.269999999999996,61.430000000000014,69.35000000000001,71.47,80.82,82.21,77.45,78.91,79.71000000000001,78.47999999999999,72.35,72.25,72.42999999999999,72.2,69.23,65.23,62.50000000000001,63.2,60.55,62.84,68.48,68.60000000000001,69.26,68.25999999999999,68.2,67.49000000000001,67.29,69.19000000000001,70.54,69.72,69.89,67.75,67.58999999999999,64.14999999999999,63.839999999999996,63.82000000000001,63.71],"color":"green"},{"name":"anthropic","data":[29.84,36.29,38.14,30.229999999999997,28.11,18.740000000000002,17.36,22.130000000000003,20.65,19.85,21.09,27.22,27.32,27.13,27.36,30.340000000000003,34.33,37.07,36.36,39.019999999999996,36.73,31.08,30.96,30.32,31.310000000000002,31.380000000000003,32.08,32.28,30.39,29.02,29.839999999999996,29.659999999999997,31.799999999999997,31.979999999999997,35.42,35.72,35.76,35.849999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
