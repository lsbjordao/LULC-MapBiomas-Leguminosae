<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.6,84.89,82.94000000000001,81.60000000000001,81.62,82.53999999999999,82.88,81.61,80.38,79.21000000000001,78.66,78.33,78.05,78.11000000000001,76.89999999999999,75.86999999999999,74.92,73.94999999999999,73.80999999999999,73.84,74.08,74.64,74.85,74.76,74.38000000000001,74.50000000000001,74.62,75,74.91,74.74,74.62,74.91,74.79999999999998,74.80999999999999,74.64,74.25,74.10999999999999,73.96000000000001],"color":"green"},{"name":"anthropic","data":[14.76,15.469999999999999,17.42,18.759999999999998,18.74,17.82,17.47,18.75,19.96,21.160000000000004,21.69,22.050000000000004,22.310000000000002,22.250000000000004,23.45,24.49,25.45,26.42,26.540000000000003,26.52,26.27,25.709999999999997,25.51,25.599999999999998,25.97,25.85,25.76,25.34,25.439999999999998,25.61,25.720000000000002,25.45,25.549999999999994,25.55,25.71,26.099999999999998,26.26,26.389999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
