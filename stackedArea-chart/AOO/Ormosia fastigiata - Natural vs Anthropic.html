<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.32000000000001,58.94,58.55999999999999,57.90999999999999,57.419999999999995,56.92999999999999,56.57999999999999,56.16,55.989999999999995,55.79,55.58999999999999,55.45999999999999,55.44,55.49999999999999,55.03999999999999,54.539999999999985,54.129999999999995,53.91999999999999,53.67999999999999,53.459999999999994,53.28999999999999,53.21999999999999,53.03999999999999,52.989999999999995,53.06,53.239999999999995,53.46,53.55999999999999,53.419999999999995,53.239999999999995,53.14999999999999,52.999999999999986,52.73999999999999,52.78999999999999,52.839999999999996,52.819999999999986,52.87,53.31999999999999],"color":"green"},{"name":"anthropic","data":[47.70000000000001,48.07,48.480000000000004,49.13,49.61,50.10000000000001,50.449999999999996,50.879999999999995,51.059999999999995,51.26,51.480000000000004,51.61,51.61,51.51999999999999,52.01,52.49,52.89,53.11,53.35,53.589999999999996,53.74999999999999,53.81,54,54.089999999999996,53.98999999999999,53.809999999999995,53.57,53.45,53.620000000000005,53.81,53.92,54.040000000000006,54.33000000000002,54.27000000000002,54.24000000000001,54.24,54.15,53.71],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
