<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.459999999999994,38.529999999999994,37.63,36.73,36.720000000000006,37.01,37.22,37.03999999999999,36.72,36.739999999999995,36.81999999999999,36.85,37.05,36.67,36.34,36.44,36.5,36.79,37.010000000000005,37.64,37.77,37.92,37.99999999999999,37.910000000000004,38.36,38.45,38.900000000000006,39.03999999999999,38.86000000000001,39.13,39.13,39.220000000000006,39.489999999999995,39.839999999999996,40.309999999999995,40.51,40.65,40.559999999999995],"color":"green"},{"name":"anthropic","data":[60.56000000000001,62.49,63.370000000000005,64.28,64.3,64.02,63.81,63.99000000000001,64.28,64.27000000000001,64.21,64.17,63.980000000000004,64.33000000000001,64.67999999999999,64.57,64.52,64.22,64,63.39,63.269999999999996,63.09999999999999,63.01,63.099999999999994,62.68,62.55,62.10999999999999,61.96,62.15,61.88,61.899999999999984,61.790000000000006,61.54,61.160000000000004,60.72,60.53,60.35999999999999,60.459999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
