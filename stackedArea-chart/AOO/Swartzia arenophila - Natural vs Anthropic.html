<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.13000000000002,36.559999999999995,36.019999999999996,35.31,34.85,33.70000000000001,32.43,32.17000000000001,31.270000000000003,32.25000000000001,32.5,34.74,34.419999999999995,34.16,32.669999999999995,31.68,30.990000000000002,30.009999999999994,29.56,28.759999999999998,27.340000000000007,26.81,26.669999999999998,25.849999999999998,26.000000000000004,25.120000000000005,24.479999999999997,24.430000000000003,24.270000000000003,24.31,24.250000000000004,24.12,24.57,24.659999999999997,24.73,25.019999999999996,25.689999999999998,27.689999999999998],"color":"green"},{"name":"anthropic","data":[54.1,56.769999999999996,57.31,58.01,58.449999999999996,59.62,60.870000000000005,61.150000000000006,62.050000000000004,61.07000000000001,60.83,58.589999999999996,58.88,59.15,60.63,61.61000000000001,62.31,63.3,63.73,64.55999999999999,65.99000000000001,66.51,66.65,67.45,67.33000000000001,68.19999999999999,68.84,68.87,69.03,68.99,69.05,69.16,68.73,68.64,68.58000000000001,68.28,67.62,65.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
