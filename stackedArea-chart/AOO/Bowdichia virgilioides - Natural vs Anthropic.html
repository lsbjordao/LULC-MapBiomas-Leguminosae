<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.6,66.27999999999999,66.00000000000001,65.60000000000001,65.22000000000001,64.92,64.77000000000001,64.52999999999999,64.26000000000002,64.5,64.17999999999999,64.21000000000001,64.55999999999999,64.69,64.9,64.91999999999999,64.97,64.91,64.74,64.71,64.55000000000001,64.49000000000001,64.44999999999999,64.4,64.46000000000001,64.35,64.23,63.94,63.49,63.36000000000001,63.45,63.62999999999999,63.61999999999998,63.67999999999999,63.529999999999994,63.47999999999999,63.46999999999999,63.55],"color":"green"},{"name":"anthropic","data":[37.6,37.919999999999995,38.19,38.58999999999999,38.959999999999994,39.28000000000001,39.42999999999999,39.68999999999999,39.91,39.709999999999994,40,40.00999999999999,39.61000000000001,39.52,39.300000000000004,39.269999999999996,39.21,39.30000000000002,39.45000000000001,39.480000000000004,39.64,39.709999999999994,39.77,39.8,39.72,39.85,39.97,40.25,40.730000000000004,40.83,40.760000000000005,40.58,40.570000000000014,40.51000000000002,40.660000000000004,40.71,40.730000000000004,40.64000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
