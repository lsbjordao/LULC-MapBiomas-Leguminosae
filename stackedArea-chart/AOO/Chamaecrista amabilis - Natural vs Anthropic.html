<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.49999999999999,67.33999999999999,66.64999999999999,66.17,65.73,65.65,65.55,65.87,66.26,67.01,66.79,66.18,65.88,65.49000000000001,64.81000000000002,63.510000000000005,63.03,62.82,63.08000000000001,62.870000000000005,62.73000000000001,62.66,62.55,62.690000000000005,62.57,63.1,62.99999999999999,63.03999999999999,62.86,63.62999999999999,63.809999999999995,63.730000000000004,62.919999999999995,62.83,62.660000000000004,62.099999999999994,62.69,62.2],"color":"green"},{"name":"anthropic","data":[28.270000000000003,26.509999999999998,27.24,27.720000000000002,28.16,28.259999999999998,28.35,28.06,27.679999999999996,26.970000000000002,27.21,27.86,28.19,28.57,29.24,30.56,31.1,31.330000000000002,31.099999999999998,31.290000000000003,31.44,31.53,31.620000000000005,31.459999999999997,31.55,31.03,31.13,31.139999999999997,31.29,30.5,30.32,30.439999999999998,31.18,31.3,31.49,32.02,31.47,31.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
