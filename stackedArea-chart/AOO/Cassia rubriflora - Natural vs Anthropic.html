<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.49,88.41000000000001,88.34,88.78,88.66000000000001,89.5,92.2,92.29,92.03999999999999,92.8,93.64,93.62,93.36999999999999,93.35,93.31,93.24999999999999,93.23,93.18000000000002,93.24000000000001,93.25,93.20000000000002,93.21000000000001,93.24,93.24000000000001,93.25,93.21000000000001,93.18,93.21000000000001,93.2,93.25000000000001,93.27,93.30999999999999,93.08,92.94,92.98,92.85000000000001,92.85000000000001,92.8],"color":"green"},{"name":"anthropic","data":[11.09,11.16,11.25,10.82,10.93,10.08,7.38,7.279999999999999,7.53,6.79,5.94,5.96,6.21,6.23,6.279999999999999,6.33,6.35,6.39,6.34,6.34,6.38,6.369999999999999,6.34,6.35,6.34,6.38,6.3999999999999995,6.380000000000001,6.38,6.33,6.32,6.2700000000000005,6.51,6.65,6.6,6.739999999999999,6.73,6.779999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
