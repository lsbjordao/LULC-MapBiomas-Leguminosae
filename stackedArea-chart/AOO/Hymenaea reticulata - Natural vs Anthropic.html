<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.28999999999999,87.77,86.6,86.35999999999999,86.6,87.18,87.78000000000002,87.49,87.43,88.27,88.23,87.84000000000002,87.67999999999999,87.53000000000002,87.45,87.44999999999999,87.28,87.44999999999999,87.36,86.69999999999999,86.56,86.46000000000001,86.67,86.84,86.80999999999999,86.89999999999998,86.94,87.02000000000001,87.07000000000002,87.05999999999999,86.97000000000001,86.97999999999999,87.14,87.42,87.78,87.58,87.69,87.29000000000002],"color":"green"},{"name":"anthropic","data":[13.46,12.999999999999998,14.149999999999999,14.4,14.13,13.58,12.969999999999999,13.27,13.299999999999999,12.479999999999999,12.52,12.91,13.07,13.22,13.29,13.29,13.459999999999999,13.28,13.4,14.039999999999997,14.2,14.289999999999997,14.09,13.9,13.919999999999998,13.84,13.809999999999999,13.719999999999999,13.67,13.700000000000001,13.79,13.750000000000002,13.620000000000001,13.309999999999999,12.99,13.18,13.049999999999999,13.45],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
