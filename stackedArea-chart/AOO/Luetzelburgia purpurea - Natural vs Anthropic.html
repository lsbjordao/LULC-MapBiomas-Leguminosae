<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.330000000000005,43.64000000000001,41.85,41.160000000000004,39.910000000000004,39.730000000000004,40.07,39.09,38.44,37.800000000000004,37.650000000000006,38.22,39.20000000000001,40.41,42.17000000000001,42.18,41.86,41.419999999999995,40.63999999999999,39.91,40.77,40.879999999999995,41.589999999999996,41.66,40.25,40.029999999999994,39.47,37.37,38.06,37.29999999999999,37.49,37.58,37.19,37.11,37.54,37.85999999999999,38.25999999999999,38.91],"color":"green"},{"name":"anthropic","data":[60.67,61.36,63.16,63.870000000000005,65.1,65.27000000000001,64.94,65.9,66.56,67.21000000000001,67.36,66.78,65.79,64.58,62.839999999999996,62.800000000000004,63.14,63.6,64.37,65.08,64.22,64.11,63.419999999999995,63.36,64.75,64.98,65.52,67.64,66.93999999999998,67.69999999999999,67.52,67.42999999999999,67.81,67.89999999999999,67.48,67.14,66.74,66.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
