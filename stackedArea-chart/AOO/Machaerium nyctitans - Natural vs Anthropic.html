<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.24999999999999,48.220000000000006,47.81,47.46000000000001,47.169999999999995,47.09,46.92,46.88000000000001,46.910000000000004,46.779999999999994,46.730000000000004,46.76,46.79,46.809999999999995,47.01,46.89000000000001,46.98,46.92,46.9,46.96,46.94,46.99999999999999,47.040000000000006,47.1,47.24000000000001,47.34,47.42,47.480000000000004,47.620000000000005,47.75,47.940000000000005,48.03999999999999,48.06999999999999,48.08999999999999,48.059999999999995,48.03,48.2,48.24],"color":"green"},{"name":"anthropic","data":[57.81999999999999,57.839999999999996,58.24,58.629999999999995,58.88,58.97,59.14000000000001,59.179999999999986,59.14,59.279999999999994,59.31999999999999,59.28,59.25999999999999,59.239999999999995,59.04,59.16,59.089999999999996,59.13999999999999,59.15999999999999,59.1,59.11,59.06,59.01000000000001,58.93000000000001,58.800000000000004,58.71,58.63,58.57,58.42,58.31999999999999,58.11,58.02,57.99,57.940000000000005,57.97,58.03000000000001,57.870000000000005,57.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
