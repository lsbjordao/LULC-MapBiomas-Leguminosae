<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.279999999999994,43.11000000000001,43.599999999999994,42.74,42.88,42.55,41.89,42.370000000000005,42.459999999999994,42.41,43.51,43.43999999999999,42.77,41.87,42.14999999999999,42.25000000000001,42.77,42.65,42.92,42.33,41.87000000000001,41.86000000000001,41.74999999999999,41.980000000000004,42.28,42.42,42.38000000000001,42.6,42.39,41.849999999999994,42.18,42.05,41.660000000000004,41.730000000000004,41.86000000000001,41.62999999999999,41.49,41.599999999999994],"color":"green"},{"name":"anthropic","data":[57.519999999999996,57.69,57.21,58.07999999999999,57.93,58.24,58.89,58.419999999999995,58.339999999999996,58.39999999999999,57.33,57.370000000000005,58.01,58.94,58.660000000000004,58.53000000000001,57.989999999999995,58.15,57.88,58.49,58.92,58.92999999999999,59.07,58.83,58.529999999999994,58.39,58.449999999999996,58.21,58.4,58.97,58.64999999999999,58.769999999999996,59.17,59.080000000000005,58.95,59.17,59.24,59.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
