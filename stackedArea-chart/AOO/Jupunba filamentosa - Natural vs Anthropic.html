<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.519999999999996,51.15,50.37,49.25999999999999,49.04,48.839999999999996,48.71,48.91,49.349999999999994,49.99000000000001,50.35999999999999,50.71000000000001,50.9,50.79,50.87,50.75,50.999999999999986,51.11999999999999,51.56000000000001,51.719999999999985,51.690000000000005,51.89,52.03,52.13,52.370000000000005,52.54000000000001,52.63,52.750000000000014,52.81000000000002,53.00000000000001,53.21000000000001,53.180000000000014,53.19000000000001,53.699999999999996,53.830000000000005,53.99999999999999,54.17,54.52],"color":"green"},{"name":"anthropic","data":[45.519999999999996,45.06999999999999,45.99,47.16,47.46,47.660000000000004,47.83,47.64,47.220000000000006,46.60000000000001,46.27,45.910000000000004,45.67,45.81,45.73,45.87,45.71,45.589999999999996,45.22,45.05,45.13,44.93999999999999,44.83,44.71999999999999,44.519999999999996,44.36,44.22,44.12,44.029999999999994,43.89999999999999,43.69999999999999,43.79,43.74,43.20000000000001,43.15,42.99,42.81999999999999,42.43999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
