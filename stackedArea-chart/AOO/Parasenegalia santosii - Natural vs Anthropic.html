<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.160000000000004,39.35,38.540000000000006,37.42,36.55000000000001,35.86,35.65,35.38,35.57,36.040000000000006,36.480000000000004,36.48,36.35999999999999,36.36,36.36,35.779999999999994,35.65,35.86,36.46999999999999,36.75999999999999,36.449999999999996,36.64,36.519999999999996,36.38,36.339999999999996,35.38999999999999,35.45,35.07,34.65,34.510000000000005,34.24000000000001,33.65,33.089999999999996,33.06,33.11,33.190000000000005,33.49,33.77],"color":"green"},{"name":"anthropic","data":[53.239999999999995,53.22,54.160000000000004,55.31,56.24,56.94,57.269999999999996,57.67,57.540000000000006,57.150000000000006,56.769999999999996,56.71,56.81,56.85,56.97,57.6,57.78,57.67,57.14,56.92,57.31,57.18,57.400000000000006,57.43,57.489999999999995,58.470000000000006,58.47,58.919999999999995,59.35999999999999,59.53,59.83,60.45,61,61.199999999999996,61.46000000000001,61.69,61.75,61.809999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
