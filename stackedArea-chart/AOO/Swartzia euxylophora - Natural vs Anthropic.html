<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.11,62.949999999999996,62.52,55.49,55.26,55.230000000000004,50.879999999999995,52.46,54.97,54.97,57.72,57.25,56.56999999999999,57.309999999999995,57.87,58.279999999999994,58.49999999999999,59.04,59.339999999999996,59.2,59.25000000000001,59.27,59.67000000000001,59.830000000000005,59.730000000000004,59.83,60.29,60.43999999999999,60.76,60.94,60.97,60.739999999999995,60.949999999999996,60.98,60.74000000000001,60.65,60.970000000000006,60.870000000000005],"color":"green"},{"name":"anthropic","data":[37.75,35.91,36.650000000000006,43.75,44.040000000000006,44.129999999999995,48.51,46.93,44.419999999999995,44.4,41.68,42.01,42.690000000000005,41.93,41.31,40.91,40.730000000000004,40.18,39.900000000000006,40.06,40.03,40.05,39.66,39.5,39.68,39.589999999999996,39.13,38.99,38.61,38.43,38.39,38.63,38.410000000000004,38.36,38.6,38.67,38.25,38.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
