<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.29,78.92,78.36000000000001,77.63000000000001,77.53,76.46000000000001,76.19,76.07000000000001,75.98,76.09,76.39999999999999,76.50999999999999,74.42999999999999,72.55,71.79,71.53,71.44,71.55,71.19000000000001,70.76000000000002,69.74000000000001,69.55000000000001,69.72,69.95,69.52,69.51,69.03999999999999,68.17999999999999,67.16,66.06,64.38,63.080000000000005,61.59,61.3,62.089999999999996,63.699999999999996,64.93,66.2],"color":"green"},{"name":"anthropic","data":[20.36,20.740000000000002,21.299999999999997,22.020000000000003,22.13,23.2,23.48,23.58,23.68,23.57,23.259999999999998,23.14,25.22,27.11,27.869999999999997,28.130000000000003,28.22,28.1,28.47,28.900000000000002,29.92,30.11,29.939999999999998,29.72,30.15,30.15,30.6,31.49,32.49,33.599999999999994,35.28,36.58,38.06,38.349999999999994,37.57,35.95,34.74,33.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
