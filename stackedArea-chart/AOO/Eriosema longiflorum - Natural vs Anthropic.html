<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.419999999999995,40.190000000000005,39.989999999999995,39.84,39.06999999999999,38.64000000000001,38.150000000000006,37.77,38.1,37.71,37.42,37.28,37.32,37.489999999999995,37.54,37.61000000000001,37.800000000000004,38.08,38.43,38.67,38.67,38.69,38.69000000000001,38.550000000000004,38.720000000000006,38.85,39.04,39.169999999999995,39.4,39.65,40.02,40.120000000000005,39.89,39.18,39.010000000000005,38.99000000000001,39.15,39.370000000000005],"color":"green"},{"name":"anthropic","data":[62.24,63.46999999999999,63.67,63.83,64.62,65.03,65.51,65.91,65.57,65.96,66.23,66.39999999999999,66.35,66.16,66.14,66.07000000000001,65.87,65.59,65.24,64.99,65.01,64.98,64.98,65.11,64.97,64.82,64.61,64.51,64.25,64.04,63.66,63.540000000000006,63.77,64.49,64.66,64.67,64.50999999999999,64.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
