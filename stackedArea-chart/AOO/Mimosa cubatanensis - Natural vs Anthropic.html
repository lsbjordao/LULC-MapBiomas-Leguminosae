<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.760000000000005,58.86000000000001,58.64999999999999,58.39000000000001,57.86,57.91,57.8,59.06999999999999,59.36000000000001,59.69000000000001,59.86,59.93,60.260000000000005,60.44,60.74,60.98000000000001,61.010000000000005,60.96000000000001,61.33,61.4,61.78,62.16,62.13,62.4,62.56000000000001,62.78000000000001,62.93999999999999,63.29,63.78000000000001,64.36999999999999,64.83,65.32,66.17999999999999,66.29,66.23,66.21000000000001,66.46999999999998,66.29],"color":"green"},{"name":"anthropic","data":[44.02,43.93000000000001,44.14000000000001,44.400000000000006,44.92,44.86,44.980000000000004,43.690000000000005,43.41000000000001,43.080000000000005,42.910000000000004,42.85000000000001,42.52,42.32,42.03,41.81,41.74,41.8,41.42999999999999,41.370000000000005,40.989999999999995,40.61,40.65,40.37,40.21,39.989999999999995,39.83,39.46999999999999,38.96999999999999,38.36,37.92,37.42999999999999,36.6,36.45,36.540000000000006,36.57,36.31,36.49999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
