<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.07,88.06,87.94,87.85,87.65,88.44,89.7,89.27999999999999,88.57,88.60000000000001,89.97000000000001,89.46,88.80000000000001,88.48,88.61999999999999,88.49,87.69,87.57,87,86.77000000000001,86.39,86.30000000000001,86.29999999999998,86.33000000000001,86.2,86.22,86.32000000000001,86.69,86.62,86.57,86.4,86.63000000000001,86.52000000000001,86.56000000000002,87.16000000000001,87.02,86.86,86.35000000000001],"color":"green"},{"name":"anthropic","data":[12.2,12.229999999999999,12.32,12.43,12.64,11.84,10.579999999999998,10.99,11.719999999999999,11.68,10.31,10.8,11.5,11.8,11.66,11.79,12.59,12.71,13.280000000000001,13.51,13.879999999999999,13.969999999999999,13.969999999999999,13.95,14.08,14.05,13.96,13.59,13.649999999999999,13.71,13.870000000000001,13.64,13.76,13.71,13.12,13.25,13.43,13.92],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
