<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.22,77.25999999999999,77.16,77.1,77.29,77.38000000000001,77.44,77.38000000000001,77.35,77.34999999999998,77.19999999999999,77.25999999999999,77.21,77.28,77.44,77.25999999999999,77.28999999999999,76.84,75.90000000000002,75.61,75.35,75.2,75.08,74.92999999999999,74.96000000000001,74.96000000000001,75.06,75.11,74.81,74.38,74.16000000000001,73.91999999999999,73.93,73.66,73.32,73.08999999999999,72.88,72.82000000000001],"color":"green"},{"name":"anthropic","data":[23.01,22.970000000000002,23.06,23.12,22.92,22.85,22.8,22.86,22.88,22.88,23.02,22.960000000000004,23.03,22.96,22.779999999999998,22.97,22.95,23.37,24.33,24.619999999999997,24.88,25.019999999999996,25.15,25.299999999999997,25.27,25.259999999999998,25.16,25.13,25.419999999999998,25.860000000000003,26.060000000000002,26.320000000000004,26.3,26.57,26.89,27.160000000000004,27.34,27.41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
