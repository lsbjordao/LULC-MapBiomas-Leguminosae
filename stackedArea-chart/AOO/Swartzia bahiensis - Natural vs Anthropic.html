<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.55,84.63999999999999,84.99,83.53,82.74999999999999,81.98999999999998,81.01,80.41999999999999,80.72,80.88000000000001,81.46000000000001,85.44,85.65999999999998,85.79,86.35000000000001,87.03000000000002,87.69000000000001,87.61999999999999,88.03,88.04000000000002,87.67000000000002,87.69000000000004,87.14000000000003,86.80000000000003,86.50000000000001,85.53999999999999,85.08999999999999,84.78999999999999,84.75999999999999,84.66999999999997,85.30000000000001,85.72999999999999,85.61,86.13,85.85000000000001,85.97,86.07,86.16],"color":"green"},{"name":"anthropic","data":[15.48,15.41,15.059999999999999,16.52,17.29,18.07,19.040000000000003,19.62,19.330000000000002,19.17,18.57,14.6,14.37,14.26,13.69,13.02,12.379999999999999,12.44,12.01,12.01,12.379999999999999,12.34,12.899999999999999,13.239999999999998,13.549999999999999,14.509999999999998,14.95,15.26,15.29,15.38,14.739999999999998,14.32,14.429999999999998,13.930000000000001,14.18,14.09,13.969999999999999,13.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
