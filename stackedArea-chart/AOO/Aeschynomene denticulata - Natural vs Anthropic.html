<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.260000000000005,60.96000000000001,61.24000000000001,61.16,61.51,61.519999999999996,61.580000000000005,61.86,61.660000000000004,61.11,60.37,60.809999999999995,61.07,60.81999999999999,60.45,60.11,60.09,59.88000000000002,59.969999999999985,59.48,59.330000000000005,57.64999999999999,57.209999999999994,55.160000000000004,56.54999999999999,56.199999999999996,55.919999999999995,53.66000000000001,53.26000000000001,53.37,53.339999999999996,53.53000000000001,53.699999999999996,53.739999999999995,53.7,52.78,52.42,51.62999999999999],"color":"green"},{"name":"anthropic","data":[36.72,37.02,36.73,36.8,36.48,36.470000000000006,36.379999999999995,36.129999999999995,36.3,36.870000000000005,37.61,37.15,36.900000000000006,37.15,37.540000000000006,37.88,37.879999999999995,38.09,38.019999999999996,38.49,38.64,40.31000000000001,40.78000000000001,42.84,41.44,41.77,42.06,44.32,44.730000000000004,44.6,44.650000000000006,44.46000000000001,44.27,44.23,44.279999999999994,45.2,45.56000000000001,46.339999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
