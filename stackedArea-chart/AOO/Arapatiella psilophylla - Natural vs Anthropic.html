<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.53000000000002,77.04,76.11,74.65000000000002,73.37,72.81,72.45,72.51,72.41,72.1,72.08000000000001,72.06000000000002,71.73000000000002,71.17,70.04,69.32000000000001,69.18,68.85000000000002,69.13000000000002,68.93000000000002,68.44000000000001,68.61000000000001,68.92000000000003,69.07000000000002,69.39000000000001,69.38000000000001,69.43,69.19000000000003,68.86000000000001,68.93000000000002,69.25000000000003,69.39000000000003,69.33,69.77000000000001,69.67000000000002,69.74000000000001,70.52000000000002,70.75],"color":"green"},{"name":"anthropic","data":[23.669999999999998,23.189999999999998,24.099999999999998,25.549999999999997,26.84,27.38,27.740000000000002,27.66,27.79,28.15,28.16,28.169999999999998,28.4,28.93,30.06,30.78,30.939999999999998,31.269999999999996,31.030000000000005,31.2,31.67,31.51,31.210000000000004,31.049999999999997,30.779999999999998,30.78,30.729999999999997,30.92,31.27,31.180000000000003,30.889999999999997,30.74,30.79,30.36,30.45,30.380000000000006,29.610000000000003,29.360000000000007],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
