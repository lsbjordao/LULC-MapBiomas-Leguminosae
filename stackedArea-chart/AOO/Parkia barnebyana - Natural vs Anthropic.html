<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.17999999999999,99.35,99.35000000000001,99.34,99.22999999999999,99.2,99.31,99.29999999999998,99.37,99.37999999999998,99.35000000000001,99.35999999999999,99.35999999999999,99.36,99.33000000000001,99.3,99.24000000000001,99.18,99.23,99.24000000000001,99.24000000000001,99.24000000000001,99.16,99.13,99.14,99.1,99.13000000000001,99.07000000000001,98.81000000000002,98.94000000000001,98.5,98.36999999999999,98.39999999999999,98.08999999999999,98.07,97.80000000000001,98.28,97.96000000000001],"color":"green"},{"name":"anthropic","data":[0.25,0.09,0.09,0.09,0.2,0.22000000000000003,0.12,0.13,0.07,0.060000000000000005,0.08,0.07,0.07,0.08,0.1,0.14,0.19,0.27,0.21000000000000002,0.2,0.19,0.19,0.27,0.3,0.29000000000000004,0.33,0.31,0.37999999999999995,0.6200000000000001,0.51,0.9400000000000001,1.08,1.05,1.35,1.3699999999999999,1.6300000000000001,1.1700000000000002,1.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
