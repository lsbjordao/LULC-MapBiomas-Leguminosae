<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.84000000000001,51.89999999999999,51.779999999999994,51.78,51.79,51.899999999999984,51.97,52.24,52.830000000000005,53.48,53.64,54.17000000000001,54.440000000000005,54.63999999999999,55.12,55.260000000000005,55.390000000000015,55.4,55.64999999999999,55.73,55.75999999999999,55.93,56.1,56.240000000000016,56.550000000000004,56.75,56.839999999999996,56.85999999999999,56.949999999999996,57.22,57.36000000000001,57.5,57.78,57.980000000000004,58.230000000000004,58.209999999999994,58.17999999999999,58.160000000000004],"color":"green"},{"name":"anthropic","data":[49.65,49.63,49.76,49.779999999999994,49.78,49.68000000000001,49.6,49.33,48.75,48.11999999999999,47.96,47.42000000000001,47.150000000000006,46.949999999999996,46.49,46.34,46.22,46.18999999999999,45.93,45.84,45.849999999999994,45.669999999999995,45.52,45.36,45.059999999999995,44.83,44.75000000000001,44.74,44.65,44.38000000000001,44.26,44.12,43.86,43.63,43.42000000000001,43.41000000000001,43.449999999999996,43.46999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
