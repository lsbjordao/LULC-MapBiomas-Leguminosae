<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.38000000000001,70.69,70.44999999999999,70.17,68.68,68.37999999999998,68.01,67.60000000000001,67.19999999999999,66.14999999999999,65.2,64.87,64.8,64.52,64,63.419999999999995,62.98,62.57999999999999,61.93,61.61,61.31,60.67,60.46,60.23,59.91,59.56999999999999,59.4,58.91,58.61000000000001,58.41,58.2,58.11,58.220000000000006,58.28000000000001,58.21,58.06000000000001,57.999999999999986,58.27],"color":"green"},{"name":"anthropic","data":[30.389999999999997,30.09,30.329999999999995,30.599999999999998,32.089999999999996,32.4,32.75,33.16,33.57,34.61,35.57,35.9,35.980000000000004,36.260000000000005,36.78,37.349999999999994,37.800000000000004,38.2,38.85,39.160000000000004,39.43000000000001,40.089999999999996,40.309999999999995,40.54,40.879999999999995,41.199999999999996,41.38,41.86,42.17,42.36000000000001,42.59,42.65999999999999,42.559999999999995,42.489999999999995,42.56999999999999,42.709999999999994,42.769999999999996,42.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
