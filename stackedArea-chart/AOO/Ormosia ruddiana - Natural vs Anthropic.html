<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.03,83.72,83.30000000000001,82.94000000000001,82.7,82.6,82.1,82.05,82.05000000000001,82.58000000000001,83.22000000000001,83.80000000000001,83.64,83.11999999999999,81.64,80.80000000000001,80.70000000000002,80.72,80.97000000000001,81.03000000000002,81.06,81.16000000000001,81.77000000000001,81.12,80.64,80.81,80.71000000000001,80.60000000000001,80.7,80.61,80.74,80.89,81.64999999999999,82.3,82.09,82.09,82.07000000000001,81.08999999999999],"color":"green"},{"name":"anthropic","data":[16.97,16.259999999999998,16.7,17.060000000000002,17.28,17.39,17.9,17.93,17.94,17.4,16.779999999999998,16.189999999999998,16.35,16.869999999999997,18.34,19.189999999999998,19.28,19.27,19.009999999999998,18.970000000000002,18.939999999999998,18.84,18.229999999999997,18.859999999999996,19.34,19.179999999999996,19.29,19.400000000000002,19.29,19.380000000000003,19.26,19.099999999999998,18.34,17.7,17.890000000000004,17.9,17.919999999999998,18.9],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
