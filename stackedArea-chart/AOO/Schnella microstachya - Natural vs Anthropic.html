<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.059999999999995,51.39000000000001,50.89000000000001,50.47,49.98,49.599999999999994,49.120000000000005,48.74,48.529999999999994,48.089999999999996,47.86999999999999,47.709999999999994,47.46,47.40999999999998,47.35999999999999,47.04,46.97,46.85,46.910000000000004,46.99999999999999,47.220000000000006,47.43000000000001,47.57,46.87,46.46999999999999,46,45.660000000000004,45.669999999999995,45.63,45.81,46.21000000000001,46.49,46.45999999999999,46.709999999999994,46.74,46.9,46.72999999999999,46.86000000000001],"color":"green"},{"name":"anthropic","data":[51.769999999999996,52.43,52.91999999999999,53.36,53.84,54.209999999999994,54.71999999999999,55.1,55.300000000000004,55.76000000000001,55.96000000000001,56.12000000000001,56.38000000000001,56.44,56.469999999999985,56.79,56.88,56.97,56.94,56.85,56.63,56.419999999999995,56.30000000000001,57,57.38000000000001,57.87,58.18,58.18,58.23,58.06000000000002,57.64,57.35000000000001,57.36999999999999,57.15999999999999,57.12999999999999,56.980000000000004,57.14,57.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
