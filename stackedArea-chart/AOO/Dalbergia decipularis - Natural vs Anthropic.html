<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.52000000000002,80.35,80.61,79.78000000000002,78.93000000000002,78.39,78.84000000000003,78.53999999999999,78.50000000000003,78.97000000000001,78.64000000000001,79.05000000000001,80.51,80.29,80.23000000000002,80.27999999999999,79.94,79.35,79.49,79.25000000000001,78.44999999999999,78.05999999999999,77.32,77.17999999999998,75.86999999999999,73.41,71.64,70.64,70.27999999999999,70.37,70.77,72.41999999999999,72.48,71.87000000000002,71.76000000000002,71.63000000000001,71.66,71.63],"color":"green"},{"name":"anthropic","data":[24.81,24.959999999999997,24.7,25.539999999999996,26.389999999999997,26.939999999999998,26.48,26.770000000000003,26.82,26.35,26.670000000000005,26.279999999999998,24.810000000000002,25.030000000000005,25.080000000000002,25.040000000000003,25.36,25.950000000000003,25.83,26.08,26.869999999999997,27.250000000000004,28.01,28.140000000000004,29.45,31.910000000000004,33.65,34.680000000000014,35.06,34.96,34.529999999999994,32.9,32.84,33.42,33.55,33.70000000000001,33.67,33.690000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
