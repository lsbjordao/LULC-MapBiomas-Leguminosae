<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.48,77.91,77.52,77.21000000000001,77.11999999999999,77.27,77.10999999999999,76.94,76.77999999999999,76.51,76.29,76.32000000000001,76.52000000000001,76.39,76.3,76.14,76.01,75.34,74.96000000000001,74.7,74.27,73.91000000000001,73.83999999999999,73.83,73.87,73.74000000000001,73.41000000000001,73.41000000000001,73.52,73.52,73.66,73.66,73.69,73.6,73.52000000000001,73.56,73.58000000000001,73.88000000000001],"color":"green"},{"name":"anthropic","data":[22.479999999999997,23.04,23.44,23.76,23.829999999999995,23.7,23.860000000000003,24.029999999999998,24.19,24.450000000000003,24.680000000000003,24.63,24.44,24.57,24.639999999999997,24.830000000000002,24.950000000000003,25.610000000000003,25.97,26.279999999999998,26.680000000000003,27.05,27.140000000000004,27.140000000000004,27.09,27.209999999999997,27.54,27.549999999999997,27.42,27.450000000000006,27.29,27.290000000000006,27.259999999999998,27.360000000000003,27.430000000000007,27.39,27.37,27.080000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
