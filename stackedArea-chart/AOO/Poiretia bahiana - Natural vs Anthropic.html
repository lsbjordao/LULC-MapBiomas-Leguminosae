<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.66,78.49000000000001,79.49,78.34,77.88000000000001,76.02,77.02000000000001,77.66000000000001,78.01,78.39,77.77000000000002,77.77000000000001,77.75,78.22000000000003,78.40999999999998,78.86,78.78999999999998,78.41000000000001,77.92,76.49000000000001,77.05,77.76,77.75,77.99999999999999,78.04,77.55000000000001,77.1,78.05000000000001,77.55999999999999,77.31,77.44000000000001,76.83000000000001,76.93999999999998,76.95,76.47000000000001,76.50000000000001,76.40999999999998,76.23000000000002],"color":"green"},{"name":"anthropic","data":[21.380000000000003,21.560000000000002,20.560000000000002,21.709999999999997,22.169999999999998,24.029999999999998,23.039999999999996,22.380000000000003,22.030000000000005,21.650000000000002,22.26,22.28,22.29,21.85,21.630000000000003,21.180000000000003,21.250000000000004,21.640000000000004,22.12,23.54,22.99,22.29,22.28,22.029999999999998,21.990000000000002,22.49,22.940000000000005,21.990000000000002,22.469999999999995,22.740000000000002,22.599999999999998,23.2,23.1,23.09,23.59,23.54,23.64,23.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
