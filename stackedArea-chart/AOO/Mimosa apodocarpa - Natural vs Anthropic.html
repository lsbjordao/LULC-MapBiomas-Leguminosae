<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.75,60.40999999999999,57.18000000000001,56.21,55.07,53.55,53.17999999999999,51.830000000000005,51.790000000000006,51.15,50.42,49.77,49.81,48.94,48.970000000000006,48.88,48.66000000000001,48.559999999999995,48.14000000000001,46.94,47.15,45.760000000000005,48.099999999999994,47.89000000000001,47.78999999999999,47.51,47.63000000000001,46.32,47.48,47.44,46.08,46.96,46.75000000000001,46.19999999999999,45.84,45.88000000000001,43,43.1],"color":"green"},{"name":"anthropic","data":[39.4,41.75,44.97,45.96,47.03999999999999,48.57,48.959999999999994,50.330000000000005,50.38,51.02,51.75,52.400000000000006,52.379999999999995,53.230000000000004,53.199999999999996,53.3,53.53000000000001,53.64,54.050000000000004,55.26,55.03999999999999,56.440000000000005,54.06,54.26,54.35999999999999,54.690000000000005,54.580000000000005,55.86000000000001,54.71,54.73,56.07,55.2,55.41,55.96,56.34,56.31000000000001,59.199999999999996,59.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
