<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.72,61.95,62.870000000000005,63.440000000000005,63.19,62.76,61.31,60.13,59.25,58.13,56.06,53.88999999999999,52.91000000000001,52.589999999999996,52.61000000000001,52.18000000000001,51.42,51.03999999999999,50.81999999999999,50.07,49.779999999999994,49.52000000000001,48.620000000000005,48.11999999999999,48.209999999999994,48.4,48.370000000000005,48.3,48.410000000000004,48.290000000000006,48.38999999999999,48.230000000000004,48.10000000000001,47.78,47.489999999999995,47.300000000000004,47.67000000000001,48.08],"color":"green"},{"name":"anthropic","data":[37.24,38.03,37.120000000000005,36.54,36.78,37.22,38.65,39.84,40.720000000000006,41.85,43.94,46.089999999999996,47.09,47.39,47.35,47.790000000000006,48.55000000000001,48.93000000000001,49.160000000000004,49.91000000000001,50.209999999999994,50.449999999999996,51.35,51.85,51.75999999999999,51.59,51.6,51.67,51.56,51.699999999999996,51.57,51.739999999999995,51.88,52.2,52.46000000000001,52.68,52.3,51.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
