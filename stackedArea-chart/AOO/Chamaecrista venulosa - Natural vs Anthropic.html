<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.70999999999999,60.309999999999995,60.269999999999996,60.29999999999999,60.519999999999996,61.080000000000005,61.580000000000005,61.650000000000006,61.58,61.41,61.54,61.85000000000001,62.370000000000005,62.9,63.61,63.64,63.33,62.92000000000001,62.75999999999999,62.32,61.89,61.980000000000004,61.55,61.71,61.94999999999999,62.05000000000001,62.220000000000006,61.83,61.849999999999994,61.72,61.519999999999996,61.48,61.87,62.23999999999999,62.269999999999996,62.21999999999999,62.17,62.03000000000001],"color":"green"},{"name":"anthropic","data":[40.85,41.24,41.290000000000006,41.25,41.05,40.47,39.98,39.919999999999995,39.99,40.16,40.029999999999994,39.699999999999996,39.19,38.669999999999995,37.95,37.92000000000001,38.22,38.65,38.809999999999995,39.23,39.669999999999995,39.58,40.01,39.84,39.6,39.53,39.349999999999994,39.73,39.7,39.85,40.05,40.08,39.669999999999995,39.33,39.290000000000006,39.35,39.39,39.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
