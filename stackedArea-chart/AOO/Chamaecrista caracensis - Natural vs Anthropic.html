<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.569999999999986,51.75000000000001,51.42,51.06999999999999,46.279999999999994,45.309999999999995,45.04,45.26,45.690000000000005,46.18,46.57,46.57,46.51,46.99000000000001,46.91,46.580000000000005,46.49999999999999,46.64999999999999,46.84,46.96,46.97,46.69,46.96000000000001,46.519999999999996,46.15,46.03999999999999,46.09,47.05,46.8,47.98,48.349999999999994,48.39999999999999,48.93,48.80999999999999,48.43000000000001,47.92000000000001,47.260000000000005,46.9],"color":"green"},{"name":"anthropic","data":[48.8,48.63,48.96,49.300000000000004,54.1,55.07,55.33,55.120000000000005,54.68,54.199999999999996,53.8,53.809999999999995,53.85999999999999,53.4,53.48,53.809999999999995,53.870000000000005,53.730000000000004,53.519999999999996,53.42,53.410000000000004,53.69,53.44,53.88,54.230000000000004,54.330000000000005,54.3,53.32,53.58,52.39,52,51.980000000000004,51.45,51.57999999999999,51.94,52.44,53.12,53.489999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
