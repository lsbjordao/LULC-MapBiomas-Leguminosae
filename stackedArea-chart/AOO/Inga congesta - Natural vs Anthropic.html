<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.089999999999996,56.92,54.580000000000005,54.330000000000005,54.4,54.339999999999996,54.74999999999999,54.58000000000001,55.00999999999999,55.96,56.05,57,57.56000000000001,57.77999999999999,58.359999999999985,58.55,58.699999999999996,59.059999999999995,59.35,59.319999999999986,59.669999999999995,59.78999999999999,59.919999999999995,60.18999999999999,60.169999999999995,60.24,60.51000000000001,60.56,60.68,60.730000000000004,60.60000000000001,60.870000000000005,61.12,61.120000000000005,61.50000000000001,61.6,61.8,61.89],"color":"green"},{"name":"anthropic","data":[37.56,37.720000000000006,40.050000000000004,40.31,40.24,40.32,39.9,40.07,39.63999999999999,38.67,38.6,37.64,37.08,36.86,36.279999999999994,36.089999999999996,35.95,35.589999999999996,35.309999999999995,35.339999999999996,34.989999999999995,34.870000000000005,34.71,34.45,34.45,34.39,34.12,34.08,33.96,33.93,34.05,33.78,33.550000000000004,33.53,33.14,33.03,32.86,32.730000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
