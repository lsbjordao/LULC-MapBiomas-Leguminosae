<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.17999999999999,52.13,51.66,51.14000000000001,50.72000000000001,50.290000000000006,50.11000000000001,49.970000000000006,50.14000000000001,50.51,50.84,51.18,51.359999999999985,51.449999999999996,51.499999999999986,51.43,51.55,51.48,51.39,51.03000000000001,50.99000000000001,51.150000000000006,51.42999999999999,51.550000000000004,51.54,51.53,51.71999999999999,51.70000000000001,51.63999999999999,51.62,51.78,51.870000000000005,51.98,52.160000000000004,52.25999999999999,52.419999999999995,52.26999999999998,52.39],"color":"green"},{"name":"anthropic","data":[49.06,49.07000000000001,49.580000000000005,50.09,50.52,50.98,51.150000000000006,51.28,51.09,50.739999999999995,50.39000000000001,50.080000000000005,49.88,49.760000000000005,49.71,49.78999999999999,49.69,49.75000000000001,49.86,50.199999999999996,50.28,50.099999999999994,49.83,49.71,49.72,49.72,49.52,49.54,49.61,49.63,49.49,49.41,49.300000000000004,49.11999999999999,48.98999999999999,48.82999999999999,48.98,48.870000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
