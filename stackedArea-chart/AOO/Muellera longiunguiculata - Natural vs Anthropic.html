<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.379999999999995,60.53,60.56,60.370000000000005,59.980000000000004,60.01,59.91,59.57,59.449999999999996,58.690000000000005,58.650000000000006,58.88,58.24,57.910000000000004,58.01,58.160000000000004,58.18,58.39,58.53,58.78000000000001,58.94000000000001,58.97,59.13999999999999,59.18,59.08,59.09,59.15,59.62,60.339999999999996,60.71,60.779999999999994,61.05,61.32,61.4,61.82,61.760000000000005,62.13,62.56],"color":"green"},{"name":"anthropic","data":[46.809999999999995,45.660000000000004,45.62,45.82,46.21,46.169999999999995,46.29,46.620000000000005,46.739999999999995,47.49,47.540000000000006,47.31,47.94,48.269999999999996,48.19,48.019999999999996,48,47.8,47.66000000000001,47.42,47.25000000000001,47.22,47.06,47.01,47.120000000000005,47.099999999999994,47.04,46.59,45.85,45.480000000000004,45.41000000000001,45.150000000000006,44.87,44.8,44.370000000000005,44.43000000000001,44.07,43.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
