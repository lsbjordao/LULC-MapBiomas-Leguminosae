<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.07,30.23,30.090000000000003,29.860000000000003,29.589999999999996,29.55,29.38,29.28,29.190000000000005,29.7,29.800000000000008,30.039999999999996,30.249999999999996,29.989999999999995,30.1,29.89,30.169999999999995,30.32,30.72,31.17,31.32,31.56,31.41,31.259999999999998,31.429999999999996,31.189999999999998,31.349999999999998,31.43,31.48,31.890000000000004,32.37,32.489999999999995,32.949999999999996,33.41,33.62,33.8,33.93,33.88999999999999],"color":"green"},{"name":"anthropic","data":[69.58000000000001,69.43,69.59,69.78999999999999,70.07999999999998,70.13,70.28,70.39000000000001,70.48000000000002,69.97000000000001,69.86000000000001,69.62,69.41999999999999,69.65999999999998,69.55999999999999,69.75999999999999,69.5,69.36000000000001,68.93,68.50000000000001,68.35000000000001,68.1,68.26,68.42,68.25,68.48999999999998,68.31999999999998,68.25,68.16999999999999,67.77999999999999,67.29000000000002,67.17000000000002,66.72000000000001,66.25000000000001,66.05000000000001,65.86000000000001,65.72000000000003,65.79000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
