<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.05,85.36,85.92,87.15,86.85,87.08000000000001,87.91,87.99,88.19000000000001,89.49,90.05000000000001,89.76,89.19,89.02,88.92,88.9,88.87,88.89000000000001,88.67,88.51000000000002,88.57000000000001,88.66999999999999,89.02999999999999,89.35999999999999,89.31,89.28999999999998,89.32,89.61,89.78,90.01,89.92999999999999,89.73,89.73,89.93,90.09,89.86000000000001,89.82000000000002,89.47],"color":"green"},{"name":"anthropic","data":[13.54,14.219999999999999,13.649999999999999,12.42,12.74,12.509999999999998,11.66,11.58,11.39,10.08,9.52,9.809999999999999,10.39,10.559999999999999,10.67,10.67,10.7,10.68,10.92,11.07,11,10.899999999999999,10.55,10.219999999999999,10.259999999999998,10.28,10.259999999999998,9.98,9.8,9.559999999999999,9.649999999999999,9.85,9.849999999999998,9.649999999999999,9.49,9.719999999999999,9.76,10.129999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
