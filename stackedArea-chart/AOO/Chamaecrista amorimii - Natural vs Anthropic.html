<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.16,87.53999999999999,85.45,83.53,81.80000000000001,81.69,81.44000000000001,81.77000000000001,81.05000000000001,80.41000000000001,79.47,79.59,77.10000000000001,76.5,74.10000000000001,72.46000000000001,71.54,70.35000000000001,69.99,69.45,67.59,67.02000000000001,66.87,67.78,69.5,70.47,71.64,71.8,72.28,72.38,72.14999999999999,72.05999999999999,71.84,72.10000000000001,72.09,73.51,74.32000000000001,76.32],"color":"green"},{"name":"anthropic","data":[9.989999999999998,12.6,14.7,16.619999999999997,18.35,18.46,18.7,18.37,19.09,19.75,20.67,20.55,23.049999999999997,23.65,26.04,27.689999999999998,28.61,29.799999999999997,30.17,30.700000000000003,32.56,33.120000000000005,33.269999999999996,32.36,30.65,29.68,28.51,28.330000000000002,27.87,27.769999999999996,28,28.09,28.31,28.049999999999997,28.05,26.630000000000003,25.82,23.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
