<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.63000000000001,71.75,69.32,68.1,67.27000000000001,66.76,57.629999999999995,57.72,61.79,63.4,64.58,65.84,65.08,65.05000000000001,64.30000000000001,65.25,65.61000000000001,66.52000000000001,67.63,68.13000000000001,66.11,66.31,66.91999999999999,66.61,66.53,66.02,65.77,66.64,66.67999999999999,67.37,67.52000000000001,66.71000000000001,66.82000000000001,66.92,67.11999999999999,67.47999999999999,67.49000000000001,67.27000000000001],"color":"green"},{"name":"anthropic","data":[29.3,29.169999999999998,31.6,32.83,33.650000000000006,34.17,43.29,43.19,39.129999999999995,37.52,36.34,35.09,35.85,35.870000000000005,36.63,35.68,35.31,34.41,33.3,32.79,34.82,34.61,34.010000000000005,34.309999999999995,34.41,34.89,35.150000000000006,34.269999999999996,34.24,33.55,33.4,34.2,34.1,34.010000000000005,33.81,33.46,33.43,33.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
