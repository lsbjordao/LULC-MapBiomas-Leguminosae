<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.78999999999999,77.64999999999999,77.82,77.67999999999999,77.58999999999999,77.47999999999999,77.14,76.76,76.37,75.80999999999999,75.47999999999999,75.14999999999999,74.87,74.67999999999999,74.79,74.73,74.71000000000001,74.59,74.60000000000001,74.42,74.25999999999999,74.23,74.05000000000001,73.78999999999999,73.7,73.49999999999999,73.41,73.38,73.4,73.38000000000001,73.26,73.30999999999999,73.38999999999999,73.3,73.17,73.00999999999999,72.85,72.60000000000001],"color":"green"},{"name":"anthropic","data":[25.959999999999997,26.09,25.92,26.070000000000004,26.14,26.259999999999998,26.59,26.96,27.36,27.929999999999996,28.25,28.599999999999998,28.880000000000003,29.05,28.96,29.01,29.030000000000005,29.160000000000004,29.15,29.32,29.480000000000004,29.500000000000007,29.68,29.970000000000002,30.03,30.24,30.330000000000002,30.35,30.330000000000002,30.39,30.47,30.450000000000003,30.350000000000005,30.450000000000003,30.56,30.73,30.900000000000002,31.150000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
