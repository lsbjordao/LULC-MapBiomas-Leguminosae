<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.019999999999996,28.72,26.79,26.89,24.82,24.17,24.720000000000002,24.89,25.37,25.610000000000003,25.820000000000004,26.569999999999997,26.689999999999998,27.11,27.94,28.67,28.94,29.04,28.92,28.900000000000002,28.9,29.36,29.6,29.75,30.45,29.92,29.82,29.84,30.230000000000004,30.470000000000006,30.71,30.870000000000005,30.88,31.150000000000002,31.36,31.3,31.299999999999997,31.509999999999998],"color":"green"},{"name":"anthropic","data":[75.41999999999999,75.72,77.65,77.55,79.63,80.28,79.72999999999999,79.56,79.08,78.83,78.63,77.86999999999999,77.77,77.33,76.49,75.77,75.49000000000001,75.42,75.53000000000002,75.55,75.55999999999999,75.1,74.85,74.69,74.00999999999999,74.53,74.64,74.58999999999999,74.21,73.96,73.75,73.59,73.58,73.3,73.11,73.14999999999999,73.15,72.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
