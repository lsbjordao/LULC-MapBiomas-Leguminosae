<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.089999999999996,60.449999999999996,59.36999999999999,58.190000000000005,57.46000000000001,57.01000000000001,57.550000000000004,57.190000000000005,57.42,57.33999999999999,57.24,57.19,57.96,58.22,58.220000000000006,58.660000000000004,58.61999999999999,58.629999999999995,58.36,58.75000000000001,58.580000000000005,58.63000000000001,58.69999999999999,59.06,58.93,59.220000000000006,59.370000000000005,59.37,58.49000000000001,57.50000000000001,56.790000000000006,56.49,56.050000000000004,56.11,56.35999999999999,57.56,57.290000000000006,57.579999999999984],"color":"green"},{"name":"anthropic","data":[43.81,44.470000000000006,45.550000000000004,46.72,47.48,47.9,47.35,47.720000000000006,47.49,47.58,47.68,47.73000000000001,46.93000000000001,46.720000000000006,46.67000000000001,46.23999999999999,46.290000000000006,46.29,46.56999999999999,46.17999999999999,46.35,46.28000000000001,46.190000000000005,45.85,45.980000000000004,45.7,45.55,45.56,46.42,47.42000000000001,48.13,48.42,48.85999999999999,48.8,48.56999999999999,47.37,47.629999999999995,47.349999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
