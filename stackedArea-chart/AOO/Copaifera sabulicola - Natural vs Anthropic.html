<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81,80.98999999999998,80.41000000000001,80.19999999999999,79.55,79.49,79.60000000000002,79.58,79.93999999999998,80.41000000000001,80.41,80.66000000000003,80.83000000000003,80.94,80.79000000000002,81.46,81.94000000000001,82.00999999999999,81.77,81.72999999999999,81.4,81.39000000000001,81.15000000000002,80.83000000000001,79.1,78.14,77.37,76.29,74.78,73.93,73.02,72.24,71.63,71.29,70.84,70.21,67.42999999999999,66.71000000000001],"color":"green"},{"name":"anthropic","data":[19.709999999999997,19.709999999999997,20.3,20.490000000000002,21.16,21.21,21.110000000000003,21.14,20.780000000000005,20.290000000000003,20.32,20.050000000000004,19.890000000000004,19.76,19.92,19.23,18.770000000000003,18.73,18.93,18.979999999999997,19.31,19.32,19.560000000000002,19.900000000000002,21.620000000000005,22.569999999999997,23.340000000000003,24.44,25.940000000000005,26.770000000000003,27.690000000000005,28.450000000000003,29.090000000000003,29.409999999999997,29.88,30.5,33.290000000000006,34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
