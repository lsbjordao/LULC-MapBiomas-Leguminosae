<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.12,99.24,99.36999999999999,99.28999999999998,99.03,98.66999999999999,98.58,98.38999999999999,98.31000000000002,98.44,98.64000000000001,98.53,98.23999999999998,97.82,97.68999999999998,97.73,97.61,97.38999999999999,97.06000000000002,97.10000000000001,97.29,97.19,97.27999999999999,97.52000000000001,97.47999999999999,97.28,97.27000000000001,97.3,97.37,97.4,97.28000000000002,97.10999999999999,97.32,97.61999999999999,97.7,97.61999999999999,97.58000000000001,96.24000000000001],"color":"green"},{"name":"anthropic","data":[0.47,0.35,0.23,0.3,0.57,0.92,1.01,1.21,1.28,1.15,0.96,1.07,1.34,1.78,1.9,1.85,1.98,2.1999999999999997,2.53,2.51,2.3,2.38,2.3,2.07,2.0999999999999996,2.3099999999999996,2.3099999999999996,2.3,2.21,2.17,2.3099999999999996,2.4699999999999998,2.26,1.96,1.8800000000000001,1.97,2.01,3.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
