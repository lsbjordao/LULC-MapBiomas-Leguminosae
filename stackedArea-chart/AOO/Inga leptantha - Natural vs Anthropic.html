<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.19000000000001,65.44000000000001,64.88000000000001,64.14999999999999,63.449999999999996,63.33999999999999,63.209999999999994,63.720000000000006,63.84,63.73,63.61,63.85999999999999,63.879999999999995,63.61999999999999,63.66,63.510000000000005,63.56,63.480000000000004,63.38,63.37,63.449999999999996,63.60000000000001,63.81,63.870000000000005,64.27,64.33,64.43,64.47,64.39000000000001,64.30000000000001,64.37,64.33,64.42,65.13999999999999,64.99,64.86,64.82000000000001,64.55],"color":"green"},{"name":"anthropic","data":[36.82,36.61,37.17999999999999,37.919999999999995,38.599999999999994,38.72,38.88,38.35,38.21,38.32999999999999,38.46000000000001,38.2,38.19,38.440000000000005,38.4,38.550000000000004,38.510000000000005,38.59,38.67000000000001,38.68,38.62,38.46,38.24,38.21000000000001,37.79,37.75000000000001,37.65,37.58,37.68,37.76,37.72,37.739999999999995,37.64,36.92,37.08,37.22,37.23,37.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
