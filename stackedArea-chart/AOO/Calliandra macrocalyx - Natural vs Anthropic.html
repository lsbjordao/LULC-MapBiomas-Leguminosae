<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.99,66.94,66.45,66.29,65.78,66.14,66.69,66.78999999999999,66.71,66.88,66.75,65.98,67.44,67.92999999999999,68.09,68.16999999999999,68.14999999999999,67.98,68.22,68.78999999999999,68.07000000000001,67.47999999999999,67.32,67.05,66.66,67.07000000000001,66.57,65.07000000000001,63.66999999999999,61.959999999999994,61.11,61.519999999999996,61.959999999999994,62.35999999999999,62.65,63.05,62.94,63.17],"color":"green"},{"name":"anthropic","data":[34.68,34.730000000000004,35.2,35.36000000000001,35.879999999999995,35.52,34.95,34.85999999999999,34.93,34.78,34.910000000000004,35.67,34.199999999999996,33.73,33.56,33.5,33.489999999999995,33.69,33.44,32.879999999999995,33.58,34.17999999999999,34.339999999999996,34.6,34.99,34.58,35.08,36.59,38,39.690000000000005,40.550000000000004,40.14,39.71,39.300000000000004,39.01,38.61999999999999,38.71999999999999,38.499999999999986],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
