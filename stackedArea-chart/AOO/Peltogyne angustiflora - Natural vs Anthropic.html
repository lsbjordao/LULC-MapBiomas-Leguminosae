<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.93,58.339999999999996,57.739999999999995,57.459999999999994,57.24999999999999,57.05,56.699999999999996,56.77,56.97,57,57.06999999999999,57.4,57.33,57.25000000000001,57.28000000000001,57.400000000000006,57.620000000000005,57.87,58.24999999999999,58.51,58.67000000000001,59.13,59.33,59.339999999999996,59.45000000000001,59.36,59.559999999999995,59.78999999999999,59.93,60.02,60.18,60.17,60.17,60.480000000000004,60.9,61.14000000000001,61.42999999999999,61.86],"color":"green"},{"name":"anthropic","data":[42.24999999999999,42.839999999999996,43.449999999999996,43.73,43.940000000000005,44.11999999999999,44.48,44.4,44.21,44.169999999999995,44.1,43.800000000000004,43.870000000000005,43.92,43.89,43.75000000000001,43.54,43.31,42.93,42.68000000000001,42.52,42.050000000000004,41.85,41.85,41.75,41.82,41.62,41.4,41.25,41.150000000000006,41,41.03,41.01,40.69,40.269999999999996,40.029999999999994,39.75,39.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
