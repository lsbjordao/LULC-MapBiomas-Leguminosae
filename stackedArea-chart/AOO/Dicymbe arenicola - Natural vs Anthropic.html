<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.52,87.19,87.10000000000001,86.14,85.7,86.62,87.21999999999998,87.71,88.71000000000001,89.84000000000002,90.55,89.86999999999999,89.74000000000001,89.46,88.28000000000002,87.61000000000001,86.88000000000001,86.61,87.41999999999999,87.44999999999999,87.76,87.75999999999999,87.84,87.92,88.04,88.36,88.64,89.08999999999999,89.33000000000001,88.85999999999999,88.60000000000001,88.7,88.71000000000001,88.53,88.45,88.07,88.05999999999999,87.72999999999999],"color":"green"},{"name":"anthropic","data":[14.02,12.36,12.459999999999999,13.41,13.84,12.93,12.35,11.84,10.84,9.709999999999999,8.99,9.670000000000002,9.82,10.100000000000001,11.27,11.950000000000001,12.67,12.94,12.13,12.110000000000001,11.790000000000001,11.799999999999999,11.7,11.61,11.510000000000002,11.2,10.9,10.46,10.22,10.68,10.95,10.86,10.84,11.010000000000002,11.110000000000001,11.48,11.49,11.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
