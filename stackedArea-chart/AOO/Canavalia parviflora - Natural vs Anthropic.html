<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.77000000000001,52.650000000000006,51.93000000000001,51.33,50.94,50.61999999999999,50.42,50.339999999999996,50.83000000000001,51.64000000000001,51.86999999999999,52.18000000000001,52.49999999999999,52.5,52.85,52.77,52.47999999999999,52.35,52.29,52.489999999999995,52.71,53.06,53.41999999999999,53.720000000000006,53.92999999999999,53.970000000000006,53.89,53.49,53.459999999999994,53.76999999999999,54.21,54.8,54.95999999999999,55.23999999999999,55.540000000000006,55.559999999999995,55.750000000000014,56.28],"color":"green"},{"name":"anthropic","data":[50.83999999999999,49.96,50.65,51.279999999999994,51.68000000000001,51.96,52.190000000000005,52.26,51.77,50.97,50.739999999999995,50.43000000000001,50.12,50.1,49.77,49.82,50.13,50.260000000000005,50.31,50.11,49.9,49.53,49.169999999999995,48.88,48.65,48.64,48.720000000000006,49.11,49.13,48.800000000000004,48.410000000000004,47.81,47.660000000000004,47.379999999999995,47.08,47.05,46.88999999999999,46.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
