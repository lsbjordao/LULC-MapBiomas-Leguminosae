<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.69000000000001,67.43999999999998,65.46,64.17,63.480000000000004,63.440000000000005,63.36,63.79,64.25,63.82999999999999,63.60999999999999,63.349999999999994,63.22,62.650000000000006,61.790000000000006,61.12,61.51,61.22,61.65,61.790000000000006,61.56999999999999,61.60999999999999,61.919999999999995,62.099999999999994,63.449999999999996,64.03,63.92,64.23,64.17,63.92,63.86000000000001,63.61,63.38,63.38999999999999,63.83000000000001,64.32,65.32000000000001,66.08],"color":"green"},{"name":"anthropic","data":[32.6,33.84,35.839999999999996,37.13,37.8,37.85,37.940000000000005,37.49,37.050000000000004,37.45,37.7,37.94,38.07,38.63,39.5,40.16,39.78,40.07,39.64,39.480000000000004,39.72,39.68,39.36,39.19,37.839999999999996,37.239999999999995,37.36,37.06,37.129999999999995,37.35,37.410000000000004,37.67,37.91,37.89,37.46,36.959999999999994,35.97,35.209999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
