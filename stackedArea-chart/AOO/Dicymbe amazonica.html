<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[42.56,42.53,41.31,41.3,42.57,42.57,42.55,42.55,42.03,42.14,42.45,42.42,42.47,42.54,42.26,42.18,42.3,42.11,41.99,42.02,42.16,42.22,42.22,42.3,42.28,42.03,41.56,41.57,42.27,42.27,42.1,42.21,42.49,42.55,42.32,42.1,41.85,41.54],"color":"#006400"},{"name":"Flooded forest","data":[6.14,6.46,6.1,5.96,6.26,6.36,6.37,6.35,5.61,5.87,6.12,6.13,5.97,6.13,6.18,6.01,6.06,6.12,6.23,6.23,6.59,6.57,6.52,6.54,6.5,6.52,6.54,6.42,6.27,6.46,6.38,6.51,6.67,6.85,6.89,6.89,6.96,6.83],"color":"#76A5AF"},{"name":"Wetland","data":[0.51,0,0.18,0.19,0.12,0.03,0,0,0.55,0.34,0.29,0.28,0.29,0.19,0.19,0.36,0.38,0.37,0.36,0.37,0.39,0.34,0.33,0.37,0.39,0.37,0.4,0.47,0.67,0.41,0.49,0.39,0.34,0.22,0.22,0.24,0.13,0.41],"color":"#45C2A5"},{"name":"Pasture","data":[0,0,1.41,1.42,0.01,0.01,0.01,0.01,0.42,0.42,0.16,0.16,0.11,0.07,0.35,0.42,0.3,0.49,0.6,0.57,0.49,0.48,0.47,0.38,0.39,0.66,1.23,1.21,0.52,0.52,0.64,0.56,0.35,0.38,0.6,0.76,0.98,1.21],"color":"#FFD966"},{"name":"River, lake and ocean","data":[50.31,50.52,50.52,50.65,50.56,50.54,50.58,50.6,50.89,50.74,50.5,50.52,50.67,50.58,50.54,50.54,50.47,50.42,50.33,50.32,49.87,49.91,49.97,49.91,49.95,49.92,49.78,49.83,49.78,49.85,49.9,49.83,49.65,49.52,49.47,49.52,49.58,49.52],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
