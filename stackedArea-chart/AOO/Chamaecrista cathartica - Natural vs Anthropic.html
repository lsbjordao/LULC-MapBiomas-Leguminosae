<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.63,50.339999999999996,50.3,50.13999999999999,49.78999999999999,49.67,49.440000000000005,49.27,49.150000000000006,49.23,49.379999999999995,49.51,49.56000000000001,49.67999999999999,49.82,49.830000000000005,50.07,50.08,50.09,50.13,50.27,50.37,50.449999999999996,50.620000000000005,50.739999999999995,50.97999999999999,51.03,51.029999999999994,51.15,51.370000000000005,51.57,51.67000000000001,51.76,51.82,51.790000000000006,51.78000000000001,51.870000000000005,52.09000000000001],"color":"green"},{"name":"anthropic","data":[52.48000000000001,52.769999999999996,52.78999999999999,52.970000000000006,53.32,53.42999999999999,53.67000000000001,53.83000000000001,53.96,53.87,53.75,53.6,53.57000000000001,53.45,53.29,53.29,53.02,53.04,53.04,52.980000000000004,52.830000000000005,52.760000000000005,52.669999999999995,52.489999999999995,52.35999999999999,52.12,52.07000000000001,52.080000000000005,51.98,51.72999999999999,51.529999999999994,51.46,51.35000000000001,51.29,51.35,51.32,51.239999999999995,51.019999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
