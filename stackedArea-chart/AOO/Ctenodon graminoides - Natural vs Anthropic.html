<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.830000000000005,58.77,59.01,58.36,56.879999999999995,55.19,54.24,51.900000000000006,51.650000000000006,51.89000000000001,51.800000000000004,51.900000000000006,51.40999999999999,50.62,50.01,49.77,49.73,49.6,49.27,49.64,49.75000000000001,49.43,49.970000000000006,49.92000000000001,50.31000000000001,50.54,50.760000000000005,51.18,50.89,49.050000000000004,47.03000000000001,46.43,46.71000000000001,46.13,45.980000000000004,45.59,45.39,46.20000000000001],"color":"green"},{"name":"anthropic","data":[38.949999999999996,41.019999999999996,40.77000000000001,41.42,42.89000000000001,44.59,45.52,47.849999999999994,48.13,47.879999999999995,47.970000000000006,47.88,48.36,49.17,49.78000000000001,50.010000000000005,50.03999999999999,50.18,50.510000000000005,50.14,50.04,50.35,49.800000000000004,49.86,49.48,49.220000000000006,49.01,48.60999999999999,48.910000000000004,50.72,52.74,53.34,53.06,53.66,53.8,54.19,54.4,53.58],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
