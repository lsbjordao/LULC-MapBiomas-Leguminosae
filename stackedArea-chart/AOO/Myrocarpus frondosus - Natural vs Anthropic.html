<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.14000000000001,56.440000000000005,56.26,56.05,56.07000000000001,56.09000000000001,56.25000000000001,56.339999999999996,56.67,57.14,57.43000000000001,57.86,58.38,58.70000000000001,59.040000000000006,59.29000000000001,59.660000000000004,59.870000000000005,60.1,60.24,60.550000000000004,60.79000000000001,60.96000000000001,61.09,61.220000000000006,61.459999999999994,61.73999999999999,61.900000000000006,62.21,62.339999999999996,62.650000000000006,62.75999999999999,62.900000000000006,63.06,63.07,63.00000000000001,63.160000000000004,63.029999999999994],"color":"green"},{"name":"anthropic","data":[47.760000000000005,47.489999999999995,47.639999999999986,47.86000000000001,47.879999999999995,47.9,47.74,47.660000000000004,47.34999999999999,46.849999999999994,46.61,46.14999999999999,45.65,45.32999999999999,44.99,44.730000000000004,44.339999999999996,44.12,43.88999999999999,43.75999999999999,43.449999999999996,43.230000000000004,43.040000000000006,42.92000000000001,42.8,42.53,42.269999999999996,42.09,41.809999999999995,41.67,41.35,41.279999999999994,41.14000000000001,40.84,40.95,41.019999999999996,40.88,41.029999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
