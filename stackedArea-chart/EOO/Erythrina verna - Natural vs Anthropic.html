<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.96000000000001,65.66,64.97,64.33000000000001,63.63000000000001,63.160000000000004,62.649999999999984,61.97999999999999,61.32,60.66,59.86999999999999,59.24000000000001,58.77000000000001,58.230000000000004,57.63,57.12,56.68,56.08,55.35000000000001,54.72,54.23,53.89000000000001,53.7,53.51000000000001,53.410000000000004,53.29,53.09,52.85,52.56000000000001,52.24,51.98000000000002,51.82000000000001,51.620000000000005,51.47,51.24,51.04,50.75,50.38],"color":"green"},{"name":"anthropic","data":[30.98,31.279999999999998,31.930000000000003,32.61,33.29,33.77999999999999,34.279999999999994,34.95999999999999,35.599999999999994,36.269999999999996,37.07,37.709999999999994,38.21000000000001,38.74,39.31,39.830000000000005,40.28,40.85,41.580000000000005,42.23000000000001,42.71999999999999,43.03999999999999,43.220000000000006,43.43,43.54000000000001,43.64,43.82,44.09,44.36,44.67999999999999,44.949999999999996,45.120000000000005,45.29,45.480000000000004,45.71999999999999,45.89,46.209999999999994,46.57999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
