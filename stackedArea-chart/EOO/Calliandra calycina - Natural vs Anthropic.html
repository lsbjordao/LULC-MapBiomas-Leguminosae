<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.82,48.690000000000005,47.78,46.9,46.05,45.37,44.859999999999985,44.25999999999999,43.9,43.59000000000001,43.470000000000006,43.59,43.949999999999996,43.92000000000001,44.11000000000001,44.03,43.760000000000005,43.63,43.51,43.39,43.52,43.78000000000001,43.75,43.589999999999996,43.19,42.969999999999985,42.92,42.77,42.660000000000004,42.69999999999999,42.83,43.22,43.17000000000001,43.17999999999999,43.22,43.11,43.239999999999995,43.44],"color":"green"},{"name":"anthropic","data":[50.98,51.1,52.01,52.86,53.74999999999999,54.410000000000004,54.93,55.5,55.86,56.21000000000001,56.330000000000005,56.2,55.84,55.879999999999995,55.68,55.74,56.01,56.15,56.26,56.37,56.25,55.99,56.03,56.17,56.59,56.800000000000004,56.88999999999999,57.019999999999996,57.13,57.07,56.96000000000001,56.56,56.6,56.59,56.569999999999986,56.65,56.54,56.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
