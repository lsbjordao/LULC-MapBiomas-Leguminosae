<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.96000000000002,75.67,75.1,74.57000000000001,74.04999999999998,73.6,73.14999999999999,72.52,71.98,71.43,70.66000000000003,70.01000000000002,69.43,68.86000000000001,68.30000000000003,67.78000000000003,67.34,66.77000000000002,66.07000000000001,65.37,64.82000000000001,64.44999999999999,64.2,63.88,63.730000000000004,63.55000000000001,63.230000000000004,63.08,62.87,62.61000000000001,62.370000000000005,62.11,61.849999999999994,61.65,61.17,60.86,60.36,59.81000000000001],"color":"green"},{"name":"anthropic","data":[21.94000000000001,22.22,22.759999999999994,23.330000000000005,23.830000000000005,24.279999999999998,24.71,25.349999999999998,25.85000000000001,26.44000000000001,27.18,27.849999999999998,28.409999999999997,29.009999999999998,29.569999999999997,30.050000000000004,30.500000000000004,31.06,31.770000000000003,32.500000000000014,33.02000000000001,33.38,33.63000000000001,33.94,34.059999999999995,34.21,34.6,34.75999999999999,34.95999999999999,35.18999999999999,35.449999999999996,35.639999999999986,35.98999999999999,36.05999999999999,36.65999999999999,36.93999999999998,37.36,38.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
