<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.05,64.89,62.19999999999999,60.33,60.98,61.82,64.39,65.53,68.50999999999999,74.13000000000001,74.8,75.49999999999999,77.61,80.16999999999999,83.4,83.94000000000001,85.01,83.11999999999999,83.17999999999999,82.17,79.98,80.03,79.43,80.24,82.22,84.67,86.10000000000001,86.44999999999999,87.31999999999998,88.2,88.53999999999999,88.21,89.97999999999999,90.75000000000001,90.75,90.79999999999998,90.81999999999998,90.85],"color":"green"},{"name":"anthropic","data":[33.35,34.5,37.199999999999996,39.07,38.42,37.57,34.989999999999995,33.86,30.89,25.28,24.589999999999996,23.88,21.79,19.21,16,15.46,14.39,16.27,16.240000000000002,17.22,19.42,19.37,19.96,19.150000000000002,17.180000000000003,14.72,13.29,12.95,12.07,11.19,10.86,11.18,9.43,8.649999999999999,8.639999999999999,8.59,8.57,8.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
