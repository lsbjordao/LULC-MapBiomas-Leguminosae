<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.81000000000001,49.42,48.67999999999999,48.06,47.36,46.89,46.400000000000006,45.82,45.260000000000005,44.830000000000005,44.37,43.99000000000001,43.779999999999994,43.57,43.33,43.02,42.780000000000015,42.57000000000002,42.26000000000001,42.01,41.84000000000001,41.74000000000001,41.68000000000001,41.620000000000005,41.58,41.51000000000001,41.400000000000006,41.170000000000016,40.890000000000015,40.63,40.47,40.42000000000001,40.36,40.290000000000006,40.17000000000001,40.11000000000001,39.980000000000004,40.059999999999995],"color":"green"},{"name":"anthropic","data":[46.10000000000001,46.52,47.24999999999999,47.87999999999999,48.55999999999999,49.04,49.51999999999999,50.120000000000005,50.66000000000001,51.1,51.56000000000001,51.92000000000001,52.13,52.36000000000001,52.6,52.88999999999998,53.14,53.349999999999994,53.66,53.929999999999986,54.09999999999999,54.18000000000001,54.23,54.31,54.35999999999999,54.39000000000001,54.51,54.769999999999996,55.019999999999996,55.290000000000006,55.459999999999994,55.53,55.570000000000014,55.65000000000001,55.739999999999995,55.85,55.940000000000005,55.900000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
