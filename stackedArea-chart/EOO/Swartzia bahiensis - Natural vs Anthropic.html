<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.5,49.7,48.760000000000005,48.52,47.879999999999995,47.28,46.9,46.46,46.19,46.05,46.13,46.46999999999999,46.88000000000001,46.90999999999999,47.269999999999996,47.36,47.10000000000001,47.14000000000001,46.99999999999999,46.74,46.949999999999996,47.04999999999999,46.88999999999999,46.84,46.190000000000005,45.870000000000005,45.580000000000005,45.269999999999996,45.39,45.370000000000005,45.52,45.74,45.49000000000001,45.43,45.39,45.25000000000001,45.45,45.67],"color":"green"},{"name":"anthropic","data":[43.37,43.14,44.08,44.339999999999996,44.97,45.580000000000005,45.96,46.38,46.660000000000004,46.8,46.72,46.38999999999999,45.989999999999995,45.94999999999999,45.6,45.54,45.769999999999996,45.75,45.88,46.129999999999995,45.919999999999995,45.83,45.97999999999999,46.029999999999994,46.67999999999999,46.99999999999999,47.3,47.60999999999999,47.480000000000004,47.51,47.35,47.129999999999995,47.370000000000005,47.42999999999999,47.49000000000001,47.60999999999999,47.43,47.19],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
