<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.9,79.95,79.58000000000001,79.07000000000002,78.47000000000001,77.96,77.41,76.83,76.28000000000002,75.93,75.44000000000001,74.93,74.7,74.28,73.81,73.37000000000002,72.80000000000001,72.37999999999998,71.84,71.08999999999999,70.42999999999999,69.96,69.64,69.36,69.1,68.8,68.44,67.64999999999998,66.74999999999997,66.06999999999998,65.46,65.14,64.78999999999999,64.47,64.06,63.599999999999994,63.099999999999994,62.68],"color":"green"},{"name":"anthropic","data":[19.390000000000004,19.349999999999994,19.73,20.21,20.83,21.34,21.89,22.470000000000002,23.01,23.35,23.85000000000001,24.36000000000001,24.570000000000007,25.000000000000004,25.480000000000004,25.920000000000005,26.47000000000001,26.91000000000001,27.430000000000007,28.180000000000007,28.840000000000007,29.300000000000008,29.63000000000001,29.910000000000004,30.190000000000005,30.480000000000004,30.820000000000007,31.620000000000005,32.53,33.199999999999996,33.83,34.14,34.48,34.8,35.19999999999999,35.65000000000001,36.17,36.580000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
