<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.21,70.91,70.91999999999999,70.8,70.67,70.54,70.28999999999999,70.16,69.97,69.91,69.85,69.89999999999999,69.78999999999999,69.9,69.81,69.57000000000001,69.58,69.46,69.33999999999999,69.22,69.16,69.24999999999999,69.11,68.99,69.16999999999999,69.03,69.02,69.11,69.24,69.55,69.85000000000001,69.94000000000001,70.14,70.14,69.99,69.79,69.61,69.18],"color":"green"},{"name":"anthropic","data":[27.88,29.19,29.17,29.299999999999997,29.43,29.570000000000004,29.8,29.930000000000003,30.15,30.2,30.240000000000006,30.180000000000003,30.290000000000003,30.180000000000003,30.290000000000003,30.509999999999998,30.509999999999998,30.650000000000002,30.759999999999998,30.880000000000003,30.93,30.85,30.980000000000004,31.1,30.92,31.07,31.08,30.990000000000002,30.86,30.540000000000003,30.230000000000004,30.17,29.950000000000003,29.95,30.1,30.290000000000003,30.490000000000002,30.900000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
