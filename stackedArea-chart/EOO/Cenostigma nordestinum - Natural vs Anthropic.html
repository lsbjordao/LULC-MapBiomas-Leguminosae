<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.38,61.08,60.43,59.81999999999999,59.16,58.64000000000001,58.15999999999999,57.57999999999999,57.05,56.669999999999995,56.30999999999999,56.01999999999999,55.879999999999995,55.55999999999999,55.21999999999999,54.9,54.559999999999995,54.27999999999999,53.899999999999984,53.44,53.149999999999984,52.97999999999999,52.83999999999998,52.739999999999995,52.65999999999999,52.50999999999999,52.32999999999999,51.87999999999999,51.489999999999995,51.07999999999999,50.830000000000005,50.699999999999996,50.559999999999995,50.47,50.31999999999998,50.139999999999986,49.97999999999999,49.95999999999999],"color":"green"},{"name":"anthropic","data":[37.34999999999999,37.66,38.300000000000004,38.90999999999999,39.58999999999999,40.07999999999999,40.54999999999999,41.13999999999999,41.690000000000005,42.04,42.41,42.699999999999996,42.84,43.160000000000004,43.48999999999999,43.819999999999986,44.13999999999999,44.46,44.849999999999994,45.26,45.58,45.730000000000004,45.88000000000001,45.97999999999999,46.07,46.23000000000001,46.400000000000006,46.83,47.239999999999995,47.63000000000002,47.890000000000015,48.019999999999996,48.14,48.220000000000006,48.40000000000001,48.540000000000006,48.71000000000001,48.740000000000016],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
