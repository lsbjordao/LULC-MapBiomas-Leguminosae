<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.32000000000001,73.12,72.45000000000002,71.88000000000001,71.13000000000001,70.43000000000002,69.86000000000001,69.32000000000001,68.78,68.74,68.82000000000001,69.03000000000002,69.65000000000002,69.53000000000002,69.51,69.44000000000001,69.12,69.05,68.72000000000001,68.33,67.99000000000001,67.88,67.58,67.62000000000002,67.64000000000001,67.64000000000001,67.45000000000002,66.96,66.49000000000001,66.10999999999999,65.87000000000002,65.97,65.9,65.91999999999999,65.91,65.93,65.85,65.9],"color":"green"},{"name":"anthropic","data":[26.22,26.410000000000004,27.09,27.66,28.410000000000004,29.14,29.67,30.220000000000002,30.75,30.82,30.740000000000002,30.53,29.900000000000006,30.02,30.040000000000003,30.08,30.430000000000003,30.500000000000014,30.820000000000004,31.200000000000006,31.570000000000004,31.660000000000007,31.98000000000001,31.930000000000007,31.920000000000005,31.900000000000006,32.09000000000001,32.6,33.07999999999999,33.43,33.67,33.589999999999996,33.629999999999995,33.62,33.64999999999999,33.629999999999995,33.699999999999996,33.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
