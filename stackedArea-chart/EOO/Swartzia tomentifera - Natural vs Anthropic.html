<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.72,98.74000000000001,98.71999999999998,98.69999999999999,98.66999999999999,98.70000000000002,98.74000000000001,98.69,98.63000000000001,98.62,98.66999999999999,98.62,98.52,98.34,98.24000000000001,98.27999999999999,98.32999999999998,98.3,98.26,98.23,98.14999999999999,98.10000000000001,98.13,98.16999999999999,98.07000000000001,97.95,97.94000000000001,98.02999999999999,98.05000000000001,98.00999999999999,97.86,97.63999999999999,97.64999999999999,97.73000000000002,97.83,97.82000000000001,97.84,97.69],"color":"green"},{"name":"anthropic","data":[0.7300000000000001,0.7000000000000001,0.74,0.76,0.78,0.74,0.7,0.76,0.83,0.83,0.7699999999999999,0.82,0.95,1.11,1.2100000000000002,1.1700000000000002,1.1300000000000001,1.1600000000000001,1.2000000000000002,1.2300000000000002,1.29,1.37,1.33,1.3,1.3800000000000001,1.5100000000000002,1.5000000000000002,1.4100000000000001,1.4100000000000001,1.4500000000000002,1.5899999999999999,1.8099999999999998,1.8099999999999998,1.7300000000000002,1.6300000000000001,1.6300000000000001,1.6199999999999999,1.76],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
