<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.409999999999993,29.07,28.549999999999997,27.98,27.779999999999998,27.6,27.43,27.569999999999997,27.689999999999998,27.709999999999994,27.779999999999998,27.86,27.939999999999998,27.77,27.8,27.56,27.65,27.700000000000003,27.670000000000005,27.720000000000002,27.910000000000004,28.090000000000003,28.200000000000003,28.300000000000004,28.57,28.690000000000005,28.710000000000004,28.8,28.750000000000004,28.78,28.990000000000002,28.970000000000002,29.080000000000002,29.270000000000003,29.360000000000003,29.450000000000003,29.7,29.810000000000002],"color":"green"},{"name":"anthropic","data":[68.16,68.52000000000001,69.04,69.60000000000002,69.79,69.99000000000002,70.15000000000002,70.01,69.9,69.87,69.80000000000001,69.72000000000001,69.65,69.79,69.78,70.03000000000002,69.94000000000001,69.89,69.91000000000001,69.86,69.69,69.49999999999999,69.4,69.28,69.02,68.9,68.86,68.78000000000002,68.85,68.82000000000002,68.61,68.60000000000001,68.49000000000001,68.31,68.21000000000002,68.13,67.86000000000001,67.75000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
