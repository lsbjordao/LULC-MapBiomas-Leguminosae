<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.67,98.67,98.58000000000001,98.50000000000001,98.48,98.43000000000002,98.39999999999999,98.31,98.2,98.11000000000001,97.86000000000001,97.71000000000001,97.44000000000001,97.25000000000001,97.22,97.16000000000003,96.95000000000002,96.85000000000001,96.77000000000001,96.60000000000002,96.42000000000002,96.29000000000002,96.23000000000002,96.16000000000001,96.04000000000002,96.02000000000001,96.02000000000002,96.03,95.97000000000001,95.88000000000001,95.73000000000003,95.52000000000001,95.43,95.36999999999999,95.26,95.13000000000001,94.97000000000001,94.69000000000001],"color":"green"},{"name":"anthropic","data":[0.86,0.85,0.9500000000000001,1.01,1.04,1.1,1.12,1.23,1.34,1.43,1.6600000000000001,1.82,2.0999999999999996,2.28,2.3199999999999994,2.369999999999999,2.57,2.6599999999999993,2.7699999999999996,2.9299999999999993,3.0999999999999996,3.2499999999999996,3.3099999999999996,3.38,3.4899999999999998,3.51,3.5100000000000002,3.5,3.56,3.6500000000000004,3.79,4.01,4.09,4.16,4.26,4.39,4.55,4.8500000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
