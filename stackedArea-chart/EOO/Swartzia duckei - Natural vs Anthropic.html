<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.54,98.58,98.57000000000001,98.59999999999998,98.63999999999999,98.61999999999999,98.67999999999999,98.59,98.47999999999999,98.44,98.49,98.39,98.25000000000001,97.96000000000001,97.78999999999999,97.91999999999999,97.98,97.95999999999998,97.96000000000001,97.95,97.87,97.72000000000001,97.76,97.82000000000001,97.71000000000001,97.53000000000002,97.57,97.64,97.64000000000001,97.55000000000001,97.37000000000002,97.08999999999999,97.07999999999998,97.16999999999999,97.3,97.32,97.36,97.05],"color":"green"},{"name":"anthropic","data":[1.04,0.99,1,0.97,0.95,0.95,0.88,0.99,1.11,1.1400000000000001,1.09,1.2000000000000002,1.34,1.61,1.8,1.6700000000000002,1.59,1.6199999999999999,1.6199999999999999,1.6500000000000001,1.7300000000000002,1.8499999999999999,1.82,1.76,1.86,2.03,2,1.94,1.94,2.02,2.2099999999999995,2.4899999999999998,2.51,2.4099999999999997,2.28,2.2499999999999996,2.2199999999999998,2.52],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
