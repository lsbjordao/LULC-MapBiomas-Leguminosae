<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.64,70.41000000000001,69.89000000000001,69.29000000000002,68.59000000000002,68.09,67.52,66.87,66.24,65.74000000000001,65.22999999999999,64.77,64.57000000000001,64.20000000000003,63.80000000000001,63.400000000000006,62.97000000000001,62.54000000000002,62.04000000000001,61.500000000000014,61.05000000000001,60.750000000000014,60.53000000000001,60.34000000000001,60.160000000000004,59.94000000000001,59.65000000000001,59.040000000000006,58.39000000000002,57.85000000000001,57.350000000000016,57.08000000000001,56.81000000000001,56.64,56.38000000000001,56.120000000000005,55.820000000000014,55.61000000000001],"color":"green"},{"name":"anthropic","data":[28.680000000000003,28.95,29.459999999999997,30.040000000000006,30.75,31.270000000000003,31.810000000000002,32.48,33.120000000000005,33.57000000000001,34.120000000000005,34.589999999999996,34.77,35.160000000000004,35.559999999999995,35.919999999999995,36.39,36.81999999999999,37.33999999999999,37.849999999999994,38.29999999999999,38.599999999999994,38.80999999999999,39.00999999999999,39.17999999999999,39.4,39.68,40.26,40.93999999999999,41.5,42,42.28,42.53999999999999,42.69,42.97000000000001,43.230000000000004,43.52,43.72],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
