<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.959999999999994,54.86,54.5,53.72999999999999,53.29999999999998,53.56999999999999,53.679999999999986,53.359999999999985,53.00999999999999,52.8,52.39,52.199999999999996,52.449999999999996,52.41,52.519999999999996,52.66999999999999,52.57999999999999,52.129999999999995,51.989999999999995,51.879999999999995,51.499999999999986,51.45999999999999,51.17999999999999,50.919999999999995,50.9,50.67,50.440000000000005,50.209999999999994,49.86,49.41999999999999,48.94,48.389999999999986,48.33999999999998,48.47999999999999,48.44999999999999,48.42999999999999,48.31999999999999,48.35],"color":"green"},{"name":"anthropic","data":[42.150000000000006,42.230000000000004,42.59,43.4,43.81,43.52,43.42000000000001,43.74,44.10000000000001,44.31,44.71000000000001,44.91,44.66,44.699999999999996,44.599999999999994,44.45,44.54999999999999,45,45.12999999999999,45.23999999999999,45.599999999999994,45.69,45.93999999999999,46.2,46.21,46.459999999999994,46.669999999999995,46.91999999999999,47.25999999999999,47.709999999999994,48.16,48.71999999999999,48.77,48.62,48.67999999999999,48.699999999999996,48.79999999999999,48.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
