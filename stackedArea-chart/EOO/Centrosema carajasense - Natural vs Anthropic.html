<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.3,98.21000000000001,97.89999999999999,97.32999999999998,96.83,96.33,95.78999999999999,94.99000000000001,94.29,93.21000000000002,91.76,90.56000000000002,89.39000000000001,87.89,86.55,85.86999999999999,84.72,83.61,82.54,81.92,81.38000000000001,80.93,80.68,80.44,80.41000000000001,80.34,80.19,80.17999999999999,80.15,80.05000000000001,79.9,79.81,79.59,79.28,79.04999999999998,78.9,78.45,77.88000000000001],"color":"green"},{"name":"anthropic","data":[1.81,1.8900000000000001,2.2199999999999998,2.78,3.2699999999999996,3.79,4.319999999999999,5.13,5.819999999999999,6.919999999999999,8.36,9.549999999999999,10.709999999999999,12.209999999999999,13.55,14.25,15.399999999999999,16.49,17.57,18.19,18.73,19.18,19.43,19.66,19.7,19.779999999999998,19.919999999999998,19.929999999999996,19.970000000000002,20.06,20.200000000000003,20.310000000000002,20.53,20.84,21.06,21.209999999999997,21.66,22.23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
