<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.78,54.120000000000005,53.17000000000001,52.370000000000005,51.38,50.62,49.87000000000001,48.890000000000015,47.95000000000001,47.100000000000016,46.14,45.38000000000002,44.77000000000001,44.17000000000001,43.57000000000001,43.06000000000001,42.660000000000004,42.11000000000001,41.42000000000001,40.900000000000006,40.46000000000001,40.20000000000001,40.04,39.87000000000001,39.780000000000015,39.65,39.470000000000006,39.17,38.84,38.55000000000001,38.260000000000005,38.02,37.89,37.91,37.81999999999999,37.74999999999999,37.56999999999999,37.669999999999995],"color":"green"},{"name":"anthropic","data":[44.79999999999999,45.48,46.41,47.22,48.20999999999999,48.93999999999999,49.71,50.69999999999999,51.62999999999999,52.5,53.44999999999999,54.21,54.82,55.43,56.01,56.54,56.94,57.49,58.15000000000001,58.710000000000015,59.120000000000026,59.39000000000001,59.54000000000001,59.720000000000006,59.78000000000001,59.95000000000001,60.12000000000001,60.42,60.76000000000002,61.06,61.33999999999999,61.58,61.699999999999996,61.65999999999999,61.76,61.84999999999999,62.01999999999999,61.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
