<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.42000000000002,78.16999999999999,76.24000000000001,76.32,74.5,73.21,72.6,72.44999999999999,72.45,72.42,73.17,73.53,74.21000000000001,74.41,75.11,76.23,76.29999999999998,76.62,76.39,74.89000000000001,72.99999999999999,70.88000000000001,68.57000000000001,67.67,67.14999999999998,67.39,68.51,68.96000000000001,69.63,70.39000000000001,70.99999999999999,71.42999999999999,72.17,71.8,71.91,71.96,71.89999999999998,72],"color":"green"},{"name":"anthropic","data":[21.1,21.34,23.29,23.200000000000003,25.009999999999998,26.310000000000002,26.91,27.07,27.07,27.1,26.34,25.99,25.3,25.09,24.400000000000002,23.310000000000002,23.220000000000002,22.910000000000004,23.150000000000002,24.650000000000002,26.53,28.640000000000004,30.940000000000005,31.840000000000003,32.370000000000005,32.120000000000005,31.000000000000004,30.560000000000006,29.880000000000006,29.12,28.53,28.109999999999992,27.349999999999998,27.720000000000002,27.62,27.55,27.62,27.51],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
