<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.839999999999996,42.010000000000005,41.589999999999996,41.190000000000005,41.230000000000004,41.330000000000005,41.53000000000001,41.360000000000014,41.12,41.14000000000001,41.01000000000001,40.800000000000004,40.63999999999999,40.39,40.09,39.78000000000001,39.56000000000001,39.35,39.160000000000004,38.93000000000001,38.73,38.510000000000005,38.379999999999995,38.300000000000004,38.29000000000001,38.26000000000001,38.260000000000005,38.13,37.940000000000005,37.78000000000001,37.77,37.78,37.89,38.01,38.00000000000001,37.97999999999999,37.88000000000001,38.14],"color":"green"},{"name":"anthropic","data":[53.59999999999999,55.42999999999999,55.839999999999996,56.22,56.199999999999996,56.10999999999999,55.88999999999999,56.08999999999999,56.32,56.290000000000006,56.419999999999995,56.62,56.78999999999999,57.040000000000006,57.360000000000014,57.64999999999999,57.860000000000014,58.08,58.28,58.5,58.699999999999996,58.92999999999999,59.029999999999994,59.12,59.14,59.17,59.17000000000001,59.3,59.500000000000014,59.660000000000004,59.66999999999999,59.67,59.53999999999999,59.42,59.43,59.45999999999999,59.559999999999995,59.29],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
