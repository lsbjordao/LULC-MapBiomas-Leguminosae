<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.44,66.16000000000001,65.57000000000001,64.99000000000001,64.33,63.86999999999999,63.39,62.76,62.18999999999999,61.679999999999986,61.14999999999999,60.68999999999999,60.349999999999994,59.83999999999999,59.30999999999999,58.81999999999999,58.319999999999986,57.79999999999999,57.09999999999999,56.42999999999999,55.91999999999998,55.62999999999999,55.42,55.24,55.149999999999984,54.999999999999986,54.79999999999999,54.37999999999999,53.98999999999999,53.640000000000015,53.33,53.18,53.03999999999999,52.96,52.759999999999984,52.58999999999999,52.329999999999984,52.11],"color":"green"},{"name":"anthropic","data":[30.84,31.120000000000005,31.670000000000005,32.3,32.919999999999995,33.389999999999986,33.87999999999998,34.48999999999998,35.089999999999996,35.57,36.11999999999999,36.55999999999999,36.919999999999995,37.39,37.96,38.43,38.93000000000001,39.449999999999996,40.150000000000006,40.84000000000001,41.33,41.620000000000005,41.830000000000005,42.010000000000005,42.11000000000001,42.27000000000001,42.45000000000001,42.870000000000026,43.27,43.620000000000005,43.92000000000001,44.07000000000001,44.21,44.30000000000001,44.480000000000004,44.69,44.93000000000001,45.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
