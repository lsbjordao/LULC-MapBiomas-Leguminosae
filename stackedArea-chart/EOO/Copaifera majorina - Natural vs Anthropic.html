<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.49999999999999,41.279999999999994,40.779999999999994,40.15,39.66,39.4,39.24,39.150000000000006,38.940000000000005,38.64000000000001,38.28000000000001,38.1,37.94,37.850000000000016,37.730000000000004,37.470000000000006,37.5,37.34,37.36,37.22,37,36.91,36.92000000000001,36.910000000000004,37.11,37.11000000000001,37.07,37.09,36.91000000000001,36.82999999999999,36.86,36.64999999999999,36.47,36.53,36.49,36.440000000000005,36.78,37.13],"color":"green"},{"name":"anthropic","data":[11.91,12.16,12.649999999999999,13.279999999999998,13.780000000000001,14.03,14.24,14.29,14.5,14.8,15.169999999999998,15.35,15.49,15.62,15.709999999999999,15.969999999999999,15.95,16.1,16.1,16.220000000000002,16.460000000000004,16.560000000000002,16.51,16.530000000000005,16.330000000000002,16.330000000000002,16.37,16.37,16.530000000000005,16.630000000000003,16.6,16.800000000000004,16.990000000000002,16.93,16.98,17.020000000000003,16.68,16.3],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
