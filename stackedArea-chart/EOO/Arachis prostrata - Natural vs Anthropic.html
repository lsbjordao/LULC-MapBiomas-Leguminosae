<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.92000000000001,58.45000000000001,57.720000000000006,57.06,56.36000000000001,55.860000000000014,55.34,54.72,54.13000000000001,53.63,53.06,52.56999999999999,52.21,51.85000000000001,51.45000000000001,51.10000000000001,50.800000000000004,50.39000000000001,49.95,49.46000000000001,49.09,48.82,48.66000000000001,48.550000000000004,48.460000000000015,48.350000000000016,48.16,47.83,47.440000000000005,47.08000000000001,46.82,46.60000000000001,46.440000000000005,46.300000000000004,46.08,45.84000000000001,45.6,45.51000000000001],"color":"green"},{"name":"anthropic","data":[40.3,40.74999999999999,41.459999999999994,42.12,42.85,43.349999999999994,43.84,44.459999999999994,45.03,45.550000000000004,46.099999999999994,46.620000000000005,46.97999999999999,47.32,47.730000000000004,48.099999999999994,48.38999999999999,48.79,49.25000000000001,49.7,50.07,50.34,50.52,50.62,50.709999999999994,50.83999999999999,51.010000000000005,51.34,51.74000000000001,52.12000000000001,52.38000000000001,52.57000000000001,52.73,52.879999999999995,53.1,53.32,53.57999999999999,53.669999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
