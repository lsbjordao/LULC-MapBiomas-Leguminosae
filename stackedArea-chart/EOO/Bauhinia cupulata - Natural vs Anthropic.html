<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.24000000000002,77.97000000000001,77.26000000000002,76.51000000000002,75.64,75.09000000000002,74.51000000000003,73.66000000000001,72.79000000000003,71.77000000000001,70.67000000000002,69.73,68.92,68.11000000000001,67.18000000000002,66.47000000000001,65.74000000000001,64.86000000000001,63.709999999999994,62.62,61.859999999999985,61.339999999999996,61.01999999999999,60.63999999999999,60.40999999999999,60.169999999999995,59.830000000000005,59.38,58.879999999999995,58.39999999999999,57.97,57.609999999999985,57.389999999999986,57.199999999999996,56.89999999999999,56.62,56.209999999999994,55.65999999999999],"color":"green"},{"name":"anthropic","data":[21.349999999999994,21.63,22.36,23.070000000000004,23.93000000000001,24.51,25.110000000000003,25.930000000000007,26.820000000000004,27.820000000000004,28.94,29.86,30.680000000000007,31.500000000000007,32.42,33.120000000000005,33.85,34.73,35.879999999999995,36.95,37.73,38.25,38.58,38.94000000000001,39.19000000000001,39.42000000000001,39.75000000000001,40.17000000000001,40.69,41.15,41.63999999999999,41.95,42.19,42.38999999999999,42.690000000000005,42.96000000000001,43.36999999999999,43.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
