<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.63000000000004,73.41000000000003,72.77000000000002,72.15000000000002,71.53000000000002,71.10000000000001,70.64,69.98000000000002,69.37000000000002,68.83000000000001,68.18000000000002,67.65,67.24000000000002,66.68000000000002,66.12000000000003,65.70000000000002,65.21000000000001,64.73,64.02000000000001,63.37,62.87,62.499999999999986,62.239999999999995,62,61.87,61.709999999999994,61.510000000000005,61.19999999999999,60.889999999999986,60.60999999999999,60.319999999999986,60.080000000000005,59.89000000000001,59.68,59.39000000000001,59.13,58.72,58.24000000000001],"color":"green"},{"name":"anthropic","data":[26.180000000000007,26.380000000000006,27.000000000000004,27.620000000000008,28.23,28.67,29.139999999999997,29.81,30.430000000000003,30.960000000000004,31.610000000000007,32.129999999999995,32.559999999999995,33.11,33.67,34.11000000000001,34.589999999999996,35.08,35.78,36.440000000000005,36.92000000000001,37.3,37.550000000000004,37.820000000000014,37.940000000000005,38.080000000000005,38.3,38.60999999999999,38.9,39.19999999999999,39.5,39.71,39.92000000000001,40.11000000000001,40.4,40.650000000000006,41.07,41.57],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
