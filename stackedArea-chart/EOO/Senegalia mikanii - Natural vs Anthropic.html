<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.51,40.35,39.940000000000005,40.07999999999999,39.79,39.74,40.1,39.82,40.48,41.599999999999994,42.07,42.69,43.13,43.910000000000004,44.35999999999999,44.75999999999999,44.94,45.4,45.91,46.11000000000001,46.45,46.830000000000005,47.03,47.09,47.089999999999996,47.1,47.03000000000001,47.23,47.39,47.82,48.04,48.26,48.42,48.69,49.089999999999996,49.25999999999999,49.07999999999999,49.300000000000004],"color":"green"},{"name":"anthropic","data":[33.239999999999995,33.39,33.79,33.65,33.93,33.99999999999999,33.629999999999995,33.919999999999995,33.260000000000005,32.14,31.67,31.04,30.610000000000003,29.830000000000002,29.39,28.969999999999995,28.799999999999997,28.34,27.830000000000002,27.62,27.269999999999996,26.889999999999997,26.69,26.650000000000002,26.63,26.619999999999997,26.72,26.51,26.34,25.93,25.69,25.45,25.310000000000002,25.05,24.64,24.47,24.65,24.419999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
