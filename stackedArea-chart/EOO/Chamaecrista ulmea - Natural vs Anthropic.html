<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.34,85.61999999999999,85.97999999999999,86.35,86.73,87.16,87.55999999999999,87.71,87.88000000000001,87.86,87.85,87.71000000000001,87.75,87.82000000000001,87.91,87.73,87.64,87.39,87.29,87.50000000000001,87.25,87.19999999999999,87.2,87.14000000000001,87.28,87.18,87.14,86.93,86.72,86.26,85.78,85.43,85.45000000000002,85.53,85.54,85.53999999999999,85.55,85.36999999999999],"color":"green"},{"name":"anthropic","data":[14.35,14.1,13.74,13.37,12.98,12.569999999999999,12.139999999999999,11.989999999999998,11.839999999999998,11.85,11.85,12,11.97,11.879999999999999,11.82,11.969999999999999,12.059999999999999,12.309999999999999,12.409999999999998,12.21,12.47,12.500000000000002,12.510000000000002,12.580000000000002,12.440000000000001,12.520000000000001,12.58,12.780000000000001,12.990000000000002,13.45,13.93,14.28,14.25,14.17,14.17,14.179999999999998,14.16,14.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
