<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.599999999999994,47.88999999999999,46.589999999999996,45.54,44.65,44.28,43.81999999999999,43.709999999999994,43.4,42.849999999999994,42.1,41.53000000000001,41.25,41.089999999999996,41.040000000000006,40.89000000000001,40.96,40.78000000000001,40.78,40.69,40.62,40.75,40.77,40.58999999999999,40.66,40.68000000000001,40.77,40.93000000000001,40.900000000000006,40.9,40.92000000000001,40.77,40.77,40.800000000000004,40.85,40.830000000000005,41.09,41.400000000000006],"color":"green"},{"name":"anthropic","data":[49.6,50.28999999999999,51.61,52.64,53.52,53.92,54.38000000000001,54.47,54.800000000000004,55.36000000000001,56.1,56.669999999999995,56.94,57.1,57.17,57.300000000000004,57.24,57.39999999999999,57.42,57.5,57.59,57.46,57.43,57.61,57.550000000000004,57.53,57.42,57.26999999999999,57.29,57.279999999999994,57.260000000000005,57.42999999999999,57.42,57.39,57.35,57.36,57.120000000000005,56.79],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
