<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.22000000000003,73.11000000000001,72.70000000000003,72.25,71.67000000000003,71.20000000000002,70.70000000000002,70.22000000000003,69.69000000000001,69.47000000000001,69.42000000000002,69.44000000000004,69.82000000000004,69.72000000000003,69.69000000000001,69.59000000000003,69.27000000000001,69.06,68.66000000000001,68.24000000000001,67.82000000000001,67.64000000000001,67.44000000000001,67.48000000000002,67.5,67.51000000000002,67.37,66.95,66.42000000000002,66.01000000000002,65.70000000000002,65.72000000000001,65.49999999999999,65.36,65.22000000000001,65.03,64.81000000000002,64.68],"color":"green"},{"name":"anthropic","data":[25.759999999999998,25.87,26.29,26.71,27.3,27.770000000000003,28.27,28.740000000000006,29.270000000000003,29.490000000000002,29.530000000000005,29.550000000000004,29.16,29.25,29.29000000000001,29.369999999999997,29.719999999999995,29.909999999999997,30.32,30.740000000000002,31.17,31.37,31.55,31.499999999999996,31.470000000000002,31.44,31.620000000000005,32.010000000000005,32.54000000000001,32.96000000000001,33.279999999999994,33.26,33.46,33.629999999999995,33.74,33.96,34.169999999999995,34.300000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
