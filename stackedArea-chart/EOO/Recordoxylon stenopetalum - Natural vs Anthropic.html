<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.03,98.01,97.92000000000002,97.90000000000002,97.95000000000002,98.00000000000001,98,97.91,97.82,97.81999999999998,97.89999999999999,97.86,97.78999999999999,97.67,97.62,97.66,97.64,97.61000000000001,97.52000000000001,97.44000000000001,97.36000000000001,97.34,97.35,97.32000000000001,97.22,97.22000000000001,97.21000000000001,97.24,97.23000000000002,97.17000000000002,97.11999999999999,97.05,97.04,97.04,96.99,96.92,96.83999999999999,96.72],"color":"green"},{"name":"anthropic","data":[0.6900000000000001,0.7000000000000001,0.8,0.8300000000000001,0.78,0.74,0.7300000000000001,0.8300000000000001,0.9,0.91,0.8200000000000001,0.8700000000000001,0.94,1.05,1.11,1.08,1.07,1.11,1.2000000000000002,1.2800000000000002,1.37,1.37,1.37,1.4200000000000002,1.5100000000000002,1.5200000000000002,1.5200000000000002,1.5100000000000002,1.5000000000000002,1.5600000000000003,1.61,1.6800000000000002,1.7000000000000002,1.6900000000000002,1.7400000000000002,1.8200000000000003,1.8900000000000001,2.0300000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
