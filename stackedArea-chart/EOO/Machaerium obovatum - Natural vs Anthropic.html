<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.33,37.35,37.88,38.51,38.01,38.17,38.71,38.24999999999999,38.82,40.010000000000005,41.19,41.58,42.04,42.93000000000001,43.129999999999995,43.53,43.74,44.519999999999996,44.89,45.029999999999994,45.68000000000001,46.06000000000001,46.61,46.6,46.43,46.300000000000004,45.95,46.13999999999999,46.07,46.6,46.89,47.150000000000006,47.17,47.440000000000005,48.02,48.14,47.120000000000005,47.56000000000001],"color":"green"},{"name":"anthropic","data":[41.93,42.910000000000004,42.35,41.76,42.230000000000004,42.080000000000005,41.53000000000001,42.010000000000005,41.43000000000001,40.25000000000001,39.06,38.660000000000004,38.21000000000001,37.32000000000001,37.14,36.73000000000001,36.53,35.730000000000004,35.370000000000005,35.230000000000004,34.57,34.21,33.65,33.65,33.81,33.980000000000004,34.330000000000005,34.13,34.17,33.68,33.36,33.11,33.089999999999996,32.82,32.24,32.13,33.120000000000005,32.69],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
