<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[25.729999999999997,25.209999999999997,24.519999999999996,24.020000000000003,23.689999999999998,23.48,23.259999999999998,23.279999999999998,23.120000000000005,22.830000000000002,22.599999999999998,22.480000000000004,22.44,22.310000000000002,22.349999999999998,22.22,22.299999999999997,22.239999999999995,22.099999999999998,22.099999999999998,22.14,22.27,22.340000000000003,22.290000000000003,22.49,22.6,22.679999999999996,22.73,22.740000000000002,22.779999999999998,22.890000000000004,22.910000000000004,23.080000000000002,23.230000000000004,23.300000000000004,23.43,23.72,24.000000000000007],"color":"green"},{"name":"anthropic","data":[71.66000000000001,72.16000000000001,72.85000000000001,73.36,73.71,73.9,74.13000000000001,74.12,74.25000000000001,74.54,74.79,74.89000000000001,74.93,75.06000000000002,75.02,75.17,75.09000000000002,75.14000000000001,75.29,75.30000000000001,75.25000000000001,75.13000000000001,75.04,75.08000000000001,74.90000000000002,74.78000000000002,74.70000000000002,74.64000000000001,74.64,74.58999999999999,74.47999999999999,74.45,74.28999999999999,74.14,74.07,73.94000000000001,73.67,73.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
