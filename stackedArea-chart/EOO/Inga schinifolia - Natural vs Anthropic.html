<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.72,28.520000000000003,28.149999999999995,27.970000000000002,27.740000000000002,27.59,27.420000000000005,27.49,27.460000000000004,27.470000000000002,27.48,27.560000000000002,27.659999999999997,27.679999999999996,27.72,27.68,27.73,27.720000000000006,27.63,27.719999999999995,27.83,27.950000000000006,28.080000000000005,28.119999999999997,28.27,28.47,28.63,28.740000000000002,28.84,28.990000000000002,29.15,29.23,29.429999999999993,29.55999999999999,29.66,29.759999999999998,30.04,30.229999999999997],"color":"green"},{"name":"anthropic","data":[69.21,69.43,69.79,69.97999999999999,70.19,70.36000000000001,70.5,70.45,70.45,70.46,70.45,70.38000000000001,70.27000000000001,70.25,70.22000000000001,70.27,70.21000000000001,70.21000000000001,70.31000000000002,70.21000000000002,70.11000000000001,69.98000000000002,69.85000000000001,69.79000000000002,69.64000000000001,69.47,69.31,69.21,69.1,68.94,68.78,68.69999999999999,68.5,68.35000000000001,68.27000000000001,68.17,67.88,67.71],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
