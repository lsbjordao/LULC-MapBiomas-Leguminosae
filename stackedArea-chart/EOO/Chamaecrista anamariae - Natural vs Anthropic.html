<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.88,70.11999999999999,69.25,68.36,68.17,68.17,68.72,67.86,69.50999999999999,70.65,71.24,71.8,72.94,75.3,77.83,79,80.85999999999999,81.44999999999999,81.43,81.47,81.47,81.4,81.22999999999999,81.36999999999999,81.89,82.48,81.73,81.24000000000001,80.76,79.17999999999999,79.22999999999999,78.10999999999999,78.00999999999999,78.14000000000001,78.72999999999999,78.89,78.75999999999999,78.53000000000002],"color":"green"},{"name":"anthropic","data":[28.919999999999998,29.680000000000003,30.54,31.45,31.62,31.630000000000003,31.080000000000002,31.950000000000003,30.3,29.16,28.55,28.01,26.849999999999998,24.49,21.990000000000002,20.790000000000003,18.930000000000003,18.340000000000003,18.360000000000007,18.310000000000002,18.320000000000004,18.400000000000006,18.570000000000004,18.430000000000003,17.920000000000005,17.320000000000004,18.080000000000005,18.55,19.029999999999998,20.630000000000003,20.560000000000002,21.69,21.790000000000003,21.680000000000003,21.080000000000002,20.920000000000005,21.040000000000003,21.270000000000007],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
