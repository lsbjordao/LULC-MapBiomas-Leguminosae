<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.25,27.6,26.979999999999997,26.32,25.950000000000003,25.740000000000002,25.570000000000004,25.64,25.810000000000002,25.900000000000002,25.990000000000002,25.990000000000002,26.03,25.930000000000007,25.920000000000005,25.660000000000007,25.770000000000003,25.870000000000005,26.000000000000004,26.13,26.370000000000005,26.52,26.610000000000003,26.79,27.029999999999998,27.099999999999998,27.1,27.200000000000003,27.14,27.15,27.350000000000005,27.31,27.39,27.610000000000003,27.8,27.880000000000006,28.03,28.040000000000003],"color":"green"},{"name":"anthropic","data":[64.08,64.74,65.36999999999999,66.01,66.4,66.58,66.76,66.69999999999999,66.53999999999999,66.44999999999999,66.35,66.34,66.31,66.42,66.39999999999999,66.68,66.56,66.47,66.32000000000001,66.19,65.96000000000001,65.83000000000001,65.7,65.53000000000002,65.28000000000002,65.21000000000001,65.23,65.11999999999999,65.19,65.16,64.98,65,64.93,64.71000000000001,64.54,64.43,64.29,64.28000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
