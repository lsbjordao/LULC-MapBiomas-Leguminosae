<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.379999999999995,45.91000000000001,45.15,44.45000000000001,43.74000000000001,43.22,42.739999999999995,42.13000000000001,41.61000000000001,41.16999999999999,40.62999999999999,40.21999999999999,39.88999999999999,39.63999999999999,39.36,39.089999999999996,38.86,38.56,38.23,37.89,37.68999999999999,37.59999999999999,37.47999999999999,37.38999999999999,37.379999999999995,37.29999999999999,37.18999999999999,37.039999999999985,36.90999999999999,36.739999999999995,36.64999999999999,36.53999999999999,36.459999999999994,36.449999999999996,36.31000000000001,36.230000000000004,36.06,36.089999999999996],"color":"green"},{"name":"anthropic","data":[50.510000000000005,50.99,51.75,52.44,53.17,53.690000000000005,54.15,54.79,55.279999999999994,55.71000000000001,56.27,56.67999999999999,57.02,57.25,57.50999999999999,57.78999999999998,58.01,58.300000000000004,58.65,58.98,59.18999999999998,59.29,59.4,59.5,59.52,59.56000000000001,59.690000000000005,59.83000000000001,59.99,60.13,60.239999999999995,60.339999999999996,60.39,60.400000000000006,60.52999999999999,60.660000000000004,60.8,60.779999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
