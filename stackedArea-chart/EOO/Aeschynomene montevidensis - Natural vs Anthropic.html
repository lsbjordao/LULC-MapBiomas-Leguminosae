<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.680000000000003,31.5,31.06,30.620000000000005,30.199999999999996,29.879999999999992,29.58,29.189999999999994,28.87,28.6,28.330000000000002,28.080000000000002,27.93,27.689999999999994,27.459999999999997,27.209999999999997,27.02,26.799999999999997,26.549999999999997,26.26,26.099999999999998,25.99,25.910000000000004,25.839999999999996,25.810000000000002,25.750000000000004,25.670000000000005,25.45,25.250000000000004,25.099999999999998,24.95,24.9,24.819999999999997,24.780000000000005,24.710000000000004,24.650000000000002,24.56,24.500000000000004],"color":"green"},{"name":"anthropic","data":[22.970000000000006,23.150000000000006,23.580000000000005,24.01,24.46,24.770000000000003,25.080000000000005,25.470000000000006,25.810000000000006,26.040000000000003,26.340000000000007,26.560000000000013,26.74000000000001,26.95,27.21000000000001,27.420000000000005,27.660000000000004,27.85,28.11,28.37,28.53,28.660000000000004,28.750000000000007,28.800000000000004,28.83000000000001,28.910000000000007,28.98,29.190000000000005,29.370000000000005,29.550000000000004,29.670000000000005,29.730000000000008,29.810000000000006,29.84,29.920000000000005,29.98,30.050000000000004,30.13000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
