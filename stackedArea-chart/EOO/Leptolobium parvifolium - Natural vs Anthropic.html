<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.16,77.98000000000002,77.47,77.06,76.00999999999999,74.64999999999999,73.89,74.02,73.8,74.65000000000002,75.97999999999999,76.35000000000001,77.12,76.78999999999999,76.43,76.43,75.85000000000001,75.64,74.92000000000002,73.40000000000002,71.83000000000001,70.68,69.42,69.31000000000002,69.25,69.59,69.8,70.25,70.42000000000002,70.81000000000002,70.68,70.96000000000001,71.74000000000001,71.93000000000002,71.98000000000002,72.07000000000002,71.97000000000003,72.04000000000002],"color":"green"},{"name":"anthropic","data":[21.23,21.41,21.9,22.31,23.36,24.740000000000002,25.500000000000004,25.38,25.6,24.76,23.389999999999997,23.040000000000003,22.28,22.599999999999998,22.959999999999994,22.959999999999997,23.540000000000003,23.749999999999996,24.47,26.01,27.57,28.72,29.96,30.07,30.13,29.810000000000002,29.590000000000003,29.140000000000004,28.98,28.590000000000007,28.710000000000004,28.43,27.650000000000006,27.46,27.400000000000002,27.34,27.41,27.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
