<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.040000000000006,27.860000000000003,27.45,27.110000000000003,26.900000000000002,26.81000000000001,26.630000000000006,26.420000000000005,26.32,26.240000000000002,26.159999999999997,26.169999999999998,26.200000000000003,26.19,26.220000000000002,26.06,26.039999999999996,25.999999999999996,25.970000000000006,25.92,26.029999999999998,26.140000000000004,26.209999999999997,26.230000000000004,26.210000000000004,26.270000000000007,26.250000000000004,26.200000000000003,26.160000000000007,26.099999999999998,26.130000000000003,26.13,26.22,26.330000000000002,26.38,26.4,26.509999999999998,26.660000000000004],"color":"green"},{"name":"anthropic","data":[57.65000000000001,57.83,58.26000000000001,58.60000000000001,58.81000000000001,58.88,59.059999999999995,59.26,59.37,59.470000000000006,59.54,59.510000000000005,59.52000000000001,59.53,59.52,59.63999999999999,59.67,59.72,59.720000000000006,59.75999999999999,59.64,59.57,59.480000000000004,59.46,59.470000000000006,59.43000000000001,59.44,59.48,59.54,59.59000000000001,59.58,59.550000000000004,59.480000000000004,59.37,59.34000000000001,59.300000000000004,59.19,59.02000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
