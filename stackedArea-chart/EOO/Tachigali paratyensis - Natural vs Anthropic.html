<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.700000000000003,28.46,28.04,27.73,27.459999999999997,27.330000000000005,27.150000000000006,27.020000000000003,26.960000000000004,26.890000000000004,26.830000000000005,26.830000000000005,26.800000000000008,26.830000000000005,26.830000000000005,26.740000000000006,26.820000000000004,26.860000000000007,26.85000000000001,26.870000000000005,26.930000000000007,27.010000000000005,27.130000000000003,27.190000000000005,27.250000000000004,27.32,27.409999999999997,27.450000000000003,27.520000000000003,27.540000000000003,27.670000000000005,27.720000000000002,27.810000000000006,27.880000000000006,27.94000000000001,27.970000000000002,28.130000000000003,28.34],"color":"green"},{"name":"anthropic","data":[49.910000000000004,50.13,50.589999999999996,50.89,51.169999999999995,51.28,51.48999999999999,51.599999999999994,51.639999999999986,51.709999999999994,51.78,51.78999999999999,51.83,51.809999999999995,51.809999999999995,51.9,51.81999999999999,51.78,51.77,51.76999999999999,51.69999999999999,51.62,51.489999999999995,51.42999999999999,51.37999999999999,51.29999999999999,51.220000000000006,51.16,51.10999999999999,51.04999999999999,50.96,50.89999999999999,50.82,50.71999999999999,50.69,50.66,50.51,50.3],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
