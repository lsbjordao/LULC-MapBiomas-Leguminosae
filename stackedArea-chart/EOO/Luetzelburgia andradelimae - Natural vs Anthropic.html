<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.29999999999997,66.13000000000001,65.8,65.06,63.88999999999999,63.449999999999996,63.37,62.94,62.24999999999999,62.07999999999999,61.61,61.51,62.23,62.57999999999999,62.959999999999994,63.71000000000001,63.53,63.13999999999999,62.88999999999999,62.730000000000004,61.949999999999996,61.60999999999999,61.24999999999999,61.21999999999999,61.27999999999999,61.16999999999998,60.949999999999996,60.800000000000004,60.24999999999999,59.559999999999995,59.20999999999999,58.879999999999995,58.52,58.510000000000005,58.30999999999999,58.029999999999994,57.91,57.749999999999986],"color":"green"},{"name":"anthropic","data":[32.99,33.18,33.50000000000001,34.25,35.44000000000001,35.85000000000001,35.920000000000016,36.38,37.07,37.23000000000001,37.7,37.81,37.07000000000001,36.70000000000001,36.32,35.61,35.800000000000004,36.169999999999995,36.4,36.559999999999995,37.35,37.690000000000005,38.019999999999996,38.09,38.04,38.13,38.36,38.519999999999996,39.059999999999995,39.75000000000001,40.1,40.43,40.769999999999996,40.779999999999994,40.99999999999999,41.24999999999999,41.4,41.550000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
