<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.54,62.92999999999999,62.609999999999985,62.010000000000005,61.86999999999998,62.39999999999999,62.30999999999999,62.18999999999998,62.04999999999999,61.92999999999999,61.699999999999996,61.819999999999986,62.179999999999986,62.45999999999999,62.69,62.66,62.569999999999986,62.07999999999999,61.85999999999998,61.649999999999984,61.64999999999999,61.539999999999985,61.32999999999999,61.16999999999998,61.209999999999994,60.999999999999986,60.679999999999986,60.40999999999999,60.26,60.05999999999999,59.79,59.169999999999995,59.17,59.36,59.28,59.11999999999998,59.07999999999999,59.029999999999994],"color":"green"},{"name":"anthropic","data":[36.900000000000006,37.50000000000001,37.809999999999995,38.41,38.54,38.03,38.120000000000005,38.25000000000001,38.370000000000005,38.50000000000001,38.74,38.61,38.24000000000001,37.940000000000005,37.730000000000004,37.77000000000001,37.87000000000001,38.360000000000014,38.57000000000001,38.76000000000001,38.76000000000002,38.890000000000015,39.12000000000001,39.260000000000005,39.21000000000001,39.44000000000001,39.72000000000001,40.02000000000001,40.18000000000001,40.370000000000005,40.63,41.24,41.26000000000001,41.050000000000004,41.150000000000006,41.300000000000004,41.35,41.39000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
