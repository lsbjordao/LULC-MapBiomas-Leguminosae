<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.57999999999999,50.959999999999994,50.779999999999994,49.10999999999999,48.37999999999999,47.75999999999999,46.989999999999995,46.39,45.43,45.61,44.6,46.169999999999995,46.290000000000006,46.559999999999995,45.660000000000004,45.38999999999999,45.56,45.85999999999999,46.989999999999995,46.87,46.02,45.81999999999999,45.95999999999999,46.28000000000001,46.540000000000006,46.93,46.96,46.56,46.14,46.529999999999994,46.9,46.699999999999996,46.54,46.79,47.080000000000005,47.42000000000001,48.03,48.660000000000004],"color":"green"},{"name":"anthropic","data":[48.120000000000005,47.769999999999996,47.949999999999996,49.64,50.349999999999994,50.99999999999999,51.779999999999994,52.36,53.32,53.14000000000001,54.160000000000004,52.62,52.47,52.17,53.059999999999995,53.349999999999994,53.169999999999995,52.89,51.739999999999995,51.86,52.71,52.919999999999995,52.78,52.470000000000006,52.190000000000005,51.79,51.78,52.190000000000005,52.61,52.23,51.85999999999999,52.06999999999999,52.209999999999994,51.97,51.69,51.33,50.709999999999994,50.06999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
