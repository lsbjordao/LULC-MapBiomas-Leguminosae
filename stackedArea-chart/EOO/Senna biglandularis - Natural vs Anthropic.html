<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.53999999999999,92.62,92.4,92.02000000000001,91.68000000000002,91.54000000000002,91.34000000000002,91.25,91.07000000000001,91.01000000000002,90.84000000000002,90.54000000000002,90.65000000000002,90.48000000000003,90.10000000000002,89.84000000000002,89.23000000000002,88.84000000000002,88.55000000000001,87.51000000000002,86.75000000000001,86.10000000000001,85.88000000000002,85.54,85.22000000000003,84.88000000000002,84.51000000000003,83.31,82.3,81.49000000000002,80.90000000000002,80.62000000000002,80.13000000000002,79.41000000000001,78.63000000000001,77.64,77.05000000000001,76.00000000000003],"color":"green"},{"name":"anthropic","data":[6.74,6.64,6.880000000000001,7.290000000000001,7.6,7.75,7.9399999999999995,8.05,8.219999999999999,8.27,8.44,8.74,8.65,8.81,9.21,9.47,10.06,10.450000000000001,10.750000000000002,11.780000000000001,12.54,13.19,13.430000000000001,13.739999999999998,14.05,14.39,14.769999999999998,15.96,16.98,17.77,18.380000000000003,18.65,19.15,19.88,20.650000000000002,21.650000000000002,22.23,23.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
