<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[13.52,13.409999999999998,13.219999999999999,12.98,12.510000000000002,12.51,12.59,12.57,12.9,13,13.09,13.040000000000001,13.280000000000001,13.33,13.56,13.549999999999999,13.72,13.9,14.08,14.33,14.64,14.860000000000001,14.99,15.120000000000001,15.38,15.57,15.700000000000001,15.88,16.21,16.85,17.2,17.49,17.83,18.110000000000003,18.439999999999998,18.77,19.07,19.15],"color":"green"},{"name":"anthropic","data":[86.94999999999999,87.07,87.26,87.50999999999999,87.97000000000001,87.97,87.89,87.91,87.56999999999998,87.46999999999998,87.39999999999999,87.44,87.2,87.14999999999999,86.92000000000002,86.94000000000001,86.75,86.57000000000001,86.39,86.13999999999999,85.82,85.62,85.47999999999999,85.37,85.08,84.9,84.78,84.59,84.26,83.62,83.27000000000001,82.99999999999999,82.66000000000001,82.35999999999999,82.05000000000001,81.69999999999999,81.41,81.33000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
