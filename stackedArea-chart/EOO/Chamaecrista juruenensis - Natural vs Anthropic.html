<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.29000000000002,85.16000000000003,84.65,84.08000000000001,83.42,82.92,82.41,81.61,80.86,80.09,79.11,78.21,77.47,76.68999999999998,75.76999999999998,75.05999999999999,74.28,73.41999999999999,72.23999999999998,71.07,70.14999999999999,69.50999999999998,69.09999999999998,68.66999999999997,68.36999999999998,68.11999999999998,67.76999999999998,67.15999999999998,66.43999999999998,65.85999999999999,65.34999999999997,64.99999999999999,64.67,64.32,63.86000000000001,63.39,62.85,62.11],"color":"green"},{"name":"anthropic","data":[14.12,14.21,14.75,15.309999999999999,15.959999999999999,16.450000000000003,16.98,17.770000000000003,18.54,19.290000000000003,20.279999999999998,21.190000000000005,21.919999999999998,22.679999999999996,23.619999999999997,24.32,25.100000000000005,25.970000000000002,27.15000000000001,28.300000000000004,29.240000000000002,29.89,30.280000000000005,30.720000000000002,30.990000000000006,31.280000000000005,31.62,32.21,32.94,33.51,34.02,34.37,34.69999999999999,35.06,35.51,35.98999999999999,36.53,37.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
