<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.03,33.28,31.599999999999998,29.810000000000002,28.47,27.370000000000005,26.360000000000003,25.24000000000001,24.380000000000003,23.630000000000003,22.820000000000007,22.180000000000007,21.80000000000001,21.370000000000005,20.94,20.480000000000004,20.1,19.67,19.17,18.930000000000003,18.750000000000004,18.610000000000003,18.480000000000004,18.460000000000004,18.470000000000002,18.48,18.56,18.580000000000005,18.620000000000008,18.680000000000003,18.78,18.830000000000005,18.910000000000004,18.930000000000003,18.900000000000002,18.790000000000003,18.53,18.82],"color":"green"},{"name":"anthropic","data":[64.47,66.19,67.86999999999999,69.66,70.98,72.14000000000001,73.12000000000002,74.24000000000002,75.10000000000002,75.85000000000004,76.66000000000001,77.30000000000003,77.66000000000003,78.10000000000001,78.54000000000003,79.00000000000003,79.34000000000003,79.79000000000002,80.29,80.53000000000004,80.71000000000002,80.86,80.98000000000002,81.00000000000004,81,80.98000000000002,80.93000000000004,80.88000000000001,80.85000000000001,80.80000000000001,80.7,80.63000000000001,80.53000000000002,80.51000000000002,80.54000000000002,80.66000000000001,80.92000000000004,80.64000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
