<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.19000000000001,78.00000000000003,77.39000000000003,76.80000000000003,76.16000000000001,75.69000000000001,75.18000000000002,74.45000000000002,73.77000000000002,73.11999999999999,72.35000000000001,71.69,71.19000000000001,70.54000000000002,69.90000000000002,69.4,68.83,68.21000000000001,67.33999999999999,66.48,65.85000000000002,65.37000000000002,65.03,64.72,64.54,64.37,64.14,63.819999999999986,63.43999999999999,63.08,62.719999999999985,62.45999999999999,62.22,61.999999999999986,61.690000000000005,61.38,60.959999999999994,60.42000000000001],"color":"green"},{"name":"anthropic","data":[23.13,23.330000000000005,23.95,24.540000000000003,25.190000000000005,25.640000000000004,26.140000000000004,26.870000000000008,27.580000000000005,28.19,28.98,29.610000000000003,30.149999999999995,30.77,31.41,31.920000000000005,32.50000000000001,33.09,33.99,34.800000000000004,35.470000000000006,35.93,36.27,36.57000000000001,36.77000000000001,36.92000000000001,37.18,37.49999999999999,37.86999999999999,38.220000000000006,38.550000000000004,38.87,39.080000000000005,39.300000000000004,39.629999999999995,39.910000000000004,40.339999999999996,40.879999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
