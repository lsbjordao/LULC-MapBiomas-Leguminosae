<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.01000000000001,29.720000000000006,29.51000000000001,29.34000000000001,29.250000000000004,29.26000000000001,29.230000000000008,29.240000000000006,29.300000000000008,29.47000000000001,29.51000000000001,29.57000000000001,29.630000000000006,29.650000000000013,29.720000000000013,29.590000000000007,29.640000000000008,29.720000000000006,29.830000000000005,29.970000000000002,30.080000000000002,30.160000000000004,30.28,30.370000000000005,30.480000000000004,30.640000000000008,30.78000000000001,30.92000000000001,31.060000000000006,31.180000000000003,31.400000000000006,31.610000000000007,31.650000000000006,31.710000000000004,31.770000000000003,31.840000000000007,32.07,32.17000000000001],"color":"green"},{"name":"anthropic","data":[63.78000000000002,64.02999999999999,64.24999999999999,64.46,64.51,64.5,64.55,64.54999999999998,64.46999999999998,64.32,64.3,64.24,64.16999999999999,64.17,64.08000000000001,64.19000000000001,64.14,64.06999999999998,63.95999999999999,63.83,63.699999999999996,63.62,63.51,63.41,63.30000000000001,63.11,62.97999999999999,62.88,62.73000000000001,62.60000000000001,62.370000000000005,62.17000000000001,62.13,62.050000000000004,61.98,61.93,61.7,61.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
