<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.199999999999996,32.19,31.800000000000004,31.670000000000005,31.360000000000007,31.150000000000006,30.850000000000005,30.820000000000007,30.840000000000003,30.94,30.950000000000003,30.920000000000005,30.92,30.920000000000005,30.580000000000005,30.450000000000006,30.450000000000003,30.360000000000003,30.450000000000003,30.46,30.410000000000004,30.550000000000004,30.810000000000002,31.000000000000004,31.18,31.490000000000002,31.790000000000003,31.92,32.05000000000001,32.230000000000004,32.35000000000001,32.550000000000004,32.85,32.98000000000001,33.09,33.230000000000004,33.41,33.46],"color":"green"},{"name":"anthropic","data":[67.26,67.26,67.63,67.76,68.07000000000001,68.30000000000001,68.60000000000001,68.61000000000001,68.59000000000002,68.48,68.47,68.52,68.52,68.52,68.85,68.96999999999998,69,69.06,68.97,68.97,69.03,68.88,68.64,68.43,68.28,67.95,67.64000000000001,67.52,67.39000000000001,67.21000000000002,67.11000000000001,66.91000000000001,66.60000000000001,66.48000000000002,66.35000000000001,66.21000000000001,66.05000000000001,65.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
