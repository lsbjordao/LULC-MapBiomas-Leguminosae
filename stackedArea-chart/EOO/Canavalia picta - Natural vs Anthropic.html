<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.089999999999996,40.33,39.330000000000005,38.48,37.69000000000001,37.06,36.45,35.73,35.120000000000005,34.550000000000004,33.93,33.45,33.00000000000001,32.660000000000004,32.34,31.96,31.720000000000006,31.450000000000006,31.080000000000005,30.85000000000001,30.730000000000004,30.630000000000003,30.59,30.59,30.640000000000004,30.650000000000006,30.620000000000005,30.62,30.550000000000004,30.470000000000013,30.500000000000004,30.520000000000003,30.480000000000008,30.51,30.490000000000006,30.440000000000005,30.310000000000006,30.460000000000004],"color":"green"},{"name":"anthropic","data":[57.74999999999999,58.510000000000005,59.470000000000006,60.309999999999995,61.109999999999985,61.760000000000005,62.36,63.10000000000001,63.69000000000001,64.27,64.88000000000001,65.38,65.81,66.17,66.51999999999998,66.88,67.10000000000001,67.37000000000002,67.69999999999999,67.97999999999999,68.13999999999999,68.17999999999999,68.22999999999998,68.24,68.2,68.2,68.2,68.22,68.27,68.36000000000003,68.34000000000002,68.28999999999999,68.33999999999999,68.33999999999999,68.36999999999999,68.39999999999999,68.53000000000002,68.37999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
