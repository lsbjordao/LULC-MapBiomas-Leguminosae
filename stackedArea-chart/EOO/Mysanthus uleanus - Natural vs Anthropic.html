<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[17.750000000000007,17.730000000000004,17.55,17.350000000000005,17.120000000000005,17.020000000000007,16.860000000000003,16.680000000000003,16.509999999999998,16.41,16.27,16.19,16.19,16.14,16.060000000000002,15.999999999999998,15.929999999999998,15.839999999999998,15.779999999999998,15.69,15.629999999999997,15.609999999999998,15.589999999999998,15.569999999999999,15.559999999999999,15.54,15.51,15.4,15.259999999999998,15.159999999999998,15.099999999999998,15.04,15.029999999999998,15.049999999999997,15.039999999999997,15.030000000000001,15.03,15.049999999999999],"color":"green"},{"name":"anthropic","data":[17.970000000000002,18.000000000000004,18.179999999999996,18.37,18.599999999999998,18.71,18.859999999999996,19.05,19.220000000000006,19.310000000000002,19.439999999999998,19.52,19.540000000000003,19.599999999999998,19.65,19.720000000000002,19.79,19.890000000000004,19.96,20.040000000000003,20.09,20.10000000000001,20.130000000000003,20.170000000000005,20.170000000000005,20.150000000000002,20.210000000000004,20.300000000000004,20.440000000000005,20.580000000000005,20.610000000000003,20.650000000000006,20.670000000000005,20.660000000000004,20.670000000000005,20.68,20.660000000000004,20.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
