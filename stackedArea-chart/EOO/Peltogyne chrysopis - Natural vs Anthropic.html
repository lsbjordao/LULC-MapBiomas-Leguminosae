<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[20.170000000000005,20.080000000000005,19.880000000000003,19.529999999999998,19.37,19.269999999999996,19.23,19.189999999999998,19.069999999999997,19.08,19.119999999999997,19.27,19.29,19.3,19.03,18.75,18.78,18.69,18.82,18.740000000000002,18.55,18.48,18.51,18.660000000000004,18.809999999999995,18.789999999999996,18.729999999999997,18.66,18.560000000000002,18.58,18.669999999999998,18.669999999999995,18.59,18.689999999999998,18.76,18.889999999999997,19.019999999999996,19.259999999999994],"color":"green"},{"name":"anthropic","data":[10.49,10.62,10.83,11.18,11.34,11.419999999999998,11.5,11.51,11.62,11.639999999999999,11.61,11.450000000000001,11.440000000000001,11.4,11.67,11.930000000000001,11.92,12.000000000000002,11.860000000000001,11.950000000000001,12.14,12.23,12.19,12.04,11.91,11.930000000000001,11.99,12.059999999999999,12.16,12.13,12.05,12.05,12.100000000000001,12.01,11.950000000000001,11.83,11.67,11.44],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
