<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.230000000000004,55.690000000000005,55.06000000000001,54.320000000000014,53.40000000000001,52.77000000000002,52.190000000000005,51.38000000000001,50.62000000000001,49.990000000000016,49.24000000000001,48.64000000000001,48.300000000000004,47.89000000000001,47.480000000000004,47.140000000000015,46.79000000000001,46.35000000000001,45.860000000000014,45.38000000000002,44.930000000000014,44.72000000000001,44.51,44.36000000000001,44.260000000000005,44.12000000000001,43.940000000000005,43.53000000000001,43.09000000000001,42.69000000000002,42.370000000000005,42.23,42.10000000000001,42.1,41.94000000000001,41.82000000000001,41.63000000000002,41.65],"color":"green"},{"name":"anthropic","data":[46.63999999999999,47.2,47.81999999999999,48.56,49.48,50.11999999999998,50.69000000000001,51.5,52.239999999999995,52.91,53.63,54.230000000000004,54.57999999999999,54.98,55.39,55.72,56.06,56.529999999999994,56.99,57.49,57.919999999999995,58.190000000000005,58.36999999999998,58.52000000000001,58.59000000000001,58.78,58.97,59.32999999999999,59.790000000000006,60.18,60.47,60.65,60.78000000000001,60.78,60.910000000000004,61.06999999999999,61.24999999999999,61.24999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
