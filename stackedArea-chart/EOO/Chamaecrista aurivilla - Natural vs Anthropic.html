<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.26,54.98,55.190000000000005,53.940000000000005,54.19,54.85,54.36000000000001,54.18,53.91000000000001,53.6,53.470000000000006,53.25,53.550000000000004,53.43999999999999,53.31999999999999,53.12,52.81000000000001,52.15,51.60000000000001,51.010000000000005,50.330000000000005,50.160000000000004,50,49.62,49.7,49.35,49.150000000000006,48.53000000000001,48.22,47.790000000000006,47.45,46.95,46.900000000000006,47.20000000000001,47.22,47.14,47.07999999999999,47.1],"color":"green"},{"name":"anthropic","data":[45.07,44.349999999999994,44.14,45.410000000000004,45.17000000000001,44.480000000000004,44.97,45.14999999999999,45.42,45.73,45.87,46.06999999999999,45.769999999999996,45.879999999999995,46.010000000000005,46.23,46.52,47.18,47.74,48.31,48.989999999999995,49.16,49.31999999999999,49.71,49.64,49.98,50.190000000000005,50.78999999999999,51.11999999999999,51.54,51.879999999999995,52.38999999999999,52.43999999999999,52.129999999999995,52.10999999999999,52.179999999999986,52.26999999999999,52.239999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
