<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.34,81.16999999999999,80.67999999999999,80.21000000000001,79.75999999999999,79.4,79.02000000000001,78.52000000000001,78.07000000000002,77.63000000000001,77.10000000000001,76.65,76.28999999999999,75.83999999999999,75.39999999999999,75.00999999999998,74.61999999999999,74.19999999999999,73.64,73.1,72.66999999999999,72.31999999999998,72.06,71.78999999999996,71.67999999999999,71.49000000000001,71.26999999999997,71.03999999999999,70.78,70.53000000000002,70.27,70.00999999999999,69.83999999999999,69.65,69.28,69.05,68.69000000000001,68.21000000000004],"color":"green"},{"name":"anthropic","data":[18.820000000000004,19.000000000000004,19.48000000000001,19.970000000000002,20.410000000000004,20.780000000000005,21.11,21.630000000000003,22.090000000000007,22.520000000000003,23.080000000000005,23.490000000000002,23.869999999999997,24.330000000000002,24.770000000000003,25.159999999999997,25.530000000000005,25.950000000000003,26.52,27.1,27.549999999999997,27.87,28.1,28.380000000000003,28.48,28.680000000000003,28.880000000000003,29.119999999999997,29.36,29.620000000000005,29.900000000000006,30.16,30.32,30.490000000000002,30.850000000000005,31.060000000000006,31.480000000000004,31.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
