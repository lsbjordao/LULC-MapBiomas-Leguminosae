<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.00000000000001,96.92999999999999,96.57000000000001,96.25,96.13999999999999,96,95.86,95.43999999999998,95.08,94.78999999999999,94.25999999999999,93.83000000000001,93.37,92.93,92.58000000000001,92.28999999999999,91.84000000000002,91.49000000000001,91.05999999999999,90.47999999999999,90.05,89.69000000000001,89.44,89.13999999999999,88.91,88.78,88.77000000000001,88.75999999999999,88.63000000000001,88.46,88.22999999999998,87.92999999999999,87.71,87.53,87.27999999999999,86.99,86.55000000000001,86.08000000000001],"color":"green"},{"name":"anthropic","data":[2.5799999999999996,2.6499999999999995,3.0299999999999994,3.3199999999999994,3.4399999999999995,3.579999999999999,3.729999999999999,4.1499999999999995,4.499999999999998,4.799999999999998,5.329999999999998,5.759999999999999,6.219999999999999,6.649999999999999,6.969999999999999,7.27,7.75,8.089999999999998,8.519999999999998,9.119999999999997,9.539999999999997,9.889999999999997,10.129999999999997,10.429999999999996,10.669999999999998,10.799999999999999,10.819999999999999,10.819999999999999,10.95,11.120000000000001,11.340000000000002,11.66,11.86,12.049999999999999,12.32,12.58,13.03,13.509999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
