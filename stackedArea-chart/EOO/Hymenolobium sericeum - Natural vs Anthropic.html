<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.48,98.46,98.35,98.23000000000002,98.22,98.14,98.08999999999999,97.89999999999999,97.72,97.52,97.14999999999999,96.83999999999999,96.41,96.08,95.98,95.82999999999998,95.40999999999998,95.02,94.55999999999999,93.93,93.45999999999998,93.08999999999999,92.77999999999999,92.49999999999999,92.24,92.12999999999998,92.07,91.98999999999998,91.82,91.58999999999999,91.32000000000002,90.96,90.72999999999999,90.48999999999998,90.03999999999998,89.56,88.89999999999998,88.2],"color":"green"},{"name":"anthropic","data":[1.27,1.27,1.3900000000000001,1.5,1.53,1.59,1.6600000000000001,1.83,2.03,2.2099999999999995,2.59,2.8999999999999995,3.32,3.6399999999999997,3.7499999999999996,3.9299999999999997,4.34,4.72,5.1899999999999995,5.809999999999999,6.27,6.6499999999999995,6.949999999999999,7.2299999999999995,7.499999999999999,7.62,7.68,7.75,7.9399999999999995,8.15,8.41,8.780000000000001,9.01,9.25,9.69,10.19,10.83,11.55],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
