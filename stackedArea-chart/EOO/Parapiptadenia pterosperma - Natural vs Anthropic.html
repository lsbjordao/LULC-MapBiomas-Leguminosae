<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.94000000000001,54.680000000000014,54.13,53.54000000000002,52.96000000000002,52.58,52.21,51.690000000000005,51.190000000000005,50.77000000000001,50.230000000000004,49.750000000000014,49.38000000000002,49.05000000000001,48.70000000000001,48.31000000000002,47.920000000000016,47.53000000000001,47.080000000000005,46.620000000000005,46.25,46.02000000000002,45.800000000000004,45.58000000000001,45.46000000000001,45.29000000000001,45.150000000000006,44.890000000000015,44.52000000000001,44.25,44.010000000000005,43.830000000000005,43.69000000000001,43.56000000000002,43.360000000000014,43.170000000000016,42.96000000000002,42.82000000000001],"color":"green"},{"name":"anthropic","data":[42.31000000000001,42.58,43.099999999999994,43.709999999999994,44.28,44.63999999999999,45.01,45.55,46.05,46.45999999999999,46.98999999999999,47.480000000000004,47.819999999999986,48.16,48.55999999999999,48.910000000000004,49.32000000000001,49.690000000000005,50.13999999999999,50.60999999999999,50.97,51.22000000000002,51.43,51.620000000000005,51.75,51.92,52.07,52.33000000000002,52.679999999999986,52.940000000000005,53.20000000000002,53.38000000000002,53.529999999999994,53.65000000000001,53.85,54.040000000000006,54.25,54.419999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
