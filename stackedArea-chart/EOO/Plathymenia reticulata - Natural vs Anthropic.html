<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.69000000000001,71.44000000000003,70.82000000000001,70.2,69.64000000000001,69.19,68.73,68.07000000000001,67.5,66.98000000000002,66.32000000000001,65.79,65.35999999999999,64.82,64.28,63.879999999999995,63.41999999999999,62.94999999999999,62.309999999999995,61.64000000000001,61.16,60.83999999999999,60.56,60.26999999999999,60.169999999999995,60,59.77999999999998,59.459999999999994,59.16999999999999,58.9,58.64999999999999,58.4,58.230000000000004,58.04999999999999,57.71999999999999,57.49999999999999,57.11999999999999,56.68999999999999],"color":"green"},{"name":"anthropic","data":[25.37,25.61,26.210000000000004,26.810000000000002,27.390000000000004,27.860000000000003,28.33000000000001,28.96000000000001,29.520000000000007,30.04,30.72000000000001,31.24000000000001,31.68,32.21,32.74,33.18000000000001,33.63,34.09,34.76000000000001,35.43,35.89,36.21,36.510000000000005,36.779999999999994,36.879999999999995,37.070000000000014,37.28,37.580000000000005,37.879999999999995,38.120000000000005,38.38999999999999,38.65,38.81999999999999,39.010000000000005,39.33,39.54,39.88999999999999,40.36999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
