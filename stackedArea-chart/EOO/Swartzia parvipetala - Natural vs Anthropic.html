<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.50000000000001,81.29,80.68,80.04,79.28,78.76000000000002,78.15,77.28000000000002,76.35000000000002,75.38000000000001,74.20000000000005,73.16000000000001,72.23,71.26000000000002,70.20000000000002,69.35999999999999,68.58000000000001,67.61,66.32000000000001,65.11000000000001,64.22999999999999,63.60999999999999,63.22,62.809999999999995,62.559999999999995,62.31,61.98,61.559999999999995,61.05,60.59,60.120000000000005,59.8,59.53999999999999,59.33999999999999,58.99999999999999,58.69,58.22999999999998,57.68999999999998],"color":"green"},{"name":"anthropic","data":[17.94,18.150000000000002,18.780000000000005,19.410000000000004,20.170000000000005,20.690000000000005,21.290000000000003,22.180000000000003,23.07,24.070000000000004,25.250000000000004,26.279999999999998,27.22,28.169999999999998,29.250000000000004,30.080000000000002,30.86000000000001,31.81,33.129999999999995,34.32999999999999,35.22,35.82000000000001,36.2,36.63999999999999,36.88,37.12999999999999,37.43999999999999,37.87,38.38999999999999,38.83999999999999,39.28999999999999,39.650000000000006,39.88000000000001,40.080000000000005,40.410000000000004,40.73,41.190000000000005,41.72999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
