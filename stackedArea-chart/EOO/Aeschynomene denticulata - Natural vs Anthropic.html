<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[18.28,18.18,17.88,17.57,17.259999999999998,17.080000000000002,16.88,16.63,16.41,16.27,16.080000000000002,15.969999999999999,15.889999999999999,15.809999999999995,15.72,15.619999999999996,15.549999999999997,15.439999999999996,15.319999999999997,15.229999999999999,15.209999999999999,15.189999999999998,15.199999999999998,15.169999999999998,15.159999999999998,15.149999999999997,15.1,15.049999999999999,14.979999999999999,14.919999999999998,14.899999999999999,14.9,14.85,14.86,14.85,14.809999999999997,14.809999999999997,14.839999999999998],"color":"green"},{"name":"anthropic","data":[22.930000000000003,23.08,23.37,23.67,23.980000000000004,24.150000000000002,24.38,24.61,24.820000000000004,24.97000000000001,25.16,25.26,25.35,25.390000000000004,25.520000000000003,25.63,25.7,25.77,25.900000000000006,25.990000000000002,26.040000000000006,26.040000000000003,26.06000000000001,26.070000000000007,26.08000000000001,26.08000000000001,26.120000000000005,26.180000000000007,26.250000000000004,26.300000000000004,26.33000000000001,26.330000000000002,26.360000000000007,26.360000000000003,26.39,26.42000000000001,26.440000000000012,26.44000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
