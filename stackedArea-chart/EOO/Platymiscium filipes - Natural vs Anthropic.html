<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.51,96.45,95.97,95.55000000000001,95.39,95.20000000000002,94.98,94.46000000000001,93.98000000000002,93.51,92.67999999999999,92.05,91.35,90.72000000000001,90.3,89.89,89.18000000000002,88.54999999999998,87.76,86.82000000000001,86.06000000000002,85.44000000000001,84.99000000000001,84.44,84.03999999999999,83.88000000000001,83.81,83.76,83.50999999999999,83.26999999999998,82.91999999999999,82.49,82.14000000000001,81.78000000000002,81.31,80.78999999999999,80,79.17],"color":"green"},{"name":"anthropic","data":[3.4399999999999995,3.5,3.99,4.3999999999999995,4.57,4.75,4.96,5.47,5.970000000000001,6.430000000000001,7.28,7.9,8.59,9.219999999999999,9.65,10.07,10.749999999999998,11.389999999999997,12.18,13.14,13.879999999999999,14.49,14.96,15.520000000000001,15.91,16.08,16.150000000000002,16.21,16.43,16.680000000000007,17.03,17.469999999999995,17.810000000000002,18.17,18.630000000000003,19.15,19.950000000000003,20.770000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
