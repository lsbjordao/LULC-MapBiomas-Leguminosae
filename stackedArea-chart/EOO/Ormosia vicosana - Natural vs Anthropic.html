<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[25.360000000000003,25.1,24.869999999999997,24.77,24.7,24.6,24.58,24.689999999999998,24.66,24.62,24.64,24.77,24.84,24.68,24.72,24.530000000000005,24.58,24.550000000000004,24.34,24.34,24.43,24.619999999999997,24.69,24.78,25.08,25.279999999999998,25.459999999999997,25.52,25.5,25.529999999999998,25.740000000000002,25.78,25.94,26.040000000000003,26,26.080000000000002,26.380000000000003,26.6],"color":"green"},{"name":"anthropic","data":[74.49000000000001,74.75000000000001,74.96000000000001,75.08,75.17,75.25,75.28,75.15,75.18,75.24,75.21000000000001,75.08000000000001,75.02,75.17,75.13000000000001,75.33000000000001,75.26,75.31000000000002,75.5,75.49,75.42000000000002,75.21000000000001,75.16000000000001,75.06,74.76,74.56,74.38000000000001,74.32000000000001,74.34,74.32000000000001,74.10000000000002,74.06000000000002,73.91000000000001,73.81,73.87,73.76000000000002,73.46000000000001,73.24000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
