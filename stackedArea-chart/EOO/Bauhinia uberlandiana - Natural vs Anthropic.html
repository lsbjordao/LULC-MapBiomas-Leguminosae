<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.209999999999994,75.69,76.51,77.99,70.66,70.85,73,74.46,70.28999999999999,69.87,79.03,78.17999999999999,77.86,75.5,50.6,41.870000000000005,38.730000000000004,34.489999999999995,27.42,25.740000000000002,27.84,27.639999999999997,28.490000000000002,29.490000000000002,29.070000000000004,29.909999999999997,29.259999999999998,29.63,29.63,30,30.419999999999998,35.02,36.28,36.82,36.94,37.36,35.27,36.42],"color":"green"},{"name":"anthropic","data":[36.24,23.78,22.939999999999998,21.47,28.78,28.61,26.45,24.990000000000002,29.159999999999997,29.58,20.419999999999998,21.270000000000003,21.590000000000003,23.97,48.86,57.59,60.730000000000004,64.97,72.03,73.71,71.62,71.8,70.96000000000001,69.96000000000001,70.38,69.54,70.19999999999999,69.83,69.83,69.46,69.03,64.43,63.17999999999999,62.63,62.5,62.08,64.18,63.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
