<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.36,68.12999999999998,67.35999999999999,66.63999999999999,65.78,64.91,64.18,63.55,62.93,62.92999999999999,63.239999999999995,63.56999999999999,64.17,63.910000000000004,63.67999999999999,63.49999999999999,63.02999999999999,62.88,62.58,62.21,61.910000000000004,61.92,61.660000000000004,61.75,61.779999999999994,61.690000000000005,61.5,60.919999999999995,60.550000000000004,60.31,60.07999999999999,60.32000000000001,60.36,60.47,60.50999999999999,60.629999999999995,60.56,60.65],"color":"green"},{"name":"anthropic","data":[30.400000000000002,30.63,31.42,32.14,32.98,33.85,34.57999999999999,35.20999999999999,35.839999999999996,35.88,35.56999999999999,35.24999999999999,34.62,34.879999999999995,35.12,35.29,35.760000000000005,35.9,36.22,36.58000000000001,36.870000000000005,36.870000000000005,37.13,37.050000000000004,37.02,37.11,37.29,37.879999999999995,38.24000000000001,38.47,38.699999999999996,38.48,38.42999999999999,38.309999999999995,38.269999999999996,38.13999999999999,38.199999999999996,38.11999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
