<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[17.5,18.73,18.759999999999998,18.74,18.679999999999996,18.7,18.509999999999998,19.249999999999996,19.31,19.609999999999996,19.719999999999995,19.629999999999995,19.78,19.82,19.65,19.29,19.34,19.22,19.45,19.369999999999997,19.179999999999996,19.22,19.33,19.509999999999994,19.659999999999997,19.939999999999998,20.49,20.639999999999997,20.76,20.779999999999998,21.069999999999997,21.099999999999998,21.29,21.299999999999997,21.069999999999997,20.959999999999997,21.14,21.15],"color":"green"},{"name":"anthropic","data":[82.31,81.09,81.06000000000002,81.08,81.14,81.12,81.31,80.57000000000001,80.52,80.2,80.09,80.17,80.04,79.99,80.16,80.52,80.49,80.59,80.37,80.45,80.64,80.59,80.48,80.31,80.15999999999998,79.86999999999999,79.33,79.17999999999999,79.05999999999999,79.03999999999999,78.74999999999999,78.71,78.53,78.51,78.74000000000001,78.85,78.69,78.67999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
