<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.12,47.04999999999999,46.68,46.42999999999999,45.680000000000014,44.84,44.11,43.06999999999999,42.14,41.66,41.68,42,42.49,42.470000000000006,42.480000000000004,42.17,41.690000000000005,41.48,40.86000000000001,40.41,40.339999999999996,40.48,40.54,40.54,40.37,40.35000000000001,40.17,39.900000000000006,40.08,40.09,40.2,40.4,40.080000000000005,39.89,39.74,39.68999999999999,39.739999999999995,39.84],"color":"green"},{"name":"anthropic","data":[52.74999999999999,52.809999999999995,53.2,53.46,54.22,55.03999999999999,55.78999999999999,56.830000000000005,57.72,58.22,58.2,57.89,57.39,57.41,57.40999999999999,57.70999999999999,58.190000000000005,58.39,59.029999999999994,59.48,59.55999999999999,59.39999999999999,59.339999999999996,59.33,59.54,59.53999999999999,59.72,59.97,59.83,59.81999999999999,59.679999999999986,59.5,59.78999999999999,59.99,60.14,60.209999999999994,60.16,60.050000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
