<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.56,38.34000000000001,37.83000000000001,37.300000000000004,36.97,36.85,36.53000000000001,36.43000000000001,36.370000000000005,36.25000000000001,36.13,36.07,36.02,35.97,35.87,35.739999999999995,35.81000000000001,35.78,35.81,35.82999999999999,35.900000000000006,36.03,36.12,36.160000000000004,36.21000000000001,36.27,36.400000000000006,36.49,36.48000000000001,36.45,36.50000000000001,36.540000000000006,36.69000000000001,36.79000000000001,36.81000000000001,36.870000000000005,36.99,37.230000000000004],"color":"green"},{"name":"anthropic","data":[61.08,61.279999999999994,61.81999999999999,62.33,62.64999999999999,62.78,63.089999999999996,63.199999999999996,63.239999999999995,63.370000000000005,63.50000000000001,63.57000000000001,63.61000000000001,63.660000000000004,63.76,63.879999999999995,63.82999999999999,63.849999999999994,63.830000000000005,63.82000000000001,63.74,63.589999999999996,63.49,63.46000000000001,63.42,63.35000000000001,63.24000000000001,63.13999999999999,63.150000000000006,63.18,63.13,63.1,62.94,62.830000000000005,62.82,62.76,62.64999999999999,62.41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
