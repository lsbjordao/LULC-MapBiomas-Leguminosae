<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.92,33.09,31.900000000000002,31.409999999999997,31.180000000000003,30.700000000000003,30.690000000000005,30.660000000000004,30.4,30.25,30.200000000000003,29.980000000000004,30.090000000000003,30.300000000000004,30.2,30.269999999999996,30.250000000000007,30.25,30.680000000000007,30.680000000000003,30.65000000000001,30.75,30.720000000000002,30.650000000000006,30.710000000000008,30.880000000000003,31.030000000000005,31.25,31.440000000000005,31.520000000000007,31.59,31.700000000000003,31.990000000000002,32.120000000000005,32.400000000000006,32.61000000000001,32.76,32.94],"color":"green"},{"name":"anthropic","data":[55.330000000000005,56.19,57.370000000000005,57.85000000000001,58.080000000000005,58.56,58.559999999999995,58.59999999999999,58.86,59.01,59.05,59.29,59.169999999999995,58.959999999999994,59.05,58.989999999999995,58.99,59.03000000000001,58.58,58.59000000000001,58.599999999999994,58.489999999999995,58.53000000000001,58.60000000000001,58.53,58.37,58.22999999999999,58,57.82000000000001,57.74999999999999,57.669999999999995,57.56,57.29,57.14999999999999,56.839999999999996,56.65,56.49,56.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
