<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.3,60.89000000000001,60.12000000000001,59.47000000000001,58.720000000000006,58.16000000000002,57.59000000000001,56.88000000000001,56.25000000000001,55.760000000000005,55.24999999999999,54.9,54.730000000000004,54.400000000000006,54.040000000000006,53.71000000000001,53.35,53.00999999999999,52.56000000000001,52.11000000000001,51.800000000000004,51.599999999999994,51.489999999999995,51.38,51.309999999999995,51.15999999999999,50.959999999999994,50.50000000000001,50.080000000000005,49.7,49.4,49.300000000000004,49.169999999999995,49.12,48.98,48.849999999999994,48.650000000000006,48.650000000000006],"color":"green"},{"name":"anthropic","data":[37.97999999999999,38.40999999999999,39.15,39.81999999999999,40.57,41.129999999999995,41.69999999999999,42.389999999999986,43.04,43.53000000000001,44.04,44.39000000000001,44.56000000000001,44.870000000000005,45.24,45.609999999999985,45.92999999999999,46.27999999999999,46.74,47.18999999999999,47.46999999999999,47.67,47.8,47.89000000000001,47.97,48.13,48.349999999999994,48.76999999999999,49.17,49.580000000000005,49.86,49.970000000000006,50.11,50.15000000000001,50.290000000000006,50.43,50.620000000000005,50.64000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
