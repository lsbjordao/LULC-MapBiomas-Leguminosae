<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.58,97.59,97.51,97.46,97.25999999999999,97.12,97.18,97.21000000000001,97.18,97.2,97.16,97.08999999999999,97.13999999999999,97.18,97.17,97.28999999999999,97.31,97.28999999999999,97.25000000000001,97.35,97.37,97.39,97.43,97.45,97.44,97.41000000000001,97.4,97.44999999999999,97.46,97.44999999999999,97.46,97.47,97.46,97.44999999999999,97.41,97.31,97.21000000000001,97.14],"color":"green"},{"name":"anthropic","data":[1.84,1.82,1.9,1.96,2.14,2.3,2.2199999999999998,2.1999999999999997,2.23,2.2199999999999998,2.25,2.32,2.2600000000000002,2.2399999999999998,2.2399999999999998,2.1099999999999994,2.0999999999999996,2.1199999999999997,2.15,2.05,2.0399999999999996,2.0199999999999996,1.99,1.97,1.97,1.99,2.02,1.97,1.95,1.95,1.95,1.94,1.94,1.96,2,2.09,2.2,2.27],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
