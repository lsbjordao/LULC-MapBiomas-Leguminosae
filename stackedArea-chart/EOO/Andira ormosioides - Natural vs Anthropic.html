<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.42,37.25,36.86,36.440000000000005,36.01000000000001,35.870000000000005,35.589999999999996,35.24000000000001,34.96,34.78,34.580000000000005,34.52,34.49,34.43,34.36000000000001,34.23,34.17000000000001,34.05,33.92,33.830000000000005,33.790000000000006,33.81,33.790000000000006,33.77,33.75999999999999,33.739999999999995,33.68,33.56999999999999,33.46,33.32,33.26,33.17,33.15,33.23,33.24,33.24,33.35,33.46999999999999],"color":"green"},{"name":"anthropic","data":[48.11000000000001,48.269999999999996,48.66,49.1,49.519999999999996,49.67999999999999,49.97,50.29999999999999,50.59000000000001,50.76000000000001,50.98,51.05000000000001,51.07,51.10999999999999,51.19,51.290000000000006,51.36,51.50000000000001,51.61000000000001,51.71,51.75,51.71999999999999,51.71999999999999,51.75,51.76999999999999,51.8,51.870000000000005,51.94000000000001,52.09000000000001,52.23000000000001,52.269999999999996,52.370000000000005,52.37000000000001,52.290000000000006,52.3,52.29,52.190000000000005,52.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
