<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.029999999999994,40.84,40.33,39.830000000000005,39.42000000000001,39.37,39.17,38.9,38.669999999999995,38.550000000000004,38.39,38.36,38.43999999999999,38.38999999999999,38.33,38.20000000000001,38.11,37.92999999999999,37.870000000000005,37.839999999999996,37.84,37.88,37.849999999999994,37.809999999999995,37.779999999999994,37.74,37.709999999999994,37.63999999999999,37.53,37.37,37.27000000000001,37.15,37.15,37.25,37.26,37.279999999999994,37.349999999999994,37.56000000000001],"color":"green"},{"name":"anthropic","data":[54.97000000000001,55.20000000000001,55.699999999999996,56.20999999999999,56.6,56.65,56.85,57.120000000000005,57.339999999999996,57.47999999999999,57.64,57.67,57.57999999999999,57.64000000000001,57.690000000000005,57.81999999999999,57.89999999999998,58.08,58.129999999999995,58.15999999999999,58.150000000000006,58.11,58.169999999999995,58.19,58.25,58.269999999999996,58.300000000000004,58.37,58.480000000000004,58.66,58.77,58.89999999999999,58.85999999999999,58.769999999999996,58.769999999999996,58.75000000000001,58.660000000000004,58.47999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
