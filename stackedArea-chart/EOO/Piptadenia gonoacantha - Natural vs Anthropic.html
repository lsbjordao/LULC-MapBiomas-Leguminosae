<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.61999999999999,41.29,40.70999999999999,40.14999999999999,39.54999999999999,39.209999999999994,38.839999999999996,38.35,37.95,37.65999999999999,37.33999999999999,37.21999999999999,37.199999999999996,37.08,36.92999999999999,36.739999999999995,36.559999999999995,36.39999999999999,36.209999999999994,36.08,35.99999999999999,36.01999999999999,35.99999999999999,36.019999999999996,36.02999999999999,35.97999999999999,35.89999999999999,35.63999999999999,35.42999999999999,35.23,35.14,35.1,35.05,35.089999999999996,35.04,35.00999999999999,35.00000000000001,35.04],"color":"green"},{"name":"anthropic","data":[50.14,50.480000000000004,51.08,51.62,52.22999999999999,52.559999999999995,52.95000000000001,53.44000000000001,53.85,54.11,54.449999999999996,54.580000000000005,54.59000000000001,54.71000000000001,54.86,55.03000000000001,55.22,55.379999999999995,55.56,55.71999999999999,55.80000000000001,55.77,55.790000000000006,55.77000000000001,55.73,55.8,55.89000000000001,56.17000000000001,56.339999999999996,56.54,56.65,56.66,56.720000000000006,56.69,56.76000000000002,56.760000000000005,56.81000000000001,56.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
