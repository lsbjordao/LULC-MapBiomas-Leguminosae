<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.499999999999986,62.47,61.9,61.25,60.57,60.529999999999994,60.31999999999999,59.95,59.620000000000005,59.49,59.239999999999995,59.11,59.71000000000001,59.760000000000005,59.92000000000001,60.080000000000005,59.92000000000001,59.75,59.6,59.650000000000006,59.510000000000005,59.47,59.32,59.32,59.269999999999996,59.190000000000005,59.089999999999996,58.64000000000001,58.11,57.66000000000001,57.24,57.24,57.23,57.34000000000001,57.3,57.29,57.239999999999995,57.41],"color":"green"},{"name":"anthropic","data":[36.53,36.53999999999999,37.11,37.78,38.46,38.49,38.7,39.07000000000001,39.41000000000001,39.56000000000001,39.780000000000015,39.900000000000006,39.280000000000015,39.260000000000005,39.10000000000001,38.940000000000005,39.1,39.269999999999996,39.42,39.36,39.49999999999999,39.53,39.68,39.67999999999999,39.74,39.82000000000001,39.94,40.36999999999999,40.89000000000001,41.34,41.769999999999996,41.760000000000005,41.79000000000001,41.69,41.70000000000001,41.71000000000001,41.760000000000005,41.59000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
