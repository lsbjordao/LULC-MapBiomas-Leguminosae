<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.32,39.94,39.65,39.37000000000001,39.1,39.02,38.77000000000001,38.67000000000001,38.62000000000001,38.71000000000001,38.699999999999996,38.76,38.81,38.87,38.669999999999995,38.48,38.41,38.27,38.17000000000001,38.080000000000005,38.05,38.07,38.08,38.209999999999994,38.36000000000001,38.559999999999995,38.69,38.739999999999995,38.79999999999999,38.879999999999995,39.03999999999999,39.059999999999995,39.239999999999995,39.37,39.4,39.36,39.449999999999996,39.35999999999999],"color":"green"},{"name":"anthropic","data":[58.5,58.86999999999999,59.15,59.459999999999994,59.72,59.81000000000001,60.05,60.15,60.209999999999994,60.129999999999995,60.11999999999999,60.07,60.01,59.95,60.150000000000006,60.35,60.42999999999999,60.55,60.63,60.760000000000005,60.77,60.74,60.72,60.599999999999994,60.43999999999999,60.260000000000005,60.15,60.089999999999996,60.04999999999998,59.97999999999998,59.800000000000004,59.760000000000005,59.59,59.47,59.45,59.49,59.41,59.48],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
