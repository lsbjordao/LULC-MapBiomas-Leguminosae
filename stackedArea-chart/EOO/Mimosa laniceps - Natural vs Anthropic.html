<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[19.880000000000003,19.85,20.040000000000006,20.390000000000004,20.250000000000007,20.15000000000001,19.990000000000006,19.790000000000006,19.380000000000006,19.340000000000003,19.17,19.280000000000005,19.380000000000003,19.540000000000003,19.630000000000003,19.69,19.62,19.39,19.189999999999998,18.99,18.65,18.49,18.360000000000003,18.35,18.34,18.130000000000003,17.9,17.759999999999998,17.62,17.39,17.299999999999997,17.14,17.029999999999994,16.939999999999994,16.849999999999998,16.729999999999997,16.639999999999997,16.560000000000002],"color":"green"},{"name":"anthropic","data":[13.449999999999998,13.47,13.28,12.930000000000001,13.07,13.19,13.33,13.53,13.930000000000001,14.01,14.159999999999998,14.059999999999999,13.94,13.78,13.699999999999998,13.629999999999999,13.709999999999997,13.95,14.139999999999999,14.339999999999998,14.679999999999998,14.84,14.989999999999998,14.989999999999998,14.999999999999998,15.19,15.43,15.55,15.709999999999999,15.94,16.02,16.190000000000005,16.310000000000002,16.410000000000004,16.490000000000002,16.590000000000007,16.680000000000003,16.770000000000007],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
