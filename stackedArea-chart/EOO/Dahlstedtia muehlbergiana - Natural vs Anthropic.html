<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.800000000000004,32.6,32.18,31.86,31.650000000000002,31.52,31.360000000000003,31.140000000000004,31.010000000000005,30.910000000000004,30.79,30.750000000000004,30.640000000000004,30.58,30.480000000000008,30.240000000000006,30.150000000000006,30.100000000000005,30.040000000000003,30.020000000000003,30.110000000000003,30.180000000000003,30.270000000000003,30.310000000000002,30.28,30.3,30.370000000000008,30.380000000000006,30.400000000000002,30.360000000000003,30.420000000000005,30.450000000000006,30.470000000000002,30.45,30.42,30.380000000000003,30.430000000000007,30.460000000000004],"color":"green"},{"name":"anthropic","data":[57.10000000000001,57.290000000000006,57.70000000000001,58.04000000000001,58.290000000000006,58.38000000000001,58.540000000000006,58.75000000000001,58.87000000000001,58.97,59.11000000000001,59.14000000000001,59.26,59.31999999999999,59.410000000000004,59.64999999999999,59.73,59.77,59.81999999999999,59.86,59.77,59.71999999999999,59.62999999999999,59.56999999999999,59.6,59.56999999999999,59.499999999999986,59.510000000000005,59.47,59.49000000000001,59.47,59.43000000000001,59.39000000000001,59.43,59.47,59.49,59.46999999999999,59.44999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
