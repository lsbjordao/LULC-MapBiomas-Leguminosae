<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.42,46.38,45.94,45.56,45.1,45.00000000000001,44.82000000000001,44.56000000000001,44.31,44.17000000000001,43.94,43.85999999999999,43.88999999999999,43.85,43.809999999999995,43.75000000000001,43.69,43.5,43.43000000000001,43.31000000000001,43.260000000000005,43.280000000000015,43.23000000000002,43.23000000000001,43.20000000000001,43.140000000000015,43.07000000000001,42.93000000000001,42.71000000000002,42.50000000000001,42.38000000000002,42.26000000000001,42.220000000000006,42.28,42.260000000000005,42.210000000000015,42.24,42.25000000000001],"color":"green"},{"name":"anthropic","data":[48.65,48.71000000000001,49.15999999999999,49.54,49.970000000000006,50.1,50.27,50.529999999999994,50.779999999999994,50.910000000000004,51.150000000000006,51.220000000000006,51.190000000000005,51.230000000000004,51.29,51.31,51.39,51.57,51.64000000000001,51.75000000000001,51.830000000000005,51.830000000000005,51.87,51.87,51.89999999999999,51.959999999999994,52.01999999999999,52.18000000000001,52.38000000000001,52.589999999999996,52.69,52.830000000000005,52.86000000000001,52.79,52.82,52.88000000000001,52.84000000000001,52.82999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
