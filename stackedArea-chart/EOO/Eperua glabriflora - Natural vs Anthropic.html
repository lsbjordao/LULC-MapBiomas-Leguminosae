<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.51000000000002,98.49000000000001,98.39999999999999,98.31,98.24,98.31,98.34,98.26,98.2,98.24000000000001,98.35,98.33999999999999,98.26,98.08,97.97000000000001,97.94999999999999,97.92,97.84000000000002,97.77,97.72999999999999,97.65,97.58000000000001,97.60000000000001,97.64,97.53,97.4,97.38999999999999,97.51,97.53000000000002,97.49000000000001,97.26,96.97000000000001,96.96000000000001,97.03,97.09000000000002,97.03999999999998,96.96000000000001,96.88000000000001],"color":"green"},{"name":"anthropic","data":[0.85,0.86,0.96,1.04,1.09,1.04,1,1.09,1.15,1.1099999999999999,0.99,1,1.1,1.26,1.38,1.4,1.44,1.52,1.57,1.61,1.69,1.76,1.74,1.71,1.81,1.95,1.95,1.85,1.8,1.86,2.08,2.3899999999999997,2.37,2.3,2.27,2.3000000000000003,2.39,2.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
