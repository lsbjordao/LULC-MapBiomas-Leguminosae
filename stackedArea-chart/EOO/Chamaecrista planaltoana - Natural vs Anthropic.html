<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.62,38.24,37.54,37.019999999999996,36.32000000000001,35.660000000000004,35.040000000000006,34.36,33.84,33.190000000000005,32.599999999999994,32.17999999999999,31.839999999999996,31.619999999999994,31.429999999999996,31.209999999999994,30.959999999999997,30.62,30.200000000000003,29.789999999999996,29.650000000000002,29.640000000000004,29.6,29.51,29.610000000000003,29.590000000000003,29.660000000000007,29.64,29.630000000000003,29.51,29.410000000000004,29.26,29.109999999999996,29.019999999999996,28.83,28.73,28.580000000000002,29.04],"color":"green"},{"name":"anthropic","data":[58.36,59.72,60.4,60.92000000000001,61.63999999999999,62.28999999999999,62.92,63.610000000000014,64.14,64.78,65.35000000000001,65.78,66.12,66.32,66.54,66.74000000000001,67.01,67.36,67.75999999999999,68.16999999999999,68.32,68.34000000000002,68.39999999999999,68.46,68.36,68.36,68.3,68.32,68.35000000000001,68.45,68.56,68.7,68.83000000000001,68.94000000000001,69.1,69.24000000000001,69.38000000000001,68.92000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
