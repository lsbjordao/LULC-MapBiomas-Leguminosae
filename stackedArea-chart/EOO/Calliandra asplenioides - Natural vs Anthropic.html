<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.789999999999985,61.63999999999999,61.07999999999999,60.27999999999999,59.88999999999999,59.98999999999999,59.899999999999984,59.76999999999999,59.649999999999984,59.419999999999995,59.29999999999999,59.55,59.89,59.99999999999999,60.45,60.51,60.279999999999994,60.04,60.01,59.89,59.95,60.139999999999986,59.859999999999985,59.59999999999998,59.12999999999999,58.75999999999999,58.36999999999999,58.080000000000005,57.64,57.35,57.11999999999999,56.93,56.999999999999986,57.17999999999999,57.04,56.88999999999999,56.70999999999999,56.64999999999999],"color":"green"},{"name":"anthropic","data":[37.39,37.53,38.09,38.88000000000001,39.27000000000001,39.20000000000001,39.28000000000001,39.41000000000001,39.52,39.75000000000001,39.88,39.63000000000001,39.290000000000006,39.18,38.74000000000001,38.66000000000001,38.910000000000004,39.13000000000001,39.20000000000001,39.309999999999995,39.24999999999999,39.04,39.330000000000005,39.61,40.04,40.45,40.800000000000004,41.089999999999996,41.55,41.82,42.07,42.26,42.169999999999995,42.01,42.150000000000006,42.31000000000002,42.47000000000001,42.54000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
