<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.199999999999996,42.68000000000001,41.970000000000006,41.41000000000002,40.82000000000001,40.41000000000001,39.92000000000001,39.33000000000002,38.81000000000001,38.30000000000001,37.77,37.390000000000015,37.1,36.81,36.53000000000001,36.190000000000005,35.970000000000006,35.68,35.41000000000001,35.18000000000001,35.14000000000001,35.12000000000001,35.1,35.06,35.01,34.93,34.86,34.71000000000001,34.54,34.349999999999994,34.20000000000001,34.080000000000005,34.059999999999995,34.13,34.120000000000005,34.080000000000005,34.050000000000004,34.25999999999999],"color":"green"},{"name":"anthropic","data":[55.17000000000001,55.68000000000001,56.38,56.92000000000001,57.52,57.91999999999999,58.42,59.01000000000001,59.51,60.019999999999996,60.53999999999999,60.910000000000004,61.21999999999999,61.52,61.81,62.13,62.350000000000016,62.63000000000001,62.910000000000004,63.14999999999999,63.19,63.21000000000001,63.209999999999994,63.21999999999999,63.330000000000005,63.37000000000001,63.47999999999999,63.61,63.779999999999994,63.96000000000002,64.13,64.22999999999999,64.25,64.16,64.21000000000001,64.23,64.25999999999999,64.06],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
