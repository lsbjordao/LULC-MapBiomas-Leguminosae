<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.36999999999998,78.51999999999998,78.19999999999997,77.75000000000001,77.12,76.82000000000001,76.48000000000002,76.10999999999999,75.66000000000001,75.54,75.31,75.16,75.35,75.15,74.90000000000002,74.75000000000003,74.35000000000002,74.01000000000002,73.70000000000002,73.22000000000001,72.74000000000001,72.39000000000001,72,71.74000000000001,71.53999999999999,71.35000000000001,71.09000000000002,70.46000000000002,69.83000000000001,69.35000000000002,68.92000000000003,68.74000000000004,68.59000000000002,68.42000000000002,68.14,67.86000000000001,67.52000000000001,67.17],"color":"green"},{"name":"anthropic","data":[20.990000000000002,20.859999999999996,21.19,21.63,22.249999999999996,22.549999999999994,22.89,23.28,23.700000000000003,23.869999999999997,24.060000000000002,24.22,24.020000000000003,24.24,24.470000000000002,24.630000000000006,25.040000000000003,25.380000000000003,25.71,26.180000000000003,26.659999999999997,27.01,27.36,27.640000000000004,27.85000000000001,28.020000000000003,28.3,28.92,29.560000000000006,30.02,30.450000000000003,30.640000000000004,30.810000000000006,30.960000000000004,31.22,31.51,31.830000000000002,32.199999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
