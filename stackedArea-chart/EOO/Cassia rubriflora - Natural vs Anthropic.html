<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.45999999999998,92.36,92.43,92.56,92.33999999999999,92.61,93.03,92.75999999999999,92.81999999999998,93.82000000000001,94.67999999999999,94.71,94.16999999999999,93.61,93.34,93.38999999999999,93.41,93.30000000000001,92.92,92.82,92.82000000000001,92.72,92.83000000000001,93.04,92.88000000000002,92.82,92.77999999999999,93.04,93.14999999999999,93.17,92.91000000000001,92.67,92.7,92.7,92.77,92.53999999999998,92.48999999999998,92.16999999999999],"color":"green"},{"name":"anthropic","data":[6.879999999999999,6.96,6.91,6.77,7.000000000000001,6.71,6.319999999999999,6.58,6.5200000000000005,5.54,4.6499999999999995,4.62,5.159999999999999,5.7299999999999995,6,5.95,5.9399999999999995,6.03,6.41,6.51,6.529999999999999,6.62,6.52,6.31,6.449999999999999,6.51,6.5600000000000005,6.300000000000001,6.19,6.17,6.42,6.66,6.65,6.630000000000001,6.5600000000000005,6.779999999999999,6.85,7.169999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
