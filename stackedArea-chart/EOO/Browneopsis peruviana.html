                    return;
                }

                        width: w,
                        height: h,
                        animation: false

                    xAxis: {

                        title: { enabled: false }

                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {

                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
