<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.83000000000001,65.8,65.59,65.4,64.82,64.49,64.2,63.73,63.260000000000005,62.96,62.449999999999996,61.99999999999999,61.61999999999999,61.26,60.760000000000005,60.38,60,59.59000000000001,59.22,58.55,58.059999999999995,57.64000000000001,57.339999999999996,57.019999999999996,56.77,56.37999999999999,56.039999999999985,55.309999999999995,54.639999999999986,54.129999999999995,53.82999999999999,53.629999999999995,53.449999999999996,53.26,52.89999999999999,52.51,52.08999999999999,51.629999999999995],"color":"green"},{"name":"anthropic","data":[33.11999999999999,33.13999999999999,33.32999999999999,33.55999999999999,34.11,34.42999999999999,34.75,35.209999999999994,35.68,35.98,36.48,36.92999999999999,37.31,37.660000000000004,38.16,38.54,38.920000000000016,39.33,39.68,40.370000000000005,40.860000000000014,41.250000000000014,41.58000000000001,41.89000000000001,42.150000000000006,42.53,42.890000000000015,43.60000000000001,44.27,44.76,45.06,45.290000000000006,45.47,45.65,46.01,46.4,46.809999999999995,47.25999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
