<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.5,61.4,60.97,60.49,60.019999999999996,59.82999999999999,59.529999999999994,59.099999999999994,58.71,58.41999999999999,58,57.66,57.53,57.279999999999994,57.00999999999999,56.809999999999995,56.519999999999996,56.24999999999999,55.849999999999994,55.31999999999999,54.95,54.64,54.39000000000001,54.169999999999995,53.97999999999999,53.81000000000001,53.61,53.15,52.660000000000004,52.23,51.84,51.54,51.38999999999999,51.25,51.04999999999999,50.790000000000006,50.54,50.230000000000004],"color":"green"},{"name":"anthropic","data":[37.15,37.260000000000005,37.699999999999996,38.14999999999999,38.61999999999999,38.81999999999999,39.11999999999999,39.569999999999986,39.959999999999994,40.24,40.67,41,41.11,41.370000000000005,41.63999999999999,41.82999999999999,42.099999999999994,42.41,42.79,43.32,43.71000000000001,44.00999999999999,44.269999999999996,44.48,44.68,44.83999999999999,45.02,45.49,45.99000000000001,46.42,46.8,47.100000000000016,47.28000000000002,47.38000000000001,47.59000000000001,47.85000000000001,48.099999999999994,48.39999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
