<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.49000000000002,69.28000000000002,68.66000000000001,68.11,67.53999999999998,67.09,66.65000000000002,66.03,65.45000000000002,65,64.36,63.919999999999995,63.54,63.029999999999994,62.56000000000001,62.129999999999995,61.7,61.21,60.65,59.980000000000004,59.57,59.230000000000004,58.99,58.78000000000001,58.629999999999995,58.519999999999996,58.35999999999999,58.059999999999995,57.78999999999999,57.52,57.25000000000001,57.080000000000005,56.910000000000004,56.78000000000001,56.550000000000004,56.35,56.07000000000001,55.74],"color":"green"},{"name":"anthropic","data":[27.04,27.230000000000004,27.830000000000005,28.439999999999994,28.990000000000002,29.439999999999998,29.860000000000007,30.51000000000001,31.05000000000001,31.50000000000001,32.129999999999995,32.60999999999999,32.980000000000004,33.49,33.94999999999999,34.390000000000015,34.83000000000001,35.28000000000001,35.88000000000001,36.540000000000006,36.970000000000006,37.31,37.51,37.74000000000001,37.89,37.99000000000001,38.16000000000001,38.44,38.73000000000001,38.99,39.260000000000005,39.47,39.6,39.730000000000004,39.949999999999996,40.14,40.459999999999994,40.79],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
