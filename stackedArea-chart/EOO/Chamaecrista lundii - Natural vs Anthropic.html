<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.019999999999996,50.339999999999996,49.86,49.199999999999996,48.39999999999999,47.74,46.959999999999994,46.25999999999999,45.739999999999995,45.11999999999999,44.48,43.98999999999999,43.469999999999985,43.07999999999999,42.73,42.339999999999996,42.059999999999995,41.599999999999994,41.149999999999984,40.62999999999999,40.25000000000001,40,39.8,39.650000000000006,39.550000000000004,39.39,39.230000000000004,38.93000000000001,38.63999999999999,38.419999999999995,38.26,38.07,37.940000000000005,37.88999999999999,37.73,37.66,37.51,37.71999999999999],"color":"green"},{"name":"anthropic","data":[48.800000000000004,49.470000000000006,49.93999999999999,50.60999999999999,51.419999999999995,52.05,52.83,53.55,54.06,54.669999999999995,55.330000000000005,55.8,56.349999999999994,56.74,57.1,57.47,57.75,58.190000000000005,58.63000000000001,59.160000000000004,59.55,59.790000000000006,59.970000000000006,60.15000000000001,60.220000000000006,60.43,60.57,60.87,61.149999999999984,61.37,61.54,61.71,61.830000000000005,61.88999999999998,62.04,62.11000000000001,62.24,62.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
