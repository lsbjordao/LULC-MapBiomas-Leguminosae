<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[11.61,11.59,11.55,11.47,11.370000000000001,11.340000000000002,11.280000000000001,11.23,11.18,11.159999999999998,11.15,11.129999999999999,11.1,11.099999999999998,11.099999999999998,11.069999999999999,11.019999999999998,10.99,10.91,10.87,10.870000000000001,10.899999999999999,10.92,10.889999999999999,10.87,10.849999999999998,10.799999999999997,10.769999999999998,10.719999999999999,10.709999999999997,10.709999999999997,10.69,10.67,10.639999999999999,10.559999999999999,10.489999999999998,10.44,10.419999999999998],"color":"green"},{"name":"anthropic","data":[7.23,7.24,7.3,7.38,7.48,7.51,7.57,7.619999999999999,7.669999999999999,7.679999999999999,7.7,7.71,7.729999999999999,7.749999999999999,7.739999999999999,7.76,7.82,7.84,7.93,7.959999999999999,7.959999999999999,7.92,7.91,7.949999999999999,7.96,7.98,8.02,8.06,8.11,8.12,8.12,8.14,8.179999999999998,8.2,8.27,8.35,8.389999999999999,8.409999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
