<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.53999999999999,98.52,98.44999999999999,98.39,98.34000000000002,98.32,98.25999999999999,98.2,98.12,98.02,97.91000000000001,97.82000000000001,97.7,97.58000000000001,97.47,97.37,97.31,97.21,97.04,96.92,96.81,96.71000000000001,96.63999999999999,96.56000000000002,96.46,96.36,96.28,96.24,96.16000000000001,96.06000000000002,95.93000000000002,95.83000000000001,95.73,95.59,95.33,95.10000000000001,94.74000000000001,94.35000000000001],"color":"green"},{"name":"anthropic","data":[0.64,0.66,0.73,0.78,0.83,0.86,0.92,0.98,1.06,1.17,1.27,1.37,1.49,1.6,1.71,1.81,1.87,1.98,2.13,2.25,2.38,2.46,2.53,2.61,2.71,2.82,2.9,2.96,3.0399999999999996,3.13,3.25,3.3499999999999996,3.4499999999999997,3.5799999999999996,3.8499999999999996,4.09,4.44,4.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
