<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.75999999999998,69.49,68.75999999999999,68.02999999999999,67.27000000000001,66.75000000000001,66.16,65.36,64.61000000000001,63.94,63.099999999999994,62.42999999999999,61.92,61.28,60.62,60.089999999999996,59.50999999999999,58.9,58.06,57.28,56.71,56.300000000000004,56.019999999999996,55.76999999999999,55.599999999999994,55.44999999999999,55.24999999999999,54.93999999999999,54.57,54.23,53.92,53.720000000000006,53.54999999999999,53.39,53.160000000000004,52.91999999999998,52.58,52.17],"color":"green"},{"name":"anthropic","data":[29.500000000000004,29.78,30.479999999999997,31.220000000000002,31.950000000000003,32.489999999999995,33.11,33.9,34.63000000000001,35.29,36.13,36.81,37.33000000000001,37.980000000000004,38.62000000000001,39.170000000000016,39.73000000000001,40.330000000000005,41.18999999999999,41.970000000000006,42.55000000000001,42.93000000000001,43.22,43.470000000000006,43.63000000000001,43.76,43.980000000000004,44.29,44.699999999999996,45,45.31,45.52999999999999,45.71999999999999,45.86999999999999,46.10999999999999,46.33999999999999,46.660000000000004,47.079999999999984],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
