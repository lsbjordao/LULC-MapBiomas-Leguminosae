<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.94,28.86,28.060000000000002,27.620000000000005,27.269999999999996,27.24,27.21,27.059999999999995,26.999999999999996,26.93,26.919999999999998,26.979999999999993,26.849999999999994,26.929999999999993,27.009999999999994,26.949999999999996,27.119999999999994,27.229999999999997,27.029999999999998,26.929999999999996,26.78,26.71,26.920000000000005,26.889999999999997,26.82,26.69,26.689999999999998,26.490000000000002,26.470000000000002,26.54,26.71,26.8,26.769999999999996,26.869999999999994,26.8,26.779999999999998,26.87,27.209999999999997],"color":"green"},{"name":"anthropic","data":[57.48000000000001,57.580000000000005,58.400000000000006,58.83,59.17000000000001,59.21000000000001,59.26,59.40000000000001,59.47,59.53,59.54000000000001,59.480000000000004,59.63000000000001,59.53,59.460000000000015,59.53,59.32000000000001,59.24000000000001,59.42,59.5,59.680000000000014,59.73000000000001,59.54,59.57999999999999,59.62,59.77,59.77,59.96000000000001,60,59.92,59.77,59.66000000000001,59.68,59.56,59.65,59.68000000000001,59.63,59.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
