<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.02000000000001,94.95,94.58000000000003,94.22000000000003,93.93,93.69999999999999,93.38000000000001,92.89000000000001,92.42000000000002,92.03,91.45000000000002,90.93000000000002,90.51,89.94000000000001,89.43,89,88.48000000000002,87.94000000000001,87.16,86.37,85.75999999999999,85.3,84.92999999999999,84.62,84.41,84.28,84.11999999999999,83.87,83.57000000000004,83.32000000000001,82.97000000000003,82.66000000000001,82.42000000000002,82.17000000000002,81.85000000000001,81.55000000000001,81.06000000000002,80.41],"color":"green"},{"name":"anthropic","data":[5.31,5.38,5.749999999999999,6.109999999999999,6.419999999999999,6.6499999999999995,6.959999999999999,7.429999999999999,7.919999999999999,8.329999999999998,8.919999999999998,9.399999999999999,9.839999999999998,10.389999999999997,10.919999999999998,11.319999999999997,11.859999999999996,12.409999999999997,13.199999999999996,13.969999999999999,14.569999999999997,15.049999999999999,15.429999999999996,15.729999999999999,15.95,16.08,16.24,16.49,16.77,17.050000000000004,17.390000000000008,17.710000000000008,17.950000000000003,18.19,18.5,18.810000000000002,19.28,19.930000000000007],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
