<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.19000000000001,60.989999999999995,60.150000000000006,59.460000000000015,58.74000000000001,58.05,57.45,56.79,56.13000000000001,56.09000000000001,56.14000000000001,56.300000000000004,56.97000000000001,56.79,56.720000000000006,56.49,56.1,56.03999999999999,55.60999999999999,55.29,54.980000000000004,54.88999999999999,54.71999999999999,54.779999999999994,54.85999999999999,54.77,54.650000000000006,54.06000000000001,53.71999999999999,53.52,53.290000000000006,53.580000000000005,53.53000000000001,53.60000000000001,53.62000000000001,53.78000000000001,53.74,53.89],"color":"green"},{"name":"anthropic","data":[36.57000000000001,36.78,37.61000000000001,38.300000000000004,39.040000000000006,39.720000000000006,40.32,40.99,41.64,41.68,41.629999999999995,41.46,40.78999999999999,40.989999999999995,41.06999999999999,41.279999999999994,41.66999999999999,41.779999999999994,42.179999999999986,42.47,42.800000000000004,42.88,43.05,42.989999999999995,42.92,43.02000000000001,43.14000000000001,43.72,44.059999999999995,44.269999999999996,44.480000000000004,44.209999999999994,44.239999999999995,44.18999999999999,44.14,44.010000000000005,44.04999999999999,43.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
