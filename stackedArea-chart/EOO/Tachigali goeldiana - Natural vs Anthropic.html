<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.52000000000001,96.46,96.03000000000002,95.58000000000001,95.24,94.97,94.70000000000002,94.14,93.58,93.04000000000002,92.28000000000002,91.67000000000002,91.04000000000002,90.34000000000002,89.75,89.34,88.78999999999999,88.17999999999999,87.34999999999998,86.44999999999999,85.78,85.26999999999998,84.91,84.58,84.36,84.25,84.15,84.05000000000001,83.86000000000001,83.71,83.41999999999999,83.09000000000002,82.89,82.67999999999998,82.37000000000002,82.03999999999999,81.51999999999998,80.7],"color":"green"},{"name":"anthropic","data":[4.69,4.779999999999999,5.19,5.63,5.9799999999999995,6.249999999999999,6.529999999999999,7.099999999999999,7.629999999999999,8.19,8.94,9.559999999999999,10.19,10.889999999999999,11.469999999999999,11.89,12.449999999999998,13.03,13.879999999999999,14.769999999999998,15.429999999999998,15.949999999999998,16.310000000000002,16.660000000000004,16.870000000000005,16.959999999999997,17.07,17.169999999999998,17.34,17.520000000000003,17.8,18.12,18.310000000000002,18.549999999999997,18.84,19.15,19.7,20.51],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
