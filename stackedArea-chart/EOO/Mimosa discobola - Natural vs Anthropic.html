<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.06,67.11999999999999,65.96,65.06,64.02,62.9,61.87,60.51,59.230000000000004,57.77,56.300000000000004,55.02,53.98,52.83,51.790000000000006,50.809999999999995,50.150000000000006,49.32000000000001,48.21,47.330000000000005,46.690000000000005,46.34,46.160000000000004,45.93,45.78,45.60000000000001,45.44,45.17,44.86000000000001,44.620000000000005,44.33,44.10000000000001,43.95,43.940000000000005,43.85,43.85000000000001,43.84,44.29],"color":"green"},{"name":"anthropic","data":[30.810000000000002,31.750000000000004,32.919999999999995,33.81,34.870000000000005,35.98,37.02,38.37,39.669999999999995,41.12,42.57,43.87,44.9,46.07,47.07999999999999,48.06,48.739999999999995,49.54999999999999,50.68000000000001,51.540000000000006,52.18000000000001,52.550000000000004,52.72000000000001,52.93,53.11,53.27,53.43000000000001,53.7,54.02,54.27,54.559999999999995,54.769999999999996,54.92,54.940000000000005,55.04,55.04,55.029999999999994,54.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
