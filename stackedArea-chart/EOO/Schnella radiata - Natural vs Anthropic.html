<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.48,70.20000000000002,69.55000000000003,68.91,68.21000000000001,67.69000000000001,67.10000000000001,66.36,65.66,64.96000000000002,64.2,63.540000000000006,63.04000000000001,62.45,61.80000000000002,61.23000000000001,60.680000000000014,60.07,59.24000000000001,58.45000000000002,57.88000000000001,57.51000000000001,57.28000000000001,57.040000000000006,56.93,56.78,56.56,56.21,55.79000000000001,55.420000000000016,55.09,54.89000000000001,54.660000000000004,54.53000000000001,54.31,54.11000000000001,53.839999999999996,53.45],"color":"green"},{"name":"anthropic","data":[28.280000000000005,28.550000000000004,29.190000000000005,29.839999999999996,30.550000000000004,31.04,31.64,32.419999999999995,33.10999999999999,33.779999999999994,34.55999999999999,35.23,35.72,36.32,36.97,37.52,38.07000000000001,38.69000000000001,39.540000000000006,40.290000000000006,40.87000000000001,41.24,41.480000000000004,41.70000000000001,41.84000000000002,41.960000000000015,42.190000000000005,42.56000000000001,42.94000000000001,43.31999999999999,43.65999999999999,43.849999999999994,44.06000000000001,44.220000000000006,44.45000000000001,44.629999999999995,44.91,45.28999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
