<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.27000000000001,54.79000000000001,54.080000000000005,53.350000000000016,52.63000000000001,52.14000000000001,51.61000000000001,50.99000000000001,50.45,49.95000000000002,49.4,48.94000000000001,48.66000000000001,48.350000000000016,48.010000000000005,47.68,47.400000000000006,47.080000000000005,46.7,46.330000000000005,46.12000000000001,45.95,45.82000000000001,45.70000000000001,45.65,45.54,45.41,45.12000000000001,44.800000000000004,44.49000000000001,44.290000000000006,44.190000000000005,44.10999999999999,44.05,43.900000000000006,43.750000000000014,43.580000000000005,43.540000000000006],"color":"green"},{"name":"anthropic","data":[44.52000000000001,44.949999999999996,45.679999999999986,46.42,47.11999999999999,47.620000000000005,48.12,48.760000000000005,49.31,49.800000000000004,50.33999999999999,50.800000000000004,51.07999999999999,51.37,51.72,52.04,52.33000000000001,52.62,53.00000000000001,53.37999999999998,53.61999999999999,53.769999999999996,53.90000000000001,54.01000000000001,54.08000000000001,54.18000000000001,54.33999999999999,54.60999999999999,54.93,55.24000000000001,55.45,55.54,55.63999999999998,55.70999999999999,55.83999999999999,56.00000000000001,56.210000000000015,56.22000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
