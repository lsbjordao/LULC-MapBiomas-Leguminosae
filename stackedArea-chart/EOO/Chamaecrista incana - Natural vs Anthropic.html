<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.510000000000005,42.76,42.010000000000005,41.18000000000001,40.559999999999995,40.33,39.91,39.940000000000005,39.83,39.83,39.53,39.239999999999995,38.85999999999999,38.78000000000001,38.76,38.55000000000001,38.48999999999999,38.50000000000001,38.29999999999999,38.150000000000006,38.31,38.440000000000005,38.45,38.43000000000001,38.49999999999999,38.620000000000005,38.559999999999995,38.59,38.70000000000001,38.709999999999994,38.60999999999999,38.57000000000001,38.550000000000004,38.51,38.27,38.15,38.05,38.07000000000001],"color":"green"},{"name":"anthropic","data":[57.23,56.97999999999999,57.72,58.57,59.17999999999999,59.39999999999999,59.8,59.809999999999995,59.919999999999995,59.91,60.20999999999999,60.51,60.87,60.949999999999996,60.970000000000006,61.17,61.25000000000001,61.24,61.45000000000001,61.59,61.43,61.31000000000001,61.290000000000006,61.31,61.26,61.13,61.190000000000005,61.140000000000015,61.03000000000001,61.010000000000005,61.11,61.14,61.18,61.220000000000006,61.46,61.59,61.67,61.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
