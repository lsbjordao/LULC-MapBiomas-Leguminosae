<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.22999999999999,44.29,43.49000000000001,42.82,41.85,41.06,40.260000000000005,39.39,38.620000000000005,37.78,36.96,36.21,35.54,35.03000000000001,34.56,34.06,33.620000000000005,33.14,32.64,32.10999999999999,31.78,31.63,31.500000000000004,31.360000000000003,31.310000000000002,31.180000000000003,31.120000000000005,30.930000000000003,30.760000000000005,30.559999999999995,30.41,30.240000000000002,30.09,30.02,29.85,29.75,29.57,29.990000000000002],"color":"green"},{"name":"anthropic","data":[54.1,55.059999999999995,55.819999999999986,56.489999999999995,57.459999999999994,58.26,59.080000000000005,59.93999999999999,60.67999999999999,61.519999999999996,62.32999999999999,63.089999999999996,63.77000000000001,64.27000000000002,64.75000000000001,65.23,65.67,66.17000000000002,66.67000000000002,67.21000000000001,67.5,67.66000000000001,67.79000000000002,67.95,67.98000000000002,68.13,68.16,68.36000000000001,68.56,68.75,68.90000000000002,69.05000000000003,69.19000000000001,69.26,69.42,69.55000000000001,69.71000000000001,69.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
