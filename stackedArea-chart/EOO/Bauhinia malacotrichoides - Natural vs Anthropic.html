<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.300000000000004,58.21,58.06000000000001,57.779999999999994,57.35,57,56.45,55.900000000000006,55.47,54.839999999999996,54.15999999999998,53.58,53.37,53.190000000000005,53.02,52.709999999999994,52.42999999999999,52,51.56,51.05,50.769999999999996,50.609999999999985,50.510000000000005,50.45,50.47,50.33999999999999,50.27,50.13999999999999,49.86,49.599999999999994,49.32,49.08,48.85,48.59999999999999,48.24999999999999,48.08,47.86999999999999,48.339999999999996],"color":"green"},{"name":"anthropic","data":[39.75000000000001,40.84,40.99,41.260000000000005,41.709999999999994,42.03,42.59,43.120000000000005,43.56,44.18,44.89,45.47,45.66,45.85999999999999,46.029999999999994,46.309999999999995,46.63,47.040000000000006,47.480000000000004,47.99,48.269999999999996,48.410000000000004,48.52,48.58,48.59,48.7,48.75,48.919999999999995,49.18000000000001,49.45,49.71,49.959999999999994,50.199999999999996,50.43,50.78,50.96999999999999,51.18,50.68000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
