<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.65999999999998,39.459999999999994,38.879999999999995,38.33,37.809999999999995,37.4,37,36.49,36.12,35.75,35.66,35.78,35.919999999999995,35.86,35.97,35.81,35.690000000000005,35.64999999999999,35.44,35.28999999999999,35.339999999999996,35.52,35.56,35.54,35.410000000000004,35.309999999999995,35.230000000000004,35.120000000000005,35.08,35.01,35.06,35.169999999999995,35.19999999999999,35.199999999999996,35.190000000000005,35.23,35.35999999999999,35.620000000000005],"color":"green"},{"name":"anthropic","data":[51.239999999999995,51.46,52.03999999999999,52.58,53.11999999999999,53.50999999999999,53.91,54.43,54.800000000000004,55.16,55.239999999999995,55.14,55,55.02,54.92000000000001,55.11,55.23,55.25999999999999,55.480000000000004,55.64,55.589999999999996,55.42,55.36,55.41,55.519999999999996,55.6,55.70999999999999,55.82999999999999,55.879999999999995,55.949999999999996,55.879999999999995,55.74999999999999,55.76,55.74,55.739999999999995,55.709999999999994,55.59,55.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
