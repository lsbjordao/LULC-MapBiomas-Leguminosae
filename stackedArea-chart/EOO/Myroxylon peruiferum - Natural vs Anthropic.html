<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.30000000000001,68.07000000000001,67.4,66.74,66.03999999999999,65.56,65.04999999999998,64.35,63.69,63.14,62.47,61.93,61.510000000000005,60.95000000000002,60.390000000000015,59.990000000000016,59.53000000000001,59.02000000000001,58.32000000000001,57.62,57.1,56.73000000000001,56.47,56.230000000000004,56.08,55.940000000000005,55.75,55.45000000000001,55.10000000000001,54.77000000000001,54.49,54.3,54.14,53.98999999999999,53.779999999999994,53.56999999999999,53.25999999999999,52.919999999999995],"color":"green"},{"name":"anthropic","data":[29.750000000000004,29.970000000000002,30.670000000000005,31.280000000000005,31.970000000000006,32.47,32.989999999999995,33.669999999999995,34.33999999999999,34.89,35.55000000000001,36.12,36.540000000000006,37.09000000000001,37.62000000000002,38.05000000000001,38.50000000000001,39,39.720000000000006,40.410000000000004,40.92000000000001,41.31,41.57,41.81,41.94,42.1,42.28000000000001,42.589999999999996,42.93,43.249999999999986,43.52999999999999,43.73,43.9,44.03,44.249999999999986,44.47,44.78,45.11999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
