<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.54,88.38,87.93,87.50000000000001,87.07000000000001,86.72999999999999,86.37,85.82,85.30000000000001,84.76,84.11000000000001,83.54,82.97999999999999,82.43999999999998,81.89999999999999,81.44,80.98,80.45000000000002,79.75,79.06,78.52,78.11999999999999,77.83,77.53999999999999,77.34,77.19,77.03,76.78,76.52,76.25999999999999,75.98,75.70999999999998,75.5,75.28,75,74.71000000000001,74.32,73.70000000000002],"color":"green"},{"name":"anthropic","data":[11.82,11.999999999999998,12.429999999999998,12.869999999999997,13.299999999999999,13.630000000000003,14,14.55,15.080000000000002,15.6,16.270000000000003,16.84,17.370000000000005,17.910000000000007,18.480000000000004,18.950000000000006,19.400000000000006,19.92,20.62,21.31,21.83,22.240000000000002,22.529999999999998,22.810000000000002,23.019999999999996,23.150000000000002,23.320000000000004,23.570000000000004,23.840000000000003,24.1,24.380000000000003,24.650000000000002,24.9,25.070000000000007,25.35000000000001,25.660000000000004,26.05,26.650000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
