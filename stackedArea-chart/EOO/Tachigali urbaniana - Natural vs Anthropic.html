<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[24.45,24.150000000000002,23.400000000000006,23,22.689999999999998,22.480000000000004,22.220000000000002,22.190000000000005,22.070000000000004,21.880000000000006,21.69,21.590000000000003,21.550000000000004,21.499999999999996,21.560000000000002,21.6,21.750000000000004,21.740000000000006,21.680000000000003,21.680000000000007,21.73,21.91,22.01,21.98,22.04,22.12,22.320000000000007,22.5,22.66,22.810000000000002,22.91,23.050000000000008,23.290000000000003,23.470000000000006,23.600000000000005,23.740000000000002,23.990000000000002,24.320000000000004],"color":"green"},{"name":"anthropic","data":[73.03,73.34,74.08,74.5,74.80000000000001,75,75.25999999999999,75.28999999999999,75.42,75.61,75.80999999999999,75.92,75.93,75.98,75.94000000000001,75.88,75.76,75.75,75.81000000000002,75.80000000000001,75.75999999999999,75.60000000000001,75.48,75.51,75.46000000000001,75.36,75.17,74.98,74.82,74.70000000000002,74.59,74.46,74.2,74.03,73.9,73.76,73.52000000000001,73.16999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
