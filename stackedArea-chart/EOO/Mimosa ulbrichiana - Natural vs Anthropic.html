<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.94000000000001,84.00000000000001,83.33000000000001,82.40000000000002,81.55000000000003,81.33000000000001,81.10000000000002,80.77000000000002,80.41000000000003,80.08000000000003,79.56000000000002,78.90000000000002,79.13000000000004,79.01000000000002,78.80000000000001,78.79000000000003,78.25,77.85000000000001,77.44,76.94999999999999,76.16,75.65000000000002,75.42000000000002,75.11,75.05000000000001,74.93,74.54,73.60000000000002,72.34,71.48000000000002,70.80000000000001,70.58999999999999,70.21999999999998,69.65999999999998,69.24000000000001,68.83000000000001,68.35,68.03],"color":"green"},{"name":"anthropic","data":[15.659999999999998,15.6,16.240000000000002,17.200000000000003,18.04,18.25,18.49,18.81,19.17,19.51,20.01,20.670000000000005,20.430000000000003,20.57,20.76,20.799999999999997,21.31,21.73,22.12,22.620000000000005,23.4,23.89,24.160000000000004,24.449999999999996,24.52,24.619999999999994,25.009999999999994,25.960000000000004,27.220000000000002,28.089999999999996,28.769999999999996,28.979999999999993,29.36,29.889999999999997,30.33,30.719999999999995,31.2,31.529999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
