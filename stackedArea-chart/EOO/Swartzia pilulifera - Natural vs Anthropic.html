<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.56000000000001,33.06000000000001,32.650000000000006,32.39000000000001,32.12000000000001,31.96000000000001,31.890000000000004,31.750000000000004,31.670000000000005,31.660000000000007,31.620000000000008,31.570000000000007,31.490000000000002,31.390000000000008,31.22000000000001,31.000000000000004,30.970000000000006,30.910000000000007,30.910000000000004,30.950000000000003,31.030000000000005,31.110000000000003,31.200000000000003,31.310000000000006,31.430000000000007,31.56000000000001,31.670000000000005,31.740000000000006,31.69,31.680000000000003,31.82000000000001,31.930000000000007,32.080000000000005,32.2,32.27000000000001,32.32000000000001,32.440000000000005,32.60000000000001],"color":"green"},{"name":"anthropic","data":[65.67999999999998,66.17999999999999,66.58000000000001,66.85000000000001,67.11999999999999,67.27999999999999,67.36000000000003,67.51,67.60000000000001,67.60000000000002,67.66000000000001,67.67999999999999,67.77000000000001,67.86,68.03,68.24000000000001,68.25000000000001,68.32999999999998,68.35,68.27999999999999,68.19,68.10999999999999,68.01,67.92000000000002,67.80000000000001,67.68,67.57999999999998,67.5,67.53999999999999,67.55999999999999,67.44,67.31,67.16,67.04999999999998,66.96,66.88999999999997,66.76999999999998,66.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
