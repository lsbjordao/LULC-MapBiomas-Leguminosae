<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.379999999999995,28.350000000000005,27.509999999999994,26.479999999999997,25.869999999999997,25.839999999999993,25.470000000000002,25.15,25.080000000000002,24.980000000000004,24.719999999999995,24.619999999999994,24.07,23.81,23.450000000000003,23.040000000000003,22.9,22.679999999999996,22.5,22.360000000000003,22.2,22.24,22.519999999999996,22.580000000000002,22.689999999999998,22.669999999999998,22.88,22.939999999999998,22.96,23.18,23.459999999999997,23.630000000000003,23.689999999999998,23.640000000000004,23.57,23.619999999999997,23.680000000000003,24.140000000000004],"color":"green"},{"name":"anthropic","data":[69.12,69.14999999999999,70.02000000000001,71.07000000000001,71.7,71.74000000000001,72.10000000000001,72.43,72.5,72.62,72.88000000000001,72.98,73.52000000000001,73.77000000000001,74.14000000000001,74.55000000000003,74.68,74.88000000000001,75.10000000000001,75.19000000000001,75.41000000000001,75.33000000000001,75.06,75,74.88,74.91999999999999,74.7,74.66,74.64,74.42000000000002,74.13999999999999,73.99,73.91,73.94999999999999,74.08000000000001,74.09,74.03000000000002,73.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
