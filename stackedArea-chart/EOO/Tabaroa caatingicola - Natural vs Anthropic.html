<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.669999999999995,63.45000000000001,62.35,61.53,61.01,61.089999999999996,61.44,60.84000000000001,60.77,60.8,60.42999999999999,60.24,61.01,62.089999999999996,63.78000000000001,64.48,64.78999999999999,64.9,64.68,64.53,64.08,64.67,64.48,64.2,64.48,64.25,64.19,63.940000000000005,63.21,63.160000000000004,63.02000000000001,63.160000000000004,63.5,63.269999999999996,63.489999999999995,63.66,63.5,63.51],"color":"green"},{"name":"anthropic","data":[34.879999999999995,35.08,36.2,37.019999999999996,37.53,37.46999999999999,37.1,37.72,37.78999999999999,37.73,38.12,38.3,37.519999999999996,36.46,34.77,34.06,33.760000000000005,33.66,33.85,34.01,34.46,33.88,34.07,34.34000000000001,34.080000000000005,34.279999999999994,34.349999999999994,34.6,35.31,35.38000000000001,35.529999999999994,35.379999999999995,35.05,35.27,35.05999999999999,34.88,35.04,35.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
