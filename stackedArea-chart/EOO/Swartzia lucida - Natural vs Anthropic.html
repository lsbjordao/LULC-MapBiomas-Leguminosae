<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.00000000000003,98.93000000000002,98.78000000000002,98.67000000000002,98.63,98.64,98.64,98.5,98.24,98.03,97.69000000000001,97.26999999999998,96.92999999999998,96.72,96.6,96.48,96.32,96.05,95.66000000000001,95.15999999999998,94.61,94.17999999999999,93.79,93.55000000000001,93.36,93.23999999999998,93.00999999999999,92.78999999999999,92.51999999999998,92.21999999999998,91.76,91.17000000000002,90.67,90.22,89.46000000000002,88.75000000000001,87.72000000000001,86.55000000000001],"color":"green"},{"name":"anthropic","data":[0.92,0.98,1.1500000000000001,1.25,1.28,1.28,1.28,1.4300000000000002,1.6700000000000002,1.8800000000000001,2.2199999999999998,2.65,2.9699999999999998,3.1999999999999997,3.3299999999999996,3.4399999999999995,3.5999999999999996,3.869999999999999,4.25,4.75,5.31,5.74,6.13,6.37,6.56,6.68,6.8999999999999995,7.13,7.41,7.7,8.14,8.73,9.24,9.690000000000001,10.450000000000001,11.16,12.19,13.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
