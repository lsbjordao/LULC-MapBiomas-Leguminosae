<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.53000000000002,98.49000000000002,98.34,98.26,98.23000000000002,98.20000000000002,98.13000000000002,97.94,97.74,97.63000000000002,97.34,97.03000000000002,96.62,96.44000000000003,96.44000000000001,96.37000000000003,96.06,95.92000000000002,95.73000000000002,95.36999999999999,95.11,94.87000000000002,94.70000000000002,94.53,94.35000000000001,94.27000000000001,94.27000000000001,94.21999999999998,94.05000000000001,93.9,93.68000000000002,93.36999999999999,93.25000000000001,93.11,92.86000000000001,92.51,92.01,91.52],"color":"green"},{"name":"anthropic","data":[1.31,1.33,1.5,1.57,1.6,1.6500000000000001,1.7000000000000002,1.8900000000000001,2.0799999999999996,2.2199999999999998,2.48,2.79,3.22,3.4,3.4,3.46,3.77,3.91,4.1,4.45,4.71,4.949999999999999,5.119999999999999,5.299999999999999,5.47,5.539999999999999,5.55,5.59,5.7700000000000005,5.930000000000001,6.14,6.46,6.590000000000001,6.720000000000001,6.9799999999999995,7.3100000000000005,7.800000000000001,8.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
