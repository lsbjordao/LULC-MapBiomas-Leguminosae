<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.68,56.48,56.399999999999984,55.58,54.540000000000006,53.74000000000001,53.07,51.97,51.19,50.940000000000005,50.72000000000001,50.779999999999994,51.41999999999999,51.38,51.220000000000006,51.24,50.81,50.38999999999999,49.739999999999995,49.26000000000001,48.52,48.47,48.420000000000016,48.400000000000006,48.79000000000001,48.87000000000001,48.86000000000001,48.739999999999995,48.48000000000001,48.43,48.419999999999995,48.81,48.62000000000001,48.38000000000001,48.28,48.2,48.14000000000001,48.11000000000001],"color":"green"},{"name":"anthropic","data":[42.760000000000005,42.940000000000005,43.03,43.81999999999999,44.879999999999995,45.69,46.35999999999999,47.449999999999996,48.25,48.48,48.699999999999996,48.64999999999999,48.010000000000005,48.05,48.2,48.16,48.60999999999999,49.05,49.68999999999999,50.169999999999995,50.89999999999999,50.96,51.019999999999996,51.019999999999996,50.629999999999995,50.54,50.56999999999999,50.67999999999999,50.959999999999994,51.02,51.019999999999996,50.62999999999999,50.82000000000001,51.05,51.15,51.22999999999999,51.3,51.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
