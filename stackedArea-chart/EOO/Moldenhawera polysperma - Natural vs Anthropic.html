<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.04,37.81999999999999,37.35000000000001,37.35,37.40999999999999,37.36,37.4,37.540000000000006,37.87,38.1,38.27,38.510000000000005,38.73,38.83999999999999,39.03,39.05,39.220000000000006,39.34000000000001,39.5,39.57,39.650000000000006,39.78,39.849999999999994,39.949999999999996,40.16,40.32,40.53,40.75000000000001,40.9,41.129999999999995,41.41999999999999,41.55999999999999,41.70999999999999,41.76999999999999,41.83999999999999,41.93999999999999,42.309999999999995,42.46999999999999],"color":"green"},{"name":"anthropic","data":[60.11000000000001,60.34,60.8,60.82000000000001,60.74000000000001,60.800000000000004,60.760000000000005,60.63000000000001,60.3,60.05000000000001,59.89,59.650000000000006,59.43000000000001,59.31,59.14000000000001,59.10000000000001,58.940000000000005,58.81,58.650000000000006,58.6,58.5,58.38,58.300000000000004,58.22,58.019999999999996,57.849999999999994,57.63,57.41,57.26,57.03,56.739999999999995,56.60000000000001,56.449999999999996,56.38,56.31999999999999,56.220000000000006,55.84,55.69],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
