<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.52,99.52000000000002,99.49,99.49000000000001,99.49000000000001,99.51,99.52000000000002,99.50000000000001,99.48,99.48000000000002,99.49,99.48,99.47,99.44000000000001,99.42000000000002,99.42000000000002,99.44000000000003,99.42999999999999,99.44999999999999,99.42,99.41999999999999,99.39,99.39999999999999,99.41000000000001,99.39,99.36999999999999,99.37,99.36000000000001,99.36000000000001,99.35000000000002,99.32000000000001,99.25000000000001,99.23,99.24000000000001,99.22000000000001,99.17000000000002,99.08,98.94],"color":"green"},{"name":"anthropic","data":[0.12,0.11,0.12,0.14,0.13,0.12,0.11,0.12,0.14,0.15000000000000002,0.14,0.15000000000000002,0.17,0.19,0.21000000000000002,0.2,0.19,0.19,0.19,0.2,0.22,0.23,0.23,0.22,0.24000000000000002,0.27,0.29000000000000004,0.27,0.27,0.28,0.31,0.38,0.4,0.38,0.4,0.44,0.55,0.6900000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
