<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.84,83.17999999999999,82.97999999999999,83.00000000000001,83.09000000000002,83.06000000000002,83.03,83.17999999999999,83.41,83.93,83.98,84.4,84.5,84.63,84.59,84.69000000000001,84.79,84.88000000000001,85.12,85.11,85.23,85.56000000000002,85.57000000000001,85.59000000000002,85.69000000000001,85.83,86.02000000000001,86.11,86.32000000000001,86.50999999999999,86.67999999999999,86.73,86.91,86.94,87.05000000000001,87.14,87.37,87.35000000000001],"color":"green"},{"name":"anthropic","data":[16.53,16.189999999999998,16.4,16.36,16.27,16.3,16.33,16.19,15.95,15.419999999999998,15.38,14.96,14.86,14.73,14.77,14.670000000000002,14.569999999999999,14.5,14.25,14.25,14.13,13.82,13.799999999999999,13.78,13.68,13.549999999999999,13.350000000000001,13.25,13.03,12.850000000000001,12.69,12.64,12.469999999999999,12.440000000000001,12.33,12.21,11.98,12.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
