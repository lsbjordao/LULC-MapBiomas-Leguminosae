<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[8.09,8.02,7.97,7.8,7.6899999999999995,7.629999999999999,7.59,7.57,7.509999999999999,7.539999999999999,7.55,7.679999999999999,7.629999999999999,7.629999999999999,7.549999999999999,7.4799999999999995,7.539999999999999,7.510000000000001,7.63,7.579999999999999,7.529999999999999,7.539999999999999,7.6000000000000005,7.689999999999999,7.770000000000001,7.790000000000001,7.78,7.78,7.720000000000001,7.7299999999999995,7.739999999999999,7.68,7.580000000000001,7.65,7.680000000000001,7.73,7.8500000000000005,7.94],"color":"green"},{"name":"anthropic","data":[4.11,4.1899999999999995,4.24,4.3999999999999995,4.52,4.569999999999999,4.64,4.6499999999999995,4.72,4.6899999999999995,4.67,4.56,4.57,4.57,4.65,4.71,4.69,4.71,4.6,4.63,4.680000000000001,4.69,4.63,4.54,4.45,4.41,4.44,4.44,4.47,4.489999999999999,4.4799999999999995,4.55,4.62,4.55,4.53,4.489999999999999,4.359999999999999,4.2700000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
