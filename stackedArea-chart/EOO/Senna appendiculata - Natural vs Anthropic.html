<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.990000000000016,57.91000000000001,57.37000000000002,56.84,56.220000000000006,55.87000000000001,55.49000000000001,55.040000000000006,54.61000000000001,54.47000000000001,54.33000000000001,54.29000000000002,54.48000000000001,54.330000000000005,54.18000000000001,54.010000000000005,53.78,53.59,53.34000000000001,53.10000000000001,52.90000000000001,52.79000000000001,52.70000000000001,52.70000000000001,52.720000000000006,52.63,52.470000000000006,52.010000000000026,51.63000000000002,51.28000000000001,51.05,51,50.970000000000006,50.98,50.94000000000001,50.93000000000002,50.890000000000015,50.890000000000015],"color":"green"},{"name":"anthropic","data":[36.36000000000001,36.46,36.989999999999995,37.529999999999994,38.14,38.49,38.89,39.32000000000001,39.730000000000004,39.9,40.029999999999994,40.08999999999999,39.889999999999986,40.029999999999994,40.2,40.35999999999999,40.58,40.79,41.04,41.279999999999994,41.49,41.57999999999999,41.66,41.67000000000001,41.670000000000016,41.75,41.88999999999999,42.34,42.71,43.08,43.31000000000001,43.339999999999996,43.39,43.35999999999999,43.39999999999999,43.42000000000001,43.449999999999996,43.459999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
