<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.91,30.84,29.93,29.28,28.78,28.55,28.22,28.209999999999994,28.089999999999996,27.89,27.65,27.439999999999998,27.3,27.25,27.240000000000002,27.18,27.349999999999994,27.310000000000002,27.349999999999998,27.309999999999995,27.249999999999993,27.31,27.38,27.369999999999997,27.31,27.3,27.449999999999996,27.629999999999995,27.74,27.870000000000005,27.990000000000006,28,28.090000000000003,28.259999999999998,28.41,28.450000000000003,28.690000000000005,28.990000000000002],"color":"green"},{"name":"anthropic","data":[54.879999999999995,54.97,55.87,56.55,57.03,57.24999999999999,57.589999999999996,57.60999999999999,57.72,57.919999999999995,58.169999999999995,58.37,58.49999999999999,58.55999999999999,58.56999999999999,58.61999999999999,58.45,58.51,58.449999999999996,58.480000000000004,58.54,58.5,58.41999999999999,58.43999999999999,58.46999999999999,58.49999999999999,58.33,58.15,58.059999999999995,57.91999999999999,57.82999999999999,57.81999999999999,57.72999999999999,57.55999999999998,57.399999999999984,57.36999999999999,57.10999999999999,56.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
