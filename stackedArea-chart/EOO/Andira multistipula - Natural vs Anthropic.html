<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.03,99.04,99,98.97,98.95,98.92000000000002,98.89999999999999,98.86,98.83,98.76,98.69999999999999,98.62,98.55999999999999,98.48,98.41,98.35999999999999,98.33,98.26,98.16999999999999,98.1,98.03,97.96000000000001,97.93,97.87,97.83000000000001,97.76,97.72,97.69,97.64999999999998,97.59,97.51999999999998,97.46,97.38000000000001,97.28999999999999,97.15,96.99,96.76,96.5],"color":"green"},{"name":"anthropic","data":[0.43000000000000005,0.43000000000000005,0.47000000000000003,0.5,0.54,0.55,0.5800000000000001,0.62,0.66,0.7100000000000001,0.77,0.8500000000000001,0.93,1,1.07,1.12,1.1600000000000001,1.22,1.3,1.37,1.45,1.51,1.56,1.6,1.6600000000000001,1.72,1.76,1.8,1.83,1.8800000000000001,1.96,2.02,2.09,2.1599999999999997,2.32,2.48,2.6999999999999997,2.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
