<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.49,52.51,52.1,52.39,52.47,52.540000000000006,52.470000000000006,52.48,52.56999999999999,52.809999999999995,52.83,53.06,53.04999999999999,53.15,53.3,53.31999999999999,53.31,53.35000000000001,53.290000000000006,53.25,53.43000000000001,53.63,53.56,53.52,53.57,53.65,53.64,53.79,54.03,54.23,54.330000000000005,54.379999999999995,54.45,54.410000000000004,54.48,54.510000000000005,55.050000000000004,55.49999999999999],"color":"green"},{"name":"anthropic","data":[46.99,46.96,47.370000000000005,47.07000000000001,47.01,46.919999999999995,46.989999999999995,46.98,46.9,46.65,46.63,46.41,46.410000000000004,46.32000000000001,46.19,46.13999999999999,46.16,46.1,46.18,46.209999999999994,46.02,45.84,45.900000000000006,45.940000000000005,45.910000000000004,45.82,45.82,45.67,45.440000000000005,45.23,45.129999999999995,45.089999999999996,45.019999999999996,45.07,44.989999999999995,44.97,44.43,43.96],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
