<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.55999999999999,82.61,81.75000000000001,80.68,79.70000000000002,79.36,79.46000000000001,79.92000000000002,79.67999999999999,79.18,78.94,78.50000000000001,78.05000000000001,77.61,77.47000000000001,76.69000000000001,76.96000000000002,76.37000000000002,76.47,76.25,75.71999999999998,75.35999999999999,75.5,75.78999999999999,77.01,77.59,77.7,77.50999999999999,76.61000000000001,76.09,76.16000000000001,75.78000000000002,75.31000000000002,76.03000000000002,76.29000000000002,76.52000000000001,77.95000000000002,78.53],"color":"green"},{"name":"anthropic","data":[13.41,14.419999999999998,15.299999999999999,16.35,17.350000000000005,17.690000000000005,17.590000000000003,17.120000000000005,17.360000000000003,17.870000000000005,18.090000000000003,18.53,18.990000000000002,19.42,19.560000000000002,20.330000000000005,20.07,20.660000000000004,20.560000000000002,20.78,21.310000000000002,21.68,21.55,21.240000000000002,20.03,19.450000000000003,19.35,19.53,20.42,20.950000000000003,20.89,21.26,21.71,20.990000000000002,20.730000000000004,20.51,19.070000000000004,18.500000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
