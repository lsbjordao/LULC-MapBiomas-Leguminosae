<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.64,51.51999999999999,51.06,50.58,50.080000000000005,49.88,49.56,49.1,48.74,48.52,48.28,48.16,48.32,48.269999999999996,48.18,48.05,47.90999999999999,47.790000000000006,47.620000000000005,47.56,47.449999999999996,47.44999999999998,47.44999999999999,47.42999999999999,47.46,47.44,47.339999999999996,47.03000000000001,46.699999999999996,46.4,46.160000000000004,46.099999999999994,46.050000000000004,46.06999999999999,46.07000000000001,46.09,46.10000000000001,46.2],"color":"green"},{"name":"anthropic","data":[41.6,41.74,42.21,42.68,43.18,43.38999999999999,43.73,44.16,44.57000000000001,44.77,45.01,45.139999999999986,44.94999999999999,44.99999999999999,45.1,45.220000000000006,45.37,45.48999999999999,45.68,45.699999999999996,45.809999999999995,45.82000000000001,45.84,45.83,45.800000000000004,45.85,45.94,46.239999999999995,46.58999999999998,46.900000000000006,47.12,47.19,47.22,47.21999999999999,47.21,47.19,47.15999999999999,47.08999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
