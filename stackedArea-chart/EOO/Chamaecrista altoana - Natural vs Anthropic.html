<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.22,92.57000000000001,92.84,92.83999999999999,92.61999999999999,92.39000000000001,92.36,92.29,92.21,91.79,91.61,91.59,91.42,90.85999999999999,90.96,90.86999999999999,90.74000000000001,90.64999999999999,90.6,90.47000000000001,90.41,90.35,90.45,90.52999999999999,90.72000000000001,90.75,90.85,90.83,90.78,90.64999999999999,90.41999999999999,90.28,90.11,89.92,89.67,89.47,89.41,89.14],"color":"green"},{"name":"anthropic","data":[7.35,7,6.73,6.73,6.9399999999999995,7.18,7.2,7.25,7.369999999999999,7.759999999999999,7.939999999999999,7.989999999999999,8.16,8.7,8.6,8.71,8.83,8.940000000000001,8.979999999999999,9.100000000000001,9.17,9.21,9.11,9.03,8.84,8.82,8.709999999999999,8.729999999999999,8.79,8.919999999999998,9.14,9.290000000000001,9.46,9.66,9.889999999999999,10.109999999999998,10.139999999999999,10.4],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
