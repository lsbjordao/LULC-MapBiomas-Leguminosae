<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.39,30.130000000000003,29.570000000000004,29.26,29.020000000000007,28.920000000000005,28.78,28.65,28.59,28.529999999999998,28.41,28.310000000000002,28.27,28.22,28.270000000000003,28.34,28.52,28.560000000000002,28.510000000000005,28.67,28.860000000000003,29.1,29.390000000000004,29.440000000000005,29.45,29.540000000000003,29.659999999999997,29.75,29.79,29.79,29.830000000000002,29.970000000000002,30.310000000000002,30.480000000000004,30.6,30.840000000000003,31.100000000000005,31.6],"color":"green"},{"name":"anthropic","data":[68.73,68.99000000000001,69.54,69.86000000000001,70.10000000000001,70.17999999999999,70.34,70.45,70.52000000000001,70.58000000000001,70.7,70.81000000000002,70.87,70.9,70.83000000000001,70.79,70.60000000000001,70.55000000000001,70.62,70.44000000000001,70.26,70.00999999999999,69.73000000000002,69.66000000000001,69.66,69.58000000000001,69.45,69.37000000000002,69.34,69.34,69.3,69.14999999999999,68.8,68.62,68.51,68.27999999999999,68.02,67.51],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
