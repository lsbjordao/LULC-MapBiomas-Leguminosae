<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.43,56.15999999999998,55.51999999999999,55.08999999999999,54.56,54.22,53.789999999999985,53.21999999999999,52.93999999999998,52.68999999999999,52.83999999999999,53.410000000000004,53.79999999999999,53.92999999999999,54.199999999999996,53.96999999999999,53.55,53.40999999999999,53.19999999999999,53.050000000000004,53.35,53.51,53.43,53.3,52.769999999999996,52.64,52.21999999999999,51.97999999999999,51.8,51.559999999999995,51.489999999999995,51.5,51.44,51.56,51.42,51.32,51.220000000000006,51.40999999999999],"color":"green"},{"name":"anthropic","data":[45.2,45.470000000000006,46.09999999999999,46.53999999999999,47.039999999999985,47.40999999999999,47.82,48.41,48.699999999999996,48.949999999999996,48.779999999999994,48.21999999999999,47.82999999999999,47.699999999999996,47.40999999999998,47.65,48.10000000000001,48.190000000000005,48.42,48.56,48.239999999999995,48.10000000000001,48.17,48.300000000000004,48.85,48.96999999999999,49.39,49.65,49.830000000000005,50.06000000000001,50.13,50.11000000000001,50.17,50.02000000000001,50.18,50.26999999999999,50.38,50.20000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
