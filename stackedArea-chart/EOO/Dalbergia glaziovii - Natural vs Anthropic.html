<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.74,50.73,50.760000000000005,50.74999999999999,50.99,51.29,51.25000000000001,51.339999999999996,52.01,52.2,52.82,53.26,53.410000000000004,53.2,53.379999999999995,53.22,53.510000000000005,53.739999999999995,53.75,53.580000000000005,53.599999999999994,53.63,53.71,53.78,54.01,54.1,53.96,54.24,54.44,54.900000000000006,55.72,55.919999999999995,55.9,55.910000000000004,55.699999999999996,55.63,56.16,55.82000000000001],"color":"green"},{"name":"anthropic","data":[47.519999999999996,48.53,48.510000000000005,48.5,48.26,47.96,48,47.91,47.230000000000004,47.06,46.43,45.99,45.85,46.06,45.870000000000005,46.03,45.75,45.519999999999996,45.5,45.67,45.650000000000006,45.620000000000005,45.55,45.47,45.25,45.150000000000006,45.290000000000006,45.019999999999996,44.81,44.36,43.54,43.34,43.36,43.349999999999994,43.54,43.620000000000005,43.09,43.42],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
