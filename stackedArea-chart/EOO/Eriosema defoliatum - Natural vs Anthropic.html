<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.63999999999999,54.22,53.720000000000006,52.959999999999994,52.13999999999999,51.5,50.739999999999995,50.07,49.550000000000004,48.99,48.34,47.83,47.22,46.769999999999996,46.349999999999994,45.9,45.580000000000005,45.04,44.53,43.989999999999995,43.550000000000004,43.239999999999995,42.99999999999999,42.78999999999999,42.7,42.5,42.3,42.00999999999999,41.66,41.38999999999999,41.21,41.05,40.93999999999999,40.90999999999999,40.79,40.73000000000001,40.64,40.85],"color":"green"},{"name":"anthropic","data":[44.599999999999994,45.03,45.500000000000014,46.3,47.14000000000001,47.75,48.5,49.19,49.71,50.23999999999998,50.89000000000001,51.419999999999995,52.02000000000001,52.48,52.89,53.33000000000001,53.65000000000001,54.2,54.71000000000001,55.230000000000004,55.7,55.99000000000001,56.25,56.430000000000014,56.53000000000001,56.730000000000004,56.91000000000001,57.21000000000001,57.58000000000002,57.81999999999999,58.019999999999996,58.17,58.29,58.31000000000002,58.429999999999986,58.47,58.59,58.370000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
