<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.74,41.72,41.24999999999999,40.76999999999999,40.470000000000006,40.400000000000006,40.29,40.300000000000004,40.33,40.39999999999999,40.4,40.43999999999999,40.42999999999999,40.46999999999999,40.629999999999995,40.569999999999986,40.59,40.57000000000001,40.53000000000001,40.589999999999996,40.74,40.85,40.88999999999999,41.010000000000005,41.08,41.27,41.34,41.49,41.670000000000016,41.8,41.99,42.11,42.21000000000001,42.230000000000004,42.190000000000005,42.190000000000005,42.31,42.32],"color":"green"},{"name":"anthropic","data":[51.86,51.87000000000001,52.34,52.82000000000001,53.13000000000001,53.199999999999996,53.30000000000001,53.31,53.27,53.199999999999996,53.21,53.14,53.190000000000005,53.14999999999999,53,53.07999999999999,53.03,53.03999999999999,53.08,53.019999999999996,52.85999999999999,52.75999999999999,52.709999999999994,52.60000000000001,52.529999999999994,52.35,52.260000000000005,52.129999999999995,51.949999999999996,51.82,51.63000000000001,51.52,51.42000000000001,51.38000000000001,51.43000000000001,51.43000000000001,51.29,51.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
