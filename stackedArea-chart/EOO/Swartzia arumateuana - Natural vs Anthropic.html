<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.34000000000002,84.5,83.71000000000002,82.83,82.19000000000001,81.74000000000002,81.20000000000002,79.78,78.77000000000001,77.91000000000001,76.84,75.84,74.91999999999999,73.5,72.58999999999999,72.02,71.22999999999999,70.48,69.12,67.41000000000001,66.09,64.95,64.05000000000001,63.170000000000016,62.51000000000001,62.040000000000006,61.64,61.040000000000006,60.46,60.050000000000004,59.230000000000004,58.510000000000005,58.019999999999996,57.49,56.79,55.92000000000001,54.96000000000001,53.44],"color":"green"},{"name":"anthropic","data":[15.02,14.879999999999999,15.65,16.53,17.18,17.62,18.170000000000005,19.580000000000005,20.610000000000003,21.46,22.549999999999997,23.529999999999998,24.44,25.88,26.780000000000005,27.36,28.14,28.889999999999997,30.24,31.97,33.27000000000001,34.43000000000001,35.309999999999995,36.21,36.85,37.309999999999995,37.71000000000001,38.309999999999995,38.89,39.32999999999999,40.16,40.86,41.37,41.879999999999995,42.58,43.45999999999999,44.38999999999999,45.919999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
