<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.39999999999999,66.35000000000001,66.22,65.58999999999999,64.52,63.78000000000001,62.94,62.31,61.64000000000001,60.93,60.35000000000001,59.75,59.10999999999999,58.62,58.14,57.74,57.36000000000001,56.720000000000006,56.07,54.96,54.290000000000006,53.83,53.46999999999999,52.89999999999999,52.53999999999999,52.04,51.6,50.96,50.48,50.21000000000001,49.99,49.75,49.46,49.17999999999999,48.690000000000005,48.23,47.73,47.25999999999999],"color":"green"},{"name":"anthropic","data":[32.370000000000005,32.43,32.56999999999999,33.15,34.22,34.970000000000006,35.81000000000001,36.46,37.11000000000001,37.839999999999996,38.400000000000006,39.010000000000005,39.65000000000001,40.15,40.64000000000001,41.019999999999996,41.39999999999999,42.01,42.69999999999999,43.790000000000006,44.47,44.90999999999999,45.26,45.830000000000005,46.21,46.71,47.17999999999999,47.800000000000004,48.24999999999999,48.550000000000004,48.769999999999996,48.989999999999995,49.28000000000001,49.58,50.050000000000004,50.51000000000001,51.00999999999999,51.480000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
