<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.17000000000002,75.26,74.88000000000002,74.40000000000002,73.66000000000003,73.48000000000002,73.25000000000001,72.83000000000001,72.37000000000002,72.13000000000002,71.76000000000002,71.46000000000001,71.67000000000003,71.56,71.35000000000001,71.32,70.90000000000002,70.53,70.23,69.67000000000002,69.14,68.77000000000001,68.49,68.18,67.96000000000001,67.64000000000001,67.22000000000001,66.40000000000002,65.56000000000002,64.96,64.46000000000001,64.23,63.9,63.61,63.24,62.809999999999995,62.40999999999999,61.989999999999995],"color":"green"},{"name":"anthropic","data":[24.23,24.129999999999995,24.529999999999998,24.990000000000002,25.710000000000004,25.93,26.140000000000004,26.560000000000002,27.029999999999998,27.27,27.640000000000008,27.950000000000003,27.710000000000004,27.830000000000005,28.040000000000006,28.080000000000002,28.48,28.870000000000005,29.170000000000005,29.700000000000006,30.250000000000007,30.6,30.900000000000006,31.200000000000003,31.41,31.75,32.16,32.989999999999995,33.84,34.44,34.95,35.18,35.49000000000001,35.78,36.160000000000004,36.589999999999996,36.97,37.410000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
