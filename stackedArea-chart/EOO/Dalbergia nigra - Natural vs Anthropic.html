<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.09000000000002,51.96000000000002,51.32000000000002,50.760000000000005,50.20000000000001,49.98,49.58000000000001,49.160000000000004,48.80000000000001,48.690000000000005,48.540000000000006,48.52,48.84,48.71000000000001,48.62,48.440000000000005,48.18,48.03,47.81000000000001,47.70000000000002,47.570000000000014,47.5,47.430000000000014,47.42,47.44,47.480000000000004,47.47,47.280000000000015,46.98000000000001,46.71,46.43000000000001,46.46000000000001,46.45000000000001,46.59000000000002,46.67,46.76000000000001,46.82,47.000000000000014],"color":"green"},{"name":"anthropic","data":[45.63000000000001,45.769999999999996,46.38,46.96,47.54,47.78000000000001,48.13000000000001,48.559999999999995,48.93,49.039999999999985,49.18999999999999,49.219999999999985,48.88999999999999,49.03,49.11000000000001,49.27,49.51,49.69999999999999,49.90999999999999,50.01999999999999,50.15999999999999,50.21999999999999,50.3,50.29999999999999,50.269999999999996,50.25000000000001,50.26999999999999,50.42999999999999,50.73999999999999,51.019999999999996,51.29,51.27,51.269999999999996,51.139999999999986,51.05,50.970000000000006,50.9,50.69999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
