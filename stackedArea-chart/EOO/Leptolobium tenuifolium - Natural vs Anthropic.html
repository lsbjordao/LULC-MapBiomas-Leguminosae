<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.98,30.01,28.730000000000004,27.650000000000006,26.900000000000006,26.580000000000002,26.14,26.240000000000002,26.350000000000005,26.340000000000003,26.21,25.94,25.87,25.620000000000005,25.549999999999997,25.329999999999995,25.41,25.5,25.7,25.839999999999996,26.02,26.25,26.41,26.48,26.709999999999997,26.699999999999996,26.610000000000003,26.580000000000002,26.430000000000003,26.360000000000003,26.38,26.200000000000003,26.27,26.540000000000003,26.750000000000004,26.96,27.12,27.340000000000003],"color":"green"},{"name":"anthropic","data":[60.03,61.08999999999999,62.43000000000001,63.52,64.26,64.61,65.03,64.95,64.84,64.85,65,65.27,65.34,65.58,65.64,65.86000000000001,65.78,65.68999999999998,65.50999999999999,65.36,65.18,64.95,64.78,64.72,64.5,64.53,64.62,64.64,64.83,64.89,64.88,65.06,64.98,64.72000000000001,64.47,64.25999999999999,64.09,63.78],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
