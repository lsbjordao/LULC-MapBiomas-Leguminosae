<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.2,95.07000000000001,94.62,94.09,93.41,93.02,92.32,91.32,90.45,89.56,88.09,87.21000000000001,86.37000000000002,85.37,83.94000000000001,83.30000000000001,82.56000000000002,81.44000000000003,79.91,78.44,77.48,76.66000000000001,76.32000000000001,76.22,76.12,76.06,75.96,75.86,75.73,75.50000000000001,75.30000000000001,75.08000000000001,74.93,74.88000000000001,74.49,74.28000000000002,73.89999999999999,72.80000000000001],"color":"green"},{"name":"anthropic","data":[4.119999999999999,4.250000000000001,4.71,5.23,5.91,6.290000000000001,6.99,8.01,8.87,9.77,11.219999999999999,12.1,12.959999999999999,13.95,15.38,16.009999999999998,16.75,17.87,19.4,20.88,21.85,22.660000000000004,23.01,23.1,23.200000000000003,23.25,23.37,23.45,23.6,23.830000000000002,24.029999999999998,24.26,24.39,24.429999999999996,24.81,25.03,25.410000000000004,26.52],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
