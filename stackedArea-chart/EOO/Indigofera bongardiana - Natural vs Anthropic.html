<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.27000000000001,48.67000000000001,47.790000000000006,47.050000000000004,46.27000000000002,45.730000000000004,45.14,44.41,43.77000000000001,43.17,42.52000000000002,41.99000000000001,41.55,41.17,40.78000000000001,40.38000000000001,40.12,39.75999999999999,39.32,38.96,38.790000000000006,38.63999999999999,38.529999999999994,38.43,38.349999999999994,38.26,38.089999999999996,37.870000000000005,37.6,37.31,37.11999999999999,36.980000000000004,36.91000000000001,36.92,36.79,36.669999999999995,36.5,36.589999999999996],"color":"green"},{"name":"anthropic","data":[50.339999999999996,50.97,51.839999999999996,52.599999999999994,53.379999999999995,53.910000000000004,54.46000000000001,55.21,55.84,56.459999999999994,57.11999999999999,57.65,58.07,58.47,58.830000000000005,59.25,59.50000000000001,59.88,60.33,60.68999999999999,60.879999999999995,61.029999999999994,61.129999999999995,61.22,61.30999999999999,61.42,61.570000000000014,61.76,62.040000000000006,62.34,62.53,62.67999999999999,62.71999999999999,62.739999999999995,62.82999999999999,62.949999999999996,63.129999999999995,63.05999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
