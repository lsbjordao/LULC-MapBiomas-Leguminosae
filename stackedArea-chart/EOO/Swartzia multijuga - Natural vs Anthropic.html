<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.29000000000001,55.06000000000002,54.61000000000002,54.09000000000002,53.54000000000001,53.210000000000015,52.81000000000001,52.360000000000014,51.960000000000015,51.680000000000014,51.30000000000001,51.03000000000002,50.92000000000001,50.70000000000001,50.47000000000001,50.22000000000002,49.95000000000002,49.700000000000024,49.42000000000001,49.06000000000002,48.81000000000002,48.62000000000001,48.5,48.37000000000001,48.250000000000014,48.10000000000002,47.960000000000015,47.530000000000015,47.08000000000001,46.730000000000004,46.430000000000014,46.34000000000001,46.220000000000006,46.13000000000002,45.98000000000002,45.82000000000001,45.65000000000001,45.59000000000001],"color":"green"},{"name":"anthropic","data":[43.760000000000005,43.99,44.43999999999999,44.97,45.52,45.86000000000001,46.25999999999999,46.699999999999996,47.089999999999996,47.39,47.75000000000001,48.019999999999996,48.129999999999995,48.34999999999999,48.58999999999998,48.819999999999986,49.09,49.37,49.63,49.96999999999999,50.26999999999999,50.38,50.53,50.669999999999995,50.779999999999994,50.93000000000001,51.10000000000001,51.49,51.949999999999996,52.32,52.59000000000002,52.7,52.8,52.88000000000001,53.05000000000001,53.190000000000005,53.360000000000014,53.42000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
