<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.52000000000001,98.50999999999999,98.39,98.30000000000001,98.33,98.33,98.29,98.14000000000001,97.99000000000001,97.86000000000003,97.64,97.44000000000001,97.21,97.08000000000001,97.07,97.02000000000001,96.82000000000002,96.66000000000001,96.44000000000001,96.06000000000002,95.82000000000001,95.61,95.49000000000001,95.34,95.15000000000002,95.08999999999999,95.08000000000001,94.99,94.80999999999999,94.60000000000001,94.38,94.13000000000001,94.01,93.89,93.66000000000001,93.30000000000001,92.83,92.33],"color":"green"},{"name":"anthropic","data":[1.05,1.04,1.19,1.27,1.25,1.24,1.27,1.4300000000000002,1.61,1.72,1.9400000000000002,2.15,2.37,2.49,2.5,2.56,2.7499999999999996,2.9099999999999997,3.15,3.51,3.7599999999999993,3.9599999999999995,4.069999999999999,4.22,4.43,4.469999999999999,4.4799999999999995,4.569999999999999,4.7700000000000005,4.97,5.1899999999999995,5.459999999999999,5.56,5.67,5.92,6.27,6.7299999999999995,7.250000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
