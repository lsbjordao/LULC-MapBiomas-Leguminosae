<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.230000000000004,34.1,33.77000000000001,33.400000000000006,33.03000000000001,32.76,32.5,32.14,31.790000000000003,31.52,31.22,30.959999999999997,30.770000000000003,30.51,30.260000000000005,30.060000000000002,29.839999999999996,29.610000000000003,29.259999999999998,28.94,28.679999999999996,28.519999999999996,28.369999999999997,28.269999999999996,28.169999999999995,28.069999999999993,27.95999999999999,27.739999999999995,27.52,27.319999999999997,27.159999999999997,27.05,26.939999999999998,26.859999999999996,26.709999999999997,26.599999999999998,26.449999999999996,26.299999999999997],"color":"green"},{"name":"anthropic","data":[20.460000000000004,20.6,20.910000000000004,21.29,21.67,21.930000000000007,22.19000000000001,22.560000000000006,22.92000000000001,23.190000000000005,23.470000000000006,23.730000000000008,23.92,24.180000000000007,24.410000000000007,24.640000000000004,24.87,25.099999999999998,25.429999999999996,25.759999999999998,25.990000000000002,26.18,26.3,26.419999999999998,26.5,26.590000000000003,26.740000000000006,26.970000000000002,27.16,27.36000000000001,27.56,27.660000000000007,27.750000000000004,27.830000000000002,27.980000000000004,28.090000000000003,28.250000000000004,28.400000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
