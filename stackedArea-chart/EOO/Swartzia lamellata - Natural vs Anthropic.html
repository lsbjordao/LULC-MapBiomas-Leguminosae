<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.99,97.98,97.96000000000001,97.94,97.84,97.88,97.94999999999999,97.89,97.92,98.14,98.33000000000001,98.36999999999999,98.25999999999999,98.09,98,98.03,98.07,97.98,97.94000000000001,97.92,97.92000000000002,97.89000000000001,97.88000000000001,97.94,97.89999999999999,97.86,97.88000000000001,97.95000000000002,97.97000000000001,97.97,97.89999999999999,97.79999999999998,97.78999999999999,97.77000000000001,97.78000000000002,97.72,97.69,97.60000000000001],"color":"green"},{"name":"anthropic","data":[1.35,1.37,1.3800000000000001,1.4100000000000001,1.5099999999999998,1.4700000000000002,1.39,1.45,1.42,1.21,1.01,1,1.09,1.25,1.3499999999999999,1.31,1.29,1.37,1.4200000000000002,1.4300000000000002,1.44,1.47,1.46,1.42,1.45,1.4800000000000002,1.4800000000000002,1.4100000000000001,1.3900000000000001,1.37,1.4500000000000002,1.5500000000000003,1.5600000000000003,1.57,1.5700000000000003,1.6300000000000001,1.66,1.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
