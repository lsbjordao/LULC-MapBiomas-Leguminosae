<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.779999999999994,54.81,54.559999999999995,53.92,53.09,52.49,51.75,51.11,50.53,49.830000000000005,49.3,48.83,48.27,47.790000000000006,47.43,46.93999999999999,46.58,46.11,45.64,45.1,44.9,44.75,44.540000000000006,44.39,44.470000000000006,44.39,44.28,44.17999999999999,44.08,43.85999999999999,43.660000000000004,43.470000000000006,43.290000000000006,43.07,42.76,42.580000000000005,42.37,42.82],"color":"green"},{"name":"anthropic","data":[43.34,44.28,44.54,45.18999999999999,45.99999999999999,46.60999999999999,47.35,47.989999999999995,48.57000000000001,49.269999999999996,49.78,50.26,50.83,51.28,51.650000000000006,52.150000000000006,52.519999999999996,52.96999999999999,53.43,54.00000000000001,54.220000000000006,54.35,54.540000000000006,54.709999999999994,54.64,54.7,54.82,54.89999999999999,55.019999999999996,55.22,55.43,55.620000000000005,55.790000000000006,56.02000000000001,56.32000000000001,56.52,56.739999999999995,56.290000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
