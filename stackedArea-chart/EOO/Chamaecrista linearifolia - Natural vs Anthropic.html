<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[13.219999999999997,13.120000000000001,12.909999999999997,12.759999999999998,12.629999999999999,12.589999999999996,12.519999999999998,12.419999999999996,12.36,12.299999999999999,12.229999999999999,12.179999999999996,12.119999999999997,12.049999999999999,11.999999999999996,11.919999999999998,11.889999999999997,11.839999999999996,11.819999999999995,11.789999999999996,11.819999999999995,11.819999999999997,11.84,11.85,11.829999999999997,11.839999999999998,11.829999999999997,11.819999999999997,11.769999999999996,11.719999999999997,11.689999999999998,11.639999999999997,11.649999999999997,11.699999999999998,11.729999999999999,11.729999999999999,11.759999999999998,11.829999999999998],"color":"green"},{"name":"anthropic","data":[18.870000000000005,18.95,19.130000000000003,19.31,19.42,19.470000000000002,19.54,19.640000000000004,19.690000000000005,19.76,19.840000000000007,19.890000000000008,19.950000000000003,20.02,20.080000000000002,20.150000000000002,20.170000000000005,20.23,20.26,20.290000000000006,20.240000000000002,20.250000000000004,20.240000000000006,20.220000000000006,20.230000000000004,20.240000000000002,20.240000000000002,20.25,20.3,20.34,20.37,20.42,20.42,20.380000000000003,20.350000000000005,20.34,20.28,20.24],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
