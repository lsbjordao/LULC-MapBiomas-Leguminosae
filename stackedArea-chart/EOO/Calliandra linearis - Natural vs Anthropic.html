<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.7,73.48,73.25999999999999,73.28,73.21000000000001,73.45,73.48,73.45,73.11,72.83999999999999,72.56,72.56,72.74,72.86,72.89,72.61,72.29,71.67,71.47,71.36999999999999,71.63,71.64000000000001,71.57,71.69,71.80000000000001,71.78,71.75,71.88,72.00999999999999,72.13,72.41,72.47,72.42999999999999,72.29,72.21000000000001,72.01,71.85999999999999,71.65],"color":"green"},{"name":"anthropic","data":[25.860000000000003,26.09,26.28,26.270000000000003,26.34,26.099999999999998,26.07,26.12,26.44,26.71,26.99,26.99,26.82,26.69,26.669999999999998,26.939999999999998,27.270000000000003,27.9,28.09,28.169999999999998,27.939999999999998,27.939999999999998,28.010000000000005,27.880000000000003,27.75,27.76,27.810000000000002,27.679999999999996,27.560000000000002,27.410000000000004,27.150000000000002,27.09,27.14,27.269999999999996,27.34,27.540000000000003,27.690000000000005,27.900000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
