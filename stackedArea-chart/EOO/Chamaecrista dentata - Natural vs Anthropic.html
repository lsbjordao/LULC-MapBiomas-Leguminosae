<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.739999999999995,46.859999999999985,46.32,45.809999999999995,45.36999999999999,45.01999999999999,44.60999999999999,44.07999999999999,43.63999999999999,43.36999999999999,42.959999999999994,42.720000000000006,42.419999999999995,42.17000000000001,41.92,41.599999999999994,41.39999999999999,41.010000000000005,40.67000000000001,40.38,40.08,39.83,39.68,39.620000000000005,39.65,39.57,39.480000000000004,39.33,39.1,38.989999999999995,39.09000000000001,39.040000000000006,39.04,39.10999999999999,39.099999999999994,39.07000000000001,39.089999999999996,39.22],"color":"green"},{"name":"anthropic","data":[52.46000000000001,53.35,53.879999999999995,54.39999999999999,54.85,55.19,55.6,56.15,56.56,56.84,57.24,57.48000000000001,57.800000000000004,58.07,58.29,58.6,58.8,59.16000000000001,59.53999999999999,59.850000000000016,60.09,60.37,60.519999999999996,60.6,60.559999999999995,60.63,60.74000000000001,60.88000000000001,61.10999999999999,61.2,61.12,61.17,61.160000000000004,61.099999999999994,61.11,61.12,61.13,61.00999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
