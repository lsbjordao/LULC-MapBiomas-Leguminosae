<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.070000000000014,38.050000000000004,37.63,37.47000000000001,37.23,37.13,36.92999999999999,36.77,36.730000000000004,36.68,36.66,36.64,36.649999999999984,36.76,36.78999999999999,36.699999999999996,36.739999999999995,36.8,36.86999999999999,36.97,37.19,37.38999999999999,37.56999999999999,37.71,37.68999999999999,37.89999999999999,38.089999999999996,38.230000000000004,38.40999999999999,38.48,38.57,38.68000000000001,38.830000000000005,38.84,38.89000000000001,38.9,39.08,39.24],"color":"green"},{"name":"anthropic","data":[56.61,56.64,57.03,57.199999999999996,57.44,57.550000000000004,57.739999999999995,57.87999999999999,57.93,57.99999999999999,58.02,58.019999999999996,58.01999999999999,57.919999999999995,57.89999999999999,57.989999999999995,57.93,57.88,57.79999999999999,57.69999999999999,57.47999999999999,57.28999999999999,57.109999999999985,56.95999999999999,56.98,56.78999999999999,56.58,56.42999999999999,56.279999999999994,56.19,56.089999999999996,55.999999999999986,55.849999999999994,55.81999999999999,55.76999999999999,55.78,55.580000000000005,55.42],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
