<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.519999999999996,30.259999999999994,29.08,28.269999999999996,27.699999999999996,27.49,26.86,26.73,26.59,26.25,25.98,25.759999999999998,25.59,25.580000000000002,25.599999999999998,25.61,25.87,25.91,26.03,25.98,26.100000000000005,26.210000000000004,26.250000000000007,26.13,26.04,26.03,26.27,26.619999999999994,26.91,27.020000000000003,27.069999999999997,27.100000000000005,27.29,27.450000000000003,27.640000000000004,27.569999999999997,27.699999999999996,27.929999999999996],"color":"green"},{"name":"anthropic","data":[69.17,69.42999999999999,70.60000000000001,71.43,71.98,72.21,72.82,72.97,73.09,73.42,73.69999999999999,73.91999999999999,74.08999999999999,74.1,74.08999999999999,74.06,73.79999999999998,73.75,73.66000000000001,73.69,73.59,73.49,73.42,73.56,73.65,73.64000000000001,73.39999999999999,73.06,72.79,72.65,72.62,72.59,72.39,72.25000000000001,72.05000000000001,72.11,71.99,71.74],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
