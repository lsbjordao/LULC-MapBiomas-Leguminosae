<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.24999999999999,98.23,98.03999999999999,97.84000000000002,97.68999999999998,97.58000000000001,97.52000000000001,97.27000000000001,97.01000000000002,96.78,96.43,96.14,95.78999999999999,95.38000000000001,95.22,95.14,94.92999999999999,94.69,94.30000000000001,93.82999999999998,93.46000000000001,93.13,92.82999999999998,92.58999999999999,92.4,92.33000000000001,92.26,92.19,92.08000000000001,91.97000000000001,91.78,91.49000000000001,91.33999999999999,91.18,90.92,90.62999999999998,90.19000000000001,89.54000000000002],"color":"green"},{"name":"anthropic","data":[2.4099999999999997,2.4199999999999995,2.6099999999999994,2.8199999999999994,2.9599999999999995,3.09,3.1399999999999997,3.3799999999999994,3.6399999999999997,3.8699999999999997,4.2299999999999995,4.52,4.869999999999999,5.279999999999999,5.439999999999999,5.539999999999998,5.749999999999998,5.969999999999998,6.369999999999999,6.8199999999999985,7.189999999999999,7.549999999999999,7.809999999999999,8.069999999999999,8.26,8.329999999999997,8.409999999999997,8.459999999999997,8.579999999999998,8.679999999999998,8.87,9.159999999999998,9.299999999999999,9.479999999999999,9.729999999999999,10.020000000000003,10.480000000000002,11.110000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
