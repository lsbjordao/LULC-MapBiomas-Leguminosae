<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.71,35.779999999999994,35.550000000000004,35.5,35.470000000000006,35.46,35.47,35.650000000000006,35.8,35.980000000000004,36.13,36.24,36.34,36.41,36.59,36.43,36.480000000000004,36.480000000000004,36.56,36.6,36.730000000000004,36.830000000000005,36.86000000000001,36.98,37.13000000000001,37.35000000000001,37.46000000000001,37.66,37.84,38.050000000000004,38.279999999999994,38.38,38.470000000000006,38.56,38.589999999999996,38.58,38.93,38.9],"color":"green"},{"name":"anthropic","data":[60.16,60.13,60.32999999999999,60.379999999999995,60.419999999999995,60.42999999999999,60.42000000000001,60.25,60.089999999999996,59.910000000000004,59.779999999999994,59.65999999999999,59.559999999999995,59.489999999999995,59.31,59.46,59.42000000000001,59.400000000000006,59.33000000000001,59.28,59.150000000000006,59.050000000000004,59.02000000000001,58.91,58.75,58.52,58.41,58.230000000000004,58.050000000000004,57.85999999999999,57.6,57.50999999999999,57.40999999999999,57.32999999999999,57.28,57.29999999999999,56.940000000000005,56.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
