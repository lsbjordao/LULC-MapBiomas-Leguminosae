<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.92,73.53000000000002,73.06,72.43,71.83,71.48,71.05,70.46000000000002,69.94000000000001,69.32000000000001,68.61000000000001,67.90000000000003,67.28,66.76,66.23,65.71,65.33,64.71000000000001,63.980000000000004,63.239999999999995,62.63999999999998,62.22999999999999,62.009999999999984,61.589999999999975,61.499999999999986,61.19999999999998,60.75999999999999,60.57999999999999,60.34999999999999,60.09999999999999,59.889999999999986,59.65999999999999,59.47999999999999,59.34999999999999,58.73999999999999,58.40999999999999,57.88999999999999,57.35999999999999],"color":"green"},{"name":"anthropic","data":[19.450000000000003,19.870000000000005,20.3,20.910000000000004,21.519999999999996,21.86,22.260000000000005,22.870000000000005,23.38000000000001,24.040000000000003,24.750000000000004,25.44000000000001,26.03000000000001,26.580000000000002,27.03000000000001,27.609999999999996,27.930000000000007,28.53,29.210000000000004,30.040000000000006,30.63,30.970000000000006,31.14,31.659999999999993,31.75,32,32.46000000000001,32.68,32.910000000000004,33.06000000000001,33.20000000000001,33.35000000000001,33.73,33.65,34.4,34.64,35.19999999999999,35.919999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
