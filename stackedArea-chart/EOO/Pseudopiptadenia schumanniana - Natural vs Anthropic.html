<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[24.430000000000003,24.060000000000002,23.62,23.38,23.22,23.060000000000002,22.970000000000002,22.990000000000002,22.95,22.79,22.67,22.75,22.82,22.75,22.770000000000003,22.66,22.67,22.639999999999997,22.53,22.499999999999996,22.64,22.75,22.829999999999995,22.860000000000003,23.05,23.200000000000003,23.300000000000004,23.390000000000004,23.400000000000002,23.490000000000002,23.630000000000003,23.689999999999998,23.87,23.99,24.019999999999996,24.159999999999993,24.429999999999996,24.65],"color":"green"},{"name":"anthropic","data":[71.81,72.16000000000001,72.61,72.84,73.01,73.17000000000002,73.25000000000001,73.22000000000001,73.27,73.42000000000002,73.53,73.47,73.42,73.47,73.45000000000002,73.58000000000001,73.55,73.59,73.71,73.71,73.6,73.48,73.39999999999999,73.37,73.17,73.02000000000001,72.92,72.83000000000001,72.81,72.74,72.58999999999999,72.52,72.36,72.22999999999999,72.2,72.06,71.78999999999999,71.57],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
