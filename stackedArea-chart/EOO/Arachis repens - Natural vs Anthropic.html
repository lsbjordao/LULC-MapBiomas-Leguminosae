<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.24999999999999,74.03000000000002,73.41000000000001,72.83000000000001,72.24,71.80000000000001,71.34,70.70000000000002,70.13000000000001,69.60000000000001,68.97,68.42,67.99,67.46000000000001,66.93,66.49999999999999,66.04,65.55000000000001,64.89000000000001,64.19000000000001,63.69000000000001,63.32,63.03,62.790000000000006,62.629999999999995,62.5,62.29999999999999,62.01999999999999,61.73000000000001,61.41999999999999,61.13,60.89,60.69999999999999,60.489999999999995,60.25,60,59.63,59.160000000000004],"color":"green"},{"name":"anthropic","data":[24.770000000000007,24.990000000000002,25.57,26.169999999999998,26.780000000000005,27.18,27.640000000000008,28.290000000000006,28.860000000000014,29.370000000000015,30.000000000000004,30.55000000000001,30.99,31.540000000000003,32.07000000000001,32.500000000000014,32.97000000000001,33.46000000000001,34.13,34.800000000000004,35.32,35.67999999999999,35.93,36.21,36.35,36.480000000000004,36.699999999999996,36.970000000000006,37.27,37.58,37.849999999999994,38.07999999999999,38.30999999999999,38.45999999999999,38.72999999999998,39,39.339999999999996,39.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
