<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.47,28.16,27.52,27.11,26.750000000000004,26.530000000000005,26.270000000000003,26.260000000000005,26.21,26.1,25.990000000000002,25.860000000000007,25.830000000000002,25.750000000000007,25.639999999999997,25.580000000000002,25.670000000000005,25.630000000000003,25.630000000000003,25.640000000000004,25.680000000000003,25.82,25.970000000000006,26.01,26.120000000000005,26.27,26.419999999999998,26.54,26.62,26.71,26.810000000000002,26.870000000000005,27.12,27.26,27.390000000000004,27.500000000000004,27.740000000000006,27.950000000000003],"color":"green"},{"name":"anthropic","data":[70.14999999999999,70.47,71.11,71.52,71.88,72.10000000000001,72.36,72.38000000000001,72.41,72.52000000000001,72.64000000000001,72.78000000000002,72.8,72.86,72.97000000000001,73.06,72.97000000000001,73.01,73.00999999999999,72.99,72.95,72.81,72.66000000000001,72.61,72.48,72.36,72.21000000000001,72.07,72.00999999999999,71.92,71.82000000000001,71.76,71.52,71.36000000000001,71.24,71.12000000000002,70.88,70.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
