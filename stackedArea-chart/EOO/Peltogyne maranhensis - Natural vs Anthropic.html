<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.16999999999999,90.18,89.59,88.93000000000002,88.35000000000001,87.93,87.48000000000002,86.49000000000001,85.67,84.89000000000001,83.82,82.92,82.08999999999999,80.99,79.96000000000001,79.27,78.39000000000001,77.4,75.98,74.54,73.46000000000001,72.59,71.9,71.32,70.97000000000001,70.76000000000002,70.45000000000002,70.13000000000001,69.71000000000001,69.46000000000001,69.05,68.59999999999998,68.28999999999999,67.92,67.44,66.86999999999999,66.02,64.75],"color":"green"},{"name":"anthropic","data":[8.769999999999998,8.790000000000001,9.36,10.02,10.61,11.03,11.479999999999999,12.46,13.28,14.059999999999999,15.150000000000002,16.05,16.87,17.970000000000002,18.999999999999996,19.69,20.57,21.54,22.979999999999997,24.41,25.490000000000002,26.369999999999997,27.05,27.66,27.990000000000002,28.200000000000003,28.49,28.830000000000005,29.25,29.49,29.91,30.340000000000003,30.68,31.03,31.53,32.08,32.94,34.199999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
