<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[27.01000000000001,27.000000000000007,26.81000000000001,26.560000000000006,26.27000000000001,26.130000000000006,25.950000000000003,25.720000000000002,25.470000000000002,25.250000000000007,25.050000000000004,24.880000000000006,24.820000000000004,24.740000000000006,24.65000000000001,24.570000000000007,24.43000000000001,24.28000000000001,24.120000000000005,23.950000000000006,23.800000000000008,23.710000000000008,23.65000000000001,23.530000000000005,23.47000000000001,23.390000000000008,23.270000000000007,23.03000000000001,22.760000000000005,22.550000000000008,22.390000000000008,22.310000000000006,22.230000000000008,22.19000000000001,22.10000000000001,22.03,21.94,21.950000000000003],"color":"green"},{"name":"anthropic","data":[13.709999999999997,13.729999999999997,13.919999999999998,14.139999999999997,14.459999999999997,14.589999999999996,14.789999999999997,15.03,15.270000000000001,15.46,15.69,15.850000000000001,15.89,16,16.09,16.17,16.290000000000003,16.41,16.6,16.750000000000004,16.930000000000003,17.040000000000003,17.080000000000002,17.21,17.280000000000005,17.34,17.460000000000004,17.700000000000006,17.970000000000002,18.17,18.36,18.450000000000006,18.520000000000003,18.540000000000003,18.62,18.700000000000003,18.790000000000003,18.769999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
