<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.370000000000005,51.93000000000002,51.170000000000016,50.51000000000001,49.740000000000016,49.20000000000001,48.65,47.980000000000004,47.35000000000001,46.86,46.300000000000004,45.89000000000001,45.650000000000006,45.38,45.089999999999996,44.74,44.46000000000002,44.160000000000004,43.80000000000001,43.46000000000001,43.2,43.02000000000001,42.91000000000001,42.81000000000001,42.74000000000001,42.620000000000005,42.46,42.180000000000014,41.820000000000014,41.54000000000001,41.320000000000014,41.220000000000006,41.13000000000001,41.07000000000001,40.93000000000001,40.80000000000001,40.650000000000006,40.72000000000001],"color":"green"},{"name":"anthropic","data":[46.16,46.62999999999999,47.389999999999986,48.03999999999999,48.800000000000004,49.34999999999999,49.879999999999995,50.57,51.19999999999999,51.67000000000001,52.23,52.629999999999995,52.89,53.15,53.44999999999999,53.77,54.07999999999999,54.37,54.72999999999999,55.1,55.339999999999996,55.510000000000005,55.62000000000001,55.74,55.8,55.94000000000001,56.07999999999999,56.37,56.740000000000016,57.02000000000001,57.23,57.32999999999999,57.4,57.49000000000001,57.61,57.74000000000001,57.88999999999999,57.809999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
