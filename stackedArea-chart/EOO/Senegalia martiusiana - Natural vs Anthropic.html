<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.94000000000003,72.71000000000001,72.08000000000001,71.47,70.82000000000001,70.36,69.85,69.17999999999999,68.53000000000002,67.93999999999998,67.21,66.60000000000001,66.09000000000002,65.47999999999999,64.91000000000001,64.46000000000001,63.94,63.400000000000006,62.650000000000006,61.91000000000001,61.34,60.93000000000001,60.629999999999995,60.36,60.20999999999999,60.09000000000001,59.92,59.63999999999999,59.34,59.03999999999999,58.73000000000001,58.5,58.32000000000001,58.16000000000001,57.900000000000006,57.650000000000006,57.300000000000004,56.81999999999999],"color":"green"},{"name":"anthropic","data":[25.620000000000005,25.85,26.45,27.07,27.72,28.19,28.690000000000005,29.380000000000003,30.03,30.580000000000002,31.31,31.94,32.449999999999996,33.07,33.65000000000001,34.10000000000001,34.61000000000001,35.15,35.91,36.64000000000001,37.210000000000015,37.63000000000001,37.920000000000016,38.17,38.32000000000001,38.46000000000001,38.620000000000005,38.86999999999999,39.209999999999994,39.489999999999995,39.79999999999998,40.029999999999994,40.21000000000001,40.370000000000005,40.63999999999999,40.89000000000001,41.24000000000001,41.71999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
