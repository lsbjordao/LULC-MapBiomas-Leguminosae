<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.50000000000001,32.5,31.6,30.71,30.009999999999998,29.51000000000001,28.920000000000005,28.310000000000006,27.820000000000007,27.38000000000001,26.970000000000006,26.620000000000005,26.390000000000004,26.21,26.050000000000004,25.76,25.610000000000007,25.380000000000003,25.060000000000002,24.800000000000004,24.720000000000006,24.620000000000005,24.570000000000004,24.600000000000005,24.62,24.650000000000002,24.689999999999998,24.67,24.750000000000007,24.79000000000001,24.840000000000003,24.900000000000002,24.969999999999995,25.02,24.989999999999995,24.950000000000003,24.77,24.95],"color":"green"},{"name":"anthropic","data":[62.92,63.889999999999986,64.78000000000002,65.68000000000002,66.37000000000002,66.89999999999999,67.44000000000001,68.08000000000001,68.57,69.01000000000002,69.43000000000004,69.76,69.98,70.17000000000002,70.33000000000001,70.63,70.78000000000003,71.02000000000002,71.34000000000003,71.59000000000002,71.67000000000003,71.77000000000001,71.83000000000003,71.82000000000002,71.77000000000001,71.76000000000002,71.72000000000003,71.73000000000002,71.65000000000002,71.62000000000002,71.57000000000004,71.46000000000004,71.44000000000001,71.38000000000002,71.39000000000004,71.46000000000004,71.61000000000003,71.45000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
