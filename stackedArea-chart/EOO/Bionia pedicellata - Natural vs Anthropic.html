<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.42000000000002,73.17,72.69,71.98000000000002,71.20000000000002,70.42999999999998,69.66,68.96,68.27000000000001,68.06,68,68.03,68.66,68.2,68.16,67.89999999999999,67.42,67.22999999999999,66.71999999999998,66.33,65.75999999999998,65.52,65.07000000000001,64.98,65.04,65.07,65.01,64.75,64.38,64.15,63.85999999999999,64.19,64.24,64.36,64.51,64.67,64.55,64.63999999999999],"color":"green"},{"name":"anthropic","data":[25.88,26.11,26.62,27.32,28.1,28.880000000000003,29.650000000000006,30.350000000000005,31.04,31.25,31.310000000000002,31.279999999999998,30.64,31.08,31.13,31.4,31.900000000000006,32.1,32.57999999999999,32.959999999999994,33.55,33.769999999999996,34.21999999999999,34.31999999999999,34.27,34.23,34.28,34.58,34.949999999999996,35.150000000000006,35.459999999999994,35.10999999999999,35.07,34.94,34.79,34.63,34.74,34.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
