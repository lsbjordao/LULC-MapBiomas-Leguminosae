<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.88,98.86999999999999,98.81,98.78,98.78999999999999,98.80999999999999,98.82999999999998,98.74999999999999,98.64999999999999,98.63000000000001,98.63,98.53,98.38,98.18999999999998,98.08999999999999,98.08999999999999,98.05999999999999,98.04999999999998,98,97.95,97.86,97.78,97.79,97.84,97.76999999999998,97.69,97.7,97.78999999999998,97.74,97.66999999999999,97.49999999999999,97.24999999999999,97.22,97.27,97.31,97.24999999999999,97.11,96.8],"color":"green"},{"name":"anthropic","data":[0.76,0.77,0.8400000000000001,0.8700000000000001,0.8700000000000001,0.8400000000000001,0.8200000000000001,0.9099999999999999,1.01,1.03,1.02,1.12,1.26,1.4600000000000002,1.56,1.56,1.57,1.61,1.6400000000000001,1.7000000000000002,1.79,1.8800000000000001,1.85,1.81,1.8800000000000001,1.9600000000000002,1.9400000000000002,1.87,1.9100000000000001,1.9800000000000002,2.14,2.39,2.4299999999999997,2.37,2.32,2.4099999999999997,2.53,2.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
