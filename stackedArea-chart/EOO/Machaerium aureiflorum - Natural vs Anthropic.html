<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.2,98.17,98.03999999999999,97.94000000000001,97.88000000000001,97.78999999999999,97.71,97.56,97.36999999999999,97.15,96.74999999999999,96.41000000000001,95.98,95.66,95.47,95.29,94.91,94.47999999999999,93.97999999999999,93.32,92.74,92.28,91.96000000000001,91.67999999999999,91.42999999999998,91.29,91.17,91.06,90.87,90.66000000000001,90.35000000000001,89.94999999999999,89.65000000000002,89.35,88.86000000000001,88.37,87.69000000000001,86.89],"color":"green"},{"name":"anthropic","data":[1.12,1.1600000000000001,1.29,1.3900000000000001,1.45,1.53,1.6,1.76,1.9500000000000002,2.17,2.5599999999999996,2.9099999999999997,3.35,3.67,3.86,4.04,4.409999999999999,4.85,5.34,6.01,6.57,7.029999999999999,7.359999999999999,7.64,7.9,8.049999999999999,8.159999999999998,8.26,8.440000000000001,8.66,8.980000000000002,9.390000000000002,9.680000000000001,9.98,10.47,10.96,11.64,12.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
