<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.14,56.059999999999995,55.71,55.290000000000006,54.80000000000001,54.519999999999996,54.129999999999995,53.730000000000004,53.37,53.2,53,52.890000000000015,53,52.89,52.75000000000001,52.62,52.39000000000001,52.20000000000002,51.94000000000001,51.680000000000014,51.46000000000001,51.37000000000002,51.29000000000001,51.250000000000014,51.23000000000001,51.20000000000001,51.070000000000014,50.730000000000004,50.370000000000005,50.06,49.849999999999994,49.820000000000014,49.74,49.71000000000001,49.620000000000005,49.540000000000006,49.470000000000006,49.41],"color":"green"},{"name":"anthropic","data":[38.67,38.77,39.13999999999999,39.550000000000004,40.05,40.330000000000005,40.68,41.1,41.46000000000001,41.620000000000005,41.83000000000001,41.95,41.839999999999996,41.959999999999994,42.06999999999999,42.20999999999999,42.419999999999995,42.62,42.870000000000005,43.16,43.349999999999994,43.480000000000004,43.52,43.56999999999999,43.59,43.599999999999994,43.74999999999999,44.09,44.42999999999999,44.760000000000005,44.98000000000001,45.029999999999994,45.1,45.12,45.21000000000001,45.28,45.33,45.42],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
