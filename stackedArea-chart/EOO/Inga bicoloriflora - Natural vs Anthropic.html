<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.99000000000001,98.98000000000002,98.97999999999999,98.96,98.95,98.94999999999999,98.94999999999999,98.94,98.92,98.95,98.97999999999999,98.96000000000001,98.91000000000001,98.85,98.83,98.84,98.85000000000002,98.83999999999999,98.81,98.81000000000002,98.80999999999999,98.81,98.83000000000001,98.83000000000001,98.83000000000001,98.81,98.81,98.82999999999998,98.84,98.83,98.81,98.75999999999999,98.78,98.78,98.79,98.77,98.74,98.71000000000001],"color":"green"},{"name":"anthropic","data":[0.43,0.44,0.45,0.45,0.47000000000000003,0.47,0.45999999999999996,0.49,0.5,0.47,0.44000000000000006,0.46,0.51,0.5700000000000001,0.59,0.58,0.57,0.59,0.61,0.62,0.61,0.62,0.61,0.5900000000000001,0.6,0.61,0.62,0.6000000000000001,0.5800000000000001,0.5900000000000001,0.62,0.65,0.65,0.64,0.64,0.65,0.68,0.71],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
