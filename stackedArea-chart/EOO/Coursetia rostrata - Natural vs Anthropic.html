<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.60000000000002,66.41000000000001,65.68,65.07,64.06,63.72999999999999,63.32999999999999,62.57,61.760000000000005,61.370000000000005,60.84,60.68000000000001,61.27,61.21,61.31,61.4,61.00000000000001,60.8,60.54,60.629999999999995,60.4,60.53,60.419999999999995,60.32000000000001,60.379999999999995,60.18999999999999,59.89,59.27,58.64000000000001,58.04,57.550000000000004,57.47,57.33000000000002,57.44000000000001,57.46000000000001,57.56000000000001,57.430000000000014,57.559999999999995],"color":"green"},{"name":"anthropic","data":[33.14000000000001,33.36,34.1,34.709999999999994,35.7,36.02,36.42,37.2,38.01,38.39000000000001,38.92,39.1,38.48,38.53,38.43999999999999,38.35999999999999,38.74999999999999,38.96,39.21,39.14,39.36,39.23,39.35,39.440000000000005,39.379999999999995,39.56999999999999,39.85999999999999,40.480000000000004,41.14,41.709999999999994,42.18000000000001,42.29,42.43999999999999,42.31,42.290000000000006,42.190000000000005,42.31999999999999,42.190000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
