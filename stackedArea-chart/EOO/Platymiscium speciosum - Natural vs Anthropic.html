<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.31999999999999,50.94,49.059999999999995,46.849999999999994,45.46,44.81,43.78,43.82,43.76000000000001,43.49,43.09,42.41,42.23,41.90999999999999,41.83,41.48999999999999,41.709999999999994,41.629999999999995,41.97,42.00999999999999,41.89,42.11999999999999,42.169999999999995,42.06999999999999,42.43,42.54999999999999,42.519999999999996,42.519999999999996,42.31,42.21,42.31,42.059999999999995,42.06,42.370000000000005,42.699999999999996,42.84,43.209999999999994,43.72],"color":"green"},{"name":"anthropic","data":[44.400000000000006,45.77,47.65,49.84000000000001,51.25000000000001,51.9,52.93,52.89,52.970000000000006,53.230000000000004,53.63,54.31,54.49,54.8,54.879999999999995,55.21999999999999,54.989999999999995,55.09,54.75,54.71000000000001,54.82999999999999,54.60999999999999,54.55,54.66,54.29999999999999,54.18,54.22,54.18999999999999,54.42,54.51,54.41,54.67,54.67,54.339999999999996,54.019999999999996,53.879999999999995,53.510000000000005,53],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
