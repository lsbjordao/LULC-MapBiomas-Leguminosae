<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.87,98.89,98.86000000000001,98.89000000000001,98.85,98.9,98.92000000000002,98.87,98.86,98.91999999999999,98.97999999999999,98.96,98.89999999999999,98.82,98.78,98.82000000000001,98.8,98.8,98.8,98.77999999999999,98.76000000000002,98.74,98.75,98.76,98.73,98.71000000000001,98.71000000000001,98.74,98.75,98.74000000000001,98.7,98.63000000000001,98.61000000000001,98.64,98.66000000000001,98.65,98.64999999999999,98.55999999999999],"color":"green"},{"name":"anthropic","data":[0.67,0.66,0.68,0.66,0.6799999999999999,0.6399999999999999,0.6100000000000001,0.6599999999999999,0.6799999999999999,0.61,0.5599999999999999,0.59,0.64,0.71,0.76,0.73,0.72,0.74,0.75,0.75,0.77,0.79,0.79,0.77,0.81,0.8300000000000001,0.8200000000000001,0.8,0.79,0.8,0.8300000000000001,0.9,0.92,0.91,0.8800000000000001,0.9000000000000001,0.8900000000000001,0.9600000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
