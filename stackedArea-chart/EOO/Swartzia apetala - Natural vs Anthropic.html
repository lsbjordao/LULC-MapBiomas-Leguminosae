<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.61,72.49999999999999,72.00999999999999,71.49000000000001,70.93000000000002,70.57000000000002,70.17000000000002,69.54000000000002,68.99000000000001,68.59000000000002,68.10000000000002,67.65000000000002,67.32000000000001,66.83000000000001,66.45000000000002,66.13000000000001,65.69000000000001,65.26000000000002,64.64000000000001,63.980000000000004,63.39000000000001,62.99000000000001,62.67,62.38,62.19000000000001,62.02,61.809999999999995,61.440000000000005,61.03,60.690000000000005,60.339999999999996,60.08,59.910000000000004,59.74000000000001,59.49,59.18999999999998,58.78999999999999,58.36],"color":"green"},{"name":"anthropic","data":[24.82,24.950000000000003,25.42,25.940000000000005,26.49,26.890000000000004,27.29,27.89,28.450000000000003,28.83,29.36,29.78,30.119999999999997,30.589999999999996,30.980000000000004,31.29,31.740000000000002,32.17,32.78000000000001,33.45000000000001,34.03,34.44,34.77,35.04,35.239999999999995,35.42,35.629999999999995,36.019999999999996,36.42999999999999,36.76000000000001,37.09,37.34,37.54,37.69999999999999,37.949999999999996,38.260000000000005,38.650000000000006,39.070000000000014],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
