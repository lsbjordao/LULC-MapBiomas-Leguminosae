<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.38,36.38,35.7,35.15,34.550000000000004,34.04,33.559999999999995,33.089999999999996,32.68000000000001,32.32,31.849999999999998,31.44,30.900000000000002,30.58,30.26,29.85,29.58,29.23,28.94,28.620000000000005,28.360000000000003,28.24,28.14,28.12,28.17,28.1,28.060000000000002,27.939999999999998,27.740000000000002,27.570000000000004,27.599999999999998,27.59,27.55,27.539999999999996,27.45,27.37,27.25,27.45],"color":"green"},{"name":"anthropic","data":[61.74,62.78000000000001,63.43,63.98,64.60000000000001,65.07000000000001,65.56,66.02000000000001,66.47000000000001,66.83999999999999,67.28,67.71000000000001,68.23,68.56,68.85999999999999,69.26999999999998,69.53999999999999,69.89999999999999,70.18999999999998,70.49,70.73,70.88,70.96999999999998,71.00000000000001,70.93,71.00000000000001,71.04,71.17999999999998,71.39999999999999,71.55,71.51,71.52999999999999,71.56,71.58,71.64,71.75,71.87,71.63999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
