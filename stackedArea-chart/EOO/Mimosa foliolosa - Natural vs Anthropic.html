<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.71000000000001,56.29000000000002,55.59000000000001,54.94000000000001,54.22000000000001,53.74000000000002,53.26000000000002,52.610000000000014,52.04000000000002,51.47000000000001,50.90000000000001,50.380000000000024,50.10000000000001,49.750000000000014,49.42000000000001,49.070000000000014,48.74000000000001,48.40000000000002,47.970000000000006,47.60000000000001,47.3,47.140000000000015,47.01000000000001,46.87000000000001,46.73000000000001,46.60000000000001,46.43000000000001,46.04000000000001,45.62000000000002,45.250000000000014,44.99000000000001,44.83000000000002,44.74,44.690000000000005,44.54000000000001,44.440000000000005,44.260000000000005,44.30000000000001],"color":"green"},{"name":"anthropic","data":[43.5,43.94,44.62,45.279999999999994,46,46.46999999999999,46.96,47.60999999999999,48.15999999999999,48.71000000000001,49.300000000000004,49.819999999999986,50.1,50.440000000000005,50.779999999999994,51.140000000000015,51.449999999999996,51.8,52.21999999999999,52.59,52.89,53.07,53.17999999999999,53.34,53.46999999999999,53.59000000000002,53.779999999999994,54.14000000000001,54.57000000000001,54.910000000000004,55.21000000000001,55.34,55.43,55.49999999999999,55.629999999999995,55.76,55.910000000000004,55.88000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
