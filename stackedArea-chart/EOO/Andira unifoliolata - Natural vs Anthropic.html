<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.66,98.68,98.70000000000002,98.72000000000001,98.78000000000002,98.80000000000003,98.85000000000001,98.76000000000002,98.64,98.62,98.67,98.58,98.37,98.07000000000002,97.94,98.02000000000001,98.09,98.12,98.07000000000001,97.99,97.92000000000002,97.79000000000002,97.86000000000001,97.93,97.82,97.65,97.71,97.83,97.75999999999999,97.70000000000002,97.5,97.22999999999999,97.19,97.29,97.42,97.4,97.36,97.02999999999999],"color":"green"},{"name":"anthropic","data":[1.1900000000000002,1.1700000000000002,1.1500000000000001,1.12,1.07,1.05,0.99,1.09,1.2100000000000002,1.2300000000000002,1.1700000000000002,1.26,1.4700000000000002,1.77,1.93,1.8299999999999998,1.76,1.74,1.78,1.8499999999999999,1.93,2.05,1.98,1.91,2.02,2.1799999999999997,2.15,2.03,2.0799999999999996,2.15,2.33,2.6199999999999997,2.67,2.56,2.43,2.44,2.48,2.82],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
