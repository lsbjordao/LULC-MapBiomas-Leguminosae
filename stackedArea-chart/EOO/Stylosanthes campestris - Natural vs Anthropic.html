<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.12,39.53,39.07000000000001,38.54,38.07,37.86,37.56,37.13,36.730000000000004,36.39,35.879999999999995,35.5,35.14999999999999,34.86,34.6,34.34,34.150000000000006,33.830000000000005,33.62000000000001,33.35,33.120000000000005,32.99000000000001,32.9,32.79,32.790000000000006,32.690000000000005,32.620000000000005,32.39000000000001,32.13,31.900000000000006,31.730000000000004,31.58000000000001,31.51,31.55,31.47000000000001,31.42,31.290000000000003,31.520000000000003],"color":"green"},{"name":"anthropic","data":[60.08,60.67,61.12,61.64,62.14,62.32000000000001,62.62,63.06,63.42000000000001,63.809999999999995,64.32,64.69,65.03999999999999,65.33,65.58,65.86,66.03000000000002,66.35999999999999,66.59,66.85000000000002,67.05999999999999,67.19,67.29,67.39,67.40000000000002,67.49000000000001,67.58000000000001,67.79,68.05000000000001,68.27000000000001,68.46,68.62,68.65,68.63,68.71000000000001,68.75,68.88000000000001,68.66999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
