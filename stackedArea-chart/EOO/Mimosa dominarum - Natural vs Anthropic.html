<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.32,93.47,93.61,93.63000000000001,93.54,93.41000000000001,93.3,93.1,92.97999999999999,92.97,92.97000000000001,92.93,93,93.02,93.25999999999999,93.38000000000001,93.41,93.46,93.52,93.52,93.47000000000001,93.3,93.26,93.20000000000002,93.2,93.07000000000001,93.00000000000001,92.97,92.99,92.91,92.9,92.86,92.86000000000001,92.80000000000001,92.73000000000002,92.72000000000001,92.66,92.49000000000001],"color":"green"},{"name":"anthropic","data":[6.09,5.9399999999999995,5.79,5.79,5.869999999999999,5.99,6.12,6.32,6.43,6.4399999999999995,6.449999999999999,6.479999999999999,6.409999999999998,6.39,6.1499999999999995,6.039999999999999,6.01,5.95,5.8999999999999995,5.88,5.94,6.11,6.15,6.22,6.2299999999999995,6.3500000000000005,6.430000000000001,6.430000000000001,6.42,6.5,6.51,6.54,6.56,6.61,6.6899999999999995,6.699999999999999,6.749999999999999,6.919999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
