<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.75,54.86,54.01999999999999,53.49,53.43,53.58,53.43999999999999,53.190000000000005,53.17,52.74,52.73,52.89,52.92,53.040000000000006,53.35,53.190000000000005,53.019999999999996,53.04,53.04999999999999,53.029999999999994,53.589999999999996,53.949999999999996,54.03,53.95,53.44,53.28,53.07000000000001,53,52.95,52.699999999999996,52.55,52.5,52.599999999999994,52.769999999999996,52.669999999999995,52.519999999999996,52.4,52.65],"color":"green"},{"name":"anthropic","data":[44.67,44.57,45.400000000000006,45.93,45.98999999999999,45.83,45.980000000000004,46.22,46.24,46.669999999999995,46.67999999999999,46.5,46.47,46.36,46.05,46.20999999999999,46.370000000000005,46.370000000000005,46.36,46.37,45.8,45.46000000000001,45.38,45.46,45.96999999999999,46.12999999999999,46.31,46.39999999999999,46.459999999999994,46.709999999999994,46.86,46.89,46.83,46.64,46.72,46.88999999999999,46.989999999999995,46.74999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
