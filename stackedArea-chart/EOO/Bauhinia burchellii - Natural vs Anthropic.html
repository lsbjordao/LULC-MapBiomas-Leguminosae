<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.03999999999999,82.74000000000001,82.10000000000001,81.45999999999998,80.77000000000001,80.17000000000002,79.55,78.67999999999999,77.85999999999999,76.99999999999999,75.95999999999998,75,74.13,73.3,72.44999999999997,71.68999999999998,70.84,69.98999999999998,68.88,67.72999999999999,66.89999999999999,66.3,65.83999999999999,65.35,65.03,64.71,64.39,63.919999999999995,63.38000000000001,62.98,62.5,62.17000000000001,61.830000000000005,61.43,60.99999999999999,60.54,59.94,59.309999999999995],"color":"green"},{"name":"anthropic","data":[16.6,16.919999999999995,17.54,18.200000000000003,18.870000000000005,19.48,20.110000000000003,20.970000000000002,21.76,22.65,23.680000000000003,24.660000000000007,25.51,26.33,27.200000000000003,27.960000000000004,28.800000000000004,29.640000000000008,30.78000000000001,31.910000000000007,32.76,33.339999999999996,33.790000000000006,34.3,34.61,34.949999999999996,35.25999999999999,35.739999999999995,36.25000000000001,36.68,37.14999999999999,37.489999999999995,37.809999999999995,38.169999999999995,38.65,39.1,39.72,40.29999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
