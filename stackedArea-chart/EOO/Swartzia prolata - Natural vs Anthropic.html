<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.52000000000001,98.41999999999999,97.65,97.55999999999999,97.6,97.52,97.18999999999998,96.92999999999998,96.78999999999999,96.82999999999998,96.37,96.05,95.45999999999998,95.66999999999999,96.66999999999999,96.45000000000002,95.11,94.94999999999999,95.02000000000001,94.99,95,95.34,95.53999999999999,95.62,95.70000000000002,95.78,95.96,96.18,96.1,96.00999999999999,95.61999999999999,95.22999999999999,95.11999999999999,95.27000000000001,95.64999999999999,95.56,95.39,95.32000000000002],"color":"green"},{"name":"anthropic","data":[0.83,0.92,1.69,1.79,1.75,1.83,2.15,2.41,2.55,2.51,2.98,3.31,3.87,3.67,2.68,2.88,4.23,4.380000000000001,4.32,4.36,4.34,4,3.81,3.72,3.65,3.56,3.3800000000000003,3.16,3.23,3.33,3.7199999999999998,4.11,4.220000000000001,4.07,3.69,3.7800000000000002,3.96,4.02],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
