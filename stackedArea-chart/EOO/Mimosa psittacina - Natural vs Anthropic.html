<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[24.52,23.49,23.349999999999998,23.2,22.720000000000002,22.2,21.830000000000002,21.49,21.39,21.49,21.780000000000005,22.240000000000002,22.679999999999996,23.04,23.609999999999996,23.609999999999996,23.7,23.71,23.47,23.86,24.159999999999997,24.23,24.3,24.369999999999997,24.360000000000003,24.599999999999998,24.580000000000002,24.81,25.009999999999998,25.570000000000004,25.72,25.869999999999997,25.93,26.089999999999996,26.309999999999995,26.17,26.330000000000002,26.580000000000002],"color":"green"},{"name":"anthropic","data":[75.03,76.05000000000001,76.20000000000002,76.35,76.82000000000002,77.35,77.72000000000001,78.05000000000001,78.15000000000002,78.06,77.75000000000001,77.32000000000001,76.87,76.51,75.93,75.92000000000002,75.85000000000001,75.83000000000001,76.09000000000003,75.68000000000002,75.38000000000002,75.30000000000001,75.25,75.18000000000002,75.19,74.96,74.95,74.72999999999999,74.53,73.97000000000001,73.82,73.66,73.61,73.46000000000001,73.22,73.38,73.21999999999998,72.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
