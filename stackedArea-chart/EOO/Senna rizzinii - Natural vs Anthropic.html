<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.72,69.7,69.07000000000001,68.38999999999999,67.76,67.26,66.85000000000001,66.30000000000001,65.82000000000001,65.68,65.68000000000002,65.63000000000004,65.79000000000003,65.44000000000001,65.16000000000001,64.99000000000001,64.61000000000001,64.36000000000001,63.910000000000004,63.48,63.11,62.9,62.60999999999999,62.45,62.379999999999995,62.27999999999999,62.059999999999995,61.440000000000005,60.89000000000001,60.480000000000004,60.14,60.029999999999994,59.919999999999995,59.82,59.70999999999998,59.57999999999999,59.35999999999999,59.059999999999995],"color":"green"},{"name":"anthropic","data":[25.83,25.87,26.500000000000007,27.170000000000005,27.830000000000005,28.360000000000003,28.73,29.27,29.770000000000007,29.890000000000004,29.900000000000006,29.94,29.79,30.140000000000004,30.430000000000003,30.610000000000003,30.970000000000002,31.230000000000004,31.69,32.09,32.46,32.68,32.959999999999994,33.12,33.18999999999999,33.3,33.51,34.14999999999999,34.67999999999999,35.1,35.40999999999999,35.54,35.669999999999995,35.739999999999995,35.88000000000001,36.01000000000001,36.22000000000001,36.50000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
