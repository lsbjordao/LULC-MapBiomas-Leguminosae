<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.87,87.77000000000001,87.33999999999999,86.89999999999999,86.47999999999999,86.2,85.86999999999999,85.33,84.83,84.41,83.86999999999999,83.36999999999999,83.02,82.5,81.99,81.58000000000001,81.09,80.55999999999999,79.87,79.15,78.6,78.19,77.87,77.58000000000001,77.38000000000001,77.22000000000001,77.02000000000001,76.69,76.33999999999999,76.00999999999999,75.66,75.38000000000001,75.14,74.95,74.68,74.42000000000002,74.01,73.52000000000001],"color":"green"},{"name":"anthropic","data":[10.939999999999998,11.02,11.46,11.9,12.309999999999999,12.6,12.95,13.469999999999999,13.969999999999999,14.399999999999999,14.940000000000001,15.42,15.780000000000003,16.310000000000006,16.810000000000006,17.200000000000006,17.710000000000008,18.220000000000006,18.920000000000005,19.660000000000004,20.200000000000003,20.610000000000003,20.930000000000007,21.23,21.42,21.570000000000004,21.76,22.090000000000007,22.450000000000006,22.780000000000005,23.130000000000003,23.430000000000007,23.660000000000004,23.850000000000005,24.120000000000005,24.390000000000004,24.799999999999997,25.27],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
