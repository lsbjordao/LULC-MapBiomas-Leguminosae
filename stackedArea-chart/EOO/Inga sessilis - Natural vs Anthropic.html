<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.87,43.470000000000006,42.779999999999994,42.19,41.53000000000001,41.14999999999999,40.71,40.19,39.769999999999996,39.419999999999995,38.959999999999994,38.609999999999985,38.359999999999985,38.14,37.89,37.63,37.419999999999995,37.18,36.910000000000004,36.669999999999995,36.54,36.42,36.339999999999996,36.27,36.23,36.15,36.07,35.94,35.739999999999995,35.559999999999995,35.42999999999999,35.33999999999999,35.32,35.33,35.220000000000006,35.120000000000005,35.010000000000005,35.03000000000001],"color":"green"},{"name":"anthropic","data":[50.49999999999999,50.89,51.59999999999998,52.18999999999999,52.81999999999999,53.22,53.65999999999999,54.180000000000014,54.61,54.959999999999994,55.37,55.71999999999999,56.009999999999984,56.189999999999976,56.460000000000015,56.73,56.919999999999995,57.15999999999999,57.41999999999999,57.690000000000005,57.82,57.94000000000001,58.029999999999994,58.09999999999999,58.139999999999986,58.209999999999994,58.31999999999999,58.46999999999999,58.64,58.82000000000001,58.94999999999999,59.029999999999994,59.059999999999974,59.04999999999999,59.150000000000006,59.26,59.359999999999985,59.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
