<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.56,98.55999999999997,98.44,98.36,98.31999999999998,98.24000000000001,98.21000000000001,98.05999999999999,97.9,97.73,97.44,97.2,96.88,96.60999999999999,96.49000000000002,96.39999999999999,96.13999999999999,95.9,95.66999999999999,95.28,94.97,94.7,94.51,94.31000000000002,94.11,94.00999999999999,93.95000000000002,93.92999999999999,93.83,93.7,93.51000000000002,93.24,93.07,92.91,92.64,92.35000000000002,91.95000000000002,91.52],"color":"green"},{"name":"anthropic","data":[1.03,1.04,1.1500000000000001,1.25,1.28,1.35,1.3900000000000001,1.53,1.69,1.87,2.1599999999999997,2.3899999999999997,2.7199999999999998,2.9799999999999995,3.0999999999999996,3.2,3.4499999999999993,3.6999999999999997,3.9299999999999997,4.31,4.609999999999999,4.89,5.089999999999999,5.289999999999999,5.469999999999999,5.59,5.64,5.669999999999999,5.75,5.880000000000001,6.090000000000001,6.35,6.51,6.6899999999999995,6.949999999999999,7.2299999999999995,7.64,8.069999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
