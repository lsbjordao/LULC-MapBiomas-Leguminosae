<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.06,28.57,27.820000000000004,27.120000000000005,26.68,26.380000000000003,26.070000000000004,26.070000000000004,26.000000000000007,25.810000000000002,25.650000000000002,25.500000000000007,25.45000000000001,25.300000000000008,25.260000000000005,25.080000000000005,25.130000000000006,25.090000000000003,25.070000000000007,25.05,25.10000000000001,25.230000000000004,25.310000000000002,25.290000000000006,25.460000000000004,25.540000000000006,25.560000000000006,25.62,25.580000000000002,25.610000000000007,25.69,25.650000000000002,25.76,25.92,26.000000000000004,26.130000000000006,26.380000000000006,26.66],"color":"green"},{"name":"anthropic","data":[61.099999999999994,61.63,62.39,63.1,63.529999999999994,63.83,64.17,64.15,64.21000000000001,64.42000000000002,64.59000000000002,64.71000000000001,64.77,64.92,64.95,65.14000000000001,65.10000000000001,65.14,65.15,65.16000000000001,65.11999999999999,65.00000000000001,64.91000000000001,64.93,64.76000000000002,64.69,64.65000000000002,64.63000000000001,64.65,64.63000000000001,64.54,64.59,64.5,64.32999999999998,64.25,64.13,63.86,63.54999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
