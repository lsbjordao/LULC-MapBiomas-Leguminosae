<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.06,34.89,34.48,34.05,33.65,33.339999999999996,33.02,32.61999999999999,32.22999999999999,31.910000000000004,31.549999999999997,31.260000000000005,31.030000000000005,30.730000000000004,30.380000000000006,30.080000000000002,29.840000000000003,29.520000000000003,29.130000000000003,28.78,28.53,28.38,28.300000000000004,28.199999999999996,28.169999999999998,28.09,27.980000000000004,27.790000000000003,27.55,27.339999999999996,27.18,27.119999999999997,27.029999999999998,26.97,26.9,26.83,26.740000000000002,26.630000000000003],"color":"green"},{"name":"anthropic","data":[19.37,19.52,19.97,20.36,20.790000000000006,21.07,21.430000000000007,21.840000000000003,22.21,22.520000000000003,22.890000000000008,23.170000000000005,23.39000000000001,23.700000000000006,24.080000000000005,24.35,24.630000000000003,24.910000000000007,25.310000000000002,25.660000000000004,25.890000000000004,26.05,26.120000000000005,26.210000000000004,26.25,26.310000000000002,26.450000000000003,26.640000000000008,26.870000000000005,27.08000000000001,27.230000000000004,27.310000000000002,27.400000000000002,27.44000000000001,27.510000000000005,27.600000000000005,27.690000000000005,27.790000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
