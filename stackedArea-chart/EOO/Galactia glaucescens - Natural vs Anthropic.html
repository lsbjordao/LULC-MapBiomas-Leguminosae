<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.64999999999999,71.41,70.71,70.04,69.33999999999999,68.8,68.22999999999998,67.43999999999997,66.72,66.07999999999998,65.3,64.67,64.16,63.5,62.89,62.39000000000001,61.87,61.27999999999999,60.44,59.64,59.03999999999999,58.579999999999984,58.25999999999999,57.959999999999994,57.78,57.6,57.37,57.019999999999996,56.650000000000006,56.290000000000006,55.97,55.75,55.56000000000001,55.36000000000001,55.11,54.85999999999999,54.480000000000004,54.07],"color":"green"},{"name":"anthropic","data":[27.210000000000004,27.430000000000007,28.12,28.780000000000005,29.500000000000007,30.020000000000003,30.6,31.390000000000008,32.1,32.72,33.52,34.14,34.660000000000004,35.31000000000001,35.93,36.42000000000001,36.95000000000002,37.54000000000001,38.360000000000014,39.190000000000005,39.8,40.25000000000001,40.57000000000001,40.87000000000001,41.06000000000002,41.21,41.459999999999994,41.800000000000004,42.16,42.52999999999998,42.870000000000005,43.07,43.260000000000005,43.43000000000001,43.68999999999999,43.93000000000001,44.32,44.73999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
