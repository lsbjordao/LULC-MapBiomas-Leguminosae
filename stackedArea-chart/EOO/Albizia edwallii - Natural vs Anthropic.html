<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.97999999999999,36.74999999999999,36.35999999999999,35.87,35.53,35.32999999999999,35.089999999999996,34.92999999999999,34.83999999999999,34.69,34.54999999999999,34.419999999999995,34.22,34.18,34.010000000000005,33.78,33.65,33.57,33.32,33.14,33.089999999999996,33.09,33.080000000000005,33.07,33.019999999999996,33.06,33.06,33.05,33.11,33.06000000000001,33.13,33.13,33.080000000000005,32.96,32.84,32.78,32.760000000000005,32.690000000000005],"color":"green"},{"name":"anthropic","data":[56.57,56.800000000000004,57.18,57.65999999999998,58.029999999999994,58.23,58.44,58.59,58.69,58.849999999999994,59.00000000000001,59.12,59.28,59.35999999999999,59.510000000000005,59.73000000000002,59.84,59.930000000000014,60.150000000000006,60.32000000000001,60.400000000000006,60.39000000000001,60.39,60.410000000000004,60.440000000000005,60.430000000000014,60.43,60.43000000000001,60.38000000000001,60.410000000000004,60.35000000000001,60.35,60.40000000000001,60.50000000000001,60.64000000000001,60.730000000000004,60.77,60.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
