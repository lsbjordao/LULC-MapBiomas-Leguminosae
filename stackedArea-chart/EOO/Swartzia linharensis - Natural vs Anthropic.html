<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.35,28.660000000000004,28.130000000000003,27.770000000000003,27.460000000000004,27.340000000000003,27.32,27.39,27.43,27.32,27.220000000000002,27.350000000000005,27.480000000000004,27.380000000000003,27.42,27.09,27.050000000000004,27.040000000000003,26.73,26.81,27.070000000000004,27.290000000000003,27.500000000000004,27.670000000000005,28.010000000000005,28.110000000000003,28.130000000000003,28.110000000000003,27.950000000000006,27.820000000000004,27.780000000000005,27.750000000000004,27.85,28.03,28.009999999999998,28.23,28.460000000000004,28.820000000000004],"color":"green"},{"name":"anthropic","data":[70.17,70.89,71.4,71.76,72.06000000000002,72.2,72.22,72.14,72.11,72.22000000000001,72.32000000000001,72.19000000000001,72.05000000000001,72.16000000000001,72.12,72.44000000000001,72.49000000000001,72.49000000000001,72.80000000000001,72.72,72.45,72.25000000000001,72.03999999999999,71.86,71.54,71.41,71.4,71.44,71.59,71.72,71.75,71.78999999999999,71.71,71.52999999999999,71.52999999999999,71.31000000000002,71.07000000000001,70.72000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
