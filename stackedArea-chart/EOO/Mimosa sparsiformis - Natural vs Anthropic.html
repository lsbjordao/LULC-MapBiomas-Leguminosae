<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.35,54.85000000000001,54.17,53.31,52.650000000000006,52,51.36,51.21,50.61000000000001,50.14,49.89000000000001,49.16,48.68000000000001,48.5,47.81,47.53,47.18,46.9,46.150000000000006,45.480000000000004,45.13,44.78,44.57,44.519999999999996,44.34,44.15,43.93,43.620000000000005,43.32999999999999,42.940000000000005,42.65,42.36,42.199999999999996,42.019999999999996,41.68999999999999,41.349999999999994,40.779999999999994,40.800000000000004],"color":"green"},{"name":"anthropic","data":[44.620000000000005,45.09,45.77,46.620000000000005,47.25,47.93000000000001,48.58,48.75,49.33,49.8,50.05,50.8,51.28,51.44,52.129999999999995,52.400000000000006,52.709999999999994,52.94,53.790000000000006,54.410000000000004,54.769999999999996,55.06,55.25,55.32,55.42,55.68,55.980000000000004,56.18000000000001,56.55,56.88999999999999,57.16,57.48,57.62,57.82,58.199999999999996,58.54,59.09,59.08],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
