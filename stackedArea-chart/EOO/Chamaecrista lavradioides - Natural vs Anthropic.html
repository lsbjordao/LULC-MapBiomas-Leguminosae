<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.19000000000001,69.02000000000001,64.53,60.81999999999999,56.980000000000004,54.44,52.11,50.49,49.260000000000005,47.50000000000001,46.199999999999996,44.910000000000004,42.94,41.92999999999999,41.22,40.38999999999999,40.220000000000006,39.89,39.830000000000005,39.2,38.97,38.86000000000001,38.81,38.73,38.79,38.73,38.63999999999999,38.52,38.31,38.15,38.12,38.099999999999994,38.099999999999994,37.900000000000006,37.71,37.41,37.15,37.05],"color":"green"},{"name":"anthropic","data":[27.490000000000002,29.680000000000003,34.18000000000001,37.88,41.709999999999994,44.269999999999996,46.59,48.21999999999999,49.419999999999995,51.21,52.51,53.78,55.76,56.77,57.47,58.3,58.480000000000004,58.790000000000006,58.86000000000001,59.5,59.74000000000001,59.839999999999996,59.88,60,59.92,59.97000000000001,60.07000000000001,60.21000000000001,60.400000000000006,60.55000000000001,60.58,60.61,60.61,60.800000000000004,61.01000000000001,61.290000000000006,61.56,61.67000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
