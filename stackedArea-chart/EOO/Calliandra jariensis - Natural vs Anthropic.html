<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.19,92.46,91.55000000000001,92.78000000000002,92.76,93.62,93.06,92.11000000000001,92.49000000000001,92.38,92.1,91.67,90,89.11,87.83000000000001,86.56000000000002,86.39000000000001,86.09,86.47000000000001,86.36000000000001,86.98,87.9,87.16000000000001,86.36000000000001,85.95,86.2,86.31,86.18000000000002,86.34000000000002,86.68000000000002,86.17000000000002,86.60000000000001,87.28,87.32000000000001,86.88000000000001,86.75999999999999,86.77,86.91000000000001],"color":"green"},{"name":"anthropic","data":[7.129999999999999,6.859999999999999,7.779999999999999,6.55,6.569999999999999,5.710000000000001,6.28,7.23,6.84,6.95,7.220000000000001,7.65,9.32,10.22,11.5,12.760000000000002,12.940000000000001,13.23,12.86,12.969999999999999,12.35,11.420000000000002,12.18,12.96,13.37,13.1,13.01,13.15,12.98,12.65,13.16,12.72,12.06,12.01,12.45,12.57,12.56,12.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
