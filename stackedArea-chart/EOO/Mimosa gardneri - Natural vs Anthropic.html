<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.71000000000001,63.75,63.38,63.050000000000004,62.34,62.190000000000005,61.78000000000001,61.33000000000001,60.77,60.3,59.68000000000001,59.190000000000005,58.900000000000006,58.640000000000015,58.30000000000001,58.010000000000005,57.720000000000006,57.22000000000001,56.82000000000001,56.27,55.79,55.459999999999994,55.19,54.89,54.66000000000001,54.35,53.96000000000001,53.32999999999999,52.690000000000005,52.11000000000001,51.56000000000001,51.09,50.900000000000006,50.85000000000001,50.57000000000001,50.27,49.879999999999995,49.67999999999999],"color":"green"},{"name":"anthropic","data":[35.589999999999996,35.54999999999999,35.900000000000006,36.22999999999999,36.93,37.089999999999996,37.48999999999999,37.95999999999999,38.51,38.970000000000006,39.59,40.070000000000014,40.37000000000001,40.63,40.970000000000006,41.269999999999996,41.55,42.06,42.440000000000005,42.99,43.460000000000015,43.800000000000004,44.07999999999999,44.370000000000005,44.599999999999994,44.91,45.31,45.900000000000006,46.580000000000005,47.150000000000006,47.67999999999999,48.18,48.35000000000001,48.39,48.68,48.97,49.35999999999999,49.56999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
