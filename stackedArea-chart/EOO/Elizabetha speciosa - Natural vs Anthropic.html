<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.66,96.59,96.44,96.47,96.40000000000002,96.48,96.60000000000001,96.30999999999999,96.03,96.02000000000001,96.16000000000001,95.97,95.55000000000001,94.89000000000001,94.41000000000001,94.65,94.82,94.64000000000001,94.55000000000001,94.57000000000001,94.25,93.74000000000001,93.63999999999999,93.79,93.55000000000001,93.18,93.25999999999999,93.34000000000002,93.34,93.17,92.59,91.88000000000001,91.67999999999999,91.87,91.98000000000002,91.99000000000001,92.04000000000002,91.21],"color":"green"},{"name":"anthropic","data":[2.59,2.67,2.79,2.7699999999999996,2.84,2.76,2.65,2.93,3.23,3.2399999999999998,3.08,3.27,3.71,4.36,4.85,4.58,4.43,4.589999999999999,4.6899999999999995,4.67,4.99,5.51,5.6,5.470000000000001,5.71,6.08,6,5.909999999999999,5.890000000000001,6.08,6.6499999999999995,7.36,7.5600000000000005,7.380000000000001,7.26,7.26,7.199999999999999,8.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
