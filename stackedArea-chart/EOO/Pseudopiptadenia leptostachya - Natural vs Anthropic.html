<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.99,79.77,79.15,78.60000000000001,78.08000000000001,77.68000000000002,77.24000000000001,76.59000000000002,75.99000000000002,75.39999999999999,74.58000000000001,73.88000000000002,73.27000000000001,72.66999999999999,72.06,71.57000000000001,71.05000000000001,70.49000000000001,69.74000000000001,68.97999999999999,68.39999999999999,67.96999999999997,67.67999999999998,67.40999999999998,67.25,67.11,66.96999999999998,66.76,66.49,66.17999999999999,65.86999999999999,65.6,65.41999999999999,65.23999999999998,64.96999999999998,64.70999999999998,64.32,63.81000000000001],"color":"green"},{"name":"anthropic","data":[21.630000000000003,21.870000000000005,22.460000000000004,23.03,23.550000000000004,23.92,24.380000000000006,25.050000000000004,25.630000000000006,26.220000000000006,27.040000000000006,27.719999999999995,28.34,28.94,29.57,30.05,30.569999999999997,31.119999999999997,31.869999999999997,32.64000000000001,33.2,33.64,33.91,34.190000000000005,34.370000000000005,34.50999999999999,34.64,34.82999999999999,35.11,35.39000000000001,35.72999999999998,35.99999999999999,36.19,36.35999999999999,36.60999999999999,36.879999999999995,37.27,37.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
