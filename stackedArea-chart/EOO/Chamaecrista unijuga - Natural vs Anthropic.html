<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[20.830000000000002,21.29,20.549999999999997,20.03,19.709999999999997,19.409999999999997,19.060000000000002,18.91,18.73,18.62,18.55,18.63,18.48,18.549999999999997,18.51,18.43,18.48,18.5,18.549999999999997,18.729999999999997,18.86,19.139999999999997,19.39,19.430000000000003,19.46,19.44,19.43,19.499999999999996,19.509999999999994,19.6,19.85,20.01,20.12,20.270000000000003,20.490000000000006,20.77,20.930000000000003,21.400000000000002],"color":"green"},{"name":"anthropic","data":[53.22,52.760000000000005,53.63000000000001,54.230000000000004,54.650000000000006,54.949999999999996,55.309999999999995,55.48,55.66,55.79999999999999,55.86,55.77,55.88,55.82,55.849999999999994,55.97,55.89,55.839999999999996,55.78999999999999,55.62999999999999,55.5,55.21,54.95,54.93000000000001,54.88,54.92,54.96000000000001,54.89,54.89999999999999,54.77,54.550000000000004,54.4,54.26,54.11999999999999,54.06999999999999,53.96,53.82000000000001,53.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
