<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.88,69.03999999999999,76.51,78.59,79.24,73.57,77.29999999999998,77.66999999999999,75.62999999999998,76.54999999999998,76.40999999999998,75.2,76.8,75.12,75.45,77.07999999999998,76.94999999999999,77.05000000000001,76.01000000000002,76.55000000000001,76.77,76.91000000000001,77.82,77.49999999999999,76.69,73.75,70.77000000000002,71.60000000000001,70.73,68.24000000000001,70.81,69.16000000000001,69.31,68.32000000000001,69,68.96,68.39999999999999,67.37000000000002],"color":"green"},{"name":"anthropic","data":[33.46,30.29,22.84,20.73,20.099999999999998,25.749999999999996,22.060000000000002,21.65,23.72,22.79,22.93,24.130000000000003,22.54,24.24,23.87,22.27,22.39,22.3,23.320000000000004,22.800000000000004,22.570000000000004,22.420000000000005,21.51,21.850000000000005,22.650000000000002,25.600000000000005,28.55,27.740000000000002,28.610000000000003,31.100000000000005,28.54,30.190000000000005,30.029999999999994,31.020000000000003,30.35,30.369999999999997,30.95,31.980000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
