<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.38000000000001,57.339999999999996,57.38,57.050000000000004,56.53000000000001,56.580000000000005,56.49,56.089999999999996,56.15,56.190000000000005,56.21,56.43,56.39,56.260000000000005,56.669999999999995,56.599999999999994,56.87999999999999,56.85999999999999,56.949999999999996,57.10999999999999,57.18,57.34,57.1,57.12,57.39,57.589999999999996,57.779999999999994,58.15,58.290000000000006,58.58,59.449999999999996,59.49,59.54999999999999,59.709999999999994,59.85,59.800000000000004,59.96,59.910000000000004],"color":"green"},{"name":"anthropic","data":[42.7,42.76,42.71,43.05,43.54,43.49,43.59,43.99,43.93,43.89,43.86,43.629999999999995,43.68,43.81999999999999,43.41,43.480000000000004,43.21,43.22,43.14,42.96,42.92,42.739999999999995,43,42.96,42.68,42.489999999999995,42.290000000000006,41.93000000000001,41.8,41.49,40.64,40.59,40.54,40.36,40.24,40.29,40.129999999999995,40.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
