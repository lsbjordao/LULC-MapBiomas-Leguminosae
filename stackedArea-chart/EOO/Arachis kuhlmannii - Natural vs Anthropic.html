<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.69,48.95,47.15,45.8,44.68000000000001,43.73,42.99,41.98,41.199999999999996,40.52,39.81999999999999,39.29,38.85,38.52,38.160000000000004,37.900000000000006,37.66,37.49,37.07000000000001,36.82,36.71,36.529999999999994,36.52,36.50000000000001,36.510000000000005,36.470000000000006,36.42,36.41,36.36000000000001,36.220000000000006,36.260000000000005,36.32,36.290000000000006,36.27,36.19,35.989999999999995,35.64,35.8],"color":"green"},{"name":"anthropic","data":[50.019999999999996,50.75,52.529999999999994,53.9,55.019999999999996,55.980000000000004,56.71999999999999,57.699999999999996,58.51,59.18000000000001,59.89,60.43,60.87000000000001,61.19,61.53,61.81,62.03,62.2,62.620000000000005,62.879999999999995,62.989999999999995,63.15,63.17,63.18999999999999,63.179999999999986,63.209999999999994,63.26,63.26000000000001,63.349999999999994,63.480000000000004,63.41999999999999,63.35999999999999,63.39999999999999,63.419999999999995,63.49,63.68999999999999,64.05,63.91000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
