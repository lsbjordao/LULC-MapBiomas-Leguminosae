<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.51999999999999,58.24999999999999,57.64,57.019999999999996,56.28999999999999,55.83,55.38999999999999,54.830000000000005,54.34000000000001,54.05000000000001,53.77000000000001,53.53000000000001,53.430000000000014,53.120000000000005,52.809999999999995,52.540000000000006,52.21999999999999,51.940000000000005,51.55,51.160000000000004,50.86,50.68,50.5,50.38,50.28000000000001,50.140000000000015,49.940000000000005,49.500000000000014,49.05,48.72,48.45,48.31,48.190000000000005,48.12,47.99,47.84000000000001,47.63000000000001,47.529999999999994],"color":"green"},{"name":"anthropic","data":[38.49999999999999,38.73999999999999,39.339999999999996,39.98,40.71,41.16,41.599999999999994,42.16,42.63999999999999,42.940000000000005,43.220000000000006,43.45,43.57,43.91,44.199999999999996,44.46,44.77999999999999,45.059999999999995,45.46,45.85999999999999,46.11999999999999,46.309999999999995,46.489999999999995,46.63,46.69000000000001,46.86000000000001,47.04999999999998,47.51,47.95,48.26,48.550000000000004,48.66000000000001,48.79,48.850000000000016,49.000000000000014,49.18,49.349999999999994,49.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
