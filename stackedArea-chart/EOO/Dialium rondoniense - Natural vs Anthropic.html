<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.71999999999998,95.2,94.58,94.27000000000001,94.29,94.20999999999998,93.96,93.52999999999997,92.61999999999999,91.76,90.15999999999998,88.38999999999999,87.13000000000001,86.35,85.81,85.30000000000001,84.81,83.92999999999999,82.96000000000001,82.15999999999998,81.29999999999998,80.59,80.13,79.99,79.86,79.74000000000001,79.33999999999999,78.97999999999999,78.52999999999999,78.02000000000001,77.35999999999999,76.43,75.66999999999999,74.83,73.54,72.28999999999999,70.77999999999999,68.92],"color":"green"},{"name":"anthropic","data":[3.72,4.24,4.88,5.18,5.14,5.220000000000001,5.47,5.91,6.819999999999999,7.68,9.290000000000001,11.05,12.3,13.090000000000002,13.65,14.14,14.64,15.51,16.5,17.290000000000003,18.139999999999997,18.85,19.33,19.45,19.59,19.699999999999996,20.11,20.459999999999997,20.92,21.439999999999998,22.099999999999998,23.009999999999998,23.779999999999998,24.62,25.910000000000004,27.150000000000002,28.669999999999998,30.529999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
