<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.48999999999998,75.87000000000002,74.98,74.19,73.30999999999999,72.47,71.69,70.67,69.67999999999999,68.54,67.36,66.25000000000001,65.24000000000001,64.24,63.29999999999999,62.370000000000005,61.709999999999994,60.89999999999999,59.650000000000006,58.69,57.96999999999999,57.53999999999999,57.20000000000001,56.86999999999999,56.629999999999995,56.34999999999999,56.07,55.64,55.089999999999996,54.580000000000005,54.089999999999996,53.75,53.51999999999999,53.410000000000004,53.24999999999999,53.09,52.85,52.809999999999995],"color":"green"},{"name":"anthropic","data":[21.94,22.56,23.46,24.25,25.12,25.960000000000004,26.740000000000006,27.76,28.76,29.900000000000002,31.080000000000005,32.199999999999996,33.199999999999996,34.19,35.14,36.05,36.73,37.529999999999994,38.779999999999994,39.73,40.459999999999994,40.89999999999999,41.22,41.58,41.82,42.06999999999999,42.36000000000001,42.790000000000006,43.35,43.870000000000005,44.34,44.690000000000005,44.92,45.02,45.18000000000001,45.36000000000001,45.6,45.620000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
