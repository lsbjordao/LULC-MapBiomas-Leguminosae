<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.80000000000003,80.88,80.61000000000001,80.12000000000002,79.33000000000001,79.00000000000001,78.64000000000001,78.28000000000003,77.85000000000001,77.62000000000003,77.26000000000003,76.97000000000003,77.30000000000003,77.19000000000001,77.07000000000004,77.12000000000003,76.88000000000001,76.62000000000002,76.34000000000003,75.99000000000001,75.35000000000001,75.03,74.7,74.60000000000001,74.61,74.53000000000003,74.39,73.67000000000002,72.78,72.22000000000001,71.69000000000003,71.74,71.57000000000002,71.31000000000002,71.16000000000001,70.9,70.50999999999999,70.08],"color":"green"},{"name":"anthropic","data":[18.19,18.110000000000003,18.390000000000004,18.879999999999995,19.68,20.000000000000004,20.34,20.709999999999997,21.129999999999995,21.359999999999996,21.72,22.02,21.689999999999998,21.819999999999997,21.91,21.859999999999996,22.109999999999996,22.379999999999995,22.639999999999997,22.99,23.659999999999993,23.969999999999995,24.3,24.4,24.389999999999997,24.439999999999998,24.58,25.310000000000002,26.2,26.779999999999998,27.29,27.24,27.419999999999998,27.669999999999998,27.819999999999997,28.080000000000002,28.459999999999997,28.899999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
