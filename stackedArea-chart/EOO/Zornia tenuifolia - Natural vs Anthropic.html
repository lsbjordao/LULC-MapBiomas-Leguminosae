<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.49,69.24,68.99999999999999,68.13000000000001,67.25000000000001,66.71999999999998,65.99000000000001,64.66,63.709999999999994,63.17999999999999,62.660000000000004,62.06000000000001,62.52,62.08,61.79,61.220000000000006,60.61,60.28,60.00000000000001,60.17,59.83,60.29,60.46,60.24,60.22,60.06999999999999,60.00999999999999,58.95,57.980000000000004,57.919999999999995,57.68,58.93999999999999,59.109999999999985,59,59.099999999999994,59.19,59.03999999999999,59.04999999999999],"color":"green"},{"name":"anthropic","data":[30.360000000000007,30.62,30.860000000000003,31.730000000000004,32.61,33.150000000000006,33.870000000000005,35.18000000000001,36.16000000000001,36.690000000000005,37.220000000000006,37.82,37.34,37.78,38.07000000000001,38.640000000000015,39.260000000000005,39.59,39.86000000000001,39.690000000000005,40.04,39.56,39.38999999999999,39.63,39.620000000000005,39.79,39.839999999999996,40.9,41.870000000000005,41.94,42.18,40.910000000000004,40.74,40.85,40.74999999999999,40.68000000000001,40.830000000000005,40.82000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
