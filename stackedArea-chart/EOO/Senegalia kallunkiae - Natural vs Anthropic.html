<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.980000000000004,46.88999999999999,46.25,45.75,45.32,45.309999999999995,45.07,44.800000000000004,44.60000000000001,44.339999999999996,44.18,44.06999999999999,44.33,44.39,44.52,44.53,44.46999999999999,44.440000000000005,44.44,44.480000000000004,44.54999999999999,44.68,44.62,44.54,44.45,44.41,44.379999999999995,44.279999999999994,44.07999999999999,43.89999999999999,43.77999999999999,43.66,43.71,43.800000000000004,43.8,43.839999999999996,43.879999999999995,44.09],"color":"green"},{"name":"anthropic","data":[51.09,51.18999999999999,51.8,52.32,52.72,52.75,52.97999999999999,53.24999999999999,53.449999999999996,53.720000000000006,53.879999999999995,53.970000000000006,53.72,53.660000000000004,53.519999999999996,53.54999999999999,53.589999999999996,53.62,53.629999999999995,53.58999999999998,53.529999999999994,53.41,53.43999999999999,53.51,53.62,53.63999999999999,53.699999999999996,53.79,53.980000000000004,54.14,54.3,54.41999999999999,54.35999999999999,54.289999999999985,54.27999999999999,54.21999999999999,54.17,53.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
