<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.79999999999999,38.05,37.050000000000004,35.98000000000001,35.1,34.43,33.84,33.220000000000006,32.760000000000005,32.370000000000005,31.940000000000005,31.620000000000008,31.390000000000004,31.210000000000008,31.040000000000003,30.71,30.590000000000007,30.450000000000006,30.169999999999998,29.990000000000013,29.970000000000006,29.95000000000001,29.960000000000004,29.970000000000006,30.000000000000004,30.100000000000005,30.180000000000007,30.160000000000004,30.260000000000005,30.320000000000007,30.390000000000008,30.49000000000001,30.580000000000005,30.580000000000013,30.470000000000006,30.390000000000004,30.23000000000001,30.260000000000005],"color":"green"},{"name":"anthropic","data":[62.03999999999998,62.76,63.82,64.86999999999999,65.75000000000001,66.4,66.97999999999999,67.6,68.08,68.44999999999999,68.86999999999999,69.22,69.45000000000002,69.58999999999999,69.78999999999999,70.11999999999999,70.24,70.36999999999999,70.69000000000001,70.82999999999998,70.85000000000001,70.88,70.86999999999999,70.86999999999999,70.80999999999999,70.73,70.64999999999999,70.66000000000001,70.56,70.51,70.44999999999999,70.32000000000002,70.26000000000002,70.25000000000003,70.36,70.44000000000003,70.61000000000003,70.56000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
