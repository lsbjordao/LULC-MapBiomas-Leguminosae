<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.99999999999999,46.88999999999999,46.62,46.239999999999995,45.83,45.55,45.24,44.839999999999996,44.42,44.109999999999985,43.73999999999999,43.419999999999995,43.219999999999985,42.879999999999995,42.519999999999996,42.22999999999999,41.89999999999999,41.50999999999999,40.94,40.44,40.00999999999999,39.769999999999996,39.62,39.47,39.410000000000004,39.27,39.09,38.71,38.339999999999996,38.059999999999995,37.81999999999999,37.74999999999999,37.599999999999994,37.489999999999995,37.30999999999999,37.15999999999999,36.919999999999995,36.65999999999999],"color":"green"},{"name":"anthropic","data":[11.93,12.03,12.34,12.709999999999999,13.11,13.369999999999997,13.669999999999998,14.110000000000001,14.510000000000002,14.800000000000002,15.18,15.51,15.719999999999999,16.04,16.41,16.689999999999998,17.040000000000003,17.42,17.980000000000004,18.490000000000006,18.910000000000007,19.140000000000004,19.32,19.470000000000006,19.530000000000005,19.660000000000004,19.830000000000005,20.22,20.570000000000004,20.87,21.11,21.200000000000003,21.340000000000003,21.450000000000003,21.62,21.76,21.99,22.270000000000007],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
