<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.49000000000002,83.33999999999999,82.73,82.13999999999999,81.52,81.02999999999999,80.52,79.79,79.08000000000001,78.49,77.79,77.19000000000001,76.7,76.04,75.40000000000002,74.87000000000002,74.21999999999998,73.60000000000001,72.70000000000002,71.76,71.08000000000001,70.58000000000001,70.17000000000002,69.82000000000001,69.59000000000002,69.39000000000001,69.16,68.76,68.31000000000002,67.92,67.5,67.19000000000001,66.95000000000002,66.74,66.42000000000003,66.09,65.61000000000001,65.02999999999999],"color":"green"},{"name":"anthropic","data":[16.220000000000006,16.360000000000007,16.970000000000002,17.55,18.160000000000004,18.660000000000004,19.180000000000003,19.890000000000004,20.610000000000007,21.210000000000004,21.930000000000007,22.52000000000001,23.020000000000003,23.670000000000005,24.28000000000001,24.810000000000002,25.470000000000006,26.1,26.990000000000002,27.92000000000001,28.63000000000001,29.10000000000001,29.52000000000001,29.890000000000008,30.090000000000007,30.300000000000008,30.520000000000007,30.93,31.380000000000003,31.77000000000001,32.18,32.489999999999995,32.7,32.93,33.27,33.61,34.089999999999996,34.64999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
