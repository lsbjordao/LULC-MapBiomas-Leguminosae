<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.80000000000001,72.64,72.11000000000003,70.89000000000001,69.81000000000002,69.48,68.94,68.44999999999999,68.16,68.24,67.76999999999998,67.27,68.44999999999999,68.17999999999999,68.19,68.21000000000001,67.66,67.36,67.4,68.06,67.44,67.60000000000001,67.22999999999999,66.67999999999999,66.39,65.89999999999999,65.59,64.21,62.39000000000001,62.35999999999999,62.18,63.58,63.949999999999996,64.02,64.22,64.67999999999999,64.31,64.64999999999999],"color":"green"},{"name":"anthropic","data":[26.650000000000006,26.8,27.35,28.560000000000006,29.650000000000006,29.990000000000002,30.499999999999996,31.000000000000004,31.3,31.22,31.680000000000003,32.190000000000005,31.000000000000004,31.3,31.250000000000004,31.280000000000005,31.800000000000004,32.11000000000001,32.040000000000006,31.390000000000004,32.010000000000005,31.850000000000005,32.23,32.77,33.059999999999995,33.57000000000001,33.88000000000001,35.250000000000014,37.07,37.10000000000001,37.279999999999994,35.89,35.49999999999999,35.43999999999999,35.23,34.790000000000006,35.150000000000006,34.82000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
