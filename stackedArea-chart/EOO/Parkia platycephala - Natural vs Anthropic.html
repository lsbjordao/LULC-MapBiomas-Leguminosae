<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.97999999999999,80.87999999999998,80.3,79.58,78.85,78.27,77.77999999999999,76.97999999999998,76.25999999999999,75.77,75.22,74.67000000000002,74.33,73.64999999999999,73.03,72.58000000000001,71.96,71.41000000000003,70.60000000000001,69.76,69.01,68.51000000000002,68.07000000000001,67.71000000000002,67.53000000000002,67.30000000000001,67.02,66.33999999999999,65.69999999999999,65.23000000000002,64.78,64.56,64.32,64.1,63.77,63.440000000000005,63.010000000000005,62.43],"color":"green"},{"name":"anthropic","data":[18.490000000000006,18.590000000000007,19.190000000000005,19.870000000000008,20.640000000000004,21.19000000000001,21.69000000000001,22.480000000000004,23.180000000000003,23.69000000000001,24.24000000000001,24.79,25.120000000000008,25.790000000000003,26.419999999999998,26.88,27.500000000000004,28.060000000000006,28.870000000000005,29.720000000000006,30.450000000000006,30.960000000000004,31.400000000000002,31.750000000000004,31.92,32.16,32.43,33.12999999999999,33.75999999999999,34.21000000000001,34.67,34.88999999999999,35.120000000000005,35.37,35.68,35.99,36.449999999999996,37.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
