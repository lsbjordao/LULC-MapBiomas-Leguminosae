<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.12,99.25999999999999,99.38,99.42,99.43,99.38,99.35999999999999,99.30999999999999,99.25,98.96,98.78,98.91,99.07,98.99,98.94999999999999,98.84,98.67999999999998,98.64999999999999,98.58,98.44999999999999,98.41,98.38,98.38000000000001,98.33,98.22999999999999,98.16999999999999,98.14999999999999,98.06000000000002,97.91,97.73,97.52,97.36,97.37,97.24,97.14,97.11,97.05999999999999,96.72],"color":"green"},{"name":"anthropic","data":[0.64,0.49,0.33999999999999997,0.32,0.32,0.36,0.38,0.43,0.48,0.77,0.9500000000000001,0.8300000000000001,0.6799999999999999,0.76,0.79,0.9099999999999999,1.05,1.1,1.1800000000000002,1.29,1.34,1.36,1.37,1.4200000000000002,1.51,1.57,1.6,1.6800000000000002,1.84,2.0100000000000002,2.1999999999999997,2.37,2.38,2.4899999999999998,2.5999999999999996,2.6399999999999997,2.6799999999999997,3.0199999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
