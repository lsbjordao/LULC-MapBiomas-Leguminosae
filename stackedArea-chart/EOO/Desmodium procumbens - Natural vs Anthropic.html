<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.59999999999997,73.38999999999999,72.74999999999997,72.11999999999996,71.44999999999997,70.97999999999998,70.48999999999998,69.76999999999997,69.11999999999998,68.50999999999999,67.82,67.18999999999998,66.70999999999998,66.07999999999998,65.47,64.97000000000001,64.4,63.830000000000005,63.040000000000006,62.25,61.650000000000006,61.22,60.900000000000006,60.64,60.45,60.3,60.07,59.71000000000001,59.33,58.980000000000004,58.65,58.419999999999995,58.2,58.02000000000001,57.730000000000004,57.470000000000006,57.08,56.58],"color":"green"},{"name":"anthropic","data":[23.430000000000007,23.650000000000002,24.290000000000006,24.91,25.57,26.050000000000008,26.540000000000003,27.260000000000012,27.930000000000003,28.52000000000001,29.21,29.849999999999998,30.330000000000005,30.96,31.589999999999996,32.07000000000001,32.61,33.2,33.99,34.769999999999996,35.39000000000001,35.8,36.14000000000001,36.38000000000001,36.54,36.720000000000006,36.95000000000001,37.309999999999995,37.68000000000001,38.04,38.38999999999999,38.60999999999999,38.82000000000001,38.97000000000001,39.29999999999999,39.54999999999999,39.91999999999999,40.42999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
