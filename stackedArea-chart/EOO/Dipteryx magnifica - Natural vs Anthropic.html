<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.88000000000002,98.89,98.72000000000001,98.54,98.4,98.3,98.14000000000001,97.92000000000002,97.66000000000001,97.35000000000002,96.89000000000001,96.53,96.15,95.75000000000001,95.39999999999999,95.15000000000002,94.79000000000002,94.4,93.88000000000001,93.28999999999999,92.89,92.62,92.43000000000002,92.27000000000001,92.15000000000002,92.08000000000001,92.00000000000001,91.94000000000001,91.81000000000002,91.68,91.47000000000003,91.27000000000002,91.12,90.98,90.7,90.45,90.05,89.54],"color":"green"},{"name":"anthropic","data":[1.9100000000000001,1.9200000000000002,2.09,2.25,2.4099999999999997,2.5100000000000002,2.65,2.8999999999999995,3.1499999999999995,3.4599999999999995,3.8899999999999992,4.27,4.639999999999999,5.039999999999999,5.389999999999999,5.6499999999999995,5.999999999999998,6.379999999999998,6.899999999999999,7.49,7.909999999999999,8.179999999999998,8.349999999999998,8.53,8.649999999999999,8.709999999999999,8.799999999999999,8.87,8.979999999999999,9.129999999999999,9.32,9.52,9.659999999999998,9.799999999999999,10.08,10.35,10.74,11.259999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
