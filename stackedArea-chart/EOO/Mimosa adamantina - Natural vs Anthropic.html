<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.88,84.78000000000002,84.61999999999999,84.65,84.77000000000001,85.10999999999999,85.25999999999999,85.28000000000002,85.16000000000001,84.9,84.77000000000001,84.74,84.77,84.8,84.89,84.91,84.85,84.69,84.52,84.44999999999999,84.26999999999998,84.14999999999999,84.00999999999999,83.89,83.89,83.86000000000001,83.80000000000001,83.82,83.84999999999998,84.09,84.08,84.12,84.17,84.13000000000001,84.11,84.00000000000001,83.86000000000001,83.67999999999999],"color":"green"},{"name":"anthropic","data":[14.6,14.68,14.86,14.81,14.690000000000001,14.36,14.209999999999999,14.190000000000001,14.3,14.56,14.700000000000001,14.73,14.689999999999998,14.670000000000002,14.569999999999999,14.54,14.599999999999998,14.780000000000001,14.930000000000001,15.02,15.19,15.33,15.459999999999999,15.58,15.589999999999998,15.61,15.68,15.639999999999999,15.61,15.37,15.379999999999999,15.36,15.309999999999999,15.329999999999998,15.36,15.47,15.610000000000001,15.790000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
