<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.77999999999999,92.52999999999999,91.93999999999998,91.44999999999999,90.97,90.61,90.19,89.57999999999998,88.92999999999999,88.2,87.29999999999998,86.51999999999998,85.77999999999999,85.05,84.32000000000001,83.74999999999999,83.12000000000002,82.41,81.40999999999998,80.50999999999999,79.86,79.38000000000001,79.1,78.78999999999999,78.62999999999998,78.49,78.33,78.21,78.02,77.82,77.53999999999999,77.28,77.05999999999999,76.83,76.5,76.16999999999999,75.64000000000001,74.89999999999999],"color":"green"},{"name":"anthropic","data":[6.76,7.0200000000000005,7.609999999999999,8.1,8.569999999999999,8.940000000000001,9.36,9.98,10.61,11.36,12.249999999999998,13.04,13.78,14.489999999999998,15.239999999999998,15.819999999999999,16.450000000000003,17.160000000000004,18.14,19.04,19.689999999999998,20.150000000000002,20.45,20.770000000000003,20.939999999999998,21.06,21.23,21.34,21.520000000000003,21.77,22.020000000000003,22.290000000000006,22.510000000000005,22.730000000000008,23.070000000000007,23.400000000000002,23.91,24.640000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
