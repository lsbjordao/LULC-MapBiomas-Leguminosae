<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.91,63.91999999999998,62.489999999999995,61.47999999999999,60.44,59.429999999999986,58.49,57.29999999999999,56.24999999999999,55.239999999999995,54.129999999999995,53.30000000000001,52.56999999999999,51.85000000000001,51.21000000000001,50.62999999999999,50.160000000000004,49.699999999999996,49.04,48.48000000000001,48.150000000000006,47.83000000000001,47.75,47.57999999999999,47.56,47.370000000000005,47.26000000000001,47.11000000000001,46.93,46.71,46.52,46.4,46.269999999999996,46.21,46.07000000000001,45.940000000000005,45.69,46],"color":"green"},{"name":"anthropic","data":[35.71,36.68,38.12999999999999,39.120000000000005,40.17999999999999,41.2,42.120000000000005,43.32000000000001,44.36,45.39,46.460000000000015,47.3,48.050000000000004,48.730000000000004,49.4,49.96,50.45000000000002,50.900000000000006,51.57,52.10000000000001,52.470000000000006,52.769999999999996,52.86,53.03000000000001,53.04,53.25000000000001,53.34,53.49999999999999,53.68999999999999,53.91000000000001,54.089999999999996,54.21,54.330000000000005,54.37999999999999,54.519999999999996,54.669999999999995,54.90999999999999,54.59999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
