<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.33000000000001,94.03,93.60000000000001,93.13000000000001,92.77000000000001,92.63000000000001,92.23,91.68,91.08,90.25000000000001,89.29000000000002,88.3,87.57000000000001,86.87,86.07000000000001,85.33,84.54,83.61,82.37,81.4,80.48,79.77999999999997,79.29,78.96000000000001,78.69999999999999,78.50000000000001,78.13999999999999,77.85999999999999,77.61999999999999,77.31,76.80999999999999,76.24,75.7,75.26999999999997,74.54999999999998,73.91999999999999,73.07,72.01000000000002],"color":"green"},{"name":"anthropic","data":[4.31,4.599999999999999,5.019999999999999,5.499999999999999,5.849999999999999,6.01,6.409999999999999,6.959999999999999,7.55,8.37,9.34,10.33,11.069999999999999,11.76,12.559999999999999,13.299999999999999,14.09,15.03,16.259999999999998,17.240000000000002,18.180000000000003,18.880000000000006,19.350000000000005,19.690000000000005,19.930000000000003,20.140000000000004,20.490000000000002,20.779999999999998,21.02,21.35,21.830000000000002,22.4,22.930000000000003,23.389999999999997,24.089999999999996,24.709999999999997,25.56,26.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
