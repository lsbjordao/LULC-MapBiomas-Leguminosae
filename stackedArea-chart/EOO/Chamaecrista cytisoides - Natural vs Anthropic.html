<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.69999999999999,42.58,42.160000000000004,41.76999999999999,41.300000000000004,41.1,40.79000000000001,40.360000000000014,39.98000000000001,39.74000000000001,39.500000000000014,39.39000000000002,39.410000000000004,39.38000000000002,39.29000000000001,39.21,39.120000000000005,38.97000000000002,38.81000000000001,38.68000000000001,38.60000000000001,38.61000000000001,38.60000000000001,38.580000000000005,38.59,38.52000000000001,38.44000000000002,38.280000000000015,38.070000000000014,37.85000000000001,37.750000000000014,37.67000000000001,37.640000000000015,37.70000000000002,37.69000000000001,37.68000000000001,37.74000000000001,37.780000000000015],"color":"green"},{"name":"anthropic","data":[48.339999999999996,48.489999999999995,48.89,49.309999999999995,49.769999999999996,49.989999999999995,50.26,50.709999999999994,51.09,51.34000000000001,51.60000000000001,51.70000000000001,51.66000000000001,51.7,51.78,51.870000000000005,51.970000000000006,52.10999999999999,52.269999999999996,52.36000000000001,52.46999999999999,52.44999999999999,52.45,52.48000000000001,52.47000000000001,52.53999999999999,52.63000000000001,52.790000000000006,52.99,53.21999999999999,53.320000000000014,53.39000000000001,53.41000000000001,53.36000000000001,53.37000000000002,53.370000000000005,53.330000000000005,53.269999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
