<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.14,95.05,94.68999999999998,94.29999999999998,94.01999999999998,93.80999999999999,93.49999999999999,93.01999999999998,92.56999999999998,92.08999999999999,91.45,90.86,90.29999999999998,89.71,89.15,88.69999999999999,88.16,87.58,86.78999999999999,85.97999999999999,85.35,84.85999999999997,84.51,84.14,83.91,83.78999999999999,83.61999999999999,83.43,83.17999999999998,82.93,82.61999999999999,82.25999999999999,82.02,81.77,81.42,81.05,80.53999999999999,79.77],"color":"green"},{"name":"anthropic","data":[4.79,4.859999999999999,5.22,5.609999999999999,5.879999999999999,6.1,6.3999999999999995,6.899999999999999,7.359999999999999,7.839999999999999,8.48,9.059999999999999,9.62,10.219999999999999,10.77,11.219999999999999,11.759999999999998,12.329999999999998,13.129999999999997,13.939999999999998,14.569999999999999,15.049999999999999,15.419999999999996,15.749999999999996,15.999999999999996,16.139999999999997,16.290000000000003,16.490000000000006,16.749999999999996,16.98,17.31,17.65,17.909999999999997,18.15,18.510000000000005,18.880000000000003,19.400000000000002,20.150000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
