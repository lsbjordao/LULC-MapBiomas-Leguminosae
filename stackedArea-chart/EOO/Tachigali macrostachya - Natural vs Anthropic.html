<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.18,99.13,99.05999999999999,99.02,99.04,99.09,99.08,99.00999999999999,98.94,98.92,98.92999999999999,98.92999999999998,98.9,98.87,98.85,98.86,98.87000000000002,98.88,98.85000000000001,98.83000000000001,98.78000000000002,98.77999999999999,98.79,98.77999999999999,98.77,98.75,98.77,98.77999999999999,98.8,98.80000000000001,98.80000000000001,98.82,98.84,98.86,98.87,98.85999999999999,98.85000000000001,98.81],"color":"green"},{"name":"anthropic","data":[0.15,0.18,0.27,0.30000000000000004,0.28,0.23,0.25,0.32,0.37000000000000005,0.39,0.39,0.39,0.42000000000000004,0.46,0.47000000000000003,0.45,0.45,0.44,0.46,0.49000000000000005,0.53,0.54,0.52,0.54,0.56,0.56,0.56,0.54,0.52,0.53,0.51,0.49000000000000005,0.48000000000000004,0.46,0.45999999999999996,0.47,0.49,0.51],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
