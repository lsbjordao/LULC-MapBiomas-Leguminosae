<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.99999999999999,40.719999999999985,40.109999999999985,39.7,39.32999999999999,39.28,39.06,38.83,38.64,38.47999999999999,38.25999999999999,38.15,38.08,37.97999999999998,37.88999999999999,37.68999999999999,37.62,37.43999999999999,37.349999999999994,37.26,37.31,37.36000000000001,37.379999999999995,37.4,37.349999999999994,37.29,37.25,37.15,37.06,36.93,36.89999999999999,36.81999999999999,36.87,36.98,36.97,37,37.07999999999999,37.239999999999995],"color":"green"},{"name":"anthropic","data":[55.309999999999995,55.61000000000001,56.21999999999999,56.62999999999999,57,57.04,57.22999999999999,57.489999999999995,57.66,57.82000000000001,58.03999999999999,58.15,58.209999999999994,58.32000000000001,58.39999999999999,58.62,58.67999999999999,58.849999999999994,58.93999999999999,59.05999999999998,58.97999999999999,58.94999999999999,58.92,58.92,58.98,59,59.04000000000001,59.14,59.24,59.37,59.4,59.49,59.42,59.33000000000001,59.34,59.330000000000005,59.23,59.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
