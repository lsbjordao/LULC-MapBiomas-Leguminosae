<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.12,69.36,69.32,69.39,69.65,70.17,70.65,70.71000000000001,70.41,69.96000000000001,69.5,69.38999999999999,69.34,69.44000000000001,69.56,69.44,69.11,68.57000000000001,68.41,68.38,68.30999999999999,68.37,68.37,68.47,68.45,68.24999999999999,68.2,68.33999999999999,68.55999999999999,68.85,68.99,69.08999999999999,69.04,68.92,68.72,68.44999999999999,68.11,67.85000000000001],"color":"green"},{"name":"anthropic","data":[30.259999999999998,30.02,30.069999999999997,29.990000000000002,29.740000000000002,29.21,28.73,28.68,28.98,29.42,29.89,29.990000000000002,30.059999999999995,29.95,29.82,29.950000000000003,30.27,30.8,30.970000000000002,31.009999999999998,31.09,31,31.000000000000004,30.919999999999998,30.94,31.119999999999997,31.19,31.06,30.840000000000003,30.539999999999996,30.400000000000002,30.320000000000004,30.34,30.46,30.660000000000004,30.930000000000003,31.270000000000003,31.549999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
