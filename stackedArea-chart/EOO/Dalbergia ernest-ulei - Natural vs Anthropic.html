<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.91,49.5,50.29,50.09,50.06,50.07999999999999,49.82,49.809999999999995,50.41,50.79999999999999,50.739999999999995,50.94,50.93,51.25,51.22,50.86,50.54,50.53,50.68000000000001,50.010000000000005,49.08,48.74,48.78,48.75999999999999,49.64000000000001,49.97,50.190000000000005,50.290000000000006,50.4,49.92999999999999,49.94,49.519999999999996,49.599999999999994,49.41,49.099999999999994,48.75999999999999,48.059999999999995,46.47999999999999],"color":"green"},{"name":"anthropic","data":[47.59,47.01,46.24,46.42,46.45,46.44,46.69,46.7,46.099999999999994,45.72,45.79,45.57,45.58,45.269999999999996,45.31,45.65,45.97,45.97,45.83,46.5,47.44,47.769999999999996,47.74,47.760000000000005,46.87,46.53,46.31,46.230000000000004,46.11,46.59,46.57,46.980000000000004,46.93,47.11,47.41,47.75,48.45,50.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
