<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.85000000000001,98.97,98.97,98.96,98.57,98.57,98.57,98.77,98.78,98.79,98.79,98.78,98.77,98.72999999999999,98.7,98.52,98.45,98.42,98.52999999999999,98.53999999999999,98.48,98.37,98.32999999999998,98.25,98.16000000000001,98.21000000000001,98.26,98.21999999999998,98.19,98.16000000000001,98.15,98.17000000000002,98.15,98.18,98.19,98.16,98.13000000000001,98.07],"color":"green"},{"name":"anthropic","data":[0.47,0.35,0.35,0.35,0.74,0.74,0.74,0.55,0.53,0.52,0.52,0.53,0.54,0.58,0.61,0.79,0.87,0.89,0.76,0.78,0.8300000000000001,0.9400000000000001,0.98,1.07,1.1500000000000001,1.1,1.06,1.09,1.11,1.1500000000000001,1.1400000000000001,1.1400000000000001,1.1600000000000001,1.12,1.1300000000000001,1.1400000000000001,1.1700000000000002,1.24],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
