<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.56999999999999,60.92,60.510000000000005,59.71,58.65,57.96,57.04,56.37,55.720000000000006,54.91,54.16,53.50999999999999,52.88999999999999,52.419999999999995,51.96,51.49999999999999,51.129999999999995,50.52,49.87,49.23,48.78000000000001,48.54,48.32999999999999,48.14999999999999,48.019999999999996,47.769999999999996,47.529999999999994,47.24999999999999,46.89,46.59999999999999,46.309999999999995,46.14,45.98,45.809999999999995,45.53,45.27,44.96999999999999,45.2],"color":"green"},{"name":"anthropic","data":[37.56000000000001,38.25,38.64000000000001,39.440000000000005,40.49,41.19,42.120000000000005,42.78,43.44,44.24,44.99,45.63000000000001,46.24,46.7,47.18,47.64,48.01,48.61999999999999,49.260000000000005,49.91,50.34,50.6,50.800000000000004,51.01,51.120000000000005,51.36,51.60000000000001,51.88999999999999,52.23,52.56,52.82,52.980000000000004,53.15,53.34,53.61000000000001,53.86,54.17000000000001,53.940000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
