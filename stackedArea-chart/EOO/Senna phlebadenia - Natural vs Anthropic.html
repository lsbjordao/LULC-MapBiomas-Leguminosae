<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.37,45.01999999999999,44.18999999999999,43.769999999999996,43.2,42.669999999999995,42.269999999999996,41.449999999999996,40.80999999999998,40.46999999999999,40.36999999999999,40.29999999999999,40.22,40.06,39.94,39.56999999999999,39.41,39.40999999999999,38.90999999999999,38.959999999999994,38.83999999999999,39.029999999999994,39.36999999999999,39.419999999999995,39.699999999999996,39.559999999999995,39.410000000000004,38.78999999999999,38.419999999999995,38.14,38.08,38.48,38.35,38.38999999999999,38.28999999999999,38.37,38.370000000000005,38.559999999999995],"color":"green"},{"name":"anthropic","data":[51.64999999999999,52.01,52.839999999999996,53.279999999999994,53.83999999999999,54.37999999999999,54.77999999999999,55.589999999999996,56.25,56.57,56.669999999999995,56.74999999999999,56.809999999999995,56.989999999999995,57.12,57.46000000000001,57.62,57.65,58.120000000000005,58.1,58.199999999999996,58.019999999999996,57.68,57.629999999999995,57.35,57.49,57.62,58.24999999999999,58.62,58.910000000000004,58.959999999999994,58.56,58.71,58.650000000000006,58.78000000000001,58.68,58.68,58.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
