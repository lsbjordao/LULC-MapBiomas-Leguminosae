<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.470000000000006,44.15999999999999,43.269999999999996,43.03,42.45,42.17,41.84,41.64999999999999,41.7,41.49000000000001,41.14,41.05,40.769999999999996,40.56999999999999,40.40999999999999,40.160000000000004,40.06,39.82999999999999,39.81999999999999,39.63999999999999,39.54,39.49,39.519999999999996,39.550000000000004,39.449999999999996,39.53,39.77000000000001,39.93,40.04999999999999,40.14999999999999,40.19,40.230000000000004,40.14999999999999,40.11,40.089999999999996,39.84,40.160000000000004,40.21999999999999],"color":"green"},{"name":"anthropic","data":[43.62,42.92999999999999,43.809999999999995,44.059999999999995,44.62999999999999,44.89999999999999,45.22999999999999,45.419999999999995,45.38999999999999,45.60999999999999,45.93999999999999,46.04,46.33,46.50000000000001,46.7,46.95,47.050000000000004,47.24000000000001,47.27000000000001,47.45,47.550000000000004,47.6,47.580000000000005,47.52,47.629999999999995,47.56,47.3,47.150000000000006,47.050000000000004,46.92,46.9,46.86,46.93,46.970000000000006,46.99999999999999,47.25000000000001,46.92,46.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
