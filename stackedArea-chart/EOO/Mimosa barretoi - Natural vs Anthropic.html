<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.68,61.16,60.47,60.059999999999995,59.46,59.26,58.89999999999999,58.72,58.389999999999986,58.55999999999999,58.62,59.029999999999994,60.02,60.42,60.160000000000004,59.589999999999996,59.26,58.36000000000001,57.9,57.64000000000001,58.440000000000005,58.39,58.239999999999995,58.45,58.830000000000005,58.95,58.77000000000001,59.019999999999996,59.190000000000005,59.3,60.010000000000005,60.050000000000004,60.24999999999999,60.09000000000001,60,59.69,59.60000000000001,59.14999999999999],"color":"green"},{"name":"anthropic","data":[35.730000000000004,38.25000000000001,38.940000000000005,39.35,39.95000000000001,40.150000000000006,40.5,40.68000000000001,41.02,40.830000000000005,40.79,40.37,39.39,38.98,39.25,39.79999999999999,40.150000000000006,41.050000000000004,41.51,41.76,40.97,41.019999999999996,41.169999999999995,40.959999999999994,40.56999999999999,40.449999999999996,40.629999999999995,40.37999999999999,40.19999999999999,40.11,39.39000000000001,39.370000000000005,39.17000000000001,39.31000000000001,39.41,39.70000000000001,39.800000000000004,40.25],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
