<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.66999999999999,99.65999999999998,99.51,99.44,99.42,99.37000000000002,99.35999999999999,99.20999999999998,99.02000000000002,98.87000000000002,98.57,98.30000000000003,97.93,97.72,97.67999999999999,97.66,97.43,97.35,97.19999999999999,96.97,96.67999999999998,96.46999999999998,96.33999999999997,96.22999999999999,96.08,96.00999999999999,96.00000000000001,96,95.89000000000001,95.75,95.55,95.19,95.01,94.86,94.65999999999998,94.36999999999999,93.95,93.33999999999999],"color":"green"},{"name":"anthropic","data":[1.34,1.35,1.49,1.58,1.59,1.6300000000000001,1.6600000000000001,1.79,1.98,2.1399999999999997,2.4499999999999997,2.6999999999999997,3.0799999999999996,3.2899999999999996,3.32,3.3299999999999996,3.57,3.6599999999999997,3.8,4.04,4.319999999999999,4.529999999999999,4.659999999999999,4.789999999999999,4.93,4.999999999999999,5.009999999999999,4.999999999999999,5.119999999999998,5.26,5.47,5.8100000000000005,5.99,6.14,6.3500000000000005,6.64,7.06,7.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
