<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.36999999999999,97.16,96.88,96.52999999999999,96.24,96.11999999999999,95.74999999999999,95.27999999999999,94.80999999999997,94.19999999999999,93.49999999999999,92.72999999999999,92.13999999999999,91.51999999999998,90.84999999999998,90.27999999999997,89.52999999999997,88.44999999999997,87.28,85.88999999999999,84.79999999999998,84.15999999999998,83.68999999999998,83.35999999999999,83.14999999999999,83.02999999999999,82.90999999999998,82.73999999999998,82.42,82.15,81.81,81.45,81.10000000000001,80.73,80.14,79.54,78.75999999999999,77.87],"color":"green"},{"name":"anthropic","data":[3.5999999999999996,3.8199999999999994,4.1,4.45,4.7299999999999995,4.85,5.25,5.71,6.17,6.779999999999999,7.49,8.259999999999998,8.839999999999998,9.459999999999999,10.12,10.7,11.459999999999999,12.540000000000001,13.71,15.08,16.180000000000003,16.82,17.28,17.620000000000005,17.84,17.950000000000003,18.07,18.23,18.55,18.81,19.17,19.54,19.889999999999997,20.24,20.83,21.43,22.22,23.110000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
