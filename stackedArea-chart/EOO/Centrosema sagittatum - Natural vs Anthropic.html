<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.27,70.00000000000001,69.31,68.68,68,67.5,66.97000000000001,66.27000000000001,65.62,65.02,64.3,63.74000000000001,63.269999999999996,62.709999999999994,62.13000000000001,61.660000000000004,61.14999999999999,60.58999999999999,59.879999999999995,59.2,58.699999999999996,58.349999999999994,58.08999999999999,57.88000000000001,57.779999999999994,57.56,57.34,57.01,56.66,56.339999999999996,56.06999999999999,55.81999999999999,55.64,55.459999999999994,55.19999999999999,54.949999999999996,54.599999999999994,54.16999999999999],"color":"green"},{"name":"anthropic","data":[28.76,29.050000000000008,29.69,30.360000000000003,31.040000000000003,31.520000000000003,32.06,32.769999999999996,33.41,34.029999999999994,34.739999999999995,35.31000000000001,35.77,36.34,36.890000000000015,37.400000000000006,37.88000000000002,38.43,39.14000000000001,39.83,40.339999999999996,40.680000000000014,40.970000000000006,41.2,41.27,41.459999999999994,41.69,42.06,42.379999999999995,42.67999999999999,42.97000000000001,43.21,43.39000000000001,43.56,43.830000000000005,44.07000000000001,44.449999999999996,44.86],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
