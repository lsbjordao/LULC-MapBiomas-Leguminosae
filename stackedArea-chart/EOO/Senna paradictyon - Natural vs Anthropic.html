<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[16.629999999999995,16.449999999999992,16.119999999999997,15.789999999999996,15.52,15.349999999999998,15.17,14.959999999999999,14.81,14.709999999999999,14.54,14.43,14.31,14.220000000000002,14.12,13.989999999999998,13.939999999999998,13.86,13.78,13.73,13.720000000000002,13.760000000000002,13.750000000000002,13.74,13.760000000000002,13.79,13.769999999999998,13.749999999999998,13.719999999999999,13.7,13.700000000000001,13.680000000000001,13.71,13.73,13.700000000000001,13.71,13.71,13.749999999999998],"color":"green"},{"name":"anthropic","data":[26.549999999999997,26.73,27.070000000000004,27.380000000000006,27.689999999999998,27.83,28.019999999999996,28.250000000000004,28.390000000000008,28.520000000000003,28.68,28.799999999999997,28.900000000000002,28.97,29.090000000000003,29.190000000000005,29.270000000000007,29.33000000000001,29.420000000000005,29.470000000000006,29.47000000000001,29.480000000000008,29.460000000000004,29.460000000000004,29.46000000000001,29.440000000000012,29.450000000000014,29.500000000000007,29.490000000000006,29.530000000000005,29.520000000000007,29.51,29.51,29.490000000000002,29.500000000000004,29.5,29.500000000000004,29.430000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
