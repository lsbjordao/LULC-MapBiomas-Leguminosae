<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.85,53.059999999999995,52.26,50.899999999999984,49.93,49.33,49.00000000000001,49.06999999999999,48.43999999999999,47.82999999999999,47.24999999999999,46.80999999999999,46.49999999999999,46.059999999999995,45.65999999999998,45.05,44.96999999999999,44.440000000000005,44.230000000000004,43.85,43.05000000000001,42.95,42.97,42.89000000000001,43.44,43.459999999999994,43.28,43.32000000000001,42.96000000000001,42.550000000000004,42.49,41.890000000000015,41.28,41.63999999999999,41.51000000000002,41.64,42.37,44.36],"color":"green"},{"name":"anthropic","data":[11.04,11.93,12.799999999999999,14.25,15.29,15.889999999999999,16.23,16.170000000000005,16.82,17.439999999999998,18.05,18.470000000000002,18.73,19.13,19.55,20.17,20.25,20.830000000000002,21.01,21.41,22.249999999999996,22.37,22.349999999999998,22.429999999999996,21.859999999999996,21.81,21.999999999999996,22.01,22.4,22.819999999999997,22.92,23.55,24.19,23.820000000000004,23.980000000000004,23.830000000000002,23.099999999999998,20.92],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
