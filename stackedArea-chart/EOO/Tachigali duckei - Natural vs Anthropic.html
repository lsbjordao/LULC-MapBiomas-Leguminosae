<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.269999999999996,32.65,32.14,32.4,32.49,32.410000000000004,32.449999999999996,32.410000000000004,32.78,32.94,33.28,33.63,33.91,34.14,35.00000000000001,35.24,35.32,35.480000000000004,35.43,35.50999999999999,35.81,35.919999999999995,35.87,36.029999999999994,36.08,36.26,36.260000000000005,36.54,36.93,37.27,37.45,37.53,37.64000000000001,37.52,37.620000000000005,37.61,38.370000000000005,38.800000000000004],"color":"green"},{"name":"anthropic","data":[65.17999999999999,66.78,67.3,67.03999999999999,66.95,67.03,67,67.03,66.66,66.49,66.17,65.81,65.52000000000001,65.3,64.45,64.2,64.11,63.959999999999994,64.02000000000001,63.94,63.620000000000005,63.52,63.56,63.410000000000004,63.36000000000001,63.17,63.18,62.900000000000006,62.510000000000005,62.18,61.989999999999995,61.91,61.79,61.910000000000004,61.82,61.82000000000001,61.06,60.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
