<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.00999999999999,98.00000000000001,97.82000000000002,97.66,97.62,97.52000000000001,97.49000000000001,97.30000000000001,97.11,96.93,96.63,96.35000000000002,96,95.68000000000002,95.51000000000003,95.37000000000002,95.11,94.84,94.48000000000002,93.99000000000002,93.60000000000002,93.26,92.98000000000002,92.73000000000002,92.54000000000002,92.46000000000001,92.42000000000002,92.39,92.25,92.10000000000002,91.88000000000002,91.58000000000003,91.39000000000003,91.22000000000001,90.94000000000003,90.63000000000002,90.15000000000002,89.57000000000001],"color":"green"},{"name":"anthropic","data":[1.72,1.74,1.9100000000000001,2.0699999999999994,2.109999999999999,2.209999999999999,2.249999999999999,2.4399999999999995,2.619999999999999,2.8,3.0999999999999996,3.3799999999999994,3.7399999999999998,4.039999999999999,4.219999999999999,4.349999999999999,4.599999999999999,4.879999999999998,5.229999999999999,5.72,6.119999999999999,6.459999999999999,6.739999999999999,6.99,7.17,7.26,7.299999999999999,7.34,7.47,7.619999999999999,7.84,8.14,8.32,8.510000000000002,8.790000000000003,9.100000000000001,9.580000000000002,10.130000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
