<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.43000000000002,72.01000000000003,71.23000000000005,70.47000000000001,69.69000000000001,69.13000000000004,68.57000000000004,67.74000000000002,66.99000000000002,66.15000000000003,65.12,64.27999999999999,63.58,62.87999999999999,62.09999999999999,61.49999999999999,60.87999999999999,60.169999999999995,59.239999999999995,58.37,57.70999999999999,57.230000000000004,56.989999999999995,56.699999999999996,56.57999999999999,56.43999999999999,56.230000000000004,55.949999999999996,55.59,55.23,54.9,54.67,54.459999999999994,54.28,53.980000000000004,53.72999999999999,53.32000000000001,52.87],"color":"green"},{"name":"anthropic","data":[26.170000000000005,26.63000000000001,27.380000000000003,28.160000000000004,28.940000000000005,29.48,30.05,30.850000000000005,31.629999999999995,32.459999999999994,33.5,34.33,35.01,35.739999999999995,36.550000000000004,37.11000000000001,37.730000000000004,38.440000000000005,39.38999999999999,40.22,40.90999999999999,41.39000000000001,41.60000000000001,41.89000000000001,42.010000000000005,42.160000000000004,42.38,42.660000000000004,43.029999999999994,43.38,43.72000000000001,43.93000000000001,44.120000000000005,44.32,44.61,44.859999999999985,45.25999999999999,45.739999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
