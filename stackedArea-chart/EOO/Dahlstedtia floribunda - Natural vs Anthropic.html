<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.69,29.530000000000005,29.220000000000002,28.910000000000007,28.670000000000005,28.640000000000008,28.520000000000007,28.510000000000005,28.530000000000005,28.600000000000005,28.590000000000003,28.660000000000007,28.680000000000003,28.710000000000004,28.800000000000008,28.700000000000006,28.770000000000003,28.840000000000003,28.85,28.939999999999998,29.05,29.170000000000005,29.26000000000001,29.350000000000005,29.49000000000001,29.640000000000004,29.810000000000006,29.940000000000005,30.110000000000003,30.240000000000002,30.430000000000007,30.600000000000005,30.69,30.750000000000004,30.8,30.86,31.04000000000001,31.140000000000004],"color":"green"},{"name":"anthropic","data":[65.57000000000001,65.75,66.03999999999999,66.39,66.61,66.64999999999999,66.77000000000001,66.74999999999999,66.74999999999999,66.67,66.66999999999999,66.63000000000001,66.59,66.57,66.46000000000001,66.56000000000002,66.49,66.42000000000002,66.39999999999999,66.32,66.19,66.05999999999999,66.00999999999998,65.91,65.78999999999999,65.61,65.46,65.32999999999997,65.17999999999998,65.03999999999999,64.85,64.66,64.58999999999999,64.52,64.47000000000001,64.4,64.23,64.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
