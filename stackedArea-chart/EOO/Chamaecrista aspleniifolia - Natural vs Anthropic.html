<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[25.84,25.44,24.770000000000003,24.3,24,23.790000000000006,23.560000000000006,23.500000000000007,23.520000000000003,23.460000000000004,23.370000000000005,23.249999999999996,23.21,23.13,23.180000000000003,23.22,23.390000000000004,23.460000000000004,23.45,23.6,23.730000000000004,23.930000000000007,24.17000000000001,24.230000000000004,24.300000000000004,24.42,24.470000000000002,24.500000000000004,24.520000000000003,24.540000000000003,24.580000000000002,24.76,25.110000000000007,25.34,25.520000000000003,25.770000000000003,26.05,26.500000000000004],"color":"green"},{"name":"anthropic","data":[73.38999999999999,73.78999999999999,74.46,74.92000000000002,75.24000000000001,75.45,75.68000000000002,75.74000000000001,75.70000000000002,75.76,75.87000000000002,75.98000000000002,76,76.12,76.06,76.02,75.83000000000001,75.77,75.8,75.63000000000001,75.51000000000002,75.31,75.05000000000001,75.00000000000001,74.93,74.82,74.77000000000001,74.73,74.71000000000001,74.68,74.64,74.48,74.12,73.89999999999999,73.72,73.48,73.19,72.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
