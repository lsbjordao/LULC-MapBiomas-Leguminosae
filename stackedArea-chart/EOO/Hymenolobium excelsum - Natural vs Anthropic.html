<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.71,98.72,98.52,98.36000000000001,98.26,98.1,97.99000000000001,97.71,97.41999999999999,97.1,96.64,96.25000000000001,95.69000000000001,95.28,95.10000000000001,94.92,94.43,94.09,93.77000000000001,93.27999999999999,92.86,92.48,92.19000000000001,91.91,91.64,91.51,91.5,91.50999999999999,91.39,91.21,90.98,90.63000000000001,90.4,90.17,89.86,89.54999999999998,89.14999999999999,88.66],"color":"green"},{"name":"anthropic","data":[1.8900000000000001,1.8900000000000001,2.079999999999999,2.2399999999999993,2.3499999999999996,2.4999999999999996,2.5999999999999996,2.8899999999999997,3.1899999999999995,3.4999999999999996,3.9699999999999998,4.349999999999999,4.899999999999999,5.309999999999999,5.499999999999999,5.68,6.190000000000001,6.5200000000000005,6.830000000000001,7.32,7.740000000000001,8.119999999999997,8.409999999999998,8.7,8.969999999999999,9.079999999999998,9.109999999999998,9.109999999999998,9.219999999999999,9.38,9.630000000000003,9.97,10.200000000000001,10.44,10.74,11.06,11.45,11.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
