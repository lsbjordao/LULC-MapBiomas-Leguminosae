<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[7.35,7.010000000000001,6.7299999999999995,6.559999999999999,6.39,6.299999999999998,6.199999999999998,6.179999999999998,6.1099999999999985,6.009999999999999,5.969999999999999,5.909999999999999,5.889999999999998,5.869999999999997,5.789999999999999,5.739999999999999,5.64,5.54,5.62,5.52,5.5200000000000005,5.64,5.69,5.839999999999999,5.909999999999999,5.999999999999999,6.06,6.1499999999999995,6.159999999999999,6.090000000000001,6.1499999999999995,6.09,6.199999999999999,6.249999999999999,6.199999999999999,6.239999999999999,6.27,6.249999999999999],"color":"green"},{"name":"anthropic","data":[12.14,12.49,12.770000000000001,12.95,13.11,13.209999999999999,13.299999999999999,13.309999999999999,13.38,13.480000000000002,13.530000000000001,13.59,13.619999999999997,13.629999999999999,13.709999999999999,13.779999999999998,13.87,13.98,13.889999999999999,13.96,13.989999999999998,13.870000000000001,13.809999999999999,13.66,13.59,13.5,13.44,13.35,13.34,13.409999999999998,13.36,13.4,13.299999999999999,13.24,13.299999999999999,13.259999999999998,13.229999999999997,13.259999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
