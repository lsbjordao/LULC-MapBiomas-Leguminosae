<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.71,93.62000000000002,93.26000000000003,92.9,92.66000000000001,92.47000000000001,92.16999999999999,91.71,91.26999999999998,90.85,90.22999999999999,89.65999999999997,89.13,88.55999999999997,88.04999999999998,87.65,87.16999999999999,86.65,85.89999999999999,85.16,84.58999999999999,84.14000000000001,83.81,83.49000000000001,83.28000000000002,83.14999999999999,83.05,82.89000000000001,82.65000000000002,82.41000000000001,82.11000000000003,81.78999999999999,81.59000000000002,81.38,81.10000000000002,80.80999999999999,80.35000000000002,79.74],"color":"green"},{"name":"anthropic","data":[4.53,4.63,4.9799999999999995,5.32,5.569999999999999,5.799999999999998,6.08,6.559999999999999,6.969999999999999,7.409999999999999,8.03,8.59,9.129999999999999,9.679999999999998,10.18,10.590000000000002,11.06,11.58,12.34,13.08,13.66,14.100000000000001,14.43,14.75,14.959999999999997,15.079999999999998,15.19,15.319999999999999,15.599999999999998,15.839999999999998,16.130000000000003,16.44,16.66,16.860000000000003,17.150000000000006,17.440000000000005,17.890000000000004,18.500000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
