<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.51,79.58,78.61000000000001,78,77.38,76.53999999999999,76.07000000000001,74.88999999999999,73.98,73.34,72.71999999999998,72.24,71.92,71.53,71.04,70.61999999999999,70.28,69.99,69.37,68.81,67.97999999999999,67.48,67.11,66.81,66.32000000000001,65.97999999999999,65.50000000000001,65.09,64.75999999999999,64.3,63.769999999999996,63.6,63.41,63.2,62.98000000000001,62.410000000000004,62.150000000000006,62.15],"color":"green"},{"name":"anthropic","data":[21.7,22.619999999999997,23.6,24.189999999999998,24.810000000000002,25.66,26.130000000000003,27.31,28.230000000000004,28.869999999999997,29.48,29.97,30.28,30.69,31.17,31.59,31.92,32.22,32.84,33.39,34.23,34.72,35.08,35.39,35.87,36.239999999999995,36.71,37.11,37.44,37.89,38.42,38.599999999999994,38.8,39.01,39.22,39.79,40.03999999999999,40.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
