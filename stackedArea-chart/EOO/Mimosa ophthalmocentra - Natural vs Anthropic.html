<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.81999999999999,62.76,62.239999999999995,61.64,60.949999999999996,60.56,60.12,59.57999999999999,59.10000000000001,58.95,58.81,58.78000000000001,59.03000000000001,58.92,58.74000000000001,58.61000000000001,58.34,58.10000000000001,57.800000000000004,57.529999999999994,57.290000000000006,57.19000000000001,57.11000000000001,57.120000000000005,57.14,57.050000000000004,56.910000000000004,56.41999999999999,56,55.63,55.35,55.31000000000001,55.27,55.29,55.230000000000004,55.25,55.19,55.21999999999999],"color":"green"},{"name":"anthropic","data":[36.89000000000001,36.95000000000001,37.480000000000004,38.09,38.769999999999996,39.16,39.6,40.14000000000001,40.62,40.800000000000004,40.91000000000001,40.940000000000005,40.699999999999996,40.82000000000001,40.980000000000004,41.11,41.39,41.6,41.91000000000001,42.17,42.400000000000006,42.500000000000014,42.61000000000001,42.57999999999999,42.55,42.64,42.78999999999999,43.279999999999994,43.68000000000001,44.050000000000004,44.32999999999999,44.37,44.43,44.39,44.45,44.44,44.5,44.470000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
