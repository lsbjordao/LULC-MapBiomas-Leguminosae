<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[25.630000000000006,25.080000000000005,24.580000000000005,24.009999999999998,23.600000000000005,23.41,23.310000000000002,23.18,23.090000000000003,23.000000000000004,22.860000000000003,22.77000000000001,22.68000000000001,22.690000000000005,22.740000000000002,22.630000000000006,22.650000000000002,22.660000000000007,22.61,22.59,22.64,22.7,22.82,22.900000000000002,22.990000000000002,23.11,23.17000000000001,23.240000000000002,23.3,23.33,23.460000000000004,23.60000000000001,23.660000000000004,23.69000000000001,23.660000000000004,23.66000000000001,23.650000000000006,23.720000000000002],"color":"green"},{"name":"anthropic","data":[73.82000000000001,74.35000000000001,74.83999999999999,75.39999999999999,75.82,76.03000000000002,76.12000000000002,76.25,76.33,76.42999999999998,76.54999999999997,76.66,76.75999999999999,76.73,76.7,76.79999999999998,76.76999999999998,76.76,76.80999999999999,76.83,76.78999999999999,76.69999999999999,76.6,76.51999999999998,76.45,76.30000000000001,76.28000000000002,76.2,76.11999999999999,76.10999999999999,75.95,75.81000000000002,75.77000000000001,75.71,75.78000000000002,75.76999999999998,75.8,75.7],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
