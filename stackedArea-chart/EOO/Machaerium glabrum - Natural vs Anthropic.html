<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[25.190000000000005,25.040000000000003,24.66,24.480000000000004,24.269999999999996,24.14,23.970000000000006,24.050000000000008,24.119999999999997,24.210000000000004,24.23,24.31,24.44,24.400000000000002,24.23,24.120000000000005,24.100000000000005,24.000000000000004,23.880000000000003,23.87,23.83,24.029999999999998,24.27,24.360000000000007,24.610000000000003,24.91,25.23,25.330000000000002,25.419999999999998,25.479999999999997,25.520000000000003,25.64,25.89,26,26.050000000000004,26.17,26.3,26.48],"color":"green"},{"name":"anthropic","data":[74.89999999999999,75.05,75.43000000000002,75.61999999999999,75.83999999999999,75.94999999999999,76.13,76.04,75.99,75.89,75.86,75.8,75.66000000000001,75.71,75.89,75.98,75.99000000000001,76.10000000000001,76.22000000000001,76.23000000000002,76.26,76.06,75.83000000000001,75.75,75.49000000000001,75.18,74.85000000000001,74.78,74.69000000000001,74.63000000000001,74.59,74.46000000000001,74.21000000000001,74.10000000000001,74.07000000000002,73.94999999999999,73.82,73.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
