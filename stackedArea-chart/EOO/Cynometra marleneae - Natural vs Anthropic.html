<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.39,98.49000000000001,98.22999999999999,98.14,98.38999999999999,98.48,98.28,97.75,97.29,97.06,97,96.63999999999999,96.44999999999999,96.4,96.30000000000001,96.10999999999999,95.99000000000001,96.01,96.05999999999999,95.82000000000001,95.54,95.38,95.32,95.27999999999999,95.16999999999999,95.22,95.3,95.27000000000001,95.17,94.99,94.67999999999999,94.08999999999999,93.97,93.93999999999998,93.76,93.58,93.3,93.03],"color":"green"},{"name":"anthropic","data":[1.35,1.27,1.53,1.61,1.37,1.28,1.4700000000000002,2.01,2.46,2.6899999999999995,2.7699999999999996,3.1199999999999997,3.3099999999999996,3.36,3.46,3.63,3.7699999999999996,3.7399999999999993,3.69,3.95,4.23,4.369999999999999,4.429999999999999,4.47,4.579999999999999,4.529999999999999,4.45,4.49,4.59,4.76,5.07,5.65,5.800000000000001,5.8100000000000005,5.990000000000001,6.18,6.46,6.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
