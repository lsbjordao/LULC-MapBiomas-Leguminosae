<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.92000000000002,71.71,71.27999999999999,70.70000000000002,69.93,69.61,69.18,68.59,67.9,67.62,67.23000000000002,67.09,67.59,67.53,67.60000000000001,67.67000000000002,67.45,67.26,66.91,66.82000000000001,66.39,66.26,66.13000000000001,66.18,66.27999999999999,66.33999999999999,66.14999999999999,65.61,65.00999999999998,64.36999999999999,63.870000000000005,63.75999999999999,63.51,63.449999999999996,63.4,63.38999999999999,63.22,63.13000000000001],"color":"green"},{"name":"anthropic","data":[27.73,27.930000000000007,28.330000000000005,28.930000000000007,29.710000000000004,30.020000000000003,30.450000000000003,31.03,31.740000000000002,32.010000000000005,32.38,32.54000000000001,32.02000000000001,32.09000000000001,32.02,31.950000000000006,32.18000000000001,32.39,32.74000000000001,32.839999999999996,33.23,33.35999999999999,33.49000000000001,33.46000000000001,33.34000000000001,33.300000000000004,33.46,34.019999999999996,34.60999999999999,35.25,35.74999999999999,35.879999999999995,36.1,36.16,36.199999999999996,36.23000000000001,36.39000000000001,36.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
