<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.339999999999996,53.98,53.33,52.699999999999996,52.029999999999994,51.57999999999999,51.099999999999994,50.550000000000004,50.059999999999995,49.67999999999999,49.339999999999996,49.06,48.88999999999999,48.589999999999996,48.27999999999999,47.99,47.68999999999998,47.39999999999999,47.06,46.68999999999999,46.419999999999995,46.28000000000001,46.14000000000001,46.07,46.01,45.86999999999999,45.74999999999999,45.35999999999999,45.019999999999996,44.72,44.489999999999995,44.449999999999996,44.339999999999996,44.28999999999999,44.16,43.99999999999999,43.85,43.82],"color":"green"},{"name":"anthropic","data":[38.849999999999994,39.219999999999985,39.889999999999986,40.529999999999994,41.15999999999999,41.64,42.08999999999999,42.64999999999999,43.14000000000001,43.510000000000005,43.85000000000001,44.12,44.31000000000001,44.60000000000001,44.93999999999999,45.22,45.52,45.800000000000004,46.16000000000001,46.49999999999999,46.78,46.900000000000006,47.039999999999985,47.11999999999999,47.160000000000004,47.28,47.45,47.83,48.160000000000004,48.47000000000001,48.68000000000002,48.730000000000004,48.84000000000001,48.900000000000006,49.02000000000001,49.16,49.330000000000005,49.360000000000014],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
