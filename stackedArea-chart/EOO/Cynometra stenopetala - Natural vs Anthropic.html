<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.72000000000001,98.73,98.66999999999999,98.60999999999999,98.60999999999999,98.6,98.60000000000001,98.53000000000002,98.41,98.33,98.2,98.06,97.91000000000001,97.79000000000002,97.79,97.77000000000001,97.7,97.63000000000001,97.57000000000001,97.43000000000002,97.29999999999998,97.2,97.13,97.09,97.02000000000001,96.97,96.95,96.97,96.9,96.81000000000002,96.66,96.39000000000001,96.28000000000002,96.22,96.08,95.88000000000001,95.53999999999999,95.06],"color":"green"},{"name":"anthropic","data":[0.66,0.67,0.73,0.78,0.79,0.79,0.8,0.88,0.9900000000000001,1.06,1.19,1.34,1.48,1.59,1.61,1.6300000000000001,1.7100000000000002,1.76,1.83,1.9500000000000002,2.09,2.1999999999999997,2.26,2.3,2.3799999999999994,2.4299999999999997,2.4399999999999995,2.42,2.4899999999999993,2.5699999999999994,2.7299999999999995,2.9899999999999998,3.12,3.1700000000000004,3.31,3.5100000000000002,3.85,4.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
