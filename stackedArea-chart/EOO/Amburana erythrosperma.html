            function drawChart() {

                    chart.setSize(w, h, false);
                    return;
                }

                        type: 'area',
                        width: w,
                        height: h,
                        animation: false

                    title: { text: '' },
                    xAxis: {

                    yAxis: {

                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
