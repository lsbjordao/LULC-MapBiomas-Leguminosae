<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.59,74.02000000000002,73.08000000000001,72.33999999999997,71.24,70.64999999999999,70.21999999999997,70.03999999999998,69.88999999999999,69.31999999999998,68.49000000000001,67.99999999999999,67.55,67.19000000000001,66.96000000000002,66.42000000000002,66.21000000000001,65.87000000000002,65.65,65.37,64.92000000000002,64.83000000000001,64.75000000000001,64.65,64.75000000000001,64.69,64.80999999999999,64.89,64.7,64.66999999999999,64.67999999999999,64.27,63.9,63.809999999999995,63.629999999999995,63.3,63.9,64.28999999999999],"color":"green"},{"name":"anthropic","data":[23.94,23.53,24.490000000000002,25.21,26.31,26.89,27.33,27.52,27.66,28.22,29.060000000000002,29.55,29.98,30.380000000000006,30.59,31.130000000000003,31.35,31.700000000000003,31.92,32.22,32.65999999999999,32.74999999999999,32.81999999999999,32.92999999999999,32.82999999999999,32.87,32.76,32.669999999999995,32.87,32.91,32.919999999999995,33.29,33.68999999999999,33.769999999999996,33.92999999999999,34.25999999999999,33.669999999999995,33.279999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
