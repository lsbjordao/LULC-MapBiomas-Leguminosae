<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.75,43.910000000000004,42.879999999999995,42.11,41.32000000000001,40.92000000000001,40.49000000000001,40.32,40.230000000000004,40.08,39.699999999999996,39.44,39.25,39.040000000000006,38.779999999999994,38.419999999999995,38.3,38.05,38.06,37.86,37.660000000000004,37.67,37.65,37.70000000000001,37.730000000000004,37.739999999999995,37.88999999999999,37.99,37.96999999999999,38.03,38.07000000000001,38.00999999999999,37.84,37.830000000000005,37.81,37.7,38.09000000000001,38.449999999999996],"color":"green"},{"name":"anthropic","data":[30.05,29.919999999999998,30.950000000000003,31.740000000000002,32.52,32.93,33.339999999999996,33.52,33.62,33.769999999999996,34.16,34.41,34.59,34.800000000000004,35.06000000000001,35.410000000000004,35.56000000000001,35.800000000000004,35.77000000000002,35.97000000000001,36.17000000000001,36.18000000000001,36.18000000000001,36.160000000000004,36.120000000000005,36.10000000000001,35.95,35.87000000000001,35.88000000000001,35.84000000000001,35.78000000000001,35.86,36.000000000000014,36.02,36.040000000000006,36.17000000000001,35.78000000000001,35.39000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
