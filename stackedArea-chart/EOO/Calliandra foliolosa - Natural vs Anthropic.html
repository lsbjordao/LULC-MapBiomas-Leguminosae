<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.01,32.5,31.900000000000002,31.350000000000005,30.840000000000003,30.450000000000003,30.090000000000003,29.720000000000006,29.450000000000003,29.230000000000004,28.94,28.750000000000004,28.519999999999996,28.419999999999998,28.270000000000007,28.030000000000005,27.920000000000005,27.83,27.67,27.560000000000002,27.53000000000001,27.520000000000007,27.53000000000001,27.570000000000004,27.550000000000008,27.59000000000001,27.630000000000003,27.62,27.630000000000003,27.610000000000007,27.680000000000003,27.750000000000004,27.71,27.720000000000006,27.69000000000001,27.700000000000006,27.650000000000002,27.73],"color":"green"},{"name":"anthropic","data":[65.82000000000001,66.32000000000001,66.89000000000001,67.45000000000002,67.98000000000002,68.34000000000002,68.71000000000001,69.11000000000004,69.36,69.60000000000004,69.88000000000001,70.06000000000003,70.28000000000003,70.41000000000001,70.53999999999999,70.74,70.86000000000003,70.92999999999999,71.1,71.22000000000003,71.28000000000004,71.29,71.28,71.25000000000003,71.24000000000004,71.22000000000001,71.14999999999999,71.16000000000003,71.18000000000002,71.17,71.11000000000001,71.05,71.06,71.07,71.11,71.10000000000002,71.15999999999998,71.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
