<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.129999999999995,41.99,41.75999999999999,41.480000000000004,41.38999999999999,41.6,41.54,41.27,41.17,41.18000000000001,40.98000000000001,40.940000000000005,40.89000000000001,40.760000000000005,40.57000000000001,40.31,40.21000000000001,40.07,40.12999999999999,40.209999999999994,40.25999999999999,40.199999999999996,40.14999999999999,40.12,40.059999999999995,40.059999999999995,40.06999999999999,40.050000000000004,39.93000000000001,39.74,39.62,39.54,39.62,39.74999999999999,39.779999999999994,39.81000000000001,39.78000000000001,39.95000000000001],"color":"green"},{"name":"anthropic","data":[49.910000000000004,50.05,50.29,50.56999999999999,50.660000000000004,50.46999999999999,50.50999999999999,50.78,50.899999999999984,50.879999999999995,51.07,51.13,51.17,51.31000000000002,51.48999999999999,51.759999999999984,51.819999999999986,51.96000000000001,51.92,51.84,51.789999999999985,51.849999999999994,51.86,51.93999999999999,51.970000000000006,51.989999999999995,51.96999999999999,52.01,52.11,52.30999999999999,52.410000000000004,52.51,52.42,52.27999999999999,52.25,52.25,52.279999999999994,52.13000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
