<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.56000000000002,44.040000000000006,43.39000000000001,42.84000000000001,42.239999999999995,41.9,41.449999999999996,40.92,40.47,40.02,39.53,39.17000000000001,38.85,38.559999999999995,38.24,37.88000000000001,37.63000000000001,37.31,37.07,36.85999999999999,36.81000000000001,36.81,36.779999999999994,36.73999999999999,36.69,36.639999999999986,36.58,36.4,36.18000000000001,35.95,35.77,35.61000000000001,35.57000000000001,35.65000000000001,35.59,35.61000000000001,35.56,35.75999999999999],"color":"green"},{"name":"anthropic","data":[55.56999999999999,56.07999999999999,56.75000000000001,57.29,57.87,58.22,58.639999999999986,59.17999999999999,59.64000000000001,60.11,60.580000000000005,60.94,61.25999999999998,61.559999999999995,61.85999999999999,62.230000000000004,62.47000000000001,62.779999999999994,63.04,63.269999999999996,63.29,63.300000000000004,63.300000000000004,63.35,63.400000000000006,63.46000000000001,63.53,63.699999999999996,63.900000000000006,64.14,64.33,64.50999999999998,64.53,64.45,64.47,64.50999999999999,64.55,64.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
