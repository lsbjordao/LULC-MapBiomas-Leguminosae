<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.76,76.65000000000002,76.2,75.66999999999999,74.98,74.52,74.04,73.39999999999998,72.77000000000001,72.21,71.62999999999998,71.11,70.86,70.38,69.93999999999998,69.50999999999998,69.00999999999999,68.52999999999999,67.75999999999999,67.06,66.5,66.13999999999997,65.89999999999999,65.63999999999999,65.44999999999999,65.22,64.89999999999999,64.25,63.56,62.98,62.48000000000001,62.28,61.99999999999999,61.79,61.480000000000004,61.190000000000005,60.86999999999999,60.58],"color":"green"},{"name":"anthropic","data":[21.910000000000004,21.990000000000002,22.46,22.979999999999997,23.659999999999997,24.120000000000005,24.590000000000007,25.240000000000002,25.89,26.429999999999996,27.020000000000003,27.540000000000006,27.790000000000006,28.280000000000005,28.74000000000001,29.140000000000008,29.630000000000003,30.140000000000008,30.890000000000004,31.590000000000007,32.160000000000004,32.5,32.74,33.02000000000001,33.2,33.43000000000001,33.76000000000001,34.39,35.1,35.67,36.14,36.36000000000001,36.629999999999995,36.83,37.13,37.410000000000004,37.75,38.03000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
