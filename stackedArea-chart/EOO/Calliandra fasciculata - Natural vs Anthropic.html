<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.93999999999999,52.89,52.39999999999999,51.96999999999999,51.45999999999999,51.23999999999999,50.83999999999999,50.21999999999999,49.70999999999999,49.319999999999986,49.109999999999985,49.139999999999986,49.36999999999999,49.40999999999999,49.48999999999998,49.300000000000004,49.080000000000005,48.93,48.690000000000005,48.53000000000001,48.58,48.730000000000004,48.74000000000001,48.67,48.510000000000005,48.4,48.3,48.07999999999999,47.95999999999999,47.779999999999994,47.66,47.69999999999999,47.69,47.66,47.59999999999999,47.49999999999999,47.51,47.629999999999995],"color":"green"},{"name":"anthropic","data":[45.8,45.86000000000001,46.349999999999994,46.789999999999985,47.289999999999985,47.50999999999999,47.91999999999999,48.54999999999999,49.03999999999999,49.44,49.65,49.599999999999994,49.38999999999999,49.33999999999999,49.27999999999999,49.459999999999994,49.669999999999995,49.82999999999999,50.06999999999999,50.230000000000004,50.19,50.04,50.03,50.089999999999996,50.239999999999995,50.359999999999985,50.469999999999985,50.67999999999999,50.8,50.99,51.089999999999996,51.07,51.09000000000001,51.1,51.18999999999999,51.26,51.239999999999995,51.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
