<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.73999999999999,61.36999999999998,60.629999999999995,59.95999999999999,59.22999999999999,58.67999999999999,58.18,57.47999999999999,56.85,56.34,55.79,55.37,55.07,54.64000000000001,54.18,53.779999999999994,53.36,52.94,52.330000000000005,51.77000000000001,51.360000000000014,51.1,50.89,50.72,50.620000000000005,50.470000000000006,50.29,49.900000000000006,49.53000000000001,49.190000000000005,48.92,48.790000000000006,48.620000000000005,48.530000000000015,48.35000000000002,48.190000000000005,47.96,47.82],"color":"green"},{"name":"anthropic","data":[37.88,38.26,39.01,39.68,40.419999999999995,40.95000000000001,41.43999999999999,42.139999999999986,42.77999999999999,43.279999999999994,43.83999999999999,44.25999999999999,44.57000000000001,44.99000000000001,45.45000000000001,45.830000000000005,46.25,46.66,47.31,47.839999999999996,48.260000000000005,48.529999999999994,48.72000000000001,48.89,49,49.13999999999999,49.329999999999984,49.71,50.120000000000005,50.45000000000001,50.71000000000001,50.849999999999994,50.95,51.080000000000005,51.230000000000004,51.42,51.66,51.800000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
