<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.61,37.25000000000001,36.86000000000001,36.47,36.160000000000004,36.07,35.800000000000004,35.52000000000001,35.32000000000001,35.150000000000006,34.90000000000001,34.72,34.58,34.43,34.239999999999995,33.99000000000001,33.910000000000004,33.74000000000001,33.660000000000004,33.60000000000001,33.57,33.540000000000006,33.49,33.470000000000006,33.46000000000001,33.46000000000001,33.470000000000006,33.410000000000004,33.32,33.21000000000001,33.2,33.17,33.230000000000004,33.32,33.33,33.36,33.43,33.559999999999995],"color":"green"},{"name":"anthropic","data":[61.08,61.43000000000001,61.809999999999995,62.209999999999994,62.489999999999995,62.60000000000001,62.86,63.16,63.32999999999999,63.529999999999994,63.760000000000005,63.95,64.1,64.24999999999999,64.42999999999999,64.67999999999999,64.75,64.90999999999998,64.99000000000001,65.06,65.10999999999999,65.13000000000001,65.15,65.18,65.19,65.19,65.19,65.23,65.35000000000001,65.46000000000001,65.46000000000001,65.49000000000001,65.41000000000001,65.34,65.33,65.31,65.25,65.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
