<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.44,44.280000000000015,42.9,42.17,41.63,41.32000000000001,41.02000000000001,40.610000000000014,40.41000000000001,39.77000000000001,39.68000000000001,39.730000000000004,39.71,39.88,40.46000000000001,40.610000000000014,40.66000000000001,40.870000000000005,40.95,40.750000000000014,41.30000000000001,41.830000000000005,42.02000000000001,42.06,41.68,41.64000000000001,41.63000000000001,41.78000000000001,42.07000000000001,41.99000000000001,41.99,41.930000000000014,41.96000000000001,42.02,42.10000000000001,42.02,42.11,42.35],"color":"green"},{"name":"anthropic","data":[56.26,56.459999999999994,57.839999999999996,58.56,59.07000000000001,59.38000000000001,59.68000000000001,60.11000000000001,60.290000000000006,60.960000000000015,61.05000000000001,61.01000000000001,61.02,60.84000000000001,60.27,60.14,60.07000000000001,59.879999999999995,59.800000000000004,59.97,59.440000000000005,58.91,58.69999999999999,58.690000000000005,59.059999999999995,59.11000000000001,59.120000000000005,58.970000000000006,58.68,58.76,58.75000000000001,58.81,58.78,58.72,58.63,58.73000000000001,58.64000000000001,58.39000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
