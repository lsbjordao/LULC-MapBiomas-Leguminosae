<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[12.219999999999997,12.219999999999995,12.129999999999999,12.049999999999999,11.959999999999997,11.929999999999998,11.86,11.839999999999998,11.81,11.85,11.839999999999998,11.85,11.839999999999998,11.849999999999998,11.839999999999995,11.82,11.769999999999998,11.779999999999998,11.769999999999998,11.759999999999998,11.759999999999998,11.799999999999999,11.809999999999999,11.819999999999999,11.839999999999998,11.879999999999999,11.909999999999998,11.929999999999996,11.959999999999997,11.989999999999997,12.019999999999998,12.029999999999998,12.049999999999997,12.019999999999998,11.989999999999997,11.969999999999997,12.019999999999996,11.989999999999997],"color":"green"},{"name":"anthropic","data":[15.229999999999999,15.24,15.34,15.43,15.499999999999996,15.539999999999996,15.579999999999998,15.62,15.649999999999999,15.619999999999997,15.639999999999997,15.599999999999996,15.619999999999997,15.609999999999998,15.619999999999997,15.67,15.690000000000001,15.690000000000001,15.700000000000001,15.709999999999999,15.69,15.65,15.639999999999999,15.650000000000002,15.610000000000001,15.59,15.56,15.520000000000001,15.48,15.47,15.429999999999998,15.42,15.429999999999998,15.45,15.469999999999997,15.489999999999998,15.439999999999998,15.459999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
