<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.22999999999998,44.149999999999984,43.429999999999986,43.05999999999998,42.55,42.08,41.67999999999999,41.120000000000005,40.650000000000006,40.39,40.32,40.419999999999995,40.489999999999995,40.42000000000001,40.370000000000005,40.129999999999995,39.97,39.99999999999999,39.75,39.769999999999996,39.849999999999994,40.05999999999999,40.21999999999999,40.23,40.14,40.08,39.98,39.76999999999999,39.73999999999999,39.57999999999999,39.59999999999999,39.679999999999986,39.66,39.72999999999998,39.669999999999995,39.72,39.76999999999999,39.969999999999985],"color":"green"},{"name":"anthropic","data":[48.81,48.91,49.61999999999999,49.98,50.49999999999999,50.95999999999999,51.36999999999999,51.91999999999998,52.38,52.63999999999999,52.720000000000006,52.63000000000001,52.57000000000001,52.64000000000001,52.67,52.919999999999995,53.05999999999999,53.04999999999999,53.29,53.289999999999985,53.19,53.00999999999999,52.83,52.81999999999999,52.89999999999999,52.959999999999994,53.05999999999999,53.26999999999999,53.32,53.46999999999999,53.46999999999999,53.37,53.40999999999999,53.30999999999999,53.379999999999995,53.339999999999996,53.27999999999999,53.06999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
