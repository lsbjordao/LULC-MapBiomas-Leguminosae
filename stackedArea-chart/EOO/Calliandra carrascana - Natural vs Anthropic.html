<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.56,66.73,66.11,65.39,64.72000000000001,65.75000000000001,66.59999999999998,66.57999999999998,66.53999999999999,66.73,65.93,65.5,65.71,65.8,65.32,65.16,64.97,64.45,64.52,64.53999999999998,64.75000000000001,64.60000000000001,64.67999999999998,65.02999999999999,64.99,64.88999999999999,64.72,64.38000000000001,64.08000000000001,63.48,62.64000000000001,61.8,61.769999999999996,61.46,61.529999999999994,61.5,61.35999999999999,61.34],"color":"green"},{"name":"anthropic","data":[32.14000000000001,31.970000000000002,32.58,33.309999999999995,33.96,32.95,32.089999999999996,32.120000000000005,32.160000000000004,31.970000000000002,32.74999999999999,33.19,32.970000000000006,32.900000000000006,33.39,33.550000000000004,33.720000000000006,34.24000000000001,34.18000000000001,34.15999999999999,33.92999999999999,34.089999999999996,34.03,33.66,33.71000000000001,33.800000000000004,33.97,34.31,34.620000000000005,35.22,36.050000000000004,36.89000000000001,36.92000000000001,37.25000000000001,37.160000000000004,37.20000000000001,37.33000000000001,37.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
