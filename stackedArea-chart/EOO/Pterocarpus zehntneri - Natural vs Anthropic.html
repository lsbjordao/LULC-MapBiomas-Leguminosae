<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.25000000000001,79.14,78.69,78.17999999999999,77.46000000000001,76.99,76.49999999999999,75.87,75.26999999999998,74.81,74.28,73.79000000000002,73.58000000000001,73.11000000000001,72.66,72.26999999999998,71.77999999999999,71.29999999999998,70.63999999999997,69.94999999999999,69.33999999999999,68.96999999999998,68.65000000000002,68.37,68.15,67.89,67.54,66.88999999999999,66.17999999999999,65.6,65.1,64.89000000000001,64.61,64.4,64.09,63.760000000000005,63.400000000000006,63.1],"color":"green"},{"name":"anthropic","data":[19.32,19.450000000000003,19.91,20.410000000000004,21.110000000000003,21.6,22.070000000000004,22.71,23.31,23.77,24.320000000000004,24.83000000000001,25.010000000000005,25.48000000000001,25.930000000000007,26.340000000000007,26.810000000000006,27.310000000000002,27.970000000000002,28.630000000000006,29.22000000000001,29.62000000000001,29.94,30.220000000000002,30.449999999999996,30.71,31.039999999999996,31.700000000000006,32.38,32.97,33.459999999999994,33.690000000000005,33.97000000000001,34.18000000000001,34.50000000000001,34.790000000000006,35.16000000000001,35.470000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
