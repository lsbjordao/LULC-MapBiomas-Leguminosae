<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[25.540000000000003,25.429999999999996,24.700000000000006,24.23,23.85,23.61,23.240000000000006,23.01,22.850000000000005,22.72,22.700000000000003,22.67,22.620000000000008,22.590000000000007,22.550000000000004,22.410000000000004,22.450000000000003,22.42000000000001,22.320000000000007,22.210000000000004,22.240000000000006,22.320000000000004,22.47,22.560000000000006,22.640000000000004,22.639999999999997,22.720000000000002,22.76,22.849999999999998,22.9,22.950000000000003,22.960000000000004,22.98,23.01,23.050000000000004,23.060000000000006,23.220000000000002,23.47],"color":"green"},{"name":"anthropic","data":[46.82,46.949999999999996,47.68000000000001,48.150000000000006,48.55,48.78,49.17,49.36,49.540000000000006,49.68,49.71,49.73,49.78,49.8,49.83999999999999,50.01,49.95,49.98,50.05,50.18,50.16,50.09,49.919999999999995,49.81999999999999,49.74999999999999,49.75,49.69,49.63,49.56,49.499999999999986,49.459999999999994,49.43,49.42,49.400000000000006,49.330000000000005,49.379999999999995,49.199999999999996,48.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
