<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.21000000000002,59.97,59.49,58.89999999999999,58.199999999999996,57.72,57.27,56.67,56.1,55.690000000000005,55.330000000000005,55.01,54.87999999999999,54.52000000000001,54.24000000000001,53.96,53.62,53.269999999999996,52.82,52.34,51.96,51.699999999999996,51.45,51.279999999999994,51.13,50.99,50.76,50.29999999999998,49.79999999999998,49.429999999999986,49.080000000000005,48.92,48.76,48.65000000000001,48.440000000000005,48.22000000000002,47.96,47.77],"color":"green"},{"name":"anthropic","data":[36.55,36.779999999999994,37.26,37.859999999999985,38.539999999999985,38.99999999999999,39.46999999999999,40.059999999999995,40.64000000000001,41.03,41.42000000000001,41.72,41.84000000000001,42.190000000000005,42.49000000000001,42.79,43.129999999999995,43.449999999999996,43.910000000000004,44.36999999999999,44.76,45.019999999999996,45.269999999999996,45.44999999999998,45.61000000000001,45.720000000000006,45.95,46.45,46.919999999999995,47.28,47.66000000000001,47.83,47.970000000000006,48.059999999999995,48.27000000000001,48.480000000000004,48.760000000000005,48.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
