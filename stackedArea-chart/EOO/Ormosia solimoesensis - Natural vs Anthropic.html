<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.39999999999998,99.4,99.38,99.36999999999998,99.37999999999998,99.38999999999999,99.38999999999999,99.4,99.38,99.38999999999999,99.41,99.39999999999999,99.39999999999999,99.37,99.36000000000001,99.38000000000001,99.37999999999998,99.39,99.39,99.39,99.36999999999999,99.37,99.36000000000001,99.38,99.36,99.35000000000001,99.34000000000002,99.35,99.35000000000001,99.33999999999997,99.32000000000001,99.28000000000002,99.28,99.3,99.30999999999999,99.3,99.27,99.22],"color":"green"},{"name":"anthropic","data":[0.09,0.09,0.09999999999999999,0.11,0.11,0.09999999999999999,0.09,0.09999999999999999,0.11,0.11,0.09,0.08,0.09,0.11,0.12,0.11,0.11,0.10999999999999999,0.10999999999999999,0.12,0.13,0.13,0.13,0.10999999999999999,0.12,0.15000000000000002,0.15000000000000002,0.14,0.13,0.14,0.17,0.21000000000000002,0.21000000000000002,0.19000000000000003,0.18000000000000002,0.19000000000000003,0.21000000000000002,0.25],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
