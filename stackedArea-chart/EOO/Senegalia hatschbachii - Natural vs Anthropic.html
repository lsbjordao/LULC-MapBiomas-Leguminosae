<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.790000000000003,30.340000000000003,30.000000000000004,29.72000000000001,29.520000000000007,29.420000000000005,29.29,29.220000000000002,29.200000000000003,29.21,29.170000000000005,29.17,29.150000000000002,29.12,29.050000000000004,28.860000000000003,28.830000000000005,28.820000000000004,28.82,28.840000000000003,28.950000000000003,29.040000000000003,29.120000000000005,29.250000000000004,29.380000000000006,29.56,29.680000000000003,29.75,29.780000000000005,29.870000000000005,30.05,30.21,30.340000000000003,30.430000000000003,30.440000000000005,30.510000000000005,30.660000000000004,30.750000000000007],"color":"green"},{"name":"anthropic","data":[65.86999999999998,66.32,66.65999999999998,66.94,67.16,67.24000000000001,67.35,67.45,67.49,67.44999999999999,67.49,67.47999999999999,67.52,67.55999999999999,67.62000000000002,67.81,67.82000000000002,67.83,67.84000000000002,67.82,67.71000000000001,67.64000000000001,67.54000000000002,67.39000000000001,67.27000000000001,67.07000000000002,66.98,66.88,66.85000000000001,66.78,66.60999999999999,66.43999999999998,66.3,66.21,66.18999999999998,66.14,65.99999999999999,65.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
