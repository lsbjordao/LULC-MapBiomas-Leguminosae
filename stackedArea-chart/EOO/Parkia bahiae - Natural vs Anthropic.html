<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.53,77.27000000000001,76.71,76.14999999999999,75.63000000000001,75.44999999999999,75.48,75.72,75.67,75.42,75.39999999999999,75.19,74.97,74.71,74.48,73.94000000000001,73.75,73.42999999999999,73.49999999999999,73.45,73.25999999999999,73.13999999999999,73.24999999999999,73.21000000000001,73.60000000000001,73.85000000000001,73.87,73.73,73.36,73.04,73.01,72.91,72.62,72.64,72.64999999999999,72.52,72.91000000000001,73.15],"color":"green"},{"name":"anthropic","data":[9.51,9.79,10.37,10.93,11.459999999999999,11.66,11.629999999999999,11.41,11.43,11.69,11.719999999999999,11.929999999999998,12.109999999999998,12.370000000000001,12.57,13.11,13.34,13.65,13.6,13.629999999999999,13.86,13.979999999999999,13.87,13.9,13.53,13.26,13.259999999999998,13.43,13.799999999999999,14.109999999999998,14.139999999999999,14.26,14.55,14.5,14.51,14.64,14.259999999999998,13.929999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
