<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.099999999999994,49.56,48.809999999999995,48.10999999999999,47.34,46.79,46.27,45.620000000000005,45.040000000000006,44.5,43.900000000000006,43.419999999999995,43.03000000000001,42.69000000000001,42.31000000000001,41.94000000000001,41.63000000000001,41.27,40.82,40.43000000000001,40.18000000000001,40.01,39.870000000000005,39.75,39.690000000000005,39.540000000000006,39.35,39.099999999999994,38.830000000000005,38.55000000000001,38.370000000000005,38.2,38.07,37.97,37.790000000000006,37.61000000000001,37.400000000000006,37.39],"color":"green"},{"name":"anthropic","data":[47.690000000000005,48.21,48.95000000000001,49.66,50.44999999999999,51.00000000000001,51.49,52.15,52.74000000000001,53.29000000000001,53.870000000000005,54.330000000000005,54.750000000000014,55.08,55.46999999999999,55.83,56.129999999999995,56.50000000000001,56.93000000000001,57.33000000000001,57.56999999999999,57.74999999999999,57.88000000000001,58.02,58.07,58.22999999999999,58.419999999999995,58.65000000000001,58.919999999999995,59.220000000000006,59.38000000000001,59.55000000000001,59.690000000000005,59.78999999999999,59.960000000000015,60.17,60.38,60.400000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
