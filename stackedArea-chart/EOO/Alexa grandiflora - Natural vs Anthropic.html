<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.88,97.85,97.63999999999999,97.5,97.46,97.38000000000002,97.35,97.14000000000001,96.92,96.69,96.28000000000002,95.97,95.56,95.24000000000001,95.11,94.98,94.66999999999999,94.40000000000002,94.10999999999999,93.61000000000001,93.22,92.87000000000002,92.63000000000002,92.35,92.11,92.03999999999999,92.03,92.02000000000001,91.89000000000001,91.71000000000001,91.48,91.13,90.92999999999999,90.72000000000001,90.44999999999999,90.15,89.79,89.30000000000001],"color":"green"},{"name":"anthropic","data":[1.58,1.61,1.81,1.9400000000000002,1.99,2.0799999999999996,2.1099999999999994,2.2999999999999994,2.53,2.76,3.1799999999999997,3.4899999999999998,3.8999999999999995,4.210000000000001,4.340000000000001,4.4799999999999995,4.779999999999999,5.0600000000000005,5.359999999999999,5.83,6.2299999999999995,6.57,6.819999999999999,7.1000000000000005,7.34,7.4399999999999995,7.43,7.43,7.56,7.7299999999999995,7.9799999999999995,8.309999999999999,8.51,8.75,9.02,9.309999999999999,9.68,10.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
