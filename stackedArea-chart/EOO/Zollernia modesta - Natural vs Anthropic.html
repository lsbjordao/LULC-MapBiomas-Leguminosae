<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.74,44.79999999999998,43.10999999999999,40.93999999999999,39.739999999999995,38.98,37.829999999999984,37.77999999999999,37.739999999999995,37.57,37.28999999999999,36.669999999999995,36.39,35.99999999999999,35.86,35.519999999999996,35.57,35.54,35.93000000000001,35.96,35.86000000000001,36.150000000000006,36.24,36.080000000000005,36.26,36.230000000000004,36.14999999999999,36.14,35.96999999999999,35.94999999999999,35.959999999999994,35.669999999999995,35.72,36.03,36.3,36.50999999999999,36.75,37.269999999999996],"color":"green"},{"name":"anthropic","data":[43.07,44.1,45.86,48.080000000000005,49.28000000000001,50.06,51.2,51.28,51.31,51.51000000000001,51.78,52.38,52.669999999999995,53.05,53.22,53.54,53.519999999999996,53.54,53.18,53.14,53.220000000000006,52.94,52.83,53,52.839999999999996,52.87,52.99999999999999,53.019999999999996,53.18,53.22,53.22,53.5,53.459999999999994,53.160000000000004,52.87,52.69,52.39,51.800000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
