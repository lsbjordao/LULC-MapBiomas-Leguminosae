<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.919999999999995,34.79999999999999,34.11,33.74,33.28,32.89,32.42000000000001,31.850000000000005,31.389999999999997,31.099999999999998,31.159999999999993,31.45,31.62,31.830000000000002,31.97,31.909999999999997,31.91,31.98,31.589999999999996,31.22,31.100000000000005,31.03000000000001,31.130000000000003,31.15,30.92,30.899999999999995,30.71,30.41,30.500000000000004,30.430000000000003,30.570000000000004,30.59000000000001,30.340000000000003,30.320000000000004,30.2,30.19,30.260000000000005,30.5],"color":"green"},{"name":"anthropic","data":[56.36000000000001,56.46999999999999,57.19,57.54999999999999,58.01999999999999,58.41999999999999,58.85999999999999,59.44,59.93,60.199999999999996,60.14999999999999,59.86999999999999,59.67999999999999,59.46999999999999,59.339999999999996,59.4,59.37999999999999,59.31999999999999,59.709999999999994,60.07999999999999,60.209999999999994,60.279999999999994,60.169999999999995,60.17999999999999,60.39,60.39,60.61,60.88999999999999,60.83,60.859999999999985,60.739999999999995,60.71999999999999,60.949999999999996,60.989999999999995,61.11,61.14999999999999,61.05,60.809999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
