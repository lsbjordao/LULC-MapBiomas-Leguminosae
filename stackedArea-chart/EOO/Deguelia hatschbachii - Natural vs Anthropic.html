<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.789999999999996,30.669999999999998,30.319999999999997,30.149999999999995,29.86,29.700000000000006,29.430000000000003,29.42,29.37,29.34,29.340000000000003,29.35,29.340000000000003,29.28,28.969999999999995,28.7,28.61,28.459999999999997,28.37,28.330000000000002,28.300000000000004,28.419999999999998,28.64,28.810000000000002,29.049999999999997,29.389999999999993,29.64,29.740000000000002,29.810000000000002,29.9,29.98,30.119999999999997,30.349999999999998,30.44,30.47,30.579999999999995,30.679999999999996,30.83],"color":"green"},{"name":"anthropic","data":[69.36,69.48,69.84,70.03000000000002,70.3,70.48,70.72,70.75,70.81,70.82,70.82000000000001,70.81000000000002,70.83,70.88,71.18,71.44999999999999,71.53,71.68,71.79,71.85000000000001,71.85000000000001,71.73,71.53,71.36,71.11,70.77000000000001,70.53000000000002,70.43,70.37,70.28000000000002,70.18,70.04,69.82000000000002,69.71000000000001,69.7,69.59,69.49000000000001,69.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
