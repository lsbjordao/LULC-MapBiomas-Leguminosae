<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.57000000000001,65.33,64.58,63.79,62.98,62.28,61.7,61.129999999999995,60.599999999999994,60.669999999999995,60.92999999999999,61.089999999999996,61.61999999999999,61.339999999999996,61.13,60.980000000000004,60.589999999999996,60.49,60.21,59.919999999999995,59.56999999999999,59.57,59.33,59.37,59.459999999999994,59.3,59.13,58.49,58.089999999999996,57.77999999999999,57.529999999999994,57.79,57.849999999999994,58.00999999999999,58.04999999999999,58.21000000000001,58.13,58.23],"color":"green"},{"name":"anthropic","data":[32.16,32.379999999999995,33.14000000000001,33.93,34.71,35.46,36.029999999999994,36.599999999999994,37.129999999999995,37.08,36.82999999999999,36.63,36.11,36.379999999999995,36.61999999999999,36.74,37.14,37.25,37.54,37.8,38.14,38.150000000000006,38.37,38.349999999999994,38.260000000000005,38.410000000000004,38.61,39.22,39.629999999999995,39.94,40.209999999999994,39.959999999999994,39.88,39.71999999999999,39.67,39.54,39.6,39.51],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
