<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.10999999999999,46.620000000000005,45.89,45.220000000000006,44.49999999999999,44.02000000000001,43.52,42.919999999999995,42.36000000000001,41.81,41.260000000000005,40.81,40.440000000000005,40.09,39.74,39.40000000000001,39.13000000000001,38.80000000000001,38.34,38.000000000000014,37.82,37.72,37.62,37.529999999999994,37.48,37.419999999999995,37.330000000000005,37.190000000000005,37.02,36.82,36.72000000000001,36.64000000000001,36.59,36.589999999999996,36.53,36.44999999999999,36.35,36.43000000000001],"color":"green"},{"name":"anthropic","data":[48.88000000000001,49.32999999999999,50.09999999999999,50.759999999999984,51.489999999999974,51.96,52.43999999999998,53.07,53.61,54.15,54.72,55.14999999999999,55.52,55.879999999999995,56.23,56.58,56.84,57.18,57.61999999999999,57.999999999999986,58.18000000000001,58.27000000000001,58.349999999999994,58.44,58.5,58.54,58.629999999999995,58.75999999999999,58.92999999999998,59.17000000000001,59.27,59.33,59.38,59.37,59.45,59.52,59.620000000000005,59.550000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
