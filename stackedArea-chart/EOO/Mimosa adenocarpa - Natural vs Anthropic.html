<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.13999999999999,54.72,53.949999999999996,53.27,52.529999999999994,52.010000000000005,51.47000000000001,50.779999999999994,50.16,49.63000000000001,49.06,48.55,48.31,48.019999999999996,47.67000000000001,47.34,47.03000000000001,46.71,46.3,45.92,45.69000000000001,45.540000000000006,45.45,45.36,45.29,45.21999999999999,45.07,44.75,44.419999999999995,44.08,43.849999999999994,43.78,43.690000000000005,43.64,43.51,43.410000000000004,43.24,43.3],"color":"green"},{"name":"anthropic","data":[43.97,44.40999999999999,45.15999999999999,45.830000000000005,46.58,47.099999999999994,47.62999999999999,48.339999999999996,48.95000000000001,49.48000000000001,50.050000000000004,50.51000000000001,50.789999999999985,51.080000000000005,51.4,51.74999999999999,52.059999999999995,52.39999999999999,52.80999999999999,53.18999999999999,53.4,53.56000000000002,53.66,53.74,53.81,53.89999999999999,54.01999999999999,54.31999999999999,54.690000000000005,55.010000000000005,55.210000000000015,55.33000000000001,55.39,55.45000000000001,55.580000000000005,55.670000000000016,55.850000000000016,55.77000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
