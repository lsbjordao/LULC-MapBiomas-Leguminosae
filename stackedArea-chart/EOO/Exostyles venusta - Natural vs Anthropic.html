<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.900000000000006,29.75,29.150000000000006,28.740000000000002,28.370000000000008,28.160000000000007,27.830000000000002,27.57,27.420000000000005,27.270000000000003,27.28,27.400000000000006,27.460000000000004,27.480000000000004,27.520000000000007,27.390000000000004,27.370000000000005,27.37,27.310000000000006,27.26,27.38,27.5,27.6,27.640000000000004,27.509999999999998,27.500000000000004,27.47,27.430000000000003,27.400000000000006,27.400000000000006,27.490000000000002,27.580000000000005,27.630000000000003,27.690000000000005,27.7,27.74,27.89,28.18],"color":"green"},{"name":"anthropic","data":[50.86999999999999,51.02,51.629999999999995,52.04,52.410000000000004,52.64,52.97,53.239999999999995,53.38,53.52,53.529999999999994,53.4,53.33999999999998,53.32,53.279999999999994,53.38999999999999,53.43000000000001,53.42,53.49,53.53999999999999,53.429999999999986,53.3,53.21,53.19,53.29999999999999,53.3,53.349999999999994,53.379999999999995,53.4,53.40999999999999,53.31999999999999,53.24999999999999,53.179999999999986,53.120000000000005,53.1,53.05000000000001,52.92,52.64],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
