<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.75000000000001,46.49,46.17999999999999,45.849999999999994,45.35999999999999,45.17,44.839999999999996,44.43999999999999,44.07,43.769999999999996,43.42,43.19,43.07999999999999,42.98,42.879999999999995,42.76,42.61999999999999,42.39,42.269999999999996,42.099999999999994,42.05,42.019999999999996,41.940000000000005,41.9,41.79,41.68999999999999,41.57,41.39,41.169999999999995,40.92999999999999,40.789999999999985,40.649999999999984,40.599999999999994,40.64999999999999,40.57999999999999,40.56,40.529999999999994,40.589999999999996],"color":"green"},{"name":"anthropic","data":[52.879999999999995,53.13999999999999,53.47999999999999,53.8,54.26999999999999,54.48999999999999,54.78999999999999,55.199999999999996,55.55999999999999,55.84,56.220000000000006,56.429999999999986,56.57,56.66,56.739999999999995,56.88999999999999,56.989999999999995,57.24,57.39,57.54,57.60999999999999,57.610000000000014,57.69,57.72,57.82999999999999,57.949999999999996,58.06,58.21999999999999,58.46000000000001,58.699999999999996,58.839999999999996,58.96,59.04,58.98,59.04,59.079999999999984,59.09999999999999,59.04999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
