<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.54,56.190000000000005,56.42000000000001,56.379999999999995,54.98,53.7,52.39,50.8,49.800000000000004,49.240000000000016,49.120000000000005,49.46,49.67000000000001,49.04,48.38999999999999,47.43000000000001,46.37000000000001,45.82,44.980000000000004,44.629999999999995,43.98000000000001,43.980000000000004,43.980000000000004,43.779999999999994,44.129999999999995,44.57,44.940000000000005,45.120000000000005,45.24,45.19,45.1,45.300000000000004,45,44.69,44.550000000000004,44.510000000000005,44.45,44.480000000000004],"color":"green"},{"name":"anthropic","data":[42.120000000000005,42.480000000000004,42.22,42.29,43.67,44.980000000000004,46.26,47.87,48.87,49.41,49.54,49.199999999999996,48.97999999999999,49.63,50.27000000000001,51.25,52.279999999999994,52.83,53.66,54.029999999999994,54.66,54.69999999999999,54.709999999999994,54.88999999999999,54.53,54.12,53.72,53.55,53.43,53.47,53.57,53.35999999999999,53.66,53.970000000000006,54.1,54.16,54.21,54.17],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
