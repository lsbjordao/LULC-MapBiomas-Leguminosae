<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.31,94.25000000000001,94.12,93.98,93.62,93.39000000000001,93.02,92.67999999999999,92.41000000000001,91.78000000000002,91.21000000000002,90.70000000000002,90.18,89.76000000000002,89.16000000000001,88.45,88.10000000000001,87.52000000000001,86.57,86.07,85.50999999999999,85.15999999999998,84.82000000000001,84.44,83.92,83.46,83.10000000000001,82.86,82.63999999999999,82.51,82.15,82.05000000000001,81.82000000000001,81.5,80.8,80.13000000000001,79.36000000000001,78.57],"color":"green"},{"name":"anthropic","data":[4.09,4.1499999999999995,4.27,4.41,4.78,5,5.39,5.72,5.97,6.609999999999999,7.1899999999999995,7.7,8.229999999999999,8.639999999999999,9.260000000000002,9.940000000000001,10.3,10.88,11.84,12.32,12.89,13.23,13.57,13.96,14.48,14.94,15.31,15.55,15.76,15.9,16.250000000000004,16.360000000000003,16.6,16.900000000000002,17.6,18.27,19.040000000000003,19.84],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
