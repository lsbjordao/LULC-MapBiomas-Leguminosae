<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.42999999999999,85.21999999999997,84.72999999999999,84.27999999999999,83.83999999999997,83.48999999999998,83.11999999999999,82.55999999999999,82.06999999999998,81.53999999999996,80.87,80.27,79.71999999999998,79.19,78.67000000000002,78.22999999999998,77.80999999999999,77.29999999999998,76.64999999999999,75.97,75.43,75.03999999999999,74.77999999999999,74.50999999999999,74.36,74.2,74.03999999999999,73.88,73.66,73.42000000000002,73.16000000000003,72.9,72.69000000000001,72.48,72.2,71.94,71.51,71],"color":"green"},{"name":"anthropic","data":[13.86,14.08,14.58,15.039999999999997,15.44,15.79,16.150000000000002,16.710000000000004,17.230000000000004,17.740000000000006,18.430000000000003,19.020000000000007,19.560000000000006,20.1,20.6,21.040000000000006,21.490000000000002,21.97000000000001,22.620000000000008,23.310000000000006,23.82,24.21,24.459999999999997,24.73,24.880000000000003,25.020000000000007,25.240000000000002,25.389999999999997,25.610000000000007,25.819999999999997,26.090000000000003,26.340000000000007,26.580000000000005,26.720000000000006,27.050000000000008,27.32000000000001,27.720000000000006,28.280000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
