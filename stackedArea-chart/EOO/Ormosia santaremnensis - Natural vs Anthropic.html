<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.33,99.26,99.19,99.09,99.07000000000001,99.05999999999999,99.02,98.89,98.77000000000001,98.66,98.48,98.27999999999999,98.08000000000001,97.87,97.69,97.62,97.51,97.33,97.13000000000002,96.87,96.6,96.42999999999999,96.37000000000002,96.32,96.25,96.19000000000001,96.15000000000002,96.16,96.07,95.99,95.82000000000001,95.6,95.46000000000001,95.38999999999999,95.2,94.99,94.71,94.26],"color":"green"},{"name":"anthropic","data":[0.99,1.04,1.12,1.2,1.24,1.25,1.32,1.4300000000000002,1.56,1.6700000000000002,1.83,2.0399999999999996,2.2399999999999993,2.4499999999999993,2.619999999999999,2.7099999999999995,2.8199999999999994,2.9799999999999995,3.1899999999999995,3.4399999999999995,3.7099999999999995,3.869999999999999,3.9399999999999995,3.9899999999999993,4.05,4.119999999999999,4.1499999999999995,4.159999999999999,4.239999999999999,4.33,4.4799999999999995,4.699999999999999,4.859999999999999,4.9399999999999995,5.119999999999999,5.31,5.6000000000000005,6.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
