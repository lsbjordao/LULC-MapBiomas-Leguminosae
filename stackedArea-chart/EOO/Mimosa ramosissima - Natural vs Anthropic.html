<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.58,36.32,35.98,35.62,35.36,35.33,35.17,35.02,34.92000000000001,34.85999999999999,34.77,34.75,34.69,34.67,34.62,34.42999999999999,34.35,34.24,34.120000000000005,34.08,34.120000000000005,34.120000000000005,34.1,34.07,34.09,34.09,34.11000000000001,34.07000000000001,33.99000000000001,33.96,33.97,33.93000000000001,33.95,34.01,33.96,33.9,33.9,33.93000000000001],"color":"green"},{"name":"anthropic","data":[49.84000000000001,50.100000000000016,50.45,50.81,51.07000000000001,51.11,51.26000000000001,51.400000000000006,51.52,51.559999999999995,51.66,51.68,51.730000000000004,51.76000000000001,51.81999999999999,52.010000000000005,52.06,52.18000000000001,52.32,52.33,52.300000000000004,52.31000000000001,52.31000000000001,52.34,52.330000000000005,52.32999999999999,52.32,52.35,52.44,52.480000000000004,52.46,52.5,52.459999999999994,52.40000000000001,52.47000000000001,52.510000000000005,52.510000000000005,52.480000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
