<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.14,32.660000000000004,32.330000000000005,32.18,32.07000000000001,31.980000000000008,32.150000000000006,31.900000000000006,31.660000000000004,31.700000000000006,31.610000000000003,31.580000000000002,31.4,31.210000000000004,30.910000000000004,30.520000000000003,30.280000000000005,30.090000000000007,30.020000000000003,30.010000000000005,30.110000000000007,30.070000000000004,30.01000000000001,30.08000000000001,30.210000000000008,30.230000000000004,30.240000000000002,30.23000000000001,30.03000000000001,29.92,30.130000000000006,30.259999999999998,30.310000000000002,30.390000000000004,30.44000000000001,30.380000000000003,30.300000000000004,30.460000000000004],"color":"green"},{"name":"anthropic","data":[65.02999999999999,66.54,66.85000000000002,67,67.10000000000001,67.22000000000003,67.02000000000001,67.26,67.5,67.48000000000002,67.57000000000001,67.58,67.79000000000002,67.95000000000003,68.26,68.67,68.90999999999998,69.08999999999997,69.15,69.14999999999999,69.07,69.13999999999997,69.19999999999999,69.11999999999999,68.96000000000001,68.94,68.94000000000001,68.96,69.14999999999999,69.25,69.06,68.92,68.86000000000003,68.8,68.73,68.8,68.87999999999998,68.69999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
