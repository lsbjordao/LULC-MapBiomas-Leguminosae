<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.97,74.85,74.33999999999999,73.78000000000002,73.24,72.89000000000001,72.48,71.86,71.27000000000002,70.76000000000002,70.12,69.57000000000001,69.12,68.58,68.12,67.77000000000001,67.28,66.77000000000002,66.1,65.36999999999999,64.8,64.38,64.02000000000001,63.68,63.47,63.290000000000006,63.099999999999994,62.75000000000001,62.29999999999999,61.94,61.56999999999999,61.279999999999994,61.08,60.879999999999995,60.580000000000005,60.27,59.81,59.35],"color":"green"},{"name":"anthropic","data":[24.440000000000005,24.580000000000002,25.060000000000002,25.589999999999996,26.120000000000008,26.490000000000006,26.900000000000006,27.560000000000006,28.150000000000006,28.650000000000002,29.28,29.84,30.28,30.810000000000002,31.27,31.62,32.11000000000001,32.61,33.28,34.010000000000005,34.59000000000001,35.01000000000001,35.36000000000002,35.71,35.95000000000001,36.09000000000001,36.290000000000006,36.650000000000006,37.09,37.46,37.83,38.089999999999996,38.309999999999995,38.50999999999999,38.78999999999999,39.10999999999999,39.589999999999996,40.059999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
