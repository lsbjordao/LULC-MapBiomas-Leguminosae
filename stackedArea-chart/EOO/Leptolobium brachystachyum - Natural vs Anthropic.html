<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.730000000000004,38.79,38.48,38.120000000000005,37.980000000000004,37.86,37.87,37.66,37.35999999999999,37.400000000000006,37.18000000000001,37.12,36.980000000000004,36.84,36.580000000000005,36.18,35.92,35.620000000000005,35.410000000000004,35.31,35.25000000000001,35.11000000000001,34.93000000000001,34.86000000000001,34.980000000000004,34.88,34.800000000000004,34.720000000000006,34.470000000000006,34.300000000000004,34.35,34.31000000000001,34.32000000000001,34.39000000000001,34.400000000000006,34.32,34.18000000000001,34.27000000000001],"color":"green"},{"name":"anthropic","data":[58.529999999999994,59.440000000000005,59.73,60.109999999999985,60.24000000000001,60.4,60.35000000000001,60.57,60.88999999999999,60.809999999999995,61.04,61.11,61.249999999999986,61.379999999999995,61.629999999999995,62.050000000000004,62.31000000000001,62.60999999999999,62.79,62.89,62.95,63.11000000000001,63.28,63.34,63.26,63.33,63.43999999999999,63.49999999999999,63.75999999999999,63.92,63.85,63.90999999999998,63.90000000000001,63.82000000000001,63.82,63.87999999999999,64.02,63.94],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
