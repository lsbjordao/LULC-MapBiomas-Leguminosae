<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.32,33.2,32.68,32.400000000000006,32.10000000000001,31.96,31.700000000000003,31.599999999999998,31.549999999999997,31.449999999999996,31.369999999999997,31.37,31.32,31.31,31.3,31.220000000000002,31.32,31.36,31.360000000000003,31.44,31.62,31.79,31.96,32.06,32.160000000000004,32.35,32.5,32.66,32.760000000000005,32.849999999999994,32.97,33.06,33.28,33.41,33.51,33.57,33.81,34.04],"color":"green"},{"name":"anthropic","data":[64.46,64.57000000000001,65.11,65.36999999999999,65.67999999999999,65.83,66.08,66.17,66.23,66.32,66.39,66.41000000000001,66.47,66.46000000000001,66.49000000000001,66.55000000000001,66.45,66.42,66.41000000000001,66.33000000000001,66.17000000000002,65.99000000000002,65.81000000000002,65.72000000000001,65.61000000000001,65.46000000000001,65.26,65.09000000000002,65.01,64.91999999999999,64.8,64.71000000000001,64.5,64.37,64.25,64.21,63.93999999999999,63.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
