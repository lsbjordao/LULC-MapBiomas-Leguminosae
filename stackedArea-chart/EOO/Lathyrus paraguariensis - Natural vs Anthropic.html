<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.89,67.97,67.45,67.28,66.85,66.41,65.78999999999999,65.2,65.27,65.28,65.4,65.47999999999999,65.53999999999999,65.46000000000001,65.21000000000001,64.74,64.38,64.11999999999999,63.64,63.410000000000004,63.14,62.77,62.410000000000004,62.120000000000005,61.650000000000006,61.29,61.059999999999995,60.830000000000005,60.52,60.300000000000004,60.09,59.88,59.62,59.349999999999994,59.010000000000005,58.629999999999995,58.5,58.34],"color":"green"},{"name":"anthropic","data":[27.25,27.16,27.68,27.849999999999998,28.28,28.72,29.37,29.949999999999996,29.860000000000003,29.87,29.740000000000002,29.67,29.61,29.680000000000003,29.900000000000002,30.390000000000004,30.76,30.96,31.48,31.69,31.97,32.26,32.650000000000006,32.95,33.43,33.82,34.040000000000006,34.260000000000005,34.57,34.75,34.980000000000004,35.22,35.480000000000004,35.72,36.11,36.480000000000004,36.6,36.760000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
