<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.00999999999999,86.66999999999999,86.47,85.85,85.46999999999998,85.52,85.87,86.14999999999999,86.18999999999998,85.89999999999998,85.80999999999999,85.66,85.63,85.16,84.77,84.27,84.22999999999999,84.03999999999999,84.32,84.13,83.56,83.19,83.12,82.61000000000001,82.78,83.17999999999999,82.89000000000001,82.44,81.87,81.43,81.29,81.14999999999999,80.72999999999999,80.66,80.98,80.97,81.03999999999999,81.51],"color":"green"},{"name":"anthropic","data":[12.069999999999999,11.42,11.69,12.350000000000001,12.75,12.72,12.379999999999999,12.080000000000002,12.03,12.36,12.46,12.63,12.64,13.06,13.41,13.85,13.860000000000001,14.05,13.77,13.959999999999999,14.57,14.97,15.03,15.530000000000001,15.370000000000001,14.959999999999999,15.27,15.77,16.31,16.74,16.92,17.09,17.48,17.48,17.18,17.19,17.16,16.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
