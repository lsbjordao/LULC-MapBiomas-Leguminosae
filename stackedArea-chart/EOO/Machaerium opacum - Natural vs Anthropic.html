<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.25,68.03,67.65999999999998,67.17999999999999,66.54999999999998,66.30999999999999,65.95,65.5,65.03,64.63000000000001,64.14000000000001,63.71000000000001,63.55000000000001,63.34,63.07000000000001,62.890000000000015,62.55000000000001,62.12000000000001,61.76000000000002,61.169999999999995,60.660000000000004,60.300000000000004,60.050000000000004,59.82,59.660000000000004,59.360000000000014,59.04,58.370000000000005,57.64000000000001,57.02000000000001,56.50000000000001,56.120000000000005,55.870000000000005,55.68000000000001,55.31000000000001,55.01000000000001,54.65000000000001,54.35000000000001],"color":"green"},{"name":"anthropic","data":[31.01,31.23,31.610000000000003,32.06,32.71,32.96,33.32,33.760000000000005,34.24,34.63999999999999,35.10999999999999,35.559999999999995,35.699999999999996,35.90999999999998,36.14999999999999,36.35999999999999,36.67999999999999,37.13999999999999,37.47999999999999,38.04999999999999,38.6,38.94,39.19000000000001,39.40000000000001,39.580000000000005,39.85,40.18000000000001,40.84000000000001,41.56000000000001,42.21,42.720000000000006,43.12000000000001,43.36999999999999,43.56000000000001,43.870000000000005,44.210000000000015,44.580000000000005,44.89000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
