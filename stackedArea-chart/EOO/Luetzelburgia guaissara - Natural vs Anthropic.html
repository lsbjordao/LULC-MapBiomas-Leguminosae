<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.06000000000001,33.25000000000001,33.07000000000001,32.82000000000001,32.67000000000001,32.640000000000015,32.55000000000001,32.56000000000001,32.56000000000001,32.63000000000001,32.60000000000001,32.62000000000001,32.580000000000005,32.650000000000006,32.75000000000001,32.71000000000001,32.74,32.760000000000005,32.750000000000014,32.73000000000001,32.73000000000001,32.81000000000002,32.85000000000001,32.89000000000001,32.96000000000001,33.09,33.17000000000001,33.260000000000005,33.400000000000006,33.50000000000001,33.660000000000004,33.72,33.730000000000004,33.71000000000001,33.67000000000001,33.64000000000001,33.74,33.7],"color":"green"},{"name":"anthropic","data":[34.36000000000001,34.17999999999999,34.39000000000001,34.63,34.78000000000001,34.78999999999999,34.88999999999999,34.86,34.85999999999999,34.79999999999999,34.84999999999998,34.82999999999999,34.839999999999996,34.78,34.7,34.730000000000004,34.68,34.69,34.68,34.73,34.709999999999994,34.620000000000005,34.58999999999999,34.53,34.470000000000006,34.36,34.269999999999996,34.190000000000005,34.04,33.95,33.8,33.730000000000004,33.70000000000001,33.71000000000001,33.76,33.790000000000006,33.71000000000001,33.720000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
