<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.71,36.949999999999996,36.760000000000005,36.709999999999994,36.55,36.5,36.349999999999994,36.23,36.12000000000001,36.160000000000004,36.12,36.2,36.19,36.2,36.16,36,35.919999999999995,35.88999999999999,35.75999999999999,35.62,35.51,35.43999999999999,35.410000000000004,35.3,35.21999999999999,35.19,35.169999999999995,35.160000000000004,35.120000000000005,35.080000000000005,35.1,35.07,35.02,34.90999999999999,34.77,34.69,34.730000000000004,34.660000000000004],"color":"green"},{"name":"anthropic","data":[19.349999999999998,19.1,19.310000000000002,19.38,19.51,19.590000000000003,19.720000000000002,19.850000000000005,19.94,19.91,19.950000000000003,19.890000000000004,19.91,19.87,19.92,20.07,20.17,20.19,20.3,20.46,20.560000000000002,20.61,20.67,20.78,20.85,20.900000000000006,20.880000000000003,20.92,20.930000000000003,20.980000000000004,20.960000000000004,21.01,21.060000000000002,21.160000000000004,21.310000000000002,21.39,21.35,21.420000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
