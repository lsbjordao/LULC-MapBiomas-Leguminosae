<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.36000000000001,76.44999999999999,76.14,75.83,75.16000000000001,74.82,74.44,73.86,73.3,72.79,72.13999999999999,71.52000000000001,71.05999999999999,70.57,70.02,69.49,69.03999999999999,68.56,68.08000000000001,67.35,66.77,66.28,65.89,65.5,65.11000000000001,64.67,64.23,63.48999999999999,62.68999999999999,62.02999999999999,61.419999999999995,60.97,60.68999999999999,60.46,60.019999999999996,59.58,59.12,58.91],"color":"green"},{"name":"anthropic","data":[22.81,22.75,23.019999999999996,23.340000000000003,23.990000000000002,24.33,24.740000000000002,25.279999999999998,25.870000000000005,26.359999999999996,27.019999999999996,27.660000000000004,28.110000000000003,28.600000000000005,29.180000000000003,29.67,30.130000000000003,30.590000000000003,31.080000000000002,31.81,32.4,32.86,33.28000000000001,33.67,34.07,34.52000000000001,34.940000000000005,35.69,36.50000000000001,37.13,37.75999999999999,38.17999999999999,38.48000000000001,38.70000000000001,39.14000000000001,39.58999999999999,40.03,40.239999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
