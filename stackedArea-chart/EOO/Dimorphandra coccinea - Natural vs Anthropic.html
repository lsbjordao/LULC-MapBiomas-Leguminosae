<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.96000000000001,99.96000000000001,99.93,99.91000000000003,99.91000000000001,99.91000000000001,99.91000000000003,99.89,99.86000000000001,99.85000000000001,99.84,99.81,99.75000000000001,99.69,99.66000000000001,99.65,99.62,99.57000000000001,99.53000000000002,99.42,99.33000000000003,99.26000000000003,99.24000000000001,99.22,99.19000000000003,99.14000000000001,99.11000000000001,99.10000000000001,99.07000000000001,99.05000000000001,98.98,98.88000000000001,98.84000000000003,98.80000000000001,98.73000000000002,98.65000000000003,98.49000000000002,98.29],"color":"green"},{"name":"anthropic","data":[0.28,0.28,0.29000000000000004,0.31000000000000005,0.32000000000000006,0.31000000000000005,0.31000000000000005,0.3400000000000001,0.35,0.36,0.38,0.42000000000000004,0.47,0.54,0.5800000000000001,0.5800000000000001,0.6100000000000001,0.65,0.71,0.7999999999999999,0.9,0.96,1,1.01,1.05,1.1,1.11,1.12,1.16,1.1900000000000002,1.2500000000000002,1.34,1.42,1.44,1.52,1.6,1.76,1.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
