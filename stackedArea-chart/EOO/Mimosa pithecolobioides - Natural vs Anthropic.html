<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.06,62.04999999999999,61.62,61.199999999999996,60.52,60.31,60.010000000000005,59.470000000000006,58.98000000000001,58.68000000000001,58.31999999999999,58.03,58.169999999999995,58.01000000000001,57.82999999999999,57.67000000000001,57.32,57.02000000000001,56.760000000000005,56.53000000000001,56.26000000000001,56.09000000000001,56.01,55.870000000000005,55.82,55.68000000000001,55.48000000000001,54.989999999999995,54.449999999999996,53.97,53.63,53.53000000000001,53.390000000000015,53.360000000000014,53.24000000000001,53.14,52.93,52.81999999999999],"color":"green"},{"name":"anthropic","data":[38.89,38.900000000000006,39.330000000000005,39.75000000000001,40.42000000000001,40.62,40.919999999999995,41.47,41.96000000000001,42.25999999999999,42.629999999999995,42.91,42.77000000000001,42.940000000000005,43.120000000000005,43.290000000000006,43.62,43.94,44.18,44.4,44.68,44.84999999999999,44.94,45.069999999999986,45.11999999999999,45.27,45.43999999999999,45.92999999999999,46.47999999999999,46.97999999999999,47.3,47.42,47.57000000000001,47.57000000000001,47.69000000000002,47.80000000000001,48.010000000000005,48.11000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
