<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.44000000000001,65.37,64.92,64.53000000000002,64.01,63.699999999999996,63.33,62.85,62.4,62.28000000000001,62.14000000000001,62.13,62.39000000000001,62.28,62.160000000000004,62.040000000000006,61.800000000000004,61.65,61.379999999999995,61.1,60.790000000000006,60.66000000000001,60.52000000000001,60.480000000000004,60.45000000000001,60.349999999999994,60.19000000000001,59.699999999999996,59.21,58.75,58.46,58.38000000000001,58.260000000000005,58.2,58.07000000000001,57.98,57.84,57.760000000000005],"color":"green"},{"name":"anthropic","data":[33.57,33.64,34.099999999999994,34.47,34.99000000000001,35.290000000000006,35.66000000000001,36.15000000000002,36.59,36.730000000000004,36.85,36.879999999999995,36.60999999999999,36.73,36.859999999999985,36.96999999999999,37.21,37.349999999999994,37.61,37.92,38.21999999999999,38.36,38.489999999999995,38.50999999999999,38.54,38.66,38.830000000000005,39.31,39.8,40.249999999999986,40.52,40.639999999999986,40.74,40.82,40.940000000000005,41.03999999999999,41.15999999999999,41.23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
