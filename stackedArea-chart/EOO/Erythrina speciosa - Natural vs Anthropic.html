<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.46000000000001,43.100000000000016,42.48,41.900000000000006,41.25,40.879999999999995,40.47,39.94999999999999,39.540000000000006,39.20000000000001,38.83000000000001,38.550000000000004,38.40999999999999,38.239999999999995,38.040000000000006,37.830000000000005,37.64,37.43000000000001,37.18000000000001,36.98000000000001,36.820000000000014,36.800000000000004,36.75000000000001,36.72,36.71,36.66000000000001,36.57000000000001,36.33999999999998,36.15,35.940000000000005,35.88,35.830000000000005,35.779999999999994,35.78999999999999,35.68000000000001,35.629999999999995,35.53999999999999,35.61],"color":"green"},{"name":"anthropic","data":[49.95000000000002,50.30999999999999,50.89999999999999,51.50999999999999,52.13999999999998,52.51,52.93,53.449999999999996,53.870000000000005,54.199999999999996,54.57000000000001,54.85999999999999,54.989999999999995,55.169999999999995,55.349999999999994,55.56,55.76999999999999,55.969999999999985,56.23999999999998,56.41,56.54,56.6,56.64000000000001,56.68000000000001,56.68,56.74,56.820000000000014,57.03000000000001,57.269999999999996,57.45000000000001,57.550000000000004,57.56,57.64,57.63999999999999,57.73000000000001,57.78,57.87000000000001,57.790000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
