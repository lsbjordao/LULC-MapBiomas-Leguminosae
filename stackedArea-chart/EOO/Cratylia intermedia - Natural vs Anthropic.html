<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[10.7,10.639999999999999,10.469999999999999,10.329999999999998,10.21,10.17,10.11,10.049999999999999,9.99,9.979999999999999,9.939999999999998,9.939999999999998,9.919999999999998,9.899999999999999,9.86,9.79,9.78,9.77,9.799999999999999,9.799999999999999,9.839999999999998,9.909999999999997,9.929999999999998,9.959999999999999,9.959999999999999,9.989999999999998,10.009999999999998,10.02,9.989999999999998,9.979999999999999,10.029999999999998,10.039999999999997,10.059999999999999,10.1,10.1,10.1,10.159999999999998,10.189999999999998],"color":"green"},{"name":"anthropic","data":[20.69,20.760000000000005,20.910000000000004,21.07,21.189999999999998,21.23,21.290000000000003,21.340000000000003,21.390000000000004,21.42,21.47,21.479999999999997,21.48,21.5,21.540000000000003,21.610000000000007,21.610000000000003,21.6,21.600000000000005,21.580000000000002,21.549999999999997,21.51,21.45,21.44,21.430000000000003,21.400000000000006,21.41,21.380000000000003,21.41,21.400000000000002,21.37,21.370000000000005,21.340000000000003,21.3,21.280000000000005,21.300000000000004,21.25,21.200000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
