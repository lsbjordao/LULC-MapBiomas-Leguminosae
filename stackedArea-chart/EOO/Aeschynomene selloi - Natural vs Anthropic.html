<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[13.230000000000004,13.17,12.99,12.81,12.670000000000002,12.59,12.489999999999998,12.370000000000001,12.26,12.219999999999999,12.15,12.120000000000001,12.120000000000001,12.110000000000001,12.06,11.99,11.97,11.950000000000001,11.92,11.92,11.919999999999998,11.97,11.979999999999999,11.99,12.01,11.999999999999998,11.99,11.909999999999998,11.86,11.799999999999999,11.790000000000001,11.79,11.77,11.81,11.799999999999999,11.82,11.86,11.909999999999998],"color":"green"},{"name":"anthropic","data":[16.960000000000004,17.01,17.18,17.360000000000003,17.520000000000003,17.599999999999998,17.67,17.810000000000006,17.92,17.970000000000002,18.030000000000005,18.070000000000004,18.070000000000007,18.080000000000002,18.11,18.17,18.209999999999997,18.22,18.249999999999996,18.259999999999998,18.24,18.22,18.189999999999998,18.17,18.150000000000002,18.180000000000007,18.19,18.259999999999998,18.320000000000004,18.389999999999997,18.41,18.380000000000003,18.400000000000006,18.360000000000007,18.360000000000003,18.34,18.310000000000002,18.260000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
