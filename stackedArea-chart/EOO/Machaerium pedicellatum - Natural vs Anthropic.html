<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.03999999999999,34.919999999999995,34.19,33.769999999999996,33.41,33.2,32.860000000000014,32.64000000000001,32.50000000000001,32.290000000000006,32.32,32.44000000000001,32.470000000000006,32.510000000000005,32.57000000000001,32.410000000000004,32.39000000000001,32.44000000000001,32.34000000000001,32.27000000000001,32.44000000000001,32.63000000000001,32.77000000000001,32.830000000000005,32.69000000000001,32.68000000000001,32.60000000000001,32.540000000000006,32.50000000000001,32.46000000000001,32.50000000000001,32.58000000000001,32.65000000000001,32.760000000000005,32.760000000000005,32.81,32.910000000000004,33.19],"color":"green"},{"name":"anthropic","data":[56.15,56.28,57.03999999999999,57.46999999999999,57.809999999999995,58.009999999999984,58.339999999999996,58.589999999999996,58.71,58.919999999999995,58.889999999999986,58.76999999999999,58.72999999999999,58.69999999999999,58.62,58.760000000000005,58.82000000000001,58.78,58.87,58.949999999999996,58.75999999999999,58.57999999999999,58.440000000000005,58.38999999999999,58.51999999999999,58.52999999999999,58.61,58.68,58.720000000000006,58.79,58.71999999999999,58.650000000000006,58.56999999999999,58.46,58.45999999999998,58.44,58.3,58.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
