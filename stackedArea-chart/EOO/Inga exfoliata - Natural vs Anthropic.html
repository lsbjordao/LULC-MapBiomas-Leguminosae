<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.93,29.35,28.35,27.499999999999996,26.98,26.7,26.27,26.290000000000003,26.199999999999996,25.869999999999997,25.57,25.32,25.28,25.16,25.119999999999997,24.990000000000002,25.080000000000002,24.979999999999997,24.92,24.91,24.97,25.119999999999997,25.24,25.16,25.330000000000002,25.37,25.44,25.49,25.45,25.430000000000003,25.430000000000003,25.380000000000006,25.51,25.680000000000007,25.780000000000005,25.900000000000002,26.11,26.4],"color":"green"},{"name":"anthropic","data":[69.05999999999999,69.68,70.65,71.49000000000001,72.03,72.29,72.74,72.72000000000001,72.81000000000002,73.14000000000001,73.45,73.68,73.73,73.84,73.89,74.02000000000001,73.96000000000001,74.03,74.08000000000001,74.09,74.04,73.89000000000001,73.78,73.83999999999999,73.71,73.64999999999999,73.59,73.52999999999999,73.57,73.58,73.60000000000001,73.66,73.51,73.35000000000001,73.25,73.12,72.91000000000001,72.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
