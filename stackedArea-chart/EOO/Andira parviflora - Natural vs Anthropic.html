<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.41000000000001,99.41,99.39,99.38000000000001,99.37,99.39999999999999,99.41,99.38000000000001,99.32000000000001,99.30000000000001,99.29000000000002,99.22000000000001,99.14,99.02000000000001,98.96000000000001,98.99000000000002,99,98.96000000000001,98.94000000000001,98.91,98.85000000000002,98.79000000000002,98.79,98.80999999999999,98.78000000000002,98.72,98.71000000000001,98.74000000000001,98.74000000000001,98.71000000000001,98.62000000000002,98.48000000000002,98.45999999999998,98.47000000000001,98.46000000000001,98.39000000000001,98.26,98.03],"color":"green"},{"name":"anthropic","data":[0.43999999999999995,0.43999999999999995,0.47,0.48,0.47,0.45999999999999996,0.44,0.48,0.54,0.56,0.5700000000000001,0.63,0.7100000000000001,0.8200000000000001,0.88,0.8600000000000001,0.8500000000000001,0.8800000000000001,0.9099999999999999,0.95,0.99,1.06,1.06,1.03,1.07,1.1300000000000001,1.1500000000000001,1.11,1.12,1.1500000000000001,1.23,1.36,1.3900000000000001,1.37,1.3900000000000001,1.4500000000000002,1.58,1.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
