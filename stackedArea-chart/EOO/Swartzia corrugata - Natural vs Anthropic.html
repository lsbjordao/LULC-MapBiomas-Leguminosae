<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.89,98.89999999999999,98.80000000000001,98.76,98.75,98.72,98.71000000000002,98.61000000000001,98.52000000000001,98.44000000000001,98.25000000000001,98.12,97.91000000000001,97.75,97.73,97.71000000000001,97.54,97.46000000000001,97.41000000000003,97.29,97.16000000000001,97.07000000000002,97.02000000000001,96.97,96.9,96.87000000000002,96.89,96.91000000000001,96.86000000000001,96.78000000000002,96.65,96.47,96.4,96.34000000000002,96.26,96.14,95.96000000000001,95.72],"color":"green"},{"name":"anthropic","data":[0.77,0.76,0.86,0.9,0.9,0.9400000000000001,0.9500000000000001,1.04,1.1400000000000001,1.21,1.4000000000000001,1.54,1.76,1.9000000000000001,1.9200000000000002,1.9500000000000002,2.1099999999999994,2.1799999999999997,2.2499999999999996,2.36,2.4899999999999998,2.58,2.62,2.67,2.7599999999999993,2.79,2.77,2.75,2.8,2.8899999999999997,3.0199999999999996,3.1999999999999997,3.2699999999999996,3.3199999999999994,3.4099999999999997,3.5199999999999996,3.6899999999999995,3.9499999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
