<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.38,57.43000000000001,56.86,56.440000000000005,56.35,56.48,56.089999999999996,55.949999999999996,56.089999999999996,55.739999999999995,55.75,55.96,55.63,55.519999999999996,55.48,54.95000000000001,54.67,54.779999999999994,54.870000000000005,55.04000000000001,55.51000000000001,55.71000000000001,55.71000000000001,55.49,54.85,54.800000000000004,54.56000000000001,54.45,54.15000000000001,53.88,53.66000000000001,53.7,53.86,53.94,53.6,53.34999999999999,52.98999999999999,53.010000000000005],"color":"green"},{"name":"anthropic","data":[42.32000000000001,42.31,42.84,43.28000000000001,43.36000000000001,43.25,43.63,43.76,43.629999999999995,43.989999999999995,43.989999999999995,43.74999999999999,44.09,44.2,44.22000000000001,44.760000000000005,45.050000000000004,44.93,44.84,44.69,44.2,44,44,44.239999999999995,44.86000000000001,44.910000000000004,45.17,45.28,45.57000000000001,45.83,46.05,46.01,45.84,45.77,46.12,46.37,46.75,46.699999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
