<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.62,82.86999999999999,82.92999999999999,83.13,82.24000000000001,81.71,81.2,80.64,79.83,79.2,78.55000000000001,77.82000000000001,77.26,76.68,75.89999999999999,75.28,74.53999999999999,73.92999999999998,73.29,71.83,70.92999999999999,70.11,69.48,68.61,67.78,67.15000000000002,66.39999999999999,65.11000000000001,64.08,63.59,63.2,62.9,62.56,62.160000000000004,61.45,60.59,59.72,58.44],"color":"green"},{"name":"anthropic","data":[17.71,16.45,16.43,16.21,17.11,17.639999999999997,18.150000000000002,18.71,19.54,20.150000000000002,20.810000000000002,21.57,22.090000000000003,22.670000000000005,23.450000000000003,24.08,24.81,25.4,26.06,27.529999999999998,28.4,29.23,29.86,30.720000000000002,31.54,32.18,32.94,34.230000000000004,35.239999999999995,35.760000000000005,36.14,36.43,36.77,37.160000000000004,37.88999999999999,38.739999999999995,39.60999999999999,40.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
