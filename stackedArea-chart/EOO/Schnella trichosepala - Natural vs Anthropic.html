<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.489999999999995,57.519999999999996,56.92,56.349999999999994,55.62,55.53000000000001,55.29,54.78,54.39000000000001,54.160000000000004,53.9,53.870000000000005,54.26,54.440000000000005,54.63000000000001,54.84,54.66,54.44,54.25,54.17999999999999,53.98,53.92999999999999,53.82999999999999,53.75,53.68,53.61000000000001,53.46000000000001,53.27,52.88,52.51000000000001,52.199999999999996,52.03,51.88,51.80000000000001,51.67999999999999,51.52,51.51,51.58999999999999],"color":"green"},{"name":"anthropic","data":[41.77,41.74999999999999,42.339999999999996,42.910000000000004,43.65,43.74999999999999,43.95999999999999,44.48,44.879999999999995,45.1,45.35999999999999,45.41,44.99,44.83,44.629999999999995,44.42999999999999,44.599999999999994,44.839999999999996,45,45.089999999999996,45.309999999999995,45.36999999999999,45.429999999999986,45.51,45.59999999999998,45.65999999999999,45.82,46.01,46.37999999999999,46.779999999999994,47.05999999999999,47.21999999999999,47.38999999999999,47.48000000000001,47.57000000000001,47.739999999999995,47.77000000000001,47.660000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
