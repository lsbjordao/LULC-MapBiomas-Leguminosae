<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.03000000000001,57.81000000000001,57.280000000000015,56.730000000000004,56.17,55.84000000000001,55.430000000000014,54.870000000000005,54.36000000000001,53.940000000000005,53.4,52.940000000000005,52.63000000000002,52.26,51.88,51.52,51.100000000000016,50.71000000000001,50.250000000000014,49.73000000000001,49.34,49.09000000000001,48.90000000000002,48.69000000000001,48.58000000000002,48.44000000000002,48.300000000000004,48.000000000000014,47.66000000000002,47.39000000000001,47.13000000000002,46.990000000000016,46.83000000000002,46.70000000000002,46.480000000000025,46.30000000000001,46.050000000000026,45.86000000000002],"color":"green"},{"name":"anthropic","data":[37.39999999999999,37.62,38.15999999999999,38.68999999999999,39.23999999999999,39.59999999999999,39.99999999999999,40.559999999999995,41.059999999999995,41.49,42.04,42.46,42.80999999999999,43.13999999999999,43.52,43.89,44.30999999999999,44.67999999999999,45.14999999999999,45.68,46.06000000000001,46.31000000000002,46.53,46.71,46.83,46.970000000000006,47.09,47.41000000000001,47.75000000000001,48.01000000000001,48.27,48.42000000000001,48.56999999999999,48.7,48.89,49.1,49.34,49.51000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
