<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.34,70.59999999999998,70.46000000000001,69.67,69.51,69.47,68.94999999999999,68.68,68.48,68.35000000000001,68.19000000000001,68.34,68.41,68.55,68.39,68.16999999999999,67.91000000000001,67.46,67.16999999999999,66.86000000000001,66.76000000000002,66.56,66.27,66.15,66.12,65.9,65.64999999999999,65.61,65.47,65.3,65.36999999999999,65.22,65.2,65.18000000000002,65.00000000000003,64.78999999999999,64.58999999999999,64.38000000000001],"color":"green"},{"name":"anthropic","data":[28.509999999999998,29.24,29.380000000000003,30.179999999999996,30.33,30.38,30.889999999999993,31.15,31.369999999999997,31.480000000000004,31.64,31.509999999999998,31.44,31.290000000000003,31.45,31.700000000000003,31.960000000000008,32.4,32.7,32.99,33.06999999999999,33.31,33.6,33.71,33.75,33.96,34.2,34.23000000000001,34.400000000000006,34.56,34.5,34.60999999999999,34.66000000000001,34.68,34.85000000000001,35.080000000000005,35.260000000000005,35.47],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
