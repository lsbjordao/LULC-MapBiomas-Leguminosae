<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.98999999999998,84.64999999999999,84.00999999999999,83.45,82.91,82.48,82.03,81.39000000000001,80.78,80.12,79.33999999999999,78.66999999999999,78.04999999999998,77.46,76.85000000000001,76.35000000000001,75.82000000000001,75.26,74.48,73.76000000000002,73.24,72.88,72.66999999999997,72.44999999999999,72.33999999999999,72.22,72.08,71.97999999999999,71.78999999999998,71.6,71.38999999999999,71.17,70.99999999999999,70.85,70.61999999999999,70.4,70.00999999999999,69.56],"color":"green"},{"name":"anthropic","data":[15.719999999999999,16.06,16.69,17.25,17.779999999999998,18.23,18.66,19.310000000000002,19.92,20.580000000000002,21.339999999999996,22.02,22.659999999999997,23.240000000000002,23.840000000000003,24.35,24.87,25.44000000000001,26.22,26.920000000000005,27.440000000000005,27.81,28.030000000000005,28.250000000000004,28.380000000000006,28.500000000000007,28.620000000000005,28.720000000000006,28.890000000000008,29.100000000000005,29.300000000000008,29.520000000000003,29.690000000000005,29.84,30.080000000000005,30.310000000000002,30.700000000000006,31.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
