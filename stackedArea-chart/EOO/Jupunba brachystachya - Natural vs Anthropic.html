<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.239999999999995,35.029999999999994,34.57,34.230000000000004,33.980000000000004,33.89,33.71,33.57000000000001,33.510000000000005,33.5,33.440000000000005,33.400000000000006,33.350000000000016,33.28,33.24000000000001,33.080000000000005,33.100000000000016,33.08000000000001,33.12000000000001,33.17000000000001,33.30000000000002,33.42000000000001,33.48000000000001,33.57000000000001,33.58000000000001,33.71000000000001,33.83000000000001,33.93000000000001,33.96000000000001,34.010000000000005,34.13000000000001,34.220000000000006,34.32000000000001,34.39000000000001,34.43,34.42000000000001,34.6,34.75],"color":"green"},{"name":"anthropic","data":[56.300000000000004,56.510000000000005,56.96000000000001,57.30000000000001,57.56,57.63,57.81999999999999,57.93,58,58.029999999999994,58.09,58.13,58.209999999999994,58.24999999999999,58.28999999999999,58.47,58.46,58.459999999999994,58.41,58.349999999999994,58.21000000000001,58.129999999999995,58.050000000000004,57.970000000000006,57.93000000000001,57.82999999999999,57.699999999999996,57.599999999999994,57.56,57.55,57.400000000000006,57.309999999999995,57.199999999999996,57.15,57.109999999999985,57.08,56.93,56.779999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
