<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.17,47.00000000000001,46.58,46.31,45.89,45.95000000000001,45.82,45.519999999999996,45.239999999999995,45.06,44.83,44.81,44.93000000000001,45.05,45.169999999999995,45.230000000000004,45.230000000000004,45.09,45.07,45.08,45.13999999999999,45.21999999999999,45.17,45.160000000000004,45.08,45.00999999999999,44.91,44.85999999999999,44.73,44.459999999999994,44.26,44.04,44.07999999999999,44.239999999999995,44.239999999999995,44.230000000000004,44.28000000000001,44.41],"color":"green"},{"name":"anthropic","data":[51.519999999999996,51.66,52.089999999999996,52.34,52.77,52.72999999999999,52.85,53.15,53.43999999999999,53.60999999999999,53.81999999999999,53.84999999999999,53.74999999999999,53.639999999999986,53.52999999999999,53.449999999999996,53.449999999999996,53.58999999999999,53.59999999999999,53.62,53.54,53.44,53.519999999999996,53.510000000000005,53.589999999999996,53.66,53.74999999999999,53.79999999999999,53.94999999999998,54.20999999999998,54.41999999999999,54.65,54.60999999999999,54.42999999999999,54.419999999999995,54.42999999999999,54.379999999999995,54.269999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
