<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.42,62.120000000000005,61.779999999999994,61.17999999999999,60.35999999999999,59.61,58.900000000000006,57.99,57.239999999999995,56.870000000000005,56.449999999999996,56.38999999999999,56.690000000000005,56.45999999999999,56.51,56.379999999999995,56.11999999999999,56.02,55.63999999999999,55.620000000000005,55.19,55.219999999999985,55.18999999999998,54.959999999999994,54.95,54.80999999999999,54.599999999999994,53.88999999999999,53.32,52.89,52.68999999999999,53.019999999999996,52.91,52.97000000000001,52.86999999999998,53.010000000000005,52.959999999999994,53.05],"color":"green"},{"name":"anthropic","data":[38.150000000000006,38.45,38.79,39.38,40.199999999999996,40.949999999999996,41.68000000000001,42.6,43.35,43.730000000000004,44.11999999999999,44.16999999999999,43.910000000000004,44.120000000000005,44.089999999999996,44.22,44.46999999999999,44.55,44.94,44.95,45.39,45.36,45.379999999999995,45.629999999999995,45.65999999999998,45.76999999999999,45.96999999999999,46.69999999999999,47.269999999999996,47.690000000000005,47.91000000000001,47.59,47.71000000000001,47.63000000000001,47.71000000000001,47.56000000000001,47.65000000000001,47.53000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
