<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.870000000000005,41.48,41.21000000000001,40.93,40.49,39.94,39.73,39.410000000000004,39.29,39.370000000000005,39.50000000000001,39.940000000000005,40.14,40.10000000000001,39.760000000000005,39.11000000000001,39.10000000000001,39.04000000000001,38.620000000000005,38.43,38.78000000000001,38.55,38.69,38.51,38.74,38.96,38.78000000000001,38.730000000000004,38.82000000000001,39.24000000000001,39.82,39.92,40.760000000000005,41.08,40.86000000000001,40.45000000000001,40.23,39.29],"color":"green"},{"name":"anthropic","data":[53.809999999999995,58.19,58.44999999999999,58.76,59.199999999999996,59.739999999999995,59.97,60.260000000000005,60.39,60.31,60.15999999999999,59.75999999999999,59.54999999999999,59.58999999999999,59.91,60.54,60.580000000000005,60.63000000000001,61.06000000000001,61.24,60.90000000000001,61.13,61.00000000000001,61.18,60.95000000000001,60.74000000000001,60.900000000000006,60.95,60.86,60.43000000000001,59.86,59.77,58.92000000000001,58.6,58.800000000000004,59.22000000000001,59.470000000000006,60.400000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
