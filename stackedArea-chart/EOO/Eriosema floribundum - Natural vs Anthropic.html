<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.78999999999999,64.85999999999999,64.63,64.02999999999999,63.51999999999999,63.849999999999994,63.599999999999994,63.230000000000004,62.879999999999995,62.669999999999995,62.02999999999999,61.66,61.489999999999995,61.209999999999994,60.79999999999999,60.61,60.489999999999995,59.9,59.62,59.37,58.97999999999999,58.62999999999999,58.39,58.06999999999999,57.940000000000005,57.6,57.309999999999995,56.76,56.269999999999996,55.769999999999996,55.1,54.449999999999996,54.28999999999999,54.339999999999996,54.23,54.139999999999986,53.959999999999994,53.97999999999999],"color":"green"},{"name":"anthropic","data":[34.809999999999995,34.749999999999986,34.99,35.570000000000014,36.07,35.760000000000005,36.01,36.379999999999995,36.72999999999999,36.95,37.57,37.96,38.099999999999994,38.39999999999999,38.82,38.980000000000004,39.11,39.720000000000006,40,40.239999999999995,40.650000000000006,40.99000000000001,41.22000000000001,41.550000000000004,41.690000000000005,42,42.28999999999999,42.82,43.36999999999999,43.86,44.52,45.169999999999995,45.339999999999996,45.27,45.359999999999985,45.489999999999995,45.66,45.63999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
