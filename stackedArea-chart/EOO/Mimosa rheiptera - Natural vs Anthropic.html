<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.13,85.74000000000001,85.62,84.87999999999998,84.38999999999999,84.16,83.57999999999998,83.16,82.68999999999998,82.46999999999998,81.94000000000001,81.84,81.64,81.37,81.58000000000001,81.41,81.24000000000001,81.08,80.79,80.74,80.57,80.3,80.05000000000001,79.85000000000001,79.64,79.07,78.94,78.89999999999999,78.85999999999999,78.83,78.81,78.64999999999999,78.43,78.12,77.44,77.05,76.87,76.84],"color":"green"},{"name":"anthropic","data":[13.34,13.729999999999999,13.84,14.59,15.08,15.309999999999997,15.899999999999999,16.310000000000002,16.78,17,17.54,17.62,17.82,18.089999999999996,17.9,18.060000000000002,18.22,18.39,18.68,18.74,18.88,19.169999999999998,19.41,19.64,19.84,20.400000000000002,20.52,20.56,20.619999999999997,20.639999999999997,20.67,20.82,21.03,21.35,22.02,22.410000000000004,22.59,22.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
