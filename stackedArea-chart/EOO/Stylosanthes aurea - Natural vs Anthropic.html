<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.839999999999996,50.93999999999998,50.11,49.35999999999999,48.62,47.9,47.169999999999995,46.37999999999999,45.59999999999999,44.82999999999999,44.1,43.449999999999996,42.78999999999999,42.15999999999999,41.56999999999999,40.93999999999999,40.50999999999999,40.019999999999996,39.47999999999999,38.94,38.59999999999999,38.38,38.269999999999996,38.13000000000001,38.1,38.03,37.92,37.72,37.46999999999999,37.25,37.16,37.02,36.94,36.97,36.92,36.9,36.85,37.14],"color":"green"},{"name":"anthropic","data":[51.989999999999995,52.87999999999999,53.69999999999999,54.449999999999996,55.190000000000005,55.88999999999999,56.629999999999995,57.43999999999999,58.179999999999986,58.96999999999999,59.709999999999994,60.370000000000005,60.99999999999999,61.65,62.230000000000004,62.86000000000001,63.31,63.78999999999999,64.32000000000002,64.86,65.20000000000002,65.4,65.53000000000002,65.66,65.71000000000002,65.78,65.88,66.08,66.31000000000002,66.54,66.64999999999999,66.77999999999999,66.88000000000001,66.84,66.87,66.89999999999998,66.98,66.66000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
