<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.45000000000001,35.4,35.17999999999999,35.089999999999996,34.92999999999999,34.849999999999994,34.74,34.739999999999995,34.76999999999999,34.919999999999995,35.019999999999996,35.12999999999999,35.23999999999999,35.27999999999999,35.3,35.19999999999999,35.23999999999999,35.23999999999999,35.25999999999999,35.349999999999994,35.46,35.52,35.6,35.72,35.879999999999995,36.099999999999994,36.279999999999994,36.419999999999995,36.599999999999994,36.749999999999986,36.959999999999994,37.11999999999999,37.21999999999999,37.3,37.37,37.40999999999999,37.639999999999986,37.67],"color":"green"},{"name":"anthropic","data":[57.87,57.910000000000004,58.13,58.230000000000004,58.39000000000001,58.46,58.56,58.570000000000014,58.52,58.39,58.279999999999994,58.16,58.09,58.03,58.01,58.10000000000001,58.080000000000005,58.07000000000001,58.040000000000006,57.980000000000004,57.87,57.78,57.72,57.6,57.449999999999996,57.220000000000006,57.040000000000006,56.88999999999999,56.74,56.56999999999999,56.35,56.19,56.09999999999999,56.01999999999999,55.94999999999999,55.91999999999999,55.68,55.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
