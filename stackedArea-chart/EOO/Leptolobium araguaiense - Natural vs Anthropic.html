<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.07999999999998,76.25999999999999,74.83999999999999,73.91,73.11999999999999,71.83999999999999,70.44999999999999,67.28999999999999,65.32,63.42000000000001,61.540000000000006,59.84,57.93,56.03,53.93000000000001,52.29,50.39,49.6,48.720000000000006,47.37,46.04000000000001,44.87,44.290000000000006,43.88000000000001,44.220000000000006,44.21000000000001,44.28000000000001,43.94,43.110000000000014,41.85,41.06,40.440000000000005,39.7,38.99000000000001,38.45,37.94,37.300000000000004,36.14000000000001],"color":"green"},{"name":"anthropic","data":[23.12,22.93,24.37,25.28,26.080000000000002,27.34,28.759999999999998,31.89,33.86,35.79,37.64999999999999,39.36,41.24,43.15,45.27,46.91,48.78,49.60999999999999,50.449999999999996,51.83,53.150000000000006,54.32,54.900000000000006,55.330000000000005,54.98,54.99000000000001,54.91000000000001,55.230000000000004,56.09,57.339999999999996,58.14,58.74,59.5,60.209999999999994,60.74,61.23999999999999,61.89999999999999,63.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
