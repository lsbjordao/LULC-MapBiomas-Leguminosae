<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.58999999999999,68.36,67.78,67.11000000000001,66.32000000000002,65.62,65.06,64.44999999999999,63.85,63.75,63.879999999999995,64.08,64.74,64.69999999999999,64.66999999999999,64.75,64.41999999999999,64.35,64.02,63.67999999999999,63.319999999999986,63.21,62.989999999999995,63.11,63.22,63.209999999999994,63.00999999999999,62.49999999999999,62.15999999999999,61.769999999999996,61.52999999999999,61.59999999999999,61.53999999999999,61.60999999999999,61.599999999999994,61.65,61.55,61.599999999999994],"color":"green"},{"name":"anthropic","data":[30.42,30.630000000000003,31.230000000000004,31.910000000000004,32.68000000000001,33.4,33.95,34.57,35.15,35.269999999999996,35.129999999999995,34.919999999999995,34.269999999999996,34.32,34.35999999999999,34.279999999999994,34.62,34.68999999999999,35.01,35.36,35.72,35.79,36,35.89999999999999,35.79999999999999,35.80999999999998,36.01999999999999,36.51,36.84999999999999,37.239999999999995,37.480000000000004,37.40999999999999,37.47,37.41,37.39999999999999,37.349999999999994,37.449999999999996,37.4],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
