<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.60000000000001,65.26,63.92999999999999,63.440000000000005,63.17,63.38,64.14,63.949999999999996,65.02,65.67999999999999,66.05,67.08000000000001,67.94000000000001,69.35000000000001,71.92000000000002,74.95,76.54,76.67999999999998,77.16999999999999,76.84000000000002,76.53,76.47000000000001,75.78,75.76,75.97999999999999,77.14999999999998,77.22,77.25999999999998,77.00999999999999,75.60999999999999,74.99999999999999,74.41999999999999,74.72999999999999,74.90000000000002,74.96,74.50999999999999,74.42999999999998,74.39],"color":"green"},{"name":"anthropic","data":[33.89,34.24,35.580000000000005,36.06,36.330000000000005,36.120000000000005,35.36,35.550000000000004,34.470000000000006,33.790000000000006,33.46000000000001,32.42,31.58,30.160000000000004,27.59,24.54,22.96,22.820000000000004,22.340000000000003,22.67,22.990000000000002,23.029999999999998,23.729999999999997,23.74,23.53,22.36,22.27,22.249999999999996,22.519999999999996,23.880000000000003,24.509999999999998,25.080000000000002,24.779999999999998,24.62,24.55,24.980000000000004,25.07,25.1],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
