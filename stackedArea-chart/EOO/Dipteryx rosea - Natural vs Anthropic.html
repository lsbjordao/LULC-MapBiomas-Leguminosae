<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.64000000000001,78.63000000000001,78.60000000000001,78.57000000000001,78.57000000000001,78.54,78.52999999999999,78.5,78.45,78.42999999999999,78.39999999999999,78.35,78.32000000000001,78.27,78.2,78.18,78.15,78.11,78.03999999999999,78.00999999999999,77.92999999999999,77.89,77.85000000000001,77.83,77.82,77.78999999999999,77.76,77.78,77.74999999999999,77.71999999999998,77.66,77.58999999999999,77.55000000000001,77.53,77.46,77.41999999999999,77.30999999999999,77.20999999999998],"color":"green"},{"name":"anthropic","data":[0.5,0.5,0.53,0.5700000000000001,0.6000000000000001,0.6100000000000001,0.6300000000000001,0.6600000000000001,0.6900000000000002,0.7100000000000001,0.75,0.78,0.8200000000000001,0.8800000000000001,0.9400000000000002,0.9600000000000002,0.99,1.03,1.08,1.1400000000000001,1.2000000000000002,1.2600000000000002,1.3000000000000003,1.3100000000000003,1.34,1.3800000000000001,1.3800000000000001,1.3800000000000001,1.3900000000000001,1.4300000000000002,1.4800000000000002,1.5500000000000003,1.59,1.6400000000000003,1.68,1.7300000000000002,1.8200000000000003,1.94],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
