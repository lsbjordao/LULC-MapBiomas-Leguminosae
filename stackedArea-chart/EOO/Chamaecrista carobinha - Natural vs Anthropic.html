<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[81.39,81.27000000000001,81.01999999999998,79.92,79.11000000000001,78.91000000000003,78.65000000000002,78.35000000000001,78.12000000000003,78.01,77.75000000000001,77.36,78.14999999999999,78.24999999999999,78.39000000000001,78.76,78.57,78.37,78.13,78.05999999999999,77.41,77.13,76.97,77.11,77.47000000000001,77.77,77.72,77.15,76.22,75.46000000000001,74.97999999999999,74.92999999999998,74.66,74.22999999999999,74.14999999999999,74.08999999999999,73.82000000000001,73.78000000000002],"color":"green"},{"name":"anthropic","data":[17.960000000000004,18.080000000000002,18.349999999999998,19.449999999999996,20.259999999999998,20.470000000000002,20.7,21.009999999999998,21.25,21.360000000000003,21.600000000000005,21.96,21.23,21.099999999999998,20.969999999999995,20.58,20.759999999999998,20.97,21.2,21.290000000000003,21.94,22.19,22.37,22.22,21.839999999999996,21.579999999999995,21.63,22.21,23.14,23.9,24.389999999999997,24.43,24.679999999999996,25.11,25.200000000000006,25.25,25.519999999999996,25.529999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
