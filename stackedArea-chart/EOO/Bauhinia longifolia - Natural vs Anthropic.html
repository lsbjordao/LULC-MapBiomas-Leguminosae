<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.019999999999996,61.65,60.92000000000001,60.22,59.49999999999999,59.010000000000005,58.50000000000001,57.85999999999999,57.23999999999999,56.58,55.80999999999999,55.18000000000001,54.68,54.15,53.57999999999999,53.120000000000005,52.66999999999999,52.10999999999999,51.379999999999995,50.72999999999999,50.32,50.01,49.849999999999994,49.64,49.559999999999995,49.46,49.31,49.10999999999999,48.89,48.64,48.46,48.31,48.199999999999996,48.099999999999994,47.940000000000005,47.74,47.5,47.209999999999994],"color":"green"},{"name":"anthropic","data":[36.45000000000001,36.809999999999995,37.529999999999994,38.24999999999999,38.96999999999999,39.43,39.93,40.599999999999994,41.230000000000004,41.89,42.64000000000001,43.24000000000001,43.78,44.27,44.85999999999999,45.33,45.78,46.32,47.07999999999999,47.709999999999994,48.12,48.42999999999999,48.61000000000001,48.79000000000001,48.88,48.99,49.13999999999999,49.330000000000005,49.56,49.800000000000004,49.980000000000004,50.11000000000001,50.24000000000001,50.33000000000001,50.53,50.71,50.959999999999994,51.23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
