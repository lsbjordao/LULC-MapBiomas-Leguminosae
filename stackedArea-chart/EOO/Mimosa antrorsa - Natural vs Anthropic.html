<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.769999999999996,53.28000000000001,53,52.47,51.940000000000005,51.75,51.38000000000002,50.85000000000001,50.44000000000001,50.12000000000001,49.580000000000005,49.24,48.919999999999995,48.61,48.2,47.81,47.52000000000001,47.04000000000002,46.68000000000001,46.32,45.990000000000016,45.74,45.56000000000002,45.400000000000006,45.38000000000002,45.18000000000001,45.000000000000014,44.67000000000001,44.32000000000001,43.98000000000001,43.79000000000001,43.52000000000001,43.430000000000014,43.470000000000006,43.34000000000001,43.32,43.20000000000001,43.32],"color":"green"},{"name":"anthropic","data":[46.010000000000005,46.46,46.79,47.31,47.850000000000016,48.00999999999999,48.39000000000001,48.92999999999999,49.31,49.62,50.18000000000001,50.519999999999996,50.82,51.17,51.58000000000001,51.95,52.239999999999995,52.71000000000001,53.050000000000004,53.46,53.78,54.00000000000001,54.209999999999994,54.35999999999999,54.349999999999994,54.59000000000001,54.77,55.07,55.43,55.779999999999994,55.949999999999996,56.22999999999999,56.309999999999995,56.28999999999999,56.370000000000005,56.43,56.52,56.400000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
