<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.68,98.71,98.58000000000001,98.47000000000001,98.45000000000002,98.46,98.47000000000001,98.27,98.02999999999999,97.86000000000003,97.74,97.49,97.19000000000001,96.91,96.77,96.74,96.64999999999999,96.47000000000001,96.18,95.69000000000001,95.42,95.16000000000001,95.03,94.85000000000002,94.60000000000001,94.45000000000002,94.46000000000001,94.39,94.17000000000002,93.96000000000001,93.72000000000003,93.40000000000002,93.29000000000003,93.26,93.04,92.72,92.2,91.61000000000001],"color":"green"},{"name":"anthropic","data":[1.1800000000000002,1.1700000000000002,1.31,1.4000000000000001,1.4300000000000002,1.4000000000000001,1.3900000000000001,1.61,1.85,2,2.13,2.3699999999999997,2.69,2.9699999999999998,3.11,3.1300000000000003,3.2099999999999995,3.41,3.6999999999999997,4.17,4.4399999999999995,4.7299999999999995,4.85,5.02,5.26,5.4,5.42,5.4799999999999995,5.6899999999999995,5.92,6.16,6.47,6.58,6.61,6.83,7.16,7.669999999999999,8.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
