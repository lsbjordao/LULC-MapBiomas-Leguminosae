<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.47,98.46,98.33,98.27,98.25000000000001,98.21000000000001,98.21,98.04,97.89999999999999,97.75000000000001,97.46,97.22000000000001,96.88000000000001,96.66000000000001,96.58,96.49999999999999,96.24999999999999,96.01,95.72,95.25999999999999,94.83999999999999,94.54000000000002,94.31,94.11999999999999,93.94,93.83000000000001,93.75999999999999,93.69,93.50999999999999,93.32,93.06000000000002,92.72,92.47,92.24000000000001,91.82000000000001,91.38,90.81,90.12],"color":"green"},{"name":"anthropic","data":[1.02,1.02,1.1400000000000001,1.22,1.24,1.27,1.28,1.4400000000000002,1.58,1.72,2.02,2.26,2.5999999999999996,2.8299999999999996,2.9099999999999997,2.9799999999999995,3.2299999999999995,3.46,3.76,4.22,4.639999999999999,4.949999999999999,5.17,5.369999999999999,5.539999999999999,5.65,5.71,5.79,5.98,6.159999999999999,6.42,6.7700000000000005,7.01,7.24,7.68,8.09,8.670000000000002,9.370000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
