<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.949999999999996,55.68,55.1,54.5,53.820000000000014,53.39,52.94,52.38000000000001,51.89000000000001,51.550000000000004,51.15000000000001,50.85000000000001,50.710000000000015,50.42000000000001,50.16000000000002,49.87000000000002,49.600000000000016,49.290000000000006,48.940000000000005,48.59000000000001,48.33000000000001,48.15000000000001,48.02000000000001,47.900000000000006,47.80000000000001,47.650000000000006,47.500000000000014,47.13,46.71000000000001,46.41000000000001,46.13000000000002,46.00000000000002,45.890000000000015,45.80000000000002,45.64000000000001,45.45,45.23000000000001,45.15000000000002],"color":"green"},{"name":"anthropic","data":[42.1,42.4,42.99999999999999,43.58999999999999,44.259999999999984,44.679999999999986,45.14,45.699999999999996,46.18,46.519999999999996,46.900000000000006,47.230000000000004,47.38999999999999,47.650000000000006,47.92000000000001,48.209999999999994,48.48,48.76999999999999,49.11999999999998,49.47,49.739999999999995,49.91,50.03999999999999,50.169999999999995,50.280000000000015,50.4,50.540000000000006,50.940000000000005,51.33999999999999,51.66,51.95,52.07,52.18000000000001,52.27,52.45,52.62999999999999,52.84,52.91999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
