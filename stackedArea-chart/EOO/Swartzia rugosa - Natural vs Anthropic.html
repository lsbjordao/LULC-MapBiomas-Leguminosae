<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.75,95.72,95.15,94.34,94.13999999999999,94.36999999999999,94.5,93.54,92.41,91.33999999999999,90.63,89.78999999999999,87.58999999999999,86.39,86.42999999999998,86.26,85.69,85.17999999999999,84.02000000000001,81.91000000000001,79.96,78.19000000000001,77.23,75.97999999999999,74.68,73.72,72.86999999999999,72.60000000000002,72.31,71.70000000000002,70.99000000000002,70.39000000000003,69.36000000000001,68.14,66.01,64.28999999999999,62.769999999999996,61.48],"color":"green"},{"name":"anthropic","data":[3.53,3.55,4.12,4.93,5.13,4.909999999999999,4.779999999999999,5.739999999999999,6.859999999999999,7.949999999999999,8.65,9.49,11.69,12.889999999999999,12.85,13.03,13.58,14.11,15.25,17.35,19.3,21.07,22.04,23.3,24.59,25.55,26.41,26.67,26.96,27.58,28.279999999999998,28.88,29.91,31.13,33.260000000000005,34.980000000000004,36.51,37.78],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
