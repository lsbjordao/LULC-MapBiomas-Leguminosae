<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.65999999999997,68.33999999999999,67.69999999999999,67.02,66.22,65.8,65.30999999999999,64.80999999999999,64.38,63.99,63.51,62.99999999999999,63.059999999999995,62.76,62.36,62.06999999999999,61.589999999999996,61.19,60.73999999999999,60.199999999999996,59.72999999999999,59.32999999999999,59.169999999999995,59.01,58.91,58.919999999999995,58.69,58.04999999999999,57.219999999999985,56.67999999999999,56.29999999999998,56.13999999999999,55.87999999999999,55.469999999999985,55.12999999999999,54.79999999999999,54.4,54.18999999999999],"color":"green"},{"name":"anthropic","data":[29.79,30.11,30.750000000000004,31.430000000000003,32.25,32.67000000000001,33.15,33.64,34.07000000000001,34.47,34.93,35.440000000000005,35.400000000000006,35.690000000000005,36.06000000000001,36.370000000000005,36.85,37.269999999999996,37.709999999999994,38.24000000000001,38.7,39.13999999999999,39.26,39.43,39.52,39.50999999999999,39.739999999999995,40.39,41.18000000000001,41.760000000000005,42.14,42.260000000000005,42.559999999999995,42.96,43.28999999999999,43.63,44.040000000000006,44.25000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
