<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.66999999999999,71.54999999999998,71.03,70.43,69.88000000000001,69.47000000000001,69.03000000000002,68.41000000000003,67.81,67.4,66.85000000000001,66.38000000000001,66.02000000000001,65.49,65.04,64.64,64.16000000000001,63.71,63.08999999999998,62.43000000000001,61.93999999999999,61.56999999999999,61.25000000000001,60.959999999999994,60.769999999999996,60.59999999999999,60.400000000000006,60,59.57,59.209999999999994,58.86,58.58999999999998,58.38999999999999,58.249999999999986,58.01,57.779999999999994,57.419999999999995,57.029999999999994],"color":"green"},{"name":"anthropic","data":[26.920000000000005,27.040000000000003,27.600000000000005,28.200000000000006,28.720000000000006,29.140000000000004,29.600000000000005,30.220000000000002,30.820000000000007,31.220000000000002,31.790000000000006,32.26,32.60000000000001,33.110000000000014,33.60000000000001,33.99000000000001,34.470000000000006,34.910000000000004,35.53000000000001,36.17,36.67,37.059999999999995,37.38,37.65000000000001,37.839999999999996,38.01,38.18,38.599999999999994,39.05000000000001,39.38999999999999,39.77,40.01,40.22,40.349999999999994,40.60999999999999,40.839999999999996,41.20000000000001,41.57],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
