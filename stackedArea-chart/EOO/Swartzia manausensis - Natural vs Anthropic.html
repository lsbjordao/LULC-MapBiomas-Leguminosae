<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.97,98.96000000000001,98.94,98.89000000000001,98.86999999999999,98.88999999999999,98.9,98.85000000000001,98.84,98.86,98.89999999999999,98.86,98.80999999999999,98.72,98.67000000000002,98.69,98.68,98.66,98.59,98.55999999999999,98.53999999999999,98.50000000000001,98.5,98.53,98.5,98.44,98.44,98.47999999999999,98.48,98.45000000000002,98.34,98.2,98.2,98.22,98.23,98.18999999999998,98.13,98.05000000000001],"color":"green"},{"name":"anthropic","data":[0.41,0.42,0.45,0.49,0.5,0.48,0.47000000000000003,0.51,0.54,0.51,0.49,0.52,0.5700000000000001,0.6599999999999999,0.71,0.6799999999999999,0.69,0.74,0.79,0.83,0.86,0.89,0.88,0.85,0.88,0.9400000000000001,0.9500000000000001,0.91,0.9,0.93,1.03,1.1700000000000002,1.1800000000000002,1.1500000000000001,1.1500000000000001,1.1800000000000002,1.2500000000000002,1.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
