<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.21,67.95,66.58,65.53,64.29,63.35000000000001,62.43,60.97,59.529999999999994,57.87,56.160000000000004,54.56000000000001,53.67,52.55999999999999,51.66,50.7,49.92,49.24,48.43000000000001,47.83,47.37,47.059999999999995,46.86,46.67,46.45,46.230000000000004,46.040000000000006,45.67999999999999,45.16,44.79,44.49,44.25,44.09,44.120000000000005,44.02000000000001,44.03,44.01,44.74],"color":"green"},{"name":"anthropic","data":[30.509999999999998,31.759999999999998,33.14,34.190000000000005,35.43,36.36000000000001,37.28,38.76,40.190000000000005,41.84,43.56999999999999,45.169999999999995,46.059999999999995,47.160000000000004,48.06,49.050000000000004,49.78999999999999,50.49,51.28,51.88999999999999,52.36,52.64,52.849999999999994,53.059999999999995,53.28000000000001,53.49000000000001,53.69,54.06,54.55,54.92000000000001,55.230000000000004,55.46000000000001,55.629999999999995,55.60999999999999,55.71,55.67999999999999,55.699999999999996,54.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
