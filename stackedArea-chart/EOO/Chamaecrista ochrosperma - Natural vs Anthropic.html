<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[10.909999999999997,10.79,10.729999999999997,10.709999999999997,10.499999999999998,10.349999999999998,10.229999999999999,10.039999999999997,9.809999999999997,9.659999999999998,9.509999999999998,9.409999999999998,9.379999999999999,9.379999999999997,9.339999999999998,9.299999999999997,9.23,9.13,9.01,8.88,8.769999999999998,8.69,8.62,8.609999999999998,8.549999999999999,8.519999999999998,8.469999999999999,8.379999999999999,8.28,8.209999999999999,8.17,8.120000000000001,8.07,8.08,8.049999999999999,8.02,7.989999999999999,8.040000000000001],"color":"green"},{"name":"anthropic","data":[6.209999999999999,6.329999999999999,6.37,6.39,6.6,6.76,6.859999999999999,7.0699999999999985,7.309999999999999,7.429999999999998,7.589999999999999,7.689999999999999,7.7299999999999995,7.749999999999999,7.7799999999999985,7.829999999999999,7.899999999999999,7.969999999999999,8.1,8.219999999999999,8.36,8.419999999999998,8.49,8.51,8.559999999999999,8.599999999999998,8.639999999999999,8.739999999999998,8.799999999999997,8.899999999999997,8.94,8.999999999999998,9.029999999999998,9.029999999999998,9.059999999999999,9.079999999999998,9.109999999999998,9.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
