<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.18,98.13,97.94999999999999,97.81,97.74000000000001,97.67999999999999,97.60000000000001,97.39999999999999,97.19000000000001,96.98,96.62000000000002,96.32000000000001,96,95.71,95.48,95.29,95.01,94.66999999999999,94.28000000000002,93.78000000000002,93.39999999999999,93.08999999999999,92.86,92.67,92.49999999999999,92.41,92.34000000000002,92.29,92.17999999999999,92.02000000000001,91.80000000000001,91.52999999999999,91.33000000000001,91.12999999999998,90.83999999999999,90.54,90.11999999999999,89.63999999999999],"color":"green"},{"name":"anthropic","data":[1.28,1.35,1.52,1.6600000000000001,1.72,1.78,1.8800000000000001,2.079999999999999,2.2799999999999994,2.4899999999999993,2.8499999999999996,3.1499999999999995,3.48,3.76,3.9999999999999996,4.179999999999999,4.459999999999998,4.789999999999998,5.199999999999998,5.689999999999998,6.079999999999999,6.389999999999999,6.6099999999999985,6.809999999999999,6.979999999999999,7.0699999999999985,7.129999999999998,7.169999999999999,7.289999999999999,7.429999999999999,7.66,7.95,8.15,8.33,8.629999999999999,8.92,9.350000000000001,9.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
