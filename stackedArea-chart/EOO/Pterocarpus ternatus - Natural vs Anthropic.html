<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.27,74.12999999999998,73.53999999999999,72.33,71.52,71.23,71.03999999999999,70.53,70.19999999999999,70.2,69.82000000000001,69.44,70.44000000000001,70.53999999999999,70.85999999999999,71.22,70.92,70.80000000000001,70.71,70.77,69.88,69.61,69.36999999999999,68.98,69.08,69.12,69.04,68.2,67.10000000000001,66.51,66.2,66.94,66.78,66.65,66.61,66.60000000000001,66.53999999999999,66.65],"color":"green"},{"name":"anthropic","data":[25.39,25.53,26.12,27.329999999999995,28.139999999999997,28.430000000000003,28.62,29.12,29.490000000000002,29.48,29.870000000000005,30.250000000000004,29.23,29.13,28.830000000000002,28.479999999999997,28.76,28.880000000000003,28.980000000000004,28.930000000000003,29.800000000000004,30.080000000000002,30.330000000000002,30.720000000000006,30.6,30.57,30.65,31.48,32.59,33.19,33.5,32.76,32.90999999999999,33.04,33.07,33.09,33.14,33.050000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
