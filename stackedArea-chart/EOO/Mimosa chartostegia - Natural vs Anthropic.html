<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.05,27.31,26.619999999999997,25.939999999999998,25.45,25.22,25.02000000000001,24.700000000000003,24.490000000000006,24.390000000000004,24.21000000000001,24.070000000000007,23.93000000000001,23.820000000000004,23.770000000000007,23.550000000000004,23.53000000000001,23.46,23.360000000000007,23.320000000000004,23.410000000000004,23.510000000000005,23.570000000000004,23.620000000000005,23.720000000000002,23.790000000000006,23.880000000000003,23.900000000000002,24.06000000000001,24.160000000000004,24.260000000000005,24.409999999999997,24.480000000000004,24.560000000000006,24.53,24.500000000000007,24.470000000000006,24.49000000000001],"color":"green"},{"name":"anthropic","data":[71.23,71.99,72.67000000000002,73.36,73.85000000000001,74.09,74.30000000000001,74.60000000000002,74.81,74.91000000000001,75.11000000000001,75.27000000000002,75.37000000000002,75.49000000000002,75.54,75.76000000000002,75.78000000000002,75.88000000000002,75.95000000000002,76.01000000000003,75.9,75.80000000000004,75.75000000000003,75.71000000000004,75.60000000000002,75.52000000000005,75.46000000000002,75.41,75.28000000000002,75.16000000000001,75.07000000000002,74.91,74.83000000000003,74.75000000000001,74.77000000000002,74.79000000000002,74.84000000000002,74.82000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
