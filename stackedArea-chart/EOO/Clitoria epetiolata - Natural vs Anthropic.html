<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.400000000000002,29.869999999999997,29.400000000000002,28.910000000000004,28.71,28.62,28.439999999999998,28.200000000000003,28.080000000000002,27.89,27.830000000000002,27.75,27.659999999999997,27.549999999999997,27.55,27.27,27.129999999999995,27.040000000000003,26.98,27.03,27.189999999999998,27.28,27.39,27.450000000000003,27.39,27.419999999999998,27.419999999999998,27.369999999999997,27.319999999999997,27.299999999999994,27.370000000000005,27.419999999999998,27.490000000000002,27.560000000000002,27.6,27.61,27.610000000000003,27.799999999999997],"color":"green"},{"name":"anthropic","data":[62.97,63.51999999999999,63.97999999999999,64.5,64.68,64.78999999999999,64.94,65.17999999999999,65.30000000000003,65.49000000000001,65.57000000000001,65.64,65.73,65.84,65.84,66.13,66.24000000000001,66.36,66.39999999999999,66.38,66.16999999999999,66.1,65.97999999999999,65.95,65.97999999999999,65.96000000000002,65.96000000000001,66.01,66.05000000000001,66.05999999999999,66.04,65.95,65.90000000000002,65.82000000000001,65.78,65.78,65.76000000000002,65.58],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
