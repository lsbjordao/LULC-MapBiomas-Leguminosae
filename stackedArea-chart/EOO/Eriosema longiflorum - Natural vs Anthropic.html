<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.34,41.71,40.99000000000001,40.20000000000001,39.470000000000006,38.86,38.29000000000001,37.620000000000005,37.120000000000005,36.63000000000001,36.080000000000005,35.64000000000001,35.22000000000001,34.89,34.55000000000001,34.16000000000001,33.89000000000001,33.6,33.23,32.91,32.66000000000001,32.52,32.43000000000001,32.38,32.32,32.23000000000001,32.160000000000004,31.960000000000004,31.710000000000004,31.49,31.35,31.270000000000007,31.170000000000005,31.140000000000004,31.030000000000005,30.930000000000007,30.770000000000007,30.85000000000001],"color":"green"},{"name":"anthropic","data":[54.739999999999995,55.38000000000002,56.089999999999996,56.879999999999995,57.63,58.23,58.769999999999996,59.459999999999994,59.98,60.47,61.00000000000001,61.46000000000001,61.870000000000005,62.21,62.510000000000005,62.92,63.18999999999999,63.489999999999995,63.860000000000014,64.16,64.43999999999998,64.58,64.66,64.71,64.76,64.84000000000002,64.94000000000001,65.14,65.38,65.59000000000002,65.72,65.81,65.91,65.97999999999999,66.07999999999998,66.14999999999999,66.33,66.24999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
