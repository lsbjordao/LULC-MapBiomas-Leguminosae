<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.28999999999999,71.92,71.81,71.8,71.75,71.92,71.85000000000001,71.77,71.55,71.42,71.24000000000001,71.17999999999999,71.3,71.46000000000001,71.49,71.36,71.24,70.89999999999998,70.75999999999999,70.63,70.75,70.76,70.67999999999999,70.75,70.85999999999999,70.83,70.80000000000001,70.86,70.92999999999999,71.05000000000001,71.24000000000001,71.26,71.33,71.28,71.19,71.02,70.89,70.79],"color":"green"},{"name":"anthropic","data":[27.23,27.609999999999996,27.709999999999997,27.72,27.769999999999996,27.62,27.66,27.74,27.979999999999997,28.11,28.3,28.36,28.22,28.060000000000002,28.040000000000003,28.16,28.28,28.64,28.78,28.880000000000003,28.76,28.770000000000003,28.830000000000002,28.790000000000003,28.660000000000004,28.679999999999996,28.729999999999997,28.66,28.610000000000003,28.470000000000002,28.29,28.25,28.199999999999996,28.249999999999996,28.34,28.51,28.630000000000003,28.740000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
