<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.56000000000002,72.94,72.8,72.44,71.6,71.11,70.43999999999998,69.93999999999998,69.22999999999999,68.57,67.94,67.11000000000001,66.60999999999999,66.03,65.34,64.69,64.09,63.46,62.839999999999996,61.75000000000001,61.14999999999999,60.57,60.13999999999999,59.45,58.90000000000001,58.46,57.940000000000005,56.99999999999999,56.21,55.69,55.26,54.96,54.67000000000001,54.36,53.8,53.230000000000004,52.57999999999999,51.92],"color":"green"},{"name":"anthropic","data":[26.950000000000003,26.580000000000002,26.700000000000003,27.060000000000006,27.890000000000004,28.37,29.050000000000004,29.54,30.24,30.92,31.56,32.410000000000004,32.879999999999995,33.5,34.15,34.809999999999995,35.41,36.02,36.68,37.760000000000005,38.330000000000005,38.93,39.36000000000001,40.02,40.559999999999995,41.029999999999994,41.55999999999999,42.47999999999999,43.290000000000006,43.8,44.230000000000004,44.519999999999996,44.800000000000004,45.11,45.68999999999999,46.26,46.93000000000001,47.57000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
