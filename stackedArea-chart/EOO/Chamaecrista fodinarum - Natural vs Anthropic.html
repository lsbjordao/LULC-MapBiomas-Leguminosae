<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.67999999999999,44.809999999999995,44.66,44.63,44.44,44.440000000000005,44.169999999999995,43.64999999999999,43.72,43.68,43.45,43.36000000000001,43.129999999999995,43.21,43.31000000000001,43.31999999999999,43.489999999999995,43.989999999999995,44.38999999999999,44.91,45.27,45.45000000000001,45.61000000000001,45.43,45.05,44.92999999999999,44.78,44.75,44.540000000000006,44.28000000000001,44.18,44.39000000000001,44.620000000000005,44.620000000000005,44.470000000000006,44.49,44.45,45.040000000000006],"color":"green"},{"name":"anthropic","data":[55.440000000000005,55.31,55.45,55.51,55.69,55.69,55.949999999999996,56.470000000000006,56.41,56.46,56.68000000000001,56.760000000000005,57,56.93000000000001,56.83,56.809999999999995,56.629999999999995,56.15,55.73,55.22999999999999,54.86999999999999,54.67999999999999,54.52999999999999,54.709999999999994,55.099999999999994,55.18999999999999,55.339999999999996,55.38,55.59,55.86,55.97,55.739999999999995,55.52000000000001,55.52,55.650000000000006,55.64,55.68000000000001,55.1],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
