<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.03999999999999,99.03,99.02000000000001,98.99000000000001,99.01,99.03,99.03999999999999,99.00999999999999,98.94,98.94,98.96000000000001,98.9,98.79000000000002,98.66000000000001,98.60000000000001,98.63,98.65,98.66,98.61,98.55,98.47,98.38999999999999,98.38,98.37999999999998,98.33,98.25999999999999,98.25,98.27,98.22000000000001,98.16999999999999,98.05,97.89,97.81,97.78999999999999,97.71000000000001,97.58999999999999,97.38,97.01],"color":"green"},{"name":"anthropic","data":[0.45,0.44999999999999996,0.47,0.48,0.48,0.45999999999999996,0.44000000000000006,0.48,0.53,0.54,0.53,0.5900000000000001,0.6900000000000001,0.8200000000000001,0.87,0.8500000000000001,0.8300000000000001,0.8400000000000001,0.8800000000000001,0.9400000000000001,1.03,1.11,1.11,1.11,1.1700000000000002,1.25,1.25,1.22,1.26,1.31,1.4200000000000002,1.6,1.6900000000000002,1.7000000000000002,1.78,1.8900000000000001,2.11,2.4899999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
