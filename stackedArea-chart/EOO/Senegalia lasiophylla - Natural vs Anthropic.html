<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.81,63.57,62.94000000000001,62.29,61.47000000000001,60.88000000000002,60.25000000000002,59.55000000000002,58.90000000000001,58.52,58.150000000000006,57.890000000000015,57.94000000000001,57.7,57.45000000000001,57.28,56.91000000000001,56.60000000000001,56.17000000000001,55.66000000000002,55.27000000000001,55.06,54.86000000000001,54.74,54.67000000000001,54.52,54.31,53.750000000000014,53.300000000000004,52.88,52.550000000000004,52.480000000000004,52.38,52.339999999999996,52.19,52.07000000000001,51.900000000000006,51.85000000000001],"color":"green"},{"name":"anthropic","data":[32.580000000000005,32.81000000000001,33.46,34.11000000000001,34.94,35.529999999999994,36.13999999999999,36.84,37.489999999999995,37.879999999999995,38.24999999999999,38.49999999999999,38.44999999999999,38.69999999999998,38.92999999999999,39.1,39.46999999999999,39.78000000000001,40.22,40.720000000000006,41.12,41.31,41.56,41.66,41.72,41.839999999999996,42.08999999999999,42.64,43.070000000000014,43.49,43.82999999999999,43.91,44,44.040000000000006,44.19000000000001,44.29,44.46,44.53],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
