<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.48,79.38,78.82000000000001,78.18,77.47000000000001,76.94000000000001,76.41000000000001,75.65,74.96,74.53000000000002,74.05000000000001,73.71,73.57,73.11000000000001,72.63000000000001,72.34000000000002,71.76,71.30000000000001,70.57000000000001,69.8,69.09,68.65,68.27000000000001,68.04,67.88000000000001,67.64000000000001,67.39000000000001,66.74000000000001,66.16000000000001,65.7,65.28999999999999,65.07000000000001,64.81,64.56,64.25999999999999,63.97999999999999,63.589999999999996,63.07],"color":"green"},{"name":"anthropic","data":[19.889999999999997,19.96,20.550000000000004,21.190000000000005,21.880000000000003,22.430000000000003,22.95000000000001,23.680000000000007,24.390000000000004,24.830000000000005,25.33,25.67,25.780000000000005,26.260000000000005,26.72,27.029999999999998,27.63,28.08,28.8,29.56,30.279999999999998,30.72999999999999,31.089999999999996,31.34,31.480000000000004,31.700000000000003,32.00000000000001,32.61,33.21000000000001,33.66000000000001,34.09000000000001,34.28000000000001,34.52,34.779999999999994,35.07999999999999,35.37999999999999,35.75,36.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
