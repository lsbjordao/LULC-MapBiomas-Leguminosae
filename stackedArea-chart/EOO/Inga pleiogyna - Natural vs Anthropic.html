<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.91,45.16,44.28,43.63,42.88,42.52,42.22000000000001,42.070000000000014,42.00000000000001,41.910000000000004,41.53,41.31999999999999,41.11,40.89,40.58,40.14999999999999,40.00999999999999,39.760000000000005,39.72,39.53,39.28999999999999,39.25,39.24,39.309999999999995,39.400000000000006,39.43000000000001,39.60000000000001,39.660000000000004,39.58,39.559999999999995,39.580000000000005,39.48,39.290000000000006,39.25,39.21,39.06,39.470000000000006,39.81000000000001],"color":"green"},{"name":"anthropic","data":[24.41,24.16,25.05,25.700000000000003,26.479999999999997,26.84,27.13,27.28,27.35,27.46,27.82,28.049999999999997,28.230000000000004,28.47,28.759999999999998,29.18,29.339999999999996,29.57,29.62,29.82,30.05,30.09,30.110000000000003,30.03,29.950000000000003,29.92,29.740000000000002,29.71,29.79,29.790000000000003,29.780000000000005,29.88,30.089999999999996,30.11,30.14,30.300000000000004,29.900000000000002,29.560000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
