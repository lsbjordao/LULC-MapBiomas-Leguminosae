<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.46,63.13,62.50000000000001,61.93000000000001,61.23,60.74,60.190000000000005,59.49,58.89000000000001,58.35,57.779999999999994,57.27,56.97,56.57000000000001,56.18,55.790000000000006,55.420000000000016,55.000000000000014,54.43000000000001,53.890000000000015,53.48000000000001,53.23000000000001,53.05000000000001,52.88,52.780000000000015,52.610000000000014,52.40000000000001,51.94,51.45,51.04000000000001,50.70000000000002,50.50000000000002,50.31000000000002,50.220000000000006,50.03000000000002,49.860000000000014,49.640000000000015,49.53000000000001],"color":"green"},{"name":"anthropic","data":[33.95,34.27,34.88999999999999,35.47999999999999,36.16,36.65999999999999,37.230000000000004,37.88999999999999,38.5,39.040000000000006,39.60999999999999,40.13,40.42,40.81999999999999,41.23999999999999,41.609999999999985,42.00000000000001,42.38,42.96,43.49999999999999,43.90999999999999,44.15999999999999,44.320000000000014,44.52,44.62,44.790000000000006,44.999999999999986,45.44,45.919999999999995,46.35,46.70000000000002,46.89000000000001,47.070000000000014,47.18,47.370000000000005,47.540000000000006,47.739999999999995,47.86],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
