<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.55,74.69,74.53000000000002,74.44000000000001,73.37000000000003,73.12,73.01,72.59000000000002,71.85,71.36999999999999,70.74999999999999,70.39,70.63,70.86,71.13000000000001,71.77,71.71,71.32,71.05,70.52,69.78,69.38,68.91,68.64999999999999,68.45,67.92999999999999,67.38,66.82000000000001,66.12,65.38,64.92999999999999,64.41,63.999999999999986,63.97,63.54999999999999,62.97999999999999,62.38999999999999,61.53999999999999],"color":"green"},{"name":"anthropic","data":[24.880000000000006,24.750000000000004,24.90000000000001,24.979999999999997,26.05,26.300000000000008,26.39,26.820000000000004,27.57,28.06,28.640000000000004,29.01,28.790000000000003,28.56,28.29,27.63,27.709999999999997,28.110000000000007,28.339999999999996,28.899999999999995,29.64,30.039999999999996,30.499999999999996,30.759999999999998,30.949999999999996,31.479999999999997,32.03999999999999,32.59,33.300000000000004,34.02,34.47,34.98,35.38,35.42,35.86,36.42,37.01,37.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
