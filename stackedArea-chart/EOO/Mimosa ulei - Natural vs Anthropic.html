<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.12,94.28999999999999,94.3,94.25,94.05,93.88000000000001,93.84,93.75,93.67999999999999,93.58,93.43,93.42999999999999,93.38000000000001,93.30000000000001,93.42,93.46,93.44000000000001,93.41000000000001,93.35000000000001,93.42,93.45000000000002,93.37,93.32000000000001,93.27,93.27,93.17999999999999,93.17000000000002,93.26,93.33,93.36999999999999,93.43,93.45,93.50999999999999,93.56,93.51,93.47999999999999,93.47,93.34],"color":"green"},{"name":"anthropic","data":[5.26,5.08,5.08,5.140000000000001,5.32,5.489999999999999,5.53,5.619999999999999,5.71,5.81,5.95,5.960000000000001,6.02,6.09,5.969999999999999,5.92,5.94,5.960000000000001,6.029999999999999,5.95,5.95,6.009999999999999,6.05,6.109999999999999,6.109999999999999,6.22,6.22,6.12,6.039999999999999,6,5.959999999999999,5.919999999999999,5.869999999999999,5.809999999999999,5.88,5.909999999999999,5.93,6.040000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
