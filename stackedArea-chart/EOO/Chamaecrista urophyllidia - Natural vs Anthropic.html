<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.25999999999999,58.57999999999999,57.83999999999999,57.07999999999999,57.11999999999999,58.23,58.349999999999994,58.25999999999999,58.26,58.05,57.809999999999995,57.96000000000001,58.459999999999994,58.64999999999999,59.190000000000005,59.38,59.26,58.739999999999995,58.58,58.349999999999994,58.179999999999986,58.129999999999995,57.879999999999995,57.49,57.290000000000006,56.919999999999995,56.489999999999995,55.790000000000006,55.239999999999995,54.660000000000004,53.79999999999998,52.82,52.92999999999999,53.51999999999999,53.469999999999985,53.44999999999998,53.39999999999999,53.41999999999999],"color":"green"},{"name":"anthropic","data":[40.720000000000006,40.410000000000004,41.13000000000001,41.9,41.83999999999999,40.749999999999986,40.629999999999995,40.709999999999994,40.709999999999994,40.95999999999999,41.18,41.02999999999999,40.51999999999999,40.33,39.81,39.59,39.730000000000004,40.24999999999999,40.41000000000001,40.629999999999995,40.78,40.85,41.11000000000001,41.49999999999999,41.699999999999996,42.059999999999995,42.480000000000004,43.199999999999996,43.75999999999999,44.33,45.19,46.169999999999995,46.03999999999999,45.47,45.49,45.519999999999996,45.57000000000001,45.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
