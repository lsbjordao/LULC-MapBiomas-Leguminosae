<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.24000000000001,78.63999999999997,77.75,76.6,75.46,74.92999999999998,74.88,75.16000000000001,74.75,74.27000000000001,74.17000000000002,73.77000000000001,73.02000000000004,72.73,72.82,72.1,72.75000000000001,72.4,72.44000000000001,72.20000000000002,71.67,71.35,71.65999999999998,72.19000000000001,72.94999999999999,73.24000000000001,73.11999999999999,73.01999999999998,72.3,71.86999999999999,71.8,71.17999999999999,70.44999999999999,71.23,71.38999999999999,71.64,73.26,73.66],"color":"green"},{"name":"anthropic","data":[13.11,13.770000000000001,14.66,15.82,16.97,17.51,17.54,17.27,17.69,18.16,18.25,18.65,19.39,19.69,19.599999999999998,20.3,19.650000000000002,20.009999999999998,19.98,20.21,20.740000000000002,21.080000000000002,20.77,20.25,19.46,19.189999999999998,19.29,19.400000000000002,20.150000000000002,20.56,20.61,21.26,21.99,21.2,21.060000000000002,20.8,19.169999999999998,18.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
