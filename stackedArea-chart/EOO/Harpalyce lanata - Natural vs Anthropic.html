<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.47999999999998,69.36999999999999,68.56,67.86999999999999,67.47999999999999,67.35,67.83999999999999,67.58,68.22999999999999,68.30999999999999,68.36,69.27999999999999,69.72,70.29,72.16000000000001,76.21999999999998,77.38,77.7,78.18,77.49,77.08,76.65,75.67999999999999,75.39,74.99999999999999,75.27,75.08999999999999,75.06,74.39999999999999,73.47999999999999,72.92000000000002,72.21,72.05999999999999,72.07000000000001,71.7,71.09999999999998,71.03999999999999,71.1],"color":"green"},{"name":"anthropic","data":[29.67,29.79,30.580000000000002,31.27,31.680000000000003,31.79,31.3,31.57,30.919999999999998,30.83,30.79,29.86,29.430000000000003,28.85,26.99,22.93,21.759999999999998,21.44,20.98,21.64,22.06,22.500000000000004,23.46,23.740000000000002,24.139999999999997,23.889999999999997,24.049999999999997,24.08,24.75,25.66,26.23,26.929999999999996,27.09,27.07,27.44,28.04,28.1,28.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
