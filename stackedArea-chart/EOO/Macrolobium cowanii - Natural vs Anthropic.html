<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.92999999999999,96.89999999999999,96.35000000000002,95.78,95.39999999999999,95.34,95.27,94.01,93.47,92.89999999999999,92.32999999999998,91.67999999999999,90.67,89.46,89.00999999999999,88.68,88.29999999999998,87.50999999999999,86.88,85.92999999999999,84.96999999999998,83.97999999999999,83.22,82.09,81.55,81.39999999999999,81.19,81.1,80.76999999999998,80.65,80.38000000000001,79.89999999999999,79.64,79.31000000000002,78.86,78.50999999999999,77.78999999999999,76.80000000000001],"color":"green"},{"name":"anthropic","data":[6.46,6.5,7.04,7.63,8,8.059999999999999,8.129999999999999,9.4,9.940000000000001,10.510000000000002,11.07,11.73,12.73,13.940000000000001,14.39,14.73,15.1,15.900000000000002,16.52,17.46,18.439999999999998,19.43,20.2,21.31,21.86,21.999999999999996,22.22,22.3,22.63,22.74,23.009999999999998,23.509999999999998,23.759999999999998,24.09,24.54,24.88,25.610000000000003,26.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
