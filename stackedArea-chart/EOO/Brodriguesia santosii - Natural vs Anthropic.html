<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.62,28.639999999999997,28.049999999999997,27.649999999999995,27.23999999999999,27.099999999999994,26.899999999999995,26.73,26.55,26.48,26.210000000000004,26.06,25.889999999999997,25.79,25.519999999999996,25.169999999999998,25.049999999999997,24.889999999999997,24.839999999999996,24.680000000000003,24.44,24.34,24.360000000000003,24.47,24.549999999999997,24.52,24.57,24.630000000000003,24.59,24.73,24.84,24.889999999999997,24.840000000000007,24.830000000000002,24.849999999999994,24.780000000000005,24.970000000000006,25.260000000000005],"color":"green"},{"name":"anthropic","data":[24.68,24.64,25.24,25.68,26.08,26.24,26.43,26.619999999999997,26.779999999999998,26.86,27.13,27.26,27.439999999999998,27.55,27.799999999999994,28.18,28.29,28.450000000000003,28.48,28.64,28.88,28.990000000000002,28.96,28.849999999999998,28.789999999999996,28.82,28.73,28.700000000000003,28.750000000000004,28.63,28.52,28.460000000000004,28.509999999999998,28.509999999999998,28.509999999999998,28.589999999999996,28.4,28.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
