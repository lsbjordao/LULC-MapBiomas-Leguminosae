<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.00999999999999,72.94000000000001,72.35000000000001,71.72000000000003,71.01,70.44000000000001,70.02000000000002,69.52000000000001,69.06000000000002,69.08999999999999,69.22999999999998,69.33999999999997,69.74999999999999,69.59000000000002,69.39999999999999,69.31999999999998,68.94,68.76,68.44000000000001,68.12,67.74000000000001,67.64,67.44,67.49000000000001,67.55,67.44,67.2,66.58000000000001,66.02000000000002,65.55000000000001,65.26000000000002,65.28,65.10000000000001,64.97999999999999,64.83,64.71,64.57,64.48999999999998],"color":"green"},{"name":"anthropic","data":[25.45,25.520000000000003,26.11,26.73,27.450000000000006,28.020000000000003,28.440000000000005,28.92000000000001,29.380000000000006,29.390000000000004,29.230000000000008,29.110000000000007,28.710000000000004,28.86000000000001,29.060000000000006,29.17,29.519999999999996,29.7,30.020000000000003,30.360000000000007,30.720000000000006,30.819999999999997,31.000000000000004,30.960000000000004,30.91,31.03,31.270000000000007,31.880000000000006,32.44,32.910000000000004,33.190000000000005,33.18,33.37,33.46999999999999,33.61999999999999,33.75,33.900000000000006,33.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
