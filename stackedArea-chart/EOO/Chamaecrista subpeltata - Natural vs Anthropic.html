<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.91999999999999,86.81,86.85000000000001,86.76,86.81,86.59,86.33,86.01,85.91000000000001,85.79999999999998,85.52999999999999,85.24,84.99999999999999,84.83,84.6,84.22999999999999,83.84,83.55,83.23,82.71999999999998,82.16,81.71999999999998,81.23,80.9,80.47,80.48,80.43,79.75,78.55999999999999,77.75,77.17,76.71,76.56,76.34,75.73,74.94000000000001,74.30000000000003,74.05000000000001],"color":"green"},{"name":"anthropic","data":[13.219999999999999,12.329999999999998,12.290000000000001,12.39,12.33,12.559999999999999,12.82,13.14,13.24,13.35,13.610000000000001,13.89,14.149999999999999,14.29,14.54,14.909999999999998,15.31,15.6,15.909999999999998,16.42,16.97,17.410000000000004,17.89,18.230000000000004,18.68,18.67,18.72,19.38,20.58,21.389999999999997,21.98,22.439999999999998,22.58,22.79,23.42,24.21,24.849999999999998,25.07],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
