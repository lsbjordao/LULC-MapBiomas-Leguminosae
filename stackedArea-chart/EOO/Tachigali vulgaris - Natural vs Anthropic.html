<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.92,78.69999999999999,78.15,77.6,77.05999999999997,76.66,76.21,75.58,74.99999999999999,74.46999999999998,73.78999999999998,73.21999999999998,72.74999999999999,72.20999999999998,71.64999999999999,71.19999999999999,70.69999999999999,70.17999999999999,69.50999999999999,68.84,68.33,67.94,67.66999999999999,67.41000000000001,67.23,67.10000000000001,66.94,66.7,66.38999999999999,66.10000000000001,65.78,65.53999999999999,65.33999999999999,65.19000000000001,64.92,64.71000000000001,64.35000000000001,63.870000000000005],"color":"green"},{"name":"anthropic","data":[20.09,20.28,20.85,21.380000000000003,21.92,22.330000000000005,22.780000000000005,23.410000000000007,23.99000000000001,24.530000000000005,25.190000000000005,25.77000000000001,26.25000000000001,26.810000000000002,27.340000000000007,27.819999999999997,28.280000000000005,28.8,29.499999999999996,30.139999999999993,30.65,31.03,31.31,31.59,31.760000000000005,31.860000000000003,32.03000000000001,32.290000000000006,32.59000000000002,32.890000000000015,33.18000000000001,33.46,33.650000000000006,33.81000000000001,34.05000000000001,34.27,34.63,35.080000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
