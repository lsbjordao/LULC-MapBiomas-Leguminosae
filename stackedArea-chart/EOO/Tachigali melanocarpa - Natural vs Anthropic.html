<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.37,98.40000000000002,98.32,98.27,98.28,98.22000000000001,98.2,98.05000000000001,97.9,97.8,97.51,97.32,97.04,96.82000000000001,96.83,96.78999999999999,96.57000000000001,96.48,96.45,96.31,96.15,96.01,95.97,95.89,95.81,95.77000000000001,95.84,95.86999999999999,95.77000000000001,95.66000000000001,95.46,95.15,95.09,95.08,95.03,94.91,94.71000000000002,94.35],"color":"green"},{"name":"anthropic","data":[1.42,1.3900000000000001,1.49,1.53,1.51,1.57,1.6,1.75,1.9000000000000001,2.01,2.3,2.48,2.76,2.98,2.9899999999999998,3.01,3.2199999999999998,3.309999999999999,3.3599999999999994,3.4899999999999993,3.6599999999999993,3.7999999999999994,3.8299999999999996,3.91,4,4.01,3.97,3.93,4.029999999999999,4.1499999999999995,4.339999999999999,4.6499999999999995,4.72,4.72,4.75,4.88,5.069999999999999,5.46],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
