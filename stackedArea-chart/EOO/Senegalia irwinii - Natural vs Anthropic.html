<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.22,56.07000000000001,55.56,55.019999999999996,54.35999999999999,54.06000000000002,53.64,53.18,52.739999999999995,52.64000000000001,52.39,52.22,52.46,52.31999999999999,52.17,52.03,51.779999999999994,51.519999999999996,51.25,51.02000000000001,50.81000000000001,50.68000000000001,50.58000000000001,50.57000000000001,50.53,50.49,50.379999999999995,50.11000000000001,49.71999999999999,49.39,49.11000000000001,49.05,49,49.1,49.080000000000005,49.09,49.089999999999996,49.150000000000006],"color":"green"},{"name":"anthropic","data":[42.07000000000001,42.21000000000001,42.74000000000001,43.3,43.95,44.25000000000001,44.67000000000001,45.120000000000005,45.57,45.67,45.92,46.06999999999999,45.83,45.99999999999999,46.13,46.25000000000001,46.519999999999996,46.76,47.04,47.3,47.48,47.61,47.709999999999994,47.73,47.75999999999999,47.779999999999994,47.910000000000004,48.19999999999999,48.559999999999995,48.91999999999999,49.209999999999994,49.28999999999998,49.32,49.21000000000001,49.22999999999999,49.20000000000001,49.20000000000001,49.15],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
