<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.34,90.89000000000001,90.83000000000001,90.74999999999999,90.72,90.59,90.42,90.27,90.14,90.00000000000001,89.82,89.45,89.19000000000001,88.88,88.44,88.07000000000002,87.54,87.11000000000001,86.75,85.70000000000002,84.92000000000002,84.27000000000001,83.77999999999999,83.21,82.71000000000001,82.16,81.7,80.7,79.88000000000001,79.22000000000001,78.48000000000002,78,77.55,77.06,76.23,75.13000000000001,74.34,73.55],"color":"green"},{"name":"anthropic","data":[9.149999999999999,8.6,8.66,8.73,8.770000000000001,8.9,9.06,9.219999999999999,9.35,9.48,9.67,10.030000000000001,10.29,10.590000000000002,11.04,11.42,11.94,12.370000000000001,12.740000000000002,13.8,14.58,15.2,15.700000000000001,16.29,16.770000000000003,17.330000000000002,17.759999999999998,18.77,19.6,20.26,20.99,21.470000000000002,21.92,22.42,23.25,24.36,25.140000000000004,25.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
