<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.99999999999999,44.49000000000001,44.029999999999994,43.79,43.17999999999999,42.43999999999999,41.74,40.949999999999996,40.13999999999999,39.21,38.59,38.09,37.47,37.24,36.900000000000006,36.69999999999999,36.64,36.18,35.65,35.11,34.78,34.629999999999995,34.52,34.41,34.66,34.68,34.76,34.75,34.720000000000006,34.57000000000001,34.43000000000001,34.220000000000006,33.96000000000001,33.800000000000004,33.56,33.4,33.2,34.07000000000001],"color":"green"},{"name":"anthropic","data":[53.370000000000005,54.879999999999995,55.34,55.58000000000001,56.19,56.93,57.629999999999995,58.42000000000001,59.22,60.18000000000001,60.779999999999994,61.27,61.89000000000001,62.13,62.459999999999994,62.67,62.73,63.19,63.709999999999994,64.28,64.57,64.73,64.85000000000001,64.96,64.7,64.67,64.62,64.61,64.65000000000002,64.81000000000002,64.96000000000001,65.14999999999999,65.39999999999999,65.57,65.79999999999998,65.97,66.17999999999999,65.30000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
