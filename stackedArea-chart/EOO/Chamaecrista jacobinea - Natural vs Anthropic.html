<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.68,56.449999999999996,56.38999999999999,55.63999999999999,54.709999999999994,53.97,53.42999999999999,52.43,51.61,51.17999999999999,50.86,50.870000000000005,51.32,51.379999999999995,51.339999999999996,51.44,51.16,50.9,50.339999999999996,49.830000000000005,49.09,49.07,48.879999999999995,48.69,48.98,48.94,48.839999999999996,48.63000000000001,48.47,48.220000000000006,48.17,48.38,48.07000000000001,47.85000000000001,47.690000000000005,47.61000000000001,47.5,47.46000000000001],"color":"green"},{"name":"anthropic","data":[42.72999999999999,42.95999999999999,43.01999999999999,43.769999999999996,44.69,45.43,45.949999999999996,46.97,47.77,48.22,48.519999999999996,48.54,48.06999999999999,48.00999999999999,48.06,47.959999999999994,48.24999999999999,48.519999999999996,49.07999999999999,49.58,50.300000000000004,50.339999999999996,50.51999999999999,50.699999999999996,50.419999999999995,50.47,50.580000000000005,50.779999999999994,50.95,51.19,51.259999999999984,51.02,51.309999999999995,51.55,51.72,51.78999999999999,51.88999999999999,51.93000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
