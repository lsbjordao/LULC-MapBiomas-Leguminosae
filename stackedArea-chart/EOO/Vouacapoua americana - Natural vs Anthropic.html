<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.03000000000002,99.02000000000001,98.9,98.83999999999999,98.8,98.75999999999999,98.72000000000001,98.60000000000002,98.48000000000002,98.34,98.12,97.93,97.69,97.50000000000001,97.43,97.38999999999999,97.22,97.05999999999999,96.92,96.66,96.42,96.22000000000001,96.11000000000001,96.00000000000001,95.87,95.81000000000002,95.81000000000002,95.78000000000002,95.68000000000002,95.57,95.42000000000003,95.19,95.05000000000001,94.91000000000003,94.69000000000001,94.48,94.17,93.75],"color":"green"},{"name":"anthropic","data":[0.89,0.92,1.03,1.1,1.1300000000000001,1.1700000000000002,1.23,1.33,1.4500000000000002,1.58,1.81,2,2.2499999999999996,2.4099999999999997,2.4899999999999998,2.55,2.7199999999999998,2.86,3.01,3.27,3.51,3.7099999999999995,3.82,3.92,4.039999999999999,4.089999999999999,4.119999999999998,4.139999999999999,4.239999999999999,4.3500000000000005,4.510000000000001,4.74,4.87,5,5.21,5.4399999999999995,5.76,6.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
