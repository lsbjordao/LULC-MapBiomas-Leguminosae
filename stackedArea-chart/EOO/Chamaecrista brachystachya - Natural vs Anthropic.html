<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.61,47.52,46.989999999999995,46.59000000000001,46.10000000000001,45.78,45.349999999999994,44.80999999999999,44.349999999999994,44.009999999999984,43.86,43.92999999999999,44.059999999999995,44.06999999999999,44.08,43.849999999999994,43.63999999999999,43.51,43.339999999999996,43.18,43.230000000000004,43.41,43.46999999999999,43.459999999999994,43.33,43.25,43.17999999999999,42.98999999999999,42.85999999999999,42.73999999999999,42.69999999999999,42.88,42.89,42.89,42.86,42.819999999999986,42.86999999999999,43.00999999999999],"color":"green"},{"name":"anthropic","data":[47.41,47.489999999999995,48.039999999999985,48.42999999999999,48.90999999999999,49.23999999999999,49.679999999999986,50.23999999999999,50.669999999999995,51.019999999999996,51.16999999999999,51.099999999999994,50.98,50.959999999999994,50.95999999999998,51.18999999999999,51.39999999999999,51.5,51.699999999999996,51.86999999999999,51.78999999999999,51.64,51.559999999999995,51.58,51.709999999999994,51.77999999999999,51.859999999999985,52.03999999999998,52.160000000000004,52.26,52.309999999999995,52.15,52.15,52.14999999999999,52.18999999999999,52.21999999999999,52.16,52.01999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
