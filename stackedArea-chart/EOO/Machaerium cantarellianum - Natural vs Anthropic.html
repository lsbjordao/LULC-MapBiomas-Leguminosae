<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.640000000000004,28.39,28.070000000000004,27.880000000000003,27.740000000000002,27.71,27.650000000000002,27.730000000000004,27.790000000000006,27.940000000000005,28.020000000000007,28.110000000000003,28.270000000000003,28.28,28.349999999999998,28.240000000000002,28.31,28.299999999999997,28.259999999999994,28.359999999999996,28.47,28.6,28.7,28.81,29,29.189999999999998,29.380000000000003,29.500000000000004,29.640000000000004,29.770000000000003,29.950000000000003,30.060000000000002,30.199999999999996,30.310000000000002,30.39,30.470000000000002,30.720000000000006,30.84],"color":"green"},{"name":"anthropic","data":[66.53000000000002,66.75000000000001,67.07000000000002,67.26000000000002,67.38000000000002,67.44000000000003,67.51,67.43,67.33000000000001,67.21000000000001,67.13000000000001,67.02,66.90000000000002,66.87,66.77,66.91,66.84,66.83,66.87,66.78,66.69000000000001,66.54000000000002,66.44000000000001,66.34000000000002,66.17000000000002,65.96000000000002,65.78000000000002,65.67,65.52000000000001,65.39,65.19,65.09000000000002,64.94,64.82000000000001,64.76,64.66000000000001,64.4,64.28999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
