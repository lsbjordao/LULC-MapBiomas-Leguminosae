<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.12,33.07000000000001,31.44,29.59,28.58,27.97,27,27,27.060000000000002,26.96,26.74,26.280000000000005,26.1,25.74,25.64,25.530000000000005,25.670000000000005,25.740000000000002,26.07,26.2,26.23,26.510000000000005,26.700000000000006,26.580000000000002,26.729999999999997,26.72,26.61,26.54,26.37,26.349999999999998,26.3,26.069999999999997,26.160000000000004,26.480000000000004,26.750000000000007,26.960000000000004,27.21,27.66],"color":"green"},{"name":"anthropic","data":[61.02000000000001,62.17000000000001,63.84,65.69999999999999,66.73,67.36,68.30999999999999,68.30999999999999,68.28,68.35999999999999,68.58,69.03999999999999,69.24000000000001,69.58000000000001,69.67999999999999,69.8,69.66,69.58999999999999,69.28999999999999,69.14,69.1,68.82000000000001,68.63,68.74000000000001,68.59,68.62,68.74,68.84,69.01,69.02000000000001,69.08,69.32000000000001,69.22,68.91,68.63,68.4,68.13,67.60000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
