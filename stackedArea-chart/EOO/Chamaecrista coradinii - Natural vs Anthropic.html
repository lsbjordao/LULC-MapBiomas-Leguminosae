<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.93999999999998,81.30000000000001,81.13000000000001,80.56000000000002,79.17999999999999,78.98,78.80000000000003,78.44999999999999,78.4,78.01,77.41,76.85000000000001,76.96000000000001,76.47,76.15000000000003,76.33000000000003,75.37,74.36999999999999,73.9,72.85000000000001,71.89,71.21,71.03,71.03999999999999,71.01999999999998,70.54000000000002,70.21,69.21999999999998,67.97,67.43,67.14999999999999,66.69,66.19,65.97999999999999,65.20000000000002,64.03,63.08,61.699999999999996],"color":"green"},{"name":"anthropic","data":[18.25,17.88,18.03,18.620000000000005,19.98,20.21,20.37,20.72,20.79,21.160000000000004,21.759999999999998,22.349999999999998,22.200000000000003,22.72,23.02,22.84,23.81,24.78,25.259999999999998,26.329999999999995,27.3,27.97,28.139999999999997,28.130000000000003,28.160000000000004,28.630000000000003,28.959999999999997,29.950000000000003,31.21,31.74,32.03,32.480000000000004,32.97000000000001,33.21,33.99,35.15,36.099999999999994,37.46000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
