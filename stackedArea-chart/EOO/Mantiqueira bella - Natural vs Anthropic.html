<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[26.68,26.279999999999998,26.06,25.919999999999998,25.7,25.61,25.44,25.400000000000002,25.3,25.32,25.38,25.459999999999997,25.529999999999998,25.519999999999996,25.48,25.3,25.319999999999997,25.319999999999997,25.259999999999994,25.4,25.469999999999995,25.539999999999996,25.629999999999992,25.709999999999994,25.799999999999997,25.959999999999997,26.159999999999993,26.27999999999999,26.409999999999993,26.549999999999994,26.769999999999996,26.899999999999995,26.949999999999996,26.999999999999993,27.109999999999996,27.129999999999992,27.409999999999997,27.549999999999997],"color":"green"},{"name":"anthropic","data":[72.55000000000001,72.91,73.16000000000001,73.28,73.51,73.60000000000001,73.77000000000001,73.84,73.89999999999999,73.89,73.83,73.76999999999998,73.69000000000001,73.68,73.73000000000002,73.92000000000003,73.89999999999999,73.9,73.96000000000001,73.82000000000001,73.74000000000001,73.68,73.6,73.50999999999999,73.41,73.26999999999998,73.05,72.94,72.81,72.66,72.46,72.31000000000002,72.28000000000002,72.23,72.10999999999999,72.07000000000001,71.8,71.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
