<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.92,59.81,59.32999999999999,58.95999999999998,58.21,57.75,57.38,56.7,56.01000000000001,55.57000000000001,55.230000000000004,55.13,55.28999999999999,55.3,55.38999999999999,55.410000000000004,55.220000000000006,55.089999999999996,54.79,54.580000000000005,54.31,54.370000000000005,54.35,54.25000000000001,54.22,54.040000000000006,53.74,53.28999999999999,52.93,52.539999999999985,52.279999999999994,52.239999999999995,52.03,52.03,51.88999999999999,51.83,51.720000000000006,51.71000000000001],"color":"green"},{"name":"anthropic","data":[37.03000000000001,37.13,37.620000000000005,37.99,38.73,39.18,39.56000000000001,40.25999999999999,40.949999999999996,41.370000000000005,41.73,41.82,41.65,41.64000000000001,41.56,41.53000000000001,41.720000000000006,41.85,42.15,42.379999999999995,42.64999999999999,42.589999999999996,42.620000000000005,42.7,42.73,42.91,43.19,43.65,44.019999999999996,44.39999999999999,44.660000000000004,44.72999999999999,44.91,44.89999999999999,45.04,45.12,45.22,45.25999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
