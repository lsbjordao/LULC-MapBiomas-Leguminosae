<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.440000000000005,39.53,38.040000000000006,37.51000000000001,37.230000000000004,36.96000000000001,37.17000000000001,37.330000000000005,37.21,37.37,37.27,37.69000000000001,37.91,38.059999999999995,38.02,38.05000000000001,38.06,37.97000000000001,38.43000000000001,38.440000000000005,38.52000000000001,38.71,38.69000000000001,38.65000000000001,39.31000000000001,39.86,40.2,40.53,40.86,41.08,41.220000000000006,41.29,41.529999999999994,41.64,41.97,42.19,42.28999999999999,42.47],"color":"green"},{"name":"anthropic","data":[46.95,47.86,49.35,49.870000000000005,50.15,50.42,50.209999999999994,50.05,50.16,50.01,50.11,49.690000000000005,49.47,49.31,49.39,49.339999999999996,49.34,49.410000000000004,48.95,48.940000000000005,48.86000000000001,48.68,48.69,48.74,48.08,47.53,47.18,46.86,46.519999999999996,46.31,46.17,46.1,45.84,45.739999999999995,45.42,45.2,45.07999999999999,44.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
