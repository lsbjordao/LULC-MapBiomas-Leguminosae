<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.35,56.879999999999995,57.480000000000004,57.53000000000001,58.28,58.540000000000006,58.620000000000005,58.20000000000001,57.92000000000001,56.879999999999995,56.37,56.04000000000001,55.96000000000001,56.209999999999994,56.18999999999999,56.269999999999996,56.3,56.49,56.43000000000001,56.440000000000005,56.55,56.760000000000005,57.059999999999995,56.93,56.330000000000005,56.04,55.879999999999995,56.239999999999995,56.66,56.879999999999995,57.52,57.510000000000005,57.84000000000001,58.49000000000001,58.529999999999994,58.38,58.38999999999999,58.580000000000005],"color":"green"},{"name":"anthropic","data":[43.239999999999995,42.72,42.129999999999995,42.07,41.32,41.05,40.97,41.400000000000006,41.67,42.71,43.22,43.56,43.64,43.4,43.42,43.33,43.29,43.11,43.16,43.15,43.050000000000004,42.83,42.54,42.66,43.26,43.57,43.72,43.36,42.93,42.71,42.09,42.08,41.75,41.12,41.07,41.22,41.21,41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
