<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[25.279999999999998,24.850000000000005,24.27,23.939999999999998,23.74,23.610000000000003,23.53,23.620000000000008,23.610000000000003,23.490000000000006,23.360000000000003,23.380000000000003,23.46,23.380000000000003,23.430000000000003,23.31,23.400000000000002,23.42,23.310000000000002,23.330000000000005,23.45,23.6,23.67,23.700000000000003,23.910000000000004,24.010000000000005,24.120000000000005,24.210000000000004,24.19,24.26,24.39,24.44,24.590000000000003,24.710000000000004,24.77,24.900000000000006,25.14,25.37],"color":"green"},{"name":"anthropic","data":[68.68000000000002,69.09000000000002,69.67,70.00000000000001,70.19000000000001,70.31,70.41000000000001,70.31000000000002,70.32000000000001,70.43,70.56,70.55000000000001,70.48,70.56000000000002,70.49000000000001,70.61000000000001,70.53000000000002,70.53000000000002,70.62000000000002,70.59,70.49000000000002,70.35000000000001,70.27000000000002,70.24000000000002,70.03000000000002,69.92000000000002,69.78000000000002,69.70000000000002,69.72000000000001,69.64,69.52000000000001,69.5,69.34,69.23,69.17000000000002,69.03,68.78,68.54000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
