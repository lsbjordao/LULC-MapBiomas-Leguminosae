<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.80000000000001,71.97,71.34,71.02,70.63,70.68,70.53999999999999,70.50000000000001,70.15000000000002,69.98,69.75,69.9,70.72,71.11,71.09,70.73,70.26,69.19000000000001,68.84,68.51,68.93,68.92999999999999,68.8,69.07,69.44,69.44000000000001,69.30000000000001,69.55999999999999,69.76,69.89,70.36999999999999,70.39999999999999,70.33999999999999,70.17999999999999,70.06,69.77,69.6,69.30000000000001],"color":"green"},{"name":"anthropic","data":[25.720000000000002,27.57,28.18,28.490000000000002,28.880000000000003,28.85,28.990000000000002,29.040000000000003,29.36,29.55,29.77,29.59,28.79,28.39,28.439999999999998,28.769999999999996,29.259999999999998,30.34,30.67,31.020000000000003,30.6,30.57,30.710000000000004,30.450000000000003,30.090000000000003,30.1,30.21,29.949999999999996,29.740000000000002,29.65,29.15,29.11,29.17,29.34,29.47,29.76,29.92,30.220000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
