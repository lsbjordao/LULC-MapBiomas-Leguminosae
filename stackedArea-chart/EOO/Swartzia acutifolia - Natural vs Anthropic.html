<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.82,55.68000000000001,55.3,54.809999999999995,54.29999999999999,54.07,53.68,53.279999999999994,52.92000000000001,52.669999999999995,52.35,52.08,52.050000000000004,51.88,51.64999999999999,51.43,51.18,50.879999999999995,50.60999999999999,50.27,49.97,49.78,49.66,49.550000000000004,49.410000000000004,49.25,49.08,48.63,48.15,47.800000000000004,47.49999999999999,47.36999999999999,47.24,47.139999999999986,46.93999999999998,46.78000000000001,46.64000000000001,46.48],"color":"green"},{"name":"anthropic","data":[40.53,40.68000000000001,41.09,41.56000000000001,42.08000000000001,42.300000000000004,42.670000000000016,43.080000000000005,43.440000000000005,43.70000000000001,44.03,44.280000000000015,44.32,44.47999999999999,44.710000000000015,44.94,45.2,45.480000000000004,45.75,46.09,46.39,46.589999999999996,46.690000000000005,46.830000000000005,46.940000000000005,47.120000000000005,47.3,47.74,48.21000000000001,48.57000000000001,48.88999999999999,48.99000000000001,49.14999999999999,49.24999999999999,49.44,49.59999999999999,49.74999999999999,49.86999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
