<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.64999999999999,67.72,66.55,64.61,62.32,60.650000000000006,59.32000000000001,57.97,57.019999999999996,55.31,53.690000000000005,52.31,50.99,50.39999999999999,50.19,49.949999999999996,49.69,48.38,46.77,44.58,43.190000000000005,42.910000000000004,42.67,42.32999999999999,42.31,41.980000000000004,41.35999999999999,40.99,40.73,40.199999999999996,39.790000000000006,39.66,39.41,38.86,38.58,38.29,38.190000000000005,38.58],"color":"green"},{"name":"anthropic","data":[25.92,26.86,28.039999999999996,29.979999999999997,32.27,33.940000000000005,35.28,36.620000000000005,37.58,39.28,40.89,42.27,43.61,44.2,44.39,44.64,44.89,46.2,47.82000000000001,50.010000000000005,51.41,51.66000000000001,51.89,52.24,52.28,52.59,53.22,53.6,53.86,54.39,54.81,54.94,55.18999999999999,55.74,56.01000000000001,56.32,56.400000000000006,56.02],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
