<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.49999999999999,55.82,55.07,54.419999999999995,53.52,52.769999999999996,52.02,51.24,50.50000000000001,49.760000000000005,49.02,48.35,47.77,47.24999999999999,46.77,46.25000000000001,45.879999999999995,45.46000000000001,44.940000000000005,44.34000000000001,43.919999999999995,43.67,43.459999999999994,43.25,43.03,42.82,42.61000000000001,42.19,41.78,41.449999999999996,41.169999999999995,41.00000000000001,40.839999999999996,40.739999999999995,40.50999999999999,40.3,40.03,40.160000000000004],"color":"green"},{"name":"anthropic","data":[43.089999999999996,43.81,44.54,45.22,46.10999999999999,46.85000000000001,47.610000000000014,48.36,49.129999999999995,49.85,50.6,51.269999999999996,51.830000000000005,52.349999999999994,52.84000000000001,53.330000000000005,53.699999999999996,54.13,54.64,55.24000000000001,55.70000000000001,55.940000000000005,56.14,56.37000000000001,56.540000000000006,56.76,56.97000000000001,57.38,57.81000000000001,58.16000000000001,58.43,58.57000000000001,58.73000000000001,58.830000000000005,59.07000000000001,59.29,59.54999999999999,59.41999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
