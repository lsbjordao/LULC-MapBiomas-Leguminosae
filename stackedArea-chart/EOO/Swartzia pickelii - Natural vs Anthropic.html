<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.87999999999998,49.47,48.099999999999994,47.38999999999999,46.719999999999985,46.05999999999999,45.919999999999995,45.449999999999996,44.989999999999995,44.88,44.769999999999996,44.98,44.989999999999995,44.78,44.79,44.55,44.39999999999999,44.56999999999999,44.14000000000001,44.32999999999999,44.48,44.78,45.04,45.06999999999999,45.25,44.900000000000006,44.67000000000001,43.86,43.620000000000005,43.160000000000004,43.12000000000001,43.120000000000005,42.92,43.099999999999994,42.92,43.089999999999996,43.03000000000001,43.22],"color":"green"},{"name":"anthropic","data":[49.42000000000001,49.809999999999995,51.169999999999995,51.889999999999986,52.53999999999999,53.22,53.349999999999994,53.84,54.27,54.4,54.5,54.290000000000006,54.3,54.50999999999999,54.50999999999999,54.72999999999999,54.88999999999999,54.71,55.14999999999999,54.94,54.79,54.49,54.239999999999995,54.18999999999998,54.03,54.37,54.599999999999994,55.42,55.669999999999995,56.099999999999994,56.13999999999999,56.14999999999999,56.319999999999986,56.16,56.32999999999999,56.199999999999996,56.24999999999999,56.05999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
