<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62,61.31999999999999,60.78,59.809999999999995,58.74,58.12,57.12,56.41,55.79,55.07,54.410000000000004,53.879999999999995,53.230000000000004,52.71,52.26,51.87,51.56999999999999,50.959999999999994,50.36,49.74999999999999,49.309999999999995,48.93000000000001,48.650000000000006,48.34,48.190000000000005,47.91,47.65,47.370000000000005,47.10999999999999,46.910000000000004,46.71000000000001,46.449999999999996,46.33,46.269999999999996,46.14999999999999,46.10999999999999,46.059999999999995,46.37],"color":"green"},{"name":"anthropic","data":[37.760000000000005,38.47,38.980000000000004,39.95,41.03,41.629999999999995,42.65,43.35999999999999,43.980000000000004,44.72,45.36000000000001,45.87,46.53,47.06,47.51999999999999,47.89999999999999,48.199999999999996,48.76999999999999,49.39,50.019999999999996,50.45000000000001,50.82,51.120000000000005,51.41,51.589999999999996,51.84999999999999,52.10999999999999,52.38999999999999,52.65,52.84999999999999,53.04,53.28999999999999,53.44000000000001,53.5,53.610000000000014,53.65000000000001,53.710000000000015,53.39],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
