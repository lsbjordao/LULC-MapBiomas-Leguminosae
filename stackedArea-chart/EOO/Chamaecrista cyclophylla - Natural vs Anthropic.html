<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.569999999999986,52.089999999999996,51.45,50.72,49.74999999999999,48.96999999999999,48.07,47.199999999999996,46.45,45.64000000000001,44.79999999999999,44.06,43.31999999999999,42.75999999999999,42.28999999999999,41.86,41.46,40.91,40.32,39.71000000000001,39.300000000000004,39.019999999999996,38.790000000000006,38.650000000000006,38.56,38.370000000000005,38.230000000000004,37.980000000000004,37.75,37.58,37.44,37.269999999999996,37.150000000000006,37.07999999999999,36.9,36.790000000000006,36.63999999999999,37.010000000000005],"color":"green"},{"name":"anthropic","data":[47.17,47.64,48.26,49.00999999999999,49.94999999999999,50.73,51.629999999999995,52.49999999999999,53.25999999999999,54.05,54.90999999999998,55.65,56.389999999999986,56.96,57.41,57.86,58.24999999999999,58.79,59.389999999999986,60,60.430000000000014,60.68,60.92000000000001,61.050000000000004,61.13999999999999,61.32999999999999,61.480000000000004,61.71000000000001,61.95,62.13000000000001,62.26,62.43,62.550000000000004,62.61,62.8,62.92999999999999,63.040000000000006,62.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
