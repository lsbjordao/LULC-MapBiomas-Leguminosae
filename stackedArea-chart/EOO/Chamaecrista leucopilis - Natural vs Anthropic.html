<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.79,73.54999999999998,73.66,73.81999999999998,73.56999999999998,73.4,73.36,72.76,72.35000000000001,71.97999999999999,71.16999999999999,70.67999999999999,70.39999999999999,69.94,69.46999999999998,69.07000000000001,68.97999999999999,68.43,67.79,67.35999999999999,66.86999999999999,66.50999999999999,66.1,65.3,64.54,63.74000000000001,63.080000000000005,62.28,61.559999999999995,60.95000000000001,60.449999999999996,60.099999999999994,59.730000000000004,59.63,59.24000000000001,58.989999999999995,58.74,58.830000000000005],"color":"green"},{"name":"anthropic","data":[23.760000000000005,24.01,23.9,23.750000000000004,24.000000000000004,24.17,24.2,24.790000000000003,25.19,25.57,26.380000000000003,26.869999999999997,27.15,27.610000000000003,28.09,28.47,28.580000000000002,29.109999999999996,29.769999999999996,30.189999999999998,30.680000000000003,31.02,31.45,32.260000000000005,33.02,33.82,34.470000000000006,35.28,35.99,36.61000000000001,37.120000000000005,37.46,37.830000000000005,37.940000000000005,38.33,38.57,38.82,38.730000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
