<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.400000000000006,47.93,47.12,46.36,45.64,45.11000000000001,44.559999999999995,43.88,43.260000000000005,42.61999999999999,41.91999999999999,41.39,40.87999999999999,40.400000000000006,39.870000000000005,39.400000000000006,39.07,38.650000000000006,38.089999999999996,37.660000000000004,37.4,37.26,37.20000000000001,37.09,37.050000000000004,37.00000000000001,36.940000000000005,36.85000000000001,36.709999999999994,36.54,36.44,36.38,36.37,36.379999999999995,36.370000000000005,36.339999999999996,36.230000000000004,36.27],"color":"green"},{"name":"anthropic","data":[49.3,49.78,50.599999999999994,51.330000000000005,52.05,52.6,53.13999999999999,53.83000000000001,54.42,55.050000000000004,55.75,56.279999999999994,56.79,57.27,57.79,58.300000000000004,58.580000000000005,59.019999999999996,59.6,60.010000000000005,60.260000000000005,60.440000000000005,60.5,60.59,60.63,60.670000000000016,60.74,60.84,60.96000000000001,61.13000000000001,61.21000000000001,61.30999999999999,61.29999999999999,61.29,61.29999999999999,61.35,61.42999999999999,61.4],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
