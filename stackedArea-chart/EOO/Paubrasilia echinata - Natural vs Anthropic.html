<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[25.240000000000002,25.02,24.28,23.789999999999996,23.41,23.3,23.169999999999998,23.119999999999997,23.099999999999998,23.139999999999997,23.179999999999996,23.139999999999997,23.05,22.96,22.949999999999996,22.820000000000004,22.910000000000004,22.910000000000004,22.869999999999997,22.92,22.919999999999995,23,23.16,23.13,23.179999999999996,23.099999999999998,23.12,23.03,23.000000000000004,23.05,23.149999999999995,23.309999999999995,23.400000000000002,23.549999999999997,23.599999999999998,23.67,23.850000000000005,24.130000000000003],"color":"green"},{"name":"anthropic","data":[53.75999999999999,53.98,54.73,55.25,55.599999999999994,55.74,55.86000000000001,55.910000000000004,55.93,55.86999999999999,55.83999999999998,55.89,55.989999999999995,56.07,56.09,56.199999999999996,56.099999999999994,56.11000000000001,56.16000000000001,56.1,56.12,56.01,55.88,55.879999999999995,55.84,55.91,55.910000000000004,55.98,56.019999999999996,55.989999999999995,55.900000000000006,55.72999999999998,55.650000000000006,55.48,55.449999999999996,55.39,55.22,54.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
