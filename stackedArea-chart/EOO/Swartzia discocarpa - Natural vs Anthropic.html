<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.45000000000002,98.48000000000002,98.26000000000002,98.07000000000001,98.03000000000002,98.09,98.19,98.09,97.93,97.78,97.4,97.14,96.75000000000001,96.66,96.71000000000001,96.96000000000001,97.08000000000001,96.96000000000001,96.71000000000001,96.29,95.97,95.57000000000001,95.21000000000001,94.65,94.28,93.97,93.66000000000001,93.41000000000001,92.97000000000001,92.51,92.16000000000001,91.76000000000002,91.41,91.15,90.31,89.47000000000001,88.27,87.48],"color":"green"},{"name":"anthropic","data":[0.93,0.89,1.12,1.32,1.36,1.29,1.19,1.29,1.45,1.59,1.97,2.25,2.63,2.7199999999999998,2.67,2.4299999999999997,2.3099999999999996,2.4299999999999997,2.67,3.07,3.41,3.81,4.18,4.7299999999999995,5.1,5.409999999999999,5.7299999999999995,5.9799999999999995,6.3999999999999995,6.869999999999999,7.23,7.63,7.970000000000001,8.22,9.07,9.91,11.11,11.889999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
