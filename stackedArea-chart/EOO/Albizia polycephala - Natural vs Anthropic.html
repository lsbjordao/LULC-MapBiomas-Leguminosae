<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.5,70.31000000000002,69.71,69.13999999999999,68.58999999999999,68.16,67.75,67.14000000000003,66.58000000000001,66.13,65.56000000000002,65.12,64.73,64.25,63.77000000000001,63.38000000000001,62.96,62.540000000000006,61.97000000000001,61.370000000000005,60.92,60.600000000000016,60.35000000000001,60.16000000000001,60.02000000000001,59.9,59.75000000000001,59.48000000000001,59.19000000000001,58.91000000000001,58.67,58.480000000000004,58.33000000000002,58.18000000000001,58.000000000000014,57.830000000000005,57.540000000000006,57.21000000000001],"color":"green"},{"name":"anthropic","data":[26.37,26.56,27.15,27.73,28.290000000000003,28.700000000000003,29.12,29.730000000000008,30.270000000000007,30.71,31.320000000000007,31.76,32.13999999999999,32.62,33.11000000000001,33.480000000000004,33.90000000000001,34.35,34.92,35.510000000000005,35.96,36.28000000000001,36.52000000000001,36.74000000000001,36.84000000000001,36.97,37.120000000000005,37.35999999999999,37.67000000000001,37.98,38.23,38.4,38.53999999999999,38.69999999999999,38.88,39.040000000000006,39.35,39.669999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
