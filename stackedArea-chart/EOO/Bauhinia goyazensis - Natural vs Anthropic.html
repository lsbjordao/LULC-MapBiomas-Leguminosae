<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.589999999999996,61.10999999999999,60.46,59.83999999999999,58.959999999999994,58.02,57.17,56.14,55.10999999999999,54.21,53.300000000000004,52.32,51.550000000000004,50.79,50.01,49.25999999999999,48.72,48.16,47.49,46.800000000000004,46.290000000000006,45.92,45.63999999999999,45.37999999999999,45.19,45.019999999999996,44.82000000000001,44.459999999999994,44.07999999999999,43.760000000000005,43.459999999999994,43.24999999999999,43.11,43.05,42.88999999999999,42.70999999999999,42.48,42.8],"color":"green"},{"name":"anthropic","data":[37.55,38.03,38.69,39.29999999999999,40.20000000000001,41.13,41.98,43,44.029999999999994,44.949999999999996,45.85,46.82,47.589999999999996,48.36,49.14,49.89,50.42999999999999,50.98,51.64999999999999,52.35000000000001,52.85000000000001,53.210000000000015,53.490000000000016,53.760000000000005,53.92,54.11999999999999,54.300000000000004,54.65000000000001,55.02000000000001,55.38000000000001,55.67,55.88,56,56.08,56.26,56.430000000000014,56.650000000000006,56.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
