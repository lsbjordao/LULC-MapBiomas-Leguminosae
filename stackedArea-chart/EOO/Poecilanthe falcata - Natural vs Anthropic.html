<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.36,56.220000000000006,55.64000000000001,55.14,54.550000000000004,54.28000000000001,53.900000000000006,53.480000000000004,53.06000000000002,52.970000000000006,52.870000000000005,52.89000000000001,53.230000000000004,53.16,53.09000000000001,52.98000000000001,52.790000000000006,52.620000000000005,52.40000000000001,52.23000000000001,52.11000000000001,52.050000000000004,52.02000000000002,52.09000000000001,52.16000000000001,52.16000000000001,52.08000000000001,51.739999999999995,51.410000000000004,51.09000000000001,50.85,50.790000000000006,50.78000000000001,50.84000000000001,50.85000000000001,50.9,50.920000000000016,51.04],"color":"green"},{"name":"anthropic","data":[37.71,37.86000000000001,38.449999999999996,38.95,39.540000000000006,39.82,40.2,40.61000000000001,41.010000000000005,41.120000000000005,41.220000000000006,41.21,40.86,40.92,41.00999999999999,41.099999999999994,41.31,41.43,41.68,41.85,42,42.010000000000005,42.06999999999999,41.99999999999999,41.91,41.95999999999999,42.02999999999999,42.36000000000001,42.699999999999996,43.029999999999994,43.26,43.29999999999999,43.32,43.239999999999995,43.239999999999995,43.18,43.17999999999999,43.039999999999985],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
