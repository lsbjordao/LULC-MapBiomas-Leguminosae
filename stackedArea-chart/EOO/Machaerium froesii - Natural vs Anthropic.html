<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.73,98.72,98.63,98.57999999999998,98.55999999999999,98.53000000000002,98.5,98.41000000000001,98.29,98.19,97.97000000000001,97.82000000000001,97.58,97.41000000000001,97.38000000000002,97.33000000000003,97.16000000000003,97.06,96.97,96.81,96.65,96.52,96.43,96.36,96.27,96.22999999999999,96.23,96.22999999999999,96.17000000000002,96.05000000000001,95.91,95.66000000000001,95.57000000000002,95.47,95.32000000000001,95.12000000000002,94.83000000000001,94.42],"color":"green"},{"name":"anthropic","data":[0.9,0.9,0.99,1.05,1.06,1.1,1.11,1.22,1.33,1.4200000000000002,1.6400000000000001,1.81,2.04,2.2099999999999995,2.2499999999999996,2.2899999999999996,2.4699999999999993,2.5599999999999996,2.6699999999999995,2.82,2.9699999999999993,3.12,3.19,3.26,3.3499999999999996,3.39,3.39,3.39,3.4499999999999997,3.5599999999999996,3.7299999999999995,3.9599999999999995,4.079999999999999,4.1499999999999995,4.3,4.5,4.779999999999999,5.220000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
