<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.60000000000001,77.18,76.17,75.26000000000002,74.37000000000002,73.60000000000001,72.83,71.81,70.86000000000001,69.82000000000001,68.65,67.65000000000002,66.7,65.80000000000001,64.78,63.97,63.18,62.30999999999999,61.059999999999995,59.970000000000006,59.239999999999995,58.68999999999999,58.31999999999999,57.93999999999999,57.699999999999996,57.5,57.23,56.99999999999999,56.64999999999999,56.319999999999986,55.989999999999995,55.75999999999999,55.53999999999999,55.31,55,54.67999999999999,54.2,53.7],"color":"green"},{"name":"anthropic","data":[21.299999999999997,21.73,22.720000000000002,23.6,24.499999999999996,25.27,26.030000000000005,27.060000000000006,28.020000000000003,29.05,30.229999999999997,31.25,32.17,33.08,34.07999999999999,34.92,35.72,36.59000000000001,37.82000000000001,38.89,39.620000000000005,40.209999999999994,40.540000000000006,40.919999999999995,41.14,41.38,41.64,41.89,42.209999999999994,42.57,42.88999999999999,43.099999999999994,43.33999999999999,43.56999999999999,43.88,44.18,44.690000000000005,45.18],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
