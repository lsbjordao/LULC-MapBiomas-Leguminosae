<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.14000000000001,74.96,74.39000000000003,73.85000000000001,73.32999999999998,72.96000000000001,72.55,72.01000000000002,71.47999999999999,71.04000000000002,70.47,70.01,69.6,69.12,68.64999999999999,68.24,67.78,67.35000000000001,66.75,66.18,65.74999999999999,65.40999999999998,65.16999999999999,64.95,64.82,64.67999999999999,64.50999999999999,64.24,64,63.72999999999998,63.44999999999999,63.20999999999999,63.039999999999985,62.87,62.63999999999999,62.40999999999999,62.05,61.61999999999999],"color":"green"},{"name":"anthropic","data":[22.120000000000005,22.33,22.870000000000005,23.44,23.950000000000003,24.320000000000004,24.720000000000002,25.260000000000012,25.81000000000001,26.250000000000007,26.79000000000001,27.270000000000007,27.660000000000007,28.15000000000001,28.640000000000004,29.060000000000002,29.490000000000006,29.93,30.530000000000005,31.120000000000005,31.56000000000001,31.870000000000008,32.120000000000005,32.34,32.480000000000004,32.59,32.78000000000001,33.040000000000006,33.279999999999994,33.55,33.82,34.07000000000001,34.24,34.39000000000001,34.65,34.87,35.23,35.660000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
