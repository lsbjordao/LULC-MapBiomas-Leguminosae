<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.94,55.71,55.92000000000001,54.510000000000005,53.150000000000006,51.85999999999999,51.08,50.59,49.949999999999996,50.019999999999996,50.14999999999999,50.88999999999999,51.91,51.839999999999996,52.099999999999994,52.38999999999999,51.720000000000006,51.31999999999999,51.10999999999999,51.05,50.56,50.43999999999999,49.62,49.059999999999995,48.29,47.82,47.41,47.169999999999995,46.81999999999999,46.82000000000001,47.18,47.43000000000001,47.14,46.95000000000001,46.739999999999995,46.709999999999994,46.69,46.669999999999995],"color":"green"},{"name":"anthropic","data":[43.440000000000005,43.68000000000001,43.470000000000006,44.87,46.230000000000004,47.519999999999996,48.28999999999999,48.809999999999995,49.43,49.36,49.25000000000001,48.5,47.47,47.54,47.27000000000001,46.99999999999999,47.65,48.08000000000001,48.28000000000001,48.33,48.82,48.94,49.76,50.32000000000001,51.08,51.55,51.95999999999999,52.21,52.57,52.55,52.2,51.94,52.24,52.419999999999995,52.65,52.67999999999999,52.67999999999999,52.71],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
