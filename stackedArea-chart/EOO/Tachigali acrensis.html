<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"Forest formation","data":[94.71,95.31,95.55,94.87,94.5,94.47,94.43,93.9,92.9,92.65,92.6,92.49,92.26,91.5,90.3,89.96,89.74,89.22,89.16,88.72,88.04,88.06,88.29,88.47,88.49,88.03,87.1,86.29,85.99,85.93,86,85.62,85.26,85.29,84.24,83.12,82.67,82.84],"color":"#006400"},{"name":"Flooded forest","data":[0,0,0,0,0,0.02,0.02,0.02,0.02,0.02,0.02,0.02,0.02,0.02,0.02,0.02,0.02,0.02,0.02,0.03,0.03,0.03,0.02,0.02,0.02,0.02,0.02,0.03,0.03,0.03,0.02,0.02,0.03,0.03,0.02,0.03,0.03,0.02],"color":"#76A5AF"},{"name":"Wetland","data":[0.1,0.11,0.09,0.11,0.12,0.14,0.07,0.09,0.05,0.05,0.09,0.07,0.15,0.06,0.09,0.1,0.04,0.05,0.07,0.04,0.02,0.04,0.02,0.04,0.02,0.03,0.02,0.11,0,0,0.06,0.02,0.04,0.05,0.02,0.11,0.05,0],"color":"#45C2A5"},{"name":"Grassland","data":[0.17,0.16,0.16,0.11,0.13,0.11,0.09,0.04,0.12,0.11,0.09,0.12,0.07,0.17,0.04,0.04,0.15,0.1,0.07,0.08,0.1,0.15,0.24,0.13,0.12,0.12,0.18,0.09,0.21,0.16,0.09,0.25,0.19,0.22,0.29,0.22,0.29,0.23],"color":"#B8AF4F"},{"name":"Pasture","data":[3.16,2.42,2.13,2.74,3.1,3.09,3.24,3.76,4.84,5.06,5.04,5.26,5.43,6.27,7.48,7.8,8.14,8.69,8.72,9.22,9.97,9.99,9.74,9.55,9.53,9.99,10.98,11.8,12.14,12.21,12.05,12.47,12.85,12.83,13.84,14.73,15.48,15.47],"color":"#FFD966"},{"name":"River, lake and ocean","data":[1.18,1.31,1.39,1.48,1.47,1.49,1.49,1.51,1.4,1.43,1.48,1.36,1.4,1.3,1.39,1.4,1.23,1.24,1.26,1.23,1.16,1.05,1,1.09,1.13,1.12,1.01,1,0.94,0.99,1.1,0.93,0.95,0.9,0.91,1.1,0.79,0.76],"color":"#0000FF"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
