<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.99000000000001,49.850000000000016,49.24000000000001,48.960000000000015,48.58000000000001,48.70000000000001,48.53000000000001,48.260000000000005,47.970000000000006,47.71000000000001,47.410000000000004,47.31,47.31000000000002,47.34,47.25000000000001,47.15000000000001,47.11000000000001,46.910000000000004,46.870000000000005,46.870000000000005,46.95000000000001,47.03,47.05,47.02,46.94000000000001,46.91000000000001,46.80000000000001,46.640000000000015,46.38,46.03000000000001,45.710000000000015,45.41000000000001,45.500000000000014,45.670000000000016,45.67,45.600000000000016,45.54000000000001,45.53000000000001],"color":"green"},{"name":"anthropic","data":[49.339999999999996,49.51,50.11,50.39999999999999,50.77999999999998,50.669999999999995,50.79999999999999,51.089999999999996,51.39,51.639999999999986,51.929999999999986,52.03,52.04999999999998,52.019999999999996,52.12,52.21,52.269999999999996,52.46000000000001,52.51,52.48,52.410000000000004,52.32999999999999,52.32999999999999,52.34,52.419999999999995,52.459999999999994,52.54999999999999,52.72,52.98999999999999,53.32,53.66999999999998,53.949999999999996,53.85,53.709999999999994,53.71999999999999,53.73999999999999,53.809999999999995,53.82000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
