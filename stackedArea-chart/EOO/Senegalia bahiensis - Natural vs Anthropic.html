<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.830000000000005,46.669999999999995,46.05000000000001,45.460000000000015,45,44.77,44.480000000000004,44.01,43.63,43.51000000000002,43.40000000000001,43.41000000000001,43.53000000000001,43.410000000000004,43.28000000000002,43.07000000000001,42.870000000000005,42.730000000000004,42.58,42.59,42.63,42.809999999999995,42.88,42.95,43.010000000000005,42.930000000000014,42.83,42.49,42.230000000000004,41.980000000000004,41.850000000000016,41.88,41.89000000000001,42.02000000000001,42.040000000000006,42.14,42.24999999999999,42.43],"color":"green"},{"name":"anthropic","data":[48.290000000000006,48.43000000000001,49.07999999999999,49.65,50.120000000000005,50.33,50.650000000000006,51.12,51.48,51.64,51.72,51.70999999999999,51.58999999999999,51.699999999999996,51.849999999999994,52.07,52.25999999999999,52.379999999999995,52.55999999999999,52.55999999999999,52.5,52.31999999999999,52.23,52.15999999999998,52.12999999999999,52.190000000000005,52.28999999999999,52.629999999999995,52.89,53.129999999999995,53.26999999999998,53.239999999999995,53.22,53.08999999999999,53.07000000000001,52.99,52.85999999999999,52.68999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
