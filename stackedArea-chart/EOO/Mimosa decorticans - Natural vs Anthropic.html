<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.56999999999999,56.46,54.6,52.790000000000006,50.28,48.85000000000001,46.97,45.1,43.74,41.84,40.040000000000006,38.71000000000001,37.92,37.540000000000006,37.11,36.85999999999999,36.220000000000006,35.269999999999996,34.21,33.239999999999995,32.580000000000005,32.339999999999996,32.03,31.76,31.5,31.249999999999996,31.130000000000003,31.049999999999997,31.29,31.220000000000002,31.020000000000003,30.810000000000002,30.540000000000003,30.45,30.12,29.799999999999997,29.47,29.54],"color":"green"},{"name":"anthropic","data":[42.92,44.029999999999994,45.89999999999999,47.7,50.230000000000004,51.65999999999999,53.54,55.4,56.760000000000005,58.660000000000004,60.47000000000001,61.790000000000006,62.57000000000001,62.940000000000005,63.410000000000004,63.65,64.27,65.24000000000001,66.27999999999999,67.27,67.92,68.14000000000001,68.47000000000001,68.76,69.02,69.27000000000001,69.4,69.45000000000002,69.24000000000001,69.28,69.5,69.7,69.96000000000001,70.05,70.38999999999999,70.69999999999999,71.03,70.96000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
