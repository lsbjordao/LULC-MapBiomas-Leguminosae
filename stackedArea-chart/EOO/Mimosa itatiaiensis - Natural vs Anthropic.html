<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.86,93.94000000000001,93.68,93.22000000000001,93.03000000000002,92.68,92.53,92.51,92.44000000000001,92.01,90.25000000000001,90.04,89.9,89.99000000000001,89.94,89.78,89.59,89.45,89.26,89.33000000000001,88.97,88.7,88.71000000000001,88.78,88.88000000000001,88.92,88.87,88.78,88.70000000000002,88.79,88.79,88.65,88.64999999999999,88.56,87.99000000000001,87.63000000000001,87.3,86.55],"color":"green"},{"name":"anthropic","data":[5.77,5.68,5.95,6.4,6.59,6.9399999999999995,7.1000000000000005,7.119999999999999,7.180000000000001,7.61,9.39,9.579999999999998,9.719999999999999,9.639999999999999,9.7,9.84,10.04,10.17,10.37,10.309999999999999,10.67,10.92,10.929999999999998,10.839999999999998,10.75,10.71,10.749999999999998,10.839999999999998,10.93,10.850000000000001,10.83,10.979999999999999,10.979999999999999,11.06,11.65,12.009999999999998,12.34,13.079999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
