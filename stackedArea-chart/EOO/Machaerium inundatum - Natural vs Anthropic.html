<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.33000000000001,95.26,94.90999999999998,94.54,94.22999999999999,93.99999999999999,93.71000000000001,93.22000000000001,92.74000000000001,92.25,91.59,91,90.44,89.83,89.25,88.78999999999999,88.26000000000002,87.66999999999999,86.87,86.07000000000001,85.49000000000001,85.02,84.66,84.32000000000002,84.11,83.97999999999998,83.84000000000002,83.68,83.44,83.22,82.92999999999998,82.6,82.36000000000001,82.14999999999999,81.84999999999998,81.57,81.10999999999999,80.44000000000001],"color":"green"},{"name":"anthropic","data":[4.46,4.51,4.89,5.259999999999999,5.53,5.769999999999999,6.079999999999999,6.56,7.029999999999999,7.519999999999999,8.19,8.78,9.36,9.95,10.53,10.999999999999998,11.519999999999998,12.109999999999998,12.909999999999998,13.679999999999998,14.29,14.78,15.119999999999997,15.449999999999998,15.669999999999996,15.79,15.93,16.090000000000003,16.320000000000004,16.550000000000004,16.87,17.18,17.419999999999998,17.63,17.91,18.209999999999997,18.659999999999997,19.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
