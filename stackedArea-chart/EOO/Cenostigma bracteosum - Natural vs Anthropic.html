<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.44000000000001,70.16000000000001,69.41000000000001,68.69,67.93,67.34,66.77000000000001,65.96000000000001,65.2,64.56,63.89,63.31999999999999,62.88999999999999,62.26,61.60999999999999,61.10999999999999,60.53999999999999,59.98,59.2,58.45,57.86999999999999,57.47999999999999,57.13999999999999,56.85,56.7,56.52,56.279999999999994,55.84,55.36,54.98,54.629999999999995,54.41999999999999,54.22999999999998,54.08,53.879999999999995,53.68999999999999,53.37,52.98],"color":"green"},{"name":"anthropic","data":[28.460000000000004,28.76000000000001,29.48000000000001,30.200000000000014,30.960000000000008,31.560000000000006,32.11,32.940000000000005,33.67,34.32000000000001,34.980000000000004,35.580000000000005,35.99,36.63000000000001,37.26,37.800000000000004,38.35000000000001,38.910000000000004,39.69,40.43999999999999,41,41.39000000000001,41.74999999999999,42.03999999999999,42.2,42.35000000000001,42.620000000000005,43.050000000000004,43.489999999999995,43.88999999999999,44.25,44.459999999999994,44.66000000000001,44.82,45.02,45.18,45.51999999999999,45.91000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
