<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[26.37,26.070000000000004,25.610000000000003,25.21,24.800000000000004,24.500000000000004,24.17,23.770000000000003,23.430000000000007,23.12,22.790000000000003,22.53,22.349999999999998,22.180000000000003,22.000000000000004,21.819999999999997,21.660000000000004,21.500000000000004,21.320000000000007,21.160000000000004,21.08000000000001,20.990000000000002,20.950000000000003,20.91,20.880000000000003,20.820000000000004,20.750000000000007,20.680000000000003,20.580000000000002,20.45,20.369999999999997,20.32,20.29,20.28,20.26,20.240000000000002,20.18,20.240000000000002],"color":"green"},{"name":"anthropic","data":[27.46,27.750000000000004,28.23,28.629999999999995,29.059999999999995,29.360000000000003,29.69000000000001,30.080000000000005,30.43000000000001,30.72000000000001,31.050000000000008,31.330000000000005,31.5,31.680000000000003,31.85,32.02,32.150000000000006,32.339999999999996,32.5,32.669999999999995,32.77,32.83,32.88,32.94000000000001,32.97000000000001,33.01,33.059999999999995,33.150000000000006,33.25,33.4,33.45,33.52,33.55000000000001,33.54,33.550000000000004,33.580000000000005,33.660000000000004,33.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
