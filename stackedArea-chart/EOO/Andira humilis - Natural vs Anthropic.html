<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.36000000000001,69.09,68.36,67.66,66.91,66.38,65.82999999999998,65.02999999999999,64.32,63.69999999999999,62.97,62.37999999999999,61.90999999999999,61.269999999999996,60.69,60.2,59.64,59.07999999999999,58.29999999999999,57.53,56.980000000000004,56.57,56.279999999999994,56.03,55.86,55.7,55.489999999999995,55.11,54.73,54.39,54.080000000000005,53.89999999999999,53.75000000000001,53.58,53.34,53.09,52.73,52.33999999999998],"color":"green"},{"name":"anthropic","data":[29.770000000000003,30.04000000000001,30.77000000000001,31.480000000000008,32.220000000000006,32.75000000000001,33.29999999999999,34.10999999999999,34.83,35.42999999999999,36.160000000000004,36.75000000000001,37.25000000000001,37.84,38.470000000000006,38.95000000000001,39.49,40.04,40.83,41.6,42.16,42.57999999999999,42.85000000000001,43.11,43.28,43.43000000000001,43.64999999999999,44.03,44.40999999999999,44.749999999999986,45.079999999999984,45.239999999999995,45.389999999999986,45.540000000000006,45.79999999999999,46.03999999999999,46.39999999999999,46.77999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
