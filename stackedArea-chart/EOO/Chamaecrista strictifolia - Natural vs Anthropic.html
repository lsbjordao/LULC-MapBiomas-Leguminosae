<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.44000000000001,70.44000000000001,70.05000000000001,69.54,68.85,68.57000000000001,68.14000000000001,67.54,66.90000000000002,66.53,66,65.66000000000001,65.84,65.61000000000004,65.39,65.21,64.77,64.36,64.01,63.669999999999995,63.28,63.059999999999995,62.81,62.62,62.44,62.239999999999995,61.86,61.169999999999995,60.419999999999995,59.83,59.30999999999999,59.14000000000001,58.93999999999999,58.87,58.699999999999996,58.54,58.209999999999994,58.09999999999999],"color":"green"},{"name":"anthropic","data":[27.05,27.049999999999997,27.449999999999992,27.97,28.669999999999998,28.950000000000003,29.37,29.970000000000002,30.589999999999996,30.980000000000004,31.490000000000002,31.860000000000003,31.67000000000001,31.910000000000007,32.1,32.32000000000001,32.74,33.13000000000001,33.49000000000001,33.82000000000001,34.230000000000004,34.43,34.690000000000005,34.87000000000001,35.05000000000001,35.27000000000001,35.64,36.31,37.07999999999999,37.669999999999995,38.17,38.35999999999999,38.57,38.6,38.780000000000015,38.95,39.25,39.38999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
