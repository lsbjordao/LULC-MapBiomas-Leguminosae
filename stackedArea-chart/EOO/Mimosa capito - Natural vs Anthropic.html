<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.800000000000004,57.830000000000005,57.66,57.14,56.510000000000005,56.029999999999994,55.43000000000001,54.870000000000005,54.36,53.75000000000001,53.220000000000006,52.769999999999996,52.300000000000004,51.89999999999999,51.53,51.059999999999995,50.75,50.32,49.900000000000006,49.39,49.07000000000001,48.9,48.709999999999994,48.559999999999995,48.620000000000005,48.54,48.43000000000001,48.36,48.260000000000005,48.010000000000005,47.75,47.519999999999996,47.31,47.089999999999996,46.78,46.559999999999995,46.36,46.81],"color":"green"},{"name":"anthropic","data":[40.47,41.44,41.61,42.11999999999999,42.75,43.23,43.83,44.38999999999999,44.88,45.519999999999996,46.03,46.48,46.96,47.35,47.73,48.199999999999996,48.519999999999996,48.940000000000005,49.36,49.86,50.16,50.35999999999999,50.550000000000004,50.7,50.62000000000001,50.71999999999999,50.81,50.88999999999999,51.010000000000005,51.25,51.49,51.75,51.97,52.18999999999999,52.5,52.70000000000001,52.89,52.46000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
