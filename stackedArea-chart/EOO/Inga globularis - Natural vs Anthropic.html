<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[1.6600000000000001,1.6600000000000001,1.6,1.6,1.59,1.5800000000000003,1.5900000000000003,1.6000000000000003,1.61,1.65,1.6600000000000001,1.6700000000000002,1.7000000000000002,1.72,1.74,1.74,1.74,1.75,1.77,1.78,1.78,1.8,1.79,1.8,1.81,1.81,1.82,1.83,1.83,1.84,1.84,1.86,1.86,1.87,1.9000000000000001,1.9000000000000001,1.9100000000000001,1.9100000000000001],"color":"green"},{"name":"anthropic","data":[1.44,1.44,1.5,1.5,1.51,1.52,1.5,1.5,1.49,1.46,1.45,1.42,1.41,1.3900000000000001,1.37,1.3599999999999999,1.3599999999999999,1.35,1.32,1.33,1.31,1.31,1.31,1.2999999999999998,1.2999999999999998,1.29,1.3,1.28,1.28,1.26,1.26,1.25,1.24,1.24,1.22,1.2100000000000002,1.2,1.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
