<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.96999999999999,43.809999999999995,43.15999999999999,42.52,42,41.919999999999995,41.67000000000001,41.68000000000001,41.47000000000001,41.37,41.1,40.75,40.42000000000001,40.330000000000005,40.19,39.930000000000014,39.9,39.99,39.879999999999995,39.769999999999996,39.76,39.83,39.92999999999999,39.970000000000006,40.02,40.14999999999999,40.109999999999985,40.21,40.36,40.33,40.25,40.21,40.199999999999996,40.15,39.900000000000006,39.77,39.760000000000005,39.60999999999999],"color":"green"},{"name":"anthropic","data":[54.349999999999994,54.510000000000005,55.16,55.81,56.34,56.41,56.65999999999999,56.62999999999999,56.83,56.94,57.22,57.57,57.89,57.99,58.11999999999999,58.38,58.419999999999995,58.32999999999999,58.44,58.559999999999995,58.55,58.489999999999995,58.39,58.35,58.28,58.160000000000004,58.19000000000001,58.11,57.95000000000001,57.989999999999995,58.08,58.10000000000001,58.12,58.18,58.42,58.550000000000004,58.56,58.7],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
