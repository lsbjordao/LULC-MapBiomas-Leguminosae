<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.02,64.88,64.48,63.93000000000001,62.959999999999994,62.540000000000006,62.07,61.449999999999996,60.75,60.39999999999999,59.81999999999999,59.36000000000001,59.5,59.309999999999995,59.05,58.99,58.55999999999999,58.1,57.65,57.25,56.7,56.4,56.199999999999996,55.97,55.89,55.69,55.410000000000004,54.809999999999995,54.07999999999999,53.599999999999994,53.23,53.13,52.88999999999999,52.82,52.57,52.36,52.059999999999995,51.96],"color":"green"},{"name":"anthropic","data":[34.72000000000001,34.87,35.290000000000006,35.829999999999984,36.78999999999999,37.22,37.69,38.32,39,39.349999999999994,39.919999999999995,40.39,40.24000000000001,40.46,40.68,40.78,41.180000000000014,41.67,42.11000000000001,42.49000000000001,43.03000000000001,43.339999999999996,43.57,43.75000000000001,43.830000000000005,44.050000000000004,44.349999999999994,44.949999999999996,45.66,46.150000000000006,46.52000000000001,46.620000000000005,46.85999999999999,46.96000000000001,47.190000000000005,47.39,47.68999999999999,47.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
