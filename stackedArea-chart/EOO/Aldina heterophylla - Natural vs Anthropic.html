<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.54,96.51,96.39,96.29000000000002,96.07,96.22,96.41,96.25999999999999,96.24,96.60000000000001,97.15,97.23,97.02,96.55999999999999,96.32,96.39,96.51999999999998,96.33999999999999,96.22000000000001,96.15,96.07000000000001,95.94,95.99,96.10999999999999,95.92999999999998,95.69000000000001,95.67,95.92999999999999,96,95.97000000000001,95.56000000000002,95.13,95.17,95.21000000000001,95.28999999999999,95.2,95.14,94.95],"color":"green"},{"name":"anthropic","data":[2.7299999999999995,2.77,2.8699999999999997,2.9799999999999995,3.1999999999999997,3.05,2.8499999999999996,3.01,3.03,2.6699999999999995,2.1199999999999997,2.04,2.25,2.71,2.96,2.87,2.7399999999999998,2.93,3.06,3.12,3.2,3.33,3.27,3.1500000000000004,3.35,3.57,3.5900000000000003,3.33,3.2700000000000005,3.29,3.72,4.15,4.1,4.07,3.9799999999999995,4.06,4.14,4.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
