<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.019999999999996,55.48999999999999,55.03,54.359999999999985,53.719999999999985,53.33,52.85999999999999,52.31000000000001,51.889999999999986,51.550000000000004,51.04999999999999,50.709999999999994,50.339999999999996,50.019999999999996,49.639999999999986,49.25,48.96,48.489999999999995,48.06999999999999,47.679999999999986,47.34,47.059999999999995,46.78,46.61999999999999,46.61,46.46999999999999,46.24999999999999,45.97999999999999,45.65,45.379999999999995,45.329999999999984,45.11999999999999,45.08999999999999,45.169999999999995,45.18,45.16999999999999,45.13999999999999,45.319999999999986],"color":"green"},{"name":"anthropic","data":[44.260000000000005,44.769999999999996,45.26,45.919999999999995,46.55,46.949999999999996,47.419999999999995,47.97999999999999,48.39,48.720000000000006,49.24,49.56000000000001,49.93,50.28,50.63999999999999,51.05,51.30999999999998,51.79,52.21,52.6,52.949999999999996,53.24000000000001,53.49000000000001,53.63000000000001,53.65,53.82,53.989999999999995,54.29,54.63,54.87,54.970000000000006,55.150000000000006,55.18000000000001,55.11,55.09,55.10000000000001,55.120000000000005,54.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
