<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.070000000000014,43.71,43.13,42.51,41.78000000000001,41.38,40.93000000000001,40.36000000000001,39.93000000000001,39.57000000000001,39.199999999999996,38.95000000000001,38.86000000000001,38.720000000000006,38.53000000000001,38.32,38.10999999999999,37.87000000000001,37.63000000000001,37.40000000000002,37.290000000000006,37.21999999999999,37.15000000000001,37.10000000000001,37.07,37.05,36.970000000000006,36.800000000000004,36.57,36.370000000000005,36.27000000000001,36.22,36.19000000000001,36.220000000000006,36.120000000000005,36.050000000000004,35.970000000000006,36.010000000000005],"color":"green"},{"name":"anthropic","data":[55.1,55.45,56.04,56.650000000000006,57.38999999999999,57.779999999999994,58.220000000000006,58.78999999999999,59.24,59.56999999999999,59.97,60.20000000000001,60.29999999999998,60.459999999999994,60.62000000000001,60.81,61.03,61.26999999999998,61.53,61.72999999999998,61.889999999999986,61.96,61.99,62.06,62.080000000000005,62.12,62.21000000000001,62.37,62.599999999999994,62.8,62.910000000000004,62.93000000000001,62.97999999999999,62.92999999999999,63.02000000000002,63.1,63.199999999999996,63.14999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
