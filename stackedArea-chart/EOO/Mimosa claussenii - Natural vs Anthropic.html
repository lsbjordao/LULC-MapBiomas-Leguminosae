<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.93999999999999,58.49999999999999,58.069999999999986,57.55999999999998,56.829999999999984,56.19999999999999,55.559999999999995,54.91999999999999,54.37999999999999,53.82999999999999,53.199999999999996,52.64999999999999,52.15,51.749999999999986,51.4,50.97,50.63,50.14,49.620000000000005,49.01,48.540000000000006,48.27,48,47.74000000000001,47.51,47.190000000000005,46.86,46.34,45.73,45.26,44.88,44.63,44.42,44.29,44.06,43.830000000000005,43.54,43.660000000000004],"color":"green"},{"name":"anthropic","data":[39.709999999999994,40.17000000000001,40.57999999999999,41.08,41.83,42.43999999999999,43.099999999999994,43.71999999999999,44.28,44.83,45.45,46.01,46.52,46.89,47.250000000000014,47.680000000000014,48.040000000000006,48.51000000000001,49.030000000000015,49.63,50.11000000000001,50.37000000000002,50.65000000000002,50.930000000000014,51.13,51.42,51.78,52.29,52.88999999999999,53.38,53.76000000000001,54.029999999999994,54.21,54.350000000000016,54.57,54.8,55.099999999999994,54.97999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
