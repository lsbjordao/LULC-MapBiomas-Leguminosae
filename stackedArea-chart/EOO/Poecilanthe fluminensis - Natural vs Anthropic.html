<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.33,48.76,48.25,48.37,48.41,48.37,48.42,48.33,48.169999999999995,48.379999999999995,48.53999999999999,48.910000000000004,48.96,49.1,49.62,49.739999999999995,49.709999999999994,49.83,49.830000000000005,49.85,50.14,50.269999999999996,50.099999999999994,50.21,50.230000000000004,50.34,50.38,50.599999999999994,50.93,51.21,51.38999999999999,51.39,51.51,51.419999999999995,51.51,51.49,52.07,52.31],"color":"green"},{"name":"anthropic","data":[46.93,48.51,49,48.9,48.85,48.89,48.84,48.94,49.09000000000001,48.88000000000001,48.720000000000006,48.339999999999996,48.3,48.18000000000001,47.64,47.53,47.55,47.43,47.43000000000001,47.43000000000001,47.14000000000001,47,47.15,47.06,47.04,46.92,46.879999999999995,46.65,46.339999999999996,46.05,45.88,45.870000000000005,45.75999999999999,45.849999999999994,45.75,45.78,45.19,44.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
