<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.41,58.260000000000005,58.86,59.27000000000001,59.68000000000001,59.699999999999996,59.5,59.39999999999999,59.099999999999994,59.03,59.29,59.23,59.3,59.290000000000006,59.31,59.349999999999994,59.510000000000005,59.85000000000001,59.89,59.879999999999995,59.879999999999995,59.68000000000001,59.63000000000001,60.18000000000001,60.56999999999999,60.39999999999999,60.31,60.33,59.730000000000004,59.59,59.64,59.46000000000001,59.92,60.28999999999999,60.31,61.2,61.290000000000006,62.05],"color":"green"},{"name":"anthropic","data":[42.08,41.22,40.620000000000005,40.22,39.81,39.79,39.98,40.07,40.38,40.45,40.199999999999996,40.260000000000005,40.19,40.190000000000005,40.17,40.14,39.98,39.63,39.6,39.61,39.6,39.790000000000006,39.86000000000001,39.300000000000004,38.92000000000001,39.09,39.17,39.15,39.760000000000005,39.88,39.839999999999996,40.04,39.57,39.2,39.16,38.28,38.19,37.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
