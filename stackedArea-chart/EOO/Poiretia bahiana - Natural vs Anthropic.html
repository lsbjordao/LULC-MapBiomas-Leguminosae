<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76,75.92,77.92000000000002,77.10999999999999,76.24999999999999,74.64,74.99,75.06000000000002,75.55000000000001,76.21000000000002,76.06,76.29,76.85,76.60000000000001,76.68000000000002,77.66000000000001,77.38,76.80999999999999,76.92,76.80999999999999,76.39,76.61000000000003,75.51,74.61,73.53999999999999,72.47,71.83,71.86000000000001,71.35999999999999,71.5,72.28999999999999,72.14,71.91,71.82999999999998,71.52,71.32,71.21000000000001,71.16000000000001],"color":"green"},{"name":"anthropic","data":[23.710000000000004,23.790000000000006,21.800000000000004,22.599999999999998,23.49,25.09,24.730000000000004,24.66,24.16,23.51,23.65,23.410000000000004,22.880000000000003,23.140000000000008,23.040000000000006,22.060000000000006,22.34,22.910000000000004,22.799999999999997,22.919999999999998,23.34,23.099999999999998,24.200000000000003,25.1,26.19,27.229999999999997,27.88,27.86,28.340000000000003,28.2,27.430000000000003,27.57,27.810000000000002,27.86,28.199999999999996,28.4,28.519999999999996,28.549999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
