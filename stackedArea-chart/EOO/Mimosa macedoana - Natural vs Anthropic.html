<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.12,68.68,68.13000000000001,67.86000000000001,67.48,67.50999999999999,67.38,67.30999999999999,66.96,66.93,66.80000000000001,67,67.67000000000002,68.11,68.07000000000001,67.73000000000002,67.39,66.67,66.33,66.04,66.57000000000001,66.53,66.46000000000001,66.67,66.92999999999999,66.95,66.82,67.05,67.17,67.28999999999999,67.84,67.89,67.91,67.74000000000001,67.60000000000001,67.33000000000001,67.16,66.79],"color":"green"},{"name":"anthropic","data":[29.29,30.73,31.28,31.56,31.94,31.889999999999997,32.03,32.120000000000005,32.45,32.489999999999995,32.6,32.410000000000004,31.75,31.299999999999997,31.35,31.680000000000003,32.02,32.75,33.08,33.370000000000005,32.84,32.879999999999995,32.98,32.75,32.49,32.46000000000001,32.580000000000005,32.37,32.26,32.13000000000001,31.580000000000002,31.52,31.49,31.68,31.819999999999997,32.08,32.26,32.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
