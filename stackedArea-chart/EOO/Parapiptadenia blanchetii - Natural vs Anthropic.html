<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.03999999999999,56.03,54.94,54.080000000000005,53.209999999999994,52.64000000000001,52.269999999999996,51.510000000000005,51.04999999999999,50.809999999999995,50.739999999999995,50.85,51.65,51.63999999999999,51.93,51.88,51.44,51.39999999999999,51.199999999999996,51.099999999999994,51.029999999999994,51.209999999999994,51.14999999999999,51.059999999999995,50.849999999999994,50.76999999999999,50.49999999999999,50.050000000000004,49.47,49.269999999999996,49.25999999999999,49.62,49.499999999999986,49.449999999999996,49.49999999999999,49.54999999999999,49.48,49.760000000000005],"color":"green"},{"name":"anthropic","data":[43.17999999999999,43.17,44.26,45.12,46.019999999999996,46.58,46.949999999999996,47.709999999999994,48.18,48.42,48.49000000000001,48.36000000000001,47.57,47.589999999999996,47.29999999999999,47.35999999999999,47.779999999999994,47.83999999999999,48.01999999999999,48.15,48.21999999999999,48.01,48.09,48.18,48.36,48.47,48.749999999999986,49.169999999999995,49.77,49.94,49.959999999999994,49.60999999999999,49.72999999999999,49.77,49.74999999999999,49.66999999999999,49.73,49.46999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
