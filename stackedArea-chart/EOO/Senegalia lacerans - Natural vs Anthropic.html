<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.89000000000001,73.61999999999998,72.99999999999999,72.41999999999999,71.79,71.37000000000002,70.92,70.32,69.75,69.15,68.42,67.78999999999999,67.31999999999998,66.78999999999999,66.23999999999998,65.75999999999999,65.31,64.75000000000001,64.04,63.37,62.900000000000006,62.530000000000015,62.31000000000001,62.100000000000016,61.97000000000001,61.85000000000001,61.650000000000006,61.39000000000001,61.09000000000002,60.78,60.50000000000002,60.34,60.150000000000006,60,59.750000000000014,59.519999999999996,59.18000000000001,58.73],"color":"green"},{"name":"anthropic","data":[25.780000000000005,26.070000000000004,26.670000000000005,27.27,27.900000000000002,28.29,28.750000000000004,29.320000000000007,29.890000000000004,30.53000000000001,31.250000000000004,31.9,32.36,32.870000000000005,33.45,33.9,34.39,34.94,35.62000000000001,36.27,36.77,37.1,37.35000000000001,37.55,37.70000000000001,37.79,37.99999999999999,38.24,38.58,38.9,39.150000000000006,39.339999999999996,39.5,39.63,39.889999999999986,40.11999999999999,40.48999999999999,40.93999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
