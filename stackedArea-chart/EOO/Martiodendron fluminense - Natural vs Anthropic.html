<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[26.3,25.98,25.79,25.66,25.470000000000002,25.310000000000006,25.46,25.500000000000004,25.54,25.55,25.57,25.71,25.840000000000003,25.83,25.810000000000002,25.52,25.460000000000004,25.44,25.34,25.449999999999996,25.610000000000003,25.73,25.78,25.930000000000003,26.260000000000005,26.370000000000005,26.41,26.59,26.520000000000003,26.45,26.61,26.58,26.6,26.760000000000005,26.869999999999997,27.060000000000002,27.320000000000004,27.400000000000002],"color":"green"},{"name":"anthropic","data":[69.01,69.33,69.52000000000001,69.65,69.85000000000001,69.99,69.84,69.80000000000001,69.75999999999999,69.76,69.74000000000001,69.60000000000001,69.47000000000001,69.49000000000001,69.48,69.78,69.84,69.86999999999999,69.96999999999998,69.86999999999999,69.69999999999999,69.58999999999999,69.53999999999999,69.36999999999999,69.05999999999999,68.96000000000001,68.91,68.71999999999998,68.8,68.86,68.71,68.74000000000001,68.69999999999999,68.56,68.44,68.22999999999999,67.99000000000001,67.9],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
