<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.830000000000005,62.55,61.86,61.25000000000001,60.510000000000005,59.98,59.430000000000014,58.82,58.260000000000005,57.88,57.52000000000001,57.25000000000001,57.17000000000001,56.89000000000001,56.58000000000002,56.27,55.92000000000001,55.61000000000001,55.20000000000002,54.71,54.35,54.13000000000001,53.96000000000001,53.809999999999995,53.71,53.510000000000005,53.28,52.780000000000015,52.27000000000001,51.82000000000001,51.49,51.36000000000001,51.19000000000001,51.10000000000001,50.890000000000015,50.7,50.460000000000015,50.39000000000001],"color":"green"},{"name":"anthropic","data":[36.82,37.099999999999994,37.77999999999999,38.400000000000006,39.13,39.68,40.19999999999999,40.839999999999996,41.41000000000002,41.77,42.120000000000005,42.42,42.50999999999999,42.78999999999999,43.080000000000005,43.39000000000001,43.739999999999995,44.05,44.449999999999996,44.93,45.28,45.519999999999996,45.71,45.839999999999996,45.93999999999998,46.12999999999999,46.35999999999999,46.87,47.36999999999999,47.82000000000001,48.16,48.32,48.44999999999999,48.55999999999999,48.750000000000014,48.95,49.2,49.240000000000016],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
