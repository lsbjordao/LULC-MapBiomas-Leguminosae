<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.91,99.14999999999999,99.02,98.9,98.92999999999999,98.97,98.96,98.93,98.76,98.67999999999999,98.67,98.67,98.58999999999999,98.42000000000002,98.24000000000001,98.24000000000001,98.3,98.32,98.19000000000001,98.13,98.18,98.27,98.42999999999998,98.57,98.59,98.58000000000001,98.41999999999999,98.31000000000002,98.25999999999999,98.16,98.09,98.01000000000002,97.95,97.95,98.04,98,97.98,97.78000000000002],"color":"green"},{"name":"anthropic","data":[0.72,0.47000000000000003,0.6,0.73,0.7,0.66,0.6699999999999999,0.69,0.86,0.9299999999999999,0.96,0.95,1.04,1.2,1.38,1.4,1.32,1.31,1.44,1.49,1.45,1.35,1.2000000000000002,1.06,1.03,1.04,1.21,1.31,1.37,1.46,1.55,1.6300000000000001,1.6600000000000001,1.69,1.5899999999999999,1.62,1.66,1.8599999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
