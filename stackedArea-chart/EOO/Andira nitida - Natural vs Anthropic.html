<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.25000000000001,55.080000000000005,54.46000000000001,53.830000000000005,53.220000000000006,52.910000000000004,52.550000000000004,52.13,51.7,51.63000000000001,51.62000000000001,51.680000000000014,52.01000000000001,51.92000000000001,51.81000000000001,51.75000000000001,51.510000000000005,51.38000000000001,51.18,51.03,50.89,50.9,50.870000000000005,50.97,51.029999999999994,50.99,50.85,50.46,50.1,49.77,49.52,49.53,49.550000000000004,49.68,49.690000000000005,49.760000000000005,49.780000000000015,49.89],"color":"green"},{"name":"anthropic","data":[36.26000000000001,36.430000000000014,37.06000000000001,37.68000000000001,38.29,38.61000000000001,38.99,39.410000000000004,39.81,39.85,39.90000000000001,39.84000000000002,39.5,39.63000000000001,39.7,39.79,40.01,40.14999999999999,40.36,40.50000000000001,40.63,40.62000000000001,40.64000000000001,40.540000000000006,40.47999999999999,40.529999999999994,40.67999999999999,41.07,41.449999999999996,41.76,42,42,41.989999999999995,41.84,41.82000000000001,41.75999999999999,41.74999999999999,41.61999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
