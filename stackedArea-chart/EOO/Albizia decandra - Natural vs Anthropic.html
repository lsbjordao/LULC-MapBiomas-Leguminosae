<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.33999999999999,98.4,98.39,98.33,98.37000000000002,98.30000000000001,98.29000000000002,98.21000000000001,98.15,98.07000000000002,97.73,97.69000000000001,97.61000000000001,97.44,97.42999999999999,97.38,97.26,97.14999999999999,97.14,97.07000000000001,97.00999999999999,96.95999999999998,96.97,96.88999999999999,96.85000000000002,96.92999999999999,96.96000000000001,96.94999999999999,96.87,96.77000000000001,96.66999999999999,96.52,96.49,96.45,96.38999999999999,96.4,96.42999999999999,96.15],"color":"green"},{"name":"anthropic","data":[1.21,1.16,1.1700000000000002,1.21,1.1900000000000002,1.27,1.29,1.35,1.4000000000000001,1.5000000000000002,1.83,1.86,1.9300000000000002,2.1299999999999994,2.1399999999999992,2.1699999999999995,2.2899999999999996,2.42,2.43,2.4800000000000004,2.56,2.6,2.59,2.67,2.6999999999999997,2.61,2.59,2.61,2.69,2.8,2.8899999999999997,3.04,3.0799999999999996,3.12,3.1599999999999997,3.17,3.1399999999999997,3.4099999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
