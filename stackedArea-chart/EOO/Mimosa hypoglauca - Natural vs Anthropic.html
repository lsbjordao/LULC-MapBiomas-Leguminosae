<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.540000000000006,61.43000000000001,61.06000000000001,60.63000000000001,60.09,59.790000000000006,59.39000000000001,58.96000000000002,58.50000000000001,58.33,58.07,57.96000000000001,58.080000000000005,57.92000000000001,57.74,57.540000000000006,57.29000000000001,57.06,56.79000000000001,56.42000000000001,56.17,56.03,55.88000000000001,55.839999999999996,55.8,55.68,55.52,55.080000000000005,54.67000000000001,54.32,54.07000000000001,54.019999999999996,53.91,53.839999999999996,53.7,53.57,53.43000000000001,53.31000000000002],"color":"green"},{"name":"anthropic","data":[37.78,37.890000000000015,38.239999999999995,38.68,39.21,39.52,39.92000000000001,40.35000000000001,40.800000000000004,40.98,41.239999999999995,41.34,41.239999999999995,41.41,41.579999999999984,41.75999999999999,42.019999999999996,42.24,42.52,42.879999999999995,43.109999999999985,43.260000000000005,43.38999999999999,43.449999999999996,43.51,43.61,43.769999999999996,44.2,44.61000000000001,44.97000000000001,45.230000000000004,45.27,45.39,45.45,45.599999999999994,45.69999999999999,45.85,45.96000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
