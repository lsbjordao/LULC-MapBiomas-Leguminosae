<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.36999999999999,69.14999999999999,69.22999999999999,68.03999999999999,67.23,66.29,66.11999999999999,65.55000000000001,65.52,65.59,65.28999999999999,65.48,65.86,65.66,65.94000000000001,66.28999999999998,66.13,65.82000000000001,65.79,65.88000000000001,65.58,65.9,65.50999999999999,65.11,64.69000000000001,64.01999999999998,63.77,63.41,62.07,61.629999999999995,61.67,62.42,62.47,62.22,62.06,61.940000000000005,61.879999999999995,61.79999999999999],"color":"green"},{"name":"anthropic","data":[30.09,30.320000000000004,30.240000000000006,31.41,32.24,33.16000000000001,33.35000000000001,33.93,33.949999999999996,33.870000000000005,34.17,33.95,33.61,33.82,33.510000000000005,33.160000000000004,33.330000000000005,33.64000000000001,33.68000000000001,33.58000000000001,33.89,33.57000000000001,33.95000000000001,34.36000000000001,34.769999999999996,35.449999999999996,35.7,36.05,37.38000000000001,37.82,37.78999999999999,37.05000000000001,36.99,37.24000000000001,37.41,37.52,37.589999999999996,37.690000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
