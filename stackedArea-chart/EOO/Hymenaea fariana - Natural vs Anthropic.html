<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[24.329999999999995,23.949999999999996,23.169999999999995,22.489999999999995,22.109999999999996,21.96,21.870000000000005,21.839999999999996,21.89,21.900000000000002,21.990000000000002,21.93,21.770000000000003,21.58,21.500000000000004,21.23,21.24,21.26,21.169999999999998,21.289999999999996,21.28,21.310000000000006,21.45,21.390000000000004,21.460000000000004,21.310000000000006,21.26,20.970000000000002,20.810000000000002,20.77,20.860000000000003,20.970000000000002,20.999999999999996,21.17,21.18,21.28,21.410000000000004,21.680000000000003],"color":"green"},{"name":"anthropic","data":[48.25999999999999,48.64999999999999,49.43999999999999,50.13999999999999,50.519999999999996,50.67000000000001,50.769999999999996,50.790000000000006,50.76000000000001,50.75,50.67,50.7,50.85000000000001,51.04,51.14000000000001,51.400000000000006,51.39,51.400000000000006,51.449999999999996,51.349999999999994,51.37,51.33,51.18,51.260000000000005,51.17000000000001,51.34000000000001,51.39,51.65000000000001,51.85,51.9,51.78000000000001,51.690000000000005,51.660000000000004,51.48,51.48,51.38999999999999,51.260000000000005,50.98],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
