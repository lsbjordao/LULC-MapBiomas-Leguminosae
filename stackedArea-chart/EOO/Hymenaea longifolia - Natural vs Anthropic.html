<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.02000000000001,70.78000000000003,70.24000000000002,69.71000000000002,69.03,68.53,68.01,67.45000000000002,66.85000000000001,66.41999999999999,65.98,65.59,65.38999999999999,65.01,64.62,64.27,63.84,63.38,62.75000000000001,62.120000000000005,61.6,61.300000000000004,60.99,60.77,60.62000000000001,60.41,60.11,59.54,58.980000000000004,58.470000000000006,58.050000000000004,57.84,57.64000000000001,57.50000000000001,57.230000000000004,56.99,56.68,56.47],"color":"green"},{"name":"anthropic","data":[28.37,28.610000000000003,29.12,29.68,30.37,30.870000000000005,31.36,31.960000000000004,32.550000000000004,32.98000000000001,33.41000000000001,33.81,34,34.34,34.76,35.13,35.559999999999995,36.029999999999994,36.64999999999999,37.26,37.769999999999996,38.10000000000001,38.38,38.61999999999999,38.74999999999999,38.96000000000001,39.239999999999995,39.830000000000005,40.39999999999999,40.910000000000004,41.330000000000005,41.55000000000001,41.73000000000001,41.89000000000001,42.140000000000015,42.360000000000014,42.680000000000014,42.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
