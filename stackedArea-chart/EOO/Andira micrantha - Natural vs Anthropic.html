<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.08,99.10000000000001,99.07,99.06000000000002,99.06,99.09,99.11000000000001,99.09000000000002,99.03999999999999,99.04,99.08,99.08000000000003,99.05,98.97,98.91,98.95,98.97999999999999,98.97999999999999,98.99000000000001,98.97,98.92999999999999,98.9,98.9,98.94000000000001,98.89999999999999,98.82000000000001,98.82000000000001,98.86,98.89000000000001,98.84,98.75999999999999,98.62,98.61000000000001,98.64,98.66000000000001,98.64000000000001,98.54,98.44000000000001],"color":"green"},{"name":"anthropic","data":[0.35,0.32999999999999996,0.36,0.36,0.36,0.33999999999999997,0.32,0.35,0.39,0.39,0.33999999999999997,0.35,0.39,0.47,0.52,0.47,0.44,0.45,0.45,0.47000000000000003,0.49,0.53,0.52,0.5,0.53,0.6100000000000001,0.6200000000000001,0.5700000000000001,0.56,0.5800000000000001,0.6599999999999999,0.81,0.8200000000000001,0.78,0.76,0.7899999999999999,0.88,1],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
