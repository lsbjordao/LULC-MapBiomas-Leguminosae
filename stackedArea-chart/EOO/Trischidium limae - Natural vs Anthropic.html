<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[11.7,11.239999999999998,10.360000000000003,9.78,9.52,9.31,9.1,9.11,9.099999999999998,9.1,9.059999999999999,9.11,9.16,9.269999999999998,9.51,9.629999999999999,9.819999999999999,9.929999999999996,9.989999999999998,10.15,10.23,10.440000000000001,10.74,10.75,10.77,10.830000000000002,10.879999999999999,11,11.079999999999998,11.23,11.37,11.520000000000001,11.610000000000001,11.729999999999999,11.84,12,12.190000000000001,12.709999999999999],"color":"green"},{"name":"anthropic","data":[49.29,49.73,50.660000000000004,51.279999999999994,51.58,51.78999999999999,51.99999999999999,52.019999999999996,52.01,52.05,52.099999999999994,52.01,51.96,51.85999999999999,51.609999999999985,51.5,51.28,51.17,51.11,50.959999999999994,50.89,50.669999999999995,50.33999999999999,50.33999999999999,50.309999999999995,50.26,50.239999999999995,50.099999999999994,50.03,49.9,49.75,49.610000000000014,49.52000000000001,49.39,49.33000000000001,49.23000000000001,49.07,48.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
