<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.47000000000003,70.22000000000001,69.59,68.97000000000003,68.34000000000002,67.89,67.44000000000001,66.77000000000001,66.18,65.65000000000002,64.97,64.44000000000001,63.970000000000006,63.410000000000004,62.879999999999995,62.42999999999999,61.95999999999999,61.47,60.769999999999996,60.109999999999985,59.59999999999999,59.21999999999999,58.95,58.699999999999996,58.60999999999999,58.419999999999995,58.22,57.88999999999999,57.58999999999999,57.31999999999999,57.03999999999999,56.81,56.61,56.43,56.09999999999999,55.849999999999994,55.440000000000005,54.95],"color":"green"},{"name":"anthropic","data":[26.650000000000002,26.89000000000001,27.500000000000007,28.160000000000004,28.770000000000007,29.240000000000006,29.68000000000001,30.340000000000003,30.920000000000012,31.490000000000006,32.13,32.690000000000005,33.13,33.69,34.220000000000006,34.650000000000006,35.15000000000001,35.64,36.34000000000002,37.00000000000001,37.5,37.870000000000005,38.13000000000001,38.42000000000001,38.52,38.699999999999996,38.900000000000006,39.220000000000006,39.49,39.790000000000006,40.06,40.31999999999999,40.51999999999999,40.699999999999996,41.00999999999999,41.26,41.65999999999999,42.129999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
