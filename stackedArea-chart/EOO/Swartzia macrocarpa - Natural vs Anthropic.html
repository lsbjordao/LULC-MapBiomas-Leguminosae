<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.76,98.77000000000001,98.72,98.68,98.70000000000002,98.71000000000002,98.71000000000001,98.61000000000001,98.55,98.50999999999999,98.47000000000001,98.41000000000001,98.27000000000002,98.09000000000002,98.01,98.02,98.00999999999999,97.96000000000001,97.91000000000001,97.84000000000002,97.72000000000001,97.64,97.66999999999999,97.69,97.61,97.55,97.59000000000002,97.64,97.60000000000002,97.54000000000002,97.38000000000001,97.2,97.16000000000001,97.22000000000001,97.27,97.25,97.24000000000001,97.02000000000001],"color":"green"},{"name":"anthropic","data":[0.88,0.8500000000000001,0.91,0.9400000000000001,0.91,0.91,0.9,1,1.08,1.11,1.1500000000000001,1.21,1.34,1.52,1.61,1.6,1.62,1.6600000000000001,1.72,1.78,1.9000000000000001,1.98,1.9400000000000002,1.9300000000000002,2.02,2.07,2.0399999999999996,1.9800000000000002,2.01,2.0799999999999996,2.2299999999999995,2.4299999999999997,2.4499999999999997,2.3999999999999995,2.35,2.36,2.3899999999999997,2.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
