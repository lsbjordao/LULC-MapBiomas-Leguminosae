<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.34000000000002,65.30000000000003,64.81000000000002,64.3,63.71999999999999,63.349999999999994,62.98,62.51,62.11999999999999,61.86,61.629999999999995,61.37999999999999,61.279999999999994,60.999999999999986,60.62999999999998,60.33999999999998,59.97999999999999,59.62999999999999,59.15999999999999,58.65,58.22999999999999,57.98,57.73,57.53999999999999,57.40999999999999,57.17999999999999,56.94999999999999,56.39999999999999,55.86,55.419999999999995,55.029999999999994,54.859999999999985,54.699999999999996,54.58,54.349999999999994,54.13000000000001,53.860000000000014,53.68000000000001],"color":"green"},{"name":"anthropic","data":[23.830000000000002,23.880000000000003,24.380000000000003,24.9,25.46,25.830000000000002,26.220000000000002,26.650000000000002,27.080000000000002,27.310000000000002,27.54,27.779999999999998,27.89,28.19,28.54,28.85,29.200000000000006,29.540000000000006,30.010000000000005,30.529999999999994,30.950000000000006,31.2,31.45,31.63,31.769999999999996,31.970000000000002,32.199999999999996,32.75,33.3,33.76,34.15,34.300000000000004,34.480000000000004,34.599999999999994,34.83,35.03,35.29,35.49999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
