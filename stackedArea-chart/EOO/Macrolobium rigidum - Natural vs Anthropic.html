<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.239999999999995,34.33,33.71,33.49,33.13,33,32.67999999999999,32.379999999999995,32.11,31.869999999999997,31.599999999999998,31.520000000000003,31.320000000000004,31.320000000000004,31.270000000000003,31.03000000000001,30.980000000000008,30.870000000000008,30.67,30.360000000000007,30.14,30.050000000000004,30.140000000000004,30.370000000000008,30.410000000000004,30.340000000000003,30.410000000000004,30.39,30.439999999999998,30.630000000000003,30.76,30.91,30.92,31.000000000000004,30.950000000000003,30.84,31.010000000000005,31.289999999999996],"color":"green"},{"name":"anthropic","data":[49.06999999999999,48.98,49.6,49.82,50.190000000000005,50.31,50.629999999999995,50.93,51.18,51.43,51.71,51.8,51.97,51.98,52.06,52.3,52.35,52.459999999999994,52.66,52.95,53.16,53.25999999999999,53.16,52.93999999999999,52.89999999999999,52.96,52.9,52.93000000000001,52.88,52.69,52.540000000000006,52.4,52.38,52.31999999999999,52.37,52.48,52.3,52.03999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
