<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.13,42.89,42.35999999999999,41.88,41.62,41.72,41.58,41.319999999999986,41.13999999999999,40.93,40.789999999999985,40.80999999999999,40.92999999999999,40.99999999999998,41.12999999999998,41.09999999999999,41.07999999999999,40.999999999999986,40.989999999999995,40.98999999999999,41.109999999999985,41.269999999999996,41.259999999999984,41.230000000000004,41.120000000000005,41.079999999999984,41.04999999999998,41.01,41,40.85,40.74000000000001,40.61000000000001,40.69,40.80999999999999,40.82,40.82000000000001,40.88,41.03999999999999],"color":"green"},{"name":"anthropic","data":[54.68999999999999,54.94,55.41999999999999,55.889999999999986,56.19,56.089999999999996,56.22999999999999,56.46999999999999,56.649999999999984,56.870000000000005,57.019999999999996,56.989999999999995,56.879999999999995,56.829999999999984,56.69999999999999,56.71,56.739999999999995,56.83999999999999,56.83999999999999,56.829999999999984,56.709999999999994,56.54999999999999,56.55,56.60000000000001,56.67999999999999,56.720000000000006,56.75,56.78999999999999,56.809999999999995,56.949999999999996,57.06999999999999,57.18,57.12,56.97999999999999,56.97,56.970000000000006,56.910000000000004,56.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
