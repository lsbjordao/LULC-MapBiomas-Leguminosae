<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.34,75.89999999999999,74.96,74.16,73.2,72.42999999999999,71.7,70.8,69.91,68.97,67.99,67.07999999999998,66.35,65.60999999999999,64.79,64.10000000000001,63.480000000000004,62.87,61.94,61.06999999999999,60.459999999999994,60.01,59.73999999999999,59.38,59.129999999999995,58.87999999999999,58.54999999999999,57.989999999999995,57.44,56.89,56.45,56.21,55.97000000000001,55.709999999999994,55.43,55.07,54.71999999999999,54.33999999999999],"color":"green"},{"name":"anthropic","data":[22.589999999999996,23.02,23.990000000000002,24.780000000000005,25.73,26.490000000000002,27.24000000000001,28.130000000000006,28.99000000000001,29.96,30.92,31.850000000000005,32.56,33.33,34.14,34.800000000000004,35.42,36.04,36.95,37.85,38.470000000000006,38.919999999999995,39.169999999999995,39.52,39.78999999999999,40.029999999999994,40.37,40.9,41.480000000000004,42.029999999999994,42.459999999999994,42.69999999999999,42.940000000000005,43.19,43.49,43.82,44.18,44.55],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
