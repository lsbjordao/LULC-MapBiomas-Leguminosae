<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.24999999999999,94.1,93.67,93.26,92.91,92.63000000000001,92.3,91.77,91.23,90.61999999999999,89.82000000000001,89.13000000000002,88.45000000000002,87.77,87.14,86.63000000000001,86.07000000000001,85.43999999999998,84.58,83.72999999999999,83.11,82.63000000000001,82.34000000000002,82.03000000000002,81.83999999999999,81.73,81.58999999999999,81.47999999999998,81.27,81.08000000000001,80.80999999999999,80.51999999999998,80.3,80.07999999999998,79.77,79.45000000000002,79,78.37],"color":"green"},{"name":"anthropic","data":[5.260000000000001,5.41,5.83,6.239999999999999,6.59,6.87,7.199999999999998,7.759999999999999,8.29,8.899999999999999,9.690000000000001,10.379999999999999,11.06,11.73,12.360000000000001,12.870000000000001,13.450000000000001,14.08,14.93,15.77,16.41,16.87,17.160000000000004,17.48,17.669999999999998,17.77,17.91,18.04,18.229999999999997,18.429999999999996,18.7,18.98,19.21,19.42,19.73,20.04,20.5,21.119999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
