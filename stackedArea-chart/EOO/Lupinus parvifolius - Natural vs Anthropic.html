<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.96000000000001,75.55,74.88,74.53,73.97,73.96000000000001,73.80000000000001,73.8,73.27,72.97999999999999,72.65000000000002,72.91999999999999,73.88,74.37,74.32000000000001,73.97999999999999,73.22000000000001,71.78000000000002,71.4,70.71,71.11,71.13,70.88999999999999,71.22,71.62,71.57000000000001,71.44,71.73,72,72.05,72.51,72.46,72.22999999999999,72.03999999999999,71.89999999999999,71.49,71.28000000000002,70.92],"color":"green"},{"name":"anthropic","data":[21.790000000000003,24.18,24.849999999999998,25.200000000000003,25.770000000000003,25.770000000000003,25.92,25.92,26.47,26.76,27.080000000000002,26.790000000000003,25.86,25.36,25.4,25.77,26.54,27.959999999999997,28.32,29.019999999999996,28.63,28.59,28.83,28.51,28.100000000000005,28.15,28.31,27.990000000000002,27.76,27.669999999999998,27.22,27.290000000000003,27.51,27.7,27.840000000000003,28.26,28.460000000000004,28.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
