<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.050000000000004,56.69000000000002,55.96000000000001,55.300000000000004,54.580000000000005,54.07000000000001,53.59000000000001,52.980000000000004,52.470000000000006,52.14000000000001,51.77,51.52000000000001,51.39000000000001,51.15000000000001,50.85000000000001,50.550000000000004,50.280000000000015,50.02000000000001,49.71000000000001,49.34,49.110000000000014,48.97000000000001,48.87000000000001,48.82000000000001,48.76000000000001,48.66000000000001,48.50000000000001,48.120000000000005,47.78,47.490000000000016,47.27000000000001,47.210000000000015,47.140000000000015,47.09000000000001,46.94000000000001,46.810000000000024,46.67000000000001,46.63],"color":"green"},{"name":"anthropic","data":[42.82000000000001,43.17,43.9,44.580000000000005,45.28999999999999,45.779999999999994,46.26999999999998,46.879999999999995,47.39,47.709999999999994,48.059999999999995,48.34,48.47999999999998,48.71000000000001,48.99,49.28,49.540000000000006,49.809999999999995,50.129999999999995,50.47999999999999,50.73,50.870000000000005,50.970000000000006,51.03,51.059999999999995,51.160000000000004,51.31,51.70000000000001,52.06,52.36000000000001,52.56000000000002,52.61000000000001,52.68000000000001,52.75,52.89,52.99999999999999,53.17,53.21000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
