<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.26,99.27,99.26,99.25,99.25,99.27,99.26,99.23999999999998,99.19999999999999,99.2,99.21,99.16000000000001,99.05999999999999,98.94999999999999,98.88000000000001,98.89,98.88,98.85,98.74,98.58000000000001,98.39999999999999,98.28,98.24000000000001,98.19999999999997,98.15,98.08000000000001,98.07,98.08,98.00000000000001,97.94,97.79999999999998,97.62,97.52000000000002,97.44999999999999,97.33000000000001,97.16,96.89999999999999,96.50999999999999],"color":"green"},{"name":"anthropic","data":[0.36000000000000004,0.34,0.35000000000000003,0.37000000000000005,0.37,0.36,0.33999999999999997,0.37,0.41000000000000003,0.41000000000000003,0.41000000000000003,0.45999999999999996,0.56,0.67,0.74,0.7200000000000001,0.7400000000000001,0.78,0.88,1.04,1.23,1.34,1.3800000000000001,1.4100000000000001,1.46,1.53,1.55,1.54,1.62,1.6900000000000002,1.82,2.02,2.119999999999999,2.1699999999999995,2.2999999999999994,2.4499999999999993,2.7099999999999995,3.1099999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
