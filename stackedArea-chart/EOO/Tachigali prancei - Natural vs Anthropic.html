<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.1,92.44,91.74999999999999,91.21,90.77,90.57,89.95,89.2,88.25,87.00999999999999,85.21000000000001,83.14,81.83,80.49,79.26,78.12999999999998,76.85,75.07,73.25,71.69000000000001,70.33,69.44,68.91000000000001,68.63000000000002,68.45,68.35000000000001,67.97999999999999,67.7,67.32999999999998,66.92999999999999,66.35,65.66,64.88,64.28,63.489999999999995,62.96,62.32,61.49],"color":"green"},{"name":"anthropic","data":[5.24,5.93,6.6,7.1499999999999995,7.579999999999999,7.779999999999999,8.4,9.16,10.100000000000001,11.350000000000001,13.14,15.21,16.51,17.87,19.080000000000002,20.22,21.499999999999996,23.290000000000003,25.1,26.669999999999998,28.05,28.91,29.439999999999998,29.709999999999997,29.89,30.01,30.37,30.66,31.02,31.42,31.990000000000002,32.690000000000005,33.48,34.07,34.86,35.379999999999995,36.029999999999994,36.85999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
