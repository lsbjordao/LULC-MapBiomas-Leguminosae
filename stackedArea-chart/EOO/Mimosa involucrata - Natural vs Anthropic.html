<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.34000000000002,94.36,93.61999999999999,93.30999999999999,92.88,92.58999999999999,91.84,91.63,91.63,91.81,91.97000000000001,92.15000000000002,92.08,92.04,92.08,91.77,91.33,90.67,89.86999999999999,88.83,87.13,86.07000000000001,84.9,82.22,80.82,79.24,78.71000000000001,77.96,77.05000000000001,76.48,75.81,75.30999999999999,74.83,74.47,74.29,74.21000000000001,74.16,73.93],"color":"green"},{"name":"anthropic","data":[5.13,5.09,5.82,6.15,6.579999999999999,6.880000000000001,7.62,7.8100000000000005,7.8100000000000005,7.64,7.499999999999999,7.310000000000001,7.37,7.42,7.38,7.69,8.14,8.790000000000001,9.58,10.66,12.33,13.379999999999999,14.559999999999999,17.23,18.64,20.22,20.74,21.500000000000004,22.42,22.969999999999995,23.650000000000002,24.150000000000002,24.630000000000003,24.99,25.169999999999998,25.25,25.299999999999997,25.52],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
