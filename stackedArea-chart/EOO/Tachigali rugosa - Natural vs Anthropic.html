<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.050000000000004,43.82,43.28000000000001,42.82999999999999,42.45,42.35,42.13000000000001,41.85,41.620000000000005,41.46,41.199999999999996,41.089999999999996,41.050000000000004,40.95000000000001,40.89,40.74999999999999,40.660000000000004,40.50000000000001,40.42000000000001,40.34,40.39,40.419999999999995,40.400000000000006,40.35000000000001,40.25,40.17,40.11000000000001,39.97000000000001,39.81000000000001,39.6,39.49,39.349999999999994,39.35,39.46000000000001,39.47000000000001,39.48000000000001,39.53,39.699999999999996],"color":"green"},{"name":"anthropic","data":[54.55,54.789999999999985,55.339999999999996,55.800000000000004,56.17000000000001,56.269999999999996,56.51,56.77999999999999,56.99999999999999,57.16999999999999,57.41,57.53,57.559999999999995,57.639999999999986,57.72,57.870000000000005,57.94,58.120000000000005,58.18,58.26000000000001,58.22,58.190000000000005,58.220000000000006,58.260000000000005,58.38000000000001,58.43000000000001,58.49,58.63,58.81000000000001,59.000000000000014,59.12000000000001,59.260000000000005,59.24000000000001,59.13,59.14999999999999,59.12,59.05999999999999,58.89000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
