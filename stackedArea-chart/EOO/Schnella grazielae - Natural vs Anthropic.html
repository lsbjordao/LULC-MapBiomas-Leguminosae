<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.25,30.55,29.54,28.610000000000007,28.21,28.15,27.88,28.1,28.29,28.41,28.259999999999994,28.290000000000003,28.360000000000003,28.16,28.17,28.1,28.21,28.209999999999997,28.110000000000003,28.140000000000004,28.350000000000005,28.55,28.92,29,29.31,29.41,29.400000000000002,29.26,29.04,28.990000000000002,28.83,28.62,28.700000000000003,28.900000000000002,28.949999999999996,28.959999999999997,29.139999999999997,29.240000000000002],"color":"green"},{"name":"anthropic","data":[67.72999999999999,68.44999999999999,69.46000000000001,70.37,70.77,70.84000000000002,71.09,70.89999999999999,70.69999999999999,70.57,70.74000000000001,70.7,70.64000000000001,70.82000000000001,70.82000000000001,70.88000000000001,70.79,70.77,70.89,70.83999999999999,70.63999999999999,70.44000000000001,70.05000000000001,69.98,69.66000000000001,69.57,69.58,69.72000000000001,69.95,69.98,70.14,70.36999999999999,70.27,70.08,70.05000000000001,70.03999999999999,69.86,69.75999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
