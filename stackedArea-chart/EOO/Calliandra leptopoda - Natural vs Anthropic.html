<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.31,75.18,74.56,73.64000000000003,72.91000000000001,72.55000000000001,72.25000000000003,71.89000000000001,71.61000000000001,71.50000000000001,71.38000000000001,71.28000000000002,72.16000000000001,72.08,72.39000000000001,72.50000000000003,72.21000000000002,72.19000000000003,72.01000000000003,71.99000000000001,71.68000000000002,71.61000000000003,71.23000000000002,71.19000000000001,71.13000000000002,71.14000000000003,70.95000000000002,70.28000000000002,69.43,68.94999999999997,68.56,69,69.09000000000002,69.28999999999999,69.40000000000002,69.47000000000001,69.33,69.52],"color":"green"},{"name":"anthropic","data":[24.16,24.3,24.910000000000004,25.800000000000004,26.54,26.91,27.200000000000003,27.560000000000002,27.840000000000003,27.940000000000005,28.070000000000007,28.170000000000005,27.270000000000007,27.349999999999998,27.060000000000006,26.940000000000005,27.250000000000004,27.26,27.470000000000006,27.48,27.780000000000005,27.84000000000001,28.220000000000002,28.250000000000004,28.320000000000004,28.320000000000007,28.480000000000008,29.170000000000005,30.010000000000005,30.520000000000003,30.890000000000004,30.450000000000006,30.370000000000005,30.18,30.070000000000004,29.98,30.110000000000003,29.939999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
