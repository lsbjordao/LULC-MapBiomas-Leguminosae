<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.77,70.54,69.90999999999998,69.31000000000002,68.71,68.27,67.82000000000001,67.15999999999998,66.58000000000001,66.15,65.52,65.05,64.66000000000001,64.14,63.64,63.199999999999996,62.769999999999996,62.279999999999994,61.67,61.019999999999996,60.57000000000001,60.24999999999999,60.010000000000005,59.77,59.640000000000015,59.51999999999999,59.339999999999996,59.04999999999999,58.77,58.489999999999995,58.21000000000001,58.04,57.870000000000005,57.76,57.540000000000006,57.36,57.07,56.730000000000004],"color":"green"},{"name":"anthropic","data":[27.450000000000003,27.659999999999997,28.3,28.93,29.510000000000005,29.960000000000008,30.45000000000001,31.08000000000001,31.640000000000008,32.10000000000001,32.730000000000004,33.17999999999999,33.57999999999999,34.089999999999996,34.58999999999998,35.04,35.470000000000006,35.95,36.56999999999999,37.18,37.65,37.989999999999995,38.21000000000001,38.44000000000001,38.54000000000001,38.68,38.88,39.15999999999999,39.44000000000001,39.74,40,40.17999999999999,40.329999999999984,40.44999999999999,40.66999999999999,40.83999999999998,41.12,41.47],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
