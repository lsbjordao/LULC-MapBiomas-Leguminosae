<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.06,85.41,85.65000000000002,85.66000000000001,85.82000000000001,86.00999999999999,85.87,85.39999999999998,85.35999999999999,85.2,84.82000000000002,84.72999999999999,84.55,84.59,84.63,84.43,84.28000000000002,83.97,83.79,83.83000000000001,83.49000000000001,83.33,83.19999999999999,82.97999999999999,82.88000000000001,82.7,82.60000000000001,82.34,82.02000000000001,81.52,81.24,81.03000000000002,81.12,81.25,81.22999999999998,81.22000000000001,81.06000000000002,80.98],"color":"green"},{"name":"anthropic","data":[14.879999999999999,14.51,14.26,14.270000000000001,14.100000000000001,13.91,14.059999999999999,14.53,14.56,14.729999999999999,15.1,15.19,15.35,15.329999999999998,15.299999999999999,15.5,15.64,15.95,16.150000000000002,16.11,16.450000000000003,16.6,16.73,16.96,17.050000000000004,17.24,17.33,17.6,17.9,18.41,18.7,18.900000000000002,18.830000000000002,18.69,18.7,18.72,18.860000000000003,18.96],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
