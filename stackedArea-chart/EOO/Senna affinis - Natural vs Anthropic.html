<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.49000000000001,56.050000000000004,55.24,54.540000000000006,53.75000000000001,53.17,52.64000000000001,51.96,51.31000000000001,50.690000000000005,50.03,49.510000000000005,49.09,48.67000000000001,48.21,47.83,47.510000000000005,47.11,46.69999999999999,46.31,46.05,45.900000000000006,45.77000000000001,45.63,45.51,45.37,45.209999999999994,45.02,44.78999999999999,44.510000000000005,44.3,44.13999999999999,44.03,43.980000000000004,43.849999999999994,43.72999999999999,43.540000000000006,43.400000000000006],"color":"green"},{"name":"anthropic","data":[42.18999999999999,42.64999999999999,43.449999999999996,44.15,44.949999999999996,45.519999999999996,46.089999999999996,46.74,47.379999999999995,48.01000000000001,48.67,49.18000000000001,49.61,50.04999999999999,50.49000000000001,50.87,51.199999999999996,51.599999999999994,52.009999999999984,52.40999999999999,52.65,52.81999999999999,52.95,53.09,53.190000000000005,53.37,53.51,53.690000000000005,53.919999999999995,54.21000000000001,54.379999999999995,54.56,54.68,54.75,54.84000000000001,54.98,55.139999999999986,55.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
