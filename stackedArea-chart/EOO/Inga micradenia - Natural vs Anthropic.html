<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.17999999999999,90.96999999999998,90.57,90.17999999999999,89.81,89.50999999999999,89.16999999999997,88.66999999999999,88.14999999999999,87.55,86.75999999999999,86.09999999999998,85.44,84.79000000000002,84.19,83.71999999999998,83.19000000000001,82.52000000000001,81.64999999999998,80.82,80.17,79.78,79.49999999999997,79.24999999999999,79.10999999999996,79.00999999999999,78.87999999999998,78.77999999999999,78.58999999999999,78.40999999999998,78.17,77.92999999999999,77.73999999999998,77.58,77.29999999999998,77.00999999999998,76.56000000000002,75.99999999999999],"color":"green"},{"name":"anthropic","data":[8.779999999999998,8.96,9.379999999999999,9.76,10.139999999999999,10.43,10.770000000000003,11.280000000000001,11.790000000000001,12.390000000000002,13.170000000000002,13.840000000000002,14.490000000000002,15.139999999999999,15.75,16.21,16.759999999999998,17.42,18.299999999999997,19.14,19.770000000000003,20.17,20.420000000000005,20.69,20.84,20.92,21.07,21.179999999999996,21.340000000000003,21.559999999999995,21.780000000000005,22,22.18,22.370000000000005,22.650000000000006,22.940000000000005,23.399999999999995,23.930000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
