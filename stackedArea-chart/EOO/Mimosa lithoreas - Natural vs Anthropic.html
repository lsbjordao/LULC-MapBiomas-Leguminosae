<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.950000000000003,30.990000000000006,30.910000000000007,31.36,31.049999999999997,30.700000000000003,30.76,30.22,29.900000000000002,29.720000000000002,29.339999999999996,29.169999999999998,28.610000000000003,28.41,28.280000000000005,27.91,27.750000000000004,27.669999999999998,27.580000000000002,27.4,27.4,27.44,27.339999999999996,27.420000000000005,27.580000000000002,27.65,27.56,27.41,27.080000000000005,26.999999999999996,27.050000000000004,27.060000000000002,27.19,27.220000000000002,27.240000000000002,27.189999999999998,27.139999999999997,27.5],"color":"green"},{"name":"anthropic","data":[64.9,64.84999999999998,64.94999999999999,64.47,64.81,65.15,65.07999999999998,65.61999999999999,65.96,66.14,66.53,66.67,67.25,67.44,67.56000000000002,67.95999999999998,68.09000000000002,68.19,68.31000000000002,68.47,68.46000000000001,68.41000000000001,68.52000000000001,68.45,68.29000000000002,68.22,68.29999999999998,68.46,68.77,68.83999999999999,68.79999999999998,68.77999999999999,68.67,68.64000000000001,68.61999999999999,68.64,68.69999999999999,68.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
