<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.72,73.05000000000001,73.25999999999999,72.82,73.06,73.45,73.3,73.07000000000001,72.93,72.85,72.58,72.5,72.36999999999999,72.43999999999998,72.43,72.45,72.30999999999999,72.06,71.72000000000001,71.34,70.86,70.41999999999999,70.16,69.98,69.79,69.55,69.39999999999999,69.33,69.13,68.86000000000001,68.77,68.63000000000001,68.62,68.74000000000001,68.8,68.83,68.8,68.84],"color":"green"},{"name":"anthropic","data":[26.7,26.38,26.16,26.580000000000002,26.36,25.96,26.1,26.330000000000002,26.470000000000002,26.57,26.83,26.919999999999998,27.04,26.97,26.98,26.96,27.09,27.370000000000005,27.710000000000004,28.060000000000002,28.530000000000005,28.970000000000002,29.240000000000002,29.450000000000003,29.61,29.86,30.01,30.07,30.28,30.55,30.650000000000002,30.8,30.800000000000004,30.680000000000003,30.6,30.570000000000007,30.60000000000001,30.570000000000007],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
