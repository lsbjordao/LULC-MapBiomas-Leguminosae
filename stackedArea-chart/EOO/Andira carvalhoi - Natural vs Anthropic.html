<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.92000000000001,60.88000000000001,60.35000000000001,59.830000000000005,59.11000000000001,58.81000000000002,58.390000000000015,57.830000000000005,57.30000000000001,56.9,56.480000000000004,56.14,56.14000000000001,55.959999999999994,55.71,55.44,55.17,54.84,54.50999999999999,54.23000000000001,53.91,53.75,53.63,53.47,53.339999999999996,53.139999999999986,52.86999999999999,52.330000000000005,51.739999999999995,51.239999999999995,50.88000000000001,50.72,50.580000000000005,50.53,50.35999999999999,50.24000000000001,50.09000000000001,50.09],"color":"green"},{"name":"anthropic","data":[34.91,34.93999999999999,35.459999999999994,35.959999999999994,36.709999999999994,37.00999999999999,37.45000000000001,38.00000000000001,38.540000000000006,38.91,39.339999999999996,39.690000000000005,39.68,39.9,40.12,40.39,40.67,40.970000000000006,41.339999999999996,41.60999999999999,41.900000000000006,42.08999999999999,42.190000000000005,42.36,42.5,42.67000000000001,42.95000000000001,43.510000000000005,44.09,44.589999999999996,44.96,45.12000000000001,45.239999999999995,45.27,45.47,45.569999999999986,45.709999999999994,45.7],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
