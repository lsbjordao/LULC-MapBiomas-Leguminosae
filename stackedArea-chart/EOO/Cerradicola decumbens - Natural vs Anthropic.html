<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.31,34.4,33.37,32.47,31.59,30.869999999999997,30.240000000000002,29.479999999999997,28.849999999999994,28.22,27.57,27.08,26.64,26.269999999999992,25.97,25.609999999999996,25.349999999999998,25.07,24.72,24.47,24.32,24.269999999999996,24.249999999999996,24.249999999999996,24.29,24.3,24.290000000000003,24.229999999999997,24.169999999999995,24.119999999999997,24.109999999999996,24.14,24.11,24.109999999999992,24.07,24.029999999999998,23.959999999999994,24.150000000000002],"color":"green"},{"name":"anthropic","data":[64.07000000000001,64.97999999999998,65.98,66.89999999999999,67.77,68.47999999999999,69.13,69.9,70.53000000000002,71.14000000000001,71.81,72.28999999999999,72.74000000000001,73.07999999999998,73.42,73.78,74.00999999999999,74.30000000000003,74.66,74.91999999999997,75.05,75.11,75.13,75.13999999999999,75.08,75.07000000000001,75.08000000000001,75.14,75.17,75.25000000000003,75.25000000000001,75.22,75.25,75.25,75.29,75.32000000000001,75.41000000000001,75.22000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
