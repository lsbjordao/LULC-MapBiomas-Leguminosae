<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.06,52.06,51.41000000000001,50.88,50.32,49.88,49.589999999999996,49.24999999999999,49.18000000000001,48.99,49.14,49.510000000000005,49.81,49.85,50.1,49.97,49.61,49.6,49.650000000000006,49.64,50.05000000000001,50.38000000000001,50.420000000000016,50.36000000000001,49.78000000000001,49.660000000000004,49.41000000000001,49.28000000000001,49.12000000000001,48.940000000000005,48.959999999999994,49.089999999999996,49.160000000000004,49.160000000000004,49.07,48.989999999999995,48.91,49.11000000000001],"color":"green"},{"name":"anthropic","data":[49.94,49.94999999999999,50.58,51.099999999999994,51.66,52.11000000000001,52.39,52.73,52.809999999999995,52.989999999999995,52.849999999999994,52.43999999999999,52.169999999999995,52.129999999999995,51.89,52.02000000000001,52.36000000000001,52.370000000000005,52.33,52.349999999999994,51.94,51.599999999999994,51.57,51.62,52.199999999999996,52.34,52.56,52.699999999999996,52.870000000000005,53.05000000000001,53.02,52.890000000000015,52.84000000000001,52.82000000000001,52.93,53.01,53.07999999999999,52.85999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
