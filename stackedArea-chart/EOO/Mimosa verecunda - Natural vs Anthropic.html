<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.37,56.5,56.16,55.35,54.300000000000004,53.59,52.599999999999994,51.81999999999999,51.1,50.230000000000004,49.60000000000001,49.08,48.42000000000001,47.919999999999995,47.44,46.91,46.41000000000001,45.77000000000001,45.12999999999999,44.45000000000001,44.169999999999995,43.959999999999994,43.75000000000001,43.57,43.60000000000001,43.47999999999999,43.34,43.23000000000001,43.04,42.809999999999995,42.589999999999996,42.41000000000001,42.230000000000004,42.01000000000001,41.69000000000001,41.470000000000006,41.230000000000004,41.54],"color":"green"},{"name":"anthropic","data":[42.21999999999999,43.08,43.41,44.230000000000004,45.27,45.98,46.97999999999999,47.76,48.48,49.32999999999999,49.98,50.48,51.14,51.68,52.11999999999999,52.67,53.18,53.79,54.42999999999999,55.11999999999999,55.43,55.620000000000005,55.83,55.99999999999999,55.99,56.099999999999994,56.22999999999999,56.35000000000001,56.54,56.75999999999999,57.00999999999999,57.17,57.35,57.559999999999995,57.86,58.11,58.35,58.03999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
