<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.84,55.33,54.519999999999996,53.769999999999996,52.93,52.39000000000001,51.84,51.12,50.5,49.81,49.089999999999996,48.49999999999999,48.01,47.54,47.07000000000001,46.620000000000005,46.28000000000001,45.809999999999995,45.21999999999999,44.7,44.34000000000001,44.13999999999999,43.98999999999999,43.84999999999999,43.75,43.63,43.489999999999995,43.260000000000005,42.99,42.68,42.48,42.36,42.269999999999996,42.249999999999986,42.12,41.97999999999999,41.79,41.64],"color":"green"},{"name":"anthropic","data":[42.59999999999999,43.089999999999996,43.89999999999998,44.67,45.48,46.03999999999999,46.56999999999999,47.28999999999999,47.93,48.599999999999994,49.29,49.890000000000015,50.37,50.86000000000001,51.32999999999999,51.78,52.14,52.579999999999984,53.18,53.71000000000001,54.05,54.27000000000001,54.42,54.56000000000001,54.64000000000001,54.77999999999999,54.949999999999996,55.16,55.44,55.71000000000001,55.93,56.089999999999996,56.169999999999995,56.18,56.29,56.43000000000001,56.63,56.779999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
