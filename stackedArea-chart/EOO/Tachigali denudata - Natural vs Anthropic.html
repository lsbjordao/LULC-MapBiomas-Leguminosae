<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.42,33.120000000000005,32.86000000000001,32.59,32.43000000000001,32.36000000000001,32.21000000000001,32.050000000000004,31.970000000000006,32.00000000000001,31.909999999999997,31.890000000000004,31.810000000000006,31.71,31.610000000000003,31.400000000000002,31.34,31.250000000000004,31.21,31.19,31.210000000000004,31.22000000000001,31.270000000000007,31.330000000000002,31.42,31.529999999999998,31.59,31.59,31.53,31.480000000000004,31.580000000000002,31.67,31.77,31.85,31.890000000000004,31.950000000000003,32.06,32.150000000000006],"color":"green"},{"name":"anthropic","data":[60.74000000000001,61.059999999999995,61.330000000000005,61.59000000000001,61.74999999999999,61.830000000000005,61.96,62.099999999999994,62.18000000000001,62.16,62.25,62.290000000000006,62.36,62.44999999999999,62.56999999999999,62.78999999999999,62.84,62.91,62.980000000000004,62.96,62.96000000000001,62.94,62.92,62.82999999999999,62.75999999999999,62.62999999999999,62.58,62.57000000000002,62.64,62.66999999999999,62.57000000000001,62.49999999999999,62.39,62.30000000000001,62.27,62.209999999999994,62.11999999999999,61.99000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
