<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.19000000000003,99.17999999999999,99.12,99.07000000000002,99.05000000000001,99.03999999999999,99.03,98.97000000000001,98.87,98.82000000000001,98.68,98.55999999999999,98.39,98.29,98.27000000000001,98.26,98.13000000000002,98.06,97.97000000000001,97.78000000000002,97.63999999999999,97.50000000000001,97.39999999999999,97.34,97.23,97.19,97.16000000000003,97.15,97.06,96.99000000000002,96.83000000000001,96.61000000000001,96.5,96.41000000000001,96.18,95.95,95.58000000000001,95.14],"color":"green"},{"name":"anthropic","data":[0.5700000000000001,0.5800000000000001,0.64,0.6900000000000001,0.7100000000000001,0.7200000000000001,0.7200000000000001,0.79,0.88,0.9400000000000001,1.06,1.2,1.36,1.47,1.49,1.51,1.62,1.6900000000000002,1.79,1.9700000000000002,2.119999999999999,2.2499999999999996,2.34,2.4299999999999997,2.53,2.5900000000000003,2.6,2.62,2.68,2.78,2.92,3.1399999999999997,3.25,3.35,3.56,3.82,4.18,4.61],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
