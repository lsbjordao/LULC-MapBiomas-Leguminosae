<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.03999999999999,72.83999999999999,72.26,71.66,71.11,70.73,70.30000000000001,69.72000000000001,69.17,68.73,68.15000000000002,67.67999999999999,67.28,66.80000000000001,66.28999999999999,65.88,65.42999999999999,64.99,64.38,63.790000000000006,63.38000000000001,63.06,62.830000000000005,62.62,62.46999999999999,62.37,62.220000000000006,61.98,61.699999999999996,61.44,61.17,60.96999999999999,60.819999999999986,60.690000000000005,60.489999999999995,60.290000000000006,60.019999999999996,59.629999999999995],"color":"green"},{"name":"anthropic","data":[24.20000000000001,24.40000000000001,24.990000000000002,25.57,26.110000000000003,26.5,26.940000000000012,27.540000000000006,28.09000000000001,28.540000000000006,29.110000000000014,29.560000000000013,29.96000000000001,30.460000000000008,30.96000000000001,31.36000000000001,31.810000000000006,32.26000000000001,32.84,33.45,33.86,34.17,34.4,34.620000000000005,34.75,34.88,35,35.24999999999999,35.52000000000001,35.800000000000004,36.040000000000006,36.25,36.4,36.529999999999994,36.73,36.91,37.190000000000005,37.589999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
