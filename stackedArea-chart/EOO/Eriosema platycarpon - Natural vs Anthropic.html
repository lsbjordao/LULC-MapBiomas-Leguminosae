<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.07000000000001,30.98,29.760000000000005,28.720000000000006,27.820000000000007,27.060000000000002,26.400000000000006,25.630000000000003,25.020000000000007,24.450000000000003,23.930000000000007,23.550000000000004,23.18,22.94,22.740000000000002,22.460000000000008,22.310000000000002,22.140000000000008,21.830000000000002,21.640000000000004,21.570000000000007,21.530000000000005,21.510000000000005,21.540000000000006,21.56000000000001,21.590000000000003,21.620000000000005,21.620000000000005,21.630000000000006,21.60000000000001,21.640000000000004,21.710000000000004,21.72000000000001,21.78000000000001,21.750000000000004,21.670000000000005,21.490000000000006,21.750000000000004],"color":"green"},{"name":"anthropic","data":[67.12,68.18,69.39999999999999,70.44,71.33,72.07,72.75999999999999,73.52,74.11999999999999,74.69,75.24000000000001,75.61000000000001,75.97000000000001,76.21000000000001,76.43000000000002,76.68000000000002,76.83000000000001,77.03,77.35000000000001,77.53000000000002,77.58,77.67000000000002,77.67000000000002,77.64000000000001,77.60000000000001,77.58,77.55000000000001,77.55000000000003,77.56,77.60000000000004,77.54,77.44999999999999,77.43000000000002,77.37000000000002,77.44000000000003,77.50000000000001,77.68000000000002,77.42000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
