<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.52000000000001,93.28,92.49000000000001,91.53,90.89,90.46,89.99,88.78,87.76,86.49000000000001,85.23,83.94,82.47999999999999,81.07999999999998,79.85,78.77,77.09,75.57,73.86999999999998,72.39999999999999,71.02999999999999,69.67999999999999,68.67999999999999,67.75,67.28999999999999,66.85999999999999,66.6,66.44,66.14999999999999,65.90999999999998,65.48,65.1,64.6,64.16,63.51,62.89999999999999,61.959999999999994,61.03],"color":"green"},{"name":"anthropic","data":[6.8100000000000005,7.030000000000001,7.83,8.78,9.45,9.88,10.329999999999998,11.53,12.56,13.809999999999999,15.09,16.37,17.84,19.250000000000004,20.470000000000002,21.560000000000002,23.240000000000002,24.76,26.450000000000003,27.91,29.290000000000003,30.629999999999995,31.629999999999995,32.580000000000005,33.03,33.45,33.71,33.88,34.160000000000004,34.4,34.839999999999996,35.21000000000001,35.71,36.150000000000006,36.81,37.410000000000004,38.35,39.3],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
