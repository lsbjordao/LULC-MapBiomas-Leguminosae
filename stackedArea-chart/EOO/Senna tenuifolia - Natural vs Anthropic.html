<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.310000000000002,30.25,29.960000000000004,29.900000000000006,29.64,29.470000000000002,29.270000000000003,29.23,29.23,29.330000000000002,29.400000000000006,29.440000000000005,29.520000000000003,29.550000000000004,29.349999999999998,29.17,29.14,29.08,29.09,29.110000000000003,29.150000000000006,29.300000000000004,29.490000000000006,29.62,29.78,30.060000000000002,30.27,30.400000000000002,30.53,30.680000000000003,30.800000000000004,30.930000000000003,31.180000000000003,31.28,31.380000000000003,31.51000000000001,31.710000000000004,31.84],"color":"green"},{"name":"anthropic","data":[69.17999999999999,69.26,69.54,69.59,69.85,70.02,70.25,70.26,70.25,70.16,70.11000000000001,70.08000000000001,69.99,69.97,70.15,70.32,70.36,70.4,70.42,70.39,70.33000000000001,70.19000000000001,70.01,69.86,69.71,69.43,69.22,69.11000000000001,68.97000000000001,68.84,68.71000000000001,68.56000000000002,68.31000000000002,68.19,68.10000000000001,67.97999999999999,67.79,67.65],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
