<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[17.74,16.87,15.550000000000002,14.85,14.389999999999999,14.12,13.88,13.94,13.74,13.51,13.23,12.879999999999999,12.790000000000001,12.63,12.68,12.71,12.889999999999999,13.11,13.209999999999999,13.29,13.39,13.530000000000001,13.520000000000001,13.38,13.319999999999999,13.439999999999998,13.5,13.56,13.700000000000001,13.8,13.85,13.87,14,14.11,14.28,14.370000000000001,14.46,14.69],"color":"green"},{"name":"anthropic","data":[81.11999999999999,81.99,83.35000000000001,84.03000000000002,84.50000000000001,84.74999999999999,85,84.96000000000001,85.14,85.38000000000001,85.64,86.00999999999998,86.1,86.25000000000001,86.21,86.18,86,85.78,85.67999999999999,85.59,85.5,85.34,85.37,85.51,85.57000000000002,85.45000000000002,85.40000000000002,85.32000000000001,85.18,85.07999999999998,85.04,85.01,84.89999999999999,84.78000000000002,84.60000000000001,84.52,84.43,84.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
