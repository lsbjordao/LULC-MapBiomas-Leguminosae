<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.379999999999995,63.10999999999999,62.47,61.89,61.23,60.599999999999994,59.879999999999995,59.03999999999999,58.28999999999999,57.91,57.53,57.24999999999999,57.699999999999996,57.49,57.36999999999999,57.10999999999999,56.849999999999994,56.86,56.419999999999995,56.49999999999999,56.26999999999999,56.269999999999996,56.319999999999986,56.27999999999999,56.38999999999999,56.389999999999986,56.269999999999996,55.56,54.839999999999996,54.300000000000004,53.949999999999996,54.15999999999999,54.03999999999999,54.050000000000004,53.99999999999999,54.17999999999999,54.07999999999999,54.239999999999995],"color":"green"},{"name":"anthropic","data":[36.03,36.3,36.940000000000005,37.540000000000006,38.199999999999996,38.85,39.559999999999995,40.39000000000001,41.14,41.52,41.89,42.169999999999995,41.74000000000001,41.940000000000005,42.05,42.33,42.599999999999994,42.559999999999995,43.03000000000001,42.919999999999995,43.14999999999999,43.150000000000006,43.09,43.13999999999999,43.03,43.019999999999996,43.14999999999999,43.88999999999999,44.589999999999996,45.13000000000001,45.459999999999994,45.25,45.39,45.37,45.41,45.23,45.33,45.16],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
