<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.79,36.36999999999999,36.059999999999995,35.76,35.59,35.489999999999995,35.39,35.160000000000004,35.06,35,34.88,34.839999999999996,34.72,34.59,34.39000000000001,34.18000000000001,34.120000000000005,34.02,33.970000000000006,33.99000000000001,34,34.02,34.06,34.13,34.25,34.33,34.38,34.4,34.269999999999996,34.17,34.26,34.31,34.42000000000001,34.52,34.53,34.550000000000004,34.57,34.699999999999996],"color":"green"},{"name":"anthropic","data":[62.370000000000005,62.779999999999994,63.080000000000005,63.36,63.53999999999999,63.65999999999998,63.749999999999986,63.98,64.08000000000001,64.14000000000001,64.26,64.29,64.42,64.55000000000001,64.74000000000001,64.96,65.02000000000001,65.11,65.16,65.14,65.13000000000001,65.09,65.07,64.97,64.86999999999999,64.79,64.75,64.73,64.87,64.98000000000002,64.89999999999999,64.84,64.72000000000001,64.63000000000001,64.62,64.59,64.56,64.44],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
