<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.61,52.399999999999984,51.64,51.21,50.51,49.78,49.19,48.629999999999995,48.089999999999996,48.019999999999996,48.26999999999999,48.58,48.89999999999999,48.78999999999999,48.589999999999996,48.44,48.13,48.03,47.699999999999996,47.28,47.02,46.959999999999994,46.87,46.980000000000004,47.10999999999999,47.09999999999999,46.97,46.650000000000006,46.58,46.39,46.25,46.20000000000001,46.17000000000001,46.20000000000002,46.160000000000004,46.230000000000004,46.290000000000006,46.42],"color":"green"},{"name":"anthropic","data":[34.83,35.019999999999996,35.78,36.220000000000006,36.92,37.63,38.25,38.76,39.35,39.38,39.17,38.85,38.53,38.63,38.839999999999996,38.98999999999999,39.28,39.4,39.73,40.16,40.42,40.48,40.57,40.45,40.32999999999999,40.34999999999999,40.46,40.77999999999999,40.84999999999999,41.04,41.169999999999995,41.22,41.269999999999996,41.21,41.279999999999994,41.21999999999999,41.169999999999995,41.029999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
