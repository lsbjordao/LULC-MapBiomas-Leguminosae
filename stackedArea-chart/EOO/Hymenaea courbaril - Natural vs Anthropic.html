<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.53999999999999,77.33999999999999,76.81000000000002,76.26,75.78999999999999,75.42,75.05000000000001,74.5,74.01,73.58000000000001,73.04000000000002,72.57000000000002,72.20000000000002,71.73000000000002,71.27000000000001,70.88000000000002,70.46000000000002,70.03000000000003,69.44000000000001,68.89000000000003,68.47000000000003,68.15000000000002,67.91000000000003,67.69000000000001,67.57000000000001,67.44000000000003,67.28000000000002,67.02000000000001,66.75000000000001,66.48000000000002,66.24000000000001,65.99000000000001,65.83,65.66,65.39000000000001,65.17999999999999,64.84,64.41],"color":"green"},{"name":"anthropic","data":[20.94,21.150000000000006,21.720000000000002,22.240000000000002,22.710000000000008,23.060000000000013,23.460000000000008,23.980000000000004,24.49000000000001,24.93000000000001,25.450000000000003,25.91000000000001,26.300000000000004,26.78000000000001,27.230000000000008,27.62,28.040000000000006,28.460000000000004,29.04,29.62,30.020000000000003,30.350000000000005,30.600000000000005,30.820000000000004,30.930000000000007,31.060000000000006,31.220000000000002,31.490000000000006,31.750000000000004,32.00000000000001,32.28,32.49999999999999,32.66000000000001,32.830000000000005,33.10000000000001,33.30000000000001,33.66000000000001,34.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
