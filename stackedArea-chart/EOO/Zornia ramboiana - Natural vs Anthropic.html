<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.65,47.74,47.41,47.06,46.72,46.559999999999995,46.289999999999985,46.129999999999995,46.01999999999999,46.010000000000005,45.92,45.8,45.69,45.73,45.66999999999999,45.52,45.39,45.27000000000001,44.97,44.790000000000006,44.720000000000006,44.69000000000001,44.67000000000001,44.60000000000001,44.540000000000006,44.510000000000005,44.46,44.39,44.31999999999999,44.239999999999995,44.28000000000001,44.26,44.18,44.07,43.82000000000001,43.66,43.56999999999999,43.51999999999999],"color":"green"},{"name":"anthropic","data":[42.53,42.440000000000005,42.779999999999994,43.13999999999999,43.46,43.620000000000005,43.9,44.04,44.169999999999995,44.169999999999995,44.24,44.379999999999995,44.489999999999995,44.45,44.510000000000005,44.68,44.79,44.91000000000001,45.210000000000015,45.4,45.45000000000001,45.47,45.510000000000005,45.550000000000004,45.62000000000001,45.68,45.74,45.779999999999994,45.86,45.93999999999999,45.88,45.92,45.98999999999999,46.109999999999985,46.37,46.54,46.620000000000005,46.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
