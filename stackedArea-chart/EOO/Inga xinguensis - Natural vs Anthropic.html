<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.13000000000001,95.13000000000001,94.99,94.89999999999999,94.84000000000002,94.82000000000001,94.77000000000002,94.64999999999999,94.41000000000001,94.18,93.97,93.73000000000002,93.32000000000001,93.05999999999999,92.90000000000002,92.73000000000002,92.38000000000002,91.93000000000002,91.11000000000001,89.88,89.16000000000001,88.61,88.17,87.8,87.38,87.16999999999999,87.03999999999999,86.78,86.60999999999999,86.47,86.33,86.22000000000001,86.08,85.77000000000001,85.15,84.64000000000001,83.84,83.33],"color":"green"},{"name":"anthropic","data":[0.48,0.48,0.64,0.73,0.78,0.8,0.86,0.98,1.2,1.45,1.66,1.9000000000000001,2.3099999999999996,2.5599999999999996,2.7199999999999998,2.8899999999999997,3.2199999999999998,3.69,4.529999999999999,5.74,6.47,7.02,7.45,7.83,8.229999999999999,8.45,8.589999999999998,8.849999999999998,9.009999999999998,9.139999999999999,9.3,9.41,9.549999999999999,9.86,10.479999999999999,10.989999999999998,11.790000000000001,12.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
