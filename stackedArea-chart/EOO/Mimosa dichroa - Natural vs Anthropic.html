<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.1,80.63,80.16,79.69000000000001,78.8,78.42,77.86999999999999,77.51,76.9,76.26,75.65,74.86999999999998,74.49,73.77999999999999,72.96,72.11999999999999,71.28999999999999,70.79999999999998,70.36,69.54999999999998,69.09,68.46,67.92999999999999,67.21,66.63000000000001,66.25999999999999,65.64,64.60000000000001,63.480000000000004,62.699999999999996,62.06,61.73999999999999,61.44,61.050000000000004,60.47,59.69,58.89,58.37],"color":"green"},{"name":"anthropic","data":[19.29,18.77,19.22,19.720000000000002,20.600000000000005,20.990000000000002,21.51,21.88,22.500000000000004,23.11,23.759999999999998,24.509999999999998,24.900000000000002,25.599999999999998,26.399999999999995,27.240000000000006,28.09,28.570000000000004,29.01,29.82,30.290000000000003,30.890000000000004,31.46,32.17,32.72,33.10000000000001,33.72999999999999,34.78000000000001,35.9,36.669999999999995,37.309999999999995,37.63999999999999,37.94,38.30999999999999,38.9,39.68000000000001,40.49,40.99],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
