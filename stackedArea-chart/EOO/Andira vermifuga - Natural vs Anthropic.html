<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.75000000000003,75.47000000000003,74.82000000000001,74.13000000000002,73.47000000000003,72.97000000000001,72.42,71.67999999999999,70.99000000000002,70.32,69.51,68.84,68.31,67.69,67.05,66.51999999999998,65.92999999999999,65.29,64.46,63.699999999999996,63.11,62.67999999999999,62.41,62.129999999999995,61.96000000000001,61.78,61.52,61.209999999999994,60.849999999999994,60.489999999999995,60.16,59.9,59.63999999999999,59.42999999999999,59.11,58.83999999999999,58.36999999999999,57.86],"color":"green"},{"name":"anthropic","data":[24.170000000000005,24.43000000000001,25.070000000000004,25.750000000000004,26.43,26.93,27.490000000000006,28.210000000000008,28.89,29.55,30.369999999999997,31.060000000000002,31.570000000000004,32.2,32.85000000000001,33.38000000000001,33.95000000000002,34.59,35.46000000000001,36.18000000000001,36.78,37.21000000000001,37.52,37.77,37.95000000000001,38.13000000000001,38.39,38.68000000000001,39.059999999999995,39.42000000000001,39.76,40,40.25000000000001,40.46,40.8,41.07,41.51999999999999,42.04999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
