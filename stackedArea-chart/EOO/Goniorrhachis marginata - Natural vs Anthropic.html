<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.410000000000004,53.38999999999999,53.02,52.51000000000001,51.85,51.610000000000014,51.22000000000001,50.7,50.220000000000006,49.89000000000001,49.52,49.339999999999996,49.33000000000001,49.21999999999999,49.029999999999994,48.870000000000005,48.68,48.430000000000014,48.180000000000014,47.910000000000004,47.68,47.58,47.48,47.339999999999996,47.239999999999995,47.080000000000005,46.88000000000001,46.570000000000014,46.150000000000006,45.81000000000001,45.58000000000002,45.43000000000002,45.37000000000001,45.38000000000002,45.26000000000002,45.15000000000001,45.06000000000002,45.050000000000004],"color":"green"},{"name":"anthropic","data":[41.93000000000001,41.95,42.34,42.84000000000001,43.480000000000004,43.760000000000005,44.13,44.650000000000006,45.140000000000015,45.48000000000001,45.84,46.02,46.04,46.15,46.33,46.49,46.660000000000004,46.93,47.18999999999998,47.45,47.669999999999995,47.75999999999999,47.88,48.019999999999996,48.109999999999985,48.300000000000004,48.49000000000001,48.809999999999995,49.2,49.54,49.8,49.93000000000001,50.00000000000001,49.97,50.10000000000001,50.21,50.25,50.3],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
