<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.12,75.49,73.98,73.41,71.92999999999999,71.35,70.61,70.42,70.89,71.04999999999998,70.41999999999999,69.93,69.25999999999999,68.72999999999999,67.94999999999999,67.1,66.62,66.36000000000001,66.15,66.07,65.98999999999998,66.00999999999999,65.52,65.61000000000001,64.98,65.02,65.89999999999999,65.92999999999998,65.86,66.03,66.08000000000001,66.27,65.52,64.75,64.28999999999999,63.129999999999995,63.89999999999999,63.54999999999999],"color":"green"},{"name":"anthropic","data":[26.5,24.14,25.66,26.21,27.71,28.28,29.019999999999996,29.200000000000003,28.740000000000002,28.58,29.200000000000003,29.689999999999998,30.369999999999997,30.91,31.67,32.52,33.01,33.26,33.48,33.57,33.620000000000005,33.61,34.099999999999994,34.01,34.65,34.6,33.73,33.709999999999994,33.760000000000005,33.599999999999994,33.540000000000006,33.36,34.11,34.88,35.34,36.51,35.72,36.07],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
