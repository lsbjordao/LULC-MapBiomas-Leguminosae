<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.29,93.13000000000002,92.76000000000002,92.44000000000003,92.24000000000001,92.03,91.88000000000001,91.39000000000001,90.99000000000001,90.71000000000001,90.36000000000001,89.91000000000003,89.52000000000001,89.02000000000001,88.66,88.38000000000001,87.97,87.67000000000002,87.39,86.87,86.52,86.28000000000002,86.16000000000003,85.99000000000002,85.81000000000002,85.66,85.68000000000002,85.60000000000002,85.45000000000002,85.32,85.12,84.83,84.63000000000001,84.52000000000001,84.27000000000001,84.00000000000001,83.65000000000002,83.18],"color":"green"},{"name":"anthropic","data":[3.4000000000000004,3.5500000000000003,3.9499999999999997,4.26,4.46,4.669999999999999,4.819999999999999,5.31,5.71,5.9799999999999995,6.34,6.809999999999999,7.169999999999999,7.67,8.049999999999999,8.29,8.719999999999999,9.029999999999998,9.299999999999997,9.829999999999998,10.180000000000001,10.43,10.55,10.700000000000001,10.88,11.01,11.01,11.079999999999998,11.239999999999998,11.37,11.580000000000002,11.879999999999997,12.059999999999999,12.17,12.44,12.709999999999999,13.040000000000001,13.510000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
