<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.49000000000001,49.519999999999996,49.019999999999996,48.15,47.06,46.24,45.13,44.459999999999994,43.73999999999999,42.9,42.260000000000005,41.7,40.94,40.4,39.8,39.18,38.68000000000001,38.019999999999996,37.440000000000005,36.8,36.47,36.23,36.06,35.85,35.75999999999999,35.589999999999996,35.5,35.349999999999994,35.150000000000006,34.98,34.78000000000001,34.64999999999999,34.5,34.36,34.13,33.95,33.71,34.08],"color":"green"},{"name":"anthropic","data":[49.16000000000001,50.11000000000001,50.58999999999999,51.46,52.559999999999995,53.38,54.47999999999999,55.179999999999986,55.879999999999995,56.71999999999999,57.379999999999995,57.95000000000001,58.68999999999999,59.25000000000001,59.839999999999996,60.45,60.97999999999999,61.61999999999999,62.18000000000001,62.83,63.15,63.39000000000001,63.58,63.77,63.89000000000001,64.02000000000001,64.13,64.28,64.48,64.64999999999999,64.85000000000001,64.98000000000002,65.15000000000002,65.26000000000002,65.49,65.67,65.92,65.57000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
