<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.24,87.66000000000001,87.63000000000001,87.48000000000002,86.96000000000001,86.66000000000001,86.31000000000002,85.98,85.56000000000002,85.17,84.76000000000003,84.25000000000001,83.92000000000003,83.53000000000002,83.05000000000001,82.71000000000001,82.17,81.73,81.34000000000002,80.27000000000001,79.54,78.99000000000002,78.52000000000001,77.88,77.35000000000001,76.68,76.15,74.88,73.9,73.3,72.72,72.42999999999999,71.98999999999998,71.49,70.75999999999999,69.88999999999999,69.11999999999999,68.05],"color":"green"},{"name":"anthropic","data":[12.989999999999998,12.569999999999997,12.6,12.74,13.27,13.559999999999997,13.919999999999998,14.249999999999996,14.66,15.049999999999997,15.450000000000001,15.97,16.310000000000002,16.69,17.17,17.480000000000004,18.040000000000003,18.47,18.85,19.939999999999998,20.65,21.220000000000002,21.69,22.32,22.85,23.5,24.060000000000002,25.330000000000002,26.3,26.92,27.48,27.770000000000003,28.19,28.699999999999996,29.459999999999997,30.3,31.079999999999995,32.15],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
