<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.230000000000004,43.50000000000001,40.989999999999995,39.85,39.81999999999999,40.35,41.290000000000006,41.2,41.980000000000004,42.14,42.57,42.06,41.03,40.290000000000006,40.779999999999994,40.13,40.6,40.61,40.42,39.82,39.67,39.91,39.940000000000005,39.169999999999995,39.35,39.53999999999999,39.84,39.34,38.709999999999994,38.68,38.160000000000004,37.1,37.4,37.94,38.67,39.16,39.71,40.029999999999994],"color":"green"},{"name":"anthropic","data":[54.24000000000001,55.97,58.480000000000004,59.62,59.64,59.11000000000001,58.17,58.27,57.489999999999995,57.32000000000001,56.89,57.410000000000004,58.44,59.18,58.68,59.33,58.87,58.85,59.050000000000004,59.650000000000006,59.8,59.55,59.53000000000001,60.3,60.120000000000005,59.92000000000001,59.61,60.120000000000005,60.75000000000001,60.769999999999996,61.31,62.36999999999999,62.059999999999995,61.519999999999996,60.79,60.31,59.75000000000001,59.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
