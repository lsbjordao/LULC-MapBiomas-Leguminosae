<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.560000000000002,30.62,30.13,29.739999999999995,29.429999999999996,29.17,28.93,28.6,28.330000000000005,28.119999999999997,27.790000000000003,27.540000000000003,27.270000000000003,27.090000000000003,26.950000000000006,26.640000000000004,26.520000000000007,26.280000000000005,26.170000000000005,26.010000000000005,25.910000000000007,25.880000000000006,25.85,25.91,25.990000000000002,26.01,25.990000000000002,25.92000000000001,25.720000000000002,25.600000000000005,25.730000000000004,25.790000000000003,25.78000000000001,25.810000000000002,25.780000000000005,25.7,25.640000000000004,25.720000000000006],"color":"green"},{"name":"anthropic","data":[67.61000000000001,68.55,68.99,69.39,69.72,69.96999999999997,70.22000000000001,70.56,70.82999999999998,71.00000000000003,71.36000000000001,71.62,71.88000000000001,72.05,72.19999999999999,72.48999999999998,72.66,72.87000000000002,72.97000000000001,73.15,73.21000000000001,73.27000000000001,73.30000000000001,73.24000000000001,73.14999999999999,73.16,73.15,73.21999999999997,73.42999999999999,73.54999999999998,73.43999999999998,73.34000000000002,73.35999999999999,73.35,73.37999999999998,73.41999999999999,73.51,73.42],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
