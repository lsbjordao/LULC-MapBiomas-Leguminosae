<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.75999999999999,48.60999999999999,48.15999999999998,47.69999999999999,47.209999999999994,46.82999999999999,46.44999999999999,45.91999999999999,45.39999999999999,44.96999999999999,44.47,44.07999999999999,43.779999999999994,43.33999999999999,42.879999999999995,42.470000000000006,42.03,41.589999999999996,40.989999999999995,40.41999999999999,40.019999999999996,39.76999999999998,39.609999999999985,39.45999999999999,39.37,39.239999999999995,39.03999999999999,38.70999999999999,38.36999999999998,38.05999999999999,37.80999999999999,37.67999999999999,37.50999999999999,37.41999999999998,37.26999999999998,37.139999999999986,36.969999999999985,36.71999999999999],"color":"green"},{"name":"anthropic","data":[13.559999999999999,13.72,14.160000000000002,14.649999999999999,15.159999999999998,15.53,15.91,16.44,16.960000000000004,17.400000000000006,17.880000000000003,18.290000000000006,18.6,19.020000000000003,19.490000000000006,19.890000000000008,20.320000000000007,20.740000000000006,21.36,21.920000000000005,22.320000000000004,22.570000000000007,22.73000000000001,22.88000000000001,22.950000000000006,23.11,23.32,23.66,23.98,24.290000000000003,24.550000000000004,24.69,24.830000000000005,24.930000000000007,25.06000000000001,25.210000000000004,25.36000000000001,25.620000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
