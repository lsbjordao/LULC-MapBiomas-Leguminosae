<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.02000000000001,70.96000000000001,70.45,70.01,69.28000000000002,68.81,68.37000000000002,67.86000000000001,67.31,67.14000000000001,66.97000000000003,66.93000000000002,67.27000000000001,67.13000000000001,67.00000000000001,66.9,66.58000000000001,66.36000000000001,65.96000000000002,65.50000000000001,65.10000000000002,64.9,64.73,64.66000000000001,64.61000000000001,64.51,64.24000000000001,63.60000000000001,63.040000000000006,62.56000000000001,62.21,62.16000000000001,62.010000000000005,61.92000000000001,61.72000000000001,61.60000000000001,61.47,61.28000000000001],"color":"green"},{"name":"anthropic","data":[27.429999999999996,27.49,27.980000000000004,28.44000000000001,29.159999999999997,29.62,30.060000000000002,30.58,31.13,31.31,31.45,31.509999999999998,31.170000000000005,31.329999999999995,31.450000000000003,31.549999999999997,31.849999999999998,32.09,32.48,32.940000000000005,33.37000000000001,33.540000000000006,33.750000000000014,33.780000000000015,33.84,33.94000000000001,34.20000000000001,34.85000000000001,35.39,35.859999999999985,36.21,36.26000000000001,36.42,36.510000000000005,36.690000000000005,36.82,36.98,37.129999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
