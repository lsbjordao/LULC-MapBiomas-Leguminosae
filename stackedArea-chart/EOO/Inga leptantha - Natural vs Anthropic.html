<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[83.83,83.73000000000002,83.28000000000002,82.76999999999998,82.23,81.87000000000002,81.50999999999999,80.93,80.39000000000001,79.99000000000001,79.40999999999998,78.92000000000003,78.59999999999998,78.08,77.66000000000003,77.35,76.85000000000001,76.37,75.71,74.98000000000003,74.38,73.9,73.50999999999998,73.15,72.91,72.72999999999998,72.52,72.16000000000001,71.69000000000001,71.31000000000002,70.92000000000002,70.62,70.42,70.22000000000001,69.9,69.58000000000001,69.13000000000002,68.62],"color":"green"},{"name":"anthropic","data":[20.15,20.23,20.68,21.209999999999997,21.74,22.090000000000003,22.46,23.040000000000003,23.590000000000007,23.99000000000001,24.540000000000006,25.040000000000003,25.360000000000007,25.890000000000004,26.300000000000004,26.63,27.130000000000003,27.59,28.25,28.970000000000006,29.600000000000005,30.070000000000007,30.479999999999997,30.810000000000002,31.06,31.219999999999995,31.4,31.8,32.27,32.650000000000006,33.03000000000001,33.330000000000005,33.56,33.76,34.06999999999999,34.38999999999998,34.81999999999998,35.35],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
