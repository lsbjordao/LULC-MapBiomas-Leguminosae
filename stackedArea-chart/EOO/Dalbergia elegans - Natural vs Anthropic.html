<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.30000000000001,55.230000000000004,54.79,54.550000000000004,54.10000000000001,54.38,54.290000000000006,54.08000000000001,53.80000000000001,53.58,53.20000000000001,53.04,53.13,53.190000000000005,53.14,53.190000000000005,53.08,52.73,52.61,52.580000000000005,52.47,52.42,52.40000000000001,52.42000000000001,52.41,52.28,52.14000000000001,51.91000000000001,51.5,51.04,50.620000000000005,50.21,50.24,50.4,50.27,50.13999999999999,50.00000000000001,49.88999999999999],"color":"green"},{"name":"anthropic","data":[43.97000000000001,44.02000000000001,44.46000000000001,44.709999999999994,45.14999999999999,44.88999999999999,44.97,45.18,45.470000000000006,45.69,46.05,46.23,46.12,46.05999999999999,46.13000000000001,46.08,46.190000000000005,46.54,46.67,46.68999999999999,46.8,46.84999999999999,46.86999999999999,46.83999999999999,46.86999999999998,46.99000000000001,47.12,47.36,47.77,48.21999999999999,48.650000000000006,49.040000000000006,49.02,48.89,48.99999999999999,49.12,49.25,49.38],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
