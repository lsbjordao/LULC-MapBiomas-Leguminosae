<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.74000000000001,61.500000000000014,60.78,60.13,59.43000000000001,58.96000000000001,58.42000000000001,57.70000000000002,57.07000000000002,56.53,55.91000000000001,55.39000000000001,55,54.52000000000001,54.010000000000005,53.58000000000001,53.13,52.67000000000001,52.02000000000001,51.46000000000001,51.01,50.69000000000001,50.47,50.26000000000001,50.14000000000001,49.99000000000001,49.800000000000004,49.46000000000001,49.1,48.76000000000001,48.480000000000004,48.32,48.13000000000002,47.99000000000001,47.790000000000006,47.59000000000001,47.330000000000005,47.11000000000001],"color":"green"},{"name":"anthropic","data":[33.15999999999999,33.440000000000005,34.13999999999999,34.769999999999996,35.449999999999996,35.93999999999999,36.48,37.209999999999994,37.83999999999999,38.339999999999996,38.99999999999999,39.53,39.91000000000001,40.38,40.86,41.330000000000005,41.78,42.24,42.88,43.46999999999999,43.88999999999999,44.19,44.44000000000001,44.63000000000001,44.76000000000001,44.88,45.1,45.4,45.78999999999999,46.11999999999999,46.42,46.6,46.77000000000001,46.890000000000015,47.110000000000014,47.30000000000002,47.55000000000001,47.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
