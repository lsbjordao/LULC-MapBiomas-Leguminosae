<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.94,49.510000000000005,49.230000000000004,48.73999999999999,48.22,48,47.60999999999999,47.12,46.73,46.449999999999996,45.99,45.65,45.4,45.12,44.77,44.39,44.14,43.72,43.410000000000004,43.06,42.800000000000004,42.62,42.47,42.32999999999999,42.309999999999995,42.199999999999996,42.089999999999996,41.830000000000005,41.579999999999984,41.33,41.230000000000004,41.010000000000005,40.95,40.95999999999999,40.9,40.83,40.72999999999999,40.809999999999995],"color":"green"},{"name":"anthropic","data":[49.73999999999999,50.16,50.45,50.94,51.440000000000005,51.67000000000001,52.08,52.57,52.94000000000001,53.230000000000004,53.66999999999999,54.00000000000001,54.29,54.550000000000004,54.93000000000002,55.30000000000001,55.53,55.95,56.28,56.6,56.86000000000002,57.06,57.22000000000001,57.34,57.35000000000001,57.46,57.56999999999999,57.82000000000001,58.08000000000001,58.34000000000001,58.43,58.65,58.72,58.71000000000001,58.75999999999999,58.839999999999996,58.93999999999999,58.85999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
