<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.97,36.379999999999995,35.79,35.10999999999999,34.449999999999996,33.910000000000004,33.39000000000001,32.79,32.31,31.870000000000005,31.39,30.99000000000001,30.610000000000007,30.300000000000004,30.060000000000002,29.750000000000004,29.550000000000008,29.28,28.990000000000002,28.68,28.460000000000008,28.330000000000005,28.23000000000001,28.180000000000007,28.160000000000004,28.130000000000006,28.080000000000002,27.940000000000005,27.760000000000005,27.62,27.54000000000001,27.540000000000003,27.520000000000003,27.570000000000007,27.53000000000001,27.5,27.410000000000004,27.710000000000004],"color":"green"},{"name":"anthropic","data":[61.54,62.12,62.74000000000001,63.410000000000004,64.05,64.58,65.1,65.71,66.15999999999998,66.61000000000001,67.1,67.49,67.88999999999999,68.16999999999999,68.41000000000001,68.74,68.96000000000001,69.24,69.50999999999999,69.78,70.02,70.15,70.24000000000002,70.30000000000003,70.32000000000002,70.35000000000001,70.40000000000002,70.56,70.72999999999999,70.87,70.95000000000002,70.94,70.97999999999999,70.91000000000001,70.95,70.99000000000001,71.07000000000001,70.78000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
