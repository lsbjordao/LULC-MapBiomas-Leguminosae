<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.360000000000003,28.340000000000003,28.01000000000001,27.630000000000003,27.360000000000007,27.28000000000001,27.220000000000006,27.250000000000007,27.260000000000005,27.160000000000004,27.110000000000003,27.180000000000003,27.240000000000002,27.26,27.21,27.02,27.100000000000005,27.080000000000002,27.270000000000003,27.290000000000006,27.250000000000004,27.190000000000005,27.220000000000006,27.300000000000004,27.45,27.520000000000003,27.47,27.37,27.180000000000003,27.090000000000007,27.190000000000005,27.130000000000003,26.980000000000008,26.98000000000001,27.010000000000005,26.99000000000001,27.26,27.470000000000002],"color":"green"},{"name":"anthropic","data":[9.11,9.149999999999999,9.5,9.87,10.15,10.24,10.299999999999999,10.26,10.270000000000001,10.38,10.41,10.37,10.290000000000001,10.26,10.3,10.47,10.420000000000002,10.440000000000001,10.24,10.23,10.270000000000001,10.34,10.3,10.22,10.09,10.01,10.05,10.14,10.34,10.430000000000001,10.360000000000001,10.41,10.55,10.540000000000001,10.520000000000001,10.54,10.28,10.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
