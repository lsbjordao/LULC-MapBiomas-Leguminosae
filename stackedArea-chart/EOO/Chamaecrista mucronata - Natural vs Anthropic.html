<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.55000000000001,70.26000000000002,69.60000000000002,68.96000000000001,68.28,67.81,67.29,66.62000000000002,65.97,65.35000000000001,64.58999999999999,63.96999999999999,63.510000000000005,62.98,62.37,61.889999999999986,61.44999999999998,60.879999999999995,60.14,59.47,58.93999999999999,58.56999999999999,58.389999999999986,58.16999999999999,58.04,57.85999999999999,57.61999999999999,57.29,56.98,56.629999999999995,56.32,56.12999999999999,55.90999999999998,55.72,55.41,55.17999999999999,54.83999999999999,54.400000000000006],"color":"green"},{"name":"anthropic","data":[25.570000000000004,25.840000000000003,26.509999999999998,27.14,27.800000000000004,28.28,28.790000000000003,29.490000000000006,30.12000000000001,30.740000000000002,31.49000000000001,32.1,32.559999999999995,33.10999999999999,33.70000000000001,34.180000000000014,34.640000000000015,35.18000000000001,35.94000000000001,36.61000000000001,37.140000000000015,37.490000000000016,37.68000000000002,37.890000000000015,38.010000000000005,38.13,38.42,38.77,39.080000000000005,39.390000000000015,39.709999999999994,39.89,40.2,40.29000000000001,40.64000000000001,40.879999999999995,41.18,41.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
