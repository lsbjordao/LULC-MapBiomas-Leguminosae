<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.39000000000001,70.14,69.63,68.94999999999999,68.09,67.39,66.69999999999999,65.88,65.10999999999999,64.74999999999999,64.29999999999998,64.07,64.61,64.27,64.34,64.22999999999999,63.86,63.78999999999999,63.440000000000005,63.47999999999998,63.16999999999999,63.23999999999999,62.98999999999999,62.83999999999999,62.839999999999996,62.719999999999985,62.54,61.9,61.30999999999999,60.87,60.48,60.82999999999999,60.82999999999999,60.95999999999999,61.10999999999999,61.319999999999986,61.18,61.300000000000004],"color":"green"},{"name":"anthropic","data":[29.68,29.950000000000003,30.450000000000006,31.13,32.00000000000001,32.699999999999996,33.38,34.22,34.97,35.33,35.79999999999999,35.98,35.47,35.83,35.739999999999995,35.870000000000005,36.23,36.309999999999995,36.64,36.599999999999994,36.9,36.849999999999994,37.09999999999999,37.239999999999995,37.25,37.370000000000005,37.529999999999994,38.190000000000005,38.790000000000006,39.220000000000006,39.620000000000005,39.27000000000001,39.29,39.14,38.98000000000001,38.780000000000015,38.93000000000001,38.78000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
