<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.22,41.04,40.56999999999999,40.18999999999999,39.899999999999984,39.90999999999999,39.79999999999999,39.59999999999999,39.43999999999999,39.32,39.14999999999999,39.10999999999999,39.199999999999996,39.169999999999995,39.230000000000004,39.16,39.139999999999986,39.059999999999995,39.02999999999999,39.04,39.11999999999999,39.22,39.21999999999999,39.18999999999999,39.109999999999985,39.08999999999999,39.06999999999999,39.04999999999999,39.00999999999999,38.889999999999986,38.85999999999999,38.76999999999998,38.83999999999999,38.94999999999999,38.96999999999999,38.989999999999995,39.089999999999996,39.23],"color":"green"},{"name":"anthropic","data":[53.96,54.139999999999986,54.609999999999985,54.99999999999999,55.269999999999996,55.24999999999999,55.379999999999995,55.56999999999999,55.73999999999999,55.87,56.050000000000004,56.09,56.02000000000001,56.01,56.010000000000005,56.03,56.04,56.13999999999999,56.13999999999999,56.14999999999999,56.07999999999999,55.98,55.970000000000006,56.029999999999994,56.06999999999999,56.07999999999999,56.12,56.139999999999986,56.17999999999999,56.309999999999995,56.32999999999999,56.40999999999999,56.35,56.22,56.20999999999999,56.19,56.08,55.969999999999985],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
