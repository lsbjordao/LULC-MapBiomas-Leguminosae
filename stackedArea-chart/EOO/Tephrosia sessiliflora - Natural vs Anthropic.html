<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.52,34.39,33.980000000000004,33.61,33.23,32.959999999999994,32.68,32.28,31.939999999999998,31.669999999999998,31.349999999999998,31.06,30.849999999999998,30.57,30.26,29.99,29.72,29.490000000000002,29.110000000000003,28.73,28.509999999999998,28.31,28.169999999999998,28.049999999999994,27.959999999999997,27.869999999999997,27.78,27.600000000000005,27.400000000000002,27.210000000000004,27.059999999999995,26.97,26.89,26.849999999999998,26.75,26.639999999999997,26.490000000000002,26.33],"color":"green"},{"name":"anthropic","data":[16.68,16.790000000000006,17.210000000000008,17.590000000000003,17.980000000000004,18.240000000000006,18.520000000000003,18.910000000000004,19.250000000000004,19.53,19.83000000000001,20.11000000000001,20.35000000000001,20.630000000000003,20.95,21.190000000000005,21.450000000000006,21.710000000000015,22.080000000000013,22.430000000000003,22.680000000000003,22.870000000000005,22.990000000000006,23.14000000000001,23.220000000000006,23.30000000000001,23.390000000000004,23.580000000000005,23.760000000000005,23.95000000000001,24.120000000000005,24.219999999999995,24.31,24.36,24.469999999999995,24.56,24.7,24.870000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
