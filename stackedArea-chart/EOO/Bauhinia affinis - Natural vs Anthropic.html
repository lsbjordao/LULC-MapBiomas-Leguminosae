<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.460000000000008,30.420000000000005,30.14,29.830000000000002,29.610000000000003,29.570000000000004,29.480000000000008,29.490000000000006,29.480000000000004,29.580000000000005,29.570000000000004,29.610000000000007,29.580000000000005,29.630000000000006,29.67,29.520000000000003,29.529999999999998,29.550000000000004,29.520000000000003,29.52000000000001,29.600000000000005,29.69000000000001,29.740000000000006,29.810000000000006,29.85,30.020000000000007,30.110000000000003,30.180000000000007,30.280000000000005,30.400000000000006,30.550000000000004,30.630000000000003,30.669999999999998,30.67000000000001,30.620000000000008,30.610000000000003,30.730000000000008,30.7],"color":"green"},{"name":"anthropic","data":[46.559999999999995,46.61,46.900000000000006,47.21000000000001,47.42,47.480000000000004,47.559999999999995,47.53,47.54,47.480000000000004,47.47,47.440000000000005,47.42000000000001,47.41,47.38,47.529999999999994,47.510000000000005,47.5,47.51,47.510000000000005,47.430000000000014,47.34000000000001,47.280000000000015,47.220000000000006,47.150000000000006,47.03000000000001,46.93,46.849999999999994,46.74,46.629999999999995,46.489999999999995,46.41,46.339999999999996,46.34,46.36999999999999,46.400000000000006,46.269999999999996,46.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
