<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.87000000000002,84.83999999999999,84.37,83.86,83.42000000000002,83.1,82.72,82.18,81.71000000000001,81.37,80.92999999999999,80.54,80.27000000000002,79.79999999999998,79.42,79.08000000000001,78.6,78.17999999999999,77.61999999999999,77.01,76.53999999999999,76.15999999999998,75.82,75.52000000000001,75.28999999999999,75.13000000000001,74.9,74.5,74.05,73.67999999999999,73.28999999999999,72.99,72.78999999999999,72.63999999999999,72.40999999999998,72.15999999999998,71.79000000000002,71.37],"color":"green"},{"name":"anthropic","data":[15.939999999999998,15.979999999999999,16.460000000000004,16.990000000000002,17.420000000000005,17.71,18.1,18.650000000000006,19.140000000000004,19.460000000000004,19.940000000000005,20.320000000000007,20.59000000000001,21.030000000000005,21.44000000000001,21.770000000000014,22.240000000000013,22.630000000000013,23.19000000000001,23.840000000000007,24.310000000000002,24.670000000000005,25.020000000000003,25.31000000000001,25.530000000000005,25.720000000000002,25.930000000000007,26.340000000000007,26.780000000000005,27.150000000000006,27.54,27.830000000000002,28.029999999999998,28.200000000000006,28.430000000000007,28.680000000000007,29.02,29.470000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
