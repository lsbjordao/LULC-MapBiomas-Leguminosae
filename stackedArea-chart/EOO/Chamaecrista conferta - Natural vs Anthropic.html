<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.86000000000001,72.78000000000003,72.44999999999999,71.96000000000001,71.23000000000002,71.00000000000001,70.65,70.18,69.68,69.22000000000001,68.65,68.17000000000002,67.99000000000001,67.78999999999999,67.47999999999999,67.34000000000002,67.01000000000002,66.53,66.09000000000002,65.43,64.8,64.41,64.1,63.82,63.64999999999999,63.29,62.93,62.28000000000001,61.58,60.92000000000001,60.36,59.89,59.599999999999994,59.379999999999995,59.02999999999999,58.669999999999995,58.28999999999999,57.98999999999999],"color":"green"},{"name":"anthropic","data":[26.53,26.619999999999997,26.95,27.460000000000004,28.17,28.410000000000004,28.760000000000005,29.230000000000004,29.730000000000008,30.180000000000007,30.76000000000001,31.220000000000002,31.430000000000003,31.620000000000005,31.930000000000003,32.06000000000002,32.38000000000001,32.88000000000001,33.31000000000001,33.95000000000001,34.570000000000014,34.99000000000001,35.28000000000001,35.59000000000001,35.76,36.10000000000001,36.47,37.12,37.809999999999995,38.46,39.019999999999996,39.5,39.790000000000006,40.02,40.36,40.720000000000006,41.080000000000005,41.400000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
