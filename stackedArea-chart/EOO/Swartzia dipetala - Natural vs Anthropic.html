<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.059999999999995,47.08,46.019999999999996,45.45000000000001,44.80000000000001,44.45,44.199999999999996,43.89,43.54,43.1,43,43.10000000000001,43.300000000000004,43.43000000000001,43.9,43.989999999999995,43.89,43.79999999999999,43.67,43.449999999999996,43.57000000000001,43.769999999999996,43.73,43.760000000000005,43.43000000000001,43.22,42.949999999999996,42.940000000000005,42.91,42.67000000000001,42.64,42.55,42.48000000000001,42.66,42.650000000000006,42.53000000000001,42.61,42.86000000000001],"color":"green"},{"name":"anthropic","data":[43.790000000000006,43.77,44.839999999999996,45.389999999999986,46.07999999999999,46.410000000000004,46.67000000000001,46.96000000000001,47.32,47.75,47.86000000000001,47.769999999999996,47.58,47.42999999999999,46.97999999999999,46.86,46.96999999999999,47.07999999999999,47.199999999999996,47.410000000000004,47.28,47.099999999999994,47.13,47.110000000000014,47.45,47.64,47.91,47.92999999999999,47.95,48.190000000000005,48.22,48.31,48.38999999999999,48.19999999999999,48.25,48.359999999999985,48.269999999999996,47.99999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
