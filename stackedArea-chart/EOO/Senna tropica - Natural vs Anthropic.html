<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.30000000000001,46.13000000000002,45.740000000000016,45.30000000000002,44.84000000000001,44.70000000000001,44.46,44.17000000000001,43.93000000000001,43.84,43.61000000000001,43.490000000000016,43.6,43.53000000000001,43.45,43.38000000000002,43.24000000000001,43.110000000000014,42.97000000000001,42.850000000000016,42.7,42.64,42.550000000000004,42.49000000000001,42.49,42.47,42.43000000000001,42.190000000000005,41.93000000000001,41.7,41.55000000000001,41.59,41.59,41.65000000000001,41.620000000000005,41.61,41.56999999999999,41.6],"color":"green"},{"name":"anthropic","data":[44.85999999999999,45.040000000000006,45.43,45.86,46.32000000000001,46.449999999999996,46.699999999999996,46.99,47.22,47.32,47.529999999999994,47.65999999999999,47.54,47.620000000000005,47.69,47.77,47.91000000000001,48.02,48.18,48.29,48.47,48.51999999999999,48.61999999999999,48.63999999999999,48.67999999999999,48.68999999999999,48.72,48.92,49.21,49.42999999999999,49.58,49.56999999999999,49.53,49.48999999999999,49.49000000000001,49.529999999999994,49.57999999999999,49.550000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
