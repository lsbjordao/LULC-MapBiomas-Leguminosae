<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.39000000000001,99.39000000000001,99.35,99.32,99.33,99.31000000000002,99.31000000000002,99.25000000000001,99.18,99.12,98.98,98.88000000000001,98.77,98.67000000000002,98.64,98.63,98.55000000000001,98.48,98.45,98.4,98.30000000000001,98.22000000000001,98.19000000000001,98.17,98.13000000000001,98.11000000000001,98.11,98.12000000000002,98.08000000000001,98.01999999999998,97.9,97.75,97.7,97.67000000000002,97.62,97.54,97.41,97.15000000000002],"color":"green"},{"name":"anthropic","data":[0.62,0.62,0.66,0.6900000000000001,0.68,0.7000000000000001,0.7100000000000001,0.75,0.8400000000000001,0.9,1.05,1.1500000000000001,1.26,1.36,1.37,1.3900000000000001,1.4700000000000002,1.51,1.56,1.6300000000000001,1.7100000000000002,1.7800000000000002,1.81,1.84,1.8900000000000001,1.9100000000000001,1.9000000000000001,1.8900000000000001,1.9200000000000002,2,2.11,2.27,2.31,2.33,2.3899999999999997,2.4699999999999998,2.5999999999999996,2.869999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
