<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.83999999999998,39.64999999999998,39.03999999999999,38.58999999999999,38.00999999999999,37.45999999999999,37.019999999999996,36.42999999999999,35.88999999999999,35.52,35.39,35.45,35.55,35.519999999999996,35.50999999999999,35.290000000000006,35.13,35.06,34.730000000000004,34.559999999999995,34.46,34.550000000000004,34.7,34.64,34.63,34.49999999999999,34.42999999999999,34.15999999999999,34.06999999999999,33.92999999999999,33.99,34.18,34.04,33.97,33.88999999999999,33.89999999999999,33.97999999999999,34.209999999999994],"color":"green"},{"name":"anthropic","data":[45.73,45.94,46.55,46.99,47.58999999999999,48.14,48.58999999999999,49.169999999999995,49.71,50.06,50.209999999999994,50.14,50.029999999999994,50.05999999999999,50.07999999999999,50.3,50.459999999999994,50.55,50.88999999999999,51.03999999999999,51.129999999999995,51.019999999999996,50.88999999999999,50.96,50.969999999999985,51.11,51.18999999999999,51.43000000000001,51.53,51.67000000000001,51.61999999999999,51.44,51.54999999999998,51.599999999999994,51.699999999999996,51.69999999999999,51.59999999999999,51.36999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
