<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.31,98.31000000000002,98,97.86000000000001,97.9,97.93,97.78,97.51000000000002,97.25,97.00000000000001,96.65,96.4,96.16000000000001,96.11,96.19,96.12000000000002,95.81,95.6,95.33,94.94,94.61999999999999,94.46000000000001,94.33000000000001,94.15,94.01,94.01,93.97999999999999,93.95,93.79000000000002,93.56000000000003,93.34,93.04,92.88000000000001,92.81,92.59000000000002,92.32000000000001,91.94000000000001,91.46000000000001],"color":"green"},{"name":"anthropic","data":[1.74,1.73,2.05,2.19,2.1599999999999997,2.1299999999999994,2.28,2.5399999999999996,2.8,3.05,3.3899999999999997,3.6499999999999995,3.8699999999999997,3.9299999999999997,3.8499999999999996,3.9299999999999997,4.239999999999999,4.449999999999999,4.7299999999999995,5.109999999999999,5.4399999999999995,5.58,5.71,5.91,6.05,6.05,6.070000000000001,6.110000000000001,6.2700000000000005,6.49,6.71,7.01,7.17,7.23,7.460000000000001,7.72,8.11,8.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
