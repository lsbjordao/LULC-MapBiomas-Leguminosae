<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.36,31.980000000000004,31.610000000000003,31.21,30.86,30.639999999999997,30.43,30.240000000000002,30.120000000000008,30.010000000000005,29.86,29.71,29.55,29.5,29.400000000000006,29.19,29.080000000000005,28.990000000000006,28.819999999999997,28.720000000000002,28.71,28.76,28.8,28.830000000000002,28.85,28.88,28.89,28.88,28.88,28.85,28.94,28.970000000000006,28.979999999999997,28.960000000000004,28.890000000000004,28.820000000000007,28.860000000000007,28.870000000000005],"color":"green"},{"name":"anthropic","data":[57.42000000000001,57.81000000000001,58.21,58.580000000000005,58.93000000000001,59.15,59.36,59.56999999999999,59.71999999999999,59.80000000000001,59.94,60.08,60.22000000000001,60.300000000000004,60.39,60.550000000000004,60.68,60.779999999999994,60.95,61.05,61.059999999999995,61.019999999999996,61,60.94999999999998,60.940000000000005,60.9,60.870000000000005,60.870000000000005,60.91000000000001,60.910000000000004,60.83,60.79,60.779999999999994,60.819999999999986,60.89,60.949999999999996,60.97,60.959999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
