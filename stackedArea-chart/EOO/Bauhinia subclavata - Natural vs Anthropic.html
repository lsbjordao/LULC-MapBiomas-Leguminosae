<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.94,76.90000000000002,76.44000000000003,75.87000000000002,75.19999999999999,74.70000000000003,74.28000000000002,73.83,73.39,73.38,73.44000000000003,73.45000000000002,73.77000000000004,73.58,73.34000000000003,73.21000000000004,72.80000000000004,72.58000000000004,72.27000000000002,71.81000000000003,71.32000000000002,71.10000000000004,70.84000000000003,70.74000000000004,70.72000000000003,70.53000000000004,70.23000000000002,69.45,68.78000000000002,68.29000000000002,67.95,67.9,67.72,67.58,67.31,67.06,66.78,66.50000000000001],"color":"green"},{"name":"anthropic","data":[21.76,21.79,22.27,22.820000000000004,23.49,23.980000000000004,24.41,24.85,25.28000000000001,25.310000000000006,25.240000000000002,25.230000000000004,24.920000000000005,25.1,25.340000000000003,25.46,25.880000000000006,26.09,26.410000000000004,26.900000000000006,27.370000000000008,27.62,27.86,27.959999999999997,28.000000000000004,28.160000000000007,28.459999999999997,29.230000000000004,29.880000000000006,30.39000000000001,30.730000000000004,30.770000000000007,30.94000000000001,31.120000000000005,31.370000000000005,31.619999999999997,31.880000000000003,32.19],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
