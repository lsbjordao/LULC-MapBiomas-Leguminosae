<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.3,88.25000000000001,87.60000000000001,86.77999999999999,86.75,86.90000000000002,86.8,87.63,87.07000000000001,90.08999999999999,90.11000000000001,88.39,92.66999999999999,93.28999999999999,93.06,92.72000000000003,91.5,91.56,91.08000000000001,91.12,90.48000000000002,83.83999999999999,83.7,84.17,84.14999999999999,88.19,88.88,88.46999999999998,85.51,79.94000000000001,77.47,77.14999999999999,75.60000000000001,74.83000000000001,73.97000000000001,72.28999999999999,74.07000000000001,74.78999999999999],"color":"green"},{"name":"anthropic","data":[11.11,11.15,11.8,12.63,12.66,12.51,12.610000000000001,11.77,12.34,9.31,9.29,11,6.73,6.11,6.34,6.6899999999999995,7.9,7.83,8.330000000000002,8.28,8.93,15.559999999999999,15.700000000000001,15.24,15.26,11.209999999999999,10.520000000000001,10.950000000000001,13.9,19.460000000000004,21.91,22.25,23.8,24.560000000000002,25.44,27.1,25.35,24.610000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
