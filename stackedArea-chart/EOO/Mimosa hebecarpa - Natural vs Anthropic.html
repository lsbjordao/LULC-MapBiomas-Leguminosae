<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.64000000000001,53.03,52.05000000000001,51.16000000000001,50.19,49.46,48.79,47.910000000000004,47.11,46.41000000000001,45.550000000000004,44.980000000000004,44.61000000000001,44.239999999999995,43.85000000000001,43.54,43.199999999999996,42.80999999999999,42.31999999999999,41.870000000000005,41.529999999999994,41.3,41.190000000000005,41.05,41,40.81000000000001,40.6,40.35000000000001,40.089999999999996,39.78999999999999,39.55999999999999,39.379999999999995,39.27,39.23,39.11999999999999,38.970000000000006,38.73999999999999,38.809999999999995],"color":"green"},{"name":"anthropic","data":[45.7,46.349999999999994,47.3,48.2,49.2,49.88999999999999,50.53999999999999,51.440000000000005,52.21,52.92,53.790000000000006,54.349999999999994,54.74999999999999,55.129999999999995,55.50000000000001,55.76999999999999,56.13000000000001,56.530000000000015,57.010000000000005,57.47000000000001,57.84000000000001,58.080000000000005,58.17999999999999,58.31999999999999,58.37,58.529999999999994,58.74,59,59.27,59.56999999999999,59.79999999999998,59.98,60.09999999999999,60.14999999999998,60.249999999999986,60.36999999999999,60.62,60.52999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
