<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.25000000000001,92.20999999999998,91.83,91.42,91.01999999999998,90.78,90.46,89.95,89.47000000000001,88.99000000000002,88.35000000000001,87.81000000000002,87.37,86.85000000000001,86.34000000000002,85.92000000000002,85.43000000000002,84.89,84.17,83.47,82.90999999999998,82.49999999999999,82.16,81.85000000000001,81.63999999999999,81.48,81.30000000000001,81.00000000000001,80.66999999999999,80.37,80.02999999999999,79.73999999999998,79.52,79.33,79.04999999999998,78.74,78.34,77.77999999999999],"color":"green"},{"name":"anthropic","data":[8.979999999999999,9.039999999999997,9.420000000000002,9.85,10.21,10.46,10.780000000000001,11.28,11.770000000000001,12.239999999999998,12.88,13.429999999999998,13.85,14.39,14.909999999999998,15.33,15.809999999999999,16.339999999999996,17.050000000000004,17.76,18.310000000000006,18.750000000000007,19.060000000000006,19.400000000000006,19.620000000000005,19.77000000000001,19.94000000000001,20.23000000000001,20.580000000000005,20.860000000000007,21.190000000000005,21.520000000000014,21.730000000000008,21.930000000000007,22.20000000000001,22.49000000000001,22.920000000000005,23.460000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
