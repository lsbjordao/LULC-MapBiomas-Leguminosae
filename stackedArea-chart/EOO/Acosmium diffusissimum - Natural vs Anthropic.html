<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.37,49.379999999999995,48.65,48.11,47.760000000000005,48.05000000000001,47.95000000000001,47.669999999999995,47.43,47.11,46.86000000000001,46.800000000000004,46.96000000000001,47.02000000000001,47.18000000000001,47.21,47.21000000000001,47.080000000000005,47.110000000000014,47.150000000000006,47.39000000000001,47.59000000000001,47.63000000000001,47.57000000000001,47.290000000000006,47.13,46.89000000000001,46.71000000000001,46.540000000000006,46.160000000000004,45.769999999999996,45.43,45.52,45.720000000000006,45.699999999999996,45.73000000000001,45.740000000000016,45.92],"color":"green"},{"name":"anthropic","data":[50.550000000000004,50.52,51.28,51.82,52.15,51.870000000000005,51.96,52.25999999999999,52.47999999999999,52.8,53.04,53.10999999999999,52.94999999999999,52.90999999999999,52.709999999999994,52.69999999999999,52.69999999999999,52.83999999999999,52.809999999999995,52.76999999999999,52.49999999999999,52.33000000000001,52.269999999999996,52.349999999999994,52.62,52.77,53,53.2,53.35999999999999,53.73999999999999,54.13000000000001,54.480000000000004,54.38999999999999,54.19,54.18,54.17,54.17,53.970000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
