<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.68999999999998,67.52,65.53999999999999,64.25999999999999,62.55,61.760000000000005,61.699999999999996,61.809999999999995,62.55999999999999,63.39999999999999,65.12,65.28999999999999,64.83,64.12,62.239999999999995,61.67999999999999,61.12999999999998,60.789999999999985,60.79999999999999,60.589999999999996,60.399999999999984,60.29999999999999,59.709999999999994,59.359999999999985,59.179999999999986,58.96999999999999,58.56999999999999,58.00999999999999,57.11000000000001,56.68999999999999,56.73,56.9,56.99999999999999,57.17999999999999,57.08999999999999,57.02999999999999,56.91999999999998,56.959999999999994],"color":"green"},{"name":"anthropic","data":[15.799999999999999,15.979999999999999,17.96,19.249999999999996,20.98,21.76,21.819999999999997,21.709999999999997,20.96,20.100000000000005,18.410000000000004,18.21,18.71,19.400000000000006,21.279999999999998,21.849999999999994,22.38,22.74,22.72,22.910000000000004,23.1,23.209999999999997,23.810000000000002,24.130000000000003,24.330000000000002,24.560000000000006,24.97,25.510000000000005,26.410000000000004,26.83,26.789999999999996,26.63,26.52,26.33,26.43,26.49,26.599999999999998,26.549999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
