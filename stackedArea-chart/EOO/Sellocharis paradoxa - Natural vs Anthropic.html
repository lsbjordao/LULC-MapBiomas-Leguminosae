<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.93,78.18000000000002,77.73,76.34000000000002,74.7,74.21000000000001,73.17,71.99,70.66,70.10999999999999,70.32,69.88000000000001,69.64,69.88,69.85999999999999,69.92000000000002,69.03000000000002,67.92,64.88000000000001,65.14,66.2,67.30999999999999,67.89999999999999,67.49,67.41,66.61,64.92,63.64,62.160000000000004,61.559999999999995,61.5,60.9,60.50000000000001,59.93000000000001,58.68000000000001,56.88000000000001,55.11,55.03000000000001],"color":"green"},{"name":"anthropic","data":[21.47,21.2,21.66,23.05,24.700000000000003,25.19,26.229999999999997,27.4,28.71,29.259999999999998,29.069999999999997,29.509999999999998,29.759999999999998,29.52,29.560000000000002,29.46,30.380000000000003,31.46,34.53,34.24,33.2,32.06,31.48,31.88,31.939999999999998,32.739999999999995,34.44,35.71,37.21,37.81,37.870000000000005,38.480000000000004,38.87,39.45,40.7,42.5,44.260000000000005,44.349999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
