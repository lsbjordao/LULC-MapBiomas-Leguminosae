<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.570000000000004,28.36,27.319999999999997,26.43,26.11,26.040000000000003,25.509999999999998,25.58,25.539999999999996,25.53,25.610000000000003,25.38,25.38,25.450000000000003,25.71,25.820000000000004,26.220000000000002,26.3,26.37,26.470000000000002,26.66,26.86,26.900000000000002,26.76,26.589999999999996,26.450000000000006,26.630000000000003,26.860000000000003,27.120000000000005,27.25,27.37,27.390000000000004,27.580000000000005,27.75,28.000000000000004,28.01,28.16,28.549999999999997],"color":"green"},{"name":"anthropic","data":[70.72,70.91,71.96999999999998,72.83999999999999,73.16,73.22999999999999,73.77,73.69000000000001,73.72,73.74,73.67,73.9,73.92,73.83000000000001,73.58,73.46,73.05,73,72.91999999999999,72.82000000000001,72.62,72.42,72.39,72.50999999999999,72.72,72.86000000000001,72.68,72.44,72.18,72.06,71.92,71.91,71.71000000000001,71.54,71.31,71.28000000000002,71.13000000000001,70.74000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
