<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.2,66.14,65.77999999999999,65.27,64.66000000000001,64.45,64.10000000000001,63.65000000000001,63.209999999999994,62.88000000000001,62.46000000000001,62.11,62.099999999999994,61.94,61.71,61.5,61.16000000000001,60.820000000000014,60.550000000000004,60.14,59.790000000000006,59.570000000000014,59.34,59.11000000000001,58.910000000000004,58.620000000000005,58.35000000000001,57.760000000000005,57.11000000000001,56.62000000000001,56.2,55.99,55.800000000000004,55.650000000000006,55.39000000000001,55.14000000000001,54.85000000000001,54.64],"color":"green"},{"name":"anthropic","data":[33.06999999999999,33.10999999999999,33.50000000000001,33.989999999999995,34.61,34.83,35.18000000000001,35.64,36.059999999999995,36.379999999999995,36.80999999999999,37.14999999999999,37.16999999999999,37.34,37.569999999999986,37.74999999999999,38.069999999999986,38.42999999999999,38.66999999999998,39.11,39.45000000000001,39.69,39.91000000000002,40.13,40.32,40.600000000000016,40.910000000000004,41.50000000000001,42.12000000000001,42.62999999999999,43.03000000000001,43.25000000000001,43.44000000000001,43.580000000000005,43.84,44.120000000000005,44.40000000000001,44.580000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
