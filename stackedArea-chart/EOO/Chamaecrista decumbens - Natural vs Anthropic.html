<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.24999999999999,60.62,59.66,58.17,56.129999999999995,54.98,53.53,52.59,51.67,50.61,49.76,49.15999999999999,48.190000000000005,47.480000000000004,46.769999999999996,46.02000000000001,45.32,44.379999999999995,43.43000000000001,42.46,41.83,41.38999999999999,41.07,40.84,40.67,40.38,40.08,39.900000000000006,39.81,39.589999999999996,39.38,39.24999999999999,39.06999999999999,38.87,38.589999999999996,38.370000000000005,38.129999999999995,38.31999999999999],"color":"green"},{"name":"anthropic","data":[37.93,38.56999999999999,39.510000000000005,41.019999999999996,43.04,44.17999999999999,45.629999999999995,46.56000000000001,47.489999999999995,48.54999999999999,49.38999999999999,50.00999999999999,50.97,51.650000000000006,52.379999999999995,53.13,53.839999999999996,54.760000000000005,55.730000000000004,56.68000000000001,57.330000000000005,57.73000000000001,58.07000000000001,58.31,58.470000000000006,58.77,59.05999999999999,59.24000000000001,59.35000000000001,59.550000000000004,59.78,59.93,60.08999999999999,60.29999999999999,60.55999999999999,60.77999999999999,61.029999999999994,60.839999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
