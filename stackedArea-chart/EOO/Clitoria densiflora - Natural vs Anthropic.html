<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.58,35.44,35.04,34.67,34.27,33.99,33.72,33.33,33,32.690000000000005,32.39,32.120000000000005,31.890000000000004,31.58,31.28,31.040000000000006,30.770000000000003,30.54,30.190000000000005,29.830000000000002,29.580000000000005,29.380000000000006,29.250000000000004,29.110000000000003,29.040000000000003,28.980000000000008,28.880000000000003,28.669999999999998,28.480000000000008,28.320000000000007,28.14,28.040000000000003,27.960000000000004,27.89,27.779999999999998,27.67,27.51,27.349999999999998],"color":"green"},{"name":"anthropic","data":[18.07,18.22,18.610000000000003,19.000000000000007,19.390000000000004,19.690000000000005,19.960000000000004,20.35,20.69000000000001,20.96,21.270000000000003,21.56000000000001,21.800000000000004,22.080000000000005,22.37000000000001,22.600000000000005,22.870000000000008,23.130000000000006,23.470000000000006,23.820000000000004,24.080000000000002,24.269999999999996,24.41,24.53000000000001,24.610000000000007,24.680000000000014,24.8,24.980000000000004,25.170000000000012,25.360000000000007,25.520000000000014,25.610000000000007,25.700000000000003,25.750000000000004,25.880000000000006,25.970000000000002,26.12,26.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
