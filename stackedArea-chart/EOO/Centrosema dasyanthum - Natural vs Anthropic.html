<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[27.93,27.64,27.400000000000002,27.31,27.259999999999998,27.220000000000006,27.160000000000004,27.28,27.360000000000007,27.52000000000001,27.650000000000002,27.790000000000006,27.92,27.970000000000006,28.060000000000002,27.890000000000004,27.930000000000007,27.930000000000003,27.950000000000003,28.040000000000006,28.180000000000007,28.250000000000007,28.270000000000003,28.380000000000003,28.470000000000006,28.580000000000002,28.750000000000004,28.920000000000005,29.090000000000003,29.310000000000002,29.53,29.630000000000006,29.75000000000001,29.850000000000005,29.900000000000006,29.940000000000005,30.26,30.330000000000005],"color":"green"},{"name":"anthropic","data":[69.05000000000001,69.33,69.56,69.65,69.74,69.76999999999998,69.84999999999998,69.69999999999999,69.61,69.44999999999999,69.34,69.2,69.08,69.01,68.91000000000001,69.10000000000002,69.06,69.07000000000001,69.04,68.93999999999998,68.82000000000001,68.75000000000001,68.72000000000001,68.59,68.53000000000002,68.39000000000001,68.23000000000002,68.06,67.9,67.69,67.46999999999998,67.35000000000001,67.22000000000001,67.13000000000001,67.08,67.05000000000001,66.74,66.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
