<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.91000000000002,62.83000000000002,62.35000000000001,61.87000000000001,61.26000000000001,60.88000000000001,60.48000000000002,60.000000000000014,59.570000000000014,59.390000000000015,59.22000000000001,59.19000000000001,59.410000000000004,59.300000000000004,59.14000000000001,59.02,58.78000000000001,58.600000000000016,58.35000000000001,58.03000000000001,57.79,57.650000000000006,57.5,57.5,57.45000000000001,57.400000000000006,57.230000000000004,56.78,56.360000000000014,55.98000000000001,55.72000000000001,55.620000000000005,55.589999999999996,55.580000000000005,55.50000000000001,55.46,55.42000000000001,55.39000000000001],"color":"green"},{"name":"anthropic","data":[35.09000000000001,35.18000000000001,35.660000000000004,36.12,36.75999999999999,37.11,37.530000000000015,37.99000000000001,38.46,38.63,38.81,38.82,38.62,38.72,38.89,38.99,39.230000000000004,39.40999999999999,39.69,39.98,40.24999999999999,40.37,40.51000000000001,40.550000000000004,40.55,40.629999999999995,40.8,41.22999999999999,41.66,42.05,42.29999999999999,42.379999999999995,42.42,42.44,42.5,42.52999999999999,42.6,42.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
