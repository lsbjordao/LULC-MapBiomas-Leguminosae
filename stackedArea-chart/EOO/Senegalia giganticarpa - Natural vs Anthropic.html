<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.97,67.70000000000002,67.15000000000002,66.57000000000002,65.94000000000001,65.5,64.95,64.3,63.64999999999999,63.11,62.5,61.96999999999999,61.599999999999994,61.08999999999999,60.480000000000004,60.00999999999999,59.48999999999999,58.96999999999999,58.19999999999999,57.46999999999999,56.92999999999999,56.58,56.32999999999999,56.14,55.99999999999999,55.879999999999995,55.669999999999995,55.28999999999999,54.879999999999995,54.519999999999996,54.17999999999999,54.03,53.89,53.78,53.58,53.41,53.16,52.929999999999986],"color":"green"},{"name":"anthropic","data":[31.650000000000006,31.910000000000004,32.49,33.06999999999999,33.669999999999995,34.12,34.63999999999999,35.28999999999999,35.93,36.489999999999995,37.1,37.64,38.01,38.54000000000001,39.11000000000001,39.59000000000001,40.10000000000001,40.64,41.410000000000004,42.13000000000002,42.690000000000005,43.03000000000001,43.269999999999996,43.46,43.589999999999996,43.74,43.91,44.27000000000001,44.74000000000001,45.08000000000001,45.410000000000004,45.56000000000001,45.710000000000015,45.81000000000001,46.00000000000001,46.18,46.43,46.669999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
