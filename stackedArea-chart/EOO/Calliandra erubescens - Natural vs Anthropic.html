<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.45,67.27999999999999,67.40999999999998,66.28,65.42999999999999,64.55,64.44,63.88,63.6,63.599999999999994,63.199999999999996,63.47,63.92999999999999,64.06,64.8,65.45999999999998,65.46,65.29999999999998,65.13,64.98,64.59,64.85000000000001,64.26000000000002,63.849999999999994,63.47,62.779999999999994,62.55,62.41,61.53,61.239999999999995,61.29,61.76,61.74,61.449999999999996,61.290000000000006,61.21000000000001,61.11999999999999,61.059999999999995],"color":"green"},{"name":"anthropic","data":[31.610000000000003,31.790000000000003,31.650000000000002,32.79,33.650000000000006,34.51000000000001,34.61,35.18,35.45,35.46000000000001,35.86000000000001,35.59,35.11000000000001,34.99000000000001,34.27,33.580000000000005,33.61,33.749999999999986,33.94,34.050000000000004,34.449999999999996,34.21,34.82,35.21,35.599999999999994,36.300000000000004,36.50000000000001,36.64,37.53,37.85,37.779999999999994,37.290000000000006,37.31000000000001,37.589999999999996,37.769999999999996,37.86,37.95,37.99],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
