<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.79,41.61,41.160000000000004,40.74,40.26,40.02,39.730000000000004,39.35000000000001,39.000000000000014,38.790000000000006,38.54000000000001,38.420000000000016,38.37000000000001,38.30000000000001,38.26,38.150000000000006,38.080000000000005,37.93000000000001,37.80000000000001,37.70000000000002,37.63000000000001,37.66000000000002,37.67000000000001,37.65000000000001,37.680000000000014,37.620000000000005,37.580000000000005,37.44000000000001,37.26000000000001,37.08,37.010000000000005,36.96,36.949999999999996,36.98,36.95,36.96000000000001,36.99000000000001,37.120000000000005],"color":"green"},{"name":"anthropic","data":[49.370000000000005,49.58000000000001,50.050000000000004,50.45,50.919999999999995,51.160000000000004,51.44,51.81999999999999,52.17,52.410000000000004,52.650000000000006,52.79,52.820000000000014,52.870000000000005,52.93,53.040000000000006,53.11000000000001,53.24,53.39999999999999,53.47,53.550000000000004,53.52000000000001,53.49999999999999,53.49999999999999,53.489999999999995,53.529999999999994,53.6,53.74999999999999,53.90999999999999,54.11,54.17000000000001,54.22,54.25,54.18999999999999,54.230000000000004,54.21,54.15,54.06],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
