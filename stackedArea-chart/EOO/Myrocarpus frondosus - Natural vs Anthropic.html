<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.25000000000003,68.97999999999998,68.38,67.75999999999999,67.14999999999999,66.71,66.22999999999999,65.59,65.06,64.50999999999999,63.79,63.209999999999994,62.75999999999999,62.220000000000006,61.68,61.23,60.790000000000006,60.290000000000006,59.64,59,58.540000000000006,58.220000000000006,58.00000000000001,57.71000000000001,57.60999999999999,57.419999999999995,57.1,56.910000000000004,56.63,56.349999999999994,56.08000000000001,55.86000000000001,55.68,55.53,55.1,54.89000000000002,54.510000000000005,54.08],"color":"green"},{"name":"anthropic","data":[26.470000000000002,26.729999999999997,27.349999999999998,27.97,28.569999999999997,29.03,29.48,30.11000000000001,30.630000000000006,31.20000000000001,31.92,32.489999999999995,32.949999999999996,33.48,34.01999999999999,34.46,34.900000000000006,35.40000000000001,36.04000000000001,36.71000000000001,37.17000000000001,37.47000000000001,37.65,37.960000000000015,38.06000000000001,38.18,38.59,38.800000000000004,39.03,39.28999999999999,39.56,39.67999999999999,39.99999999999999,40.010000000000005,40.51999999999999,40.71999999999999,41.05999999999999,41.59999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
