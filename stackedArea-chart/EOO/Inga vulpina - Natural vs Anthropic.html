<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.93,39.7,39.24000000000001,38.85999999999999,38.47,38.34,38.040000000000006,37.730000000000004,37.46999999999999,37.199999999999996,36.90999999999999,36.74,36.61,36.47,36.36000000000001,36.16,36.07,35.88,35.769999999999996,35.690000000000005,35.690000000000005,35.69,35.68,35.650000000000006,35.580000000000005,35.519999999999996,35.43,35.32,35.16,34.96,34.870000000000005,34.78000000000001,34.790000000000006,34.839999999999996,34.800000000000004,34.79,34.80999999999999,34.91999999999999],"color":"green"},{"name":"anthropic","data":[52.41,52.63,53.07,53.440000000000005,53.85999999999999,53.99999999999999,54.3,54.58,54.86,55.11000000000001,55.43000000000002,55.59,55.74,55.86000000000001,55.99000000000001,56.16000000000001,56.25000000000001,56.440000000000005,56.57,56.65999999999998,56.66,56.63999999999999,56.65,56.64999999999999,56.74999999999999,56.819999999999986,56.910000000000004,57.02999999999999,57.19,57.370000000000005,57.449999999999996,57.57,57.57,57.49999999999999,57.53000000000001,57.54,57.50000000000001,57.4],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
