<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.46000000000001,75.22,74.41000000000001,73.82000000000002,73.12000000000002,72.38000000000001,71.81000000000003,71.36000000000003,70.88000000000002,70.90000000000002,71.09000000000002,71.29000000000002,71.81000000000003,71.54,71.41000000000001,71.30000000000003,70.94,70.86,70.57999999999998,70.25000000000001,69.99000000000001,70,69.76999999999998,69.89,70.02000000000001,69.91000000000001,69.76,69.09,68.66000000000001,68.34,67.98000000000002,68.16,68.2,68.25,68.24999999999999,68.26,68.1,68.12],"color":"green"},{"name":"anthropic","data":[24.1,24.33,25.14,25.73,26.430000000000003,27.180000000000007,27.749999999999996,28.21,28.669999999999998,28.67,28.47,28.260000000000005,27.759999999999998,28.020000000000003,28.140000000000004,28.280000000000005,28.620000000000005,28.71,28.990000000000002,29.300000000000004,29.57,29.550000000000004,29.790000000000006,29.650000000000006,29.55,29.640000000000004,29.810000000000002,30.479999999999997,30.900000000000006,31.250000000000004,31.590000000000003,31.400000000000002,31.360000000000003,31.32,31.300000000000008,31.290000000000003,31.46,31.440000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
