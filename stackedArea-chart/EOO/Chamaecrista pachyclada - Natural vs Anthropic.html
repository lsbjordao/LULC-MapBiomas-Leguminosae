<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.7,71.05000000000001,71.34,71.05000000000001,70.60000000000001,70.45,70.13000000000001,69.67,69.4,69.09,68.64999999999999,68.34,68.15,67.79999999999998,67.36000000000001,66.63999999999999,65.97,65.7,65.35,64.72,64.49,64.33,64.06,63.779999999999994,63.87000000000001,63.64,63.61,63.64,63.620000000000005,63.32,62.989999999999995,62.669999999999995,62.379999999999995,62.029999999999994,61.75,61.45,61.29000000000001,60.72],"color":"green"},{"name":"anthropic","data":[28.57,28.230000000000004,27.939999999999998,28.24,28.709999999999997,28.85,29.15,29.61,29.87,30.189999999999998,30.63,30.94,31.11,31.47,31.92,32.62,33.3,33.59,33.94,34.54,34.78,34.96,35.23,35.489999999999995,35.39999999999999,35.63999999999999,35.669999999999995,35.63999999999999,35.66,35.98,36.290000000000006,36.60000000000001,36.89,37.239999999999995,37.550000000000004,37.83,38.01,38.559999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
