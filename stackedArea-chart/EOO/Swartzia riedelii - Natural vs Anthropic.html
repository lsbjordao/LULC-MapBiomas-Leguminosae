<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.24000000000001,73.15,72.21,71.2,70.16000000000001,69.65,69.32000000000001,69.11,68.66,67.92000000000002,66.8,66.08,65.57,65.19000000000003,64.97,64.56000000000002,64.56,64.19,63.89000000000001,63.61000000000001,63.12000000000002,63.07000000000001,63.070000000000014,62.89000000000001,63.150000000000006,63.07000000000001,63.16000000000001,63.27000000000001,63.07,62.92,62.88,62.47,62.220000000000006,62.330000000000005,62.239999999999995,62.11,62.699999999999996,63.230000000000004],"color":"green"},{"name":"anthropic","data":[25.849999999999998,25.959999999999997,26.87,27.92,28.94,29.460000000000004,29.790000000000003,30.01,30.450000000000003,31.21,32.32,33.03,33.54,33.919999999999995,34.129999999999995,34.55,34.55,34.919999999999995,35.239999999999995,35.489999999999995,35.99999999999999,36.03,36.03999999999999,36.22,35.959999999999994,36.029999999999994,35.949999999999996,35.83,36.05,36.19,36.22,36.64,36.89999999999999,36.769999999999996,36.87,36.99999999999999,36.419999999999995,35.879999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
