<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.00000000000001,50.86000000000001,50.31000000000001,49.670000000000016,49.12000000000001,48.870000000000005,48.38000000000001,47.919999999999995,47.489999999999995,47.24,47.06000000000001,47.00000000000001,47.26,47.160000000000004,47.1,46.92,46.75000000000001,46.57,46.27,46.160000000000004,46.080000000000005,46.10000000000001,46.09,46.09,46.18000000000001,46.2,46.14000000000001,45.870000000000005,45.61000000000001,45.30000000000001,45.04000000000001,45.02,45.00000000000001,45.080000000000005,45.09000000000001,45.15000000000001,45.210000000000015,45.400000000000006],"color":"green"},{"name":"anthropic","data":[42.16000000000001,42.309999999999995,42.85999999999999,43.47999999999999,44.05,44.300000000000004,44.790000000000006,45.260000000000005,45.690000000000005,45.949999999999996,46.11999999999999,46.169999999999995,45.94,46.03999999999999,46.080000000000005,46.260000000000005,46.44,46.6,46.889999999999986,46.99999999999999,47.11,47.080000000000005,47.06999999999999,47.059999999999995,47,46.96,47.03,47.29,47.56999999999999,47.89,48.14999999999999,48.14999999999999,48.18,48.109999999999985,48.1,48.01,47.95999999999999,47.74],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
