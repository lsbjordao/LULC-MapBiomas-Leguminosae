<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.94,49.96,49.56,49.11000000000001,48.51,48.32000000000001,48,47.57,47.17999999999999,46.95000000000001,46.70000000000002,46.56000000000001,46.650000000000006,46.6,46.47000000000001,46.36000000000001,46.150000000000006,45.93000000000001,45.75000000000001,45.540000000000006,45.39,45.25000000000001,45.199999999999996,45.04,44.96000000000001,44.870000000000005,44.720000000000006,44.440000000000005,44.07,43.81,43.64,43.51000000000001,43.480000000000004,43.54,43.41,43.32,43.31999999999999,43.260000000000005],"color":"green"},{"name":"anthropic","data":[42.71,42.68,43.07000000000001,43.51,44.13,44.31,44.650000000000006,45.09,45.480000000000004,45.72,45.970000000000006,46.089999999999996,45.99,46.06,46.190000000000005,46.29,46.480000000000004,46.72,46.889999999999986,47.11999999999999,47.29,47.36999999999999,47.480000000000025,47.600000000000016,47.68000000000001,47.790000000000006,47.93,48.21000000000001,48.54000000000001,48.82999999999999,49.01,49.14,49.17,49.13,49.22,49.32999999999999,49.349999999999994,49.37999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
