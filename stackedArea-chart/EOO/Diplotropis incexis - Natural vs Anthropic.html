<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.96999999999999,34.74999999999999,34.17999999999999,33.800000000000004,33.49,33.38000000000001,33.17,32.92000000000001,32.730000000000004,32.59,32.53000000000001,32.6,32.64000000000001,32.60000000000001,32.59,32.410000000000004,32.34,32.260000000000005,32.17000000000001,32.13000000000001,32.18000000000001,32.22,32.25,32.22,32.14,32.12000000000001,32.080000000000005,31.940000000000005,31.840000000000007,31.740000000000002,31.700000000000003,31.650000000000006,31.700000000000006,31.82,31.830000000000002,31.85000000000001,31.970000000000006,32.16000000000001],"color":"green"},{"name":"anthropic","data":[54.30999999999999,54.53999999999999,55.109999999999985,55.49999999999999,55.800000000000004,55.92,56.14000000000001,56.41999999999999,56.59999999999999,56.719999999999985,56.759999999999984,56.71999999999999,56.67999999999999,56.70999999999999,56.73999999999998,56.88999999999999,56.94999999999998,57.06,57.15,57.17000000000001,57.129999999999995,57.080000000000005,57.04999999999999,57.08999999999999,57.169999999999995,57.19000000000001,57.230000000000004,57.38,57.48,57.58,57.62,57.65999999999999,57.61999999999999,57.489999999999995,57.5,57.449999999999996,57.36000000000001,57.160000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
