<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.32000000000001,88.35,88.47,87.74000000000001,86.98,86.37,85.77000000000001,84.89999999999999,84.34,83.57000000000001,81.85000000000001,81.04,80.05999999999999,78.64,76.21000000000001,73.13000000000001,72.77,71.9,71.77,71.39999999999999,70.42,69.46000000000001,69.03,69.25,69.08000000000001,68.68,68.66,68.63,68.81000000000002,68.62,68.38,67.96,67.46,67.00999999999999,66.39999999999999,66.68,66.99000000000001,67.07999999999998],"color":"green"},{"name":"anthropic","data":[10.09,11.059999999999999,10.94,11.66,12.42,13.04,13.64,14.5,15.07,15.849999999999998,17.56,18.36,19.34,20.769999999999996,23.2,26.29,26.65,27.5,27.65,28.009999999999998,28.99,29.939999999999998,30.37,30.150000000000002,30.32,30.72,30.740000000000002,30.790000000000003,30.6,30.78,31.02,31.42,31.94,32.4,32.99999999999999,32.73,32.41,32.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
