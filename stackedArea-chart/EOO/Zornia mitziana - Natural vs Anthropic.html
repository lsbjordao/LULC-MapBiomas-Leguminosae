<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.19,70.96,70.66,67.52,62.82,60.379999999999995,58.78,57.88,56.53999999999999,55.52,55.169999999999995,54.68,52.17,51.18,49.980000000000004,48.519999999999996,47.42999999999999,46.97999999999999,46.620000000000005,44.95,44.75,44.61000000000001,44.379999999999995,43.79,43.75,43.67000000000001,42.779999999999994,42.449999999999996,41.94,41.66,41.68000000000001,41.589999999999996,41.88,41.76,41.61,41.49999999999999,41.32000000000001,41.949999999999996],"color":"green"},{"name":"anthropic","data":[28.36,28.590000000000003,28.88,32.04,36.730000000000004,39.17,40.78,41.69,42.99,44.019999999999996,44.379999999999995,44.88,47.39,48.370000000000005,49.56,51.03999999999999,52.099999999999994,52.57000000000001,52.93,54.6,54.82000000000001,54.93,55.17,55.76,55.82,55.870000000000005,56.79,57.11,57.620000000000005,57.89000000000001,57.88,57.96,57.66,57.78,57.94,58.06,58.239999999999995,57.589999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
