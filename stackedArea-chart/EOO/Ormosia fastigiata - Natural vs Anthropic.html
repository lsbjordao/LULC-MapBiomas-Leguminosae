<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.69000000000001,72.48000000000003,71.89,71.30000000000003,70.68000000000004,70.25,69.78000000000002,69.17999999999999,68.54,68.05000000000001,67.37000000000002,66.87,66.44000000000001,65.89000000000001,65.41,65,64.58000000000001,64.13,63.47,62.81000000000001,62.31000000000001,61.93000000000001,61.65,61.42,61.28,61.18000000000001,61.00000000000001,60.73,60.44,60.15,59.88000000000001,59.66000000000001,59.50000000000001,59.360000000000014,59.150000000000006,58.93000000000002,58.63000000000002,58.22000000000001],"color":"green"},{"name":"anthropic","data":[25.320000000000007,25.5,26.09,26.66,27.29,27.730000000000004,28.180000000000007,28.81000000000001,29.43,29.920000000000005,30.590000000000003,31.110000000000003,31.540000000000003,32.050000000000004,32.57000000000001,32.96000000000001,33.41000000000001,33.85,34.5,35.17,35.650000000000006,36.04,36.33000000000002,36.550000000000004,36.68000000000001,36.78,36.96000000000001,37.22,37.510000000000005,37.82,38.08,38.29,38.459999999999994,38.61,38.81,39.029999999999994,39.33,39.72999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
