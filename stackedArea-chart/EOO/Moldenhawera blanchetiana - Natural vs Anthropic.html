<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.19,33.940000000000005,33.510000000000005,32.910000000000004,32.480000000000004,32.32000000000001,32.13,32.11,31.880000000000003,31.700000000000003,31.470000000000002,31.349999999999994,31.26,31.119999999999997,30.83,30.430000000000003,30.330000000000002,30.160000000000004,30.21,30.070000000000004,29.76,29.68,29.710000000000004,29.830000000000002,29.990000000000002,30.009999999999998,29.97,29.939999999999998,29.74,29.729999999999997,29.799999999999997,29.740000000000002,29.62,29.74,29.740000000000002,29.750000000000007,29.970000000000002,30.39],"color":"green"},{"name":"anthropic","data":[12.57,12.83,13.28,13.889999999999999,14.309999999999999,14.479999999999999,14.669999999999998,14.7,14.93,15.099999999999998,15.34,15.45,15.549999999999999,15.649999999999999,15.969999999999999,16.35,16.45,16.630000000000003,16.57,16.730000000000004,17.04,17.130000000000003,17.089999999999996,16.979999999999997,16.82,16.81,16.83,16.869999999999997,17.069999999999997,17.09,17.02,17.080000000000002,17.180000000000003,17.080000000000002,17.08,17.05,16.81,16.389999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
