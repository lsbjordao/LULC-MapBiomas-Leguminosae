<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.769999999999996,44.64,44.01,43.25,42.63,42.309999999999995,42.120000000000005,42.169999999999995,42.089999999999996,42.15,41.879999999999995,41.540000000000006,41.230000000000004,41.11,41.1,40.98000000000001,40.95,40.910000000000004,40.65,40.40000000000001,40.42999999999999,40.42999999999999,40.440000000000005,40.37,40.370000000000005,40.48,40.43,40.48,40.59,40.59000000000001,40.550000000000004,40.51,40.459999999999994,40.400000000000006,40.11,39.99,39.95,39.91],"color":"green"},{"name":"anthropic","data":[55.21,55.31,55.96,56.74,57.33,57.660000000000004,57.84,57.79000000000001,57.86000000000001,57.82,58.09000000000001,58.42,58.75,58.849999999999994,58.85000000000001,58.98000000000001,59.03000000000001,59.050000000000004,59.33,59.57000000000001,59.52,59.51999999999999,59.529999999999994,59.599999999999994,59.58,59.480000000000004,59.55,59.480000000000004,59.379999999999995,59.36,59.419999999999995,59.45,59.52,59.57,59.84,59.97999999999999,59.99,60.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
