<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.03,61.830000000000005,61.31,60.779999999999994,60.129999999999995,59.750000000000014,59.33,58.83,58.39000000000001,58.220000000000006,58.08,58.07000000000001,58.31,58.199999999999996,58.1,58.000000000000014,57.77,57.589999999999996,57.33,57.04,56.79,56.69,56.56999999999999,56.57,56.56999999999999,56.5,56.290000000000006,55.879999999999995,55.46,55.080000000000005,54.79,54.75,54.68000000000001,54.63,54.57,54.54,54.46000000000001,54.43],"color":"green"},{"name":"anthropic","data":[37.930000000000014,38.12,38.64000000000001,39.18,39.86000000000001,40.21,40.64000000000001,41.11000000000001,41.57000000000001,41.74,41.870000000000005,41.870000000000005,41.64,41.75,41.88,41.949999999999996,42.18,42.38,42.63,42.929999999999986,43.160000000000004,43.24000000000001,43.37,43.37,43.36,43.429999999999986,43.620000000000005,44.080000000000005,44.50000000000001,44.88000000000002,45.13999999999999,45.19,45.290000000000006,45.290000000000006,45.38000000000001,45.390000000000015,45.48000000000001,45.510000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
