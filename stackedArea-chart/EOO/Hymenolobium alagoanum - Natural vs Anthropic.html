<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.760000000000005,35.58000000000001,34.940000000000005,34.61000000000001,34.16000000000001,33.7,33.25,32.75999999999999,32.33,32.089999999999996,32.019999999999996,32.04,32.03,31.930000000000003,31.869999999999997,31.679999999999993,31.589999999999993,31.629999999999995,31.25999999999999,31.16,31.03,31.09,31.30999999999999,31.329999999999995,31.49,31.520000000000003,31.480000000000004,31.24,31.160000000000004,30.929999999999996,30.880000000000003,30.790000000000006,30.660000000000007,30.63,30.56,30.61,30.679999999999996,30.87],"color":"green"},{"name":"anthropic","data":[44.089999999999996,44.28,44.94,45.269999999999996,45.69999999999999,46.17999999999999,46.61999999999999,47.14,47.540000000000006,47.82,47.86999999999999,47.809999999999995,47.86999999999999,47.970000000000006,48.02,48.22,48.28,48.24,48.620000000000005,48.739999999999995,48.85,48.78999999999999,48.589999999999996,48.56,48.39,48.36999999999998,48.41,48.66,48.73,48.94,48.98999999999999,49.109999999999985,49.22,49.25,49.33,49.309999999999995,49.22,49.00999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
