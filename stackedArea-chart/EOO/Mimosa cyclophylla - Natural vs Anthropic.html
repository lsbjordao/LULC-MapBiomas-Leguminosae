<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.99000000000001,96.17999999999999,96.03,96.01,95.85,95.62,95.66,95.71000000000001,95.7,95.70000000000002,95.71000000000001,95.74,95.74,95.68,95.71,95.72,95.74,95.67999999999999,95.62,95.61999999999999,95.60000000000001,95.58,95.54,95.52,95.48,95.4,95.36,95.44000000000001,95.45,95.42,95.41999999999999,95.39999999999999,95.4,95.30000000000001,95.14999999999999,95.03999999999999,94.94,94.64999999999999],"color":"green"},{"name":"anthropic","data":[3.41,3.2199999999999998,3.37,3.39,3.5599999999999996,3.79,3.74,3.6900000000000004,3.7,3.7,3.6999999999999997,3.6599999999999997,3.6799999999999997,3.7399999999999998,3.6900000000000004,3.67,3.65,3.71,3.78,3.79,3.8000000000000003,3.81,3.85,3.89,3.9099999999999997,3.9999999999999996,4.0200000000000005,3.9599999999999995,3.95,3.96,3.97,4,3.9899999999999998,4.11,4.25,4.36,4.470000000000001,4.74],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
