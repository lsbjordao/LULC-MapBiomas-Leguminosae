<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[64.28999999999999,63.61999999999999,62.97999999999999,61.85999999999999,60.85999999999999,60.45,60.269999999999996,60.4,60.31999999999999,59.879999999999995,60.080000000000005,60.080000000000005,59.959999999999994,60.290000000000006,60.14,59.81,59.98,59.74,60.03999999999999,59.870000000000005,59.54,59.24,59.47,59.509999999999984,60.199999999999996,60.78999999999999,60.75,60.81,60.449999999999996,59.85000000000001,59.86,59.51,58.83,59.03000000000001,59.09,59.19,59.88,60.150000000000006],"color":"green"},{"name":"anthropic","data":[9.67,10.41,11.06,12.17,13.18,13.6,13.78,13.659999999999998,13.72,14.159999999999998,13.97,13.96,14.08,13.729999999999999,13.890000000000002,14.230000000000002,14.04,14.3,14.010000000000002,14.16,14.48,14.790000000000001,14.57,14.540000000000001,13.840000000000002,13.25,13.28,13.240000000000002,13.59,14.19,14.17,14.530000000000001,15.19,15.02,14.95,14.85,14.16,13.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
