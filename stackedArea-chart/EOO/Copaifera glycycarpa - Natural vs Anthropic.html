<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.61,98.55000000000001,98.44000000000003,98.36000000000001,98.33,98.31000000000002,98.26000000000002,98.12000000000002,98.00000000000001,97.86000000000003,97.66999999999999,97.43000000000002,97.23000000000002,97.02000000000001,96.84000000000002,96.75,96.65,96.45,96.25,95.97000000000001,95.63000000000001,95.46000000000002,95.36000000000001,95.30000000000003,95.22999999999999,95.14,95.09000000000002,95.06000000000002,94.95000000000003,94.85,94.66,94.38000000000001,94.17000000000002,94.01000000000002,93.7,93.42,92.96000000000001,92.28],"color":"green"},{"name":"anthropic","data":[0.91,0.99,1.08,1.16,1.2,1.21,1.28,1.41,1.53,1.67,1.86,2.0999999999999996,2.2899999999999996,2.51,2.6999999999999997,2.77,2.8899999999999997,3.0699999999999994,3.28,3.5599999999999996,3.8899999999999997,4.06,4.16,4.23,4.3,4.37,4.42,4.47,4.58,4.68,4.87,5.16,5.35,5.51,5.81,6.109999999999999,6.56,7.249999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
