<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.83999999999999,57.5,56.87,56.239999999999995,55.54999999999999,55.05999999999999,54.59999999999999,53.989999999999995,53.419999999999995,52.87999999999999,52.23,51.709999999999994,51.27,50.84,50.37000000000001,49.98,49.6,49.080000000000005,48.45,47.86999999999999,47.51,47.28,47.08999999999999,46.92,46.809999999999995,46.7,46.519999999999996,46.260000000000005,45.99,45.74999999999999,45.54999999999999,45.42,45.309999999999995,45.21999999999999,45,44.78999999999999,44.54999999999999,44.39000000000001],"color":"green"},{"name":"anthropic","data":[38.38,38.69,39.35000000000001,39.96,40.67,41.13,41.59999999999999,42.2,42.739999999999995,43.300000000000004,43.940000000000005,44.44,44.89,45.320000000000014,45.800000000000004,46.19,46.550000000000004,47.05,47.71,48.29999999999999,48.64,48.88,49.02999999999999,49.21999999999999,49.31999999999999,49.45000000000001,49.620000000000005,49.85,50.15,50.38,50.580000000000005,50.71999999999999,50.84999999999999,50.95000000000001,51.129999999999995,51.35999999999999,51.61000000000001,51.78],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
