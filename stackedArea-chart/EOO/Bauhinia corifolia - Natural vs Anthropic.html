<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.99,45.669999999999995,45.52,45.21999999999999,44.66,44.139999999999986,43.10999999999999,41.74,40.47,39.75,39.48,39.49999999999999,39.8,39.82,39.68,39.169999999999995,38.82999999999999,38.56,37.81999999999999,37.480000000000004,37.08,37.18,37.410000000000004,37.510000000000005,37.800000000000004,37.859999999999985,37.739999999999995,37.48,37.16999999999999,37.26,37.28,38.04,38.09999999999999,38.00999999999999,38.059999999999995,38.06999999999999,38.019999999999996,38.07999999999999],"color":"green"},{"name":"anthropic","data":[53.46,53.809999999999995,53.92999999999999,54.23,54.809999999999995,55.31999999999999,56.36000000000001,57.73,58.989999999999995,59.709999999999994,59.97,59.96,59.669999999999995,59.64999999999999,59.790000000000006,60.31,60.65,60.919999999999995,61.63,62.010000000000005,62.4,62.300000000000004,62.06,61.97,61.68,61.64,61.760000000000005,61.99,62.269999999999996,62.2,62.2,61.44,61.37000000000001,61.45,61.410000000000004,61.4,61.449999999999996,61.38],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
