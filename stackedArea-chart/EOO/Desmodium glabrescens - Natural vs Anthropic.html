<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[93.88,93.48,93.25999999999999,93.13000000000001,93.02,92.88,92.9,92.78999999999999,92.45,91.83000000000001,90.96,88.49000000000001,88.17000000000002,87.76,86.94,86.28,86.14,85.87999999999998,85.96,85.33,84.96,84.33999999999999,84.19,83.72000000000001,83.46999999999998,83.72,83.83999999999999,83.45,83.67,84.14999999999999,84.67999999999999,85.82,86.23999999999998,86.28,86.23,85.37000000000002,85.10000000000001,87.51],"color":"green"},{"name":"anthropic","data":[5.61,6,6.2299999999999995,6.370000000000001,6.48,6.62,6.59,6.7,7.04,7.659999999999999,8.51,11,11.32,11.72,12.540000000000001,13.2,13.35,13.6,13.520000000000001,14.16,14.510000000000002,15.14,15.299999999999999,15.77,16.01,15.76,15.639999999999999,16.02,15.819999999999999,15.329999999999998,14.809999999999999,13.66,13.26,13.2,13.260000000000002,14.110000000000001,14.38,11.96],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
