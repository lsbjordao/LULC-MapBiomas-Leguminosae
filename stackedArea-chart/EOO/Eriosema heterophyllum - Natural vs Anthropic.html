<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.53,66.10000000000001,65.42,64.80999999999997,64.21,63.720000000000006,63.25000000000001,62.56,62.00999999999999,61.43,60.71,60.129999999999995,59.599999999999994,59.05000000000001,58.480000000000004,58,57.610000000000014,57.05000000000001,56.31999999999999,55.66,55.24000000000001,54.91,54.72,54.56,54.46000000000001,54.349999999999994,54.2,53.99999999999999,53.81,53.63000000000001,53.459999999999994,53.36000000000001,53.24,53.160000000000004,52.919999999999995,52.73,52.39999999999999,52.13000000000001],"color":"green"},{"name":"anthropic","data":[32.470000000000006,32.900000000000006,33.550000000000004,34.169999999999995,34.79,35.28,35.76,36.410000000000004,36.949999999999996,37.57000000000001,38.29000000000001,38.850000000000016,39.390000000000015,39.919999999999995,40.489999999999995,40.95000000000001,41.370000000000005,41.92999999999999,42.64999999999999,43.309999999999995,43.73999999999999,44.04,44.25999999999999,44.42,44.51,44.59999999999999,44.76,44.96,45.13,45.32,45.48,45.599999999999994,45.71999999999999,45.81999999999999,46.059999999999995,46.23,46.58,46.85],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
