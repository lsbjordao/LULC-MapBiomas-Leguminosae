<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.83999999999999,65.33,64.44,63.56999999999999,62.70999999999999,62.01999999999998,61.33,60.429999999999986,59.63,58.74999999999999,57.75999999999999,56.94,56.15999999999998,55.389999999999986,54.579999999999984,53.87999999999999,53.26999999999998,52.550000000000004,51.58,50.67,50.06,49.58999999999999,49.339999999999996,49.07,48.929999999999986,48.749999999999986,48.53,48.239999999999995,47.94,47.62,47.349999999999994,47.22999999999999,47.08999999999998,46.939999999999976,46.699999999999974,46.47999999999999,46.149999999999984,45.79999999999999],"color":"green"},{"name":"anthropic","data":[32.95,33.44,34.34999999999999,35.21999999999999,36.05999999999999,36.75,37.42,38.309999999999995,39.12,40.02,41.00000000000001,41.839999999999996,42.6,43.379999999999995,44.18,44.879999999999995,45.52,46.2,47.17,48.09,48.709999999999994,49.16000000000001,49.400000000000006,49.669999999999995,49.829999999999984,50.04,50.25,50.53000000000001,50.85,51.13,51.39,51.60000000000001,51.73,51.86999999999999,52.07,52.30000000000001,52.63,52.96999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
