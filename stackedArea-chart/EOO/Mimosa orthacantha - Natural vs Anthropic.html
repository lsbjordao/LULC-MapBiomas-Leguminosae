<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.92,33.730000000000004,33.160000000000004,32.33,31.949999999999996,31.76,31.410000000000004,31.369999999999997,31.249999999999996,31.159999999999997,31.24,31.25,31.160000000000004,31.25,31.37,31.270000000000003,31.290000000000003,31.18,31.130000000000006,31.01,31.050000000000008,31.110000000000003,31.110000000000003,31.200000000000003,31.28,31.390000000000004,31.51,31.620000000000005,31.839999999999996,32,32.199999999999996,32.35,32.45,32.43,32.279999999999994,32.24,32.29,32.379999999999995],"color":"green"},{"name":"anthropic","data":[65.4,65.59000000000002,66.18,67.00999999999999,67.38999999999999,67.58999999999999,67.91,67.97000000000001,68.09,68.17000000000002,68.09,68.09,68.17999999999999,68.10000000000001,67.94999999999999,68.07999999999997,68.04999999999998,68.17,68.23,68.34,68.31,68.26,68.21000000000001,68.13000000000002,68.03999999999999,67.94000000000001,67.85,67.74,67.49000000000001,67.35000000000001,67.14999999999999,66.98,66.92000000000002,66.90000000000002,67.05999999999997,67.10000000000002,67.03999999999999,66.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
