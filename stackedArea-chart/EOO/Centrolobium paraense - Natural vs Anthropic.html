<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.21,98.32000000000001,98.21000000000002,97.82,97.44999999999999,97.14,96.91999999999999,96.48,95.92000000000002,95.37,94.93,94.32,93.77000000000001,93.09,92.3,91.74000000000001,91.19999999999999,90.91,90.46000000000001,90,89.56,89.14,88.42,87.59,87.40000000000002,87.28,87.20000000000002,87.00999999999999,86.59,85.89999999999999,85.29,84.91,84.49,83.81,82.96000000000001,82.74000000000001,82.32,82.13000000000001],"color":"green"},{"name":"anthropic","data":[1.12,1,1.11,1.51,1.8900000000000001,2.1799999999999997,2.4099999999999997,2.8299999999999996,3.3899999999999997,3.94,4.39,4.989999999999999,5.56,6.239999999999999,7.02,7.589999999999999,8.13,8.420000000000002,8.860000000000001,9.33,9.780000000000001,10.19,10.93,11.75,11.910000000000002,12.06,12.129999999999999,12.3,12.73,13.41,14.020000000000001,14.420000000000002,14.85,15.53,16.36,16.58,17,17.189999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
