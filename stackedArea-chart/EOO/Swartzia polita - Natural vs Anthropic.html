<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.32999999999999,38.43000000000001,37.53000000000001,37.09,36.70000000000001,36.54000000000001,36.250000000000014,35.96000000000001,35.820000000000014,35.580000000000005,35.46000000000001,35.43000000000001,35.40000000000002,35.42000000000001,35.500000000000014,35.30000000000001,35.330000000000005,35.330000000000005,35.32000000000001,35.27000000000001,35.50000000000001,35.67,35.80000000000001,35.84,35.580000000000005,35.500000000000014,35.600000000000016,35.70000000000001,35.849999999999994,35.879999999999995,35.93,35.99,35.96,35.959999999999994,35.98,35.88999999999999,36.04,36.529999999999994],"color":"green"},{"name":"anthropic","data":[51.86,51.77,52.68,53.13,53.51999999999999,53.69,53.96999999999999,54.26,54.41,54.63999999999999,54.76,54.78999999999999,54.82,54.8,54.73,54.93,54.89000000000001,54.9,54.9,54.959999999999994,54.71999999999999,54.54999999999999,54.41,54.379999999999995,54.629999999999995,54.709999999999994,54.639999999999986,54.53,54.35999999999999,54.31999999999999,54.29,54.23,54.260000000000005,54.25,54.239999999999995,54.32999999999999,54.16,53.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
