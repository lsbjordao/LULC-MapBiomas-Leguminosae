<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.28,38.43,37.77999999999999,37.559999999999995,37.21000000000001,37,36.830000000000005,36.459999999999994,36.19,35.95,35.92,36.08,36.07000000000001,36.38,36.480000000000004,36.56000000000001,36.92000000000001,37.010000000000005,36.7,36.38000000000001,36.18,36.16,36.36,36.49000000000001,36.46,36.440000000000005,36.51000000000002,36.42000000000001,36.57000000000001,36.490000000000016,36.600000000000016,36.57,36.45000000000001,36.42000000000001,36.260000000000005,36.18000000000001,36.27000000000001,36.40000000000001],"color":"green"},{"name":"anthropic","data":[68.36000000000001,68.22000000000001,68.84000000000002,69.08000000000001,69.43,69.63000000000001,69.80000000000001,70.18,70.44000000000001,70.69,70.71000000000001,70.56,70.56,70.23,70.15,70.08000000000001,69.73,69.63,69.95,70.28000000000002,70.46000000000001,70.47,70.27000000000001,70.15000000000002,70.17000000000002,70.21000000000001,70.12000000000002,70.21000000000001,70.10000000000001,70.16000000000001,70.01,70.05,70.17000000000003,70.21000000000002,70.38000000000001,70.43000000000004,70.36000000000001,70.23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
