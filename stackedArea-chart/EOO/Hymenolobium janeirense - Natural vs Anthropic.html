<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.50000000000001,35.34,34.88,34.47,34.17,34.06,33.800000000000004,33.51,33.31,33.2,33.08,33.13,33.15,33.14,33.10000000000001,32.93,32.89,32.82,32.74,32.699999999999996,32.769999999999996,32.81,32.85,32.81999999999999,32.78,32.79999999999999,32.76,32.669999999999995,32.57,32.46,32.449999999999996,32.39,32.43,32.53999999999999,32.58,32.61,32.76,32.93],"color":"green"},{"name":"anthropic","data":[55.42999999999999,55.589999999999996,56.06,56.459999999999994,56.79,56.9,57.15,57.45,57.63999999999999,57.75000000000001,57.85999999999999,57.81999999999999,57.79,57.81000000000001,57.83999999999999,58.01,58.05,58.120000000000005,58.17999999999999,58.25,58.18,58.12,58.09999999999999,58.109999999999985,58.150000000000006,58.15,58.17999999999999,58.27000000000002,58.38,58.480000000000004,58.480000000000004,58.53000000000001,58.470000000000006,58.36999999999999,58.34,58.30000000000001,58.16000000000002,58.00000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
