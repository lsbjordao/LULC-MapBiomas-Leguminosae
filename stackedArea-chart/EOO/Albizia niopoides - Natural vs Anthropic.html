<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.88000000000001,77.67000000000002,77.12000000000002,76.56,76.02999999999999,75.61,75.2,74.59,74.06,73.53,72.8,72.19,71.66999999999997,71.08,70.55999999999997,70.05999999999997,69.58999999999997,69.03999999999996,68.32999999999998,67.65999999999998,67.09999999999997,66.71,66.38999999999999,66.04999999999998,65.92999999999998,65.70999999999998,65.42999999999999,65.16999999999999,64.85999999999999,64.54999999999998,64.23999999999998,63.96,63.739999999999995,63.49999999999999,63.07999999999999,62.779999999999994,62.3,61.67999999999999],"color":"green"},{"name":"anthropic","data":[21.790000000000006,22,22.55,23.16,23.67000000000001,24.080000000000002,24.490000000000013,25.120000000000005,25.63,26.169999999999998,26.890000000000004,27.490000000000002,28.03000000000001,28.590000000000007,29.15,29.63,30.089999999999996,30.61,31.36,32.02,32.57,32.94,33.300000000000004,33.610000000000014,33.78000000000001,33.98000000000001,34.24000000000001,34.5,34.79,35.09,35.410000000000004,35.72,35.93,36.15,36.580000000000005,36.88,37.37,37.98999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
