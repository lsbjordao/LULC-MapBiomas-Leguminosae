<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.86999999999999,79.78999999999999,79.52,78.95000000000002,77.78,77.16999999999999,76.56,76.10999999999999,75.46000000000001,74.84,74.22999999999999,73.44999999999999,72.80999999999999,72.05999999999999,71.22999999999999,70.52,69.71,69.00000000000001,68.32000000000001,66.78,65.9,65.07000000000001,64.38,63.33,62.51999999999999,61.809999999999995,61.03999999999999,59.75,58.73,58.14,57.71,57.440000000000005,57.11,56.71,55.919999999999995,55.1,54.31999999999999,53.25],"color":"green"},{"name":"anthropic","data":[20.54,19.629999999999995,19.890000000000004,20.470000000000006,21.64,22.239999999999995,22.83,23.310000000000002,23.939999999999998,24.57,25.19,25.95,26.610000000000003,27.350000000000005,28.169999999999998,28.88,29.679999999999996,30.389999999999997,31.070000000000007,32.61,33.50999999999999,34.35,35.029999999999994,36.07,36.87,37.59,38.35,39.629999999999995,40.67999999999999,41.279999999999994,41.67999999999999,41.96,42.29,42.68,43.480000000000004,44.28,45.05,46.15],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
