<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.900000000000006,34.58,34.220000000000006,33.910000000000004,33.760000000000005,33.83,33.76,33.64000000000001,33.6,33.580000000000005,33.53,33.540000000000006,33.53000000000001,33.50000000000001,33.45000000000001,33.230000000000004,33.160000000000004,33.06,33.07000000000001,33.11,33.2,33.26,33.27000000000001,33.31,33.35000000000001,33.41000000000001,33.43,33.400000000000006,33.32000000000001,33.230000000000004,33.260000000000005,33.27,33.41000000000001,33.52,33.57,33.59000000000001,33.650000000000006,33.79],"color":"green"},{"name":"anthropic","data":[60.00999999999999,60.330000000000005,60.67,61,61.120000000000005,61.07,61.14000000000001,61.26,61.279999999999994,61.31999999999999,61.36,61.35,61.36,61.39,61.42999999999999,61.63999999999999,61.71,61.79999999999999,61.809999999999995,61.78,61.669999999999995,61.620000000000005,61.58999999999999,61.57999999999999,61.53999999999999,61.470000000000006,61.459999999999994,61.49000000000001,61.56,61.63999999999999,61.60000000000001,61.60000000000001,61.47,61.31999999999999,61.31000000000001,61.27,61.22,61.07999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
