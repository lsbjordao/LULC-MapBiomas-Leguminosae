<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.480000000000004,28.270000000000003,28.020000000000003,27.860000000000003,27.700000000000006,27.610000000000003,27.510000000000005,27.480000000000008,27.419999999999998,27.49000000000001,27.440000000000005,27.5,27.450000000000006,27.440000000000005,27.42,27.270000000000003,27.280000000000005,27.240000000000006,27.230000000000008,27.210000000000004,27.290000000000006,27.360000000000007,27.42000000000001,27.460000000000008,27.580000000000013,27.71000000000001,27.810000000000006,27.860000000000003,27.890000000000004,27.940000000000005,28.10000000000001,28.180000000000007,28.250000000000004,28.260000000000012,28.28000000000001,28.27000000000001,28.380000000000006,28.410000000000007],"color":"green"},{"name":"anthropic","data":[54.14999999999999,54.36000000000001,54.61999999999999,54.76,54.919999999999995,55.010000000000005,55.09999999999999,55.149999999999984,55.220000000000006,55.13,55.17999999999999,55.12,55.160000000000004,55.15,55.199999999999996,55.349999999999994,55.339999999999996,55.36,55.38,55.41,55.35,55.279999999999994,55.23,55.15,55.03,54.900000000000006,54.800000000000004,54.75999999999999,54.730000000000004,54.680000000000014,54.53,54.42999999999999,54.35000000000001,54.32,54.33000000000001,54.34000000000002,54.25,54.18000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
