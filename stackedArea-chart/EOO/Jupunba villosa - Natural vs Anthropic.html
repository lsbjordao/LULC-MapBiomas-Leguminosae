<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.25,35.82,35.51,35.29,35.059999999999995,34.95,34.81,34.63,34.54,34.510000000000005,34.400000000000006,34.36000000000001,34.269999999999996,34.18,33.98,33.75,33.690000000000005,33.650000000000006,33.63,33.65,33.75,33.809999999999995,33.9,33.99,34.07,34.21,34.300000000000004,34.339999999999996,34.28999999999999,34.21999999999999,34.35,34.459999999999994,34.6,34.68,34.68999999999999,34.71,34.8,34.989999999999995],"color":"green"},{"name":"anthropic","data":[63.03999999999999,63.480000000000004,63.77,64.01,64.26,64.36,64.49,64.66,64.76,64.80000000000001,64.89000000000001,64.94000000000001,65.03999999999999,65.11,65.31,65.53999999999999,65.60000000000001,65.65,65.67000000000002,65.66999999999999,65.57,65.49999999999999,65.4,65.3,65.22000000000001,65.10000000000001,65.02,64.98,65.03,65.08000000000001,64.97000000000001,64.85000000000001,64.71000000000001,64.64,64.62,64.59,64.49,64.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
