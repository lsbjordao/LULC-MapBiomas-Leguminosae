<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.86,98.71,98.47999999999999,98.28999999999999,97.97999999999999,97.81,97.64999999999999,97.42999999999999,97.25000000000001,96.81999999999998,96.45,96.02000000000001,95.60000000000001,95.03,94.57,94.11000000000001,93.73000000000002,93.25,92.14,91.4,90.88000000000002,90.26999999999998,89.96,89.66000000000001,89.31,88.92,88.64000000000001,88.44,88.19,87.88000000000001,87.37000000000002,86.89,86.52000000000002,86.12,85.24,84.4,83.21,81.93],"color":"green"},{"name":"anthropic","data":[2.1199999999999997,2.25,2.4899999999999998,2.6799999999999997,2.9899999999999998,3.17,3.32,3.5399999999999996,3.7199999999999998,4.1499999999999995,4.529999999999999,4.96,5.37,5.9399999999999995,6.3999999999999995,6.87,7.24,7.7299999999999995,8.82,9.57,10.1,10.7,11.01,11.31,11.67,12.04,12.32,12.53,12.78,13.08,13.61,14.08,14.45,14.86,15.73,16.57,17.759999999999998,19.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
