<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.120000000000005,37.750000000000014,37.169999999999995,36.6,36.02,35.68999999999999,35.290000000000006,34.88,34.50000000000001,34.21,33.89,33.71,33.57999999999999,33.46,33.35,33.13,33,32.830000000000005,32.66,32.52,32.48,32.5,32.5,32.510000000000005,32.489999999999995,32.48,32.47,32.39,32.279999999999994,32.18,32.15,32.11,32.09,32.16,32.1,32.08,32.10999999999999,32.2],"color":"green"},{"name":"anthropic","data":[56.32999999999999,56.7,57.31,57.87,58.45000000000001,58.760000000000005,59.15,59.61,59.95999999999999,60.239999999999995,60.55999999999999,60.74000000000001,60.87,60.98,61.129999999999995,61.31999999999999,61.460000000000015,61.60999999999999,61.800000000000004,61.949999999999996,61.96999999999999,61.98,61.959999999999994,61.969999999999985,61.97,61.980000000000004,61.99999999999999,62.07999999999999,62.169999999999995,62.25999999999999,62.29,62.339999999999996,62.33999999999999,62.300000000000004,62.349999999999994,62.38000000000001,62.37,62.24999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
