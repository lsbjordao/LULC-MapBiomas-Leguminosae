<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.67,82.63000000000001,82.02,81.38999999999999,80.82999999999998,80.36,79.88,79.20000000000002,78.58000000000001,78.18,77.72999999999999,77.28,76.99,76.44,75.94,75.49999999999999,74.85999999999997,74.35,73.59999999999998,72.76,72.08,71.55999999999999,71.03999999999999,70.66999999999997,70.42,70.19,69.97,69.46000000000001,68.92999999999999,68.50999999999999,68.07999999999998,67.77999999999999,67.49,67.21,66.88000000000001,66.56,66.05000000000001,65.41],"color":"green"},{"name":"anthropic","data":[16.340000000000007,16.390000000000004,17.010000000000005,17.620000000000005,18.19000000000001,18.660000000000007,19.140000000000008,19.830000000000005,20.450000000000003,20.830000000000005,21.290000000000006,21.720000000000006,22.01000000000001,22.54000000000001,23.060000000000006,23.500000000000004,24.170000000000005,24.69,25.420000000000005,26.250000000000007,26.94000000000001,27.45000000000001,27.940000000000005,28.330000000000005,28.59,28.820000000000004,29.030000000000005,29.560000000000002,30.070000000000004,30.490000000000002,30.930000000000003,31.22000000000001,31.51,31.790000000000003,32.13000000000001,32.47,32.970000000000006,33.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
