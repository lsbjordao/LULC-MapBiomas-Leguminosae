<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.69,31.280000000000005,30.900000000000002,30.500000000000004,30.200000000000003,30.059999999999995,29.82,29.560000000000002,29.39,29.24,29.03,28.869999999999994,28.719999999999995,28.6,28.429999999999996,28.22,28.16,28.04,27.979999999999997,27.959999999999997,27.970000000000006,27.979999999999997,28,28.05,28.08,28.120000000000008,28.150000000000002,28.13,28.069999999999997,27.969999999999995,27.989999999999995,27.999999999999996,28.07,28.17,28.189999999999998,28.219999999999995,28.27,28.43],"color":"green"},{"name":"anthropic","data":[66.83000000000001,67.24000000000002,67.64000000000003,68.03,68.31000000000002,68.47,68.71000000000001,68.98,69.16,69.28,69.5,69.66,69.80000000000001,69.92,70.09000000000003,70.29,70.34000000000002,70.49000000000001,70.55,70.56,70.56000000000002,70.53,70.52000000000002,70.50000000000001,70.43000000000002,70.4,70.37,70.39000000000001,70.44000000000003,70.53999999999998,70.51999999999998,70.50000000000001,70.46000000000002,70.38000000000002,70.32000000000001,70.30999999999999,70.26,70.07],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
