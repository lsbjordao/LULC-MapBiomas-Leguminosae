<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.56,51.410000000000004,50.92,50.45,49.93,49.74,49.42,49.04,48.699999999999996,48.61,48.38999999999999,48.32999999999999,48.56,48.46,48.38999999999999,48.29,48.11,47.95000000000001,47.77,47.72000000000001,47.660000000000004,47.61000000000001,47.58,47.6,47.59000000000001,47.61000000000001,47.550000000000004,47.339999999999996,47.01,46.690000000000005,46.49999999999999,46.5,46.48000000000001,46.61000000000001,46.65,46.67,46.72,46.790000000000006],"color":"green"},{"name":"anthropic","data":[46.220000000000006,46.38,46.83,47.31,47.830000000000005,48.04,48.36,48.76,49.07000000000001,49.17,49.38,49.45000000000001,49.199999999999996,49.3,49.379999999999995,49.49000000000001,49.67,49.82000000000001,50.00000000000001,50.02,50.109999999999985,50.15,50.190000000000005,50.20000000000002,50.17000000000001,50.14000000000002,50.220000000000006,50.42,50.77,51.03,51.279999999999994,51.26999999999999,51.28000000000001,51.17000000000001,51.11000000000001,51.06,51.03000000000001,50.95000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
