<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.739999999999995,54.01,53.219999999999985,52.519999999999996,51.73,51.14,50.48,49.67,48.92,48.17,47.37999999999999,46.69,46.12999999999999,45.559999999999995,44.98,44.42999999999999,44.040000000000006,43.53,43.079999999999984,42.56999999999999,42.269999999999996,42.050000000000004,41.879999999999995,41.690000000000005,41.60000000000001,41.43999999999999,41.29999999999999,40.989999999999995,40.72999999999999,40.44999999999999,40.24999999999999,40.02,39.93,39.93999999999999,39.86000000000001,39.77,39.61,39.71],"color":"green"},{"name":"anthropic","data":[47.06,47.809999999999995,48.589999999999996,49.27,50.070000000000014,50.660000000000004,51.29999999999999,52.14000000000001,52.870000000000005,53.61000000000001,54.400000000000006,55.089999999999996,55.69000000000001,56.22,56.81999999999999,57.35999999999999,57.76,58.25,58.7,59.199999999999996,59.519999999999996,59.730000000000004,59.9,60.09999999999999,60.179999999999986,60.36999999999999,60.51,60.77000000000001,61.03,61.33000000000001,61.54,61.74999999999999,61.85,61.82,61.92999999999999,61.98,62.15,62.08999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
