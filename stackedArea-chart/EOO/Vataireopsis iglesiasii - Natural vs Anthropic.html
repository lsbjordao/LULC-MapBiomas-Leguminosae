<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.01,98.88000000000001,98.81,98.82000000000001,98.82,98.87,98.89,98.89000000000001,98.95,98.95,98.88000000000001,98.83999999999997,98.77999999999999,98.74000000000001,98.7,98.68,98.70000000000002,98.75999999999999,98.75999999999999,98.75,98.67999999999999,98.64999999999999,98.65,98.67999999999999,98.66,98.68999999999998,98.69,98.7,98.73,98.73,98.69,98.72000000000001,98.67999999999999,98.62,98.64,98.69000000000001,98.58000000000001,98.42999999999999],"color":"green"},{"name":"anthropic","data":[0.43999999999999995,0.5700000000000001,0.64,0.63,0.64,0.5700000000000001,0.56,0.54,0.49,0.49,0.5700000000000001,0.61,0.68,0.6900000000000001,0.7400000000000001,0.77,0.74,0.6799999999999999,0.69,0.69,0.7599999999999999,0.7999999999999999,0.7899999999999999,0.7799999999999999,0.7799999999999999,0.77,0.76,0.75,0.73,0.7,0.75,0.73,0.79,0.8200000000000001,0.8,0.76,0.8600000000000001,1.02],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
