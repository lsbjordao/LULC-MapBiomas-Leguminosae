<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.29999999999999,43.46999999999999,43.17,42.72999999999999,42.47999999999999,42.43,42.28,42.25999999999999,42.279999999999994,42.32999999999999,42.33999999999999,42.39999999999999,42.39999999999999,42.44,42.58999999999999,42.57,42.60999999999999,42.63999999999998,42.62999999999999,42.58999999999999,42.61999999999999,42.69999999999999,42.679999999999986,42.749999999999986,42.80999999999998,42.89999999999999,42.989999999999995,43.11000000000001,43.25999999999999,43.39,43.64,43.74999999999999,43.839999999999996,43.83,43.83,43.81999999999999,43.93999999999999,43.929999999999986],"color":"green"},{"name":"anthropic","data":[47.15,46.97,47.3,47.699999999999996,47.989999999999995,48.029999999999994,48.17999999999999,48.21,48.190000000000005,48.14,48.09,48.07,48.06999999999999,47.989999999999995,47.85000000000001,47.85999999999999,47.84000000000001,47.809999999999995,47.78999999999999,47.88,47.830000000000005,47.76,47.76,47.690000000000005,47.61999999999999,47.56,47.459999999999994,47.349999999999994,47.17999999999999,47.059999999999995,46.800000000000004,46.68,46.6,46.63000000000001,46.599999999999994,46.61000000000001,46.49,46.519999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
