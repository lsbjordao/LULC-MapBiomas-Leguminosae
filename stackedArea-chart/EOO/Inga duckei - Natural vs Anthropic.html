<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.84000000000002,90.53000000000003,90.08,89.65000000000002,89.21000000000001,88.87,88.52000000000002,88.03000000000002,87.54000000000002,86.95,86.28,85.68000000000004,85.11999999999999,84.6,84.05,83.61000000000003,83.18,82.61000000000001,81.86,81.17999999999999,80.67999999999999,80.34,80.12,79.91,79.77,79.67999999999999,79.55,79.43,79.27,79.07000000000001,78.85999999999999,78.66000000000001,78.47000000000001,78.31000000000002,78.04,77.77,77.36000000000001,76.85],"color":"green"},{"name":"anthropic","data":[13.7,13.99,14.449999999999998,14.879999999999999,15.309999999999997,15.639999999999999,16,16.5,16.96,17.560000000000002,18.240000000000006,18.85,19.38,19.950000000000003,20.47,20.910000000000004,21.339999999999996,21.88,22.639999999999993,23.310000000000002,23.830000000000005,24.190000000000005,24.390000000000004,24.610000000000003,24.75,24.820000000000004,24.960000000000004,25.09,25.25,25.44,25.66,25.88,26.03,26.2,26.47,26.740000000000002,27.16,27.69],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
