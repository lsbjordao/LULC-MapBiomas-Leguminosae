<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.18,70.01999999999998,69.52,68.93,68.21000000000001,67.70000000000002,67.29,66.9,66.46000000000001,66.49,66.61,66.67,67.10000000000001,66.9,66.69,66.64999999999999,66.27,66.10000000000001,65.86,65.57,65.17999999999999,65.11,64.87999999999998,64.93999999999998,65.05999999999999,64.94,64.77999999999999,64.16,63.599999999999994,63.20999999999999,62.90999999999999,62.99999999999999,62.94,62.859999999999985,62.78,62.66999999999999,62.44999999999999,62.23999999999999],"color":"green"},{"name":"anthropic","data":[18.92,19.07,19.589999999999996,20.16,20.860000000000003,21.4,21.8,22.22,22.63,22.599999999999998,22.499999999999996,22.43,22.020000000000003,22.19,22.419999999999998,22.48,22.86,23.01,23.25,23.54,23.93,24.01,24.230000000000004,24.2,24.080000000000002,24.180000000000003,24.35,24.97,25.53,25.910000000000004,26.210000000000004,26.12,26.200000000000003,26.240000000000002,26.350000000000005,26.470000000000006,26.670000000000005,26.860000000000007],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
