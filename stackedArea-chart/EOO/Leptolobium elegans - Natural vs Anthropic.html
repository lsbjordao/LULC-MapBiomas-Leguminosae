<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.27000000000001,50.57000000000001,49.72000000000001,48.93000000000001,48.17000000000001,47.52,46.91,46.160000000000004,45.540000000000006,44.900000000000006,44.16,43.580000000000005,43.050000000000004,42.519999999999996,42.040000000000006,41.56,41.23000000000001,40.849999999999994,40.269999999999996,39.80999999999999,39.49,39.28000000000001,39.22,39.12,39.080000000000005,38.97,38.83,38.63999999999999,38.43,38.19,38,37.96,37.87,37.84,37.71999999999999,37.64999999999999,37.44999999999999,37.55],"color":"green"},{"name":"anthropic","data":[47.18999999999998,47.89,48.74,49.56,50.28999999999999,50.919999999999995,51.49,52.28,52.920000000000016,53.52,54.3,54.89000000000001,55.419999999999995,55.93999999999999,56.41,56.90000000000001,57.230000000000004,57.62,58.21,58.660000000000004,58.99000000000001,59.18999999999999,59.25000000000001,59.34,59.41,59.51000000000001,59.63,59.849999999999994,60.06999999999999,60.29999999999999,60.45999999999999,60.51,60.58999999999998,60.63999999999999,60.69999999999998,60.82999999999999,61.019999999999996,60.91999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
