<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.5,52.46000000000001,51.699999999999996,50.92,50.249999999999986,50.09999999999999,49.83,49.46999999999999,49.14000000000001,48.910000000000004,48.68000000000001,48.55,48.88999999999999,48.9,49,49.03,48.83,48.67,48.58000000000001,48.57,48.50000000000001,48.53000000000001,48.48000000000001,48.37000000000002,48.28,48.27000000000001,48.21000000000001,48.07,47.76,47.45,47.22000000000001,47.18000000000001,47.13999999999999,47.180000000000014,47.13000000000001,47.09000000000001,47.140000000000015,47.360000000000014],"color":"green"},{"name":"anthropic","data":[46.809999999999995,46.85999999999999,47.62,48.40999999999999,49.07999999999999,49.21999999999999,49.48999999999999,49.84999999999999,50.16999999999999,50.41999999999999,50.65999999999999,50.779999999999994,50.45,50.43,50.339999999999996,50.3,50.49999999999999,50.63999999999999,50.74999999999999,50.77,50.83,50.830000000000005,50.870000000000005,50.96000000000001,51.05000000000001,51.07000000000001,51.12,51.27,51.58000000000001,51.870000000000005,52.1,52.14999999999999,52.18999999999999,52.14000000000001,52.2,52.23,52.169999999999995,51.959999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
