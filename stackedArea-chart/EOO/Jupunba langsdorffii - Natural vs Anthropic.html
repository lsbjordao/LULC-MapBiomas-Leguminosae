<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.97,32.74,32.37,32.03,31.8,31.780000000000005,31.66,31.460000000000004,31.370000000000008,31.290000000000006,31.140000000000004,31.140000000000004,31.09,31.040000000000006,30.96,30.76000000000001,30.650000000000006,30.590000000000003,30.530000000000005,30.53000000000001,30.610000000000007,30.680000000000007,30.720000000000006,30.76000000000001,30.74000000000001,30.75000000000001,30.750000000000007,30.690000000000012,30.640000000000004,30.560000000000002,30.550000000000004,30.490000000000002,30.540000000000003,30.560000000000002,30.550000000000008,30.550000000000004,30.600000000000005,30.660000000000007],"color":"green"},{"name":"anthropic","data":[52.98000000000001,53.19000000000001,53.589999999999996,53.92000000000002,54.13999999999999,54.17000000000001,54.27,54.49,54.58,54.660000000000004,54.8,54.790000000000006,54.85,54.9,54.98000000000001,55.160000000000004,55.28,55.35,55.40999999999999,55.43,55.32999999999999,55.269999999999996,55.2,55.199999999999996,55.209999999999994,55.199999999999996,55.2,55.26000000000001,55.32,55.39,55.410000000000004,55.44,55.410000000000004,55.37,55.400000000000006,55.38,55.34,55.31],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
