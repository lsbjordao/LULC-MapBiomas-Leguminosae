<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.6,70.44999999999999,69.91000000000001,69.13999999999999,68.25999999999999,67.41000000000001,66.39000000000001,65.8,65.28999999999999,65.36999999999999,65.45,65.67999999999999,66.26,65.82000000000001,65.54,65.1,64.53,64.17999999999999,63.33999999999999,63.04,62.74,62.650000000000006,62.51999999999999,62.67,62.779999999999994,63.01,62.94,62.589999999999996,62.23999999999998,61.949999999999996,61.35999999999999,61.91999999999999,61.789999999999985,61.91,62.04999999999999,62.099999999999994,62.01999999999999,62.12],"color":"green"},{"name":"anthropic","data":[29.169999999999998,29.340000000000003,29.900000000000002,30.65,31.530000000000005,32.370000000000005,33.370000000000005,34,34.50999999999999,34.419999999999995,34.33,34.10999999999999,33.55,33.97,34.25,34.69,35.269999999999996,35.57999999999999,36.46000000000001,36.760000000000005,37.050000000000004,37.13,37.28,37.10999999999999,37.010000000000005,36.77,36.85,37.190000000000005,37.57,37.849999999999994,38.45,37.86,37.99,37.900000000000006,37.73,37.71,37.779999999999994,37.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
