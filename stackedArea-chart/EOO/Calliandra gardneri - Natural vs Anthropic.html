<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.38000000000001,84.62,85.02000000000001,85.03999999999999,85.14,85.14,84.93,84.77000000000001,84.59,84.47999999999999,84.15,83.92999999999999,83.72,83.43999999999998,83.16999999999999,82.89,82.67999999999999,82.62999999999998,82.50999999999999,82.36,82.28,82.09,82.05,81.97000000000001,81.86999999999999,81.71999999999998,81.41999999999999,80.91000000000001,80.31,79.92,79.66,79.89999999999999,80.18999999999998,80.33,80.19,79.85,79.24000000000001,78.67999999999998],"color":"green"},{"name":"anthropic","data":[14.700000000000001,14.45,14.03,14.03,13.92,13.93,14.120000000000001,14.29,14.48,14.59,14.91,15.14,15.35,15.629999999999999,15.91,16.169999999999998,16.39,16.450000000000003,16.560000000000002,16.71,16.79,16.97,17.02,17.11,17.2,17.36,17.65,18.16,18.759999999999998,19.15,19.4,19.159999999999997,18.880000000000003,18.740000000000002,18.87,19.22,19.83,20.39],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
