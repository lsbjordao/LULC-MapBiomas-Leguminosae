<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.14999999999999,47.620000000000005,47.31,47.08,46.57000000000001,46.3,45.940000000000005,45.809999999999995,45.649999999999984,45.63,45.56,45.62,45.6,45.67,45.21,44.96000000000001,44.82,44.57,44.51,44.30999999999999,44.29,44.31,44.41,44.589999999999996,44.800000000000004,45.07999999999999,45.26,45.339999999999996,45.39999999999999,45.50999999999999,45.66,45.720000000000006,45.88,45.88999999999999,45.87,45.76,45.699999999999996,45.43],"color":"green"},{"name":"anthropic","data":[51.419999999999995,51.919999999999995,52.23,52.470000000000006,52.99,53.25999999999999,53.60999999999999,53.75,53.900000000000006,53.919999999999995,54.010000000000005,53.94,53.94999999999999,53.879999999999995,54.32999999999999,54.580000000000005,54.73000000000001,54.989999999999995,55.029999999999994,55.25,55.269999999999996,55.25,55.160000000000004,54.96000000000001,54.74,54.480000000000004,54.28000000000001,54.21,54.13999999999999,54.04999999999999,53.9,53.82999999999999,53.68,53.660000000000004,53.680000000000014,53.8,53.86,54.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
