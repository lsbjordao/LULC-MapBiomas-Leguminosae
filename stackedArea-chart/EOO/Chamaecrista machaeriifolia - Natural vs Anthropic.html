<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.69,66.32000000000001,65.64,65.06,64.24,63.63000000000001,62.93,62.050000000000004,61.11,60.11999999999999,59.040000000000006,58.09,57.27,56.38999999999999,55.47,54.690000000000005,54.10999999999999,53.26999999999999,52.150000000000006,51.17,50.510000000000005,50.13,49.900000000000006,49.61000000000001,49.46000000000001,49.28000000000001,49.05,48.720000000000006,48.339999999999996,47.949999999999996,47.6,47.329999999999984,47.169999999999995,47.08999999999999,46.93,46.82000000000001,46.62,46.50000000000001],"color":"green"},{"name":"anthropic","data":[31.490000000000002,31.880000000000003,32.550000000000004,33.13,33.96,34.559999999999995,35.269999999999996,36.14,37.08,38.069999999999986,39.18,40.129999999999995,40.949999999999996,41.809999999999995,42.749999999999986,43.489999999999995,44.080000000000005,44.900000000000006,46.01999999999999,47,47.68000000000001,48.040000000000006,48.27,48.559999999999995,48.71000000000001,48.92000000000001,49.13,49.470000000000006,49.839999999999996,50.220000000000006,50.57,50.86,51.010000000000005,51.080000000000005,51.25000000000001,51.36,51.559999999999995,51.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
