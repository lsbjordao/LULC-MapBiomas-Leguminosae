<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.82000000000001,44.95,43.9,43.57,43.35,43.17,42.989999999999995,42.709999999999994,42.669999999999995,42.279999999999994,42.39,42.5,42.47,42.53,42.79,42.559999999999995,42.42000000000001,42.55999999999999,42.679999999999986,42.74999999999999,43.4,43.91,44.230000000000004,44.31000000000001,43.8,43.82,43.720000000000006,43.680000000000014,43.69,43.57000000000001,43.5,43.62,43.85000000000001,44.03,44.000000000000014,43.98000000000001,43.95000000000002,44.26],"color":"green"},{"name":"anthropic","data":[54.42999999999999,54.28,55.33999999999999,55.65,55.88,56.05,56.21999999999999,56.519999999999996,56.56,56.94,56.839999999999996,56.720000000000006,56.769999999999996,56.68,56.42999999999999,56.65999999999999,56.809999999999995,56.67,56.54,56.49,55.830000000000005,55.300000000000004,55,54.91999999999999,55.419999999999995,55.41999999999999,55.51999999999999,55.55999999999999,55.53999999999999,55.67999999999999,55.74,55.62,55.379999999999995,55.199999999999996,55.26000000000001,55.269999999999996,55.27000000000001,54.96],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
