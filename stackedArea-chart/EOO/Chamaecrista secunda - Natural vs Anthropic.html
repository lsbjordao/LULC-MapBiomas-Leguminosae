<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.63999999999999,36.42,36.18000000000001,36.25,36.089999999999996,36.029999999999994,36.01,35.730000000000004,35.589999999999996,35.59,35.51,35.550000000000004,35.32,35.21,34.99,34.61,34.53,34.550000000000004,34.440000000000005,34.4,34.53,34.44,34.379999999999995,34.43,34.54,34.6,34.63000000000001,34.64,34.510000000000005,34.46,34.77,34.97,35.019999999999996,35.120000000000005,35.14,35.07,35.089999999999996,35.330000000000005],"color":"green"},{"name":"anthropic","data":[59.51,60.76,60.989999999999995,60.91,61.06999999999999,61.14000000000001,61.16000000000001,61.429999999999986,61.56,61.55,61.64999999999999,61.61,61.85999999999999,61.949999999999996,62.18,62.55999999999999,62.63999999999999,62.62000000000001,62.730000000000004,62.76,62.64,62.739999999999995,62.8,62.73,62.61,62.59,62.55,62.51999999999999,62.63999999999999,62.71,62.4,62.17999999999999,62.120000000000005,62.029999999999994,62.029999999999994,62.10999999999999,62.07999999999999,61.85000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
