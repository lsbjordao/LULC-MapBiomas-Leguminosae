<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.93000000000004,97.94,97.80000000000004,97.71000000000001,97.71000000000001,97.60000000000001,97.55000000000001,97.39999999999999,97.25000000000001,97.09,96.74000000000001,96.49,96.05000000000001,95.81000000000003,95.82000000000001,95.77000000000001,95.46000000000001,95.34000000000002,95.21000000000001,94.93000000000002,94.64,94.39000000000001,94.26,94.10000000000001,93.92000000000002,93.89,93.90000000000002,93.90000000000002,93.79,93.64000000000001,93.45000000000002,93.15,92.98,92.81,92.58000000000001,92.32000000000002,92.05,91.60000000000001],"color":"green"},{"name":"anthropic","data":[1.57,1.56,1.72,1.79,1.79,1.9000000000000001,1.9500000000000002,2.0899999999999994,2.26,2.4,2.7499999999999996,3,3.4499999999999997,3.6799999999999997,3.6899999999999995,3.7299999999999995,4.029999999999999,4.159999999999999,4.289999999999999,4.57,4.859999999999999,5.09,5.2299999999999995,5.39,5.579999999999999,5.609999999999999,5.61,5.59,5.71,5.859999999999999,6.05,6.36,6.510000000000001,6.69,6.92,7.17,7.45,7.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
