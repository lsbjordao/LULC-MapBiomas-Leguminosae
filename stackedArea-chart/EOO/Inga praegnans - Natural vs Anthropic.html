<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.55000000000001,69.25,68.73,68.52,68.47999999999999,68.6,68.67,68.96,69.11,69.03999999999999,68.95999999999998,68.78,68.92,68.88,68.97999999999999,68.88000000000001,69.07,69.22,69.47,69.7,69.81,69.94,70.13,70.13,70.21000000000001,70.39,70.37,70.41999999999999,70.44999999999999,70.49,70.57000000000001,70.66999999999999,70.71,70.91,70.97999999999999,71.13,71.23,71.15999999999998],"color":"green"},{"name":"anthropic","data":[13.36,13.62,14.17,14.38,14.42,14.29,14.22,13.92,13.78,13.85,13.929999999999998,14.12,13.969999999999999,14,13.92,14.01,13.819999999999999,13.659999999999998,13.42,13.200000000000001,13.07,12.95,12.76,12.74,12.69,12.500000000000002,12.52,12.459999999999999,12.45,12.409999999999998,12.31,12.21,12.19,12.01,11.909999999999998,11.769999999999998,11.659999999999998,11.729999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
