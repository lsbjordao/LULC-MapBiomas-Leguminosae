<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[14.07,14.1,13.9,13.749999999999998,13.639999999999999,13.639999999999999,13.56,13.45,13.399999999999999,13.299999999999999,13.23,13.2,13.169999999999998,13.12,13.079999999999998,12.979999999999999,12.959999999999997,12.889999999999999,12.879999999999997,12.829999999999998,12.879999999999999,12.899999999999999,12.889999999999999,12.899999999999999,12.82,12.77,12.739999999999998,12.67,12.62,12.54,12.45,12.36,12.389999999999999,12.43,12.42,12.419999999999998,12.45,12.479999999999999],"color":"green"},{"name":"anthropic","data":[11.959999999999997,11.939999999999998,12.119999999999997,12.29,12.399999999999999,12.409999999999997,12.479999999999997,12.569999999999997,12.639999999999999,12.719999999999997,12.789999999999997,12.83,12.86,12.91,12.959999999999999,13.04,13.079999999999998,13.129999999999999,13.15,13.179999999999998,13.129999999999997,13.129999999999997,13.099999999999998,13.129999999999997,13.2,13.239999999999997,13.289999999999997,13.339999999999998,13.409999999999997,13.479999999999999,13.569999999999999,13.649999999999997,13.649999999999997,13.619999999999996,13.609999999999998,13.589999999999996,13.569999999999997,13.52],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
