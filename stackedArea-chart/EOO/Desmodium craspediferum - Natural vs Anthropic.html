<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.98,78.78999999999998,78.17999999999999,77.98,77.8,77.36000000000001,76.45,76.06,75.6,75.59,75.50000000000001,75.63999999999999,75.44999999999999,75.43,75.16,74.67,74.47000000000001,74.24,73.86,73.49,72.97999999999999,72.37999999999998,72.26999999999998,72.03999999999999,70.97,69.99000000000001,69.75999999999999,69.41000000000001,68.91,68.46000000000001,67.83999999999999,67.38,67.01,66.74,65.57999999999998,65.22999999999999,64.95,64.65],"color":"green"},{"name":"anthropic","data":[20.41,20.58,21.21,21.42,21.61,22.029999999999998,22.919999999999998,23.32,23.790000000000003,23.8,23.88,23.759999999999998,23.950000000000003,23.959999999999997,24.249999999999996,24.720000000000002,24.91,25.15,25.52,25.9,26.39,27,27.130000000000003,27.35,28.410000000000004,29.39,29.619999999999997,29.97,30.479999999999997,30.939999999999998,31.540000000000003,31.99,32.370000000000005,32.66,33.800000000000004,34.15,34.44,34.739999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
