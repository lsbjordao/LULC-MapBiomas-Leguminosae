<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.36999999999999,66.38000000000001,66.01,66.30999999999999,64.50999999999999,63.96999999999999,63.32999999999999,62.72999999999999,60.78,59.629999999999995,59.029999999999994,58.339999999999996,58.529999999999994,59.35,59.59,60.59,60.68,59.44,58.48,58.32,56.71,56.23999999999999,56.13,56.61,57.34,57.07,56.77,57.25000000000001,56.410000000000004,55.36,54.45000000000001,53.1,52.14,52.160000000000004,51.89,51.709999999999994,51.529999999999994,51.45],"color":"green"},{"name":"anthropic","data":[33.01,33.00000000000001,33.37000000000001,33.06000000000001,34.870000000000005,35.4,36.06,36.64,38.599999999999994,39.75,40.35,41.040000000000006,40.84,40.04,39.79000000000001,38.78,38.7,39.95,40.91,41.07,42.67999999999999,43.129999999999995,43.25000000000001,42.77,42.03,42.32,42.589999999999996,42.129999999999995,42.970000000000006,44.00999999999999,44.940000000000005,46.269999999999996,47.25,47.21,47.49,47.65999999999999,47.83999999999999,47.92],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
