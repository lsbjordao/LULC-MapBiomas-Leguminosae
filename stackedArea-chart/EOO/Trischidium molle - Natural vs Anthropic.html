<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.90999999999998,71.62999999999998,70.98,70.35,69.58999999999997,68.98,68.46,67.83999999999999,67.19999999999999,66.82,66.52,66.24999999999999,66.22999999999999,65.89999999999999,65.56,65.25999999999999,64.86,64.55,64.08000000000001,63.55,63.12,62.90999999999999,62.69999999999999,62.559999999999995,62.49,62.28999999999999,61.98,61.35,60.72,60.230000000000004,59.830000000000005,59.72,59.56,59.42,59.220000000000006,59.03,58.79999999999999,58.66999999999999],"color":"green"},{"name":"anthropic","data":[25.749999999999996,26.04,26.669999999999998,27.31000000000001,28.080000000000005,28.680000000000007,29.230000000000004,29.830000000000005,30.450000000000003,30.850000000000005,31.130000000000006,31.41,31.440000000000005,31.770000000000003,32.1,32.37,32.78,33.099999999999994,33.55,34.09999999999999,34.52000000000001,34.73000000000001,34.95,35.06,35.15,35.349999999999994,35.66,36.32,36.92,37.41,37.81999999999999,37.94,38.09000000000001,38.21,38.410000000000004,38.61,38.839999999999996,38.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
