<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.28,30.1,29.679999999999996,29.479999999999993,29.269999999999992,29.14,29.03,29.119999999999997,29.180000000000003,29.26,29.29,29.370000000000005,29.48,29.490000000000002,29.48,29.37,29.4,29.360000000000003,29.28,29.29,29.369999999999997,29.519999999999992,29.64,29.740000000000002,29.969999999999995,30.18,30.429999999999996,30.52,30.599999999999998,30.7,30.839999999999996,30.939999999999994,31.159999999999993,31.289999999999996,31.349999999999994,31.459999999999997,31.67,31.810000000000002],"color":"green"},{"name":"anthropic","data":[68.57000000000001,68.77000000000001,69.16000000000001,69.37,69.58000000000001,69.69,69.82000000000001,69.72000000000001,69.64000000000001,69.58000000000001,69.56000000000002,69.46000000000001,69.34,69.36000000000001,69.35,69.47000000000003,69.41000000000003,69.48000000000002,69.55000000000001,69.53000000000002,69.47000000000001,69.32000000000001,69.21000000000001,69.12000000000002,68.87,68.67,68.44000000000001,68.33,68.26,68.17,68.01,67.90999999999998,67.69000000000001,67.55999999999999,67.47999999999999,67.39,67.18,67.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
