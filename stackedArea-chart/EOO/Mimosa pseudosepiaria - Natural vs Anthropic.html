<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[82.04000000000002,81.98000000000002,80.73,79.02000000000001,78.13,78.51999999999998,78.26,77.87000000000002,77.54,77.41,76.84,75.05999999999999,76.84,76.67,76.53,76.57,76.04,76.02000000000001,76.19000000000001,76.88,75.74000000000001,75.17,74.84,74.39,75.01,75.47,75.38,74.04,71.75999999999999,70.65,69.51999999999998,69.72,69.58000000000001,69.55999999999999,69.77,70.27000000000001,69.94,70.66],"color":"green"},{"name":"anthropic","data":[18.200000000000003,18.270000000000003,19.53,21.240000000000002,22.13,21.73,22.01,22.400000000000002,22.7,22.830000000000002,23.419999999999998,25.189999999999998,23.43,23.569999999999997,23.729999999999997,23.699999999999996,24.220000000000002,24.25,24.07,23.380000000000003,24.5,25.090000000000003,25.410000000000004,25.87,25.26,24.789999999999996,24.880000000000003,26.2,28.49,29.61,30.75,30.55,30.69,30.7,30.5,29.970000000000002,30.3,29.599999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
