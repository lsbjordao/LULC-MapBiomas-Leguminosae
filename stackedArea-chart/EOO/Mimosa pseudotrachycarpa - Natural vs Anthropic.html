<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[12.51,12.499999999999998,12.43,12.349999999999998,12.269999999999998,12.239999999999997,12.179999999999996,12.139999999999999,12.11,12.1,12.069999999999999,12.05,11.979999999999999,11.989999999999998,11.969999999999999,11.919999999999998,11.87,11.849999999999998,11.799999999999999,11.729999999999999,11.69,11.7,11.669999999999998,11.649999999999999,11.629999999999999,11.619999999999997,11.609999999999998,11.619999999999997,11.619999999999997,11.619999999999997,11.619999999999997,11.579999999999997,11.569999999999997,11.509999999999998,11.449999999999998,11.409999999999998,11.419999999999996,11.399999999999997],"color":"green"},{"name":"anthropic","data":[10.65,10.65,10.72,10.809999999999999,10.88,10.92,10.969999999999999,11.01,11.04,11.059999999999999,11.069999999999999,11.12,11.17,11.179999999999998,11.209999999999999,11.239999999999998,11.309999999999999,11.319999999999999,11.359999999999998,11.44,11.48,11.48,11.5,11.52,11.530000000000001,11.549999999999999,11.549999999999999,11.56,11.559999999999999,11.569999999999999,11.559999999999999,11.589999999999998,11.610000000000001,11.65,11.709999999999999,11.76,11.75,11.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
