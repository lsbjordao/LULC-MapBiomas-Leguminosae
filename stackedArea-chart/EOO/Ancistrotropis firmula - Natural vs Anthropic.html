<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.42,78.15,77.44000000000001,76.72000000000001,76.01,75.5,74.96,74.19,73.46,72.72000000000001,71.80000000000003,71.03000000000002,70.41000000000003,69.70000000000002,69.03000000000003,68.47000000000001,67.83,67.11000000000001,66.21000000000001,65.31,64.59,64.08,63.730000000000004,63.36,63.16,62.94,62.699999999999996,62.349999999999994,61.889999999999986,61.51,61.09999999999999,60.84,60.589999999999996,60.36,60.040000000000006,59.69,59.190000000000005,58.63],"color":"green"},{"name":"anthropic","data":[20.89,21.16,21.87,22.600000000000005,23.300000000000004,23.810000000000002,24.37,25.14,25.87,26.600000000000005,27.51,28.28,28.91,29.610000000000003,30.3,30.830000000000002,31.51,32.2,33.11,34.010000000000005,34.73000000000001,35.260000000000005,35.61,35.959999999999994,36.16,36.38,36.629999999999995,36.989999999999995,37.410000000000004,37.82000000000001,38.23000000000001,38.50000000000001,38.75,38.94,39.300000000000004,39.629999999999995,40.13,40.68000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
