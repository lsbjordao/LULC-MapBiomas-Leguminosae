<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.38,37.480000000000004,36.77000000000001,36.32000000000001,35.78999999999999,35.35,35.21,34.67,34.32,33.99,33.51,33.18,32.8,32.57,32.440000000000005,32.2,32.05,31.78,31.519999999999996,31.37,31.180000000000003,31.07,31.05,31.099999999999998,31.240000000000002,31.26,31.219999999999995,31.15,30.970000000000002,30.87,30.980000000000004,31,30.940000000000005,30.950000000000003,30.970000000000002,30.92,30.9,31.110000000000003],"color":"green"},{"name":"anthropic","data":[62.40999999999999,63.300000000000004,64.00999999999999,64.48,64.99,65.42,65.58000000000001,66.10999999999999,66.47999999999999,66.78999999999999,67.25999999999999,67.63000000000001,67.97,68.22,68.34,68.58,68.72,69,69.26,69.39000000000001,69.61,69.71999999999998,69.74,69.68999999999998,69.55000000000001,69.52,69.56,69.64,69.81999999999998,69.89999999999999,69.78999999999998,69.77000000000001,69.84999999999998,69.83000000000001,69.8,69.85000000000002,69.85,69.66000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
