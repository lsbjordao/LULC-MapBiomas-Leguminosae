<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.980000000000004,31.830000000000002,31.380000000000003,31.180000000000003,30.89,30.750000000000004,30.540000000000003,30.44,30.380000000000006,30.360000000000007,30.350000000000005,30.380000000000006,30.370000000000005,30.390000000000004,30.360000000000003,30.290000000000003,30.390000000000004,30.430000000000003,30.459999999999997,30.550000000000004,30.699999999999996,30.889999999999997,31.040000000000003,31.16,31.260000000000005,31.440000000000005,31.630000000000003,31.800000000000004,31.89,31.989999999999995,32.13,32.25,32.45,32.6,32.720000000000006,32.790000000000006,33.010000000000005,33.23000000000001],"color":"green"},{"name":"anthropic","data":[64.72999999999999,64.87,65.32,65.53999999999999,65.80999999999999,65.96,66.16,66.28,66.32,66.33,66.35,66.32,66.33,66.33,66.34,66.40999999999998,66.28999999999999,66.25999999999999,66.24,66.13999999999999,66,65.81,65.64,65.53,65.42,65.25999999999999,65.07000000000001,64.91000000000001,64.81,64.7,64.57,64.44,64.22999999999999,64.1,63.99999999999999,63.92999999999999,63.67999999999999,63.489999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
