<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.6,68.69,68.97000000000001,68.21,67.45,67.02000000000001,66.55999999999999,66.03,65.53,65.03999999999999,64.39999999999999,64.1,63.8,63.36000000000001,62.84,62.04,61.440000000000005,61.190000000000005,60.85999999999999,60.21,60.03,59.760000000000005,59.50000000000001,59.220000000000006,59.34,59.239999999999995,59.15,59.08,58.86999999999999,58.5,57.96000000000001,57.60000000000001,57.32999999999999,56.99999999999999,56.730000000000004,56.6,56.53,56.330000000000005],"color":"green"},{"name":"anthropic","data":[30.490000000000002,30.380000000000003,30.11,30.85,31.63,32.059999999999995,32.510000000000005,33.04000000000001,33.529999999999994,34.02,34.67,34.96,35.279999999999994,35.7,36.24,37.050000000000004,37.620000000000005,37.870000000000005,38.220000000000006,38.84,39.03,39.309999999999995,39.559999999999995,39.84999999999999,39.730000000000004,39.82,39.910000000000004,39.99,40.209999999999994,40.559999999999995,41.10999999999999,41.44999999999999,41.730000000000004,42.05,42.34,42.470000000000006,42.54,42.74],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
