<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.81,98.85,98.78999999999999,98.75000000000001,98.76000000000002,98.71000000000001,98.7,98.62,98.59,98.50000000000001,98.31,98.25000000000001,98.17,98.03,98.02000000000001,97.97000000000001,97.85000000000001,97.78000000000002,97.74999999999999,97.68999999999998,97.61,97.57000000000001,97.57000000000001,97.53999999999999,97.49,97.53999999999999,97.56,97.55000000000003,97.50999999999999,97.42999999999999,97.34,97.21000000000001,97.17,97.16000000000001,97.14,97.11999999999999,97.09,96.86],"color":"green"},{"name":"anthropic","data":[0.78,0.77,0.8,0.8400000000000001,0.8400000000000001,0.8800000000000001,0.9000000000000001,0.9600000000000001,1.01,1.08,1.27,1.33,1.4100000000000001,1.54,1.5699999999999998,1.62,1.74,1.83,1.85,1.91,1.9800000000000002,2.0300000000000002,2.0300000000000002,2.0599999999999996,2.11,2.07,2.03,2.03,2.0799999999999996,2.17,2.25,2.4,2.43,2.44,2.4699999999999998,2.4899999999999998,2.52,2.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
