<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.70000000000001,58.56000000000001,57.99,57.48000000000001,56.910000000000004,56.559999999999995,56.20000000000001,55.69,55.21999999999999,55.12,55.019999999999996,55.050000000000004,55.4,55.300000000000004,55.21,55.12000000000001,54.9,54.79,54.50000000000001,54.25000000000001,53.96,53.830000000000005,53.650000000000006,53.67,53.71,53.67000000000001,53.57000000000001,53.22000000000001,52.87000000000001,52.470000000000006,52.190000000000005,52.19,52.19000000000001,52.300000000000004,52.34000000000001,52.460000000000015,52.490000000000016,52.640000000000015],"color":"green"},{"name":"anthropic","data":[39.37000000000001,39.55,40.1,40.620000000000005,41.18000000000001,41.53,41.870000000000005,42.400000000000006,42.86999999999999,42.959999999999994,43.04,43.02999999999999,42.67999999999999,42.78999999999999,42.87999999999999,42.97,43.17999999999999,43.29999999999999,43.59,43.83000000000001,44.12,44.24,44.42999999999999,44.4,44.39,44.379999999999995,44.480000000000004,44.879999999999995,45.24,45.59999999999999,45.88,45.89,45.87,45.739999999999995,45.720000000000006,45.64,45.61000000000001,45.44000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
