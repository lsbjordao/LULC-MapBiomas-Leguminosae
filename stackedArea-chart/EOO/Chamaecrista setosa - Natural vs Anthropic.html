<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.21000000000004,71.93000000000002,71.24,70.62,69.96000000000002,69.50000000000001,69.01,68.31000000000002,67.70000000000002,67.04000000000002,66.31000000000003,65.70000000000002,65.19,64.64,64.03,63.519999999999996,63,62.41,61.67999999999999,60.95,60.42,60.03,59.809999999999995,59.569999999999986,59.39999999999999,59.21999999999999,59.059999999999995,58.769999999999996,58.41,58.099999999999994,57.81999999999998,57.63999999999999,57.45,57.279999999999994,57.03,56.78,56.42,55.99],"color":"green"},{"name":"anthropic","data":[27.080000000000002,27.380000000000006,28.040000000000003,28.650000000000002,29.330000000000005,29.759999999999998,30.259999999999998,30.96,31.57,32.22,32.949999999999996,33.57,34.07,34.63000000000001,35.23,35.730000000000004,36.26,36.84,37.589999999999996,38.31999999999999,38.83999999999999,39.21999999999999,39.44,39.69000000000001,39.85000000000001,40.03000000000001,40.19,40.48,40.82999999999999,41.16000000000001,41.419999999999995,41.60999999999999,41.790000000000006,41.97,42.230000000000004,42.45,42.830000000000005,43.24999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
