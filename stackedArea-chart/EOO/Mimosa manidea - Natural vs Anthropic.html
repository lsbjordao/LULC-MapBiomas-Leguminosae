<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[87.68999999999998,87.42999999999999,87.32000000000001,86.64999999999999,86.06,85.87,85.53999999999999,85.35,85.16,85.09000000000002,84.88000000000001,84.79000000000002,84.60000000000001,84.31,84.26,83.96000000000001,83.82999999999998,83.54,83.35,83.15,82.83000000000001,82.47,82.25,82.05000000000001,81.81,81.45,81.16,80.97,80.92,80.79,80.79000000000002,80.68,80.55000000000001,80.32000000000001,79.89,79.72,79.55000000000001,79.35],"color":"green"},{"name":"anthropic","data":[11.8,12.06,12.18,12.839999999999998,13.45,13.629999999999997,13.96,14.17,14.330000000000002,14.42,14.62,14.7,14.9,15.18,15.239999999999998,15.540000000000001,15.66,15.94,16.13,16.349999999999998,16.680000000000003,17.03,17.26,17.439999999999998,17.68,18.049999999999997,18.35,18.52,18.580000000000002,18.7,18.709999999999997,18.82,18.94,19.169999999999998,19.59,19.779999999999998,19.939999999999998,20.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
