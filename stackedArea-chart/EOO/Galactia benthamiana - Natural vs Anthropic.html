<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[13.199999999999998,13.059999999999999,12.879999999999997,12.729999999999997,12.579999999999995,12.489999999999997,12.409999999999998,12.319999999999999,12.27,12.229999999999999,12.19,12.12,12.08,12.049999999999997,11.979999999999997,11.89,11.85,11.84,11.799999999999999,11.77,11.779999999999998,11.819999999999997,11.849999999999996,11.869999999999997,11.899999999999999,11.929999999999998,11.939999999999998,11.949999999999998,11.939999999999998,11.959999999999997,11.999999999999996,12.009999999999996,12.039999999999997,12.040000000000001,12.02,12,12.03,12.049999999999999],"color":"green"},{"name":"anthropic","data":[24.900000000000002,25.080000000000002,25.239999999999995,25.39,25.53,25.620000000000005,25.720000000000002,25.800000000000004,25.850000000000005,25.900000000000002,25.94,25.989999999999995,26.029999999999998,26.069999999999997,26.130000000000003,26.2,26.25,26.259999999999994,26.3,26.319999999999997,26.330000000000002,26.300000000000004,26.27,26.24,26.209999999999997,26.170000000000005,26.149999999999995,26.149999999999995,26.15,26.15,26.099999999999998,26.080000000000002,26.080000000000002,26.060000000000006,26.099999999999998,26.099999999999998,26.08,26.049999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
