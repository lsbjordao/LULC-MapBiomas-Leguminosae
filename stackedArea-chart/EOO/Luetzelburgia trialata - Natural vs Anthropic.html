<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.94999999999999,39.08,38.47,38.13999999999999,37.98,37.92,38.03,37.89999999999999,38.13999999999999,38.55999999999999,38.70999999999999,39.14,39.449999999999996,39.65999999999999,39.89,39.98000000000001,40.14000000000001,40.25000000000001,40.52,40.7,40.83,41.019999999999996,41.07,41.169999999999995,41.419999999999995,41.60999999999999,41.75,42.099999999999994,42.290000000000006,42.61,42.919999999999995,43.12,43.28999999999999,43.51000000000001,43.76000000000001,43.94000000000001,44.17,44.29],"color":"green"},{"name":"anthropic","data":[55.6,56.46,57.089999999999996,57.42,57.6,57.629999999999995,57.540000000000006,57.660000000000004,57.410000000000004,57.00000000000001,56.86000000000001,56.43,56.11,55.92,55.669999999999995,55.58,55.43999999999999,55.33,55.050000000000004,54.870000000000005,54.75,54.550000000000004,54.5,54.400000000000006,54.16,53.949999999999996,53.800000000000004,53.470000000000006,53.28,52.96,52.63,52.45,52.260000000000005,52.050000000000004,51.809999999999995,51.61,51.38,51.269999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
