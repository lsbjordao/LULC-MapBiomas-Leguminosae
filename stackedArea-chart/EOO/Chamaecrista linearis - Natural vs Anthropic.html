<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.290000000000006,63.04000000000002,62.47000000000001,61.83000000000001,61.110000000000014,60.60000000000001,60.070000000000014,59.430000000000014,58.90000000000001,58.48000000000001,58.050000000000004,57.66000000000002,57.51,57.19000000000002,56.86000000000002,56.50000000000002,56.11000000000002,55.73000000000001,55.320000000000014,54.83000000000001,54.430000000000014,54.16000000000001,53.94000000000002,53.750000000000014,53.58000000000001,53.390000000000015,53.16000000000002,52.680000000000014,52.12000000000001,51.690000000000005,51.31000000000002,51.150000000000006,50.940000000000005,50.82000000000001,50.61000000000001,50.36000000000001,50.11000000000001,49.99000000000001],"color":"green"},{"name":"anthropic","data":[35.87,36.12999999999999,36.719999999999985,37.34999999999999,38.089999999999996,38.58,39.099999999999994,39.73,40.26,40.660000000000004,41.11000000000001,41.51,41.650000000000006,41.970000000000006,42.3,42.64,43.04999999999999,43.42999999999999,43.82999999999999,44.329999999999984,44.69999999999999,44.99999999999999,45.20999999999999,45.41,45.559999999999995,45.76,45.99,46.46,47.029999999999994,47.46000000000001,47.83000000000001,48.01000000000001,48.19,48.330000000000005,48.530000000000015,48.78000000000002,49.05000000000001,49.16000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
