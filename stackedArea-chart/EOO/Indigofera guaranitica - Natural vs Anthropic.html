<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[18.85,18.62,18.209999999999997,17.849999999999998,17.549999999999997,17.339999999999996,17.110000000000003,16.86,16.64,16.46,16.26,16.130000000000003,16.01,15.879999999999999,15.769999999999998,15.639999999999997,15.569999999999999,15.49,15.369999999999997,15.27,15.28,15.289999999999997,15.269999999999998,15.269999999999998,15.259999999999998,15.239999999999997,15.209999999999997,15.18,15.119999999999997,15.039999999999997,15.009999999999998,14.959999999999999,14.949999999999996,14.969999999999997,14.959999999999997,14.959999999999999,14.930000000000001,15.019999999999996],"color":"green"},{"name":"anthropic","data":[24.540000000000003,24.780000000000005,25.200000000000003,25.55,25.840000000000003,26.04,26.27,26.52,26.740000000000002,26.939999999999998,27.14,27.279999999999998,27.400000000000002,27.51,27.630000000000003,27.750000000000004,27.840000000000007,27.950000000000003,28.03,28.14,28.110000000000003,28.140000000000008,28.13,28.12,28.130000000000006,28.170000000000005,28.18,28.220000000000002,28.26,28.369999999999997,28.42,28.440000000000005,28.430000000000007,28.42,28.44,28.45,28.470000000000002,28.400000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
