<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.75000000000001,90.55999999999999,90.89999999999999,90.89999999999998,91.01999999999998,91.09,91.17,91.20000000000002,91.3,91.45999999999998,91.52999999999999,91.41000000000001,91.2,90.87999999999998,90.97000000000001,90.75999999999999,90.29,90.14,90.00999999999999,89.47000000000001,89.20999999999998,89.09,89.03,88.94999999999999,88.92,88.83999999999999,88.82999999999998,88.66,88.80999999999999,88.83,88.6,88.36999999999999,88.36000000000001,87.87,87.38000000000001,87.39,87.33999999999999,86.6],"color":"green"},{"name":"anthropic","data":[9.719999999999999,8.9,8.559999999999999,8.57,8.459999999999999,8.38,8.31,8.27,8.18,8.01,7.9399999999999995,8.07,8.27,8.58,8.49,8.719999999999999,9.19,9.309999999999999,9.46,10,10.260000000000002,10.370000000000001,10.45,10.51,10.530000000000001,10.620000000000001,10.629999999999999,10.8,10.66,10.64,10.87,11.1,11.11,11.590000000000002,12.079999999999998,12.079999999999998,12.12,12.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
