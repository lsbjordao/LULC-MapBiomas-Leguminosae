<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.92000000000001,35.339999999999996,34.870000000000005,34.57,34.43,34.269999999999996,34.31999999999999,34.199999999999996,34.37,34.64,34.809999999999995,35.18,35.410000000000004,35.58,35.8,35.79,35.99,36.11,36.370000000000005,36.5,36.63999999999999,36.78,36.85,36.96,37.19,37.35999999999999,37.449999999999996,37.709999999999994,37.86000000000001,38.160000000000004,38.59,38.79,38.92,39.12,39.29,39.38999999999999,39.669999999999995,39.72],"color":"green"},{"name":"anthropic","data":[58.31,58.9,59.37,59.66,59.81999999999999,59.98,59.92999999999999,60.03999999999999,59.870000000000005,59.61000000000001,59.43000000000001,59.08,58.85000000000001,58.68000000000001,58.45,58.44000000000001,58.28,58.14,57.900000000000006,57.75,57.61000000000001,57.46000000000001,57.41,57.29,57.06,56.900000000000006,56.8,56.580000000000005,56.410000000000004,56.09,55.67,55.47,55.34,55.13999999999999,54.949999999999996,54.88,54.580000000000005,54.540000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
