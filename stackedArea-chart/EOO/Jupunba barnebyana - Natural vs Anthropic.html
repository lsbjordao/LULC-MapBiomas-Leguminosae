<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.08,38.349999999999994,36.18000000000001,34.910000000000004,33.35,32.53,31.87,31.77,31.949999999999996,32.22,31.939999999999994,31.53,31.15,30.369999999999997,29.879999999999995,30.01,29.990000000000006,30.38,31.250000000000007,31.740000000000002,31.840000000000003,32.2,32.49,32.19,32.04,31.400000000000002,30.819999999999997,30.03,29.430000000000003,29.060000000000006,28.450000000000003,27.96,27.93,28.42,29.04,29.980000000000004,30.259999999999998,31.08],"color":"green"},{"name":"anthropic","data":[49.529999999999994,52.95000000000001,55.489999999999995,56.85,58.449999999999996,59.26,59.879999999999995,59.95000000000001,59.76,59.49999999999999,59.79,60.230000000000004,60.59,61.379999999999995,61.809999999999995,61.690000000000005,61.699999999999996,61.27,60.43,59.839999999999996,59.71999999999999,59.33999999999999,59.050000000000004,59.36,59.550000000000004,60.27,60.95,61.78999999999999,62.46,62.87,63.529999999999994,64.04,63.99,63.46999999999999,62.78,61.75000000000001,61.400000000000006,60.059999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
