<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.78,63.37000000000001,62.63999999999999,61.95,61.220000000000006,60.680000000000014,60.05000000000001,59.36000000000001,58.69000000000002,58.150000000000006,57.590000000000025,57.16000000000001,56.900000000000006,56.47000000000003,56.070000000000014,55.69000000000001,55.29000000000001,54.890000000000015,54.360000000000014,53.850000000000016,53.46000000000002,53.19000000000001,53.01000000000001,52.84,52.74000000000001,52.59,52.38000000000001,51.94000000000001,51.500000000000014,51.08000000000002,50.73000000000001,50.59000000000002,50.43000000000002,50.320000000000014,50.19000000000002,50.000000000000014,49.76000000000001,49.70000000000002],"color":"green"},{"name":"anthropic","data":[34.65,35.05,35.73999999999999,36.43999999999999,37.16999999999999,37.74,38.349999999999994,39.059999999999995,39.70000000000001,40.260000000000005,40.81999999999999,41.279999999999994,41.510000000000005,41.92,42.33,42.71999999999999,43.10999999999999,43.519999999999996,44.05,44.55999999999999,44.94,45.2,45.37999999999999,45.539999999999985,45.67,45.820000000000014,46.019999999999996,46.45000000000001,46.89,47.33,47.660000000000004,47.80000000000002,47.95,48.06000000000001,48.21000000000001,48.37000000000002,48.62000000000001,48.72000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
