<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.52,36.92999999999999,36.55000000000001,36.25,35.93000000000001,35.78,35.63,35.540000000000006,35.46,35.4,35.26,35.21,35.09000000000001,34.99000000000001,34.72,34.410000000000004,34.32,34.21,34.150000000000006,34.08,34.120000000000005,34.18000000000001,34.25,34.35,34.5,34.67,34.74,34.769999999999996,34.69,34.63999999999999,34.76,34.83,35.019999999999996,35.129999999999995,35.11,35.150000000000006,35.21000000000001,35.27],"color":"green"},{"name":"anthropic","data":[61.61,62.25000000000001,62.61999999999999,62.91999999999999,63.25000000000001,63.400000000000006,63.540000000000006,63.63000000000001,63.709999999999994,63.77,63.91,63.94999999999999,64.10000000000001,64.18,64.47000000000001,64.74000000000001,64.85000000000002,64.93,65.00000000000001,65.09,65.05,64.98,64.91,64.80000000000003,64.65000000000002,64.5,64.42,64.4,64.48000000000002,64.53000000000002,64.41,64.35,64.14,64.04,64.05999999999999,64.02,63.93000000000001,63.90000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
