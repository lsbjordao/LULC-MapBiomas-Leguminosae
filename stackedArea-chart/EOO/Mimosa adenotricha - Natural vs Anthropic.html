<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.6,62.499999999999986,62.33,61.74999999999999,61.64,61.76,61.47999999999999,61.30999999999999,61.099999999999994,61.06999999999999,60.94,61,61.05,61.18000000000001,60.980000000000004,60.7,60.54,60.13,59.800000000000004,59.51999999999999,59.46999999999999,59.179999999999986,58.959999999999994,58.81999999999999,58.839999999999996,58.70999999999999,58.53999999999999,58.550000000000004,58.480000000000004,58.47000000000001,58.680000000000014,58.60000000000001,58.72,58.800000000000004,58.709999999999994,58.589999999999996,58.45999999999999,58.36000000000001],"color":"green"},{"name":"anthropic","data":[36.059999999999995,37.16,37.34,37.91,38.03,37.910000000000004,38.2,38.370000000000005,38.57000000000001,38.61000000000001,38.73,38.68,38.6,38.50000000000001,38.699999999999996,38.980000000000004,39.13999999999999,39.559999999999995,39.87,40.14,40.199999999999996,40.480000000000004,40.71,40.830000000000005,40.82,40.96,41.11000000000001,41.120000000000005,41.2,41.209999999999994,40.989999999999995,41.07,40.94,40.86999999999999,40.959999999999994,41.09999999999999,41.21999999999999,41.309999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
