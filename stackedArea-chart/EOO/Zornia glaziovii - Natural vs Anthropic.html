<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.76999999999999,52.18000000000001,51.43999999999999,50.78,50.04999999999999,49.42,48.68999999999999,47.959999999999994,47.42,46.94,46.22,45.629999999999995,45.11,44.8,44.58,44.269999999999996,44.06999999999999,43.56999999999999,43.150000000000006,42.64,42.150000000000006,41.83,41.580000000000005,41.38999999999999,41.290000000000006,41.129999999999995,40.97,40.66,40.32,40.099999999999994,40.04,39.839999999999996,39.72,39.73,39.68,39.669999999999995,39.669999999999995,39.83],"color":"green"},{"name":"anthropic","data":[46.65,47.23,47.99999999999999,48.66,49.379999999999995,49.98,50.73,51.48,52.01999999999999,52.500000000000014,53.22000000000001,53.8,54.31000000000001,54.61,54.870000000000005,55.14000000000001,55.33,55.86000000000001,56.28000000000001,56.79,57.269999999999996,57.580000000000005,57.84,58.04,58.15,58.32,58.45,58.75,59.11,59.32,59.41,59.58,59.70999999999999,59.68999999999999,59.74,59.73999999999999,59.75999999999999,59.589999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
