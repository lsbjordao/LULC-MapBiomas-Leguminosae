<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.13000000000001,69.88,69.27000000000001,68.64,67.97000000000001,67.50000000000001,66.97000000000001,66.28000000000002,65.6,64.99000000000001,64.27999999999999,63.739999999999995,63.359999999999985,62.81999999999999,62.22999999999999,61.70999999999999,61.149999999999984,60.57999999999999,59.77999999999998,59.029999999999994,58.45999999999999,58.12999999999998,57.93,57.76,57.64999999999999,57.48999999999999,57.25999999999999,56.859999999999985,56.399999999999984,55.999999999999986,55.64999999999999,55.46999999999999,55.269999999999996,55.11999999999999,54.87,54.699999999999996,54.449999999999996,54.15999999999999],"color":"green"},{"name":"anthropic","data":[30.040000000000003,30.320000000000004,30.919999999999998,31.520000000000007,32.19,32.67,33.22,33.87999999999999,34.57999999999999,35.17,35.870000000000005,36.41000000000001,36.8,37.330000000000005,37.97,38.45000000000001,39,39.580000000000005,40.37,41.12999999999998,41.71,42.04,42.220000000000006,42.410000000000004,42.52,42.68,42.910000000000004,43.32,43.769999999999996,44.160000000000004,44.51,44.72,44.91,45.050000000000004,45.279999999999994,45.470000000000006,45.75,46.030000000000015],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
