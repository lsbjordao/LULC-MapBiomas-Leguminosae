<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.94,77.25,76.4,78.18,77.66,76.51,75.68999999999998,74.94,73.53,71.91000000000001,70.83,69.88,68.75,68.55999999999999,68.17,67.42000000000002,67.22999999999999,67.05,66.04,65.81,64.45,65.25999999999999,65.4,65.47,65.54,65.19,64.88000000000001,63.88,62.669999999999995,62.04,62.150000000000006,64.63,65.05,65.01,64.82,64.89,64.63,64.86],"color":"green"},{"name":"anthropic","data":[29.29,29.97,30.84,29.040000000000003,29.570000000000004,30.71,31.550000000000004,32.300000000000004,33.699999999999996,35.31999999999999,36.39,37.35,38.47,38.67,39.059999999999995,39.82,39.989999999999995,40.169999999999995,41.199999999999996,41.42999999999999,42.79,41.98,41.82999999999999,41.75999999999999,41.67999999999999,42.04999999999999,42.37,43.34,44.580000000000005,45.2,45.07,42.61000000000001,42.19,42.23,42.410000000000004,42.34,42.6,42.379999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
