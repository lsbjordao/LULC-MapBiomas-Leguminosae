<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[27.54,27.44,26.989999999999995,26.53,26.150000000000002,25.979999999999997,25.509999999999998,25.139999999999997,24.890000000000004,24.91,25.080000000000005,25.460000000000004,25.480000000000004,25.620000000000005,25.480000000000004,25.220000000000002,25.080000000000005,24.900000000000002,24.400000000000002,24.019999999999996,23.76,23.69,23.900000000000002,24.04,24.160000000000004,24.210000000000004,24.110000000000003,23.900000000000006,23.779999999999994,23.779999999999994,23.9,24.029999999999998,23.88,23.680000000000003,23.54,23.5,23.62,23.94],"color":"green"},{"name":"anthropic","data":[61.169999999999995,61.27,61.73,62.199999999999996,62.57999999999999,62.760000000000005,63.21,63.6,63.849999999999994,63.81999999999999,63.69,63.28999999999999,63.26,63.11999999999999,63.25,63.52,63.64999999999999,63.85000000000001,64.33,64.71000000000001,64.98,65.04999999999998,64.84,64.69999999999999,64.56999999999998,64.52999999999999,64.64999999999999,64.86999999999999,64.97,64.96000000000001,64.86,64.72,64.89,65.06,65.22,65.28,65.16,64.83999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
