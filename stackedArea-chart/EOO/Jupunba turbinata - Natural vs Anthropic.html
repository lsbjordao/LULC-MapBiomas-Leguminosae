<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.18999999999998,69.04999999999998,68.52999999999999,67.93999999999998,67.36,67,66.51999999999998,65.83,65.27000000000001,64.81000000000002,64.23000000000002,63.750000000000014,63.400000000000006,62.97000000000001,62.57000000000001,62.16000000000001,61.63000000000001,61.17,60.58000000000001,59.94000000000001,59.400000000000006,59.010000000000005,58.720000000000006,58.46000000000001,58.27000000000001,58.07,57.860000000000014,57.42000000000001,56.95,56.510000000000005,56.12,55.870000000000005,55.640000000000015,55.46,55.170000000000016,54.88,54.55000000000001,54.23000000000001],"color":"green"},{"name":"anthropic","data":[29.03000000000001,29.160000000000004,29.680000000000003,30.270000000000003,30.87,31.220000000000006,31.720000000000002,32.38,32.94,33.419999999999995,33.97,34.46,34.79,35.220000000000006,35.62,36.04,36.56999999999999,37.019999999999996,37.62,38.25999999999999,38.78999999999999,39.190000000000005,39.47000000000001,39.73,39.919999999999995,40.120000000000005,40.349999999999994,40.77000000000001,41.260000000000005,41.669999999999995,42.07,42.330000000000005,42.56,42.739999999999995,43.010000000000005,43.31,43.669999999999995,43.96999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
