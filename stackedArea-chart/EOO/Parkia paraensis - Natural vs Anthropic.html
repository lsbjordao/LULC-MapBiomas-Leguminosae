<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.95,98.97000000000001,98.89000000000001,98.9,98.85000000000002,98.72,98.67999999999999,98.63,98.57000000000001,98.47,98.34,98.25,98.24000000000001,98.21,98.21000000000001,98.22,98.22,98.2,98.2,98.2,98.20000000000002,98.16999999999999,98.17000000000002,98.14000000000001,98.12,98.13000000000001,98.15,98.12,98.10999999999999,98.07000000000001,98.06,98.02000000000001,97.98,98.00000000000001,97.99,97.98000000000002,97.99000000000001,97.35000000000001],"color":"green"},{"name":"anthropic","data":[0.4,0.37,0.44,0.45,0.5,0.6399999999999999,0.6699999999999999,0.72,0.79,0.8800000000000001,1.01,1.1099999999999999,1.1099999999999999,1.13,1.1400000000000001,1.12,1.13,1.1400000000000001,1.1400000000000001,1.1400000000000001,1.15,1.16,1.18,1.21,1.22,1.21,1.22,1.23,1.24,1.27,1.3,1.34,1.3699999999999999,1.36,1.36,1.36,1.37,2.0100000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
