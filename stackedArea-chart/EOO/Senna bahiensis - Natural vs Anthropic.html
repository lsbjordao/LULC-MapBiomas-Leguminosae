<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[34.65,33.96,31.919999999999998,32.31,30.419999999999998,29.900000000000002,29.96,30.02,31.790000000000003,33.239999999999995,33.580000000000005,34.010000000000005,34.81000000000001,33.660000000000004,31.919999999999998,31.26,30.45,29.26,29.080000000000002,28.55,28.830000000000002,29.59,29.890000000000004,31.51,32.690000000000005,33.730000000000004,34.71,35,34.4,33.87,33.87,34.089999999999996,33.620000000000005,32.980000000000004,32.88,31.990000000000002,32.59,32.550000000000004],"color":"green"},{"name":"anthropic","data":[64.80000000000001,65.49,67.52000000000001,67.14,69.03,69.55,69.49000000000001,69.43,67.66,66.21000000000001,65.87,65.44,64.65,65.78,67.53,68.19,69,70.17,70.37,70.89,70.62,69.86,69.56,67.95,66.75,65.72,64.74000000000001,64.44999999999999,65.05,65.57000000000001,65.57,65.36,65.83,66.47,66.58,67.46000000000001,66.86,66.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
