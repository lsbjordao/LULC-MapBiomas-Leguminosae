<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.279999999999994,55.8,55.339999999999996,55.15999999999999,54.79,54.51999999999999,54.23,54.11,54.09,54.13,54.209999999999994,54.28000000000001,54.28000000000001,54.410000000000004,54.3,54.12,53.910000000000004,53.699999999999996,53.5,53.17000000000001,53.08,52.970000000000006,53.01,52.900000000000006,52.96,53.07,53.28000000000001,53.230000000000004,53.230000000000004,53.2,53.379999999999995,53.33,53.19,53.01999999999999,52.66,52.43999999999999,52.410000000000004,52.08],"color":"green"},{"name":"anthropic","data":[44.12,43.599999999999994,44.07,44.239999999999995,44.61,44.879999999999995,45.169999999999995,45.31,45.3,45.26,45.190000000000005,45.13,45.13,44.989999999999995,45.09,45.290000000000006,45.5,45.68,45.9,46.22,46.330000000000005,46.440000000000005,46.379999999999995,46.5,46.44,46.32,46.12,46.18,46.160000000000004,46.2,46.040000000000006,46.09,46.220000000000006,46.4,46.74,46.97,47,47.31999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
