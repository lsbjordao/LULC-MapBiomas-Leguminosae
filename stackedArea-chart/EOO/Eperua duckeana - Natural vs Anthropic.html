<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.03,99.06,99.04,99.04,99.05,99.08,99.08999999999999,99.05,99.06,99.07,99.09,99.05999999999999,99.02000000000001,98.94000000000001,98.93000000000002,98.94000000000001,98.95,98.94,98.88999999999999,98.86999999999999,98.83999999999999,98.82000000000002,98.84,98.83000000000001,98.80000000000001,98.78,98.81,98.82,98.81,98.78999999999999,98.76,98.72000000000001,98.74000000000001,98.75,98.76,98.75,98.74,98.65],"color":"green"},{"name":"anthropic","data":[0.42000000000000004,0.39,0.41000000000000003,0.4,0.4,0.37,0.35000000000000003,0.38,0.39,0.37,0.35000000000000003,0.37000000000000005,0.43000000000000005,0.49000000000000005,0.52,0.49000000000000005,0.5,0.51,0.55,0.5800000000000001,0.6100000000000001,0.6200000000000001,0.6000000000000001,0.6000000000000001,0.64,0.66,0.65,0.6300000000000001,0.6400000000000001,0.66,0.6799999999999999,0.71,0.71,0.7,0.6799999999999999,0.7,0.71,0.79],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
