<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.64,32.93,32.67,32.45,31.930000000000003,31.450000000000003,31.049999999999997,30.94,30.82,30.8,30.870000000000005,30.79,30.94,30.880000000000003,30.519999999999996,30.330000000000002,30.25,30.18,30.03,29.990000000000002,29.74,29.679999999999996,29.86,29.869999999999997,30.240000000000002,30.55,30.86,30.939999999999998,31.009999999999998,31.009999999999998,30.849999999999998,31.100000000000005,31.450000000000003,31.55,31.669999999999998,31.75,31.659999999999997,31.630000000000003],"color":"green"},{"name":"anthropic","data":[67.02,66.75,67.01,67.22,67.75,68.23,68.63,68.75,68.87,68.87,68.82000000000001,68.89000000000001,68.75,68.78000000000002,69.17,69.35000000000001,69.43,69.5,69.66000000000001,69.69000000000001,69.94,70.01,69.80000000000001,69.80000000000001,69.42,69.12,68.81000000000002,68.74000000000001,68.66,68.66,68.82999999999998,68.59,68.23,68.12,68.02,67.93,68.02000000000001,68.07000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
