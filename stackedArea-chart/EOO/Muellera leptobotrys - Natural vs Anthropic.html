<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.339999999999996,55.19,54.60999999999999,53.989999999999995,53.29999999999999,52.71999999999999,52.25999999999999,51.54,51.190000000000005,50.839999999999996,50.83999999999999,51.309999999999995,51.739999999999995,51.71,51.91,51.650000000000006,51.09,51.01,50.83,50.79,51.17999999999999,51.449999999999996,51.34999999999999,51.169999999999995,50.489999999999995,50.249999999999986,49.90999999999999,49.709999999999994,49.44,49.269999999999996,49.32,49.63999999999999,49.629999999999995,49.739999999999995,49.58,49.49,49.35999999999999,49.49999999999999],"color":"green"},{"name":"anthropic","data":[43.81,43.959999999999994,44.55,45.15999999999999,45.85999999999999,46.44,46.88999999999999,47.6,47.96,48.300000000000004,48.29,47.839999999999996,47.419999999999995,47.44,47.23000000000001,47.510000000000005,48.06,48.15000000000001,48.32000000000001,48.36000000000001,47.99000000000001,47.70000000000001,47.80000000000001,47.970000000000006,48.650000000000006,48.910000000000004,49.25,49.42999999999999,49.709999999999994,49.849999999999994,49.830000000000005,49.51,49.49999999999999,49.41,49.54,49.65,49.78000000000001,49.620000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
