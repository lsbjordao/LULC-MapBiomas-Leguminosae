<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.64,60.370000000000005,59.28999999999999,55.81,54.59,54.160000000000004,53.74,52.830000000000005,52.45,52.40000000000001,53.47,54.51000000000001,55.349999999999994,55.09000000000001,54.029999999999994,53.49000000000001,52.07,51.34000000000001,52.37,52.57,53.790000000000006,55.41000000000001,55.96,57.03000000000001,57.69000000000001,57.04,56.95000000000001,55.77,54.980000000000004,54.87,54.61,54.59,54.309999999999995,54.82000000000001,54.75,54.740000000000016,54.589999999999996,54.670000000000016],"color":"green"},{"name":"anthropic","data":[36.61,36.87,37.95,41.43000000000001,42.65,43.099999999999994,43.510000000000005,44.42999999999999,44.8,44.86,43.779999999999994,42.75000000000001,41.89,42.16,43.23,43.79,45.190000000000005,45.910000000000004,44.89000000000001,44.69,43.47,41.84,41.29,40.21000000000001,39.56999999999999,40.17999999999999,40.30000000000001,41.489999999999995,42.27,42.39,42.64,42.65,42.940000000000005,42.42,42.489999999999995,42.50999999999999,42.65,42.58],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
