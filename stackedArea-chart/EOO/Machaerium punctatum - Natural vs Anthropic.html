<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.589999999999996,54.46000000000001,54.010000000000005,53.540000000000006,53.040000000000006,53.01,52.9,52.59,52.300000000000004,52.12,51.85,51.769999999999996,52.02,52.07999999999999,52.129999999999995,52.17000000000001,52.050000000000004,51.84000000000001,51.77000000000001,51.72,51.6,51.57,51.50000000000001,51.42999999999999,51.370000000000005,51.31,51.21000000000001,51.02,50.68000000000001,50.36000000000001,50.11000000000001,49.940000000000005,49.93000000000001,50.02,49.95,49.86,49.81,49.769999999999996],"color":"green"},{"name":"anthropic","data":[44.85,44.980000000000004,45.430000000000014,45.88999999999999,46.410000000000004,46.42999999999999,46.51999999999999,46.829999999999984,47.14,47.309999999999995,47.599999999999994,47.66,47.42999999999999,47.359999999999985,47.309999999999995,47.26,47.39,47.6,47.660000000000004,47.71000000000001,47.830000000000005,47.87000000000001,47.94,48.02,48.05,48.14,48.23,48.41999999999999,48.75999999999999,49.109999999999985,49.309999999999995,49.47999999999999,49.49999999999999,49.41,49.49000000000001,49.589999999999996,49.62,49.68000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
