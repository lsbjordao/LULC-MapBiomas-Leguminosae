<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.779999999999994,49.08,48.51,47.79,46.94,46.309999999999995,45.56000000000001,44.88,44.37000000000001,43.809999999999995,43.21000000000001,42.699999999999996,42.120000000000005,41.669999999999995,41.16,40.72,40.41,39.92999999999999,39.519999999999996,39.03,38.64,38.4,38.21,38.03,37.919999999999995,37.74,37.57999999999999,37.25,36.94,36.669999999999995,36.47,36.269999999999996,36.17,36.16,36.06,36.04,35.96,36.17999999999999],"color":"green"},{"name":"anthropic","data":[49.71,50.44,50.989999999999995,51.70999999999999,52.550000000000004,53.16,53.94,54.60999999999999,55.13999999999999,55.69,56.28999999999999,56.809999999999995,57.37,57.830000000000005,58.319999999999986,58.800000000000004,59.07000000000001,59.57999999999999,60,60.49000000000001,60.82999999999999,61.089999999999996,61.29,61.480000000000004,61.59000000000001,61.75000000000001,61.910000000000004,62.26,62.55999999999999,62.81,63.029999999999994,63.22000000000001,63.33,63.33999999999999,63.43,63.45,63.55,63.31999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
