<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.80000000000001,72.21999999999998,72.18,72.12,71.75999999999999,71.55,71.33000000000001,71.06,70.69,70.47000000000001,70.13999999999997,70.34,70.53999999999999,70.62,70.73,70.46000000000001,70.39000000000001,69.97,69.72,69.63000000000002,69.88000000000001,69.78,69.76,69.87,70.05999999999999,70.09,70.05000000000001,70.11,70.09,70.21,70.59,70.65999999999998,70.84,70.82,70.64,70.45,70.41,70.14],"color":"green"},{"name":"anthropic","data":[25.980000000000004,26.570000000000004,26.620000000000005,26.660000000000004,27.030000000000005,27.240000000000002,27.470000000000002,27.76,28.13,28.32,28.640000000000004,28.44000000000001,28.260000000000005,28.160000000000004,28.090000000000003,28.320000000000004,28.400000000000002,28.84,29.070000000000004,29.15,28.890000000000004,29.01,29.01,28.930000000000007,28.73,28.71,28.750000000000004,28.68,28.720000000000002,28.590000000000003,28.200000000000003,28.11,27.93,27.98,28.160000000000004,28.329999999999995,28.379999999999995,28.619999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
