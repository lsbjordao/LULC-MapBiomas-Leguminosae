<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.17,85.95,85.71000000000001,85.27999999999999,84.82,84.25999999999999,83.69999999999999,83.39999999999999,83.16,83.16,83.53999999999999,83.91999999999999,84.29999999999998,84.06,83.95,83.71999999999998,83.37,83.18,82.71000000000001,81.89999999999999,81.36,81.00999999999999,80.58999999999999,80.67999999999999,80.76000000000002,80.89999999999999,80.86999999999998,80.61999999999998,80.18999999999998,79.89999999999999,79.55999999999999,79.55,79.33,79.15,79.04,78.71000000000001,78.42,77.96],"color":"green"},{"name":"anthropic","data":[13.25,13.450000000000001,13.7,14.120000000000001,14.57,15.16,15.719999999999999,15.989999999999998,16.23,16.25,15.869999999999997,15.49,15.090000000000002,15.330000000000002,15.46,15.67,16.029999999999998,16.24,16.689999999999998,17.52,18.06,18.380000000000003,18.830000000000002,18.74,18.67,18.52,18.54,18.8,19.2,19.51,19.860000000000003,19.869999999999997,20.11,20.27,20.369999999999997,20.71,21.01,21.44],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
