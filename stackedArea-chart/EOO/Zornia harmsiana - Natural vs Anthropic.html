<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.57,75.38000000000002,74.54,73.71,72.99000000000001,71.9,70.84,70.72000000000001,70.21000000000001,70.60000000000001,71.27000000000001,71.54,72.60000000000001,72.19,72.11000000000001,72.23,71.87,71.84,71.30000000000003,70.36000000000001,69.55000000000001,68.87000000000002,67.98000000000002,68.25000000000001,68.26,68.41000000000001,68.41000000000003,68.24,68.05,68.02000000000001,67.46,67.73,68.14,68.47999999999999,68.71,68.92,68.71000000000001,68.86],"color":"green"},{"name":"anthropic","data":[23.7,23.889999999999997,24.72,25.56,26.260000000000005,27.37,28.41,28.54,29.069999999999997,28.659999999999997,28,27.73,26.660000000000004,27.070000000000004,27.17,27.03,27.39,27.42,27.96,28.919999999999998,29.720000000000002,30.409999999999997,31.28,31,31.019999999999996,30.860000000000003,30.860000000000003,31.03,31.209999999999997,31.250000000000007,31.830000000000002,31.54,31.130000000000003,30.780000000000005,30.55,30.34,30.57,30.389999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
