<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.37000000000001,58.04999999999999,57.38000000000001,56.78,56.08000000000001,55.580000000000005,55.05,54.480000000000004,53.959999999999994,53.58,53.24,52.99,52.92,52.690000000000005,52.41,52.160000000000004,51.88000000000001,51.660000000000004,51.34000000000001,50.970000000000006,50.71,50.56000000000001,50.410000000000004,50.32,50.269999999999996,50.15,49.99,49.57,49.2,48.85,48.57,48.5,48.39,48.33999999999999,48.21000000000001,48.07000000000001,47.92,47.900000000000006],"color":"green"},{"name":"anthropic","data":[38.91,39.239999999999995,39.94,40.52999999999999,41.24999999999999,41.76,42.28,42.82,43.37,43.71999999999999,44.070000000000014,44.32000000000001,44.4,44.63999999999999,44.86999999999999,45.14,45.41000000000001,45.64999999999999,45.970000000000006,46.31999999999999,46.58999999999999,46.76,46.86999999999999,46.980000000000004,47.03999999999999,47.14,47.32,47.72000000000001,48.089999999999996,48.45000000000001,48.710000000000015,48.82000000000001,48.90000000000001,48.96,49.07,49.230000000000004,49.39000000000001,49.4],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
