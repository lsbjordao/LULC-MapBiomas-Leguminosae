<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.91000000000001,57.77000000000001,57.360000000000014,56.67000000000001,56.18000000000001,56.51000000000001,56.680000000000014,56.43000000000002,55.990000000000016,55.89000000000001,55.38000000000001,55.06000000000001,55.260000000000005,55.339999999999996,55.27000000000002,55.52,55.43,55.000000000000014,54.83000000000001,54.690000000000005,54.199999999999996,53.81999999999999,53.57,53.430000000000014,53.60000000000001,53.53,53.37000000000001,53.20000000000001,52.73000000000001,51.920000000000016,51.290000000000006,50.670000000000016,50.53000000000001,50.64000000000001,50.57000000000001,50.449999999999996,50.4,50.37999999999999],"color":"green"},{"name":"anthropic","data":[39.24000000000001,39.38000000000001,39.78,40.470000000000006,40.970000000000006,40.650000000000006,40.470000000000006,40.73000000000001,41.16000000000001,41.290000000000006,41.800000000000004,42.09,41.9,41.83000000000001,41.89999999999999,41.64999999999999,41.76,42.16000000000001,42.34,42.47,42.96,43.32,43.59,43.720000000000006,43.56999999999999,43.63999999999999,43.81,43.989999999999995,44.43,45.25000000000001,45.870000000000005,46.48000000000001,46.63,46.510000000000005,46.6,46.7,46.77,46.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
