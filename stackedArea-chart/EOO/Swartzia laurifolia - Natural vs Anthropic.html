<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.84000000000002,96.78,96.49,96.22999999999999,96.08,95.93000000000002,95.75,95.39,95.05,94.77,94.33000000000001,93.95000000000002,93.57000000000002,93.12000000000002,92.79,92.52999999999999,92.16000000000001,91.81,91.31,90.74000000000001,90.31000000000002,89.91000000000001,89.63000000000001,89.36000000000001,89.16,89.06,88.99000000000001,88.92000000000003,88.74000000000001,88.6,88.35000000000002,88.04,87.84000000000002,87.66000000000001,87.41000000000001,87.13000000000004,86.71000000000001,86.11000000000001],"color":"green"},{"name":"anthropic","data":[2.6799999999999993,2.7199999999999993,3.0199999999999996,3.28,3.4299999999999997,3.5699999999999994,3.76,4.139999999999999,4.469999999999999,4.739999999999998,5.189999999999999,5.559999999999999,5.949999999999999,6.369999999999998,6.709999999999998,6.969999999999998,7.3199999999999985,7.699999999999999,8.19,8.77,9.209999999999999,9.6,9.89,10.16,10.35,10.459999999999999,10.519999999999998,10.599999999999998,10.769999999999998,10.929999999999998,11.18,11.489999999999998,11.68,11.870000000000001,12.120000000000001,12.360000000000001,12.82,13.410000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
