<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.16000000000001,86.1,85.16,84.21000000000001,83.46000000000001,82.72999999999999,81.9,80.66,79.61999999999999,78.64999999999999,77.36,76.07000000000001,74.96000000000001,73.76,72.5,71.28,69.80999999999999,68.82000000000001,67.64,66.07999999999998,64.96000000000001,64.01,63.36000000000001,62.68,62.160000000000004,61.65,61.36000000000001,60.81999999999999,60.129999999999995,59.7,59.00000000000001,58.39999999999999,57.8,57.34,56.81,56.26,55.67,54.67999999999999],"color":"green"},{"name":"anthropic","data":[13.129999999999999,13.209999999999997,14.129999999999997,15.089999999999998,15.83,16.57,17.400000000000002,18.650000000000002,19.680000000000003,20.64,21.930000000000003,23.23,24.34,25.530000000000005,26.780000000000005,28.020000000000003,29.490000000000002,30.450000000000003,31.64,33.190000000000005,34.32000000000001,35.28,35.92,36.61000000000001,37.13999999999999,37.64,37.91,38.459999999999994,39.18000000000002,39.599999999999994,40.29,40.88,41.47,41.92000000000001,42.48000000000001,43.040000000000006,43.62000000000001,44.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
