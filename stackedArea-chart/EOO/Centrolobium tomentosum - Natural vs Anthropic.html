<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.080000000000005,49.900000000000006,49.50000000000001,49.11,48.66,48.4,48.05000000000002,47.74,47.400000000000006,47.230000000000004,47.010000000000005,46.87000000000001,46.88000000000002,46.78000000000001,46.650000000000006,46.470000000000006,46.27000000000001,46.120000000000005,45.900000000000006,45.64000000000001,45.45,45.36,45.26,45.19,45.14,45.08,44.97,44.68999999999999,44.41,44.160000000000004,43.980000000000004,43.93,43.87,43.77000000000001,43.65000000000001,43.529999999999994,43.42000000000001,43.35],"color":"green"},{"name":"anthropic","data":[41.69,41.870000000000005,42.260000000000005,42.68000000000001,43.12,43.42,43.71999999999999,44.06999999999999,44.38,44.56000000000001,44.76,44.900000000000006,44.89999999999999,45,45.150000000000006,45.32,45.50999999999999,45.669999999999995,45.87,46.13,46.33,46.39999999999999,46.49,46.589999999999996,46.62999999999999,46.69,46.79999999999999,47.07,47.35,47.59,47.76,47.839999999999996,47.91000000000001,47.99000000000001,48.13,48.25999999999999,48.4,48.45],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
