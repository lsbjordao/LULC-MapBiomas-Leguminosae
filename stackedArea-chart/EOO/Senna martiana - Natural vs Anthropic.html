<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.03000000000001,57.890000000000015,57.32,56.79,56.22000000000001,55.910000000000004,55.52000000000001,55.05000000000001,54.62000000000001,54.57000000000001,54.53,54.58,54.88000000000001,54.78000000000001,54.63,54.519999999999996,54.25000000000001,54.1,53.91,53.75000000000001,53.589999999999996,53.55,53.47999999999999,53.58000000000001,53.62000000000001,53.59,53.50000000000001,53.09000000000001,52.71,52.37000000000001,52.13000000000001,52.13000000000001,52.14000000000001,52.22,52.25000000000001,52.330000000000005,52.33000000000001,52.43],"color":"green"},{"name":"anthropic","data":[40.86,40.99,41.559999999999995,42.09,42.64,42.97,43.349999999999994,43.82000000000001,44.24999999999999,44.3,44.35,44.300000000000004,43.989999999999995,44.11,44.239999999999995,44.359999999999985,44.59999999999999,44.76,44.99999999999999,45.13,45.29,45.31999999999999,45.36999999999999,45.28,45.249999999999986,45.27,45.37999999999999,45.77999999999999,46.13999999999998,46.48999999999999,46.749999999999986,46.739999999999995,46.749999999999986,46.66,46.63,46.54999999999999,46.529999999999994,46.43],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
