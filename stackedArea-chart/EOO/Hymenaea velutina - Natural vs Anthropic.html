<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[80.03000000000003,80.14,79.84000000000002,79.38000000000001,78.83000000000001,78.63000000000004,78.34000000000003,78.00000000000003,77.63000000000004,77.47000000000001,77.29000000000002,77.18,77.52000000000001,77.38000000000001,77.24000000000004,77.17000000000002,76.80000000000003,76.47000000000003,76.15000000000003,75.69000000000001,75.19000000000001,74.88000000000002,74.56,74.34000000000003,74.23000000000002,74.06000000000003,73.80000000000003,73.17000000000003,72.45000000000003,71.89000000000004,71.40000000000002,71.22999999999999,70.96000000000004,70.77,70.51000000000002,70.13000000000001,69.73000000000003,69.35000000000002],"color":"green"},{"name":"anthropic","data":[20.159999999999997,20.03,20.33,20.81,21.34,21.56,21.819999999999997,22.179999999999996,22.549999999999994,22.689999999999998,22.89,22.99,22.659999999999997,22.790000000000003,22.950000000000003,23.019999999999996,23.399999999999995,23.72,24.04,24.490000000000002,24.98,25.31,25.619999999999997,25.86,25.960000000000004,26.140000000000004,26.390000000000004,27.009999999999998,27.740000000000006,28.29,28.77,28.950000000000003,29.230000000000004,29.39,29.66,30.050000000000004,30.450000000000003,30.82],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
