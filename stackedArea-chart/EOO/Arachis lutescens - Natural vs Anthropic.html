<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.38999999999999,53.05,51.63,50.660000000000004,49.620000000000005,48.46,47.480000000000004,46.34,45.27,44,42.86,41.93,41.15,40.45000000000001,39.7,38.95,38.32999999999999,37.779999999999994,37.169999999999995,36.580000000000005,36.220000000000006,36.040000000000006,35.870000000000005,35.699999999999996,35.690000000000005,35.62,35.58,35.410000000000004,35.32,35.089999999999996,34.940000000000005,34.78000000000001,34.68000000000001,34.68000000000001,34.660000000000004,34.54,34.400000000000006,34.86],"color":"green"},{"name":"anthropic","data":[44.610000000000014,45.949999999999996,47.38,48.34,49.38,50.550000000000004,51.52,52.68,53.73000000000001,55,56.13,57.07999999999999,57.86,58.56,59.309999999999995,60.059999999999995,60.67,61.209999999999994,61.84,62.440000000000005,62.77,62.959999999999994,63.13,63.29,63.29,63.370000000000005,63.400000000000006,63.580000000000005,63.67000000000001,63.89,64.06,64.22,64.33,64.3,64.33000000000001,64.45,64.58,64.13000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
