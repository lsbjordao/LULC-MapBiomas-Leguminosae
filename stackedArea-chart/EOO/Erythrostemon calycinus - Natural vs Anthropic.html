<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.41000000000001,62.08,61.769999999999996,61.46,60.6,59.61999999999999,59.059999999999995,58.05,57.12,56.53,56.19,56.25,56.55,56.24000000000001,56.269999999999996,56.04,55.42,55.25,54.720000000000006,54.51,54.330000000000005,54.53,54.559999999999995,54.550000000000004,54.529999999999994,54.43,54.25,54,53.800000000000004,53.43000000000001,53.410000000000004,53.79,53.589999999999996,53.599999999999994,53.459999999999994,53.43,53.339999999999996,53.34],"color":"green"},{"name":"anthropic","data":[36.98,37.309999999999995,37.61999999999999,37.91,38.75999999999999,39.76,40.330000000000005,41.32000000000001,42.26,42.85,43.19,43.129999999999995,42.83,43.14000000000001,43.11000000000001,43.330000000000005,43.960000000000015,44.12000000000001,44.650000000000006,44.86000000000001,45.04,44.84,44.82000000000001,44.83,44.86,44.95,45.120000000000005,45.38,45.57999999999999,45.940000000000005,45.949999999999996,45.59000000000001,45.81999999999999,45.79,45.93,45.949999999999996,46.040000000000006,46.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
