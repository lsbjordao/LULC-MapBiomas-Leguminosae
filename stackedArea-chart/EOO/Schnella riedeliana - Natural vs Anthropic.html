<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.63999999999999,48.199999999999996,45.54,44.55,43.91,42.89,42.019999999999996,41,40.11,39.410000000000004,38.51,37.67999999999999,36.87,36.35,35.95,35.739999999999995,35.39,35.05,34.43999999999999,33.959999999999994,33.75,33.339999999999996,33.17,33.01,32.949999999999996,32.78999999999999,32.68,32.51,32.41,32.25,32.21000000000001,32.24,32.18,32.03,31.77,31.28,30.67,30.89],"color":"green"},{"name":"anthropic","data":[49.63,51.06000000000001,53.730000000000004,54.72,55.35,56.38,57.230000000000004,58.25,59.150000000000006,59.870000000000005,60.75,61.6,62.39,62.91,63.31999999999999,63.53,63.88,64.21,64.84,65.30000000000001,65.50999999999999,65.94,66.10000000000001,66.27000000000001,66.32,66.47,66.56999999999998,66.76,66.87,67.03,67.05,67.04,67.09000000000002,67.25000000000001,67.49999999999999,68.00000000000001,68.60000000000001,68.38],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
