<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.64,92.51,92.09000000000002,91.74000000000001,91.56000000000002,91.35,91.13000000000001,90.91,90.61000000000001,90.45000000000002,90.06000000000002,89.99000000000001,89.94000000000001,89.47,89.54,89.4,89.35000000000001,89.23,89.44000000000003,88.94000000000003,88.91999999999999,88.63000000000001,88.82000000000002,88.68,88.66,88.23,87.98,87.67,87.79000000000002,87.61,87.22999999999999,87.36999999999999,87.15,86.85999999999999,86.62,86.36,85.94,85.9],"color":"green"},{"name":"anthropic","data":[6.1,6.2299999999999995,6.659999999999999,6.969999999999999,7.139999999999999,7.349999999999999,7.549999999999999,7.809999999999999,8.139999999999999,8.440000000000001,8.82,8.9,8.95,9.409999999999998,9.309999999999999,9.509999999999998,9.579999999999998,9.719999999999997,9.569999999999999,10.069999999999999,10.079999999999998,10.389999999999999,10.179999999999998,10.32,10.36,10.790000000000001,11.03,11.34,11.229999999999999,11.429999999999998,11.799999999999999,11.629999999999999,11.89,12.139999999999999,12.389999999999999,12.649999999999999,13.069999999999999,13.129999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
