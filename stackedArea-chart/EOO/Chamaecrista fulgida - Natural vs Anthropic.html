<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[84.82000000000001,85.89000000000001,86.24000000000001,86.46,86.54999999999998,86.84,86.66999999999997,86.64,86.43999999999998,86.11,85.6,84.67,82.29999999999998,80.32000000000001,80.55000000000001,80.58999999999999,80.6,80.86,81.11,81.22,81.72,81.83,81.94,81.79000000000002,81.41,81.05999999999999,80.97,80.91,80.82000000000001,80.69,80.53,80.55000000000001,80.67,80.52999999999999,79.78999999999999,73.22999999999999,72.05,67.94999999999999],"color":"green"},{"name":"anthropic","data":[14.55,13.48,13.120000000000001,12.91,12.8,12.530000000000001,12.71,12.719999999999999,12.92,13.27,13.77,14.7,17.06,19.04,18.81,18.78,18.77,18.52,18.27,18.169999999999998,17.66,17.54,17.439999999999998,17.58,17.97,18.29,18.4,18.46,18.55,18.689999999999998,18.84,18.83,18.71,18.86,19.580000000000002,26.130000000000003,27.33,31.41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
