<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.81,62.62,62.059999999999995,61.429999999999986,60.80999999999999,60.05000000000001,59.34,58.599999999999994,57.88999999999999,57.559999999999995,57.540000000000006,57.709999999999994,58.169999999999995,58,58.06,57.779999999999994,57.39999999999999,57.29,56.79999999999999,56.43,56.239999999999995,56.25999999999999,56.129999999999995,56.04999999999998,55.92,55.839999999999996,55.47999999999999,55.08999999999999,54.8,54.57,54.38,54.63,54.57000000000001,54.64,54.66,54.73999999999999,54.699999999999996,54.78999999999999],"color":"green"},{"name":"anthropic","data":[36.80000000000001,36.99000000000001,37.550000000000004,38.170000000000016,38.81000000000001,39.58000000000001,40.28,41.050000000000004,41.730000000000004,42.04,42.06,41.9,41.440000000000005,41.62,41.56,41.859999999999985,42.21,42.32,42.81999999999999,43.15999999999999,43.379999999999995,43.349999999999994,43.48,43.56999999999999,43.72,43.78,44.129999999999995,44.529999999999994,44.79999999999999,45.059999999999995,45.219999999999985,44.989999999999995,45.029999999999994,44.98,44.949999999999996,44.85999999999999,44.9,44.78999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
