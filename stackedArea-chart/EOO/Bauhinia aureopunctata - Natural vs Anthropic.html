<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[100.42999999999999,100.39999999999998,100.32000000000001,100.22999999999999,100.22000000000001,100.19999999999999,100.19999999999999,100.12000000000002,100.03,99.94000000000001,99.75,99.54000000000002,99.35000000000001,99.21000000000001,99.12000000000002,99.10000000000002,99.03,98.87,98.63000000000001,98.28,97.83,97.63,97.43999999999998,97.27,97.14999999999999,97.03999999999999,96.91,96.76,96.52,96.35000000000001,96.09,95.71,95.39999999999999,95.05999999999999,94.41999999999999,93.84,92.98999999999998,91.92999999999999],"color":"green"},{"name":"anthropic","data":[0.45,0.47000000000000003,0.5700000000000001,0.64,0.67,0.67,0.6900000000000001,0.75,0.8500000000000001,0.9500000000000001,1.1300000000000001,1.33,1.53,1.6600000000000001,1.75,1.78,1.84,2,2.2399999999999998,2.5799999999999996,3.0399999999999996,3.2499999999999996,3.4299999999999997,3.5899999999999994,3.7199999999999998,3.8299999999999996,3.9699999999999998,4.12,4.359999999999999,4.529999999999999,4.789999999999999,5.16,5.489999999999999,5.809999999999999,6.45,7.029999999999999,7.88,8.959999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
