<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.33,94.71,93.61,93,92.63,92.41999999999997,91.39999999999999,90.36999999999999,88.9,87.6,85.41999999999999,82.74000000000002,80.73,78.76,76.61,74.96000000000001,72.93,70.67,67.88,65.52,63.25999999999999,61.669999999999995,60.99999999999999,60.54,60.25,59.989999999999995,59.39,58.84,58.26,57.72,56.67999999999999,55.61000000000001,54.72,54.11,53.36,52.47,50.83,48.769999999999996],"color":"green"},{"name":"anthropic","data":[3.7899999999999996,4.39,5.48,6.12,6.489999999999999,6.68,7.709999999999999,8.74,10.2,11.51,13.68,16.36,18.37,20.35,22.5,24.14,26.16,28.44,31.209999999999997,33.599999999999994,35.849999999999994,37.45,38.099999999999994,38.559999999999995,38.849999999999994,39.1,39.730000000000004,40.26,40.86,41.4,42.42,43.480000000000004,44.39,45.010000000000005,45.75000000000001,46.64000000000001,48.28000000000001,50.34000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
