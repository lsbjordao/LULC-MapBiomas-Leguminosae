<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.82,57.55,57.440000000000005,57.41000000000001,56.94,56.650000000000006,56.41000000000001,56.000000000000014,55.589999999999996,55.459999999999994,55.24,55.480000000000004,55.62,55.6,55.38000000000001,54.93000000000001,54.81000000000001,54.480000000000004,54.220000000000006,54.160000000000004,54.49000000000001,54.35,54.24000000000001,54.24999999999999,54.45,54.440000000000005,54.34000000000001,54.37000000000001,54.30999999999999,54.55,55.029999999999994,55.120000000000005,55.45,55.46000000000001,55.37,55.14,55.04,54.64999999999999],"color":"green"},{"name":"anthropic","data":[40.16,41.45,41.54,41.589999999999996,42.059999999999995,42.34,42.57999999999999,43,43.38999999999999,43.529999999999994,43.73999999999999,43.519999999999996,43.36,43.4,43.620000000000005,44.050000000000004,44.17,44.51,44.75999999999999,44.83,44.49,44.64000000000001,44.730000000000004,44.750000000000014,44.540000000000006,44.540000000000006,44.629999999999995,44.599999999999994,44.669999999999995,44.45000000000001,43.940000000000005,43.86,43.53999999999999,43.519999999999996,43.62,43.85000000000001,43.94000000000001,44.32000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
