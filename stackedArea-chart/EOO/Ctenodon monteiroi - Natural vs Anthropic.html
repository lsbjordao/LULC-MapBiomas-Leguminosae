<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.92,74.71000000000001,73.86,73.35,72.58999999999999,71.59999999999998,70.86,70.44,69.82000000000001,69.96,70.23,70.60000000000001,71.39999999999999,71.14999999999999,71.11000000000001,71.12000000000002,70.73,70.72000000000001,70.31,69.74999999999999,69.32000000000001,69.21,68.81,69.04999999999998,69.19,69.2,69.07000000000001,68.54,68.43,68.07999999999998,67.64000000000001,67.75,67.91000000000001,68.12,68.24,68.39,68.33999999999999,68.4],"color":"green"},{"name":"anthropic","data":[24.380000000000003,24.61,25.470000000000002,25.97,26.72,27.71,28.44,28.869999999999994,29.499999999999996,29.38,29.08,28.710000000000004,27.930000000000003,28.18,28.220000000000006,28.220000000000002,28.59,28.59,29.02,29.580000000000002,29.990000000000002,30.11,30.509999999999998,30.270000000000003,30.120000000000005,30.129999999999995,30.259999999999998,30.780000000000005,30.900000000000002,31.23,31.67,31.56,31.400000000000002,31.19,31.070000000000004,30.91,30.97,30.909999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
