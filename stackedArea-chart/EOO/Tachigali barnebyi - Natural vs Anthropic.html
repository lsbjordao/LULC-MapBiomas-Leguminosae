<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.76000000000002,95.66999999999999,95.21000000000001,94.75,94.41,94.12,93.83,93.13999999999999,92.52999999999999,91.90999999999998,91.04,90.33,89.61999999999999,88.82,88.23,87.83,87.22000000000003,86.64,85.78999999999999,84.78999999999999,84.05,83.44,82.99,82.60999999999999,82.34,82.21999999999998,82.09,81.97000000000001,81.78,81.57000000000001,81.21,80.81,80.52,80.25999999999999,79.83,79.38,78.72,77.77000000000001],"color":"green"},{"name":"anthropic","data":[4.6899999999999995,4.779999999999999,5.239999999999999,5.719999999999999,6.049999999999999,6.339999999999999,6.64,7.299999999999999,7.909999999999999,8.54,9.399999999999999,10.1,10.829999999999998,11.629999999999999,12.199999999999998,12.619999999999997,13.209999999999997,13.799999999999999,14.66,15.64,16.400000000000002,17.009999999999994,17.439999999999998,17.830000000000002,18.110000000000003,18.220000000000006,18.36,18.480000000000004,18.679999999999996,18.880000000000003,19.220000000000002,19.64,19.9,20.189999999999998,20.619999999999994,21.06,21.720000000000002,22.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
