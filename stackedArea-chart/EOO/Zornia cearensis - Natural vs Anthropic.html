<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.14,65.78,65.02,64.32000000000001,63.52000000000001,62.900000000000006,62.32,61.71000000000002,61.05000000000001,60.600000000000016,60.06000000000002,59.55000000000001,59.28,58.890000000000015,58.48000000000001,58.16000000000002,57.79000000000001,57.39000000000001,56.890000000000015,56.320000000000014,55.83000000000001,55.490000000000016,55.240000000000016,55.07000000000002,54.98000000000001,54.84000000000001,54.62000000000001,54.180000000000014,53.63000000000002,53.230000000000025,52.850000000000016,52.69000000000001,52.53000000000001,52.38,52.17,51.940000000000005,51.64000000000001,51.52000000000001],"color":"green"},{"name":"anthropic","data":[34.02000000000001,34.419999999999995,35.12999999999999,35.85999999999999,36.66,37.24999999999999,37.830000000000005,38.48000000000001,39.12000000000002,39.58,40.10999999999999,40.620000000000005,40.88000000000001,41.279999999999994,41.709999999999994,42.00999999999999,42.419999999999995,42.8,43.3,43.849999999999994,44.339999999999996,44.669999999999995,44.900000000000006,45.1,45.17,45.32000000000001,45.53,45.97,46.510000000000005,46.95000000000001,47.31,47.46,47.62000000000001,47.77000000000001,47.980000000000004,48.21,48.49,48.6],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
