<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[10.73,10.73,10.7,10.699999999999998,10.629999999999997,10.589999999999998,10.529999999999998,10.449999999999998,10.429999999999998,10.419999999999998,10.43,10.409999999999998,10.389999999999999,10.389999999999997,10.36,10.319999999999997,10.249999999999998,10.209999999999999,10.079999999999998,10.02,10,9.99,9.959999999999999,9.93,9.87,9.839999999999998,9.79,9.759999999999998,9.709999999999997,9.679999999999998,9.67,9.62,9.61,9.57,9.49,9.43,9.399999999999999,9.389999999999999],"color":"green"},{"name":"anthropic","data":[3.8999999999999995,3.88,3.9099999999999997,3.92,3.98,4.029999999999999,4.1,4.17,4.1899999999999995,4.209999999999999,4.2,4.2299999999999995,4.24,4.239999999999999,4.25,4.32,4.369999999999999,4.42,4.55,4.6,4.619999999999999,4.630000000000001,4.65,4.699999999999999,4.74,4.79,4.83,4.859999999999999,4.91,4.9399999999999995,4.96,5,5.02,5.06,5.12,5.1899999999999995,5.22,5.24],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
