<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.56,98.47999999999999,98.36999999999999,98.27999999999999,98.24,98.22999999999998,98.17,97.97999999999999,97.8,97.61999999999999,97.37,97.05,96.78,96.5,96.33999999999999,96.2,96.05,95.8,95.51,95.21,94.86000000000003,94.64000000000001,94.53999999999999,94.45,94.35000000000001,94.26,94.19000000000001,94.16000000000001,94.02,93.88,93.65,93.32,93.10999999999999,92.99,92.75999999999999,92.5,92.09,91.49000000000001],"color":"green"},{"name":"anthropic","data":[1.26,1.34,1.45,1.55,1.59,1.59,1.6500000000000001,1.83,2.02,2.1999999999999997,2.45,2.7600000000000002,3.0500000000000003,3.3200000000000003,3.49,3.61,3.7600000000000002,4.02,4.3,4.6,4.97,5.169999999999999,5.279999999999999,5.369999999999999,5.469999999999999,5.57,5.640000000000001,5.66,5.800000000000001,5.92,6.17,6.51,6.71,6.829999999999999,7.06,7.329999999999999,7.73,8.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
