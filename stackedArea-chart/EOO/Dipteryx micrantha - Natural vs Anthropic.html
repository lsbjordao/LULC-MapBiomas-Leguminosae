<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.26,97.16000000000001,97.06,96.98,96.97,96.94,96.89999999999999,96.82,96.69999999999999,96.54,96.25,95.91,95.71,95.53,95.36000000000001,95.21,95.03999999999999,94.75,94.44999999999997,94.10999999999999,93.61,93.38999999999999,93.22,93.16,93.1,93.05,92.92999999999999,92.84,92.67,92.61,92.43,92.19000000000001,92,91.80000000000003,91.43,91.08,90.60000000000002,89.99],"color":"green"},{"name":"anthropic","data":[0.62,0.7100000000000001,0.81,0.88,0.91,0.9500000000000001,0.9800000000000001,1.06,1.1800000000000002,1.36,1.6300000000000001,1.96,2.17,2.3499999999999996,2.52,2.68,2.85,3.13,3.43,3.77,4.27,4.4799999999999995,4.66,4.72,4.779999999999999,4.819999999999999,4.949999999999999,5.04,5.199999999999999,5.26,5.43,5.68,5.88,6.08,6.45,6.81,7.28,7.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
