<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.66999999999999,44.53999999999999,43.5,42.699999999999996,41.79999999999998,41.029999999999994,40.33999999999999,39.470000000000006,38.760000000000005,37.970000000000006,37.230000000000004,36.629999999999995,36.03,35.54,35.040000000000006,34.54,34.16,33.77,33.330000000000005,32.95000000000001,32.730000000000004,32.59000000000001,32.52,32.43000000000001,32.41000000000001,32.35000000000001,32.290000000000006,32.160000000000004,32.00000000000001,31.85000000000001,31.83000000000001,31.790000000000013,31.710000000000008,31.710000000000008,31.660000000000007,31.600000000000005,31.440000000000005,31.620000000000008],"color":"green"},{"name":"anthropic","data":[55.06999999999999,56.199999999999996,57.220000000000006,58.05000000000001,58.93000000000001,59.70000000000001,60.38,61.260000000000005,61.949999999999996,62.76000000000001,63.47,64.09,64.7,65.19999999999999,65.67,66.17999999999999,66.58,66.96,67.39,67.75999999999998,67.98000000000002,68.12000000000003,68.22,68.29999999999998,68.31000000000002,68.37,68.44000000000001,68.55000000000003,68.69,68.89,68.89999999999999,68.94000000000001,69.01000000000002,69.00999999999999,69.07,69.13000000000001,69.28999999999999,69.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
