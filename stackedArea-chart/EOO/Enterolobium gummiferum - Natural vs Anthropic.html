<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.44000000000001,68.16000000000003,67.42,66.69000000000001,65.96000000000001,65.45,64.92999999999999,64.13,63.42999999999999,62.70000000000001,61.86,61.17,60.61,59.989999999999995,59.33999999999999,58.809999999999995,58.279999999999994,57.67,56.879999999999995,56.129999999999995,55.56,55.16,54.879999999999995,54.569999999999986,54.35999999999999,54.16000000000001,53.94,53.620000000000005,53.21999999999999,52.839999999999996,52.51999999999999,52.300000000000004,52.12,51.94,51.67999999999999,51.41,50.99999999999999,50.569999999999986],"color":"green"},{"name":"anthropic","data":[30.639999999999997,30.910000000000007,31.690000000000015,32.38999999999999,33.12999999999999,33.63999999999999,34.169999999999995,34.97,35.660000000000004,36.400000000000006,37.20000000000001,37.93,38.48000000000001,39.09,39.74,40.25,40.809999999999995,41.38999999999999,42.21,42.949999999999996,43.51,43.92,44.190000000000005,44.52000000000001,44.709999999999994,44.90999999999999,45.12,45.44,45.870000000000005,46.22000000000001,46.54,46.760000000000005,46.97000000000001,47.12000000000001,47.4,47.68,48.06999999999999,48.49],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
