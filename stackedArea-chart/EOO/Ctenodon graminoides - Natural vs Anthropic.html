<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.47,61.419999999999995,60.080000000000005,58.67,56.7,54.63,53.52,51.9,50.57,48.51,47.4,47.209999999999994,46.199999999999996,45.74,44.78999999999999,43.910000000000004,43.46000000000001,42.82,42.1,42.08,42.03,41.95,41.99,41.63,41.620000000000005,41.8,41.519999999999996,41.41,41.44,41.29,41.11,40.86,40.79,40.43000000000001,40.33,40.19,40.27,41.14000000000001],"color":"green"},{"name":"anthropic","data":[36.010000000000005,38.050000000000004,39.400000000000006,40.800000000000004,42.76,44.83,45.959999999999994,47.56,48.900000000000006,50.949999999999996,52.06,52.260000000000005,53.26,53.72999999999999,54.68,55.559999999999995,55.99999999999999,56.64,57.349999999999994,57.4,57.44,57.489999999999995,57.47,57.82,57.86,57.669999999999995,57.940000000000005,58.07,58.03,58.18,58.35999999999999,58.62,58.69,59.040000000000006,59.14,59.28,59.190000000000005,58.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
