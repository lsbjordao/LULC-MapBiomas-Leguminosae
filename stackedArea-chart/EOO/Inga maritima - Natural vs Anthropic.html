<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.69,29.040000000000003,28.620000000000005,28.55,28.390000000000004,28.240000000000006,28.350000000000005,28.360000000000007,28.610000000000007,28.860000000000003,28.970000000000002,29.200000000000003,29.360000000000007,29.430000000000007,29.580000000000002,29.510000000000005,29.650000000000002,29.800000000000004,30.03,30.16,30.38,30.490000000000002,30.59,30.710000000000004,30.880000000000006,31.01,31.03,31.21,31.259999999999998,31.44,31.740000000000002,31.840000000000003,31.96,32.190000000000005,32.36000000000001,32.56000000000001,32.760000000000005,32.84],"color":"green"},{"name":"anthropic","data":[57.89,58.57,59.030000000000015,59.15,59.31000000000002,59.45000000000001,59.339999999999996,59.35,59.12,58.900000000000006,58.77999999999999,58.53999999999999,58.36000000000001,58.269999999999996,58.120000000000005,58.169999999999995,58.029999999999994,57.879999999999995,57.61,57.470000000000006,57.25,57.12,57.00999999999999,56.89,56.69999999999999,56.63,56.63999999999999,56.43,56.379999999999995,56.22,55.93,55.809999999999995,55.67999999999999,55.45,55.25,55.07,54.86,54.790000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
