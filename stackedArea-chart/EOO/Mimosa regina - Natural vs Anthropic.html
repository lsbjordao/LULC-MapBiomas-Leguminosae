<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.06,92.07,91.29,91.11999999999999,90.52000000000001,89.89,90.02999999999999,90.21000000000001,90.14,90.17999999999999,90.21,90.25,90.31,90.17999999999999,90.33,90.50999999999999,90.5,90.61999999999999,90.59,90.78,91.08,91.07999999999998,91.04,90.97999999999999,90.98,90.85000000000001,90.89999999999999,91.10000000000001,91.3,91.36999999999999,91.58,91.65,91.83999999999999,92.13000000000001,92.11,92.10000000000001,92.02000000000001,91.82999999999998],"color":"green"},{"name":"anthropic","data":[7.359999999999999,7.35,8.11,8.27,8.89,9.5,9.370000000000001,9.21,9.280000000000001,9.22,9.190000000000001,9.149999999999999,9.11,9.23,9.08,8.91,8.91,8.8,8.82,8.629999999999999,8.34,8.34,8.37,8.420000000000002,8.44,8.55,8.5,8.31,8.11,8.04,7.83,7.75,7.57,7.27,7.309999999999999,7.319999999999999,7.38,7.579999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
