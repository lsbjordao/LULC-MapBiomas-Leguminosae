<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.60000000000001,66.41000000000003,65.9,65.32,64.65,64.01,63.36,62.65,62.01,61.72,61.63,61.620000000000005,62.19,62,62.05,61.88000000000001,61.460000000000015,61.290000000000006,60.78,60.41000000000001,60.059999999999995,59.96,59.74,59.780000000000015,59.88000000000001,59.97,59.80000000000001,59.440000000000005,59.11000000000001,58.8,58.519999999999996,58.74999999999999,58.599999999999994,58.589999999999996,58.62,58.68,58.65000000000001,58.76],"color":"green"},{"name":"anthropic","data":[31.599999999999998,31.77,32.29,32.88,33.55000000000001,34.190000000000005,34.86000000000001,35.550000000000004,36.2,36.49,36.58,36.599999999999994,36.01,36.2,36.14,36.349999999999994,36.74999999999999,36.89999999999999,37.42,37.78,38.15999999999999,38.269999999999996,38.45999999999999,38.43999999999999,38.34,38.25999999999999,38.41,38.76,39.089999999999996,39.4,39.690000000000005,39.44,39.59,39.620000000000005,39.57,39.49000000000001,39.550000000000004,39.410000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
