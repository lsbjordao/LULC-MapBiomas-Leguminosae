<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[89.10000000000001,89.03999999999999,88.81000000000002,88.73000000000002,88.36000000000001,88.07000000000001,87.9,87.73,87.66000000000001,87.49999999999999,87.54,87.63000000000001,87.53000000000002,87.41000000000001,87.33000000000001,87.34,87.06,86.95000000000002,86.87,86.15,85.53,85.17000000000002,84.65000000000002,84.31,84.14999999999999,83.73,83.64999999999999,82.63000000000001,81.62,81.19,81.07,80.91000000000001,80.61,80.31000000000002,79.71000000000001,78.83,78.18,77.36000000000001],"color":"green"},{"name":"anthropic","data":[10.4,10.44,10.67,10.75,11.139999999999999,11.409999999999998,11.61,11.749999999999998,11.85,11.999999999999998,11.930000000000001,11.860000000000001,11.96,12.09,12.16,12.139999999999999,12.44,12.53,12.620000000000001,13.36,13.949999999999998,14.290000000000001,14.829999999999998,15.19,15.329999999999998,15.75,15.85,16.849999999999998,17.880000000000003,18.29,18.400000000000002,18.580000000000002,18.87,19.17,19.779999999999994,20.65,21.29,22.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
