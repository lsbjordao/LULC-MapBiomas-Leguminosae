<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.220000000000006,48.220000000000006,47.07000000000001,46.33,45.4,44.629999999999995,44.09,43.629999999999995,43.21999999999999,42.89,42.95,43.25,43.660000000000004,43.620000000000005,43.82,43.7,43.28,43.14999999999999,43.01999999999999,42.779999999999994,42.96,43.169999999999995,43.1,43.019999999999996,42.49,42.309999999999995,42.18,42.089999999999996,42.3,42.41,42.57,42.779999999999994,42.559999999999995,42.510000000000005,42.44999999999999,42.31999999999999,42.49999999999999,42.82],"color":"green"},{"name":"anthropic","data":[51.32,51.32000000000001,52.470000000000006,53.190000000000005,54.13999999999999,54.900000000000006,55.46,55.93,56.33,56.660000000000004,56.59,56.28,55.89999999999999,55.919999999999995,55.73,55.87,56.279999999999994,56.38999999999999,56.53999999999999,56.77999999999999,56.589999999999996,56.38999999999999,56.45999999999999,56.53999999999999,57.05999999999998,57.239999999999995,57.37999999999999,57.47,57.239999999999995,57.13999999999999,56.959999999999994,56.77000000000001,56.99,57.05000000000001,57.12,57.25,57.04,56.73],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
