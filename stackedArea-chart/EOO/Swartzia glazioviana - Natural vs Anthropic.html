<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[24.75,23.75,23.869999999999997,24.06,23.71,23.770000000000003,23.919999999999998,23.61,23.78,24.519999999999996,25.23,25.48,25.900000000000002,26.73,27.000000000000004,27.29,27.41,28.000000000000004,28.32,28.650000000000002,29.23,29.550000000000004,29.960000000000004,30.15,30.000000000000004,29.930000000000007,29.560000000000002,29.750000000000007,29.89,30.39,30.68,31.000000000000004,31.050000000000004,31.4,31.94,32.040000000000006,31.090000000000003,31.330000000000005],"color":"green"},{"name":"anthropic","data":[57.58,58.58,58.47,58.29,58.60999999999999,58.55,58.4,58.72,58.55,57.809999999999995,57.11,56.86,56.43,55.6,55.34000000000001,55.05,54.91,54.339999999999996,54.00000000000001,53.69,53.11,52.78,52.370000000000005,52.17,52.33,52.4,52.790000000000006,52.57000000000001,52.44000000000001,51.940000000000005,51.65,51.330000000000005,51.28000000000001,50.91,50.39000000000001,50.31000000000001,51.25000000000001,51.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
