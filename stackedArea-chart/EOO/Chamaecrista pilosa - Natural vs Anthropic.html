<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.77000000000001,59.61000000000001,59.180000000000014,58.71000000000001,58.140000000000015,57.79000000000001,57.37000000000002,56.90000000000001,56.49,56.280000000000015,56.12,55.97000000000002,55.99000000000001,55.85,55.61000000000001,55.38,55.080000000000005,54.85000000000001,54.59,54.21000000000001,53.96,53.790000000000006,53.64000000000001,53.610000000000014,53.53000000000001,53.390000000000015,53.23,52.800000000000004,52.37000000000001,51.98000000000001,51.69,51.59000000000001,51.51,51.44000000000001,51.27000000000001,51.1,50.970000000000006,50.89],"color":"green"},{"name":"anthropic","data":[38.56,38.69,39.13999999999999,39.629999999999995,40.16999999999999,40.52999999999999,40.94,41.43,41.82,42.029999999999994,42.22,42.349999999999994,42.31999999999999,42.49999999999999,42.73,42.96,43.24999999999999,43.47999999999999,43.709999999999994,44.12,44.37,44.5,44.67000000000001,44.720000000000006,44.81,44.9,45.09,45.540000000000006,45.96000000000001,46.34000000000002,46.62000000000002,46.70000000000001,46.820000000000014,46.88000000000001,47.06,47.18000000000001,47.34000000000002,47.410000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
