<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.77000000000001,95.79,95.68,95.68,95.56,95.64999999999999,95.75,95.6,95.41999999999999,95.44,95.69,95.62,95.22,94.82,94.66,94.82000000000001,94.94000000000001,94.91999999999999,94.77000000000001,94.6,94.5,94.44999999999999,94.59,94.75,94.56000000000002,94.27,94.21999999999998,94.55,94.63999999999999,94.63000000000001,94.35000000000001,93.88999999999999,93.88000000000001,93.9,94.01,93.94999999999999,93.97999999999999,93.81],"color":"green"},{"name":"anthropic","data":[3.27,3.24,3.35,3.3499999999999996,3.46,3.37,3.2899999999999996,3.44,3.63,3.61,3.3499999999999996,3.43,3.8099999999999996,4.23,4.369999999999999,4.22,4.1,4.130000000000001,4.28,4.430000000000001,4.53,4.6000000000000005,4.45,4.3,4.48,4.760000000000001,4.82,4.48,4.38,4.41,4.7,5.15,5.17,5.15,5.04,5.08,5.069999999999999,5.2299999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
