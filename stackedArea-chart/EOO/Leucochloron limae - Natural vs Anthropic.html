<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.160000000000004,54.99999999999999,54.24999999999999,53.5,52.410000000000004,51.580000000000005,51.15,50.39999999999999,49.64,49.11000000000001,49.1,49.42,50.00000000000001,50.149999999999984,50.62,50.809999999999995,50.449999999999996,50.28000000000001,50.01,49.78999999999999,49.81999999999999,50.12,50.050000000000004,50.01,49.69,49.45,49.04,49.03999999999999,48.959999999999994,48.76,48.78999999999999,48.77000000000001,48.51,48.51999999999999,48.379999999999995,48.29999999999999,48.26,48.35],"color":"green"},{"name":"anthropic","data":[43.88,44.03000000000001,44.790000000000006,45.540000000000006,46.61,47.47,47.88,48.63999999999999,49.400000000000006,49.910000000000004,49.949999999999996,49.599999999999994,49.04,48.91,48.43,48.24,48.6,48.760000000000005,49.019999999999996,49.27,49.22,48.94,49.01,49.02,49.35,49.6,50.01,50.02,50.099999999999994,50.309999999999995,50.269999999999996,50.269999999999996,50.53999999999999,50.519999999999996,50.67,50.75999999999999,50.779999999999994,50.669999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
