<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.49,63.48000000000002,63.02000000000001,62.54000000000001,61.98000000000001,61.65000000000001,61.24000000000001,60.80000000000001,60.370000000000005,60.17,59.970000000000006,59.89000000000001,60.06000000000001,59.90000000000001,59.71000000000001,59.54000000000002,59.25000000000001,59.05000000000001,58.77000000000002,58.43000000000001,58.12000000000001,57.96000000000001,57.830000000000005,57.720000000000006,57.650000000000006,57.48000000000001,57.27000000000001,56.740000000000016,56.250000000000014,55.870000000000005,55.56000000000001,55.46000000000001,55.320000000000014,55.25,55.08,54.93,54.79,54.669999999999995],"color":"green"},{"name":"anthropic","data":[31.250000000000004,31.259999999999998,31.73,32.21,32.769999999999996,33.11000000000001,33.5,33.95000000000001,34.39000000000001,34.599999999999994,34.78,34.870000000000005,34.699999999999996,34.87,35.04,35.2,35.5,35.72,35.989999999999995,36.33,36.66,36.790000000000006,36.93000000000001,37.05,37.13,37.279999999999994,37.480000000000004,38.02999999999999,38.49999999999999,38.9,39.19,39.30000000000001,39.43,39.480000000000004,39.660000000000004,39.82000000000001,39.97,40.06999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
