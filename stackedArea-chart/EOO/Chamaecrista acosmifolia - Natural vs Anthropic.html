<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.99,69.80000000000001,69.45,68.87999999999998,68.14999999999999,67.75,67.19999999999997,66.63999999999999,66.03,65.66999999999999,65.26,64.99,65.05,64.82,64.6,64.39999999999999,64.05,63.69,63.29,62.830000000000005,62.42,62.21,62.00000000000001,61.85000000000001,61.76,61.57,61.28,60.580000000000005,59.97000000000001,59.400000000000006,58.96000000000001,58.78000000000001,58.56,58.45,58.22000000000001,58.04000000000001,57.77000000000002,57.58000000000001],"color":"green"},{"name":"anthropic","data":[29.39,29.560000000000002,29.930000000000003,30.480000000000004,31.210000000000004,31.630000000000006,32.18,32.75000000000001,33.33,33.7,34.10000000000001,34.37,34.30000000000001,34.54,34.760000000000005,34.96,35.290000000000006,35.660000000000004,36.06999999999999,36.49999999999999,36.94,37.15,37.33,37.510000000000005,37.59000000000001,37.77000000000002,38.07000000000001,38.750000000000014,39.37000000000001,39.940000000000005,40.38,40.55,40.78000000000001,40.89,41.129999999999995,41.290000000000006,41.550000000000004,41.739999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
