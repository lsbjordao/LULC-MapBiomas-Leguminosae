<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.27,52.89000000000001,52.25000000000001,51.58999999999999,50.919999999999995,50.470000000000006,50.010000000000005,49.44,48.98000000000001,48.580000000000005,48.120000000000005,47.730000000000004,47.53,47.239999999999995,46.96,46.660000000000004,46.41000000000001,46.13999999999999,45.790000000000006,45.44,45.22,45.09,44.980000000000004,44.87,44.83,44.70000000000001,44.580000000000005,44.28,43.97000000000001,43.71,43.54,43.48000000000002,43.40000000000001,43.330000000000005,43.209999999999994,43.050000000000004,42.90999999999999,42.87],"color":"green"},{"name":"anthropic","data":[41.3,41.660000000000004,42.319999999999986,42.99000000000001,43.67,44.1,44.580000000000005,45.129999999999995,45.57,45.99000000000001,46.43,46.83,47.05,47.32,47.62,47.9,48.16,48.419999999999995,48.76,49.11,49.33,49.470000000000006,49.58,49.67,49.74,49.83,49.980000000000004,50.290000000000006,50.580000000000005,50.84,51.01000000000002,51.07000000000001,51.15,51.21,51.38,51.51,51.690000000000005,51.70000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
