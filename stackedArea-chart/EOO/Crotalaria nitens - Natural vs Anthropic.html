<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46,45.89,45.6,45.32,45.03,44.83,44.589999999999996,44.269999999999996,43.959999999999994,43.709999999999994,43.37,43.1,42.88000000000001,42.580000000000005,42.28,42.02,41.74000000000001,41.470000000000006,41.11000000000001,40.730000000000004,40.43000000000001,40.24,40.089999999999996,39.93999999999999,39.87,39.78999999999999,39.699999999999996,39.519999999999996,39.33,39.160000000000004,38.97999999999999,38.839999999999996,38.73,38.650000000000006,38.52,38.38999999999999,38.21999999999999,37.96],"color":"green"},{"name":"anthropic","data":[10.989999999999998,11.079999999999998,11.379999999999999,11.66,11.95,12.15,12.399999999999999,12.729999999999997,13.03,13.27,13.629999999999997,13.889999999999999,14.089999999999998,14.399999999999999,14.7,14.940000000000001,15.209999999999999,15.5,15.88,16.28,16.55,16.740000000000002,16.90000000000001,17.060000000000006,17.15000000000001,17.20000000000001,17.290000000000013,17.500000000000004,17.680000000000003,17.849999999999994,18,18.160000000000004,18.280000000000005,18.360000000000003,18.480000000000004,18.600000000000005,18.770000000000003,19.01],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
