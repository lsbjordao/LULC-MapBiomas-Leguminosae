<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[26.46,26.290000000000006,25.900000000000006,25.59,25.39,25.31,25.17,25.05,25.030000000000005,25.000000000000004,24.960000000000004,24.930000000000007,24.880000000000003,24.86,24.85,24.72,24.759999999999998,24.76,24.82,24.82,24.880000000000003,24.96,25.060000000000002,25.130000000000003,25.180000000000003,25.24,25.34,25.439999999999998,25.47,25.510000000000005,25.62,25.71,25.760000000000005,25.820000000000007,25.890000000000008,25.900000000000002,26.030000000000005,26.200000000000003],"color":"green"},{"name":"anthropic","data":[43.23,43.43,43.830000000000005,44.11,44.31,44.43,44.58,44.68000000000001,44.69999999999999,44.72,44.77,44.8,44.83999999999999,44.88,44.92,45.03,44.98,44.97999999999999,44.94999999999999,44.90999999999999,44.85000000000001,44.78,44.68,44.60999999999999,44.57,44.50999999999999,44.419999999999995,44.32,44.269999999999996,44.23999999999999,44.13999999999999,44.05999999999999,43.980000000000004,43.900000000000006,43.870000000000005,43.830000000000005,43.7,43.53999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
