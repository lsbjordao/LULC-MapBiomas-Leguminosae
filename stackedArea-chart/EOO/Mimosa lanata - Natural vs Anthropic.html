<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.94999999999999,56.449999999999996,56.05,55.65,55.37,55.25,54.94,54.739999999999995,54.69999999999999,54.739999999999995,54.72999999999999,54.83,54.79999999999999,54.85,54.849999999999994,54.790000000000006,54.72,54.67999999999999,54.589999999999996,54.38999999999999,54.34,54.31999999999999,54.28999999999999,54.27000000000001,54.25000000000001,54.24999999999999,54.33,54.32000000000001,54.39,54.400000000000006,54.5,54.46999999999999,54.400000000000006,54.269999999999996,54.07,53.96,54.010000000000005,53.87999999999999],"color":"green"},{"name":"anthropic","data":[37.53,37.019999999999996,37.43999999999999,37.81999999999999,38.09999999999999,38.23,38.54,38.730000000000004,38.76,38.73,38.75,38.65,38.7,38.63000000000001,38.62,38.699999999999996,38.77,38.800000000000004,38.89,39.06,39.10000000000001,39.150000000000006,39.160000000000004,39.19,39.199999999999996,39.19,39.11,39.160000000000004,39.07,39.08,38.989999999999995,39.01,39.07,39.21,39.410000000000004,39.540000000000006,39.48,39.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
