<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.94,43.849999999999994,43.53999999999999,43.27,43.01,42.78999999999999,42.559999999999995,42.26,41.96,41.69,41.39,41.11000000000001,40.910000000000004,40.61000000000001,40.32000000000001,40.09,39.82000000000001,39.530000000000015,39.2,38.830000000000005,38.59,38.39,38.23000000000001,38.09,38.010000000000005,37.949999999999996,37.83,37.67,37.510000000000005,37.34,37.18,37.06,36.949999999999996,36.86000000000001,36.739999999999995,36.63,36.44,36.18],"color":"green"},{"name":"anthropic","data":[10.169999999999996,10.26,10.559999999999999,10.839999999999998,11.12,11.319999999999999,11.549999999999999,11.85,12.169999999999998,12.4,12.73,12.98,13.219999999999999,13.490000000000002,13.790000000000001,14.019999999999996,14.28,14.549999999999997,14.92,15.250000000000002,15.53,15.749999999999998,15.899999999999999,16.020000000000003,16.119999999999997,16.21,16.290000000000003,16.45,16.599999999999994,16.8,16.939999999999998,17.080000000000002,17.180000000000003,17.280000000000005,17.39,17.520000000000003,17.680000000000003,17.94],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
