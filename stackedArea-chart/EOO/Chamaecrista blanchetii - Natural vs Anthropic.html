<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.9,58.96000000000001,58.510000000000005,57.98000000000001,57.330000000000005,57.12000000000001,56.77,56.239999999999995,55.850000000000016,55.53000000000001,55.19000000000002,54.97000000000001,55.06,54.99,54.870000000000005,54.78000000000001,54.550000000000004,54.28999999999999,54.010000000000005,53.69999999999999,53.41,53.239999999999995,53.08,52.870000000000005,52.71,52.490000000000016,52.25000000000001,51.830000000000005,51.30000000000001,50.89000000000001,50.56000000000002,50.370000000000005,50.26,50.23,50.070000000000014,49.870000000000005,49.71000000000001,49.61000000000001],"color":"green"},{"name":"anthropic","data":[38.94,38.88,39.339999999999996,39.86,40.54,40.74999999999999,41.08,41.57999999999999,42.01999999999999,42.330000000000005,42.67,42.88999999999999,42.790000000000006,42.879999999999995,43,43.09,43.32000000000001,43.59000000000001,43.85,44.15000000000001,44.44,44.63000000000001,44.77,44.99,45.17,45.370000000000005,45.599999999999994,46.05,46.540000000000006,46.95000000000001,47.3,47.46999999999999,47.6,47.599999999999994,47.769999999999996,47.980000000000004,48.13,48.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
