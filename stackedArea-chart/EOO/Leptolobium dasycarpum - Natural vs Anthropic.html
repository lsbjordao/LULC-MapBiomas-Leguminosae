<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.54000000000003,66.21000000000004,65.49000000000001,64.78999999999999,64.07,63.519999999999996,62.99,62.25,61.61000000000001,61.06000000000001,60.330000000000005,59.79,59.379999999999995,58.85999999999999,58.28000000000001,57.78000000000001,57.260000000000005,56.75,56.029999999999994,55.34000000000001,54.839999999999996,54.47,54.27000000000001,54.07000000000001,53.910000000000004,53.769999999999996,53.6,53.279999999999994,52.89000000000001,52.580000000000005,52.27000000000001,52.14000000000001,52.010000000000005,51.89000000000001,51.73,51.54,51.23000000000001,50.96],"color":"green"},{"name":"anthropic","data":[32.11,32.42,33.129999999999995,33.849999999999994,34.569999999999986,35.09999999999999,35.64,36.359999999999985,37.00999999999999,37.58,38.27,38.85,39.25000000000001,39.760000000000005,40.35,40.85000000000001,41.330000000000005,41.879999999999995,42.6,43.269999999999996,43.76999999999999,44.149999999999984,44.33999999999999,44.55,44.7,44.83,45.03,45.32,45.720000000000006,46.040000000000006,46.34000000000002,46.45000000000002,46.600000000000016,46.70000000000002,46.89000000000002,47.07,47.37000000000001,47.650000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
