<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.68000000000001,39.300000000000004,39.040000000000006,38.74,38.57,38.370000000000005,37.940000000000005,37.46,37.09,36.949999999999996,36.56000000000001,36.28,36.150000000000006,36,35.9,35.589999999999996,35.459999999999994,35.08,34.88,34.56,34.220000000000006,34.09,33.96,33.790000000000006,33.86,33.790000000000006,33.73,33.51,33.220000000000006,32.96,32.800000000000004,32.63000000000001,32.620000000000005,32.720000000000006,32.690000000000005,32.65000000000001,32.540000000000006,32.71],"color":"green"},{"name":"anthropic","data":[60.27,60.629999999999995,60.90000000000001,61.190000000000005,61.38000000000001,61.54,62.02,62.49000000000001,62.82,62.969999999999985,63.370000000000005,63.649999999999984,63.78,63.94,64.01,64.32999999999998,64.47,64.83999999999999,65.03999999999999,65.37,65.7,65.85,65.98999999999998,66.16,66.06999999999998,66.14,66.19999999999999,66.41999999999999,66.72999999999998,66.94,67.12000000000002,67.30999999999999,67.30999999999999,67.20999999999997,67.22999999999999,67.27999999999999,67.41000000000001,67.23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
