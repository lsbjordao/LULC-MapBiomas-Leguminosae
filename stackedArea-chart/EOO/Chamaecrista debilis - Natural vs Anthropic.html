<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.88,43.519999999999996,43.080000000000005,42.64000000000001,42.220000000000006,42.13,41.83,41.510000000000005,41.260000000000005,40.99000000000001,40.63,40.4,40.190000000000005,40.00999999999999,39.78999999999999,39.52,39.39,39.14000000000001,39.019999999999996,38.88999999999999,38.859999999999985,38.830000000000005,38.830000000000005,38.769999999999996,38.67999999999999,38.58999999999999,38.509999999999984,38.349999999999994,38.089999999999996,37.859999999999985,37.709999999999994,37.589999999999996,37.599999999999994,37.699999999999996,37.66,37.620000000000005,37.550000000000004,37.69],"color":"green"},{"name":"anthropic","data":[55.729999999999976,56.08,56.55,56.94999999999999,57.37,57.48,57.760000000000005,58.09,58.339999999999996,58.59,58.940000000000005,59.18,59.39000000000001,59.589999999999996,59.8,60.089999999999996,60.199999999999996,60.45,60.580000000000005,60.720000000000006,60.75,60.769999999999996,60.76999999999999,60.81,60.9,60.99999999999999,61.07999999999999,61.21999999999999,61.49000000000001,61.73000000000001,61.870000000000005,61.99,61.96,61.9,61.90999999999999,61.98,62.019999999999996,61.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
