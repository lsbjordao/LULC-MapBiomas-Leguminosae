<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.64,74.42,73.78,73.14999999999999,72.55000000000001,72.06,71.55000000000001,70.87,70.23,69.69,69.03999999999999,68.47000000000001,68.03000000000002,67.46000000000001,66.91000000000001,66.46,65.94000000000001,65.4,64.7,63.99000000000001,63.450000000000024,63.080000000000005,62.790000000000006,62.49000000000001,62.35,62.190000000000005,62.01,61.70000000000002,61.35000000000001,61.00000000000001,60.7,60.459999999999994,60.26,60.11000000000001,59.88999999999999,59.67,59.32,58.86999999999999],"color":"green"},{"name":"anthropic","data":[22.89,23.109999999999996,23.759999999999994,24.41,25.010000000000005,25.470000000000002,25.970000000000002,26.680000000000007,27.310000000000002,27.860000000000014,28.570000000000004,29.070000000000004,29.540000000000003,30.12,30.659999999999997,31.11,31.64,32.16,32.85,33.57,34.09,34.52,34.77,35.040000000000006,35.21999999999999,35.349999999999994,35.540000000000006,35.84,36.21000000000001,36.540000000000006,36.86000000000001,37.11,37.31,37.440000000000005,37.690000000000005,37.91999999999999,38.239999999999995,38.699999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
