<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.22999999999999,97.27,97.16999999999999,97.08000000000001,97.11000000000001,97.07,97.03000000000002,96.9,96.75,96.61,96.25999999999999,96.10000000000001,95.81,95.59,95.61000000000001,95.53,95.15,95.02999999999999,94.95,94.76,94.54,94.36999999999999,94.33,94.31,94.19,94.13000000000001,94.19,94.27,94.14999999999999,94.02,93.74999999999999,93.35000000000001,93.28,93.28,93.30999999999999,93.24,93.1,92.64],"color":"green"},{"name":"anthropic","data":[1.6,1.58,1.6800000000000002,1.75,1.73,1.77,1.81,1.9500000000000002,2.0999999999999996,2.2299999999999995,2.5799999999999996,2.7399999999999998,3.03,3.23,3.2399999999999998,3.3199999999999994,3.6799999999999997,3.7899999999999996,3.8899999999999997,4.09,4.31,4.4799999999999995,4.51,4.529999999999999,4.6499999999999995,4.71,4.65,4.5600000000000005,4.69,4.829999999999999,5.09,5.49,5.569999999999999,5.57,5.530000000000001,5.61,5.74,6.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
