<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.28,33.010000000000005,32.59,32.260000000000005,32.02,31.90000000000001,31.730000000000008,31.610000000000007,31.570000000000007,31.540000000000006,31.49000000000001,31.440000000000005,31.370000000000008,31.310000000000006,31.240000000000013,31.060000000000006,31.090000000000007,31.07000000000001,31.120000000000008,31.180000000000003,31.250000000000007,31.360000000000003,31.420000000000005,31.490000000000006,31.54000000000001,31.640000000000004,31.760000000000005,31.86000000000001,31.880000000000003,31.910000000000007,32.03000000000001,32.15,32.24,32.31000000000001,32.36000000000001,32.38,32.50000000000001,32.690000000000005],"color":"green"},{"name":"anthropic","data":[53.34,53.57,54.00000000000001,54.349999999999994,54.57999999999999,54.699999999999996,54.879999999999995,54.99999999999999,55.04,55.05,55.15,55.19,55.260000000000005,55.31999999999999,55.38999999999999,55.55999999999999,55.529999999999994,55.54999999999999,55.52,55.45,55.349999999999994,55.28000000000001,55.2,55.14,55.099999999999994,54.97999999999999,54.86,54.760000000000005,54.75,54.699999999999996,54.599999999999994,54.49999999999999,54.41999999999999,54.31999999999999,54.27999999999999,54.260000000000005,54.09999999999999,53.929999999999986],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
