<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.239999999999995,48.69,48.2,47.65,46.9,46.559999999999995,46.349999999999994,46.38,46.32,46.28,45.970000000000006,45.64,45.49,45.46,45.38,45.330000000000005,45.18,45.089999999999996,44.85,44.71,44.519999999999996,44.480000000000004,44.45,44.35999999999999,44.3,44.239999999999995,44.16,44.25,44.269999999999996,44.150000000000006,44.18000000000001,44.14,44.129999999999995,44.08,43.81000000000001,43.7,43.64,43.37],"color":"green"},{"name":"anthropic","data":[54.97,55.53,56.01,56.559999999999995,57.31,57.66,57.85,57.84,57.9,57.93000000000001,58.24000000000001,58.57000000000001,58.730000000000004,58.76,58.849999999999994,58.88,59.03,59.129999999999995,59.36,59.50000000000001,59.69,59.73,59.760000000000005,59.87,59.92000000000001,59.97,60.06000000000001,59.96,59.95000000000001,60.07,60.040000000000006,60.07,60.08,60.129999999999995,60.4,60.52,60.55,60.83999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
