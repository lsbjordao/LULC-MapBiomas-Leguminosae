<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[58.86000000000001,57.98,57.839999999999996,57.00999999999999,56.94,57.11,56.81999999999999,56.67,56.410000000000004,56.34,56.190000000000005,56.190000000000005,56.300000000000004,56.30000000000001,56.129999999999995,55.85,55.6,55.10000000000001,54.660000000000004,54.24,54.040000000000006,53.709999999999994,53.38,53.17,53.11999999999999,52.88999999999999,52.67999999999999,52.57,52.37,52.24000000000001,52.3,52.14999999999999,52.17,52.28,52.190000000000005,52.07000000000001,51.96,51.96000000000001],"color":"green"},{"name":"anthropic","data":[40.90999999999999,41.769999999999996,41.92999999999999,42.76,42.809999999999995,42.65,42.940000000000005,43.11,43.38,43.45,43.6,43.57,43.46000000000001,43.440000000000005,43.629999999999995,43.92000000000001,44.160000000000004,44.67,45.11,45.53,45.73000000000001,46.040000000000006,46.38,46.620000000000005,46.650000000000006,46.89,47.05,47.18000000000001,47.4,47.54,47.47,47.62,47.59000000000001,47.47999999999999,47.57999999999999,47.699999999999996,47.79,47.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
