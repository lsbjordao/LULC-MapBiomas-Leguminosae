<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.26000000000002,91.06000000000002,90.67000000000002,90.22000000000003,89.73,89.42000000000002,88.88000000000001,88.13000000000002,87.35000000000001,86.34000000000002,84.98,83.69000000000003,82.60000000000002,81.39,79.99000000000002,78.96000000000001,77.92000000000002,76.50000000000001,74.62000000000002,72.85000000000001,71.59,70.81,70.34000000000002,69.88000000000001,69.73,69.59000000000002,69.27000000000002,69.02000000000002,68.62,68.22,67.77,67.38000000000001,66.99000000000001,66.58000000000001,65.96000000000001,65.49,64.81,63.789999999999985],"color":"green"},{"name":"anthropic","data":[8.33,8.52,8.929999999999998,9.370000000000001,9.860000000000001,10.19,10.7,11.469999999999999,12.25,13.25,14.61,15.9,17,18.220000000000006,19.610000000000007,20.640000000000004,21.660000000000004,23.1,24.970000000000002,26.750000000000004,28.010000000000005,28.790000000000003,29.240000000000006,29.680000000000003,29.869999999999997,30,30.319999999999997,30.560000000000002,30.950000000000003,31.35,31.810000000000002,32.209999999999994,32.61,33.019999999999996,33.629999999999995,34.089999999999996,34.78,35.809999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
