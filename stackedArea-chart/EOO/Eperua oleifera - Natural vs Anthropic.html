<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.18,99.19,99.18,99.17999999999999,99.19,99.2,99.23,99.19999999999999,99.14,99.14999999999999,99.19,99.16,99.08999999999999,98.97000000000001,98.89,98.94000000000001,98.97,98.98,98.96000000000001,98.91999999999999,98.89,98.83000000000001,98.85,98.88000000000001,98.80999999999999,98.74000000000001,98.74,98.78999999999999,98.77,98.74,98.61999999999999,98.45,98.44,98.47999999999998,98.51,98.52,98.47000000000001,98.30999999999999],"color":"green"},{"name":"anthropic","data":[0.47,0.44999999999999996,0.45999999999999996,0.47,0.45999999999999996,0.44,0.42,0.46,0.5,0.5,0.46,0.49,0.56,0.6900000000000001,0.76,0.71,0.6699999999999999,0.6699999999999999,0.69,0.72,0.76,0.81,0.79,0.78,0.8300000000000001,0.9199999999999999,0.9099999999999999,0.8600000000000001,0.8700000000000001,0.9000000000000001,1.02,1.1900000000000002,1.2100000000000002,1.1600000000000001,1.12,1.1400000000000001,1.1900000000000002,1.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
