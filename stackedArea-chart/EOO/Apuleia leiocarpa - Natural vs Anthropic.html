<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.17999999999999,76.99,76.42000000000002,75.86,75.32000000000001,74.94,74.51,73.93000000000002,73.45000000000002,72.97,72.39000000000001,71.92999999999999,71.51,70.99000000000001,70.50000000000001,70.06,69.61999999999999,69.16000000000001,68.54,67.95000000000002,67.49000000000001,67.17000000000002,66.90999999999998,66.64999999999999,66.53,66.35,66.12,65.86,65.55999999999999,65.29,65.02000000000001,64.78,64.58000000000001,64.41000000000001,64.05000000000001,63.80000000000001,63.440000000000005,62.93000000000001],"color":"green"},{"name":"anthropic","data":[22.12,22.34,22.93,23.480000000000004,23.99000000000001,24.400000000000006,24.81000000000001,25.400000000000002,25.900000000000002,26.35,26.930000000000007,27.390000000000008,27.820000000000004,28.330000000000013,28.830000000000005,29.25,29.67,30.15000000000001,30.77,31.370000000000008,31.84,32.16,32.44,32.690000000000005,32.81000000000001,32.97,33.23000000000001,33.49,33.77,34.04,34.28,34.56,34.76000000000001,34.92000000000001,35.27000000000001,35.490000000000016,35.890000000000015,36.38],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
