<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.12,76.28,76.55999999999999,75.65,75.6,74.94000000000001,73.89,73.03,71.8,71.27000000000001,70.5,70.57000000000001,70.1,69.58,69.44,68.78999999999999,68.07000000000001,67.16,66.12,65.44,64.63000000000001,63.76000000000001,62.93,62.02,61.480000000000004,60.61,60.30999999999999,60.35,60.38,60.28,60.23,59.84,59.16,58.739999999999995,58.080000000000005,57.709999999999994,57.7,57.77],"color":"green"},{"name":"anthropic","data":[22.34,23.17,22.9,23.8,23.87,24.509999999999998,25.549999999999997,26.42,27.65,28.159999999999997,28.94,28.89,29.35,29.88,30.009999999999998,30.659999999999997,31.39,32.29,33.34,34.01,34.82,35.69,36.519999999999996,37.44,37.99,38.849999999999994,39.13,39.089999999999996,39.059999999999995,39.17,39.21,39.599999999999994,40.28999999999999,40.72,41.37,41.75000000000001,41.760000000000005,41.68],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
