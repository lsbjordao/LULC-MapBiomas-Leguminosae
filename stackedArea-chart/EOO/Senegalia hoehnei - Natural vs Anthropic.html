<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.37000000000001,51.13000000000002,50.690000000000005,50.24,49.76000000000001,49.500000000000014,49.170000000000016,48.780000000000015,48.40000000000001,48.09000000000001,47.720000000000006,47.41,47.24,47.030000000000015,46.82,46.62000000000002,46.40000000000001,46.13000000000001,45.86000000000001,45.47000000000002,45.19000000000001,44.98000000000001,44.82000000000001,44.70000000000001,44.53000000000001,44.38000000000002,44.210000000000015,43.85000000000001,43.48000000000001,43.10000000000001,42.82000000000001,42.67000000000001,42.52000000000001,42.43000000000001,42.25,42.040000000000006,41.900000000000006,41.760000000000005],"color":"green"},{"name":"anthropic","data":[45.970000000000006,46.21,46.649999999999984,47.08999999999999,47.54999999999999,47.83,48.16,48.53,48.900000000000006,49.21999999999999,49.599999999999994,49.940000000000005,50.089999999999996,50.28,50.48,50.68999999999999,50.93,51.199999999999996,51.449999999999996,51.84,52.11000000000001,52.339999999999996,52.49,52.63999999999999,52.78999999999999,52.95,53.11,53.449999999999996,53.84000000000001,54.19000000000001,54.47,54.630000000000024,54.78,54.86,55.059999999999995,55.26,55.440000000000005,55.57],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
