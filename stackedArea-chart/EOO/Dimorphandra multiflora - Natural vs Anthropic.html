<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.68999999999998,97.77000000000002,97.67999999999999,97.57000000000001,97.62000000000003,97.60000000000002,97.59,97.42,97.33000000000001,97.28000000000002,96.89,96.80000000000001,96.66000000000001,96.38000000000001,96.31000000000003,96.26,96.16,96.03,96.02000000000001,95.92999999999999,95.83000000000001,95.8,95.84,95.73000000000002,95.64000000000001,95.7,95.75000000000001,95.75000000000001,95.67,95.53000000000002,95.38,95.18,95.11000000000001,95.11000000000001,95.1,95.1,95.16,94.82],"color":"green"},{"name":"anthropic","data":[1.9000000000000001,1.84,1.9300000000000002,2.0299999999999994,1.9700000000000002,1.9900000000000002,2,2.1799999999999997,2.2699999999999996,2.32,2.71,2.7999999999999994,2.94,3.2100000000000004,3.2900000000000005,3.34,3.44,3.58,3.59,3.6699999999999995,3.7499999999999996,3.79,3.76,3.8800000000000003,3.97,3.9,3.86,3.8499999999999996,3.9299999999999997,4.08,4.209999999999999,4.42,4.47,4.4799999999999995,4.489999999999999,4.4799999999999995,4.429999999999999,4.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
