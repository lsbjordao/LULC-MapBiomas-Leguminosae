<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.390000000000004,28.93,28.489999999999995,29.12,28.42,27.969999999999995,27.95,27.429999999999996,27.310000000000002,27.31,27.219999999999995,27.25,26.639999999999997,26.54,26.2,25.74,25.610000000000003,25.650000000000002,25.450000000000003,25.270000000000003,25.550000000000004,25.54,25.28,25.269999999999996,25.539999999999996,25.799999999999997,25.85,25.789999999999992,25.44,25.349999999999998,25.95,25.950000000000003,26.329999999999995,26.530000000000005,26.639999999999993,26.490000000000002,26.640000000000004,26.84],"color":"green"},{"name":"anthropic","data":[69.07,70.52000000000001,70.97,70.33999999999997,71.02999999999999,71.48999999999998,71.49999999999999,72.03,72.16,72.13999999999999,72.22999999999999,72.19,72.82000000000001,72.92,73.26000000000002,73.74000000000001,73.84000000000002,73.8,74.02,74.18,73.88999999999999,73.9,74.18000000000002,74.17999999999999,73.92,73.67,73.61,73.64,74.03000000000003,74.10000000000001,73.51,73.49000000000002,73.13000000000002,72.92,72.82000000000002,72.99000000000002,72.81000000000002,72.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
