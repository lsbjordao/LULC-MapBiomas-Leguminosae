<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.55000000000001,98.58000000000001,98.53000000000002,98.50000000000001,98.52000000000002,98.5,98.50000000000001,98.41000000000003,98.33000000000001,98.30000000000003,98.13000000000001,98.07000000000002,97.94000000000001,97.74000000000001,97.68,97.65,97.59,97.52,97.50000000000001,97.44000000000003,97.35000000000001,97.29,97.32000000000002,97.33000000000001,97.27000000000001,97.29000000000003,97.32000000000001,97.34000000000002,97.28000000000002,97.20000000000002,97.08,96.9,96.88000000000002,96.9,96.89000000000001,96.88000000000001,96.88000000000001,96.67000000000003],"color":"green"},{"name":"anthropic","data":[1.01,0.99,1.03,1.07,1.03,1.08,1.07,1.1500000000000001,1.23,1.26,1.4300000000000002,1.4800000000000002,1.61,1.81,1.87,1.9100000000000001,1.9900000000000002,2.04,2.06,2.1299999999999994,2.2199999999999998,2.2699999999999996,2.2399999999999998,2.2299999999999995,2.2899999999999996,2.2799999999999994,2.2399999999999993,2.2099999999999995,2.2799999999999994,2.3699999999999997,2.4799999999999995,2.6599999999999997,2.69,2.68,2.66,2.68,2.6700000000000004,2.8800000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
