<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.99000000000001,75.53999999999999,75.93,75.91000000000001,76.12,76.49,76.36000000000001,76.04,75.82000000000001,75.36,74.93,74.53999999999999,74.6,75.28999999999999,75.49,75.6,75.35,74.97000000000001,74.53999999999999,74.25,74.55999999999999,74.66,74.78,74.69,74.69999999999999,74.70000000000002,75.10000000000001,75.25,74.67999999999999,74.17,73.60000000000001,72.92,72.83,72.65,72.49000000000001,73.23,73.27,73.57999999999998],"color":"green"},{"name":"anthropic","data":[22.080000000000002,21.530000000000005,21.150000000000002,21.17,20.959999999999997,20.590000000000003,20.72,21.04,21.27,21.72,22.15,22.52,22.49,21.779999999999998,21.580000000000002,21.490000000000002,21.730000000000004,22.130000000000003,22.53,22.840000000000003,22.53,22.44,22.299999999999997,22.39,22.38,22.38,22.000000000000004,21.82,22.4,22.91,23.47,24.14,24.269999999999996,24.439999999999998,24.599999999999998,23.849999999999998,23.81,23.509999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
