<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.72000000000003,73.46000000000002,72.85000000000002,72.24000000000001,71.54000000000002,71.00000000000001,70.43000000000002,69.67,68.91000000000001,68.32000000000002,67.63000000000002,67.08000000000001,66.76,66.25,65.64,65.16,64.61,64.00999999999999,63.22,62.44,61.87,61.489999999999995,61.18999999999999,60.92999999999999,60.78999999999999,60.55999999999999,60.269999999999996,59.75999999999999,59.219999999999985,58.73999999999999,58.319999999999986,58.1,57.900000000000006,57.77,57.54,57.32,57.010000000000005,56.75],"color":"green"},{"name":"anthropic","data":[26.370000000000005,26.650000000000006,27.250000000000004,27.860000000000003,28.560000000000002,29.110000000000003,29.67,30.400000000000002,31.15,31.769999999999996,32.46000000000001,33,33.32,33.84,34.44000000000001,34.94,35.489999999999995,36.07,36.87,37.63,38.230000000000004,38.59,38.879999999999995,39.13999999999999,39.290000000000006,39.519999999999996,39.800000000000004,40.34000000000001,40.86000000000001,41.33,41.780000000000015,41.980000000000004,42.180000000000014,42.32,42.55,42.76999999999999,43.089999999999996,43.34],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
