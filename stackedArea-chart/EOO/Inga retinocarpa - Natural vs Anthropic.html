<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[99.32000000000002,99.29,99.24,99.23000000000002,99.25,99.29,99.27,99.23999999999998,99.23,99.20000000000002,99.2,99.21,99.21000000000002,99.2,99.22,99.24000000000001,99.24000000000001,99.22000000000001,99.2,99.2,99.2,99.19000000000001,99.21000000000001,99.17999999999999,99.14000000000001,99.12000000000002,99.14000000000001,99.17,99.18,99.16,99.17,99.18,99.2,99.21000000000002,99.21,99.22000000000001,99.17,99.16000000000001],"color":"green"},{"name":"anthropic","data":[0.1,0.12000000000000001,0.18,0.19,0.16999999999999998,0.13,0.14,0.18,0.2,0.24,0.24,0.22000000000000003,0.23,0.24,0.22000000000000003,0.2,0.21,0.22,0.24,0.23,0.25,0.24,0.23,0.25,0.29000000000000004,0.3,0.29000000000000004,0.27,0.25,0.27,0.27,0.26,0.24,0.21,0.22,0.23,0.26,0.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
