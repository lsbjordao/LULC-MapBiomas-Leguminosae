<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.35999999999999,55.12,55.35999999999999,54.02000000000001,53.599999999999994,53.27000000000001,52.690000000000005,51.83,50.9,50.970000000000006,51.18000000000001,52.04999999999999,51.76,51.80999999999999,49.08,46.97999999999999,45.86,44.98,44.49,43.339999999999996,41.67999999999999,41.23,41.46,42.43999999999999,42.81999999999999,42.35999999999999,41.94999999999999,41.92000000000001,41.73999999999999,42.49,42.910000000000004,43.24,43.17,43.33000000000001,43.34,43.949999999999996,43.38,44.31999999999999],"color":"green"},{"name":"anthropic","data":[44.01,44.29,44.05,45.370000000000005,45.8,46.13,46.72,47.58,48.51,48.45,48.230000000000004,47.36,47.64,47.599999999999994,50.32,52.43,53.53,54.43,54.92,56.06,57.72,58.17,57.93,56.959999999999994,56.599999999999994,57.04,57.46,57.48,57.68,56.93,56.5,56.18,56.25,56.08,56.08,55.480000000000004,56.04,55.09],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
