<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.980000000000004,63.87999999999999,62.4,59.160000000000004,58.040000000000006,57.08,54.08,53.12,52.68,52.800000000000004,52.75,51.53,50.620000000000005,50.22,49.74,49.190000000000005,48.800000000000004,48.22,48.169999999999995,47.779999999999994,47.71,48.05,48.160000000000004,48.05,48.21,48.36,48.42000000000001,48.61,48.66,48.88,49.39999999999999,49.410000000000004,49.669999999999995,49.72,50.11,50.24,50.17,50.949999999999996],"color":"green"},{"name":"anthropic","data":[35.37,35.47,36.95,40.19,41.31,42.27,45.27,46.23,46.67,46.56999999999999,46.60000000000001,47.84,48.72,49.129999999999995,49.60999999999999,50.14999999999999,50.550000000000004,51.129999999999995,51.169999999999995,51.550000000000004,51.629999999999995,51.290000000000006,51.18,51.3,51.14,50.989999999999995,50.92999999999999,50.74999999999999,50.68999999999999,50.47,49.94,49.94,49.69,49.629999999999995,49.239999999999995,49.11,49.2,48.41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
