<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.69000000000003,97.73,97.61000000000001,97.53999999999999,97.58000000000001,97.49000000000001,97.45000000000002,97.27,97.06,96.89000000000001,96.39000000000003,96.14999999999999,95.84,95.62,95.7,95.64,95.36,95.23,95.16000000000001,94.96000000000001,94.77000000000001,94.65,94.63000000000001,94.51000000000002,94.39000000000001,94.47000000000001,94.54,94.55000000000001,94.37,94.19000000000001,93.98,93.67,93.57000000000002,93.52000000000001,93.41,93.24000000000001,93.03999999999999,92.59],"color":"green"},{"name":"anthropic","data":[1.76,1.74,1.86,1.9600000000000002,1.8900000000000001,1.98,2.03,2.2199999999999998,2.4099999999999997,2.59,3.09,3.34,3.63,3.8499999999999996,3.7699999999999996,3.8399999999999994,4.109999999999999,4.239999999999999,4.3199999999999985,4.52,4.6899999999999995,4.819999999999999,4.839999999999999,4.959999999999999,5.069999999999999,4.989999999999999,4.94,4.94,5.11,5.3,5.5,5.81,5.909999999999999,5.94,6.07,6.24,6.449999999999999,6.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
