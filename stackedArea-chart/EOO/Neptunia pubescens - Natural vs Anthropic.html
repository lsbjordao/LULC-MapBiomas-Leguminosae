<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.6,84.66999999999999,83.92000000000002,82.48,82.15,83.27,82.99,81.41000000000001,82.01000000000002,82.07999999999998,79.44,80.17999999999999,80.49000000000001,78.4,78.5,77.94,76.93,77.10999999999999,76.48,75.63,74.32999999999998,71.99,74.35000000000001,74.87000000000002,76.06000000000002,74.16,75.28999999999999,75.82,77.03999999999999,76.21,74.09999999999998,75.31000000000002,74.41,74.62,73.99,74.55999999999999,74.52,74.29000000000002],"color":"green"},{"name":"anthropic","data":[13.23,14.139999999999999,14.909999999999998,16.36,16.68,15.56,15.830000000000002,17.44,16.830000000000002,16.75,19.419999999999998,18.65,18.35,20.43,20.340000000000003,20.910000000000004,21.930000000000003,21.740000000000002,22.380000000000003,23.229999999999997,24.529999999999998,26.86,24.48,23.97,22.78,24.68,23.550000000000004,23.03,21.79,22.64,24.75,23.540000000000003,24.45,24.240000000000002,24.86,24.29,24.31,24.54],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
