<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.42999999999999,53.459999999999994,52.65999999999998,52.199999999999996,51.88999999999999,51.80000000000001,51.42000000000001,51.02000000000001,50.88,50.62,50.54,50.679999999999986,50.56999999999999,50.6,50.589999999999996,50.199999999999996,50.04,50.01,49.919999999999995,49.85,50.239999999999995,50.449999999999996,50.63,50.739999999999995,50.44,50.349999999999994,50.26,50.18,50.2,50.17000000000001,50.17000000000001,50.26,50.28,50.27,50.18000000000001,50.03,50.00000000000001,50.35999999999999],"color":"green"},{"name":"anthropic","data":[50.66,50.639999999999986,51.419999999999995,51.87999999999999,52.209999999999994,52.29999999999998,52.65999999999999,53.06999999999999,53.219999999999985,53.47,53.53999999999999,53.399999999999984,53.529999999999994,53.489999999999995,53.50999999999999,53.88,54.03999999999999,54.07,54.15999999999999,54.23,53.84,53.629999999999995,53.44,53.36,53.66,53.74999999999999,53.839999999999996,53.9,53.879999999999995,53.92999999999999,53.90999999999999,53.819999999999986,53.80999999999999,53.849999999999994,53.92999999999999,54.05,54.08999999999999,53.759999999999984],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
