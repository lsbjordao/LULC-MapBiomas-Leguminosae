<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.780000000000015,56.36000000000001,55.59,54.85,54.06000000000001,53.51000000000001,52.98000000000001,52.31000000000002,51.68,51.02,50.330000000000005,49.76,49.300000000000004,48.85,48.400000000000006,47.989999999999995,47.64,47.22,46.63,46.17000000000001,45.830000000000005,45.62000000000001,45.470000000000006,45.30000000000001,45.19000000000001,45.08000000000001,44.93,44.7,44.42000000000001,44.11000000000001,43.92000000000001,43.780000000000015,43.69,43.64,43.51,43.36,43.18,43.040000000000006],"color":"green"},{"name":"anthropic","data":[41.78,42.209999999999994,42.98999999999999,43.72,44.519999999999996,45.04,45.59,46.24999999999999,46.879999999999995,47.510000000000005,48.22999999999999,48.790000000000006,49.22,49.68,50.129999999999995,50.54999999999999,50.900000000000006,51.31999999999999,51.89999999999999,52.379999999999995,52.699999999999996,52.94000000000002,53.07,53.24,53.350000000000016,53.480000000000004,53.63000000000002,53.85000000000001,54.11999999999999,54.44,54.6,54.77,54.86000000000001,54.910000000000004,55.03,55.180000000000014,55.35,55.50000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
