<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[77.19999999999999,76.99,76.44999999999999,75.91,75.41000000000003,75.04,74.64000000000001,74.08,73.57000000000001,73.10000000000001,72.54,72.09,71.68,71.22000000000001,70.74000000000001,70.33000000000001,69.9,69.45,68.87,68.29,67.85000000000002,67.51000000000002,67.28000000000002,67.04,66.9,66.77,66.60000000000001,66.34,66.07000000000001,65.81,65.54999999999998,65.28999999999999,65.11999999999999,64.93999999999998,64.69999999999999,64.45,64.08999999999999,63.65],"color":"green"},{"name":"anthropic","data":[21.800000000000004,22,22.56,23.080000000000002,23.570000000000007,23.93000000000001,24.340000000000003,24.890000000000004,25.410000000000004,25.88000000000001,26.420000000000012,26.890000000000008,27.290000000000006,27.770000000000007,28.24,28.67,29.069999999999997,29.550000000000004,30.130000000000003,30.690000000000005,31.150000000000006,31.450000000000003,31.729999999999997,31.959999999999997,32.07000000000001,32.21000000000001,32.400000000000006,32.67,32.910000000000004,33.17,33.46,33.69,33.87000000000001,34.03000000000001,34.32000000000001,34.53000000000001,34.90000000000001,35.330000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
