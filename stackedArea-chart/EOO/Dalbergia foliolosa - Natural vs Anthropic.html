<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.67000000000002,66.36000000000001,65.73,65.11999999999999,64.53999999999999,64.14999999999999,63.739999999999995,63.120000000000005,62.57,62.019999999999996,61.339999999999996,60.779999999999994,60.309999999999995,59.87,59.39,58.96999999999999,58.54,58.06,57.43,56.830000000000005,56.42000000000001,56.12999999999999,55.93999999999998,55.74,55.60000000000001,55.47,55.339999999999996,55.16,54.9,54.62,54.41,54.23,54.099999999999994,53.99999999999999,53.79,53.57999999999999,53.279999999999994,53.010000000000005],"color":"green"},{"name":"anthropic","data":[32.26,32.589999999999996,33.23,33.82,34.39,34.82,35.22,35.82999999999999,36.379999999999995,36.94000000000001,37.60000000000001,38.17000000000001,38.62000000000001,39.09,39.550000000000004,39.97,40.4,40.88000000000001,41.5,42.10999999999999,42.51999999999999,42.77999999999999,43,43.199999999999996,43.339999999999996,43.45,43.6,43.77000000000001,44.04,44.33000000000001,44.510000000000005,44.690000000000005,44.83,44.919999999999995,45.129999999999995,45.34000000000001,45.66,45.90000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
