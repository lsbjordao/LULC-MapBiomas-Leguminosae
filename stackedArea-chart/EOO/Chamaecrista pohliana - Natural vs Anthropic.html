<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.489999999999995,62.52,62.29,61.93,61.300000000000004,60.89000000000001,60.49000000000001,59.989999999999995,59.49,59.13999999999999,58.620000000000005,58.11000000000001,57.64000000000001,57.17,56.639999999999986,56.14,55.71,55.25,54.849999999999994,54.14999999999999,53.65,53.239999999999995,52.9,52.49,52.230000000000004,51.809999999999995,51.45,50.79999999999999,50.19000000000001,49.720000000000006,49.41,49.260000000000005,49.07,48.93,48.589999999999996,48.239999999999995,47.87,47.529999999999994],"color":"green"},{"name":"anthropic","data":[36.129999999999995,36.089999999999996,36.32999999999999,36.7,37.32999999999999,37.709999999999994,38.13999999999999,38.61999999999999,39.11999999999999,39.459999999999994,39.97999999999999,40.49,40.93999999999999,41.41,41.959999999999994,42.46000000000001,42.87,43.339999999999996,43.74000000000001,44.45000000000002,44.95000000000001,45.36000000000001,45.70000000000001,46.09,46.36000000000002,46.750000000000014,47.140000000000015,47.800000000000004,48.410000000000004,48.85,49.160000000000004,49.36,49.510000000000005,49.66000000000001,49.99000000000001,50.339999999999996,50.71,51.050000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
