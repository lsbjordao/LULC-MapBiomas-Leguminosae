<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.879999999999995,44.40999999999999,43.69000000000001,42.999999999999986,42.289999999999985,41.78999999999999,41.27999999999999,40.63,40.089999999999996,39.6,39.1,38.75999999999999,38.47,38.239999999999995,37.959999999999994,37.67999999999999,37.48,37.21999999999999,36.91,36.65999999999999,36.51,36.449999999999996,36.379999999999995,36.33,36.300000000000004,36.26000000000001,36.190000000000005,36.07,35.92,35.75,35.709999999999994,35.64000000000001,35.61000000000001,35.629999999999995,35.56,35.49000000000001,35.4,35.50000000000001],"color":"green"},{"name":"anthropic","data":[51.00000000000002,51.429999999999986,52.16,52.87999999999998,53.56999999999998,54.059999999999995,54.56999999999999,55.25,55.78999999999999,56.24999999999998,56.76,57.12999999999999,57.370000000000005,57.61999999999999,57.88999999999999,58.15999999999999,58.36999999999999,58.63,58.940000000000005,59.190000000000005,59.35000000000001,59.420000000000016,59.46000000000001,59.510000000000005,59.54000000000001,59.61,59.65000000000001,59.790000000000006,59.94000000000001,60.10000000000001,60.16000000000001,60.20000000000001,60.27,60.24000000000001,60.3,60.37,60.46,60.39],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
