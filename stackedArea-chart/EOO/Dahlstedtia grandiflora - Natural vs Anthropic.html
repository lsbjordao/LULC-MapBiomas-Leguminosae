<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[37.440000000000005,38.24,37.940000000000005,38.269999999999996,38.42,38.63,38.58,39.199999999999996,40.09,40.480000000000004,40.440000000000005,40.3,40.72000000000001,40.809999999999995,40.49999999999999,40.72,40.90999999999999,41.209999999999994,41.56,41.519999999999996,41.56,41.67,41.99,41.99,42.13,42.21999999999999,42.50000000000001,42.559999999999995,42.629999999999995,42.68,42.74,42.78999999999999,42.879999999999995,42.95,42.809999999999995,42.86000000000001,43.39,43.29],"color":"green"},{"name":"anthropic","data":[61.11,60.31999999999999,60.6,60.269999999999996,60.14,59.92,59.97,59.34,58.45,58.059999999999995,58.1,58.239999999999995,57.83,57.739999999999995,58.05,57.83,57.64,57.339999999999996,56.99,57.03,56.980000000000004,56.870000000000005,56.55,56.56,56.43,56.33,56.06,55.99,55.92,55.870000000000005,55.82000000000001,55.77,55.67,55.59,55.72,55.69,55.17,55.26],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
