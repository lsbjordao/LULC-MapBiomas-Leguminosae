<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.290000000000003,28.99,28.639999999999997,28.519999999999996,28.360000000000003,28.250000000000007,28.180000000000007,28.240000000000002,28.330000000000002,28.43,28.56,28.67,28.790000000000003,28.770000000000003,28.75,28.609999999999996,28.61,28.560000000000002,28.510000000000005,28.520000000000003,28.560000000000002,28.68,28.8,28.91,29.13,29.35,29.58,29.699999999999996,29.819999999999997,29.9,30.059999999999995,30.149999999999995,30.339999999999996,30.439999999999998,30.509999999999998,30.59,30.799999999999997,30.909999999999997],"color":"green"},{"name":"anthropic","data":[68.05000000000001,68.34000000000002,68.69000000000001,68.81000000000002,68.97000000000001,69.10000000000002,69.17000000000002,69.09,69.01,68.91000000000001,68.78000000000002,68.67000000000002,68.55000000000001,68.55000000000001,68.57000000000001,68.73,68.73,68.78000000000002,68.82000000000001,68.83000000000001,68.80000000000001,68.64000000000001,68.55000000000001,68.42000000000002,68.23000000000002,68.02000000000001,67.77000000000001,67.62000000000002,67.53000000000002,67.44000000000003,67.28,67.19000000000001,67,66.90000000000002,66.83000000000001,66.74000000000001,66.52999999999999,66.43999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
