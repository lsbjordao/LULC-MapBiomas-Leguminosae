<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[27.099999999999998,26.599999999999994,26.160000000000004,25.51,25.179999999999996,24.99,24.720000000000002,24.659999999999997,24.519999999999996,24.419999999999998,24.59,24.619999999999997,24.51,24.569999999999997,24.489999999999995,24.339999999999993,24.39,24.27,24.189999999999998,24.13,24.130000000000006,24.14,24.160000000000004,24.290000000000006,24.369999999999997,24.550000000000008,24.69,24.790000000000006,24.960000000000004,25.120000000000008,25.40000000000001,25.550000000000008,25.67,25.680000000000003,25.610000000000007,25.700000000000006,25.820000000000004,25.970000000000002],"color":"green"},{"name":"anthropic","data":[72.27,72.74999999999999,73.2,73.85999999999999,74.18,74.35,74.64000000000001,74.7,74.83000000000001,74.92999999999999,74.75,74.74,74.83999999999999,74.78,74.85999999999997,75.00999999999999,74.95,75.10000000000001,75.16,75.22,75.21999999999998,75.23,75.21000000000001,75.05,75.01,74.83000000000001,74.67999999999999,74.57999999999997,74.39999999999999,74.25000000000001,73.96000000000001,73.8,73.69000000000001,73.67000000000002,73.75999999999999,73.66999999999999,73.52000000000001,73.38000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
