<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.61999999999999,38.300000000000004,37.830000000000005,37.44,37.019999999999996,36.879999999999995,36.64000000000001,36.33,36.07,35.86000000000001,35.59000000000001,35.370000000000005,35.230000000000004,35.11,34.959999999999994,34.769999999999996,34.690000000000005,34.540000000000006,34.440000000000005,34.31000000000001,34.300000000000004,34.31,34.32,34.3,34.31,34.290000000000006,34.25,34.14,33.98,33.82,33.730000000000004,33.64,33.650000000000006,33.730000000000004,33.699999999999996,33.669999999999995,33.63999999999999,33.71],"color":"green"},{"name":"anthropic","data":[58.41,58.760000000000005,59.230000000000004,59.59,59.99,60.16,60.39999999999999,60.69,60.980000000000004,61.17999999999999,61.45999999999999,61.67999999999999,61.82999999999999,61.94999999999999,62.06,62.23999999999999,62.34,62.5,62.60000000000001,62.73,62.730000000000004,62.70999999999999,62.69999999999999,62.73,62.75999999999999,62.75,62.78,62.89,63.03999999999999,63.22999999999999,63.309999999999995,63.37,63.39,63.3,63.339999999999996,63.36,63.39,63.31999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
