<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.88000000000004,73.80000000000003,73.29000000000003,72.78000000000002,72.32000000000004,71.98000000000003,71.55000000000003,70.98000000000002,70.44000000000003,70.01000000000002,69.42000000000002,68.93000000000005,68.56000000000003,68.07000000000001,67.69000000000001,67.31000000000002,66.83000000000003,66.39,65.79,65.16,64.67,64.3,63.989999999999995,63.69,63.47,63.33999999999999,63.17,62.809999999999995,62.37,62.02999999999999,61.69,61.41999999999999,61.18999999999999,61.03999999999999,60.789999999999985,60.50999999999999,60.139999999999986,59.73],"color":"green"},{"name":"anthropic","data":[25.830000000000002,25.94,26.4,26.919999999999998,27.390000000000008,27.730000000000004,28.17000000000001,28.760000000000005,29.280000000000012,29.720000000000006,30.300000000000004,30.79000000000001,31.200000000000003,31.650000000000006,32.050000000000004,32.41000000000001,32.88000000000001,33.31,33.94,34.529999999999994,35.059999999999995,35.41,35.71,36.030000000000015,36.24000000000002,36.38000000000001,36.550000000000004,36.900000000000006,37.33,37.68000000000001,38.02000000000001,38.29,38.480000000000004,38.66,38.900000000000006,39.160000000000004,39.56,39.970000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
