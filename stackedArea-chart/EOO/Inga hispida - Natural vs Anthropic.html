<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.350000000000005,31.1,30.52,30.09,29.670000000000005,29.380000000000003,29.000000000000004,28.94,28.89,28.790000000000006,28.750000000000007,28.680000000000003,28.66,28.59000000000001,28.48,28.340000000000003,28.360000000000003,28.350000000000005,28.370000000000005,28.440000000000005,28.51,28.690000000000005,28.850000000000005,28.950000000000003,29.100000000000005,29.300000000000008,29.430000000000003,29.540000000000003,29.610000000000007,29.720000000000002,29.830000000000005,29.89,30.110000000000007,30.259999999999998,30.380000000000003,30.52,30.8,30.95],"color":"green"},{"name":"anthropic","data":[65.85000000000001,66.12,66.7,67.13000000000001,67.55,67.85000000000001,68.22,68.28999999999999,68.35000000000001,68.44,68.47,68.55000000000001,68.57000000000001,68.63,68.74,68.89,68.85,68.9,68.86000000000001,68.81000000000002,68.72000000000001,68.56,68.39000000000001,68.29,68.13000000000002,67.94000000000001,67.81000000000002,67.70000000000002,67.63999999999999,67.53,67.39999999999999,67.34,67.15,66.97,66.85000000000001,66.74000000000001,66.45000000000002,66.29],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
