<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.39999999999999,98.38,98.2,98.09,98.06,97.99000000000001,97.97000000000001,97.8,97.58999999999999,97.38,97.04,96.74,96.35000000000001,96.00999999999999,95.88,95.77,95.48,95.21,94.90999999999998,94.42,94.02,93.64000000000001,93.38000000000002,93.12,92.86999999999999,92.75,92.71000000000001,92.68,92.53999999999999,92.37999999999998,92.11999999999999,91.74000000000001,91.52000000000001,91.27000000000001,90.89,90.50999999999999,89.94000000000001,89.29],"color":"green"},{"name":"anthropic","data":[1.46,1.49,1.6700000000000002,1.78,1.81,1.8800000000000001,1.9100000000000001,2.0799999999999996,2.28,2.4799999999999995,2.82,3.129999999999999,3.519999999999999,3.8599999999999994,3.9799999999999995,4.099999999999999,4.379999999999999,4.659999999999998,4.969999999999999,5.459999999999999,5.859999999999999,6.229999999999999,6.489999999999998,6.739999999999998,6.979999999999999,7.109999999999999,7.17,7.19,7.32,7.489999999999999,7.749999999999999,8.120000000000001,8.349999999999998,8.600000000000001,8.97,9.370000000000001,9.93,10.58],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
