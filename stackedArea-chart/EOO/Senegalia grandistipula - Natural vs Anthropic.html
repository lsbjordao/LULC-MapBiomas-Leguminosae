<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.92000000000001,56.79000000000001,56.440000000000005,56.02,55.540000000000006,55.28000000000001,54.93000000000001,54.510000000000005,54.18,53.94000000000001,53.66000000000001,53.43000000000001,53.40000000000001,53.230000000000004,53.050000000000004,52.860000000000014,52.65000000000001,52.41000000000001,52.120000000000005,51.780000000000015,51.51000000000001,51.36000000000002,51.26000000000001,51.180000000000014,51.070000000000014,50.94000000000001,50.78000000000001,50.36000000000001,49.92,49.54000000000001,49.24000000000001,49.110000000000014,48.970000000000006,48.870000000000005,48.72000000000001,48.52000000000002,48.360000000000014,48.260000000000005],"color":"green"},{"name":"anthropic","data":[37.73000000000001,37.83,38.199999999999996,38.63,39.1,39.36,39.72999999999999,40.12,40.470000000000006,40.72,41.00000000000001,41.17,41.22,41.39999999999999,41.58,41.769999999999996,41.99999999999999,42.23,42.529999999999994,42.859999999999985,43.14000000000001,43.28,43.41,43.5,43.589999999999996,43.699999999999996,43.879999999999995,44.269999999999996,44.730000000000004,45.10000000000001,45.40000000000001,45.53000000000001,45.67,45.760000000000005,45.920000000000016,46.09,46.250000000000014,46.370000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
