<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.28999999999999,91.00999999999999,90.25,89.39999999999999,88.46999999999998,87.75,87.11,86.23,85.29999999999998,83.79999999999998,82.63,81.05,79.84,78.7,77.31,75.86000000000001,74.70000000000002,72.61000000000001,70.21,68.86,67.44,66.13000000000001,65.31,64.61,63.77,63.04,62.56,62.25,62.04,61.739999999999995,61.32,60.86,60.57,60.22,59.26999999999999,58.209999999999994,57.03999999999999,55.55],"color":"green"},{"name":"anthropic","data":[8.16,8.45,9.219999999999999,10.06,10.99,11.71,12.370000000000001,13.23,14.16,15.68,16.84,18.42,19.62,20.77,22.16,23.62,24.780000000000005,26.85,29.25,30.61,32.019999999999996,33.33,34.14999999999999,34.86,35.69,36.41,36.910000000000004,37.22,37.41,37.730000000000004,38.15,38.60999999999999,38.89,39.23,40.18999999999999,41.24999999999999,42.419999999999995,43.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
