<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[96.11,96.03,95.85000000000001,95.45,94.91999999999999,94.95,95.08999999999999,94.99000000000001,95.24000000000001,96.11000000000001,97.11,97.12,97.08,96.75000000000001,96.43,96.66,96.91,96.37999999999998,96.34999999999998,96.30999999999999,96.24,96.00999999999999,95.98,96.07000000000001,95.98,95.98000000000002,96.03,96.19,96.21,96.16,95.83999999999999,95.62,95.59,95.39999999999999,95.22999999999999,95.13,94.94000000000001,94.55000000000001],"color":"green"},{"name":"anthropic","data":[3.2399999999999998,3.32,3.48,3.89,4.42,4.39,4.25,4.34,4.09,3.22,2.2399999999999998,2.2199999999999998,2.25,2.59,2.9,2.69,2.44,2.9499999999999997,2.9899999999999993,3.0299999999999994,3.0999999999999996,3.3299999999999996,3.34,3.2600000000000002,3.36,3.35,3.3000000000000003,3.14,3.12,3.17,3.4899999999999998,3.71,3.74,3.9499999999999997,4.11,4.200000000000001,4.390000000000001,4.800000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
