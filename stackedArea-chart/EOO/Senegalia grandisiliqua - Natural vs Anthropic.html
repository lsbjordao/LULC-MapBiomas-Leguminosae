<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.81999999999999,42.67,42.22999999999999,41.809999999999995,41.469999999999985,41.23,40.859999999999985,40.47999999999999,40.089999999999996,39.97999999999999,39.879999999999995,39.90999999999999,39.97,39.87999999999998,39.839999999999996,39.68000000000001,39.5,39.42,39.23,39.13,39.129999999999995,39.220000000000006,39.25000000000001,39.26,39.26,39.21000000000001,39.09,38.85,38.73,38.60000000000001,38.510000000000005,38.53,38.540000000000006,38.64,38.65,38.7,38.81,38.990000000000016],"color":"green"},{"name":"anthropic","data":[43.790000000000006,43.959999999999994,44.379999999999995,44.82,45.14999999999999,45.43000000000001,45.79,46.170000000000016,46.56,46.68,46.790000000000006,46.76,46.699999999999996,46.779999999999994,46.809999999999995,46.989999999999995,47.14,47.2,47.42999999999999,47.54,47.51999999999999,47.42999999999999,47.419999999999995,47.389999999999986,47.42,47.449999999999996,47.56999999999999,47.75999999999999,47.9,48.04999999999999,48.149999999999984,48.12999999999999,48.109999999999985,47.99999999999999,48.01999999999999,47.959999999999994,47.82,47.66],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
