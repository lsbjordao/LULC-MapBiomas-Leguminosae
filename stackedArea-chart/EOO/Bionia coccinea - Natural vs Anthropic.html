<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.61,59.46000000000001,59.18,58.739999999999995,58.019999999999996,57.9,57.650000000000006,57.17,56.65,56.32000000000001,55.790000000000006,55.370000000000005,55.16000000000001,55.050000000000004,54.87000000000001,54.800000000000004,54.63000000000001,54.150000000000006,53.820000000000014,53.36000000000001,52.87000000000001,52.58,52.29,52.06000000000001,52.03,51.769999999999996,51.5,51.11,50.64,50.17000000000001,49.78,49.32000000000001,49.17000000000001,49.15,48.96000000000001,48.76000000000001,48.480000000000004,48.290000000000006],"color":"green"},{"name":"anthropic","data":[39.85,39.99,40.26,40.72,41.42999999999999,41.529999999999994,41.789999999999985,42.28,42.78,43.11000000000001,43.67,44.05999999999999,44.24,44.38,44.57000000000001,44.64,44.83000000000001,45.31000000000002,45.620000000000005,46.100000000000016,46.570000000000014,46.84,47.129999999999995,47.38000000000001,47.38000000000002,47.66000000000001,47.940000000000005,48.309999999999995,48.790000000000006,49.27,49.640000000000015,50.09,50.26000000000001,50.26,50.46,50.660000000000004,50.94000000000001,51.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
