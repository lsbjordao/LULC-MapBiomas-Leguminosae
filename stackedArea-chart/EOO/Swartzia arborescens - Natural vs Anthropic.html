<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[88.80000000000001,88.65000000000002,88.24000000000002,87.84000000000002,87.49000000000002,87.17999999999999,86.83000000000001,86.31000000000002,85.82000000000001,85.30000000000003,84.61999999999999,84.01,83.46000000000001,82.89000000000001,82.35,81.85999999999999,81.38000000000001,80.84,80.10000000000001,79.38,78.82000000000001,78.4,78.10000000000002,77.81,77.62,77.48,77.34,77.15999999999998,76.92000000000002,76.65000000000002,76.35,76.08000000000003,75.87,75.69000000000001,75.44,75.16000000000001,74.78999999999999,74.26],"color":"green"},{"name":"anthropic","data":[10.63,10.8,11.19,11.590000000000002,11.930000000000001,12.229999999999999,12.579999999999997,13.08,13.62,14.129999999999999,14.81,15.39,15.979999999999999,16.52,17.070000000000007,17.550000000000004,18.050000000000004,18.59,19.3,20.039999999999996,20.589999999999996,21.01,21.31000000000001,21.58,21.78,21.920000000000005,22.06,22.250000000000004,22.529999999999998,22.76,23.040000000000003,23.35,23.540000000000006,23.720000000000002,23.979999999999997,24.240000000000002,24.63,25.150000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
