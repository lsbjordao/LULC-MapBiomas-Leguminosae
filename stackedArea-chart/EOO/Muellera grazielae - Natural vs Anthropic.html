<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.49,52.300000000000004,52.35999999999999,52.400000000000006,52.34,52.279999999999994,52.129999999999995,52.17,52.35,52.47,52.60999999999999,52.85,52.92999999999999,53.1,53.31,53.38999999999999,53.38,53.440000000000005,53.51,53.40999999999999,53.309999999999995,53.46,53.47,53.519999999999996,53.69,53.67,53.72999999999999,53.82,54.03999999999999,53.94999999999999,53.989999999999995,53.99999999999999,54.260000000000005,54.419999999999995,54.26999999999999,54.28,54.410000000000004,54.40999999999999],"color":"green"},{"name":"anthropic","data":[29.87,29.090000000000003,29.009999999999998,28.97,29.02,29.08,29.229999999999997,29.189999999999998,29.02,28.880000000000003,28.759999999999998,28.53,28.439999999999998,28.26,28.070000000000004,27.979999999999997,27.99,27.930000000000003,27.849999999999998,27.96,28.040000000000003,27.91,27.91,27.84,27.669999999999998,27.680000000000003,27.630000000000003,27.55,27.310000000000002,27.42,27.369999999999997,27.38,27.12,26.95,27.09,27.09,26.96,26.97],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
