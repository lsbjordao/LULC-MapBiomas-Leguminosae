<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[47.13,46.440000000000005,45.71,44.97,44.06,43.290000000000006,42.52,41.74,41.08000000000001,40.42000000000001,39.739999999999995,39.13,38.53,38.13000000000001,37.72,37.230000000000004,36.81,36.410000000000004,35.86,35.31000000000001,34.89999999999999,34.699999999999996,34.519999999999996,34.36,34.22,34.040000000000006,33.879999999999995,33.550000000000004,33.15,32.78,32.45,32.28,32.13,32.03,31.840000000000003,31.69,31.470000000000002,31.81],"color":"green"},{"name":"anthropic","data":[50.690000000000005,51.37,52.08999999999999,52.85,53.730000000000004,54.53,55.279999999999994,56.06,56.71,57.389999999999986,58.04999999999999,58.66999999999999,59.25999999999999,59.67,60.06999999999999,60.58,60.980000000000004,61.400000000000006,61.919999999999995,62.49000000000001,62.900000000000006,63.1,63.28999999999999,63.43999999999999,63.550000000000004,63.74000000000001,63.900000000000006,64.27,64.65,65.00999999999999,65.33000000000001,65.50999999999999,65.65,65.77000000000001,65.96000000000001,66.12,66.33,66.02000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
