<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.550000000000004,59.57,59.67,60.06,59.67,59.69,59.63,59.660000000000004,59.59,59.21,59.81,60.42000000000001,60.86,60.830000000000005,60.49,59.809999999999995,59.35,58.78,58.529999999999994,57.84,58.02,58.08,58.1,58.98,59.519999999999996,59.68,59.81999999999999,60.209999999999994,60.14999999999999,59.99999999999999,60.78,60.89,60.81,60.699999999999996,60.489999999999995,59.79,59.54,58.65],"color":"green"},{"name":"anthropic","data":[39.879999999999995,39.85,39.74,39.34,39.730000000000004,39.72,39.79,39.75,39.82,40.199999999999996,39.6,38.97,38.53000000000001,38.589999999999996,38.92,39.59,40.06,40.629999999999995,40.870000000000005,41.58,41.38999999999999,41.34,41.3,40.42,39.89,39.739999999999995,39.58,39.199999999999996,39.26,39.400000000000006,38.64,38.54,38.589999999999996,38.7,38.919999999999995,39.620000000000005,39.86,40.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
