<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[26.7,26.770000000000003,26.680000000000003,26.64,26.62,26.579999999999995,26.62,26.8,26.869999999999997,26.939999999999998,27.069999999999997,27.19,27.25,27.1,27.110000000000003,26.76,26.73,26.649999999999995,26.560000000000002,26.54,26.599999999999998,26.710000000000004,26.75,26.880000000000003,27.150000000000002,27.29,27.430000000000003,27.550000000000004,27.57,27.680000000000003,27.99,28.02,28.07,28.150000000000002,28.1,28.080000000000002,28.32,28.279999999999998],"color":"green"},{"name":"anthropic","data":[73.7,73.65,73.71000000000001,73.76,73.78999999999999,73.83000000000001,73.79,73.62,73.54,73.47000000000001,73.33,73.21,73.14999999999999,73.29,73.29,73.66,73.67999999999999,73.77,73.86,73.87,73.79,73.66999999999999,73.67,73.53,73.27,73.12,72.99000000000001,72.85000000000001,72.82000000000001,72.72999999999999,72.42,72.4,72.35000000000001,72.26,72.31,72.31000000000002,72.09000000000002,72.12],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
