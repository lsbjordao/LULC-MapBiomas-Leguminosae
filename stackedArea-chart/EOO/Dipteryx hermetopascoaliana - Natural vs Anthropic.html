<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[7.929999999999999,7.949999999999998,7.389999999999998,6.949999999999998,6.749999999999999,6.579999999999999,6.329999999999999,6.27,6.3,6.339999999999999,6.389999999999999,6.459999999999999,6.419999999999998,6.419999999999999,6.499999999999998,6.499999999999999,6.579999999999999,6.65,6.709999999999999,6.8199999999999985,6.879999999999998,7.019999999999999,7.199999999999998,7.179999999999998,7.219999999999999,7.2299999999999995,7.25,7.3100000000000005,7.330000000000001,7.409999999999999,7.5200000000000005,7.56,7.629999999999999,7.699999999999999,7.78,7.859999999999999,7.949999999999999,8.21],"color":"green"},{"name":"anthropic","data":[27.53,27.500000000000004,28.090000000000007,28.560000000000006,28.780000000000005,28.94,29.2,29.27,29.240000000000002,29.220000000000006,29.16,29.11,29.14,29.14,29.050000000000004,29.05,28.97,28.89,28.830000000000002,28.720000000000002,28.67,28.54,28.33,28.35,28.34,28.32,28.299999999999997,28.25,28.230000000000004,28.160000000000004,28.050000000000004,28.02,27.960000000000004,27.890000000000004,27.830000000000005,27.760000000000005,27.680000000000003,27.430000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
