<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.15,89.95000000000002,89.74000000000001,89.72,89.73,89.86999999999999,89.92,89.89999999999999,89.78999999999999,89.74,89.69,89.68,89.63,89.63,89.62,89.66000000000001,89.73000000000002,89.7,89.69,89.67,89.69,89.72,89.68,89.64999999999999,89.74000000000001,89.77000000000001,89.78999999999999,89.83,89.89,90.02000000000002,90.05000000000001,90.09,90.13000000000001,90.14000000000001,90.15,90.07,90.08,90.12],"color":"green"},{"name":"anthropic","data":[9.28,9.49,9.7,9.719999999999999,9.7,9.56,9.5,9.530000000000001,9.64,9.68,9.73,9.759999999999998,9.809999999999999,9.809999999999999,9.819999999999999,9.79,9.709999999999999,9.73,9.74,9.75,9.74,9.709999999999999,9.77,9.79,9.7,9.65,9.65,9.6,9.549999999999999,9.4,9.37,9.34,9.29,9.299999999999999,9.299999999999999,9.35,9.37,9.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
