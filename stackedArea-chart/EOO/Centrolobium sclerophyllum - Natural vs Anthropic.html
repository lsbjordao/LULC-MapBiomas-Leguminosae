<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.81000000000001,55.660000000000004,55.17,54.74,54.199999999999996,54.13,53.989999999999995,53.720000000000006,53.449999999999996,53.3,53.089999999999996,52.980000000000004,53.25,53.269999999999996,53.269999999999996,53.269999999999996,53.11,52.9,52.83,52.830000000000005,52.720000000000006,52.69,52.620000000000005,52.60000000000001,52.56,52.55,52.45,52.21000000000001,51.83,51.52000000000001,51.309999999999995,51.15,51.08,51.029999999999994,50.98,50.88999999999999,50.82999999999999,50.800000000000004],"color":"green"},{"name":"anthropic","data":[43.419999999999995,43.56,44.05,44.51,45.02999999999999,45.06,45.24999999999998,45.49999999999999,45.779999999999994,45.93,46.14999999999999,46.24999999999999,45.98,45.959999999999994,45.96999999999999,45.970000000000006,46.14,46.32,46.400000000000006,46.410000000000004,46.5,46.55,46.62,46.64,46.66,46.69999999999999,46.76999999999999,47,47.389999999999986,47.73,47.91999999999999,48.08999999999999,48.14999999999999,48.20999999999999,48.26999999999999,48.339999999999996,48.38,48.42999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
