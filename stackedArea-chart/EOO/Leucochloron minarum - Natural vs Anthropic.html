<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.7,71.07000000000001,71.05000000000001,70.82000000000001,70.39000000000001,70.17,69.92000000000002,69.38000000000001,69.06,69.06,68.55000000000003,68.29000000000002,67.84000000000002,67.36000000000001,66.54,66.06000000000002,65.85000000000001,65.42999999999999,65.1,64.88,64.53999999999999,64.11999999999999,63.819999999999986,63.609999999999985,63.33999999999999,63.04999999999999,62.74999999999999,62.3,61.69,61.07999999999999,60.65,60.30999999999999,60.279999999999994,60.45,60.55,60.66999999999999,60.529999999999994,60.599999999999994],"color":"green"},{"name":"anthropic","data":[28.66,28.270000000000003,28.300000000000004,28.53,28.990000000000006,29.190000000000005,29.450000000000003,29.960000000000004,30.300000000000008,30.300000000000004,30.800000000000008,31.070000000000004,31.51000000000001,31.980000000000004,32.830000000000005,33.32000000000001,33.52,33.95000000000001,34.25,34.470000000000006,34.809999999999995,35.24999999999999,35.53000000000001,35.739999999999995,36.04,36.31,36.61000000000001,37.06,37.690000000000005,38.28000000000001,38.720000000000006,39.040000000000006,39.08000000000001,38.89000000000001,38.81000000000001,38.67000000000001,38.79000000000001,38.720000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
