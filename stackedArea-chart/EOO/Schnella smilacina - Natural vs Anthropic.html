<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.55,33.330000000000005,32.86,32.44,32.14000000000001,32.07,31.930000000000003,31.71,31.599999999999998,31.54,31.45,31.480000000000004,31.549999999999997,31.5,31.47,31.29,31.21,31.11,31.07,31.12,31.26000000000001,31.36,31.380000000000006,31.430000000000003,31.380000000000006,31.39,31.40000000000001,31.370000000000005,31.310000000000002,31.240000000000002,31.249999999999996,31.3,31.380000000000003,31.49,31.529999999999998,31.57,31.68,31.83],"color":"green"},{"name":"anthropic","data":[60.59999999999999,60.82,61.25000000000001,61.68,62.00000000000001,62.06000000000001,62.21000000000001,62.410000000000004,62.51,62.580000000000005,62.670000000000016,62.650000000000006,62.58,62.62000000000001,62.64999999999999,62.82,62.9,63.01,63.04,63.019999999999996,62.859999999999985,62.76,62.73,62.7,62.72999999999999,62.71999999999999,62.73,62.74,62.789999999999985,62.84999999999999,62.830000000000005,62.84000000000002,62.760000000000005,62.63,62.570000000000014,62.56000000000002,62.44,62.30000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
