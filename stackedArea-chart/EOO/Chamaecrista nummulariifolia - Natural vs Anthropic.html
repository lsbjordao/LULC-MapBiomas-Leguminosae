<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.87999999999999,63.24999999999999,62.809999999999995,61.57999999999999,60.22,59.470000000000006,58.36,57.56,56.839999999999996,55.959999999999994,55.26,54.62,53.88999999999999,53.31,52.8,52.199999999999996,51.71999999999999,51.02,50.269999999999996,49.42,48.98000000000001,48.68,48.449999999999996,48.24,48.220000000000006,48.01,47.800000000000004,47.64000000000001,47.56,47.349999999999994,47.15,46.93,46.74,46.49,46.160000000000004,45.879999999999995,45.68000000000001,45.800000000000004],"color":"green"},{"name":"anthropic","data":[35.55,36.17000000000001,36.58999999999999,37.82999999999999,39.18999999999999,39.910000000000004,41.04,41.839999999999996,42.56,43.449999999999996,44.14,44.77,45.51,46.1,46.61,47.199999999999996,47.709999999999994,48.37,49.11999999999999,49.95,50.43,50.72,50.96,51.17,51.17,51.39999999999999,51.59,51.74999999999999,51.84,52.03,52.260000000000005,52.46,52.66,52.910000000000004,53.24999999999999,53.519999999999996,53.71999999999999,53.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
