<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[24.530000000000012,24.520000000000003,24.330000000000005,24.130000000000003,23.860000000000003,23.750000000000004,23.6,23.410000000000007,23.200000000000003,23.040000000000003,22.860000000000003,22.750000000000007,22.740000000000002,22.690000000000005,22.60000000000001,22.530000000000005,22.430000000000003,22.310000000000006,22.180000000000003,22.05,21.92,21.840000000000003,21.8,21.71,21.650000000000006,21.570000000000007,21.440000000000005,21.250000000000004,21.010000000000005,20.81000000000001,20.660000000000004,20.570000000000004,20.520000000000007,20.500000000000007,20.410000000000004,20.37000000000001,20.310000000000013,20.290000000000006],"color":"green"},{"name":"anthropic","data":[12.709999999999999,12.709999999999997,12.899999999999999,13.109999999999998,13.37,13.47,13.669999999999996,13.869999999999997,14.049999999999997,14.219999999999997,14.379999999999997,14.489999999999998,14.5,14.569999999999997,14.659999999999998,14.719999999999999,14.84,14.919999999999996,15.069999999999999,15.189999999999998,15.339999999999995,15.399999999999999,15.450000000000001,15.52,15.58,15.659999999999997,15.77,15.990000000000002,16.230000000000004,16.45,16.57,16.659999999999997,16.709999999999997,16.759999999999998,16.83,16.9,16.95,16.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
