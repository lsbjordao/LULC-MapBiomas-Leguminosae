<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.05000000000001,71.75,71.07000000000001,70.36999999999998,69.65999999999998,69.14,68.64000000000001,67.88000000000001,67.2,66.53999999999999,65.70000000000002,65,64.34,63.66,62.96999999999999,62.480000000000004,61.95000000000002,61.330000000000005,60.52,59.69000000000002,59.06000000000001,58.57000000000001,58.28000000000001,57.980000000000004,57.79000000000001,57.61000000000001,57.41000000000001,57.10000000000001,56.77,56.44000000000002,56.13000000000002,55.90000000000001,55.67000000000002,55.45000000000002,55.12000000000002,54.82000000000001,54.39000000000001,53.84],"color":"green"},{"name":"anthropic","data":[28.08000000000001,28.370000000000008,29.050000000000008,29.73,30.47,30.960000000000008,31.460000000000004,32.239999999999995,32.89999999999999,33.57,34.42,35.13000000000001,35.77,36.42999999999999,37.13,37.61000000000001,38.17,38.76,39.58,40.43,41.07,41.55,41.85,42.15999999999999,42.339999999999996,42.51,42.73,43.02999999999999,43.379999999999995,43.69999999999999,44.00999999999999,44.22999999999999,44.440000000000005,44.64999999999999,44.96999999999999,45.31,45.71999999999999,46.23999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
