<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[103.28,103.21000000000001,103.01,102.76,102.64,102.23000000000002,102.14999999999999,101.95000000000002,101.68000000000002,101.41000000000001,101.38999999999999,100.99000000000001,100.68,100.26,99.95000000000002,100.21000000000001,100.39,100.35,100.35,100.35999999999999,100.25000000000001,100,100.1,100.28,99.97999999999999,99.74000000000001,99.83,99.95,100.1,99.86999999999999,99.35000000000001,98.85000000000001,98.74,98.60999999999999,98.83000000000001,98.90000000000002,98.78999999999999,97.92000000000002],"color":"green"},{"name":"anthropic","data":[1.09,1.15,1.35,1.59,1.7,2.12,2.1999999999999997,2.4000000000000004,2.68,2.9499999999999997,2.9499999999999997,3.36,3.68,4.09,4.4,4.140000000000001,3.97,3.9899999999999998,3.9800000000000004,3.9800000000000004,4.11,4.36,4.27,4.08,4.37,4.61,4.53,4.409999999999999,4.26,4.49,5,5.510000000000001,5.609999999999999,5.7299999999999995,5.52,5.449999999999999,5.56,6.4399999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
