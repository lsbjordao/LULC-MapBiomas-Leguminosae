<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.29999999999998,78.08999999999997,77.57,77.05999999999999,76.55999999999999,76.17999999999999,75.75999999999999,75.21,74.72,74.25999999999999,73.64,73.16999999999997,72.76000000000002,72.26,71.81,71.41,70.99,70.53999999999999,69.9,69.32000000000001,68.88000000000001,68.55,68.33,68.06000000000002,67.96,67.74,67.5,67.28,66.99,66.73000000000002,66.47,66.22000000000001,66.05000000000001,65.86,65.49,65.22999999999999,64.82999999999998,64.32],"color":"green"},{"name":"anthropic","data":[21.479999999999997,21.680000000000003,22.23,22.72,23.26,23.62,24.020000000000007,24.590000000000003,25.049999999999997,25.550000000000008,26.150000000000006,26.630000000000003,27.009999999999998,27.51,27.980000000000008,28.400000000000002,28.8,29.250000000000004,29.89,30.459999999999997,30.90999999999999,31.219999999999995,31.470000000000002,31.719999999999995,31.83,32.03,32.27000000000002,32.52000000000001,32.81,33.06,33.33,33.57000000000001,33.74000000000001,33.900000000000006,34.31,34.530000000000015,34.94000000000002,35.430000000000014],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
