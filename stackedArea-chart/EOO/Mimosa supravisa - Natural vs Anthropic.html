<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.45,59.57000000000001,58.27,57.21,56.18,55.21999999999999,54.420000000000016,53.36000000000001,52.41000000000001,51.46,50.49,49.61,48.82,48.17,47.48,46.88,46.370000000000005,45.81000000000001,44.980000000000004,44.31999999999999,43.86999999999999,43.580000000000005,43.38000000000001,43.2,43.1,42.95000000000001,42.82,42.59,42.269999999999996,41.980000000000004,41.690000000000005,41.53,41.37,41.28000000000001,41.09,40.91,40.63,40.690000000000005],"color":"green"},{"name":"anthropic","data":[38.33,39.199999999999996,40.52,41.58,42.6,43.54,44.36,45.410000000000004,46.36,47.3,48.29,49.15,49.93999999999999,50.589999999999996,51.269999999999996,51.900000000000006,52.38999999999999,52.96000000000001,53.8,54.449999999999996,54.87999999999999,55.2,55.38,55.57000000000001,55.66,55.790000000000006,55.949999999999996,56.15999999999999,56.489999999999995,56.80999999999999,57.05,57.24,57.379999999999995,57.48999999999999,57.67000000000001,57.85,58.14,58.080000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
