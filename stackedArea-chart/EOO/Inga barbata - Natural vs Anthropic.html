<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.690000000000005,63.16,62.48,61.88000000000001,61.32000000000001,60.85000000000001,60.410000000000004,59.89000000000001,59.49,59.10999999999999,58.559999999999995,58.160000000000004,57.81,57.42,57.08999999999999,56.75999999999999,56.54999999999999,56.209999999999994,55.83,55.48,55.209999999999994,55.02,54.88,54.69999999999999,54.739999999999995,54.620000000000005,54.33,54.24999999999999,54.18999999999999,54.07,53.97999999999999,53.91,53.71999999999999,53.59999999999999,53.21,53.01,52.64,52.26],"color":"green"},{"name":"anthropic","data":[34.730000000000004,35.25,35.93,36.51999999999999,37.11000000000001,37.580000000000005,37.98,38.52,38.89,39.28,39.849999999999994,40.25999999999999,40.62,40.99000000000001,41.3,41.61,41.82000000000001,42.13,42.519999999999996,42.86999999999999,43.139999999999986,43.279999999999994,43.42999999999999,43.620000000000005,43.53000000000001,43.58999999999999,44.04,44.13999999999999,44.16,44.17,44.300000000000004,44.25,44.64,44.48,45.10999999999999,45.23,45.48999999999999,46.13],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
