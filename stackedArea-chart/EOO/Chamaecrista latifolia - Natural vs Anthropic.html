<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.53,32.84,32.39,32.17000000000001,31.809999999999995,31.599999999999998,31.35,31.17,31.02,30.979999999999997,30.89,30.78,30.68,30.64,30.4,30.2,30.169999999999998,30.12,30.12,30.120000000000005,30.190000000000005,30.26000000000001,30.390000000000004,30.540000000000006,30.6,30.78,30.919999999999998,31.009999999999998,31.07,31.1,31.240000000000006,31.410000000000004,31.580000000000002,31.680000000000003,31.770000000000003,31.8,31.970000000000006,32.15],"color":"green"},{"name":"anthropic","data":[65.85,66.54000000000002,67.00000000000001,67.22000000000001,67.58000000000001,67.79,68.07000000000001,68.24000000000002,68.37000000000002,68.42000000000002,68.53000000000003,68.60000000000002,68.71000000000001,68.76000000000002,68.99,69.19000000000001,69.24000000000001,69.28000000000002,69.26999999999998,69.28999999999999,69.21000000000001,69.14999999999999,68.98999999999998,68.85,68.8,68.61999999999999,68.47000000000001,68.36,68.30999999999999,68.26999999999998,68.12,67.95999999999998,67.78999999999998,67.71000000000001,67.60000000000001,67.57000000000001,67.39000000000003,67.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
