<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[95.14,95.08,94.59,94.14999999999999,93.97,93.67,93.54,93.03999999999999,92.58,92.05999999999997,91.34000000000002,90.65,89.84000000000002,89.15,88.78,88.49000000000001,87.97999999999999,87.41,86.49,85.33,84.51,83.72000000000001,83.02,82.40000000000002,81.97,81.80000000000001,81.7,81.63000000000001,81.41000000000001,81.19,80.79,80.33000000000001,80.02000000000001,79.61999999999999,78.98,78.34,77.32000000000001,76.32],"color":"green"},{"name":"anthropic","data":[4.369999999999999,4.4399999999999995,4.929999999999999,5.369999999999998,5.55,5.85,6,6.48,6.950000000000001,7.460000000000001,8.189999999999998,8.859999999999998,9.679999999999998,10.379999999999997,10.749999999999998,11.039999999999997,11.559999999999999,12.1,13.029999999999998,14.18,15.01,15.8,16.52,17.13,17.57,17.730000000000004,17.82,17.899999999999995,18.13,18.339999999999996,18.729999999999997,19.179999999999996,19.51,19.92,20.55,21.189999999999998,22.189999999999998,23.2],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
