<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.590000000000003,29.759999999999998,29.31,29.51,29.66,29.729999999999997,29.699999999999996,30.09,30.479999999999997,30.77,30.86,30.839999999999996,31.049999999999997,31.189999999999998,31.209999999999997,31.16,31.18,31.21,31.47,31.419999999999998,31.52,31.580000000000002,31.720000000000002,31.82,31.88,32.04,32.35,32.51,32.790000000000006,33.02,33.05,33.169999999999995,33.22,33.19,33.120000000000005,33.11000000000001,33.57,33.72],"color":"green"},{"name":"anthropic","data":[68.88000000000001,68.72,69.14999999999999,68.97,68.81,68.75,68.78,68.39,68,67.71,67.61,67.64,67.42999999999999,67.28,67.27000000000001,67.32000000000001,67.31,67.28,67.03,67.07000000000001,66.96000000000001,66.9,66.78,66.67,66.61000000000001,66.44000000000001,66.13000000000001,65.98,65.71000000000001,65.47000000000001,65.42,65.32,65.26,65.29,65.37,65.37,64.91000000000001,64.76],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
