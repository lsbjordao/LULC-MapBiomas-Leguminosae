<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.47999999999999,98.47,98.41,98.34000000000002,98.28000000000002,98.27,98.23,98.15,98.07000000000001,98.01,97.88999999999999,97.69,97.51,97.29999999999998,97.09999999999998,97.05,96.90000000000002,96.63999999999999,96.32,95.80999999999999,95.33999999999999,95.02999999999999,94.86,94.74999999999999,94.63999999999999,94.50999999999999,94.45,94.4,94.27999999999999,94.12999999999998,93.89999999999999,93.57,93.31,93.12999999999998,92.78,92.45999999999998,91.94999999999999,91.19999999999999],"color":"green"},{"name":"anthropic","data":[0.73,0.76,0.81,0.8800000000000001,0.9400000000000001,0.9600000000000001,0.9800000000000001,1.06,1.1400000000000001,1.2100000000000002,1.35,1.52,1.7100000000000002,1.9300000000000002,2.1199999999999997,2.1699999999999995,2.3099999999999996,2.5799999999999996,2.9099999999999997,3.4099999999999997,3.8899999999999997,4.2,4.37,4.4799999999999995,4.58,4.7,4.76,4.819999999999999,4.94,5.09,5.32,5.64,5.91,6.09,6.449999999999999,6.77,7.279999999999999,8.040000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
