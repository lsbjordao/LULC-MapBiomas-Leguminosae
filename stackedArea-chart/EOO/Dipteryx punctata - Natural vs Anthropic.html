<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[86.02,85.82,85.38,85.03999999999999,84.71999999999998,84.42999999999998,84.05999999999999,83.71,83.36999999999999,83.02999999999999,82.58,82.11999999999998,81.74999999999999,81.38999999999999,80.97,80.71999999999998,80.36999999999999,79.97999999999999,79.51,79.02999999999999,78.64000000000001,78.38,78.18,77.97,77.81000000000002,77.66999999999999,77.55,77.35,77.14,76.93,76.68,76.48,76.32,76.14,75.90999999999998,75.71000000000001,75.39,74.95000000000002],"color":"green"},{"name":"anthropic","data":[12.819999999999997,13.049999999999997,13.469999999999999,13.829999999999998,14.149999999999999,14.409999999999997,14.779999999999998,15.129999999999999,15.459999999999999,15.82,16.27,16.72,17.110000000000007,17.460000000000004,17.87,18.14,18.490000000000002,18.849999999999998,19.36,19.809999999999995,20.189999999999998,20.47,20.67,20.88,21.040000000000003,21.190000000000005,21.310000000000006,21.490000000000002,21.720000000000002,21.930000000000007,22.150000000000006,22.410000000000004,22.550000000000004,22.730000000000008,22.940000000000005,23.16,23.47,23.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
