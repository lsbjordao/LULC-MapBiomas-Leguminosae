<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[29.65,29.380000000000003,28.880000000000006,28.65,28.490000000000006,28.350000000000005,28.320000000000007,28.250000000000007,28.220000000000002,28.16,28.16,28.200000000000003,28.25,28.28,28.44,28.39,28.450000000000003,28.500000000000004,28.490000000000002,28.63,28.920000000000005,29.250000000000007,29.44000000000001,29.5,29.470000000000006,29.540000000000006,29.600000000000005,29.700000000000003,29.8,29.880000000000003,30.070000000000007,30.240000000000002,30.490000000000002,30.66,30.780000000000005,30.990000000000002,31.24000000000001,31.590000000000003],"color":"green"},{"name":"anthropic","data":[64.87,65.15,65.63999999999999,65.87,66.04,66.19,66.22,66.29,66.33000000000001,66.4,66.36,66.35000000000002,66.28,66.25000000000003,66.10000000000001,66.13000000000002,66.07000000000001,66.03000000000002,66.02000000000001,65.88000000000001,65.59,65.26999999999998,65.09,65.01,65.03999999999999,64.94999999999999,64.91,64.81,64.71,64.63,64.44999999999999,64.27,64.02,63.84999999999999,63.71999999999999,63.51,63.29,62.93],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
