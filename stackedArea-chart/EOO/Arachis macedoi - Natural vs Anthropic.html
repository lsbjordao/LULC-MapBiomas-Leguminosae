<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[78.33,78.15999999999998,77.78999999999999,77.35000000000001,76.90999999999998,76.47,76.02000000000001,75.53999999999999,75.07999999999998,74.62999999999998,74.15999999999998,73.61999999999999,73.12999999999998,72.66999999999999,72.10999999999997,71.55,70.96,70.44,69.87,68.99,68.32999999999998,67.82999999999997,67.42999999999998,67.03999999999999,66.65999999999998,66.21999999999997,65.83999999999999,65.09,64.21,63.580000000000005,62.980000000000004,62.52999999999999,62.15,61.779999999999994,61.2,60.57,60.03000000000001,59.510000000000005],"color":"green"},{"name":"anthropic","data":[21.850000000000005,22.03,22.400000000000006,22.83,23.25,23.7,24.16,24.64,25.099999999999998,25.560000000000002,26.040000000000003,26.580000000000002,27.070000000000004,27.520000000000003,28.080000000000005,28.650000000000006,29.240000000000002,29.740000000000002,30.300000000000004,31.200000000000003,31.85,32.33,32.74,33.150000000000006,33.529999999999994,33.97,34.34,35.09,35.970000000000006,36.6,37.23000000000001,37.669999999999995,38.03,38.4,38.97,39.589999999999996,40.15,40.650000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
