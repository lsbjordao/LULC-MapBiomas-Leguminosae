<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.51,43.17,42.87,42.89999999999999,42.76,42.47999999999999,42.28999999999999,42.30999999999999,42.279999999999994,42.319999999999986,42.39999999999999,42.65,42.63999999999999,42.73,43.059999999999995,43.08,43.09,43.160000000000004,43.14,43.349999999999994,43.52,43.64000000000001,43.599999999999994,43.63,43.699999999999996,43.75,43.650000000000006,43.88,44.05,44.27,44.45000000000001,44.46000000000001,44.57000000000001,44.63,44.64000000000001,44.63000000000001,45.300000000000004,45.43],"color":"green"},{"name":"anthropic","data":[55.45999999999999,55.809999999999995,56.09,56.05,56.2,56.470000000000006,56.669999999999995,56.64,56.67000000000001,56.61,56.55,56.31,56.319999999999986,56.21999999999999,55.91,55.89,55.879999999999995,55.82,55.83,55.62000000000001,55.449999999999996,55.35000000000001,55.36000000000001,55.34000000000001,55.300000000000004,55.220000000000006,55.32000000000001,55.1,54.919999999999995,54.69,54.51,54.529999999999994,54.410000000000004,54.34,54.32,54.32,53.67,53.540000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
