<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.209999999999997,30.010000000000005,29.700000000000003,29.35,29.080000000000002,29.000000000000007,28.85,28.810000000000006,28.790000000000003,28.840000000000007,28.820000000000004,28.85,28.860000000000007,28.890000000000008,28.920000000000005,28.820000000000007,28.84,28.900000000000002,28.92000000000001,28.950000000000003,29.080000000000005,29.19000000000001,29.250000000000004,29.330000000000002,29.450000000000003,29.62,29.750000000000007,29.85,29.980000000000004,30.1,30.270000000000003,30.439999999999998,30.520000000000003,30.590000000000003,30.61,30.680000000000003,30.81,30.880000000000003],"color":"green"},{"name":"anthropic","data":[62.74,62.93000000000001,63.25000000000001,63.61999999999999,63.88,63.949999999999996,64.09,64.11999999999999,64.13,64.1,64.11999999999998,64.1,64.11,64.08,64.03,64.14,64.08,64.02999999999999,64.03,63.96999999999999,63.86,63.77999999999999,63.669999999999995,63.59999999999999,63.49,63.30000000000001,63.18,63.070000000000014,62.94999999999999,62.830000000000005,62.67000000000001,62.470000000000006,62.400000000000006,62.36,62.32,62.27,62.14999999999999,62.07],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
