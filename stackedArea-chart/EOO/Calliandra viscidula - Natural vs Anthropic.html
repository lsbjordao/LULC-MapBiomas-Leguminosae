<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[63.36,63.18,63.41,61.8,60.61999999999999,59.669999999999995,59.290000000000006,58.779999999999994,58.55,58.60000000000001,58.29,58.480000000000004,59.08,58.91,59.22,59.809999999999995,59.519999999999996,59.14000000000001,59.22,59.25,58.75,58.87,58.059999999999995,57.32999999999999,56.79,56.14000000000001,55.93000000000001,55.739999999999995,54.989999999999995,54.98,55.24,55.480000000000004,55.39,55.21000000000001,55.059999999999995,54.989999999999995,54.94,54.89],"color":"green"},{"name":"anthropic","data":[36.099999999999994,36.29,36.08,37.67000000000001,38.84,39.790000000000006,40.18,40.7,40.92,40.88,41.17000000000001,40.99000000000001,40.39,40.580000000000005,40.26,39.69,39.949999999999996,40.32,40.25,40.21,40.730000000000004,40.59,41.400000000000006,42.129999999999995,42.669999999999995,43.339999999999996,43.54,43.720000000000006,44.489999999999995,44.489999999999995,44.22,43.99,44.06,44.260000000000005,44.41,44.46999999999999,44.519999999999996,44.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
