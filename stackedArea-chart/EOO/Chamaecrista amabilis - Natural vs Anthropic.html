<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[43.290000000000006,43.419999999999995,42.85,42.26,41.72999999999999,41.56999999999999,41.41,41.41,41.28999999999999,41.16,40.849999999999994,40.67,40.53,40.379999999999995,40.25,39.900000000000006,39.849999999999994,39.690000000000005,39.69,39.57000000000001,39.31,39.24,39.3,39.400000000000006,39.49000000000001,39.52,39.57,39.550000000000004,39.339999999999996,39.29,39.300000000000004,39.16,38.91,38.95,38.919999999999995,38.86,39.220000000000006,39.64],"color":"green"},{"name":"anthropic","data":[13.51,13.399999999999999,13.989999999999998,14.58,15.109999999999998,15.27,15.449999999999998,15.45,15.569999999999997,15.719999999999999,15.989999999999998,16.18,16.300000000000004,16.44,16.59,16.93,17.01,17.18,17.150000000000002,17.290000000000003,17.540000000000003,17.62,17.56,17.450000000000003,17.35,17.32,17.290000000000003,17.3,17.529999999999998,17.61,17.580000000000002,17.72,17.95,17.92,17.94,18,17.65,17.200000000000003],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
