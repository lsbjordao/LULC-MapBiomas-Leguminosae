<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.71,51.42000000000001,50.93000000000001,50.43,49.81,49.470000000000006,49.11999999999999,48.64,48.199999999999996,47.75999999999999,47.239999999999995,46.839999999999996,46.540000000000006,46.24,45.96,45.69,45.459999999999994,45.14000000000001,44.77,44.400000000000006,44.16,44.019999999999996,43.910000000000004,43.769999999999996,43.69,43.599999999999994,43.45,43.199999999999996,42.89999999999999,42.62000000000002,42.4,42.25,42.17,42.17,42.040000000000006,41.93,41.790000000000006,41.779999999999994],"color":"green"},{"name":"anthropic","data":[45.95,46.269999999999996,46.75999999999999,47.28,47.86000000000001,48.199999999999996,48.57,49.04,49.48,49.919999999999995,50.44,50.82000000000001,51.13,51.42,51.71999999999999,51.960000000000015,52.19000000000002,52.51,52.89,53.24000000000001,53.499999999999986,53.63999999999999,53.74999999999999,53.89,53.970000000000006,54.06,54.230000000000004,54.449999999999996,54.749999999999986,55.050000000000004,55.25,55.39,55.49999999999999,55.5,55.629999999999995,55.73999999999999,55.87,55.870000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
