<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.21,65.93999999999998,65.27999999999999,64.46,63.589999999999996,62.879999999999995,62.24,61.41,60.54,60.09,59.68,59.4,59.99,59.84999999999999,59.94,59.88999999999999,59.529999999999994,59.34999999999999,58.90999999999999,58.87,58.44,58.469999999999985,58.39000000000001,58.25999999999999,58.35999999999999,58.28999999999998,58.029999999999994,57.47999999999999,56.889999999999986,56.32,55.959999999999994,56.08999999999999,55.879999999999995,55.93999999999999,55.929999999999986,56.04999999999999,55.93999999999999,56.14],"color":"green"},{"name":"anthropic","data":[33.400000000000006,33.660000000000004,34.330000000000005,35.150000000000006,36.02000000000001,36.75000000000001,37.38,38.21,39.06000000000001,39.53000000000001,39.94,40.19,39.62,39.769999999999996,39.669999999999995,39.720000000000006,40.07999999999999,40.25,40.69,40.739999999999995,41.169999999999995,41.13999999999999,41.209999999999994,41.349999999999994,41.25999999999999,41.30999999999999,41.57,42.10999999999999,42.72,43.27000000000001,43.629999999999995,43.49999999999999,43.71000000000001,43.69,43.67999999999999,43.56,43.66,43.47],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
