<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[67.11,66.86,66.14999999999999,65.46,64.78999999999999,64.31,63.8,63.09,62.46000000000001,61.9,61.29000000000001,60.800000000000004,60.410000000000004,59.89,59.34000000000001,58.870000000000005,58.39,57.89,57.19,56.53,56.06,55.71000000000001,55.5,55.28,55.16,55.03000000000001,54.839999999999996,54.49,54.150000000000006,53.84,53.58,53.41999999999999,53.27,53.16,52.92,52.730000000000004,52.449999999999996,52.13999999999999],"color":"green"},{"name":"anthropic","data":[31.75000000000001,31.99,32.699999999999996,33.36,34.059999999999995,34.54999999999999,35.069999999999986,35.769999999999996,36.39,36.92999999999999,37.540000000000006,38.05,38.42,38.949999999999996,39.53000000000001,39.98000000000001,40.45,40.92999999999999,41.660000000000004,42.309999999999995,42.75999999999999,43.10999999999999,43.36000000000001,43.56000000000001,43.69000000000001,43.82,44.03,44.35999999999999,44.690000000000005,45.010000000000005,45.25999999999999,45.43,45.56,45.69,45.91999999999999,46.11,46.39,46.709999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
