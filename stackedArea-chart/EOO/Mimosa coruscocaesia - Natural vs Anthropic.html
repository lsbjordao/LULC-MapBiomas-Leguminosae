<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[90.38,90.47,90.92000000000002,91.91000000000001,91.68,91.53999999999999,91.47999999999999,91.15999999999998,90.71,90.56999999999998,90.17999999999999,90.11,90.00000000000001,90.19,90.08,90.12000000000002,90.21,90.06,89.94,89.80999999999999,89.40999999999998,89.13999999999999,88.92,88.72000000000001,88.42000000000003,88.10000000000001,87.79,87.2,86.52,86.09,85.82000000000001,85.64999999999999,85.46,85.26999999999998,84.73,84.11999999999999,83.17,81.67000000000002],"color":"green"},{"name":"anthropic","data":[8.689999999999998,8.609999999999998,8.159999999999998,7.18,7.41,7.529999999999999,7.6099999999999985,7.919999999999999,8.39,8.51,8.899999999999999,8.979999999999999,9.089999999999998,8.91,8.989999999999998,8.95,8.85,9.029999999999998,9.139999999999999,9.290000000000001,9.679999999999998,9.95,10.169999999999998,10.36,10.679999999999998,10.999999999999998,11.28,11.87,12.569999999999999,12.99,13.259999999999998,13.409999999999997,13.610000000000001,13.799999999999997,14.339999999999998,14.959999999999997,15.909999999999998,17.389999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
