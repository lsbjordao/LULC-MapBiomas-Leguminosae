<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.58000000000001,39.39,38.36,37.739999999999995,37.39999999999999,37.220000000000006,37,36.769999999999996,36.65,36.24999999999999,36.3,36.55,36.749999999999986,36.879999999999995,37.370000000000005,37.489999999999995,37.52,37.650000000000006,37.64000000000001,37.65,38.169999999999995,38.68999999999999,38.81999999999999,38.78,38.419999999999995,38.28999999999999,38.22,38.21000000000001,38.26,38.18000000000001,38.26,38.339999999999996,38.43999999999999,38.53,38.57,38.609999999999985,38.699999999999996,39],"color":"green"},{"name":"anthropic","data":[60.769999999999996,60.970000000000006,61.99,62.61000000000001,62.96,63.150000000000006,63.34000000000001,63.589999999999996,63.71,64.11000000000001,64.05000000000001,63.81,63.62000000000001,63.489999999999995,62.989999999999995,62.86,62.84,62.710000000000015,62.71000000000001,62.690000000000005,62.18,61.68,61.54,61.58,61.98,62.08,62.15,62.149999999999984,62.11,62.19,62.099999999999994,62.04999999999999,61.93999999999999,61.849999999999994,61.8,61.75,61.660000000000004,61.39],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
