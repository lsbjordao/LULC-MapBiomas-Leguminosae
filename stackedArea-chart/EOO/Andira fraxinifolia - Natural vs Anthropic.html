<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.48,68.27,67.64999999999999,67.05000000000001,66.47,66.05,65.58,65.01,64.44,63.970000000000006,63.40000000000001,62.97000000000001,62.58000000000001,62.03,61.6,61.18000000000002,60.740000000000016,60.330000000000005,59.73000000000001,59.12000000000001,58.67000000000001,58.35000000000001,58.11000000000003,57.920000000000016,57.79000000000001,57.680000000000014,57.51000000000001,57.230000000000004,56.930000000000014,56.640000000000015,56.390000000000015,56.210000000000015,56.09000000000002,55.95000000000002,55.77000000000001,55.56000000000002,55.27,54.94000000000001],"color":"green"},{"name":"anthropic","data":[27.280000000000005,27.47000000000001,28.07,28.69,29.300000000000004,29.710000000000004,30.180000000000007,30.740000000000013,31.300000000000008,31.77000000000001,32.339999999999996,32.779999999999994,33.169999999999995,33.699999999999996,34.160000000000004,34.54,34.98000000000001,35.410000000000004,36.00000000000001,36.620000000000005,37.06,37.370000000000005,37.63,37.82000000000001,37.95000000000001,38.05,38.239999999999995,38.5,38.809999999999995,39.089999999999996,39.339999999999996,39.51,39.63999999999999,39.76,39.969999999999985,40.16999999999998,40.459999999999994,40.8],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
