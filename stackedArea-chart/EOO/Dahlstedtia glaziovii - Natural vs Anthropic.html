<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.99999999999999,52.209999999999994,51.80999999999999,51.75999999999999,51.63999999999999,51.569999999999986,51.65,51.84999999999999,52,51.910000000000004,51.96,52.14000000000001,52.18,52.28,52.41,52.32,52.22,52.259999999999984,52.22999999999999,52.22999999999999,52.329999999999984,52.499999999999986,52.499999999999986,52.56999999999998,52.629999999999995,52.819999999999986,52.88999999999999,52.94999999999999,53.01999999999999,52.999999999999986,53.04999999999999,53.129999999999995,53.33,53.32999999999999,53.37999999999999,53.38,53.49999999999999,53.529999999999994],"color":"green"},{"name":"anthropic","data":[28.450000000000003,28.23,28.62,28.700000000000003,28.82,28.860000000000003,28.790000000000003,28.590000000000003,28.430000000000003,28.52,28.48,28.299999999999997,28.240000000000002,28.15,28.02,28.140000000000004,28.200000000000003,28.2,28.22,28.21,28.09,27.950000000000003,27.94,27.860000000000003,27.81,27.6,27.560000000000002,27.5,27.43,27.43,27.400000000000002,27.33,27.11,27.090000000000003,27.060000000000006,27.050000000000008,26.920000000000005,26.91],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
