<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.040000000000006,52.30000000000001,51.55000000000001,50.85,50.08000000000001,49.36000000000001,48.67,47.85,47.13,46.45000000000001,45.73000000000001,45.120000000000005,44.59000000000001,44.089999999999996,43.510000000000005,42.980000000000004,42.6,42.17000000000001,41.70000000000001,41.21000000000001,40.91,40.699999999999996,40.56,40.47,40.39,40.25,40.10000000000001,39.80000000000001,39.49,39.199999999999996,38.97000000000001,38.84,38.73,38.730000000000004,38.63,38.55999999999999,38.410000000000004,38.58],"color":"green"},{"name":"anthropic","data":[46.720000000000006,47.41,48.150000000000006,48.86999999999999,49.639999999999986,50.360000000000014,51.050000000000004,51.86,52.589999999999996,53.279999999999994,53.98000000000001,54.59,55.129999999999995,55.620000000000005,56.17,56.730000000000004,57.110000000000014,57.52,58.00999999999999,58.5,58.789999999999985,59.010000000000005,59.13000000000001,59.26000000000001,59.35000000000001,59.44999999999999,59.62,59.90999999999998,60.21,60.53,60.74000000000001,60.87000000000001,60.98999999999999,60.98999999999999,61.069999999999986,61.169999999999995,61.339999999999996,61.15999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
