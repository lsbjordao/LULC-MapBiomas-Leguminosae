<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.10999999999999,84.77000000000001,84.04,83.27000000000001,82.63000000000001,82.08000000000001,81.52000000000001,80.63999999999999,79.86000000000003,79.07000000000002,78.10000000000001,77.13,76.24000000000001,75.45000000000002,74.57000000000001,73.74,72.93,72.03999999999999,70.69,69.5,68.50000000000001,67.79,67.25000000000001,66.69,66.38000000000001,66.06000000000002,65.72,65.25999999999999,64.53,64.03,63.39,62.99,62.63,62.3,61.940000000000005,61.53000000000001,60.96000000000001,60.260000000000005],"color":"green"},{"name":"anthropic","data":[14.34,14.709999999999999,15.45,16.22,16.85,17.39,17.96,18.830000000000002,19.62,20.39,21.37,22.330000000000002,23.23,24.01,24.920000000000005,25.730000000000008,26.550000000000004,27.440000000000005,28.79000000000001,29.98,30.970000000000006,31.700000000000006,32.22,32.769999999999996,33.10999999999999,33.419999999999995,33.75,34.23,34.949999999999996,35.45,36.08,36.46999999999999,36.83999999999999,37.169999999999995,37.55,37.949999999999996,38.52,39.21],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
