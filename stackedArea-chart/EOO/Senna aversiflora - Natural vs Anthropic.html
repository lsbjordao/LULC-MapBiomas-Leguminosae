<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[53.34,53.04999999999999,52.26999999999999,51.819999999999986,51.14,50.51999999999999,49.98999999999999,49.169999999999995,48.46999999999999,48.169999999999995,48.00999999999999,48.12999999999999,48.43999999999999,48.4,48.49999999999999,48.43999999999999,48.169999999999995,48.20999999999999,47.829999999999984,47.72,47.62999999999999,47.80999999999999,47.88999999999999,47.819999999999986,47.78999999999999,47.54999999999999,47.25999999999999,46.61,46.279999999999994,45.989999999999995,45.949999999999996,46.16,46.019999999999996,46.099999999999994,46.03,46.10999999999999,46.12999999999999,46.269999999999996],"color":"green"},{"name":"anthropic","data":[45.72,46.04,46.81,47.31,47.97,48.61,49.120000000000005,49.92000000000001,50.64,50.94,51.1,50.959999999999994,50.65,50.699999999999996,50.60999999999999,50.66999999999999,50.92999999999999,50.889999999999986,51.279999999999994,51.379999999999995,51.46999999999999,51.28,51.19999999999999,51.269999999999996,51.30999999999999,51.56,51.839999999999996,52.489999999999995,52.81,53.089999999999996,53.13000000000001,52.92,53.04,52.98,53.06000000000001,52.970000000000006,52.96000000000001,52.81],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
