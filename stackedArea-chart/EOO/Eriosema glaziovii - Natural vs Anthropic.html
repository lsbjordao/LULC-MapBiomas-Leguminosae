<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.24,32.63,32.27,31.760000000000005,31.310000000000002,31.1,30.640000000000008,30.360000000000007,30.160000000000007,29.920000000000005,29.640000000000008,29.420000000000005,29.120000000000008,28.95000000000001,28.840000000000003,28.570000000000004,28.480000000000004,28.300000000000004,28.20000000000001,28.010000000000012,27.930000000000007,27.90000000000001,27.880000000000006,27.900000000000006,27.940000000000012,27.970000000000006,27.990000000000006,28.000000000000007,27.980000000000004,27.950000000000003,28.06000000000001,28.180000000000007,28.180000000000014,28.180000000000007,28.120000000000008,28.050000000000004,28.000000000000004,28.12000000000001],"color":"green"},{"name":"anthropic","data":[65.16000000000001,65.77000000000001,66.11,66.61999999999999,67.08000000000001,67.33,67.76000000000002,68.06,68.28000000000002,68.48000000000002,68.76,68.99,69.28,69.46000000000001,69.57999999999998,69.83000000000003,69.91000000000001,70.12,70.21,70.42,70.48,70.52999999999999,70.54999999999998,70.50999999999998,70.47000000000001,70.42999999999999,70.4,70.42000000000002,70.41,70.43999999999998,70.35,70.21999999999998,70.25999999999999,70.22,70.28999999999998,70.36,70.39999999999998,70.28],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
