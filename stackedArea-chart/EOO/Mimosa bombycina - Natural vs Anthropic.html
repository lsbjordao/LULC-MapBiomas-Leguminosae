<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[51.46,48.65,48.09,47.74999999999999,47.18999999999999,46.8,46.629999999999995,46.4,46.15,46.449999999999996,46.720000000000006,46.910000000000004,47.15,47.31,46.78999999999999,46.12,45.96,45.65,45.30999999999999,45.21,45.660000000000004,45.489999999999995,45.349999999999994,45.28,45.519999999999996,45.57,45.50000000000001,45.61000000000001,45.7,45.92999999999999,46.57,46.66,47.089999999999996,47.1,47.04,46.779999999999994,46.65,46.33],"color":"green"},{"name":"anthropic","data":[48.019999999999996,50.83,51.37,51.720000000000006,52.279999999999994,52.68000000000001,52.849999999999994,53.07,53.31,53.019999999999996,52.77,52.57000000000001,52.330000000000005,52.17000000000001,52.69,53.34,53.519999999999996,53.82000000000001,54.15,54.26,53.809999999999995,53.98999999999999,54.13999999999999,54.19,53.989999999999995,53.92000000000001,53.980000000000004,53.870000000000005,53.78000000000001,53.550000000000004,52.9,52.85,52.39000000000001,52.37,52.449999999999996,52.690000000000005,52.83000000000001,53.150000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
