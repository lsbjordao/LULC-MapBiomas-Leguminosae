<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.36000000000001,59.949999999999996,59.26,58.58,57.88000000000002,57.4,56.9,56.30000000000001,55.78000000000001,55.27,54.58000000000002,54.06000000000001,53.720000000000006,53.34,52.95,52.63000000000001,52.34000000000001,51.960000000000015,51.47000000000001,51.02,50.72000000000001,50.50000000000001,50.35,50.20000000000001,50.12,49.980000000000004,49.70000000000001,49.400000000000006,49.110000000000014,48.830000000000005,48.58000000000002,48.45000000000002,48.29000000000001,48.20000000000002,47.95000000000001,47.79,47.470000000000006,47.290000000000006],"color":"green"},{"name":"anthropic","data":[36.72,37.13999999999999,37.839999999999996,38.53,39.220000000000006,39.68,40.16999999999999,40.79999999999999,41.29999999999998,41.85999999999999,42.5,43.03,43.35999999999999,43.739999999999995,44.11,44.43,44.730000000000004,45.080000000000005,45.57,46.01,46.36,46.5,46.64000000000001,46.800000000000004,46.85999999999999,46.949999999999996,47.360000000000014,47.690000000000005,47.95,48.16000000000001,48.44000000000001,48.440000000000005,48.78,48.64000000000001,49.059999999999995,49.2,49.40999999999999,49.79],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
