<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.09,98.11999999999999,98.07000000000001,98.00999999999999,97.95999999999998,98.03999999999998,98.11,98,97.87,97.88,98.00000000000001,97.95,97.78999999999998,97.47,97.27999999999999,97.41,97.49,97.45,97.4,97.35000000000001,97.22000000000001,97.08,97.14000000000001,97.24,97.07,96.75999999999999,96.75999999999999,96.92999999999999,96.98,96.91000000000001,96.58,96.05,96.01999999999998,96.16999999999999,96.34,96.35,96.35999999999999,96.08],"color":"green"},{"name":"anthropic","data":[1.28,1.24,1.3,1.35,1.4100000000000001,1.33,1.25,1.3699999999999999,1.49,1.48,1.3599999999999999,1.42,1.5699999999999998,1.88,2.08,1.96,1.88,1.92,1.96,2.01,2.1399999999999997,2.28,2.2199999999999998,2.13,2.2899999999999996,2.6199999999999997,2.61,2.44,2.3799999999999994,2.4599999999999995,2.7899999999999996,3.32,3.34,3.1999999999999993,3.039999999999999,3,3.01,3.29],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
