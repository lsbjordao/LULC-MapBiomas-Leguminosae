<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.12000000000001,44.620000000000005,44.099999999999994,44.449999999999996,44.910000000000004,45.230000000000004,45.7,46.03,46.61,47.63000000000001,47.89,49.050000000000004,49.88999999999999,50.720000000000006,51.6,52.29,52.49000000000001,52.86,53.239999999999995,53.46,53.72,54.1,54.279999999999994,54.49,54.61,54.99,55.41000000000002,55.83,56.18,56.400000000000006,56.49,56.68000000000001,57.050000000000004,57.21000000000001,57.470000000000006,57.71,57.88,58.150000000000006],"color":"green"},{"name":"anthropic","data":[39.290000000000006,39.78000000000001,40.300000000000004,39.949999999999996,39.49999999999999,39.2,38.730000000000004,38.38999999999999,37.81,36.78,36.52,35.37,34.510000000000005,33.71,32.81999999999999,32.13,31.919999999999998,31.549999999999997,31.169999999999998,30.949999999999996,30.689999999999998,30.32,30.13,29.94,29.82,29.419999999999998,28.99,28.57,28.25,28.01,27.919999999999998,27.729999999999997,27.369999999999997,27.199999999999996,26.94,26.709999999999997,26.529999999999998,26.269999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
