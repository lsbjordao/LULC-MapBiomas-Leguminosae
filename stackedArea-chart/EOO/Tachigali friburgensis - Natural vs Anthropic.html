<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[26.840000000000003,27.130000000000006,26.919999999999998,26.9,26.790000000000003,26.750000000000007,26.69,26.990000000000006,27.13,27.260000000000005,27.43,27.450000000000003,27.59,27.540000000000006,27.390000000000004,27.180000000000003,27.200000000000006,27.120000000000005,27.130000000000006,27.070000000000007,27.030000000000005,27.130000000000006,27.230000000000008,27.380000000000003,27.610000000000003,27.830000000000005,28.240000000000002,28.390000000000004,28.540000000000003,28.68,28.91,29.02,29.150000000000002,29.23,29.31,29.330000000000002,29.51,29.480000000000004],"color":"green"},{"name":"anthropic","data":[72.71,72.41999999999999,72.63,72.66,72.77,72.78,72.87,72.56,72.41000000000001,72.28999999999999,72.12,72.09,71.95,72.00999999999999,72.16,72.37,72.34000000000002,72.41,72.42,72.47,72.51,72.41000000000001,72.32,72.18,71.94000000000001,71.71,71.32000000000001,71.14999999999999,71.02000000000001,70.89,70.64000000000001,70.53000000000002,70.4,70.32000000000001,70.26000000000002,70.23,70.03999999999999,70.08],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
