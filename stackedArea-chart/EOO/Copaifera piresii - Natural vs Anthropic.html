<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[92.09,91.89999999999999,91.31,90.64999999999999,90.15,89.74,89.27999999999999,88.42999999999999,87.65,86.86000000000001,85.79,84.82000000000002,83.87,82.9,81.95,81.23,80.4,79.47,78.11,76.77,75.71000000000002,74.91,74.29,73.72000000000001,73.35000000000001,73.14,72.86,72.54,72.08999999999999,71.71,71.21000000000001,70.71999999999998,70.33999999999999,69.97000000000001,69.45,68.94,68.15999999999998,67.13999999999999],"color":"green"},{"name":"anthropic","data":[8.079999999999998,8.260000000000002,8.870000000000001,9.51,10.01,10.430000000000001,10.88,11.729999999999999,12.510000000000002,13.309999999999999,14.349999999999998,15.329999999999998,16.27,17.27,18.2,18.939999999999994,19.77,20.689999999999998,22.06,23.400000000000002,24.44,25.25,25.87,26.44,26.8,27.03,27.29,27.63,28.060000000000002,28.439999999999998,28.96,29.44,29.82,30.179999999999996,30.69,31.21,31.989999999999995,33.010000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
