<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[91.22000000000001,90.96000000000002,90.65,90.32999999999998,89.99,89.7,89.42000000000002,88.98,88.53,88.03,87.4,86.88000000000001,86.36,85.83999999999999,85.29,84.9,84.55,84.03,83.34000000000002,82.68,82.21,81.92999999999998,81.76999999999998,81.59,81.47999999999999,81.4,81.30000000000001,81.19000000000003,81.05,80.91000000000001,80.7,80.52000000000002,80.39999999999998,80.28999999999999,80.08,79.86999999999999,79.52,79.12],"color":"green"},{"name":"anthropic","data":[12.91,13.139999999999999,13.5,13.809999999999999,14.159999999999998,14.42,14.7,15.159999999999997,15.61,16.09,16.709999999999997,17.24,17.74,18.279999999999998,18.819999999999997,19.2,19.57,20.07,20.780000000000005,21.44,21.910000000000004,22.180000000000003,22.360000000000003,22.529999999999998,22.63,22.720000000000002,22.85,22.92,23.080000000000002,23.210000000000004,23.410000000000004,23.580000000000002,23.72,23.830000000000002,24.03,24.240000000000002,24.590000000000007,24.99000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
