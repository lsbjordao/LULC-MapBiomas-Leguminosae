<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.82,35.84,34.99000000000001,34.49,33.87,33.69,33.57,33.65,33.96,34.12,34.26000000000001,34.330000000000005,34.24,34.11,34.02,33.57,33.529999999999994,33.49,33.74,33.7,33.95,34.1,34.260000000000005,34.529999999999994,34.74,34.78,34.699999999999996,34.69999999999999,34.529999999999994,34.43999999999999,34.51999999999999,34.36999999999999,34.379999999999995,34.54,34.65,34.669999999999995,34.74999999999999,34.64],"color":"green"},{"name":"anthropic","data":[60.980000000000004,61.98,62.85,63.349999999999994,63.96,64.16,64.28,64.18999999999998,63.900000000000006,63.74,63.63,63.56999999999999,63.609999999999985,63.75,63.84999999999999,64.28999999999999,64.33,64.35,64.11999999999999,64.14999999999999,63.900000000000006,63.75,63.599999999999994,63.34000000000001,63.11,63.089999999999996,63.150000000000006,63.15,63.34,63.42999999999999,63.31999999999999,63.49,63.480000000000004,63.33999999999999,63.21,63.16,63.07,63.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
