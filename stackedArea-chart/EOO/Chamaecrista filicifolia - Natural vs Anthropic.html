<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[76.06,75.91,75.27999999999999,74.57000000000001,73.86,73.42000000000002,72.88,72.07000000000002,71.33000000000001,70.69000000000001,69.89,69.17,68.7,68.08,67.51,67.05,66.43,65.83,65.02000000000001,64.13,63.38000000000002,62.82000000000001,62.37000000000001,61.98000000000001,61.660000000000004,61.400000000000006,61.120000000000005,60.55000000000001,59.949999999999996,59.459999999999994,58.96000000000001,58.650000000000006,58.350000000000016,58.08000000000001,57.74000000000001,57.40000000000001,56.940000000000005,56.49000000000001],"color":"green"},{"name":"anthropic","data":[22.72,22.879999999999995,23.499999999999996,24.220000000000006,24.92000000000001,25.36000000000001,25.910000000000007,26.710000000000008,27.43000000000001,28.080000000000005,28.890000000000008,29.60000000000001,30.100000000000005,30.69000000000001,31.270000000000007,31.750000000000007,32.35,32.93999999999999,33.769999999999996,34.64999999999999,35.37,35.93,36.38999999999999,36.790000000000006,37.11,37.38999999999999,37.650000000000006,38.2,38.81999999999999,39.30000000000001,39.82,40.11000000000001,40.410000000000004,40.69000000000001,41.03000000000001,41.36000000000001,41.81,42.27],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
