<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.07000000000001,64.76000000000002,63.98000000000002,63.28000000000001,62.500000000000014,61.95000000000001,61.40000000000001,60.74,60.11000000000001,59.620000000000005,59.17000000000001,58.74000000000001,58.48000000000001,58.07000000000001,57.6,57.19000000000001,56.790000000000006,56.4,55.86999999999999,55.32,54.94,54.68,54.48,54.33,54.23,54.029999999999994,53.81000000000001,53.36000000000001,52.90000000000001,52.53000000000001,52.20000000000001,52.10000000000001,51.949999999999996,51.86000000000001,51.68,51.49999999999999,51.239999999999995,51.08],"color":"green"},{"name":"anthropic","data":[31.990000000000002,32.32,33.07,33.779999999999994,34.529999999999994,35.11,35.63999999999999,36.28999999999999,36.919999999999995,37.44,37.88,38.31999999999999,38.57,38.98999999999999,39.46,39.82999999999999,40.26,40.64999999999999,41.209999999999994,41.74000000000001,42.12999999999999,42.379999999999995,42.599999999999994,42.71,42.82999999999999,43,43.25000000000001,43.710000000000015,44.13000000000002,44.54000000000001,44.820000000000014,44.970000000000006,45.100000000000016,45.190000000000026,45.38000000000002,45.540000000000006,45.78000000000001,45.970000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
