<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.83999999999999,68.7,67.51,66.06000000000002,64.75000000000001,64.09,63.53000000000001,63.190000000000005,62.60000000000001,61.90000000000001,60.75000000000001,59.89000000000001,59.49000000000001,59.000000000000014,58.90000000000001,58.28000000000001,58.010000000000005,57.540000000000006,57.42,57.18000000000001,56.730000000000004,56.779999999999994,56.64,56.37,56.71999999999999,56.77,56.830000000000005,56.839999999999996,56.55,56.41,56.21,55.76,55.66,55.85999999999999,55.85,55.92,56.28000000000001,56.80000000000001],"color":"green"},{"name":"anthropic","data":[29.930000000000003,31.080000000000002,32.28000000000001,33.71,35.029999999999994,35.669999999999995,36.23,36.599999999999994,37.18,37.87,39.019999999999996,39.87,40.28,40.76,40.88,41.489999999999995,41.74999999999999,42.24,42.35999999999999,42.589999999999996,43.05,42.99,43.13,43.400000000000006,43.03000000000001,43.00000000000001,42.95,42.92,43.21000000000001,43.37,43.550000000000004,44.01,44.11,43.93,43.93,43.85,43.49,42.99],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
