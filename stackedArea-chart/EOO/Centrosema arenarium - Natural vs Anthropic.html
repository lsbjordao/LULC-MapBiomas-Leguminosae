<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.40000000000001,54.260000000000005,53.82000000000001,53.36000000000001,52.839999999999996,52.57000000000001,52.17000000000001,51.800000000000004,51.40000000000001,51.25000000000001,51.08000000000002,50.970000000000006,51.050000000000004,50.91000000000001,50.77000000000001,50.62000000000001,50.400000000000006,50.22000000000001,50.010000000000005,49.71999999999999,49.52000000000001,49.419999999999995,49.330000000000005,49.28,49.29000000000001,49.210000000000015,49.09,48.72,48.360000000000014,48.04000000000001,47.85000000000001,47.820000000000014,47.740000000000016,47.73000000000001,47.64000000000002,47.570000000000014,47.52000000000001,47.47000000000001],"color":"green"},{"name":"anthropic","data":[40.650000000000006,40.78999999999999,41.239999999999995,41.69,42.22999999999999,42.550000000000004,42.910000000000004,43.31000000000001,43.650000000000006,43.84,44.01,44.099999999999994,44.029999999999994,44.15,44.290000000000006,44.449999999999996,44.66,44.85999999999999,45.069999999999986,45.36000000000001,45.58,45.640000000000015,45.75,45.79999999999999,45.78999999999999,45.870000000000005,45.99999999999999,46.370000000000005,46.720000000000006,47.04999999999999,47.21999999999999,47.260000000000005,47.34000000000001,47.339999999999996,47.46000000000001,47.51,47.57000000000001,47.620000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
