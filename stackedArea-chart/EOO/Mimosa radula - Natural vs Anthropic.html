<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.21000000000001,39.59000000000001,38.790000000000006,38.02,37.25,36.680000000000014,36.120000000000005,35.38999999999999,34.9,34.46,33.91,33.51,33.13,32.8,32.48,32.120000000000005,31.910000000000007,31.650000000000006,31.330000000000002,31.040000000000003,30.880000000000003,30.790000000000003,30.740000000000006,30.67,30.690000000000005,30.640000000000004,30.60000000000001,30.520000000000007,30.42000000000001,30.32,30.360000000000007,30.370000000000005,30.35,30.36,30.26000000000001,30.200000000000006,30.090000000000003,30.170000000000005],"color":"green"},{"name":"anthropic","data":[60,60.63,61.43000000000001,62.19999999999999,62.92999999999999,63.53000000000001,64.1,64.78,65.3,65.76,66.30999999999999,66.69999999999999,67.09,67.42999999999999,67.74,68.07999999999997,68.30999999999999,68.55999999999999,68.91000000000001,69.18000000000002,69.33000000000001,69.41,69.46,69.51,69.51,69.53,69.57000000000002,69.66999999999999,69.78,69.86,69.84000000000002,69.83,69.83,69.82999999999998,69.92999999999998,69.99,70.11999999999999,70.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
