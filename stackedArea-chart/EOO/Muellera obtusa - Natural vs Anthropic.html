<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.88,68.76000000000002,68.23,67.73000000000002,67.00000000000001,66.68,66.20000000000002,65.73,65.23,65.2,65.15,65.14000000000001,65.67,65.58999999999999,65.57000000000001,65.52,65.20000000000002,64.96000000000001,64.59,64.26,63.870000000000005,63.65,63.410000000000004,63.480000000000004,63.5,63.57,63.49999999999999,63.21,62.79,62.37,61.97,61.95,61.940000000000005,61.96,61.940000000000005,61.940000000000005,61.83,61.89999999999999],"color":"green"},{"name":"anthropic","data":[31.310000000000006,31.430000000000007,31.960000000000004,32.46000000000001,33.190000000000005,33.52000000000001,34.00000000000001,34.47,34.93,35,35.05,35.070000000000014,34.53000000000001,34.63000000000001,34.64000000000001,34.67,35.01,35.24,35.62,35.92,36.31999999999999,36.53,36.78000000000001,36.720000000000006,36.7,36.629999999999995,36.699999999999996,36.99,37.400000000000006,37.82,38.23,38.26,38.279999999999994,38.23,38.25000000000001,38.269999999999996,38.36,38.279999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
