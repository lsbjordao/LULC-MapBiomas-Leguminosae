<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[36.919999999999995,36.7,36.19,35.769999999999996,35.419999999999995,35.36999999999999,35.150000000000006,34.95,34.8,34.629999999999995,34.379999999999995,34.260000000000005,34.14,34.059999999999995,33.959999999999994,33.800000000000004,33.730000000000004,33.599999999999994,33.54,33.52,33.589999999999996,33.67,33.73,33.76,33.760000000000005,33.79,33.8,33.739999999999995,33.63999999999999,33.52,33.46000000000001,33.39,33.45000000000001,33.550000000000004,33.56,33.58,33.66,33.779999999999994],"color":"green"},{"name":"anthropic","data":[58.25000000000001,58.50000000000001,58.95000000000001,59.39,59.74,59.79,59.98,60.209999999999994,60.35,60.519999999999996,60.760000000000005,60.88,60.99000000000001,61.089999999999996,61.18,61.36,61.4,61.51,61.589999999999996,61.61999999999999,61.550000000000004,61.47000000000001,61.419999999999995,61.400000000000006,61.42,61.39,61.37,61.40999999999999,61.54,61.63999999999999,61.69,61.73,61.70000000000001,61.59,61.580000000000005,61.550000000000004,61.50999999999999,61.39],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
