<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[65.12,64.91000000000001,64.66,63.86,62.75,61.94999999999998,61.20000000000001,59.849999999999994,59.07999999999999,58.89000000000001,58.5,58.449999999999996,59.239999999999995,59.19,59.41,59.47,58.959999999999994,58.73,58.449999999999996,58.32,57.739999999999995,57.769999999999996,57.4,56.980000000000004,56.82,56.599999999999994,56.38999999999999,55.79,55.019999999999996,55.03,55.08,56.03999999999999,56.099999999999994,56.050000000000004,56.08999999999999,56.15,56.06999999999999,56.10999999999999],"color":"green"},{"name":"anthropic","data":[34.86,35.059999999999995,35.279999999999994,36.08999999999999,37.22999999999999,37.99999999999999,38.75999999999999,40.12,40.9,41.1,41.45,41.5,40.7,40.769999999999996,40.559999999999995,40.489999999999995,41.010000000000005,41.23,41.52,41.64,42.2,42.190000000000005,42.56,42.99,43.150000000000006,43.37,43.57000000000001,44.190000000000005,44.97,44.940000000000005,44.900000000000006,43.93,43.86000000000001,43.93000000000001,43.870000000000005,43.81,43.910000000000004,43.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
