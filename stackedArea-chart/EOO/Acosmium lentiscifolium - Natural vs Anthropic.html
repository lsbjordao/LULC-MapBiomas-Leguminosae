<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[48.01000000000002,47.89000000000002,47.26,46.71000000000001,46.260000000000005,46.380000000000024,46.28000000000002,46.04000000000001,45.780000000000015,45.53000000000001,45.28,45.150000000000006,45.36000000000001,45.47,45.53,45.63000000000001,45.599999999999994,45.46,45.41,45.39,45.38,45.489999999999995,45.45,45.42999999999999,45.42999999999999,45.41000000000001,45.36000000000001,45.330000000000005,45.13,44.8,44.540000000000006,44.260000000000005,44.29,44.40999999999999,44.42,44.400000000000006,44.410000000000004,44.53000000000001],"color":"green"},{"name":"anthropic","data":[51.33999999999999,51.44,52.06999999999999,52.64,53.07000000000001,52.96,53.07,53.309999999999995,53.55,53.78999999999999,54.059999999999995,54.19,54,53.9,53.82,53.730000000000004,53.730000000000004,53.88000000000001,53.92000000000001,53.93999999999999,53.959999999999994,53.84999999999999,53.89,53.910000000000004,53.89999999999999,53.91,53.97,54.01,54.199999999999996,54.529999999999994,54.79999999999999,55.05999999999998,55.05999999999999,54.91999999999999,54.92999999999999,54.95,54.92,54.79],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
