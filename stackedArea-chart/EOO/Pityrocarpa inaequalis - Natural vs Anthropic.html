<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.67000000000001,41.900000000000006,41.089999999999996,41.07000000000001,41.09,40.92,41.07,41.120000000000005,41.319999999999986,41.819999999999986,41.97999999999999,42.53999999999999,42.9,43.289999999999985,43.84999999999999,44.08999999999999,44.15,44.31,44.53999999999999,44.69999999999999,44.9,45.099999999999994,45.07999999999999,45.18,45.300000000000004,45.54,45.72,46.029999999999994,46.35,46.61,46.760000000000005,46.94,47.25,47.36000000000001,47.57,47.669999999999995,48.019999999999996,48.26],"color":"green"},{"name":"anthropic","data":[53.89,54.69,55.5,55.51,55.47,55.650000000000006,55.50000000000001,55.45000000000001,55.24000000000001,54.730000000000004,54.58000000000001,54.02,53.68,53.260000000000005,52.71,52.48,52.42,52.26,52.029999999999994,51.87,51.669999999999995,51.47,51.489999999999995,51.36,51.25,51.03,50.85,50.54,50.23,49.97,49.78999999999999,49.64,49.31999999999999,49.199999999999996,48.99999999999999,48.89,48.56999999999999,48.309999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
