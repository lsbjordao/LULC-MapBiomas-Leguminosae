<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[70.87,70.76,70.24,68.94999999999999,68.14,67.83,67.6,66.73000000000002,66.22,65.86000000000001,65.28000000000002,64.53,65.00000000000001,65.13,65.6,65.96000000000001,66.05999999999999,66.12,66.22000000000001,66.34,65.55,65.77999999999999,65.53,65.01,65.2,65.07,64.91999999999999,64.00000000000001,62.95,62.47,62.21000000000001,62.839999999999996,62.93000000000001,62.690000000000005,62.77,62.90000000000001,62.74,62.81],"color":"green"},{"name":"anthropic","data":[28.57,28.669999999999998,29.19,30.470000000000002,31.290000000000003,31.580000000000002,31.830000000000002,32.68,33.21,33.56,34.150000000000006,34.900000000000006,34.42,34.300000000000004,33.82,33.47,33.37,33.31999999999999,33.21,33.11,33.87,33.64999999999999,33.89,34.42,34.230000000000004,34.349999999999994,34.51,35.42,36.47000000000001,36.970000000000006,37.21000000000001,36.61,36.519999999999996,36.760000000000005,36.660000000000004,36.55,36.7,36.620000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
