<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.98,35.65,35.33,35.2,35.02,35.08,35.12,35.15,35.25,35.41,35.52,35.72,35.89,35.809999999999995,35.67,35.400000000000006,35.260000000000005,35.10000000000001,34.870000000000005,34.82000000000001,35.040000000000006,35.31,35.82,36.220000000000006,36.690000000000005,36.959999999999994,37.06999999999999,37.03999999999999,36.86,36.60999999999999,36.53999999999999,36.28999999999999,36.22,36.269999999999996,36.059999999999995,36.03,36.190000000000005,36.2],"color":"green"},{"name":"anthropic","data":[63.900000000000006,64.25,64.54,64.67000000000002,64.85000000000001,64.8,64.78,64.72000000000001,64.63,64.49,64.38999999999999,64.17999999999999,63.989999999999995,64.09,64.21,64.50999999999999,64.64,64.78,65.02,65.07,64.83999999999999,64.59,64.06000000000002,63.68000000000001,63.209999999999994,62.92999999999999,62.81999999999999,62.85,63.04,63.269999999999996,63.349999999999994,63.620000000000005,63.68000000000001,63.620000000000005,63.84,63.86,63.7,63.690000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
