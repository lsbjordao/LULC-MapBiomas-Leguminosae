<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.52,97.51,97.34000000000002,97.2,96.95,96.56000000000002,96.19,94.91000000000001,94.77,94.38000000000002,93.65,92.73,90.79000000000002,89.63000000000001,89.17,88.98000000000002,87.76,86.40000000000002,85.59000000000002,84.36000000000001,83.07000000000002,81.89,81.23000000000002,80.27000000000002,79.45000000000002,78.39,77.5,77.33000000000003,77.57000000000001,77.62,77.12000000000002,76.43000000000002,75.70000000000002,74.58,72.21000000000002,70.15,68.31000000000002,66.81],"color":"green"},{"name":"anthropic","data":[2.29,2.3,2.48,2.62,2.86,3.24,3.62,4.91,5.04,5.43,6.17,7.08,9.02,10.18,10.63,10.82,12.05,13.41,14.219999999999999,15.45,16.73,17.92,18.57,19.54,20.36,21.42,22.31,22.48,22.240000000000002,22.19,22.69,23.38,24.119999999999997,25.23,27.61,29.66,31.51,33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
