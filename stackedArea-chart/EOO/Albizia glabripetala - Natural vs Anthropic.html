<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.33,98.75,98.74000000000001,98.58,98.42,98.21999999999998,98.13,97.83,97.31,96.86999999999999,96.61,96.19,95.5,95.02000000000001,94.59,94.17,93.84,93.66,93.39,93.31999999999998,93.37,93.12,92.47999999999999,91.99000000000001,91.83999999999999,91.63000000000001,91.57,91.4,91.1,90.48,89.82,89.54,89.24000000000001,88.72999999999999,88.21999999999998,88.14,88.08999999999999,88.09999999999998],"color":"green"},{"name":"anthropic","data":[1.01,0.58,0.6,0.77,0.92,1.1,1.21,1.51,2.02,2.47,2.73,3.14,3.82,4.32,4.75,5.17,5.5,5.680000000000001,5.94,6.0200000000000005,5.97,6.21,6.85,7.34,7.49,7.6899999999999995,7.77,7.9399999999999995,8.23,8.85,9.510000000000002,9.790000000000001,10.09,10.61,11.110000000000001,11.200000000000001,11.23,11.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
