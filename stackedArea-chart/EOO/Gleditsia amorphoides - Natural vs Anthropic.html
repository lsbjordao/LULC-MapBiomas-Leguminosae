<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[44.03,43.56,43.01,42.56,42.21,41.910000000000004,41.79,41.669999999999995,41.61000000000001,41.34,41.290000000000006,41.040000000000006,40.77,40.58,40.25999999999999,39.96,39.76,39.45000000000001,39.279999999999994,39.06,38.95,39.10000000000001,39.07,38.91,38.84000000000001,38.76,38.669999999999995,38.59,38.79,38.730000000000004,38.83,38.75,38.56,38.43000000000001,38.17,38.06,38.01,37.94],"color":"green"},{"name":"anthropic","data":[53.699999999999996,54.13,54.64,55.180000000000014,55.50000000000001,55.87,55.959999999999994,56.08,56.120000000000005,56.4,56.50000000000001,56.699999999999996,56.949999999999996,57.13999999999999,57.440000000000005,57.519999999999996,57.730000000000004,58.06999999999999,58.23,58.489999999999995,58.61,58.54,58.55999999999999,58.58999999999999,58.69999999999999,58.769999999999996,58.82999999999999,58.88999999999999,58.800000000000004,58.800000000000004,58.779999999999994,58.82,59.029999999999994,59.209999999999994,59.519999999999996,59.67999999999999,59.86,59.96],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
