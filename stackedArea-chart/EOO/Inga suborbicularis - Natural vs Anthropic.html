<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.040000000000006,32.059999999999995,31.420000000000005,30.810000000000002,30.34,30.159999999999997,29.9,29.729999999999997,29.559999999999995,29.339999999999993,28.99,28.839999999999996,28.649999999999995,28.589999999999996,28.41,28.169999999999998,28.19,28.099999999999998,28.17,28.07,27.929999999999996,27.899999999999995,27.979999999999997,28.029999999999998,28.069999999999997,28.089999999999996,28.22,28.38,28.35,28.44,28.509999999999998,28.529999999999998,28.57,28.64,28.68,28.679999999999996,28.849999999999998,29.210000000000004],"color":"green"},{"name":"anthropic","data":[34.12,34.1,34.74,35.36,35.830000000000005,36.02,36.29,36.46,36.620000000000005,36.84,37.19,37.34,37.52,37.59,37.77,38.02000000000001,38.010000000000005,38.10000000000001,38.010000000000005,38.12,38.260000000000005,38.31,38.21,38.17,38.120000000000005,38.10000000000001,37.97000000000001,37.830000000000005,37.84,37.74,37.67000000000001,37.67000000000001,37.64000000000001,37.550000000000004,37.510000000000005,37.550000000000004,37.36,36.99],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
