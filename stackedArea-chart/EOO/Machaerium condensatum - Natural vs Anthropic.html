<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[27.590000000000007,27.540000000000003,26.95,26.499999999999993,26.130000000000003,25.949999999999996,25.7,25.549999999999997,25.49,25.419999999999998,25.34,25.26,25.150000000000002,25.07,24.98,24.820000000000004,24.900000000000002,24.9,24.919999999999995,24.899999999999995,24.959999999999994,25.08,25.25,25.33,25.419999999999998,25.51,25.660000000000004,25.77,25.84,25.919999999999998,26.020000000000007,26.110000000000003,26.220000000000002,26.320000000000004,26.400000000000002,26.469999999999995,26.67,26.919999999999998],"color":"green"},{"name":"anthropic","data":[54.07,54.13,54.709999999999994,55.16,55.54,55.709999999999994,56.00999999999999,56.13,56.17,56.26000000000001,56.330000000000005,56.40000000000001,56.51,56.61,56.70000000000001,56.84,56.78,56.79,56.800000000000004,56.790000000000006,56.74000000000001,56.62,56.459999999999994,56.36,56.269999999999996,56.17000000000001,56,55.910000000000004,55.86999999999999,55.78999999999999,55.660000000000004,55.56999999999999,55.44,55.36000000000001,55.279999999999994,55.22999999999998,55.029999999999994,54.77999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
