<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.27999999999999,60.99999999999999,61.15,60.129999999999995,59.16,58.58999999999999,57.629999999999995,56.82999999999999,56.12999999999998,55.33999999999999,54.72,54.199999999999996,53.49,52.81999999999999,52.33,51.61,50.989999999999995,50.43,49.74999999999999,48.99000000000001,48.71,48.480000000000004,48.190000000000005,47.919999999999995,47.980000000000004,47.88,47.7,47.64999999999999,47.589999999999996,47.36,47.07999999999999,46.87999999999999,46.66,46.339999999999996,45.94,45.68,45.419999999999995,45.550000000000004],"color":"green"},{"name":"anthropic","data":[38.09,38.4,38.24999999999999,39.26,40.23,40.79,41.759999999999984,42.54999999999999,43.26,44.04999999999999,44.66,45.18999999999999,45.9,46.559999999999995,47.050000000000004,47.78,48.379999999999995,48.98,49.64,50.419999999999995,50.650000000000006,50.900000000000006,51.17999999999999,51.480000000000004,51.39,51.51,51.669999999999995,51.75,51.8,52.03,52.3,52.510000000000005,52.71999999999999,53.050000000000004,53.44,53.709999999999994,53.98,53.83],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
