<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[26.530000000000005,24.700000000000003,23.290000000000003,22.32,22.15,21.76,20.990000000000002,20.28,19.77,19.02,18.56,18.24,17.880000000000003,17.790000000000003,17.52,17.2,17.18,17.030000000000005,16.919999999999998,16.740000000000002,16.69,16.69,16.61,16.790000000000003,17.03,17.27,17.320000000000004,17.37,17.339999999999996,17.400000000000002,17.420000000000005,17.380000000000003,17.580000000000002,17.730000000000004,17.8,17.91,17.65,18.669999999999998],"color":"green"},{"name":"anthropic","data":[72.83999999999999,74.65999999999998,76.09,77.06,77.24000000000001,77.61000000000001,78.4,79.09,79.61000000000001,80.35000000000001,80.82,81.12,81.49,81.58000000000001,81.86999999999999,82.18,82.19000000000001,82.35000000000001,82.44999999999999,82.63999999999999,82.67,82.68999999999998,82.77000000000001,82.59,82.33999999999999,82.13,82.05999999999999,82.00000000000001,82.02999999999999,81.96000000000001,81.96,81.99000000000001,81.78999999999998,81.66000000000001,81.60000000000001,81.47999999999999,81.73,80.72],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
