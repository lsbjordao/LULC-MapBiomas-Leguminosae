<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.16,38.97,38.449999999999996,37.97,37.51999999999999,37.339999999999996,36.980000000000004,36.63000000000001,36.33000000000001,36.13000000000001,35.900000000000006,35.8,35.739999999999995,35.63,35.53,35.37,35.3,35.099999999999994,34.949999999999996,34.85,34.809999999999995,34.83,34.82000000000001,34.83000000000001,34.760000000000005,34.69,34.61000000000001,34.480000000000004,34.29,34.11000000000001,34.019999999999996,33.92,33.91,34,33.97,33.99,34.06,34.21000000000001],"color":"green"},{"name":"anthropic","data":[52.16000000000001,52.35,52.839999999999996,53.370000000000005,53.83000000000001,54.010000000000005,54.34,54.72,54.99999999999999,55.220000000000006,55.45,55.53000000000001,55.61,55.71999999999999,55.809999999999995,55.970000000000006,56.06,56.23,56.35999999999999,56.5,56.5,56.5,56.50999999999999,56.55000000000002,56.6,56.66,56.73,56.870000000000005,57.050000000000004,57.22,57.32000000000001,57.42,57.440000000000005,57.35000000000001,57.33000000000001,57.32000000000001,57.28,57.11000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
