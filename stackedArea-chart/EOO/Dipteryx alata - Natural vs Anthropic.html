<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.19000000000001,71.91000000000001,71.24000000000002,70.55000000000001,69.86000000000003,69.36000000000003,68.81,68.08000000000001,67.39000000000001,66.68000000000002,65.86,65.16999999999999,64.6,63.99,63.35999999999999,62.849999999999994,62.31,61.73,60.99,60.309999999999995,59.77,59.39,59.14999999999999,58.849999999999994,58.699999999999996,58.489999999999995,58.22999999999998,57.89999999999999,57.55,57.20999999999999,56.919999999999995,56.669999999999995,56.46999999999999,56.28,55.99999999999999,55.74999999999999,55.29999999999999,54.82],"color":"green"},{"name":"anthropic","data":[26.960000000000008,27.23,27.92000000000001,28.6,29.300000000000004,29.800000000000004,30.35000000000001,31.08000000000001,31.76000000000001,32.459999999999994,33.28,34,34.53999999999999,35.150000000000006,35.78999999999999,36.300000000000004,36.85,37.40000000000001,38.15,38.84,39.400000000000006,39.75000000000001,40.010000000000005,40.33000000000001,40.449999999999996,40.65,40.940000000000005,41.239999999999995,41.59999999999999,41.940000000000005,42.220000000000006,42.480000000000004,42.660000000000004,42.87,43.17,43.40999999999999,43.84999999999999,44.290000000000006],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
