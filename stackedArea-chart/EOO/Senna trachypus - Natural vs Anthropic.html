<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.43,56.32999999999999,55.83999999999999,55.38999999999999,54.86,54.55000000000002,54.23000000000001,53.86000000000001,53.53000000000001,53.43,53.370000000000005,53.34,53.52,53.400000000000006,53.250000000000014,53.13000000000002,52.90000000000002,52.740000000000016,52.530000000000015,52.29000000000001,52.09000000000001,52.02,51.92000000000001,51.88000000000001,51.870000000000005,51.77,51.640000000000015,51.23000000000001,50.870000000000005,50.56000000000002,50.370000000000005,50.35000000000001,50.27000000000002,50.26000000000001,50.150000000000006,50.070000000000014,50.03000000000001,49.960000000000015],"color":"green"},{"name":"anthropic","data":[36.35,36.45000000000001,36.940000000000005,37.4,37.92999999999999,38.21999999999999,38.559999999999995,38.940000000000005,39.26000000000001,39.350000000000016,39.419999999999995,39.419999999999995,39.269999999999996,39.39000000000001,39.540000000000006,39.65,39.87,40.04,40.260000000000005,40.50000000000001,40.68,40.739999999999995,40.85000000000001,40.87,40.89,40.980000000000004,41.12,41.53000000000001,41.89999999999999,42.2,42.38999999999999,42.40999999999999,42.49,42.53,42.61000000000001,42.7,42.74000000000001,42.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
