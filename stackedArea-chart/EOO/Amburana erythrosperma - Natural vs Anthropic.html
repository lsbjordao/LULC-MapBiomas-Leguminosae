<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.03,53.510000000000005,54.1,52.89,52.31,52.03999999999999,52.32000000000001,51.43999999999999,51.120000000000005,51.21,51.54,53.23,53.910000000000004,54.16,55.57000000000001,56.13,55.69,55.34000000000001,56.07,56.019999999999996,56.32999999999999,56.89,56.71,57.11000000000001,57.13000000000001,57.370000000000005,57.449999999999996,56.85,55.230000000000004,53.65,52.98,52.66,52.47,52.06,51.98,51.989999999999995,51.949999999999996,51.85000000000001],"color":"green"},{"name":"anthropic","data":[44.96,45.489999999999995,44.91,46.11,46.7,46.96,46.690000000000005,47.57,47.88,47.79,47.470000000000006,45.77,45.09,44.86,43.46999999999999,42.87,43.309999999999995,43.669999999999995,42.919999999999995,43,42.68,42.14000000000001,42.3,41.91,41.85999999999999,41.64,41.56,42.18,43.760000000000005,45.35,46.040000000000006,46.34000000000001,46.53000000000001,46.95,47.029999999999994,47.010000000000005,47.07000000000001,47.14],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
