<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.15,46.300000000000004,46.07,45.88999999999999,45.33,44.97,44.52,44.779999999999994,44.78999999999999,44.72,44.669999999999995,44.48,44.5,44.36,43.849999999999994,43.760000000000005,43.839999999999996,43.83,43.800000000000004,43.7,43.22,42.88,43.050000000000004,43.050000000000004,43.260000000000005,43.63000000000001,44.07000000000001,44.20000000000001,44.25,44.339999999999996,44.36,44.629999999999995,44.87,44.87,45.129999999999995,45.17,45.010000000000005,44.91],"color":"green"},{"name":"anthropic","data":[55.00000000000001,53.85000000000001,54.08,54.260000000000005,54.82,55.19,55.64,55.379999999999995,55.349999999999994,55.42999999999999,55.48,55.67,55.660000000000004,55.8,56.31,56.38999999999999,56.31,56.34,56.36,56.449999999999996,56.92999999999999,57.279999999999994,57.11,57.11999999999999,56.91,56.550000000000004,56.08,55.96000000000001,55.910000000000004,55.800000000000004,55.78999999999999,55.519999999999996,55.29,55.269999999999996,55.04,54.97999999999999,55.16,55.25],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
