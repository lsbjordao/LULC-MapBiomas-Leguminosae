<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.9,31.42,31.000000000000004,30.69,30.440000000000005,30.310000000000002,30.17,30.080000000000005,30.060000000000006,30.09,30.02,29.970000000000002,29.93,29.860000000000003,29.800000000000004,29.630000000000003,29.660000000000004,29.650000000000002,29.71,29.740000000000002,29.870000000000005,29.95,30.05,30.17,30.290000000000006,30.450000000000006,30.570000000000007,30.670000000000005,30.720000000000002,30.790000000000006,30.950000000000006,31.090000000000003,31.220000000000006,31.330000000000002,31.380000000000006,31.430000000000003,31.590000000000007,31.780000000000005],"color":"green"},{"name":"anthropic","data":[64.63000000000001,65.07,65.54999999999998,65.83999999999999,66.08000000000001,66.20000000000002,66.36000000000001,66.44000000000001,66.48,66.45000000000002,66.52000000000001,66.53999999999999,66.63000000000002,66.67,66.73999999999998,66.88,66.86,66.86999999999999,66.8,66.77000000000002,66.64999999999999,66.55000000000001,66.45000000000003,66.35999999999999,66.22999999999999,66.08000000000001,65.95000000000002,65.83999999999999,65.81,65.75,65.58,65.44,65.33,65.21,65.13999999999999,65.1,64.92999999999999,64.75999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
