<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.76999999999998,40.53999999999999,40.02999999999999,39.58999999999999,39.14999999999999,39.06,38.80999999999999,38.44,38.12999999999999,37.99,37.85,37.80999999999999,37.919999999999995,37.91,37.849999999999994,37.72,37.62,37.46,37.349999999999994,37.309999999999995,37.27,37.32999999999999,37.309999999999995,37.29999999999999,37.300000000000004,37.25000000000001,37.20000000000001,37.17,37.059999999999995,36.96000000000001,36.879999999999995,36.83000000000001,36.86,36.959999999999994,36.989999999999995,36.99999999999999,37.09,37.25999999999999],"color":"green"},{"name":"anthropic","data":[53.989999999999995,54.26999999999998,54.739999999999995,55.18999999999999,55.61,55.72999999999999,55.96,56.35,56.65,56.790000000000006,56.940000000000005,56.95,56.87,56.89000000000001,56.94,57.059999999999995,57.19000000000001,57.32999999999999,57.45,57.52000000000001,57.51,57.48999999999999,57.499999999999986,57.50999999999999,57.49999999999999,57.53999999999999,57.60999999999999,57.61000000000001,57.72999999999998,57.839999999999996,57.919999999999995,57.97999999999999,57.929999999999986,57.82999999999999,57.8,57.77999999999998,57.69999999999999,57.54999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
