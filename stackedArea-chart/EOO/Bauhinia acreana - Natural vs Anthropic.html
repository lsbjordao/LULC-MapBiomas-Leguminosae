<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[94.69,94.61999999999999,94.21999999999998,93.81,93.55,93.29000000000002,92.99,92.44000000000001,91.94,91.45,90.79,90.19000000000001,89.60000000000001,88.98000000000002,88.46000000000001,88.01,87.42,86.86,86.05999999999999,85.22000000000001,84.51,83.92000000000002,83.45,83.02000000000001,82.74000000000002,82.59000000000002,82.43000000000002,82.22,81.95,81.71000000000001,81.35000000000001,80.9,80.59000000000002,80.28000000000002,79.85000000000001,79.38000000000001,78.66000000000001,77.76000000000002],"color":"green"},{"name":"anthropic","data":[5.01,5.07,5.47,5.869999999999999,6.159999999999999,6.39,6.7299999999999995,7.259999999999999,7.7799999999999985,8.26,8.9,9.52,10.1,10.729999999999999,11.25,11.679999999999998,12.289999999999997,12.85,13.639999999999997,14.479999999999999,15.199999999999998,15.789999999999997,16.28,16.68,16.959999999999997,17.1,17.280000000000005,17.490000000000002,17.75,17.99,18.37,18.799999999999997,19.130000000000003,19.42,19.830000000000002,20.33,21.040000000000003,21.959999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
