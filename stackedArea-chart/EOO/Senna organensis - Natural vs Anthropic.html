<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[35.13,35.220000000000006,35.04,35.02000000000001,35,34.92,34.94000000000001,35.050000000000004,35.14,35.17,35.28,35.36000000000001,35.42,35.48,35.60000000000001,35.510000000000005,35.510000000000005,35.540000000000006,35.580000000000005,35.61000000000001,35.7,35.78,35.800000000000004,35.89,35.980000000000004,36.080000000000005,36.18000000000001,36.300000000000004,36.410000000000004,36.540000000000006,36.720000000000006,36.78,36.849999999999994,36.919999999999995,36.97,36.97,37.19999999999999,37.169999999999995],"color":"green"},{"name":"anthropic","data":[40.11,40.01,40.21,40.21,40.239999999999995,40.3,40.3,40.199999999999996,40.1,40.06999999999999,39.989999999999995,39.879999999999995,39.8,39.76,39.62,39.72,39.699999999999996,39.68,39.65999999999999,39.60999999999999,39.53,39.449999999999996,39.45,39.370000000000005,39.260000000000005,39.150000000000006,39.06,38.940000000000005,38.830000000000005,38.70000000000001,38.52000000000001,38.470000000000006,38.400000000000006,38.32000000000001,38.290000000000006,38.28,38.03,38.07000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
