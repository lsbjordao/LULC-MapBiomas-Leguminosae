<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.029999999999994,30.97,30.659999999999993,30.53,30.37,30.23,30.11,30.159999999999997,30.16,30.16,30.18,30.24,30.319999999999997,30.330000000000002,30.330000000000002,30.240000000000002,30.290000000000006,30.290000000000003,30.210000000000004,30.279999999999998,30.340000000000003,30.480000000000004,30.600000000000005,30.670000000000005,30.810000000000006,31.020000000000007,31.15,31.260000000000005,31.350000000000005,31.49,31.610000000000003,31.73,31.919999999999998,32.04,32.12,32.25,32.519999999999996,32.65],"color":"green"},{"name":"anthropic","data":[57.769999999999996,57.84,58.15,58.29,58.43999999999999,58.58,58.7,58.65,58.64,58.65,58.62,58.559999999999995,58.5,58.47,58.499999999999986,58.56,58.54,58.53,58.62,58.55,58.48,58.33,58.22,58.15999999999999,58.02,57.78999999999999,57.669999999999995,57.56999999999999,57.459999999999994,57.33,57.209999999999994,57.08,56.88999999999999,56.77999999999999,56.699999999999996,56.58,56.3,56.160000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
