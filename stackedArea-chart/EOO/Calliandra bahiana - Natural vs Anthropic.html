<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.63,60.60000000000001,60.13999999999999,59.699999999999996,58.92999999999999,58.62,58.199999999999996,57.58999999999999,56.98,56.56999999999999,56.12999999999999,55.84999999999998,56.00999999999999,55.879999999999995,55.809999999999995,55.73,55.44999999999998,55.16,54.83,54.599999999999994,54.29999999999999,54.209999999999994,54.11999999999999,53.959999999999994,53.9,53.71999999999999,53.48,53.01,52.58999999999998,52.17,51.849999999999994,51.690000000000005,51.53000000000001,51.55,51.410000000000004,51.279999999999994,51.11,51.07999999999999],"color":"green"},{"name":"anthropic","data":[35.76,35.800000000000004,36.260000000000005,36.71000000000001,37.47,37.78000000000001,38.199999999999996,38.800000000000004,39.43000000000001,39.849999999999994,40.32000000000001,40.57000000000001,40.41,40.55000000000001,40.60999999999999,40.690000000000005,40.96,41.23,41.58,41.83,42.12999999999999,42.19,42.31000000000001,42.46000000000001,42.51,42.699999999999996,42.93,43.39999999999999,43.819999999999986,44.23999999999999,44.53999999999999,44.71999999999999,44.85999999999999,44.86,45.010000000000005,45.120000000000005,45.29,45.32],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
