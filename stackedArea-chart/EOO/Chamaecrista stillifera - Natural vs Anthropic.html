<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[74.19,74.52000000000001,74.72000000000001,74.32000000000001,74.55,74.95,74.80000000000001,74.60000000000001,74.51000000000002,74.38,74.10000000000001,74.00000000000001,73.9,73.96000000000001,73.96000000000001,73.92999999999999,73.82000000000001,73.55000000000001,73.21999999999998,72.91000000000001,72.45,72.03999999999999,71.79,71.57,71.46000000000001,71.22,71.07000000000001,70.97000000000001,70.75,70.46000000000001,70.31,70.16000000000001,70.19000000000001,70.30000000000001,70.39000000000001,70.39,70.36,70.39000000000001],"color":"green"},{"name":"anthropic","data":[25.3,24.99,24.78,25.16,24.939999999999998,24.54,24.7,24.89,25.009999999999998,25.109999999999996,25.409999999999997,25.49,25.609999999999996,25.529999999999998,25.540000000000003,25.550000000000004,25.67,25.940000000000005,26.290000000000003,26.59,27.07,27.450000000000003,27.700000000000003,27.91,28.050000000000004,28.290000000000003,28.440000000000005,28.55,28.750000000000004,29.050000000000008,29.190000000000005,29.33,29.3,29.18,29.119999999999997,29.09,29.130000000000003,29.1],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
