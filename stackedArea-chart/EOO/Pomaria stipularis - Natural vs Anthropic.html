<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.74,46.94,46.3,45.68000000000001,45.15,44.95,44.73,44.75,44.339999999999996,44.38,43.97,43.620000000000005,43.24000000000001,43.230000000000004,43.02,42.74000000000001,42.660000000000004,42.69,42.49,42.28000000000001,42.190000000000005,42.16,42.22,42.17,42.24,42.379999999999995,42.29,42.339999999999996,42.38,42.38,42.33,42.290000000000006,42.209999999999994,42.17999999999999,41.89000000000001,41.839999999999996,41.81,41.769999999999996],"color":"green"},{"name":"anthropic","data":[52.199999999999996,52.01,52.65,53.279999999999994,53.779999999999994,53.98,54.230000000000004,54.19,54.59,54.55000000000001,54.970000000000006,55.32000000000001,55.690000000000005,55.71,55.91,56.190000000000005,56.28000000000001,56.24000000000001,56.440000000000005,56.65,56.74,56.78,56.72,56.760000000000005,56.709999999999994,56.56,56.65,56.58,56.57,56.55,56.620000000000005,56.65,56.720000000000006,56.74,57.04,57.089999999999996,57.12,57.15],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
