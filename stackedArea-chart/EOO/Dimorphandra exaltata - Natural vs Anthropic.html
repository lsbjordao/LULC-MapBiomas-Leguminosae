<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.16,29.57,29.270000000000003,29.220000000000006,29.040000000000003,28.91,28.770000000000003,28.700000000000003,28.7,28.8,28.830000000000002,28.919999999999998,28.94,28.94,28.82,28.630000000000006,28.630000000000003,28.620000000000005,28.660000000000004,28.71,28.810000000000002,28.85,28.910000000000007,29.03000000000001,29.15,29.300000000000004,29.480000000000008,29.59000000000001,29.680000000000003,29.780000000000005,30.000000000000004,30.189999999999998,30.280000000000005,30.370000000000005,30.450000000000006,30.480000000000008,30.64,30.719999999999995],"color":"green"},{"name":"anthropic","data":[69.30000000000001,69.88000000000001,70.18,70.27000000000001,70.42,70.56,70.71000000000001,70.78000000000002,70.78,70.68,70.63999999999999,70.54,70.53,70.55,70.66000000000001,70.83,70.85000000000001,70.85000000000004,70.82,70.75999999999999,70.65000000000002,70.63000000000002,70.57,70.45,70.33000000000001,70.17,69.97999999999999,69.87000000000002,69.78999999999999,69.70000000000002,69.49,69.30000000000003,69.2,69.13,69.04,69,68.83,68.77],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
