<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[23.720000000000006,23.69000000000001,23.500000000000007,23.290000000000006,23.040000000000003,22.930000000000007,22.760000000000005,22.540000000000006,22.36000000000001,22.20000000000001,22.030000000000005,21.900000000000006,21.910000000000007,21.84000000000001,21.740000000000013,21.640000000000004,21.540000000000003,21.430000000000007,21.320000000000007,21.180000000000007,21.050000000000004,20.980000000000008,20.930000000000007,20.870000000000008,20.82000000000001,20.74000000000001,20.65000000000001,20.440000000000012,20.22000000000001,20.03000000000001,19.890000000000008,19.83000000000001,19.770000000000007,19.740000000000006,19.660000000000007,19.600000000000005,19.550000000000008,19.56000000000001],"color":"green"},{"name":"anthropic","data":[13.079999999999998,13.129999999999997,13.319999999999997,13.52,13.769999999999996,13.909999999999998,14.069999999999999,14.269999999999998,14.459999999999997,14.629999999999997,14.789999999999997,14.919999999999998,14.919999999999998,14.99,15.08,15.159999999999998,15.27,15.379999999999999,15.510000000000002,15.620000000000001,15.759999999999998,15.819999999999999,15.870000000000001,15.93,16.009999999999998,16.07,16.170000000000005,16.380000000000003,16.6,16.8,16.939999999999998,17.000000000000004,17.060000000000006,17.090000000000003,17.15,17.229999999999997,17.279999999999998,17.279999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
