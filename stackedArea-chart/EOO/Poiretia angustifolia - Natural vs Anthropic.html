<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[15.559999999999999,15.479999999999999,15.29,15.1,14.94,14.89,14.759999999999998,14.659999999999998,14.559999999999999,14.479999999999997,14.369999999999997,14.299999999999997,14.259999999999998,14.209999999999999,14.159999999999998,14.059999999999999,14.019999999999998,13.94,13.909999999999998,13.889999999999997,13.879999999999997,13.889999999999997,13.879999999999997,13.889999999999997,13.859999999999996,13.829999999999997,13.809999999999997,13.769999999999998,13.709999999999997,13.639999999999997,13.61,13.579999999999998,13.569999999999997,13.61,13.599999999999998,13.599999999999998,13.619999999999997,13.659999999999998],"color":"green"},{"name":"anthropic","data":[21.439999999999998,21.520000000000003,21.700000000000003,21.89,22.05,22.1,22.21,22.32,22.430000000000003,22.509999999999998,22.620000000000005,22.680000000000003,22.74,22.790000000000003,22.850000000000005,22.92,22.990000000000006,23.03,23.090000000000007,23.120000000000005,23.100000000000005,23.100000000000005,23.10000000000001,23.10000000000001,23.14,23.14,23.179999999999996,23.24,23.29,23.37,23.38,23.41,23.419999999999998,23.37,23.400000000000002,23.380000000000006,23.37,23.319999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
