<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.17000000000003,71.98000000000003,71.44000000000003,70.84000000000002,70.24000000000002,69.80000000000003,69.30000000000004,68.59000000000002,67.94000000000003,67.32000000000002,66.63000000000002,66.06000000000002,65.65000000000002,65.03,64.44,63.929999999999986,63.38999999999999,62.79999999999998,61.929999999999986,61.079999999999984,60.45999999999998,60.039999999999985,59.759999999999984,59.44999999999999,59.28999999999998,59.10999999999998,58.87999999999998,58.48999999999999,58.05999999999999,57.67999999999999,57.33999999999999,57.129999999999995,56.90999999999998,56.74999999999999,56.459999999999994,56.20999999999999,55.84999999999998,55.45999999999999],"color":"green"},{"name":"anthropic","data":[27.400000000000002,27.6,28.14,28.729999999999997,29.330000000000005,29.770000000000003,30.28,31,31.630000000000006,32.22,32.92,33.48000000000001,33.93000000000001,34.52000000000001,35.11,35.640000000000015,36.15,36.75,37.61000000000001,38.470000000000006,39.1,39.53,39.83000000000001,40.11000000000001,40.29000000000001,40.49000000000001,40.69000000000001,41.070000000000014,41.51999999999999,41.9,42.23,42.44999999999999,42.629999999999995,42.83,43.08999999999999,43.35999999999999,43.73,44.11],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
