<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.86,40.64,40.24,39.81999999999999,39.36,39.17000000000001,38.90999999999999,38.62999999999999,38.37999999999999,38.149999999999984,37.879999999999995,37.720000000000006,37.6,37.49,37.36000000000001,37.190000000000005,37.05,36.9,36.75000000000001,36.57,36.49,36.480000000000004,36.45,36.4,36.330000000000005,36.23,36.17,36.019999999999996,35.9,35.73,35.68,35.580000000000005,35.550000000000004,35.52000000000001,35.43000000000001,35.370000000000005,35.35000000000001,35.330000000000005],"color":"green"},{"name":"anthropic","data":[52.089999999999996,52.32,52.73000000000001,53.14,53.62000000000002,53.82000000000001,54.06000000000001,54.339999999999996,54.61000000000002,54.82000000000001,55.09,55.25000000000002,55.36,55.480000000000004,55.620000000000005,55.75,55.89000000000001,56.029999999999994,56.199999999999996,56.349999999999994,56.449999999999996,56.480000000000004,56.53000000000001,56.540000000000006,56.60999999999999,56.71,56.79,56.92,57.02999999999999,57.2,57.279999999999994,57.379999999999995,57.4,57.43,57.51999999999999,57.580000000000005,57.61000000000001,57.63],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
