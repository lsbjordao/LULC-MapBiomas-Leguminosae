<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.61,66.60000000000001,67.09000000000002,66.59,66.02,65.78,65.13000000000001,64.53999999999999,64.11,63.510000000000005,62.72,61.989999999999995,61.779999999999994,61.41,60.96999999999999,60.35,59.81999999999999,59.35999999999999,58.839999999999996,58.15,57.81999999999999,57.519999999999996,57.29,57.06,57.09999999999999,56.989999999999995,56.94,56.809999999999995,56.51,56.14,55.730000000000004,55.32,55.010000000000005,54.63999999999999,54.22,54.01,53.7,53.910000000000004],"color":"green"},{"name":"anthropic","data":[32.779999999999994,32.800000000000004,32.309999999999995,32.81,33.38,33.61,34.260000000000005,34.83,35.279999999999994,35.88000000000001,36.68000000000001,37.40000000000001,37.61000000000001,37.98,38.41000000000001,39.03,39.56,40.02,40.550000000000004,41.25,41.559999999999995,41.87000000000001,42.1,42.32,42.279999999999994,42.38999999999999,42.43,42.57,42.88,43.26,43.650000000000006,44.07,44.370000000000005,44.74,45.18,45.40999999999999,45.68999999999999,45.489999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
