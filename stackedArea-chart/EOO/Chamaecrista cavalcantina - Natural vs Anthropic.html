<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.830000000000005,57.690000000000005,57.38999999999999,57.02,56.44,56.30000000000001,56.05000000000001,55.72,55.33000000000001,55.11,54.660000000000004,54.28,54.12,53.92000000000001,53.589999999999996,53.460000000000015,53.2,52.790000000000006,52.52,52.02,51.519999999999996,51.17,50.93000000000001,50.71,50.66,50.43000000000001,50.230000000000004,49.70000000000001,49.160000000000004,48.660000000000004,48.36,48.08999999999998,47.879999999999995,47.68,47.410000000000004,47.10000000000001,46.84,46.54],"color":"green"},{"name":"anthropic","data":[41.629999999999995,41.769999999999996,42.05,42.44999999999999,43.03,43.169999999999995,43.39,43.739999999999995,44.14999999999999,44.370000000000005,44.79999999999999,45.17,45.32,45.53,45.830000000000005,45.99999999999999,46.279999999999994,46.660000000000004,46.95000000000001,47.44,47.91,48.29,48.47999999999999,48.720000000000006,48.800000000000004,48.99,49.21000000000001,49.72,50.269999999999996,50.77000000000001,51.099999999999994,51.36000000000001,51.550000000000004,51.74,51.999999999999986,52.309999999999995,52.58,52.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
