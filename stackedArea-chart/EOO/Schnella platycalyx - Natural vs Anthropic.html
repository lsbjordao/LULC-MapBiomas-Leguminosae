<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.1,97.11999999999999,96.91999999999999,96.72,96.64,96.55,96.41999999999999,96.16000000000003,95.94,95.76999999999998,95.48,95.22999999999999,94.96000000000002,94.61999999999999,94.42999999999999,94.28999999999999,94.05000000000001,93.85000000000001,93.55,93.21999999999998,92.95,92.68999999999998,92.44999999999997,92.23999999999998,92.06,91.99000000000002,91.97999999999999,91.92,91.8,91.69999999999999,91.50999999999999,91.26,91.14999999999999,91.04,90.95,90.78999999999999,90.50999999999999,90.07],"color":"green"},{"name":"anthropic","data":[2.5799999999999996,2.5599999999999996,2.7699999999999996,2.96,3.0499999999999994,3.1399999999999992,3.269999999999999,3.5299999999999994,3.749999999999999,3.9199999999999995,4.199999999999999,4.459999999999999,4.729999999999999,5.039999999999999,5.239999999999998,5.389999999999998,5.629999999999999,5.84,6.13,6.46,6.7299999999999995,6.989999999999999,7.209999999999999,7.45,7.63,7.679999999999999,7.699999999999999,7.759999999999998,7.879999999999999,7.989999999999999,8.17,8.42,8.54,8.629999999999999,8.759999999999998,8.899999999999999,9.179999999999998,9.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
