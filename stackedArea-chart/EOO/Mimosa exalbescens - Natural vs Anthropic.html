<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[85.21000000000002,85.19000000000003,84.97,84.53000000000002,83.99,83.86000000000001,83.63000000000001,83.39000000000001,83.07000000000002,82.87,82.62000000000002,82.21,82.60000000000001,82.61000000000001,82.45000000000002,82.53000000000002,82.25000000000003,81.91000000000001,81.65000000000002,81.13000000000001,80.35000000000002,79.95000000000002,79.70000000000002,79.55000000000001,79.58000000000001,79.44000000000003,79.17000000000002,78.25000000000001,77.25000000000003,76.48000000000002,75.81000000000003,75.57000000000002,75.19000000000003,74.77000000000002,74.3,73.77,73.25000000000001,72.75999999999998],"color":"green"},{"name":"anthropic","data":[14.889999999999999,14.919999999999998,15.159999999999998,15.609999999999998,16.13,16.219999999999995,16.469999999999995,16.720000000000002,17.04,17.229999999999997,17.47,17.89,17.520000000000003,17.519999999999996,17.669999999999998,17.57,17.849999999999998,18.199999999999996,18.469999999999995,18.979999999999997,19.729999999999997,20.150000000000002,20.39,20.55,20.52,20.67,20.909999999999997,21.84,22.849999999999998,23.64,24.3,24.52,24.920000000000005,25.349999999999998,25.820000000000004,26.35,26.86,27.36],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
