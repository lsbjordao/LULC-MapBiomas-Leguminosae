<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.18,49.76,49.34000000000002,48.430000000000014,48.25,47.88,47.41,47.18999999999999,46.99,46.78,46.760000000000005,47.17000000000001,47.21,47.44000000000001,47.339999999999996,47.02,46.540000000000006,46.36000000000001,45.93000000000001,45.51000000000001,45.43,45.300000000000004,45.17,45.220000000000006,45.23,45.160000000000004,44.78,44.85,44.660000000000004,44.49000000000001,44.49,44.440000000000005,44.400000000000006,44.620000000000005,44.45,44.31,44.180000000000014,44.18],"color":"green"},{"name":"anthropic","data":[21.220000000000002,21.640000000000004,22.06,22.970000000000002,23.150000000000002,23.509999999999998,24.02,24.210000000000004,24.430000000000003,24.62,24.64,24.220000000000002,24.19,23.98,24.05,24.39,24.87,25.04,25.48,25.89,25.97,26.099999999999998,26.23,26.18,26.16,26.240000000000002,26.62,26.560000000000002,26.75,26.9,26.93,26.970000000000002,27.000000000000007,26.790000000000003,26.950000000000003,27.1,27.220000000000006,27.23],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
