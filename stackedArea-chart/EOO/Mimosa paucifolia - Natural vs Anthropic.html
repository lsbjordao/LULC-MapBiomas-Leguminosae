<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[28.75,27.820000000000004,27.44,27.240000000000002,27.230000000000004,27.070000000000004,27.25,27.060000000000002,26.780000000000005,26.910000000000004,26.709999999999997,26.490000000000002,26.230000000000004,25.950000000000003,25.710000000000008,25.35,25.130000000000003,24.970000000000002,24.990000000000006,25.060000000000002,25.03,25.020000000000003,24.990000000000002,25.01,25.140000000000004,25.099999999999998,25.07,24.950000000000003,24.73,24.49000000000001,24.460000000000004,24.500000000000004,24.470000000000006,24.51000000000001,24.550000000000004,24.570000000000004,24.430000000000003,24.62],"color":"green"},{"name":"anthropic","data":[71.50999999999999,72.43999999999998,72.81,73.04,73.02,73.19,72.99000000000002,73.18999999999998,73.47,73.36999999999998,73.53,73.73999999999997,74.04,74.3,74.53,74.88000000000001,75.11000000000001,75.25000000000001,75.24000000000001,75.16999999999999,75.21999999999998,75.22,75.24999999999997,75.22999999999999,75.08999999999999,75.15,75.16999999999997,75.28,75.5,75.73000000000002,75.76999999999998,75.75999999999999,75.77,75.71,75.67,75.67,75.78999999999999,75.61999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
