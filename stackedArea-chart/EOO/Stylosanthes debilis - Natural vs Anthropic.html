<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.79,55.66,54.94000000000001,54.44,53.58,52.74,52.03,51.01,50.29,50.129999999999995,50.129999999999995,50.459999999999994,51.06999999999999,50.949999999999996,51.07,50.9,50.28,50.03999999999999,49.54,49.25,49.13,49.39999999999999,49.40999999999999,49.349999999999994,49.08,48.96999999999999,48.74999999999999,48.29999999999999,48.04999999999999,48,47.94,48.47999999999999,48.23,48.099999999999994,48.01,47.949999999999996,47.980000000000004,48.129999999999995],"color":"green"},{"name":"anthropic","data":[43.39999999999999,43.550000000000004,44.25,44.769999999999996,45.629999999999995,46.459999999999994,47.16999999999999,48.18999999999999,48.929999999999986,49.069999999999986,49.07,48.739999999999995,48.129999999999995,48.230000000000004,48.11,48.3,48.910000000000004,49.150000000000006,49.660000000000004,49.94999999999999,50.06000000000001,49.81,49.79,49.839999999999996,50.1,50.23,50.43,50.870000000000005,51.14,51.199999999999996,51.260000000000005,50.7,50.93999999999999,51.099999999999994,51.17999999999999,51.230000000000004,51.199999999999996,51.06000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
