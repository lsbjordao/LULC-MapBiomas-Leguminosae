<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[15.599999999999998,15.52,15.309999999999999,15.069999999999999,14.879999999999999,14.7,14.569999999999999,14.399999999999999,14.229999999999999,14.270000000000001,14.319999999999997,14.379999999999997,14.539999999999997,14.469999999999997,14.409999999999998,14.35,14.25,14.219999999999999,14.149999999999999,14.079999999999998,13.999999999999998,14.02,14.000000000000002,14.000000000000002,14.02,13.980000000000002,13.900000000000002,13.76,13.629999999999999,13.549999999999999,13.509999999999998,13.569999999999999,13.579999999999998,13.629999999999999,13.66,13.7,13.72,13.77],"color":"green"},{"name":"anthropic","data":[9.499999999999998,9.569999999999999,9.79,9.999999999999998,10.219999999999997,10.379999999999999,10.54,10.699999999999998,10.849999999999998,10.829999999999998,10.759999999999998,10.709999999999997,10.569999999999999,10.62,10.669999999999998,10.73,10.85,10.88,10.950000000000001,11.04,11.099999999999998,11.079999999999998,11.12,11.089999999999998,11.069999999999999,11.12,11.19,11.35,11.459999999999999,11.539999999999997,11.58,11.51,11.509999999999998,11.45,11.44,11.38,11.37,11.329999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
