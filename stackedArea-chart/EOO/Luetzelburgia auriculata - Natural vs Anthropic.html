<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.339999999999996,61.05999999999999,60.41,59.82,59.14999999999999,58.63999999999998,58.139999999999986,57.53999999999998,56.99999999999999,56.57999999999999,56.12999999999999,55.77,55.57,55.21999999999999,54.87,54.50999999999999,54.16,53.78,53.26,52.75000000000001,52.39,52.169999999999995,51.959999999999994,51.83999999999999,51.74999999999999,51.64999999999999,51.45999999999999,51.089999999999996,50.68999999999999,50.35,50.089999999999996,49.959999999999994,49.82999999999999,49.749999999999986,49.589999999999996,49.41,49.22,49.07],"color":"green"},{"name":"anthropic","data":[38.28999999999999,38.60999999999999,39.23,39.85,40.53,41.01999999999999,41.51,42.11,42.660000000000004,43.08,43.51,43.88000000000001,44.089999999999996,44.440000000000005,44.79999999999999,45.15,45.50000000000001,45.879999999999995,46.38999999999999,46.899999999999984,47.26999999999999,47.49999999999999,47.7,47.839999999999996,47.919999999999995,48.029999999999994,48.209999999999994,48.58,48.949999999999996,49.31000000000001,49.57,49.699999999999996,49.820000000000014,49.91000000000001,50.080000000000005,50.239999999999995,50.44999999999999,50.56],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
