<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[52.94000000000002,52.820000000000014,52.360000000000014,51.90000000000002,51.44000000000002,51.180000000000014,50.85000000000001,50.45000000000001,50.11,49.989999999999995,49.79,49.71000000000001,49.84,49.77000000000001,49.67000000000001,49.55000000000001,49.43,49.320000000000014,49.09,49.000000000000014,48.88,48.839999999999996,48.85000000000001,48.870000000000005,48.910000000000004,48.900000000000006,48.820000000000014,48.47000000000001,48.110000000000014,47.80000000000002,47.56000000000002,47.510000000000005,47.440000000000005,47.440000000000005,47.430000000000014,47.41000000000001,47.390000000000015,47.420000000000016],"color":"green"},{"name":"anthropic","data":[40.08999999999999,40.239999999999995,40.709999999999994,41.14999999999999,41.60999999999999,41.88999999999999,42.199999999999996,42.599999999999994,42.95999999999999,43.09999999999999,43.27999999999999,43.35999999999999,43.22999999999999,43.309999999999995,43.379999999999995,43.49999999999999,43.63,43.74999999999999,43.98000000000001,44.06000000000001,44.21000000000001,44.2,44.19000000000002,44.19000000000001,44.15,44.16,44.25,44.61000000000001,44.95,45.27,45.490000000000016,45.54,45.629999999999995,45.61,45.660000000000004,45.64000000000001,45.65000000000002,45.620000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
