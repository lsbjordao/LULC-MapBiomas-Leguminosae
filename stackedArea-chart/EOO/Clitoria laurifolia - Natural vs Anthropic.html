<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.6,75.39000000000001,74.81000000000002,74.25,73.71999999999998,73.32000000000001,72.92,72.36000000000001,71.83000000000001,71.34000000000002,70.79,70.31000000000002,69.9,69.4,68.91000000000001,68.50999999999999,68.10000000000001,67.62,67,66.40000000000002,65.94999999999999,65.61999999999999,65.36999999999999,65.16000000000001,65.00999999999999,64.87999999999998,64.73,64.46,64.19999999999999,63.91000000000001,63.640000000000015,63.440000000000005,63.24000000000001,63.08000000000001,62.82000000000001,62.61000000000001,62.290000000000006,61.830000000000005],"color":"green"},{"name":"anthropic","data":[22.640000000000004,22.84,23.42,23.979999999999997,24.520000000000003,24.910000000000004,25.310000000000006,25.89000000000001,26.420000000000005,26.890000000000008,27.460000000000008,27.92,28.35,28.840000000000003,29.340000000000003,29.740000000000002,30.149999999999995,30.630000000000003,31.27,31.850000000000005,32.290000000000006,32.620000000000005,32.88,33.1,33.25000000000001,33.36000000000001,33.55000000000001,33.8,34.06,34.32,34.59,34.82,34.980000000000004,35.18000000000001,35.419999999999995,35.66,36,36.4],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
