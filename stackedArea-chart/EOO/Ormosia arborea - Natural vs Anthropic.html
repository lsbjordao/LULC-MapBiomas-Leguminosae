<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[68.03999999999998,67.73,67.07999999999997,66.45,65.77999999999997,65.31999999999998,64.81,64.1,63.49000000000001,62.95000000000002,62.199999999999996,61.65,61.18,60.68,60.10000000000001,59.63,59.15,58.62,57.949999999999996,57.27,56.75,56.410000000000004,56.19,55.97,55.870000000000005,55.709999999999994,55.48000000000002,55.190000000000005,54.89000000000001,54.61000000000001,54.379999999999995,54.190000000000005,53.960000000000015,53.82000000000001,53.50000000000001,53.290000000000006,52.96000000000001,52.56],"color":"green"},{"name":"anthropic","data":[29.380000000000003,29.650000000000006,30.290000000000003,30.930000000000003,31.560000000000002,32.050000000000004,32.580000000000005,33.27,33.86000000000001,34.42999999999999,35.16,35.72999999999999,36.17,36.73000000000001,37.28000000000001,37.73000000000001,38.21000000000001,38.74000000000001,39.43,40.11,40.63,40.92999999999999,41.19000000000001,41.39,41.46000000000001,41.59,41.89000000000001,42.199999999999996,42.46999999999999,42.72,42.99999999999999,43.15999999999999,43.42999999999999,43.48,43.849999999999994,44.05,44.31999999999999,44.81999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
