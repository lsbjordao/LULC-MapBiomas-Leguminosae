<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.34,29.700000000000003,29.029999999999998,28.44,27.81,27.159999999999997,26.49,25.970000000000002,25.439999999999998,24.87,24.480000000000004,24.200000000000003,23.73,23.460000000000004,23.17,22.870000000000005,22.639999999999997,22.31,22.000000000000004,21.69,21.580000000000002,21.580000000000002,21.559999999999995,21.489999999999995,21.55,21.53,21.520000000000003,21.459999999999994,21.459999999999997,21.410000000000004,21.340000000000003,21.260000000000005,21.159999999999997,21.139999999999993,20.959999999999994,20.84,20.659999999999997,21.129999999999995],"color":"green"},{"name":"anthropic","data":[67.62,69.28,69.94,70.52999999999999,71.14,71.81,72.47,73.00999999999999,73.50999999999998,74.1,74.47,74.77,75.23,75.51,75.81,76.09,76.33,76.66999999999999,76.96,77.28,77.38,77.38000000000001,77.4,77.47,77.44,77.42,77.42999999999999,77.51,77.52999999999999,77.57000000000001,77.61000000000001,77.70000000000002,77.77,77.85000000000001,78.01,78.12000000000002,78.31,77.85000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
