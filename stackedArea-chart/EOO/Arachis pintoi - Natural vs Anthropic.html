<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[56.98999999999999,56.66,56.009999999999984,55.419999999999995,54.75999999999998,54.279999999999994,53.779999999999994,53.23,52.73999999999998,52.39000000000001,51.989999999999995,51.64000000000001,51.46000000000001,51.160000000000004,50.870000000000005,50.56000000000001,50.25000000000001,49.96000000000001,49.57,49.150000000000006,48.84,48.620000000000005,48.459999999999994,48.35,48.269999999999996,48.21000000000001,48.07,47.769999999999996,47.46000000000001,47.16000000000002,46.94000000000001,46.84000000000001,46.72000000000001,46.650000000000006,46.489999999999995,46.33,46.15000000000001,46.11],"color":"green"},{"name":"anthropic","data":[40.43000000000001,40.76999999999999,41.41,42.029999999999994,42.67999999999999,43.16,43.66,44.21999999999999,44.72,45.06000000000001,45.429999999999986,45.79000000000001,45.96,46.26,46.56999999999998,46.87,47.17,47.49999999999999,47.87,48.26999999999999,48.569999999999986,48.809999999999995,48.96999999999999,49.05999999999999,49.13999999999999,49.21999999999999,49.34000000000001,49.65,49.949999999999996,50.28000000000001,50.49000000000001,50.60999999999999,50.70000000000001,50.77,50.92999999999999,51.1,51.28000000000001,51.320000000000014],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
