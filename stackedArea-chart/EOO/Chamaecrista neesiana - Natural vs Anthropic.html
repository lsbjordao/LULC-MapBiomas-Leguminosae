<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.21000000000001,58.76000000000001,58,57.309999999999995,56.53000000000001,55.980000000000004,55.45000000000001,54.760000000000005,54.10000000000001,53.46,52.74,52.14000000000001,51.68,51.24000000000001,50.740000000000016,50.330000000000005,49.95000000000001,49.53,48.989999999999995,48.48000000000001,48.089999999999996,47.82,47.66000000000001,47.470000000000006,47.38,47.23000000000001,47.02000000000002,46.69000000000001,46.320000000000014,45.94000000000001,45.64000000000001,45.44,45.30000000000001,45.19000000000001,45.03000000000001,44.83000000000001,44.58000000000001,44.40000000000001],"color":"green"},{"name":"anthropic","data":[40.28999999999999,40.739999999999995,41.47,42.17,42.98,43.519999999999996,44.029999999999994,44.73,45.38,46.02,46.730000000000004,47.31999999999999,47.8,48.230000000000004,48.74000000000001,49.12999999999999,49.510000000000005,49.940000000000026,50.48000000000001,51.010000000000005,51.39000000000001,51.650000000000006,51.809999999999995,52.010000000000005,52.099999999999994,52.260000000000005,52.45000000000002,52.800000000000004,53.17000000000001,53.54,53.84,54.01000000000001,54.17999999999999,54.279999999999994,54.44,54.649999999999984,54.87,55.06],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
