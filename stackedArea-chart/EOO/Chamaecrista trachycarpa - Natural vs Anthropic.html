<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[13.399999999999999,13.289999999999997,13.08,12.91,12.77,12.759999999999996,12.619999999999997,12.519999999999998,12.459999999999997,12.409999999999995,12.309999999999997,12.259999999999996,12.209999999999997,12.139999999999999,12.079999999999998,11.999999999999998,11.969999999999995,11.919999999999998,11.899999999999997,11.879999999999997,11.899999999999997,11.929999999999996,11.949999999999998,11.959999999999997,11.939999999999998,11.979999999999997,11.949999999999998,11.929999999999998,11.919999999999998,11.85,11.819999999999997,11.799999999999997,11.819999999999997,11.869999999999996,11.919999999999998,11.909999999999997,11.939999999999998,11.989999999999997],"color":"green"},{"name":"anthropic","data":[22.71,22.800000000000008,22.990000000000002,23.170000000000005,23.300000000000008,23.34,23.450000000000006,23.55,23.630000000000006,23.68,23.770000000000003,23.840000000000003,23.870000000000008,23.950000000000003,24.020000000000003,24.120000000000005,24.130000000000006,24.180000000000007,24.180000000000003,24.22,24.19,24.150000000000006,24.140000000000004,24.130000000000006,24.140000000000004,24.120000000000008,24.139999999999997,24.169999999999995,24.19,24.24,24.260000000000005,24.28,24.26,24.209999999999997,24.180000000000003,24.149999999999995,24.119999999999997,24.080000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
