<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[59.010000000000005,58.77,58.089999999999996,57.64,57.53,57.62999999999999,57.43999999999999,57.28999999999999,57.449999999999996,57.129999999999995,57.239999999999995,57.75,57.779999999999994,57.89,58.11,57.83,57.48,57.400000000000006,57.44999999999999,57.39999999999999,57.94999999999999,58.25,58.2,58.14,57.58,57.440000000000005,57.139999999999986,57.019999999999996,56.68,56.35,56.25999999999999,56.21999999999999,56.42999999999999,56.66999999999999,56.449999999999996,56.23999999999999,55.959999999999994,55.989999999999995],"color":"green"},{"name":"anthropic","data":[39.61000000000001,39.86,40.55,41,41.11,41.00000000000001,41.2,41.33,41.18,41.510000000000005,41.410000000000004,40.87,40.85,40.73000000000001,40.52,40.81000000000001,41.14,41.220000000000006,41.19,41.21,40.68000000000001,40.370000000000005,40.42000000000001,40.480000000000004,41.04,41.18,41.49000000000001,41.580000000000005,41.93000000000001,42.269999999999996,42.370000000000005,42.379999999999995,42.18,41.940000000000005,42.16,42.379999999999995,42.65,42.589999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
