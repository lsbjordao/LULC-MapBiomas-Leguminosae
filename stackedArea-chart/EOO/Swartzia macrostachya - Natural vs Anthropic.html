<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[69.66,69.42999999999999,68.72,68.03999999999999,67.31,66.82000000000001,66.23,65.49000000000002,64.76,64.13000000000001,63.38000000000002,62.740000000000016,62.260000000000005,61.63000000000001,60.97000000000001,60.47000000000001,59.940000000000005,59.36,58.519999999999996,57.73,57.14999999999999,56.7,56.42000000000001,56.160000000000004,56.00000000000001,55.88,55.660000000000004,55.31,54.980000000000004,54.63000000000001,54.32,54.080000000000005,53.88,53.72000000000001,53.49000000000001,53.27,52.93000000000001,52.530000000000015],"color":"green"},{"name":"anthropic","data":[29.360000000000007,29.6,30.31,30.970000000000006,31.690000000000005,32.2,32.75999999999999,33.529999999999994,34.24,34.88,35.620000000000005,36.260000000000005,36.790000000000006,37.410000000000004,38.050000000000004,38.540000000000006,39.05000000000002,39.66,40.45000000000002,41.26000000000001,41.85000000000001,42.29,42.580000000000005,42.81,42.99,43.11000000000001,43.35000000000001,43.67,44.03999999999999,44.39999999999999,44.70999999999999,44.92,45.1,45.260000000000005,45.51,45.73999999999999,46.04999999999999,46.47999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
