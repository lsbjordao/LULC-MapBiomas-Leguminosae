<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[54.74,57.089999999999996,56.93999999999999,56.52,56.23,56.46,56.3,56.31,56.26,56.39,56.1,55.74,56.089999999999996,56.129999999999995,56.51,56.92000000000001,57.21,57.489999999999995,57.69999999999999,57.709999999999994,57.66,57.309999999999995,57.199999999999996,56.669999999999995,56.419999999999995,56.19,55.489999999999995,55.42,55.22,55.11,55.06,55.22,55.019999999999996,54.88999999999999,54.4,54.129999999999995,54.18,54.13],"color":"green"},{"name":"anthropic","data":[44.269999999999996,41.93,42.08,42.480000000000004,42.8,42.57,42.72,42.7,42.76,42.64,42.92,43.269999999999996,42.92,42.9,42.5,42.11,41.81,41.54,41.309999999999995,41.31,41.36,41.71,41.82,42.35,42.61,42.83,43.54,43.620000000000005,43.809999999999995,43.92,43.96,43.81,44,44.13999999999999,44.62,44.89,44.839999999999996,44.879999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
