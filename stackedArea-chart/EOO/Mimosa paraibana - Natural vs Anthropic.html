<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.3,79.21999999999998,78.55999999999999,78.08000000000001,77.46000000000001,76.84000000000002,76.33000000000001,75.95,75.54000000000002,75.50000000000001,75.67,75.74000000000001,76.2,75.97,75.72,75.53999999999999,75.17000000000002,75.02999999999999,74.76,74.35,74.00000000000001,73.88,73.65,73.68,73.7,73.55,73.32000000000001,72.58,71.96000000000001,71.52000000000001,71.14000000000001,71.18000000000002,71.11000000000003,71.04000000000002,70.87,70.69,70.39000000000001,70.21000000000001],"color":"green"},{"name":"anthropic","data":[20.290000000000003,20.39,21.06,21.539999999999996,22.13,22.759999999999998,23.279999999999998,23.669999999999998,24.08,24.11,23.96,23.830000000000002,23.419999999999998,23.660000000000004,23.89,24.080000000000002,24.46,24.59,24.870000000000005,25.28,25.62,25.730000000000004,25.960000000000004,25.94,25.92000000000001,26.080000000000002,26.28000000000001,27.04,27.660000000000007,28.09,28.490000000000006,28.45,28.51,28.580000000000002,28.75,28.950000000000003,29.25,29.41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
