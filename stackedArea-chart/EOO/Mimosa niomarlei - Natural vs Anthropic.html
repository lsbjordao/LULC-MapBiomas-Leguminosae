<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[79.78999999999999,79.64999999999999,77.36,76.36,75.89,75.34,74.99,74.82000000000002,75.05,74.23,75.3,76.63,76.43,76.49000000000001,77.66,78.51,77.92999999999999,78.27,77.91000000000001,75.15,73.38999999999999,70.58999999999999,67.21000000000001,65.67,64.69,64.78,66.64,68.29,70.39,72.55000000000001,74.07999999999998,74.69000000000001,75.35999999999999,75.61999999999999,76.19,76.34,76.18,76.25999999999998],"color":"green"},{"name":"anthropic","data":[19.62,19.770000000000003,22.06,23.05,23.53,24.08,24.43,24.58,24.36,25.2,24.119999999999997,22.77,22.99,22.93,21.76,20.900000000000002,21.490000000000002,21.14,21.509999999999998,24.25,26.02,28.81,32.19,33.74,34.73,34.64,32.769999999999996,31.11,29.03,26.87,25.340000000000003,24.71,24.05,23.77,23.209999999999997,23.06,23.240000000000006,23.16],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
