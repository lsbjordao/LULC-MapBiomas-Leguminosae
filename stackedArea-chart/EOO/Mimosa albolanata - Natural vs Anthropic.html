<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.410000000000004,49.949999999999996,49.56000000000001,48.98000000000001,48.370000000000005,48.120000000000005,47.64000000000001,47.080000000000005,46.64000000000001,46.25000000000001,45.68,45.25,44.839999999999996,44.49,44.09000000000001,43.7,43.44000000000001,42.940000000000005,42.599999999999994,42.19,41.830000000000005,41.61000000000001,41.42,41.23,41.199999999999996,40.99,40.81,40.49,40.170000000000016,39.830000000000005,39.599999999999994,39.31000000000001,39.24,39.27,39.209999999999994,39.14,39.019999999999996,39.18],"color":"green"},{"name":"anthropic","data":[48.96,49.42,49.769999999999996,50.38,50.96,51.24999999999999,51.699999999999996,52.26,52.699999999999996,53.089999999999996,53.660000000000004,54.12000000000001,54.510000000000005,54.88000000000001,55.27000000000001,55.65000000000002,55.91000000000001,56.40000000000001,56.75000000000001,57.15000000000001,57.48000000000001,57.7,57.92000000000001,58.08000000000001,58.12000000000001,58.330000000000005,58.49,58.83,59.170000000000016,59.50000000000001,59.72,60,60.099999999999994,60.06,60.13,60.18,60.29999999999999,60.12],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
