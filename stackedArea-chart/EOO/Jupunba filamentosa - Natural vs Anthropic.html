<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[23.130000000000003,22.950000000000006,22.150000000000002,21.450000000000003,21.040000000000003,20.92,20.82,20.800000000000004,20.840000000000003,20.900000000000002,20.950000000000006,20.910000000000004,20.72,20.579999999999995,20.519999999999996,20.33,20.33,20.319999999999997,20.289999999999996,20.34,20.259999999999998,20.269999999999996,20.44,20.35,20.35000000000001,20.150000000000002,20.110000000000003,19.82,19.689999999999998,19.68,19.779999999999994,19.950000000000003,19.96,20.13,20.119999999999997,20.18,20.32,20.610000000000003],"color":"green"},{"name":"anthropic","data":[43.800000000000004,43.97,44.809999999999995,45.53,45.92000000000001,46.029999999999994,46.16,46.21,46.160000000000004,46.09,46.03,46.09000000000001,46.27000000000001,46.400000000000006,46.47000000000001,46.65000000000001,46.650000000000006,46.66000000000001,46.7,46.64000000000001,46.74000000000001,46.7,46.56,46.65,46.67,46.85000000000001,46.879999999999995,47.160000000000004,47.300000000000004,47.28,47.2,47.040000000000006,47.04000000000002,46.87000000000001,46.86,46.84000000000001,46.7,46.419999999999995],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
