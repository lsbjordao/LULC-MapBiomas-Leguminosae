<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.79,98.72,98.58,98.45,98.37,98.32000000000001,98.23,98.05000000000001,97.85,97.66000000000001,97.32999999999998,97.02,96.73000000000002,96.46000000000002,96.31,96.16,95.91,95.67,95.36000000000001,95.04,94.72000000000001,94.50000000000001,94.36,94.26,94.17,94.13000000000001,94.09,94.04000000000002,93.94,93.8,93.61,93.35000000000001,93.19,93.05000000000001,92.82000000000001,92.61999999999999,92.28000000000002,91.85],"color":"green"},{"name":"anthropic","data":[1.27,1.34,1.47,1.6,1.69,1.74,1.83,2.01,2.1999999999999997,2.3899999999999997,2.7199999999999998,3.03,3.3099999999999996,3.5599999999999996,3.7499999999999996,3.9,4.1499999999999995,4.379999999999999,4.669999999999999,5.01,5.339999999999999,5.559999999999999,5.689999999999999,5.789999999999999,5.869999999999999,5.919999999999999,5.969999999999999,6.009999999999999,6.14,6.27,6.449999999999999,6.7,6.859999999999999,6.999999999999999,7.23,7.44,7.7700000000000005,8.200000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
