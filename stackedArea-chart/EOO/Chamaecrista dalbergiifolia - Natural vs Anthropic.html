<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.4,59.3,57.83,56.73,55.55999999999999,54.41,53.400000000000006,52.08,50.879999999999995,49.61,48.37,47.35,46.46,45.529999999999994,44.699999999999996,43.91999999999999,43.32999999999999,42.64000000000001,41.669999999999995,40.96000000000001,40.519999999999996,40.26,40.15,39.970000000000006,39.87999999999999,39.77999999999999,39.66,39.48,39.28,39.089999999999996,38.89000000000001,38.76,38.63999999999999,38.629999999999995,38.519999999999996,38.49,38.41,38.76],"color":"green"},{"name":"anthropic","data":[39.40999999999999,40.51,41.97,43.06,44.239999999999995,45.400000000000006,46.4,47.730000000000004,48.919999999999995,50.17999999999999,51.42999999999999,52.44,53.32999999999999,54.26,55.109999999999985,55.89,56.46000000000001,57.17,58.11,58.83,59.27000000000001,59.510000000000005,59.66,59.84,59.91000000000001,60.010000000000005,60.15000000000001,60.32,60.50999999999999,60.710000000000015,60.89000000000002,61.04000000000001,61.14000000000001,61.16,61.269999999999996,61.31999999999999,61.370000000000005,61.03],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
