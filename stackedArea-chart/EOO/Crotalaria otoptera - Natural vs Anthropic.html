<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[21.110000000000003,20.980000000000004,20.76,20.570000000000004,20.290000000000003,20.170000000000005,19.97,19.78,19.560000000000002,19.390000000000004,19.19,19.07,19.010000000000005,18.940000000000005,18.860000000000007,18.79000000000001,18.69,18.560000000000006,18.47,18.35,18.270000000000003,18.259999999999998,18.18,18.150000000000002,18.080000000000002,17.990000000000002,17.900000000000002,17.78,17.660000000000004,17.53,17.440000000000005,17.330000000000002,17.290000000000003,17.310000000000002,17.26,17.220000000000002,17.200000000000003,17.240000000000002],"color":"green"},{"name":"anthropic","data":[21.05,21.15,21.389999999999997,21.569999999999997,21.839999999999996,21.960000000000004,22.140000000000008,22.370000000000008,22.59,22.76,22.95,23.080000000000002,23.15,23.220000000000006,23.300000000000008,23.360000000000003,23.450000000000003,23.580000000000005,23.680000000000003,23.810000000000002,23.850000000000005,23.9,23.95000000000001,23.990000000000006,24.070000000000007,24.17,24.240000000000002,24.370000000000008,24.470000000000002,24.590000000000003,24.69000000000001,24.800000000000004,24.85000000000001,24.850000000000012,24.870000000000005,24.900000000000002,24.930000000000003,24.870000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
