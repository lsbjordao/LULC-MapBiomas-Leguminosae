<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.1,59.93999999999999,59.87,59.04,57.95,57.25000000000001,56.410000000000004,55.67999999999999,55.07,54.33,53.60999999999999,53.07,52.35000000000001,51.68,51.150000000000006,50.58,50.19,49.56000000000001,48.900000000000006,48.18000000000001,47.72,47.44000000000001,47.11000000000001,46.790000000000006,46.660000000000004,46.41000000000001,46.120000000000005,45.800000000000004,45.52,45.230000000000004,44.910000000000004,44.720000000000006,44.540000000000006,44.370000000000005,44.06,43.89000000000001,43.63,43.92000000000001],"color":"green"},{"name":"anthropic","data":[39.24,39.38,39.449999999999996,40.279999999999994,41.38,42.08,42.94,43.65999999999999,44.27999999999999,45,45.72,46.29,46.98,47.650000000000006,48.18999999999999,48.74999999999999,49.17,49.76999999999999,50.44999999999999,51.16,51.61,51.879999999999995,52.22000000000001,52.54,52.65,52.949999999999996,53.2,53.529999999999994,53.82000000000001,54.10000000000001,54.410000000000004,54.61000000000001,54.77000000000001,54.95,55.24,55.43000000000001,55.709999999999994,55.42000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
