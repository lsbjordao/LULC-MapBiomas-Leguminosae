<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[71.86999999999999,71.59999999999998,70.99999999999999,70.44,69.84,69.44,68.96999999999997,68.38,67.80999999999997,67.25999999999999,66.56999999999998,66.00999999999998,65.55,65.08,64.54999999999998,64.09000000000002,63.65,63.14000000000001,62.470000000000006,61.850000000000016,61.390000000000015,61.06000000000002,60.860000000000014,60.670000000000016,60.54,60.41000000000002,60.24000000000001,60.010000000000005,59.74000000000001,59.46000000000001,59.21,59.01000000000001,58.83000000000001,58.68000000000002,58.410000000000004,58.21,57.870000000000005,57.430000000000014],"color":"green"},{"name":"anthropic","data":[25.790000000000003,26.060000000000006,26.640000000000004,27.22,27.82,28.229999999999997,28.680000000000003,29.28,29.85000000000001,30.410000000000007,31.090000000000003,31.650000000000006,32.10999999999999,32.6,33.120000000000005,33.580000000000005,34.01,34.540000000000006,35.18000000000001,35.82000000000001,36.28000000000001,36.61,36.820000000000014,37.01000000000001,37.13000000000001,37.25,37.42000000000001,37.64,37.919999999999995,38.19,38.459999999999994,38.66,38.82,38.96,39.24,39.47,39.809999999999995,40.23999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
