<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.18,97.27,96.89000000000001,96.94999999999999,96.85000000000001,96.67,96.63000000000001,96.24999999999999,96.02999999999999,95.51,94.92,94.49000000000001,94.07,93.60999999999997,93.43,93.30999999999999,93.19000000000001,92.94,93,92.89000000000001,92.88000000000001,92.97000000000001,92.94000000000001,92.79,92.64000000000001,92.57,92.52,92.53,92.48000000000002,92.28999999999999,91.97000000000001,91.41,91.31,91.54,91.47000000000001,91.51,91.62,90.35000000000001],"color":"green"},{"name":"anthropic","data":[2.1199999999999997,2.0500000000000003,2.42,2.3699999999999997,2.47,2.6599999999999997,2.6899999999999995,3.06,3.29,3.82,4.409999999999999,4.84,5.26,5.709999999999999,5.89,6.01,6.109999999999999,6.389999999999999,6.329999999999999,6.449999999999999,6.449999999999999,6.36,6.39,6.54,6.69,6.74,6.79,6.79,6.8500000000000005,7.04,7.360000000000001,7.91,8.02,7.78,7.86,7.8100000000000005,7.699999999999999,8.969999999999997],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
