<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62,61.75000000000001,60.370000000000005,59.24,58.36,57.58,57.17999999999999,56.449999999999996,55.76000000000001,55.35,55.79000000000001,56.35000000000001,56.87,56.7,56.13000000000002,56.11000000000001,55.57000000000001,55.599999999999994,55.97,56.06,56.75,57.769999999999996,58.11999999999999,58.68,59.06,58.51,58.05,56.91,56.50000000000001,56.12000000000001,56.010000000000005,55.940000000000005,55.9,56.13,56.14000000000001,56.21000000000001,56.06000000000001,56.040000000000006],"color":"green"},{"name":"anthropic","data":[35.04,35.260000000000005,36.629999999999995,37.76000000000001,38.650000000000006,39.440000000000005,39.84,40.57,41.25,41.650000000000006,41.220000000000006,40.68000000000001,40.16,40.309999999999995,40.9,40.9,41.459999999999994,41.440000000000005,41.050000000000004,40.97,40.27,39.25,38.88999999999999,38.34,37.949999999999996,38.51,38.980000000000004,40.11000000000001,40.52,40.89000000000001,41.019999999999996,41.08999999999999,41.13,40.89,40.89,40.82,40.989999999999995,41],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
