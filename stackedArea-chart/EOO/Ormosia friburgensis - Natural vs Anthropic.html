<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[30.970000000000002,31.05,30.810000000000002,30.800000000000004,30.620000000000008,30.52,30.37,30.530000000000005,30.580000000000005,30.7,30.880000000000003,31.01,31.150000000000006,31.19,31.26,31.119999999999997,31.17,31.160000000000004,31.130000000000003,31.19,31.240000000000002,31.400000000000002,31.450000000000003,31.549999999999997,31.71,31.919999999999998,32.17,32.34,32.52,32.72,32.96,33.040000000000006,33.17,33.25000000000001,33.34,33.35,33.72,33.75999999999999],"color":"green"},{"name":"anthropic","data":[67.66,67.60000000000001,67.84000000000002,67.86,68.03000000000002,68.13,68.28000000000002,68.13000000000001,68.06,67.95000000000002,67.78000000000002,67.65,67.5,67.46,67.41000000000001,67.53999999999999,67.47999999999999,67.49000000000001,67.53,67.47000000000001,67.41000000000001,67.26,67.21000000000001,67.11000000000001,66.95,66.74000000000001,66.49000000000001,66.32000000000001,66.13000000000001,65.93,65.69,65.60000000000001,65.46000000000001,65.4,65.31,65.3,64.93999999999998,64.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
