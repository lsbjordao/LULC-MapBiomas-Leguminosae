<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[39.67000000000001,39.470000000000006,39.06000000000001,38.69000000000001,38.330000000000005,38.150000000000006,37.86000000000001,37.49,37.14,36.959999999999994,36.72,36.63,36.63999999999999,36.52000000000001,36.45,36.309999999999995,36.22,36.12,35.999999999999986,35.940000000000005,35.91,35.97,35.98,35.99,36.01,36,35.970000000000006,35.83000000000001,35.67000000000001,35.51,35.45,35.42,35.43,35.519999999999996,35.540000000000006,35.56000000000001,35.67000000000001,35.81],"color":"green"},{"name":"anthropic","data":[48.980000000000004,49.19,49.59000000000001,49.99,50.34,50.510000000000005,50.800000000000004,51.18,51.5,51.699999999999996,51.940000000000005,52.02,52.059999999999995,52.129999999999995,52.21,52.35999999999999,52.45000000000001,52.57000000000001,52.67,52.730000000000004,52.76,52.69999999999999,52.7,52.670000000000016,52.65,52.660000000000004,52.699999999999996,52.86,52.980000000000004,53.150000000000006,53.22,53.24000000000001,53.230000000000004,53.13000000000001,53.14,53.08999999999999,52.989999999999995,52.86000000000002],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
