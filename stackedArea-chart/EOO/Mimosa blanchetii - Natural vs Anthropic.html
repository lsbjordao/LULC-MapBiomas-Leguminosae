<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.74,55.480000000000004,55.17999999999999,54.199999999999996,53,51.93999999999999,51.209999999999994,50.309999999999995,49.69999999999999,49.88999999999999,49.9,50.410000000000004,51.32,51.13999999999999,50.98,50.81999999999999,50.169999999999995,49.66,49.069999999999986,48.91999999999999,48.46,48.34,47.989999999999995,47.74999999999999,47.51999999999998,47.08999999999999,46.72,46.09,45.38999999999999,45.47,45.74999999999999,47.03999999999999,47.019999999999996,47.04,46.980000000000004,46.919999999999995,46.89999999999999,46.98],"color":"green"},{"name":"anthropic","data":[43.46,43.71000000000001,44.01,44.99999999999999,46.199999999999996,47.26999999999999,48.00999999999999,48.89,49.5,49.3,49.29999999999999,48.78999999999999,47.889999999999986,48.06999999999999,48.22,48.38999999999999,49.029999999999994,49.559999999999995,50.13999999999999,50.29,50.74999999999999,50.849999999999994,51.199999999999996,51.44999999999999,51.669999999999995,52.109999999999985,52.49,53.129999999999995,53.81999999999999,53.71999999999999,53.43999999999999,52.16,52.17,52.160000000000004,52.22,52.26999999999999,52.31,52.22],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
