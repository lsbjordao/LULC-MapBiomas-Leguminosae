<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[61.01999999999999,60.96,60.53999999999999,60.05999999999999,59.459999999999994,59.3,59.03,58.64,58.34,58.129999999999995,57.83,57.629999999999995,57.84,57.77,57.72999999999999,57.69999999999999,57.52999999999999,57.31999999999999,57.13999999999999,57.01,56.79,56.66,56.53,56.46,56.39,56.31,56.17,55.74,55.21999999999999,54.839999999999996,54.54,54.49999999999999,54.46,54.44,54.42999999999999,54.370000000000005,54.24,54.230000000000004],"color":"green"},{"name":"anthropic","data":[37.78999999999999,37.87,38.29,38.76,39.38,39.54,39.809999999999995,40.17,40.480000000000004,40.7,40.989999999999995,41.160000000000004,40.99,41.050000000000004,41.10000000000001,41.14000000000001,41.29000000000001,41.51,41.68,41.809999999999995,42.059999999999995,42.16,42.309999999999995,42.349999999999994,42.42999999999999,42.52,42.68,43.080000000000005,43.6,43.99999999999999,44.29,44.339999999999996,44.36999999999998,44.37,44.41,44.45,44.57999999999999,44.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
