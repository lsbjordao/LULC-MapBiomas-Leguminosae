<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.339999999999996,60.019999999999996,58.839999999999996,58.28999999999999,57.49999999999999,56.499999999999986,56.48,56.05,55.89,55.629999999999995,56.00999999999999,57.07999999999999,57.94999999999999,58.26999999999999,59.47,59.819999999999986,59.36999999999999,59.639999999999986,59.89999999999999,59.64,60.309999999999995,60.97,60.61000000000001,60.51,59.379999999999995,58.75,57.849999999999994,57.23,56.71999999999999,56.41,56.589999999999996,56.67,56.669999999999995,56.94999999999999,56.87999999999999,56.84999999999999,56.83999999999999,56.929999999999986],"color":"green"},{"name":"anthropic","data":[38.95000000000001,39.25000000000001,40.44000000000001,40.980000000000004,41.790000000000006,42.79999999999999,42.79999999999999,43.23,43.39999999999999,43.65,43.27,42.18,41.31,41,39.79,39.46,39.89,39.62999999999999,39.37,39.63999999999999,38.97,38.28999999999999,38.64999999999999,38.77,39.91,40.510000000000005,41.42999999999999,42.04,42.539999999999985,42.86,42.69,42.6,42.620000000000005,42.34000000000001,42.39,42.419999999999995,42.45,42.37],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
