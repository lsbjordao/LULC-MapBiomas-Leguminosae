<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[49.919999999999995,50.11999999999999,48.32000000000001,47.68,47.33,47.59999999999999,47.73999999999999,47.93,48.06999999999999,47.42999999999999,47.62,47.99999999999999,48.14,48.18,48.65,48.04,47.589999999999996,47.300000000000004,47.220000000000006,47.33999999999999,48.339999999999996,48.97999999999999,49.43999999999999,49.489999999999995,48.95,48.800000000000004,48.309999999999995,48.019999999999996,47.54,47.14000000000001,46.489999999999995,46.109999999999985,46.510000000000005,47.19,47.17999999999999,47.079999999999984,46.87999999999999,46.980000000000004],"color":"green"},{"name":"anthropic","data":[49.489999999999995,49.31,51.09,51.73,52.11,51.849999999999994,51.709999999999994,51.489999999999995,51.359999999999985,52.009999999999984,51.82999999999999,51.43999999999999,51.309999999999995,51.25999999999999,50.79999999999999,51.419999999999995,51.85,52.12999999999999,52.199999999999996,52.11,51.08999999999999,50.459999999999994,50.01999999999999,49.93999999999999,50.48999999999999,50.64,51.120000000000005,51.43,51.88999999999999,52.31,52.94,53.31,52.93000000000001,52.25,52.27,52.37,52.54,52.440000000000005],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
