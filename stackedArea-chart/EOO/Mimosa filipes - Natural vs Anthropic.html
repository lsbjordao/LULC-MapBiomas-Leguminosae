<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[72.77000000000004,72.64,72.32000000000001,71.82,71.25000000000003,71.02,70.72999999999999,70.28,69.86000000000001,69.69000000000001,69.38000000000004,69.2,69.49000000000002,69.34,69.25000000000003,69.19000000000003,68.91000000000001,68.61000000000001,68.33000000000001,68.10000000000001,67.70000000000002,67.50000000000001,67.27,67.15000000000002,67.09,66.91000000000003,66.63,65.98,65.27000000000001,64.7,64.21000000000001,64.07000000000001,63.860000000000014,63.800000000000004,63.66,63.45,63.16,62.91000000000001],"color":"green"},{"name":"anthropic","data":[26.880000000000003,26.989999999999995,27.34,27.86,28.440000000000005,28.650000000000006,28.93,29.380000000000003,29.830000000000002,30.00000000000001,30.290000000000003,30.470000000000006,30.18000000000001,30.33000000000001,30.420000000000005,30.490000000000006,30.760000000000005,31.060000000000002,31.31000000000001,31.57000000000001,31.990000000000006,32.18,32.400000000000006,32.49,32.57000000000001,32.75000000000001,33.03,33.690000000000005,34.400000000000006,34.989999999999995,35.459999999999994,35.60999999999999,35.8,35.88,36.010000000000005,36.21999999999999,36.49,36.76],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
