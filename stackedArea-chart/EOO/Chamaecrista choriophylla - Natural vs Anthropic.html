<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.28999999999999,44.199999999999996,43.47999999999999,42.91,42.269999999999996,41.77,41.34,40.83,40.339999999999996,40.00999999999999,39.489999999999995,39.14,38.75999999999999,38.510000000000005,38.25,37.83,37.53999999999999,37.059999999999995,36.66,36.239999999999995,35.95,35.77,35.61,35.65,35.739999999999995,35.69,35.580000000000005,35.46,35.24,35.09,35.17,35.11,35.089999999999996,35.09,34.980000000000004,34.85,34.72,34.790000000000006],"color":"green"},{"name":"anthropic","data":[53.69999999999999,54.8,55.519999999999996,56.08,56.720000000000006,57.25,57.65000000000001,58.169999999999995,58.660000000000004,58.98000000000001,59.5,59.860000000000014,60.25,60.480000000000004,60.75,61.15999999999999,61.47,61.94,62.31999999999999,62.73999999999999,63.039999999999985,63.21,63.370000000000005,63.349999999999994,63.23,63.290000000000006,63.39999999999999,63.54,63.75,63.91,63.79999999999999,63.89,63.910000000000004,63.89999999999999,63.99000000000001,64.16,64.26999999999998,64.19],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
