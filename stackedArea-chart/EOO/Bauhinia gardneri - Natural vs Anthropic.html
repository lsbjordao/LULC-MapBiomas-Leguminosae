<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[57.94,57.629999999999995,57.03999999999999,56.4,55.53999999999999,54.839999999999996,54.160000000000004,53.45,52.72,52.029999999999994,51.33999999999999,50.63999999999999,49.989999999999995,49.43000000000001,48.849999999999994,48.330000000000005,47.79,47.300000000000004,46.74999999999999,46.01999999999999,45.56999999999999,45.199999999999996,44.83999999999999,44.509999999999984,44.239999999999995,43.95,43.64,43.11,42.55,42.13,41.74,41.52,41.33,41.18000000000001,40.9,40.6,40.24,40.35],"color":"green"},{"name":"anthropic","data":[41.56,41.9,42.5,43.13,44.00000000000001,44.679999999999986,45.35,46.07999999999999,46.800000000000004,47.480000000000004,48.18999999999999,48.88999999999998,49.51999999999999,50.09,50.68,51.2,51.71999999999999,52.220000000000006,52.75000000000001,53.500000000000014,53.949999999999996,54.31000000000001,54.680000000000014,54.990000000000016,55.28,55.57,55.9,56.41000000000001,56.96000000000001,57.41,57.78999999999999,58.010000000000005,58.169999999999995,58.339999999999996,58.62,58.93999999999999,59.279999999999994,59.16999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
