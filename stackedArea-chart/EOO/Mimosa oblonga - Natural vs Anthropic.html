<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[42.42999999999999,42.71999999999999,42.41999999999999,42.19999999999998,41.96999999999999,41.90999999999998,41.759999999999984,41.679999999999986,41.59,41.699999999999996,41.63999999999999,41.67999999999999,41.64,41.709999999999994,41.68999999999999,41.569999999999986,41.519999999999996,41.529999999999994,41.46999999999999,41.339999999999996,41.32,41.33999999999999,41.32999999999999,41.319999999999986,41.31999999999999,41.40999999999999,41.449999999999996,41.459999999999994,41.52999999999999,41.53,41.63999999999999,41.61999999999999,41.599999999999994,41.53,41.34999999999999,41.24999999999999,41.31999999999998,41.21999999999999],"color":"green"},{"name":"anthropic","data":[30.930000000000003,30.660000000000004,30.940000000000005,31.180000000000003,31.400000000000006,31.44,31.620000000000005,31.68,31.770000000000003,31.700000000000003,31.75,31.69000000000001,31.730000000000008,31.660000000000007,31.669999999999998,31.790000000000003,31.830000000000005,31.830000000000005,31.890000000000004,32.02,32.040000000000006,32.04,32.03,32.050000000000004,32.05,31.970000000000006,31.950000000000006,31.930000000000003,31.860000000000014,31.860000000000003,31.770000000000007,31.740000000000006,31.78000000000001,31.870000000000008,32.03000000000001,32.1,32.059999999999995,32.160000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
