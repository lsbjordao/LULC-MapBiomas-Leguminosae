<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.60000000000001,66.35000000000001,65.72,65.1,64.28,63.739999999999995,63.2,62.550000000000004,61.93,61.62,61.32,61.13,61.25,61.05,60.81,60.67000000000001,60.34000000000001,60.040000000000006,59.61000000000001,59.13,58.72,58.52,58.32999999999999,58.239999999999995,58.190000000000005,58.01000000000001,57.76,57.15,56.61,56.15999999999999,55.81,55.70999999999999,55.559999999999995,55.44999999999999,55.269999999999996,55.129999999999995,54.93000000000001,54.82],"color":"green"},{"name":"anthropic","data":[33.2,33.46000000000001,34.099999999999994,34.690000000000005,35.519999999999996,36.06999999999999,36.60999999999999,37.26,37.87999999999999,38.19,38.489999999999995,38.66999999999999,38.56,38.74999999999999,38.99999999999999,39.14999999999999,39.47,39.760000000000005,40.18,40.669999999999995,41.08,41.28999999999999,41.48,41.559999999999995,41.61000000000001,41.790000000000006,42.02,42.660000000000004,43.180000000000014,43.620000000000005,43.99000000000001,44.070000000000014,44.22000000000001,44.33000000000001,44.52,44.65000000000001,44.89000000000001,44.980000000000004],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
