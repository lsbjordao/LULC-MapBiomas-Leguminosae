<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[60.03,59.88,59.13000000000001,58.46000000000001,57.75000000000001,57.25,56.790000000000006,56.27,55.71,55.589999999999996,55.599999999999994,55.76,56.31000000000001,56.25000000000001,56.309999999999995,56.29,55.989999999999995,55.879999999999995,55.56,55.31999999999999,55.06999999999999,55.019999999999996,54.88999999999999,54.97,55.04999999999999,55.01,54.900000000000006,54.519999999999996,54.19,53.88,53.56999999999999,53.62,53.599999999999994,53.660000000000004,53.669999999999995,53.720000000000006,53.7,53.85000000000001],"color":"green"},{"name":"anthropic","data":[35.410000000000004,35.580000000000005,36.32,36.99000000000001,37.690000000000005,38.18,38.67,39.160000000000004,39.72,39.85999999999999,39.84,39.69,39.15,39.199999999999996,39.14,39.16,39.46000000000001,39.56,39.879999999999995,40.150000000000006,40.400000000000006,40.45,40.57,40.49,40.42,40.46,40.56000000000001,40.95,41.25,41.57999999999999,41.88999999999999,41.82,41.86,41.78,41.800000000000004,41.73,41.74999999999999,41.59],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
