<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.760000000000005,31.84,30.02,28.090000000000003,27.130000000000003,26.49,25.600000000000005,25.480000000000004,25.229999999999997,24.930000000000003,24.53,24.029999999999998,23.88,23.760000000000005,23.850000000000005,23.790000000000003,23.96,23.88,24.040000000000003,24.12,24.139999999999997,24.380000000000003,24.530000000000005,24.39,24.480000000000004,24.709999999999997,24.78,24.919999999999998,24.970000000000006,25.159999999999997,25.259999999999998,25.189999999999998,25.38,25.69,25.900000000000002,26.12,26.380000000000003,26.840000000000003],"color":"green"},{"name":"anthropic","data":[67.78999999999999,68.68,70.50999999999999,72.42999999999999,73.39999999999999,74.05,74.92,75.05,75.3,75.59,76,76.49,76.66,76.77999999999999,76.68,76.73999999999998,76.55,76.65,76.47999999999999,76.41,76.38,76.14999999999999,76,76.13000000000001,76.05000000000001,75.83,75.75,75.6,75.57000000000001,75.37,75.25,75.34,75.15,74.84,74.61,74.39,74.16000000000001,73.66999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
