<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.379999999999995,45.41,44.88,44.22,43.27999999999999,42.54,42.11,41.790000000000006,41.45000000000001,41.540000000000006,41.61000000000001,41.98,42.51,42.39999999999999,42.48,42.24999999999999,41.85000000000001,41.57,41.300000000000004,41.050000000000004,40.89000000000001,40.82,40.58,40.49,40.06,39.8,39.57,39.39000000000001,39.40999999999999,39.55,39.82,39.96000000000001,39.669999999999995,39.519999999999996,39.42,39.32,39.519999999999996,39.800000000000004],"color":"green"},{"name":"anthropic","data":[41.75,41.69,42.230000000000004,42.91,43.83,44.57,45.019999999999996,45.33,45.690000000000005,45.61000000000001,45.510000000000005,45.15,44.61,44.72,44.66,44.86,45.27,45.559999999999995,45.83,46.05999999999999,46.24,46.31,46.54,46.63999999999999,47.059999999999995,47.33,47.55,47.73,47.72,47.58999999999999,47.30999999999999,47.169999999999995,47.45,47.62,47.709999999999994,47.779999999999994,47.61999999999999,47.33],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
