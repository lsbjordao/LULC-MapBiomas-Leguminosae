<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[97.87,97.76,97.1,96.31,95.36,94.8,93.63999999999999,92.13,90.94000000000001,89.97999999999999,88.44,87.44999999999999,86.04999999999998,84.54,81.78999999999999,80.84,80.22000000000001,79.72,78.5,77.23,76.58000000000001,75.85000000000001,75.55000000000001,75.37,75.36000000000001,75.43,75.44000000000001,75.47000000000001,75.36,75.1,74.82,74.68,74.68999999999998,74.72,74.81,74.8,74.71,74.22],"color":"green"},{"name":"anthropic","data":[4.04,4.159999999999999,4.819999999999999,5.6,6.55,7.13,8.280000000000001,9.790000000000001,10.989999999999998,11.95,13.479999999999999,14.479999999999999,15.87,17.38,20.119999999999997,21.099999999999998,21.71,22.21,23.419999999999998,24.69,25.330000000000002,26.080000000000002,26.38,26.55,26.560000000000002,26.48,26.49,26.45,26.560000000000002,26.830000000000002,27.099999999999998,27.24,27.22,27.189999999999998,27.09,27.11,27.19,27.689999999999998],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
