<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[98.44000000000001,98.48000000000002,98.39000000000001,98.34,98.37000000000003,98.31,98.28000000000002,98.20000000000002,98.11000000000001,98.03,97.81000000000002,97.72000000000001,97.51000000000002,97.35000000000001,97.33000000000001,97.32000000000002,97.16,97.07000000000001,97.04000000000003,96.92,96.79000000000003,96.70000000000002,96.70000000000002,96.64,96.54000000000002,96.53000000000002,96.59000000000003,96.64000000000003,96.55000000000001,96.45000000000002,96.31000000000002,96.09000000000003,96.01,96.00000000000001,96.04000000000002,96.02000000000002,95.97000000000001,95.67000000000002],"color":"green"},{"name":"anthropic","data":[1.1900000000000002,1.1600000000000001,1.26,1.31,1.28,1.33,1.36,1.4300000000000002,1.52,1.6,1.82,1.9200000000000002,2.119999999999999,2.269999999999999,2.2899999999999996,2.3099999999999996,2.4699999999999998,2.54,2.5999999999999996,2.71,2.8399999999999994,2.9299999999999993,2.9299999999999997,2.9899999999999993,3.0899999999999994,3.099999999999999,3.0399999999999996,2.9899999999999993,3.09,3.17,3.31,3.56,3.6300000000000003,3.62,3.59,3.61,3.66,3.95],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
