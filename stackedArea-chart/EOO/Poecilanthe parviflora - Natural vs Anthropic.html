<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[62.11,61.6,61.78000000000001,61.02,60.59000000000001,60.449999999999996,60.02999999999999,59.76,59.489999999999995,59.16,58.79,58.51,58.22999999999999,58.29,57.989999999999995,57.669999999999995,57.679999999999986,57.29999999999998,56.97999999999999,56.41,56.09999999999998,55.88999999999998,55.66999999999998,55.15,55.12,54.76999999999999,54.37,54.18999999999999,54,53.859999999999985,53.839999999999975,53.78999999999999,53.709999999999994,53.58999999999998,52.91999999999998,52.69999999999999,52.25999999999999,51.8],"color":"green"},{"name":"anthropic","data":[34.45000000000002,34.96,34.519999999999996,35.43999999999999,35.98,35.86999999999999,36.419999999999995,36.61,36.91,37.309999999999995,37.73,37.949999999999996,38.25000000000001,38.26,38.21000000000001,38.66,38.24,38.660000000000004,38.74000000000001,39.519999999999996,40.10000000000001,40.16000000000001,40.32,41.14,41.38000000000001,41.7,41.78000000000001,42,42.28000000000001,42.49,41.87000000000001,42.04000000000001,42.150000000000006,42.36,43.06999999999999,42.769999999999996,43.95,44.72],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
