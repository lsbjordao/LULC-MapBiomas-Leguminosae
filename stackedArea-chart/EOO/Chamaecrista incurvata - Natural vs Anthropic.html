<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.3,39.480000000000004,39.05,38.65,38.41,38.089999999999996,37.78999999999999,37.31999999999999,36.96,36.779999999999994,36.46,36.21,35.93,35.690000000000005,35.47,35.12,34.949999999999996,34.67,34.400000000000006,34.190000000000005,33.94000000000001,33.74000000000001,33.650000000000006,33.59000000000001,33.62,33.559999999999995,33.510000000000005,33.39000000000001,33.18000000000001,33.050000000000004,33.13000000000001,33.150000000000006,33.150000000000006,33.2,33.21000000000001,33.17000000000001,33.14000000000001,33.290000000000006],"color":"green"},{"name":"anthropic","data":[59.029999999999994,59.88000000000001,60.290000000000006,60.720000000000006,60.95,61.25000000000002,61.540000000000006,62.03,62.39,62.59,62.88000000000001,63.120000000000005,63.400000000000006,63.67000000000001,63.889999999999986,64.21999999999998,64.4,64.66,64.93999999999998,65.16,65.38999999999999,65.6,65.71000000000001,65.77999999999999,65.72999999999999,65.77,65.82,65.95,66.18,66.28,66.22999999999999,66.2,66.21000000000001,66.14,66.13999999999999,66.18,66.22,66.05],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
