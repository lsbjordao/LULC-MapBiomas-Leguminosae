<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[73.90999999999998,73.83,73.46000000000001,73.00999999999999,72.47999999999999,72.22,71.78999999999999,71.33,70.87,70.7,70.53,70.51,70.86,70.77000000000001,70.64,70.52,70.2,69.98,69.66,69.37,69.07,68.94999999999997,68.8,68.78999999999999,68.79,68.77999999999999,68.63,68.23,67.71000000000001,67.23000000000002,66.87999999999998,66.78,66.61999999999999,66.53000000000002,66.38999999999999,66.24,66.08,65.97],"color":"green"},{"name":"anthropic","data":[27.669999999999998,27.770000000000003,28.100000000000005,28.560000000000002,29.110000000000007,29.35000000000001,29.770000000000003,30.25,30.71,30.890000000000004,31.050000000000004,31.06,30.730000000000004,30.840000000000007,30.960000000000008,31.08,31.38,31.610000000000003,31.950000000000003,32.21000000000001,32.51,32.66000000000001,32.78000000000001,32.81000000000001,32.78,32.8,32.980000000000004,33.370000000000005,33.88,34.35999999999999,34.68000000000001,34.8,34.949999999999996,35.03999999999999,35.17999999999999,35.32,35.510000000000005,35.62],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
