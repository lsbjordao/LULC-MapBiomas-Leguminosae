<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[33.06,32.230000000000004,31.240000000000006,30.400000000000002,29.630000000000003,29.000000000000004,28.44,27.840000000000007,27.33000000000001,26.85,26.400000000000006,26.04000000000001,25.720000000000006,25.51000000000001,25.300000000000008,25.01000000000001,24.820000000000007,24.630000000000006,24.350000000000012,24.18000000000001,24.080000000000005,24.060000000000002,24.090000000000007,24.120000000000008,24.15000000000001,24.210000000000004,24.270000000000007,24.28000000000001,24.28000000000001,24.280000000000005,24.35000000000001,24.430000000000007,24.45000000000001,24.470000000000006,24.46000000000001,24.430000000000007,24.390000000000004,24.640000000000008],"color":"green"},{"name":"anthropic","data":[63.49999999999999,64.33,65.32,66.18,66.92000000000002,67.57000000000001,68.11,68.74000000000001,69.21999999999997,69.71,70.16000000000001,70.54,70.86000000000003,71.07000000000002,71.26,71.56000000000002,71.73,71.93,72.22000000000003,72.42000000000002,72.47000000000001,72.48,72.48,72.46000000000001,72.40000000000002,72.35,72.28000000000003,72.29,72.27000000000001,72.29000000000002,72.2,72.10000000000002,72.13000000000001,72.09,72.11999999999999,72.13999999999997,72.15999999999998,71.92],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
