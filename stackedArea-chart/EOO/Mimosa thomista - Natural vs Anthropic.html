<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[18.130000000000003,17.58,17.38,17.17,16.959999999999997,16.630000000000003,16.48,16.41,16.360000000000003,16.66,16.740000000000002,16.9,17.250000000000004,17.349999999999998,17.369999999999997,17.15,16.99,16.87,17.02,17.289999999999996,17.349999999999998,17.259999999999998,17.31,17.35,17.34,17.5,17.56,17.7,17.779999999999998,18.110000000000003,18.160000000000004,18.280000000000005,18.37,18.66,18.89,19.090000000000003,19.350000000000005,19.4],"color":"green"},{"name":"anthropic","data":[81.67999999999999,82.22,82.42,82.63000000000001,82.83999999999999,83.16999999999999,83.31,83.38,83.42999999999999,83.13,83.06,82.89999999999999,82.54999999999998,82.44999999999999,82.43,82.65,82.82000000000001,82.94000000000001,82.78000000000002,82.5,82.44,82.54,82.49000000000001,82.44000000000001,82.45000000000002,82.3,82.24000000000001,82.10000000000001,82.01,81.68999999999998,81.64,81.53,81.46000000000001,81.15,80.91,80.72,80.44,80.39999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
