<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.02000000000002,54.76,54.40999999999999,53.940000000000005,53.37000000000001,53.24,52.92999999999999,52.580000000000005,52.180000000000014,51.85,51.43,51.150000000000006,50.980000000000004,50.81000000000002,50.610000000000014,50.46000000000002,50.220000000000006,49.870000000000005,49.62000000000001,49.24000000000001,48.910000000000004,48.7,48.53000000000001,48.35000000000001,48.260000000000005,48.11000000000001,47.86,47.49,47.04000000000001,46.61,46.370000000000005,46.13,45.970000000000006,45.89,45.70000000000002,45.47000000000001,45.23000000000001,45.040000000000006],"color":"green"},{"name":"anthropic","data":[44.58,44.839999999999996,45.190000000000005,45.650000000000006,46.22,46.349999999999994,46.65,47.04,47.4,47.739999999999995,48.169999999999995,48.45,48.64000000000001,48.79,48.99,49.15,49.359999999999985,49.75000000000001,49.98000000000001,50.379999999999995,50.660000000000004,50.900000000000006,51.06000000000001,51.23,51.35,51.49,51.730000000000004,52.09000000000001,52.53,52.96,53.190000000000005,53.440000000000005,53.589999999999996,53.680000000000014,53.879999999999995,54.11,54.33999999999999,54.51],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
