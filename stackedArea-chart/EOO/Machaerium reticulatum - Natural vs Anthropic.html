<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[31.140000000000004,30.990000000000006,30.770000000000007,30.700000000000006,30.49000000000001,30.360000000000003,30.200000000000006,30.280000000000005,30.310000000000002,30.42,30.560000000000002,30.720000000000002,30.86,30.950000000000006,31.040000000000006,30.970000000000006,31.01,31.010000000000005,30.960000000000004,31.060000000000006,31.150000000000002,31.27,31.350000000000005,31.440000000000005,31.590000000000003,31.790000000000003,32.00000000000001,32.13,32.31,32.510000000000005,32.68,32.760000000000005,32.94,33.04,33.129999999999995,33.169999999999995,33.49999999999999,33.64999999999999],"color":"green"},{"name":"anthropic","data":[62.550000000000004,62.68000000000001,62.94,62.99999999999999,63.19,63.33,63.47,63.43,63.4,63.260000000000005,63.150000000000006,62.99,62.849999999999994,62.769999999999996,62.690000000000005,62.730000000000004,62.69999999999999,62.699999999999996,62.73999999999999,62.63999999999999,62.55999999999999,62.45,62.36,62.27,62.12,61.92,61.71,61.570000000000014,61.4,61.190000000000005,61.02,60.92,60.77,60.69,60.59,60.540000000000006,60.190000000000005,60.04],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
