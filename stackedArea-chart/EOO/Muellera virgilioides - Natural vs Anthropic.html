<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[38.93000000000001,38.48,38.019999999999996,37.88,37.83,37.82999999999999,37.99,37.959999999999994,38.32999999999999,38.83,39.029999999999994,39.529999999999994,39.91,40.19,40.47,40.56999999999999,40.71999999999999,40.879999999999995,41.19,41.3,41.47999999999999,41.68999999999999,41.78999999999999,41.87999999999999,42.05,42.19,42.300000000000004,42.529999999999994,42.73,43.05999999999999,43.410000000000004,43.58,43.74999999999999,43.94,44.1,44.169999999999995,44.4,44.46],"color":"green"},{"name":"anthropic","data":[49.81,50.24999999999999,50.72,50.85,50.9,50.92,50.760000000000005,50.800000000000004,50.42000000000001,49.92,49.69,49.190000000000005,48.82000000000001,48.56,48.26,48.169999999999995,48.02,47.85,47.56,47.44,47.27,47.06,46.94,46.839999999999996,46.68,46.52,46.43,46.21,46.01,45.69,45.35,45.169999999999995,44.980000000000004,44.79,44.64,44.559999999999995,44.339999999999996,44.279999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
