<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[32.31,32.24999999999999,32.019999999999996,31.78000000000001,31.400000000000002,31.18000000000001,30.990000000000006,30.690000000000005,30.400000000000002,30.130000000000003,29.87,29.650000000000006,29.62,29.529999999999998,29.42,29.29,29.12,28.970000000000002,28.750000000000004,28.530000000000005,28.330000000000002,28.220000000000006,28.14,28.040000000000003,27.970000000000006,27.880000000000003,27.69,27.400000000000006,27.06000000000001,26.78000000000001,26.580000000000013,26.490000000000006,26.400000000000006,26.3,26.180000000000003,26.080000000000002,25.950000000000006,25.920000000000005],"color":"green"},{"name":"anthropic","data":[14.889999999999997,14.939999999999996,15.139999999999997,15.409999999999998,15.779999999999998,15.999999999999998,16.21,16.5,16.790000000000003,17.05,17.31,17.509999999999998,17.519999999999996,17.64,17.749999999999996,17.869999999999997,18.03,18.180000000000003,18.430000000000007,18.650000000000006,18.860000000000003,18.950000000000003,19.040000000000003,19.14,19.230000000000004,19.3,19.47,19.810000000000002,20.12,20.410000000000004,20.610000000000003,20.67,20.780000000000005,20.870000000000005,21.010000000000005,21.090000000000007,21.220000000000006,21.249999999999996],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
