<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.23,65.71000000000001,65.12,64.76,64.67999999999999,64.57000000000001,63.919999999999995,63.93,63.54,63.28,63.330000000000005,62.53,61.760000000000005,61.45,60.910000000000004,60.44,60.52,60.52,60,60.22,60.440000000000005,59.94,59.910000000000004,60.13999999999999,60.08,60.01,60.49,60.449999999999996,60.45,60.62,60.730000000000004,60.75,60.730000000000004,60.56,60.379999999999995,60.410000000000004,60.01,60.12],"color":"green"},{"name":"anthropic","data":[33.37,33.879999999999995,34.47,34.83,34.900000000000006,35.010000000000005,35.68,35.66,36.07,36.32,36.27,37.06,37.85,38.16,38.68,39.129999999999995,39.05,39.019999999999996,39.57,39.35,39.14,39.61,39.62,39.379999999999995,39.44,39.56,39.1,39.04,39.06999999999999,38.82,38.74,38.769999999999996,38.739999999999995,38.959999999999994,39.17,39.150000000000006,39.53,39.43000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
