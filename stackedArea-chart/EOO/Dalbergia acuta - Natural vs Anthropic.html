<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[66.05,65.66,64.88999999999999,64.16,63.34,62.790000000000006,62.24,61.53,60.86,60.16000000000001,59.37000000000001,58.690000000000005,58.2,57.66,57.05000000000001,56.57,56.12000000000001,55.57000000000001,54.83,54.20000000000001,53.71000000000001,53.38,53.180000000000014,52.95000000000002,52.83000000000002,52.70000000000002,52.48000000000001,52.13000000000001,51.690000000000005,51.28,50.98000000000001,50.8,50.67,50.56000000000001,50.39000000000001,50.20000000000001,49.90000000000001,49.66000000000001],"color":"green"},{"name":"anthropic","data":[33.35,33.72,34.519999999999996,35.24,36.07,36.61999999999999,37.14999999999999,37.86999999999999,38.54999999999999,39.249999999999986,40.05999999999999,40.730000000000004,41.210000000000015,41.75000000000001,42.350000000000016,42.81,43.28,43.830000000000005,44.57,45.19,45.68999999999999,46.02,46.25,46.440000000000005,46.56,46.72000000000001,46.90000000000001,47.27,47.71,48.11000000000001,48.41000000000001,48.60000000000001,48.71000000000001,48.85,49.00999999999999,49.2,49.480000000000004,49.75],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
