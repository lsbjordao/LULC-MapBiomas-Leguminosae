<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[55.089999999999996,53.739999999999995,53.150000000000006,51.980000000000004,50.790000000000006,49.37,47.89000000000001,46.839999999999996,45.64,44.75,43.92,43.35,42.15,41.120000000000005,40.339999999999996,39.720000000000006,39.04,38.17,37.51,36.92,37.300000000000004,37.25,37.14,36.97,36.74999999999999,36.38,36.129999999999995,35.900000000000006,35.81,35.669999999999995,35.410000000000004,35.32999999999999,35.28,35.160000000000004,34.94,34.71999999999999,34.50000000000001,34.57],"color":"green"},{"name":"anthropic","data":[42.55,43.9,44.50000000000001,45.66,46.87000000000001,48.28000000000001,49.75000000000001,50.81,51.99999999999999,52.88999999999999,53.730000000000004,54.29,55.5,56.52,57.290000000000006,57.9,58.6,59.47,60.150000000000006,60.71,60.35,60.400000000000006,60.510000000000005,60.67,60.89999999999999,61.24999999999999,61.51,61.720000000000006,61.83,61.98,62.22,62.29999999999999,62.379999999999995,62.459999999999994,62.7,62.93,63.15999999999999,63.06999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
