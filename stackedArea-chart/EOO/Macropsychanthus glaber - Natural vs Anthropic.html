<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[75.52,75.31,74.70999999999998,74.09999999999998,73.55000000000001,73.10000000000001,72.66000000000001,72.00999999999999,71.39999999999998,70.85000000000001,70.19000000000001,69.64,69.2,68.64,68.1,67.67999999999999,67.19,66.68,65.99,65.31,64.8,64.44,64.14999999999999,63.92000000000001,63.760000000000005,63.650000000000006,63.47,63.199999999999996,62.900000000000006,62.60999999999999,62.3,62.06999999999999,61.86,61.7,61.47,61.27,60.910000000000004,60.46000000000001],"color":"green"},{"name":"anthropic","data":[23.82,24.04,24.65,25.25,25.810000000000002,26.250000000000004,26.700000000000003,27.340000000000003,27.960000000000004,28.490000000000002,29.16,29.689999999999998,30.160000000000004,30.710000000000004,31.260000000000005,31.689999999999998,32.16000000000001,32.670000000000016,33.370000000000005,34.03,34.540000000000006,34.92,35.18000000000001,35.46000000000001,35.60000000000001,35.72000000000001,35.88000000000001,36.16999999999999,36.470000000000006,36.74999999999999,37.050000000000004,37.32,37.49000000000001,37.66,37.89999999999999,38.11,38.459999999999994,38.89],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
