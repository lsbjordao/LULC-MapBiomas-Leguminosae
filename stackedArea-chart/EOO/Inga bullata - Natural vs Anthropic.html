<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[40.50000000000001,40.309999999999995,39.97,39.93,39.900000000000006,39.820000000000014,39.79000000000001,39.890000000000015,40.029999999999994,40.070000000000014,40.14,40.30000000000001,40.39000000000001,40.46000000000001,40.620000000000005,40.580000000000005,40.59000000000001,40.62000000000001,40.69000000000001,40.79000000000001,40.90000000000001,41.01000000000002,41.05000000000001,41.120000000000005,41.24000000000001,41.38000000000001,41.45000000000001,41.56000000000001,41.67,41.80000000000001,41.93,42,42.10000000000001,42.17,42.20000000000001,42.260000000000005,42.599999999999994,42.669999999999995],"color":"green"},{"name":"anthropic","data":[39.01,39.21000000000001,39.540000000000006,39.58000000000001,39.620000000000005,39.71,39.739999999999995,39.62,39.5,39.480000000000004,39.400000000000006,39.21,39.13,39.07,38.89,38.96,38.93,38.89,38.82,38.74,38.64,38.510000000000005,38.470000000000006,38.39,38.290000000000006,38.160000000000004,38.080000000000005,37.96000000000001,37.870000000000005,37.74000000000001,37.59,37.53000000000001,37.42000000000001,37.35000000000001,37.31,37.260000000000005,36.93000000000001,36.85000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
