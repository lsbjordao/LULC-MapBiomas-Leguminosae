<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[50.17,49.519999999999996,48.61,47.85,47.11999999999999,46.51,45.96000000000001,45.32,44.759999999999984,44.18,43.540000000000006,43.06999999999999,42.65,42.249999999999986,41.82999999999999,41.410000000000004,41.08,40.739999999999995,40.309999999999995,40.029999999999994,39.85999999999999,39.74999999999999,39.68999999999999,39.64,39.669999999999995,39.65999999999999,39.599999999999994,39.6,39.559999999999995,39.47999999999999,39.46999999999999,39.459999999999994,39.42999999999999,39.419999999999995,39.36,39.269999999999996,39.11999999999999,38.9],"color":"green"},{"name":"anthropic","data":[46.47,47.12,48.04,48.769999999999996,49.529999999999994,50.13,50.669999999999995,51.330000000000005,51.87999999999999,52.43,53.07,53.52,53.999999999999986,54.39,54.820000000000014,55.24000000000001,55.559999999999995,55.890000000000015,56.30000000000001,56.62000000000001,56.77000000000001,56.88000000000002,56.94,56.99,56.97,56.97000000000001,57.01,57.04,57.050000000000004,57.140000000000015,57.150000000000006,57.15,57.209999999999994,57.23999999999999,57.27999999999998,57.36999999999999,57.529999999999994,57.71999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
