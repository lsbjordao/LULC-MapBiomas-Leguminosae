<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[21.300000000000004,21.199999999999996,20.939999999999998,20.64999999999999,20.349999999999998,20.169999999999995,19.97,19.750000000000004,19.560000000000002,19.41,19.24,19.13,19.119999999999997,19.06,18.96,18.849999999999998,18.78,18.71,18.590000000000003,18.52,18.480000000000004,18.42,18.419999999999998,18.420000000000005,18.430000000000007,18.400000000000002,18.360000000000003,18.220000000000002,18.090000000000003,17.950000000000003,17.880000000000006,17.86,17.840000000000007,17.840000000000003,17.810000000000006,17.770000000000003,17.750000000000004,17.800000000000004],"color":"green"},{"name":"anthropic","data":[24,24.12,24.390000000000008,24.690000000000005,25,25.160000000000004,25.37,25.590000000000003,25.790000000000003,25.91,26.090000000000007,26.20000000000001,26.220000000000006,26.300000000000004,26.390000000000004,26.489999999999995,26.54,26.639999999999997,26.73,26.800000000000004,26.870000000000005,26.890000000000004,26.910000000000004,26.91000000000001,26.91,26.92,26.980000000000008,27.100000000000005,27.230000000000004,27.380000000000006,27.430000000000003,27.450000000000003,27.500000000000004,27.470000000000002,27.51,27.530000000000005,27.540000000000006,27.49000000000001],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
