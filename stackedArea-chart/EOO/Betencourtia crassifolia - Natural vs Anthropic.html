<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[46.710000000000015,46.08,45.67000000000001,45.06,44.540000000000006,44.280000000000015,43.80000000000001,43.29000000000001,42.87000000000001,42.52000000000002,42.02000000000001,41.660000000000004,41.30000000000001,40.99000000000001,40.640000000000015,40.32000000000001,40.11000000000001,39.74000000000001,39.510000000000005,39.23,38.949999999999996,38.74999999999999,38.580000000000005,38.4,38.32,38.13999999999999,37.99,37.7,37.43,37.14,36.93,36.69,36.61,36.64,36.56,36.52,36.38000000000001,36.550000000000004],"color":"green"},{"name":"anthropic","data":[52.46,53.07000000000001,53.46999999999998,54.08,54.599999999999994,54.86,55.32999999999999,55.85999999999999,56.27000000000001,56.61999999999999,57.11999999999999,57.51,57.850000000000016,58.16,58.49,58.830000000000005,59.02,59.400000000000006,59.65,59.91000000000001,60.2,60.360000000000014,60.55000000000001,60.73000000000002,60.790000000000006,60.980000000000004,61.13000000000001,61.44000000000001,61.7,61.980000000000004,62.18999999999999,62.419999999999995,62.50999999999999,62.48,62.58999999999999,62.61999999999999,62.75999999999999,62.58999999999999],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
