<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[45.12,45.25000000000001,44.55000000000001,43.87000000000001,43.17,42.88000000000001,42.62,42.51,42.38000000000001,42.150000000000006,41.77,41.52,41.36,41.13,40.89000000000001,40.49000000000001,40.38000000000001,40.21,40.19,40.019999999999996,39.730000000000004,39.67,39.68000000000001,39.7,39.78000000000001,39.79,39.86000000000001,39.879999999999995,39.76,39.7,39.690000000000005,39.510000000000005,39.290000000000006,39.330000000000005,39.300000000000004,39.199999999999996,39.54000000000001,39.9],"color":"green"},{"name":"anthropic","data":[17.58,17.47,18.18,18.9,19.58,19.869999999999997,20.119999999999997,20.23,20.36,20.6,21,21.240000000000002,21.39,21.599999999999998,21.849999999999998,22.240000000000002,22.360000000000003,22.56,22.56,22.749999999999996,23.029999999999998,23.09,23.069999999999997,23.05,22.959999999999997,22.959999999999997,22.91,22.880000000000003,23.020000000000003,23.09,23.099999999999998,23.28,23.48,23.470000000000006,23.500000000000004,23.580000000000002,23.26,22.87],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
