<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[23.980000000000004,23.979999999999997,23.27000000000001,22.660000000000004,22.179999999999996,21.950000000000006,21.610000000000007,21.51,21.45,21.36,21.19,21.05,20.919999999999995,20.79,20.67,20.44,20.42,20.32,20.400000000000002,20.289999999999996,20.19,20.220000000000002,20.26,20.310000000000002,20.360000000000003,20.350000000000005,20.410000000000004,20.46,20.469999999999995,20.56,20.619999999999994,20.629999999999992,20.629999999999995,20.689999999999994,20.739999999999995,20.71999999999999,20.879999999999995,21.139999999999997],"color":"green"},{"name":"anthropic","data":[27.700000000000003,27.7,28.420000000000005,29.080000000000002,29.550000000000004,29.800000000000008,30.130000000000003,30.23,30.290000000000003,30.370000000000005,30.550000000000008,30.700000000000006,30.84,30.94,31.09,31.290000000000003,31.330000000000002,31.43,31.34,31.45,31.549999999999997,31.52,31.490000000000002,31.439999999999998,31.41,31.42,31.37,31.29,31.290000000000003,31.220000000000002,31.130000000000003,31.12,31.12,31.06,31.020000000000003,31.060000000000002,30.91,30.67],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
