<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #stackedArea { width: 100%; height: 100vh; }
    </style>
</head>

<body>
    <div id="stackedArea"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const series = JSON.parse('[{"name":"natural","data":[41.44,41.15999999999999,40.55999999999998,40.10999999999999,39.77999999999999,39.72999999999999,39.529999999999994,39.249999999999986,39.1,38.89999999999999,38.679999999999986,38.54999999999999,38.44999999999999,38.329999999999984,38.18999999999999,37.919999999999995,37.839999999999996,37.66999999999999,37.58999999999999,37.53999999999999,37.599999999999994,37.63999999999999,37.66999999999999,37.65999999999999,37.62999999999999,37.599999999999994,37.58999999999999,37.49999999999999,37.38999999999999,37.249999999999986,37.18,37.05,37.109999999999985,37.23,37.269999999999996,37.28,37.35000000000001,37.51],"color":"green"},{"name":"anthropic","data":[56.41999999999998,56.719999999999985,57.329999999999984,57.77,58.12999999999999,58.14999999999999,58.359999999999985,58.629999999999995,58.8,58.96999999999999,59.220000000000006,59.339999999999996,59.44,59.55999999999999,59.669999999999995,59.93999999999999,60.04,60.21,60.28,60.339999999999996,60.27,60.22000000000001,60.199999999999996,60.19000000000001,60.24,60.27,60.28000000000001,60.370000000000005,60.47,60.59,60.709999999999994,60.809999999999995,60.71999999999999,60.61999999999999,60.60999999999999,60.589999999999996,60.499999999999986,60.349999999999994],"color":"red"}]');
            const container = document.getElementById('stackedArea');
            let chart = null;

            function drawChart() {
                const w = container.clientWidth;
                const h = container.clientHeight;

                if (chart) {
                    chart.setSize(w, h, false);
                    return;
                }

                chart = Highcharts.chart('stackedArea', {
                    chart: {
                        type: 'area',
                        width: w,
                        height: h,
                        animation: false
                    },
                    title: { text: '' },
                    xAxis: {
                        categories: [
                            '1985','1986','1987','1988','1989','1990','1991','1992','1993','1994',
                            '1995','1996','1997','1998','1999','2000','2001','2002','2003','2004',
                            '2005','2006','2007','2008','2009','2010','2011','2012','2013','2014',
                            '2015','2016','2017','2018','2019','2020','2021','2022'
                        ],
                        tickmarkPlacement: 'on',
                        title: { enabled: false }
                    },
                    yAxis: {
                        title: { text: 'Percentage' },
                        labels: { formatter: function () { return this.value; } },
                        max: 100
                    },
                    tooltip: {
                        split: true,
                        valueSuffix: ' %'
                    },
                    plotOptions: {
                        area: {
                            stacking: 'normal',
                            lineColor: '#666666',
                            lineWidth: 1,
                            marker: { enabled: false }
                        }
                    },
                    series: series
                });
            }

            drawChart();

            // Redesenha imediatamente a cada frame de resize
            new ResizeObserver(() => drawChart()).observe(container);
        });
    </script>
</body>

</html>
